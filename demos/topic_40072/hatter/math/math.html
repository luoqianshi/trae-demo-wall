                let { px: startPx, py: basePy } = worldToPixel(a, 0);
                ctx.moveTo(startPx, basePy);
                for (let i = 0; i <= steps; i++) {
                    const x = a + i * dx;
                    const y = getY(x);
                    if (y !== undefined && isFinite(y)) {
                        let { px, py } = worldToPixel(x, y);
                        ctx.lineTo(px, py);
                    }
                }
                let { px: endPx } = worldToPixel(b, 0);
                ctx.lineTo(endPx, basePy);
                ctx.closePath();
                ctx.fillStyle = fillCol;
                ctx.fill();
                ctx.globalAlpha = alpha;

                // Draw boundary curve on top of fill
                ctx.beginPath();
                ctx.strokeStyle = g.color;
                ctx.lineWidth = g.lineWidth || 2;
                setDash(g.strokeDash);
                let first = true;
                for (let i = 0; i <= steps; i++) {
                    const x = a + i * dx;
                    const y = getY(x);
                    if (y !== undefined && isFinite(y)) {
                        let { px, py } = worldToPixel(x, y);
                        if (first) { ctx.moveTo(px, py); first = false; }
                        else ctx.lineTo(px, py);
                    }
                }
                ctx.stroke();
                setDash(null);

                // Draw integral value text at midpoint
                const midX = (a + b) / 2;
                const midY = getY(midX);
                if (midY !== undefined && isFinite(midY)) {
                    let { px, py } = worldToPixel(midX, midY / 2);
                    const dark = isDark();
                    const valText = '∫=' + integral.toFixed(4);
                    ctx.font = '600 12px "Fira Code", monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const tw = ctx.measureText(valText).width;
                    ctx.fillStyle = dark ? 'rgba(12,12,24,0.9)' : 'rgba(255,255,255,0.92)';
                    ctx.beginPath();
                    ctx.ellipse(px, py, tw / 2 + 6, 9, 0, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.strokeStyle = dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.fillStyle = g.color;
                    ctx.fillText(valText, px, py);
                }

                ctx.restore();
            }

            // ========= Graphic Description =========
            function getGraphicDescription(g) {
                switch (g.type) {
                    case "circle": return `圆(圆心(${g.params.cx},${g.params.cy}) 半径${g.params.r})`;
                    case "ellipse": return `椭圆(中心(${g.cx},${g.cy}) rx=${g.rx} ry=${g.ry})`;
                    case "rectangle": return `矩形(x=${g.x} y=${g.y} 宽${g.w} 高${g.h})`;
                    case "polygon":
                        let n = g.points.length;
                        let sn = { 3: '三角形', 4: '四边形', 5: '五边形', 6: '六边形' };
                        return `${sn[n] || n + '边形'}(顶点${JSON.stringify(g.points)})`;
                    case "segment": return `线段(${JSON.stringify(g.points[0])}→${JSON.stringify(g.points[1])})`;
                    case "ray": return `射线(${JSON.stringify(g.points[0])}→${JSON.stringify(g.points[1])})`;
                    case "paramConn": return `连线(${g.xExpr1},${g.yExpr1})→(${g.xExpr2},${g.yExpr2})`;
                    case "points": return `散点(${g.points.length}个点)`;
                    case "line": return g.isVertical ? `垂直线(x=${g.params.x})` : `直线(y=${g.params.k}x+${g.params.b})`;
                    case "sin": return `正弦曲线(y=${g.params.A||1}·sin(${g.params.B||1}x+${g.params.C||0})+${g.params.D||0})`;
                    case "cos": return `余弦曲线(y=${g.params.A||1}·cos(${g.params.B||1}x+${g.params.C||0})+${g.params.D||0})`;
                    case "quadratic": return `抛物线(y=${g.params.a||1}x²+${g.params.b||0}x+${g.params.c||0})`;
                    case "inverse": return `反比例(y=${g.params.k||1}/x)`;
                    case "text": return `文字"${g.text}"@(${g.x},${g.y})`;
                    case "angleArc": return `角度弧@(${g.cx},${g.cy})`;
                    case "paramPoint": return `动点((${g.xExpr},${g.yExpr}) 标签:${g.label||''})`;
                    case "paramCurve": return `参数曲线(x(t)=${g.xExpr}, y(t)=${g.yExpr})`;
                    case "integralArea": return `定积分[${g.intA},${g.intB}]`;
                    case "implicit": return `隐函数(${g.expr}=0)`;
                    case "inequality": return `不等式(${g.expr} ${g.operator} 0)`;
                    case "piecewise": return `分段函数(${g.pieces.length}段)`;
                    default: return g.type;
                }
            }

            function getGraphicShortLabel(g) {
                switch (g.type) {
                    case "circle": return `圆 r${g.params.r}`;
                    case "polygon":
                        let n = g.points.length;
                        let sn = { 3: '△', 4: '□', 5: '五边形', 6: '六边形' };
                        return sn[n] || n + '边形';
                    case "line": return g.isVertical ? `垂线x=${g.params.x}` : '直线';
                    case "sin": return '正弦';
                    case "cos": return '余弦';
                    case "quadratic": return '抛物线';
                    case "inverse": return '反比例';
                    case "ellipse": return '椭圆';
                    case "rectangle": return '矩形';
                    case "segment": return '线段';
                    case "ray": return '射线';
                    case "paramConn": return '连线';
                    case "points": return '散点';
                    case "text": return '文字';
                    case "paramPoint": return '动点·' + (g.label || 'P');
                    case "paramCurve": return '参数曲线';
                    case "integralArea": return '定积分';
                    case "implicit": return '隐函数';
                    case "inequality": return '不等式';
                    case "piecewise": return '分段函数';
                    case "angleArc": return '角度弧';
                    default: return g.type;
                }
            }

            // ========= Graphics Context =========
            function buildGraphicsContext() {
                let lines = ["[当前画布图形列表 - 可使用delete指令删除指定id的图形]"];
                if (graphics.length === 0) {
                    lines.push("  (暂无图形)");
                } else {
                    for (let g of graphics) {
                        let desc = getGraphicDescription(g);
                        let fillInfo = '';
                        if (g.fill !== undefined) fillInfo = ` 填充:${g.fill ? '是' : '否'}`;
                        if (g.strokeDash && Array.isArray(g.strokeDash) && g.strokeDash.length > 0) fillInfo += ' 虚线:是';
                        lines.push(`  id:${g.id} 类型:${g.type} ${desc} 颜色:${g.color}${fillInfo}`);
                    }
                }
                if (sliders.length > 0) {
                    lines.push('[当前滑动条状态]');
                    for (let s of sliders) {
                        lines.push(`  变量${s.name} ∈ [${s.min}, ${s.max}] 当前值=${s.value.toFixed(3)} 步长=${s.step}`);
                    }
                    lines.push('动点(paramPoint)的参数方程(xExpr, yExpr)中可使用这些变量名');
                }
                if (namedPoints.length > 0) {
                    lines.push('[当前命名点列表 - 可在parentIds中引用]');
                    for (let p of namedPoints) {
                        let dynInfo = p.isDynamic ? ` 动点(${p.exprX},${p.exprY})` : '';
                        lines.push(`  标签:${p.label} id:${p.id} 坐标:(${p.x.toFixed(2)},${p.y.toFixed(2)})${dynInfo}`);
                    }
                }
                return lines.join('\n');
            }

            // ========= Graphic Construction =========
            function createGraphicFromSpec(spec) {
                let id = Date.now() + Math.random();
                let { type, params = {}, color = "#6366f1", expression, points, x, y, w, h, cx, cy, rx, ry, lineWidth, strokeDash, fill, fillColor, size } = spec;
                const hidden = spec.hidden || false;
                if (type === "line") {
                    if (params.x !== undefined && params.k === undefined) return { id, type, params: { x: params.x }, color, expression, isVertical: true, getY: null, lineWidth, strokeDash, hidden };
                    else if (params.k !== undefined && params.b !== undefined) {
                        let getY = (x) => params.k * x + params.b;
                        return { id, type, params, color, expression, getY, isVertical: false, lineWidth, strokeDash, hidden };
                    } else return null;
                } else if (type === "circle") {
                    if (params.cx === undefined || params.cy === undefined || params.r === undefined) return null;
                    return { id, type, params, color, expression, getY: null, lineWidth, strokeDash, fill, fillColor, hidden };
                } else if (type === "ellipse") {
                    if (cx === undefined || cy === undefined || rx === undefined || ry === undefined) return null;
                    return { id, type, cx, cy, rx, ry, color, lineWidth, strokeDash, fill, fillColor, hidden };
                } else if (type === "rectangle") {
                    if (x === undefined || y === undefined || w === undefined || h === undefined) return null;
                    return { id, type, x, y, w, h, color, lineWidth, strokeDash, fill, fillColor, hidden };
                } else if (type === "points") {
                    if (!points || !Array.isArray(points)) return null;
                    return { id, type, points, color, size, hidden };
                } else if (type === "quadratic" || type === "inverse" || type === "sin" || type === "cos" || type === "exp" || type === "log" || type === "abs") {
                    let getY = null;
                    try {
                        if (type === "quadratic") { let { a = 1, b = 0, c = 0 } = params; getY = (x) => a * x * x + b * x + c; }
                        else if (type === "inverse") { let { k = 1 } = params; getY = (x) => (x === 0 ? undefined : k / x); }
                        else if (type === "sin") { let { A = 1, B = 1, C = 0, D = 0 } = params; getY = (x) => A * Math.sin(B * x + C) + D; }
                        else if (type === "cos") { let { A = 1, B = 1, C = 0, D = 0 } = params; getY = (x) => A * Math.cos(B * x + C) + D; }
                        else if (type === "exp") { let { a = 1, b = 1 } = params; getY = (x) => a * Math.exp(b * x); }
                        else if (type === "log") { let { base = Math.E, a = 1 } = params; getY = (x) => (x > 0 ? a * Math.log(x) / Math.log(base) : undefined); }
                        else if (type === "abs") { let { a = 1, b = 0, c = 0 } = params; getY = (x) => a * Math.abs(x - b) + c; }
                    } catch (e) { return null; }
                    return { id, type, params, color, expression, getY, lineWidth, strokeDash, hidden };
                } else if (type === "segment") {
                    if (points && points.length === 2) return { id, type, points, color, lineWidth, strokeDash, hidden };
                    return null;
                } else if (type === "ray") {
                    if (points && points.length === 2) return { id, type, points, color, lineWidth, strokeDash, hidden };
                    return null;
                } else if (type === "paramConn") {
                    if (!spec.xExpr1 || !spec.yExpr1 || !spec.xExpr2 || !spec.yExpr2) return null;
                    return { id, type, xExpr1: spec.xExpr1, yExpr1: spec.yExpr1, xExpr2: spec.xExpr2, yExpr2: spec.yExpr2, color, lineWidth, strokeDash, connType: spec.connType || 'segment', hidden };
                } else if (type === "polygon") {
                    if (points && points.length >= 3) return { id, type, points, color, lineWidth, strokeDash, fill, fillColor, hidden };
                    return null;
                } else if (type === "text") {
                    if (!spec.text) return null;
                    return { id, type, text: spec.text, x: spec.x || 0, y: spec.y || 0, color: spec.color || "#e0e0f0", fontSize: spec.fontSize || 16, hidden };
                } else if (type === "angleArc") {
                    if (spec.cx === undefined || spec.cy === undefined || spec.startAngle === undefined || spec.endAngle === undefined) return null;
                    return { id, type, cx: spec.cx, cy: spec.cy, startAngle: spec.startAngle, endAngle: spec.endAngle, radius: spec.radius || 0.5, color: spec.color || "#f59e0b", lineWidth: spec.lineWidth || 2, hidden };
                } else if (type === "paramPoint") {
                    if (!spec.xExpr || !spec.yExpr) return null;
                    return { id, type, xExpr: spec.xExpr, yExpr: spec.yExpr, color, size: spec.size || 8, label: spec.label || '', trail: spec.trail || false, lineWidth: spec.lineWidth, hidden };
                } else if (type === "paramCurve") {
                    if (!spec.xExpr || !spec.yExpr) return null;
                    return { id, type, xExpr: spec.xExpr, yExpr: spec.yExpr, color, lineWidth: spec.lineWidth || 2, tMin: spec.tMin, tMax: spec.tMax, hidden };
                } else if (type === "namedPoint") {
                    // Named points are now rendered directly from namedPoints array, no graphic needed
                    // But still create a minimal placeholder for backward compatibility during deserialization
                    return null;
                } else if (type === "integralArea") {
                    if (spec.graphicId === undefined || spec.intA === undefined || spec.intB === undefined) return null;
                    return { id, type, graphicId: spec.graphicId, intA: spec.intA, intB: spec.intB, color: spec.color || '#6366f1', fillColor: spec.fillColor, lineWidth: spec.lineWidth || 2, strokeDash: spec.strokeDash, hidden };
                } else if (type === "implicit") {
                    if (!spec.expr) return null;
                    return { id, type, expr: normalizeExpression(spec.expr), color: spec.color || "#06b6d4", lineWidth: spec.lineWidth || 2.5, strokeDash: spec.strokeDash, hidden };
                } else if (type === "inequality") {
                    if (!spec.expr || !spec.operator) return null;
                    return { id, type, expr: normalizeExpression(spec.expr), operator: spec.operator, color: spec.color || "#8b5cf6", fillColor: spec.fillColor || hexToRgba(spec.color || "#8b5cf6", 0.12), lineWidth: spec.lineWidth || 2.5, strokeDash: spec.strokeDash, hidden };
                } else if (type === "piecewise") {
                    if (!spec.pieces || !Array.isArray(spec.pieces) || spec.pieces.length === 0) return null;
                    let pieces = spec.pieces.map(p => {
                        let cond = normalizeExpression(p.condition);
                        let exp = normalizeExpression(p.expr);
                        return {
                            condition: cond,
                            expr: exp,
                            condFn: (x, y) => { try { return evaluateExpr(cond, { x, y }) > 0; } catch(e) { return false; } },
                            getY: (x) => evaluateExpr(exp, { x })
                        };
                    });
                    return { id, type, pieces, color: spec.color || "#f59e0b", lineWidth: spec.lineWidth || 2.5, strokeDash: spec.strokeDash, hidden };
                }
                return null;
            }

            // After creating a graphic, attach parentIds if present in spec
            const _origCreateGraphicFromSpec = createGraphicFromSpec;
            createGraphicFromSpec = function(spec) {
                let g = _origCreateGraphicFromSpec(spec);
                if (g && spec.parentIds) { g.parentIds = spec.parentIds.slice(); }
                return g;
            };

            function addGraphic(spec, skipFade = false, skipUndo = false) {
                if (!skipUndo) pushUndo();
                if (spec.type === 'paramPoint' || spec.type === 'paramConn' || spec.type === 'paramCurve') {
                    ensureSliderVars(spec);
                }
                let g = createGraphicFromSpec(spec);
                if (!g) { setStatus("图形格式无效", "error"); return; }

                if (spec.type === 'paramPoint') {
                    let lbl = spec.label || getNextPointLabel();
                    spec.label = lbl;
                    if (!namedPoints.find(p => p.label === lbl)) {
                        namedPoints.push({ id: Date.now()+Math.random(), label: lbl, x: 0, y: 0, isDynamic: true, exprX: spec.xExpr, exprY: spec.yExpr, color: spec.color || '#ef4444', childIds: [] });
                    }
                }

                if (skipFade) {
                    g.alpha = 1;
                    graphics.push(g);
                    _cachedIntersections = null;
                    gfxDirty = true;
                    redraw();
                    return;
                }
                g.alpha = 0;
                graphics.push(g);
                _cachedIntersections = null;
                let start = performance.now();
                function fadeIn(time) {
                    let t = Math.min((time - start) / 400, 1);
                    g.alpha = 1 - Math.pow(1 - t, 3);
                    redrawWithAlpha();
                    if (t < 1) requestAnimationFrame(fadeIn);
                    else { g.alpha = 1; redraw(); }
                }
                requestAnimationFrame(fadeIn);
            }

            function deleteGraphicById(id, skipUndo = false) {
                if (!skipUndo) pushUndo();
                let idx = graphics.findIndex(g => g.id === id);
                if (idx === -1) return;
                let g = graphics[idx];
                // Clean up childIds references from namedPoints
                if (g.parentIds) {
                    for (let pid of g.parentIds) {
                        let np = namedPoints.find(p => p.id === pid);
                        if (np && np.childIds) {
                            np.childIds = np.childIds.filter(cid => cid !== id);
                        }
                    }
                }
                graphics.splice(idx, 1);
                _cachedIntersections = null;
                if (selectedGraphic && selectedGraphic.id === id) { selectedGraphic = null; closeGraphicEditor(); }
                gfxDirty = true;
                redraw();
            }

            function deleteNamedPointById(id) {
                pushUndo();
                let np = namedPoints.find(p => p.id === id);
                if (!np) return;
                if (np.childIds) {
                    for (let cid of [...np.childIds]) {
                        deleteGraphicById(cid, true);
                    }
                }
                // Remove from namedPoints
                let idx = namedPoints.findIndex(p => p.id === id);
                if (idx !== -1) namedPoints.splice(idx, 1);
                if (selectedNamedPoint && selectedNamedPoint.id === id) { selectedNamedPoint = null; closeGraphicEditor(); }
                gfxDirty = true;
                redraw();
                updateFunctionListUI();
                autoSave();
            }

            function deleteNamedPoint(label) {
                let pt = namedPoints.find(p => p.label === label);
                if (!pt) return;
                deleteNamedPointById(pt.id);
            }

            function deleteAll() {
                if (graphics.length === 0 && sliders.length === 0 && namedPoints.length === 0) return;
                pushUndo();
                stopAllAnimations();
                sliders = [];
                graphics = [];
                _cachedIntersections = null;
                namedPoints = [];
                selectedGraphic = null;
                selectedNamedPoint = null;
                closeGraphicEditor();
                renderSliders();
                renderPoints();
                gfxDirty = true;
                redraw();
                showToast('画布已清空', 'success');
            }

            function animateViewChange(targetXMin, targetXMax, targetYMin, targetYMax, duration = 400) {
                const startXMin = xMin, startXMax = xMax, startYMin = yMin, startYMax = yMax;
                const startTime = performance.now();
                function step(time) {
                    let t = Math.min((time - startTime) / duration, 1);
                    let ease = 1 - Math.pow(1 - t, 3);
                    xMin = startXMin + (targetXMin - startXMin) * ease;
                    xMax = startXMax + (targetXMax - startXMax) * ease;
                    yMin = startYMin + (targetYMin - startYMin) * ease;
                    yMax = startYMax + (targetYMax - startYMax) * ease;
                    gridDirty = true; gfxDirty = true;
                    redraw();
                    if (t < 1) requestAnimationFrame(step);
                }
                if (animFrameId) cancelAnimationFrame(animFrameId);
                animFrameId = requestAnimationFrame(step);
            }

            function zoom(factor, animated = true) {
                let cx = (xMin + xMax) / 2, cy = (yMin + yMax) / 2;
                let newW = Math.min(Math.max((xMax - xMin) * factor, 0.01), 500);
                let newH = Math.min(Math.max((yMax - yMin) * factor, 0.01), 500);
                let range = Math.max(newW, newH);
                newW = newH = range; // 强制 1:1 比例
                if (animated) animateViewChange(cx - newW / 2, cx + newW / 2, cy - newH / 2, cy + newH / 2);
                else { xMin = cx - newW / 2; xMax = cx + newW / 2; yMin = cy - newH / 2; yMax = cy + newH / 2; gridDirty = true; gfxDirty = true; redraw(); }
            }

            function fitToAllGraphics(animated = true) {
                if (graphics.length === 0) {
                    if (animated) animateViewChange(DEFAULT.xMin, DEFAULT.xMax, DEFAULT.yMin, DEFAULT.yMax);
                    else { xMin = DEFAULT.xMin; xMax = DEFAULT.xMax; yMin = DEFAULT.yMin; yMax = DEFAULT.yMax; gridDirty = true; gfxDirty = true; redraw(); }
                    return;
                }
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                for (let g of graphics) {
                    if (g.type === "circle") { let { cx, cy, r } = g.params; minX = Math.min(minX, cx - r); maxX = Math.max(maxX, cx + r); minY = Math.min(minY, cy - r); maxY = Math.max(maxY, cy + r); }
                    else if (g.type === "ellipse") { minX = Math.min(minX, g.cx - g.rx); maxX = Math.max(maxX, g.cx + g.rx); minY = Math.min(minY, g.cy - g.ry); maxY = Math.max(maxY, g.cy + g.ry); }
                    else if (g.type === "rectangle") { minX = Math.min(minX, g.x); maxX = Math.max(maxX, g.x + g.w); minY = Math.min(minY, g.y); maxY = Math.max(maxY, g.y + g.h); }
                    else if (g.type === "points") { for (let p of g.points) { minX = Math.min(minX, p[0]); maxX = Math.max(maxX, p[0]); minY = Math.min(minY, p[1]); maxY = Math.max(maxY, p[1]); } }
                    else if (g.type === "segment" || g.type === "polygon") { for (let p of g.points) { minX = Math.min(minX, p[0]); maxX = Math.max(maxX, p[0]); minY = Math.min(minY, p[1]); maxY = Math.max(maxY, p[1]); } }
                    else if (g.type === "text") { minX = Math.min(minX, g.x); maxX = Math.max(maxX, g.x); minY = Math.min(minY, g.y); maxY = Math.max(maxY, g.y); }
                    else if (g.type === "angleArc") { minX = Math.min(minX, g.cx - g.radius); maxX = Math.max(maxX, g.cx + g.radius); minY = Math.min(minY, g.cy - g.radius); maxY = Math.max(maxY, g.cy + g.radius); }
                    else if (g.type === "integralArea") { minX = Math.min(minX, g.intA); maxX = Math.max(maxX, g.intB); }
                    else if (g.type === "implicit" || g.type === "inequality") {
                        // Sample a grid to find bounding box
                        for (let sx = -10; sx <= 10; sx += 0.5) {
                            for (let sy = -10; sy <= 10; sy += 0.5) {
                                let val = evaluateExpr(g.expr, { x: sx, y: sy });
                                if (isFinite(val)) {
                                    if (g.type === "implicit" && Math.abs(val) < 2) {
                                        minX = Math.min(minX, sx); maxX = Math.max(maxX, sx);
                                        minY = Math.min(minY, sy); maxY = Math.max(maxY, sy);
                                    } else if (g.type === "inequality") {
                                        let inRegion = false;
                                        switch (g.operator) {
                                            case '>': inRegion = val > 0; break;
                                            case '<': inRegion = val < 0; break;
                                            case '>=': inRegion = val >= 0; break;
                                            case '<=': inRegion = val <= 0; break;
                                        }
                                        if (inRegion) { minX = Math.min(minX, sx); maxX = Math.max(maxX, sx); minY = Math.min(minY, sy); maxY = Math.max(maxY, sy); }
                                    }
                                }
                            }
                        }
                    }
                    else if (g.type === "piecewise") {
                        for (let x = -20; x <= 20; x += 0.2) {
                            for (let piece of g.pieces) {
                                try {
                                    if (piece.condFn(x, 0)) {
                                        let y = piece.getY(x);
                                        if (isFinite(y) && !isNaN(y)) { minX = Math.min(minX, x); maxX = Math.max(maxX, x); minY = Math.min(minY, y); maxY = Math.max(maxY, y); }
                                        break;
                                    }
                                } catch(e) {}
                            }
                        }
                    }
                    else if (g.getY) { for (let x = -20; x <= 20; x += 0.2) { let y = g.getY(x); if (isFinite(y) && !isNaN(y)) { minX = Math.min(minX, x); maxX = Math.max(maxX, x); minY = Math.min(minY, y); maxY = Math.max(maxY, y); } } }
                    else if (g.isVertical) { minX = Math.min(minX, g.params.x); maxX = Math.max(maxX, g.params.x); }
                }
                if (!isFinite(minX) || !isFinite(maxX) || !isFinite(minY) || !isFinite(maxY)) {
                    if (animated) animateViewChange(DEFAULT.xMin, DEFAULT.xMax, DEFAULT.yMin, DEFAULT.yMax);
                    else { xMin = DEFAULT.xMin; xMax = DEFAULT.xMax; yMin = DEFAULT.yMin; yMax = DEFAULT.yMax; gridDirty = true; gfxDirty = true; redraw(); }
                    return;
                }
                // Maintain 1:1 aspect ratio
                let rangeX = maxX - minX, rangeY = maxY - minY;
                let range = Math.max(rangeX, rangeY) * 1.15 || 1;
                let centerX = (minX + maxX) / 2;
                let centerY = (minY + maxY) / 2;
                let half = range / 2;
                animateViewChange(centerX - half, centerX + half, centerY - half, centerY + half);
            }

            function resetView(animated = true) {
                if (animated) animateViewChange(DEFAULT.xMin, DEFAULT.xMax, DEFAULT.yMin, DEFAULT.yMax);
                else { xMin = DEFAULT.xMin; xMax = DEFAULT.xMax; yMin = DEFAULT.yMin; yMax = DEFAULT.yMax; gridDirty = true; gfxDirty = true; redraw(); }
            }

            // ========= Save PNG =========
            function saveCanvasAsPNG() {
                const saveBtn = document.getElementById('saveBtn');
                const prevHover = currentHoverGraphic;
                currentHoverGraphic = null;
                const savedTrails = [];
                for (let g of graphics) {
                    if (g.type === 'paramPoint' && g.trail && g._trail) {
                        savedTrails.push({ g, trail: [...g._trail] });
                        g._trail = [];
                    }
                }
                redraw();
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                const filename = `hatscope_${timestamp}.png`;
                const restoreTrails = () => {
                    for (let st of savedTrails) st.g._trail = st.trail;
                    currentHoverGraphic = prevHover;
                    redraw();
                };
                if (canvas.toBlob) {
                    canvas.toBlob((blob) => {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = filename;
                        document.body.appendChild(a); a.click(); document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        flashSaveButton(saveBtn);
                        restoreTrails();
                    }, 'image/png');
                } else {
                    const dataURL = canvas.toDataURL('image/png');
                    const a = document.createElement('a');
                    a.href = dataURL; a.download = filename;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    flashSaveButton(saveBtn);
                    restoreTrails();
                }
            }

            function flashSaveButton(btn) {
                btn.classList.add('save-flash');
                showToast('图片已保存', 'success');
                setTimeout(() => btn.classList.remove('save-flash'), 1500);
            }

            // ========= System Prompt =========
            const SYSTEM_PROMPT = `你是一个数学绘图助手，类似GeoGebra。坐标系范围 x∈[-6,6], y∈[-6,6]。
你必须只返回纯JSON对象或JSON数组，格式如下：
{"action":"add","functions":[{"type":"sin","params":{"A":1,"B":1,"C":0,"D":0},"color":"#6366f1","lineWidth":2.5}]}

=== 支持的图形类型及完整示例 ===

【函数曲线类】
- sin (正弦): {"type":"sin","params":{"A":1,"B":1,"C":0,"D":0},"color":"#6366f1","lineWidth":2.5}
  y = A*sin(B*x+C)+D
- cos (余弦): {"type":"cos","params":{"A":1,"B":1,"C":0,"D":0},"color":"#10b981","lineWidth":2.5}
  y = A*cos(B*x+C)+D
- line (一次函数): {"type":"line","params":{"k":0.5,"b":1},"color":"#6366f1","lineWidth":2.5}
  y = k*x+b。垂直线: {"type":"line","params":{"x":2},"color":"gray","strokeDash":[5,5]}
- quadratic (二次函数): {"type":"quadratic","params":{"a":1,"b":0,"c":0},"color":"#f59e0b","lineWidth":2.5}
  y = a*x²+b*x+c
- inverse (反比例): {"type":"inverse","params":{"k":1},"color":"#8b5cf6","lineWidth":2.5}
  y = k/x
- exp (指数): {"type":"exp","params":{"a":1,"b":1},"color":"#ef4444","lineWidth":2.5}
  y = a*e^(b*x)
- log (对数): {"type":"log","params":{"a":1},"color":"#06b6d4","lineWidth":2.5}
  y = a*ln(x)
- abs (绝对值): {"type":"abs","params":{"a":1,"b":0,"c":0},"color":"#14b8a6","lineWidth":2.5}
  y = a*|x-b|+c

【几何图形类】
- circle (圆): {"type":"circle","params":{"cx":0,"cy":0,"r":3},"color":"#06b6d4","lineWidth":2.5,"fill":false}
  fill:true时填充，fillColor可选，如"rgba(6,182,212,0.15)"
- ellipse (椭圆): {"type":"ellipse","cx":0,"cy":0,"rx":4,"ry":2,"color":"#a855f7","lineWidth":2.5,"fill":false}
- rectangle (矩形): {"type":"rectangle","x":-2,"y":1,"w":4,"h":2,"color":"#a855f7","lineWidth":2.5,"fill":false}
- polygon (多边形): {"type":"polygon","points":[[0,0],[2,1],[1,3],[-1,2]],"color":"#14b8a6","lineWidth":2.5,"fill":false}
- segment (线段): {"type":"segment","points":[[-1,0],[2,3]],"color":"#f59e0b","lineWidth":2.5}
- ray (射线): {"type":"ray","points":[[0,0],[2,3]],"color":"#ef4444","lineWidth":2.5}
- points (点集): {"type":"points","points":[[1,2],[2,3],[3,1]],"color":"#10b981","size":8}

【高级图形类】
- implicit (隐函数): {"type":"implicit","expr":"x**2+y**2-1","color":"#06b6d4","lineWidth":2.5}
  expr是关于x和y的表达式，等于0时绘制曲线。使用**表示幂运算。示例：x**2-y**2-1(双曲线), sin(x)*cos(y)-0.5
- inequality (不等式区域): {"type":"inequality","expr":"y-(x**2)","operator":">","color":"#8b5cf6","fillColor":"rgba(139,92,246,0.12)"}
  operator是比较运算符(>,<,>=,<=)，expr>0定义着色区域。示例：y-(x**2)配合">"表示y>x²的区域
- piecewise (分段函数): {"type":"piecewise","pieces":[{"condition":"x>0","expr":"x**2"},{"condition":"x<=0","expr":"-x"}],"color":"#f59e0b","lineWidth":2.5}
  condition是关于x的条件表达式(>0为真)，expr是y关于x的表达式

【动态图形类】
- paramPoint (动点): {"type":"paramPoint","xExpr":"t","yExpr":"t*t","color":"#ef4444","size":10,"label":"P","trail":true}
  xExpr和yExpr是参数表达式，使用滑动条变量名。trail为true时显示运动轨迹。
  每个动点自动创建独立滑动条(t, t1, t2...)，可独立控制速度。
  线段上动点示例: xExpr="x1+t*(x2-x1)", yExpr="y1+t*(y2-y1)", t∈[0,1]
  圆上动点示例: xExpr="r*cos(t)+cx", yExpr="r*sin(t)+cy", t∈[0,6.2832]
- paramCurve (参数曲线): {"type":"paramCurve","xExpr":"3*cos(t)","yExpr":"2*sin(t)","color":"#06b6d4","lineWidth":2,"tMin":0,"tMax":6.2832}
- paramConn (点间连线): {"type":"paramConn","xExpr1":"-3+6*t","yExpr1":"-1.5+3.5*t","xExpr2":"0","yExpr2":"0","color":"#f59e0b","lineWidth":2,"connType":"segment"}
  connType可以是segment(线段)、line(直线)、ray(射线)
- namedPoint (命名点): {"type":"namedPoint","x":1,"y":2,"label":"A","color":"#10b981"}
  创建带标签的命名点，可被其他图形引用和绑定
- integralArea (定积分区域): {"type":"integralArea","graphicId":图形ID,"intA":-1,"intB":2,"color":"#6366f1"}
  在指定图形上绘制[a,b]区间的定积分区域
- text (文本标注): {"type":"text","text":"Hello","x":1,"y":2,"color":"#e0e0f0","fontSize":16}
- angleArc (角度弧): {"type":"angleArc","cx":0,"cy":0,"startAngle":0,"endAngle":1.57,"radius":0.5,"color":"#f59e0b","lineWidth":2}

=== 点线绑定系统 ===
- 所有构造工具（线段、直线、射线、圆、矩形、三角形、抛物线）自动吸附到已有的命名点，并自动绑定
- 移动一个点会更新所有依赖它的图形
- parentIds示例: {"type":"segment","points":[[-1,0],[2,3]],"color":"#f59e0b","parentIds":["点A的id","点B的id"]}
- 当用户说"线段AB"时，先创建命名点A和B，再用parentIds绑定创建线段

=== 操作指令 ===
- 添加图形: {"action":"add","functions":[...]}
- 删除图形: {"action":"delete","targets":[图形ID]}
- 清空画布: {"action":"delete_all"}
- 修改图形: 先delete再add，确保顺序正确
- 一次可以返回多个操作: [{"action":"delete","targets":[123]},{"action":"add","functions":[...]}]

=== 重要规则 ===
- 用户消息末尾会附带当前画布上的图形列表（含ID、类型、描述、颜色）和命名点列表，请仔细阅读以确定要删除哪个图形或引用哪个点
- 如果用户说"将三角形改为不填充"，你需要：1)找到三角形图形的id 2)发出delete删除它 3)发出add创建一个相同顶点但不填充的新三角形
- 动点问题：用户说"线段AB上动点"时，应创建线段AB和paramPoint(位置用t插值A、B坐标)，告知用户需添加滑动条t(0到1)
- 同一图形上可以创建多个动点，每个动点使用独立滑动条(t, t1, t2...)，可独立控制速度
- 可选参数："strokeDash":[5,5]表示虚线，"fill":true, "fillColor":"rgba(99,102,241,0.3)"表示填充
- 表达式中使用**表示幂运算，sin/cos/tan/ln/log/exp/abs/sqrt等数学函数可直接使用
- 表达式中可使用滑动条变量名(如t, t1, a, b等)

请严格返回JSON，不要额外解释。`;

            function extractJSON(text) {
                let cleaned = text.replace(/```json\s*|```\s*/gi, '').trim();
                let match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
                if (match) { try { return JSON.parse(match[0]); } catch (e) { return null; } }
                return null;
            }

            async function fetchAI(messages, onDelta) {
                const bodyObj = {
                    model: currentModel,
                    messages: messages,
                    stream: true,
                    temperature: 0.2,
                };
                if (deepThinkEnabled) bodyObj.thinking = { type: 'enabled' };
                else bodyObj.thinking = { type: 'disabled' };

                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify(bodyObj),
                });
                if (!response.ok) throw new Error("API请求失败: " + response.status);
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "", fullReasoning = "", fullContent = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            const data = line.slice(6);
                            if (data === "[DONE]") continue;
                            try {
                                const json = JSON.parse(data);
                                const delta = json.choices[0].delta;
                                if (delta.reasoning_content) fullReasoning += delta.reasoning_content;
                                if (delta.content) fullContent += delta.content;
                                if (onDelta) onDelta(fullReasoning, fullContent);
                            } catch (e) {}
                        }
                    }
                }
                return { fullContent, reasoning: fullReasoning };
            }

            let conversationHistory = [{ role: "system", content: SYSTEM_PROMPT }];
            let lastAIMessage = '';
            let aiProcessing = false;

            async function sendToAI(userMessage, isRetry = false) {
                if (!API_KEY) { setStatus("密钥未加载", "error"); return; }
                if (aiProcessing) return;
                aiProcessing = true;
                const sendBtn = document.getElementById("sendBtn");
                const userInput = document.getElementById("userInput");
                if (sendBtn) sendBtn.disabled = true;
                if (userInput) userInput.disabled = true;
                if (!isRetry) lastAIMessage = userMessage;
                const thinkingDiv = document.getElementById("thinkingBox");
                setStatus(deepThinkEnabled ? "深度思考中..." : "思考中...", "thinking");
                thinkingDiv.innerHTML = "";
                thinkingDiv.classList.add("visible");

                const graphicsContext = buildGraphicsContext();
                const augmentedMessage = userMessage + "\n\n" + graphicsContext;
                let messages = [...conversationHistory, { role: "user", content: augmentedMessage }];

                try {
                    let finalContent = "", finalReasoning = "";
                    const result = await fetchAI(messages, (reasoning, content) => {
                        finalReasoning = reasoning; finalContent = content;
                        updateThinkingBox(thinkingDiv, reasoning, content);
                    });
                    finalContent = result.fullContent;
                    finalReasoning = result.reasoning;

                    let parsed = extractJSON(finalContent);
                    if (!parsed && !isRetry) {
                        setStatus("格式修正中...", "thinking");
                        const retryMessages = [
                            { role: "system", content: SYSTEM_PROMPT },
                            { role: "assistant", content: finalContent },
                            { role: "user", content: "请将上述内容转换为纯JSON格式。" },
                        ];
                        return retryWithMessages(retryMessages);
                    }
                    if (!parsed) throw new Error("解析失败，无法提取JSON");

                    let operations = Array.isArray(parsed) ? parsed : [parsed];
                    processOperations(operations);
                    setStatus("完成", "idle");
                    showToast('绘图完成', 'success');

                    conversationHistory.push({ role: "user", content: augmentedMessage }, { role: "assistant", content: finalContent });
                    if (conversationHistory.length > 22) conversationHistory.splice(1, 2);
                } catch (err) {
                    setStatus("请求失败", "error");
                    thinkingDiv.innerHTML = `<span style="color:var(--danger);">${err.message}</span><button onclick="document.getElementById('thinkingBox')._retry()" style="margin-top:8px;padding:6px 16px;border:none;border-radius:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;font-size:0.75rem;font-weight:600;cursor:pointer;font-family:inherit;">重试</button>`;
                    thinkingDiv._retry = () => { sendToAI(lastAIMessage, true); };
                    showToast('请求失败: ' + err.message, 'error');
                } finally {
                    aiProcessing = false;
                    if (sendBtn) sendBtn.disabled = false;
                    if (userInput) userInput.disabled = false;
                }
            }

            function updateThinkingBox(thinkingDiv, reasoning, content) {
                let html = '';
                if (reasoning && reasoning.trim()) {
                    html += '<div class="reasoning-section"><div class="section-label">深度思考过程</div>' + escapeHTML(reasoning) + '</div>';
                }
                if (content && content.trim()) {
                    html += '<div class="content-section"><div class="section-label">回复</div>' + escapeHTML(content) + '</div>';
                }
                if (!html && deepThinkEnabled) html = '<span style="color:var(--text-tertiary);">等待深度思考...</span>';
                else if (!html) html = '<span style="color:var(--text-tertiary);">等待回复...</span>';
                thinkingDiv.innerHTML = html;
                thinkingDiv.scrollTop = thinkingDiv.scrollHeight;
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function processOperations(operations) {
                pushUndo();
                let toDeleteIds = [];
                let shouldDeleteAll = false;
                let toAdd = [];

                for (let cmd of operations) {
                    if (cmd.action === "delete_all") shouldDeleteAll = true;
                    else if (cmd.action === "delete" && cmd.targets && Array.isArray(cmd.targets)) toDeleteIds.push(...cmd.targets);
                    else if (cmd.action === "add" && cmd.functions) toAdd.push(...cmd.functions);
                }

                if (shouldDeleteAll) {
                    stopAllAnimations();
                    sliders = [];
                    graphics = [];
                    namedPoints = [];
                    _cachedIntersections = null;
                    selectedGraphic = null;
                    selectedNamedPoint = null;
                    closeGraphicEditor();
                    renderSliders();
                    renderPoints();
                } else {
                    for (let id of toDeleteIds) {
                        let idx = graphics.findIndex(g => g.id === id);
                        if (idx !== -1) {
                            let g = graphics[idx];
                            if (g.parentIds) {
                                for (let pid of g.parentIds) {
                                    let np = namedPoints.find(p => p.id === pid);
                                    if (np && np.childIds) np.childIds = np.childIds.filter(cid => cid !== id);
                                }
                            }
                            graphics.splice(idx, 1);
                        }
                    }
                }

                for (let spec of toAdd) addGraphic(spec, false, true);
                gfxDirty = true;
                redraw();
            }

            async function retryWithMessages(messages) {
                const thinkingDiv = document.getElementById("thinkingBox");
                try {
                    let finalContent = "", finalReasoning = "";
                    const result = await fetchAI(messages, (reasoning, content) => {
                        finalReasoning = reasoning; finalContent = content;
                        updateThinkingBox(thinkingDiv, reasoning, content);
                    });
                    finalContent = result.fullContent;
                    let parsed = extractJSON(finalContent);
                    if (!parsed) throw new Error("修正后仍无法解析JSON");
                    let operations = Array.isArray(parsed) ? parsed : [parsed];
                    processOperations(operations);
                    setStatus("完成", "idle");
                } catch (err) {
                    setStatus("修正失败", "error");
                    thinkingDiv.innerHTML = `<span style="color:var(--danger);">${err.message}</span>`;
                }
            }

            let selectedGraphic = null;
            let selectedNamedPoint = null;

            // ========= Graphic Editor Panel =========
            function closeGraphicEditor() {
                const editor = document.getElementById('graphicEditor');
                if (editor) { editor.style.display = 'none'; editor.classList.remove('visible'); }
            }

            function openNamedPointEditor(np) {
                const editor = document.getElementById('graphicEditor');
                if (!editor || !np) { closeGraphicEditor(); return; }
                editor.style.display = 'flex';
                editor.classList.add('visible');

                let html = '<div class="ge-header"><span class="ge-title">点 ' + np.label + ' 属性</span><button class="ge-close" id="geCloseBtn">&times;</button></div>';

                if (np.isDynamic) {
                    html += '<div class="ge-binding">动点</div>';
                }

                html += '<div class="ge-fields">';
                html += geRow([geTextField('标签', 'np_label', np.label)]);
                const roCoord = np.isDynamic ? ' readonly' : '';
                html += geRow([geField('x', 'np_x', np.x, roCoord), geField('y', 'np_y', np.y, roCoord)]);
                html += geRow([geColorField('颜色', 'np_color', np.color || '#10b981')]);

                if (np.isDynamic && np.exprX && np.exprY) {
                    html += geRow([geTextField('x表达式', 'np_exprX', np.exprX)]);
                    html += geRow([geTextField('y表达式', 'np_exprY', np.exprY)]);
                }

                html += '</div>';
                editor.innerHTML = html;

                document.getElementById('geCloseBtn').addEventListener('click', () => {
                    closeGraphicEditor();
                    selectedNamedPoint = null;
                    updateFunctionListUI();
                });

                editor.querySelectorAll('input[data-ge-key], select[data-ge-key]').forEach(input => {
                    input.addEventListener('input', function() {
                        applyNamedPointEditorChange(np, this.getAttribute('data-ge-key'), this.type === 'checkbox' ? this.checked : this.value);
                    });
                });
            }

            function applyNamedPointEditorChange(np, key, value) {
                pushUndo();
                if (key === 'np_label') {
                    np.label = value;
                } else if (key === 'np_x') {
                    np.x = parseFloat(value);
                    updateDependentGraphics(np);
                } else if (key === 'np_y') {
                    np.y = parseFloat(value);
                    updateDependentGraphics(np);
                } else if (key === 'np_color') {
                    np.color = value;
                }
                gfxDirty = true;
                redraw();
                updateFunctionListUI();
                autoSave();
            }

            function updateDependentGraphics(np) {
                if (!np.childIds) return;
                for (let cid of np.childIds) {
                    let g = graphics.find(gr => gr.id === cid);
                    if (!g) continue;
                    if (!g.parentIds) continue;
                    // Find all parent points and recalculate
                    let parentPts = g.parentIds.map(pid => namedPoints.find(p => p.id === pid)).filter(Boolean);
                    if (g.type === 'segment' || g.type === 'ray') {
                        if (parentPts.length >= 2) {
                            g.points = parentPts.map(p => [p.x, p.y]);
                        }
                    } else if (g.type === 'line') {
                        if (parentPts.length >= 2) {
                            const p1 = parentPts[0], p2 = parentPts[1];
                            if (Math.abs(p2.x - p1.x) < 0.0001) {
                                g.params = { x: p1.x }; g.isVertical = true;
                            } else {
                                const k = (p2.y - p1.y) / (p2.x - p1.x), b = p1.y - k * p1.x;
                                g.params = { k, b }; g.isVertical = false;
                            }
                            recreateGetY(g);
                        }
                    } else if (g.type === 'circle') {
                        if (parentPts.length >= 2) {
                            const cx = parentPts[0].x, cy = parentPts[0].y;
                            const r = Math.hypot(parentPts[1].x - cx, parentPts[1].y - cy);
                            g.params = { cx, cy, r };
                            recreateGetY(g);
                        }
                    } else if (g.type === 'quadratic') {
                        if (parentPts.length >= 3) {
                            const x1=parentPts[0].x, y1=parentPts[0].y, x2=parentPts[1].x, y2=parentPts[1].y, x3=parentPts[2].x, y3=parentPts[2].y;
                            const denom = (x1-x2)*(x1-x3)*(x2-x3);
                            if (Math.abs(denom) > 0.0001) {
                                let a = (y1*(x2-x3)+y2*(x3-x1)+y3*(x1-x2))/denom;
                                let b = (y1*(x3*x3-x2*x2)+y2*(x1*x1-x3*x3)+y3*(x2*x2-x1*x1))/denom;
                                let c = y1-a*x1*x1-b*x1;
                                g.params = { a, b, c };
                                recreateGetY(g);
                            }
                        }
                    } else if (g.type === 'rectangle') {
                        if (parentPts.length >= 2) {
                            g.x = Math.min(parentPts[0].x, parentPts[1].x);
                            g.y = Math.min(parentPts[0].y, parentPts[1].y);
                            g.w = Math.abs(parentPts[1].x - parentPts[0].x);
                            g.h = Math.abs(parentPts[1].y - parentPts[0].y);
                        }
                    } else if (g.type === 'polygon') {
                        g.points = parentPts.map(p => [p.x, p.y]);
                    }
                }
            }

            function openGraphicEditor(g) {
                const editor = document.getElementById('graphicEditor');
                if (!editor || !g) { closeGraphicEditor(); return; }
                editor.style.display = 'flex';
                editor.classList.add('visible');

                const hasParents = g.parentIds && g.parentIds.length > 0;
                const typeLabel = getGraphicShortLabel(g);
                let html = '<div class="ge-header"><span class="ge-title">' + typeLabel + ' 属性</span><button class="ge-close" id="geCloseBtn">&times;</button></div>';

                // Show binding info
                if (hasParents) {
                    let bindLabels = [];
                    for (let pid of g.parentIds) {
                        let p = namedPoints.find(np => np.id === pid);
                        if (p) bindLabels.push('点' + p.label);
                    }
                    if (bindLabels.length > 0) {
                        html += '<div class="ge-binding">绑定: ' + bindLabels.join(', ') + '</div>';
                    }
                }

                html += '<div class="ge-fields">';

                // Type-specific param fields
                const ro = hasParents ? ' readonly' : '';
                if (g.type === 'line') {
                    if (g.isVertical) {
                        html += geRow([geField('x (垂直线)', 'param_x', g.params.x, ro)]);
                    } else {
                        html += geRow([geField('倾斜度 k', 'param_k', g.params.k, ro), geField('y轴交点 b', 'param_b', g.params.b, ro)]);
                    }
                } else if (g.type === 'sin') {
                    html += geRow([geField('高度 A', 'param_A', g.params.A, ro), geField('频率 B', 'param_B', g.params.B, ro)]);
                    html += geRow([geField('左右移 C', 'param_C', g.params.C, ro), geField('上下移 D', 'param_D', g.params.D, ro)]);
                } else if (g.type === 'cos') {
                    html += geRow([geField('高度 A', 'param_A', g.params.A, ro), geField('频率 B', 'param_B', g.params.B, ro)]);
                    html += geRow([geField('左右移 C', 'param_C', g.params.C, ro), geField('上下移 D', 'param_D', g.params.D, ro)]);
                } else if (g.type === 'quadratic') {
                    html += geRow([geField('开口大小 a', 'param_a', g.params.a, ro), geField('左右位置 b', 'param_b', g.params.b, ro), geField('上下位置 c', 'param_c', g.params.c, ro)]);
                } else if (g.type === 'circle') {
                    html += geRow([geField('圆心x', 'param_cx', g.params.cx, ro), geField('圆心y', 'param_cy', g.params.cy, ro)]);
                    html += geRow([geField('半径 r', 'param_r', g.params.r, ro)]);
                } else if (g.type === 'ellipse') {
                    html += geRow([geField('中心x', 'prop_cx', g.cx, ro), geField('中心y', 'prop_cy', g.cy, ro)]);
                    html += geRow([geField('rx', 'prop_rx', g.rx, ro), geField('ry', 'prop_ry', g.ry, ro)]);
                } else if (g.type === 'rectangle') {
                    html += geRow([geField('x', 'prop_x', g.x, ro), geField('y', 'prop_y', g.y, ro)]);
                    html += geRow([geField('宽 w', 'prop_w', g.w, ro), geField('高 h', 'prop_h', g.h, ro)]);
                } else if (g.type === 'inverse') {
                    html += geRow([geField('k', 'param_k', g.params.k, ro)]);
                } else if (g.type === 'abs') {
                    html += geRow([geField('a', 'param_a', g.params.a, ro), geField('b', 'param_b', g.params.b, ro), geField('c', 'param_c', g.params.c, ro)]);
                } else if (g.type === 'exp') {
                    html += geRow([geField('a', 'param_a', g.params.a, ro), geField('b', 'param_b', g.params.b, ro)]);
                } else if (g.type === 'log') {
                    html += geRow([geField('a', 'param_a', g.params.a, ro)]);
                } else if (g.type === 'segment' || g.type === 'ray') {
                    if (g.points && g.points.length >= 2) {
                        html += geRow([geField('x1', 'pt_0_x', g.points[0][0], ro), geField('y1', 'pt_0_y', g.points[0][1], ro)]);
                        html += geRow([geField('x2', 'pt_1_x', g.points[1][0], ro), geField('y2', 'pt_1_y', g.points[1][1], ro)]);
                    }
                } else if (g.type === 'points') {
                    if (g.points) {
                        for (let i = 0; i < g.points.length; i++) {
                            html += geRow([geField('x' + (i+1), 'pt_' + i + '_x', g.points[i][0], ''), geField('y' + (i+1), 'pt_' + i + '_y', g.points[i][1], '')]);
                        }
                    }
                } else if (g.type === 'polygon') {
                    if (g.points) {
                        for (let i = 0; i < g.points.length; i++) {
                            html += geRow([geField('x' + (i+1), 'pt_' + i + '_x', g.points[i][0], ''), geField('y' + (i+1), 'pt_' + i + '_y', g.points[i][1], '')]);
                        }
                    }
                } else if (g.type === 'text') {
                    html += geRow([geTextField('文字', 'prop_text', g.text || '')]);
                    html += geRow([geField('x', 'prop_x', g.x, ''), geField('y', 'prop_y', g.y, ''), geField('字号', 'prop_fontSize', g.fontSize || 16, '')]);
                } else if (g.type === 'implicit') {
                    html += geRow([geTextField('表达式', 'prop_expr', g.expr || '')]);
                } else if (g.type === 'inequality') {
                    html += geRow([geTextField('表达式', 'prop_expr', g.expr || '')]);
                    html += geRow([geTextField('运算符', 'prop_operator', g.operator || '')]);
                } else if (g.type === 'piecewise') {
                    if (g.pieces) {
                        for (let i = 0; i < g.pieces.length; i++) {
                            html += geRow([geTextField('条件' + (i+1), 'piece_cond_' + i, g.pieces[i].condition || ''), geTextField('表达式' + (i+1), 'piece_expr_' + i, g.pieces[i].expr || '')]);
                        }
                    }
                }

                // Common fields: color and lineWidth
                const fillable = FILLABLE_TYPES.includes(g.type);
                html += geRow([geColorField('颜色', 'prop_color', g.color), geField('线宽', 'prop_lineWidth', g.lineWidth || 2.5, '')]);
                if (fillable) {
                    html += geRow([geCheckField('填充', 'prop_fill', g.fill || false)]);
                }

                html += '</div>';
                editor.innerHTML = html;

                // Bind close button
                document.getElementById('geCloseBtn').addEventListener('click', () => {
                    closeGraphicEditor();
                    selectedGraphic = null;
                    updateFunctionListUI();
                });

                // Bind input events for live preview
                editor.querySelectorAll('input[data-ge-key], select[data-ge-key]').forEach(input => {
                    input.addEventListener('input', function() {
                        applyGraphicEditorChange(g, this.getAttribute('data-ge-key'), this.type === 'checkbox' ? this.checked : this.value);
                    });
                });
            }

            function geField(label, key, value, extra) {
                const step = 'step="any"';
                return '<div class="ge-field"><label>' + label + '</label><input type="number" ' + step + ' data-ge-key="' + key + '" value="' + (value !== undefined ? value : '') + '"' + (extra || '') + '></div>';
            }

            function geColorField(label, key, value) {
                return '<div class="ge-field"><label>' + label + '</label><input type="color" data-ge-key="' + key + '" value="' + (value || '#6366f1') + '"></div>';
            }

            function geCheckField(label, key, checked) {
                return '<div class="ge-field"><label>' + label + '</label><input type="checkbox" data-ge-key="' + key + '"' + (checked ? ' checked' : '') + ' style="width:auto;"></div>';
            }

            function geTextField(label, key, value) {
                return '<div class="ge-field"><label>' + label + '</label><input type="text" data-ge-key="' + key + '" value="' + (value !== undefined ? value.replace(/"/g, '&quot;') : '') + '"></div>';
            }

            function geRow(fields) {
                return '<div class="ge-row">' + fields.join('') + '</div>';
            }

            function applyGraphicEditorChange(g, key, value) {
                pushUndo();
                if (key.startsWith('param_')) {
                    let pKey = key.substring(6); // remove 'param_'
                    if (g.params) {
                        g.params[pKey] = parseFloat(value);
                    }
                    recreateGetY(g);
                } else if (key.startsWith('prop_')) {
                    let pKey = key.substring(5); // remove 'prop_'
                    if (pKey === 'color') { g.color = value; }
                    else if (pKey === 'lineWidth') { g.lineWidth = parseFloat(value); }
                    else if (pKey === 'fill') { g.fill = value; }
                    else if (pKey === 'text') { g.text = value; }
                    else if (pKey === 'fontSize') { g.fontSize = parseFloat(value); }
                    else if (pKey === 'expr') {
                        g.expr = normalizeExpression(value);
                        // Recreate for implicit/inequality
                        if (g.type === 'implicit') { /* expr is used directly in rendering */ }
                        else if (g.type === 'inequality') { g.expr = normalizeExpression(value); }
                    }
                    else if (pKey === 'operator') { g.operator = value; }
                    else if (pKey === 'x' || pKey === 'y' || pKey === 'w' || pKey === 'h') { g[pKey] = parseFloat(value); }
                    else if (pKey === 'cx' || pKey === 'cy' || pKey === 'rx' || pKey === 'ry') { g[pKey] = parseFloat(value); }
                } else if (key.startsWith('pt_')) {
                    let parts = key.split('_');
                    let idx = parseInt(parts[1]);
                    let axis = parts[2]; // 'x' or 'y'
                    if (g.points && g.points[idx]) {
                        g.points[idx][axis === 'x' ? 0 : 1] = parseFloat(value);
                    }
                } else if (key.startsWith('piece_')) {
                    let parts = key.split('_');
                    let kind = parts[1]; // 'cond' or 'expr'
                    let idx = parseInt(parts[2]);
                    if (g.pieces && g.pieces[idx]) {
                        if (kind === 'cond') {
                            g.pieces[idx].condition = normalizeExpression(value);
                            g.pieces[idx].condFn = (x, y) => { try { return evaluateExpr(g.pieces[idx].condition, { x, y }) > 0; } catch(e) { return false; } };
                        } else if (kind === 'expr') {
                            g.pieces[idx].expr = normalizeExpression(value);
                            g.pieces[idx].getY = (x) => evaluateExpr(g.pieces[idx].expr, { x });
                        }
                    }
                }
                _cachedIntersections = null;
                gfxDirty = true;
                redraw();
            }

            function recreateGetY(g) {
                if (g.type === 'sin') { let {A=1,B=1,C=0,D=0} = g.params; g.getY = (x) => A*Math.sin(B*x+C)+D; }
                else if (g.type === 'cos') { let {A=1,B=1,C=0,D=0} = g.params; g.getY = (x) => A*Math.cos(B*x+C)+D; }
                else if (g.type === 'quadratic') { let {a=1,b=0,c=0} = g.params; g.getY = (x) => a*x*x+b*x+c; }
                else if (g.type === 'line' && !g.isVertical) { let {k=1,b=0} = g.params; g.getY = (x) => k*x+b; }
                else if (g.type === 'inverse') { let {k=1} = g.params; g.getY = (x) => (x === 0 ? undefined : k/x); }
                else if (g.type === 'exp') { let {a=1,b=1} = g.params; g.getY = (x) => a*Math.exp(b*x); }
                else if (g.type === 'log') { let {a=1} = g.params; g.getY = (x) => (x > 0 ? a*Math.log(x) : undefined); }
                else if (g.type === 'abs') { let {a=1,b=0,c=0} = g.params; g.getY = (x) => a*Math.abs(x-b)+c; }
            }

            // ========= Point-Line Binding =========
            function findNearestNamedPoint(wx, wy, threshold) {
                threshold = threshold || 25;
                let { px: mpx, py: mpy } = worldToPixel(wx, wy);
                let best = null, bestDist = Infinity;
                for (let p of namedPoints) {
                    let { px, py } = worldToPixel(p.x, p.y);
                    let d = Math.hypot(px - mpx, py - mpy);
                    if (d < threshold && d < bestDist) { best = p; bestDist = d; }
                }
                return best;
            }

            function registerBinding(graphic, points) {
                if (!graphic) return;
                for (let np of points) {
                    if (!np) continue;
                    np.childIds = np.childIds || [];
                    if (!np.childIds.includes(graphic.id)) np.childIds.push(graphic.id);
                }
            }

            function getOrCreatePoint(wx, wy) {
                let existing = findNearestNamedPoint(wx, wy);
                if (existing) return existing;
                let label = getNextPointLabel();
                let sx = snapToInteger(wx), sy = snapToInteger(wy);
                let p = { id: Date.now() + Math.random(), label, x: sx, y: sy, childIds: [], color: '#10b981' };
                namedPoints.push(p);
                renderPoints();
                return p;
            }

            function updateDependentGraphics(point) {
                if (!point.childIds) return;
                for (let cid of point.childIds) {
                    let g = graphics.find(gx => gx.id === cid);
                    if (!g) continue;
                    recalcGraphicFromParents(g);
                }
            }

            function recalcGraphicFromParents(g) {
                if (!g.parentIds || g.parentIds.length === 0) return;
                let parents = g.parentIds.map(pid => {
                    let p = namedPoints.find(np => np.id === pid);
                    return p;
                }).filter(p => p);

                if (g.type === 'line' && parents.length === 2) {
                    let [p1, p2] = parents;
                    if (Math.abs(p1.x - p2.x) < 1e-9) {
                        g.isVertical = true;
                        g.params = { x: (p1.x + p2.x) / 2 };
                        g.getY = null;
                    } else {
                        let k = (p2.y - p1.y) / (p2.x - p1.x);
                        let b = p1.y - k * p1.x;
                        g.params = { k, b };
                        g.getY = (x) => k * x + b;
                        g.isVertical = false;
                    }
                } else if (g.type === 'quadratic' && parents.length === 3) {
                    let [p1, p2, p3] = parents;
                    let x1=p1.x, y1=p1.y, x2=p2.x, y2=p2.y, x3=p3.x, y3=p3.y;
                    let denom = (x1-x2)*(x1-x3)*(x2-x3);
                    if (Math.abs(denom) > 1e-9) {
                        let a = (y1*(x2-x3)+y2*(x3-x1)+y3*(x1-x2))/denom;
                        let b = (y1*(x3*x3-x2*x2)+y2*(x1*x1-x3*x3)+y3*(x2*x2-x1*x1))/denom;
                        let c = y1-a*x1*x1-b*x1;
                        g.params = {a, b, c};
                        g.getY = (x) => a*x*x+b*x+c;
                    }
                } else if (g.type === 'circle' && parents.length === 2) {
                    let [center, edge] = parents;
                    let r = Math.hypot(edge.x - center.x, edge.y - center.y);
                    g.params = { cx: center.x, cy: center.y, r };
                } else if (g.type === 'segment' && parents.length === 2) {
                    let [p1, p2] = parents;
                    g.points = [[p1.x, p1.y], [p2.x, p2.y]];
                } else if (g.type === 'ray' && parents.length === 2) {
                    let [p1, p2] = parents;
                    g.points = [[p1.x, p1.y], [p2.x, p2.y]];
                }
                // Refresh editor if this graphic is selected
                if (selectedGraphic === g) {
                    openGraphicEditor(g);
                }
            }


            function updateFunctionListUI() {
                let container = document.getElementById("functionList");
                if (!container) return;
                if (namedPoints.length === 0 && graphics.length === 0) {
                    container.innerHTML = '<span class="func-empty">暂无对象</span>';
                    selectedGraphic = null;
                    selectedNamedPoint = null;
                    closeGraphicEditor();
                    return;
                }
                let html = '';
                // Show named points first
                for (let np of namedPoints) {
                    let sel = selectedNamedPoint === np ? ' selected' : '';
                    let hiddenStyle = np.hidden ? 'opacity:0.4;text-decoration:line-through;' : '';
                    let coordStr = '(' + np.x.toFixed(1) + ', ' + np.y.toFixed(1) + ')';
                    let dynLabel = np.isDynamic ? ' <span style="color:#f59e0b;font-size:0.6rem;">动点</span>' : '';
                    html += '<div class="func-item' + sel + '" data-npid="' + np.id + '" style="display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;cursor:pointer;font-size:0.68rem;transition:all var(--transition);' + hiddenStyle + '"><span class="color-dot" style="background:' + (np.color || '#10b981') + ';width:8px;height:8px;border-radius:50%;flex-shrink:0;"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;color:var(--text-secondary);">' + np.label + ' ' + coordStr + dynLabel + '</span><button class="func-del-btn" data-del-np="' + np.id + '" title="删除" style="background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:0.75rem;padding:0 2px;">&times;</button></div>';
                }
                // Then show graphics
                for (let g of graphics) {
                    // Skip type 'points' graphics that are just duplicates of named points
                    if (g.type === 'points') continue;
                    let label = getGraphicShortLabel(g);
                    let sel = selectedGraphic === g ? ' selected' : '';
                    let hiddenStyle = g.hidden ? 'opacity:0.4;text-decoration:line-through;' : '';
                    html += '<div class="func-item' + sel + '" data-gid="' + g.id + '" style="display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;cursor:pointer;font-size:0.68rem;transition:all var(--transition);' + hiddenStyle + '"><span class="color-dot" style="background:' + g.color + ';width:8px;height:8px;border-radius:50%;flex-shrink:0;"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;color:var(--text-secondary);">' + label + '</span><button class="func-del-btn" data-del="' + g.id + '" title="删除" style="background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:0.75rem;padding:0 2px;">&times;</button></div>';
                }
                container.innerHTML = html;
                container.querySelectorAll('.func-item').forEach(item => {
                    item.addEventListener('click', function(e) {
                        if (e.target.classList.contains('func-del-btn')) return;
                        const npid = this.getAttribute('data-npid');
                        const gid = this.getAttribute('data-gid');
                        if (npid) {
                            const nid = parseFloat(npid);
                            selectedNamedPoint = namedPoints.find(p => p.id === nid) || null;
                            selectedGraphic = null;
                        } else if (gid) {
                            const gId = parseFloat(gid);
                            selectedGraphic = graphics.find(g => g.id === gId) || null;
                            selectedNamedPoint = null;
                        }
                        updateFunctionListUI();
                    });
                });
                container.querySelectorAll('.func-del-btn[data-del-np]').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const nid = parseFloat(this.getAttribute('data-del-np'));
                        deleteNamedPointById(nid);
                    });
                });
                container.querySelectorAll('.func-del-btn[data-del]').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const gid = parseFloat(this.getAttribute('data-del'));
                        if (selectedGraphic && selectedGraphic.id === gid) { selectedGraphic = null; closeGraphicEditor(); }
                        deleteGraphicById(gid);
                    });
                });
                // Open/close editor based on selection
                if (selectedNamedPoint && namedPoints.includes(selectedNamedPoint)) {
                    openNamedPointEditor(selectedNamedPoint);
                } else if (selectedGraphic && graphics.includes(selectedGraphic)) {
                    openGraphicEditor(selectedGraphic);
                } else {
                    closeGraphicEditor();
                }
            }

            window.hatscope = { deleteGraphic: deleteGraphicById };

            // ========= Interaction =========
            function setupInteraction() {
                let isPan = false, panStartX, panStartY, startXMin, startXMax, startYMin, startYMax;
                canvas.addEventListener("mousedown", (e) => {
                    let rect = canvas.getBoundingClientRect();
                    let sx = LOGICAL_W / rect.width, sy = LOGICAL_H / rect.height;
                    let mx = (e.clientX - rect.left) * sx, my = (e.clientY - rect.top) * sy;
                    if (mx >= 0 && mx <= LOGICAL_W && my >= 0 && my <= LOGICAL_H) {
                        if (activeTool && e.button === 0) {
                            let { x, y } = pixelToWorld(mx, my);
                            if (handleCanvasClick(x, y)) return;
                        }
                        if (e.button === 0) {
                            // Check for graphic hit (drag) before starting pan
                            let { x: wx, y: wy } = pixelToWorld(mx, my);
                            if (!activeTool) {
                                let hit = hitTestGraphic(wx, wy);
                                if (hit) {
                                    dragTarget = hit;
                                    dragTarget.startX = wx;
                                    dragTarget.startY = wy;
                                    // Save start params for delta-based dragging
                                    let g = hit.graphic;
                                    if (hit.part === 'namedPoint') dragTarget.startParams = { x: g.x, y: g.y };
                                    else if (g.params) dragTarget.startParams = JSON.parse(JSON.stringify(g.params));
                                    else if (g.type === 'rectangle') dragTarget.startParams = { x: g.x, y: g.y, w: g.w, h: g.h, cx: g.x + g.w / 2, cy: g.y + g.h / 2 };
                                    else if (g.type === 'ellipse') dragTarget.startParams = { cx: g.cx, cy: g.cy, rx: g.rx, ry: g.ry };
                                    else dragTarget.startParams = {};
                                    if (hit.cornerIndex !== undefined) dragTarget.cornerIndex = hit.cornerIndex;
                                    if (hit.vertexIndex !== undefined) dragTarget.vertexIndex = hit.vertexIndex;
                                    if (hit.pointIndex !== undefined) dragTarget.pointIndex = hit.pointIndex;
                                    pushUndo();
                                    canvas.style.cursor = "grabbing";
                                    return;
                                }
                            }
                            isPan = true; panStartX = mx; panStartY = my;
                            startXMin = xMin; startXMax = xMax; startYMin = yMin; startYMax = yMax;
                            canvas.style.cursor = "grabbing";
                        }
                    }
                });
                window.addEventListener("mousemove", (e) => {
                    let rect = canvas.getBoundingClientRect();
                    let sx = LOGICAL_W / rect.width, sy = LOGICAL_H / rect.height;
                    let mx = (e.clientX - rect.left) * sx, my = (e.clientY - rect.top) * sy;
                    if (mx >= 0 && mx <= LOGICAL_W && my >= 0 && my <= LOGICAL_H) {
                        let { x, y } = pixelToWorld(mx, my);
                        document.getElementById("coordX").innerText = x.toFixed(3);
                        document.getElementById("coordY").innerText = y.toFixed(3);

                        // Handle dragging
                        if (dragTarget) {
                            updateDragTarget(x, y);
                            gfxDirty = true;
                            redraw();
                            return;
                        }

                        // Hover cursor for draggable graphics
                        if (!activeTool && !isPan) {
                            let hit = hitTestGraphic(x, y);
                            canvas.style.cursor = hit ? "grab" : "crosshair";
                            // Update hover highlight
                            let prevHover = currentHoverGraphic;
                            currentHoverGraphic = hit ? (hit.part === 'namedPoint' ? null : hit.graphic) : null;
                            if (currentHoverGraphic !== prevHover) {
                                gfxDirty = true;
                                redraw();
                            }
                        }

                        if (activeTool) {
                            previewMouse.mx = mx; previewMouse.my = my;
                            if (!previewRafId) {
                                previewRafId = requestAnimationFrame(() => { previewRafId = 0; redraw(); });
                            }
                        }
                    }
                    if (isPan) {
                        let dx = (panStartX - mx) / LOGICAL_W * (startXMax - startXMin);
                        let dy = (panStartY - my) / LOGICAL_H * (startYMax - startYMin);
                        xMin = startXMin + dx; xMax = startXMax + dx;
                        yMin = startYMin + dy; yMax = startYMax + dy;
                        gridDirty = true;
                        gfxDirty = true;
                        redraw();
                    }
                });
                window.addEventListener("mouseup", () => {
                    if (dragTarget) {
                        dragTarget = null;
                        canvas.style.cursor = "crosshair";
                        autoSave();
                        return;
                    }
                    isPan = false;
                    canvas.style.cursor = "crosshair";
                });

                canvas.addEventListener("wheel", (e) => {
                    e.preventDefault();
                    let rect = canvas.getBoundingClientRect();
                    let sx = LOGICAL_W / rect.width, sy = LOGICAL_H / rect.height;
                    let mx = (e.clientX - rect.left) * sx, my = (e.clientY - rect.top) * sy;
                    let center = pixelToWorld(mx, my);
                    let factor = e.deltaY > 0 ? 1.1 : 0.9;
                    let newW = Math.min(Math.max((xMax - xMin) * factor, 0.01), 500);
                    let newH = Math.min(Math.max((yMax - yMin) * factor, 0.01), 500);
                    let newXMin = center.x - (center.x - xMin) / (xMax - xMin) * newW;
                    let newYMin = center.y - (center.y - yMin) / (yMax - yMin) * newH;
                    animateViewChange(newXMin, newXMin + newW, newYMin, newYMin + newH);
                }, { passive: false });

                // Touch
                let touchStartDist = 0, touchStartCenter = null;
                canvas.addEventListener("touchstart", (e) => {
                    if (e.touches.length === 1) {
                        let rect = canvas.getBoundingClientRect();
                        let sx = LOGICAL_W / rect.width, sy = LOGICAL_H / rect.height;
                        panStartX = (e.touches[0].clientX - rect.left) * sx;
                        panStartY = (e.touches[0].clientY - rect.top) * sy;
                        isPan = true;
