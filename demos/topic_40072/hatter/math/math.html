                        const arcRadius = Math.min(0.8, Math.hypot(A.x - B.x, A.y - B.y) * 0.3, Math.hypot(C.x - B.x, C.y - B.y) * 0.3);
                        const arcG = createGraphicFromSpec({ type: 'angleArc', cx: B.x, cy: B.y, startAngle, endAngle, radius: arcRadius, color: '#8b5cf6', lineWidth: 2 });
                        if (arcG) { arcG.alpha = 1; graphics.push(arcG); _cachedIntersections = null; }
                        // Angle text annotation
                        // Adjust bisector if the arc crosses the -π/π boundary
                        let diff = endAngle - startAngle;
                        while (diff < -Math.PI) diff += 2 * Math.PI;
                        while (diff > Math.PI) diff -= 2 * Math.PI;
                        const bisect = startAngle + diff / 2;
                        const labelDist = arcRadius + 0.4;
                        const labelX = B.x + labelDist * Math.cos(bisect);
                        const labelY = B.y + labelDist * Math.sin(bisect);
                        const txtG = createGraphicFromSpec({ type: 'text', text: '∠ = ' + angleDeg.toFixed(1) + '°', x: labelX, y: labelY, color: '#8b5cf6', fontSize: 14 });
                        if (txtG) { txtG.alpha = 1; graphics.push(txtG); _cachedIntersections = null; }
                        gfxDirty = true;
                        redraw();
                        autoSave();
                        showToast('角度: ∠ = ' + angleDeg.toFixed(1) + '°', 'success');
                        exitToolMode();
                    }
                    return true;
                }

                // === Area Tool ===
                if (activeTool === 'area') {
                    toolPoints.push({ x: wx, y: wy });
                    if (toolStatusEl) { toolStatusEl.textContent = '🖱 点击顶点（已' + toolPoints.length + '个，双击完成） · ESC退出'; toolStatusEl.style.color = '#f59e0b'; }
                    redraw();
                    return true;
                }

                // === Unified point snapping for ALL construction tools ===
                const constructTools = ['segment', 'ray', 'circle', 'rect', 'tri', 'line', 'quad'];
                if (constructTools.includes(activeTool)) {
                    if (toolPoints.length === 0) pushUndo();
                    let np = getOrCreatePoint(wx, wy);
                    toolPoints.push({ x: np.x, y: np.y, _np: np });
                    const needed = { segment: 2, ray: 2, circle: 2, rect: 2, tri: 3, line: 2, quad: 3 };
                    const need = needed[activeTool] || 2;
                    if (toolPoints.length >= need) {
                        if (activeTool === 'segment') doSegment();
                        else if (activeTool === 'ray') doRay();
                        else if (activeTool === 'circle') doCircle();
                        else if (activeTool === 'rect') doRect();
                        else if (activeTool === 'tri') doTriangle();
                        else if (activeTool === 'line') doLine();
                        else if (activeTool === 'quad') doQuadratic();
                        gfxDirty = true;
                        redraw();
                        autoSave();
                        exitToolMode();
                    } else {
                        const hints = {
                            segment: ['🖱 点击/创建第一个点', '🖱 点击/创建第二个点'],
                            ray: ['🖱 点击/创建起点', '🖱 点击/创建方向点'],
                            circle: ['🖱 点击/创建圆心点', '🖱 点击/创建圆上一点'],
                            rect: ['🖱 点击/创建第一个角点', '🖱 点击/创建对角点'],
                            tri: ['🖱 点击/创建第一个顶点', '🖱 点击/创建第二个顶点', '🖱 点击/创建第三个顶点'],
                            line: ['🖱 点击/创建第一个点', '🖱 点击/创建第二个点'],
                            quad: ['🖱 点击/创建第一个点', '🖱 点击/创建第二个点', '🖱 点击/创建第三个点']
                        };
                        const hintList = hints[activeTool] || ['🖱 点击下一个点'];
                        if (toolStatusEl) { toolStatusEl.textContent = hintList[Math.min(toolPoints.length, hintList.length - 1)]; toolStatusEl.style.color = '#f59e0b'; }
                    }
                    return true;
                }

                // === Point tool (special handling) ===
                if (activeTool === 'point') {
                    pushUndo();
                    let sx, sy;
                    let ix = computeIntersections(wx, wy);
                    if (ix) {
                        sx = ix.x; sy = ix.y;
                    } else {
                        sx = snapToInteger(wx); sy = snapToInteger(wy);
                    }
                    const np = getOrCreatePoint(sx, sy);
                    showToast('点 ' + np.label + '(' + np.x.toFixed(1) + ',' + np.y.toFixed(1) + ')', 'success');
                    if (toolStatusEl) toolStatusEl.textContent = '点工具：继续点击添加点，ESC退出';
                    gfxDirty = true;
                    redraw();
                    autoSave();
                    return true;
                }
            }

            function doSegment() {
                const p1Data = toolPoints[0], p2Data = toolPoints[1];
                const np1 = p1Data._np || getOrCreatePoint(p1Data.x, p1Data.y);
                const np2 = p2Data._np || getOrCreatePoint(p2Data.x, p2Data.y);
                let spec = { type: 'segment', points: [[np1.x, np1.y], [np2.x, np2.y]], color: '#f59e0b', lineWidth: 2.5, parentIds: [np1.id, np2.id] };
                addGraphic(spec, true);
                registerBinding(graphics[graphics.length - 1], [np1, np2]);
                showToast('线段 ' + np1.label + np2.label, 'success');
            }
            function doRay() {
                const p1Data = toolPoints[0], p2Data = toolPoints[1];
                const np1 = p1Data._np || getOrCreatePoint(p1Data.x, p1Data.y);
                const np2 = p2Data._np || getOrCreatePoint(p2Data.x, p2Data.y);
                let spec = { type: 'ray', points: [[np1.x, np1.y], [np2.x, np2.y]], color: '#ef4444', lineWidth: 2.5, parentIds: [np1.id, np2.id] };
                addGraphic(spec, true);
                registerBinding(graphics[graphics.length - 1], [np1, np2]);
                showToast('射线 ' + np1.label + '→' + np2.label, 'success');
            }
            function doCircle() {
                const p1Data = toolPoints[0], p2Data = toolPoints[1];
                const np1 = p1Data._np || getOrCreatePoint(p1Data.x, p1Data.y);
                const np2 = p2Data._np || getOrCreatePoint(p2Data.x, p2Data.y);
                const r = Math.hypot(np2.x - np1.x, np2.y - np1.y);
                let spec = { type: 'circle', params: { cx: np1.x, cy: np1.y, r }, color: '#06b6d4', lineWidth: 2.5, fill: false, parentIds: [np1.id, np2.id] };
                addGraphic(spec, true);
                registerBinding(graphics[graphics.length - 1], [np1, np2]);
                showToast('圆 ' + np1.label + ' r=' + r.toFixed(1), 'success');
            }
            function doRect() {
                const p1Data = toolPoints[0], p2Data = toolPoints[1];
                const np1 = p1Data._np || getOrCreatePoint(p1Data.x, p1Data.y);
                const np2 = p2Data._np || getOrCreatePoint(p2Data.x, p2Data.y);
                const x = Math.min(np1.x, np2.x), y = Math.min(np1.y, np2.y), w = Math.abs(np2.x - np1.x), h = Math.abs(np2.y - np1.y);
                let spec = { type: 'rectangle', x, y, w, h, color: '#a855f7', lineWidth: 2.5, fill: false, parentIds: [np1.id, np2.id] };
                addGraphic(spec, true);
                registerBinding(graphics[graphics.length - 1], [np1, np2]);
                showToast('矩形 ' + np1.label + np2.label, 'success');
            }
            function doTriangle() {
                const pts = toolPoints.map(p => {
                    const np = p._np || getOrCreatePoint(p.x, p.y);
                    return np;
                });
                const coords = pts.map(p => [p.x, p.y]);
                const parentIds = pts.map(p => p.id);
                let spec = { type: 'polygon', points: coords, color: '#14b8a6', lineWidth: 2.5, fill: false, parentIds };
                addGraphic(spec, true);
                registerBinding(graphics[graphics.length - 1], pts);
                showToast('三角形 ' + pts.map(p => p.label).join(''), 'success');
            }
            function doLine() {
                const p1Data = toolPoints[0], p2Data = toolPoints[1];
                const np1 = p1Data._np || getOrCreatePoint(p1Data.x, p1Data.y);
                const np2 = p2Data._np || getOrCreatePoint(p2Data.x, p2Data.y);
                if (Math.abs(np2.x - np1.x) < 0.0001) {
                    let spec = { type: 'line', params: { x: np1.x }, color: '#6366f1', lineWidth: 2.5, parentIds: [np1.id, np2.id] };
                    addGraphic(spec, true);
                } else {
                    const k = (np2.y - np1.y) / (np2.x - np1.x), b = np1.y - k * np1.x;
                    let spec = { type: 'line', params: { k, b }, color: '#6366f1', lineWidth: 2.5, parentIds: [np1.id, np2.id] };
                    addGraphic(spec, true);
                }
                registerBinding(graphics[graphics.length - 1], [np1, np2]);
                showToast('直线 ' + np1.label + np2.label, 'success');
            }
            function doQuadratic() {
                const p1Data = toolPoints[0], p2Data = toolPoints[1], p3Data = toolPoints[2];
                const np1 = p1Data._np || getOrCreatePoint(p1Data.x, p1Data.y);
                const np2 = p2Data._np || getOrCreatePoint(p2Data.x, p2Data.y);
                const np3 = p3Data._np || getOrCreatePoint(p3Data.x, p3Data.y);
                const x1=np1.x, y1=np1.y, x2=np2.x, y2=np2.y, x3=np3.x, y3=np3.y;
                const denom = (x1 - x2) * (x1 - x3) * (x2 - x3);
                if (Math.abs(denom) < 0.0001) {
                    showToast('三点共线或x坐标重复，无法拟合抛物线', 'error');
                    return;
                }
                let a = (y1*(x2-x3)+y2*(x3-x1)+y3*(x1-x2))/denom;
                let b = (y1*(x3*x3-x2*x2)+y2*(x1*x1-x3*x3)+y3*(x2*x2-x1*x1))/denom;
                let c = y1-a*x1*x1-b*x1;
                let spec = { type: 'quadratic', params: { a, b, c }, color: '#f59e0b', lineWidth: 2.5, parentIds: [np1.id, np2.id, np3.id] };
                addGraphic(spec, true);
                registerBinding(graphics[graphics.length - 1], [np1, np2, np3]);
                showToast('抛物线 ' + np1.label + np2.label + np3.label, 'success');
            }

            function finishAreaMeasurement() {
                if (activeTool !== 'area' || toolPoints.length < 3) {
                    if (toolPoints.length < 3) showToast('面积工具至少需要3个顶点', 'error');
                    return;
                }
                const pts = toolPoints.map(p => [p.x, p.y]);
                // Shoelace formula
                let area = 0;
                for (let i = 0; i < pts.length; i++) {
                    const j = (i + 1) % pts.length;
                    area += pts[i][0] * pts[j][1];
                    area -= pts[j][0] * pts[i][1];
                }
                area = Math.abs(area) / 2;
                pushUndo();
                // Filled polygon
                const polyG = createGraphicFromSpec({ type: 'polygon', points: pts, color: '#10b981', lineWidth: 2, fill: true, fillColor: 'rgba(16,185,129,0.15)' });
                if (polyG) { polyG.alpha = 1; graphics.push(polyG); _cachedIntersections = null; }
                // Points
                const ptG = createGraphicFromSpec({ type: 'points', points: pts, color: '#10b981', size: 7 });
                if (ptG) { ptG.alpha = 1; graphics.push(ptG); _cachedIntersections = null; }
                // Area text annotation at centroid
                let cx = 0, cy = 0;
                for (let p of pts) { cx += p[0]; cy += p[1]; }
                cx /= pts.length; cy /= pts.length;
                const txtG = createGraphicFromSpec({ type: 'text', text: 'S = ' + area.toFixed(2), x: cx, y: cy, color: '#10b981', fontSize: 14 });
                if (txtG) { txtG.alpha = 1; graphics.push(txtG); _cachedIntersections = null; }
                gfxDirty = true;
                redraw();
                autoSave();
                showToast('面积: S = ' + area.toFixed(2), 'success');
                exitToolMode();
            }

            function parsePiecewisePieces(str) {
                // Split by commas that are NOT inside parentheses
                let parts = [];
                let depth = 0, current = '';
                for (let ch of str) {
                    if (ch === '(' || ch === '[') depth++;
                    else if (ch === ')' || ch === ']') depth--;
                    if (ch === ',' && depth === 0) {
                        parts.push(current.trim());
                        current = '';
                    } else {
                        current += ch;
                    }
                }
                if (current.trim()) parts.push(current.trim());

                let pieces = [];
                for (let part of parts) {
                    // Match: condition: expr
                    let m = part.match(/^(.+?)\s*:\s*(.+)$/);
                    if (!m) continue;
                    let condition = normalizeExpression(m[1].trim());
                    let expr = normalizeExpression(m[2].trim());
                    if (!condition || !expr) continue;
                    pieces.push({ condition, expr });
                }
                return pieces.length > 0 ? pieces : null;
            }

            function parseExpression(expr) {
                expr = normalizeExpression(expr.trim());
                if (!expr) return null;

                // Piecewise: {condition: expr, condition: expr, ...}
                let pieceMatch = expr.match(/^\{(.+)\}$/);
                if (pieceMatch) {
                    let pieces = parsePiecewisePieces(pieceMatch[1]);
                    if (pieces && pieces.length > 0) {
                        let g = createGraphicFromSpec({ type: 'piecewise', pieces, color: '#f59e0b', lineWidth: 2.5 });
                        if (g) { addGraphic(g, true); redraw(); }
                        return { ok: true, msg: '分段函数' };
                    }
                }

                // Inequality: y > expr, y < expr, y >= expr, y <= expr
                let ineqMatch = expr.match(/^y\s*(>=|<=|>|<)\s*(.+)$/);
                if (ineqMatch) {
                    let operator = ineqMatch[1];
                    let rhs = normalizeExpression(ineqMatch[2]);
                    let g = createGraphicFromSpec({ type: 'inequality', expr: 'y-(' + rhs + ')', operator, color: '#8b5cf6', fillColor: 'rgba(139,92,246,0.12)' });
                    if (g) { addGraphic(g, true); redraw(); }
                    return { ok: true, msg: '不等式区域' };
                }

                // Implicit equation: contains both x and y with = (but not y= alone, which is a function)
                let eqMatch = expr.match(/^(.+?)\s*=\s*(.+)$/);
                if (eqMatch && !expr.match(/^(?:f\s*\(\s*x\s*\)|y)\s*=/i)) {
                    let lhs = eqMatch[1].trim();
                    let rhs = eqMatch[2].trim();
                    // Check if both x and y appear in the equation
                    let fullExpr = lhs + rhs;
                    if (/[xy]/i.test(lhs) && /[xy]/i.test(rhs) || (/[xy]/i.test(fullExpr) && /y/i.test(fullExpr))) {
                        let implExpr = '(' + lhs + ')-(' + rhs + ')';
                        let g = createGraphicFromSpec({ type: 'implicit', expr: implExpr, color: '#06b6d4', lineWidth: 2.5 });
                        if (g) { addGraphic(g, true); redraw(); }
                        return { ok: true, msg: '隐函数 ' + expr };
                    }
                }

                // Parametric: (expr_x, expr_y) in terms of t
                let paramMatch = expr.match(/^\s*\(\s*(.+?)\s*,\s*(.+?)\s*\)\s*$/);
                if (paramMatch) {
                    let xExpr = normalizeExpression(paramMatch[1].trim());
                    let yExpr = normalizeExpression(paramMatch[2].trim());
                    if (xExpr && yExpr) {
                        let g = createGraphicFromSpec({ type: 'paramCurve', xExpr, yExpr, color: '#ec4899', lineWidth: 2.5, tMin: 0, tMax: 6.2832 });
                        if (g) { addGraphic(g, true); redraw(); }
                        return { ok: true, msg: '参数曲线: x=' + xExpr + ', y=' + yExpr };
                    }
                }

                // Polar: r=expr where expr contains θ or theta
                let polarMatch = expr.match(/^\s*r\s*=\s*(.+?)\s*$/i);
                if (polarMatch) {
                    let rExprRaw = polarMatch[1].trim();
                    if (/theta/i.test(rExprRaw)) {
                        let rExpr = normalizeExpression(rExprRaw.replace(/theta/gi, 't'));
                        let xExpr = '(' + rExpr + ')*cos(t)';
                        let yExpr = '(' + rExpr + ')*sin(t)';
                        let g = createGraphicFromSpec({ type: 'paramCurve', xExpr, yExpr, color: '#06b6d4', lineWidth: 2.5, tMin: 0, tMax: 6.2832 });
                        if (g) { addGraphic(g, true); redraw(); }
                        return { ok: true, msg: '极坐标曲线: r=' + rExprRaw };
                    }
                }

                let funcMatch = expr.match(/^(?:f\s*\(\s*x\s*\)|y)\s*=\s*(.+)/i);
                if (funcMatch) {
                    return parseFunctionExpr(funcMatch[1]);
                }
                let ptMatch = expr.match(/^([A-Z])\s*=\s*\(\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*\)$/);
                if (ptMatch) {
                    pushUndo();
                    let label = ptMatch[1], x = parseFloat(ptMatch[2]), y = parseFloat(ptMatch[3]);
                    if (!namedPoints.find(p => p.label === label)) {
                        namedPoints.push({ id: Date.now()+Math.random(), label, x, y, color: '#10b981', childIds: [] });
                    } else {
                        let pt = namedPoints.find(p => p.label === label);
                        pt.x = x; pt.y = y;
                    }
                    renderPoints();
                    gfxDirty = true;
                    redraw();
                    return { ok: true, msg: '已设置点 ' + label + '(' + x + ',' + y + ')' };
                }
                let circMatch = expr.match(/^圆\s*\(\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*\)$/);
                if (circMatch) {
                    let cx = parseFloat(circMatch[1]), cy = parseFloat(circMatch[2]), r = parseFloat(circMatch[3]);
                    let g = createGraphicFromSpec({ type: 'circle', params: { cx, cy, r }, color: '#06b6d4', lineWidth: 2.5, fill: false });
                    if (g) { addGraphic(g, true); redraw(); }
                    return { ok: true, msg: '已画圆(' + cx + ',' + cy + ') r=' + r };
                }
                let segMatch = expr.match(/^线段\s*\(\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*\)$/);
                if (segMatch) {
                    let g = createGraphicFromSpec({ type: 'segment', points: [[parseFloat(segMatch[1]), parseFloat(segMatch[2])], [parseFloat(segMatch[3]), parseFloat(segMatch[4])]], color: '#f59e0b', lineWidth: 2 });
                    if (g) { addGraphic(g, true); redraw(); }
                    return { ok: true, msg: '已画线段' };
                }
                let rayMatch = expr.match(/^射线\s*\(\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*\)$/);
                if (rayMatch) {
                    let g = createGraphicFromSpec({ type: 'ray', points: [[parseFloat(rayMatch[1]), parseFloat(rayMatch[2])], [parseFloat(rayMatch[3]), parseFloat(rayMatch[4])]], color: '#ef4444', lineWidth: 2 });
                    if (g) { addGraphic(g, true); redraw(); }
                    return { ok: true, msg: '已画射线' };
                }
                let connMatch = expr.match(/^(连接|线段|射线|直线)\s*\(\s*([A-Z])\s*,\s*([A-Z])\s*\)$/);
                if (connMatch) {
                    pushUndo();
                    let type = connMatch[1], la = connMatch[2], lb = connMatch[3];
                    let pa = namedPoints.find(p => p.label === la), pb = namedPoints.find(p => p.label === lb);
                    if (!pa || !pb) return { ok: false, msg: '点 ' + (pa ? lb : la) + ' 不存在，先用 A=(x,y) 创建' };
                    const connType = (type === '直线') ? 'line' : (type === '射线') ? 'ray' : 'segment';
                    const isDyn1 = pa.isDynamic === true, isDyn2 = pb.isDynamic === true;
                    if (isDyn1 || isDyn2) {
                        const xExpr1 = isDyn1 ? (pa.exprX || pa.x.toString()) : pa.x.toString();
                        const yExpr1 = isDyn1 ? (pa.exprY || pa.y.toString()) : pa.y.toString();
                        const xExpr2 = isDyn2 ? (pb.exprX || pb.x.toString()) : pb.x.toString();
                        const yExpr2 = isDyn2 ? (pb.exprY || pb.y.toString()) : pb.y.toString();
                        const color = connType === 'ray' ? '#ef4444' : connType === 'line' ? '#6366f1' : '#f59e0b';
                        const g = createGraphicFromSpec({ type: 'paramConn', xExpr1, yExpr1, xExpr2, yExpr2, color, lineWidth: 2, connType });
                        if (g) { addGraphic(g, true); redraw(); }
                    } else if (connType === 'line') {
                        if (Math.abs(pb.x - pa.x) < 0.0001) {
                            const g = createGraphicFromSpec({ type: 'line', params: { x: pa.x }, color: '#6366f1', lineWidth: 2.5, parentIds: [pa.id, pb.id] });
                            if (g) { addGraphic(g, true); registerBinding(g, [pa, pb]); redraw(); }
                        } else {
                            const k = (pb.y - pa.y) / (pb.x - pa.x), b = pa.y - k * pa.x;
                            const g = createGraphicFromSpec({ type: 'line', params: { k, b }, color: '#6366f1', lineWidth: 2.5, parentIds: [pa.id, pb.id] });
                            if (g) { addGraphic(g, true); registerBinding(g, [pa, pb]); redraw(); }
                        }
                    } else {
                        const color = connType === 'ray' ? '#ef4444' : '#f59e0b';
                        const g = createGraphicFromSpec({ type: connType, points: [[pa.x, pa.y], [pb.x, pb.y]], color, lineWidth: 2, parentIds: [pa.id, pb.id] });
                        if (g) { addGraphic(g, true); registerBinding(g, [pa, pb]); redraw(); }
                    }
                    return { ok: true, msg: '已' + type + ': ' + la + '→' + lb };
                }

                return null;
            }

            function parseFunctionExpr(funcStr) {
                const original = funcStr;
                funcStr = normalizeExpression(funcStr.replace(/\s+/g, ''));
                if (!funcStr) return null;

                let linearMatch = funcStr.match(/^(-?[\d.]*)\*?x([+-][\d.]+)?$/);
                if (linearMatch) {
                    let k = linearMatch[1] === '' || linearMatch[1] === '+' ? 1 : linearMatch[1] === '-' ? -1 : parseFloat(linearMatch[1]);
                    if (isNaN(k)) k = 1;
                    let b = linearMatch[2] ? parseFloat(linearMatch[2]) : 0;
                    let g = createGraphicFromSpec({ type: 'line', params: { k, b }, color: '#6366f1', lineWidth: 2.5 });
                    if (g) { addGraphic(g, true); redraw(); }
                    return { ok: true, msg: 'y=' + k + 'x+' + b };
                }

                let quadMatch = funcStr.match(/^(-?[\d.]*)\*?x\*\*2([+-][\d.]*\*?x)?([+-][\d.]+)?$/);
                if (quadMatch) {
                    let a = quadMatch[1] === '' || quadMatch[1] === '+' ? 1 : quadMatch[1] === '-' ? -1 : parseFloat(quadMatch[1]);
                    if (isNaN(a)) a = 1;
                    let b = quadMatch[2] ? parseFloat(quadMatch[2].replace(/\*?x/, '')) || (quadMatch[2].indexOf('+') === 0 ? 1 : -1) : 0;
                    let c = quadMatch[3] ? parseFloat(quadMatch[3]) : 0;
                    let g = createGraphicFromSpec({ type: 'quadratic', params: { a, b, c }, color: '#f59e0b', lineWidth: 2.5 });
                    if (g) { addGraphic(g, true); redraw(); }
                    return { ok: true, msg: 'y=' + a + 'x²+' + b + 'x+' + c };
                }

                if (funcStr.match(/^sin/)) {
                    let A = 1, B = 1, C = 0, D = 0;
                    let m = funcStr.match(/^(-?[\d.]*)\*?sin\((-?[\d.]*)\*?x([+-][\d.]+)?\)([+-][\d.]+)?$/);
                    if (m) { if (m[1] && m[1] !== '-') A = parseFloat(m[1]); else if (m[1] === '-') A = -1; if (m[2]) B = parseFloat(m[2]); if (m[3]) C = parseFloat(m[3]); if (m[4]) D = parseFloat(m[4]); }
                    let g = createGraphicFromSpec({ type: 'sin', params: { A, B, C, D }, color: '#6366f1', lineWidth: 2.5 });
                    if (g) { addGraphic(g, true); redraw(); }
                    return { ok: true, msg: 'y=' + A + 'sin(' + B + 'x+' + C + ')+' + D };
                }
                if (funcStr.match(/^cos/)) {
                    let A = 1, B = 1, C = 0, D = 0;
                    let m = funcStr.match(/^(-?[\d.]*)\*?cos\((-?[\d.]*)\*?x([+-][\d.]+)?\)([+-][\d.]+)?$/);
                    if (m) { if (m[1] && m[1] !== '-') A = parseFloat(m[1]); else if (m[1] === '-') A = -1; if (m[2]) B = parseFloat(m[2]); if (m[3]) C = parseFloat(m[3]); if (m[4]) D = parseFloat(m[4]); }
                    let g = createGraphicFromSpec({ type: 'cos', params: { A, B, C, D }, color: '#10b981', lineWidth: 2.5 });
                    if (g) { addGraphic(g, true); redraw(); }
                    return { ok: true, msg: 'y=' + A + 'cos(' + B + 'x+' + C + ')+' + D };
                }
                if (funcStr.match(/1\/x/)) {
                    let k = 1;
                    let m = funcStr.match(/^(-?[\d.]*)\*?1\/x$/);
                    if (m && m[1]) k = parseFloat(m[1]);
                    let g = createGraphicFromSpec({ type: 'inverse', params: { k }, color: '#8b5cf6', lineWidth: 2.5 });
                    if (g) { addGraphic(g, true); redraw(); }
                    return { ok: true, msg: 'y=' + k + '/x' };
                }
                if (funcStr.match(/e\*\*/i) || funcStr.match(/^exp/)) {
                    let g = createGraphicFromSpec({ type: 'exp', params: { a: 1, b: 1 }, color: '#eab308', lineWidth: 2.5 });
                    if (g) { addGraphic(g, true); redraw(); }
                    return { ok: true, msg: 'y=eˣ' };
                }
                if (funcStr.match(/^ln/i) || funcStr.match(/^log/)) {
                    let g = createGraphicFromSpec({ type: 'log', params: { a: 1 }, color: '#0ea5e9', lineWidth: 2.5 });
                    if (g) { addGraphic(g, true); redraw(); }
                    return { ok: true, msg: 'y=ln(x)' };
                }
                if (funcStr.match(/^\|/)) {
                    let g = createGraphicFromSpec({ type: 'abs', params: { a: 1, b: 0, c: 0 }, color: '#f97316', lineWidth: 2.5 });
                    if (g) { addGraphic(g, true); redraw(); }
                    return { ok: true, msg: 'y=|x|' };
                }
                return null;
            }

            function executeExpression() {
                const input = document.getElementById('exprInput');
                if (!input) return;
                const expr = input.value.trim();
                if (!expr) return;
                const result = parseExpression(expr);
                if (result && result.ok) {
                    showToast(result.msg, 'success');
                    input.value = '';
                } else if (result && !result.ok) {
                    showToast(result.msg || '无法解析此表达式', 'error');
                } else {
                    showToast('无法识别，试试: y=sin(x), x^2+y^2=1, y>x^2, {x>0:x^2, x<=0:-x}, 圆(0,0,3)', 'error');
                }
            }

            let nextPointIndex = 0;
            function getNextPointLabel() {
                const used = new Set(namedPoints.map(p => p.label));
                const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                const subscripts = ['₁','₂','₃','₄','₅','₆','₇','₈','₉'];
                for (let i = 0; i < 26; i++) { if (!used.has(letters[i])) return letters[i]; }
                for (let s = 0; s < 9; s++) {
                    for (let i = 0; i < 26; i++) {
                        let label = letters[i] + subscripts[s];
                        if (!used.has(label)) return label;
                    }
                }
                return 'P' + (++nextPointIndex);
            }

            function buildSpecFromTool(tool) {
                const t = tool.type;
                if (t === 'rect') return { type: 'rectangle', x: tool.x, y: tool.y, w: tool.w, h: tool.h, color: tool.color, lineWidth: tool.lineWidth, fill: tool.fill };
                if (t === 'tri') return { type: 'polygon', points: tool.points, color: tool.color, lineWidth: tool.lineWidth, fill: tool.fill };
                if (t === 'ellipse') return { type: 'ellipse', cx: tool.params.cx, cy: tool.params.cy, rx: tool.params.rx, ry: tool.params.ry, color: tool.color, lineWidth: tool.lineWidth, fill: tool.fill };
                if (t === 'circle') return { type: 'circle', params: tool.params, color: tool.color, lineWidth: tool.lineWidth, fill: tool.fill };
                if (t === 'segment' || t === 'ray') return { type: t, points: tool.points, color: tool.color, lineWidth: tool.lineWidth };
                if (t === 'points') return { type: 'points', points: tool.points, color: tool.color, size: tool.size || 8 };
                return { type: t, params: tool.params, color: tool.color, lineWidth: tool.lineWidth };
            }

            function applyDynamicDef(def) {
                pushUndo();
                stopAllAnimations();
                const sDef = def.slider;
                const existing = sliders.find(s => s.name === sDef.name);
                if (existing) {
                    existing.min = sDef.min; existing.max = sDef.max; existing.step = sDef.step;
                    existing.value = sDef.value; existing.playing = false;
                } else {
                    sliders.push({ name: sDef.name, min: sDef.min, max: sDef.max, step: sDef.step, value: sDef.value, playing: false, speed: 1, direction: 1 });
                }
                namedPoints = [];
                for (let gSpec of def.graphics) {
                    if (gSpec.type === 'namedPoint') {
                        if (!namedPoints.find(p => p.label === gSpec.label)) {
                            namedPoints.push({ id: Date.now()+Math.random(), label: gSpec.label, x: gSpec.x, y: gSpec.y, color: gSpec.color || '#10b981', childIds: [] });
                        }
                    } else {
                        addGraphic(gSpec, true, true);
                    }
                }
                renderPoints();
                renderSliders();
                redraw();
                showToast('已加载: ' + def.label, 'success');
            }

            // ========= Named Points =========
            let highlightedPoint = null;

            function renderPoints() {
                // Update dynamic point positions from slider params
                const params = getSliderParams();
                for (let g of graphics) {
                    if (g.type === 'paramPoint' && g.label) {
                        if (!namedPoints.find(p => p.label === g.label)) {
                            let cx = 0, cy = 0;
                            try { cx = evaluateExpr(g.xExpr, params) || 0; cy = evaluateExpr(g.yExpr, params) || 0; } catch(e) {}
                            namedPoints.push({ id: Date.now()+Math.random(), label: g.label, x: cx, y: cy, isDynamic: true, exprX: g.xExpr, exprY: g.yExpr, color: g.color || '#ef4444', childIds: [] });
                        }
                    }
                }
                for (let p of namedPoints) {
                    if (p.isDynamic && p.exprX && p.exprY) {
                        try { p.x = evaluateExpr(p.exprX, params) || 0; p.y = evaluateExpr(p.exprY, params) || 0; } catch(e) {}
                    }
                }
            }

            // ========= Toast =========
            function showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = 'toast';
                const iconSvg = type === 'success'
                    ? '<svg class="toast-icon success" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
                    : type === 'error'
                    ? '<svg class="toast-icon error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
                    : '<svg class="toast-icon info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';
                toast.innerHTML = iconSvg + '<span>' + message + '</span>';
                container.appendChild(toast);
                setTimeout(() => {
                    toast.classList.add('leaving');
                    setTimeout(() => toast.remove(), 300);
                }, 2500);
            }

            // ========= Theme =========
            function loadTheme() {
                const saved = localStorage.getItem(THEME_KEY);
                if (saved === 'light') {
                    document.documentElement.setAttribute('data-theme', 'light');
                    updateThemeIcon(false);
                } else {
                    updateThemeIcon(true);
                }
            }

            function toggleTheme() {
                const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
                if (isDark) {
                    document.documentElement.setAttribute('data-theme', 'light');
                    localStorage.setItem(THEME_KEY, 'light');
                } else {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem(THEME_KEY, 'dark');
                }
                updateThemeIcon(!isDark);
                redraw();
            }

            function updateThemeIcon(isDark) {
                const btn = document.getElementById('themeToggle');
                if (isDark) {
                    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
                } else {
                    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
                }
            }

            // ========= Canvas Empty Hint =========
            function updateEmptyHint() {
                const hint = document.getElementById('canvasEmptyHint');
                if (!hint) return;
                graphics.length > 0 ? hint.classList.add('hidden') : hint.classList.remove('hidden');
            }

            // ========= Settings =========
            function loadSettings() {
                const savedModel = localStorage.getItem(MODEL_KEY);
                if (savedModel === 'deepseek-v4-pro' || savedModel === 'deepseek-v4-flash') currentModel = savedModel;
                const savedThink = localStorage.getItem(DEEPTHINK_KEY);
                if (savedThink === 'true') deepThinkEnabled = true;
                else if (savedThink === 'false') deepThinkEnabled = false;
                updateModelButtons();
                updateDeepThinkButton();
            }

            function saveModelSetting() { localStorage.setItem(MODEL_KEY, currentModel); }
            function saveDeepThinkSetting() { localStorage.setItem(DEEPTHINK_KEY, deepThinkEnabled ? 'true' : 'false'); }

            function updateModelButtons() {
                const btnFlash = document.getElementById('btnFlash');
                const btnPro = document.getElementById('btnPro');
                if (currentModel === 'deepseek-v4-pro') {
                    btnFlash.classList.remove('active');
                    btnPro.classList.add('active');
                } else {
                    btnFlash.classList.add('active');
                    btnPro.classList.remove('active');
                }
            }

            function updateDeepThinkButton() {
                const btn = document.getElementById('btnDeepThink');
                deepThinkEnabled ? btn.classList.add('active') : btn.classList.remove('active');
            }

            // ========= Status =========
            function setStatus(text, type = 'idle') {
                document.getElementById("statusMsg").innerText = text;
                document.getElementById("statusDot").className = 'status-dot' + (type !== 'idle' ? ' ' + type : '');
            }

            // ========= Coordinate Conversion =========
            function updateZoomDisplay() {
                let zoom = 12.0 / (xMax - xMin);
                document.getElementById("zoomLevel").innerText = zoom.toFixed(1);
            }

            function worldToPixel(xWorld, yWorld) {
                return {
                    px: xWorld * _sx + _ox,
                    py: _oy - yWorld * _sy
                };
            }

            function pixelToWorld(px, py) {
                return {
                    x: (px - _ox) / _sx,
                    y: (_oy - py) / _sy
                };
            }

            function getAdaptiveStep() {
                let rangeX = xMax - xMin;
                if (rangeX > 24) return 4.0;
                if (rangeX > 12) return 2.0;
                if (rangeX < 3) return 0.5;
                if (rangeX < 1.5) return 0.2;
                return 1.0;
            }

            // ========= Drawing Core =========
            function isDark() { return document.documentElement.getAttribute('data-theme') !== 'light'; }

            function setDash(style) {
                if (style && Array.isArray(style)) ctx.setLineDash(style);
                else ctx.setLineDash([]);
            }

            function drawGridAndAxes() {
                const dark = isDark();
                ctx.save();
                ctx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);
                ctx.fillStyle = dark ? '#0c0c18' : '#ffffff';
                ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
                let step = getAdaptiveStep();
                let startX = Math.ceil(xMin / step) * step;
                let startY = Math.ceil(yMin / step) * step;

                // Grid
                ctx.beginPath();
                ctx.strokeStyle = dark ? "rgba(255,255,255,0.04)" : "#f0f0f5";
                ctx.lineWidth = 1;
                for (let x = startX; x <= xMax; x += step) {
                    let { px } = worldToPixel(x, 0);
                    if (px >= 0 && px <= LOGICAL_W) { ctx.moveTo(px, 0); ctx.lineTo(px, LOGICAL_H); }
                }
                for (let y = startY; y <= yMax; y += step) {
                    let { py } = worldToPixel(0, y);
                    if (py >= 0 && py <= LOGICAL_H) { ctx.moveTo(0, py); ctx.lineTo(LOGICAL_W, py); }
                }
                ctx.stroke();

                // Axes
                let { px: ox, py: oy } = worldToPixel(0, 0);
                ctx.beginPath();
                ctx.strokeStyle = dark ? "rgba(255,255,255,0.15)" : "#d1d1d6";
                ctx.lineWidth = 1.5;
                ctx.moveTo(0, oy); ctx.lineTo(LOGICAL_W, oy); ctx.stroke();
                ctx.moveTo(ox, 0); ctx.lineTo(ox, LOGICAL_H); ctx.stroke();

                // Origin
                ctx.beginPath();
                ctx.fillStyle = dark ? "rgba(255,255,255,0.3)" : "#8e8e93";
                ctx.arc(ox, oy, 3, 0, 2 * Math.PI);
                ctx.fill();

                // Labels
                ctx.fillStyle = dark ? "rgba(255,255,255,0.25)" : "rgba(0,0,0,0.18)";
                ctx.font = '500 11px Outfit, -apple-system, sans-serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'top';
                for (let x = startX; x <= xMax; x += step) {
                    if (Math.abs(x) < 0.001) continue;
                    let { px } = worldToPixel(x, 0);
                    if (px > 20 && px < LOGICAL_W - 20) {
                        ctx.fillText(formatNum(x), px, Math.min(Math.max(oy + 6, 6), LOGICAL_H - 16));
                    }
                }
                ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
                for (let y = startY; y <= yMax; y += step) {
                    if (Math.abs(y) < 0.001) continue;
                    let { py } = worldToPixel(0, y);
                    if (py > 20 && py < LOGICAL_H - 20) {
                        ctx.fillText(formatNum(y), Math.min(Math.max(ox - 6, 30), LOGICAL_W - 6), py);
                    }
                }
                ctx.restore();
            }

            function formatNum(n) {
                if (Number.isInteger(n)) return n.toString();
                return n.toFixed(1).replace(/\.0$/, '');
            }

            function drawSegment(p1, p2, color, lineWidth = 2.5, dash = null, alpha = 1, isHovered = false) {
                let { px: x1, py: y1 } = worldToPixel(p1[0], p1[1]);
                let { px: x2, py: y2 } = worldToPixel(p2[0], p2[1]);
                ctx.beginPath();
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = isHovered ? "#f59e0b" : color;
                ctx.lineWidth = isHovered ? lineWidth + 1.5 : lineWidth;
                ctx.lineCap = 'round';
                setDash(dash);
                ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
                ctx.stroke(); setDash(null); ctx.globalAlpha = 1;
            }

            function drawPolygon(points, color, lineWidth = 2.5, dash = null, fill = false, fillColor = null, alpha = 1, isHovered = false) {
                if (points.length < 2) return;
                ctx.beginPath();
                let first = worldToPixel(points[0][0], points[0][1]);
                ctx.moveTo(first.px, first.py);
                for (let i = 1; i < points.length; i++) {
                    let p = worldToPixel(points[i][0], points[i][1]);
                    ctx.lineTo(p.px, p.py);
                }
                ctx.closePath();
                ctx.globalAlpha = alpha;
                if (fill && fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
                ctx.strokeStyle = isHovered ? "#f59e0b" : color;
                ctx.lineWidth = isHovered ? lineWidth + 1.5 : lineWidth;
                ctx.lineJoin = 'round'; setDash(dash); ctx.stroke(); setDash(null); ctx.globalAlpha = 1;
            }

            function drawAngleArc(g, alpha = 1) {
                let { px: cpx, py: cpy } = worldToPixel(g.cx, g.cy);
                let rPx = (g.radius / (xMax - xMin)) * LOGICAL_W;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = g.color || '#f59e0b';
                ctx.lineWidth = g.lineWidth || 2;
                ctx.beginPath();
                // Canvas arc: 0=right, positive=clockwise. World: 0=right, positive=CCW.
                // Negate angles to convert from world to pixel coords.
                let startA = -g.startAngle;
                let endA = -g.endAngle;
                // Determine the shorter arc direction
                let diff = endA - startA;
                // Normalize diff to (-2π, 2π)
                while (diff > 2 * Math.PI) diff -= 2 * Math.PI;
                while (diff < -2 * Math.PI) diff += 2 * Math.PI;
                // Draw the shorter arc
                let anticlockwise = diff < 0;
                ctx.arc(cpx, cpy, Math.max(rPx, 2), startA, endA, anticlockwise);
                ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.restore();
            }

            function drawRectangle(x, y, w, h, color, lineWidth = 2.5, dash = null, fill = false, fillColor = null, alpha = 1, isHovered = false) {
                let p1 = worldToPixel(x, y), p2 = worldToPixel(x + w, y + h);
                ctx.beginPath(); ctx.rect(p1.px, p1.py, p2.px - p1.px, p2.py - p1.py);
                ctx.globalAlpha = alpha;
                if (fill && fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
                ctx.strokeStyle = isHovered ? "#f59e0b" : color;
                ctx.lineWidth = isHovered ? lineWidth + 1.5 : lineWidth;
                setDash(dash); ctx.stroke(); setDash(null); ctx.globalAlpha = 1;
            }

            function drawEllipse(cx, cy, rx, ry, color, lineWidth = 2.5, dash = null, fill = false, fillColor = null, alpha = 1, isHovered = false) {
                let center = worldToPixel(cx, cy);
                let radiusX = (rx / (xMax - xMin)) * LOGICAL_W;
                let radiusY = (ry / (yMax - yMin)) * LOGICAL_H;
                ctx.beginPath();
                ctx.ellipse(center.px, center.py, Math.max(radiusX, 0.1), Math.max(radiusY, 0.1), 0, 0, 2 * Math.PI);
                ctx.globalAlpha = alpha;
                if (fill && fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
                ctx.strokeStyle = isHovered ? "#f59e0b" : color;
                ctx.lineWidth = isHovered ? lineWidth + 1.5 : lineWidth;
                setDash(dash); ctx.stroke(); setDash(null); ctx.globalAlpha = 1;
            }

            function drawPoints(points, color, size = 6, alpha = 1, isHovered = false) {
                for (let p of points) {
                    let { px, py } = worldToPixel(p[0], p[1]);
                    ctx.beginPath(); ctx.globalAlpha = alpha;
                    if (!isHovered) {
                        ctx.fillStyle = 'rgba(255,255,255,0.6)';
                        ctx.arc(px, py, size / 2 + 2, 0, 2 * Math.PI); ctx.fill();
                    }
                    ctx.fillStyle = isHovered ? "#f59e0b" : color;
                    ctx.arc(px, py, size / 2, 0, 2 * Math.PI); ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            function drawFunctionCurve(fn, alpha = 1, isHovered = false) {
                if (fn.type === "circle") {
                    let { cx, cy, r } = fn.params;
                    drawEllipse(cx, cy, r, r, fn.color, fn.lineWidth || 2.5, fn.strokeDash, fn.fill, fn.fillColor, alpha, isHovered);
                    return;
                }
                if (fn.type === "line") {
                    if (fn.isVertical) {
                        let x = fn.params.x;
                        let { px } = worldToPixel(x, 0);
                        if (px >= 0 && px <= LOGICAL_W) {
                            ctx.beginPath(); ctx.globalAlpha = alpha;
                            ctx.strokeStyle = isHovered ? "#f59e0b" : fn.color;
                            ctx.lineWidth = isHovered ? (fn.lineWidth || 2.5) + 1.5 : (fn.lineWidth || 2.5);
                            setDash(fn.strokeDash); ctx.moveTo(px, 0); ctx.lineTo(px, LOGICAL_H);
                            ctx.stroke(); setDash(null); ctx.globalAlpha = 1;
                        }
                        return;
                    }
                    let { k, b } = fn.params;
                    let p1 = worldToPixel(xMin, k * xMin + b), p2 = worldToPixel(xMax, k * xMax + b);
                    ctx.beginPath(); ctx.globalAlpha = alpha;
                    ctx.strokeStyle = isHovered ? "#f59e0b" : fn.color;
                    ctx.lineWidth = isHovered ? (fn.lineWidth || 2.5) + 1.5 : (fn.lineWidth || 2.5);
                    ctx.lineCap = 'round'; setDash(fn.strokeDash);
                    ctx.moveTo(p1.px, p1.py); ctx.lineTo(p2.px, p2.py);
                    ctx.stroke(); setDash(null); ctx.globalAlpha = 1;
                    return;
                }
                if (fn.type === "ray") {
                    let p1 = worldToPixel(fn.points[0][0], fn.points[0][1]), p2 = worldToPixel(fn.points[1][0], fn.points[1][1]);
                    let dx = p2.px - p1.px, dy = p2.py - p1.py, dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 0) { dx /= dist; dy /= dist; }
                    let endPx = p1.px + dx * 3000, endPy = p1.py + dy * 3000;
                    ctx.beginPath(); ctx.globalAlpha = alpha;
                    ctx.strokeStyle = isHovered ? "#f59e0b" : fn.color;
                    ctx.lineWidth = isHovered ? (fn.lineWidth || 2.5) + 1.5 : (fn.lineWidth || 2.5);
                    ctx.lineCap = 'round'; setDash(fn.strokeDash);
                    ctx.moveTo(p1.px, p1.py); ctx.lineTo(endPx, endPy);
                    ctx.stroke(); setDash(null); ctx.globalAlpha = 1;
                    return;
                }
                if (fn.type === "paramConn") {
                    const params = getSliderParams();
                    let x1 = evaluateExpr(fn.xExpr1, params), y1 = evaluateExpr(fn.yExpr1, params);
                    let x2 = evaluateExpr(fn.xExpr2, params), y2 = evaluateExpr(fn.yExpr2, params);
                    if (!isFinite(x1) || !isFinite(y1) || !isFinite(x2) || !isFinite(y2)) return;
                    let p1 = worldToPixel(x1, y1), p2 = worldToPixel(x2, y2);
                    if (fn.connType === 'ray') {
                        let dx = p2.px - p1.px, dy = p2.py - p1.py, dist = Math.sqrt(dx*dx+dy*dy);
                        if (dist > 0) { dx /= dist; dy /= dist; }
                        p2 = { px: p1.px + dx * 3000, py: p1.py + dy * 3000 };
                    } else if (fn.connType === 'line') {
                        let dx = p2.px - p1.px, dy = p2.py - p1.py, dist = Math.sqrt(dx*dx+dy*dy);
                        if (dist > 0) { dx /= dist; dy /= dist; }
                        p2 = { px: p1.px + dx * 3000, py: p1.py + dy * 3000 };
                        p1 = { px: p1.px - dx * 3000, py: p1.py - dy * 3000 };
                    }
                    ctx.beginPath(); ctx.globalAlpha = alpha;
                    ctx.strokeStyle = fn.color; ctx.lineWidth = fn.lineWidth || 2;
                    ctx.lineCap = 'round'; setDash(fn.strokeDash);
                    ctx.moveTo(p1.px, p1.py); ctx.lineTo(p2.px, p2.py);
                    ctx.stroke(); setDash(null); ctx.globalAlpha = 1;
                    return;
                }
                ctx.beginPath(); ctx.globalAlpha = alpha;
                ctx.strokeStyle = isHovered ? "#f59e0b" : fn.color;
                ctx.lineWidth = isHovered ? (fn.lineWidth || 2.5) + 1.5 : (fn.lineWidth || 2.5);
                ctx.lineCap = 'round'; ctx.lineJoin = 'round'; setDash(fn.strokeDash);
                let first = true, steps = Math.min(Math.max(Math.round(LOGICAL_W * (window.devicePixelRatio || 1)), 400), 2000);
                for (let i = 0; i <= steps; i++) {
                    let x = xMin + (i / steps) * (xMax - xMin);
                    let y = fn.getY(x);
                    if (y === undefined || !isFinite(y) || isNaN(y)) { first = true; continue; }
                    let { px, py } = worldToPixel(x, y);
                    if (px < 0 || px > LOGICAL_W || py < 0 || py > LOGICAL_H) { first = true; continue; }
                    if (first) { ctx.moveTo(px, py); first = false; } else { ctx.lineTo(px, py); }
                }
                ctx.stroke(); setDash(null); ctx.globalAlpha = 1;
            }

            // ========= Implicit Curve (Marching Squares) =========
            function getMarchingSegments(code, top, bottom, left, right) {
                switch (code) {
                    case 1: case 14: return [[left, top]];
                    case 2: case 13: return [[top, right]];
                    case 3: case 12: return [[left, right]];
                    case 4: case 11: return [[right, bottom]];
                    case 5: return [[left, bottom], [top, right]];
                    case 6: case 9: return [[top, bottom]];
                    case 7: case 8: return [[left, bottom]];
                    case 10: return [[left, top], [right, bottom]];
                    default: return [];
                }
            }

            function drawImplicit(g, alpha = 1, isHovered = false) {
                const resolution = 200;
                const dx = (xMax - xMin) / resolution;
                const dy = (yMax - yMin) / resolution;

                ctx.strokeStyle = isHovered ? "#f59e0b" : g.color;
                ctx.lineWidth = isHovered ? (g.lineWidth || 2.5) + 1.5 : (g.lineWidth || 2.5);
                ctx.globalAlpha = alpha;
                setDash(g.strokeDash);

                const grid = [];
                for (let j = 0; j <= resolution; j++) {
                    grid[j] = [];
                    for (let i = 0; i <= resolution; i++) {
                        let x = xMin + i * dx;
                        let y = yMin + j * dy;
                        grid[j][i] = evaluateExpr(g.expr, { x, y });
                    }
                }

                ctx.beginPath();
                for (let j = 0; j < resolution; j++) {
                    for (let i = 0; i < resolution; i++) {
                        let v00 = grid[j][i], v10 = grid[j][i+1];
                        let v01 = grid[j+1][i], v11 = grid[j+1][i+1];

                        let code = 0;
                        if (v00 > 0) code |= 1;
                        if (v10 > 0) code |= 2;
                        if (v11 > 0) code |= 4;
                        if (v01 > 0) code |= 8;

                        if (code === 0 || code === 15) continue;

                        let x0 = xMin + i * dx, x1 = xMin + (i+1) * dx;
                        let y0 = yMin + j * dy, y1 = yMin + (j+1) * dy;

                        function lerp(a, b, va, vb) {
                            if (va === vb) return (a + b) / 2;
                            let t = va / (va - vb);
                            return a + t * (b - a);
                        }

                        let top    = { x: lerp(x0, x1, v00, v10), y: y0 };
                        let bottom = { x: lerp(x0, x1, v01, v11), y: y1 };
                        let left   = { x: x0, y: lerp(y0, y1, v00, v01) };
                        let right  = { x: x1, y: lerp(y0, y1, v10, v11) };

                        let segments = getMarchingSegments(code, top, bottom, left, right);
                        for (let seg of segments) {
                            let p1 = worldToPixel(seg[0].x, seg[0].y);
                            let p2 = worldToPixel(seg[1].x, seg[1].y);
                            ctx.moveTo(p1.px, p1.py);
                            ctx.lineTo(p2.px, p2.py);
                        }
                    }
                }
                ctx.stroke();
                setDash(null);
                ctx.globalAlpha = 1;
            }

            // ========= Inequality Region =========
            function drawInequality(g, alpha = 1) {
                const resolution = 150;
                const dx = (xMax - xMin) / resolution;
                const dy = (yMax - yMin) / resolution;

                ctx.globalAlpha = alpha * 0.5;
                ctx.fillStyle = g.fillColor || hexToRgba(g.color, 0.15);

                const cellW = LOGICAL_W / resolution;
                const cellH = LOGICAL_H / resolution;

                for (let j = 0; j < resolution; j++) {
                    for (let i = 0; i < resolution; i++) {
                        let x = xMin + (i + 0.5) * dx;
                        let y = yMin + (j + 0.5) * dy;
                        let val = evaluateExpr(g.expr, { x, y });
                        if (!isFinite(val)) continue;

                        let inRegion = false;
                        switch (g.operator) {
                            case '>':  inRegion = val > 0; break;
                            case '<':  inRegion = val < 0; break;
                            case '>=': inRegion = val >= 0; break;
                            case '<=': inRegion = val <= 0; break;
                        }

                        if (inRegion) {
                            let px = i * cellW;
                            let py = LOGICAL_H - (j + 1) * cellH;
                            ctx.fillRect(px, py, cellW + 0.5, cellH + 0.5);
                        }
                    }
                }
                ctx.globalAlpha = 1;
            }

            // ========= Piecewise Function =========
            function drawPiecewise(g, alpha = 1, isHovered = false) {
                ctx.beginPath();
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = isHovered ? "#f59e0b" : g.color;
                ctx.lineWidth = isHovered ? (g.lineWidth || 2.5) + 1.5 : (g.lineWidth || 2.5);
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                setDash(g.strokeDash);

                let first = true;
                let steps = Math.min(Math.max(Math.round(LOGICAL_W * (window.devicePixelRatio || 1)), 400), 2000);

                for (let i = 0; i <= steps; i++) {
                    let x = xMin + (i / steps) * (xMax - xMin);
                    let y = null;

                    for (let piece of g.pieces) {
                        try {
                            if (piece.condFn(x, 0)) {
                                y = piece.getY(x);
                                break;
                            }
                        } catch(e) {}
                    }

                    if (y === null || !isFinite(y) || isNaN(y)) { first = true; continue; }
                    let { px, py } = worldToPixel(x, y);
                    if (px < 0 || px > LOGICAL_W || py < 0 || py > LOGICAL_H) { first = true; continue; }
                    if (first) { ctx.moveTo(px, py); first = false; } else { ctx.lineTo(px, py); }
                }

                ctx.stroke();
                setDash(null);
                ctx.globalAlpha = 1;
            }

            function drawAnnotations(alpha = 1) {
                for (let ann of graphics.filter(g => g.type === "text")) {
                    let { px, py } = worldToPixel(ann.x, ann.y);
                    ctx.save();
                    let fontSize = ann.fontSize || 16;
                    ctx.font = `600 ${fontSize}px Outfit, -apple-system, sans-serif`;
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    let textWidth = ctx.measureText(ann.text).width;
                    let padding = 8, dark = isDark();
                    ctx.fillStyle = dark ? "rgba(12,12,24,0.92)" : "rgba(255,255,255,0.92)";
                    ctx.beginPath();
                    ctx.ellipse(px, py, textWidth / 2 + padding, fontSize / 2 + padding - 2, 0, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.strokeStyle = dark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)";
                    ctx.lineWidth = 1; ctx.stroke();
                    ctx.fillStyle = ann.color || (dark ? "#e0e0f0" : "#1d1d1f");
                    ctx.globalAlpha = alpha; ctx.fillText(ann.text, px, py);
                    ctx.restore();
                }
                ctx.globalAlpha = 1;
            }

            function redraw() {
                updateTransformCoeffs();
                // Safety net: if no flags are set, redraw everything
                if (!gridDirty && !gfxDirty) { gridDirty = true; gfxDirty = true; }

                // === Grid layer (cached) ===
                if (gridDirty) {
                    const _savedCtx = ctx;
                    ctx = gridCtx;
                    drawGridAndAxes();
                    ctx = _savedCtx;
                    gridDirty = false;
                }

                // === Graphics layer (cached) ===
                if (gfxDirty) {
                    gfxCtx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);
                    const _savedCtx = ctx;
                    ctx = gfxCtx;
                    ctx.save();
                    for (let g of graphics) {
                        if (g.hidden) continue;
                        let alpha = g.alpha !== undefined ? g.alpha : 1;
                        let isHovered = (currentHoverGraphic === g);
                        if (g.type === "segment") drawSegment(g.points[0], g.points[1], g.color, g.lineWidth || 2.5, g.strokeDash, alpha, isHovered);
                        else if (g.type === "polygon") drawPolygon(g.points, g.color, g.lineWidth || 2.5, g.strokeDash, g.fill, g.fillColor, alpha, isHovered);
                        else if (g.type === "rectangle") drawRectangle(g.x, g.y, g.w, g.h, g.color, g.lineWidth || 2.5, g.strokeDash, g.fill, g.fillColor, alpha, isHovered);
                        else if (g.type === "ellipse") drawEllipse(g.cx, g.cy, g.rx, g.ry, g.color, g.lineWidth || 2.5, g.strokeDash, g.fill, g.fillColor, alpha, isHovered);
                        else if (g.type === "points") drawPoints(g.points, g.color, g.size || 6, alpha, isHovered);
                        else if (g.type === "paramPoint") drawParamPoint(g, alpha);
                        else if (g.type === "paramCurve") drawParamCurve(g, alpha);
                        else if (g.type === "integralArea") drawIntegralArea(g, alpha);
                        else if (g.type === "implicit") drawImplicit(g, alpha, isHovered);
                        else if (g.type === "inequality") drawInequality(g, alpha);
                        else if (g.type === "piecewise") drawPiecewise(g, alpha, isHovered);
                        else if (g.type === "angleArc") drawAngleArc(g, alpha);
                        else if (g.type === "text") {} else drawFunctionCurve(g, alpha, isHovered);
                    }
                    drawAnnotations();
                    ctx.restore();

                    // Draw labels and dots for all named points on canvas
                    if (namedPoints.length > 0) {
                        ctx.save();
                        for (let p of namedPoints) {
                            let { px, py } = worldToPixel(p.x, p.y);
                            if (px < -20 || px > LOGICAL_W + 20 || py < -20 || py > LOGICAL_H + 20) continue;
                            const isHL = highlightedPoint === p;
                            const isSel = selectedNamedPoint === p;
                            const ptColor = p.color || '#10b981';
                            // Draw dot
                            ctx.beginPath();
                            ctx.arc(px, py, isHL || isSel ? 7 : 5, 0, 2 * Math.PI);
                            ctx.fillStyle = ptColor;
                            ctx.fill();
                            ctx.strokeStyle = isHL || isSel ? '#fff' : 'rgba(255,255,255,0.7)';
                            ctx.lineWidth = isHL || isSel ? 2.5 : 1.5;
                            ctx.stroke();
                            // Draw label
                            const fontSize = isHL || isSel ? 14 : 11;
                            ctx.font = `600 ${fontSize}px Outfit, -apple-system, sans-serif`;
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'bottom';
                            const textWidth = ctx.measureText(p.label).width;
                            const lx = px, ly = py - (isHL || isSel ? 14 : 10);
                            const dark = isDark();
                            ctx.fillStyle = isHL || isSel ? 'rgba(99,102,241,0.9)' : (dark ? 'rgba(12,12,24,0.8)' : 'rgba(255,255,255,0.85)');
                            ctx.beginPath();
                            ctx.ellipse(lx, ly - 2, textWidth / 2 + 5, fontSize / 2 + 2, 0, 0, 2 * Math.PI);
                            ctx.fill();
                            if (isHL || isSel) {
                                ctx.strokeStyle = 'rgba(99,102,241,0.5)';
                                ctx.lineWidth = 1.5;
                                ctx.stroke();
                            }
                            ctx.fillStyle = isHL || isSel ? '#fff' : ptColor;
                            ctx.fillText(p.label, lx, ly);
                        }
                        ctx.restore();
                    }
                    ctx = _savedCtx;
                    gfxDirty = false;
                }

                // === Composite layers ===
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(gridCanvas, 0, 0);
                ctx.drawImage(gfxCanvas, 0, 0);
                ctx.setTransform(canvasDpr, 0, 0, canvasDpr, 0, 0);
                ctx.restore();

                // === Overlays (drawn directly on main ctx) ===
                // Preview for active tools
                if (activeTool && previewMouse.mx > 0 && previewMouse.my > 0) {
                    let wx = pixelToWorld(previewMouse.mx, previewMouse.my);
                    const constructTools = ['segment', 'ray', 'line', 'circle', 'rect', 'tri', 'quad'];
                    let nearPt = findNearbyPoint(wx.x, wx.y);
                    let ixPreview = computeIntersections(wx.x, wx.y);

                    if (constructTools.includes(activeTool)) {
                        // Show snap preview to nearest named point
                        let nearNp = findNearestNamedPoint(wx.x, wx.y);
                        let target = nearNp || (ixPreview ? { x: ixPreview.x, y: ixPreview.y, label: '×' } : null) || nearPt;
                        if (target) {
                            let { px, py } = worldToPixel(target.x, target.y);
                            ctx.save();
                            ctx.globalAlpha = 0.6;
                            ctx.fillStyle = '#10b981';
                            ctx.beginPath(); ctx.arc(px, py, 10, 0, 2 * Math.PI); ctx.fill();
                            ctx.globalAlpha = 1;
                            ctx.fillStyle = '#10b981';
                            ctx.beginPath(); ctx.arc(px, py, 4, 0, 2 * Math.PI); ctx.fill();
                            if (target.label) {
                                ctx.font = '600 12px Outfit, sans-serif';
                                ctx.textAlign = 'center';
                                ctx.fillStyle = '#10b981';
                                ctx.fillText(target.label, px, py - 16);
                            }
                            ctx.restore();
                        }
                    } else if (activeTool === 'point') {
                        let sx, sy, isIx = false;
                        if (ixPreview) { sx = ixPreview.x; sy = ixPreview.y; isIx = true; }
                        else { sx = snapToInteger(wx.x); sy = snapToInteger(wx.y); }
                        let { px, py } = worldToPixel(sx, sy);
                        ctx.save();
                        ctx.globalAlpha = 0.45;
                        ctx.fillStyle = isIx ? '#f59e0b' : '#10b981';
                        ctx.beginPath(); ctx.arc(px, py, 7, 0, 2 * Math.PI); ctx.fill();
                        ctx.globalAlpha = 1;
                        ctx.fillStyle = isIx ? '#f59e0b' : '#10b981';
                        ctx.beginPath(); ctx.arc(px, py, 3, 0, 2 * Math.PI); ctx.fill();
                        ctx.fillStyle = 'rgba(0,0,0,0.7)';
                        ctx.font = '10px "Fira Code", monospace';
                        ctx.textAlign = 'left';
                        let coordStr = isIx ? `×(${sx.toFixed(1)},${sy.toFixed(1)})` : `(${sx.toFixed(0)},${sy.toFixed(0)})`;
                        ctx.fillText(coordStr, px + 12, py - 8);
                        ctx.restore();
                    } else if (activeTool === 'smartDyn') {
                        let dynTarget = findNearestFunctionGraphic(wx.x, wx.y);
                        if (dynTarget) {
                            let { px, py } = worldToPixel(wx.x, wx.y);
                            ctx.save();
                            ctx.globalAlpha = 0.5;
                            ctx.fillStyle = '#10b981';
                            ctx.beginPath(); ctx.arc(px, py, 9, 0, 2 * Math.PI); ctx.fill();
                            ctx.restore();
                            ctx.save();
                            ctx.font = '600 11px Outfit, sans-serif';
                            ctx.textAlign = 'center';
                            ctx.fillStyle = '#10b981';
                            let shortLbl = getGraphicShortLabel(dynTarget);
                            ctx.fillText('✓ ' + shortLbl, px, py - 16);
                            ctx.restore();
                        }
                    } else if (activeTool === 'tangent') {
                        let tanTarget = findNearestFunctionGraphic(wx.x, wx.y);
                        if (tanTarget && tanTarget.getY) {
                            let y = tanTarget.getY(wx.x);
                            if (y !== undefined && isFinite(y)) {
                                let { px, py } = worldToPixel(wx.x, y);
                                ctx.save();
                                ctx.globalAlpha = 0.5;
                                ctx.fillStyle = tanTarget.color;
                                ctx.beginPath(); ctx.arc(px, py, 9, 0, 2 * Math.PI); ctx.fill();
                                ctx.restore();
                                ctx.save();
                                ctx.font = '600 11px Outfit, sans-serif';
                                ctx.textAlign = 'center';
                                ctx.fillStyle = tanTarget.color;
                                ctx.fillText('切线', px, py - 16);
                                ctx.restore();
                            }
                        }
                    } else if (activeTool === 'integral') {
                        let intTarget = findNearestFunctionGraphic(wx.x, wx.y);
                        if (intTarget && intTarget.getY) {
                            let y = intTarget.getY(wx.x);
                            if (y !== undefined && isFinite(y)) {
                                let { px, py } = worldToPixel(wx.x, y);
                                ctx.save();
                                ctx.globalAlpha = 0.5;
                                ctx.fillStyle = intTarget.color;
                                ctx.beginPath(); ctx.arc(px, py, 9, 0, 2 * Math.PI); ctx.fill();
                                ctx.restore();
                                ctx.save();
                                ctx.font = '600 11px Outfit, sans-serif';
                                ctx.textAlign = 'center';
                                ctx.fillStyle = intTarget.color;
                                ctx.fillText('∫ 定积分', px, py - 16);
                                ctx.restore();
                            }
                        }
                    } else if (activeTool === 'distance') {
                        let { px: mpx, py: mpy } = worldToPixel(wx.x, wx.y);
                        ctx.save();
                        ctx.globalAlpha = 0.4;
                        ctx.fillStyle = '#f59e0b';
                        ctx.beginPath(); ctx.arc(mpx, mpy, 7, 0, 2 * Math.PI); ctx.fill();
                        ctx.globalAlpha = 1;
                        ctx.fillStyle = '#f59e0b';
                        ctx.beginPath(); ctx.arc(mpx, mpy, 3, 0, 2 * Math.PI); ctx.fill();
                        if (toolPoints.length === 1) {
                            let { px: p1x, py: p1y } = worldToPixel(toolPoints[0].x, toolPoints[0].y);
                            ctx.globalAlpha = 0.5;
                            ctx.setLineDash([4, 4]);
                            ctx.strokeStyle = '#f59e0b';
                            ctx.lineWidth = 2;
                            ctx.beginPath(); ctx.moveTo(p1x, p1y); ctx.lineTo(mpx, mpy); ctx.stroke();
                            ctx.setLineDash([]);
                            let dist = Math.hypot(wx.x - toolPoints[0].x, wx.y - toolPoints[0].y);
                            ctx.globalAlpha = 0.8;
                            ctx.font = '500 11px "Fira Code", monospace';
                            ctx.textAlign = 'center';
                            ctx.fillStyle = '#f59e0b';
                            ctx.fillText('d=' + dist.toFixed(2), (p1x + mpx) / 2, (p1y + mpy) / 2 - 10);
                        }
                        ctx.restore();
                    } else if (activeTool === 'angle') {
                        let { px: mpx, py: mpy } = worldToPixel(wx.x, wx.y);
                        ctx.save();
                        ctx.globalAlpha = 0.4;
                        ctx.fillStyle = '#8b5cf6';
                        ctx.beginPath(); ctx.arc(mpx, mpy, 7, 0, 2 * Math.PI); ctx.fill();
                        ctx.globalAlpha = 1;
                        ctx.fillStyle = '#8b5cf6';
                        ctx.beginPath(); ctx.arc(mpx, mpy, 3, 0, 2 * Math.PI); ctx.fill();
                        if (toolPoints.length >= 1) {
                            let { px: p1x, py: p1y } = worldToPixel(toolPoints[0].x, toolPoints[0].y);
                            ctx.globalAlpha = 0.5;
                            ctx.setLineDash([4, 4]);
                            ctx.strokeStyle = '#8b5cf6';
                            ctx.lineWidth = 2;
                            ctx.beginPath(); ctx.moveTo(p1x, p1y); ctx.lineTo(mpx, mpy); ctx.stroke();
                            ctx.setLineDash([]);
                        }
                        if (toolPoints.length >= 2) {
                            let { px: p2x, py: p2y } = worldToPixel(toolPoints[1].x, toolPoints[1].y);
                            ctx.globalAlpha = 0.5;
                            ctx.setLineDash([4, 4]);
                            ctx.strokeStyle = '#8b5cf6';
                            ctx.lineWidth = 2;
                            ctx.beginPath(); ctx.moveTo(p2x, p2y); ctx.lineTo(mpx, mpy); ctx.stroke();
                            ctx.setLineDash([]);
                        }
                        ctx.restore();
                    } else if (activeTool === 'area') {
                        let { px: mpx, py: mpy } = worldToPixel(wx.x, wx.y);
                        ctx.save();
                        ctx.globalAlpha = 0.4;
                        ctx.fillStyle = '#10b981';
                        ctx.beginPath(); ctx.arc(mpx, mpy, 7, 0, 2 * Math.PI); ctx.fill();
                        ctx.globalAlpha = 1;
                        ctx.fillStyle = '#10b981';
                        ctx.beginPath(); ctx.arc(mpx, mpy, 3, 0, 2 * Math.PI); ctx.fill();
                        if (toolPoints.length >= 1) {
                            ctx.globalAlpha = 0.4;
                            ctx.strokeStyle = '#10b981';
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            let first = worldToPixel(toolPoints[0].x, toolPoints[0].y);
                            ctx.moveTo(first.px, first.py);
                            for (let i = 1; i < toolPoints.length; i++) {
                                let p = worldToPixel(toolPoints[i].x, toolPoints[i].y);
                                ctx.lineTo(p.px, p.py);
                            }
                            ctx.lineTo(mpx, mpy);
                            ctx.closePath();
                            ctx.fillStyle = 'rgba(16,185,129,0.1)';
                            ctx.fill();
                            ctx.stroke();
                        }
                        ctx.restore();
                    }
                }

                // Draw intersection points if toggled on
                if (showIntersections) {
                    const ipts = computeAllIntersections();
                    ctx.save();
                    for (let ip of ipts) {
                        let { px, py } = worldToPixel(ip.x, ip.y);
                        if (px < -20 || px > LOGICAL_W + 20 || py < -20 || py > LOGICAL_H + 20) continue;
                        ctx.beginPath();
                        ctx.arc(px, py, 4, 0, 2 * Math.PI);
                        ctx.fillStyle = isDark() ? '#0c0c18' : '#ffffff';
                        ctx.fill();
                        ctx.strokeStyle = '#f59e0b';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        ctx.font = '500 10px "Fira Code", monospace';
                        ctx.textAlign = 'left';
                        ctx.textBaseline = 'bottom';
                        const label = `(${ip.x.toFixed(2)}, ${ip.y.toFixed(2)})`;
                        const dark = isDark();
                        const tw = ctx.measureText(label).width;
                        ctx.fillStyle = dark ? 'rgba(12,12,24,0.85)' : 'rgba(255,255,255,0.9)';
                        ctx.fillRect(px + 8, py - 16, tw + 6, 14);
                        ctx.fillStyle = '#f59e0b';
                        ctx.fillText(label, px + 11, py - 4);
                    }
                    ctx.restore();
                }

                updateFunctionListUI();
                updateZoomDisplay();
                updateEmptyHint();
                autoSave();
            }

            function redrawWithAlpha() { gfxDirty = true; redraw(); }

            // ========= Draw Integral Area =========
            function drawIntegralArea(g, alpha) {
                const srcGraphic = graphics.find(sg => sg.id === g.graphicId);
                if (!srcGraphic || !srcGraphic.getY) return;
                const getY = srcGraphic.getY;
                const a = g.intA, b = g.intB;
                if (a >= b) return;
                const steps = 500;
                const dx = (b - a) / steps;

                // Calculate integral value using Simpson's rule (more accurate than trapezoidal)
                let integral = 0;
                const n = steps % 2 === 0 ? steps : steps + 1; // Simpson's rule needs even number of intervals
                const sdx = (b - a) / n;
                let sum = getY(a) + getY(b);
                if (!isFinite(sum)) sum = 0;
                for (let i = 1; i < n; i++) {
                    const x = a + i * sdx;
                    const y = getY(x);
                    if (isFinite(y)) {
                        sum += (i % 2 === 0 ? 2 : 4) * y;
                    }
                }
                integral = sum * sdx / 3;

                // Parse source color to create semi-transparent fill
                let fillCol = g.fillColor;
                if (!fillCol) {
                    // Convert hex color to rgba with 0.25 alpha
                    const hex = g.color.replace('#', '');
                    const r = parseInt(hex.substring(0, 2), 16);
                    const gv = parseInt(hex.substring(2, 4), 16);
                    const bv = parseInt(hex.substring(4, 6), 16);
                    fillCol = `rgba(${r},${gv},${bv},0.25)`;
                }

                // Draw filled area
                ctx.save();
                ctx.globalAlpha = alpha * 0.35;
                ctx.beginPath();
