                        startXMin = xMin; startXMax = xMax; startYMin = yMin; startYMax = yMax;
                    } else if (e.touches.length === 2) {
                        isPan = false;
                        let dx = e.touches[0].clientX - e.touches[1].clientX;
                        let dy = e.touches[0].clientY - e.touches[1].clientY;
                        touchStartDist = Math.sqrt(dx * dx + dy * dy);
                        let rect = canvas.getBoundingClientRect();
                        let sx = LOGICAL_W / rect.width, sy = LOGICAL_H / rect.height;
                        let cmx = ((e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left) * sx;
                        let cmy = ((e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top) * sy;
                        touchStartCenter = pixelToWorld(cmx, cmy);
                        startXMin = xMin; startXMax = xMax; startYMin = yMin; startYMax = yMax;
                    }
                }, { passive: true });
                canvas.addEventListener("touchmove", (e) => {
                    e.preventDefault();
                    if (e.touches.length === 1 && isPan) {
                        let rect = canvas.getBoundingClientRect();
                        let sx = LOGICAL_W / rect.width, sy = LOGICAL_H / rect.height;
                        let mx = (e.touches[0].clientX - rect.left) * sx;
                        let my = (e.touches[0].clientY - rect.top) * sy;
                        let dx = (panStartX - mx) / LOGICAL_W * (startXMax - startXMin);
                        let dy = (panStartY - my) / LOGICAL_H * (startYMax - startYMin);
                        xMin = startXMin + dx; xMax = startXMax + dx;
                        yMin = startYMin + dy; yMax = startYMax + dy;
                        redraw();
                    } else if (e.touches.length === 2 && touchStartCenter) {
                        let dx = e.touches[0].clientX - e.touches[1].clientX;
                        let dy = e.touches[0].clientY - e.touches[1].clientY;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        let scale = touchStartDist / dist;
                        let newW = Math.min(Math.max((startXMax - startXMin) * scale, 0.01), 500);
                        let newH = Math.min(Math.max((startYMax - startYMin) * scale, 0.01), 500);
                        xMin = touchStartCenter.x - (touchStartCenter.x - startXMin) / (startXMax - startXMin) * newW;
                        xMax = xMin + newW;
                        yMin = touchStartCenter.y - (touchStartCenter.y - startYMin) / (startYMax - startYMin) * newH;
                        yMax = yMin + newH;
                        redraw();
                    }
                }, { passive: false });
                canvas.addEventListener("touchend", () => { isPan = false; touchStartCenter = null; });

                // Double-click for area tool
                canvas.addEventListener("dblclick", (e) => {
                    if (activeTool === 'area') {
                        e.preventDefault();
                        // The double-click triggers two mousedown events that each add a point.
                        // Remove the duplicate point from the second mousedown.
                        // The first mousedown's point is kept as the final vertex.
                        if (toolPoints.length > 0) toolPoints.pop();
                        finishAreaMeasurement();
                    }
                });

                // ========= Context Menu =========
                let contextMenuTarget = null;
                const contextMenu = document.getElementById('contextMenu');

                function showContextMenu(x, y, target) {
                    contextMenuTarget = target;
                    contextMenu.style.display = 'block';
                    // Position menu, keeping it within viewport
                    let menuW = contextMenu.offsetWidth, menuH = contextMenu.offsetHeight;
                    let posX = x + 2, posY = y + 2;
                    if (posX + menuW > window.innerWidth) posX = x - menuW - 2;
                    if (posY + menuH > window.innerHeight) posY = y - menuH - 2;
                    contextMenu.style.left = posX + 'px';
                    contextMenu.style.top = posY + 'px';
                }

                function hideContextMenu() {
                    contextMenu.style.display = 'none';
                    contextMenuTarget = null;
                }

                canvas.addEventListener("contextmenu", (e) => {
                    e.preventDefault();
                    if (activeTool) { exitToolMode(); return; }
                    let rect = canvas.getBoundingClientRect();
                    let sx = LOGICAL_W / rect.width, sy = LOGICAL_H / rect.height;
                    let mx = (e.clientX - rect.left) * sx, my = (e.clientY - rect.top) * sy;
                    if (mx >= 0 && mx <= LOGICAL_W && my >= 0 && my <= LOGICAL_H) {
                        let { x, y } = pixelToWorld(mx, my);
                        let hit = hitTestGraphic(x, y);
                        if (hit) {
                            showContextMenu(e.clientX, e.clientY, hit);
                        } else {
                            hideContextMenu();
                        }
                    }
                });

                // Context menu item clicks
                contextMenu.querySelectorAll('.context-item').forEach(item => {
                    item.addEventListener('click', function() {
                        if (!contextMenuTarget) return;
                        const action = this.getAttribute('data-action');
                        const g = contextMenuTarget.graphic;
                        if (action === 'delete') {
                            pushUndo();
                            if (g.id !== undefined) {
                                let idx = graphics.findIndex(gg => gg.id === g.id);
                                if (idx !== -1) { graphics.splice(idx, 1); _cachedIntersections = null; }
                            }
                            gfxDirty = true;
                            redraw();
                            autoSave();
                            showToast('已删除', 'success');
                        } else if (action === 'duplicate') {
                            pushUndo();
                            // Deep clone the graphic spec
                            let spec = {};
                            spec.type = g.type;
                            spec.color = g.color;
                            if (g.params) spec.params = JSON.parse(JSON.stringify(g.params));
                            if (g.points) spec.points = JSON.parse(JSON.stringify(g.points));
                            if (g.x !== undefined) spec.x = g.x + 0.5;
                            if (g.y !== undefined) spec.y = g.y + 0.5;
                            if (g.w !== undefined) spec.w = g.w;
                            if (g.h !== undefined) spec.h = g.h;
                            if (g.cx !== undefined) spec.cx = g.cx + 0.5;
                            if (g.cy !== undefined) spec.cy = g.cy + 0.5;
                            if (g.rx !== undefined) spec.rx = g.rx;
                            if (g.ry !== undefined) spec.ry = g.ry;
                            if (g.lineWidth) spec.lineWidth = g.lineWidth;
                            if (g.strokeDash) spec.strokeDash = g.strokeDash;
                            if (g.fill !== undefined) spec.fill = g.fill;
                            if (g.fillColor) spec.fillColor = g.fillColor;
                            if (g.size) spec.size = g.size;
                            if (g.xExpr) spec.xExpr = g.xExpr;
                            if (g.yExpr) spec.yExpr = g.yExpr;
                            if (g.label) spec.label = g.label;
                            if (g.trail !== undefined) spec.trail = g.trail;
                            if (g.text) spec.text = g.text;
                            if (g.fontSize) spec.fontSize = g.fontSize;
                            if (g.startAngle !== undefined) spec.startAngle = g.startAngle;
                            if (g.endAngle !== undefined) spec.endAngle = g.endAngle;
                            if (g.radius !== undefined) spec.radius = g.radius;
                            // Offset the duplicate
                            if (spec.params && spec.params.cx !== undefined) { spec.params.cx += 0.5; spec.params.cy += 0.5; }
                            if (spec.params && spec.params.k !== undefined) { spec.params.b += 0.5; }
                            if (spec.points) spec.points = spec.points.map(p => [p[0] + 0.5, p[1] + 0.5]);
                            addGraphic(spec, true);
                            showToast('已复制', 'success');
                        } else if (action === 'toggleVisibility') {
                            g.hidden = !g.hidden;
                            gfxDirty = true;
                            redraw();
                            autoSave();
                            showToast(g.hidden ? '已隐藏' : '已显示', 'info');
                        } else if (action === 'editProps') {
                            // Select the graphic in the function list
                            selectedGraphic = g;
                            updateFunctionListUI();
                            showToast('已选中图形，可在列表中查看', 'info');
                        }
                        hideContextMenu();
                    });
                });

                // Close context menu on click elsewhere, ESC, or scroll
                document.addEventListener('click', (e) => {
                    if (!contextMenu.contains(e.target)) hideContextMenu();
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') hideContextMenu();
                });
                document.addEventListener('scroll', hideContextMenu, true);
                canvas.addEventListener('scroll', hideContextMenu);

                // Canvas control buttons
                document.getElementById("zoomInBtn").addEventListener("click", () => zoom(0.9, true));
                document.getElementById("zoomOutBtn").addEventListener("click", () => zoom(1.1, true));
                document.getElementById("fitViewBtn").addEventListener("click", () => fitToAllGraphics(true));
                document.getElementById("resetViewBtn").addEventListener("click", () => resetView(true));
                document.getElementById("saveBtn").addEventListener("click", () => saveCanvasAsPNG());
                document.getElementById("clearAllBtn").addEventListener("click", () => deleteAll());

                // Tangent tool button
                document.getElementById("tangentBtn").addEventListener("click", () => {
                    if (activeTool === 'tangent') { exitToolMode(); return; }
                    exitToolMode();
                    activeTool = 'tangent';
                    toolPoints = [];
                    canvas.style.cursor = 'crosshair';
                    if (toolStatusEl) { toolStatusEl.textContent = '🖱 点击函数曲线以绘制切线 · ESC退出'; toolStatusEl.style.color = '#f59e0b'; toolStatusEl.style.animation = 'pulseBounce 0.5s ease-out'; }
                    document.querySelectorAll('.tt-btn').forEach(b => b.classList.remove('active-tool'));
                });

                // Intersection toggle button
                const savedIntersection = localStorage.getItem('hatscope_show_intersections');
                if (savedIntersection === 'true') {
                    showIntersections = true;
                    document.getElementById("intersectionBtn").classList.add('active-toggle');
                }
                document.getElementById("intersectionBtn").addEventListener("click", () => {
                    showIntersections = !showIntersections;
                    localStorage.setItem('hatscope_show_intersections', showIntersections);
                    document.getElementById("intersectionBtn").classList.toggle('active-toggle', showIntersections);
                    _cachedIntersections = null;
                    redraw();
                    showToast(showIntersections ? '交点标注已开启' : '交点标注已关闭', 'info');
                });

                // Integral tool button
                document.getElementById("integralBtn").addEventListener("click", () => {
                    if (activeTool === 'integral') { exitToolMode(); return; }
                    exitToolMode();
                    activeTool = 'integral';
                    toolPoints = [];
                    canvas.style.cursor = 'crosshair';
                    if (toolStatusEl) { toolStatusEl.textContent = '🖱 点击函数曲线以计算定积分 · ESC退出'; toolStatusEl.style.color = '#f59e0b'; toolStatusEl.style.animation = 'pulseBounce 0.5s ease-out'; }
                    document.querySelectorAll('.tt-btn').forEach(b => b.classList.remove('active-tool'));
                });

                // Integral panel buttons
                document.getElementById("integralCancelBtn").addEventListener("click", () => {
                    document.getElementById("integralPanel").classList.remove("visible");
                    integralTargetGraphic = null;
                });
                document.getElementById("integralConfirmBtn").addEventListener("click", () => {
                    const a = parseFloat(document.getElementById("integralA").value);
                    const b = parseFloat(document.getElementById("integralB").value);
                    if (isNaN(a) || isNaN(b)) { showToast('请输入有效的数值', 'error'); return; }
                    if (a >= b) { showToast('下限 a 必须小于上限 b', 'error'); return; }
                    if (!integralTargetGraphic) { showToast('未选择函数', 'error'); return; }
                    document.getElementById("integralPanel").classList.remove("visible");
                    pushUndo();
                    const srcColor = integralTargetGraphic.color || '#6366f1';
                    const g = createGraphicFromSpec({
                        type: 'integralArea',
                        graphicId: integralTargetGraphic.id,
                        intA: a,
                        intB: b,
                        color: srcColor
                    });
                    if (g) { addGraphic(g, true); }
                    integralTargetGraphic = null;
                    redraw();
                });
                document.getElementById("integralA").addEventListener("keypress", (e) => {
                    if (e.key === "Enter") document.getElementById("integralConfirmBtn").click();
                });
                document.getElementById("integralB").addEventListener("keypress", (e) => {
                    if (e.key === "Enter") document.getElementById("integralConfirmBtn").click();
                });

                // Distance tool button
                document.getElementById("distanceBtn").addEventListener("click", () => {
                    if (activeTool === 'distance') { exitToolMode(); return; }
                    exitToolMode();
                    activeTool = 'distance';
                    toolPoints = [];
                    canvas.style.cursor = 'crosshair';
                    if (toolStatusEl) { toolStatusEl.textContent = '🖱 点击第一个点 · ESC退出'; toolStatusEl.style.color = '#f59e0b'; toolStatusEl.style.animation = 'pulseBounce 0.5s ease-out'; }
                    document.querySelectorAll('.tt-btn').forEach(b => b.classList.remove('active-tool'));
                    updateToolIndicator();
                });

                // Angle tool button
                document.getElementById("angleBtn").addEventListener("click", () => {
                    if (activeTool === 'angle') { exitToolMode(); return; }
                    exitToolMode();
                    activeTool = 'angle';
                    toolPoints = [];
                    canvas.style.cursor = 'crosshair';
                    if (toolStatusEl) { toolStatusEl.textContent = '🖱 点击点A · ESC退出'; toolStatusEl.style.color = '#8b5cf6'; toolStatusEl.style.animation = 'pulseBounce 0.5s ease-out'; }
                    document.querySelectorAll('.tt-btn').forEach(b => b.classList.remove('active-tool'));
                    updateToolIndicator();
                });

                // Area tool button
                document.getElementById("areaBtn").addEventListener("click", () => {
                    if (activeTool === 'area') { exitToolMode(); return; }
                    exitToolMode();
                    activeTool = 'area';
                    toolPoints = [];
                    canvas.style.cursor = 'crosshair';
                    if (toolStatusEl) { toolStatusEl.textContent = '🖱 点击顶点（双击完成） · ESC退出'; toolStatusEl.style.color = '#10b981'; toolStatusEl.style.animation = 'pulseBounce 0.5s ease-out'; }
                    document.querySelectorAll('.tt-btn').forEach(b => b.classList.remove('active-tool'));
                    updateToolIndicator();
                });
            }

            window.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && activeTool) exitToolMode();
                if (e.key === "Enter" && activeTool === 'area') { finishAreaMeasurement(); return; }
                if (e.key === "Escape") {
                    const ip = document.getElementById('integralPanel');
                    if (ip && ip.classList.contains('visible')) {
                        ip.classList.remove('visible');
                        integralTargetGraphic = null;
                    }
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
                if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
                // Slider keyboard control
                if (focusedSliderIndex >= 0 && focusedSliderIndex < sliders.length) {
                    const sObj = sliders[focusedSliderIndex];
                    const step = e.shiftKey ? sObj.step * 0.1 : sObj.step;
                    if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
                        e.preventDefault();
                        sObj.value = Math.max(sObj.min, sObj.value - step);
                        renderSliders(); gfxDirty = true; redraw();
                    } else if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
                        e.preventDefault();
                        sObj.value = Math.min(sObj.max, sObj.value + step);
                        renderSliders(); gfxDirty = true; redraw();
                    } else if (e.key === 'Tab') {
                        // Let Tab propagate naturally to cycle between sliders
                    }
                }
            });

            async function loadApiKey() {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) { API_KEY = cached; return true; }
                try {
                    const res = await fetch('https://api.textdb.online/maoziaikey');
                    if (res.ok) {
                        const text = await res.text();
                        if (text && text.trim() !== 'null') {
                            API_KEY = text.trim();
                            localStorage.setItem(CACHE_KEY, API_KEY);
                            return true;
                        }
                    }
                    throw new Error('获取失败');
                } catch (e) { return false; }
            }

            window.addEventListener('load', async () => {
                loadTheme();
                canvas = document.getElementById("cartesianCanvas");
                ctx = canvas.getContext("2d");
                resizeCanvas();
                let resizeTimer = null;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(resizeCanvas, 200);
                });
                loadSettings();
                setupInteraction();
                buildTopToolbar();
                resetView(false);

                const keyReady = await loadApiKey();
                restoreState();

                if (keyReady) {
                    document.getElementById("sendBtn").addEventListener("click", () => {
                        let input = document.getElementById("userInput");
                        let msg = normalizeExpression(input.value.trim());
                        if (!msg) return;
                        input.value = "";
                        sendToAI(msg);
                    });
                    document.getElementById("userInput").addEventListener("keypress", (e) => {
                        if (e.key === "Enter") document.getElementById("sendBtn").click();
                    });
                } else {
                    document.getElementById("sendBtn").disabled = true;
                    setStatus("密钥未加载，请刷新重试", "error");
                }

                document.getElementById("btnFlash").addEventListener("click", () => {
                    currentModel = "deepseek-v4-flash"; saveModelSetting(); updateModelButtons();
                });
                document.getElementById("btnPro").addEventListener("click", () => {
                    currentModel = "deepseek-v4-pro"; saveModelSetting(); updateModelButtons();
                });
                document.getElementById("btnDeepThink").addEventListener("click", () => {
                    deepThinkEnabled = !deepThinkEnabled;
                    saveDeepThinkSetting(); updateDeepThinkButton();
                    showToast(deepThinkEnabled ? '深度思考已启用' : '深度思考已关闭', 'info');
                    setStatus(deepThinkEnabled ? "深度思考已启用" : "深度思考已关闭", "idle");
                    setTimeout(() => setStatus("就绪", "idle"), 2000);
                });
                document.getElementById("themeToggle").addEventListener("click", toggleTheme);

                document.getElementById("addSliderBtn").addEventListener("click", toggleAddSliderPopup);
                document.getElementById("sliderConfirmBtn").addEventListener("click", confirmAddSlider);
                document.getElementById("sliderCancelBtn").addEventListener("click", () => {
                    document.getElementById('sliderAddPopup').classList.remove('visible');
                });
                document.getElementById("sliderAddPopup").addEventListener("keypress", (e) => {
                    if (e.key === "Enter") confirmAddSlider();
                });

                document.getElementById("kbToggleBtn").addEventListener("click", toggleKeyboard);
                buildKeyboard();
                document.getElementById("exprSendBtn").addEventListener("click", executeExpression);
                document.getElementById("exprInput").addEventListener("keypress", (e) => {
                    if (e.key === "Enter") executeExpression();
                });

                // Undo/Redo buttons
                document.getElementById("undoBtn").addEventListener("click", undo);
                document.getElementById("redoBtn").addEventListener("click", redo);

                // Export/Import JSON
                document.getElementById("exportBtn").addEventListener("click", exportJSON);
                document.getElementById("importBtn").addEventListener("click", () => {
                    document.getElementById("importFileInput").click();
                });
                document.getElementById("importFileInput").addEventListener("change", function() {
                    if (this.files && this.files[0]) {
                        importJSON(this.files[0]);
                        this.value = '';
                    }
                });

            });
        })();
    </script>
</body>
</html>
