<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抛硬币 - 帮你做决定</title>
    <style>
        :root {
            --bg-start: #667eea;
            --bg-end: #764ba2;
            --card-bg: rgba(255,255,255,0.15);
            --card-bg2: rgba(255,255,255,0.1);
            --text: #fff;
            --text-secondary: rgba(255,255,255,0.8);
            --border: rgba(255,255,255,0.3);
            --btn-shadow: rgba(238,90,90,0.4);
            --shadow: rgba(0,0,0,0.3);
        }
        [data-theme="dark"] {
            --bg-start: #0f0c29;
            --bg-end: #1a1a3e;
            --card-bg: rgba(255,255,255,0.08);
            --card-bg2: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.15);
            --btn-shadow: rgba(238,90,90,0.25);
            --shadow: rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            color: var(--text);
            overflow-x: hidden;
            transition: background 0.5s ease;
            padding: 20px 0;
        }

        .container {
            text-align: center;
            padding: 16px 20px;
            max-width: 520px;
            width: 100%;
        }

        /* ---- Header ---- */
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        h1 {
            font-size: 2.2rem;
            text-shadow: 2px 2px 4px var(--shadow);
        }
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .theme-toggle:hover { background: var(--card-bg2); transform: scale(1.1); }
        .subtitle {
            font-size: 0.95rem;
            opacity: 0.85;
            margin-bottom: 24px;
        }

        /* ---- Controls Row ---- */
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
        }
        .controls-row .control-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 10px;
            padding: 6px 12px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
        }
        .controls-row label {
            opacity: 0.8;
            white-space: nowrap;
        }
        .controls-row select {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 6px;
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }
        .controls-row select option { background: #333; color: #fff; }

        /* ---- Custom Mode ---- */
        .custom-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.4s ease, margin 0.4s ease;
            opacity: 0;
            margin: 0;
        }
        .custom-panel.open {
            max-height: 200px;
            opacity: 1;
            margin-bottom: 16px;
        }
        .custom-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .custom-inputs .input-group {
            flex: 1;
            min-width: 120px;
        }
        .custom-inputs label {
            display: block;
            font-size: 0.8rem;
            opacity: 0.8;
            margin-bottom: 4px;
        }
        .custom-inputs input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        .custom-inputs input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 8px rgba(255,215,0,0.3);
        }
        .custom-inputs input::placeholder { color: rgba(255,255,255,0.4); }

        /* ---- Coin(s) ---- */
        .coins-wrapper {
            perspective: 1000px;
            margin: 16px auto;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .coin {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .coin-face {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 0 0 6px rgba(255,255,255,0.08),
                0 8px 25px var(--shadow),
                inset 0 0 25px rgba(0,0,0,0.1);
        }
        .coin-front {
            background: linear-gradient(145deg, #ffd700, #ffed4e);
            color: #b8860b;
        }
        .coin-back {
            background: linear-gradient(145deg, #c0c0c0, #e8e8e8);
            color: #666;
            transform: rotateY(180deg);
        }
        .coin-symbol {
            font-weight: bold;
            line-height: 1.2;
            text-align: center;
            padding: 0 6px;
            word-break: break-all;
        }
        .coin-label {
            font-weight: bold;
            text-align: center;
            padding: 0 4px;
            line-height: 1.2;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .coin.flipping { animation: coinFlip var(--flip-duration, 3s) ease-in-out; }

        @keyframes coinFlip {
            0%   { transform: rotateY(0) rotateX(0); }
            8%   { transform: rotateY(180deg) rotateX(4deg); }
            16%  { transform: rotateY(360deg) rotateX(-4deg); }
            24%  { transform: rotateY(540deg) rotateX(4deg); }
            32%  { transform: rotateY(720deg) rotateX(-4deg); }
            40%  { transform: rotateY(900deg) rotateX(3deg); }
            48%  { transform: rotateY(1080deg) rotateX(-3deg); }
            56%  { transform: rotateY(1260deg) rotateX(3deg); }
            64%  { transform: rotateY(1440deg) rotateX(-2deg); }
            72%  { transform: rotateY(1620deg) rotateX(2deg); }
            82%  { transform: rotateY(1800deg) rotateX(0); }
            100% { transform: rotateY(1800deg) rotateX(0); }
        }

        /* ---- Flip Button ---- */
        .flip-btn {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            color: #fff;
            border: none;
            padding: 16px 44px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
            margin: 8px 0;
            box-shadow: 0 6px 20px var(--btn-shadow);
        }
        .flip-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--btn-shadow);
        }
        .flip-btn:active:not(:disabled) { transform: translateY(0); }
        .flip-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .shortcut-hint {
            font-size: 0.75rem;
            opacity: 0.5;
            margin-bottom: 12px;
        }

        /* ---- Result ---- */
        .result {
            min-height: 44px;
            opacity: 0;
            transition: opacity 0.5s ease;
            margin: 12px 0;
        }
        .result.show { opacity: 1; }

        .result-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 8px;
        }
        .result-chip {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            animation: popIn 0.3s ease-out both;
        }
        .result-chip.front { background: rgba(255,215,0,0.3); color: #ffd700; border: 1px solid rgba(255,215,0,0.5); }
        .result-chip.back  { background: rgba(192,192,192,0.3); color: #e0e0e0; border: 1px solid rgba(192,192,192,0.5); }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .result-text {
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px var(--shadow);
        }

        /* ---- History ---- */
        .section-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 16px 18px;
            margin-top: 20px;
            border: 1px solid var(--border);
            transition: background 0.3s;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .section-header h3 { font-size: 1rem; }
        .section-header .badge {
            background: var(--card-bg2);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            opacity: 0.7;
        }
        .history-list {
            max-height: 140px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            animation: fadeIn 0.3s;
        }
        .history-item:nth-child(odd) { background: var(--card-bg2); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        .history-item .h-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-right: 8px;
        }
        .history-item .h-dot.front { background: #ffd700; }
        .history-item .h-dot.back  { background: #c0c0c0; }
        .history-item .h-label { flex: 1; text-align: left; }
        .history-item .h-time  { font-size: 0.75rem; opacity: 0.5; flex-shrink: 0; margin-left: 8px; }
        .history-empty {
            text-align: center;
            opacity: 0.4;
            font-size: 0.85rem;
            padding: 20px 0;
        }

        /* ---- Stats + Chart ---- */
        .stats-chart-row {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            flex: 1;
            min-width: 160px;
        }
        .stat-item {
            background: var(--card-bg2);
            border-radius: 10px;
            padding: 12px;
        }
        .stat-number { font-size: 1.6rem; font-weight: bold; }
        .stat-number.front { color: #ffd700; }
        .stat-number.back  { color: #c0c0c0; }
        .stat-label { font-size: 0.8rem; opacity: 0.7; margin-top: 2px; }
        .chart-wrapper {
            flex-shrink: 0;
            position: relative;
        }
        .chart-wrapper canvas {
            display: block;
        }
        .chart-center-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.75rem;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            line-height: 1.3;
        }
        .chart-center-text .big { font-size: 1.1rem; }

        .reset-btn {
            background: var(--card-bg2);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 22px;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            margin-top: 12px;
        }
        .reset-btn:hover { background: rgba(255,255,255,0.2); }

        /* ---- Share ---- */
        .result-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .result.show ~ .result-actions,
        .result.show .result-actions { opacity: 1; }
        .share-btn, .copy-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .share-btn:hover, .copy-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .share-btn:active, .copy-btn:active { transform: scale(0.95); }
        .copy-feedback {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-60px);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            pointer-events: none;
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        .copy-feedback.show { transform: translateX(-50%) translateY(0); }

        /* ---- Percentage ---- */
        .stat-percent {
            font-size: 0.75rem;
            opacity: 0.6;
            margin-top: 2px;
        }

        /* ---- Screen Shake ---- */
        body.shake {
            animation: screenShake 0.4s ease-out;
        }
        @keyframes screenShake {
            0%   { transform: translateX(0); }
            15%  { transform: translateX(-8px) translateY(-3px); }
            30%  { transform: translateX(7px) translateY(2px); }
            45%  { transform: translateX(-5px) translateY(-2px); }
            60%  { transform: translateX(4px) translateY(1px); }
            75%  { transform: translateX(-2px); }
            100% { transform: translateX(0); }
        }

        /* ---- Particle Canvas ---- */
        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* ---- Drag Hint ---- */
        .drag-hint {
            font-size: 0.7rem;
            opacity: 0.4;
            margin-top: 4px;
        }

        /* ---- Rounds Result ---- */
        .rounds-result {
            background: var(--card-bg2);
            border-radius: 10px;
            padding: 10px 16px;
            margin-top: 10px;
            font-size: 1rem;
            font-weight: bold;
            animation: popIn 0.4s ease-out;
        }
        .rounds-result.winner-front { border: 1px solid rgba(255,215,0,0.4); color: #ffd700; }
        .rounds-result.winner-back  { border: 1px solid rgba(192,192,192,0.4); color: #e0e0e0; }

        /* ---- Shortcut Hint ---- */
        .shortcut-hint kbd {
            background: var(--card-bg2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 5px;
            font-size: 0.7rem;
            font-family: inherit;
        }

        /* ---- Responsive ---- */
        @media (max-width: 460px) {
            h1 { font-size: 1.7rem; }
            .controls-row { gap: 6px; }
            .controls-row .control-group { padding: 4px 8px; font-size: 0.78rem; }
            .stats-chart-row { flex-direction: column; }
            .flip-btn { padding: 14px 36px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header-row">
        <h1>🪙 抛硬币</h1>
        <button class="theme-toggle" id="themeBtn" title="切换暗色模式">🌙</button>
    </div>
    <p class="subtitle">让命运帮你做决定</p>

    <!-- Controls -->
    <div class="controls-row">
        <div class="control-group">
            <label>模式</label>
            <select id="modeSelect">
                <option value="simple">简单</option>
                <option value="custom">自定义</option>
            </select>
        </div>
        <div class="control-group">
            <label>速度</label>
            <select id="speedSelect">
                <option value="fast">快速</option>
                <option value="standard" selected>标准</option>
                <option value="slow">慢速</option>
            </select>
        </div>
        <div class="control-group">
            <label>枚数</label>
            <select id="countSelect">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
        </div>
        <div class="control-group">
            <label>连抛</label>
            <select id="roundSelect">
                <option value="1">1次</option>
                <option value="3">3次</option>
                <option value="5">5次</option>
                <option value="7">7次</option>
                <option value="10">10次</option>
            </select>
        </div>
    </div>

    <!-- Custom Inputs -->
    <div class="custom-panel" id="customPanel">
        <div class="custom-inputs">
            <div class="input-group">
                <label>选项 A（正面）</label>
                <input type="text" id="optionA" placeholder="如: 吃火锅" maxlength="10">
            </div>
            <div class="input-group">
                <label>选项 B（反面）</label>
                <input type="text" id="optionB" placeholder="如: 吃烤肉" maxlength="10">
            </div>
        </div>
    </div>

    <!-- Coins -->
    <div class="coins-wrapper" id="coinsWrapper"></div>
    <div class="drag-hint">👆 向上拖动硬币也可抛掷</div>

    <!-- Button -->
    <button class="flip-btn" id="flipBtn" onclick="flipCoin()">抛硬币</button>
    <div class="shortcut-hint">
        <kbd>Space</kbd> 抛掷 · <kbd>R</kbd> 重置 · <kbd>1~5</kbd> 枚数 · <kbd>↑↓</kbd> 速度 · <kbd>M</kbd> 模式 · <kbd>D</kbd> 主题
    </div>

    <!-- Result -->
    <div class="result" id="result">
        <div class="result-summary" id="resultSummary"></div>
        <div class="result-text" id="resultText"></div>
        <div id="roundsResult"></div>
    </div>
    <div class="result-actions" id="resultActions">
        <button class="copy-btn" id="copyBtn" onclick="copyResult()">📋 复制结果</button>
    </div>

    <!-- History -->
    <div class="section-card">
        <div class="section-header">
            <h3>📋 历史记录</h3>
            <span class="badge" id="historyBadge">最近 0 条</span>
        </div>
        <div class="history-list" id="historyList">
            <div class="history-empty">还没有抛过硬币</div>
        </div>
    </div>

    <!-- Stats + Chart -->
    <div class="section-card">
        <div class="section-header"><h3>📊 统计分析</h3></div>
        <div class="stats-chart-row">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-number front" id="frontCount">0</div>
                    <div class="stat-label">正面</div>
                    <div class="stat-percent" id="frontPercent">0%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number back" id="backCount">0</div>
                    <div class="stat-label">反面</div>
                    <div class="stat-percent" id="backPercent">0%</div>
                </div>
            </div>
            <div class="chart-wrapper">
                <canvas id="donutChart" width="110" height="110"></canvas>
                <div class="chart-center-text"><span class="big" id="chartTotal">0</span>次</div>
            </div>
        </div>
        <button class="reset-btn" onclick="resetStats()">🗑️ 重置统计</button>
    </div>

</div>

<!-- Particle overlay -->
<canvas id="particleCanvas"></canvas>

<!-- Copy feedback toast -->
<div class="copy-feedback" id="copyFeedback">已复制到剪贴板！</div>

<script>
    // =====================================================================
    //  STATE
    // =====================================================================
    let isFlipping = false;
    let frontCount = 0;
    let backCount  = 0;
    let history    = [];        // [{ result: 'front'|'back', label: string, time: number }]
    const MAX_HISTORY = 20;
    let lastResultText = '';
    let lastResultFrontCount = 0;
    let lastResultBackCount  = 0;

    const SPEED_MAP = { fast: 1000, standard: 3000, slow: 5000 };
    const SPEED_ORDER = ['fast', 'standard', 'slow'];

    // Particle system
    let particles = [];
    let particleCtx = null;
    let particleAnimId = null;

    // =====================================================================
    //  DOM REFS
    // =====================================================================
    const $ = id => document.getElementById(id);
    const coinWrapper = $('coinsWrapper');
    const flipBtn     = $('flipBtn');
    const result      = $('result');
    const resultText  = $('resultText');
    const resultSum   = $('resultSummary');
    const modeSelect  = $('modeSelect');
    const customPanel = $('customPanel');
    const optA        = $('optionA');
    const optB        = $('optionB');
    const speedSelect = $('speedSelect');
    const countSelect = $('countSelect');
    const themeBtn    = $('themeBtn');
    const historyList = $('historyList');
    const historyBadge= $('historyBadge');
    const frontCountEl= $('frontCount');
    const backCountEl = $('backCount');
    const frontPercentEl= $('frontPercent');
    const backPercentEl = $('backPercent');
    const donutCanvas = $('donutChart');
    const chartTotal  = $('chartTotal');
    const ctx         = donutCanvas.getContext('2d');
    const roundSelect = $('roundSelect');
    const roundsResult= $('roundsResult');
    const resultActions= $('resultActions');
    const copyFeedback= $('copyFeedback');
    const particleCanvas= $('particleCanvas');

    // =====================================================================
    //  COIN RENDERING
    // =====================================================================
    function getCoinSize(count) {
        const map = { 1: 180, 2: 140, 3: 110, 4: 90, 5: 80 };
        return map[count] || 180;
    }

    function getFrontLabel() {
        if (modeSelect.value === 'custom') {
            return optA.value.trim() || '正面';
        }
        return '正面';
    }
    function getBackLabel() {
        if (modeSelect.value === 'custom') {
            return optB.value.trim() || '反面';
        }
        return '反面';
    }

    function buildCoins(count) {
        const size = getCoinSize(count);
        const frontLabel = getFrontLabel();
        const backLabel  = getBackLabel();
        const isSimple = modeSelect.value === 'simple';
        const symSize  = size >= 140 ? size * 0.32 : size * 0.28;
        const lblSize  = size >= 140 ? size * 0.11 : size * 0.1;

        coinWrapper.innerHTML = '';
        for (let i = 0; i < count; i++) {
            const div = document.createElement('div');
            div.className = 'coin';
            div.dataset.index = i;
            div.style.width = size + 'px';
            div.style.height = size + 'px';
            div.innerHTML = `
                <div class="coin-face coin-front">
                    <div class="coin-symbol" style="font-size:${symSize}px;${isSimple?'':'font-size:'+(symSize*0.6)+'px'}" data-front>${isSimple ? '正' : frontLabel}</div>
                    ${isSimple ? `<div class="coin-label" style="font-size:${lblSize}px">正面</div>` : ''}
                </div>
                <div class="coin-face coin-back">
                    <div class="coin-symbol" style="font-size:${symSize}px;${isSimple?'':'font-size:'+(symSize*0.6)+'px'}" data-back>${isSimple ? '反' : backLabel}</div>
                    ${isSimple ? `<div class="coin-label" style="font-size:${lblSize}px">反面</div>` : ''}
                </div>
            `;
            coinWrapper.appendChild(div);
        }
    }

    function rebuildCoins() {
        const count = +countSelect.value;
        buildCoins(count);
        // reset any transforms
        document.querySelectorAll('.coin').forEach(c => c.style.transform = '');
        // hide result
        result.classList.remove('show');
    }

    // =====================================================================
    //  CUSTOM MODE TOGGLE
    // =====================================================================
    modeSelect.addEventListener('change', () => {
        customPanel.classList.toggle('open', modeSelect.value === 'custom');
        rebuildCoins();
        result.classList.remove('show');
    });

    optA.addEventListener('input', rebuildCoins);
    optB.addEventListener('input', rebuildCoins);

    countSelect.addEventListener('change', rebuildCoins);
    speedSelect.addEventListener('change', () => {
        result.classList.remove('show');
    });

    // initial
    customPanel.classList.toggle('open', modeSelect.value === 'custom');
    buildCoins(1);

    // Load saved custom options
    function loadCustomOptions() {
        try {
            const saved = localStorage.getItem('coinFlipOptions');
            if (saved) {
                const opts = JSON.parse(saved);
                if (opts.a) optA.value = opts.a;
                if (opts.b) optB.value = opts.b;
                if (opts.mode) {
                    modeSelect.value = opts.mode;
                    customPanel.classList.toggle('open', opts.mode === 'custom');
                }
            }
        } catch(_) {}
    }
    loadCustomOptions();

    // Auto-save custom options
    function saveCustomOptions() {
        try {
            localStorage.setItem('coinFlipOptions', JSON.stringify({
                a: optA.value,
                b: optB.value,
                mode: modeSelect.value
            }));
        } catch(_) {}
    }
    optA.addEventListener('input', saveCustomOptions);
    optB.addEventListener('input', saveCustomOptions);
    modeSelect.addEventListener('change', saveCustomOptions);

    // =====================================================================
    //  AUDIO (Web Audio API — no external files)
    // =====================================================================
    let audioCtx = null;
    function playCoinSound() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // metallic ping
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            const t = audioCtx.currentTime;
            osc.frequency.setValueAtTime(1500, t);
            osc.frequency.exponentialRampToValueAtTime(600, t + 0.12);
            gain.gain.setValueAtTime(0.25, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + 0.15);

            // second layer — rattle
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(2200, t);
            osc2.frequency.exponentialRampToValueAtTime(400, t + 0.2);
            gain2.gain.setValueAtTime(0.1, t);
            gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start(t + 0.03);
            osc2.stop(t + 0.28);
        } catch(_) { /* audio unavailable */ }
    }

    // =====================================================================
    //  VIBRATION
    // =====================================================================
    function vibrate() {
        try { if (navigator.vibrate) navigator.vibrate(40); } catch(_) {}
    }

    // =====================================================================
    //  SCREEN SHAKE
    // =====================================================================
    function screenShake() {
        document.body.classList.remove('shake');
        void document.body.offsetWidth;
        document.body.classList.add('shake');
        setTimeout(() => document.body.classList.remove('shake'), 400);
    }

    // =====================================================================
    //  FLIP LOGIC (single round)
    // =====================================================================
    async function runSingleFlip(roundIndex, totalRounds) {
        const count = +countSelect.value;
        const speed = SPEED_MAP[speedSelect.value] || 3000;

        playCoinSound();
        vibrate();

        if (totalRounds > 1) {
            flipBtn.textContent = `第 ${roundIndex + 1}/${totalRounds} 轮...`;
        }

        // random results
        const results = [];
        for (let i = 0; i < count; i++) {
            results.push(Math.random() < 0.5 ? 'front' : 'back');
        }

        // apply animation to each coin
        const coins = document.querySelectorAll('.coin');
        coins.forEach((c, i) => {
            c.classList.remove('flipping');
            void c.offsetWidth;
            c.style.setProperty('--flip-duration', speed / 1000 + 's');
            c.classList.add('flipping');
        });

        // wait for animation
        await new Promise(resolve => setTimeout(resolve, speed + 100));

        const frontLabel = getFrontLabel();
        const backLabel  = getBackLabel();

        // stop animation & set final angle
        coins.forEach((c, i) => {
            c.classList.remove('flipping');
            const isFront = results[i] === 'front';
            const angle = isFront ? 1800 : 1980;
            c.style.transform = `rotateY(${angle}deg)`;
        });

        // update counts & history
        const fCount = results.filter(r => r === 'front').length;
        const bCount = results.filter(r => r === 'back').length;
        results.forEach(r => {
            const lbl = r === 'front' ? frontLabel : backLabel;
            addHistory(r, lbl);
        });
        frontCount += fCount;
        backCount  += bCount;
        updateStats();

        return { results, fCount, bCount, frontLabel, backLabel };
    }

    // =====================================================================
    //  FLIP LOGIC (main)
    // =====================================================================
    async function flipCoin() {
        if (isFlipping) return;
        isFlipping = true;

        const totalRounds = +roundSelect.value;
        const count = +countSelect.value;

        // prepare DOM
        flipBtn.disabled = true;
        result.classList.remove('show');
        resultSum.innerHTML = '';
        resultText.textContent = '';
        roundsResult.innerHTML = '';

        // Store round results for summary
        const allRounds = [];
        let totalF = 0, totalB = 0;

        for (let r = 0; r < totalRounds; r++) {
            const roundData = await runSingleFlip(r, totalRounds);
            allRounds.push(roundData);
            totalF += roundData.fCount;
            totalB += roundData.bCount;

            // screen shake on last round or every round if fast
            if (r === totalRounds - 1 || SPEED_MAP[speedSelect.value] <= 1000) {
                screenShake();
            }

            // delay between rounds (except last)
            if (r < totalRounds - 1) {
                await new Promise(resolve => setTimeout(resolve, 500));
                // reset coin for next round
                document.querySelectorAll('.coin').forEach(c => {
                    c.style.transform = '';
                });
            }
        }

        // Show final results
        const frontLabel = getFrontLabel();
        const backLabel  = getBackLabel();

        // Result chips from last round
        const lastRound = allRounds[allRounds.length - 1];
        resultSum.innerHTML = lastRound.results.map((r, i) =>
            `<span class="result-chip ${r}" style="animation-delay:${i*0.08}s">${r === 'front' ? frontLabel : backLabel}</span>`
        ).join('');

        if (count === 1 && totalRounds === 1) {
            const r = lastRound.results[0];
            const color = r === 'front' ? '#ffd700' : '#c0c0c0';
            const label = r === 'front' ? frontLabel : backLabel;
            resultText.innerHTML = `🎉 结果是：<span style="color:${color}">${label}</span>`;
        } else if (count > 1 && totalRounds === 1) {
            resultText.textContent = `✨ ${lastRound.fCount} : ${lastRound.bCount}（${lastRound.fCount}个${frontLabel}，${lastRound.bCount}个${backLabel}）`;
        } else {
            // Multiple rounds
            resultText.textContent = `✅ 共抛 ${totalRounds} 轮 · 总计 ${totalF} : ${totalB}`;
            // Determine winner
            if (totalF > totalB) {
                roundsResult.innerHTML = `<div class="rounds-result winner-front">🏆 ${frontLabel} 胜出！（${totalF} vs ${totalB}）</div>`;
                fireParticles('front');
            } else if (totalB > totalF) {
                roundsResult.innerHTML = `<div class="rounds-result winner-back">🏆 ${backLabel} 胜出！（${totalB} vs ${totalF}）</div>`;
                fireParticles('back');
            } else {
                roundsResult.innerHTML = `<div class="rounds-result" style="border:1px solid var(--border)">🤝 平局！（${totalF} : ${totalB}）</div>`;
                fireParticles('both');
            }
        }

        // Save last result for copy
        lastResultFrontCount = totalF;
        lastResultBackCount  = totalB;
        if (totalRounds === 1 && count === 1) {
            const r = lastRound.results[0];
            lastResultText = `🪙 抛硬币结果：${r === 'front' ? frontLabel : backLabel}`;
        } else {
            lastResultText = `🪙 抛硬币 ${totalRounds} 轮结果：${frontLabel} ${totalF} vs ${backLabel} ${totalB}`;
        }

        setTimeout(() => result.classList.add('show'), 80);

        // particles for single round
        if (totalRounds === 1 && count === 1) {
            const r = lastRound.results[0];
            fireParticles(r);
        } else if (totalRounds === 1 && count > 1) {
            fireParticles(lastRound.fCount >= lastRound.bCount ? 'front' : 'back');
        }

        flipBtn.disabled = false;
        flipBtn.textContent = '再抛一次';
        isFlipping = false;
        drawDonut();
    }

    // =====================================================================
    //  HISTORY (localStorage)
    // =====================================================================
    function addHistory(result, label) {
        const entry = { result, label, time: Date.now() };
        history.unshift(entry);
        if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;
        saveHistory();
        renderHistory();
    }

    function loadHistory() {
        try {
            const raw = localStorage.getItem('coinFlipHistory');
            if (raw) { history = JSON.parse(raw); }
        } catch(_) { history = []; }
        renderHistory();
    }

    function saveHistory() {
        try { localStorage.setItem('coinFlipHistory', JSON.stringify(history)); } catch(_) {}
    }

    function renderHistory() {
        historyList.innerHTML = '';
        if (history.length === 0) {
            historyList.innerHTML = '<div class="history-empty">还没有抛过硬币</div>';
            historyBadge.textContent = '最近 0 条';
            return;
        }
        historyBadge.textContent = `最近 ${history.length} 条`;
        history.forEach((entry, idx) => {
            const item = document.createElement('div');
            item.className = 'history-item';
            const isFront = entry.result === 'front';
            const ago = timeAgo(entry.time);
            item.innerHTML = `
                <span class="h-dot ${isFront ? 'front' : 'back'}"></span>
                <span class="h-label">${entry.label}</span>
                <span class="h-time">${ago}</span>
            `;
            historyList.appendChild(item);
        });
    }

    function timeAgo(ts) {
        const sec = Math.floor((Date.now() - ts) / 1000);
        if (sec < 60) return '刚刚';
        const min = Math.floor(sec / 60);
        if (min < 60) return `${min}分钟前`;
        const h = Math.floor(min / 60);
        if (h < 24) return `${h}小时前`;
        return `${Math.floor(h / 24)}天前`;
    }

    // =====================================================================
    //  STATS (localStorage)
    // =====================================================================
    function loadStats() {
        try {
            const raw = localStorage.getItem('coinFlipStats');
            if (raw) {
                const d = JSON.parse(raw);
                frontCount = d.front || 0;
                backCount  = d.back  || 0;
            }
        } catch(_) {}
        updateStats();
        drawDonut();
    }

    function saveStats() {
        try { localStorage.setItem('coinFlipStats', JSON.stringify({ front: frontCount, back: backCount })); } catch(_) {}
    }

    function updateStats() {
        frontCountEl.textContent = frontCount;
        backCountEl.textContent  = backCount;
        const total = frontCount + backCount;
        chartTotal.textContent = total;
        if (total > 0) {
            frontPercentEl.textContent = Math.round(frontCount / total * 100) + '%';
            backPercentEl.textContent  = Math.round(backCount  / total * 100) + '%';
        } else {
            frontPercentEl.textContent = '0%';
            backPercentEl.textContent  = '0%';
        }
        saveStats();
    }

    function resetStats() {
        if (!confirm('确定要重置所有统计和历史记录吗？')) return;
        frontCount = 0;
        backCount  = 0;
        history    = [];
        saveStats();
        saveHistory();
        updateStats();
        renderHistory();
        drawDonut();
        // reset coins
        document.querySelectorAll('.coin').forEach(c => c.style.transform = '');
        result.classList.remove('show');
        flipBtn.textContent = '抛硬币';
    }

    // =====================================================================
    //  DONUT CHART
    // =====================================================================
    function drawDonut() {
        const w = donutCanvas.width, h = donutCanvas.height;
        const total = frontCount + backCount;
        ctx.clearRect(0, 0, w, h);

        if (total === 0) {
            // empty ring
            ctx.beginPath();
            ctx.arc(55, 55, 42, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 10;
            ctx.stroke();
            return;
        }

        const frontAngle = (frontCount / total) * Math.PI * 2;
        const backAngle  = (backCount  / total) * Math.PI * 2;

        // back arc (start from front end)
        ctx.beginPath();
        ctx.arc(55, 55, 42, -Math.PI / 2 + frontAngle, -Math.PI / 2 + frontAngle + backAngle);
        ctx.strokeStyle = '#c0c0c0';
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.stroke();

        // front arc
        ctx.beginPath();
        ctx.arc(55, 55, 42, -Math.PI / 2, -Math.PI / 2 + frontAngle);
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.stroke();

        // only one slice → draw a full circle
        if (frontCount === 0) {
            ctx.beginPath();
            ctx.arc(55, 55, 42, 0, Math.PI * 2);
            ctx.strokeStyle = '#c0c0c0';
            ctx.lineWidth = 10;
            ctx.stroke();
        }
        if (backCount === 0) {
            ctx.beginPath();
            ctx.arc(55, 55, 42, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 10;
            ctx.stroke();
        }
    }

    // =====================================================================
    //  COPY / SHARE
    // =====================================================================
    function copyResult() {
        if (!lastResultText) return;
        const frontLabel = getFrontLabel();
        const backLabel  = getBackLabel();
        const text = `${lastResultText}\n\n📊 累计统计：${frontLabel} ${frontCount} 次 · ${backLabel} ${backCount} 次\n🪙 抛硬币 - 帮你做决定`;
        navigator.clipboard.writeText(text).then(() => {
            copyFeedback.classList.add('show');
            setTimeout(() => copyFeedback.classList.remove('show'), 2000);
        }).catch(() => {
            // fallback
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            copyFeedback.classList.add('show');
            setTimeout(() => copyFeedback.classList.remove('show'), 2000);
        });
    }

    // =====================================================================
    //  PARTICLE SYSTEM
    // =====================================================================
    function initParticleCanvas() {
        particleCanvas.width = window.innerWidth;
        particleCanvas.height = window.innerHeight;
        particleCtx = particleCanvas.getContext('2d');
        window.addEventListener('resize', () => {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        });
    }

    class Particle {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 6 + 2;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed - 4;
            this.gravity = 0.15;
            this.friction = 0.98;
            this.radius = Math.random() * 3 + 1.5;
            this.alpha = 1;
            this.decay = Math.random() * 0.015 + 0.008;
            this.type = type;
            if (type === 'front' || (type === 'both' && Math.random() < 0.5)) {
                this.color = Math.random() < 0.5 ? '#ffd700' : '#ffb700';
            } else {
                this.color = Math.random() < 0.5 ? '#c0c0c0' : '#e0e0e0';
            }
        }
        update() {
            this.vx *= this.friction;
            this.vy *= this.friction;
            this.vy += this.gravity;
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= this.decay;
        }
        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = Math.max(0, this.alpha);
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function fireParticles(type) {
        if (!particleCtx) initParticleCanvas();
        // Get coin center position
        const coins = document.querySelectorAll('.coin');
        if (coins.length === 0) return;
        const coin = coins[Math.floor(coins.length / 2)];
        const rect = coin.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        const count = type === 'both' ? 80 : 60;
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(cx, cy, type));
        }
        if (!particleAnimId) animateParticles();
    }

    function animateParticles() {
        if (!particleCtx) return;
        particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
        particles = particles.filter(p => p.alpha > 0);
        particles.forEach(p => {
            p.update();
            p.draw(particleCtx);
        });
        if (particles.length > 0) {
            particleAnimId = requestAnimationFrame(animateParticles);
        } else {
            particleAnimId = null;
        }
    }

    // =====================================================================
    //  DRAG TO FLIP
    // =====================================================================
    (function initDragFlip() {
        let startY = 0;
        let isDragging = false;
        const wrapper = coinWrapper;

        function onStart(e) {
            if (isFlipping) return;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startY = clientY;
            isDragging = true;
        }

        function onEnd(e) {
            if (!isDragging || isFlipping) { isDragging = false; return; }
            const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            const diff = startY - clientY;
            isDragging = false;
            if (diff > 60) {
                e.preventDefault();
                flipCoin();
            }
        }

        wrapper.addEventListener('mousedown', onStart);
        wrapper.addEventListener('touchstart', onStart, { passive: true });
        document.addEventListener('mouseup', onEnd);
        document.addEventListener('touchend', onEnd, { passive: true });
    })();

    // =====================================================================
    //  KEYBOARD SHORTCUTS
    // =====================================================================
    document.addEventListener('keydown', (e) => {
        if (document.activeElement?.tagName === 'INPUT') {
            if (e.code === 'Escape') document.activeElement.blur();
            return;
        }

        switch (e.code) {
            case 'Space':
                e.preventDefault();
                flipCoin();
                break;
            case 'KeyR':
                e.preventDefault();
                resetStats();
                break;
            case 'KeyM':
                e.preventDefault();
                modeSelect.value = modeSelect.value === 'simple' ? 'custom' : 'simple';
                modeSelect.dispatchEvent(new Event('change'));
                break;
            case 'KeyD':
                e.preventDefault();
                themeBtn.click();
                break;
            case 'ArrowUp':
                e.preventDefault();
                {
                    const idx = SPEED_ORDER.indexOf(speedSelect.value);
                    if (idx < SPEED_ORDER.length - 1) {
                        speedSelect.value = SPEED_ORDER[idx + 1];
                        speedSelect.dispatchEvent(new Event('change'));
                    }
                }
                break;
            case 'ArrowDown':
                e.preventDefault();
                {
                    const idx = SPEED_ORDER.indexOf(speedSelect.value);
                    if (idx > 0) {
                        speedSelect.value = SPEED_ORDER[idx - 1];
                        speedSelect.dispatchEvent(new Event('change'));
                    }
                }
                break;
            case 'Digit1': case 'Digit2': case 'Digit3': case 'Digit4': case 'Digit5':
                e.preventDefault();
                const num = parseInt(e.code.replace('Digit', ''));
                if (num >= 1 && num <= 5) {
                    countSelect.value = String(num);
                    countSelect.dispatchEvent(new Event('change'));
                }
                break;
        }
    });

    // =====================================================================
    //  DARK MODE
    // =====================================================================
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
        try { localStorage.setItem('coinFlipTheme', theme); } catch(_) {}
    }

    function initTheme() {
        const saved = localStorage.getItem('coinFlipTheme');
        if (saved) {
            applyTheme(saved);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            applyTheme('dark');
        } else {
            applyTheme('light');
        }
    }

    themeBtn.addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-theme');
        applyTheme(cur === 'dark' ? 'light' : 'dark');
    });

    // listen for system change
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (!localStorage.getItem('coinFlipTheme')) {
            applyTheme(e.matches ? 'dark' : 'light');
        }
    });

    // =====================================================================
    //  INIT
    // =====================================================================
    initTheme();
    loadHistory();
    loadStats();
</script>
