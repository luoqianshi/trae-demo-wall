<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typewriter Nav — TRAE Demo Wall</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, sans-serif;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(34,197,94,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(34,197,94,0.04) 0%, transparent 40%);
    }

    /* Navbar */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      background: rgba(10,10,10,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent;
      transition: all 0.3s ease;
      z-index: 50;
    }
    nav.scrolled {
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom-color: rgba(255,255,255,0.05);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .logo-img {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: #fff;
      display: grid; place-items: center;
      font-size: 10px; font-weight: 800; color: #0a0a0a;
    }
    .brand-insert { color: #22c55e; }
    .cursor {
      display: inline-block;
      width: 2px; height: 1em;
      background: #fff;
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .nav-links { display: flex; gap: 8px; }
    .nav-btn {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 14px; font-weight: 500;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.2s ease;
    }
    .nav-btn:hover {
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.15);
    }
    .nav-btn.active {
      color: #fff;
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }

    /* Content */
    .content {
      padding-top: 140px;
      max-width: 720px;
      margin: 0 auto;
      padding-left: 32px;
      padding-right: 32px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 999px;
      font-size: 12px;
      color: #22c55e;
      background: rgba(34,197,94,0.08);
      margin-bottom: 20px;
      font-family: 'JetBrains Mono', monospace;
    }
    .content h1 {
      font-size: 36px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    .content p {
      color: #a1a1aa;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .specs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 32px;
    }
    .spec {
      background: rgba(24,24,27,0.6);
      border: 1px solid rgba(39,39,42,0.8);
      border-radius: 12px;
      padding: 16px;
    }
    .spec label {
      font-size: 11px;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 6px;
      display: block;
    }
    .spec value {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
  </style>
</head>
<body>
  <nav id="nav">
    <div class="logo">
      <div class="logo-img">T</div>
      <span>TRAE</span><span class="brand-insert" id="insert"></span><span class="cursor" id="cursor"></span><span> Demo Wall</span>
    </div>
    <div class="nav-links">
      <a href="#" class="nav-btn active">首页</a>
      <a href="#" class="nav-btn">灵感孵化舱</a>
      <a href="#" class="nav-btn">TRAE Idea Hall</a>
    </div>
  </nav>

  <div class="content">
    <div class="badge">Typewriter Animation</div>
    <h1>纯 JS 打字机效果</h1>
    <p>导航栏品牌标题的打字机动效，不使用任何第三方动画库。通过 <code style="background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;color:#e4e4e7;font-family:'JetBrains Mono',monospace;font-size:13px;">setTimeout</code> 链式调用实现逐字输入与删除，配合 CSS 闪烁光标，形成循环播放的品牌叙事。</p>

    <div class="specs">
      <div class="spec"><label>Type Speed</label><value>80ms</value></div>
      <div class="spec"><label>Delete Speed</label><value>40ms</value></div>
      <div class="spec"><label>Pause</label><value>5000ms</value></div>
    </div>
  </div>

  <script>
    const insert = document.getElementById('insert');
    const cursor = document.getElementById('cursor');
    const FULL = ' AI Creativity Competition';
    const TYPE_SPEED = 80, DELETE_SPEED = 40, PAUSE = 5000;
    let text = '', timer = null;

    function type() {
      if (text.length < FULL.length) {
        text = FULL.slice(0, text.length + 1);
        insert.textContent = text;
        timer = setTimeout(type, TYPE_SPEED);
      } else {
        cursor.style.animation = 'blink 1s step-end infinite';
        timer = setTimeout(del, PAUSE);
      }
    }
    function del() {
      if (text.length > 0) {
        cursor.style.animation = 'none';
        text = text.slice(0, -1);
        insert.textContent = text;
        timer = setTimeout(del, DELETE_SPEED);
      } else {
        cursor.style.animation = 'blink 1s step-end infinite';
        timer = setTimeout(type, PAUSE);
      }
    }
    type();

    window.addEventListener('scroll', () => {
      document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50);
    });
  </script>
</body>
</html>
