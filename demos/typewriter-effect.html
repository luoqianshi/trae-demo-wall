<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRAE Demo Wall - Typewriter Effect Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    }
    .container { text-align: center; }
    .logo-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 20px;
    }
    .logo-row img { width: 32px; height: 32px; }
    .brand {
      font-size: 20px; font-weight: 700; color: #fff;
      display: flex; align-items: center; white-space: nowrap;
    }
    .brand .base { color: #fff; }
    .brand .insert { color: #22c55e; }
    .cursor {
      display: inline-block; width: 2px; height: 1em;
      background: #fff; margin-left: 2px; vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .subtitle {
      font-size: 14px; color: #71717a;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border: 1px solid rgba(34,197,94,0.3);
      border-radius: 999px; font-size: 12px; color: #22c55e;
      background: rgba(34,197,94,0.08); margin-bottom: 16px;
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Typewriter Animation</div>
    <div class="logo-row">
      <img src="../public/trae-black.png" alt="TRAE">
      <div class="brand">
        <span class="base">TRAE</span><span class="insert" id="insert"></span><span class="cursor"></span><span class="base"> Demo Wall</span>
      </div>
    </div>
    <p class="subtitle">Pure JS setTimeout · 80ms type / 40ms delete · 5s pause loop</p>
  </div>
  <script>
    const insert = document.getElementById('insert');
    const FULL = ' AI Creativity Competition';
    const TYPE_SPEED = 80, DELETE_SPEED = 40, PAUSE = 5000;
    let text = '', timer = null;

    function type() {
      if (text.length < FULL.length) {
        text = FULL.slice(0, text.length + 1);
        insert.textContent = text;
        timer = setTimeout(type, TYPE_SPEED);
      } else {
        timer = setTimeout(del, PAUSE);
      }
    }
    function del() {
      if (text.length > 0) {
        text = text.slice(0, -1);
        insert.textContent = text;
        timer = setTimeout(del, DELETE_SPEED);
      } else {
        timer = setTimeout(type, PAUSE);
      }
    }
    type();
  </script>
</body>
</html>
