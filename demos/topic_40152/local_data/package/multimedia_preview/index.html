<!-- multimedia_preview.html -->
<div class="image-preview-modal">
    <div class="image-preview-container">
        <!-- 图片容器 -->
        <div class="image-drag-container">
            <img class="image-preview" data-scale="{{scale}}" data-x="{{x}}" data-y="{{y}}" alt="{{fileName}}"
                src="{{path}}" onerror="this.onerror=null; this.src='{{default-image}}'">
        </div>

        <!-- 视频容器 -->
        <video class="video-preview" id="modal-video" controls style="display: none;"></video>

        <!-- 控制栏 - 横板布局，居中于底部上方 -->
        <div class="image-controls">
            <!-- 独立圆形气泡显示缩放百分比 -->
            <div class="zoom-info">{{scalePercent}}%</div>
            <div class="controls-row">
                <button class="control-button zoom-in-btn" title="放大">+</button>
                <button class="control-button zoom-out-btn" title="缩小">−</button>
                <button class="control-button reset-button" title="重置缩放">
                    <i class="fa-solid fa-arrows-rotate fa-fw"></i>
                </button>
                <button class="control-button close-button" title="关闭">×</button>
            </div>
        </div>

        <!-- 底部文件信息 -->
        <div class="image-info">{{filePath}}</div>
    </div>
</div>
