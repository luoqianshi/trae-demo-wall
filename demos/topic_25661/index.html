<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 智能备课 · 体验版</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          paper: { 50: '#fbfaf7', 100: '#f4f1ea', 200: '#e9e3d6' },
          ink: { 50: '#f5f5f4', 100: '#e7e5e1', 200: '#cfcbc4', 300: '#a8a29a', 400: '#78716b', 500: '#57534f', 600: '#44403c', 700: '#292524', 800: '#1c1917' },
          clay: { 50: '#fdf3ef', 100: '#fbe4da', 500: '#d97757', 600: '#c2603f' },
        },
        fontFamily: { serif: ['"Noto Serif SC"', 'serif'] },
      },
    },
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet" />
<style>
  body { background: #f4f1ea; }
  .prose-lesson h1 { font-size: 1.6rem; font-weight: 700; margin: 0.8rem 0; color: #292524; font-family: "Noto Serif SC", serif; }
  .prose-lesson h2 { font-size: 1.2rem; font-weight: 700; margin: 1.1rem 0 0.5rem; color: #c2603f; font-family: "Noto Serif SC", serif; border-left: 3px solid #d97757; padding-left: 0.6rem; }
  .prose-lesson h3 { font-size: 1.02rem; font-weight: 600; margin: 0.8rem 0 0.4rem; color: #44403c; }
  .prose-lesson p { margin: 0.45rem 0; line-height: 1.85; color: #44403c; }
  .prose-lesson ul, .prose-lesson ol { margin: 0.4rem 0 0.4rem 1.4rem; line-height: 1.85; color: #44403c; }
  .prose-lesson li { margin: 0.2rem 0; }
  .prose-lesson strong { color: #292524; }
  .prose-lesson table { border-collapse: collapse; margin: 0.6rem 0; width: 100%; }
  .prose-lesson th, .prose-lesson td { border: 1px solid #e9e3d6; padding: 0.4rem 0.6rem; text-align: left; }
  @keyframes blink { 0%, 100% { opacity: 1 } 50% { opacity: 0 } }
  .caret { animation: blink 1s step-end infinite; }
</style>
</head>
<body class="text-ink-800">
<div class="mx-auto max-w-[1240px] px-6 py-8">
  <header class="mb-7">
    <h1 class="font-serif text-3xl font-bold text-ink-700">AI 智能备课 · 体验版</h1>
    <p class="mt-1.5 text-sm text-ink-500">
      输入课程名称，大模型自动填充学科、年级、课时数、教学风格与内容要点（均可手动修改）；点击「AI 生成教案」实时流式生成完整教案。
    </p>
  </header>

  <div class="grid grid-cols-1 gap-6 lg:grid-cols-[minmax(0,440px)_1fr]">
    <section class="h-fit rounded-2xl border border-ink-100 bg-paper-50 p-6 shadow-sm">
      <div class="mb-5 flex items-center gap-2 text-ink-700">
        <span class="text-clay-500">📄</span>
        <h2 class="font-serif text-lg font-bold">课程信息</h2>
      </div>

      <div class="space-y-5">
        <div>
          <label class="mb-1.5 block text-sm font-medium text-ink-600">课程名称 <span class="text-clay-500">*</span></label>
          <div class="relative">
            <input id="courseName" placeholder="例如：分数的初步认识"
              class="w-full rounded-lg border border-ink-100 bg-paper-50 px-3 py-2 text-sm text-ink-800 outline-none transition focus:border-ink-400 focus:ring-2 focus:ring-ink-200" />
            <span id="matchingHint" class="absolute right-3 top-1/2 hidden -translate-y-1/2 items-center gap-1 text-xs text-clay-500">
              <span class="inline-block h-3 w-3 animate-spin rounded-full border-2 border-clay-500 border-t-transparent"></span> 匹配中
            </span>
          </div>
          <p class="mt-1 flex items-center gap-1 text-xs text-ink-400">
            <span class="text-clay-500">✨</span>
            输入课程名称后将自动匹配下方学科、年级、课时数、教学风格与内容要点，可手动修改
          </p>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="mb-1.5 block text-sm font-medium text-ink-600">学科</label>
            <select id="subject" class="w-full rounded-lg border border-ink-100 bg-paper-50 px-3 py-2 text-sm text-ink-800 outline-none focus:border-ink-400 focus:ring-2 focus:ring-ink-200"></select>
          </div>
          <div>
            <label class="mb-1.5 block text-sm font-medium text-ink-600">年级 / 学段</label>
            <select id="grade" class="w-full rounded-lg border border-ink-100 bg-paper-50 px-3 py-2 text-sm text-ink-800 outline-none focus:border-ink-400 focus:ring-2 focus:ring-ink-200"></select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="mb-1.5 block text-sm font-medium text-ink-600">课时数</label>
            <input id="periods" type="number" min="1" max="20" value="1"
              class="w-full rounded-lg border border-ink-100 bg-paper-50 px-3 py-2 text-sm text-ink-800 outline-none focus:border-ink-400 focus:ring-2 focus:ring-ink-200" />
          </div>
          <div>
            <label class="mb-1.5 block text-sm font-medium text-ink-600">教学风格</label>
            <select id="style" class="w-full rounded-lg border border-ink-100 bg-paper-50 px-3 py-2 text-sm text-ink-800 outline-none focus:border-ink-400 focus:ring-2 focus:ring-ink-200"></select>
          </div>
        </div>

        <div>
          <label class="mb-1.5 block text-sm font-medium text-ink-600">教学内容要点 <span class="text-clay-500">*</span></label>
          <textarea id="content" class="h-28 w-full resize-none rounded-lg border border-ink-100 bg-paper-50 px-3 py-2 text-sm leading-relaxed text-ink-800 outline-none focus:border-ink-400 focus:ring-2 focus:ring-ink-200"
            placeholder="描述本课要讲的核心知识点，可分条列出。"></textarea>
        </div>

        <div>
          <label class="mb-1.5 block text-sm font-medium text-ink-600">教学目标偏好（选填）</label>
          <textarea id="objectives" class="h-20 w-full resize-none rounded-lg border border-ink-100 bg-paper-50 px-3 py-2 text-sm leading-relaxed text-ink-800 outline-none focus:border-ink-400 focus:ring-2 focus:ring-ink-200"
            placeholder="可补充期望达成的具体目标或特殊要求"></textarea>
        </div>

        <button id="genBtn"
          class="flex w-full items-center justify-center gap-2 rounded-lg bg-ink-600 px-4 py-3 text-sm font-semibold text-paper-50 shadow-sm transition hover:-translate-y-0.5 hover:bg-ink-700 disabled:cursor-not-allowed disabled:opacity-50 disabled:hover:translate-y-0">
          <span>✨</span> AI 生成教案
        </button>
      </div>

      <div class="mt-4 flex items-start gap-2 rounded-lg bg-paper-100 p-3 text-xs text-ink-500">
        <span class="mt-0.5 shrink-0 text-ink-400">ℹ️</span>
        <span>体验版直连大模型网关（gemini-2.5-pro）实时生成，自动填充与教案均为真实模型输出。</span>
      </div>
    </section>

    <section class="flex flex-col rounded-2xl border border-ink-100 bg-paper-50 shadow-sm">
      <div class="flex items-center justify-between border-b border-ink-100 px-6 py-4">
        <div class="flex items-center gap-2 text-ink-700">
          <span class="text-clay-500">⚡</span>
          <h2 class="font-serif text-lg font-bold">教案预览</h2>
          <span id="genHint" class="hidden items-center gap-1 text-xs text-clay-500">
            <span class="inline-block h-3 w-3 animate-spin rounded-full border-2 border-clay-500 border-t-transparent"></span> 生成中
          </span>
        </div>
      </div>
      <div id="preview" class="prose-lesson min-h-[460px] max-h-[calc(100vh-220px)] overflow-y-auto px-7 py-6">
        <div id="placeholder" class="flex h-[400px] flex-col items-center justify-center text-center text-ink-300">
          <div class="mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-paper-100 text-3xl">📄</div>
          <p class="font-serif text-lg text-ink-400">填写左侧课程信息，点击「AI 生成教案」</p>
          <p class="mt-1 text-sm">教案内容将在此处实时呈现</p>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
  const GATEWAY = 'https://search.bytedance.net/gpt/openapi/online/v2/crawl'
  const AK = 'y72gi3T5j0FG7FuJHjEtR87m1KleuLy1_GPT_AK'
  const MODEL = 'gemini-2.5-pro'
  const chatUrl = () => GATEWAY + '?ak=' + encodeURIComponent(AK)

  const SUBJECTS = ['语文','数学','英语','物理','化学','生物','历史','地理','政治','信息技术','音乐','美术','体育','其他']
  const GRADES = ['小学低年级','小学中年级','小学高年级','初中一年级','初中二年级','初中三年级','高中一年级','高中二年级','高中三年级','大学/高职']
  const STYLES = ['讲授式','探究式','启发式','合作学习','项目式学习','翻转课堂']

  const $ = (id) => document.getElementById(id)
  SUBJECTS.forEach((s) => $('subject').add(new Option(s, s)))
  GRADES.forEach((g) => $('grade').add(new Option(g, g)))
  $('style').add(new Option('不限', ''))
  STYLES.forEach((s) => $('style').add(new Option(s, s)))
  $('subject').value = '语文'
  $('grade').value = '小学中年级'

  let autoContent = ''
  let autoPeriods = 1
  let autoStyle = ''
  let matchedName = ''
  let matching = false

  function extractJson(text) {
    const stripped = text.replace(/```(?:json)?/gi, '').trim()
    const start = stripped.indexOf('{')
    const end = stripped.lastIndexOf('}')
    if (start !== -1 && end !== -1 && end > start) return stripped.slice(start, end + 1)
    return stripped
  }

  async function callChat(messages, opts) {
    opts = opts || {}
    const resp = await fetch(chatUrl(), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: MODEL,
        stream: false,
        temperature: opts.temperature != null ? opts.temperature : 0.5,
        max_tokens: opts.maxTokens != null ? opts.maxTokens : 2048,
        messages,
      }),
    })
    if (!resp.ok) {
      const detail = await resp.text().catch(() => '')
      throw new Error('大模型接口请求失败 (' + resp.status + ') ' + detail)
    }
    const json = await resp.json()
    return (json.choices && json.choices[0] && json.choices[0].message && json.choices[0].message.content) || ''
  }

  async function handleMatch() {
    const name = $('courseName').value.trim()
    if (!name || name === matchedName || matching) return
    matching = true
    matchedName = name
    $('matchingHint').classList.remove('hidden')
    $('matchingHint').classList.add('flex')
    try {
      const system =
        '你是中小学课程专家。根据给定的课程/课题名称，判断它最可能所属的学科、适用年级学段，提炼 3-5 条核心教学内容要点，并给出建议课时数与最合适的教学风格。' +
        '学科只能从以下取值中选择：' + SUBJECTS.join('、') + '。' +
        '年级学段只能从以下取值中选择：' + GRADES.join('、') + '。' +
        '教学风格只能从以下取值中选择：' + STYLES.join('、') + '。' +
        'periods 为建议课时数（1-8 的整数）。' +
        '严格输出 JSON：{"subject":"学科","grade":"年级学段","content":"要点1；要点2；要点3","periods":课时数整数,"style":"教学风格"}，content 用中文分号分隔，不要输出多余文字。'
      const raw = await callChat(
        [
          { role: 'system', content: system },
          { role: 'user', content: '课程名称：' + name },
        ],
        { temperature: 0.3, maxTokens: 8192 },
      )
      const parsed = JSON.parse(extractJson(raw))
      const subject = SUBJECTS.includes(parsed.subject) ? parsed.subject : ''
      const grade = GRADES.includes(parsed.grade) ? parsed.grade : ''
      const metaContent = typeof parsed.content === 'string' && parsed.content.trim() ? parsed.content.trim() : ''
      const periodsNum = Math.round(Number(parsed.periods))
      const metaPeriods = Number.isFinite(periodsNum) && periodsNum >= 1 ? Math.min(periodsNum, 20) : 1
      const metaStyle = STYLES.includes(parsed.style) ? parsed.style : ''

      const curContent = $('content').value
      const keepContent = curContent.trim() && curContent !== autoContent
      const nextContent = keepContent ? curContent : metaContent

      const curPeriods = Number($('periods').value) || 1
      const keepPeriods = curPeriods !== autoPeriods
      const nextPeriods = keepPeriods ? curPeriods : (metaPeriods || curPeriods)

      const curStyle = $('style').value
      const keepStyle = curStyle !== autoStyle
      const nextStyle = keepStyle ? curStyle : metaStyle

      if (subject) $('subject').value = subject
      if (grade) $('grade').value = grade
      $('content').value = nextContent
      $('periods').value = nextPeriods
      $('style').value = nextStyle

      autoContent = nextContent
      autoPeriods = nextPeriods
      autoStyle = nextStyle
    } catch (e) {
      console.error(e)
      alert('自动填充失败：' + e.message)
    } finally {
      matching = false
      $('matchingHint').classList.add('hidden')
      $('matchingHint').classList.remove('flex')
    }
  }

  $('courseName').addEventListener('blur', handleMatch)
  $('courseName').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); e.target.blur() }
  })

  let generating = false

  function buildPrompt() {
    const system =
      '你是一位资深的教学设计专家与一线教师。请依据教师提供的课程信息，输出一份结构完整、专业规范、可直接用于课堂的教案。' +
      '使用规范的 Markdown 格式，必须包含以下章节（用二级标题 ##）：教学目标、教学重点与难点、教学方法、教学准备、教学过程、板书设计、作业布置、教学反思。' +
      '其中"教学过程"需分为导入新课、讲授新课、巩固练习、课堂小结等环节，并给出具体的师生活动与设计意图，内容要充实、可操作。' +
      '开头用一级标题 # 写明教案标题。语言精炼专业，符合中文教学文档习惯。'
    const lines = [
      '课程名称：' + $('courseName').value,
      '学科：' + $('subject').value,
      '年级 / 学段：' + $('grade').value,
      '课时数：' + $('periods').value + ' 课时',
      '教学内容要点：' + $('content').value,
    ]
    if ($('objectives').value) lines.push('教学目标偏好：' + $('objectives').value)
    if ($('style').value) lines.push('教学风格偏好：' + $('style').value)
    return { system: system, user: '请根据以下课程信息生成完整教案：\n' + lines.join('\n') }
  }

  async function handleGenerate() {
    if (generating) return
    if (!$('courseName').value.trim() || !$('content').value.trim()) {
      alert('请先填写课程名称与教学内容要点')
      return
    }
    generating = true
    $('genBtn').disabled = true
    $('genHint').classList.remove('hidden')
    $('genHint').classList.add('flex')
    const ph = $('placeholder'); if (ph) ph.remove()
    const preview = $('preview')
    preview.innerHTML = '<div id="md"></div><span id="caret" class="caret ml-0.5 inline-block h-4 w-1.5 translate-y-0.5 bg-clay-500"></span>'
    let full = ''
    try {
      const p = buildPrompt()
      const resp = await fetch(chatUrl(), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: MODEL,
          stream: true,
          temperature: 0.7,
          max_tokens: 8192,
          messages: [
            { role: 'system', content: p.system },
            { role: 'user', content: p.user },
          ],
        }),
      })
      if (!resp.ok || !resp.body) {
        const detail = await resp.text().catch(() => '')
        throw new Error('大模型接口请求失败 (' + resp.status + ') ' + detail)
      }
      const reader = resp.body.getReader()
      const decoder = new TextDecoder()
      let buffer = ''
      while (true) {
        const r = await reader.read()
        if (r.done) break
        buffer += decoder.decode(r.value, { stream: true })
        const parts = buffer.split('\n')
        buffer = parts.pop() || ''
        for (const line of parts) {
          const trimmed = line.trim()
          if (!trimmed.startsWith('data:')) continue
          const data = trimmed.slice(5).trim()
          if (data === '[DONE]') break
          try {
            const json = JSON.parse(data)
            const delta = json.choices && json.choices[0] && json.choices[0].delta && json.choices[0].delta.content
            if (delta) {
              full += delta
              $('md').innerHTML = marked.parse(full)
              preview.scrollTop = preview.scrollHeight
            }
          } catch (err) {}
        }
      }
      const c = $('caret'); if (c) c.remove()
      $('md').innerHTML = marked.parse(full)
      const tip = document.createElement('div')
      tip.className = 'mt-6 flex items-center gap-2 rounded-lg bg-ink-50 px-4 py-3 text-sm text-ink-600'
      tip.textContent = '✅ 教案生成完成。'
      preview.appendChild(tip)
    } catch (e) {
      console.error(e)
      preview.innerHTML = '<div class="rounded-lg bg-red-50 px-4 py-3 text-sm text-red-700">生成失败：' + e.message + '</div>'
    } finally {
      generating = false
      $('genBtn').disabled = false
      $('genHint').classList.add('hidden')
      $('genHint').classList.remove('flex')
    }
  }

  $('genBtn').addEventListener('click', handleGenerate)
</script>
</body>
</html>
