<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeFlow - Rust CLI 引擎演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #58a6ff;
            font-size: 2.5rem;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
        }

        .header p {
            color: #8b949e;
            font-size: 1rem;
            line-height: 1.6;
        }

        .run-btn {
            display: block;
            width: 100%;
            padding: 18px 30px;
            margin: 30px 0;
            background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
            color: #ffffff;
            border: 2px solid #3fb950;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .run-btn:hover {
            background: linear-gradient(135deg, #2ea043 0%, #3fb950 100%);
            box-shadow: 0 0 20px rgba(63, 185, 80, 0.4);
            transform: translateY(-2px);
        }

        .run-btn:active {
            transform: translateY(0);
        }

        .run-btn:disabled {
            background: #21262d;
            border-color: #30363d;
            color: #484f58;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .terminal {
            background-color: #010409;
            border: 2px solid #30363d;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .terminal-header {
            background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #30363d;
        }

        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .terminal-dot.red { background-color: #f85149; }
        .terminal-dot.yellow { background-color: #d29922; }
        .terminal-dot.green { background-color: #3fb950; }

        .terminal-title {
            margin-left: 10px;
            color: #8b949e;
            font-size: 0.85rem;
        }

        .terminal-body {
            padding: 20px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
        }

        .terminal-line {
            margin: 6px 0;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .terminal-line.info { color: #58a6ff; }
        .terminal-line.done { color: #3fb950; }
        .terminal-line.cargo { color: #8b949e; }
        .terminal-line.running { color: #d29922; }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: #3fb950;
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .prompt {
            color: #3fb950;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #484f58;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ForgeFlow</h1>
            <p>基于 Rust 构建的高性能工作流引擎，专为安全、高效地编排和执行批处理任务而设计。<br>
            利用 Rust 的内存安全保证和 Tokio 异步运行时，实现低延迟、高吞吐量的任务调度。</p>
        </div>

        <button class="run-btn" id="runBtn">▶ 执行命令: cargo run --release -- --config config.toml</button>

        <div class="terminal">
            <div class="terminal-header">
                <div class="terminal-dot red"></div>
                <div class="terminal-dot yellow"></div>
                <div class="terminal-dot green"></div>
                <span class="terminal-title">ForgeFlow Terminal</span>
            </div>
            <div class="terminal-body" id="terminalBody">
                <div class="terminal-line"><span class="prompt">$</span> 等待执行...<span class="cursor"></span></div>
            </div>
        </div>

        <div class="footer">
            Powered by Rust + Tokio + Clap
        </div>
    </div>

    <script>
        const runBtn = document.getElementById('runBtn');
        const terminalBody = document.getElementById('terminalBody');

        const logs = [
            { text: 'Finished `release` profile [optimized] target(s) in 0.12s', class: 'cargo', delay: 300 },
            { text: 'Running `target/release/forgeflow.exe --config config.toml`', class: 'running', delay: 600 },
            { text: '[INFO] ForgeFlow 引擎已启动，内存安全检查通过...', class: 'info', delay: 1000 },
            { text: '[INFO] 正在解析配置文件: config.toml', class: 'info', delay: 400 },
            { text: '[INFO] 正在分配 64 个 tokio 异步线程处理任务...', class: 'info', delay: 500 },
            { text: '[DONE] 批处理任务执行完毕，总耗时 1.24s。无内存溢出。', class: 'done', delay: 1240 }
        ];

        runBtn.addEventListener('click', () => {
            runBtn.disabled = true;
            terminalBody.innerHTML = '';

            let currentDelay = 0;
            let lineIndex = 0;

            function printLine() {
                if (lineIndex >= logs.length) {
                    const cursorLine = document.createElement('div');
                    cursorLine.className = 'terminal-line';
                    cursorLine.innerHTML = '<span class="prompt">$</span> <span class="cursor"></span>';
                    terminalBody.appendChild(cursorLine);
                    runBtn.disabled = false;
                    return;
                }

                const log = logs[lineIndex];
                const line = document.createElement('div');
                line.className = `terminal-line ${log.class}`;
                line.textContent = log.text;
                terminalBody.appendChild(line);
                terminalBody.scrollTop = terminalBody.scrollHeight;

                lineIndex++;
                currentDelay = log.delay;
                setTimeout(printLine, currentDelay);
            }

            printLine();
        });
    </script>
</body>
</html>
