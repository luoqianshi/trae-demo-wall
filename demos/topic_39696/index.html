<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 面试官 - 智能面试模拟器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --primary-light: #eff6ff;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-600: #4b5563;
    --gray-800: #1f2937;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
    color: var(--gray-800);
    line-height: 1.6;
    min-height: 100vh;
  }
  .navbar {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    padding: 16px 24px;
    box-shadow: 0 2px 10px rgba(37, 99, 235, 0.2);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .navbar-content {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo { font-size: 1.3em; font-weight: bold; }
  .nav-stats { font-size: 0.9em; opacity: 0.9; }
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px 20px;
  }
  .page { display: none; }
  .page.active { display: block; }

  /* 首页 */
  .hero {
    text-align: center;
    padding: 40px 20px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    margin-bottom: 25px;
  }
  .hero h1 {
    font-size: 2.2em;
    color: var(--primary-dark);
    margin-bottom: 12px;
  }
  .hero p { color: var(--gray-600); font-size: 1.05em; }
  .config-card {
    background: white;
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    margin-bottom: 20px;
  }
  .config-card h2 {
    color: var(--primary-dark);
    font-size: 1.2em;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--primary-light);
  }
  .options-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }
  .option-item {
    padding: 14px;
    border: 2px solid var(--gray-200);
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--gray-50);
  }
  .option-item:hover {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .option-item.selected {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary-dark);
    font-weight: 600;
  }
  .option-item .icon { font-size: 1.8em; margin-bottom: 6px; }
  .option-item .label { font-size: 0.95em; }
  .start-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.1em;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 10px;
  }
  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
  }
  .start-btn:disabled {
    background: var(--gray-200);
    color: var(--gray-600);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* 面试界面 */
  .interview-header {
    background: white;
    border-radius: 16px;
    padding: 20px 24px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .interview-info { display: flex; gap: 16px; flex-wrap: wrap; }
  .info-tag {
    background: var(--primary-light);
    color: var(--primary-dark);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.9em;
  }
  .timer {
    font-size: 1.4em;
    font-weight: bold;
    color: var(--primary-dark);
    font-family: monospace;
  }
  .timer.warning { color: var(--warning); }
  .timer.danger { color: var(--danger); }
  .question-card {
    background: white;
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    margin-bottom: 20px;
  }
  .question-num {
    display: inline-block;
    background: var(--primary);
    color: white;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.85em;
    margin-bottom: 12px;
  }
  .question-text {
    font-size: 1.2em;
    color: var(--gray-800);
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .tts-btn {
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    color: var(--gray-600);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9em;
  }
  .tts-btn:hover { background: var(--primary-light); color: var(--primary-dark); }
  .answer-area {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    margin-bottom: 20px;
  }
  .answer-area h3 {
    color: var(--primary-dark);
    margin-bottom: 12px;
    font-size: 1.05em;
  }
  .answer-textarea {
    width: 100%;
    min-height: 150px;
    padding: 14px;
    border: 2px solid var(--gray-200);
    border-radius: 12px;
    font-size: 1em;
    font-family: inherit;
    resize: vertical;
    transition: border-color 0.2s;
  }
  .answer-textarea:focus {
    outline: none;
    border-color: var(--primary);
  }
  .voice-btn {
    background: var(--primary-light);
    color: var(--primary-dark);
    border: 2px solid var(--primary);
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 12px;
    font-size: 0.95em;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .voice-btn:hover { background: var(--primary); color: white; }
  .voice-btn.recording {
    background: var(--danger);
    color: white;
    border-color: var(--danger);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .action-bar {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1em;
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--primary);
    color: white;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary {
    background: var(--gray-100);
    color: var(--gray-600);
  }
  .btn-secondary:hover { background: var(--gray-200); }
  .btn:disabled {
    background: var(--gray-200);
    color: var(--gray-600);
    cursor: not-allowed;
  }

  /* 评分反馈 */
  .feedback-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    margin-bottom: 20px;
    border-left: 4px solid var(--primary);
  }
  .feedback-card h3 {
    color: var(--primary-dark);
    margin-bottom: 16px;
  }
  .score-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 16px;
  }
  .score-item {
    background: var(--gray-50);
    padding: 14px;
    border-radius: 10px;
    text-align: center;
  }
  .score-item .score-label {
    color: var(--gray-600);
    font-size: 0.9em;
    margin-bottom: 6px;
  }
  .score-item .score-value {
    font-size: 1.8em;
    font-weight: bold;
    color: var(--primary-dark);
  }
  .score-item .score-value.high { color: var(--success); }
  .score-item .score-value.mid { color: var(--warning); }
  .score-item .score-value.low { color: var(--danger); }
  .suggestion {
    background: var(--primary-light);
    padding: 12px 16px;
    border-radius: 8px;
    color: var(--primary-dark);
    font-size: 0.95em;
  }

  /* 报告页 */
  .report-summary {
    background: white;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    margin-bottom: 20px;
    text-align: center;
  }
  .total-score {
    font-size: 3em;
    font-weight: bold;
    color: var(--primary-dark);
    margin: 10px 0;
  }
  .report-radar {
    background: white;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    margin-bottom: 20px;
    text-align: center;
  }
  .radar-chart {
    width: 300px;
    height: 300px;
    margin: 0 auto;
  }
  .weakness-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    margin-bottom: 20px;
  }
  .weakness-card h3 {
    color: var(--primary-dark);
    margin-bottom: 14px;
  }
  .weakness-item {
    padding: 12px;
    background: #fef3e2;
    border-radius: 8px;
    margin-bottom: 8px;
    border-left: 3px solid var(--warning);
  }
  .history-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--gray-100);
    font-size: 0.95em;
  }
  .history-item:last-child { border-bottom: none; }
  .history-score {
    font-weight: bold;
    color: var(--primary-dark);
  }

  @media (max-width: 600px) {
    .hero h1 { font-size: 1.6em; }
    .question-text { font-size: 1.05em; }
    .total-score { font-size: 2.4em; }
    .container { padding: 20px 12px; }
  }
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-content">
    <div class="logo">AI 面试官</div>
    <div class="nav-stats" id="navStats">智能面试模拟器</div>
  </div>
</nav>

<div class="container">
  <!-- 首页 -->
  <div id="page-home" class="page active">
    <div class="hero">
      <h1>AI 面试官</h1>
      <p>7×24 小时在线的专业面试教练，让你随时随地练习面试</p>
    </div>

    <div class="config-card">
      <h2>选择行业</h2>
      <div class="options-grid" id="industryGrid"></div>
    </div>

    <div class="config-card">
      <h2>选择岗位</h2>
      <div class="options-grid" id="positionGrid"></div>
    </div>

    <div class="config-card">
      <h2>面试官风格</h2>
      <div class="options-grid" id="styleGrid"></div>
    </div>

    <div class="config-card">
      <h2>面试时长</h2>
      <div class="options-grid" id="durationGrid"></div>
    </div>

    <button class="start-btn" id="startBtn" disabled>请完成所有选择后开始面试</button>
  </div>

  <!-- 面试页 -->
  <div id="page-interview" class="page">
    <div class="interview-header">
      <div class="interview-info" id="interviewInfo"></div>
      <div class="timer" id="timer">00:00</div>
    </div>
    <div class="question-card">
      <span class="question-num" id="questionNum">第 1 题</span>
      <div class="question-text" id="questionText">加载中...</div>
      <button class="tts-btn" id="ttsBtn">朗读问题</button>
    </div>
    <div class="answer-area">
      <h3>你的回答</h3>
      <textarea class="answer-textarea" id="answerInput" placeholder="请输入你的回答，或点击下方按钮语音输入..."></textarea>
      <button class="voice-btn" id="voiceBtn">开始语音输入</button>
      <div class="action-bar">
        <button class="btn btn-primary" id="submitBtn">提交回答</button>
        <button class="btn btn-secondary" id="skipBtn">跳过本题</button>
        <button class="btn btn-secondary" id="endBtn">结束面试</button>
      </div>
    </div>
    <div id="feedbackArea"></div>
  </div>

  <!-- 报告页 -->
  <div id="page-report" class="page">
    <div class="report-summary">
      <h2>面试报告</h2>
      <div class="total-score" id="totalScore">0</div>
      <p id="scoreComment">加载中...</p>
    </div>
    <div class="report-radar">
      <h3>能力雷达图</h3>
      <svg class="radar-chart" id="radarChart" viewBox="0 0 300 300"></svg>
    </div>
    <div class="weakness-card">
      <h3>弱点分析与改进建议</h3>
      <div id="weaknessList"></div>
    </div>
    <div class="history-card">
      <h3>历史记录</h3>
      <div id="historyList"></div>
    </div>
    <div class="action-bar">
      <button class="btn btn-primary" id="restartBtn">再练一次</button>
      <button class="btn btn-secondary" id="backHomeBtn">返回首页</button>
    </div>
  </div>
</div>

<script>
// ============ 题库 ============
const questionBank = {
  general: [
    "请做一个简单的自我介绍。",
    "你最大的优点是什么？请举例说明。",
    "你最大的缺点是什么？你是如何改进的？",
    "为什么选择我们公司？",
    "你的职业规划是什么？",
    "你最有成就感的一件事是什么？",
    "你如何处理工作中的压力？",
    "你为什么离开上一家公司？",
    "你的期望薪资是多少？",
    "你有什么问题想问我们吗？"
  ],
  internet: [
    "请介绍一个你参与过的产品项目，你的角色和贡献是什么？",
    "如何从0到1设计一个产品？请以某个功能为例。",
    "你如何进行用户调研？常用的方法有哪些？",
    "产品上线后数据不及预期，你会如何分析？",
    "如何平衡用户需求和商业目标？",
    "请解释一下 MVP 的概念及其重要性。",
    "你如何确定产品功能的优先级？",
    "描述一次你与开发/设计产生分歧的经历，如何解决？",
    "你如何看待竞品分析？请举例说明。",
    "请解释 DAU、MAU、留存率等核心指标。"
  ],
  finance: [
    "请解释一下资产负债表、利润表、现金流量表的关系。",
    "你如何评估一家企业的偿债能力？",
    "什么是杜邦分析？请简述其逻辑。",
    "请解释净现值（NPV）和内部收益率（IRR）。",
    "你如何进行行业分析？",
    "描述一次你处理大量数据的经历。",
    "你如何识别企业的财务风险？",
    "请解释什么是巴塞尔协议。",
    "你如何看待当前的宏观经济形势？",
    "请介绍一次你完成的金融建模项目。"
  ],
  civil: [
    "你为什么想成为公务员？",
    "如何理解'为人民服务'的宗旨？",
    "如果你发现领导的决定违规，你会怎么做？",
    "请谈谈对当前某社会热点问题的看法。",
    "你如何处理群众的不满和投诉？",
    "描述一次你组织活动的经历。",
    "你如何看待加班？",
    "如果你的专业与岗位不匹配，你如何胜任？",
    "请谈谈你的基层工作经历（或实习经历）。",
    "你如何理解'四个意识'？"
  ],
  teacher: [
    "你为什么选择教师这个职业？",
    "如何上好一堂课？请简述你的教学设计思路。",
    "你如何处理课堂上的突发状况？",
    "如何对待学习困难的学生？",
    "你如何与家长沟通？",
    "请谈谈你对素质教育的理解。",
    "你如何激发学生的学习兴趣？",
    "描述一次你成功转化'问题学生'的经历。",
    "你如何看待教育公平？",
    "你如何进行教学反思？"
  ]
};

// 追问题库
const followUpBank = {
  "自我介绍": ["你刚才提到的XX经历，具体做了什么？", "这段经历中你最大的收获是什么？"],
  "优点": ["这个优点在工作中如何体现？请举例。", "你如何避免这个优点变成缺点？"],
  "缺点": ["你正在采取什么措施改进？", "这个缺点对工作有什么影响？"],
  "项目": ["项目中最大的挑战是什么？", "如果重来一次你会怎么做？"],
  "default": ["能详细说说吗？", "你具体是怎么做的？", "结果如何？"]
};

// 评分关键词库
const scoreKeywords = {
  professional: ["分析", "数据", "指标", "用户", "产品", "市场", "策略", "优化", "迭代", "MVP", "DAU", "MAU", "留存", "转化", "漏斗", "调研", "需求", "原型", "测试", "上线"],
  star: ["当时", "情境", "任务", "行动", "结果", "首先", "其次", "然后", "最后", "因为", "所以", "通过", "实现", "完成", "达到", "S", "T", "A", "R"],
  logic: ["第一", "第二", "第三", "一方面", "另一方面", "首先", "其次", "最后", "综上", "因此", "另外", "此外", "同时"]
};

// ============ 配置选项 ============
const industries = [
  { id: "internet", name: "互联网", icon: "💻" },
  { id: "finance", name: "金融", icon: "💰" },
  { id: "civil", name: "公务员", icon: "🏛️" },
  { id: "teacher", name: "教师", icon: "📚" }
];

const positions = {
  internet: ["产品经理", "前端开发", "后端开发", "运营", "数据分析"],
  finance: ["银行柜员", "客户经理", "风控专员", "投行分析师"],
  civil: ["综合岗", "行政执法", "文秘岗", "财务岗"],
  teacher: ["小学教师", "中学教师", "高校教师", "培训机构"]
};

const styles = [
  { id: "friendly", name: "温和型", icon: "😊" },
  { id: "strict", name: "严厉型", icon: "😤" },
  { id: "hr", name: "HR型", icon: "👔" },
  { id: "expert", name: "技术专家", icon: "🎯" }
];

const durations = [
  { id: 15, name: "15分钟", icon: "⏱️" },
  { id: 30, name: "30分钟", icon: "⏱️" },
  { id: 45, name: "45分钟", icon: "⏱️" }
];

// ============ 状态管理 ============
let state = {
  industry: null,
  position: null,
  style: null,
  duration: null,
  questions: [],
  currentIdx: 0,
  answers: [],
  scores: [],
  startTime: null,
  timerInterval: null,
  recognition: null,
  isRecording: false
};

// ============ 初始化 ============
function init() {
  renderOptions("industryGrid", industries, "industry");
  renderOptions("styleGrid", styles, "style");
  renderOptions("durationGrid", durations, "duration");
  bindEvents();
}

function renderOptions(containerId, options, key) {
  const container = document.getElementById(containerId);
  container.innerHTML = options.map(opt => `
    <div class="option-item" data-key="${key}" data-value="${opt.id}" onclick="selectOption('${key}', '${opt.id}', this)">
      <div class="icon">${opt.icon}</div>
      <div class="label">${opt.name}</div>
    </div>
  `).join("");
}

function renderPositions() {
  const container = document.getElementById("positionGrid");
  const positionsList = positions[state.industry] || [];
  container.innerHTML = positionsList.map(pos => `
    <div class="option-item" data-key="position" data-value="${pos}" onclick="selectOption('position', '${pos}', this)">
      <div class="icon">👤</div>
      <div class="label">${pos}</div>
    </div>
  `).join("");
}

function selectOption(key, value, el) {
  document.querySelectorAll(`[data-key="${key}"]`).forEach(e => e.classList.remove("selected"));
  el.classList.add("selected");
  state[key] = value;
  if (key === "industry") {
    state.position = null;
    renderPositions();
  }
  checkStartBtn();
}

function checkStartBtn() {
  const btn = document.getElementById("startBtn");
  if (state.industry && state.position && state.style && state.duration) {
    btn.disabled = false;
    btn.textContent = "开始面试";
  } else {
    btn.disabled = true;
    btn.textContent = "请完成所有选择后开始面试";
  }
}

// ============ 面试流程 ============
function startInterview() {
  // 生成题目
  const generalQs = shuffle([...questionBank.general]).slice(0, 3);
  const industryQs = shuffle([...questionBank[state.industry]]).slice(0, 5);
  state.questions = [...generalQs, ...industryQs];
  state.currentIdx = 0;
  state.answers = [];
  state.scores = [];
  state.startTime = Date.now();

  // 切换页面
  showPage("interview");
  renderInterviewInfo();
  startTimer();
  loadQuestion();
}

function renderInterviewInfo() {
  const industryName = industries.find(i => i.id === state.industry)?.name || "";
  const styleName = styles.find(s => s.id === state.style)?.name || "";
  document.getElementById("interviewInfo").innerHTML = `
    <span class="info-tag">${industryName} · ${state.position}</span>
    <span class="info-tag">${styleName}面试官</span>
    <span class="info-tag">${state.duration}分钟</span>
  `;
}

function startTimer() {
  const totalSeconds = state.duration * 60;
  let elapsed = 0;
  state.timerInterval = setInterval(() => {
    elapsed = Math.floor((Date.now() - state.startTime) / 1000);
    const remaining = Math.max(0, totalSeconds - elapsed);
    const min = String(Math.floor(remaining / 60)).padStart(2, "0");
    const sec = String(remaining % 60).padStart(2, "0");
    const timerEl = document.getElementById("timer");
    timerEl.textContent = `${min}:${sec}`;
    timerEl.className = "timer";
    if (remaining < 60) timerEl.classList.add("danger");
    else if (remaining < 180) timerEl.classList.add("warning");
    if (remaining === 0) endInterview();
  }, 1000);
}

function loadQuestion() {
  if (state.currentIdx >= state.questions.length) {
    endInterview();
    return;
  }
  const q = state.questions[state.currentIdx];
  document.getElementById("questionNum").textContent = `第 ${state.currentIdx + 1} 题 / 共 ${state.questions.length} 题`;
  document.getElementById("questionText").textContent = q;
  document.getElementById("answerInput").value = "";
  document.getElementById("feedbackArea").innerHTML = "";
  document.getElementById("navStats").textContent = `进度：${state.currentIdx + 1}/${state.questions.length}`;
}

function submitAnswer() {
  const answer = document.getElementById("answerInput").value.trim();
  if (!answer) {
    alert("请输入回答后再提交");
    return;
  }
  const score = calculateScore(answer, state.questions[state.currentIdx]);
  state.answers.push(answer);
  state.scores.push(score);
  showFeedback(score);
}

function calculateScore(answer, question) {
  const len = answer.length;
  // 表达流畅度：基于长度
  let fluency = Math.min(100, Math.floor(len / 3));
  if (len < 30) fluency = Math.max(20, fluency);

  // 逻辑结构：关键词检测
  const logicHits = scoreKeywords.logic.filter(k => answer.includes(k)).length;
  const logic = Math.min(100, 40 + logicHits * 15);

  // 专业度：专业术语检测
  const profHits = scoreKeywords.professional.filter(k => answer.includes(k)).length;
  const professional = Math.min(100, 35 + profHits * 13);

  // STAR 法则
  const starHits = scoreKeywords.star.filter(k => answer.includes(k)).length;
  const star = Math.min(100, 30 + starHits * 14);

  // 综合
  const total = Math.floor(fluency * 0.2 + logic * 0.25 + professional * 0.3 + star * 0.25);

  let suggestion = "";
  if (fluency < 50) suggestion = "回答偏短，建议展开说明，增加细节。";
  else if (logic < 60) suggestion = "逻辑结构可加强，尝试用'第一、第二、第三'组织回答。";
  else if (professional < 60) suggestion = "可多使用专业术语，体现专业素养。";
  else if (star < 60) suggestion = "建议用 STAR 法则（情境-任务-行动-结果）结构化回答。";
  else suggestion = "回答不错！继续保持，可进一步精炼表达。";

  return { fluency, logic, professional, star, total, suggestion };
}

function showFeedback(score) {
  const scoreClass = v => v >= 80 ? "high" : v >= 60 ? "mid" : "low";
  document.getElementById("feedbackArea").innerHTML = `
    <div class="feedback-card">
      <h3>本题反馈</h3>
      <div class="score-grid">
        <div class="score-item">
          <div class="score-label">表达流畅度</div>
          <div class="score-value ${scoreClass(score.fluency)}">${score.fluency}</div>
        </div>
        <div class="score-item">
          <div class="score-label">逻辑结构</div>
          <div class="score-value ${scoreClass(score.logic)}">${score.logic}</div>
        </div>
        <div class="score-item">
          <div class="score-label">专业度</div>
          <div class="score-value ${scoreClass(score.professional)}">${score.professional}</div>
        </div>
        <div class="score-item">
          <div class="score-label">STAR法则</div>
          <div class="score-value ${scoreClass(score.star)}">${score.star}</div>
        </div>
      </div>
      <div class="suggestion">💡 ${score.suggestion}</div>
      <div class="action-bar">
        <button class="btn btn-primary" id="nextBtn">${state.currentIdx === state.questions.length - 1 ? "查看报告" : "下一题"}</button>
      </div>
    </div>
  `;
  document.getElementById("nextBtn").addEventListener("click", () => {
    state.currentIdx++;
    if (state.currentIdx >= state.questions.length) endInterview();
    else loadQuestion();
  });
  document.getElementById("nextBtn").scrollIntoView({ behavior: "smooth" });
}

function skipQuestion() {
  state.answers.push("");
  const skipScore = { fluency: 0, logic: 0, professional: 0, star: 0, total: 0, suggestion: "本题已跳过，建议后续补练。" };
  state.scores.push(skipScore);
  showFeedback(skipScore);
}

function endInterview() {
  clearInterval(state.timerInterval);
  showReport();
}

// ============ 报告页 ============
function showReport() {
  showPage("report");
  const avg = key => state.scores.length ? Math.floor(state.scores.reduce((s, sc) => s + sc[key], 0) / state.scores.length) : 0;
  const total = avg("total");
  const fluency = avg("fluency");
  const logic = avg("logic");
  const professional = avg("professional");
  const star = avg("star");

  document.getElementById("totalScore").textContent = total;
  let comment = "";
  if (total >= 85) comment = "优秀！你的面试表现非常出色，继续保持！";
  else if (total >= 70) comment = "良好！整体表现不错，部分维度可继续提升。";
  else if (total >= 60) comment = "合格！建议针对弱点加强练习。";
  else comment = "需要加强练习，建议多模拟面试提升表现。";
  document.getElementById("scoreComment").textContent = comment;

  drawRadar([fluency, logic, professional, star]);

  // 弱点分析
  const weaknesses = [];
  if (fluency < 70) weaknesses.push("表达流畅度：回答偏短或不够流畅，建议多练习展开说明。");
  if (logic < 70) weaknesses.push("逻辑结构：回答结构不够清晰，建议用'第一、第二、第三'组织。");
  if (professional < 70) weaknesses.push("专业度：专业术语使用不足，建议多积累行业知识。");
  if (star < 70) weaknesses.push("STAR法则：缺乏结构化表达，建议用情境-任务-行动-结果组织回答。");
  const weakList = document.getElementById("weaknessList");
  weakList.innerHTML = weaknesses.length ? weaknesses.map(w => `<div class="weakness-item">${w}</div>`).join("") : '<div class="weakness-item" style="background:#d1fae5;border-left-color:#10b981;">各维度表现均衡，继续保持！</div>';

  // 保存历史
  saveHistory(total);
  renderHistory();
}

function drawRadar(scores) {
  const labels = ["表达流畅度", "逻辑结构", "专业度", "STAR法则"];
  const cx = 150, cy = 150, maxR = 100;
  const angle = i => -Math.PI / 2 + i * 2 * Math.PI / 4;
  const point = (r, i) => [cx + r * Math.cos(angle(i)), cy + r * Math.sin(angle(i))];

  let svg = "";
  // 背景网格
  for (let level = 1; level <= 4; level++) {
    const r = maxR * level / 4;
    const pts = [0,1,2,3].map(i => point(r, i).join(",")).join(" ");
    svg += `<polygon points="${pts}" fill="none" stroke="#e5e7eb" stroke-width="1"/>`;
  }
  // 轴线
  [0,1,2,3].forEach(i => {
    const [x, y] = point(maxR, i);
    svg += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;
  });
  // 数据多边形
  const dataPts = scores.map((s, i) => point(maxR * s / 100, i).join(",")).join(" ");
  svg += `<polygon points="${dataPts}" fill="rgba(37,99,235,0.3)" stroke="#2563eb" stroke-width="2"/>`;
  // 数据点
  scores.forEach((s, i) => {
    const [x, y] = point(maxR * s / 100, i);
    svg += `<circle cx="${x}" cy="${y}" r="4" fill="#2563eb"/>`;
  });
  // 标签
  labels.forEach((label, i) => {
    const [x, y] = point(maxR + 25, i);
    svg += `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#4b5563">${label}</text>`;
    const [sx, sy] = point(maxR * scores[i] / 100, i);
    svg += `<text x="${sx}" y="${sy - 10}" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="bold">${scores[i]}</text>`;
  });
  document.getElementById("radarChart").innerHTML = svg;
}

function saveHistory(total) {
  const history = JSON.parse(localStorage.getItem("interviewHistory") || "[]");
  history.push({
    date: new Date().toLocaleString("zh-CN"),
    industry: industries.find(i => i.id === state.industry)?.name,
    position: state.position,
    score: total
  });
  localStorage.setItem("interviewHistory", JSON.stringify(history.slice(-20)));
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem("interviewHistory") || "[]").reverse();
  const list = document.getElementById("historyList");
  list.innerHTML = history.length ? history.map(h => `
    <div class="history-item">
      <span>${h.date} · ${h.industry} · ${h.position}</span>
      <span class="history-score">${h.score}分</span>
    </div>
  `).join("") : '<div style="text-align:center;color:#9ca3af;padding:20px;">暂无历史记录</div>';
}

// ============ 语音功能 ============
function toggleVoice() {
  const btn = document.getElementById("voiceBtn");
  if (state.isRecording) {
    state.recognition?.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    alert("您的浏览器不支持语音识别，请使用 Chrome 或 Edge 浏览器");
    return;
  }
  state.recognition = new SR();
  state.recognition.lang = "zh-CN";
  state.recognition.continuous = true;
  state.recognition.interimResults = true;
  const textarea = document.getElementById("answerInput");
  const baseText = textarea.value;
  let finalText = baseText;
  state.recognition.onresult = (e) => {
    let interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    textarea.value = finalText + interim;
  };
  state.recognition.onend = () => {
    state.isRecording = false;
    btn.classList.remove("recording");
    btn.textContent = "开始语音输入";
  };
  state.recognition.onerror = (e) => {
    alert("语音识别出错：" + e.error);
    state.isRecording = false;
    btn.classList.remove("recording");
    btn.textContent = "开始语音输入";
  };
  state.recognition.start();
  state.isRecording = true;
  btn.classList.add("recording");
  btn.textContent = "停止语音输入";
}

function speakQuestion() {
  const text = document.getElementById("questionText").textContent;
  if (!("speechSynthesis" in window)) {
    alert("您的浏览器不支持语音合成");
    return;
  }
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "zh-CN";
  speechSynthesis.speak(utter);
}

// ============ 工具函数 ============
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showPage(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(`page-${page}`).classList.add("active");
  window.scrollTo(0, 0);
}

// ============ 事件绑定 ============
function bindEvents() {
  document.getElementById("startBtn").addEventListener("click", () => {
    if (!document.getElementById("startBtn").disabled) startInterview();
  });
  document.getElementById("submitBtn").addEventListener("click", submitAnswer);
  document.getElementById("skipBtn").addEventListener("click", skipQuestion);
  document.getElementById("endBtn").addEventListener("click", () => {
    if (confirm("确定要提前结束面试吗？")) endInterview();
  });
  document.getElementById("voiceBtn").addEventListener("click", toggleVoice);
  document.getElementById("ttsBtn").addEventListener("click", speakQuestion);
  document.getElementById("restartBtn").addEventListener("click", () => {
    showPage("home");
    document.getElementById("navStats").textContent = "智能面试模拟器";
  });
  document.getElementById("backHomeBtn").addEventListener("click", () => {
    showPage("home");
    document.getElementById("navStats").textContent = "智能面试模拟器";
  });
}

init();
</script>
