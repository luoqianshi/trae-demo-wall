<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulClaw Demo - 像素风数字宠物养成</title>
  <style>
    :root {
      --color-vaccine: #3B82F6;
      --color-virus: #9333EA;
      --color-data: #D97706;
      --bg-dark: #0f0f1a;
      --bg-card: rgba(255,255,255,0.04);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* Header */
    .header {
      text-align: center;
      padding: 30px 0;
      position: relative;
    }
    
    .header::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .title {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle { color: var(--text-secondary); margin-top: 8px; }
    
    /* Main Layout */
    .main {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      margin-top: 20px;
    }
    
    @media (max-width: 700px) {
      .main { grid-template-columns: 1fr; }
    }
    
    /* Pet Display Card */
    .pet-card {
      background: var(--bg-card);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 20px;
    }
    
    .pet-canvas {
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
      border-radius: 16px;
      overflow: hidden;
    }
    
    .pet-canvas svg {
      width: 160px;
      height: 160px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    }
    
    .pet-name {
      font-size: 1.4rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .pet-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .tag {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .faction-tag { background: rgba(59,130,246,0.2); color: var(--color-vaccine); }
    .faction-tag.virus { background: rgba(147,51,234,0.2); color: var(--color-virus); }
    .faction-tag.data { background: rgba(217,119,6,0.2); color: var(--color-data); }
    
    .stage-tag { background: rgba(167,139,250,0.2); color: #a78bfa; }
    
    .mood-display {
      font-size: 2rem;
      margin-top: 8px;
    }
    
    /* Quick Actions */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
    }
    
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 8px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.2s;
    }
    
    .action-btn:hover {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.1);
      color: #a78bfa;
      transform: translateY(-2px);
    }
    
    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }
    
    .action-btn svg { width: 24px; height: 24px; }
    
    /* Stats Panel */
    .stats-panel {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
    }
    
    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    
    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    
    .stat-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .stat-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }
    
    /* Evolution Progress */
    .evo-panel {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-top: 16px;
    }
    
    .evo-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    
    .evo-bar {
      height: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 5px;
      overflow: hidden;
    }
    
    .evo-bar-fill {
      height: 100%;
      border-radius: 5px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      transition: width 0.5s;
    }
    
    .evo-bar-fill.can-evolve {
      background: linear-gradient(90deg, #f59e0b, #ef4444);
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(245,158,11,0.7); }
      50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(245,158,11,0); }
    }
    
    .evo-text {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    
    /* Personality Display */
    .personality-panel {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-top: 16px;
    }
    
    .personality-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .personality-icon { font-size: 1.5rem; }
    .personality-name { font-weight: 600; }
    .personality-bias { font-size: 11px; color: var(--text-secondary); }
    
    /* Summon Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    
    .modal {
      background: var(--bg-dark);
      border: 2px solid rgba(167,139,250,0.3);
      border-radius: 24px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 24px;
      color: #a78bfa;
    }
    
    .selection-section {
      margin-bottom: 20px;
    }
    
    .section-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .selection-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    
    .selection-option {
      padding: 16px 12px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.1);
      background: transparent;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      font-family: inherit;
      color: var(--text-primary);
    }
    
    .selection-option:hover {
      border-color: rgba(167,139,250,0.5);
      background: rgba(167,139,250,0.1);
    }
    
    .selection-option.selected {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.2);
    }
    
    .selection-option.selected.vaccine { border-color: var(--color-vaccine); background: rgba(59,130,246,0.2); }
    .selection-option.selected.virus { border-color: var(--color-virus); background: rgba(147,51,234,0.2); }
    .selection-option.selected.data { border-color: var(--color-data); background: rgba(217,119,6,0.2); }
    
    .option-icon { font-size: 1.8rem; margin-bottom: 4px; }
    .option-name { font-size: 13px; font-weight: 600; }
    .option-desc { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    
    .name-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3);
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
      margin-bottom: 20px;
    }
    
    .name-input:focus {
      outline: none;
      border-color: #a78bfa;
    }
    
    .summon-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s;
    }
    
    .summon-btn:hover {
      transform: translateY(-2px);
    }
    
    .summon-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    
    .empty-icon {
      font-size: 4rem;
      opacity: 0.3;
      margin-bottom: 16px;
    }
    
    .empty-title {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }
    
    .empty-desc {
      color: var(--text-secondary);
      margin-bottom: 24px;
    }
    
    .create-btn {
      padding: 14px 28px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1E1B4B;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 2000;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    
    .toast.visible { transform: translateX(-50%) translateY(0); }
    .toast.success { background: #22C55E; }
    .toast.error { background: #EF4444; }
    .toast.warning { background: #F59E0B; }
    
    /* Animations */
    @keyframes idle-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    
    @keyframes egg-wobble {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }
    
    @keyframes evolve-glow {
      0% { filter: brightness(1); }
      25% { filter: brightness(2) drop-shadow(0 0 20px #a78bfa); }
      50% { filter: brightness(0.8) drop-shadow(0 0 30px #f59e0b); }
      75% { filter: brightness(1.5) drop-shadow(0 0 25px #60a5fa); }
      100% { filter: brightness(1); }
    }
    
    .anim-idle .pet-canvas svg { animation: idle-bounce 3s ease-in-out infinite; }
    .anim-egg .pet-canvas svg { animation: egg-wobble 2s ease-in-out infinite; }
    .anim-evolve .pet-canvas svg { animation: evolve-glow 1.5s ease-in-out; }
    
    /* Message Bubble */
    .message-bubble {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(167,139,250,0.9);
      color: white;
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 13px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    
    .message-bubble.visible { opacity: 1; }
    
    .pet-card-wrapper {
      position: relative;
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="header">
    <h1 class="title">SoulClaw</h1>
    <p class="subtitle">像素风数字宠物养成 Demo</p>
  </header>
  
  <!-- Main Content -->
  <main class="main">
    <!-- Left: Pet Display -->
    <aside class="pet-panel" id="pet-panel">
      <div class="pet-card-wrapper">
        <div class="pet-card anim-idle" id="pet-card">
          <div class="pet-canvas" id="pet-canvas"></div>
          <div class="pet-name" id="pet-name">等待召唤...</div>
          <div class="pet-meta" id="pet-meta"></div>
          <div class="mood-display" id="mood-display"></div>
        </div>
        <div class="message-bubble" id="message-bubble"></div>
      </div>
      
      <!-- Quick Actions -->
      <div class="actions" id="actions" style="display:none">
        <button class="action-btn" id="btn-pet" title="抚摸">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 21c-4 0-7-2-7-5v-2c0-3 3-5 7-5s7 2 7 5v2c0 3-3 5-7 5z"/>
            <circle cx="8" cy="10" r="2"/>
            <circle cx="16" cy="10" r="2"/>
            <path d="M9 15c1 1 5 1 6 0"/>
          </svg>
          抚摸
        </button>
        <button class="action-btn" id="btn-feed" title="喂食">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          喂食
        </button>
        <button class="action-btn" id="btn-train" title="训练">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19l16-14"/>
            <path d="M4 5h16v14"/>
          </svg>
          训练
        </button>
        <button class="action-btn" id="btn-evolve" title="进化">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v12M8 10l4-4 4 4"/>
          </svg>
          进化
        </button>
      </div>
    </aside>
    
    <!-- Right: Stats & Info -->
    <section class="info-panel" id="info-panel">
      <!-- Empty State -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🥚</div>
        <div class="empty-title">还没有魂兽</div>
        <div class="empty-desc">召唤你的第一只魂兽，开始养成之旅</div>
        <button class="create-btn" id="btn-create">召唤魂兽</button>
      </div>
      
      <!-- Stats (hidden initially) -->
      <div class="stats-panel" id="stats-panel" style="display:none">
        <div class="panel-title">基础属性</div>
        <div class="stats-grid" id="stats-grid"></div>
      </div>
      
      <!-- Evolution Progress -->
      <div class="evo-panel" id="evo-panel" style="display:none">
        <div class="evo-header">
          <span class="panel-title">进化进度</span>
          <span id="evo-next-stage" style="font-size:12px;color:var(--text-secondary)"></span>
        </div>
        <div class="evo-bar">
          <div class="evo-bar-fill" id="evo-bar-fill"></div>
        </div>
        <div class="evo-text">
          <span id="evo-current">0</span>
          <span id="evo-target">0</span>
        </div>
      </div>
      
      <!-- Personality -->
      <div class="personality-panel" id="personality-panel" style="display:none">
        <div class="panel-title">性格特征</div>
        <div class="personality-chip" id="personality-chip"></div>
      </div>
    </section>
  </main>
</div>

<!-- Summon Modal -->
<div class="modal-overlay" id="summon-modal">
  <div class="modal">
    <h2 class="modal-title">召唤魂兽仪式</h2>
    
    <!-- Faction Selection -->
    <div class="selection-section">
      <div class="section-label">选择种族阵营</div>
      <div class="selection-grid" id="faction-grid">
        <button class="selection-option" data-faction="vaccine">
          <div class="option-icon">🛡️</div>
          <div class="option-name">疫苗种</div>
          <div class="option-desc">秩序守护者</div>
        </button>
        <button class="selection-option" data-faction="virus">
          <div class="option-icon">🦠</div>
          <div class="option-name">病毒种</div>
          <div class="option-desc">混沌变革者</div>
        </button>
        <button class="selection-option" data-faction="data">
          <div class="option-icon">📊</div>
          <div class="option-name">普通种</div>
          <div class="option-desc">自由探索者</div>
        </button>
      </div>
    </div>
    
    <!-- Form Selection -->
    <div class="selection-section">
      <div class="section-label">选择形态类型</div>
      <div class="selection-grid" id="form-grid">
        <button class="selection-option" data-form="humanoid">
          <div class="option-icon">🧑</div>
          <div class="option-name">人型</div>
        </button>
        <button class="selection-option" data-form="beast">
          <div class="option-icon">🐾</div>
          <div class="option-name">兽型</div>
        </button>
        <button class="selection-option" data-form="machine">
          <div class="option-icon">⚙️</div>
          <div class="option-name">机械型</div>
        </button>
        <button class="selection-option" data-form="plant">
          <div class="option-icon">🌿</div>
          <div class="option-name">植物型</div>
        </button>
        <button class="selection-option" data-form="elemental">
          <div class="option-icon">✨</div>
          <div class="option-name">元素型</div>
        </button>
      </div>
    </div>
    
    <!-- Name Input -->
    <div class="selection-section">
      <div class="section-label">为你的魂兽命名</div>
      <input type="text" class="name-input" id="name-input" placeholder="输入名字（最多12字）" maxlength="12">
    </div>
    
    <button class="summon-btn" id="btn-summon" disabled>开始召唤</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== SoulClaw Demo Engine ====================

// === Constants ===
const FACTIONS = {
  vaccine: { name: '疫苗种', color: '#3B82F6', desc: '秩序守护者', baseStats: { hp: 110, atk: 95, def: 110, spa: 90, spd: 90, agi: 90 } },
  virus: { name: '病毒种', color: '#9333EA', desc: '混沌变革者', baseStats: { hp: 90, atk: 120, def: 80, spa: 105, spd: 105, agi: 105 } },
  data: { name: '普通种', color: '#D97706', desc: '自由探索者', baseStats: { hp: 100, atk: 100, def: 100, spa: 100, spd: 100, agi: 100 } }
};

const FORMS = {
  humanoid: { name: '人型', icon: '🧑' },
  beast: { name: '兽型', icon: '🐾' },
  machine: { name: '机械型', icon: '⚙️' },
  plant: { name: '植物型', icon: '🌿' },
  elemental: { name: '元素型', icon: '✨' }
};

const PERSONALITIES = {
  brave: { name: '勇敢', icon: '🦁', bias: '攻击型进化', mods: { atk: 1.15, def: 0.90 } },
  lazy: { name: '懒惰', icon: '😴', bias: '防御型进化', mods: { atk: 0.90, def: 1.15, hp: 1.10 } },
  gluttonous: { name: '贪吃', icon: '🍰', bias: '体力型进化', mods: { hp: 1.20 } },
  tsundere: { name: '傲娇', icon: '😤', bias: '均衡型进化', mods: { spa: 1.15 } },
  curious: { name: '好奇', icon: '🐱', bias: '稀有进化+30%', mods: { agi: 1.15 } },
  timid: { name: '胆小', icon: '🐰', bias: '速度型进化', mods: { spd: 1.15, agi: 1.05 } },
  clingy: { name: '粘人', icon: '🐶', bias: '辅助型进化', mods: {} },
  aloof: { name: '高冷', icon: '😼', bias: '特攻型进化', mods: { spa: 1.15 } },
  cunning: { name: '狡黠', icon: '🦊', bias: '技巧型进化', mods: { agi: 1.10 } },
  gentle: { name: '温柔', icon: '🌙', bias: '治愈型进化', mods: { hp: 1.10, spa: 1.10 } }
};

// === Pixel Sprite Renderer ===
const PIXEL_SIZE = 4;
const GRID_W = 32;
const GRID_H = 32;

class PixelGrid {
  constructor() {
    this.pixels = Array(GRID_H).fill(null).map(() => Array(GRID_W).fill(null));
  }
  
  setPixel(x, y, color) {
    if (x >= 0 && x < GRID_W && y >= 0 && y < GRID_H) {
      this.pixels[y][x] = color;
    }
  }
  
  fillRect(x, y, w, h, color) {
    for (let dy = 0; dy < h; dy++) {
      for (let dx = 0; dx < w; dx++) {
        this.setPixel(x + dx, y + dy, color);
      }
    }
  }
  
  fillCircle(cx, cy, r, color) {
    for (let y = cy - r; y <= cy + r; y++) {
      for (let x = cx - r; x <= cx + r; x++) {
        if ((x - cx) ** 2 + (y - cy) ** 2 <= r * r) {
          this.setPixel(x, y, color);
        }
      }
    }
  }
  
  fillEllipse(cx, cy, rx, ry, color) {
    for (let y = cy - ry; y <= cy + ry; y++) {
      for (let x = cx - rx; x <= cx + rx; x++) {
        const dx = (x - cx) / rx;
        const dy = (y - cy) / ry;
        if (dx * dx + dy * dy <= 1) {
          this.setPixel(x, y, color);
        }
      }
    }
  }
  
  strokeEllipse(cx, cy, rx, ry, color) {
    for (let a = 0; a < 360; a += 3) {
      const rad = a * Math.PI / 180;
      const x = Math.round(cx + Math.cos(rad) * rx);
      const y = Math.round(cy + Math.sin(rad) * ry);
      this.setPixel(x, y, color);
    }
  }
  
  strokeCircle(cx, cy, r, color) {
    for (let a = 0; a < 360; a += 4) {
      const rad = a * Math.PI / 180;
      this.setPixel(Math.round(cx + Math.cos(rad) * r), Math.round(cy + Math.sin(rad) * r), color);
    }
  }
  
  hLine(x, y, len, color) {
    for (let i = 0; i < len; i++) this.setPixel(x + i, y, color);
  }
  
  vLine(x, y, len, color) {
    for (let i = 0; i < len; i++) this.setPixel(x, y + i, color);
  }
  
  toSVG() {
    let rects = '';
    for (let y = 0; y < GRID_H; y++) {
      for (let x = 0; x < GRID_W; x++) {
        if (this.pixels[y][x]) {
          rects += `<rect x="${x * PIXEL_SIZE}" y="${y * PIXEL_SIZE}" width="${PIXEL_SIZE}" height="${PIXEL_SIZE}" fill="${this.pixels[y][x]}" shape-rendering="crispEdges"/>`;
        }
      }
    }
    return `<svg viewBox="0 0 ${GRID_W * PIXEL_SIZE} ${GRID_H * PIXEL_SIZE}" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">${rects}</svg>`;
  }
}

function adjustColor(hex, amount) {
  hex = hex.replace('#', '');
  const r = Math.max(0, Math.min(255, parseInt(hex.substring(0, 2), 16) + amount));
  const g = Math.max(0, Math.min(255, parseInt(hex.substring(2, 4), 16) + amount));
  const b = Math.max(0, Math.min(255, parseInt(hex.substring(4, 6), 16) + amount));
  return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
}

function getPalette(faction) {
  const base = FACTIONS[faction].color;
  return {
    primary: base,
    secondary: adjustColor(base, -30),
    highlight: adjustColor(base, 50),
    shadow: adjustColor(base, -50),
    outline: '#1E1B4B'
  };
}

// === Sprite Drawing Functions ===
function drawEgg(grid, colors, faction) {
  const eggColor = faction === 'virus' ? '#4C1D95' : faction === 'data' ? '#FCD34D' : '#F0F4FF';
  const patternColor = colors.primary;
  
  // Egg body
  grid.fillEllipse(16, 18, 8, 10, eggColor);
  grid.strokeEllipse(16, 18, 8, 10, colors.outline);
  
  // Pattern based on faction
  if (faction === 'vaccine') {
    // Shield pattern
    grid.fillRect(13, 14, 6, 8, patternColor);
    grid.fillRect(14, 13, 4, 1, colors.highlight);
  } else if (faction === 'virus') {
    // Spiral pattern
    grid.strokeCircle(16, 18, 4, patternColor);
    grid.setPixel(16, 14, colors.highlight);
    grid.setPixel(16, 22, colors.highlight);
  } else {
    // Data pattern - dots
    grid.fillCircle(14, 16, 1, patternColor);
    grid.fillCircle(18, 16, 1, patternColor);
    grid.fillCircle(16, 20, 1, patternColor);
  }
  
  // Highlight
  grid.setPixel(12, 14, '#FFFFFF');
  grid.setPixel(13, 13, '#FFFFFF');
  
  // Shadow
  grid.hLine(12, 28, 8, '#888888');
}

function drawBaby(grid, colors, faction, form, frame) {
  const breathe = frame % 2 === 0 ? 0 : 1;
  const bodyY = 20 + breathe;
  
  // Body
  grid.fillEllipse(16, bodyY, 8, 10, colors.primary);
  grid.strokeEllipse(16, bodyY, 8, 10, colors.outline);
  
  // Belly highlight
  grid.fillEllipse(16, bodyY + 2, 4, 5, colors.highlight);
  
  // Eyes
  const eyeY = 18 + breathe;
  grid.fillCircle(13, eyeY, 2, '#FFFFFF');
  grid.fillCircle(19, eyeY, 2, '#FFFFFF');
  grid.setPixel(13, eyeY, colors.outline);
  grid.setPixel(19, eyeY, colors.outline);
  grid.setPixel(14, eyeY - 1, '#FFFFFF');
  grid.setPixel(20, eyeY - 1, '#FFFFFF');
  
  // Mouth
  const mouthY = 22 + breathe;
  grid.setPixel(15, mouthY, colors.shadow);
  grid.setPixel(16, mouthY + 1, colors.shadow);
  grid.setPixel(17, mouthY, colors.shadow);
  
  // Form-specific features
  if (form === 'beast') {
    // Little ears
    grid.setPixel(10, 12, colors.primary);
    grid.setPixel(22, 12, colors.primary);
    grid.setPixel(9, 13, colors.secondary);
    grid.setPixel(23, 13, colors.secondary);
  } else if (form === 'machine') {
    // Antenna
    grid.vLine(16, 8, 4, '#9CA3AF');
    grid.fillCircle(16, 7, 1, '#FACC15');
  } else if (form === 'plant') {
    // Sprout
    grid.setPixel(16, 8, '#6FBA2C');
    grid.setPixel(15, 9, '#6FBA2C');
    grid.setPixel(17, 9, '#6FBA2C');
  } else if (form === 'elemental') {
    // Glow particles
    grid.setPixel(8, 10, colors.highlight);
    grid.setPixel(24, 10, colors.highlight);
    grid.setPixel(10, 25, colors.highlight);
    grid.setPixel(22, 25, colors.highlight);
  }
  
  // Arms
  grid.fillRect(8, bodyY - 2, 3, 3, colors.primary);
  grid.strokeRect(8, bodyY - 2, 3, 3, colors.outline);
  grid.fillRect(21, bodyY - 2, 3, 3, colors.primary);
  grid.strokeRect(21, bodyY - 2, 3, 3, colors.outline);
  
  // Shadow
  grid.hLine(12, 29, 8, '#888888');
}

function drawInTraining(grid, colors, faction, form, frame) {
  const bounce = frame % 4 < 2 ? 0 : -2;
  
  // Larger body
  grid.fillEllipse(16, 18 + bounce, 10, 12, colors.primary);
  grid.strokeEllipse(16, 18 + bounce, 10, 12, colors.outline);
  
  // Belly
  grid.fillEllipse(16, 20 + bounce, 5, 6, colors.highlight);
  
  // Eyes (larger)
  const eyeY = 16 + bounce;
  grid.fillCircle(12, eyeY, 3, '#FFFFFF');
  grid.fillCircle(20, eyeY, 3, '#FFFFFF');
  grid.fillCircle(13, eyeY, 1, colors.outline);
  grid.fillCircle(21, eyeY, 1, colors.outline);
  grid.setPixel(11, eyeY - 1, '#FFFFFF');
  grid.setPixel(19, eyeY - 1, '#FFFFFF');
  
  // Mouth
  grid.hLine(14, 22 + bounce, 4, colors.shadow);
  
  // Form-specific features
  if (form === 'beast') {
    // Ears
    grid.fillEllipse(8, 10 + bounce, 3, 4, colors.primary);
    grid.fillEllipse(24, 10 + bounce, 3, 4, colors.primary);
    // Tail
    grid.fillEllipse(26, 24 + bounce, 3, 2, colors.secondary);
  } else if (form === 'machine') {
    // Helmet
    grid.fillRect(10, 8 + bounce, 12, 4, colors.secondary);
    grid.strokeRect(10, 8 + bounce, 12, 4, colors.outline);
    // Antenna
    grid.vLine(16, 4 + bounce, 4, '#9CA3AF');
    grid.fillCircle(16, 3 + bounce, 2, '#FACC15');
  } else if (form === 'plant') {
    // Leaf crown
    grid.fillEllipse(12, 6 + bounce, 3, 4, '#6FBA2C');
    grid.fillEllipse(20, 6 + bounce, 3, 4, '#6FBA2C');
    grid.fillEllipse(16, 4 + bounce, 2, 3, '#8AC68A');
  } else if (form === 'elemental') {
    // Aura
    grid.strokeCircle(16, 18 + bounce, 12, colors.highlight);
    grid.strokeCircle(16, 18 + bounce, 14, adjustColor(colors.highlight, -20));
  } else if (form === 'humanoid') {
    // Hair
    grid.fillRect(10, 6 + bounce, 12, 4, colors.secondary);
    grid.strokeRect(10, 6 + bounce, 12, 4, colors.outline);
  }
  
  // Legs
  grid.fillRect(11, 28, 4, 3, colors.primary);
  grid.strokeRect(11, 28, 4, 3, colors.outline);
  grid.fillRect(17, 28, 4, 3, colors.primary);
  grid.strokeRect(17, 28, 4, 3, colors.outline);
  
  // Shadow
  grid.hLine(10, 31, 12, '#888888');
}

function drawRookie(grid, colors, faction, form, frame) {
  const sway = frame % 6;
  const lean = sway < 3 ? -1 : 1;
  
  // Full body humanoid/beast shape
  if (form === 'humanoid') {
    // Head
    grid.fillEllipse(16 + lean, 10, 6, 6, colors.primary);
    grid.strokeEllipse(16 + lean, 10, 6, 6, colors.outline);
    // Body
    grid.fillRect(12 + lean, 16, 8, 10, colors.primary);
    grid.strokeRect(12 + lean, 16, 8, 10, colors.outline);
    // Arms
    grid.fillRect(6 + lean, 18, 4, 6, colors.primary);
    grid.fillRect(22 + lean, 18, 4, 6, colors.primary);
    // Legs
    grid.fillRect(12 + lean, 26, 3, 4, colors.primary);
    grid.fillRect(17 + lean, 26, 3, 4, colors.primary);
  } else if (form === 'beast') {
    // Quadruped body
    grid.fillEllipse(16, 20, 12, 8, colors.primary);
    grid.strokeEllipse(16, 20, 12, 8, colors.outline);
    // Head
    grid.fillEllipse(8 + lean, 14, 5, 5, colors.primary);
    grid.strokeEllipse(8 + lean, 14, 5, 5, colors.outline);
    // Ears
    grid.fillEllipse(6 + lean, 10, 2, 3, colors.secondary);
    grid.fillEllipse(10 + lean, 10, 2, 3, colors.secondary);
    // Tail
    grid.fillEllipse(28, 18, 4, 3, colors.secondary);
    // Legs
    grid.fillRect(8, 26, 3, 4, colors.primary);
    grid.fillRect(20, 26, 3, 4, colors.primary);
  } else if (form === 'machine') {
    // Mech body
    grid.fillRect(8, 10, 16, 16, colors.primary);
    grid.strokeRect(8, 10, 16, 16, colors.outline);
    // Core
    grid.fillCircle(16, 18, 4, colors.highlight);
    grid.strokeCircle(16, 18, 4, colors.outline);
    // Arms (mechanical)
    grid.fillRect(4, 14, 3, 8, colors.secondary);
    grid.fillRect(25, 14, 3, 8, colors.secondary);
    // Legs
    grid.fillRect(10, 26, 4, 4, colors.secondary);
    grid.fillRect(18, 26, 4, 4, colors.secondary);
    // Antenna
    grid.vLine(16, 4, 6, '#9CA3AF');
    grid.fillCircle(16, 3, 2, '#FACC15');
  } else if (form === 'plant') {
    // Plant body
    grid.fillEllipse(16, 20, 10, 12, colors.primary);
    grid.strokeEllipse(16, 20, 10, 12, colors.outline);
    // Flower head
    for (let i = 0; i < 5; i++) {
      const a = (i * 72) * Math.PI / 180;
      const px = Math.round(16 + Math.cos(a) * 5);
      const py = Math.round(8 + Math.sin(a) * 5);
      grid.fillEllipse(px, py, 3, 3, '#F472B6');
    }
    grid.fillCircle(16, 8, 3, colors.highlight);
    // Leaves
    grid.fillEllipse(8, 22, 4, 6, '#6FBA2C');
    grid.fillEllipse(24, 22, 4, 6, '#6FBA2C');
  } else if (form === 'elemental') {
    // Elemental form - floating
    grid.fillCircle(16, 16 + (sway - 3), 10, colors.primary);
    grid.strokeCircle(16, 16 + (sway - 3), 10, colors.outline);
    // Inner glow
    grid.fillCircle(16, 16 + (sway - 3), 6, colors.highlight);
    grid.fillCircle(16, 16 + (sway - 3), 3, '#FFFFFF');
    // Particles
    for (let i = 0; i < 8; i++) {
      const a = (i * 45 + sway * 10) * Math.PI / 180;
      const px = Math.round(16 + Math.cos(a) * 14);
      const py = Math.round(16 + (sway - 3) + Math.sin(a) * 14);
      grid.setPixel(px, py, colors.highlight);
    }
  }
  
  // Eyes
  const eyeY = form === 'beast' ? 14 : 10;
  const eyeX = form === 'beast' ? 8 : 14;
  grid.fillCircle(eyeX + lean, eyeY, 2, '#FFFFFF');
  grid.fillCircle(eyeX + 4 + lean, eyeY, 2, '#FFFFFF');
  grid.setPixel(eyeX + lean, eyeY, colors.outline);
  grid.setPixel(eyeX + 4 + lean, eyeY, colors.outline);
  
  // Shadow
  grid.hLine(8, 31, 16, '#888888');
}

function renderSprite(soulbeast, frame = 0) {
  const grid = new PixelGrid();
  const colors = getPalette(soulbeast.faction);
  
  switch (soulbeast.stage) {
    case 0: drawEgg(grid, colors, soulbeast.faction); break;
    case 1: drawBaby(grid, colors, soulbeast.faction, soulbeast.form, frame); break;
    case 2: drawInTraining(grid, colors, soulbeast.faction, soulbeast.form, frame); break;
    case 3: drawRookie(grid, colors, soulbeast.faction, soulbeast.form, frame); break;
    default: drawRookie(grid, colors, soulbeast.faction, soulbeast.form, frame);
  }
  
  return grid.toSVG();
}

// === Game Logic ===
function createSoulBeast(name, faction, form) {
  const personalityKeys = Object.keys(PERSONALITIES);
  const personality = personalityKeys[Math.floor(Math.random() * personalityKeys.length)];
  
  const baseStats = FACTIONS[faction].baseStats;
  const mult = STAGE_MULT[0];
  const mods = PERSONALITIES[personality].mods || {};
  
  const stats = {
    hp: Math.floor(baseStats.hp * mult.hp * (mods.hp || 1)),
    atk: Math.floor(baseStats.atk * mult.atk * (mods.atk || 1)),
    def: Math.floor(baseStats.def * mult.def * (mods.def || 1)),
    spa: Math.floor(baseStats.spa * mult.spa * (mods.spa || 1)),
    spd: Math.floor(baseStats.spd * mult.spd * (mods.spd || 1)),
    agi: Math.floor(baseStats.agi * mult.agi * (mods.agi || 1))
  };
  
  return {
    id: 'sb_' + Date.now(),
    name,
    faction,
    form,
    personality,
    stage: 0,
    level: 0,
    evoValue: 0,
    stats,
    mood: 50,
    satiety: 80,
    affinity: 0,
    createdAt: Date.now(),
    lastActive: Date.now()
  };
}

function getMoodIcon(mood) {
  for (const state of MOOD_STATES) {
    if (mood >= state.min && mood <= state.max) return state.icon;
  }
  return '😐';
}

function canEvolve() {
  if (!soulbeast || soulbeast.stage >= 5) return false;
  const req = EVO_STAGES[soulbeast.stage + 1]?.evoReq || 0;
  return soulbeast.evoValue >= req;
}

function evolve() {
  if (!canEvolve()) return false;
  
  const oldStage = soulbeast.stage;
  soulbeast.stage++;
  soulbeast.level = soulbeast.stage * 10;
  
  // Update stats
  const baseStats = FACTIONS[soulbeast.faction].baseStats;
  const mult = STAGE_MULT[soulbeast.stage];
  const mods = PERSONALITIES[soulbeast.personality].mods || {};
  
  soulbeast.stats = {
    hp: Math.floor(baseStats.hp * mult.hp * (mods.hp || 1)),
    atk: Math.floor(baseStats.atk * mult.atk * (mods.atk || 1)),
    def: Math.floor(baseStats.def * mult.def * (mods.def || 1)),
    spa: Math.floor(baseStats.spa * mult.spa * (mods.spa || 1)),
    spd: Math.floor(baseStats.spd * mult.spd * (mods.spd || 1)),
    agi: Math.floor(baseStats.agi * mult.agi * (mods.agi || 1))
  };
  
  // Reset evo value (keep overflow)
  const req = EVO_STAGES[oldStage + 1]?.evoReq || 0;
  soulbeast.evoValue = Math.max(0, soulbeast.evoValue - req);
  
  return true;
}

// === UI Functions ===
function showToast(msg, type = '') {
  const toast = $('toast');
  toast.textContent = msg;
  toast.className = 'toast visible ' + type;
  setTimeout(() => toast.classList.remove('visible'), 3000);
}

function showMessage(msg) {
  const bubble = $('message-bubble');
  bubble.textContent = msg;
  bubble.classList.add('visible');
  setTimeout(() => bubble.classList.remove('visible'), 2000);
}

function updateUI() {
  if (!soulbeast) {
    $('empty-state').style.display = 'block';
    $('stats-panel').style.display = 'none';
    $('evo-panel').style.display = 'none';
    $('personality-panel').style.display = 'none';
    $('actions').style.display = 'none';
    $('pet-card').classList.remove('anim-idle', 'anim-egg');
    return;
  }
  
  $('empty-state').style.display = 'none';
  $('stats-panel').style.display = 'block';
  $('evo-panel').style.display = 'block';
  $('personality-panel').style.display = 'block';
  $('actions').style.display = 'grid';
  
  // Pet card
  $('pet-name').textContent = soulbeast.name;
  
  // Meta tags
  const factionClass = soulbeast.faction;
  $('pet-meta').innerHTML = `
    <span class="tag faction-tag ${factionClass}">${FACTIONS[soulbeast.faction].name}</span>
    <span class="tag stage-tag">${EVO_STAGES[soulbeast.stage].name}</span>
    <span class="tag" style="background:rgba(255,255,255,0.1)">Lv.${soulbeast.level}</span>
  `;
  
  // Mood
  $('mood-display').textContent = getMoodIcon(soulbeast.mood);
  
  // Stats
  const statColors = { hp: '#22C55E', atk: '#EF4444', def: '#3B82F6', spa: '#EC4899', spd: '#14B8A6', agi: '#F59E0B' };
  $('stats-grid').innerHTML = Object.entries(soulbeast.stats).map(([key, val]) => {
    const max = key === 'hp' ? 200 : 150;
    const pct = Math.min(100, (val / max) * 100);
    return `
      <div class="stat-item">
        <span class="stat-label">${key.toUpperCase()}</span>
        <span class="stat-value">${val}</span>
        <div class="stat-bar">
          <div class="stat-bar-fill" style="width:${pct}%;background:${statColors[key]}"></div>
        </div>
      </div>
    `;
  }).join('');
  
  // Evolution
  const nextStage = EVO_STAGES[soulbeast.stage + 1];
  if (nextStage) {
    $('evo-next-stage').textContent = `→ ${nextStage.name}`;
    const req = nextStage.evoReq;
    const pct = Math.min(100, (soulbeast.evoValue / req) * 100);
    $('evo-bar-fill').style.width = pct + '%';
    $('evo-bar-fill').classList.toggle('can-evolve', canEvolve());
    $('evo-current').textContent = soulbeast.evoValue;
    $('evo-target').textContent = req;
    $('btn-evolve').disabled = !canEvolve();
  } else {
    $('evo-next-stage').textContent = '已满级';
    $('evo-bar-fill').style.width = '100%';
    $('evo-bar-fill').classList.remove('can-evolve');
    $('btn-evolve').disabled = true;
  }
  
  // Personality
  const p = PERSONALITIES[soulbeast.personality];
  $('personality-chip').innerHTML = `
    <span class="personality-icon">${p.icon}</span>
    <span class="personality-name">${p.name}</span>
    <span class="personality-bias">${p.bias}</span>
  `;
  
  // Animation class
  const petCard = $('pet-card');
  petCard.classList.remove('anim-idle', 'anim-egg');
  if (soulbeast.stage === 0) {
    petCard.classList.add('anim-egg');
  } else {
    petCard.classList.add('anim-idle');
  }
  
  // Render sprite
  $('pet-canvas').innerHTML = renderSprite(soulbeast, animationFrame);
}

// === Interaction Handlers ===
function handlePet() {
  if (!soulbeast) return;
  const now = Date.now();
  if (lastInteraction.pet && now - lastInteraction.pet < 30000) {
    showToast('抚摸冷却中...', 'warning');
    return;
  }
  lastInteraction.pet = now;
  
  soulbeast.mood = Math.min(100, soulbeast.mood + 5);
  soulbeast.affinity = Math.min(100, soulbeast.affinity + 2);
  soulbeast.evoValue += 2;
  
  const msg = REACTIONS.pet[Math.floor(Math.random() * REACTIONS.pet.length)];
  showMessage(msg);
  showToast('心情+5, 亲密度+2', 'success');
  updateUI();
}

function handleFeed() {
  if (!soulbeast) return;
  const now = Date.now();
  if (lastInteraction.feed && now - lastInteraction.feed < 120000) {
    showToast('喂食冷却中...', 'warning');
    return;
  }
  lastInteraction.feed = now;
  
  soulbeast.satiety = Math.min(100, soulbeast.satiety + 20);
  soulbeast.mood = Math.min(100, soulbeast.mood + 10);
  soulbeast.affinity = Math.min(100, soulbeast.affinity + 3);
  soulbeast.evoValue += 5;
  
  const msg = REACTIONS.feed[Math.floor(Math.random() * REACTIONS.feed.length)];
  showMessage(msg);
  showToast('饱食度+20, 心情+10', 'success');
  updateUI();
}

function handleTrain() {
  if (!soulbeast) return;
  if (soulbeast.stage === 0) {
    showToast('蛋阶段无法训练', 'warning');
    return;
  }
  const now = Date.now();
  if (lastInteraction.train && now - lastInteraction.train < 600000) {
    showToast('训练冷却中...', 'warning');
    return;
  }
  lastInteraction.train = now;
  
  // Random stat boost
  const statKeys = ['atk', 'def', 'spa', 'spd', 'agi'];
  const boostStat = statKeys[Math.floor(Math.random() * statKeys.length)];
  soulbeast.stats[boostStat] += 2;
  soulbeast.evoValue += 10;
  soulbeast.mood = Math.max(0, soulbeast.mood - 5);
  
  const msg = REACTIONS.train[Math.floor(Math.random() * REACTIONS.train.length)];
  showMessage(msg);
  showToast(`${boostStat.toUpperCase()}+2, 进化值+10`, 'success');
  updateUI();
}

function handleEvolve() {
  if (!canEvolve()) return;
  
  $('pet-card').classList.add('anim-evolve');
  
  setTimeout(() => {
    const oldStage = soulbeast.stage;
    evolve();
    
    const msg = REACTIONS.evolve[Math.floor(Math.random() * REACTIONS.evolve.length)];
    showMessage(msg);
    showToast(`进化成功! ${EVO_STAGES[oldStage].name} → ${EVO_STAGES[soulbeast.stage].name}`, 'success');
    
    $('pet-card').classList.remove('anim-evolve');
    updateUI();
  }, 1500);
}

// === Summon Modal ===
let selectedFaction = null;
let selectedForm = null;

function openSummonModal() {
  $('summon-modal').classList.add('active');
  selectedFaction = null;
  selectedForm = null;
  $('name-input').value = '';
  
  // Clear selections
  document.querySelectorAll('.selection-option').forEach(el => {
    el.classList.remove('selected', 'vaccine', 'virus', 'data');
  });
  $('btn-summon').disabled = true;
}

function closeSummonModal() {
  $('summon-modal').classList.remove('active');
}

function handleSummon() {
  const name = $('name-input').value.trim();
  if (!name) {
    showToast('请输入名字', 'warning');
    return;
  }
  if (!selectedFaction || !selectedForm) {
    showToast('请选择种族和形态', 'warning');
    return;
  }
  
  soulbeast = createSoulBeast(name, selectedFaction, selectedForm);
  closeSummonModal();
  showToast(`召唤成功! ${name}降临了!`, 'success');
  updateUI();
  
  // Start animation loop
  startAnimationLoop();
}

// === Animation Loop ===
function startAnimationLoop() {
  setInterval(() => {
    animationFrame++;
    if (soulbeast) {
      $('pet-canvas').innerHTML = renderSprite(soulbeast, animationFrame);
    }
  }, 500);
}

// === Passive Effects ===
function startPassiveEffects() {
  // Mood decay every minute
  setInterval(() => {
    if (soulbeast) {
      soulbeast.mood = Math.max(5, soulbeast.mood - 1);
      soulbeast.satiety = Math.max(0, soulbeast.satiety - 0.5);
      
      // Low satiety affects mood
      if (soulbeast.satiety < 20) {
        soulbeast.mood = Math.max(0, soulbeast.mood - 2);
      }
      
      updateUI();
    }
  }, 60000);
}

// === Event Binding ===
document.addEventListener('DOMContentLoaded', () => {
  // Create button
  $('btn-create').addEventListener('click', openSummonModal);
  
  // Faction selection
  document.querySelectorAll('#faction-grid .selection-option').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('#faction-grid .selection-option').forEach(e => {
        e.classList.remove('selected', 'vaccine', 'virus', 'data');
      });
      el.classList.add('selected', el.dataset.faction);
      selectedFaction = el.dataset.faction;
      checkSummonReady();
    });
  });
  
  // Form selection
  document.querySelectorAll('#form-grid .selection-option').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('#form-grid .selection-option').forEach(e => {
        e.classList.remove('selected');
      });
      el.classList.add('selected');
      selectedForm = el.dataset.form;
      checkSummonReady();
    });
  });
  
  // Name input
  $('name-input').addEventListener('input', checkSummonReady);
  
  // Summon button
  $('btn-summon').addEventListener('click', handleSummon);
  
  // Close modal on overlay click
  $('summon-modal').addEventListener('click', (e) => {
    if (e.target === $('summon-modal')) closeSummonModal();
  });
  
  // Action buttons
  $('btn-pet').addEventListener('click', handlePet);
  $('btn-feed').addEventListener('click', handleFeed);
  $('btn-train').addEventListener('click', handleTrain);
  $('btn-evolve').addEventListener('click', handleEvolve);
  
  // Start passive effects
  startPassiveEffects();
  
  // Initial UI
  updateUI();
});

function checkSummonReady() {
  const name = $('name-input').value.trim();
  $('btn-summon').disabled = !selectedFaction || !selectedForm || !name;
}
</script>
</body>
</html>
