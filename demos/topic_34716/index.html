<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self';">
<link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <div class="header-left">
        <div class="logo"></div>
        <span class="title">PasteTodo</span>
        <span class="sub">一贴即办</span>
      </div>
      <button class="close-btn" id="closeBtn" title="收起">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2.2" stroke-linecap="round">
          <line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/>
        </svg>
      </button>
    </div>

    <div id="listSection">
      <div class="list-header">
        <span class="count" id="countText">0 项</span>
        <button id="clearDone" class="ghost-btn" title="清除已完成">清空已完成</button>
      </div>
      <ul id="todoList"></ul>
    </div>

    <div id="addArea">
      <input type="text" id="addInput" placeholder="再加一条，回车即可…" />
      <button id="addBtn" class="primary-btn small">添加</button>
    </div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
