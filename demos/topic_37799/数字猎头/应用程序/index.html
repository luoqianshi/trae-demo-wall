<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数字猎头 · 首页</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/page1.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="logo">
        <span class="logo-mark">◆</span>
        <span class="logo-text">数字猎头</span>
      </div>
      <nav class="steps">
        <div class="step active">
          <span class="step-num">1</span>
          <span class="step-label">信息输入</span>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <span class="step-num">2</span>
          <span class="step-label">信息抽取</span>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <span class="step-num">3</span>
          <span class="step-label">职位检索</span>
        </div>
      </nav>
    </header>

    <main class="app-main">
      <section class="hero">
        <h1>让你的简历被看见</h1>
        <p class="hero-sub">输入个人介绍，系统将智能提取关键信息，为你匹配精准岗位。</p>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>个人介绍</h2>
          <button class="btn btn-outline" id="btnIntroTemplate">选择个人介绍模板</button>
        </div>
        <textarea
          id="introText"
          class="textarea"
          rows="10"
          placeholder="请输入你的个人介绍，例如：工作经验、项目经历、核心技能、求职意向..."
        ></textarea>
        <div class="counter">
          <span id="introCount">0</span> 字
        </div>
      </section>

      <section class="action-bar">
        <button class="btn btn-primary btn-large" id="btnNext">下一步 · 信息抽取 →</button>
      </section>
    </main>

    <footer class="app-footer">
      <span>© 数字猎头 Demo · 所有信息仅本地留存</span>
    </footer>
  </div>

  <!-- 模板选择弹窗 -->
  <div class="modal" id="templateModal" aria-hidden="true">
    <div class="modal-mask" data-close></div>
    <div class="modal-dialog">
      <div class="modal-header">
        <h3 id="modalTitle">选择模板</h3>
        <button class="icon-btn" data-close aria-label="关闭">✕</button>
      </div>
      <div class="modal-body" id="templateList"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-close>取消</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" aria-hidden="true"></div>

  <script src="assets/js/templates.js"></script>
  <script src="assets/js/page1.js"></script>
</body>
</html>
