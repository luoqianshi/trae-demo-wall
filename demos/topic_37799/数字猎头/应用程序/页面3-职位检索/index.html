<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数字猎头 · 职位检索</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/page3.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <a class="logo" href="../index.html">
        <span class="logo-mark">◆</span>
        <span class="logo-text">数字猎头</span>
      </a>
      <nav class="steps">
        <div class="step active"><span class="step-num">1</span><span class="step-label">信息输入</span></div>
        <div class="step-line active-line"></div>
        <div class="step active"><span class="step-num">2</span><span class="step-label">信息抽取</span></div>
        <div class="step-line active-line"></div>
        <div class="step active"><span class="step-num">3</span><span class="step-label">职位检索</span></div>
      </nav>
    </header>

    <main class="app-main">
      <!-- 用户信号 -->
      <section class="hero">
        <h1>为你匹配的岗位</h1>
        <p class="hero-sub">
          根据你的 <span id="signalSummary" class="signal-text">技能</span>，
          从职位库中智能筛选并排序。
        </p>
      </section>

      <!-- 匹配过程 -->
      <section class="card process-card" id="processCard">
        <div class="card-header">
          <h2><span class="pulse-dot running" id="processDot"></span>TRAE Auto Model · 智能匹配</h2>
          <span class="badge badge-soft" id="processStatus">分析中...</span>
        </div>
        <div class="process-log" id="processLog"></div>
      </section>

      <!-- 筛选区 -->
      <section class="card filter-card" id="filterCard" style="display:none;">
        <div class="filter-row">
          <div class="filter-item">
            <label>搜索</label>
            <input type="text" id="searchInput" placeholder="公司/岗位/技能关键词" />
          </div>
          <div class="filter-item">
            <label>行业</label>
            <select id="industryFilter"><option value="">全部</option></select>
          </div>
          <div class="filter-item">
            <label>排序</label>
            <select id="sortSelect">
              <option value="match">匹配度</option>
              <option value="age_friendly">年龄友好度</option>
              <option value="wlb">工作生活平衡</option>
              <option value="salary">薪资水平</option>
            </select>
          </div>
          <div class="filter-item stats-item">
            <span id="matchCount" class="stats-badge">共 0 个岗位</span>
          </div>
        </div>
      </section>

      <!-- 岗位卡片列表 -->
      <section id="positionList" class="position-list"></section>

      <!-- 底部操作栏 -->
      <section class="action-bar" id="actionBar" style="display:none;">
        <div class="action-info">
          <span id="selectedInfo">已选 0 个岗位</span>
        </div>
        <div class="action-buttons">
          <button class="btn btn-ghost" id="btnBackToPage2">← 返回信息抽取</button>
          <button class="btn btn-ghost" id="btnSelectAll">全选Top10</button>
          <button class="btn btn-ghost" id="btnClearSelection">取消选中职位</button>
          <button class="btn btn-ghost" id="btnShowSelectedOnly">只看选中职位</button>
          <button class="btn btn-primary" id="btnGenerateResume">根据职位生成简历模板</button>
          <button class="btn btn-primary" id="btnApply">投递简历</button>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <span>© 数字猎头 Demo · 所有信息仅本地留存</span>
    </footer>
  </div>

  <!-- 岗位详情弹窗 -->
  <div class="modal" id="detailModal" aria-hidden="true">
    <div class="modal-mask" data-close></div>
    <div class="modal-dialog detail-dialog">
      <div class="modal-header">
        <h3 id="detailTitle">岗位详情</h3>
        <button class="icon-btn" data-close aria-label="关闭">✕</button>
      </div>
      <div class="modal-body" id="detailBody"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-close>关闭</button>
        <button class="btn btn-primary" id="btnSelectFromDetail">选择此岗位</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" aria-hidden="true"></div>

  <!-- 依赖脚本 -->
  <script src="../assets/js/position_data.js"></script>
  <script src="../assets/js/page3.js"></script>
</body>
</html>
