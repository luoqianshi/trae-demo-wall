// ===== Functions =====
function setStock(code) {
  document.getElementById('stockInput').value = code;
}

function formatTime() {
  const now = new Date();
  return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
}

function startGenerate() {
  const input = document.getElementById('stockInput').value.trim();
  if (!input || input.length !== 6 || !/^\d{6}$/.test(input)) {
    alert('请输入6位数字股票代码');
    return;
  }

  const data = stockDB[input];
  if (!data) {
    alert('暂不支持该股票代码的演示，请尝试：000657、600160、603986、300666');
    return;
  }

  // Switch to loading
  document.getElementById('hero').style.display = 'none';
  document.getElementById('loadingScreen').classList.add('active');
  document.getElementById('report').classList.remove('active');

  // Animate steps
  const steps = document.querySelectorAll('.loading-step');
  steps.forEach(s => { s.classList.remove('active','done'); s.querySelector('.step-time').textContent = '--'; });

  let stepIdx = 0;
  const stepTimes = [800, 2500, 2500, 2500, 3000];

  function runStep() {
    if (stepIdx > 0) {
      steps[stepIdx-1].classList.remove('active');
      steps[stepIdx-1].classList.add('done');
      steps[stepIdx-1].querySelector('.step-time').textContent = formatTime();
    }
    if (stepIdx >= steps.length) {
      setTimeout(() => showReport(input, data), 500);
      return;
    }
    steps[stepIdx].classList.add('active');
    document.getElementById('loadingTitle').textContent = steps[stepIdx].querySelector('.step-text').textContent + '...';
    setTimeout(() => { stepIdx++; runStep(); }, stepTimes[stepIdx]);
  }
  runStep();
}

function showReport(code, data) {
  document.getElementById('loadingScreen').classList.remove('active');
  const report = document.getElementById('report');
  report.innerHTML = generateReportHTML(code, data);
  report.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
