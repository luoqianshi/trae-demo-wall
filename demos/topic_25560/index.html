<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生拍卖会</title>
<style>
/* ========== 基础重置与变量 ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #08080d;
  --gold: #f5c542;
  --gold-dim: #b8922e;
  --gold-glow: rgba(245, 197, 66, 0.25);
  --text: #e8e6e1;
  --text-dim: #8a8780;
  --card-bg: rgba(255, 255, 255, 0.04);
  --card-border: rgba(245, 197, 66, 0.15);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ========== 1.2 屏幕震动动画 ========== */
@keyframes shake {
  0%   { transform: translateX(0); }
  10%  { transform: translateX(-4px); }
  20%  { transform: translateX(4px); }
  30%  { transform: translateX(-4px); }
  40%  { transform: translateX(4px); }
  50%  { transform: translateX(-2px); }
  60%  { transform: translateX(2px); }
  70%  { transform: translateX(-2px); }
  80%  { transform: translateX(2px); }
  90%  { transform: translateX(-1px); }
  100% { transform: translateX(0); }
}
body.shake {
  animation: shake 0.3s ease-out;
}

/* ========== 1.3 涟漪特效 ========== */
@keyframes ripple {
  0%   { transform: scale(0); opacity: 0.4; }
  100% { transform: scale(4); opacity: 0; }
}
.ripple-effect {
  position: absolute;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  pointer-events: none;
  animation: ripple 0.6s ease-out forwards;
}

/* ========== 1.4 冲击波特效 ========== */
@keyframes shockwave {
  0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0.6; }
  100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
}
.shockwave {
  position: fixed;
  width: 120px; height: 120px;
  border-radius: 50%;
  border: 3px solid;
  pointer-events: none;
  z-index: 101;
  animation: shockwave 0.6s ease-out forwards;
}

/* ========== 1.7 鼠标跟踪光效 ========== */
.mouse-glow {
  position: fixed;
  width: 400px; height: 400px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
  transform: translate(-50%, -50%);
  transition: background 0.5s ease;
  opacity: 0.6;
}

/* ========== 通用工具 ========== */
.page {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.6s ease, transform 0.6s ease;
  opacity: 0; pointer-events: none;
  transform: translateY(12px);
}
.page.active {
  opacity: 1; pointer-events: auto;
  transform: translateY(0);
}

/* ========== 浮动粒子 ========== */
.particles {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0;
  animation: particleFloat linear infinite;
}
@keyframes particleFloat {
  0%   { opacity: 0; transform: translateY(0) scale(0.6); }
  15%  { opacity: 0.7; }
  50%  { opacity: 0.4; }
  85%  { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-100vh) scale(1); }
}

/* ========== 入场页 ========== */
#entry {
  z-index: 10;
  text-align: center;
  gap: 20px;
}
#entry .hammer {
  font-size: 64px;
  display: inline-block;
  animation: hammerSwing 1.8s ease-in-out infinite;
  transform-origin: bottom center;
}
@keyframes hammerSwing {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-25deg); }
  50% { transform: rotate(0deg); }
  75% { transform: rotate(15deg); }
}
#entry h1 {
  font-size: clamp(36px, 7vw, 64px);
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.12em;
  text-shadow: 0 0 40px var(--gold-glow), 0 0 80px rgba(245,197,66,0.1);
}
#entry .subtitle {
  font-size: clamp(16px, 3vw, 22px);
  color: var(--text-dim);
  font-weight: 300;
  letter-spacing: 0.15em;
  margin-top: -4px;
}
.btn-enter {
  margin-top: 24px;
  padding: 14px 48px;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--bg);
  background: linear-gradient(135deg, var(--gold), #e0a800);
  border: none; border-radius: 60px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.3s;
  box-shadow: 0 4px 24px var(--gold-glow);
  position: relative;
  overflow: hidden;
}
.btn-enter:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 36px rgba(245,197,66,0.4);
}
.btn-enter:active { transform: scale(0.97); }

/* ========== 拍卖流程页 ========== */
#auction {
  z-index: 10;
  padding: 24px;
  justify-content: flex-start;
  padding-top: 40px;
}

/* 顶部状态栏 */
.auction-header {
  width: 100%; max-width: 560px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.tokens {
  font-size: 20px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.tokens .coin { transition: transform 0.3s, opacity 0.3s; }
.tokens .coin.spent { opacity: 0.2; transform: scale(0.7); }
.progress-text { font-size: 15px; color: var(--text-dim); }

/* 进度条 */
.progress-bar-wrap {
  width: 100%; max-width: 560px;
  height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.06);
  margin-bottom: 36px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  transition: width 0.5s ease;
}

/* 1.1 拍品卡片 - 3D透视效果 */
.item-card-wrap {
  width: 100%; max-width: 560px;
  perspective: 1000px;
}
.item-card {
  width: 100%;
  text-align: center;
  transition: opacity 0.5s ease, transform 0.5s ease;
  transform-style: preserve-3d;
  will-change: transform;
}
/* 1.5 拍品切换3D翻转 - 退出 */
.item-card.flip-out {
  opacity: 0;
  transform: rotateY(30deg);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
/* 1.5 拍品切换3D翻转 - 进入 */
.item-card.flip-in {
  opacity: 0;
  transform: rotateY(-30deg);
  transition: none;
}
.item-card.flip-in-active {
  opacity: 1;
  transform: rotateY(0deg);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
/* 1.1 图标层和文字层不同Z偏移 */
.item-emoji {
  font-size: 56px;
  margin-bottom: 16px;
  filter: drop-shadow(0 0 20px var(--gold-glow));
  transition: filter 0.3s;
  transform: translateZ(40px);
}
.item-text-layer {
  transform: translateZ(20px);
}
.item-number {
  font-size: 13px; color: var(--text-dim);
  letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 12px;
}
.item-name {
  font-size: clamp(24px, 5vw, 32px);
  font-weight: 700;
  margin-bottom: 6px;
  transition: color 0.3s;
}
.item-tag {
  display: inline-block;
  font-size: 12px; font-weight: 600;
  padding: 3px 14px;
  border-radius: 20px;
  margin-bottom: 18px;
  letter-spacing: 0.08em;
  border: 1px solid;
}
.item-desc {
  font-size: 15px; line-height: 1.8;
  color: var(--text-dim);
  max-width: 440px; margin: 0 auto 20px;
}
.item-poem {
  font-size: 14px; line-height: 2;
  color: var(--gold-dim);
  font-style: italic;
  white-space: pre-line;
  margin-bottom: 32px;
}

/* 操作按钮 */
.actions {
  display: flex; gap: 16px;
  margin-bottom: 28px;
}
.btn-bid, .btn-pass {
  padding: 12px 40px;
  font-size: 16px; font-weight: 600;
  border-radius: 50px;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: transform 0.2s, box-shadow 0.25s, background 0.25s;
  border: none;
  position: relative;
  overflow: hidden;
}
.btn-bid {
  color: var(--bg);
  background: linear-gradient(135deg, var(--gold), #e0a800);
  box-shadow: 0 2px 16px var(--gold-glow);
}
.btn-bid:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 28px rgba(245,197,66,0.45);
}
.btn-bid:active { transform: scale(0.96); }
.btn-bid:disabled {
  opacity: 0.35; cursor: not-allowed;
  transform: none; box-shadow: none;
}
.btn-pass {
  color: var(--text-dim);
  background: transparent;
  border: 1px solid rgba(255,255,255,0.12);
}
.btn-pass:hover {
  border-color: rgba(255,255,255,0.3);
  color: var(--text);
  transform: scale(1.03);
}
.btn-pass:active { transform: scale(0.96); }

/* 已选拍品图标 */
.selected-items {
  display: flex; gap: 8px;
  font-size: 22px;
  min-height: 30px;
  align-items: center;
}
.selected-items .sel-icon {
  animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* 出价闪光效果 */
.flash-overlay {
  position: fixed; inset: 0;
  background: radial-gradient(circle at center, rgba(245,197,66,0.3) 0%, transparent 70%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 100;
}
.flash-overlay.show { opacity: 1; }

/* ========== 结果页 ========== */
#result {
  z-index: 10;
  padding: 32px 24px;
  overflow-y: auto;
  justify-content: flex-start;
  padding-top: 48px;
  gap: 0;
}
.result-container {
  width: 100%; max-width: 560px;
  text-align: center;
  /* 1.6 结果页卡片3D翻转入场 */
  transform: rotateX(15deg) rotateY(-10deg) scale(0.9);
  opacity: 0;
  transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1), opacity 1s cubic-bezier(0.16, 1, 0.3, 1);
}
.result-container.revealed {
  transform: rotateX(0) rotateY(0) scale(1);
  opacity: 1;
}
.result-persona-title {
  font-size: clamp(28px, 6vw, 42px);
  font-weight: 700;
  margin-bottom: 8px;
  text-shadow: 0 0 30px var(--gold-glow);
}
.result-tag {
  display: inline-block;
  font-size: 13px; font-weight: 600;
  padding: 4px 18px;
  border-radius: 20px;
  margin-bottom: 24px;
  letter-spacing: 0.08em;
  border: 1px solid;
}
.result-desc {
  font-size: 15px; line-height: 2;
  color: var(--text-dim);
  max-width: 460px; margin: 0 auto 32px;
}

/* 价值观光谱条形图 */
.spectrum {
  width: 100%; max-width: 440px;
  margin: 0 auto 32px;
  text-align: left;
}
.spectrum-row {
  display: flex; align-items: center;
  margin-bottom: 12px; gap: 10px;
}
.spectrum-label {
  width: 52px; font-size: 13px;
  text-align: right; flex-shrink: 0;
  color: var(--text-dim);
}
.spectrum-bar-wrap {
  flex: 1; height: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px; overflow: hidden;
}
.spectrum-bar-fill {
  height: 100%; border-radius: 4px;
  width: 0;
  transition: width 1s cubic-bezier(0.22,1,0.36,1);
}
.spectrum-value {
  width: 24px; font-size: 13px;
  color: var(--text-dim); flex-shrink: 0;
}

/* 已选拍品列表 */
.result-items {
  display: flex; flex-wrap: wrap;
  gap: 10px; justify-content: center;
  margin-bottom: 24px;
}
.result-item-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  font-size: 13px;
}
.result-item-chip .chip-emoji { font-size: 16px; }

/* 隐藏面 */
.hidden-side {
  margin-bottom: 32px;
  padding: 16px 20px;
  border-radius: 12px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  text-align: center;
}
.hidden-side .hs-label {
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 0.12em; margin-bottom: 6px;
}
.hidden-side .hs-title {
  font-size: 18px; font-weight: 600;
}

.btn-restart {
  padding: 12px 40px;
  font-size: 16px; font-weight: 600;
  color: var(--gold);
  background: transparent;
  border: 1px solid var(--gold-dim);
  border-radius: 50px;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: transform 0.2s, background 0.25s, color 0.25s;
  margin-bottom: 40px;
  position: relative;
  overflow: hidden;
}
.btn-restart:hover {
  background: var(--gold);
  color: var(--bg);
  transform: scale(1.04);
}
.btn-restart:active { transform: scale(0.96); }

/* 结果页粒子爆炸 */
.burst-particle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 99;
  animation: burst 1s ease-out forwards;
}
@keyframes burst {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--bx), var(--by)) scale(0); }
}

/* ========== 音乐开关按钮 ========== */
.bgm-toggle {
  position: fixed;
  top: 16px; right: 16px;
  z-index: 200;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, border-color 0.2s;
  backdrop-filter: blur(8px);
}
.bgm-toggle:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.25);
}

/* ========== 响应式 ========== */
@media (max-height: 700px) {
  .item-emoji { font-size: 40px; margin-bottom: 10px; }
  .item-desc { font-size: 14px; margin-bottom: 14px; }
  .item-poem { font-size: 13px; margin-bottom: 20px; }
  .actions { margin-bottom: 16px; }
}
</style>
</head>
<body>

<!-- 浮动粒子背景 -->
<div class="particles" id="particles"></div>

<!-- 出价闪光 -->
<div class="flash-overlay" id="flash"></div>

<!-- 1.7 鼠标跟踪光效 -->
<div class="mouse-glow" id="mouseGlow"></div>

<!-- 音乐开关按钮 -->
<button class="bgm-toggle" id="bgmToggle" onclick="toggleBGM()" style="display:none">🎵</button>



<!-- ====== 入场页 ====== -->
<div class="page active" id="entry">
  <div class="hammer">🔨</div>
  <h1>人生拍卖会</h1>
  <p class="subtitle">你愿意为什么出价？</p>
  <button class="btn-enter" onclick="startAuction(event)">进入拍卖行</button>
</div>

<!-- ====== 拍卖流程页 ====== -->
<div class="page" id="auction">
  <div class="auction-header">
    <div class="tokens" id="tokensDisplay"></div>
    <div class="progress-text" id="progressText">1 / 12</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>
  <!-- 1.1 3D透视卡片容器 -->
  <div class="item-card-wrap" id="itemCardWrap">
    <div class="item-card" id="itemCard">
      <div class="item-number" id="itemNumber"></div>
      <div class="item-emoji" id="itemEmoji"></div>
      <div class="item-text-layer">
        <div class="item-name" id="itemName"></div>
        <div class="item-tag" id="itemTag"></div>
        <div class="item-desc" id="itemDesc"></div>
        <div class="item-poem" id="itemPoem"></div>
      </div>
    </div>
  </div>
  <div class="actions">
    <button class="btn-bid" id="btnBid" onclick="bid(event)">出价</button>
    <button class="btn-pass" onclick="pass(event)">放弃</button>
  </div>
  <div class="selected-items" id="selectedItems"></div>
</div>

<!-- ====== 结果页 ====== -->
<div class="page" id="result">
  <div class="result-container" id="resultContainer"></div>
</div>

<script>
/* ========== 拍品数据 ========== */
const ITEMS = [
  { emoji:'💍', name:'与爱人白头偕老的能力', category:'挚爱', color:'#e8b4b8',
    desc:'不是相遇的运气，而是相守的能力。在漫长岁月里，依然选择彼此的每一天。',
    poem:'你是我漫长岁月里，\n唯一不会厌倦的风景。' },
  { emoji:'🔍', name:'永远不失去好奇心', category:'成长', color:'#7ec8e3',
    desc:'对世界永远保持第一次看见时的惊叹。好奇心是灵魂的防腐剂。',
    poem:'世界那么大，\n我永远站在门口。' },
  { emoji:'🪞', name:'被真正理解一次的机会', category:'连结', color:'#c9a0dc',
    desc:'不是被赞同，不是被安慰，而是被真正听懂。这世上最奢侈的事，是被看见。',
    poem:'我所有说不出口的话，\n你都听见了。' },
  { emoji:'⚡', name:'改变世界的一瞬间', category:'成就', color:'#f5c542',
    desc:'哪怕只是改变了一个人、一条规则、一个不被看见的角落。',
    poem:'我点燃了一根火柴，\n整个夜空都记住了。' },
  { emoji:'🧘', name:'内心永远安宁', category:'安宁', color:'#88c9a1',
    desc:'不管外面多吵，心里始终有一间安静的房间。',
    poem:'风来时我是树，\n风去时我是山。' },
  { emoji:'🦅', name:'说「不」的自由', category:'自由', color:'#6eb5ff',
    desc:'不是任性，是终于有底气只做真实的自己。',
    poem:'我终于学会了拒绝，\n这比学会一切都要难。' },
  { emoji:'📷', name:'永远不会遗忘', category:'挚爱', color:'#f0a868',
    desc:'妈妈年轻时的声音，初恋的侧脸，孩子第一次叫你的那个下午。',
    poem:'我把所有的好日子，\n都存进了心里。' },
  { emoji:'🔥', name:'一次不顾一切的勇气', category:'自由', color:'#ff6b6b',
    desc:'不是不怕，是怕了还是做了。人生最大的遗憾从来不是失败，而是「我本可以」。',
    poem:'我怕极了，\n但我还是走了出去。' },
  { emoji:'🏠', name:'找到归属的地方', category:'连结', color:'#d4a574',
    desc:'一个不用伪装的角落，一群不用解释的人。',
    poem:'原来我一直在找的，\n不是远方，是回家。' },
  { emoji:'⏳', name:'重来一次的机会', category:'成长', color:'#a8d8ea',
    desc:'给那个错过的选择第二次机会。',
    poem:'如果时光倒流，\n我还是会犯同样的错，\n只是这次我会笑着。' },
  { emoji:'✨', name:'被记住的名字', category:'成就', color:'#ffd700',
    desc:'不是刻在石头上的那种，而是活在别人故事里的那种。',
    poem:'我不需要纪念碑，\n你的故事里提我就好。' },
  { emoji:'🌿', name:'无病无痛的一生', category:'安宁', color:'#7bc67e',
    desc:'健康时觉得理所当然，失去后才知道这是世间最大的奢侈。',
    poem:'最贵的不是金子，\n是清晨无痛醒来的那一刻。' }
];

/* 类别信息 */
const CATEGORIES = {
  '挚爱': { emoji:'💕', color:'#e8b4b8', titles:['深情守望者','永恒的信徒','爱的守护者'],
    descs:['你在世间最看重的是爱与被爱。你相信人活一世，最珍贵的不是拥有多少，而是和谁在一起。',
           '爱是你生命的引力。你为爱而来，为爱而战，为爱而柔软。世界在你眼中不是冰冷的荒原，而是充满温度的家园。'] },
  '自由': { emoji:'🕊️', color:'#6eb5ff', titles:['不羁的灵魂','自由的追风者','破壁之人'],
    descs:['你骨子里住着一只不愿被驯服的鸟。你可以忍受一切，唯独不能忍受被束缚。',
           '自由是你呼吸的空气。你不是叛逆，你只是清楚地知道，人生只有一次，不该活在别人的剧本里。'] },
  '成就': { emoji:'🏆', color:'#ffd700', titles:['星辰追逐者','时代的印记','不灭的火焰'],
    descs:['你渴望在世界上留下自己的印记。不是虚荣，而是你知道生命短暂，如果不燃烧，就只是冒烟。',
           '成就不是你的执念，而是你的本能。你无法忍受平庸，因为你知道自己可以做得更多、走得更远。'] },
  '连结': { emoji:'🤝', color:'#c9a0dc', titles:['灵魂的桥梁','温暖的灯塔','羁绊编织者'],
    descs:['你相信人与人的羁绊是生命最大的意义。你不是社交达人，而是真正在意每一段关系的人。',
           '你是人群中的温暖。你不需要很多人，但你需要真正的连接。你愿意花时间去理解、去倾听、去陪伴。'] },
  '成长': { emoji:'🌱', color:'#7ec8e3', titles:['永恒的旅人','未完成的杰作','破茧之人'],
    descs:['你永远在路上，永远在成为更好的自己。你不怕犯错，只怕停滞。',
           '成长是你的信仰。你不追求完美，你追求进步。每一天醒来，你都想知道今天的自己比昨天多了什么。'] },
  '安宁': { emoji:'☯️', color:'#88c9a1', titles:['静水深流','内心的王者','安宁的守护者'],
    descs:['你追求内心的平静，胜过一切外在的喧嚣。不是逃避，而是你比任何人都清楚——真正的力量来自内心的安宁。',
           '你是风暴中的静眼。世界越吵，你越安静。你知道所有外在的追逐终将归于平静，而你选择直接抵达那里。'] }
};

/* 类别顺序（用于光谱图） */
const CAT_ORDER = ['挚爱','自由','成就','连结','成长','安宁'];

/* ========== 状态 ========== */
let currentIndex = 0;
let tokens = 5;
let selected = []; // 已选拍品索引
let currentItemColor = '#f5c542'; // 当前拍品颜色，用于光效

/* ========== 粒子背景 ========== */
function createParticles() {
  const container = document.getElementById('particles');
  const count = 26;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 4;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = (60 + Math.random() * 50) + '%';
    p.style.animationDuration = (8 + Math.random() * 14) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    container.appendChild(p);
  }
}
createParticles();

/* ========== 背景音乐系统（温暖钢琴风格） ========== */
let bgmCtx = null;
let bgmGain = null;
let bgmPlaying = false;
let bgmMuted = false;
let bgmTimer = null;

/* C大调温暖音阶频率 */
const WARM_NOTES = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
/* 温暖和弦进行：I - V - vi - IV（C大调最经典的温暖进行） */
const CHORDS = [
  [261.63, 329.63, 392.00],  // C大三和弦
  [392.00, 493.88, 587.33],  // G大三和弦
  [261.63, 329.63, 440.00],  // A小三和弦
  [349.23, 440.00, 523.25],  // F大三和弦
];

function initBGM() {
  if (bgmCtx) return;
  bgmCtx = new (window.AudioContext || window.webkitAudioContext)();
  bgmGain = bgmCtx.createGain();
  bgmGain.gain.value = 0.35;
  bgmGain.connect(bgmCtx.destination);
  bgmPlaying = true;
  playWarmChordProgression();
}

/* 播放温暖的和弦进行循环 */
function playWarmChordProgression() {
  if (!bgmCtx || bgmMuted) {
    bgmTimer = setTimeout(playWarmChordProgression, 3000);
    return;
  }
  const chordIdx = Math.floor(Date.now() / 4000) % CHORDS.length;
  const chord = CHORDS[chordIdx];
  chord.forEach((freq, i) => {
    playWarmNote(freq, 0.12, 3.5, i * 0.15);
  });
  // 在和弦之间穿插一个高音旋律音符
  const melodyNote = WARM_NOTES[Math.floor(Math.random() * WARM_NOTES.length)] * 2;
  setTimeout(() => {
    if (bgmCtx && !bgmMuted) playWarmNote(melodyNote, 0.06, 1.5, 0);
  }, 2000);
  bgmTimer = setTimeout(playWarmChordProgression, 4000);
}

/* 播放一个温暖的音符（正弦波+三角波叠加，模拟钢琴质感） */
function playWarmNote(freq, vol, dur, delay) {
  if (!bgmCtx) return;
  const t = bgmCtx.currentTime + delay;
  // 正弦波基频
  const osc1 = bgmCtx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.value = freq;
  const g1 = bgmCtx.createGain();
  g1.gain.setValueAtTime(0, t);
  g1.gain.linearRampToValueAtTime(vol, t + 0.08);
  g1.gain.exponentialRampToValueAtTime(vol * 0.3, t + dur * 0.4);
  g1.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc1.connect(g1);
  g1.connect(bgmGain);
  osc1.start(t);
  osc1.stop(t + dur);
  // 三角波泛音（增加温暖感）
  const osc2 = bgmCtx.createOscillator();
  osc2.type = 'triangle';
  osc2.frequency.value = freq * 2;
  const g2 = bgmCtx.createGain();
  g2.gain.setValueAtTime(0, t);
  g2.gain.linearRampToValueAtTime(vol * 0.15, t + 0.08);
  g2.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.6);
  osc2.connect(g2);
  g2.connect(bgmGain);
  osc2.start(t);
  osc2.stop(t + dur * 0.6);
}

/* 出价音效 - 温暖上升音 */
function playBidSFX() {
  if (!bgmCtx) return;
  const t = bgmCtx.currentTime;
  const osc = bgmCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(392, t);
  osc.frequency.exponentialRampToValueAtTime(784, t + 0.15);
  const g = bgmCtx.createGain();
  g.gain.setValueAtTime(0.35, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  osc.connect(g); g.connect(bgmGain);
  osc.start(t); osc.stop(t + 0.3);
  // 叠加一个八度
  const osc2 = bgmCtx.createOscillator();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(784, t);
  osc2.frequency.exponentialRampToValueAtTime(1568, t + 0.15);
  const g2 = bgmCtx.createGain();
  g2.gain.setValueAtTime(0.15, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  osc2.connect(g2); g2.connect(bgmGain);
  osc2.start(t); osc2.stop(t + 0.25);
}

/* 放弃音效 - 柔和下降音 */
function playPassSFX() {
  if (!bgmCtx) return;
  const t = bgmCtx.currentTime;
  const osc = bgmCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(523, t);
  osc.frequency.exponentialRampToValueAtTime(262, t + 0.25);
  const g = bgmCtx.createGain();
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  osc.connect(g); g.connect(bgmGain);
  osc.start(t); osc.stop(t + 0.35);
}

/* 结果揭示音效 - 温暖大三和弦 */
function playRevealSFX() {
  if (!bgmCtx) return;
  [523.25, 659.25, 783.99].forEach((freq, i) => {
    playWarmNote(freq, 0.25, 2.5, i * 0.12);
  });
}

/* 音乐开关 */
function toggleBGM() {
  bgmMuted = !bgmMuted;
  const btn = document.getElementById('bgmToggle');
  btn.textContent = bgmMuted ? '🔇' : '🎵';
  if (bgmGain && bgmCtx) {
    bgmGain.gain.linearRampToValueAtTime(bgmMuted ? 0 : 0.35, bgmCtx.currentTime + 0.3);
  }
}

/* ========== 页面切换 ========== */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ========== 1.3 涟漪特效 ========== */
function createRipple(event, button) {
  const rect = button.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'ripple-effect';
  const size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (event.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (event.clientY - rect.top - size / 2) + 'px';
  button.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
}

/* ========== 1.4 冲击波特效 ========== */
function createShockwave(color) {
  const emoji = document.getElementById('itemEmoji');
  const rect = emoji.getBoundingClientRect();
  const wave = document.createElement('div');
  wave.className = 'shockwave';
  wave.style.left = (rect.left + rect.width / 2) + 'px';
  wave.style.top = (rect.top + rect.height / 2) + 'px';
  wave.style.borderColor = color;
  document.body.appendChild(wave);
  setTimeout(() => wave.remove(), 600);
}

/* ========== 1.7 鼠标跟踪光效 ========== */
const mouseGlow = document.getElementById('mouseGlow');
document.addEventListener('mousemove', function(e) {
  mouseGlow.style.left = e.clientX + 'px';
  mouseGlow.style.top = e.clientY + 'px';
  // 光晕颜色随当前拍品颜色变化
  mouseGlow.style.background = 'radial-gradient(circle, ' + currentItemColor + '22 0%, transparent 70%)';
});

/* ========== 1.1 3D透视卡片效果 ========== */
const itemCardWrap = document.getElementById('itemCardWrap');
const itemCard = document.getElementById('itemCard');

itemCardWrap.addEventListener('mousemove', function(e) {
  const rect = itemCardWrap.getBoundingClientRect();
  const x = e.clientX - rect.left; // 鼠标在卡片内的X位置
  const y = e.clientY - rect.top;  // 鼠标在卡片内的Y位置
  const centerX = rect.width / 2;
  const centerY = rect.height / 2;
  // 计算旋转角度，范围±8度
  const rotateY = ((x - centerX) / centerX) * 8;
  const rotateX = ((centerY - y) / centerY) * 8;
  itemCard.style.transform = 'rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg)';
});

itemCardWrap.addEventListener('mouseleave', function() {
  // 鼠标离开时恢复
  itemCard.style.transform = 'rotateX(0deg) rotateY(0deg)';
});

/* ========== 入场 → 拍卖 ========== */
function startAuction(event) {
  // 1.3 涟漪特效
  createRipple(event, event.currentTarget);

  // 启动背景音乐
  initBGM();
  document.getElementById('bgmToggle').style.display = 'flex';

  currentIndex = 0;
  tokens = 5;
  selected = [];
  showPage('auction');
  renderTokens();
  renderItem();
}

/* ========== 渲染代币 ========== */
function renderTokens() {
  const el = document.getElementById('tokensDisplay');
  let html = '';
  for (let i = 0; i < 5; i++) {
    html += '<span class="coin' + (i >= tokens ? ' spent' : '') + '">🪙</span>';
  }
  el.innerHTML = html;
}

/* ========== 渲染拍品 ========== */
function renderItem() {
  const item = ITEMS[currentIndex];
  const card = document.getElementById('itemCard');

  // 更新当前拍品颜色（用于鼠标光效）
  currentItemColor = item.color;

  // 更新进度
  document.getElementById('progressText').textContent = (currentIndex + 1) + ' / 12';
  document.getElementById('progressBar').style.width = (currentIndex / 12 * 100) + '%';

  // 更新卡片内容
  document.getElementById('itemNumber').textContent = 'LOT ' + String(currentIndex + 1).padStart(2, '0');
  document.getElementById('itemEmoji').textContent = item.emoji;
  document.getElementById('itemName').textContent = item.name;
  document.getElementById('itemName').style.color = item.color;

  const tag = document.getElementById('itemTag');
  tag.textContent = item.category;
  tag.style.color = item.color;
  tag.style.borderColor = item.color;

  document.getElementById('itemDesc').textContent = item.desc;
  document.getElementById('itemPoem').textContent = item.poem;

  // 出价按钮状态
  document.getElementById('btnBid').disabled = tokens <= 0;

  // 1.5 拍品切换3D翻转 - 入场动画
  card.classList.add('flip-in');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      card.classList.remove('flip-in');
      card.classList.add('flip-in-active');
      // 动画结束后清理class
      setTimeout(() => {
        card.classList.remove('flip-in-active');
      }, 500);
    });
  });
}

/* ========== 出价 ========== */
function bid(event) {
  if (tokens <= 0) return;

  // 1.3 涟漪特效
  createRipple(event, event.currentTarget);

  // 1.2 屏幕震动
  document.body.classList.add('shake');
  setTimeout(() => document.body.classList.remove('shake'), 300);

  // 1.4 冲击波
  createShockwave(ITEMS[currentIndex].color);

  // 出价音效
  playBidSFX();

  tokens--;
  selected.push(currentIndex);
  renderTokens();

  // 闪光效果
  const flash = document.getElementById('flash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 250);

  // 已选图标
  updateSelectedItems();
  nextItem();
}

/* ========== 放弃 ========== */
function pass(event) {
  // 1.3 涟漪特效
  createRipple(event, event.currentTarget);

  // 放弃音效
  playPassSFX();

  nextItem();
}

/* ========== 下一个拍品 ========== */
function nextItem() {
  const card = document.getElementById('itemCard');

  // 1.5 拍品切换3D翻转 - 退出动画
  card.classList.add('flip-out');

  setTimeout(() => {
    card.classList.remove('flip-out');
    currentIndex++;
    if (currentIndex >= ITEMS.length) {
      showResult();
    } else {
      renderItem();
    }
  }, 500);
}

/* ========== 更新已选拍品图标 ========== */
function updateSelectedItems() {
  const el = document.getElementById('selectedItems');
  el.innerHTML = selected.map(i =>
    '<span class="sel-icon">' + ITEMS[i].emoji + '</span>'
  ).join('');
}

/* ========== 结果页 ========== */
function showResult() {
  // 统计各类别
  const catCount = {};
  CAT_ORDER.forEach(c => catCount[c] = 0);
  selected.forEach(i => catCount[ITEMS[i].category]++);

  // 找最高类别
  let maxCat = CAT_ORDER[0];
  let maxVal = 0;
  CAT_ORDER.forEach(c => {
    if (catCount[c] > maxVal) { maxVal = catCount[c]; maxCat = c; }
  });

  // 找第二高（隐藏面）
  let secondCat = null;
  let secondVal = 0;
  CAT_ORDER.forEach(c => {
    if (c !== maxCat && catCount[c] > secondVal) { secondVal = catCount[c]; secondCat = c; }
  });

  const catInfo = CATEGORIES[maxCat];
  const totalSelected = selected.length;

  // 根据选择 hash 选标题和描述
  const hash = selected.reduce((a, b) => a + b + 1, 0);
  const titleIdx = hash % catInfo.titles.length;
  const descIdx = hash % catInfo.descs.length;
  const personaTitle = catInfo.titles[titleIdx];
  const personaDesc = catInfo.descs[descIdx];

  // 构建结果 HTML
  let html = '';
  html += '<div class="result-persona-title" style="color:' + catInfo.color + '">' + personaTitle + '</div>';
  html += '<div class="result-tag" style="color:' + catInfo.color + ';border-color:' + catInfo.color + '">' +
    catInfo.emoji + ' ' + maxCat + '</div>';
  html += '<div class="result-desc">' + personaDesc + '</div>';

  // 价值观光谱
  html += '<div class="spectrum">';
  CAT_ORDER.forEach(c => {
    const ci = CATEGORIES[c];
    const pct = totalSelected > 0 ? Math.round(catCount[c] / totalSelected * 100) : 0;
    html += '<div class="spectrum-row">' +
      '<span class="spectrum-label">' + c + '</span>' +
      '<div class="spectrum-bar-wrap">' +
        '<div class="spectrum-bar-fill" data-width="' + pct + '" style="background:' + ci.color + '"></div>' +
      '</div>' +
      '<span class="spectrum-value">' + pct + '%</span>' +
    '</div>';
  });
  html += '</div>';

  // 已选拍品列表
  if (selected.length > 0) {
    html += '<div class="result-items">';
    selected.forEach(i => {
      const it = ITEMS[i];
      html += '<div class="result-item-chip">' +
        '<span class="chip-emoji">' + it.emoji + '</span>' +
        '<span>' + it.name + '</span></div>';
    });
    html += '</div>';
  } else {
    html += '<div class="result-desc" style="margin-bottom:24px">你放弃了所有拍品。<br>有时候，不选择也是一种选择。</div>';
  }

  // 隐藏面
  if (secondCat && secondVal > 0) {
    const si = CATEGORIES[secondCat];
    const sHash = (hash + 7) % si.titles.length;
    html += '<div class="hidden-side">' +
      '<div class="hs-label">你未展现的另一面</div>' +
      '<div class="hs-title" style="color:' + si.color + '">' + si.emoji + ' ' + si.titles[sHash] + '</div>' +
    '</div>';
  }

  // 再来一次
  html += '<button class="btn-restart" onclick="restart(event)">再来一次</button>';

  const container = document.getElementById('resultContainer');
  container.innerHTML = html;
  // 1.6 重置结果卡片3D翻转入场状态
  container.classList.remove('revealed');

  showPage('result');

  // 进度条满
  document.getElementById('progressBar').style.width = '100%';

  // 1.6 触发结果卡片3D翻转入场动画
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      container.classList.add('revealed');
    });
  });

  // 延迟触发条形图动画
  setTimeout(() => {
    document.querySelectorAll('.spectrum-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.width + '%';
    });
  }, 200);

  // 粒子爆炸效果
  burstParticles(catInfo.color);

  // 结果揭示音效
  playRevealSFX();
}

/* ========== 粒子爆炸 ========== */
function burstParticles(color) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'burst-particle';
    const size = 4 + Math.random() * 6;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.background = color;
    const angle = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random() * 200;
    p.style.setProperty('--bx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--by', Math.sin(angle) * dist + 'px');
    p.style.animationDuration = (0.6 + Math.random() * 0.6) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1400);
  }
}

/* ========== 重新开始 ========== */
function restart(event) {
  // 1.3 涟漪特效
  createRipple(event, event.currentTarget);

  // 隐藏音乐开关
  document.getElementById('bgmToggle').style.display = 'none';

  showPage('entry');
}
</script>
