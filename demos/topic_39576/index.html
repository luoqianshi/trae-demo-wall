<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老年人用药安全解读系统</title>
<style>
/* ============================================================
   老年人用药安全解读系统 — 温暖医疗风格
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #2d5a7b;
  --primary-hover: #3a6f94;
  --primary-active: #1e4459;
  --secondary: #7a9bb5;
  --bg: #f0f4f7;
  --card: #ffffff;
  --text: #2c3e50;
  --text-light: #5d6d7e;
  --text-muted: #95a5a6;
  --border: #dce4ea;
  --warn: #c0392b;
  --warn-bg: #fdf2f1;
  --warn-border: #f5c6c4;
  --ok: #27ae60;
  --ok-bg: #eaf7ef;
  --ok-border: #b8e0c8;
  --info-bg: #eef5f9;
  --shadow: 0 2px 12px rgba(45, 90, 123, 0.08);
  --shadow-hover: 0 4px 20px rgba(45, 90, 123, 0.14);
  --radius: 12px;
  --radius-sm: 8px;
}

html { font-size: 18px; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ===== 顶部标题栏 ===== */
.header-bar {
  background: linear-gradient(135deg, var(--primary) 0%, #3d7ba8 100%);
  color: #fff;
  text-align: center;
  padding: 22px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(45, 90, 123, 0.2);
}
.header-bar h1 {
  font-size: 1.35rem;
  font-weight: 500;
  letter-spacing: 3px;
}
.header-bar .subtitle {
  font-size: 0.8rem;
  opacity: 0.75;
  margin-top: 5px;
  letter-spacing: 1px;
  font-weight: 300;
}
.header-bar .header-actions {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  display: none;
}
.header-bar .btn-back {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.25);
  font-size: 0.9rem;
  padding: 7px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-weight: 400;
  transition: all 0.2s;
  backdrop-filter: blur(4px);
}
.header-bar .btn-back:hover { background: rgba(255,255,255,0.25); }
.font-toggle-btn {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.font-toggle-btn:hover { background: rgba(255,255,255,0.3); }

/* 大字体模式 */
body.font-large { font-size: 20px; }
body.font-large html { font-size: 20px; }
body.font-large .main-btn { height: 66px; font-size: 1.2rem; }
body.font-large .sub-btn { height: 52px; font-size: 1.05rem; }
body.font-large .drug-card h3 { font-size: 1.35rem; }
body.font-large .info-block h4 { font-size: 1.05rem; }
body.font-large .info-block p { font-size: 1rem; }
body.font-large .section-title { font-size: 1.15rem; }
body.font-large .home-hero h2 { font-size: 1.55rem; }
body.font-large .header-bar h1 { font-size: 1.5rem; }

/* ===== 主容器 ===== */
.main-wrap {
  max-width: 560px;
  margin: 0 auto;
  padding: 24px 20px 90px;
}

/* ===== 页面切换 ===== */
.page { display: none; position: relative; }
.page.active { display: block; }
.page.active-enter-left { animation: slideLeft 0.35s ease forwards; }
.page.active-enter-right { animation: slideRight 0.35s ease forwards; }
.page.active-exit-left { animation: slideLeftOut 0.35s ease forwards; }
.page.active-exit-right { animation: slideRightOut 0.35s ease forwards; }

@keyframes slideLeft {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes slideLeftOut {
  from { opacity: 1; transform: translateX(0); }
  to { opacity: 0; transform: translateX(-30px); }
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(-30px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes slideRightOut {
  from { opacity: 1; transform: translateX(0); }
  to { opacity: 0; transform: translateX(30px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== 首页 ===== */
.home-hero { text-align: center; padding: 28px 0 18px; }
.home-hero h2 {
  font-size: 1.4rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 6px;
}
.home-hero p { font-size: 0.9rem; color: var(--text-muted); }

.stats-card {
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 0;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.stat-item { text-align: center; flex: 1; }
.stat-num { font-size: 1.5rem; font-weight: 600; color: var(--primary); }
.stat-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
.stat-divider { width: 1px; height: 32px; background: var(--border); }

.emergency-bar {
  display: flex;
  justify-content: center;
  margin-bottom: 16px;
}
.emergency-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 22px;
  background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
  color: #fff;
  border: none;
  border-radius: 24px;
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  box-shadow: 0 3px 12px rgba(192, 57, 43, 0.3);
  transition: all 0.2s;
}
.emergency-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 5px 18px rgba(192, 57, 43, 0.4);
}
.emergency-btn span { font-size: 1.2rem; }

.main-actions { display: flex; flex-direction: column; gap: 14px; margin: 20px 0; }
.main-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  height: 60px;
  font-size: 1.1rem;
  font-weight: 450;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.25s ease;
  letter-spacing: 1px;
  color: #fff;
  background: linear-gradient(135deg, var(--primary) 0%, #3d7ba8 100%);
  box-shadow: var(--shadow);
}
.main-btn:hover {
  background: linear-gradient(135deg, var(--primary-hover) 0%, #4a8ab5 100%);
  box-shadow: var(--shadow-hover);
  transform: translateY(-1px);
}
.main-btn:active {
  background: linear-gradient(135deg, var(--primary-active) 0%, var(--primary) 100%);
  transform: translateY(0);
  box-shadow: var(--shadow);
}
.main-btn.secondary {
  background: var(--card);
  color: var(--primary);
  border: 1.5px solid var(--border);
  box-shadow: none;
}
.main-btn.secondary:hover {
  border-color: var(--primary);
  background: var(--info-bg);
  box-shadow: var(--shadow);
  transform: none;
}

.sub-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }
.sub-btn {
  height: 48px;
  font-size: 0.88rem;
  font-weight: 400;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  color: var(--text-light);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
}
.sub-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--info-bg);
}

/* ===== 搜索页 ===== */
.section-title {
  font-size: 1.05rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::before {
  content: '';
  width: 3px;
  height: 16px;
  background: var(--primary);
  border-radius: 2px;
}
.search-box {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.search-box input {
  flex: 1;
  height: 46px;
  padding: 0 16px;
  font-size: 1rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  outline: none;
  min-width: 0;
  background: var(--card);
  transition: border-color 0.2s, box-shadow 0.2s;
  color: var(--text);
}
.search-box input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(45, 90, 123, 0.1);
}
.search-box input::placeholder { color: var(--text-muted); }
.search-box button {
  height: 46px;
  padding: 0 20px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-weight: 450;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.search-box button:hover { background: var(--primary-hover); }
.mic-btn {
  width: 44px !important;
  padding: 0 !important;
  font-size: 1.1rem !important;
  background: var(--ok) !important;
  flex-shrink: 0;
}
.mic-btn:hover { background: #219150 !important; }

/* 药品快捷列表 */
.quick-meds { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.quick-med {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 7px 16px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-light);
}
.quick-med:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--info-bg);
}

/* 搜索历史 */
.search-history { margin-bottom: 14px; }
.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 0.8rem;
  color: var(--text-muted);
}
.history-clear {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 0.78rem;
  cursor: pointer;
  padding: 2px 6px;
}
.history-clear:hover { color: var(--warn); }
.history-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.history-tag {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 5px 12px;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-light);
  display: flex;
  align-items: center;
  gap: 4px;
}
.history-tag:hover { border-color: var(--primary); color: var(--primary); background: var(--info-bg); }
.history-tag .tag-time { font-size: 0.7rem; color: var(--text-muted); }

/* ===== 药品解读结果 ===== */
.drug-result { margin-top: 16px; }
.drug-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.drug-card h3 {
  font-size: 1.2rem;
  color: var(--text);
  margin-bottom: 4px;
  font-weight: 500;
}
.drug-card .drug-type {
  display: inline-block;
  background: var(--info-bg);
  color: var(--primary);
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.8rem;
  margin-bottom: 14px;
  border: 1px solid rgba(45, 90, 123, 0.15);
}

.info-block {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
.info-block h4 {
  font-size: 0.95rem;
  color: var(--primary);
  margin-bottom: 6px;
  font-weight: 500;
}
.info-block p, .info-block li {
  font-size: 0.9rem;
  line-height: 1.75;
  color: var(--text-light);
}
.info-block ul { padding-left: 18px; }
.info-block li { margin-bottom: 2px; }

.highlight-warn {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-top: 6px;
  font-size: 0.85rem;
  color: var(--warn);
}
.highlight-warn strong { color: var(--warn); }
.highlight-ok {
  background: var(--ok-bg);
  border: 1px solid var(--ok-border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-top: 6px;
  font-size: 0.85rem;
  color: var(--ok);
}

.action-btns {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.btn-speak {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 20px;
  font-size: 0.9rem;
  font-weight: 400;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-speak:hover { background: var(--primary-hover); }
.btn-speak.speaking { background: var(--warn); }
.btn-fav {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  background: var(--card);
  color: var(--primary);
  border: 1.5px solid var(--primary);
  border-radius: 20px;
  font-size: 0.9rem;
  font-weight: 400;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-fav:hover { background: var(--info-bg); }
.btn-fav.saved {
  background: var(--ok-bg);
  border-color: var(--ok);
  color: var(--ok);
}

/* ===== 常用药页 ===== */
.interaction-check-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 14px;
  padding: 8px 16px;
  background: var(--card);
  border: 1.5px dashed var(--warn);
  border-radius: 20px;
  color: var(--warn);
  font-size: 0.85rem;
  font-weight: 450;
  cursor: pointer;
  transition: all 0.2s;
  width: fit-content;
}
.interaction-check-btn:hover {
  background: var(--warn-bg);
  border-style: solid;
}
.fav-list { display: flex; flex-direction: column; gap: 10px; }
.fav-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.fav-item:hover { box-shadow: var(--shadow-hover); border-color: var(--secondary); }
.fav-item .fav-name { font-size: 1.05rem; font-weight: 450; color: var(--text); }
.fav-item .fav-type { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
.fav-item .fav-arrow { font-size: 1.1rem; color: var(--text-muted); transition: transform 0.2s; }
.fav-item:hover .fav-arrow { transform: translateX(3px); }
.fav-remove {
  background: var(--card);
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 5px 12px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.fav-remove:hover { color: var(--warn); border-color: var(--warn); background: var(--warn-bg); }

/* ===== 服药提醒页 ===== */
.reminder-form {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.form-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.form-row label {
  font-size: 0.9rem;
  font-weight: 450;
  color: var(--text);
  min-width: 70px;
}
.form-row input, .form-row select {
  flex: 1;
  height: 42px;
  padding: 0 12px;
  font-size: 0.9rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  outline: none;
  min-width: 0;
  background: var(--card);
  color: var(--text);
  transition: border-color 0.2s;
}
.form-row input:focus, .form-row select:focus { border-color: var(--primary); }
.btn-add-reminder {
  width: 100%;
  height: 48px;
  background: linear-gradient(135deg, var(--primary) 0%, #3d7ba8 100%);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-weight: 450;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.25s;
  box-shadow: var(--shadow);
  margin-top: 4px;
}
.btn-add-reminder:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-1px);
}

.reminder-list { display: flex; flex-direction: column; gap: 10px; }
.reminder-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.reminder-item .rem-info { flex: 1; min-width: 0; }
.reminder-item .rem-drug { font-size: 1rem; font-weight: 450; color: var(--text); }
.reminder-item .rem-time { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }
.reminder-item .rem-dose {
  font-size: 0.85rem;
  color: var(--ok);
  font-weight: 500;
  margin-top: 2px;
}
.btn-taken {
  height: 38px;
  padding: 0 16px;
  background: var(--ok);
  color: #fff;
  border: none;
  border-radius: 19px;
  font-size: 0.85rem;
  font-weight: 450;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-taken:hover { background: #219150; }
.btn-taken.done { background: var(--border); color: var(--text-muted); pointer-events: none; }

.btn-del-rem {
  height: 38px;
  width: 38px;
  background: var(--card);
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 50%;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-del-rem:hover { color: var(--warn); border-color: var(--warn); background: var(--warn-bg); }

/* ===== 提醒弹窗 ===== */
.alert-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(44, 62, 80, 0.55);
  z-index: 999;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(3px);
}
.alert-overlay.show { display: flex; animation: fadeIn 0.25s ease; }
.alert-box {
  background: var(--card);
  border-radius: var(--radius);
  padding: 28px 24px;
  text-align: center;
  max-width: 320px;
  width: 88%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.18);
}
.alert-box h3 {
  font-size: 1.15rem;
  color: var(--warn);
  margin-bottom: 12px;
  font-weight: 500;
}
.alert-box .alert-drug { font-size: 1.1rem; font-weight: 500; margin-bottom: 4px; color: var(--text); }
.alert-box .alert-dose { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; }
.alert-box .alert-actions { display: flex; gap: 10px; }
.alert-box button {
  flex: 1;
  height: 44px;
  font-size: 0.95rem;
  font-weight: 450;
  border: none;
  border-radius: 22px;
  cursor: pointer;
  transition: all 0.2s;
}
.alert-box .btn-confirm { background: var(--ok); color: #fff; }
.alert-box .btn-confirm:hover { background: #219150; }
.alert-box .btn-snooze { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
.alert-box .btn-snooze:hover { background: var(--border); }

/* ===== 空状态 ===== */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.empty-state .empty-icon {
  width: 52px;
  height: 52px;
  margin: 0 auto 12px;
  border: 2px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
}
.empty-state .empty-icon svg {
  width: 26px;
  height: 26px;
}
.empty-state p { font-size: 0.95rem; }
.empty-state .empty-hint { font-size: 0.85rem; color: var(--text-muted); margin-top: 6px; }

/* ===== 底部导航 ===== */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(255, 255, 255, 0.95);
  border-top: 1px solid var(--border);
  justify-content: space-around;
  padding: 6px 0 env(safe-area-inset-bottom, 6px);
  z-index: 90;
  backdrop-filter: blur(10px);
}
.bottom-nav button {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 0.62rem;
  cursor: pointer;
  padding: 6px 6px;
  border-radius: 8px;
  transition: all 0.2s;
}
.bottom-nav button svg { flex-shrink: 0; }
.bottom-nav button.active { color: var(--primary); background: var(--info-bg); }

/* ===== 拍照识别动画 ===== */
.camera-preview {
  text-align: center;
  margin-bottom: 16px;
}
.camera-frame {
  position: relative;
  width: 220px;
  height: 220px;
  margin: 0 auto 12px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background: var(--bg);
  overflow: hidden;
}
.camera-corner {
  position: absolute;
  width: 20px;
  height: 20px;
  border-color: var(--primary);
  border-style: solid;
  background: transparent;
}
.camera-corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.camera-corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
.camera-corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
.camera-corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
.camera-drug-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: var(--primary);
}
.scan-line {
  position: absolute;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--primary) 50%, transparent 100%);
  animation: scan 2s infinite ease-in-out;
  box-shadow: 0 0 6px var(--primary);
}
@keyframes scan { 0% { top: 0; } 50% { top: calc(100% - 2px); } 100% { top: 0; } }
.camera-hint { font-size: 1rem; color: var(--text-light); margin-bottom: 2px; }
.camera-sub-hint { font-size: 0.8rem; color: var(--text-muted); }
.camera-progress {
  margin-bottom: 16px;
}
.progress-bar {
  width: 100%;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--ok));
  border-radius: 4px;
  transition: width 1.8s ease;
}
.progress-text { text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 8px; }
.camera-success {
  text-align: center;
  color: var(--ok);
  margin-bottom: 16px;
  animation: successPop 0.4s ease;
}
.camera-success p { font-weight: 500; font-size: 1rem; }
@keyframes successPop {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* ===== 公益问诊页 ===== */
.doctor-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; }
.doctor-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: all 0.2s;
}
.doctor-card:hover { box-shadow: var(--shadow-hover); }
.doctor-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, #3d7ba8 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  font-weight: 500;
  flex-shrink: 0;
}
.doctor-info { flex: 1; min-width: 0; }
.doctor-info .doc-name { font-size: 1rem; font-weight: 500; color: var(--text); }
.doctor-info .doc-title { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
.doctor-info .doc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.doc-tag {
  font-size: 0.72rem;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--ok-bg);
  color: var(--ok);
  border: 1px solid var(--ok-border);
}
.doc-tag.offline {
  background: var(--bg);
  color: var(--text-muted);
  border-color: var(--border);
}
.consult-form {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.consult-form textarea {
  flex: 1;
  padding: 10px 12px;
  font-size: 0.9rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  outline: none;
  resize: vertical;
  min-height: 80px;
  font-family: inherit;
  color: var(--text);
  transition: border-color 0.2s;
  background: var(--card);
}
.consult-form textarea:focus { border-color: var(--primary); }
.consult-form textarea::placeholder { color: var(--text-muted); }
.consult-history { display: flex; flex-direction: column; gap: 10px; }
.consult-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.consult-item .ci-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.consult-item .ci-doctor { font-size: 0.9rem; font-weight: 500; color: var(--primary); }
.consult-item .ci-status {
  font-size: 0.75rem;
  padding: 2px 10px;
  border-radius: 10px;
}
.consult-item .ci-status.pending { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
.consult-item .ci-status.replied { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok-border); }
.consult-item .ci-question { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
.consult-item .ci-time { font-size: 0.75rem; color: var(--text-muted); }
.consult-item .ci-reply {
  margin-top: 10px;
  padding: 10px 12px;
  background: var(--info-bg);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--primary);
  font-size: 0.85rem;
  color: var(--text-light);
  line-height: 1.6;
}

/* ===== Toast 提示 ===== */
.toast-container {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 0.9rem;
  font-weight: 450;
  color: #fff;
  background: var(--text);
  box-shadow: 0 6px 20px rgba(0,0,0,0.18);
  animation: toastIn 0.35s ease, toastOut 0.35s ease 2.2s forwards;
  text-align: center;
  max-width: 320px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toast.success { background: var(--ok); }
.toast.error { background: var(--warn); }
.toast.info { background: var(--primary); }
@keyframes toastIn { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-12px); } }

/* ===== 响应式 ===== */
@media (max-width: 480px) {
  html { font-size: 16px; }
  .header-bar { padding: 18px; }

  .sub-btn { height: 44px; font-size: 0.88rem; }
  .bottom-nav { display: flex; }
  .bottom-nav button { padding: 6px 6px; font-size: 0.62rem; }
  .bottom-nav button .nav-icon { font-size: 0.9rem; }
}
@media (min-width: 481px) {
  .bottom-nav { display: none; }
}
</style>

/* ==================== 页面路由 ==================== */
var curPage = 'home';
var pageOrder = ['home', 'search', 'camera', 'fav', 'reminder', 'consult'];

function showPage(name) {
  if (name === curPage) return;
  var oldIdx = pageOrder.indexOf(curPage);
  var newIdx = pageOrder.indexOf(name);
  if (newIdx < 0) newIdx = 0;

  var oldPage = document.getElementById('page-'+curPage);
  var newPage = document.getElementById('page-'+name);
  if (!oldPage || !newPage) {
    // fallback
    var pages = document.querySelectorAll('.page');
    for (var i=0; i<pages.length; i++) pages[i].classList.remove('active');
    if (newPage) newPage.classList.add('active');
    curPage = name;
    finishNav(name);
    return;
  }

  var direction = newIdx > oldIdx ? 'left' : 'right';

  // 旧页面退出动画
  oldPage.classList.add('active-exit-'+direction);
  oldPage.addEventListener('animationend', function handler() {
    oldPage.removeEventListener('animationend', handler);
    oldPage.classList.remove('active', 'active-exit-'+direction);
  }, { once: true });

  // 新页面进入动画
  newPage.classList.add('active', 'active-enter-'+direction);
  newPage.addEventListener('animationend', function handler() {
    newPage.removeEventListener('animationend', handler);
    newPage.classList.remove('active-enter-'+direction);
  }, { once: true });

  curPage = name;
  finishNav(name);
  window.scrollTo({top:0, behavior:'auto'});
}

function finishNav(name) {
  var isHome = (name==='home');
  document.getElementById('headerBack').style.display = isHome ? 'none' : '';
  document.getElementById('bottomNav').style.display = isHome ? '' : 'none';
  var navs = document.querySelectorAll('.bottom-nav button');
  for (var j=0; j<navs.length; j++) navs[j].classList.remove('active');
  var idx = {'home':0, 'search':1, 'consult':2, 'fav':3, 'reminder':4, 'camera':1};
  if (navs[idx[name]]) navs[idx[name]].classList.add('active');
}

function goHome() {
  stopSpeak();
  showPage('home');
  document.getElementById('drugResult').innerHTML = '';
  document.getElementById('cameraResult').innerHTML = '';
  if (document.getElementById('drugInput')) document.getElementById('drugInput').value = '';
  updateHomeStats();
}

function updateHomeStats() {
  var favs = getFavorites();
  var reminders = getReminders();
  var statFavs = document.getElementById('statFavs');
  var statReminders = document.getElementById('statReminders');
  if (statFavs) statFavs.textContent = favs.length;
  if (statReminders) statReminders.textContent = reminders.length;
}

/* ==================== 搜索功能 ==================== */
function openSearch() { showPage('search'); renderQuickMeds(); renderSearchHistory(); }

function renderQuickMeds(filter) {
  var list = drugNames;
  if (filter) {
    var lf = filter.toLowerCase();
    list = drugNames.filter(function(n){ return n.toLowerCase().indexOf(lf)>=0; });
  }
  var html = '';
  for (var i=0; i<list.length; i++) {
    html += '<span class="quick-med" onclick="quickQuery(\''+list[i]+'\')">'+list[i]+'</span>';
  }
  document.getElementById('quickMeds').innerHTML = html;
}

function filterQuickMeds() {
  var val = document.getElementById('drugInput').value.trim();
  renderQuickMeds(val);
}

function quickQuery(name) {
  document.getElementById('drugInput').value = name;
  searchDrug();
}

/* ==================== 搜索历史 ==================== */
function getSearchHistory() {
  try { return JSON.parse(localStorage.getItem('medSearchHistory') || '[]'); }
  catch(e) { return []; }
}

function saveSearchHistory(arr) {
  try { localStorage.setItem('medSearchHistory', JSON.stringify(arr)); }
  catch(e) {}
}

function addToSearchHistory(name) {
  var history = getSearchHistory();
  // 去重
  history = history.filter(function(h) { return h.name !== name; });
  history.unshift({ name: name, time: Date.now() });
  // 最多保留10条
  if (history.length > 10) history = history.slice(0, 10);
  saveSearchHistory(history);
}

function renderSearchHistory() {
  var history = getSearchHistory();
  var container = document.getElementById('searchHistory');
  var tags = document.getElementById('historyTags');
  if (history.length === 0) {
    container.style.display = 'none';
    return;
  }
  container.style.display = 'block';
  var html = '';
  for (var i = 0; i < history.length; i++) {
    var h = history[i];
    html += '<span class="history-tag" onclick="quickQuery(\''+escHtml(h.name)+'\')">'
      + escHtml(h.name) + '</span>';
  }
  tags.innerHTML = html;
}

function clearSearchHistory() {
  saveSearchHistory([]);
  renderSearchHistory();
}

function searchDrug() {
  stopSpeak();
  var input = document.getElementById('drugInput').value.trim();
  if (!input) { document.getElementById('drugResult').innerHTML = ''; return; }

  // 先尝试商品名映射
  var brandKey = null;
  for (var b in brandNameMap) {
    if (b.toLowerCase() === input.toLowerCase() || input.toLowerCase().indexOf(b.toLowerCase()) >= 0) {
      brandKey = brandNameMap[b];
      break;
    }
  }

  var found = brandKey || null;

  // 再尝试通用名匹配
  if (!found) {
    for (var i=0; i<drugNames.length; i++) {
      if (drugNames[i].toLowerCase().indexOf(input.toLowerCase()) >= 0 ||
          input.toLowerCase().indexOf(drugNames[i].toLowerCase()) >= 0) {
        found = drugNames[i];
        break;
      }
    }
  }

  if (!found) {
    document.getElementById('drugResult').innerHTML =
      '<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div><p>未找到"<strong>'+escHtml(input)+'</strong>"的相关信息</p><p class="empty-hint">可尝试输入：硝苯地平、氨氯地平、二甲双胍、阿司匹林、华法林、阿托伐他汀等，或商品名：络活喜、格华止、芬必得、立普妥等</p></div>';
    return;
  }
  addToSearchHistory(found);
  renderSearchHistory();
  renderDrugResult(found, 'drugResult');
}

  var d = drugDB[drugKey];
  var isFav = isFavorited(drugKey);

  var highAlertHtml = d.highAlert

    : '';

  var elderlyHtml = d.elderlyWarning
    ? '<div class="highlight-warn" style="margin-bottom:12px;"><strong>老年人特别提示：</strong>' + escHtml(d.elderlyWarning) + '</div>'
    : '';

  // 相互作用提示
  var interactionHtml = '';
  if (d.interactions && d.interactions.length > 0) {
    interactionHtml = '<div style="margin-top:6px;font-size:0.85rem;color:var(--warn);"><strong>需注意的相互作用：</strong>' + escHtml(d.interactions.join('、')) + '</div>';
  }

  // 数据来源
  var sourceHtml = d.source
    ? '<div style="margin-top:12px;font-size:0.78rem;color:var(--text-muted);text-align:right;">数据来源：' + escHtml(d.source) + '</div>'
    : '';

  document.getElementById(containerId).innerHTML =
    '<div class="drug-card">'
    + '<h3>'+escHtml(d.name)+'</h3>'
    + '<span class="drug-type">'+escHtml(d.type)+'</span>'
    + highAlertHtml
    + elderlyHtml

    + '<div class="info-block">'
    + '<h4>用法用量</h4>'
    + '<p>'+escHtml(d.usage)+'</p>'
    + '</div>'

    + '<div class="info-block">'
    + '<h4>饮食禁忌</h4>'
    + '<p>'+escHtml(d.diet)+'</p>'
    + '<div class="highlight-warn"><strong>重要提示：</strong>请严格遵医嘱，以上为通用建议，具体情况请咨询医生或药师。</div>'
    + interactionHtml
    + '</div>'

    + '<div class="info-block">'
    + '<h4>常见不良反应</h4>'
    + '<p>'+escHtml(d.sideEffects)+'</p>'
    + '</div>'

    + '<div class="info-block">'
    + '<h4>注意事项</h4>'
    + '<p>'+escHtml(d.warnings)+'</p>'
    + '</div>'

    + '<div class="action-btns">'
    + '<button class="btn-speak" id="btnSpeak" onclick="startSpeak(\''+drugKey+'\')">语音播报</button>'
    + '<button class="btn-fav'+(isFav?' saved':'')+'" id="btnFav" onclick="toggleFav(\''+drugKey+'\', this)">'+(isFav?'已收藏':'收藏')+'</button>'
    + '</div>'
    + sourceHtml
    + '</div>';
}

var speechSynth = window.speechSynthesis;
var speaking = false;

function startSpeak(drugKey) {
  if (speaking) { stopSpeak(); return; }
  var d = drugDB[drugKey];
  var text = d.name + '。' + d.type + '。用法用量：' + d.usage + '饮食禁忌：' + d.diet + '常见不良反应：' + d.sideEffects + '注意事项：' + d.warnings;
  var btn = document.getElementById('btnSpeak');
  if (btn) { btn.textContent = '停止播报'; btn.classList.add('speaking'); }
  var utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  utter.rate = 0.85;
  utter.pitch = 1;
  utter.onend = function() {
    speaking = false;
    if (btn) { btn.textContent = '语音播报'; btn.classList.remove('speaking'); }
  };
  utter.onerror = function() {
    speaking = false;
    if (btn) { btn.textContent = '语音播报'; btn.classList.remove('speaking'); }
  };
  speaking = true;
  speechSynth.speak(utter);
}

function stopSpeak() {
  speechSynth.cancel();
  speaking = false;
  var btn = document.getElementById('btnSpeak');
  if (btn) { btn.textContent = '语音播报'; btn.classList.remove('speaking'); }
}

function runInteractionCheck() {
  var checks = document.querySelectorAll('.interaction-check:checked');
  var result = document.getElementById('interactionResult');
  if (checks.length < 2) {
    result.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:12px 0;">请勾选至少2种药品</div>';
    return;
  }
  var selected = [];
  for (var i = 0; i < checks.length; i++) {
    selected.push(checks[i].value);
  }
  var html = '';
  var found = false;
  for (var i = 0; i < selected.length; i++) {
    for (var j = i + 1; j < selected.length; j++) {
      var k1 = selected[i], k2 = selected[j];
      var pairKey = k1 + '+' + k2;
      var pairKeyRev = k2 + '+' + k1;
      var warn = interactionWarnings[pairKey] || interactionWarnings[pairKeyRev];
      var d1 = drugDB[k1], d2 = drugDB[k2];
      if (warn) {
        found = true;
        html += '<div class="consult-item" style="border-left:3px solid var(--warn);margin-bottom:8px;background:var(--warn-bg);">'
          + '<div style="font-weight:500;color:var(--warn);">🔴 禁止 / 谨慎同服</div>'
          + '<div style="margin-top:4px;">' + escHtml(d1 ? d1.name : k1) + ' + ' + escHtml(d2 ? d2.name : k2) + '</div>'
          + '<div style="font-size:0.82rem;color:var(--text-light);margin-top:2px;">' + escHtml(warn) + '</div>'
          + '</div>';
      } else {
        var hasInteraction = false;
        if (d1 && d1.interactions && d2) {
          for (var a = 0; a < d1.interactions.length; a++) {
            if (d2.name && d2.name.indexOf(d1.interactions[a]) >= 0) { hasInteraction = true; break; }
          }
        }
        if (hasInteraction) {
          html += '<div class="consult-item" style="border-left:3px solid #f39c12;margin-bottom:8px;background:#fffef5;">'
            + '<div style="font-weight:500;color:#f39c12;">🟡 需注意</div>'
            + '<div style="margin-top:4px;">' + escHtml(d1 ? d1.name : k1) + ' + ' + escHtml(d2 ? d2.name : k2) + '</div>'
            + '<div style="font-size:0.82rem;color:var(--text-light);margin-top:2px;">两者可能存在相互作用，建议咨询医生。</div>'
            + '</div>';
        } else {
          html += '<div class="consult-item" style="border-left:3px solid var(--ok);margin-bottom:8px;background:var(--ok-bg);margin-bottom:6px;">'
            + '<div style="font-weight:500;color:var(--ok);">🟢 安全</div>'
            + '<div style="margin-top:4px;">' + escHtml(d1 ? d1.name : k1) + ' + ' + escHtml(d2 ? d2.name : k2) + '</div>'
            + '<div style="font-size:0.82rem;color:var(--text-light);margin-top:2px;">未发现已知相互作用，正常同服安全。</div>'
            + '</div>';
        }
      }
    }
  }
  if (!found && html === '') {
    html = '<div style="text-align:center;padding:12px;color:var(--ok);">🟢 未发现已知的药物相互作用</div>';
  }
  result.innerHTML = html;
}

function addReminder() {

  });

  }

function markTaken(id) {
  var reminders = getReminders();
  for (var i=0; i<reminders.length; i++) {
    if (reminders[i].id === id) { reminders[i].taken = true; break; }
  }
  saveReminders(reminders);
}

function delReminder(id) {
  var reminders = getReminders();
  reminders = reminders.filter(function(r){ return r.id !== id; });
  saveReminders(reminders);
}

/* ==================== 定时提醒 ==================== */
var alertTimer = null;
var alertReminderId = null;

function startReminderChecker() {
  alertTimer = setInterval(checkReminders, 60000);
  setTimeout(checkReminders, 1000);
}

function checkReminders() {
  var now = new Date();
  var hh = String(now.getHours()).padStart(2,'0');
  var mm = String(now.getMinutes()).padStart(2,'0');
  var curTime = hh+':'+mm;
  var reminders = getReminders();
  for (var i=0; i<reminders.length; i++) {
    var r = reminders[i];
    if (!r.taken && !r.alerted && r.time === curTime) {
      showAlert(r);
      r.alerted = true;
      saveReminders(reminders);
      break;
    }
  }
  if (hh==='00' && mm==='00') resetAlertedFlags();
}

function resetAlertedFlags() {
  var reminders = getReminders();
  var changed = false;
  for (var i=0; i<reminders.length; i++) {
    if (reminders[i].alerted) { reminders[i].alerted = false; changed = true; }
    if (reminders[i].taken) { reminders[i].taken = false; changed = true; }
  }
  if (changed) saveReminders(reminders);
}

function showAlert(reminder) {
  alertReminderId = reminder.id;
  document.getElementById('alertDrug').textContent = reminder.drug;
  document.getElementById('alertDose').textContent = '每次 ' + reminder.dose + ' · ' + reminder.time;
  document.getElementById('alertOverlay').classList.add('show');
  try {
    var audio = document.getElementById('alertSound');
    audio.currentTime = 0;
    audio.play().catch(function(){});
  } catch(e) {}
}

function snoozeAlert() {
  document.getElementById('alertOverlay').classList.remove('show');
  var savedId = alertReminderId;
  alertReminderId = null;
  setTimeout(function(){
    if (!savedId) return;
    var reminders = getReminders();
    for (var i=0; i<reminders.length; i++) {
      if (reminders[i].id === savedId) {
        reminders[i].alerted = false;
        saveReminders(reminders);
        break;
      }
    }
  }, 300000);
}

function confirmAlert() {
  document.getElementById('alertOverlay').classList.remove('show');
  if (alertReminderId) {
    markTaken(alertReminderId);
    alertReminderId = null;
  }
  try {
    var audio = document.getElementById('alertSound');
    audio.pause();
    audio.currentTime = 0;
  } catch(e) {}
}

  var sel = document.getElementById('consultDoctor');
  var html = '<option value="">请选择医生</option>';
  for (var i = 0; i < doctorDB.length; i++) {
    var d = doctorDB[i];
    html += '<option value="' + i + '">' + escHtml(d.name) + ' - ' + escHtml(d.title) + (d.online ? ' [在线]' : ' [离线]') + '</option>';
  }
  sel.innerHTML = html;
}

function getConsults() {
  try { return JSON.parse(localStorage.getItem('medConsults') || '[]'); }
  catch(e) { return []; }
}

function saveConsults(arr) {
  try { localStorage.setItem('medConsults', JSON.stringify(arr)); }
  catch(e) {}
}

function submitConsult() {
  var doctorIdx = document.getElementById('consultDoctor').value;
  var name = document.getElementById('consultName').value.trim();
  var phone = document.getElementById('consultPhone').value.trim();
  var desc = document.getElementById('consultDesc').value.trim();
  if (!doctorIdx) { showToast('请选择要咨询的医生', 'error'); return; }
  if (!name) { showToast('请输入您的姓名', 'error'); return; }
  if (!phone) { showToast('请输入联系电话', 'error'); return; }
  if (!desc) { showToast('请输入病情描述', 'error'); return; }
  var doctor = doctorDB[doctorIdx];
  var consults = getConsults();
  var now = new Date();
  var timeStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  consults.unshift({
    id: Date.now(),
    doctorName: doctor.name,
    doctorTitle: doctor.title,
    name: name,
    phone: phone,
    question: desc,
    time: timeStr,
    reply: '',
    replied: false
  });
  saveConsults(consults);
  document.getElementById('consultDoctor').value = '';
  document.getElementById('consultName').value = '';
  document.getElementById('consultPhone').value = '';
  document.getElementById('consultDesc').value = '';
  renderConsultHistory();
  showToast('问诊提交成功，医生回复后可查看', 'success');

  // 演示：3秒后模拟AI自动回复
  var savedId = Date.now();
  setTimeout(function() {
    var consults = getConsults();
    for (var i = 0; i < consults.length; i++) {
      if (consults[i].id === savedId) {
        var replies = [
          '感谢您的咨询。根据您的描述，建议您注意以下几点：1. 按时服药，不要随意增减剂量；2. 注意观察是否有不良反应，如有不适请及时就医；3. 保持良好的生活习惯，合理饮食、适当运动。如有疑问，请随时联系我。',
          '您好，我已收到您的问诊。根据您的症状描述，建议您：1. 监测血压/血糖变化，做好记录；2. 避免与已知禁忌药物同时服用；3. 如症状持续或加重，请尽快到门诊就诊。',
          '感谢信任。结合您描述的用药问题，我建议：1. 严格按医嘱服药，不要自行停药；2. 注意饮食禁忌，避免影响药效；3. 定期复查相关指标。请您保持联系，我会持续关注您的恢复情况。'
        ];
        consults[i].reply = replies[Math.floor(Math.random() * replies.length)];
        consults[i].replied = true;
        saveConsults(consults);
        renderConsultHistory();
        showToast('医生已回复您的问题，请查看问诊记录', 'success');
        break;
      }
    }
  }, 3000);
}

function renderConsultHistory() {
  var consults = getConsults();
  var list = document.getElementById('consultHistory');
  if (consults.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><p>暂无问诊记录</p><p class="empty-hint">提交问诊后可在此查看回复</p></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < consults.length; i++) {
    var c = consults[i];
    var statusHtml = c.replied
      ? '<span class="ci-status replied">已回复</span>'
      : '<span class="ci-status pending">待回复</span>';
    var replyHtml = c.replied ? '<div class="ci-reply"><strong>医生回复：</strong>' + escHtml(c.reply) + '</div>' : '';
    html += '<div class="consult-item">'
      + '<div class="ci-header">'
      + '<span class="ci-doctor">' + escHtml(c.doctorName) + ' · ' + escHtml(c.doctorTitle) + '</span>'
      + statusHtml
      + '</div>'
      + '<div class="ci-question">问题：' + escHtml(c.question) + '</div>'
      + '<div class="ci-time">提交时间：' + escHtml(c.time) + '</div>'
      + replyHtml
      + '</div>';
  }
  list.innerHTML = html;
}
