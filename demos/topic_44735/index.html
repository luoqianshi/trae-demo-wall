<body>
  <!-- Start Overlay: must click to unlock audio -->
  <div class="start-overlay" id="startOverlay">
    <div class="big-icon">🎧</div>
    <h2>声声不息</h2>
    <p class="hint">AI 语音平板支撑教练<br>点击按钮启用语音，戴上耳机体验</p>
    <button class="btn-start" id="btnUnlock" onclick="unlockAudio()">🔊 启用语音并进入</button>
    <div class="voice-status" id="voiceStatus">正在检测语音支持...</div>
  </div>

  <div class="container">
    <!-- Header -->
    <header>
      <div class="badge">🏆 TRAE AI 创造力大赛 · Demo</div>
      <h1>声声不息</h1>
      <p>AI 语音平板支撑教练 · 戴上耳机，说句话就行</p>
    </header>

    <!-- Step Indicator -->
    <div class="steps" id="steps">
      <div class="step-dot active" id="step1"></div>
      <div class="step-dot" id="step2"></div>
      <div class="step-dot" id="step3"></div>
      <div class="step-dot" id="step4"></div>
    </div>

    <!-- Status Card -->
    <div class="status-card">
      <span class="status-icon pulse" id="statusIcon">🎧</span>
      <div class="status-text" id="statusText">
        欢迎使用声声不息！<br>
        <span class="highlight">我是你的 AI 语音教练</span>
      </div>
      <div class="timer-display" id="timer" style="display:none;">00:00</div>
      <div class="timer-label" id="timerLabel" style="display:none;">平板支撑中...</div>
      <div class="progress-wrap" id="progressWrap" style="display:none;">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <!-- Chat Log -->
    <div class="chat-log" id="chatLog">
      <div class="chat-item ai fade-in">你好！我是你的 AI 平板支撑教练。戴上耳机，跟我一起开始吧！</div>
    </div>

    <!-- Buttons -->
    <div class="btn-group" id="btnGroup">
      <button class="btn btn-primary" id="btnMain" onclick="handleMainClick()">开始体验</button>
      <button class="btn btn-alt" id="btnAlt" onclick="handleAltClick()" disabled>没感觉到</button>
      <button class="btn btn-secondary" id="btnSub" onclick="handleSubClick()" disabled>跳过引导</button>
    </div>

    <!-- Voice Settings -->
    <div class="settings">
      <h4>🔊 语音设置</h4>
      <div class="settings-row">
        <label>语速</label>
        <input type="range" id="rateSlider" min="0.5" max="1.5" step="0.1" value="0.95" onchange="updateVoiceSettings()">
        <span id="rateValue">0.95</span>
      </div>
      <div class="settings-row">
        <label>音量</label>
        <input type="range" id="volumeSlider" min="0.1" max="1" step="0.1" value="1" onchange="updateVoiceSettings()">
        <span id="volumeValue">100%</span>
      </div>
      <span class="voice-test" onclick="testVoice()">🔊 测试语音</span>
    </div>
  </div>

  <script>
    // ===================== STATE =====================
    let currentStep = 0;
    let isSpeaking = false;
    let timerInterval = null;
    let seconds = 0;
    let targetSeconds = 30;
    let voiceRate = 0.95;
    let voiceVolume = 1;
    let audioUnlocked = false;
    let zhVoice = null;
    let voicesReady = false;

    // ===================== VOICE =====================
    const synth = window.speechSynthesis;

    // 检测语音支持
    function checkVoiceSupport() {
      const statusEl = document.getElementById('voiceStatus');
      if (!('speechSynthesis' in window)) {
        statusEl.textContent = '⚠️ 当前浏览器不支持语音合成，将只显示文字';
        statusEl.className = 'voice-status err';
        return false;
      }
      statusEl.textContent = '✅ 浏览器支持语音合成，点击上方按钮启用';
      statusEl.className = 'voice-status ok';
      return true;
    }

    // 加载中文语音
    function loadChineseVoice() {
      if (!synth) return;
      const voices = synth.getVoices();
      // 优先找中文语音
      zhVoice = voices.find(v => v.lang === 'zh-CN' || v.lang === 'zh_CN' || v.lang === 'zh-Hans-CN');
      if (!zhVoice) {
        zhVoice = voices.find(v => v.lang && v.lang.includes('zh'));
      }
      if (!zhVoice) {
        zhVoice = voices.find(v => v.name && (v.name.includes('中文') || v.name.includes('Chinese') || v.name.includes('普通话')));
      }
      voicesReady = true;
      console.log('Voice selected:', zhVoice ? zhVoice.name : 'default');
    }

    // 等待语音列表加载
    if (synth && synth.onvoiceschanged !== undefined) {
      synth.onvoiceschanged = loadChineseVoice;
    }
    // 立即尝试加载一次（有些浏览器已经加载好了）
    setTimeout(loadChineseVoice, 100);

    function speak(text, callback) {
      addChat('ai', text);

      if (!synth || !audioUnlocked) {
        if (callback) setTimeout(callback, 500);
        return;
      }

      try {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'zh-CN';
        utter.rate = voiceRate;
        utter.volume = voiceVolume;
        utter.pitch = 1;
        if (zhVoice) utter.voice = zhVoice;

        utter.onstart = () => { isSpeaking = true; };
        utter.onend = () => { isSpeaking = false; if (callback) callback(); };
        utter.onerror = (e) => {
          isSpeaking = false;
          console.error('Speech error:', e);
          if (callback) callback();
        };

        synth.speak(utter);
      } catch (e) {
        console.error('Speak error:', e);
        if (callback) setTimeout(callback, 500);
      }
    }

    function testVoice() {
      if (!audioUnlocked) {
        alert('请先点击「启用语音并进入」按钮解锁音频');
        return;
      }
      speak('你好，我是你的 AI 平板支撑教练，语音测试正常！');
    }

    function updateVoiceSettings() {
      voiceRate = parseFloat(document.getElementById('rateSlider').value);
      voiceVolume = parseFloat(document.getElementById('volumeSlider').value);
      document.getElementById('rateValue').textContent = voiceRate;
      document.getElementById('volumeValue').textContent = Math.round(voiceVolume * 100) + '%';
    }

    // ===================== UNLOCK AUDIO =====================
    function unlockAudio() {
      audioUnlocked = true;

      // 有些浏览器需要创建空的AudioContext来解锁音频
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) {
          const ctx = new AudioContext();
          if (ctx.state === 'suspended') {
            ctx.resume();
          }
        }
      } catch (e) { console.log('AudioContext not needed'); }

      // 确保语音列表已加载
      if (!voicesReady) loadChineseVoice();

      // 先说一句测试音，确认有声音
      if (synth) {
        const testUtter = new SpeechSynthesisUtterance('语音已启用');
        testUtter.lang = 'zh-CN';
        testUtter.rate = voiceRate;
        testUtter.volume = voiceVolume;
        if (zhVoice) testUtter.voice = zhVoice;
        synth.speak(testUtter);
      }

      // 隐藏启动画面
      document.getElementById('startOverlay').classList.add('hidden');

      // 欢迎语
      setTimeout(() => {
        speak('你好！我是你的 AI 平板支撑教练。戴上耳机，点击「开始体验」跟我一起开始吧！');
      }, 800);
    }

    // ===================== CHAT =====================
    function addChat(type, text) {
      const log = document.getElementById('chatLog');
      const item = document.createElement('div');
      item.className = `chat-item ${type} fade-in`;
      const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      item.innerHTML = `<span class="time">${time}</span>${text}`;
      log.appendChild(item);
      log.scrollTop = log.scrollHeight;
    }

    // ===================== UI UPDATES =====================
    function updateStatus(icon, text) {
      document.getElementById('statusIcon').textContent = icon;
      document.getElementById('statusText').innerHTML = text;
    }

    function updateStep(step) {
      currentStep = step;
      for (let i = 1; i <= 4; i++) {
        const dot = document.getElementById('step' + i);
        dot.className = 'step-dot';
        if (i < step) dot.classList.add('done');
        if (i === step) dot.classList.add('active');
      }
    }

    let guideAltMode = false; // 当前步骤是否已用过B计划

    // 设置三个按钮：主按钮(肯定)、备选按钮(没感觉到)、副按钮(跳过)
    function setButtons(mainText, mainAction, altText, altAction, subText, subAction, subDisabled) {
      const btnMain = document.getElementById('btnMain');
      const btnAlt = document.getElementById('btnAlt');
      const btnSub = document.getElementById('btnSub');
      btnMain.textContent = mainText;
      btnMain.onclick = mainAction;
      btnMain.disabled = false;
      if (altText && altAction) {
        btnAlt.textContent = altText;
        btnAlt.onclick = altAction;
        btnAlt.disabled = !!guideAltMode; // 用过B计划后禁用，避免循环
        btnAlt.style.display = '';
      } else {
        btnAlt.style.display = 'none';
      }
      if (subText) {
        btnSub.textContent = subText;
        btnSub.onclick = subAction;
        btnSub.disabled = !!subDisabled;
        btnSub.style.display = '';
      } else {
        btnSub.style.display = 'none';
      }
    }

    // 全局点击分发（HTML onclick 兼容）
    function handleMainClick() {
      if (currentStep === 0) startWelcome();
    }
    function handleSubClick() {
      if (currentStep === 0) skipGuide();
    }
    function handleAltClick() {
      // 由各按钮直接绑定 onclick，此函数作为兜底
    }

    // ===================== FLOW =====================

    // ---- Welcome ----
    function startWelcome() {
      updateStep(1);
      guideAltMode = false;
      updateStatus('🎧', '准备好开始了吗？<br><span class="highlight">我会先教你感知身体</span>');
      setButtons('👍 准备好了', startGuide, null, null, '⏭️ 跳过引导', skipGuide);
      speak('你好！我是你的 AI 平板支撑教练。今天我会全程用语音指导你完成平板支撑。如果你是第一次做，建议先跟我做「运动启蒙引导」，我会一步步教你找到身体各部位，感受什么叫「收紧」「与肩同宽」。准备好了吗？');
    }

    // ===== Step 1: 找到腹部肌肉 =====
    function startGuide() {
      updateStep(1);
      guideAltMode = false;
      setButtons('✅ 找到了', guideStep2, '❌ 没感觉到', guide1B, '⏭️ 跳过', skipGuide, true);
      const text = '好，我们先来做运动启蒙引导。第一步：找到你的腹部肌肉。请把手放在肚脐两边，然后轻轻咳嗽一下——你感觉到那块肌肉跳了一下吗？那就是你的腹直肌，记住这个位置。找到了吗？';
      updateStatus('👆', '把手放在<strong>肚脐两边</strong><br>轻轻<span class="highlight">咳嗽一下</span>');
      speak(text);
    }
    function guide1B() {
      guideAltMode = true;
      setButtons('✅ 找到了', guideStep2, null, null, '⏭️ 跳过', skipGuide);
      const text = '没关系，换一个方法。请你平躺下来，然后把头和肩膀微微抬起，用眼睛看你的肚子——你会发现肚子中间鼓起了一条硬硬的线！用手摸一下，就是那里。如果你还感觉不到，试着用力咳嗽一声，肚子突然收紧的那一下就是你的腹肌在用力。找到了吗？';
      updateStatus('🛌', '平躺下来<br>头微微抬起看肚子<span class="highlight">鼓起</span>');
      speak(text);
    }

    // ===== Step 2: 找到肩膀 =====
    function guideStep2() {
      guideAltMode = false;
      setButtons('✅ 找到了', guideStep3, '❌ 找不到', guide2B, '⏭️ 跳过', skipGuide);
      const text = '很好！第二步：找到你的肩膀。请用右手摸一下左边肩膀的骨头凸起处——对，就是那个硬硬的地方。现在两只手都放下来，自然垂在身体两侧。这就是你肩膀的位置，记住了吗？';
      updateStatus('💪', '用手摸一下<strong>肩膀骨头</strong><br>记住这个<span class="highlight">位置</span>');
      speak(text);
    }
    function guide2B() {
      guideAltMode = true;
      setButtons('✅ 找到了', guideStep3, null, null, '⏭️ 跳过', skipGuide);
      const text = '没关系，换个方法。请你做一下耸肩的动作——把两个肩膀往上耸，像说"我不知道"那样。对！那个耸起来最高的骨头尖尖，就是你的肩膀骨头。用手摸一下，就是那里。记住了吗？';
      updateStatus('🤷', '做<strong>耸肩</strong>动作<br>最高的骨头尖=<span class="highlight">肩膀</span>');
      speak(text);
    }

    // ===== Step 3: 与肩同宽 =====
    function guideStep3() {
      guideAltMode = false;
      setButtons('✅ 明白了', guideStep4, '❌ 不明白', guide3B, '⏭️ 跳过', skipGuide);
      const text = '第三步：感受什么叫「与肩同宽」。想象你面前有一根扫帚，你两只手抓着它——两只手之间的距离，就和你两个肩膀之间的距离一样宽。这就是「与肩同宽」。做平板支撑时，手肘放在地上，也要保持这个宽度。明白了吗？';
      updateStatus('📏', '想象抓着<strong>一根扫帚</strong><br>两手距离=肩膀<span class="highlight">宽度</span>');
      speak(text);
    }
    function guide3B() {
      guideAltMode = true;
      setButtons('✅ 明白了', guideStep4, null, null, '⏭️ 跳过', skipGuide);
      const text = '没关系，换个方法。请你站起来，把手放在两个肩膀的骨头凸起处——就是刚才找到的位置。然后保持手的距离，把手往下放到肚子的位置。这个宽度就是「与肩同宽」。或者你可以这样记：你躺下来的时候，手肘正好放在腰的两侧，不多不少。明白了吗？';
      updateStatus('📐', '手放肩膀→往下移到肚子<br>那个距离就是<span class="highlight">肩宽</span>');
      speak(text);
    }

    // ===== Step 4: 感受"收紧" =====
    function guideStep4() {
      guideAltMode = false;
      setButtons('✅ 感觉到了', guideStep5, '❌ 没感觉', guide4B, '⏭️ 跳过', skipGuide);
      const text = '第四步：感受什么叫「收紧」。现在想象你的肚子是一根橡皮筋——慢慢把它拉到最紧，保持住——对，这种紧绷绷的感觉就是「收紧」。如果你感觉不到，试着把肚子往里吸，像穿了一条很紧的裤子。感觉到了吗？';
      updateStatus('🎀', '想象肚子是<strong>橡皮筋</strong><br>慢慢拉到<span class="highlight">最紧</span>');
      speak(text);
    }
    function guide4B() {
      guideAltMode = true;
      setButtons('✅ 感觉到了', guideStep5, null, null, '⏭️ 跳过', skipGuide);
      const text = '没关系，换个方法。请你站起来，双手握拳放在胸前，然后用力把自己缩成一小团——像很冷的时候缩起来的感觉。你感觉到肚子中间那块硬硬的了吗？那就是你在收紧。或者这样：假装有人要往你肚子上轻轻打一下，你会本能地缩肚子——那一瞬间的感觉，就是「收紧」。感觉到了吗？';
      updateStatus('❄️', '双手握拳缩成一团<br>肚子硬硬的感觉=<span class="highlight">收紧</span>');
      speak(text);
    }

    // ===== Step 5: 感受"绷紧" =====
    function guideStep5() {
      guideAltMode = false;
      setButtons('✅ 感觉到了', guideStep6, '❌ 没感觉', guide5B, '⏭️ 跳过', skipGuide);
      const text = '第五步：感受什么叫「绷紧」。想象你面前有一堵很重的墙，你要用全身的力气去推它——对，用刚才找到的那块腹肌去发力，感觉到它变硬了吗？那种硬硬的感觉就是「绷紧」。保持3秒——1、2、3——好，放松。感觉到了吗？';
      updateStatus('🧱', '想象<strong>推一堵重墙</strong><br>腹肌变硬=<span class="highlight">绷紧</span>');
      speak(text);
    }
    function guide5B() {
      guideAltMode = true;
      setButtons('✅ 感觉到了', guideStep6, null, null, '⏭️ 跳过', skipGuide);
      const text = '没关系，再试一个方法。趴在床上或沙发上，然后让另一个人用手轻轻按在你的肚子上——你用力把他的手往上顶开。感觉到肚子整个变硬了吗？那就像一块绷紧的木板，就是「绷紧」的感觉。如果你是一个人，就把手放在肚子上，然后用力绷紧，手会被顶起来。感觉到了吗？';
      updateStatus('✋', '手按肚子用力顶开<br>肚子像<strong>木板</strong>一样硬=<span class="highlight">绷紧</span>');
      speak(text);
    }

    // ===== Step 6: 感受"收紧核心" =====
    function guideStep6() {
      guideAltMode = false;
      setButtons('✅ 明白了', guideStep7, '❌ 没感觉', guide6B, '⏭️ 跳过', skipGuide);
      const text = '第六步：感受什么叫「收紧核心」。想象有人要从你肚子上拿走你的手机——你本能地想护住它，肚子往里缩——对，保持住，这就是「收紧核心」。平板支撑的时候，要一直保持这种感觉。明白了吗？';
      updateStatus('🛡️', '想象有人要<strong>拿走手机</strong><br>本能<span class="highlight">护住肚子</span>');
      speak(text);
    }
    function guide6B() {
      guideAltMode = true;
      setButtons('✅ 明白了', guideStep7, null, null, '⏭️ 跳过', skipGuide);
      const text = '没关系，最后一个方法。假装你要系鞋带，但是站不起来——所以你只能坐直，然后深吸一口气，把肚子往里吸到最里面——然后把气慢慢呼出来，但肚子不要放松，保持吸进去的状态。那种"肚子缩进去、后背贴紧"的感觉，就是「收紧核心」。现在你试试看，明白了吗？';
      updateStatus('💨', '深吸气→肚子吸到最里面<br>呼气但肚子不松=<span class="highlight">收紧核心</span>');
      speak(text);
    }

    // ===== 启蒙完成 → 姿势教学 =====
    function guideStep7() {
      setButtons('✅ 准备好了', startPrepare, null, null, null, null);
      const text = '太棒了！你已经掌握了平板支撑的六个关键感觉：找到腹肌、找到肩膀、与肩同宽、收紧、绷紧、收紧核心。接下来我会教你正确的平板支撑姿势。准备好了吗？';
      updateStatus('✨', '你已掌握<span class="highlight">六个关键感觉</span><br>接下来学正确姿势');
      speak(text);
    }

    function skipGuide() {
      speak('好的，那我们直接进入姿势教学。', startPrepare);
    }

    function startPrepare() {
      updateStep(2);
      setButtons('✅ 姿势摆好了', startPlank, null, null, null, null);
      const text = '好，现在摆姿势。请趴在地上，用双手肘撑地，双手可以交叉或者平放。双脚并拢，用脚尖撑地。关键是：从头到脚要成一条直线——不要塌腰，也不要把屁股翘太高。收紧你的核心，就像刚才练习的那样。准备好了吗？说「姿势摆好了」我们就开始！';
      updateStatus('🧘', '双肘撑地 · 脚尖着地<br>身体成<span class="highlight">一条直线</span>');
      speak(text);
    }

    function startPlank() {
      updateStep(3);
      seconds = 0;
      document.getElementById('timer').style.display = 'block';
      document.getElementById('timerLabel').style.display = 'block';
      document.getElementById('progressWrap').style.display = 'block';
      document.getElementById('statusIcon').classList.add('breathing');
      setButtons('💪 坚持不住了', giveUp, null, null, null, null);

      timerInterval = setInterval(() => {
        seconds++;
        updateTimerDisplay();
        updateProgress();
        giveRealtimeCoaching();
      }, 1000);

      const text = '开始！保持呼吸，收紧核心。记住，身体成一条直线。我会一直在旁边提醒你。加油！';
      updateStatus('🔥', '平板支撑进行中！<br><span class="highlight">保持呼吸，收紧核心</span>');
      speak(text);
    }

    function updateTimerDisplay() {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      document.getElementById('timer').textContent = `${m}:${s}`;
    }

    function updateProgress() {
      const pct = Math.min((seconds / targetSeconds) * 100, 100);
      document.getElementById('progressBar').style.width = pct + '%';
    }

    function giveRealtimeCoaching() {
      const prompts = {
        5: '很好！保持住，深呼吸——吸气，呼气。',
        10: '不错！检查一下，不要塌腰，屁股不要翘太高。',
        15: '坚持住！你已经完成一半了，核心继续保持收紧。',
        20: '还有 10 秒！想象有人在轻轻拉你的肚脐往脊椎方向靠。',
        25: '最后 5 秒！保持呼吸，不要憋气！',
        30: '时间到！做得很好！'
      };
      if (prompts[seconds]) {
        if (seconds === 30) {
          finishPlank();
        } else {
          speak(prompts[seconds]);
          addChat('tip', `[${seconds}秒] ${prompts[seconds]}`);
        }
      }
    }

    function giveUp() {
      clearInterval(timerInterval);
      const text = `没关系！你坚持了 ${seconds} 秒，已经很棒了。下次我们再挑战更久。记得不要勉强，循序渐进才是最重要的。`;
      updateStatus('💚', `你坚持了 <span class="highlight">${seconds} 秒</span>！<br>已经很棒了，循序渐进最重要`);
      document.getElementById('statusIcon').classList.remove('breathing');
      speak(text, () => {
        setButtons('🔄 再来一次', resetDemo, null, null, '👋 结束', () => {
          speak('好的，下次见！记得坚持锻炼哦！');
          updateStatus('👋', '下次见！<br><span class="highlight">记得坚持锻炼哦</span>');
        });
      });
    }

    function finishPlank() {
      clearInterval(timerInterval);
      document.getElementById('statusIcon').classList.remove('breathing');
      const text = `太棒了！你完成了 30 秒的平板支撑！记住今天找到腹肌的感觉，下次训练你会更轻松。要不要再来一组？`;
      updateStatus('🎉', `恭喜完成 <span class="highlight">30 秒</span> 平板支撑！<br>下次训练你会更轻松`);
      speak(text, () => {
        setButtons('🔄 再来一组', resetDemo, null, null, '👋 结束', () => {
          speak('好的，下次见！记得坚持锻炼哦！');
          updateStatus('👋', '下次见！<br><span class="highlight">记得坚持锻炼哦</span>');
        });
      });
    }

    function resetDemo() {
      clearInterval(timerInterval);
      seconds = 0;
      document.getElementById('timer').style.display = 'none';
      document.getElementById('timerLabel').style.display = 'none';
      document.getElementById('progressWrap').style.display = 'none';
      document.getElementById('progressBar').style.width = '0%';
      document.getElementById('timer').textContent = '00:00';
      document.getElementById('statusIcon').classList.remove('breathing');
      document.getElementById('chatLog').innerHTML = '';
      startWelcome();
    }

    function handleMainClick() {
      if (currentStep === 0) startWelcome();
    }
    function handleSubClick() {
      if (currentStep === 0) skipGuide();
    }

    // ===================== INIT =====================
    window.onload = () => {
      checkVoiceSupport();
    };
  </script>
</body>
</html>
