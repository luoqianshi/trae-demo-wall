          </div>
          <div class="level-step l4" data-level="4">
            <span class="level-tag" style="background:rgba(239,68,68,0.15);color:#ef4444;">终极</span>
            <span class="level-time">20min</span>
          </div>
          <div class="level-step l5" data-level="5">
            <span class="level-tag" style="background:rgba(124,58,30,0.3);color:#d97706;">强制</span>
            <span class="level-time">25min</span>
          </div>
        </div>

        <!-- Alert -->
        <div class="alert-area" id="alertArea">
          <div class="alert-message idle-msg" id="alertMessage">
            <span class="msg-icon">🚽</span>
            <span class="msg-title" style="font-size:0.95rem;font-weight:400;color:var(--muted);">后台监测已自动启动</span>
            <span class="msg-body">陀螺仪 · 压力传感器 · 实时计时</span>
          </div>
        </div>

        <!-- History -->
        <div class="history-section">
          <div class="history-header">
            <h3>📋 蹲坑记录</h3>
            <button class="clear-btn" onclick="clearHistory()">清空</button>
          </div>
          <div class="history-list" id="historyList">
            <div style="text-align:center;padding:0.5rem 0;color:var(--muted);font-size:0.75rem;">暂无记录</div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /phone-screen -->

  <div class="phone-home-indicator"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ============================================================
// STATE
// ============================================================
const state = {
  phase: 'home',        // 'home' | 'demo'
  seconds: 0,          // simulated demo-seconds (1 real sec = 30 demo sec)
  level: 0,
  timerInterval: null,
  history: [],
  notifQueue: [],
  notifShowing: false,
  demoBarrier: false   // prevent double-entry
};

// Speed: 1 real second = 30 demo seconds
//  5 min (300s demo)  = 10 real sec
// 10 min (600s demo)  = 20 real sec
// 15 min (900s demo)  = 30 real sec
// 20 min (1200s demo) = 40 real sec
// 25 min (1500s demo) = 50 real sec
const SPEED = 30;

const THRESHOLDS = [
  { level: 1, time: 300,  label: '温和', color: '#22c55e', bg: 'rgba(34,197,94,0.15)' },
  { level: 2, time: 600,  label: '警告', color: '#eab308', bg: 'rgba(234,179,8,0.15)' },
  { level: 3, time: 900,  label: '恐怖', color: '#f97316', bg: 'rgba(249,115,22,0.15)' },
  { level: 4, time: 1200, label: '终极', color: '#ef4444', bg: 'rgba(239,68,68,0.15)' },
  { level: 5, time: 1500, label: '强制', color: '#d97706', bg: 'rgba(124,58,30,0.3)' }
];

const NOTIF_CONTENT = {
  1: [
    { title: '起来活动一下吧', body: '你的菊花会感谢你的', icon: '😊' },
    { title: '才刚开始呢', body: '注意把握时间，控制在5分钟内最健康', icon: '🧘' }
  ],
  2: [
    { title: '肛门静脉压力超标200%', body: '已蹲10分钟，痔疮正在萌芽中……', icon: '⚠️' },
    { title: '直肠静脉丛充血', body: '持续充血将导致静脉曲张，就是痔疮', icon: '🩸' }
  ],
  3: [
    { title: '血栓风险启动', body: '左腿静脉血流速度已下降60%', icon: '💀' },
    { title: '肛门括约肌松弛中', body: '以每分钟0.5%的速度松弛', icon: '🔴' }
  ],
  4: [
    { title: '痔疮发病率提升400%', body: '再蹲下去，痔疮将从小米粒升级为葡萄粒', icon: '🚨' },
    { title: '直肠脱垂风险警告', body: '检测到直肠脱垂风险，请立即起身', icon: '💉' }
  ],
  5: [
    { title: '强制干预！即将播放手术视频', body: '站起来走两步，就当救自己一命', icon: '🆘' },
    { title: '不可逆损伤风险', body: '持续久蹲可能造成肛门神经不可逆损伤！', icon: '🔥' }
  ]
};

const DEMO_MSGS = {
  1: [
    { icon: '😊', title: '起来活动一下吧', body: '你的菊花会感谢你的' },
    { icon: '🌿', title: '黄金如厕时间', body: '医学建议：如厕时间控制在3-5分钟最佳' }
  ],
  2: [
    { icon: '⚠️', title: '肛门静脉压力超标200%', body: '已蹲10分钟，痔疮正在萌芽中……' },
    { icon: '📊', title: '盆底肌负荷过大', body: '盆底肌持续紧张，松弛风险上升30%' }
  ],
  3: [
    { icon: '💀', title: '血栓风险启动', body: '左腿静脉血流速度已下降60%' },
    { icon: '🦵', title: '下肢血液循环受阻', body: '久蹲导致腘动脉受压，腿部供血不足' }
  ],
  4: [
    { icon: '🚨', title: '痔疮发病率提升400%', body: '再蹲下去，痔疮将从小米粒升级为葡萄粒' },
    { icon: '🏥', title: '即将播放手术纪录片', body: '本App将自动播放痔疮手术全程实录' }
  ],
  5: [
    { icon: '🆘', title: '强制干预模式启动', body: '屏幕闪烁红色 + 震动 + 播放术后采访' },
    { icon: '⚡', title: '紧急！血栓正在形成', body: '起来走两步，就当救自己一命' }
  ]
};

// ============================================================
// DOM
// ============================================================
const $ = id => document.getElementById(id);
const homeScreen = $('homeScreen');
const demoScreen = $('demoScreen');
const notifOverlay = $('notifOverlay');
const statusPill = $('statusPill');
const timerDisplay = $('timerDisplay');
const timerLabel = $('timerLabel');
const progressFill = $('progressFill');
const statusDot = $('statusDot');
const statusText = $('statusText');
const toiletGlow = $('toiletGlow');
const alertArea = $('alertArea');
const alertMessage = $('alertMessage');
const redOverlay = $('redOverlay');
const historyList = $('historyList');
const toastContainer = $('toastContainer');
const phoneTime = $('phoneTime');
const homeTimeDisplay = $('homeTimeDisplay');
const homeDateDisplay = $('homeDateDisplay');

// ============================================================
// HELPERS
// ============================================================
function fmtDemoTime(sec) {
  const m = String(Math.floor(sec / 60)).padStart(2, '0');
  const s = String(sec % 60).padStart(2, '0');
  return `${m}:${s}`;
}

function getLevel(sec) {
  let lv = 0;
  for (const t of THRESHOLDS) { if (sec >= t.time) lv = t.level; }
  return lv;
}

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function updatePhoneClock() {
  const n = new Date();
  const h = n.getHours().toString().padStart(2, '0');
  const m = n.getMinutes().toString().padStart(2, '0');
  const t = `${h}:${m}`;
  phoneTime.textContent = t;
  homeTimeDisplay.textContent = t;
  const month = n.getMonth() + 1;
  const day = n.getDate();
  const weekdays = ['日','一','二','三','四','五','六'];
  homeDateDisplay.textContent = `${month}月${day}日 周${weekdays[n.getDay()]}`;
}
updatePhoneClock();
setInterval(updatePhoneClock, 10000);

function showGlobalToast(icon, text) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span class="toast-icon">${icon}</span><span class="toast-text">${text}</span>`;
  toastContainer.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ============================================================
// NOTIFICATION SYSTEM
// ============================================================
function buildNotification(level) {
  const t = THRESHOLDS.find(x => x.level === level);
  if (!t) return null;
  const c = rand(NOTIF_CONTENT[level]);
  const minutes = Math.floor(t.time / 60);
  return {
    level, minutes,
    icon: c.icon,
    title: c.title,
    body: c.body,
    label: t.label,
    color: t.color,
    bg: t.bg
  };
}

function showNotification(data) {
  if (state.notifShowing) return;
  state.notifShowing = true;

  const el = document.createElement('div');
  el.className = 'notification';
  el.dataset.level = data.level;
  el.innerHTML = `
    <div class="notif-row" onclick="enterDemo(${data.level})">
      <div class="notif-icon">🚽</div>
      <div class="notif-body">
        <div class="notif-app-name">蹲坑警报</div>
        <div class="notif-title">${data.icon} ${data.title}</div>
        <div class="notif-text">${data.body}</div>
        <span class="notif-badge" style="background:${data.bg};color:${data.color}">${data.label} · 已蹲${data.minutes}分钟</span>
      </div>
      <div class="notif-time">现在</div>
    </div>
    <button class="notif-dismiss" onclick="dismissNotif(event)">✕</button>
  `;
  notifOverlay.innerHTML = '';
  notifOverlay.appendChild(el);

  // Trigger animation
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));

  // Auto dismiss after 7s
  clearTimeout(el._dismissTimer);
  el._dismissTimer = setTimeout(() => dismissNotifElement(el), 7000);

  // Vibration for level 4+
  if (data.level >= 4 && navigator.vibrate) {
    navigator.vibrate([200, 100, 200, 100, 400]);
  }
}

function dismissNotif(e) {
  e.stopPropagation();
  const el = e.currentTarget.closest('.notification');
  if (el) dismissNotifElement(el);
}

function dismissNotifElement(el) {
  if (!el) return;
  el.classList.remove('show');
  setTimeout(() => {
    el.remove();
    state.notifShowing = false;
    // Show next queued if any
    if (state.notifQueue.length > 0) {
      const next = state.notifQueue.shift();
      showNotification(next);
    }
  }, 400);
}

// ============================================================
// TIMER (runs in background regardless of screen)
// ============================================================
function backgroundTick() {
  state.seconds += SPEED; // advance demo-seconds
  const newLevel = getLevel(state.seconds);

  if (newLevel !== state.level) {
    state.level = newLevel;
    // Always try to fire a notification
    if (state.level > 0) {
      const notif = buildNotification(state.level);
      if (notif) {
        if (state.notifShowing) {
          state.notifQueue.push(notif);
        } else {
          showNotification(notif);
        }
      }
    }
  }

  // Update pill
  if (state.phase === 'home' && state.level > 0) {
    const t = THRESHOLDS.find(x => x.level === state.level);
    if (t) {
      const dot = statusPill.querySelector('.dot');
      if (state.level >= 4) {
        dot.style.background = 'var(--red)';
        dot.style.animation = 'pulse-dot 0.6s ease-in-out infinite';
        statusPill.style.borderColor = 'rgba(239,68,68,0.2)';
        statusPill.style.background = 'rgba(239,68,68,0.08)';
      }
    }
  }

  // Update demo UI if visible
  if (state.phase === 'demo') {
    updateDemoUI();
  }
}

// ============================================================
// DEMO UI
// ============================================================
function updateDemoUI() {
  timerDisplay.textContent = fmtDemoTime(state.seconds);
  timerDisplay.className = `timer-display level-${state.level}`;

  const maxSec = 1500;
  const pct = Math.min((state.seconds / maxSec) * 100, 100);
  progressFill.style.width = pct + '%';
  progressFill.className = `progress-fill level-${state.level}`;

  document.querySelectorAll('.level-step').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.level) <= state.level);
  });

  statusDot.className = `status-dot ${state.level >= 4 ? 'alert' : 'monitoring'}`;
  statusText.textContent =
    state.level === 0 ? '监测中' :
    state.level === 1 ? '温和提醒' :
    state.level === 2 ? '发出警告' :
    state.level === 3 ? '恐怖通知' :
    state.level === 4 ? '终极警报' : '强制干预';

  alertArea.className = `alert-area level-${state.level}`;
  redOverlay.classList.toggle('active', state.level >= 4);
  redOverlay.classList.toggle('critical', state.level >= 5);

  toiletGlow.classList.toggle('active', state.level > 0);

  if (state.level > 0) {
    const t = THRESHOLDS.find(x => x.level === state.level);
    if (t) timerLabel.textContent = `已超过 ${t.time/60} 分钟 — ${t.label}级别`;
  } else {
    timerLabel.textContent = '一切正常，健康如厕中';
  }
}

function updateDemoAlert() {
  const msgs = DEMO_MSGS[state.level];
  if (!msgs) return;
  const msg = rand(msgs);
  alertMessage.className = 'alert-message';
  alertMessage.innerHTML = `
    <span class="msg-icon">${msg.icon}</span>
    <span class="msg-title">${msg.title}</span>
    <span class="msg-body">${msg.body}</span>
  `;
}

// ============================================================
// SCREEN TRANSITIONS
// ============================================================
function enterDemo(triggerLevel) {
  if (state.demoBarrier) return;
  state.demoBarrier = true;

  // Dismiss any showing notification
  const notif = notifOverlay.querySelector('.notification');
  if (notif) dismissNotifElement(notif);

  state.phase = 'demo';
  homeScreen.classList.add('hidden');
  demoScreen.classList.remove('hidden');

  // Sync demo UI to current state
  updateDemoUI();
  updateDemoAlert();

  setTimeout(() => { state.demoBarrier = false; }, 600);
}

function goHome() {
  state.phase = 'home';
  demoScreen.classList.add('hidden');
  homeScreen.classList.remove('hidden');
}

// ============================================================
// INIT — auto-start background timer
// ============================================================
function init() {
  // Show status pill after a moment
  setTimeout(() => statusPill.classList.add('show'), 1500);

  // Start background timer (runs forever simulating the app)
  state.timerInterval = setInterval(backgroundTick, 1000);

  // Attach back gesture: tapping home indicator area goes back
  document.querySelector('.phone-home-indicator')?.addEventListener('click', () => {
    if (state.phase === 'demo') goHome();
  });
}

init();
</script>
</body>
</html>
