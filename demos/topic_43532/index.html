<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能机器人路径规划算法演示系统</title>
<style>
  :root {
    --bg: #0a0e17;
    --panel-bg: #111827;
    --border: #1e293b;
    --text: #e2e8f0;
    --text-secondary: #94a3b8;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --start-color: #10b981;
    --end-color: #ef4444;
    --wall-color: #1e293b;
    --path-color: #8b5cf6;
    --explored-color: rgba(59, 130, 246, 0.15);
    --frontier-color: rgba(245, 158, 11, 0.25);
    --robot-color: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans CJK SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
  header {
    width: 100%;
    padding: 20px 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: var(--panel-bg);
  }
  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    background: linear-gradient(135deg, #3b82f6, #06b6d4, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .main-container {
    display: flex;
    gap: 20px;
    padding: 24px;
    max-width: 1100px;
    width: 100%;
    flex-wrap: wrap;
    justify-content: center;
  }
  .canvas-wrapper {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  canvas {
    display: block;
    border-radius: 6px;
    cursor: crosshair;
  }
  .panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    width: 300px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .panel h3 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .btn {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #1e293b;
    color: var(--text);
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 500;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn:hover { background: #334155; border-color: #475569; }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.run { background: var(--success); border-color: var(--success); color: #fff; }
  .btn.run:hover { background: #059669; }
  .btn.clear { background: var(--danger); border-color: var(--danger); color: #fff; }
  .btn.clear:hover { background: #dc2626; }
  .btn.maze { background: #7c3aed; border-color: #7c3aed; color: #fff; }
  .btn.maze:hover { background: #6d28d9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .tool-label {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 600;
    margin-bottom: -8px;
  }
  .tool-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tool-btn {
    flex: 1;
    min-width: 55px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #1e293b;
    color: var(--text);
    cursor: pointer;
    font-size: 0.78rem;
    text-align: center;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tool-btn:hover { background: #334155; }
  .tool-btn.selected { border-color: var(--accent); background: rgba(59,130,246,0.2); color: var(--accent); }
  .speed-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .speed-row label { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; }
  .speed-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .speed-row span { font-size: 0.78rem; color: var(--text); min-width: 28px; text-align: center; }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat-card {
    background: #1e293b;
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
  }
  .stat-card .stat-value {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-card .stat-label {
    font-size: 0.7rem;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    font-size: 0.72rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    display: inline-block;
  }
  .status-bar {
    font-size: 0.8rem;
    text-align: center;
    padding: 8px;
    background: #1e293b;
    border-radius: 8px;
    color: var(--text-secondary);
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .status-bar.success { color: var(--success); }
  .status-bar.running { color: var(--warning); }
  .algorithm-select {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .algo-btn {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #1e293b;
    color: var(--text);
    cursor: pointer;
    font-size: 0.78rem;
    text-align: center;
    transition: all 0.2s;
    font-family: inherit;
  }
  .algo-btn:hover { background: #334155; }
  .algo-btn.selected { border-color: #8b5cf6; background: rgba(139,92,246,0.2); color: #a78bfa; }
  .compare-section {
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.75rem;
  }
  .compare-table th, .compare-table td {
    padding: 6px 8px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .compare-table th {
    color: var(--text-secondary);
    font-weight: 500;
    font-size: 0.7rem;
  }
  .compare-table td { color: var(--text); }
  .compare-table .best { color: var(--success); font-weight: 600; }
  footer {
    padding: 16px;
    text-align: center;
    color: var(--text-secondary);
    font-size: 0.75rem;
  }
  @media (max-width: 768px) {
    .main-container { flex-direction: column; align-items: center; }
    .panel { width: 100%; max-width: 400px; }
    canvas { width: 100%; height: auto; }
  }
</style>
</head>
<body>

<header>
  <h1>🤖 智能机器人路径规划算法演示系统</h1>
  <p>硬件交互赛道 · 机器人算法可视化 · TRAE 构建</p>
</header>

<div class="main-container">
  <!-- Canvas -->
  <div class="canvas-wrapper">
    <canvas id="gridCanvas"></canvas>
  </div>

  <!-- Control Panel -->
  <div class="panel">
    <h3>🎮 操作面板</h3>

    <!-- Drawing tools -->
    <div class="tool-label">绘图工具（点击画布操作）</div>
    <div class="tool-row">
      <button class="tool-btn selected" data-tool="wall" id="toolWall">🧱 画墙</button>
      <button class="tool-btn" data-tool="start" id="toolStart">🟢 起点</button>
      <button class="tool-btn" data-tool="end" id="toolEnd">🔴 终点</button>
      <button class="tool-btn" data-tool="erase" id="toolErase">🧹 擦除</button>
    </div>

    <!-- Algorithm selection -->
    <div class="tool-label">算法选择</div>
    <div class="algorithm-select">
      <button class="algo-btn selected" data-algo="astar" id="algoAStar">⭐ A* 算法</button>
      <button class="algo-btn" data-algo="dijkstra" id="algoDijkstra">Dijkstra</button>
      <button class="algo-btn" data-algo="bfs" id="algoBFS">BFS 广度优先</button>
      <button class="algo-btn" data-algo="greedy" id="algoGreedy">Greedy Best-First</button>
    </div>

    <!-- Speed -->
    <div class="speed-row">
      <label>动画速度</label>
      <input type="range" id="speedSlider" min="1" max="10" value="5">
      <span id="speedLabel">5x</span>
    </div>

    <!-- Action buttons -->
    <div class="btn-group">
      <button class="btn run" id="btnRun">▶ 开始寻路</button>
      <button class="btn clear" id="btnClearPath">🔄 清除路径</button>
    </div>
    <div class="btn-group">
      <button class="btn maze" id="btnMaze">🎲 随机迷宫</button>
      <button class="btn clear" id="btnClearAll">🗑 全部清除</button>
    </div>

    <!-- Status -->
    <div class="status-bar" id="statusBar">点击画布绘制障碍物，设置起点和终点</div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="statExplored">0</div>
        <div class="stat-label">已探索节点</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statPathLen">0</div>
        <div class="stat-label">路径长度</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statTime">0ms</div>
        <div class="stat-label">计算耗时</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statEfficiency">-</div>
        <div class="stat-label">效率评价</div>
      </div>
    </div>

    <!-- Legend -->
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#10b981"></span> 起点</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ef4444"></span> 终点</div>
      <div class="legend-item"><span class="legend-dot" style="background:#1e293b"></span> 障碍物</div>
      <div class="legend-item"><span class="legend-dot" style="background:rgba(59,130,246,0.3)"></span> 已探索</div>
      <div class="legend-item"><span class="legend-dot" style="background:rgba(245,158,11,0.4)"></span> 前沿</div>
      <div class="legend-item"><span class="legend-dot" style="background:#8b5cf6"></span> 路径</div>
    </div>

    <!-- Algorithm comparison -->
    <div class="compare-section">
      <h3>📊 算法对比</h3>
      <table class="compare-table" id="compareTable">
        <thead>
          <tr><th>算法</th><th>探索节点</th><th>路径长度</th><th>耗时</th></tr>
        </thead>
        <tbody>
          <tr><td>A*</td><td id="cmpAStarNodes">-</td><td id="cmpAStarPath">-</td><td id="cmpAStarTime">-</td></tr>
          <tr><td>Dijkstra</td><td id="cmpDijkstraNodes">-</td><td id="cmpDijkstraPath">-</td><td id="cmpDijkstraTime">-</td></tr>
          <tr><td>BFS</td><td id="cmpBFSNodes">-</td><td id="cmpBFSPath">-</td><td id="cmpBFSTime">-</td></tr>
          <tr><td>Greedy</td><td id="cmpGreedyNodes">-</td><td id="cmpGreedyPath">-</td><td id="cmpGreedyTime">-</td></tr>
        </tbody>
      </table>
      <button class="btn" id="btnCompareAll" style="width:100%;margin-top:6px;">🔬 一键对比全部算法</button>
    </div>
  </div>
</div>

<footer>
  TRAE AI 创造力大赛 · 硬件交互赛道 · 机器人路径规划算法演示系统
</footer>

<script>
// ============ 常量与配置 ============
const GRID_SIZE = 25;
const CELL_SIZE = 24;
const canvas = document.getElementById('gridCanvas');
const ctx = canvas.getContext('2d');
canvas.width = GRID_SIZE * CELL_SIZE;
canvas.height = GRID_SIZE * CELL_SIZE;

// 节点类型
const EMPTY = 0;
const WALL = 1;
const START = 2;
const END = 3;
const EXPLORED = 4;
const FRONTIER = 5;
const PATH = 6;

// 状态
let grid = [];
let startNode = null;
let endNode = null;
let currentTool = 'wall';
let currentAlgo = 'astar';
let isRunning = false;
let animationSpeed = 5;
let mouseDown = false;
let stats = { explored: 0, pathLen: 0, time: 0 };
let compareResults = {};

// ============ 初始化网格 ============
function initGrid() {
  grid = [];
  for (let r = 0; r < GRID_SIZE; r++) {
    grid[r] = [];
    for (let c = 0; c < GRID_SIZE; c++) {
      grid[r][c] = EMPTY;
    }
  }
  // 默认起点和终点
  startNode = { r: 2, c: 2 };
  endNode = { r: GRID_SIZE - 3, c: GRID_SIZE - 3 };
  grid[startNode.r][startNode.c] = START;
  grid[endNode.r][endNode.c] = END;
  compareResults = {};
  updateCompareTable();
}

// ============ 绘制 ============
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const x = c * CELL_SIZE;
      const y = r * CELL_SIZE;
      const val = grid[r][c];

      // 填充
      switch (val) {
        case EMPTY:
          ctx.fillStyle = '#0f172a';
          break;
        case WALL:
          ctx.fillStyle = '#1e293b';
          break;
        case START:
          ctx.fillStyle = '#10b981';
          break;
        case END:
          ctx.fillStyle = '#ef4444';
          break;
        case EXPLORED:
          ctx.fillStyle = 'rgba(59, 130, 246, 0.25)';
          break;
        case FRONTIER:
          ctx.fillStyle = 'rgba(245, 158, 11, 0.35)';
          break;
        case PATH:
          ctx.fillStyle = '#8b5cf6';
          break;
      }
      ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);

      // 网格线
      ctx.strokeStyle = 'rgba(30, 41, 59, 0.5)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);

      // 图标
      if (val === START) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('S', x + CELL_SIZE / 2, y + CELL_SIZE / 2);
      } else if (val === END) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('E', x + CELL_SIZE / 2, y + CELL_SIZE / 2);
      }
    }
  }
}

// ============ 鼠标交互 ============
function getCellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  const c = Math.floor(x / CELL_SIZE);
  const r = Math.floor(y / CELL_SIZE);
  return { r, c };
}

function handleCellAction(r, c) {
  if (isRunning) return;
  if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return;

  switch (currentTool) {
    case 'wall':
      if (grid[r][c] === EMPTY) {
        grid[r][c] = WALL;
      }
      break;
    case 'start':
      if (grid[r][c] !== END && grid[r][c] !== WALL) {
        if (startNode) grid[startNode.r][startNode.c] = EMPTY;
        startNode = { r, c };
        grid[r][c] = START;
      }
      break;
    case 'end':
      if (grid[r][c] !== START && grid[r][c] !== WALL) {
        if (endNode) grid[endNode.r][endNode.c] = EMPTY;
        endNode = { r, c };
        grid[r][c] = END;
      }
      break;
    case 'erase':
      if (grid[r][c] === WALL) {
        grid[r][c] = EMPTY;
      } else if (grid[r][c] === START && startNode) {
        grid[startNode.r][startNode.c] = EMPTY;
        startNode = null;
      } else if (grid[r][c] === END && endNode) {
        grid[endNode.r][endNode.c] = EMPTY;
        endNode = null;
      }
      break;
  }
  draw();
}

canvas.addEventListener('mousedown', (e) => {
  mouseDown = true;
  const { r, c } = getCellFromEvent(e);
  handleCellAction(r, c);
});

canvas.addEventListener('mousemove', (e) => {
  if (!mouseDown) return;
  const { r, c } = getCellFromEvent(e);
  handleCellAction(r, c);
});

canvas.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('mouseleave', () => { mouseDown = false; });

// 触摸支持
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  mouseDown = true;
  const { r, c } = getCellFromEvent(e.touches[0]);
  handleCellAction(r, c);
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!mouseDown) return;
  const { r, c } = getCellFromEvent(e.touches[0]);
  handleCellAction(r, c);
});
canvas.addEventListener('touchend', () => { mouseDown = false; });

// ============ 工具切换 ============
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentTool = btn.dataset.tool;
  });
});

// ============ 算法切换 ============
document.querySelectorAll('.algo-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.algo-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentAlgo = btn.dataset.algo;
  });
});

// ============ 速度控制 ============
const speedSlider = document.getElementById('speedSlider');
const speedLabel = document.getElementById('speedLabel');
speedSlider.addEventListener('input', () => {
  animationSpeed = parseInt(speedSlider.value);
  speedLabel.textContent = animationSpeed + 'x';
});

// ============ 路径规划算法 ============
function getNeighbors(r, c) {
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  const neighbors = [];
  for (const [dr, dc] of dirs) {
    const nr = r + dr, nc = c + dc;
    if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE && grid[nr][nc] !== WALL) {
      neighbors.push({ r: nr, c: nc });
    }
  }
  return neighbors;
}

function heuristic(a, b) {
  return Math.abs(a.r - b.r) + Math.abs(a.c - b.c); // 曼哈顿距离
}

function reconstructPath(cameFrom, current) {
  const path = [];
  while (current) {
    path.push(current);
    current = cameFrom[`${current.r},${current.c}`];
  }
  return path.reverse();
}

async function runAlgorithm(algoName, visualize = true, gridSnapshot = null) {
  // 如果提供了快照，使用快照；否则使用当前网格
  const workGrid = gridSnapshot || grid.map(row => [...row]);
  const workStart = { ...startNode };
  const workEnd = { ...endNode };

  if (!workStart || !workEnd) {
    if (visualize) setStatus('请先设置起点和终点', '');
    return null;
  }

  const startTime = performance.now();
  const openSet = [workStart];
  const cameFrom = {};
  const gScore = {};
  const fScore = {};
  gScore[`${workStart.r},${workStart.c}`] = 0;
  fScore[`${workStart.r},${workStart.c}`] = heuristic(workStart, workEnd);
  const explored = new Set();
  let nodesExplored = 0;

  while (openSet.length > 0) {
    // 根据算法选择下一个节点
    let current;
    if (algoName === 'astar') {
      // A*: fScore = gScore + heuristic
      let minF = Infinity;
      let minIdx = 0;
      for (let i = 0; i < openSet.length; i++) {
        const key = `${openSet[i].r},${openSet[i].c}`;
        const f = fScore[key] || Infinity;
        if (f < minF) { minF = f; minIdx = i; }
      }
      current = openSet.splice(minIdx, 1)[0];
    } else if (algoName === 'dijkstra') {
      // Dijkstra: 只考虑 gScore
      let minG = Infinity;
      let minIdx = 0;
      for (let i = 0; i < openSet.length; i++) {
        const key = `${openSet[i].r},${openSet[i].c}`;
        const g = gScore[key] || Infinity;
        if (g < minG) { minG = g; minIdx = i; }
      }
      current = openSet.splice(minIdx, 1)[0];
    } else if (algoName === 'bfs') {
      // BFS: FIFO
      current = openSet.shift();
    } else if (algoName === 'greedy') {
      // Greedy Best-First: 只考虑 heuristic
      let minH = Infinity;
      let minIdx = 0;
      for (let i = 0; i < openSet.length; i++) {
        const h = heuristic(openSet[i], workEnd);
        if (h < minH) { minH = h; minIdx = i; }
      }
      current = openSet.splice(minIdx, 1)[0];
    }

    const currentKey = `${current.r},${current.c}`;

    // 到达终点
    if (current.r === workEnd.r && current.c === workEnd.c) {
      const path = reconstructPath(cameFrom, current);
      const elapsed = (performance.now() - startTime).toFixed(1);

      if (visualize) {
        // 绘制路径
        for (const node of path) {
          if (workGrid[node.r][node.c] === EMPTY || workGrid[node.r][node.c] === EXPLORED || workGrid[node.r][node.c] === FRONTIER) {
            grid[node.r][node.c] = PATH;
          }
        }
        draw();
        updateStats(nodesExplored, path.length, elapsed);
        setStatus(`✅ 路径找到！长度: ${path.length} 步`, 'success');
        isRunning = false;
      }

      return { path, nodesExplored, pathLength: path.length, time: parseFloat(elapsed) };
    }

    explored.add(currentKey);
    nodesExplored++;

    // 可视化
    if (visualize && workGrid[current.r][current.c] !== START) {
      grid[current.r][current.c] = EXPLORED;
      if (nodesExplored % animationSpeed === 0) {
        draw();
        updateStats(nodesExplored, '-', '-');
        await new Promise(r => setTimeout(r, 1));
      }
    }

    const neighbors = getNeighbors.call(
      { GRID_SIZE, grid: workGrid },
      current.r, current.c
    );

    for (const neighbor of neighbors) {
      const neighborKey = `${neighbor.r},${neighbor.c}`;
      if (explored.has(neighborKey)) continue;

      const tentativeG = (gScore[currentKey] || 0) + 1;

      const alreadyInOpen = openSet.some(n => n.r === neighbor.r && n.c === neighbor.c);
      if (!alreadyInOpen) {
        openSet.push(neighbor);
        if (visualize && workGrid[neighbor.r][neighbor.c] === EMPTY) {
          grid[neighbor.r][neighbor.c] = FRONTIER;
        }
      } else if (tentativeG >= (gScore[neighborKey] || Infinity)) {
        continue;
      }

      cameFrom[neighborKey] = current;
      gScore[neighborKey] = tentativeG;
      if (algoName === 'astar') {
        fScore[neighborKey] = tentativeG + heuristic(neighbor, workEnd);
      } else if (algoName === 'greedy') {
        fScore[neighborKey] = heuristic(neighbor, workEnd);
      }
    }
  }

  // 无路径
  const elapsed = (performance.now() - startTime).toFixed(1);
  if (visualize) {
    draw();
    updateStats(nodesExplored, 0, elapsed);
    setStatus('❌ 无法找到路径！请检查障碍物是否完全阻断', '');
    isRunning = false;
  }
  return { path: null, nodesExplored, pathLength: 0, time: parseFloat(elapsed) };
}

// ============ 按钮事件 ============
document.getElementById('btnRun').addEventListener('click', async () => {
  if (isRunning) return;
  if (!startNode || !endNode) {
    setStatus('请先设置起点和终点', '');
    return;
  }

  // 清除之前的路径
  clearPathOnly();
  isRunning = true;
  setStatus(`⏳ ${getAlgoName(currentAlgo)} 正在搜索路径...`, 'running');
  disableButtons(true);
  await runAlgorithm(currentAlgo, true);
  disableButtons(false);
});

document.getElementById('btnClearPath').addEventListener('click', () => {
  if (isRunning) return;
  clearPathOnly();
  updateStats(0, 0, '0ms');
  setStatus('点击画布绘制障碍物，设置起点和终点', '');
  draw();
});

document.getElementById('btnClearAll').addEventListener('click', () => {
  if (isRunning) return;
  initGrid();
  clearPathOnly();
  updateStats(0, 0, '0ms');
  setStatus('已全部清除，请重新绘制', '');
  compareResults = {};
  updateCompareTable();
  draw();
});

document.getElementById('btnMaze').addEventListener('click', () => {
  if (isRunning) return;
  generateMaze();
  clearPathOnly();
  updateStats(0, 0, '0ms');
  setStatus('已生成随机迷宫，点击"开始寻路"测试算法', '');
  compareResults = {};
  updateCompareTable();
  draw();
});

document.getElementById('btnCompareAll').addEventListener('click', async () => {
  if (isRunning) return;
  if (!startNode || !endNode) {
    setStatus('请先设置起点和终点', '');
    return;
  }

  isRunning = true;
  setStatus('🔬 正在对比全部算法...', 'running');
  disableButtons(true);

  const algos = ['astar', 'dijkstra', 'bfs', 'greedy'];
  const algoNames = { astar: 'A*', dijkstra: 'Dijkstra', bfs: 'BFS', greedy: 'Greedy' };

  // 保存当前网格快照
  const gridSnapshot = grid.map(row => [...row]);

  for (const algo of algos) {
    // 清除路径并恢复网格
    clearPathOnly();
    grid = gridSnapshot.map(row => [...row]);

    const result = await runAlgorithm(algo, false, gridSnapshot);
    if (result) {
      compareResults[algo] = result;
    } else {
      compareResults[algo] = { nodesExplored: '-', pathLength: '-', time: '-' };
    }

    // 更新对比表
    document.getElementById(`cmp${algo.charAt(0).toUpperCase() + algo.slice(1)}Nodes`).textContent =
      result ? result.nodesExplored : '-';
    document.getElementById(`cmp${algo.charAt(0).toUpperCase() + algo.slice(1)}Path`).textContent =
      result && result.path ? result.pathLength : '-';
    document.getElementById(`cmp${algo.charAt(0).toUpperCase() + algo.slice(1)}Time`).textContent =
      result ? result.time + 'ms' : '-';
  }

  // 恢复网格并显示最佳算法的路径
  grid = gridSnapshot.map(row => [...row]);
  clearPathOnly();
  const bestAlgo = findBestAlgo();
  if (bestAlgo && compareResults[bestAlgo] && compareResults[bestAlgo].path) {
    await runAlgorithm(bestAlgo, true, gridSnapshot);
  }

  isRunning = false;
  disableButtons(false);
  updateCompareTable();
  setStatus('✅ 算法对比完成！', 'success');
  draw();
});

function findBestAlgo() {
  let best = null;
  let bestScore = Infinity;
  for (const [algo, result] of Object.entries(compareResults)) {
    if (result.path && result.pathLength > 0) {
      const score = result.nodesExplored + result.pathLength * 0.5;
      if (score < bestScore) { bestScore = score; best = algo; }
    }
  }
  return best;
}

// ============ 迷宫生成（递归分割） ============
function generateMaze() {
  initGrid();

  // 全部设为墙
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      grid[r][c] = WALL;
    }
  }

  // 递归分割
  function carve(r1, c1, r2, c2) {
    if (r2 - r1 < 2 || c2 - c1 < 2) return;

    // 随机选择水平或垂直分割
    const horizontal = (r2 - r1) > (c2 - c1) || (Math.random() < 0.5 && (r2 - r1) >= (c2 - c1));

    if (horizontal) {
      const wallR = r1 + 2 + Math.floor(Math.random() * Math.floor((r2 - r1 - 2) / 2)) * 2;
      const passageC = c1 + 1 + Math.floor(Math.random() * Math.floor((c2 - c1) / 2)) * 2;

      for (let c = c1; c <= c2; c++) {
        if (c !== passageC && grid[wallR] && grid[wallR][c] !== undefined) {
          grid[wallR][c] = WALL;
        }
      }
      for (let c = c1; c <= c2; c++) {
        if (grid[wallR] && grid[wallR][c] !== undefined) grid[wallR][c] = (c === passageC) ? EMPTY : WALL;
      }

      carve(r1, c1, wallR - 1, c2);
      carve(wallR + 1, c1, r2, c2);
    } else {
      const wallC = c1 + 2 + Math.floor(Math.random() * Math.floor((c2 - c1 - 2) / 2)) * 2;
      const passageR = r1 + 1 + Math.floor(Math.random() * Math.floor((r2 - r1) / 2)) * 2;

      for (let r = r1; r <= r2; r++) {
        if (grid[r] && grid[r][wallC] !== undefined) {
          grid[r][wallC] = (r === passageR) ? EMPTY : WALL;
        }
      }

      carve(r1, c1, r2, wallC - 1);
      carve(r1, wallC + 1, c2, r2);
    }
  }

  // 先清空内部
  for (let r = 1; r < GRID_SIZE - 1; r++) {
    for (let c = 1; c < GRID_SIZE - 1; c++) {
      grid[r][c] = EMPTY;
    }
  }

  carve(1, 1, GRID_SIZE - 2, GRID_SIZE - 2);

  // 设置起点终点
  startNode = { r: 1, c: 1 };
  endNode = { r: GRID_SIZE - 2, c: GRID_SIZE - 2 };
  grid[startNode.r][startNode.c] = START;
  grid[endNode.r][endNode.c] = END;

  // 确保起点终点周围通畅
  grid[1][2] = EMPTY;
  grid[2][1] = EMPTY;
  grid[GRID_SIZE - 2][GRID_SIZE - 3] = EMPTY;
  grid[GRID_SIZE - 3][GRID_SIZE - 2] = EMPTY;
}

// ============ 辅助函数 ============
function clearPathOnly() {
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (grid[r][c] === EXPLORED || grid[r][c] === FRONTIER || grid[r][c] === PATH) {
        grid[r][c] = EMPTY;
      }
    }
  }
  if (startNode) grid[startNode.r][startNode.c] = START;
  if (endNode) grid[endNode.r][endNode.c] = END;
}

function getAlgoName(algo) {
  const names = { astar: 'A* 算法', dijkstra: 'Dijkstra 算法', bfs: 'BFS 算法', greedy: 'Greedy Best-First' };
  return names[algo] || algo;
}

function updateStats(explored, pathLen, time) {
  document.getElementById('statExplored').textContent = explored;
  document.getElementById('statPathLen').textContent = pathLen;
  document.getElementById('statTime').textContent = typeof time === 'string' ? time : time + 'ms';

  // 效率评价
  let efficiency = '-';
  if (typeof explored === 'number' && typeof pathLen === 'number' && pathLen > 0) {
    const ratio = explored / pathLen;
    if (ratio < 5) efficiency = '⭐ 优秀';
    else if (ratio < 15) efficiency = '👍 良好';
    else efficiency = '📊 一般';
  }
  document.getElementById('statEfficiency').textContent = efficiency;
}

function setStatus(msg, cls) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar ' + cls;
}

function disableButtons(disabled) {
  document.getElementById('btnRun').disabled = disabled;
  document.getElementById('btnMaze').disabled = disabled;
  document.getElementById('btnClearAll').disabled = disabled;
  document.getElementById('btnClearPath').disabled = disabled;
  document.getElementById('btnCompareAll').disabled = disabled;
}

function updateCompareTable() {
  for (const algo of ['astar', 'dijkstra', 'bfs', 'greedy']) {
    const cap = algo.charAt(0).toUpperCase() + algo.slice(1);
    const result = compareResults[algo];
    document.getElementById(`cmp${cap}Nodes`).textContent = result ? result.nodesExplored : '-';
    document.getElementById(`cmp${cap}Path`).textContent = result && result.pathLength > 0 ? result.pathLength : '-';
    document.getElementById(`cmp${cap}Time`).textContent = result ? result.time + 'ms' : '-';
  }
}

// ============ 启动 ============
initGrid();
draw();
updateStats(0, 0, '0ms');
</script>
