<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle System — TRAE Demo Wall</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    canvas { display: block; }

    .overlay {
      position: fixed;
      bottom: 40px;
      left: 40px;
      z-index: 10;
      pointer-events: none;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1px solid rgba(34,197,94,0.35);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      color: #22c55e;
      background: rgba(34,197,94,0.08);
      margin-bottom: 16px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
    }
    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .stats {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #71717a;
      line-height: 1.8;
    }
    .stats span { color: #a1a1aa; }

    .title-card {
      position: fixed;
      top: 40px;
      left: 40px;
      z-index: 10;
      pointer-events: none;
    }
    .title-card h1 {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .title-card p {
      font-size: 13px;
      color: #71717a;
      max-width: 280px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="title-card">
    <h1>Particle Background</h1>
    <p>Canvas 2D 粒子背景系统，鼠标靠近时粒子受引力吸引，距离近的粒子之间自动连线。</p>
  </div>

  <div class="overlay">
    <div class="badge">LIVE RENDER</div>
    <div class="stats">
      Particles: <span id="stat-particles">80</span><br>
      Connections: <span id="stat-connections">0</span><br>
      Mouse Radius: <span>200px</span><br>
      FPS: <span id="stat-fps">60</span>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [], mouse = { x: null, y: null };
    const ACCENT = { r: 34, g: 197, b: 94 };
    const PARTICLE_COUNT = 80;
    const CONNECTION_DISTANCE = 150;
    const MOUSE_RADIUS = 200;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });

    class Particle {
      constructor() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.r = Math.random() * 2 + 1;
        this.alpha = Math.random() * 0.4 + 0.2;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > W) this.vx *= -1;
        if (this.y < 0 || this.y > H) this.vy *= -1;
        if (mouse.x !== null) {
          const dx = mouse.x - this.x, dy = mouse.y - this.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < MOUSE_RADIUS) {
            this.x += dx * 0.005;
            this.y += dy * 0.005;
          }
        }
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${ACCENT.r},${ACCENT.g},${ACCENT.b},${this.alpha})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

    let lastTime = performance.now();
    let frameCount = 0;
    let fps = 60;

    function animate() {
      const now = performance.now();
      frameCount++;
      if (now - lastTime >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastTime = now;
        document.getElementById('stat-fps').textContent = fps;
      }

      ctx.clearRect(0, 0, W, H);

      let connectionCount = 0;
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < CONNECTION_DISTANCE) {
            connectionCount++;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(${ACCENT.r},${ACCENT.g},${ACCENT.b},${0.15 * (1 - dist/CONNECTION_DISTANCE)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      document.getElementById('stat-connections').textContent = connectionCount;
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
