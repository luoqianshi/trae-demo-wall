<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandbox Panel v2</title>
<style>
:root{
--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--green:#3fb950;--red:#f85149;
--yellow:#d29922;--blue:#58a6ff;--purple:#bc8cff;--radius:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;overflow:hidden}
#app{display:flex;height:100vh}
#sidebar{width:180px;background:var(--card);border-right:1px solid var(--border);padding:16px 0;display:flex;flex-direction:column}
#sidebar .logo{font-size:16px;font-weight:700;color:var(--blue);padding:0 16px 16px;border-bottom:1px solid var(--border);margin-bottom:8px}
#sidebar .nav-item{padding:10px 16px;cursor:pointer;color:var(--text);transition:all 0.2s;font-size:13px;display:flex;align-items:center;gap:8px}
#sidebar .nav-item:hover{background:rgba(88,166,255,0.1);color:var(--blue)}
#sidebar .nav-item.active{background:rgba(88,166,255,0.15);color:var(--blue);border-right:2px solid var(--blue)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tab-header{display:flex;align-items:center;padding:10px 20px;background:var(--card);border-bottom:1px solid var(--border);gap:12px}
#tab-header h2{font-size:16px;flex:1}
#tab-content{flex:1;overflow-y:auto;padding:16px 20px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-fail{background:var(--red);box-shadow:0 0 6px var(--red)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card h3{font-size:14px;margin-bottom:10px;color:var(--blue);display:flex;align-items:center;gap:8px}
.grid{display:grid;gap:10px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
.stat{text-align:center;padding:8px}
.stat .val{font-size:20px;font-weight:700;word-break:break-all}
.stat .lbl{font-size:11px;color:#8b949e;margin-top:2px}
.btn{padding:6px 14px;border-radius:4px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all 0.2s}
.btn-blue{background:var(--blue);color:#000}
.btn-green{background:var(--green);color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-gray{background:#21262d;color:var(--text);border:1px solid var(--border)}
.btn:hover{opacity:0.85}
input,select{background:#0d1117;border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:4px;font-size:12px;font-family:monospace}
input[type=number]{width:90px}
.kv{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px solid rgba(48,54,61,0.4)}
.kv .k{color:#8b949e}
.kv .v{color:var(--text);font-family:monospace}
pre.out{background:#0d1117;border:1px solid var(--border);border-radius:4px;padding:10px;font-family:monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;color:var(--green)}
.pbar{height:18px;background:#0d1117;border:1px solid var(--border);border-radius:4px;overflow:hidden;position:relative}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));transition:width 0.3s}
.pbar-txt{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:600;text-shadow:0 0 3px #000}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-running{background:var(--blue);color:#000}
.badge-done{background:var(--green);color:#000}
.badge-failed{background:var(--red);color:#fff}
#keymap-editor{display:flex;gap:16px;height:calc(100vh - 220px)}
#screen-preview{position:relative;border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;background:#1a1a2e;
  background-image:linear-gradient(rgba(48,54,61,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(48,54,61,0.1) 1px,transparent 1px);
  background-size:40px 40px}
#screen-preview canvas{display:block}
#keymap-list{width:320px;overflow-y:auto}
.key-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-bottom:1px solid var(--border);font-size:12px;cursor:pointer;transition:background 0.15s}
.key-row:hover{background:rgba(88,166,255,0.08)}
.key-row .k{background:var(--blue);color:#000;padding:2px 8px;border-radius:3px;font-weight:700;min-width:50px;text-align:center;font-size:13px}
.key-row .info{flex:1;font-size:11px;color:#8b949e}
.key-row .del{cursor:pointer;color:var(--red);font-weight:700;font-size:16px;padding:0 4px}
.section-title{font-size:13px;font-weight:600;color:#8b949e;text-transform:uppercase;padding:8px 0 4px;letter-spacing:0.5px}
#log-console{background:#0d1117;border:1px solid var(--border);border-radius:var(--radius);font-family:monospace;font-size:11px;padding:8px;height:calc(100vh - 160px);overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.log-line{padding:2px 0;display:flex;gap:8px}
.log-time{color:#484f58;min-width:44px}
.log-cat{min-width:56px;font-weight:600}
.log-cat-tap{color:var(--green)}
.log-cat-swipe{color:var(--purple)}
.log-cat-system{color:var(--yellow)}
.log-cat-error{color:var(--red)}
#hover-indicator{position:absolute;color:#fff;background:rgba(0,0,0,0.7);padding:2px 6px;border-radius:3px;font-size:10px;pointer-events:none;display:none}
.bar-chart{display:flex;align-items:flex-end;gap:2px;height:120px;padding:8px 0;border-bottom:1px solid var(--border);overflow-x:auto}
.bar{flex:1;min-width:18px;background:var(--red);border-radius:2px 2px 0 0;position:relative;cursor:pointer;min-height:2px}
.bar:hover{background:var(--yellow)}
.bar .tip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:3px 6px;border-radius:3px;font-size:10px;white-space:nowrap;display:none;z-index:10}
.bar:hover .tip{display:block}
.task-row{padding:8px;border:1px solid var(--border);border-radius:4px;margin-bottom:6px;cursor:pointer;transition:background 0.15s}
.task-row:hover{background:rgba(88,166,255,0.08)}
iframe.memrw-frame{width:100%;height:calc(100vh - 130px);border:none;border-radius:var(--radius)}
</style>
</head>
<body>
<div id="app">
<div id="sidebar">
  <div class="logo">🎮 Sandbox v2</div>
  <div class="nav-item active" data-tab="status">📊 状态总览</div>
  <div class="nav-item" data-tab="v5">🔧 v5 工具</div>
  <div class="nav-item" data-tab="keymap">🎯 按键映射</div>
  <div class="nav-item" data-tab="services">⚙️ 服务管理</div>
  <div class="nav-item" data-tab="memrw">🧠 memrw</div>
  <div class="nav-item" data-tab="logs">📋 事件日志</div>
  <div class="nav-item" data-tab="dumps">📦 dump 任务</div>
</div>
<div id="main">
  <div id="tab-header"><h2 id="tab-title">状态总览</h2><button class="btn btn-blue" onclick="refreshAll()">🔄 刷新</button></div>
  <div id="tab-content"></div>
</div>
</div>

<script>
let keymap = null;
let currentTab = 'status';
let kbListener = false;
let logPolling = 0;
let dumpPollTask = null;
const SCREEN_W = 1080;
const SCREEN_H = 2340;

async function api(path, opts={}) {
    try { const r = await fetch(path, opts); return await r.json(); }
    catch(e) { return {error: e.message}; }
}

// ══════════ 导航 ══════════
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    currentTab = el.dataset.tab;
    document.getElementById('tab-title').textContent = el.textContent.trim();
    if (dumpPollTask) { clearInterval(dumpPollTask); dumpPollTask = null; }
    loadTab(currentTab);
  });
});

async function loadTab(tab) {
  const c = document.getElementById('tab-content');
  switch(tab) {
    case 'status': c.innerHTML = await renderStatus(); break;
    case 'v5': c.innerHTML = renderV5Tab(); setTimeout(initV5, 50); break;
    case 'keymap': c.innerHTML = renderKeymapTab(); setTimeout(initKeymapEditor, 100); break;
    case 'services': c.innerHTML = renderServicesTab(); break;
    case 'memrw': c.innerHTML = '<iframe class="memrw-frame" src="/memrw/"></iframe>'; break;
    case 'logs': c.innerHTML = renderLogsTab(); startLogPoll(); break;
    case 'dumps': c.innerHTML = await renderDumpsTab(); break;
  }
}
async function refreshAll() { loadTab(currentTab); }

// ══════════ Tab: 状态总览 ══════════
async function renderStatus() {
  const s = await api('/api/status');
  if (s.error) return `<div class="card"><p style="color:var(--red)">API 错误: ${s.error}</p></div>`;
  const svc = s.services || {};
  const dv = s.android || {};
  const sc = s.screen || {};
  const zr = s.zram || {};
  const gm = s.game || {};
  const lu = s.libue4 || {};
  const qm = s.qemu || {};

  const svcCard = (label, data) => {
    const ok = data && data.ok;
    return `<div class="card"><h3><span class="dot ${ok?'dot-ok':'dot-fail'}"></span>${label}</h3>
      <p style="font-size:12px;color:#8b949e">${(data && data.msg)||'N/A'}</p>
      ${data && data.pcap_size ? `<p style="font-size:11px;color:var(--yellow)">PCAP: ${data.pcap_size}</p>` : ''}
      ${data && data.ui ? `<p style="font-size:11px;color:var(--blue)">UI: <a href="${data.ui}" target="_blank" style="color:var(--blue)">${data.ui}</a></p>` : ''}
      ${data && data.proxy ? `<p style="font-size:11px">代理: ${data.proxy}</p>` : ''}
    </div>`;
  };

  const fmtMB = v => v && v!=='0' ? (v/1024).toFixed(0)+'MB' : '--';
  const fmtSec = ss => ss>0 ? (ss>3600?(ss/3600).toFixed(1)+'h':(ss/60).toFixed(0)+'m') : '--';

  return `
  <div class="grid grid-4" style="margin-bottom:12px">
    <div class="card stat"><div class="val" style="color:var(--blue)">${dv.version||'--'}</div><div class="lbl">Android 版本</div></div>
    <div class="card stat"><div class="val" style="color:var(--green)">${dv.abi||'--'}</div><div class="lbl">架构 ABI</div></div>
    <div class="card stat"><div class="val" style="color:var(--yellow)">${fmtMB(dv.mem_avail)}</div><div class="lbl">可用内存</div></div>
    <div class="card stat"><div class="val" style="color:var(--purple);font-size:16px">${sc.size||'--'}</div><div class="lbl">分辨率</div></div>
  </div>

  <div class="grid grid-2">
    <div class="card"><h3>💾 zRAM / Swap</h3>
      <div class="kv"><span class="k">SwapTotal</span><span class="v">${zr.total||'0'} kB</span></div>
      <div class="kv"><span class="k">SwapFree</span><span class="v">${zr.free||'0'} kB</span></div>
      <div class="kv"><span class="k">swappiness</span><span class="v">${zr.swappiness||'N/A'}</span></div>
      <div class="kv"><span class="k">状态</span><span class="v" style="color:${zr.closed?'var(--green)':'var(--red)'}">${zr.closed?'✅ 已关闭':'⚠️ 未关闭'}</span></div>
      ${!zr.closed?'<button class="btn btn-red" style="margin-top:8px" onclick="quickAction(\'close_swap\')">关闭 Swap</button>':''}
    </div>
    <div class="card"><h3>🎮 游戏进程</h3>
      ${gm.running?`
        <div class="kv"><span class="k">PID</span><span class="v">${gm.pid}</span></div>
        <div class="kv"><span class="k">RSS</span><span class="v">${gm.rss?(gm.rss/1024).toFixed(0)+'MB':'--'}</span></div>
        <div class="kv"><span class="k">线程数</span><span class="v">${gm.threads||'--'}</span></div>
        <div class="kv"><span class="k">运行时间</span><span class="v">${fmtSec(gm.runtime)}</span></div>
      `:'<p style="font-size:12px;color:#8b949e">游戏未运行</p>'}
    </div>
    <div class="card"><h3>📚 libUE4.so</h3>
      ${lu.base?`
        <div class="kv"><span class="k">基址 VA</span><span class="v" style="color:var(--green)">0x${lu.base}</span></div>
        <div class="kv"><span class="k">文件大小</span><span class="v">${lu.size?(lu.size/1048576).toFixed(1)+'MB':'--'}</span></div>
      `:'<p style="font-size:12px;color:#8b949e">未找到</p>'}
    </div>
    <div class="card"><h3>🖥 qemu 进程</h3>
      ${qm.pid?`
        <div class="kv"><span class="k">PID</span><span class="v">${qm.pid}</span></div>
        <div class="kv"><span class="k">RSS</span><span class="v">${qm.rss?(qm.rss/1024).toFixed(0)+'MB':'--'}</span></div>
      `:'<p style="font-size:12px;color:#8b949e">qemu 未运行</p>'}
    </div>
  </div>

  <div class="grid grid-2" style="margin-top:12px">
    ${svcCard('📱 Android AVD', svc.avd)}
    ${svcCard('📡 tcpdump', svc.tcpdump)}
    ${svcCard('🔍 mitmproxy', svc.mitmproxy)}
    ${svcCard('💉 Frida', svc.frida)}
  </div>

  <div class="card"><h3>⚡ 快捷操作</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
      <button class="btn btn-green" onclick="quickAction('screenshot')">📸 截图</button>
      <button class="btn btn-blue" onclick="quickAction('dns')">🌐 设置 DNS</button>
      <button class="btn btn-gray" onclick="quickAction('cpu')">🔥 CPU perf</button>
      <button class="btn btn-gray" onclick="quickAction('screen_small')">🔍 720p</button>
      <button class="btn btn-gray" onclick="quickAction('screen_mid')">🔍 1080p</button>
      <button class="btn btn-gray" onclick="quickAction('screen_reset')">🔄 还原</button>
    </div>
  </div>`;
}
async function quickAction(act) {
  const r = await api('/api/quick/' + act);
  alert(r.ok || r.error || '已执行');
  refreshAll();
}

// ══════════ Tab: v5 工具 ══════════
function renderV5Tab() {
  return `
  <div class="card" id="v5-status-card"><h3>🔧 v5 状态</h3><p style="color:#8b949e">加载中...</p></div>

  <div class="card"><h3>💾 Dump 内存范围</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
      <span style="font-size:12px;color:#8b949e">VA:</span>
      <input id="dump-va" value="" size="20" placeholder="0x767f2ad000">
      <span style="font-size:12px;color:#8b949e">Size:</span>
      <input id="dump-size" value="104857600" size="14" placeholder="字节数">
      <span style="font-size:12px;color:#8b949e">输出:</span>
      <input id="dump-out" value="" size="36" placeholder="/tmp/dump.bin">
      <button class="btn btn-green" onclick="startDump()">▶ 启动 Dump</button>
    </div>
    <div id="dump-progress" style="display:none">
      <div class="pbar" style="margin:8px 0"><div class="pbar-fill" id="dump-pbar" style="width:0%"></div><div class="pbar-txt" id="dump-ptxt">0%</div></div>
      <div class="grid grid-4">
        <div class="stat"><div class="val" id="dump-ok" style="color:var(--green);font-size:16px">0</div><div class="lbl">ok 页</div></div>
        <div class="stat"><div class="val" id="dump-fail" style="color:var(--red);font-size:16px">0</div><div class="lbl">fail 页</div></div>
        <div class="stat"><div class="val" id="dump-total" style="color:var(--blue);font-size:16px">0</div><div class="lbl">总页数</div></div>
        <div class="stat"><div class="val" id="dump-elapsed" style="color:var(--yellow);font-size:16px">0s</div><div class="lbl">用时</div></div>
      </div>
      <div id="dump-result" style="margin-top:8px;font-size:12px"></div>
    </div>
  </div>

  <div class="grid grid-2">
    <div class="card"><h3>🔍 页表遍历 (walk-pte)</h3>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input id="pte-va" value="" size="20" placeholder="0x767f2ad000">
        <button class="btn btn-blue" onclick="walkPte()">遍历</button>
      </div>
      <pre class="out" id="pte-out">← 输入 VA 后点击遍历</pre>
    </div>
    <div class="card"><h3>📚 定位库 (find-lib)</h3>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input id="lib-name" value="libUE4.so" size="20">
        <button class="btn btn-blue" onclick="findLib()">定位</button>
      </div>
      <pre class="out" id="lib-out">← 点击定位 (耗时 2-3s)</pre>
    </div>
  </div>

  <div class="grid grid-2">
    <div class="card"><h3>🗺 扫描页表 (scan)</h3>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <span style="font-size:12px;color:#8b949e">limit:</span>
        <input id="scan-limit" type="number" value="20" size="6">
        <button class="btn btn-blue" onclick="scanPte()">扫描</button>
      </div>
      <pre class="out" id="scan-out">← 点击扫描</pre>
    </div>
    <div class="card"><h3>📖 读取物理地址 (read-pa)</h3>
      <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <input id="pa-addr" value="0x40000000" size="18" placeholder="PA">
        <input id="pa-size" type="number" value="16" size="6">
        <button class="btn btn-blue" onclick="readPa()">读取</button>
      </div>
      <pre class="out" id="pa-out">← 点击读取</pre>
    </div>
  </div>

  <div class="card"><h3>📊 Dump 结果可视化</h3>
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
      <span style="font-size:12px;color:#8b949e">Task ID:</span>
      <input id="viz-task" value="" size="22" placeholder="任务ID">
      <button class="btn btn-blue" onclick="showDumpViz()">显示</button>
    </div>
    <div id="viz-out"><p style="color:#8b949e;font-size:12px">输入已完成的 dump 任务 ID 查看失败分布</p></div>
  </div>`;
}

async function initV5() {
  const info = await api('/api/v5/info');
  const card = document.getElementById('v5-status-card');
  if (!card) return;
  card.innerHTML = `<h3>🔧 v5 状态</h3>
    <div class="kv"><span class="k">v5 二进制</span><span class="v" style="color:${info.v5_exists?'var(--green)':'var(--red)'}">${info.v5_exists?'✅ 存在':'❌ 不存在'}</span></div>
    <div class="kv"><span class="k">qemu PID</span><span class="v">${info.qemu_pid||'--'}</span></div>
    <div class="kv"><span class="k">游戏 PID</span><span class="v">${info.game_pid||'--'}</span></div>
    <div class="kv"><span class="k">libUE4 base VA</span><span class="v" style="color:var(--green)">${info.libue4_base?'0x'+info.libue4_base:'--'}</span></div>`;
  if (info.libue4_base) {
    const va = document.getElementById('dump-va'); if (va && !va.value) va.value = '0x' + info.libue4_base;
    const pte = document.getElementById('pte-va'); if (pte && !pte.value) pte.value = '0x' + info.libue4_base;
  }
  const out = document.getElementById('dump-out');
  if (out && !out.value) out.value = `/tmp/dump_${Date.now()}.bin`;
}

async function startDump() {
  const va = document.getElementById('dump-va').value.trim();
  const size = document.getElementById('dump-size').value.trim();
  const output = document.getElementById('dump-out').value.trim();
  if (!va || !size || !output) { alert('请填写 VA, Size, 输出路径'); return; }
  const r = await api('/api/v5/dump', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({va,size,output})});
  if (r.error) { alert(r.error); return; }
  document.getElementById('dump-progress').style.display = 'block';
  pollDump(r.task_id);
}

function pollDump(taskId) {
  if (dumpPollTask) clearInterval(dumpPollTask);
  dumpPollTask = setInterval(async () => {
    const t = await api('/api/v5/dump/' + taskId);
    if (t.error) { clearInterval(dumpPollTask); dumpPollTask = null; return; }
    const pct = t.percent || 0;
    document.getElementById('dump-pbar').style.width = pct + '%';
    document.getElementById('dump-ptxt').textContent = pct.toFixed(1) + '%';
    document.getElementById('dump-ok').textContent = t.ok || 0;
    document.getElementById('dump-fail').textContent = t.fail || 0;
    document.getElementById('dump-total').textContent = t.total || 0;
    document.getElementById('dump-elapsed').textContent = (t.elapsed||0).toFixed(1) + 's';
    if (t.status !== 'running') {
      clearInterval(dumpPollTask); dumpPollTask = null;
      const res = document.getElementById('dump-result');
      const rate = t.total > 0 ? ((t.ok/t.total)*100).toFixed(1) : '0';
      res.innerHTML = `<span class="badge badge-${t.status==='done'?'done':'failed'}">${t.status}</span>
        成功率 ${rate}% | 输出: <span style="color:var(--blue)">${t.output||'--'}</span>
        ${t.failed_file?` | 失败列表: <span style="color:var(--red)">${t.failed_file}</span>`:''}

    html += '<p style="font-size:12px;color:#8b949e;margin-bottom:4px">按 10MB 段统计失败页数 (红=失败, 悬停查看详情):</p>';

  }

}

function initKeymapEditor() {
  const cvs = document.getElementById('screen-canvas');
  if (!cvs) return;
  const ctx = cvs.getContext('2d');
  drawScreen(ctx);

  cvs.onclick = async (e) => {
    const rect = cvs.getBoundingClientRect();
    const sx = SCREEN_W / rect.width;
    const sy = SCREEN_H / rect.height;
    const x = Math.round((e.clientX - rect.left) * sx);
    const y = Math.round((e.clientY - rect.top) * sy);
    const key = prompt(`设置位置 (${x},${y}) 的按键:\n(输入单个按键如 w/a/s/d/space/q/e/r 等，留空=取消)`);
    if (!key || !key.trim()) return;
    const action = prompt(`按键 [${key.trim()}] 的操作:\ntap = 点击\nswipe_up/down/left/right = 方向滑动`, 'tap');
    let actObj = {type: 'tap', x: x, y: y};
    if (action && action.startsWith('swipe')) {
      const dist = 300; let x2 = x, y2 = y;
      if (action === 'swipe_up') y2 = y - dist;
      else if (action === 'swipe_down') y2 = y + dist;
      else if (action === 'swipe_left') x2 = x - dist;
      else if (action === 'swipe_right') x2 = x + dist;
      actObj = {type: 'swipe', x1: x, y1: y, x2: x2, y2: y2, dur: 100};
    }
    if (!keymap) keymap = {keys:{}};
    keymap.keys[key.trim()] = actObj;
    drawScreen(ctx);
    renderKeyList();
  };

  cvs.onmousemove = (e) => {
    const rect = cvs.getBoundingClientRect();
    const sx = SCREEN_W / rect.width;
    const sy = SCREEN_H / rect.height;
    const x = Math.round((e.clientX - rect.left) * sx);
    const y = Math.round((e.clientY - rect.top) * sy);
    const hi = document.getElementById('hover-indicator');
    const cvsRect = cvs.getBoundingClientRect();
    hi.style.display = 'block';
    hi.style.left = (e.clientX - cvsRect.left + 14) + 'px';
    hi.style.top = (e.clientY - cvsRect.top - 20) + 'px';
    hi.textContent = `${x},${y}`;
  };
  cvs.onmouseleave = () => { document.getElementById('hover-indicator').style.display = 'none'; };
  loadPreset('battle');
}

function drawScreen(ctx) {
  if (!ctx) { const cvs = document.getElementById('screen-canvas'); if (!cvs) return; ctx = cvs.getContext('2d'); }
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
  ctx.strokeStyle = 'rgba(48,54,61,0.3)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < SCREEN_W; x += 80) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,SCREEN_H); ctx.stroke(); }
  for (let y = 0; y < SCREEN_H; y += 80) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(SCREEN_W,y); ctx.stroke(); }
  ctx.strokeStyle = 'rgba(88,166,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(SCREEN_W/2, 0); ctx.lineTo(SCREEN_W/2, SCREEN_H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, SCREEN_H/2); ctx.lineTo(SCREEN_W, SCREEN_H/2); ctx.stroke();
  if (keymap && keymap.keys) {
    const colors = {'tap':'#3fb950', 'swipe':'#58a6ff'};
    Object.entries(keymap.keys).forEach(([key, act]) => {
      ctx.fillStyle = colors[act.type] || '#58a6ff';
      ctx.strokeStyle = colors[act.type] || '#58a6ff';
      ctx.lineWidth = 2;
      if (act.type === 'tap') {
        ctx.beginPath(); ctx.arc(act.x, act.y, 14, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(act.x, act.y, 4, 0, Math.PI*2); ctx.fill();
      } else if (act.type === 'swipe') {
        ctx.beginPath(); ctx.arc(act.x1, act.y1, 6, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(act.x1, act.y1); ctx.lineTo(act.x2, act.y2); ctx.stroke();
        ctx.beginPath(); ctx.arc(act.x2, act.y2, 6, 0, Math.PI*2); ctx.stroke();
      }
      const lx = (act.type === 'tap') ? act.x : (act.x1 + act.x2) / 2;
      const ly = (act.type === 'tap') ? act.y : (act.y1 + act.y2) / 2;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(key, lx, ly - 20);
    });
  }
}

function renderKeyList() {
  const container = document.getElementById('keymap-items');
  if (!container || !keymap || !keymap.keys) return;
  const keys = Object.entries(keymap.keys);
  container.innerHTML = keys.map(([key, act]) => {
    const pos = act.type === 'tap' ? `${act.x},${act.y}` : `${act.x1},${act.y1}→${act.x2},${act.y2}`;
    const st = act.type === 'swipe' ? `滑动 ${act.dur}ms` : '点击';
    return `<div class="key-row">
      <span class="k">${key}</span>
      <span style="color:var(--${act.type==='tap'?'green':'blue'})">${st}</span>
      <span class="info">${pos}</span>
      <span class="del" onclick="deleteKey('${key}')" title="删除">✕</span>
    </div>`;
  }).join('');
}

function deleteKey(key) {
  if (!keymap || !keymap.keys) return;
  delete keymap.keys[key];
  const ctx = document.getElementById('screen-canvas') && document.getElementById('screen-canvas').getContext('2d');
  if (ctx) drawScreen(ctx);
  renderKeyList();
}

function toggleKbListener() {

  const tasks = r.tasks || [];
  if (tasks.length === 0) return '<div class="card"><p style="color:#8b949e">暂无 dump 任务。到 v5 工具 Tab 启动一个 dump。</p></div>';
  tasks.sort((a,b) => (b.start_time||0) - (a.start_time||0));
  const running = tasks.filter(t => t.status === 'running');
  const done = tasks.filter(t => t.status !== 'running');
  let html = '';
  if (running.length) {
    html += '<div class="section-title">运行中</div>';
    html += running.map(t => dumpTaskRow(t)).join('');

  el.innerHTML = html;
}

// ══════════ 键盘监听 ══════════
document.addEventListener('keydown', async (e) => {
  if (!kbListener) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  let key = e.key.toLowerCase();
  if (e.key === ' ') key = 'space';
  if (e.key === 'Tab') { key = 'tab'; e.preventDefault(); }
  try {
    await api('/api/sendkey/' + key);
    const st = document.getElementById('status-text');
    if (st) st.textContent = `✅ ${key}`;
    setTimeout(() => { const s = document.getElementById('status-text'); if (s) s.textContent = '点击屏幕设置按键位置'; }, 800);
  } catch(err) {}
});

// ══════════ 初始化 ══════════
loadTab('status');
</script>
</body>
</html>
