<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f0c29">
<meta name="description" content="智能刷题平台 - 随时随地高效备考">
<title>刷题练习</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
/* ===== Design Tokens (Midnight Galaxy + Anthropic Brand) ===== */
:root {
  /* Primary - Deep Galaxy */
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --primary-light: #eef2ff;
  --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --accent-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  --success-gradient: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);

  /* Semantic Colors */
  --success: #10b981;
  --success-light: #ecfdf5;
  --success-dark: #059669;
  --danger: #ef4444;
  --danger-light: #fef2f2;
  --danger-dark: #dc2626;
  --warning: #f59e0b;
  --warning-light: #fffbeb;

  /* Surface - Anthropic Warm Tones */
  --bg: #faf9f5;
  --bg-gradient: linear-gradient(180deg, #f5f3ee 0%, #faf9f5 100%);
  --surface: #ffffff;
  --surface-elevated: #fffdf8;
  --text: #1a1a2e;
  --text-secondary: #6b7280;
  --text-light: #9ca3af;
  --border: #e5e7eb;
  --border-light: #f3f4f6;

  /* Shadows - Layered Depth */
  --shadow-xs: 0 1px 2px rgba(15,12,41,.04);
  --shadow-sm: 0 2px 8px rgba(15,12,41,.06), 0 1px 2px rgba(15,12,41,.04);
  --shadow-md: 0 4px 16px rgba(15,12,41,.08), 0 2px 4px rgba(15,12,41,.04);
  --shadow-lg: 0 12px 32px rgba(15,12,41,.12), 0 4px 8px rgba(15,12,41,.06);
  --shadow-primary: 0 4px 16px rgba(102,126,234,.3);
  --shadow-glow: 0 0 24px rgba(102,126,234,.15);

  /* Radii */
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;

  /* Motion */
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-spring: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);

  /* Typography */
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  --font-mono: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-gradient);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  text-rendering: optimizeLegibility;
}

/* ===== Accessibility: Focus States ===== */
*:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
  border-radius: var(--radius-xs);
}

button {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* ===== Reduced Motion ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ===== Animations ===== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,.3); }
  50% { box-shadow: 0 0 0 8px rgba(99,102,241,0); }
}

/* ===== Skip Link ===== */
.skip-link {
  position: absolute;
  top: -40px;
  left: 8px;
  background: var(--primary);
  color: #fff;
  padding: 8px 16px;
  border-radius: var(--radius-xs);
  font-size: 14px;
  font-weight: 600;
  z-index: 999;
  transition: top var(--transition);
}
.skip-link:focus { top: 8px; }

/* ===== Header ===== */
.header {
  background: var(--primary-gradient);
  color: #fff;
  padding: 10px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(102,126,234,.25);
  padding-top: max(10px, env(safe-area-inset-top));
}
.header h1 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.header .subtitle {
  font-size: 10px;
  opacity: 0.85;
  margin-top: 2px;
  font-weight: 400;
  font-variant-numeric: tabular-nums;
}

/* ===== Pages ===== */
.page {
  display: none;
  padding: 10px 12px;
  padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px));
  animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.page.active { display: block; }

/* ===== Home Hero ===== */
.hero {
  background: var(--primary-gradient);
  border-radius: var(--radius);
  padding: 20px 16px;
  color: #fff;
  margin-bottom: 10px;
  box-shadow: var(--shadow-primary);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -30px;
  right: -30px;
  width: 120px;
  height: 120px;
  background: rgba(255,255,255,.1);
  border-radius: 50%;
}
.hero::after {
  content: '';
  position: absolute;
  bottom: -20px;
  left: -20px;
  width: 80px;
  height: 80px;
  background: rgba(255,255,255,.08);
  border-radius: 50%;
}
.hero-title {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 4px;
  position: relative;
  z-index: 1;
  text-wrap: balance;
}
.hero-desc {
  font-size: 12px;
  opacity: 0.9;
  position: relative;
  z-index: 1;
}

/* ===== Stats Cards ===== */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: 10px;
}
.stat-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 10px 6px;
  text-align: center;
  box-shadow: var(--shadow-xs);
  border: 1px solid var(--border-light);
  transition: transform var(--transition), box-shadow var(--transition);
}
.stat-card:active { transform: scale(0.97); }
.stat-card .stat-num {
  font-size: 20px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1.2;
  font-variant-numeric: tabular-nums;
}
.stat-card .stat-label {
  font-size: 10px;
  color: var(--text-secondary);
  margin-top: 2px;
  font-weight: 500;
}
.stat-card.danger .stat-num { color: var(--danger); }
.stat-card.warning .stat-num { color: var(--warning); }

/* ===== Menu Grid ===== */
.section-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-title::before {
  content: '';
  width: 4px;
  height: 14px;
  background: var(--primary-gradient);
  border-radius: 2px;
}

.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.menu-btn {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 16px 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  box-shadow: var(--shadow-xs);
  cursor: pointer;
  text-align: center;
  transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
  position: relative;
  overflow: hidden;
}
.menu-btn:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-sm);
}
.menu-btn:active {
  transform: scale(0.96);
  box-shadow: var(--shadow-sm);
}
.menu-btn .icon-wrap {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 6px;
  font-size: 20px;
  transition: transform var(--transition-spring);
}
.menu-btn:active .icon-wrap { transform: scale(1.15) rotate(-5deg); }
.menu-btn .icon-wrap.bg1 { background: linear-gradient(135deg, #eef2ff, #e0e7ff); color: var(--primary); }
.menu-btn .icon-wrap.bg2 { background: linear-gradient(135deg, #fef3c7, #fde68a); color: var(--warning); }
.menu-btn .icon-wrap.bg3 { background: linear-gradient(135deg, #ecfdf5, #d1fae5); color: var(--success); }
.menu-btn .icon-wrap.bg4 { background: linear-gradient(135deg, #fef2f2, #fecaca); color: var(--danger); }
.menu-btn .icon-wrap.bg5 { background: linear-gradient(135deg, #f5f3ff, #ddd6fe); color: #8b5cf6; }
.menu-btn .icon-wrap.bg6 { background: linear-gradient(135deg, #f0f9ff, #bae6fd); color: #0284c7; }
.menu-btn .label { display: block; font-size: 14px; }
.menu-btn .desc { display: block; font-size: 11px; color: var(--text-secondary); margin-top: 3px; font-weight: 400; }

/* ===== Card ===== */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 8px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
}

/* ===== Question Type Badge ===== */
.qtype {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--primary-gradient);
  color: #fff;
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 10px;
  font-weight: 600;
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}
.qtype.judge { background: linear-gradient(135deg, #f59e0b, #f97316); }
.qtype.multi { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }

/* ===== Question Text ===== */
.qtext {
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 10px;
  color: var(--text);
  font-weight: 500;
  word-break: break-word;
  text-wrap: pretty;
}

/* ===== Options ===== */
.options label {
  display: flex;
  align-items: flex-start;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-bottom: 6px;
  font-size: 13px;
  line-height: 1.45;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
  position: relative;
  gap: 8px;
  min-height: 44px;
}
.options label:hover {
  border-color: var(--primary);
  background: var(--primary-light);
}
.options label.selected {
  border-color: var(--primary);
  background: var(--primary-light);
  font-weight: 600;
  color: var(--primary-dark);
  box-shadow: 0 2px 8px rgba(99,102,241,.15);
}
.options label.correct {
  border-color: var(--success);
  background: var(--success-light);
  color: var(--success-dark);
  font-weight: 600;
}
.options label.wrong {
  border-color: var(--danger);
  background: var(--danger-light);
  color: var(--danger-dark);
}
.options label .opt-letter {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 6px;
  background: var(--border-light);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  transition: background var(--transition), color var(--transition);
}
.options label.selected .opt-letter { background: var(--primary); color: #fff; }
.options label.correct .opt-letter { background: var(--success); color: #fff; }
.options label.wrong .opt-letter { background: var(--danger); color: #fff; }
.options label .opt-text { flex: 1; min-width: 0; }

/* ===== Judge Buttons ===== */
.judge-btns {
  display: flex;
  gap: 10px;
  margin-bottom: 8px;
}
.judge-btns button {
  flex: 1;
  padding: 12px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 44px;
}
.judge-btns button:hover { border-color: var(--primary); }
.judge-btns button.selected {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary-dark);
  box-shadow: 0 2px 8px rgba(99,102,241,.15);
}
.judge-btns button.correct {
  border-color: var(--success);
  background: var(--success-light);
  color: var(--success-dark);
}

/* ===== Answer Feedback ===== */
.answer-feedback {
  margin-top: 8px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  line-height: 1.5;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.answer-feedback.correct {
  background: var(--success-light);
  color: var(--success-dark);
  border: 1px solid #d1fae5;
}
.answer-feedback.incorrect {
  background: var(--danger-light);
  color: var(--danger-dark);
  border: 1px solid #fecaca;
}
.answer-feedback .detail {
  font-weight: 400;
  font-size: 13px;
  margin-top: 4px;
  opacity: 0.85;
}

/* ===== Answer Explanation ===== */
.answer-explain {
  margin-top: 8px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
  border: 1px solid #bae6fd;
  font-size: 12px;
  line-height: 1.6;
}
.answer-explain .explain-header {
  font-size: 13px;
  font-weight: 700;
  color: #0284c7;
  margin-bottom: 4px;
}
.answer-explain .explain-answer {
  font-size: 12px;
  color: var(--text);
  margin-bottom: 4px;
}
.answer-explain .explain-key {
  font-weight: 700;
  color: var(--success-dark);
  font-size: 14px;
}
.answer-explain .explain-detail {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ===== Progress Bar ===== */
.progress-bar {
  height: 5px;
  background: var(--border-light);
  border-radius: 3px;
  margin: 6px 0;
  overflow: hidden;
}
.progress-bar .fill {
  height: 100%;
  background: var(--primary-gradient);
  border-radius: 3px;
  transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ===== Score Circle ===== */
.score-circle {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 20px auto;
  font-size: 36px;
  font-weight: 800;
  position: relative;
  font-variant-numeric: tabular-nums;
  animation: scaleIn 0.4s var(--transition-spring);
}
.score-circle.pass {
  background: var(--success-light);
  color: var(--success-dark);
  border: 3px solid var(--success);
  box-shadow: 0 0 24px rgba(16,185,129,.2);
}
.score-circle.fail {
  background: var(--danger-light);
  color: var(--danger-dark);
  border: 3px solid var(--danger);
}
.score-circle small {
  font-size: 14px;
  font-weight: 400;
  opacity: 0.7;
}

/* ===== Buttons ===== */
.btn-primary {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--primary-gradient);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
  letter-spacing: 0.5px;
  box-shadow: var(--shadow-primary);
  min-height: 44px;
}
.btn-primary:hover { box-shadow: 0 6px 20px rgba(99,102,241,.35); }
.btn-primary:active {
  transform: scale(0.97);
  box-shadow: 0 2px 8px rgba(99,102,241,.2);
}
.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  box-shadow: none;
}

.btn-secondary {
  flex: 1;
  padding: 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition), opacity var(--transition);
  color: var(--text);
  min-height: 44px;
}
.btn-secondary:hover { border-color: var(--primary); }
.btn-secondary:active { background: var(--bg); transform: scale(0.97); }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-next {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--primary-gradient);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
  box-shadow: var(--shadow-primary);
  min-height: 44px;
}
.btn-next:hover { box-shadow: 0 6px 20px rgba(99,102,241,.35); }
.btn-next:active { transform: scale(0.97); }
.btn-next:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

.btn-outline {
  padding: 10px 24px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-size: 14px;
  cursor: pointer;
  color: var(--text);
  transition: transform var(--transition), border-color var(--transition);
  min-height: 44px;
}
.btn-outline:active { transform: scale(0.97); }

.btn-danger {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition);
  box-shadow: 0 4px 16px rgba(239,68,68,.25);
  min-height: 44px;
}
.btn-danger:hover { box-shadow: 0 6px 20px rgba(239,68,68,.35); }
.btn-danger:active { transform: scale(0.97); }

/* ===== Bottom Nav ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border-light);
  display: flex;
  z-index: 100;
  box-shadow: 0 -2px 20px rgba(0,0,0,.06);
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.bottom-nav button {
  flex: 1;
  border: none;
  background: none;
  padding: 6px 0 8px;
  font-size: 10px;
  color: var(--text-light);
  cursor: pointer;
  transition: color var(--transition);
  font-weight: 500;
  min-height: 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.bottom-nav button:hover { color: var(--text-secondary); }
.bottom-nav button.active {
  color: var(--primary);
  font-weight: 700;
}
.bottom-nav button .nav-icon {
  font-size: 20px;
  display: block;
  margin-bottom: 2px;
  transition: transform var(--transition-spring);
}
.bottom-nav button.active .nav-icon {
  transform: translateY(-2px) scale(1.1);
}

/* ===== Top Bar ===== */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  background: var(--surface);
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-xs);
}
.top-bar .back-btn {
  border: none;
  background: none;
  color: var(--primary);
  font-size: 13px;
  cursor: pointer;
  font-weight: 600;
  padding: 4px 8px;
  display: flex;
  align-items: center;
  gap: 4px;
  min-height: 36px;
}
.top-bar .info {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

/* ===== Timer ===== */
.timer {
  font-size: 14px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  background: var(--primary-light);
  padding: 3px 8px;
  border-radius: var(--radius-xs);
  color: var(--primary-dark);
}

/* ===== Wrong List ===== */
.wrong-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--border-light);
}
.wrong-item:last-child { border-bottom: none; }
.wrong-item .qid {
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  display: inline-block;
  background: var(--primary-light);
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 6px;
}
.wrong-item .qtxt {
  font-size: 13px;
  margin: 4px 0;
  line-height: 1.6;
  color: var(--text);
}
.wrong-item .qans {
  font-size: 12px;
  color: var(--success-dark);
  font-weight: 600;
  margin-top: 4px;
}

/* ===== Empty State ===== */
.empty-state {
  text-align: center;
  padding: 50px 20px;
  color: var(--text-secondary);
}
.empty-state .empty-icon {
  font-size: 60px;
  margin-bottom: 16px;
  display: block;
}
.empty-state p {
  font-size: 15px;
  margin-bottom: 20px;
  font-weight: 500;
}

/* ===== File Input ===== */
.file-input-wrap { margin-bottom: 12px; }
.file-input-wrap input[type="file"] {
  width: 100%;
  padding: 14px;
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: pointer;
  background: var(--bg);
  transition: border-color var(--transition), background var(--transition);
}
.file-input-wrap input[type="file"]:hover {
  border-color: var(--primary);
  background: var(--primary-light);
}

/* ===== Result Section ===== */
.result-section {
  text-align: center;
  padding: 10px 0;
}
.result-section .grade {
  font-size: 18px;
  font-weight: 800;
  margin-top: 6px;
}
.result-section .stats {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 10px;
  line-height: 1.8;
  font-variant-numeric: tabular-nums;
}
.result-section .stats span {
  display: inline-block;
  margin: 0 6px;
}

/* ===== Nav Row ===== */
.nav-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

/* ===== Answer Card ===== */
.answer-card-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.4);
  z-index: 200;
  backdrop-filter: blur(4px);
  overscroll-behavior: contain;
}
.answer-card-overlay.show { display: block; }
.answer-card {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 20px;
  padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
  max-height: 70vh;
  overflow-y: auto;
  overscroll-behavior: contain;
  z-index: 201;
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.answer-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-light);
}
.answer-card-header h3 { font-size: 16px; font-weight: 700; }
.answer-card-close {
  border: none;
  background: var(--bg);
  width: 32px; height: 32px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
}
.answer-card-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
}
.answer-card-item {
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: 2px solid var(--border);
  background: var(--bg);
  color: var(--text-secondary);
  transition: transform var(--transition), border-color var(--transition);
  font-variant-numeric: tabular-nums;
}
.answer-card-item.answered {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.answer-card-item.current {
  border-color: var(--warning);
  border-width: 3px;
}
.answer-card-item:active { transform: scale(0.92); }

/* ===== Modal ===== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
  overscroll-behavior: contain;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px 20px;
  max-width: 320px;
  width: 100%;
  text-align: center;
  animation: scaleIn 0.3s var(--transition-spring);
}
.modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
.modal p { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.6; }
.modal-btns { display: flex; gap: 10px; }
.modal-btns button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: transform var(--transition), background var(--transition);
  min-height: 44px;
}
.modal-btns button:active { transform: scale(0.97); }
.modal-btns .btn-cancel {
  background: var(--bg);
  color: var(--text-secondary);
}
.modal-btns .btn-confirm {
  background: var(--primary-gradient);
  color: #fff;
  box-shadow: var(--shadow-primary);
}

/* ===== Debug ===== */
#debug { display: none; }

/* ===== Responsive ===== */
@media (max-width: 360px) {
  .menu-grid { gap: 8px; }
  .menu-btn { padding: 14px 8px; }
  .menu-btn .icon-wrap { width: 36px; height: 36px; font-size: 18px; }
  .answer-card-grid { grid-template-columns: repeat(5, 1fr); }
  .qtext { font-size: 14px; line-height: 1.55; }
  .options label { padding: 9px 10px; font-size: 12px; }
  .judge-btns button { padding: 10px; font-size: 14px; }
}

@media (max-width: 320px) {
  .header { padding: 8px 12px; }
  .header h1 { font-size: 15px; }
  .page { padding: 8px 10px; padding-bottom: 68px; }
  .card { padding: 12px; }
  .options label { padding: 8px 10px; margin-bottom: 5px; }
  .qtext { font-size: 13px; margin-bottom: 8px; }
  .top-bar { padding: 6px 10px; }
  .btn-secondary, .btn-next { padding: 9px; font-size: 12px; }
}
</style>
</head>

<script>
(function(){
"use strict";
var Q;
var wrongRecords = {};
var currentQuestions = [];
var currentIndex = 0;
var userAnswers = {};
var tempAnswer = '';
var examTimer = null;
var examStartTime = 0;
var examEnded = false;
var examMode = false;

// 加载题库
try {
  var b64 = document.getElementById('questionsData').textContent.trim();
  var bin = atob(b64);
  var u8 = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  Q = JSON.parse(new TextDecoder('utf-8').decode(u8));
} catch(e) {
  document.getElementById('debug').style.display = 'block';
  document.getElementById('debug').textContent = '数据加载失败: ' + e.message;
  return;
}

if (!Q || !Q.length) {
  document.getElementById('debug').style.display = 'block';
  document.getElementById('debug').textContent = '题库为空';
  return;
}

// 加载错题记录
try {
  wrongRecords = JSON.parse(localStorage.getItem('quizWrongRecords') || '{}');
} catch(e) { wrongRecords = {}; }

function saveWrong() {
  try { localStorage.setItem('quizWrongRecords', JSON.stringify(wrongRecords)); } catch(e) {}
}

function recordWrong(id, userAnswer, correctAnswer) {
  var key = '' + id;
  if (!wrongRecords[key]) wrongRecords[key] = { count: 0, time: '', answer: '' };
  wrongRecords[key].count++;
  wrongRecords[key].time = new Date().toISOString();
  wrongRecords[key].answer = userAnswer || '';
  saveWrong();
}

function removeWrong(id) {
  delete wrongRecords['' + id];
  saveWrong();
}

function isCorrect(q, answer) {
  if (!answer || !q.answer) return false;
  if (q.type === '多项选择题') {
    return answer.split('').sort().join('').toUpperCase() === q.answer.split('').sort().join('').toUpperCase();
  }
  return answer.toUpperCase() === q.answer.toUpperCase();
}

function formatAnswer(q, answer) {
  if (q.type === '判断题') {
    return answer === 'A' ? '对' : answer === 'B' ? '错' : (answer || '');
  }
  return answer || '';
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function getValidQuestions() {
  return Q.filter(function(q) { return q.answer; });
}

// 页面切换
function showPage(id, navKey) {
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  var nav = document.getElementById('bottomNav');
  nav.style.display = (id === 'pageResult') ? 'none' : 'flex';
  var btns = nav.querySelectorAll('button');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  if (navKey) {
    var activeBtn = nav.querySelector('[data-nav="' + navKey + '"]');
    if (activeBtn) activeBtn.classList.add('active');
  }
  window.scrollTo(0, 0);
}

function goHome() {
  examMode = false;
  if (examTimer) { clearInterval(examTimer); examTimer = null; }
  showPage('pageHome', 'home');
  updateStats();
}

function cleanupExam() {
  if (examTimer) { clearInterval(examTimer); examTimer = null; }
}

function safeNavigate(fn) {
  if (examMode && !examEnded) {
    showModal('退出考试', '确定要退出考试吗？退出后考试进度将丢失。', function() {
      examMode = false;
      cleanupExam();
      fn();
    });
  } else {
    fn();
  }
}

function typeLabel(t) {
  if (t === '单项选择题') return '单选题';
  if (t === '多项选择题') return '多选题';
  if (t === '判断题') return '判断题';
  return t;
}

function typeClass(t) {
  if (t === '判断题') return 'judge';
  if (t === '多项选择题') return 'multi';
  return '';
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 渲染题目
function renderQuestion(q, index, total, options) {
  var o = options || {};
  var h = '<div class="qtype ' + typeClass(q.type) + '">' + typeLabel(q.type) + '</div>';
  h += '<div class="qtext">' + (index + 1) + '. ' + esc(q.text || ('题目' + q.id)) + '</div>';

  if (q.type === '判断题') {
    h += '<div class="judge-btns">';
    h += '<button class="' + (o.selected === 'A' ? 'selected ' : '') + ((o.showAnswer || o.studyMode) && q.answer === 'A' ? 'correct' : '') + '" data-v="A" aria-label="选择对">✓ 对</button>';
    h += '<button class="' + (o.selected === 'B' ? 'selected ' : '') + ((o.showAnswer || o.studyMode) && q.answer === 'B' ? 'correct' : '') + '" data-v="B" aria-label="选择错">✗ 错</button>';
    h += '</div>';
  } else {
    h += '<div class="options" role="group">';
    for (var k = 0; k < 4; k++) {
      var l = 'ABCD'[k], ot = q.options ? q.options[l] : '';
      if (ot) {
        var cls = '';
        if (q.type === '多项选择题') {
          if (o.selected && o.selected.indexOf(l) >= 0) cls += 'selected ';
          if ((o.showAnswer || o.studyMode) && q.answer.indexOf(l) >= 0) cls += 'correct ';
          if (o.showAnswer && o.selected && o.selected.indexOf(l) >= 0 && q.answer.indexOf(l) < 0) cls += 'wrong';
        } else {
          if (o.selected === l) cls += 'selected ';
          if ((o.showAnswer || o.studyMode) && l === q.answer) cls += 'correct ';
          if (o.showAnswer && o.selected === l && l !== q.answer) cls += 'wrong';
        }
        h += '<label class="' + cls + '" data-v="' + l + '"><span class="opt-letter">' + l + '</span><span class="opt-text">' + esc(ot) + '</span></label>';
      }
    }
    h += '</div>';
  }

  if (o.studyMode) {
    h += '<div class="answer-explain">';
    h += '<div class="explain-header">📖 本题解析</div>';
    h += '<div class="explain-answer">正确答案：<span class="explain-key">' + formatAnswer(q, q.answer) + '</span></div>';
    if (q.explanation) {
      h += '<div class="explain-detail">' + esc(q.explanation) + '</div>';
    } else {
      var explainText = '';
      if (q.type === '判断题') {
        explainText = '本题考查' + (q.chapter || '相关') + '知识点，判断关键在于掌握基本概念的准确性。';
      } else if (q.type === '多项选择题') {
        explainText = '本题考查' + (q.chapter || '相关') + '知识点，多项选择题需注意所有符合题意的选项，避免漏选。';
      } else {
        explainText = '本题考查' + (q.chapter || '相关') + '知识点，请结合相关法规条文理解记忆。';
      }
      h += '<div class="explain-detail">' + esc(explainText) + '</div>';
    }
    h += '</div>';
  } else if (o.showAnswer) {
    var correct = isCorrect(q, o.selected);
    if (correct) {
      h += '<div class="answer-feedback correct">✓ 回答正确!</div>';
    } else {
      h += '<div class="answer-feedback incorrect">✗ 回答错误! 你的答案: ' + formatAnswer(q, o.selected || '未答');
      h += '<div class="detail">正确答案: ' + formatAnswer(q, q.answer) + '</div>';
      h += '</div>';
    }
  }
  return h;
}

function bindOptions(fn) {
  var labels = document.querySelectorAll('.options label');
  for (var i = 0; i < labels.length; i++) {
    (function(el) { el.onclick = function() { fn(el.getAttribute('data-v')); }; })(labels[i]);
  }
  var btns = document.querySelectorAll('.judge-btns button');
  for (var i = 0; i < btns.length; i++) {
    (function(el) { el.onclick = function() { fn(el.getAttribute('data-v')); }; })(btns[i]);
  }
}

// 更新统计
function updateStats() {
  var wCount = Object.keys(wrongRecords).length;
  var hCount = 0;
  var vals = Object.values(wrongRecords);
  for (var i = 0; i < vals.length; i++) {
    if (vals[i].count >= 2) hCount++;
  }
  var single = 0, multi = 0, judge = 0;
  for (var i = 0; i < Q.length; i++) {
    if (Q[i].type === '单项选择题') single++;
    else if (Q[i].type === '多项选择题') multi++;
    else if (Q[i].type === '判断题') judge++;
  }
  document.getElementById('statTotal').textContent = Q.length;
  document.getElementById('statWrong').textContent = wCount;
  document.getElementById('statHigh').textContent = hCount;
  document.getElementById('headerStats').textContent = '题库' + Q.length + '题 | 单选' + single + ' 多选' + multi + ' 判断' + judge;
}

// ====== 刷题练习 ======
function startPractice() {
  examMode = false;
  cleanupExam();
  currentQuestions = shuffle(getValidQuestions()).slice(0, Math.min(50, getValidQuestions().length));
  if (!currentQuestions.length) return;
  currentIndex = 0;
  userAnswers = {};
  tempAnswer = '';
  showPage('pagePractice', 'practice');
  renderPractice();
}

function renderPractice() {
  var q = currentQuestions[currentIndex];
  var n = currentQuestions.length;
  var submitted = (currentIndex in userAnswers);
  var selected = submitted ? userAnswers[currentIndex] : tempAnswer;
  var el = document.getElementById('pagePractice');

  var correctCount = 0, answeredCount = 0;
  for (var k in userAnswers) {
    if (userAnswers.hasOwnProperty(k)) {
      answeredCount++;
      try { if (isCorrect(currentQuestions[parseInt(k)], userAnswers[k])) correctCount++; } catch(e) {}
    }
  }

  var h = '<div class="top-bar">';
  h += '<button class="back-btn" onclick="goHome()" aria-label="返回首页">← 返回</button>';
  h += '<span class="info">第' + (currentIndex + 1) + '/' + n + '题 | 正确' + correctCount + '/' + answeredCount + '</span>';
  h += '</div>';
  h += '<div class="progress-bar"><div class="fill" style="width:' + ((currentIndex + 1) / n * 100) + '%"></div></div>';
  h += '<div class="card">' + renderQuestion(q, currentIndex, n, { selected: selected, showAnswer: submitted }) + '</div>';
  h += '<div class="nav-row">';
  h += '<button onclick="practicePrev()" class="btn-secondary" ' + (currentIndex === 0 ? 'disabled' : '') + ' aria-label="上一题">上一题</button>';
  if (!submitted) h += '<button id="practiceSubmit" class="btn-next" style="flex:1.2" aria-label="提交答案">提交答案</button>';
  h += '<button onclick="practiceNext()" class="btn-secondary" ' + (currentIndex === n - 1 ? 'disabled' : '') + ' aria-label="下一题">下一题</button>';
  h += '</div>';
  el.innerHTML = h;

  if (!submitted) {
    document.getElementById('practiceSubmit').onclick = function() {
      var a = tempAnswer || '';
      if (!a) return;
      var q2 = currentQuestions[currentIndex];
      if (q2.type === '多项选择题') a = a.split('').sort().join('');
      userAnswers[currentIndex] = a;
      tempAnswer = '';
      if (!isCorrect(q2, a)) recordWrong(q2.id, a, q2.answer);
      renderPractice();
    };
    bindOptions(function(v) {
      var q2 = currentQuestions[currentIndex];
      if (q2.type === '多项选择题') {
        if (!tempAnswer) tempAnswer = '';
        if (tempAnswer.indexOf(v) >= 0) tempAnswer = tempAnswer.replace(v, '');
        else tempAnswer += v;
        renderPractice();
      } else {
        tempAnswer = v;
        renderPractice();
      }
    });
  }
}
window.practicePrev = function() { if (currentIndex > 0) { currentIndex--; tempAnswer = ''; renderPractice(); } };
window.practiceNext = function() { if (currentIndex < currentQuestions.length - 1) { currentIndex++; tempAnswer = ''; renderPractice(); } };

// ====== 模拟考试 ======
function startExam() {
  examMode = true;
  var av = getValidQuestions();
  currentQuestions = av.length < 100 ? shuffle(av) : shuffle(av).slice(0, 100);
  if (!currentQuestions.length) return;
  currentIndex = 0;
  userAnswers = {};
  tempAnswer = '';
  examStartTime = Date.now();
  examEnded = false;
  showPage('pageExam');
  renderExam();
  if (examTimer) clearInterval(examTimer);
  examTimer = setInterval(updateExamTimer, 1000);
}

function updateExamTimer() {
  if (examEnded) return;
  var timerEl = document.getElementById('examTimer');
  if (!timerEl) return;
  var elapsed = Math.floor((Date.now() - examStartTime) / 1000);
  var min = Math.floor(elapsed / 60);
  var sec = elapsed % 60;
  timerEl.textContent = '⏱ ' + String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  var answered = Object.keys(userAnswers).length;
  var progressEl = document.getElementById('examProgress');
  if (progressEl) progressEl.style.width = (answered / currentQuestions.length * 100) + '%';
  var infoEl = document.getElementById('examInfo');
  if (infoEl) infoEl.textContent = '第' + (currentIndex + 1) + '/' + currentQuestions.length + '题 | 已答' + answered;
}

function renderExam() {
  if (examEnded) return;
  var q = currentQuestions[currentIndex];
  var n = currentQuestions.length;
  var answered = Object.keys(userAnswers).length;
  var selected = (currentIndex in userAnswers) ? userAnswers[currentIndex] : tempAnswer;
  if (currentIndex in userAnswers) tempAnswer = userAnswers[currentIndex];
  var el = document.getElementById('pageExam');

  var h = '<div class="top-bar">';
  h += '<button class="back-btn" onclick="safeNavigate(goHome)" aria-label="退出考试">← 退出</button>';
  h += '<span class="info" id="examInfo" aria-live="polite">第' + (currentIndex + 1) + '/' + n + '题 | 已答' + answered + '</span>';
  h += '<span class="timer" id="examTimer" aria-live="off">⏱ 00:00</span>';
  h += '</div>';
  h += '<div class="progress-bar"><div class="fill" id="examProgress" style="width:' + (answered / n * 100) + '%"></div></div>';
  h += '<div class="card">' + renderQuestion(q, currentIndex, n, { selected: selected, showAnswer: false }) + '</div>';
  h += '<div class="nav-row">';
  h += '<button onclick="examPrev()" class="btn-secondary" ' + (currentIndex === 0 ? 'disabled' : '') + ' aria-label="上一题">上一题</button>';
  h += '<button onclick="openAnswerCard()" class="btn-secondary" aria-label="打开答题卡">答题卡</button>';
  h += '<button onclick="examNext()" class="btn-next" ' + (currentIndex === n - 1 ? 'disabled' : '') + ' aria-label="下一题">下一题</button>';
  h += '</div>';
  h += '<button id="examFinish" class="btn-danger" style="margin-top:8px" aria-label="交卷">📝 交卷</button>';
  el.innerHTML = h;

  updateExamTimer();

  document.getElementById('examFinish').onclick = function() {
    var unanswered = currentQuestions.length - Object.keys(userAnswers).length;
    if (unanswered > 0) {
      showModal('确认交卷', '还有' + unanswered + '题未作答，确定要交卷吗？', finishExam);
    } else {
      showModal('确认交卷', '确定要交卷吗？', finishExam);
    }
  };

  bindOptions(function(v) {
    var q2 = currentQuestions[currentIndex];
    if (q2.type === '多项选择题') {
      if (!tempAnswer) tempAnswer = '';
      if (tempAnswer.indexOf(v) >= 0) tempAnswer = tempAnswer.replace(v, '');
      else tempAnswer += v;
      userAnswers[currentIndex] = tempAnswer;
      updateOptionStyles(q2, tempAnswer);
    } else {
      userAnswers[currentIndex] = v;
      tempAnswer = v;
      updateOptionStyles(q2, v);
    }
    updateExamTimer();
  });
}

function updateOptionStyles(q, selected) {
  var labels = document.querySelectorAll('.options label');
  for (var i = 0; i < labels.length; i++) {
    var l = labels[i].getAttribute('data-v');
    labels[i].classList.remove('selected');
    if (q.type === '多项选择题') {
      if (selected && selected.indexOf(l) >= 0) labels[i].classList.add('selected');
    } else {
      if (selected === l) labels[i].classList.add('selected');
    }
  }
  var btns = document.querySelectorAll('.judge-btns button');
  for (var i = 0; i < btns.length; i++) {
    var v = btns[i].getAttribute('data-v');
    btns[i].classList.remove('selected');
    if (selected === v) btns[i].classList.add('selected');
  }
}

window.examPrev = function() {
  if (currentIndex > 0) {
    currentIndex--;
    tempAnswer = '';
    renderExam();
  }
};
window.examNext = function() {
  if (currentIndex < currentQuestions.length - 1) {
    currentIndex++;
    tempAnswer = '';
    renderExam();
  }
};

function finishExam() {
  if (examTimer) { clearInterval(examTimer); examTimer = null; }
  examEnded = true;
  examMode = false;
  for (var i = 0; i < currentQuestions.length; i++) {
    var a = userAnswers[i] || '';
    if (!isCorrect(currentQuestions[i], a)) recordWrong(currentQuestions[i].id, a, currentQuestions[i].answer);
  }
  renderResult();
}

function renderResult() {
  var n = currentQuestions.length;
  var correct = 0;
  for (var k in userAnswers) {
    if (userAnswers.hasOwnProperty(k)) {
      try { if (isCorrect(currentQuestions[parseInt(k)], userAnswers[k])) correct++; } catch(e) {}
    }
  }
  var score = Math.round(correct / n * 100);
  var passed = score >= 70;
  var elapsed = Math.floor((Date.now() - examStartTime) / 1000);
  var min = Math.floor(elapsed / 60);
  var sec = elapsed % 60;
  var el = document.getElementById('pageResult');

  var h = '<div class="result-section">';
  h += '<div class="score-circle ' + (passed ? 'pass' : 'fail') + '">' + score + '<small>分</small></div>';
  h += '<div class="grade" style="color:' + (passed ? 'var(--success-dark)' : 'var(--danger-dark)') + '">' + (passed ? '🎉 恭喜及格!' : '😞 不及格') + '</div>';
  h += '<div class="stats">';
  h += '<span>✅ 正确: ' + correct + '</span>';
  h += '<span>❌ 错误: ' + (n - correct) + '</span>';
  h += '<span>⏱ 用时: ' + min + '分' + sec + '秒</span>';
  h += '</div>';
  h += '</div>';

  var wrongList = [];
  for (var i = 0; i < currentQuestions.length; i++) {
    if (!isCorrect(currentQuestions[i], userAnswers[i] || '')) wrongList.push(currentQuestions[i]);
  }
  if (wrongList.length > 0) {
    h += '<div class="card"><div style="font-weight:700;margin-bottom:12px;font-size:15px;display:flex;align-items:center;gap:6px">📋 错题解析 (' + wrongList.length + '题)</div>';
    for (var i = 0; i < wrongList.length; i++) {
      var wq = wrongList[i];
      h += '<div class="wrong-item">';
      h += '<div class="qid">' + typeLabel(wq.type) + '</div>';
      h += '<div class="qtxt">' + (i + 1) + '. ' + esc(wq.text || '') + '</div>';
      h += '<div class="qans">✓ 正确答案: ' + formatAnswer(wq, wq.answer) + '</div>';
      h += '</div>';
    }
    h += '</div>';
  }
  h += '<button onclick="goHome()" class="btn-primary" style="margin-top:12px">返回首页</button>';
  el.innerHTML = h;
  showPage('pageResult');
}

// ====== 错题库 ======

window.wrongPrev = function() { if (currentIndex > 0) { currentIndex--; tempAnswer = ''; renderWrong(); } };
window.wrongNext = function() { if (currentIndex < currentQuestions.length - 1) { currentIndex++; tempAnswer = ''; renderWrong(); } };

// ====== 每日复习 ======
function startDailyReview() {

window.dailyPrev = function() { if (currentIndex > 0) { currentIndex--; renderDailyReview(); } };
window.dailyNext = function() { if (currentIndex < currentQuestions.length - 1) { currentIndex++; renderDailyReview(); } };

// ====== 导入题库 ======

  cleanupExam();
  showPage('pageImport');

  var h = '<div class="top-bar">';
  h += '<button class="back-btn" onclick="goHome()" aria-label="返回首页">← 返回</button>';
  h += '<span class="info">导入题库</span>';
  h += '</div>';
  h += '<div class="card">';
  h += '<h3 style="margin-bottom:10px;font-size:16px;display:flex;align-items:center;gap:6px">📥 导入Word题库</h3>';
  h += '<p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;line-height:1.6">选择.docx文件，替换当前题库并清空错题库</p>';
  h += '<div class="file-input-wrap"><input type="file" id="importFile" accept=".docx" aria-label="选择Word文档"></div>';
  h += '<button id="importBtn" class="btn-primary">导入</button>';
  h += '<div id="importResult" style="margin-top:12px;font-size:13px" aria-live="polite"></div>';
  h += '</div>';
  el.innerHTML = h;

  document.getElementById('importBtn').onclick = function() {
    var fileInput = document.getElementById('importFile');
    if (!fileInput.files.length) return;
    var file = fileInput.files[0];
    var resultEl = document.getElementById('importResult');
    resultEl.style.color = 'var(--text-secondary)';
    resultEl.textContent = '正在解析…';

    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var JSZip = window.JSZip;
        if (!JSZip) { resultEl.style.color = 'var(--danger)'; resultEl.textContent = 'JSZip未加载，请联网后重试'; return; }
        JSZip.loadAsync(e.target.result).then(function(zip) {
          return zip.file('word/document.xml').async('string');
        }).then(function(xml) {
          var parser = new DOMParser();
          var doc = parser.parseFromString(xml, 'text/xml');
          var paragraphs = [];
          var pp = doc.getElementsByTagName('w:p');
          for (var i = 0; i < pp.length; i++) {
            var tt = pp[i].getElementsByTagName('w:t');
            var txt = '';
            for (var j = 0; j < tt.length; j++) txt += tt[j].textContent;
            paragraphs.push(txt.trim());
          }
          var questions = parseWord(paragraphs);
          if (!questions.length) { resultEl.style.color = 'var(--danger)'; resultEl.textContent = '未解析到题目'; return; }
          Q = questions;
          wrongRecords = {};
          saveWrong();
          resultEl.style.color = 'var(--success-dark)';
          resultEl.textContent = '✓ 导入成功! 共' + questions.length + '题';
          updateStats();
        });
      } catch(ex) {
        resultEl.style.color = 'var(--danger)';
        resultEl.textContent = '导入失败: ' + ex.message;
      }
    };
    reader.readAsArrayBuffer(file);
  };
}

function parseWord(lines) {
  var chapter = '综合';
  var type = '单项选择题';
  var gid = 0;
  var questions = [];
  for (var i = 0; i < lines.length; i++) {
    var ln = lines[i];
    if (ln.indexOf('单项选择题') >= 0) { type = '单项选择题'; continue; }
    if (ln.indexOf('多项选择题') >= 0) { type = '多项选择题'; continue; }
    if (ln.indexOf('判断题') >= 0) { type = '判断题'; continue; }
    var m = ln.match(/^(\d+)\.\s*(.*)/);
    if (m) {
      var num = parseInt(m[1]);
      var text = m[2].trim();
      var options = { A: '', B: '', C: '', D: '' };
      var answer = '';
      var j = i + 1;
      while (j < lines.length) {
        var l = lines[j];
        var oa = l.match(/^A[.、．]\s*(.*)/);
        var ob = l.match(/^B[.、．]\s*(.*)/);
        var oc = l.match(/^C[.、．]\s*(.*)/);
        var od = l.match(/^D[.、．]\s*(.*)/);
        if (oa) { options.A = oa[1].trim(); j++; continue; }
        if (ob) { options.B = ob[1].trim(); j++; continue; }
        if (oc) { options.C = oc[1].trim(); j++; continue; }
        if (od) { options.D = od[1].trim(); j++; continue; }
        var am = l.match(/答案[：:]?\s*([A-D√×✓✖对错]+)/);
        if (am) { answer = am[1].trim().replace(/\*\*/g, ''); j++; break; }
        if (l.match(/^\d+\.\s/)) break;
        if (l && !l.startsWith('#') && !l.startsWith('《')) text += (text ? ' ' : '') + l;
        j++;
      }
      i = j;
      if (type === '判断题') {
        if (answer === 'A' || answer === '✓' || answer === '√' || answer === '对') answer = 'A';
        else if (answer === 'B' || answer === '✖' || answer === '×' || answer === '错') answer = 'B';
        options = { A: '对', B: '错' };
      } else {
        if (!Object.values(options).some(function(v) { return v; })) options = { A: '', B: '', C: '', D: '' };
      }
      gid++;
      questions.push({ id: gid, local_id: num, chapter: chapter, type: type, text: text, options: options, answer: answer });
    }
  }
  return questions;
}

// ====== 答题卡 ======
window.openAnswerCard = function() {
  var grid = document.getElementById('answerCardGrid');
  var h = '';
  for (var i = 0; i < currentQuestions.length; i++) {
    var answered = (i in userAnswers);
    var isCurrent = (i === currentIndex);
    var cls = 'answer-card-item';
    if (answered) cls += ' answered';
    if (isCurrent) cls += ' current';
    h += '<div class="' + cls + '" onclick="jumpToQuestion(' + i + ')" role="button" tabindex="0" aria-label="跳转到第' + (i+1) + '题">' + (i + 1) + '</div>';
  }
  grid.innerHTML = h;
  document.getElementById('answerCardOverlay').classList.add('show');
  document.getElementById('answerCardPanel').style.display = 'block';
};

window.closeAnswerCard = function() {
  document.getElementById('answerCardOverlay').classList.remove('show');
  document.getElementById('answerCardPanel').style.display = 'none';
};

window.jumpToQuestion = function(idx) {
  currentIndex = idx;
  tempAnswer = '';
  closeAnswerCard();
  if (examMode) renderExam();
};

// ====== 模态框 ======
function showModal(title, text, onConfirm) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalText').textContent = text;
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('modalConfirm').onclick = function() {
    closeModal();
    if (onConfirm) onConfirm();
  };
}
window.closeModal = function() {
  document.getElementById('modalOverlay').classList.remove('show');
};

// ESC关闭模态框/答题卡
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeModal();
    closeAnswerCard();
  }
});

window.startDailyReview = startDailyReview;
window.startImport = startImport;
window.safeNavigate = safeNavigate;

})();
