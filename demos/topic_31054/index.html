<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🐾 宠物起名小助手</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink-50: #fdf2f8; --pink-100: #fce7f3; --pink-200: #fbcfe8;
    --pink-300: #f9a8d4; --pink-400: #f472b6; --pink-500: #ec4899;
    --pink-600: #db2777; --pink-700: #be185d;
    --warm-50: #fff7ed; --warm-100: #ffedd5; --warm-200: #fed7aa;
    --warm-400: #fb923c;
    --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-300: #d1d5db;
    --gray-500: #6b7280; --gray-700: #374151; --gray-900: #111827;
  }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh; color: var(--gray-700);
    transition: background 0.6s ease;
  }
  /* 默认/猫咪 - 粉色系 */
  body.theme-cat {
    background: linear-gradient(135deg, #fdf2f8 0%, #fff7ed 50%, #fce7f3 100%);
  }
  /* 狗狗 - 暖橙系 */
  body.theme-dog {
    background: linear-gradient(135deg, #fff7ed 0%, #fef3c7 50%, #ffedd5 100%);
  }
  /* 兔兔 - 薰衣草系 */
  body.theme-rabbit {
    background: linear-gradient(135deg, #faf5ff 0%, #fdf2f8 50%, #f5f3ff 100%);
  }
  /* 鸟儿 - 天蓝系 */
  body.theme-bird {
    background: linear-gradient(135deg, #f0f9ff 0%, #ecfeff 50%, #f0fdfa 100%);
  }
  /* 仓鼠 - 蜜桃杏色系 */
  body.theme-hamster {
    background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 50%, #fef9c3 100%);
  }

  /* ===== 主题强调色覆盖 ===== */
  /* 狗狗 - 暖橙 */
  body.theme-dog .section { border-color: #fed7aa; box-shadow: 0 2px 12px rgba(251,146,60,0.08); }
  body.theme-dog .section-title { color: #ea580c; }
  body.theme-dog .species-tab { border-color: #fed7aa; }
  body.theme-dog .species-tab:hover { border-color: #fb923c; background: #fff7ed; }
  body.theme-dog .species-tab.active { background: #f97316; border-color: #f97316; box-shadow: 0 2px 8px rgba(249,115,22,0.3); }
  body.theme-dog .breed-select { border-color: #fed7aa; }
  body.theme-dog .breed-select:focus { border-color: #fb923c; }
  body.theme-dog .color-chip { border-color: #fed7aa; }
  body.theme-dog .color-chip:hover { border-color: #fb923c; }
  body.theme-dog .color-chip.active { background: #f97316; border-color: #f97316; }
  body.theme-dog .tag { border-color: #fed7aa; }
  body.theme-dog .tag:hover { border-color: #fb923c; }
  body.theme-dog .tag.active { background: #fb923c; border-color: #fb923c; }
  body.theme-dog .generate-btn { background: linear-gradient(135deg, #fb923c, #f97316); box-shadow: 0 4px 16px rgba(249,115,22,0.3); }
  body.theme-dog .generate-btn:hover { box-shadow: 0 6px 20px rgba(249,115,22,0.4); }
  body.theme-dog .result-card { border-color: #fed7aa; box-shadow: 0 2px 10px rgba(249,115,22,0.06); }
  body.theme-dog .result-name { color: #ea580c; }
  body.theme-dog .action-btn { border-color: #fed7aa; }
  body.theme-dog .action-btn:hover { border-color: #fb923c; background: #fff7ed; }
  body.theme-dog .action-btn.fav-active { background: #f97316; border-color: #f97316; }
  body.theme-dog .fav-item { background: #fff7ed; border-color: #fed7aa; }
  body.theme-dog .fav-item-name { color: #ea580c; }
  body.theme-dog .fav-remove:hover { color: #f97316; }
  body.theme-dog .toast { background: #ea580c; box-shadow: 0 4px 16px rgba(249,115,22,0.3); }
  body.theme-dog .header h1 { color: #ea580c; text-shadow: 0 1px 2px rgba(249,115,22,0.15); }

  /* 兔兔 - 薰衣草 */
  body.theme-rabbit .section { border-color: #e9d5ff; box-shadow: 0 2px 12px rgba(168,85,247,0.08); }
  body.theme-rabbit .section-title { color: #9333ea; }
  body.theme-rabbit .species-tab { border-color: #e9d5ff; }
  body.theme-rabbit .species-tab:hover { border-color: #c084fc; background: #faf5ff; }
  body.theme-rabbit .species-tab.active { background: #a855f7; border-color: #a855f7; box-shadow: 0 2px 8px rgba(168,85,247,0.3); }
  body.theme-rabbit .breed-select { border-color: #e9d5ff; }
  body.theme-rabbit .breed-select:focus { border-color: #c084fc; }
  body.theme-rabbit .color-chip { border-color: #e9d5ff; }
  body.theme-rabbit .color-chip:hover { border-color: #c084fc; }
  body.theme-rabbit .color-chip.active { background: #a855f7; border-color: #a855f7; }
  body.theme-rabbit .tag { border-color: #e9d5ff; }
  body.theme-rabbit .tag:hover { border-color: #c084fc; }
  body.theme-rabbit .tag.active { background: #c084fc; border-color: #c084fc; }
  body.theme-rabbit .generate-btn { background: linear-gradient(135deg, #c084fc, #a855f7); box-shadow: 0 4px 16px rgba(168,85,247,0.3); }
  body.theme-rabbit .generate-btn:hover { box-shadow: 0 6px 20px rgba(168,85,247,0.4); }
  body.theme-rabbit .result-card { border-color: #e9d5ff; box-shadow: 0 2px 10px rgba(168,85,247,0.06); }
  body.theme-rabbit .result-name { color: #9333ea; }
  body.theme-rabbit .action-btn { border-color: #e9d5ff; }
  body.theme-rabbit .action-btn:hover { border-color: #c084fc; background: #faf5ff; }
  body.theme-rabbit .action-btn.fav-active { background: #a855f7; border-color: #a855f7; }
  body.theme-rabbit .fav-item { background: #faf5ff; border-color: #e9d5ff; }
  body.theme-rabbit .fav-item-name { color: #9333ea; }
  body.theme-rabbit .fav-remove:hover { color: #a855f7; }
  body.theme-rabbit .toast { background: #9333ea; box-shadow: 0 4px 16px rgba(168,85,247,0.3); }
  body.theme-rabbit .header h1 { color: #9333ea; text-shadow: 0 1px 2px rgba(168,85,247,0.15); }

  /* 鸟儿 - 天蓝 */
  body.theme-bird .section { border-color: #bae6fd; box-shadow: 0 2px 12px rgba(14,165,233,0.08); }
  body.theme-bird .section-title { color: #0284c7; }
  body.theme-bird .species-tab { border-color: #bae6fd; }
  body.theme-bird .species-tab:hover { border-color: #38bdf8; background: #f0f9ff; }
  body.theme-bird .species-tab.active { background: #0ea5e9; border-color: #0ea5e9; box-shadow: 0 2px 8px rgba(14,165,233,0.3); }
  body.theme-bird .breed-select { border-color: #bae6fd; }
  body.theme-bird .breed-select:focus { border-color: #38bdf8; }
  body.theme-bird .color-chip { border-color: #bae6fd; }
  body.theme-bird .color-chip:hover { border-color: #38bdf8; }
  body.theme-bird .color-chip.active { background: #0ea5e9; border-color: #0ea5e9; }
  body.theme-bird .tag { border-color: #bae6fd; }
  body.theme-bird .tag:hover { border-color: #38bdf8; }
  body.theme-bird .tag.active { background: #38bdf8; border-color: #38bdf8; }
  body.theme-bird .generate-btn { background: linear-gradient(135deg, #38bdf8, #0ea5e9); box-shadow: 0 4px 16px rgba(14,165,233,0.3); }
  body.theme-bird .generate-btn:hover { box-shadow: 0 6px 20px rgba(14,165,233,0.4); }
  body.theme-bird .result-card { border-color: #bae6fd; box-shadow: 0 2px 10px rgba(14,165,233,0.06); }
  body.theme-bird .result-name { color: #0284c7; }
  body.theme-bird .action-btn { border-color: #bae6fd; }
  body.theme-bird .action-btn:hover { border-color: #38bdf8; background: #f0f9ff; }
  body.theme-bird .action-btn.fav-active { background: #0ea5e9; border-color: #0ea5e9; }
  body.theme-bird .fav-item { background: #f0f9ff; border-color: #bae6fd; }
  body.theme-bird .fav-item-name { color: #0284c7; }
  body.theme-bird .fav-remove:hover { color: #0ea5e9; }
  body.theme-bird .toast { background: #0284c7; box-shadow: 0 4px 16px rgba(14,165,233,0.3); }
  body.theme-bird .header h1 { color: #0284c7; text-shadow: 0 1px 2px rgba(14,165,233,0.15); }

  /* 仓鼠 - 蜜桃杏色 */
  body.theme-hamster .section { border-color: #fde68a; box-shadow: 0 2px 12px rgba(234,179,8,0.08); }
  body.theme-hamster .section-title { color: #b45309; }
  body.theme-hamster .species-tab { border-color: #fde68a; }
  body.theme-hamster .species-tab:hover { border-color: #fbbf24; background: #fffbeb; }
  body.theme-hamster .species-tab.active { background: #eab308; border-color: #eab308; box-shadow: 0 2px 8px rgba(234,179,8,0.3); }
  body.theme-hamster .breed-select { border-color: #fde68a; }
  body.theme-hamster .breed-select:focus { border-color: #fbbf24; }
  body.theme-hamster .color-chip { border-color: #fde68a; }
  body.theme-hamster .color-chip:hover { border-color: #fbbf24; }
  body.theme-hamster .color-chip.active { background: #eab308; border-color: #eab308; }
  body.theme-hamster .tag { border-color: #fde68a; }
  body.theme-hamster .tag:hover { border-color: #fbbf24; }
  body.theme-hamster .tag.active { background: #fbbf24; border-color: #fbbf24; }
  body.theme-hamster .generate-btn { background: linear-gradient(135deg, #fbbf24, #eab308); box-shadow: 0 4px 16px rgba(234,179,8,0.3); }
  body.theme-hamster .generate-btn:hover { box-shadow: 0 6px 20px rgba(234,179,8,0.4); }
  body.theme-hamster .result-card { border-color: #fde68a; box-shadow: 0 2px 10px rgba(234,179,8,0.06); }
  body.theme-hamster .result-name { color: #b45309; }
  body.theme-hamster .action-btn { border-color: #fde68a; }
  body.theme-hamster .action-btn:hover { border-color: #fbbf24; background: #fffbeb; }
  body.theme-hamster .action-btn.fav-active { background: #eab308; border-color: #eab308; }
  body.theme-hamster .fav-item { background: #fffbeb; border-color: #fde68a; }
  body.theme-hamster .fav-item-name { color: #b45309; }
  body.theme-hamster .fav-remove:hover { color: #eab308; }
  body.theme-hamster .toast { background: #b45309; box-shadow: 0 4px 16px rgba(234,179,8,0.3); }
  body.theme-hamster .header h1 { color: #b45309; text-shadow: 0 1px 2px rgba(234,179,8,0.15); }

  .app {
    max-width: 520px; margin: 0 auto; padding: 24px 16px 80px;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 {
    font-size: 28px; font-weight: 700; color: var(--pink-600);
    text-shadow: 0 1px 2px rgba(236,72,153,0.15);
  }
  .header p { font-size: 14px; color: var(--gray-500); margin-top: 6px; }

  /* Section */
  .section {
    background: #fff; border-radius: 16px; padding: 20px;
    margin-bottom: 16px; box-shadow: 0 2px 12px rgba(236,72,153,0.08);
    border: 1px solid var(--pink-100);
  }
  .section-title {
    font-size: 15px; font-weight: 600; color: var(--pink-600);
    margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
  }
  .section-title span { font-size: 18px; }

  /* Species Tabs */
  .species-tabs { display: flex; gap: 10px; flex-wrap: wrap; }
  .species-tab {
    padding: 8px 18px; border-radius: 20px; border: 2px solid var(--pink-200);
    background: #fff; cursor: pointer; font-size: 14px; font-weight: 500;
    transition: all 0.2s; color: var(--gray-700);
  }
  .species-tab:hover { border-color: var(--pink-400); background: var(--pink-50); }
  .species-tab.active {
    background: var(--pink-500); color: #fff; border-color: var(--pink-500);
    box-shadow: 0 2px 8px rgba(236,72,153,0.3);
  }

  /* Breed Select */
  .breed-select {
    width: 100%; padding: 10px 14px; border-radius: 12px;
    border: 2px solid var(--pink-200); font-size: 14px;
    background: #fff; color: var(--gray-700); outline: none;
    transition: border-color 0.2s; font-family: inherit;
  }
  .breed-select:focus { border-color: var(--pink-400); }

  /* Color Chips */
  .color-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 16px; border: 2px solid var(--pink-200);
    cursor: pointer; font-size: 13px; transition: all 0.2s;
    background: #fff; color: var(--gray-700);
  }
  .color-chip:hover { border-color: var(--pink-400); }
  .color-chip.active {
    background: var(--pink-500); color: #fff; border-color: var(--pink-500);
  }
  .color-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0;
  }

  /* Personality Tags */
  .tag-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag {
    padding: 6px 14px; border-radius: 16px; border: 2px solid var(--pink-200);
    cursor: pointer; font-size: 13px; transition: all 0.2s;
    background: #fff; color: var(--gray-700); user-select: none;
  }
  .tag:hover { border-color: var(--pink-400); }
  .tag.active {
    background: var(--pink-400); color: #fff; border-color: var(--pink-400);
  }

  /* Generate Button */
  .generate-btn {
    width: 100%; padding: 14px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, var(--pink-400), var(--pink-500));
    color: #fff; font-size: 17px; font-weight: 600; cursor: pointer;
    transition: all 0.25s; box-shadow: 0 4px 16px rgba(236,72,153,0.3);
    font-family: inherit; margin-top: 4px;
  }
  .generate-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(236,72,153,0.4);
  }
  .generate-btn:active { transform: translateY(0); }

  /* Results */
  .results { display: none; }
  .results.show { display: block; }
  .result-card {
    background: #fff; border-radius: 16px; padding: 20px;
    margin-bottom: 12px; border: 1.5px solid var(--pink-200);
    box-shadow: 0 2px 10px rgba(236,72,153,0.06);
    animation: fadeUp 0.4s ease both;
  }
  .result-card:nth-child(2) { animation-delay: 0.1s; }
  .result-card:nth-child(3) { animation-delay: 0.2s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-name {
    font-size: 22px; font-weight: 700; color: var(--pink-600);
    margin-bottom: 4px;
  }
  .result-meaning {
    font-size: 13px; color: var(--gray-500); line-height: 1.6;
    margin-bottom: 12px;
  }
  .result-actions { display: flex; gap: 8px; }
  .action-btn {
    padding: 6px 14px; border-radius: 10px; border: 1.5px solid var(--pink-200);
    background: #fff; cursor: pointer; font-size: 12px;
    transition: all 0.2s; color: var(--gray-700); font-family: inherit;
    display: flex; align-items: center; gap: 4px;
  }
  .action-btn:hover { border-color: var(--pink-400); background: var(--pink-50); }
  .action-btn.fav-active {
    background: var(--pink-500); color: #fff; border-color: var(--pink-500);
  }

  /* Favorites */
  .fav-section { display: none; }
  .fav-section.show { display: block; }
  .fav-list { display: flex; flex-direction: column; gap: 8px; }
  .fav-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--pink-50); border-radius: 12px;
    border: 1px solid var(--pink-200);
  }
  .fav-item-info { flex: 1; }
  .fav-item-name { font-weight: 600; color: var(--pink-600); font-size: 15px; }
  .fav-item-meaning { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
  .fav-remove {
    background: none; border: none; cursor: pointer; font-size: 16px;
    color: var(--gray-500); padding: 4px; transition: color 0.2s;
  }
  .fav-remove:hover { color: var(--pink-500); }
  .fav-empty { text-align: center; color: var(--gray-500); font-size: 13px; padding: 12px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--pink-600); color: #fff; padding: 10px 24px;
    border-radius: 12px; font-size: 14px; font-weight: 500;
    box-shadow: 0 4px 16px rgba(236,72,153,0.3);
    transition: transform 0.3s ease; z-index: 999; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Floating decorations */
  .deco {
    position: fixed; font-size: 28px; opacity: 0.15; pointer-events: none;
    animation: float 6s ease-in-out infinite;
  }
  .deco-1 { top: 10%; left: 5%; animation-delay: 0s; }
  .deco-2 { top: 30%; right: 8%; animation-delay: 1.5s; }
  .deco-3 { bottom: 20%; left: 8%; animation-delay: 3s; }
  .deco-4 { bottom: 40%; right: 5%; animation-delay: 4.5s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(8deg); }
  }

  /* ===== 响应式适配 ===== */
  /* 小屏手机 ≤360px */
  @media (max-width: 360px) {
    .app { padding: 16px 10px 60px; }
    .header h1 { font-size: 22px; }
    .header p { font-size: 12px; }
    .section { padding: 14px 12px; border-radius: 12px; margin-bottom: 12px; }
    .section-title { font-size: 13px; margin-bottom: 10px; }
    .section-title span { font-size: 15px; }
    .species-tabs { gap: 6px; }
    .species-tab { padding: 6px 12px; font-size: 12px; border-radius: 16px; }
    .breed-select { padding: 8px 10px; font-size: 13px; border-radius: 10px; }
    .color-chips { gap: 6px; }
    .color-chip { padding: 5px 10px; font-size: 12px; border-radius: 12px; }
    .color-dot { width: 12px; height: 12px; }
    .tag-group { gap: 6px; }
    .tag { padding: 5px 10px; font-size: 12px; border-radius: 12px; }
    .generate-btn { padding: 12px; font-size: 15px; border-radius: 12px; }
    .result-card { padding: 14px 12px; border-radius: 12px; }
    .result-name { font-size: 18px; }
    .result-meaning { font-size: 12px; }
    .action-btn { padding: 5px 10px; font-size: 11px; border-radius: 8px; }
    .fav-item { padding: 8px 10px; border-radius: 10px; }
    .fav-item-name { font-size: 13px; }
    .fav-item-meaning { font-size: 11px; }
    .fav-remove { font-size: 14px; padding: 6px; }
    .toast { font-size: 13px; padding: 8px 18px; bottom: 20px; }
    .deco { font-size: 20px; }
  }

  /* 常规手机 361-414px */
  @media (min-width: 361px) and (max-width: 414px) {
    .app { padding: 20px 14px 70px; }
    .header h1 { font-size: 25px; }
    .section { padding: 16px 14px; }
    .species-tab { padding: 7px 14px; font-size: 13px; }
    .color-chip { padding: 5px 12px; font-size: 12px; }
    .tag { padding: 5px 12px; font-size: 12px; }
    .result-name { font-size: 20px; }
  }

  /* 大屏手机/小平板 415-520px — 默认样式已适配 */

  /* 触控优化：增大可点击区域 */
  @media (pointer: coarse) {
    .species-tab { min-height: 40px; display: flex; align-items: center; justify-content: center; }
    .color-chip { min-height: 36px; }
    .tag { min-height: 36px; }
    .action-btn { min-height: 36px; min-width: 80px; display: flex; align-items: center; justify-content: center; }
    .fav-remove { min-width: 36px; min-height: 36px; display: flex; align-items: center; justify-content: center; }
    .breed-select { min-height: 44px; }
    .generate-btn { min-height: 50px; }
  }

  /* 横屏手机优化 */
  @media (max-height: 500px) and (orientation: landscape) {
    .app { padding: 12px 16px 40px; }
    .header { margin-bottom: 16px; }
    .header h1 { font-size: 22px; }
    .section { padding: 12px 14px; margin-bottom: 10px; }
    .deco { font-size: 18px; }
  }

  /* 安全区域适配（刘海屏等） */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .app { padding-bottom: calc(70px + env(safe-area-inset-bottom)); }
    .toast { bottom: calc(20px + env(safe-area-inset-bottom)); }
  }

  /* 禁止移动端文字选中（避免误触选中） */
  .species-tab, .color-chip, .tag, .action-btn, .generate-btn {
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* 触摸反馈 */
  @media (hover: none) {
    .species-tab:active { transform: scale(0.95); }
    .color-chip:active { transform: scale(0.95); }
    .tag:active { transform: scale(0.95); }
    .action-btn:active { transform: scale(0.95); }
    .generate-btn:active { transform: scale(0.97); }
  }

  /* 滚动平滑 */
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

  /* 防止 iOS 弹性滚动导致背景露白 */
  body { overscroll-behavior-y: contain; }
</style>

// ========== State ==========
let state = {
  species: '',
  breed: '',
  color: '',
  style: 'cute',
  personalities: [],
  favorites: JSON.parse(localStorage.getItem('petNameFavs') || '[]'),

// ========== Init ==========
function init() {
  document.body.className = 'theme-cat';
  renderSpecies();
  renderColors();
  renderStyles();
  renderPersonalities();
  renderFavorites();
}

function applyTheme(species) {
  // Remove old theme, add new
  document.body.className = 'theme-' + species;
  // Update floating decorations
  const theme = DATA.themes[species];
  if (theme) {
    const decos = document.querySelectorAll('.deco');
    theme.decos.forEach((emoji, i) => {
      if (decos[i]) decos[i].textContent = emoji;
    });
  }
}

function renderSpecies() {
  const container = document.getElementById('speciesTabs');
  container.innerHTML = DATA.species.map(s =>
    `<div class="species-tab${state.species === s.id ? ' active' : ''}" data-id="${s.id}">${s.label}</div>`
  ).join('');
  container.querySelectorAll('.species-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      state.species = tab.dataset.id;
      state.breed = '';
      applyTheme(state.species);
      renderSpecies();
      renderBreeds();
    });
  });
}

function renderBreeds() {
  const select = document.getElementById('breedSelect');
  if (!state.species) {
    select.innerHTML = '<option value="">请先选择物种</option>';
    return;
  }
  const breeds = DATA.breeds[state.species] || [];
  select.innerHTML = '<option value="">请选择品种</option>' +
    breeds.map(b => `<option value="${b}">${b}</option>`).join('');
  select.onchange = () => { state.breed = select.value; };
}

function renderColors() {
  const container = document.getElementById('colorChips');
  container.innerHTML = DATA.colors.map(c =>
    `<div class="color-chip${state.color === c.id ? ' active' : ''}" data-id="${c.id}">
      <span class="color-dot" style="background:${c.hex}"></span>${c.label}
    </div>`
  ).join('');
  container.querySelectorAll('.color-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      state.color = chip.dataset.id;
      renderColors();
    });
  });
}

function renderStyles() {
  const container = document.getElementById('styleChips');
  container.innerHTML = DATA.styles.map(s =>
    `<div class="color-chip${state.style === s.id ? ' active' : ''}" data-id="${s.id}">
      ${s.emoji} ${s.label}
    </div>`
  ).join('');
  container.querySelectorAll('.color-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      state.style = chip.dataset.id;
      renderStyles();
    });
  });
}

function renderPersonalities() {
  const container = document.getElementById('tagGroup');
  container.innerHTML = DATA.personalities.map(p =>
    `<div class="tag${state.personalities.includes(p) ? ' active' : ''}" data-val="${p}">${p}</div>`
  ).join('');
  container.querySelectorAll('.tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const val = tag.dataset.val;
      if (state.personalities.includes(val)) {
        state.personalities = state.personalities.filter(p => p !== val);
      } else {
        state.personalities.push(val);
      }
      renderPersonalities();
    });
  });
}

// ========== Generate ==========
document.getElementById('generateBtn').addEventListener('click', generate);

function generate() {
  if (!state.species) { showToast('请先选择物种哦~'); return; }
  if (!state.color) { showToast('请选择毛色~'); return; }

  const pool = [];

  // 根据风格选择名字来源
  if (state.style === 'cute') {
    // 可爱风格：使用原有的物种+毛色名字
    const speciesNames = NAME_POOL[state.species]?.[state.color] || [];
    pool.push(...speciesNames);
    // 加入性格名字
    state.personalities.forEach(p => {
      if (PERSONALITY_NAMES[p]) pool.push(...PERSONALITY_NAMES[p]);
    });
  } else if (state.style === 'guofeng') {
    // 古风风格：从古风库中按性格匹配分类
    const guofengAll = [
      ...GUOFENG_POOL.poetry, ...GUOFENG_POOL.auspice,
      ...GUOFENG_POOL.treasure, ...GUOFENG_POOL.season, ...GUOFENG_POOL.astrology,
    ];
    // 根据性格优先匹配分类
    const personalityCategoryMap = {
      '活泼': 'season', '安静': 'poetry', '温柔': 'poetry',
      '高冷': 'astrology', '勇敢': 'auspice', '聪明': 'astrology',
      '傲娇': 'treasure', '忠诚': 'auspice', '呆萌': 'season',
      '贪吃': 'treasure', '调皮': 'season', '粘人': 'poetry',
    };
    let guofengPriority = [];
    state.personalities.forEach(p => {
      const cat = personalityCategoryMap[p];
      if (cat && GUOFENG_POOL[cat]) guofengPriority.push(...GUOFENG_POOL[cat]);
    });
    // 优先名字在前，全部古风名字作为补充
    pool.push(...guofengPriority, ...guofengAll);
  } else if (state.style === 'food') {
    // 美食风格
    pool.push(...FOOD_POOL);
  } else if (state.style === 'nature') {
    // 自然风格
    pool.push(...NATURE_POOL);
  }

  // Fallback if pool too small
  if (pool.length < 3) {
    const allColors = NAME_POOL[state.species] || {};
    Object.values(allColors).flat().forEach(n => pool.push(n));
  }

  // Pick 3 unique
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  const picked = [];
  const usedNames = new Set();
  for (const item of shuffled) {
    if (!usedNames.has(item.name) && picked.length < 3) {
      picked.push(item);
      usedNames.add(item.name);
    }
  }

  renderResults(picked);
}

function renderResults(names) {
  const container = document.getElementById('results');
  container.innerHTML = names.map((n, i) => `
    <div class="result-card">
      <div class="result-name">${n.name}</div>
      <div class="result-meaning">${n.meaning}</div>
      <div class="result-actions">
        <button class="action-btn fav-btn${isFav(n.name) ? ' fav-active' : ''}" data-name="${n.name}" data-meaning="${n.meaning}">
          ${isFav(n.name) ? '💖 已收藏' : '🤍 收藏'}
        </button>
        <button class="action-btn copy-btn" data-name="${n.name}" data-meaning="${n.meaning}">
          📋 复制分享
        </button>
      </div>
    </div>
  `).join('');
  container.classList.add('show');

  // Bind fav
  container.querySelectorAll('.fav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.name, meaning = btn.dataset.meaning;
      if (isFav(name)) {
        removeFav(name);
        btn.classList.remove('fav-active');
        btn.innerHTML = '🤍 收藏';
      } else {
        addFav(name, meaning);
        btn.classList.add('fav-active');
        btn.innerHTML = '💖 已收藏';
      }
      renderFavorites();
    });
  });

  // Bind copy
  container.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const text = `我给我的宠物起了个名字叫「${btn.dataset.name}」✨ 寓意：${btn.dataset.meaning} ——来自宠物起名小助手`;
      navigator.clipboard.writeText(text).then(() => {
        showToast('已复制到剪贴板~');
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('已复制到剪贴板~');
      });
    });
  });
}

// ========== Favorites ==========
function isFav(name) {
  return state.favorites.some(f => f.name === name);
}

function addFav(name, meaning) {
  if (!isFav(name)) {
    state.favorites.push({ name, meaning });
    saveFavs();
  }
}

function removeFav(name) {
  state.favorites = state.favorites.filter(f => f.name !== name);
  saveFavs();
}

function saveFavs() {
  localStorage.setItem('petNameFavs', JSON.stringify(state.favorites));
}

function renderFavorites() {
  const section = document.getElementById('favSection');
  const list = document.getElementById('favList');
  if (state.favorites.length === 0) {
    section.classList.remove('show');
    return;
  }
  section.classList.add('show');
  list.innerHTML = state.favorites.map(f => `
    <div class="fav-item">
      <div class="fav-item-info">
        <div class="fav-item-name">${f.name}</div>
        <div class="fav-item-meaning">${f.meaning}</div>
      </div>
      <button class="fav-remove" data-name="${f.name}" title="取消收藏">✕</button>
    </div>
  `).join('');
  list.querySelectorAll('.fav-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      removeFav(btn.dataset.name);
      renderFavorites();
      // Also update result cards if visible
      document.querySelectorAll('.fav-btn').forEach(fb => {
        if (fb.dataset.name === btn.dataset.name) {
          fb.classList.remove('fav-active');
          fb.innerHTML = '🤍 收藏';
        }
      });
    });
  });
}

// ========== Toast ==========
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ========== Start ==========
init();
</script>
