<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptCraft 智提示 - AI提示词转换器</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a1a;
            --bg-card: #13132b;
            --neon-purple: #a855f7;
            --neon-blue: #3b82f6;
            --neon-pink: #ec4899;
            --neon-cyan: #06b6d4;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(236, 72, 153, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-shadow: 0 0 40px rgba(168, 85, 247, 0.5);
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .subtitle {
            display: inline-block;
            padding: 6px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--neon-cyan);
        }

        .main-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 场景选择器 */
        .scene-selector {
            margin-bottom: 35px;
        }

        .scene-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .scene-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 20px 15px;
            background: var(--bg-card);
            border: 2px solid transparent;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        .scene-btn:hover {
            border-color: var(--neon-purple);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.2);
        }

        .scene-btn.active {
            border-color: var(--neon-purple);
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(59, 130, 246, 0.2));
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
        }

        .scene-icon {
            font-size: 2rem;
        }

        .scene-name {
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* 输入区域 */
        .input-section {
            margin-bottom: 30px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-box {
            width: 100%;
            padding: 20px;
            background: var(--bg-card);
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            min-height: 120px;
            transition: all 0.3s ease;
        }

        .input-box:focus {
            outline: none;
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }

        .input-box::placeholder {
            color: var(--text-secondary);
        }

        .char-count {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* 生成按钮 */
        .generate-btn {
            width: 100%;
            padding: 18px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .generate-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .generate-btn:hover::before {
            left: 100%;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(168, 85, 247, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .generate-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 输出区域 */
        .output-section {
            margin-top: 35px;
            display: none;
        }

        .output-section.show {
            display: block;
            animation: fadeInUp 0.5s ease-out;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .output-box {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 25px;
            font-family: 'Inter', sans-serif;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .output-prompt {
            color: var(--neon-cyan);
        }

        .copy-btn {
            padding: 10px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: var(--neon-purple);
        }

        .copy-btn.copied {
            background: rgba(34, 197, 94, 0.2);
            border-color: #22c55e;
        }

        /* 历史记录 */
        .history-section {
            margin-top: 40px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .clear-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clear-btn:hover {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            border-color: var(--neon-purple);
            transform: translateX(5px);
        }

        .history-scene {
            font-size: 1.5rem;
        }

        .history-content {
            flex: 1;
            min-width: 0;
        }

        .history-input {
            color: var(--text-secondary);
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .empty-history {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 15px 30px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            border-radius: 12px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }

            .logo {
                font-size: 2rem;
            }

            .main-card {
                padding: 25px;
            }

            .scene-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .scene-btn {
                padding: 15px 10px;
            }

            .scene-icon {
                font-size: 1.5rem;
            }

            .scene-name {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">PromptCraft</h1>
            <p class="tagline">智提示 - AI提示词转换器</p>
            <span class="subtitle">✨ 将普通话语转换为专业AI提示词</span>
        </header>

        <div class="main-card">
            <div class="scene-selector">
                <p class="section-title">🎯 选择AI场景</p>
                <div class="scene-grid">
                    <button class="scene-btn active" data-scene="绘画">
                        <span class="scene-icon">🎨</span>
                        <span class="scene-name">绘画</span>
                    </button>
                    <button class="scene-btn" data-scene="写作">
                        <span class="scene-icon">✍️</span>
                        <span class="scene-name">写作</span>
                    </button>
                    <button class="scene-btn" data-scene="编程">
                        <span class="scene-icon">💻</span>
                        <span class="scene-name">编程</span>
                    </button>
                    <button class="scene-btn" data-scene="对话">
                        <span class="scene-icon">💬</span>
                        <span class="scene-name">对话</span>
                    </button>
                    <button class="scene-btn" data-scene="分析">
                        <span class="scene-icon">📊</span>
                        <span class="scene-name">分析</span>
                    </button>
                    <button class="scene-btn" data-scene="视频">
                        <span class="scene-icon">🎬</span>
                        <span class="scene-name">视频</span>
                    </button>
                </div>
            </div>

            <div class="input-section">
                <p class="section-title">💬 输入你的想法</p>
                <div class="input-wrapper">
                    <textarea
                        class="input-box"
                        id="userInput"
                        placeholder="例如：画一只穿着宇航服的可爱猫咪，在太空站里看着地球"
                        maxlength="500"
                    ></textarea>
                    <span class="char-count"><span id="charCount">0</span>/500</span>
                </div>
            </div>

            <button class="generate-btn" id="generateBtn">
                🚀 生成提示词
            </button>

            <div class="output-section" id="outputSection">
                <div class="output-header">
                    <p class="section-title">✨ 生成的提示词</p>
                    <button class="copy-btn" id="copyBtn">
                        <span id="copyText">📋 复制</span>
                    </button>
                </div>
                <div class="output-box">
                    <span class="output-prompt" id="outputPrompt"></span>
                </div>
            </div>
        </div>

        <div class="history-section">
            <div class="history-header">
                <p class="section-title">📜 转换历史</p>
                <button class="clear-btn" id="clearBtn">清空历史</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-history">暂无历史记录</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">复制成功！</div>

    <script>
        // 数据
        const sceneTemplates = {
            '绘画': {
                prefix: 'Masterpiece, best quality, ultra detailed, 8k, professional',
                suffix: ', detailed, high resolution, perfect lighting, cinematic composition',
                examples: ['一幅画', '生成图片', '画']
            },
            '写作': {
                prefix: 'Please write in a professional and engaging tone',
                suffix: '. Use clear structure, compelling narrative, and vivid descriptions.',
                examples: ['写一篇', '帮我写', '创作']
            },
            '编程': {
                prefix: 'Write clean, well-documented code. ',
                suffix: ' Include error handling and best practices.',
                examples: ['写代码', '编程', '开发']
            },
            '对话': {
                prefix: 'As an expert AI assistant, please respond thoughtfully',
                suffix: '. Be helpful, accurate, and informative.',
                examples: ['回答', '解释', '聊聊']
            },
            '分析': {
                prefix: 'Please provide a detailed analysis of',
                suffix: '. Include data insights, trends, and actionable recommendations.',
                examples: ['分析', '研究', '评估']
            },
            '视频': {
                prefix: 'Create a video script for',
                suffix: '. Include scene descriptions, dialogue, and timing.',
                examples: ['拍视频', '做视频', '脚本']
            }
        };

        // 状态
        let currentScene = '绘画';
        let history = JSON.parse(localStorage.getItem('promptHistory') || '[]');

        // DOM
        const userInput = document.getElementById('userInput');
        const charCount = document.getElementById('charCount');
        const generateBtn = document.getElementById('generateBtn');
        const outputSection = document.getElementById('outputSection');
        const outputPrompt = document.getElementById('outputPrompt');
        const copyBtn = document.getElementById('copyBtn');
        const copyText = document.getElementById('copyText');
        const historyList = document.getElementById('historyList');
        const clearBtn = document.getElementById('clearBtn');
        const toast = document.getElementById('toast');
        const sceneBtns = document.querySelectorAll('.scene-btn');

        // 初始化
        function init() {
            renderHistory();
            setupEventListeners();
        }

        // 事件监听
        function setupEventListeners() {
            userInput.addEventListener('input', () => {
                charCount.textContent = userInput.value.length;
            });

            sceneBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    sceneBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentScene = btn.dataset.scene;
                });
            });

            generateBtn.addEventListener('click', generatePrompt);
            copyBtn.addEventListener('click', copyToClipboard);
            clearBtn.addEventListener('click', clearHistory);
        }

        // 生成提示词
        function generatePrompt() {
            const input = userInput.value.trim();
            if (!input) {
                showToast('请输入内容');
                return;
            }

            generateBtn.classList.add('loading');
            generateBtn.textContent = '生成中...';

            // 模拟处理时间
            setTimeout(() => {
                const template = sceneTemplates[currentScene];
                const enhanced = enhancePrompt(input, currentScene);
                const finalPrompt = `${template.prefix}, ${enhanced}${template.suffix}`;

                outputPrompt.textContent = finalPrompt;
                outputSection.classList.add('show');

                // 保存历史
                saveToHistory(input, currentScene, finalPrompt);

                generateBtn.classList.remove('loading');
                generateBtn.textContent = '🚀 生成提示词';
                showToast('生成成功！');
            }, 800);
        }

        // 增强提示词
        function enhancePrompt(input, scene) {
            // 基础增强：保留原意，增加专业描述词
            let enhanced = input;

            // 场景特定增强
            if (scene === '绘画') {
                // 添加绘画相关的质量修饰
                if (!enhanced.match(/style|art|illustration/i)) {
                    enhanced = enhanced.replace(/^(一幅|一张|画?|生成?|创作?)/i, '');
                    enhanced = enhanced.charAt(0).toUpperCase() + enhanced.slice(1);
                }
            }

            if (scene === '写作') {
                // 确保写作请求有合适的开头
                if (!enhanced.match(/^(please|write|帮我|写)/i)) {
                    enhanced = 'Write about: ' + enhanced;
                }
            }

            if (scene === '编程') {
                // 编程场景添加技术上下文
                if (!enhanced.match(/code|function|程序/i)) {
                    enhanced = 'Implement the following: ' + enhanced;
                }
            }

            return enhanced;
        }

        // 复制
        function copyToClipboard() {
            const text = outputPrompt.textContent;
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.classList.add('copied');
                copyText.textContent = '✅ 已复制';
                showToast('复制成功！');
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyText.textContent = '📋 复制';
                }, 2000);
            });
        }

        // 历史记录
        function saveToHistory(input, scene, output) {
            const item = {
                id: Date.now(),
                input,
                scene,
                output,
                time: new Date().toLocaleString('zh-CN')
            };

            history.unshift(item);
            if (history.length > 20) history.pop();

            localStorage.setItem('promptHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="empty-history">暂无历史记录</div>';
                return;
            }

            historyList.innerHTML = history.map(item => `
                <div class="history-item" data-id="${item.id}">
                    <span class="history-scene">${sceneTemplates[item.scene]?.prefix.split(',')[0] || '💡'}</span>
                    <div class="history-content">
                        <div class="history-input">${escapeHtml(item.input)}</div>
                        <div class="history-time">${item.scene} · ${item.time}</div>
                    </div>
                </div>
            `).join('');

            // 点击历史项填充
            document.querySelectorAll('.history-item').forEach(el => {
                el.addEventListener('click', () => {
                    const id = parseInt(el.dataset.id);
                    const item = history.find(h => h.id === id);
                    if (item) {
                        userInput.value = item.input;
                        charCount.textContent = item.input.length;
                        outputPrompt.textContent = item.output;
                        outputSection.classList.add('show');

                        // 选中对应场景
                        sceneBtns.forEach(b => {
                            b.classList.toggle('active', b.dataset.scene === item.scene);
                        });
                        currentScene = item.scene;
                    }
                });
            });
        }

        function clearHistory() {
            if (confirm('确定要清空所有历史记录吗？')) {
                history = [];
                localStorage.removeItem('promptHistory');
                renderHistory();
                showToast('已清空');
            }
        }

        // Toast提示
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
