<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel 密码穷举工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  min-height: 100vh;
  color: #eee;
  padding: 20px;
}
.container {
  max-width: 700px;
  margin: 0 auto;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 30px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
h1 {
  text-align: center;
  margin-bottom: 30px;
  font-size: 1.8em;
  background: linear-gradient(90deg, #00d4ff, #7b2ff7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.section {
  background: rgba(255,255,255,0.03);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}
.section-title {
  font-size: 1.1em;
  margin-bottom: 15px;
  color: #00d4ff;
  display: flex;
  align-items: center;
  gap: 8px;
}
.file-input-wrapper {
  text-align: center;
}
.file-input {
  display: none;
}
.file-label {
  display: inline-block;
  padding: 15px 30px;
  background: linear-gradient(90deg, #00d4ff, #7b2ff7);
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: transform 0.2s, box-shadow 0.2s;
}
.file-label:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(0,212,255,0.4);
}
.file-name {
  margin-top: 10px;
  font-size: 0.9em;
  color: #888;
  word-break: break-all;
}
.checkbox-group {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.checkbox-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
}
.checkbox-item:hover {
  background: rgba(255,255,255,0.1);
}
.checkbox-item input[type="checkbox"] {
  width: 20px;
  height: 20px;
  accent-color: #7b2ff7;
}
.length-inputs {
  display: flex;
  gap: 20px;
  align-items: center;
}
.length-inputs label {
  display: flex;
  align-items: center;
  gap: 10px;
}
.length-inputs input[type="number"] {
  width: 80px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-size: 1em;
  text-align: center;
}
.length-inputs input[type="number"]:focus {
  outline: 2px solid #7b2ff7;
  background: rgba(255,255,255,0.15);
}
.btn {
  padding: 15px 40px;
  border: none;
  border-radius: 10px;
  font-size: 1.1em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary {
  background: linear-gradient(90deg, #00d4ff, #7b2ff7);
  color: #fff;
}
.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(0,212,255,0.4);
}
.btn-danger {
  background: linear-gradient(90deg, #ff416c, #ff4b2b);
  color: #fff;
}
.btn-success {
  background: linear-gradient(90deg, #00b894, #00cec9);
  color: #fff;
}
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.button-group {
  display: flex;
  gap: 15px;
  justify-content: center;
}
.progress-info {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-bottom: 15px;
}
.progress-item {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}
.progress-item .label {
  font-size: 0.85em;
  color: #888;
  margin-bottom: 5px;
}
.progress-item .value {
  font-size: 1.3em;
  font-weight: 600;
  color: #00d4ff;
}
.progress-bar {
  height: 25px;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 15px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #00d4ff, #7b2ff7);
  border-radius: 12px;
  transition: width 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85em;
  font-weight: 600;
}
.current-password {
  background: rgba(0,212,255,0.1);
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  font-family: 'Courier New', monospace;
  font-size: 1.2em;
  word-break: break-all;
  border: 1px solid rgba(0,212,255,0.3);
}
.result-section {
  text-align: center;
}
.result-password {
  font-size: 2em;
  font-weight: 700;
  color: #00b894;
  margin: 20px 0;
  word-break: break-all;
}
.result-section .btn {
  margin-top: 15px;
}
.status {
  text-align: center;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-weight: 600;
}
.status.idle { background: rgba(255,255,255,0.05); color: #888; }
.status.running { background: rgba(0,212,255,0.2); color: #00d4ff; }
.status.found { background: rgba(0,184,148,0.2); color: #00b894; }
.status.notfound { background: rgba(255,75,43,0.2); color: #ff4b2b; }
.status.error { background: rgba(255,75,43,0.2); color: #ff4b2b; }
.hidden { display: none !important; }
.total-info {
  text-align: center;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
  margin-bottom: 15px;
  font-size: 0.9em;
  color: #888;
}
</style>
</head>
<body>
<div class="container">
  <h1>🔐 Excel 密码穷举工具</h1>
  
  <div class="section">
    <div class="section-title">📁 选择加密的 Excel 文件</div>
    <div class="file-input-wrapper">
      <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xlsm,.xls">
      <label for="fileInput" class="file-label">选择文件 (.xlsx/.xlsm/.xls)</label>
      <div id="fileName" class="file-name">未选择文件</div>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">🔤 字符集设置</div>
    <div class="checkbox-group">
      <label class="checkbox-item">
        <input type="checkbox" id="charsetDigits" checked> 数字 (0-9)
      </label>
      <label class="checkbox-item">
        <input type="checkbox" id="charsetLower" checked> 小写字母 (a-z)
      </label>
      <label class="checkbox-item">
        <input type="checkbox" id="charsetUpper" checked> 大写字母 (A-Z)
      </label>
      <label class="checkbox-item">
        <input type="checkbox" id="charsetSpecial"> 常用符号 (!@#$%^&*)
      </label>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">📏 密码长度范围</div>
    <div class="length-inputs">
      <label>
        最短长度:
        <input type="number" id="minLen" value="1" min="1" max="10">
      </label>
      <label>
        最长长度:
        <input type="number" id="maxLen" value="4" min="1" max="10">
      </label>
    </div>
    <div class="total-info" id="totalCandidates">总候选密码数: 0</div>
  </div>
  
  <div class="section">
    <div class="status idle" id="status">等待开始...</div>
    
    <div class="progress-bar hidden" id="progressBar">
      <div class="progress-bar-fill" id="progressBarFill" style="width: 0%">0%</div>
    </div>
    
    <div class="progress-info hidden" id="progressInfo">
      <div class="progress-item">
        <div class="label">已尝试</div>
        <div class="value" id="triedCount">0</div>
      </div>
      <div class="progress-item">
        <div class="label">速度</div>
        <div class="value" id="speed">0 /秒</div>
      </div>
      <div class="progress-item">
        <div class="label">预计剩余</div>
        <div class="value" id="eta">--</div>
      </div>
      <div class="progress-item">
        <div class="label">当前索引</div>
        <div class="value" id="currentIndex">0</div>
      </div>
    </div>
    
    <div class="current-password hidden" id="currentPassword">-</div>
    
    <div class="result-section hidden" id="resultSection">
      <div class="section-title">🎉 密码已找到!</div>
      <div class="result-password" id="foundPassword">-</div>
      <button class="btn btn-success" id="downloadBtn">下载解锁文件</button>
    </div>
    
    <div class="button-group" id="buttonGroup">
      <button class="btn btn-primary" id="startBtn">开始穷举</button>
    </div>
  </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function() {
  const fileInput = document.getElementById('fileInput');
  const fileName = document.getElementById('fileName');
  const charsetDigits = document.getElementById('charsetDigits');
  const charsetLower = document.getElementById('charsetLower');
  const charsetUpper = document.getElementById('charsetUpper');
  const charsetSpecial = document.getElementById('charsetSpecial');
  const minLenInput = document.getElementById('minLen');
  const maxLenInput = document.getElementById('maxLen');
  const totalCandidatesEl = document.getElementById('totalCandidates');
  const statusEl = document.getElementById('status');
  const progressBar = document.getElementById('progressBar');
  const progressBarFill = document.getElementById('progressBarFill');
  const progressInfo = document.getElementById('progressInfo');
  const triedCountEl = document.getElementById('triedCount');
  const speedEl = document.getElementById('speed');
  const etaEl = document.getElementById('eta');
  const currentIndexEl = document.getElementById('currentIndex');
  const currentPasswordEl = document.getElementById('currentPassword');
  const resultSection = document.getElementById('resultSection');
  const foundPasswordEl = document.getElementById('foundPassword');
  const downloadBtn = document.getElementById('downloadBtn');
  const buttonGroup = document.getElementById('buttonGroup');
  const startBtn = document.getElementById('startBtn');

  let fileData = null;
  let workbook = null;
  let isRunning = false;
  let stopFlag = false;
  let foundPassword = null;
  let unlockedWorkbook = null;

  const DIGITS = '0123456789';
  const LOWER = 'abcdefghijklmnopqrstuvwxyz';
  const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const SPECIAL = '!@#$%^&*';

  function getCharset() {
    let charset = '';
    if (charsetDigits.checked) charset += DIGITS;
    if (charsetLower.checked) charset += LOWER;
    if (charsetUpper.checked) charset += UPPER;
    if (charsetSpecial.checked) charset += SPECIAL;
    return charset;
  }

  function calcTotalCandidates(charset, minLen, maxLen) {
    let total = 0;
    for (let len = minLen; len <= maxLen; len++) {
      total += Math.pow(charset.length, len);
    }
    return total;
  }

  function updateTotalCandidates() {
    const charset = getCharset();
    const minLen = parseInt(minLenInput.value) || 1;
    const maxLen = parseInt(maxLenInput.value) || 1;
    const total = calcTotalCandidates(charset, minLen, maxLen);
    totalCandidatesEl.textContent = `总候选密码数: ${total.toLocaleString()}`;
    return total;
  }

  function indexToPassword(index, charset, length) {
    let result = '';
    let n = index;
    for (let i = 0; i < length; i++) {
      result = charset[n % charset.length] + result;
      n = Math.floor(n / charset.length);
    }
    return result;
  }

  function getPasswordAtIndex(charset, minLen, maxLen, globalIndex) {
    let index = globalIndex;
    for (let len = minLen; len <= maxLen; len++) {
      const countAtLen = Math.pow(charset.length, len);
      if (index < countAtLen) {
        return indexToPassword(index, charset, len);
      }
      index -= countAtLen;
    }
    return null;
  }

  function setStatus(status, message) {
    statusEl.className = 'status ' + status;
    statusEl.textContent = message;
  }

  function formatTime(seconds) {
    if (seconds < 60) return Math.ceil(seconds) + '秒';
    if (seconds < 3600) return Math.ceil(seconds / 60) + '分钟';
    if (seconds < 86400) return Math.ceil(seconds / 3600) + '小时';
    return Math.ceil(seconds / 86400) + '天';
  }

  function formatNumber(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return n.toLocaleString();
  }

  async function tryPassword(password) {
    try {
      const wb = XLSX.read(fileData, { type: 'array', password: password });
      return wb;
    } catch (e) {
      if (e.message && (e.message.includes('password') || e.message.includes('Password') || e.message.includes('encrypted'))) {
        return null;
      }
      return null;
    }
  }

  async function runBruteForce() {
    if (!fileData) {
      setStatus('error', '请先选择文件');
      return;
    }

    const charset = getCharset();
    if (!charset) {
      setStatus('error', '请至少选择一个字符集');
      return;
    }

    const minLen = parseInt(minLenInput.value) || 1;
    const maxLen = parseInt(maxLenInput.value) || 1;

    if (minLen > maxLen || minLen < 1 || maxLen > 10) {
      setStatus('error', '密码长度范围无效');
      return;
    }

    const total = calcTotalCandidates(charset, minLen, maxLen);
    if (total === 0) {
      setStatus('error', '没有可测试的密码');
      return;
    }

    isRunning = true;
    stopFlag = false;
    foundPassword = null;
    unlockedWorkbook = null;

    setStatus('running', '穷举中...');
    progressBar.classList.remove('hidden');
    progressInfo.classList.remove('hidden');
    currentPasswordEl.classList.remove('hidden');
    resultSection.classList.add('hidden');
    
    startBtn.disabled = true;
    startBtn.textContent = '穷举中...';

    let tried = 0;
    let lastUpdate = Date.now();
    let lastTried = 0;
    let startTime = Date.now();

    const BATCH_SIZE = 50;
    let currentIndex = 0;

    while (currentIndex < total && !stopFlag) {
      const batchPromises = [];
      const batchPasswords = [];
      
      for (let i = 0; i < BATCH_SIZE && currentIndex < total && !stopFlag; i++) {
        const pwd = getPasswordAtIndex(charset, minLen, maxLen, currentIndex);
        batchPasswords.push(pwd);
        batchPromises.push(tryPassword(pwd));
        currentIndex++;
      }

      const results = await Promise.all(batchPromises);
      
      for (let i = 0; i < results.length; i++) {
        tried++;
        currentPasswordEl.textContent = batchPasswords[i];
        
        if (results[i] !== null) {
          foundPassword = batchPasswords[i];
          unlockedWorkbook = results[i];
          stopFlag = true;
          break;
        }
      }

      const now = Date.now();
      if (now - lastUpdate >= 100) {
        const elapsed = (now - startTime) / 1000;
        const speed = tried / elapsed;
        const remaining = total - tried;
        const eta = speed > 0 ? remaining / speed : 0;

        const percent = Math.min(100, (tried / total) * 100);
        progressBarFill.style.width = percent + '%';
        progressBarFill.textContent = percent.toFixed(1) + '%';
        
        triedCountEl.textContent = formatNumber(tried) + ' / ' + formatNumber(total);
        speedEl.textContent = formatNumber(Math.round(speed)) + ' /秒';
        etaEl.textContent = formatTime(eta);
        currentIndexEl.textContent = formatNumber(currentIndex);

        lastUpdate = now;
      }
    }

    isRunning = false;
    startBtn.disabled = false;
    startBtn.textContent = '开始穷举';

    if (foundPassword) {
      setStatus('found', '🎉 密码已找到!');
      foundPasswordEl.textContent = foundPassword;
      resultSection.classList.remove('hidden');
      progressBarFill.style.width = '100%';
      progressBarFill.textContent = '100%';
    } else if (stopFlag) {
      setStatus('notfound', '已停止，未找到密码');
    } else {
      setStatus('notfound', '穷举完成，未找到密码');
    }
  }

  function stopBruteForce() {
    stopFlag = true;
    setStatus('idle', '正在停止...');
  }

  function downloadUnlockedFile() {
    if (!unlockedWorkbook) return;
    
    const wbout = XLSX.write(unlockedWorkbook, { bookType: 'xlsx', type: 'array' });
    const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'unlocked_' + fileName.textContent.replace(/^.*[\\\/]/, '');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  fileInput.addEventListener('change', function() {
    if (this.files && this.files[0]) {
      fileName.textContent = this.files[0].name;
      const reader = new FileReader();
      reader.onload = function(e) {
        fileData = new Uint8Array(e.target.result);
      };
      reader.readAsArrayBuffer(this.files[0]);
    }
  });

  charsetDigits.addEventListener('change', updateTotalCandidates);
  charsetLower.addEventListener('change', updateTotalCandidates);
  charsetUpper.addEventListener('change', updateTotalCandidates);
  charsetSpecial.addEventListener('change', updateTotalCandidates);
  minLenInput.addEventListener('change', updateTotalCandidates);
  maxLenInput.addEventListener('change', updateTotalCandidates);

  startBtn.addEventListener('click', runBruteForce);
  downloadBtn.addEventListener('click', downloadUnlockedFile);

  let stopBtn = null;
  startBtn.addEventListener('click', function() {
    if (!isRunning) {
      runBruteForce();
      if (!stopBtn) {
        stopBtn = document.createElement('button');
        stopBtn.className = 'btn btn-danger';
        stopBtn.textContent = '停止';
        stopBtn.addEventListener('click', stopBruteForce);
        buttonGroup.appendChild(stopBtn);
      }
    }
  });

  updateTotalCandidates();
})();
</script>
</body>
</html>
