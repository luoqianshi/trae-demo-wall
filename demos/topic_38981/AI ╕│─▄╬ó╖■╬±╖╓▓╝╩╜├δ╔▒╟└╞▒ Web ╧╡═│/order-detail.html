<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单详情 - AI秒杀系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; color: #e2e8f0; }
        
        .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.4rem; color: white; }
        .header .nav { display: flex; gap: 20px; }
        .header .nav a { color: rgba(255,255,255,0.9); text-decoration: none; padding: 8px 16px; border-radius: 20px; transition: all 0.3s; }
        .header .nav a:hover { background: rgba(255,255,255,0.2); }
        .header .user-info { display: flex; align-items: center; gap: 15px; }
        .header .user-info span { color: rgba(255,255,255,0.9); }
        .header .btn-logout { padding: 8px 16px; background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 6px; cursor: pointer; }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        
        .order-card { background: #1e293b; border-radius: 16px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #334155; }
        .order-header .order-id { font-size: 0.9rem; color: #94a3b8; }
        .order-header .order-id span { color: #667eea; font-weight: 600; }
        .order-header .status { padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; }
        .status.success { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .status.pending { background: rgba(249, 115, 22, 0.2); color: #f97316; }
        .status.failed { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .status.paid { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        .product-section { display: flex; gap: 25px; margin-bottom: 30px; }
        .product-image { width: 180px; height: 180px; border-radius: 12px; background: linear-gradient(135deg, #334155, #475569); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .product-info { flex: 1; }
        .product-info h2 { font-size: 1.3rem; margin-bottom: 10px; }
        .product-info .type { display: inline-block; padding: 4px 10px; background: #334155; border-radius: 4px; font-size: 0.75rem; margin-bottom: 10px; }
        .product-info .desc { color: #94a3b8; font-size: 0.9rem; line-height: 1.6; }
        .product-info .price { font-size: 1.5rem; color: #f97316; margin-top: 15px; }

        .order-info { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .info-item { background: #0f172a; padding: 15px; border-radius: 10px; }
        .info-item .label { color: #94a3b8; font-size: 0.85rem; margin-bottom: 5px; }
        .info-item .value { font-size: 1rem; }

        .pay-section { text-align: center; padding-top: 20px; border-top: 1px solid #334155; }
        .pay-section .amount { font-size: 1.8rem; color: #f97316; margin-bottom: 20px; }
        .pay-section .amount span { font-size: 1rem; color: #94a3b8; }
        .pay-btn { padding: 14px 40px; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .pay-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(34, 197, 94, 0.4); }
        .pay-btn:disabled { background: #475569; cursor: not-allowed; transform: none; }
        .pay-btn.processing { background: linear-gradient(135deg, #f97316, #ea580c); }

        .pay-success { padding: 40px; text-align: center; background: rgba(34, 197, 94, 0.1); border-radius: 12px; margin-top: 20px; }
        .pay-success .icon { font-size: 4rem; margin-bottom: 15px; }
        .pay-success h3 { color: #22c55e; margin-bottom: 10px; }
        .pay-success p { color: #94a3b8; }

        .order-list-link { text-align: center; margin-top: 30px; }
        .order-list-link a { color: #667eea; text-decoration: none; padding: 10px 20px; border: 1px solid #667eea; border-radius: 6px; transition: all 0.3s; }
        .order-list-link a:hover { background: #667eea; color: white; }

        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-state .icon { font-size: 4rem; margin-bottom: 20px; }
        .empty-state h3 { color: #94a3b8; margin-bottom: 10px; }
        .empty-state p { color: #64748b; }
        .empty-state a { color: #667eea; text-decoration: none; }

        #payModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        #payModal.show { display: flex; }
        .modal-content { background: #1e293b; padding: 40px; border-radius: 16px; text-align: center; min-width: 300px; }
        .modal-spinner { width: 50px; height: 50px; border: 3px solid #667eea; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <h1>🎯 AI秒杀系统</h1>
            <a href="seckill-frontend.html">抢购首页</a>
            <a href="order-list.html">我的订单</a>
        </div>
        <div class="user-info">
            <span id="userName">用户</span>
            <button class="btn-logout" onclick="handleLogout()">退出登录</button>
        </div>
    </div>

    <div class="container" id="orderContainer">
        <div class="empty-state">
            <div class="icon">📦</div>
            <h3>订单不存在</h3>
            <p><a href="order-list.html">查看我的订单</a></p>
        </div>
    </div>

    <div id="payModal">
        <div class="modal-content">
            <div style="font-size: 3rem; margin-bottom: 20px;">💳</div>
            <h3 style="margin-bottom: 20px;">支付处理中...</h3>
            <div class="modal-spinner"></div>
            <p style="color: #94a3b8; margin-top: 20px;">正在连接支付网关...</p>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let token = localStorage.getItem('token');
        let orderData = null;

        async function request(url, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            
            return fetch(`${API_BASE}${url}`, {
                ...options,
                headers
            }).then(res => res.json());
        }

        function getOrderIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        async function loadOrder() {
            const orderId = getOrderIdFromUrl();
            if (!orderId) return;

            const res = await request(`/orders/${orderId}`);
            if (res.code === 200) {
                orderData = res.data;
                renderOrder();
            }
        }

        function renderOrder() {
            if (!orderData) return;

            const statusText = {
                success: '抢购成功',
                pending: '待支付',
                paid: '已支付',
                failed: '抢购失败'
            };

            const statusClass = {
                success: 'success',
                pending: 'pending',
                paid: 'paid',
                failed: 'failed'
            };

            const container = document.getElementById('orderContainer');
            container.innerHTML = `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-id">订单号：<span>${orderData.id}</span></div>
                        <div class="status ${statusClass[orderData.status]}">${statusText[orderData.status]}</div>
                    </div>

                    <div class="product-section">
                        <div class="product-image">
                            ${orderData.productImage ? '<img src="' + orderData.productImage + '" alt="' + orderData.productName + '" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">' : '🎁'}
                        </div>
                        <div class="product-info">
                            <h2>${orderData.productName}</h2>
                            <span class="type">${orderData.productType === 'ticket' ? '演唱会门票' : '普通商品'}</span>
                            <p class="desc">${orderData.productDescription}</p>
                            <div class="price">¥${orderData.amount.toFixed(2)}</div>
                        </div>
                    </div>

                    <div class="order-info">
                        <div class="info-item">
                            <div class="label">下单时间</div>
                            <div class="value">${new Date(orderData.createdAt).toLocaleString('zh-CN')}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">购买用户</div>
                            <div class="value">${orderData.userName}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">商品ID</div>
                            <div class="value">${orderData.productId}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">支付状态</div>
                            <div class="value">${orderData.status === 'paid' ? '已支付' : orderData.status === 'pending' ? '待支付' : '未支付'}</div>
                        </div>
                    </div>

                    ${orderData.status === 'pending' ? '<div class="pay-section"><div class="amount"><span>应付金额</span> ¥' + orderData.amount.toFixed(2) + '</div><button class="pay-btn" onclick="handlePay()">立即支付</button></div>' : ''}

                    ${orderData.status === 'paid' ? '<div class="pay-success"><div class="icon">✅</div><h3>支付成功！</h3><p>支付时间：' + new Date(orderData.paidAt).toLocaleString('zh-CN') + '</p></div>' : ''}
                </div>

                <div class="order-list-link">
                    <a href="order-list.html">返回订单列表</a>
                </div>
            `;
        }

        async function handlePay() {
            const payBtn = document.querySelector('.pay-btn');
            payBtn.disabled = true;
            payBtn.classList.add('processing');
            payBtn.textContent = '支付中...';

            document.getElementById('payModal').classList.add('show');

            const res = await request('/orders/' + orderData.id + '/pay', {
                method: 'POST'
            });

            document.getElementById('payModal').classList.remove('show');

            if (res.code === 200) {
                orderData.status = 'paid';
                orderData.paidAt = res.data.paidAt;
                renderOrder();
            } else {
                alert(res.message || '支付失败');
                payBtn.disabled = false;
                payBtn.classList.remove('processing');
                payBtn.textContent = '立即支付';
            }
        }

        async function checkAuth() {
            const res = await request('/users/me');
            if (res.code !== 200) {
                window.location.href = 'seckill-frontend.html';
                return false;
            }
            document.getElementById('userName').textContent = res.data.username;
            return true;
        }

        function handleLogout() {
            localStorage.removeItem('token');
            window.location.href = 'seckill-frontend.html';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (await checkAuth()) {
                await loadOrder();
            }
        });
    </script>
</body>
</html
