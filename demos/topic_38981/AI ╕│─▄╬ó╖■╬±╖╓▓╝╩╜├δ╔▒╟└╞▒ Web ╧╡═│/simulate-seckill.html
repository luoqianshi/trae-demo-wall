<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 多人抢票模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); color: #e2e8f0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; background: linear-gradient(90deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #94a3b8; margin-top: 10px; }
        
        .control-panel { background: #1e293b; padding: 25px; border-radius: 12px; margin-bottom: 25px; }
        .control-panel h2 { font-size: 1.2rem; margin-bottom: 20px; color: #94a3b8; }
        .form-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.9rem; color: #94a3b8; }
        .form-group input, .form-group select { padding: 10px 12px; border: 1px solid #334155; border-radius: 6px; background: #0f172a; color: #fff; font-size: 0.9rem; }
        .btn { padding: 12px 24px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: #334155; color: #fff; }
        .btn-secondary:hover { background: #475569; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; border-left: 4px solid #667eea; }
        .stat-card.green { border-left-color: #22c55e; }
        .stat-card.red { border-left-color: #ef4444; }
        .stat-card.orange { border-left-color: #f97316; }
        .stat-card .stat-label { color: #94a3b8; font-size: 0.85rem; }
        .stat-card .stat-value { font-size: 1.8rem; font-weight: 700; margin-top: 8px; }
        
        .log-panel { background: #1e293b; border-radius: 12px; padding: 20px; }
        .log-panel h3 { font-size: 1.1rem; margin-bottom: 15px; color: #94a3b8; }
        .log-container { height: 300px; overflow-y: auto; background: #0f172a; border-radius: 8px; padding: 15px; }
        .log-item { padding: 8px 12px; margin-bottom: 5px; border-radius: 4px; font-size: 0.85rem; }
        .log-item.success { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .log-item.fail { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .log-item.info { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .log-item.warning { background: rgba(249, 115, 22, 0.15); color: #f97316; }
        
        .progress-bar { height: 8px; background: #334155; border-radius: 4px; overflow: hidden; margin-bottom: 15px; }
        .progress-bar .progress { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s; }
        
        .status-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 多人抢票模拟器</h1>
            <p>模拟大量用户同时抢购，测试系统并发能力和AI风控效果</p>
        </div>
        
        <div class="control-panel">
            <h2>⚙️ 模拟设置</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>模拟用户数量</label>
                    <input type="number" id="userCount" value="20" min="1" max="100">
                </div>
                <div class="form-group">
                    <label>请求间隔(ms)</label>
                    <input type="number" id="requestDelay" value="100" min="10" max="500">
                </div>
                <div class="form-group">
                    <label>目标商品</label>
                    <select id="productSelect">
                        <option value="">选择商品</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>是否模拟黄牛行为</label>
                    <select id="isBotMode">
                        <option value="false">正常用户</option>
                        <option value="true">黄牛脚本</option>
                    </select>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button class="btn btn-primary" onclick="startSimulation()">🚀 开始模拟</button>
                <button class="btn btn-danger" onclick="stopSimulation()">⏹️ 停止模拟</button>
                <button class="btn btn-secondary" onclick="clearLogs()">🗑️ 清空日志</button>
            </div>
            <div class="progress-bar" id="progressBar">
                <div class="progress" id="progress" style="width: 0%"></div>
            </div>
            <div style="display: flex; align-items: center; gap: 10px; color: #94a3b8; font-size: 0.9rem;">
                <span class="status-indicator" id="statusIndicator" style="display: none;"></span>
                <span id="statusText">准备就绪</span>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">总请求数</div>
                <div class="stat-value" id="totalRequests">0</div>
            </div>
            <div class="stat-card green">
                <div class="stat-label">抢购成功</div>
                <div class="stat-value" id="successCount">0</div>
            </div>
            <div class="stat-card red">
                <div class="stat-label">被风控拦截</div>
                <div class="stat-value" id="blockedCount">0</div>
            </div>
            <div class="stat-card orange">
                <div class="stat-label">失败(其他)</div>
                <div class="stat-value" id="failedCount">0</div>
            </div>
        </div>
        
        <div class="log-panel">
            <h3>📝 实时日志</h3>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let simulationRunning = false;
        let requestCount = 0;
        let successCount = 0;
        let blockedCount = 0;
        let failedCount = 0;
        let tokens = [];

        async function request(url, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (options.token) headers['Authorization'] = `Bearer ${options.token}`;
            return fetch(`${API_BASE}${url}`, { ...options, headers }).then(res => res.json());
        }

        async function init() {
            await loadProducts();
        }

        async function loadProducts() {
            const res = await request('/products');
            if (res.code === 200) {
                const selector = document.getElementById('productSelect');
                selector.innerHTML = '<option value="">选择商品</option>';
                res.data.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    selector.appendChild(opt);
                });
            }
        }

        async function registerUsers(count) {
            const users = [];
            for (let i = 1; i <= count; i++) {
                const username = `sim_user_${Date.now()}_${i}`;
                const password = '123456';
                const res = await request('/users/register', {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });
                if (res.code === 200) {
                    const loginRes = await request('/users/login', {
                        method: 'POST',
                        body: JSON.stringify({ username, password })
                    });
                    if (loginRes.code === 200) {
                        users.push(loginRes.data.token);
                        addLog(`用户 ${username} 注册并登录成功`, 'info');
                    }
                }
                await delay(50);
            }
            return users;
        }

        async function startSimulation() {
            const userCount = parseInt(document.getElementById('userCount').value) || 20;
            const delayMs = parseInt(document.getElementById('requestDelay').value) || 100;
            const productId = document.getElementById('productSelect').value;
            const isBotMode = document.getElementById('isBotMode').value === 'true';

            if (!productId) {
                alert('请选择目标商品');
                return;
            }

            simulationRunning = true;
            requestCount = 0;
            successCount = 0;
            blockedCount = 0;
            failedCount = 0;
            tokens = [];

            document.getElementById('statusIndicator').style.display = 'inline-block';
            document.getElementById('statusText').textContent = '正在注册模拟用户...';
            addLog(`📌 开始模拟：${userCount} 个用户，间隔 ${delayMs}ms${isBotMode ? ' (黄牛模式)' : ''}`, 'info');

            tokens = await registerUsers(userCount);
            addLog(`✅ 已注册 ${tokens.length} 个模拟用户`, 'info');

            document.getElementById('statusText').textContent = '正在发起抢购请求...';
            
            for (let i = 0; i < tokens.length && simulationRunning; i++) {
                if (!simulationRunning) break;
                
                setTimeout(async () => {
                    if (!simulationRunning) return;
                    await sendSeckillRequest(tokens[i], productId, i + 1, isBotMode);
                }, i * delayMs);
            }

            setTimeout(() => {
                if (simulationRunning) {
                    finishSimulation();
                }
            }, tokens.length * delayMs + 2000);
        }

        async function sendSeckillRequest(token, productId, userId, isBotMode) {
            if (!simulationRunning) return;

            if (isBotMode) {
                for (let i = 0; i < 10 && simulationRunning; i++) {
                    await executeRequest(token, productId, userId, i + 1);
                    await delay(100);
                }
            } else {
                await executeRequest(token, productId, userId, 1);
                await delay(2000);
                if (simulationRunning) {
                    await executeRequest(token, productId, userId, 2);
                }
            }
        }

        async function executeRequest(token, productId, userId, attempt) {
            requestCount++;
            updateStats();

            const res = await request('/orders/seckill', {
                method: 'POST',
                body: JSON.stringify({ productId }),
                token
            });

            const timestamp = new Date().toLocaleTimeString('zh-CN');
            
            if (res.code === 200) {
                successCount++;
                addLog(`[${timestamp}] 用户${userId} 第${attempt}次尝试 - ✅ 抢购成功！订单号: ${res.data.id}`, 'success');
            } else if (res.code === 403 && res.message.includes('风控')) {
                blockedCount++;
                addLog(`[${timestamp}] 用户${userId} 第${attempt}次尝试 - ❌ 被AI风控拦截！原因: ${res.message}`, 'fail');
            } else {
                failedCount++;
                addLog(`[${timestamp}] 用户${userId} 第${attempt}次尝试 - ⚠️ 抢购失败: ${res.message}`, 'warning');
            }

            updateStats();
            updateProgress();
        }

        function finishSimulation() {
            simulationRunning = false;
            document.getElementById('statusIndicator').style.display = 'none';
            document.getElementById('statusText').textContent = '模拟结束';
            
            const successRate = requestCount > 0 ? (successCount / requestCount * 100).toFixed(1) : 0;
            const blockRate = requestCount > 0 ? (blockedCount / requestCount * 100).toFixed(1) : 0;
            
            addLog(`\n📊 模拟结束统计：`, 'info');
            addLog(`   总请求数: ${requestCount}`, 'info');
            addLog(`   成功: ${successCount} (${successRate}%)`, 'success');
            addLog(`   被风控拦截: ${blockedCount} (${blockRate}%)`, 'fail');
            addLog(`   其他失败: ${failedCount}`, 'warning');
        }

        function stopSimulation() {
            simulationRunning = false;
            document.getElementById('statusIndicator').style.display = 'none';
            document.getElementById('statusText').textContent = '已停止';
            addLog('⏹️ 用户手动停止模拟', 'info');
        }

        function updateStats() {
            document.getElementById('totalRequests').textContent = requestCount;
            document.getElementById('successCount').textContent = successCount;
            document.getElementById('blockedCount').textContent = blockedCount;
            document.getElementById('failedCount').textContent = failedCount;
        }

        function updateProgress() {
            const total = parseInt(document.getElementById('userCount').value) * (document.getElementById('isBotMode').value === 'true' ? 3 : 1);
            const progress = Math.min((requestCount / total) * 100, 100);
            document.getElementById('progress').style.width = `${progress}%`;
        }

        function addLog(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const item = document.createElement('div');
            item.className = `log-item ${type}`;
            item.textContent = message;
            container.appendChild(item);
            container.scrollTop = container.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '';
            requestCount = 0;
            successCount = 0;
            blockedCount = 0;
            failedCount = 0;
            updateStats();
            document.getElementById('progress').style.width = '0%';
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
