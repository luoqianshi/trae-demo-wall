<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI秒杀系统 - 管理员后台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .login-page { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .login-box { background: #1e293b; padding: 40px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 400px; }
        .login-box h1 { text-align: center; margin-bottom: 30px; font-size: 1.8rem; background: linear-gradient(90deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-box .form-group { margin-bottom: 20px; }
        .login-box label { display: block; margin-bottom: 8px; font-weight: 500; color: #94a3b8; }
        .login-box input { width: 100%; padding: 12px 15px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #fff; font-size: 1rem; transition: border-color 0.3s; }
        .login-box input:focus { outline: none; border-color: #667eea; }
        .login-box button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 8px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .login-box button:hover { transform: translateY(-2px); }
        .login-box .error { color: #ef4444; text-align: center; margin-top: 15px; }

        .admin-layout { display: none; }
        .admin-layout.active { display: flex; }
        .sidebar { width: 280px; background: #1e293b; min-height: 100vh; padding: 20px; border-right: 1px solid #334155; }
        .sidebar .logo { font-size: 1.4rem; font-weight: 700; margin-bottom: 30px; padding: 15px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; text-align: center; }
        .sidebar .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; transition: background 0.2s; color: #94a3b8; }
        .sidebar .nav-item:hover { background: #334155; color: #fff; }
        .sidebar .nav-item.active { background: #667eea; color: #fff; }
        .sidebar .nav-item .icon { font-size: 1.2rem; }
        .sidebar .user-info { position: absolute; bottom: 30px; left: 20px; width: 240px; padding: 15px; border-top: 1px solid #334155; }
        .sidebar .user-info span { color: #94a3b8; display: block; margin-bottom: 8px; }
        .sidebar .logout { padding: 8px 12px; background: #334155; border-radius: 6px; text-align: center; cursor: pointer; color: #94a3b8; font-size: 0.85rem; }
        .sidebar .logout:hover { background: #ef4444; color: #fff; }

        .main-content { flex: 1; padding: 25px; overflow-y: auto; }
        .main-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .main-header h2 { font-size: 1.5rem; }
        .main-header .product-select { padding: 10px 15px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 0.9rem; cursor: pointer; }
        .main-header .product-select:focus { outline: none; border-color: #667eea; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1e293b; padding: 25px; border-radius: 12px; border-left: 4px solid #667eea; }
        .stat-card.orange { border-left-color: #f97316; }
        .stat-card.green { border-left-color: #22c55e; }
        .stat-card.red { border-left-color: #ef4444; }
        .stat-card .stat-label { color: #94a3b8; font-size: 0.85rem; margin-bottom: 8px; }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; color: #fff; }

        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; min-height: 350px; }
        .chart-card { background: #1e293b; padding: 25px; border-radius: 12px; min-height: 350px; display: flex; flex-direction: column; }
        .chart-card h3 { font-size: 1rem; margin-bottom: 20px; color: #94a3b8; flex-shrink: 0; }
        .chart-container { flex: 1; min-height: 280px; }

        .table-section { background: #1e293b; border-radius: 12px; padding: 25px; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .table-header h3 { font-size: 1rem; color: #94a3b8; }
        .btn { padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary { background: #667eea; color: #fff; }
        .btn-primary:hover { background: #5a67d8; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: #334155; color: #fff; }
        .btn-secondary:hover { background: #475569; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; font-weight: 600; font-size: 0.85rem; }
        td { color: #e2e8f0; font-size: 0.9rem; }
        tr:hover { background: #334155; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
        .badge.active { background: #22c55e; color: #000; }
        .badge.inactive { background: #64748b; color: #fff; }
        .badge.risk { background: #ef4444; color: #fff; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: #1e293b; padding: 30px; border-radius: 12px; width: 500px; max-width: 90%; }
        .modal h3 { margin-bottom: 20px; font-size: 1.2rem; }
        .modal .form-group { margin-bottom: 15px; }
        .modal label { display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.9rem; }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 10px 12px; border: 1px solid #334155; border-radius: 6px; background: #0f172a; color: #fff; font-size: 0.9rem; }
        .modal textarea { resize: vertical; min-height: 80px; }
        .modal .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 25px; }
        .modal .error { color: #ef4444; font-size: 0.85rem; margin-top: 5px; }

        .empty-state { text-align: center; padding: 40px; color: #64748b; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 15px; }

        .behavior-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .behavior-header h3 { font-size: 1.2rem; color: #e2e8f0; }
        .user-select { padding: 10px 15px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #fff; font-size: 0.9rem; min-width: 200px; }

        .behavior-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-mini { background: #1e293b; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-mini .label { color: #94a3b8; font-size: 0.8rem; margin-bottom: 5px; }
        .stat-mini .value { color: #e2e8f0; font-size: 1.5rem; font-weight: 600; }

        .behavior-timeline { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; max-height: 400px; overflow-y: auto; }
        .timeline-empty { text-align: center; color: #64748b; padding: 40px; }
        .timeline-item { display: flex; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid #334155; }
        .timeline-item:last-child { border-bottom: none; }
        .timeline-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 15px; margin-top: 4px; }
        .timeline-dot.action { background: #667eea; }
        .timeline-dot.risk { background: #ef4444; }
        .timeline-dot.order { background: #22c55e; }
        .timeline-content { flex: 1; }
        .timeline-content .time { color: #64748b; font-size: 0.75rem; margin-bottom: 3px; }
        .timeline-content .action { color: #e2e8f0; font-size: 0.9rem; }
        .timeline-content .details { color: #94a3b8; font-size: 0.8rem; margin-top: 3px; }
        .timeline-content .risk-score { color: #f97316; font-size: 0.8rem; margin-top: 3px; }
    </style>
</head>
<body>
    <div class="login-page" id="loginPage">
        <div class="login-box">
            <h1>🔒 管理员登录</h1>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="admin">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="admin123">
            </div>
            <button onclick="handleLogin()">登录</button>
            <div class="error" id="loginError"></div>
        </div>
    </div>

    <div class="admin-layout" id="adminLayout">
        <div class="sidebar">
            <div class="logo">🎯 AI秒杀监控</div>
            <div class="nav-item active" onclick="switchTab('dashboard')">
                <span class="icon">📊</span>
                <span>数据监控</span>
            </div>
            <div class="nav-item" onclick="switchTab('products')">
                <span class="icon">📦</span>
                <span>商品管理</span>
            </div>
            <div class="nav-item" onclick="switchTab('risk')">
                <span class="icon">🛡️</span>
                <span>风控日志</span>
            </div>
            <div class="nav-item" onclick="switchTab('orders')">
                <span class="icon">📋</span>
                <span>订单管理</span>
            </div>
            <div class="nav-item" onclick="switchTab('behavior')">
                <span class="icon">🔍</span>
                <span>行为轨迹</span>
            </div>
            <div class="user-info">
                <span>管理员</span>
                <div class="logout" onclick="handleLogout()">退出登录</div>
            </div>
        </div>

        <div class="main-content">
            <div class="main-header">
                <h2 id="pageTitle">实时监控</h2>
                <select class="product-select" id="productSelector" onchange="handleProductChange()">
                    <option value="">选择商品</option>
                </select>
            </div>

            <div id="dashboardTab">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">剩余库存</div>
                        <div class="stat-value" id="statStock">0</div>
                    </div>
                    <div class="stat-card orange">
                        <div class="stat-label">在线人数</div>
                        <div class="stat-value" id="statOnline">0</div>
                    </div>
                    <div class="stat-card green">
                        <div class="stat-label">成功订单</div>
                        <div class="stat-value" id="statOrders">0</div>
                    </div>
                    <div class="stat-card red">
                        <div class="stat-label">黄牛拦截</div>
                        <div class="stat-value" id="statIntercept">0</div>
                    </div>
                </div>

                <div class="charts-row">
                    <div class="chart-card">
                        <h3>流量趋势</h3>
                        <div class="chart-container" id="trafficChart"></div>
                    </div>
                    <div class="chart-card">
                        <h3>成功率走势</h3>
                        <div class="chart-container" id="successChart"></div>
                    </div>
                </div>
            </div>

            <div id="productsTab" style="display: none;">
                <div class="table-section">
                    <div class="table-header">
                        <h3>商品列表</h3>
                        <button class="btn btn-primary" onclick="openAddProductModal()">新增商品</button>
                    </div>
                    <table id="productsTable">
                        <thead>
                            <tr>
                                <th>商品名称</th>
                                <th>类型</th>
                                <th>库存</th>
                                <th>秒杀时间</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="productsBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="riskTab" style="display: none;">
                <div class="table-section">
                    <div class="table-header">
                        <h3>AI风控拦截日志</h3>
                    </div>
                    <table id="riskTable">
                        <thead>
                            <tr>
                                <th>拦截时间</th>
                                <th>用户ID</th>
                                <th>操作类型</th>
                                <th>拦截原因</th>
                                <th>风险评分</th>
                            </tr>
                        </thead>
                        <tbody id="riskBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="ordersTab" style="display: none;">
            <div class="table-section">
                <div class="table-header">
                    <h3>订单列表</h3>
                    <button class="btn btn-danger" onclick="clearAllData()">清空所有数据</button>
                </div>
                <table id="ordersTable">
                    <thead>
                        <tr>
                            <th>订单号</th>
                            <th>用户ID</th>
                            <th>商品名称</th>
                            <th>价格</th>
                            <th>下单时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="ordersBody"></tbody>
                </table>
            </div>
        </div>

        <div id="behaviorTab" style="display: none;">
            <div class="behavior-header">
                <h3>用户行为轨迹分析</h3>
                <select class="user-select" id="userSelector" onchange="loadUserBehavior()">
                    <option value="">选择用户</option>
                </select>
            </div>
            
            <div class="behavior-stats" id="behaviorStats">
                <div class="stat-mini">
                    <span class="label">总操作数</span>
                    <span class="value" id="totalActions">0</span>
                </div>
                <div class="stat-mini">
                    <span class="label">点击次数</span>
                    <span class="value" id="clickCount">0</span>
                </div>
                <div class="stat-mini">
                    <span class="label">平均间隔</span>
                    <span class="value" id="avgInterval">0ms</span>
                </div>
                <div class="stat-mini">
                    <span class="label">每分钟最大点击</span>
                    <span class="value" id="maxClicks">0</span>
                </div>
            </div>
            
            <div class="behavior-timeline" id="behaviorTimeline">
                <div class="timeline-empty">请选择用户查看行为轨迹</div>
            </div>
            
            <div class="charts-row">
                <div class="chart-card">
                    <h3>今日行为统计</h3>
                    <div class="chart-container" id="behaviorChart"></div>
                </div>
            </div>
        </div>
        </div>
    </div>

    <div class="modal-overlay" id="productModal">
        <div class="modal">
            <h3 id="modalTitle">新增商品</h3>
            <input type="hidden" id="editProductId">
            <div class="form-group">
                <label>商品名称 *</label>
                <input type="text" id="productName" placeholder="请输入商品名称">
            </div>
            <div class="form-group">
                <label>商品类型 *</label>
                <select id="productType">
                    <option value="normal">普通商品</option>
                    <option value="ticket">演唱会门票</option>
                </select>
            </div>
            <div class="form-group">
                <label>封面图片</label>
                <input type="text" id="productCover" placeholder="图片URL">
            </div>
            <div class="form-group">
                <label>库存数量 *</label>
                <input type="number" id="productStock" placeholder="100" min="1">
            </div>
            <div class="form-group">
                <label>秒杀时间 *</label>
                <input type="datetime-local" id="productTime">
            </div>
            <div class="form-group">
                <label>商品价格 *</label>
                <input type="number" id="productPrice" placeholder="999" min="0" step="0.01">
            </div>
            <div class="form-group">
                <label>商品简介</label>
                <textarea id="productDesc" placeholder="请输入商品简介"></textarea>
            </div>
            <div class="error" id="formError"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveProduct()">保存</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let token = localStorage.getItem('admin_token');
        let currentProductId = '';
        let trafficChart, successChart;

        function request(url, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            
            return fetch(`${API_BASE}${url}`, {
                ...options,
                headers
            }).then(res => res.json());
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const res = await request('/users/login', {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });
            
            if (res.code === 200) {
                if (res.data.role !== 'admin') {
                    document.getElementById('loginError').textContent = '非管理员账号，无法登录';
                    return;
                }
                token = res.data.token;
                localStorage.setItem('admin_token', token);
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminLayout').classList.add('active');
                initApp();
            } else {
                document.getElementById('loginError').textContent = res.message || '登录失败';
            }
        }

        function handleLogout() {
            token = '';
            localStorage.removeItem('admin_token');
            document.getElementById('adminLayout').classList.remove('active');
            document.getElementById('loginPage').style.display = 'flex';
        }

        async function initApp() {
            initCharts();
            await loadProducts();
            await loadDashboard();
            setInterval(() => {
                if (document.querySelector('.nav-item.active span').textContent === '数据监控') {
                    loadDashboard();
                }
            }, 5000);
        }

        async function loadProducts() {
            const res = await request('/products');
            if (res.code === 200) {
                const selector = document.getElementById('productSelector');
                selector.innerHTML = '<option value="">全部商品</option>';
                res.data.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    selector.appendChild(opt);
                });
                loadProductsTable(res.data);
            }
        }

        async function loadDashboard() {
            const url = currentProductId ? `/stats/overview?productId=${currentProductId}` : '/stats/overview';
            const res = await request(url);
            if (res.code === 200) {
                const productName = currentProductId ? getProductName(currentProductId) : '全部商品';
                document.getElementById('statStock').textContent = `${res.data.totalStock} (${productName})`;
                document.getElementById('statOnline').textContent = res.data.onlineUsers;
                document.getElementById('statOrders').textContent = res.data.todayOrders;
                document.getElementById('statIntercept').textContent = res.data.todayInterceptions;
            }

            const dailyRes = await request('/stats/orders/daily');
            if (dailyRes.code === 200) {
                updateTrafficChart(dailyRes.data);
            }

            const hourlyRes = await request('/stats/orders/hourly');
            if (hourlyRes.code === 200) {
                updateSuccessChart(hourlyRes.data);
            }
        }

        function getProductName(productId) {
            const selector = document.getElementById('productSelector');
            const option = selector.querySelector(`option[value="${productId}"]`);
            return option ? option.textContent : '未知商品';
        }

        function initCharts() {
            const trafficContainer = document.getElementById('trafficChart');
            const successContainer = document.getElementById('successChart');
            
            if (trafficContainer) {
                trafficChart = echarts.init(trafficContainer);
                trafficChart.setOption({
                    backgroundColor: 'transparent',
                    tooltip: { trigger: 'axis' },
                    legend: { data: ['订单数', '拦截数'], textStyle: { color: '#94a3b8' } },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: { type: 'category', data: [], axisLabel: { color: '#94a3b8' }, axisLine: { lineStyle: { color: '#334155' } } },
                    yAxis: { type: 'value', axisLabel: { color: '#94a3b8' }, axisLine: { lineStyle: { color: '#334155' } }, splitLine: { lineStyle: { color: '#334155' } } },
                    series: [
                        { name: '订单数', type: 'line', smooth: true, data: [], lineStyle: { color: '#667eea' } },
                        { name: '拦截数', type: 'line', smooth: true, data: [], lineStyle: { color: '#ef4444' } }
                    ]
                });
            }
            
            if (successContainer) {
                successChart = echarts.init(successContainer);
                successChart.setOption({
                    backgroundColor: 'transparent',
                    tooltip: { trigger: 'axis' },
                    legend: { data: ['成功率(%)', '订单数'], textStyle: { color: '#94a3b8' } },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: { type: 'category', data: [], axisLabel: { color: '#94a3b8', rotate: 45 }, axisLine: { lineStyle: { color: '#334155' } } },
                    yAxis: [
                        { type: 'value', name: '成功率', axisLabel: { color: '#94a3b8', formatter: '{value}%' }, axisLine: { lineStyle: { color: '#334155' } }, splitLine: { lineStyle: { color: '#334155' } } },
                        { type: 'value', name: '订单数', axisLabel: { color: '#94a3b8' }, axisLine: { lineStyle: { color: '#334155' } }, splitLine: { show: false } }
                    ],
                    series: [
                        { name: '成功率(%)', type: 'line', smooth: true, data: [], lineStyle: { color: '#22c55e' }, yAxisIndex: 0 },
                        { name: '订单数', type: 'bar', data: [], itemStyle: { color: '#667eea' }, yAxisIndex: 1 }
                    ]
                });
            }
            
            window.addEventListener('resize', () => {
                trafficChart && trafficChart.resize();
                successChart && successChart.resize();
            });
        }

        function updateTrafficChart(data) {
            const dates = data.map(d => d.date);
            const orders = data.map(d => d.orders);
            const interceptions = data.map(d => d.interceptions);

            trafficChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis' },
                legend: { 
                    data: ['订单数', '拦截数'],
                    textStyle: { color: '#94a3b8' }
                },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: dates,
                    axisLabel: { color: '#94a3b8' },
                    axisLine: { lineStyle: { color: '#334155' } }
                },
                yAxis: {
                    type: 'value',
                    axisLabel: { color: '#94a3b8' },
                    axisLine: { lineStyle: { color: '#334155' } },
                    splitLine: { lineStyle: { color: '#334155' } }
                },
                series: [
                    { name: '订单数', type: 'line', smooth: true, data: orders, lineStyle: { color: '#667eea' }, areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[[0,'rgba(102,126,234,0.3)'],[1,'rgba(102,126,234,0)']]) } },
                    { name: '拦截数', type: 'line', smooth: true, data: interceptions, lineStyle: { color: '#ef4444' }, areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[[0,'rgba(239,68,68,0.3)'],[1,'rgba(239,68,68,0)']]) } }
                ]
            });
        }

        function updateSuccessChart(data) {
            const hours = data.map(d => d.hour);
            const orders = data.map(d => d.orders);
            const interceptions = data.map(d => d.interceptions);
            const successRate = data.map(d => d.orders + d.interceptions > 0 ? Math.round(d.orders / (d.orders + d.interceptions) * 100) : 0);

            successChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis' },
                legend: { 
                    data: ['成功率(%)', '订单数'],
                    textStyle: { color: '#94a3b8' }
                },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: hours,
                    axisLabel: { color: '#94a3b8', rotate: 45 },
                    axisLine: { lineStyle: { color: '#334155' } }
                },
                yAxis: [
                    { type: 'value', name: '成功率', axisLabel: { color: '#94a3b8', formatter: '{value}%' }, axisLine: { lineStyle: { color: '#334155' } }, splitLine: { lineStyle: { color: '#334155' } } },
                    { type: 'value', name: '订单数', axisLabel: { color: '#94a3b8' }, axisLine: { lineStyle: { color: '#334155' } }, splitLine: { show: false } }
                ],
                series: [
                    { name: '成功率(%)', type: 'line', smooth: true, data: successRate, lineStyle: { color: '#22c55e' }, yAxisIndex: 0 },
                    { name: '订单数', type: 'bar', data: orders, itemStyle: { color: '#667eea' }, yAxisIndex: 1 }
                ]
            });
        }

        function loadProductsTable(products) {
            const tbody = document.getElementById('productsBody');
            tbody.innerHTML = '';
            
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><div class="icon">📭</div>暂无商品</td></tr>';
                return;
            }

            products.forEach(p => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${p.name}</td>
                    <td>${p.type === 'normal' ? '普通商品' : '演唱会门票'}</td>
                    <td>${p.stock}</td>
                    <td>${formatDateTime(p.seckillStartTime)}</td>
                    <td><span class="badge ${p.status}">${p.status === 'active' ? '上架' : '下架'}</span></td>
                    <td>
                        <button class="btn btn-secondary" onclick="editProduct('${p.id}')">编辑</button>
                        <button class="btn ${p.status === 'active' ? 'btn-danger' : 'btn-primary'}" onclick="toggleProductStatus('${p.id}', '${p.status}')">${p.status === 'active' ? '下架' : '上架'}</button>
                        <button class="btn btn-danger" onclick="deleteProduct('${p.id}')">删除</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function openAddProductModal() {
            document.getElementById('modalTitle').textContent = '新增商品';
            document.getElementById('editProductId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productType').value = 'normal';
            document.getElementById('productCover').value = '';
            document.getElementById('productStock').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productTime').value = '';
            document.getElementById('productDesc').value = '';
            document.getElementById('formError').textContent = '';
            document.getElementById('productModal').classList.add('active');
        }

        async function editProduct(id) {
            const res = await request(`/products/${id}`);
            if (res.code === 200) {
                const p = res.data;
                document.getElementById('modalTitle').textContent = '编辑商品';
                document.getElementById('editProductId').value = p.id;
                document.getElementById('productName').value = p.name;
                document.getElementById('productType').value = p.type;
                document.getElementById('productCover').value = p.cover;
                document.getElementById('productStock').value = p.stock;
                document.getElementById('productPrice').value = p.price;
                document.getElementById('productTime').value = formatLocalDateTime(p.seckillStartTime);
                document.getElementById('productDesc').value = p.description;
                document.getElementById('formError').textContent = '';
                document.getElementById('productModal').classList.add('active');
            }
        }

        async function saveProduct() {
            const id = document.getElementById('editProductId').value;
            const name = document.getElementById('productName').value;
            const type = document.getElementById('productType').value;
            const cover = document.getElementById('productCover').value;
            const stock = document.getElementById('productStock').value;
            const price = document.getElementById('productPrice').value;
            const time = document.getElementById('productTime').value;
            const desc = document.getElementById('productDesc').value;

            if (!name || !stock || !price || !time) {
                document.getElementById('formError').textContent = '请填写必填字段';
                return;
            }

            const data = { name, type, cover, stock, price, seckillStartTime: new Date(time).toISOString(), description: desc };
            const url = id ? `/products/${id}` : '/products';
            const method = id ? 'PUT' : 'POST';

            const res = await request(url, { method, body: JSON.stringify(data) });
            if (res.code === 200) {
                closeModal();
                await loadProducts();
            } else {
                document.getElementById('formError').textContent = res.message || '保存失败';
            }
        }

        async function toggleProductStatus(id, status) {
            const newStatus = status === 'active' ? 'inactive' : 'active';
            const res = await request(`/products/${id}/status`, {
                method: 'PUT',
                body: JSON.stringify({ status: newStatus })
            });
            if (res.code === 200) {
                await loadProducts();
            }
        }

        async function deleteProduct(id) {
            if (!confirm('确定删除该商品？')) return;
            const res = await request(`/products/${id}`, { method: 'DELETE' });
            if (res.code === 200) {
                await loadProducts();
            }
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        async function loadRiskLogs() {
            const res = await request('/risk/logs');
            if (res.code === 200) {
                const tbody = document.getElementById('riskBody');
                tbody.innerHTML = '';
                
                if (res.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state"><div class="icon">🛡️</div>暂无拦截记录</td></tr>';
                    return;
                }

                res.data.slice().reverse().forEach(log => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${formatDateTime(log.timestamp)}</td>
                        <td>${log.userId}</td>
                        <td>${log.action}</td>
                        <td><span class="badge risk">${log.reason}</span></td>
                        <td>${log.riskScore}</td>
                    `;
                    tbody.appendChild(row);
                });
            }
        }

        async function loadOrders() {
            const res = await request('/orders');
            if (res.code === 200) {
                const tbody = document.getElementById('ordersBody');
                tbody.innerHTML = '';
                
                if (res.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><div class="icon">📋</div>暂无订单</td></tr>';
                    return;
                }

                res.data.slice().reverse().forEach(order => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${order.id}</td>
                        <td>${order.userId}</td>
                        <td>${order.productName}</td>
                        <td>¥${order.price}</td>
                        <td>${formatDateTime(order.createdAt)}</td>
                        <td><button class="btn btn-danger" style="padding: 4px 10px; font-size: 0.8rem;" onclick="deleteOrder('${order.id}')">删除</button></td>
                    `;
                    tbody.appendChild(row);
                });
            }
        }

        async function deleteOrder(orderId) {
            if (!confirm('确定删除此订单？删除后库存将恢复。')) return;
            const res = await request(`/orders/${orderId}`, { method: 'DELETE' });
            if (res.code === 200) {
                loadOrders();
                loadProducts();
                loadDashboard();
            } else {
                alert(res.message || '删除失败');
            }
        }

        async function clearAllData() {
            if (!confirm('⚠️ 警告：此操作将清空所有订单、风控日志和用户操作记录，并恢复所有商品库存。确定继续？')) return;
            const res = await request('/orders', { method: 'DELETE' });
            if (res.code === 200) {
                loadOrders();
                loadProducts();
                loadRiskLogs();
                loadDashboard();
                alert('数据已清空，库存已恢复');
            } else {
                alert(res.message || '操作失败');
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                if (item.textContent.includes(getTabName(tab))) {
                    item.classList.add('active');
                }
            });
            
            document.getElementById('dashboardTab').style.display = 'none';
            document.getElementById('productsTab').style.display = 'none';
            document.getElementById('riskTab').style.display = 'none';
            document.getElementById('ordersTab').style.display = 'none';
            document.getElementById('behaviorTab').style.display = 'none';

            document.getElementById(`${tab}Tab`).style.display = 'block';
            document.getElementById('pageTitle').textContent = getTabTitle(tab);

            if (tab === 'risk') loadRiskLogs();
            if (tab === 'orders') loadOrders();
            if (tab === 'dashboard') loadDashboard();
            if (tab === 'behavior') loadBehaviorData();
        }

        function getTabName(tab) {
            const names = { dashboard: '数据监控', products: '商品管理', risk: '风控日志', orders: '订单管理', behavior: '行为轨迹' };
            return names[tab] || tab;
        }

        function getTabTitle(tab) {
            const titles = { dashboard: '实时监控', products: '商品管理', risk: 'AI风控拦截日志', orders: '订单管理', behavior: '用户行为轨迹' };
            return titles[tab] || tab;
        }

        function handleProductChange() {
            currentProductId = document.getElementById('productSelector').value;
            loadDashboard();
        }

        function formatDateTime(dt) {
            const date = new Date(dt);
            return date.toLocaleString('zh-CN');
        }

        function formatLocalDateTime(dt) {
            const date = new Date(dt);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        async function loadBehaviorData() {
            const res = await request('/users/list');
            if (res.code === 200) {
                const selector = document.getElementById('userSelector');
                selector.innerHTML = '<option value="">选择用户</option>';
                res.data.forEach(u => {
                    const opt = document.createElement('option');
                    opt.value = u.id;
                    opt.textContent = `${u.username} (${u.role}) - 风险评分: ${u.stats.riskScore}`;
                    selector.appendChild(opt);
                });
            }
            
            await loadBehaviorStats();
        }

        async function loadBehaviorStats() {
            const res = await request('/users/behavior-stats');
            if (res.code === 200 && res.data.length > 0) {
                const chart = echarts.init(document.getElementById('behaviorChart'));
                const hours = res.data.map(d => d.hour);
                const actions = res.data.map(d => d.actions);
                const risks = res.data.map(d => d.risks);
                const orders = res.data.map(d => d.orders);
                
                chart.setOption({
                    backgroundColor: 'transparent',
                    tooltip: { trigger: 'axis' },
                    legend: { 
                        data: ['操作数', '拦截数', '订单数'],
                        textStyle: { color: '#94a3b8' }
                    },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: {
                        type: 'category',
                        data: hours,
                        axisLabel: { color: '#94a3b8', rotate: 45 },
                        axisLine: { lineStyle: { color: '#334155' } }
                    },
                    yAxis: {
                        type: 'value',
                        axisLabel: { color: '#94a3b8' },
                        axisLine: { lineStyle: { color: '#334155' } },
                        splitLine: { lineStyle: { color: '#334155' } }
                    },
                    series: [
                        { name: '操作数', type: 'bar', data: actions, itemStyle: { color: '#667eea' } },
                        { name: '拦截数', type: 'bar', data: risks, itemStyle: { color: '#ef4444' } },
                        { name: '订单数', type: 'bar', data: orders, itemStyle: { color: '#22c55e' } }
                    ]
                });
            }
        }

        async function loadUserBehavior() {
            const userId = document.getElementById('userSelector').value;
            if (!userId) {
                document.getElementById('behaviorTimeline').innerHTML = '<div class="timeline-empty">请选择用户查看行为轨迹</div>';
                document.getElementById('totalActions').textContent = '0';
                document.getElementById('clickCount').textContent = '0';
                document.getElementById('avgInterval').textContent = '0ms';
                document.getElementById('maxClicks').textContent = '0';
                return;
            }
            
            const res = await request(`/users/behavior-trace/${userId}`);
            if (res.code === 200) {
                const data = res.data;
                
                document.getElementById('totalActions').textContent = data.stats.totalActions;
                document.getElementById('clickCount').textContent = data.stats.clickCount;
                document.getElementById('avgInterval').textContent = `${data.stats.avgInterval}ms`;
                document.getElementById('maxClicks').textContent = data.stats.maxClicksPerMinute;
                
                if (data.timeline.length === 0) {
                    document.getElementById('behaviorTimeline').innerHTML = '<div class="timeline-empty">该用户暂无行为记录</div>';
                    return;
                }
                
                const timelineHtml = data.timeline.map(item => {
                    const dotClass = item.type === 'action' ? 'action' : item.type === 'risk' ? 'risk' : 'order';
                    const icon = item.type === 'action' ? '🔵' : item.type === 'risk' ? '🔴' : '🟢';
                    const time = new Date(item.timestamp).toLocaleString('zh-CN');
                    
                    return `
                        <div class="timeline-item">
                            <div class="timeline-dot ${dotClass}"></div>
                            <div class="timeline-content">
                                <div class="time">${time}</div>
                                <div class="action">${icon} ${item.action}</div>
                                ${item.details ? `<div class="details">${item.details}</div>` : ''}
                                ${item.riskScore > 0 ? `<div class="risk-score">风险评分: ${item.riskScore}</div>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
                
                document.getElementById('behaviorTimeline').innerHTML = timelineHtml;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (token) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminLayout').classList.add('active');
                initApp();
            }
        });
    </script>
</body>
</html>
