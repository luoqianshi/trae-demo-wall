<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevToolkit - 开发者工具箱</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h1>DevToolkit</h1>
                <span class="version">v1.0</span>
            </div>
            <nav class="module-nav">
                <div class="nav-section">
                    <h3>数据处理</h3>
                    <ul>
                        <li data-module="json" class="nav-item active">JSON 格式化</li>
                        <li data-module="xml" class="nav-item">XML 格式化</li>
                        <li data-module="url" class="nav-item">URL 编码/解码</li>
                        <li data-module="base64" class="nav-item">Base64 编码/解码</li>
                    </ul>
                </div>
                <div class="nav-section">
                    <h3>转换工具</h3>
                    <ul>
                        <li data-module="image" class="nav-item">图片格式转换</li>
                        <li data-module="date" class="nav-item">日期转换</li>
                        <li data-module="color" class="nav-item">颜色转换</li>
                    </ul>
                </div>
                <div class="nav-section">
                    <h3>加密安全</h3>
                    <ul>
                        <li data-module="md5" class="nav-item">MD5 加密</li>
                        <li data-module="sha" class="nav-item">SHA 加密</li>
                    </ul>
                </div>
                <div class="nav-section">
                    <h3>生成工具</h3>
                    <ul>
                        <li data-module="qrcode" class="nav-item">二维码生成</li>
                        <li data-module="uuid" class="nav-item">UUID 生成</li>
                    </ul>
                </div>
                <div class="nav-section">
                    <h3>插件扩展</h3>
                    <ul>
                        <li data-module="redis" class="plugin-item nav-item">Redis 直连</li>
                        <li data-module="mysql" class="plugin-item nav-item">MySQL 直连</li>
                        <li data-module="linuxcmd" class="plugin-item nav-item">Linux 指令集</li>
                        <li data-module="docker" class="plugin-item nav-item">Docker 指令集</li>
                        <li data-module="llm" class="plugin-item nav-item">大模型指令集</li>
                    </ul>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button id="theme-toggle" class="btn btn-secondary" style="padding:6px 12px;font-size:12px;width:100%;">切换主题</button>
            </div>
        </aside>
        <main class="main-content">
            <header class="toolbar">
                <h2 id="moduleTitle">JSON 格式化</h2>
            </header>
            <div id="content" class="content-area"></div>
            <footer class="status-bar">
                <span id="status-bar">就绪</span>
                <span class="plugin-count">13 个工具可用</span>
            </footer>
        </main>
    </div>

    <script src="js/modules/json.js"></script>
    <script src="js/modules/xml.js"></script>
    <script src="js/modules/url.js"></script>
    <script src="js/modules/base64.js"></script>
    <script src="js/modules/image.js"></script>
    <script src="js/modules/date.js"></script>
    <script src="js/modules/color.js"></script>
    <script src="js/modules/md5.js"></script>
    <script src="js/modules/sha.js"></script>
    <script src="js/modules/qrcode.js"></script>
    <script src="js/modules/uuid.js"></script>
    <script src="js/modules/redis.js"></script>
    <script src="js/modules/mysql.js"></script>
    <script src="js/modules/linuxcmd.js"></script>
    <script src="js/modules/docker.js"></script>
    <script src="js/modules/llm.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
