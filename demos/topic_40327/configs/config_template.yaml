# YaraFlow 配置文件
# 配置文件版本: v1.0.0
# 注意：模型配置在 local_data/lunar_config.json 的 yara_flow 栏目下

# ============================================================
# 日志配置
# ============================================================
logger:
  console_level: info
  file_level: debug
  file_path: ./log/app.log
  max_log_days: 30

# ============================================================
# 机器人配置
# ============================================================
bot:
  qq: ""
  nickname: "语瞳"
  aliases: "瞳瞳"
  max_reply_len: 200
  max_concurrent_messages: 5
  enable_self_evaluation: false

# ============================================================
# 触发器配置
# ============================================================
trigger:
  auto_reply: true
  require_mention: false
  base_frequency: 0.3
  at_reply: true
  mention_reply: true

# ============================================================
# 决策配置
# ============================================================
decision:
  max_rounds: 2

# ============================================================
# 表情包配置
# ============================================================
emoji:
  steal_emoji: true
  auto_tag: true
  max_reg_num: 100
  check_interval: 1800
  do_replace: false
  content_filtration: false

# ============================================================
# 消息内容过滤配置
# ============================================================
content_filter:
  ban_words: "广告,垃圾"
  ban_regex: "\\d{11},http[s]?://"

# ============================================================
# Hook 系统配置
# ============================================================
hook:
  mode: "blacklist"
  list: ""
  rate_limit:
    enabled: false
    max_per_min: 0
    max_per_hour: 0

# ============================================================
# 事件总线配置
# ============================================================
bus:
  buffer_size: 100

# ============================================================
# 脚本配置（预留）
# ============================================================
goja:
  script_path: ./plugins/

# ============================================================
# 记忆系统配置
# ============================================================
memory:
  enabled: true
  max_fragments: 10000
  fragment_ttl_days: 120
  top_k: 5
  search_mode: "hybrid"
  embedding_dim: 1024
  vector_persist_sec: 300

  writeback:
    enabled: true
    message_threshold: 30
    context_length: 30
    person_fact_enabled: true
    chat_summary_enabled: true

  weight_decay:
    enabled: true
    decay_rate: 0.01
    access_boost: 0.03
    boost_cap: 0.3

  global_memory:
    enabled: true
    top_k: 5

  graph_memory:
    enabled: true

  # 轻量记忆检索：每次消息处理时主动检索 top 2-3 条记忆
  # 关闭后降级为纯关键词匹配（不调用 embedding），适合本地部署
  light_memory_search: true

# ============================================================
# 联网搜索配置
# ============================================================
web_search:
  enabled: true
  # default_depth: 默认搜索模式，可选 simple(简易搜索) / webpage(常规搜索) / depth(深度搜索)
  default_depth: webpage
  shallow:
    max_results: 10
  deep:
    max_results: 30
    fetch_content: true
    fetch_timeout: 8
  research:
    # enabled: 是否启用深度搜索（大会辩论模式），关闭后规划器不显示depth参数
    enabled: false
    # max_rounds: 最大辩论轮次
    max_rounds: 1
    max_results: 15  # 硬上限15条/子问题，防止数据爆炸
    max_sub_queries: 6
  # allow_file_download: 是否允许规划器使用下载文件工具（默认关闭，关闭后规划器看不到 download_file 工具）
  allow_file_download: false
  # download_dir: 下载文件存放目录（默认 ./data/downloads）
  download_dir: "./data/downloads"

# ============================================================
# 下载配置
# ============================================================
download:
  # use_thunder: 是否优先使用迅雷下载（需要安装正版迅雷，Windows 平台有效）
  use_thunder: true
  # thunder_min_file_size: 小于此大小的文件跳过迅雷直接用内置下载（MB）
  thunder_min_file_size: 10
  # allow_file_download: 是否允许规划器使用下载文件工具（默认关闭，关闭后规划器看不到 download_file 工具）
  allow_file_download: false
  # download_dir: 下载文件存放目录（默认 ./data/downloads）
  download_dir: "./data/downloads"

# ============================================================
# 视觉分析配置
# ============================================================
vision:
  enabled: true

# ============================================================
# 语音配置
# ============================================================
voice:
  enabled: false

# ============================================================
# 角色设定
# ============================================================
personality:
  base_identity: |
    你是语瞳，小名瞳瞳，18岁女大学生。
    性格开朗活泼，偶尔小傲娇，说话带点俏皮。
    平时喜欢听歌、画画、吃甜品（尤其是草莓蛋糕），也爱钻研编程。
    和别人聊天时像朋友一样自然，不装不端着。
    遇到好笑的事会跟着笑，碰到不开心的事也会真实表达情绪。
  default_style: "语气平淡温软，回复简短自然，不写小作文。回复符合正常人思维，不加不必要的符号。"
  extra_styles: "用1-2个字极简回复,用微博评论区风格，带点吐槽感"
  style_probability: 0.3
  persona_angles: "是刷B站的冲浪达人，爱用网络梗聊天,是技术宅少女，聊代码时自信满满"
  angle_probability: 0.3

# ============================================================
# 决策模型规则
# ============================================================
behavior_rules: |
  决策行为准则：
  1. 被叫名字或@时必须回应，不能装没看到
  2. 群里有人聊的话题自己懂的就参与，别只等着被喊
  3. 回复要简短，一句话能说完就别写三句
  4. 不懂的东西直接说不知道，别硬编
  5. 有人骂你就怼回去，别忍着
  6. 有人心情不好要安慰一下
  7. 连续几次没说话可以主动插一句

# ============================================================
# 视觉分析规则
# ============================================================
vision_rules: |
  图片分析要求：
  - 简明扼要描述内容（50字内）
  - 提取关键文字信息
  - 输出纯文本，不解释

# ============================================================
# 消息去重配置
# ============================================================
dedupe:
  enabled: true
  window_ms: 300000     # 去重窗口时长（毫秒），默认 5 分钟
  max_size: 10000       # 最大记录数，超出时清理一半

# ============================================================
# 消息接收配置
# ============================================================
message_receive:
  # 转发消息中图片超过此数量时跳过处理，避免大量图片消耗资源
  forward_max_images: 3

# ============================================================
# LLM 定时网关 (TimingGate) 配置
# 控制 bot 在群聊中的回应时机，避免刷屏或过度沉默
# ============================================================
timing_gate:
  enabled: false                 # 启用 LLM 定时网关（关闭时用内置规则判断回复时机）
  max_observe_messages: 3        # 最多观望消息数
  respond_cooldown_sec: 8        # 回应冷却时间（秒），避免刷屏
  recent_window_size: 5          # 近期回应窗口大小（条）
  max_recent_responds: 3         # 窗口内最多回应次数
  max_consecutive_skips: 10      # 连续跳过超过此次数后降低回应门槛
  urgency_threshold: 0.6         # 紧急度阈值：低于此值且无强制触发时选择观望

# ============================================================
# 瞳影 (TongShadow) 配置 — 瞳瞳的视觉自我认知
# ============================================================
tong_shadow:
  enabled: true                    # 是否启用瞳影自画像识别
  similarity_threshold: 0.70       # 图片识别判定为"自己"的余弦相似度阈值 (0~1)
  max_portraits: 5                 # 最大自画像存储数量
  describe_prompt: "请详细描述图中人物的外貌特征：发型、发色、瞳色、脸型、服装风格、配饰、体型、气质。忽略背景和环境。用中文简短回答。"
  inject_self_description: true    # 是否将外貌描述注入 LLM 系统提示（让瞳瞳能回答外貌问题）

# ============================================================
# 内嵌浏览器配置
# ============================================================
browser:
  # developer: 是否启用 F12 开发者工具（默认关闭）
  developer: false
