<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WorkSOP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #F5F0E8;
      --bg2: #EDE6D8;
      --ink: #3D3229;
      --muted: #8C7E6E;
      --rule: #D4C8B8;
      --accent: #8B7355;
      --accent2: #A68B6B;
      --card: #FAF6F0;
      --danger: #C4786A;
      --success: #7A9E7E;
    }
    @font-face { font-family: 'Lora'; src: url('./_shared/fonts/Lora-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'Lora'; src: url('./_shared/fonts/Lora-Bold.ttf') format('truetype'); font-weight: 700; }
    @font-face { font-family: 'WorkSans'; src: url('./_shared/fonts/WorkSans-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'WorkSans'; src: url('./_shared/fonts/WorkSans-Bold.ttf') format('truetype'); font-weight: 700; }

    html, body {
      height: 100%;
      font-family: 'WorkSans', -apple-system, sans-serif;
      background: #E8E0D4;
      color: var(--ink);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 手机外壳 */
    .phone-frame {
      width: 390px;
      height: 844px;
      background: #1a1a1a;
      border-radius: 48px;
      padding: 12px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
      position: relative;
    }
    .phone-screen {
      width: 100%;
      height: 100%;
      background: var(--bg);
      border-radius: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 34px;
      background: #1a1a1a;
      border-radius: 0 0 24px 24px;
      z-index: 100;
    }

    /* 顶部状态栏 */
    .status-bar {
      height: 44px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 6px;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      position: relative;
      z-index: 99;
    }

    /* 页面内容区 */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px 80px;
      -webkit-overflow-scrolling: touch;
    }
    .content-area::-webkit-scrollbar { display: none; }

    /* AI 页面特殊处理 */
    #page-ai .content-area {
      padding-bottom: 100px;
    }

    /* 页面标题 */
    .page-header {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 16px;
      padding-top: 4px;
    }

    /* 导航 */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72px;
      background: rgba(250,246,240,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 4px 8px;
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: none;
      color: var(--muted);
      font-family: inherit;
    }
    .nav-item.active {
      color: var(--accent);
    }
    .nav-item.ai-btn {
      position: relative;
      top: -16px;
    }
    .nav-item.ai-btn .nav-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(139,115,85,0.4);
    }
    .nav-item.ai-btn.active .nav-icon {
      background: var(--ink);
    }
    .nav-icon {
      width: 24px;
      height: 24px;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-label {
      font-size: 10px;
      font-weight: 600;
    }

    /* 卡片 */
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--rule);
      position: relative;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      flex: 1;
    }
    .card-actions {
      display: flex;
      gap: 8px;
    }
    .card-action {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid var(--rule);
      background: none;
      color: var(--muted);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .card-action:hover { color: var(--accent); }
    .card-body {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }
    .card-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
      margin-right: 4px;
    }
    .tag-workflow { background: #E8DDD0; color: var(--accent); }
    .tag-result { background: #D8E4D5; color: var(--success); }
    .tag-person { background: #D5DDE8; color: #6B7B94; }
    .tag-error { background: #E8D5D0; color: var(--danger); }

    /* 按钮 */
    .btn {
      padding: 10px 20px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:active { transform: scale(0.96); }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--rule);
      color: var(--ink);
    }
    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 8px;
    }

    /* 输入框 */
    .input-group {
      margin-bottom: 12px;
    }
    .input-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 6px;
      display: block;
    }
    .input-field {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--rule);
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      background: var(--card);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus { border-color: var(--accent); }
    textarea.input-field {
      min-height: 80px;
      resize: vertical;
    }

    /* 模态框 */
    .modal-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 200;
      padding-bottom: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal-sheet {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-height: 85%;
      overflow-y: auto;
      padding: 20px 16px 30px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .modal-title {
      font-family: 'Lora', serif;
      font-size: 18px;
      font-weight: 700;
    }
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--rule);
      background: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* AI 页面 */
    .ai-input-area {
      background: var(--card);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1.5px solid var(--rule);
    }
    .ai-textarea {
      width: 100%;
      min-height: 120px;
      border: none;
      background: transparent;
      font-size: 15px;
      font-family: inherit;
      color: var(--ink);
      outline: none;
      resize: none;
    }
    .ai-textarea::placeholder { color: var(--muted); }
    .ai-send-btn {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      font-size: 15px;
    }
    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .chip {
      padding: 8px 14px;
      border-radius: 20px;
      background: var(--bg2);
      border: 1px solid var(--rule);
      font-size: 12px;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .chip:hover { background: var(--accent); color: white; border-color: var(--accent); }
    .ai-analyzing {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    .ai-analyzing.show { display: block; }
    .ai-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 12px;
    }
    .ai-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.4s infinite ease-in-out;
    }
    .ai-dot:nth-child(2) { animation-delay: 0.2s; }
    .ai-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
    .ai-result {
      display: none;
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      border: 1.5px solid var(--accent);
      margin-bottom: 16px;
    }
    .ai-result.show { display: block; }
    .ai-result-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .ai-result-item {
      padding: 8px 0;
      border-bottom: 1px solid var(--rule);
      font-size: 13px;
    }
    .ai-result-item:last-child { border-bottom: none; }
    .ai-result-label {
      font-weight: 600;
      color: var(--ink);
    }
    .ai-result-value {
      color: var(--muted);
      margin-top: 2px;
    }
    .ai-confirm-btns {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .ai-confirm-btns .btn { flex: 1; }

    /* 快速备忘 */
    .memo-card {
      background: var(--bg2);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      border: 1.5px dashed var(--rule);
      position: relative;
    }
    .memo-text {
      font-size: 14px;
      color: var(--ink);
      line-height: 1.6;
    }
    .memo-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .memo-expand {
      font-size: 12px;
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
    }

    /* 拖拽排序 */
    .sort-handle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      cursor: grab;
      padding: 4px;
    }
    .sort-handle:active { cursor: grabbing; }

    /* 隐藏页面 */
    .page {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    .page.active {
      display: flex;
    }
    .page > .content-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 16px 80px;
    }
    .page > .content-area::-webkit-scrollbar { display: none; }

    /* 添加按钮 */
    .fab {
      position: absolute;
      bottom: 88px;
      right: 16px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(139,115,85,0.4);
      z-index: 90;
      transition: transform 0.2s;
    }
    .fab:active { transform: scale(0.92); }
    .fab.hidden { display: none; }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
    .empty-text {
      font-size: 14px;
    }

    /* 排序按钮组 */
    .sort-controls {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="notch"></div>
      <div class="status-bar">
        <span>9:41</span>
        <span>WorkSOP</span>
        <span>100%</span>
      </div>

      <!-- 工作流程页面 -->
      <div class="page active" id="page-workflow">
        <div class="content-area">
          <div class="page-header">工作流程</div>
          <div id="workflow-list"></div>
        </div>
        <button class="fab" onclick="openModal('workflow')">+</button>
      </div>

      <!-- 工作成果页面 -->
      <div class="page" id="page-result">
        <div class="content-area">
          <div class="page-header">工作成果</div>
          <div id="result-list"></div>
        </div>
        <button class="fab" onclick="openModal('result')">+</button>
      </div>

      <!-- AI 页面 -->
      <div class="page" id="page-ai">
        <div class="content-area">
          <div class="page-header">AI 助手（展示目的，未调用大模型）</div>
          <div class="example-chips">
            <button class="chip" onclick="fillExample(0)">整理投放数据</button>
            <button class="chip" onclick="fillExample(1)">开会记录</button>
            <button class="chip" onclick="fillExample(2)">群聊找人</button>
            <button class="chip" onclick="fillExample(3)">数据出错</button>
          </div>
          <div class="ai-input-area">
            <textarea class="ai-textarea" id="ai-input" placeholder="粘贴工作群消息、会议纪要，或记录今天做了什么..."></textarea>
            <button class="btn btn-primary ai-send-btn" onclick="analyzeAI()">AI 分析</button>
          </div>
          <div class="ai-analyzing" id="ai-analyzing">
            <div class="ai-dots">
              <div class="ai-dot"></div>
              <div class="ai-dot"></div>
              <div class="ai-dot"></div>
            </div>
            <p style="color: var(--muted); font-size: 14px;">AI 正在分析...</p>
          </div>
          <div class="ai-result" id="ai-result">
            <div class="ai-result-title">分析结果</div>
            <div id="ai-result-content"></div>
            <div class="ai-confirm-btns">
              <button class="btn btn-outline" onclick="cancelAI()">取消</button>
              <button class="btn btn-primary" onclick="confirmAI()">确认保存</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 协作关系页面 -->
      <div class="page" id="page-person">
        <div class="content-area">
          <div class="page-header">协作关系</div>
          <div id="person-list"></div>
        </div>
        <button class="fab" onclick="openModal('person')">+</button>
      </div>

      <!-- 错误经验页面 -->
      <div class="page" id="page-error">
        <div class="content-area">
          <div class="page-header">错误经验</div>
          <div id="error-list"></div>
        </div>
        <button class="fab" onclick="openModal('error')">+</button>
      </div>

      <!-- 底部导航 -->
      <div class="bottom-nav">
        <button class="nav-item active" onclick="switchPage('workflow')" data-page="workflow">
          <span class="nav-icon">&#128203;</span>
          <span class="nav-label">流程</span>
        </button>
        <button class="nav-item" onclick="switchPage('result')" data-page="result">
          <span class="nav-icon">&#127942;</span>
          <span class="nav-label">成果</span>
        </button>
        <button class="nav-item ai-btn" onclick="switchPage('ai')" data-page="ai">
          <span class="nav-icon">AI</span>
          <span class="nav-label">助手</span>
        </button>
        <button class="nav-item" onclick="switchPage('person')" data-page="person">
          <span class="nav-icon">&#128101;</span>
          <span class="nav-label">关系</span>
        </button>
        <button class="nav-item" onclick="switchPage('error')" data-page="error">
          <span class="nav-icon">&#128721;</span>
          <span class="nav-label">错误</span>
        </button>
      </div>

      <!-- 模态框 -->
      <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal-sheet" id="modal-sheet">
          <div class="modal-header">
            <span class="modal-title" id="modal-title">新建</span>
            <button class="modal-close" onclick="closeModal()">&times;</button>
          </div>
          <div id="modal-body"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 模拟数据
    let data = {
      workflow: [
        { id: 1, title: '小红书投放数据整理', background: '为周会复盘投放效果', steps: ['确认数据口径', '拉取投放数据', '清洗表格', '按维度汇总', '输出周会版本'], people: ['运营同事', 'mentor'], deliverable: '周会投放数据表', notes: '先确认口径再做表', frequency: '每周' },
        { id: 2, title: '用户反馈分类整理', background: '收集并分析用户反馈', steps: ['收集反馈', '按类型分类', '统计高频问题', '输出反馈报告'], people: ['产品 Mia'], deliverable: '用户反馈分类表', notes: '注意区分新旧版本反馈', frequency: '每周' }
      ],
      result: [
        { id: 1, title: 'Q3 投放效果复盘表', type: '数据分析', contribution: '独立完成数据清洗和汇总', goal: '支持团队判断投放效果', result: '整理 200+ 条投放数据', tags: ['数据分析', '业务理解'], resume: '参与小红书投放效果复盘，负责整理多渠道投放数据并确认统计口径', interview: '我在实习中负责过投放数据整理，会先确认数据口径再做表' },
        { id: 2, memo: '今天整理了 50 条用户反馈，还没分类完，明天继续' }
      ],
      person: [
        { id: 1, name: '林姐', role: '我的 mentor', note: '周三下午有空，沟通前先发消息' },
        { id: 2, name: '小周', role: '行政', note: '打印装订找她，提前说数量' },
        { id: 3, name: '阿杰', role: '数据同事', note: '数据口径问题问他，别直接用旧表' },
        { id: 4, name: 'Mia', role: '产品经理', note: '功能表更新前先对版本范围' }
      ],
      error: [
        { id: 1, desc: '投放数据时间范围搞错', type: '数据错误', scene: '小红书投放数据整理', cause: '没确认时间口径', impact: '表格数据不准确', solution: '重新拉取正确范围数据', checklist: ['确认时间范围', '确认数据口径'], severity: '一般' },
        { id: 2, memo: '今天发周报忘记同步给设计同事了' }
      ]
    };

    let currentPage = 'workflow';
    let aiResultData = null;
    let editingId = null;
    let editingType = null;

    // 示例文本
    const examples = [
      '今天整理了小红书投放数据，问了运营同事数据口径，改了三版表格，最后给 mentor 做周会用。',
      '下午开了需求评审会，产品 Mia 说下周要上线新功能，让我准备测试用例。',
      '林姐：明天部门会要打印 20 份活动复盘材料，先找行政小周确认打印和装订。运营 Ken：活动素材在素材库里，拿不准用哪个就问我。',
      '今天整理投放数据时搞错了时间范围，问了阿杰才改过来，下次要先确认口径。'
    ];

    // 切换页面
    function switchPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelector('.nav-item[data-page="' + page + '"]').classList.add('active');
      currentPage = page;
      renderPage(page);
    }

    // 渲染页面
    function renderPage(page) {
      if (page === 'workflow') renderWorkflow();
      else if (page === 'result') renderResult();
      else if (page === 'person') renderPerson();
      else if (page === 'error') renderError();
    }

    // 渲染工作流程

      dragSrcIndex = index;
      dragSrcType = type;
      e.dataTransfer.effectAllowed = 'move';
    }
    function dragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }
    function drop(e, index, type) {
      e.preventDefault();
      if (dragSrcType !== type) return;
      const items = data[type];
      const item = items[dragSrcIndex];
      items.splice(dragSrcIndex, 1);
      items.splice(index, 0, item);
      renderPage(type);
    }

    // 保存
    function saveItem(type) {
      let item = {};
      if (editingId) {
        item = data[type].find(i => i.id === editingId) || {};
      } else {
        item.id = Date.now();
      }

      if (type === 'workflow') {
        item.title = document.getElementById('wf-title').value || '无';
        item.background = document.getElementById('wf-bg').value || '无';
        item.steps = document.getElementById('wf-steps').value.split(',').map(s => s.trim()).filter(s => s);
        if (item.steps.length === 0) item.steps = ['无'];
        item.people = document.getElementById('wf-people').value.split(',').map(s => s.trim()).filter(s => s);
        if (item.people.length === 0) item.people = ['无'];
        item.deliverable = document.getElementById('wf-deliver').value || '无';
        item.notes = document.getElementById('wf-notes').value || '无';
        item.frequency = document.getElementById('wf-freq').value || '无';
      } else if (type === 'result') {
        const memo = document.getElementById('rs-memo')?.value;
        if (memo && !editingId) {
          item = { id: Date.now(), memo };
        } else {
          item.title = document.getElementById('rs-title').value || '无';
          item.contribution = document.getElementById('rs-contrib').value || '无';
          item.result = document.getElementById('rs-result').value || '无';
          item.resume = document.getElementById('rs-resume').value || '无';
          if (memo) item.memo = memo;
        }

        item.name = document.getElementById('ps-name').value || '无';

        item.note = document.getElementById('ps-note').value || '无';

        }

        // 如果匹配到示例，使用对应的固定结果
        if (matchedIndex >= 0) {
          result = JSON.parse(JSON.stringify(exampleResults[matchedIndex]));
        } else {
          // 自由输入：根据关键词匹配
          if (input.includes('投放数据') || input.includes('表格')) {
            result = JSON.parse(JSON.stringify(exampleResults[0]));
          } else if (input.includes('开会') || input.includes('会议')) {
            result = JSON.parse(JSON.stringify(exampleResults[1]));
          } else if (input.includes('打印') || input.includes('行政')) {
            result = JSON.parse(JSON.stringify(exampleResults[2]));
          } else if (input.includes('出错') || input.includes('错误') || input.includes('搞错')) {
            result = JSON.parse(JSON.stringify(exampleResults[3]));
          } else {
            result = {
              workflow: { title: '日常工作记录', background: '无', steps: ['无'], people: ['无'], deliverable: '无', notes: '无', frequency: '无' },
              result: { title: '无', contribution: '无', result: '无', resume: '无' }
            };
          }
        }

        aiResultData = result;
        showAIResult(result);
      }, 1500);
    }

    // 显示 AI 结果
    function showAIResult(result) {
      const content = document.getElementById('ai-result-content');
      let html = '';

      if (result.workflow) {
        html += `<div class="ai-result-item"><div class="ai-result-label">工作流程</div><div class="ai-result-value">${result.workflow.title} → ${result.workflow.steps.join(' → ')}</div></div>`;
      }
      if (result.result) {
        html += `<div class="ai-result-item"><div class="ai-result-label">工作成果</div><div class="ai-result-value">${result.result.title}：${result.result.resume}</div></div>`;
      }
      if (result.person) {
        result.person.forEach(p => {
          html += `<div class="ai-result-item"><div class="ai-result-label">协作关系：${p.name}</div><div class="ai-result-value">${p.role} | ${p.note}</div></div>`;
        });
      }
      if (result.error) {
        html += `<div class="ai-result-item"><div class="ai-result-label">错误经验</div><div class="ai-result-value">${result.error.desc} | ${result.error.type} | ${result.error.cause}</div></div>`;
      }

      content.innerHTML = html;
      document.getElementById('ai-result').classList.add('show');
    }

    // 取消 AI
    function cancelAI() {
      document.getElementById('ai-result').classList.remove('show');
      aiResultData = null;
    }

    // 确认保存 AI 结果
    function confirmAI() {
      if (!aiResultData) return;

      if (aiResultData.workflow) {
        data.workflow.push({ id: Date.now(), ...aiResultData.workflow });
      }
      if (aiResultData.result) {
        data.result.push({ id: Date.now() + 1, ...aiResultData.result });
      }
      if (aiResultData.person) {
        aiResultData.person.forEach(p => {
          if (!data.person.find(ex => ex.name === p.name)) {
            data.person.push({ id: Date.now() + Math.random(), ...p });
          }
        });
      }
      if (aiResultData.error) {
        data.error.push({ id: Date.now() + 2, ...aiResultData.error });
      }

      document.getElementById('ai-input').value = '';
      document.getElementById('ai-result').classList.remove('show');
      aiResultData = null;

      alert('已保存到相应模块！');
    }

    // 初始化
    renderWorkflow();
  </script>
</body>
</html>
