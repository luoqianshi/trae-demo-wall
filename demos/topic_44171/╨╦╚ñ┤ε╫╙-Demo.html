<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>兴趣搭子 — 附近兴趣社交</title>
<style>
/* ===== 设计系统变量 ===== */
:root {
  --bg: #FFFBF7;
  --bg-soft: #FFF3EA;
  --ink: #1E1E2E;
  --muted: #7C7C8A;
  --rule: #ECE3D9;
  --accent: #FF6B35;
  --accent-soft: #FFE6D9;
  --accent2: #2EC4B6;
  --accent2-soft: #D4F0ED;
  --danger: #E5484D;
  --font: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --gap: 16px;
  --radius: 10px;
  --radius-pill: 999px;
}

/* ===== 基础重置 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  color: var(--ink);
  background: #E8E0D8;
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; font-size: inherit; }
ul { list-style: none; }

/* ===== 手机外壳 ===== */
.device-shell {
  position: relative;
  width: 375px;
  max-width: 100vw;
  height: 100vh;
  max-height: 812px;
  background: var(--bg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== 页面栈 ===== */
.page-stack {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.page {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.page.active { display: flex; }
.page.overlay {
  z-index: 100;
  display: flex;          /* 覆盖层始终 flex，靠 transform 控制显隐 */
  transform: translateX(100%);
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  background: var(--bg);
}
.page.overlay.show { transform: translateX(0); }

/* ===== 顶部栏 ===== */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px var(--gap);
  background: var(--bg);
  border-bottom: 1px solid var(--rule);
}
.top-bar .loc {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius-pill);
  transition: background 0.2s;
}
.top-bar .loc:active { background: var(--bg-soft); }
.top-bar .loc-icon { font-size: 14px; }
.top-bar .loc-arrow { font-size: 10px; color: var(--muted); margin-left: 2px; }
.view-toggle {
  display: flex;
  background: var(--bg-soft);
  border-radius: var(--radius-pill);
  padding: 2px;
}
.view-toggle button {
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  border-radius: var(--radius-pill);
  transition: all 0.2s;
}
.view-toggle button.active {
  background: var(--accent);
  color: #fff;
}

/* ===== 标签筛选条 ===== */
.filter-bar {
  display: flex;
  flex-wrap: nowrap;
  gap: 8px;
  padding: 12px var(--gap);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  white-space: nowrap;
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  background: var(--bg-soft);
  border-radius: var(--radius-pill);
  transition: all 0.2s;
}
.chip.active {
  background: var(--accent);
  color: #fff;
}

/* ===== 活动列表 ===== */
.activity-list { padding: 0 var(--gap) 80px; }
.activity-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: background 0.15s;
}
.activity-item:active { background: var(--bg-soft); }
.activity-item .item-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.activity-item .item-cat {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-soft);
  padding: 2px 8px;
  border-radius: 4px;
}
.activity-item .item-title {
  font-size: 15px;
  font-weight: 600;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.activity-item .item-distance {
  font-size: 12px;
  color: var(--muted);
  flex-shrink: 0;
}
.activity-item .item-meta {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 8px;
}
.activity-item .item-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.activity-item .item-avatars {
  display: flex;
  align-items: center;
  gap: 2px;
}
.activity-item .item-avatars .av {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--bg-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  border: 1.5px solid var(--bg);
  margin-left: -6px;
}
.activity-item .item-avatars .av:first-child { margin-left: 0; }
.activity-item .item-count {
  font-size: 12px;
  color: var(--muted);
  margin-left: 6px;
}
.activity-item .item-status {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
}
.item-status.recruiting { color: var(--accent); background: var(--accent-soft); }
.item-status.full { color: var(--muted); background: var(--rule); }
.item-status.ended { color: var(--muted); background: var(--rule); }
.item-status.joined { color: var(--accent2); background: var(--accent2-soft); }

/* 人数进度条 */
.item-progress {
  height: 2px;
  background: var(--rule);
  border-radius: 1px;
  margin-top: 6px;
  overflow: hidden;
}
.item-progress .bar {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  transition: width 0.3s;
}

/* ===== 空状态 ===== */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state .empty-text { font-size: 14px; margin-bottom: 16px; }
.empty-state .empty-link {
  color: var(--accent);
  font-weight: 600;
  font-size: 14px;
}

/* ===== 底部 Tab 栏 ===== */
.tab-bar {
  display: flex;
  background: var(--bg);
  border-top: 1px solid var(--rule);
  padding: 6px 0;
  padding-bottom: calc(6px + env(safe-area-inset-bottom));
}
.tab-bar .tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px;
  color: var(--muted);
  transition: color 0.2s;
}
.tab-bar .tab.active { color: var(--accent); }
.tab-bar .tab .tab-icon { font-size: 22px; }
.tab-bar .tab .tab-label { font-size: 11px; font-weight: 600; }

/* ===== 发布页表单 ===== */
.form-section {
  padding: 16px var(--gap);
}
.form-group { margin-bottom: 20px; }
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 8px;
}
.form-label .required { color: var(--accent); }
.form-input, .form-textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { resize: none; min-height: 72px; }
.form-input.error, .form-textarea.error { border-color: var(--danger); }
.form-error {
  font-size: 12px;
  color: var(--danger);
  margin-top: 4px;
}
.form-counter {
  text-align: right;
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

/* 标签选择 */
.tag-select { display: flex; flex-wrap: wrap; gap: 8px; }
.tag-select .chip { cursor: pointer; }

/* 人数 stepper */
.stepper {
  display: flex;
  align-items: center;
  gap: 16px;
}
.stepper button {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--bg-soft);
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
}
.stepper button:active { background: var(--accent-soft); }
.stepper .stepper-val {
  font-size: 18px;
  font-weight: 700;
  min-width: 30px;
  text-align: center;
}

/* 底部固定按钮 */
.bottom-action {
  position: sticky;
  bottom: 0;
  padding: 12px var(--gap);
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  background: var(--bg);
  border-top: 1px solid var(--rule);
}
.btn-primary {
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  border-radius: var(--radius-pill);
  transition: opacity 0.2s;
}
.btn-primary:active { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; }
.btn-secondary {
  width: 100%;
  padding: 13px;
  background: transparent;
  color: var(--ink);
  font-size: 15px;
  font-weight: 600;
  border: 1px solid var(--ink);
  border-radius: var(--radius-pill);
}
.btn-outline {
  padding: 10px 20px;
  background: transparent;
  color: var(--accent);
  font-size: 14px;
  font-weight: 600;
  border: 1px solid var(--accent);
  border-radius: var(--radius-pill);
}

/* ===== 详情页 ===== */
.detail-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px var(--gap);
  border-bottom: 1px solid var(--rule);
}
.detail-header .back-btn {
  font-size: 20px;
  color: var(--ink);
  padding: 4px 8px;
}
.detail-header .detail-status {
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 4px;
}
.detail-body { padding: 16px var(--gap) 100px; }
.detail-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
  line-height: 1.35;
}
.detail-cat {
  display: inline-block;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-soft);
  padding: 3px 10px;
  border-radius: 4px;
  margin-bottom: 16px;
}
.publisher-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 16px;
}
.publisher-row .av {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--bg-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.publisher-row .pub-info { flex: 1; }
.publisher-row .pub-name { font-size: 14px; font-weight: 600; }
.publisher-row .pub-credit { font-size: 12px; color: var(--accent2); }
.info-card {
  background: var(--bg-soft);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 16px;
}
.info-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 0;
  font-size: 14px;
}
.info-row .info-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
.info-row .info-label { color: var(--muted); flex-shrink: 0; min-width: 40px; }
.info-row .info-val { color: var(--ink); flex: 1; }
.joined-section { margin-bottom: 16px; }
.joined-section .joined-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 8px;
}
.joined-avatars { display: flex; align-items: center; }
.joined-avatars .av {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bg-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  border: 2px solid var(--bg);
  margin-left: -8px;
}
.joined-avatars .av:first-child { margin-left: 0; }
.joined-count { font-size: 13px; color: var(--muted); margin-left: 8px; }

/* 详情页小地图样式已移至 .map-canvas 附近 */

/* 详情页底部操作栏 */
.detail-action {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px var(--gap);
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  background: var(--bg);
  border-top: 1px solid var(--rule);
  display: flex;
  gap: 10px;
}
.detail-action .btn-primary { flex: 1; }
.detail-action .btn-secondary { flex: 1; }
.btn-joined {
  flex: 1;
  padding: 13px;
  background: var(--accent2-soft);
  color: var(--accent2);
  font-size: 15px;
  font-weight: 700;
  border-radius: var(--radius-pill);
  border: 1px solid var(--accent2);
}
.btn-disabled {
  flex: 1;
  padding: 13px;
  background: var(--rule);
  color: var(--muted);
  font-size: 15px;
  font-weight: 700;
  border-radius: var(--radius-pill);
}
.btn-danger {
  flex: 1;
  padding: 13px;
  background: transparent;
  color: var(--danger);
  font-size: 15px;
  font-weight: 600;
  border: 1px solid var(--danger);
  border-radius: var(--radius-pill);
}

/* ===== 地图模式 ===== */
.map-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.map-canvas {
  position: relative;
  width: 100%;
  height: 100%;
  background: #F2EDE6;
  overflow: hidden;
  cursor: grab;
}
.map-canvas:active { cursor: grabbing; }
/* 可拖拽的地图内容层 */
.map-content {
  position: absolute;
  top: 0;
  left: 0;
  width: 180%;
  height: 180%;
  background-image:
    repeating-linear-gradient(0deg, transparent 0 38px, rgba(255,255,255,.6) 38px 39px),
    repeating-linear-gradient(90deg, transparent 0 38px, rgba(255,255,255,.6) 38px 39px);
  transform: translate(0, 0);
  will-change: transform;
}
.map-content::before {
  content: '';
  position: absolute;
  left: 8%; top: 12%;
  width: 32%; height: 24%;
  border-radius: 12px;
  background: rgba(46,196,182,.15);
  pointer-events: none;
}
.map-content::after {
  content: '';
  position: absolute;
  right: 6%; bottom: 10%;
  width: 28%; height: 20%;
  border-radius: 50% 40% 50% 40%;
  background: rgba(120,170,255,.18);
  pointer-events: none;
}
/* 详情页静态小地图（不可拖拽） */
.mini-map {
  height: 140px;
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
  position: relative;
  background: #F2EDE6;
  background-image:
    repeating-linear-gradient(0deg, transparent 0 38px, rgba(255,255,255,.6) 38px 39px),
    repeating-linear-gradient(90deg, transparent 0 38px, rgba(255,255,255,.6) 38px 39px);
}
.map-pin {
  position: absolute;
  width: 28px;
  height: 28px;
  border-radius: 50% 50% 50% 0;
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: translate(-50%, -100%) rotate(0deg);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  z-index: 2;
}
.map-pin:active, .map-pin.selected {
  transform: translate(-50%, -100%) scale(1.2);
  z-index: 3;
}
.map-pin.joined { background: var(--accent2); }

/* 地图底部弹出 sheet */
.map-sheet {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg);
  border-radius: 16px 16px 0 0;
  padding: 16px var(--gap);
  padding-bottom: calc(16px + env(safe-area-inset-bottom));
  box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 10;
}
.map-sheet.show { transform: translateY(0); }
.map-sheet .sheet-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.map-sheet .sheet-meta { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
.map-sheet .sheet-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ===== 我的页面 ===== */
.profile-header {
  padding: 24px var(--gap) 16px;
  border-bottom: 1px solid var(--rule);
}
.profile-info {
  display: flex;
  align-items: center;
  gap: 14px;
}
.profile-info .av {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--bg-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.profile-info .p-name { font-size: 18px; font-weight: 700; }
.profile-info .p-city { font-size: 13px; color: var(--muted); }
.profile-info .p-credit { font-size: 12px; color: var(--accent2); }
.profile-stats {
  display: flex;
  gap: 24px;
  margin-top: 16px;
}
.profile-stats .stat-item {
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.profile-stats .stat-num { font-size: 22px; font-weight: 700; color: var(--ink); }
.profile-stats .stat-label { font-size: 13px; color: var(--muted); }

/* 我的页面 Tab 切换 */
.profile-tabs {
  display: flex;
  border-bottom: 1px solid var(--rule);
}
.profile-tabs .ptab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.profile-tabs .ptab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ===== 城市选择面板 ===== */
.city-overlay {
  position: absolute;
  inset: 0;
  background: rgba(30,30,46,0.4);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.city-overlay.show { opacity: 1; pointer-events: auto; }
.city-panel {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg);
  border-radius: 16px 16px 0 0;
  padding: 20px var(--gap) calc(20px + env(safe-area-inset-bottom));
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  max-height: 60%;
  overflow-y: auto;
}
.city-overlay.show .city-panel { transform: translateY(0); }
.city-panel .cp-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  text-align: center;
}
.city-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.city-grid .city-item {
  padding: 12px 8px;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  background: var(--bg-soft);
  border-radius: var(--radius);
  border: 1.5px solid transparent;
  transition: all 0.2s;
}
.city-grid .city-item:active { background: var(--accent-soft); }
.city-grid .city-item.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

/* ===== Toast ===== */
.toast {
  position: absolute;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(30,30,46,0.9);
  color: #fff;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: var(--radius-pill);
  opacity: 0;
  transition: all 0.3s;
  z-index: 9999;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== 响应式 ===== */
@media (max-width: 375px) {
  .device-shell { width: 100vw; }
}
@media (max-height: 600px) {
  .device-shell { max-height: 100vh; }
}
</style>
</head>
<body>

<div class="device-shell">
  <div class="page-stack">

    <!-- ===== 页面1：发现页 ===== -->
    <section class="page active" id="page-discover">
      <div class="top-bar">
        <div class="loc" id="loc-btn">
          <span class="loc-icon">📍</span>
          <span id="loc-text">北京·朝阳</span>

/* ===== 集中式 Store ===== */
var Store = {
  state: {
    activities: [],
    activeCategory: '全部',
    viewMode: 'list',
    currentActivityId: null,
    profileTab: 'own',
    publishForm: { category:'', title:'', desc:'', time:'', loc:'', maxPeople:4 }
  },
  listeners: new Set(),

  init: function() {
    var userPublished = this._read('ib_published', []);
    var userJoined = this._read('ib_joined', []);
    // 合并：用户发布的活动前置，已加入标记回写
    var all = userPublished.concat(MOCK_ACTIVITIES);
    userJoined.forEach(function(id) {
      var a = all.find(function(x) { return x.id === id; });
      if (a && !a.isOwn) {
        a.isJoined = true;
        // 如果头像里还没有当前用户，追加
        if (a.joinedAvatars.indexOf(currentUser.avatar) === -1) {
          a.joinedAvatars.push(currentUser.avatar);
        }
      }
    });
    this.state.activities = all;
  },

  commit: function(mutator) {
    mutator(this.state);
    this._persist();
    var self = this;
    this.listeners.forEach(function(fn) { fn(self.state); });
  },

  subscribe: function(fn) {
    this.listeners.add(fn);
    var self = this;
    return function() { self.listeners.delete(fn); };
  },

  _persist: function() {
    var published = this.state.activities.filter(function(a) { return a.isOwn; });
    var joined = this.state.activities.filter(function(a) { return a.isJoined && !a.isOwn; }).map(function(a) { return a.id; });
    try {
      localStorage.setItem('ib_published', JSON.stringify(published));
      localStorage.setItem('ib_joined', JSON.stringify(joined));
    } catch(e) {}
  },

  _read: function(key, def) {
    try {
      var v = localStorage.getItem(key);
      return v ? JSON.parse(v) : def;
    } catch(e) { return def; }
  }
};

/* ===== Actions ===== */
var Actions = {
  publishActivity: function(form) {
    var id = 'u_' + Date.now();
    var activity = {
      id: id,
      title: form.title,
      category: form.category,
      description: form.desc,
      location: form.loc,
      distance: 0.1 + Math.random() * 0.5,
      time: form.time,
      maxPeople: form.maxPeople,
      joinedPeople: 1,
      joinedAvatars: [currentUser.avatar],
      publisher: { name: currentUser.name, avatar: currentUser.avatar, credit: currentUser.credit },
      status: 'recruiting',
      mapX: 20 + Math.random() * 60,
      mapY: 20 + Math.random() * 60,
      city: currentUser.city,
      isOwn: true,
      isJoined: true,
      createdAt: Date.now()
    };
    Store.commit(function(state) {
      state.activities.unshift(activity);
    });
    return id;
  },

  joinActivity: function(id) {
    Store.commit(function(state) {
      var a = state.activities.find(function(x) { return x.id === id; });
      if (!a || a.isJoined || a.joinedPeople >= a.maxPeople) return;
      a.joinedPeople++;
      a.joinedAvatars.push(currentUser.avatar);
      a.isJoined = true;
      if (a.joinedPeople >= a.maxPeople) a.status = 'full';
    });
  },

  leaveActivity: function(id) {
    Store.commit(function(state) {
      var a = state.activities.find(function(x) { return x.id === id; });
      if (!a || !a.isJoined) return;
      a.joinedPeople--;
      var idx = a.joinedAvatars.lastIndexOf(currentUser.avatar);
      if (idx !== -1) a.joinedAvatars.splice(idx, 1);
      a.isJoined = false;
      if (a.status === 'full') a.status = 'recruiting';
    });
  },

  deleteActivity: function(id) {
    Store.commit(function(state) {
      var idx = state.activities.findIndex(function(x) { return x.id === id; });
      if (idx !== -1) state.activities.splice(idx, 1);
    });
  },

  filterByCategory: function(cat) {
    Store.commit(function(state) { state.activeCategory = cat; });
  },

  switchView: function(mode) {
    Store.commit(function(state) { state.viewMode = mode; });
  },

  openDetail: function(id) {
    Store.commit(function(state) { state.currentActivityId = id; });
    Router.go('detail/' + id);
  },

  setProfileTab: function(tab) {
    Store.commit(function(state) { state.profileTab = tab; });
  }
};

/* ===== Router ===== */
var Router = {
  go: function(path) {
    history.pushState(null, '', '#' + path);
    this.render();
  },
  back: function() { history.back(); },

  render: function() {
    var hash = location.hash.slice(1) || 'discover';
    var parts = hash.split('/');
    var route = parts[0];

    // 关闭所有覆盖层
    document.querySelectorAll('.page.overlay').forEach(function(p) {
      p.classList.remove('show');
    });

    // 主 Tab 页切换
    var tabMap = { discover:'page-discover', publish:'page-publish', profile:'page-profile' };
    if (tabMap[route]) {
      document.querySelectorAll('.page').forEach(function(p) {
        if (!p.classList.contains('overlay')) p.classList.remove('active');
      });
      document.getElementById(tabMap[route]).classList.add('active');
      // 同步 Tab 栏高亮
      document.querySelectorAll('.tab-bar .tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.tab === route);
      });
      return;
    }

    // 详情页覆盖层
    if (route === 'detail' && parts[1]) {
      var activity = Store.state.activities.find(function(a) { return a.id === parts[1]; });
      if (activity) {
        // 保持当前 Tab 页 active
        renderDetail(activity);
        var detailPage = document.getElementById('page-detail');
        detailPage.classList.add('show');
        return;
      }
    }

    // 地图页覆盖层
    if (route === 'map') {
      renderFullMap();
      document.getElementById('page-map').classList.add('show');
      return;
    }

    // 默认回发现页
    document.getElementById('page-discover').classList.add('active');
  }
};

window.addEventListener('popstate', function() { Router.render(); });

/* ===== Toast ===== */
var Toast = {
  show: function(msg, ms) {
    ms = ms || 1800;
    var el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.querySelector('.device-shell').appendChild(el);
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { el.classList.add('show'); });
    });
    setTimeout(function() { el.remove(); }, ms);
  }
};

/* ===== 地图拖拽逻辑 ===== */
// 为地图 canvas 启用拖拽平移，content 层随之移动
function enableMapDrag(canvasEl) {
  var content = canvasEl.querySelector('.map-content');
  if (!content) return;
  // 已绑定过则跳过
  if (canvasEl._dragBound) return;
  canvasEl._dragBound = true;

  var isDragging = false;
  var startX = 0, startY = 0;
  var offsetX = 0, offsetY = 0;
  var hasMoved = false;

  canvasEl.addEventListener('pointerdown', function(e) {
    // 点击标点时不触发拖拽
    if (e.target.classList.contains('map-pin')) return;
    isDragging = true;
    hasMoved = false;
    startX = e.clientX - offsetX;
    startY = e.clientY - offsetY;
    try { canvasEl.setPointerCapture(e.pointerId); } catch(err) {}
  });

  canvasEl.addEventListener('pointermove', function(e) {
    if (!isDragging) return;
    var nx = e.clientX - startX;
    var ny = e.clientY - startY;
    // 超过 5px 才算真正拖拽，避免误触
    if (Math.abs(nx - offsetX) > 1 || Math.abs(ny - offsetY) > 1) hasMoved = true;
    // 约束边界
    var maxX = 0, minX = -(content.offsetWidth - canvasEl.offsetWidth);
    var maxY = 0, minY = -(content.offsetHeight - canvasEl.offsetHeight);
    offsetX = Math.max(minX, Math.min(maxX, nx));
    offsetY = Math.max(minY, Math.min(maxY, ny));
    content.style.transform = 'translate(' + offsetX + 'px,' + offsetY + 'px)';
  });

  function endDrag(e) {
    if (!isDragging) return;
    isDragging = false;
    try { canvasEl.releasePointerCapture(e.pointerId); } catch(err) {}
  }
  canvasEl.addEventListener('pointerup', endDrag);
  canvasEl.addEventListener('pointercancel', endDrag);
}

// 类别首字映射
var catFirstChar = { '运动':'运', '文艺':'文', '户外':'户', '社交':'社', '学习':'学' };

// 活动列表项 HTML
function renderActivityItem(a) {
  var statusText = a.status === 'recruiting' ? '招募中' : (a.status === 'full' ? '已满员' : '已结束');
  var statusClass = a.isJoined ? 'joined' : a.status;
  if (a.isJoined) statusText = '已加入';
  var progress = Math.round(a.joinedPeople / a.maxPeople * 100);
  var avatarsHtml = a.joinedAvatars.slice(0, 4).map(function(av) {
    return '<span class="av">' + av + '</span>';
  }).join('');
  if (a.joinedAvatars.length > 4) {
    avatarsHtml += '<span class="av" style="font-size:11px;color:var(--muted);">+' + (a.joinedAvatars.length - 4) + '</span>';
  }
  return '<div class="activity-item" data-id="' + a.id + '">' +
    '<div class="item-top">' +
      '<span class="item-cat">' + a.category + '</span>' +
      '<span class="item-title">' + a.title + '</span>' +
      '<span class="item-distance">' + a.distance + 'km</span>' +
    '</div>' +
    '<div class="item-meta">' + a.location + ' · ' + a.time + '</div>' +
    '<div class="item-bottom">' +
      '<div class="item-avatars">' + avatarsHtml + '<span class="item-count">' + a.joinedPeople + '/' + a.maxPeople + '人</span></div>' +
      '<span class="item-status ' + statusClass + '">' + statusText + '</span>' +
    '</div>' +
    '<div class="item-progress"><div class="bar" style="width:' + progress + '%"></div></div>' +
  '</div>';
}

// 渲染发现页
// 最大展示距离（km），超过此距离的活动不展示
var MAX_DISTANCE = 5.0;

function renderDiscover(state) {
  // 按当前城市过滤 + 类别筛选 + 距离上限，再按距离从近到远排序
  var list = state.activities.filter(function(a) {
    // 用户自己发布的活动始终可见
    if (a.isOwn) return true;
    // 非同城市活动不展示
    if (a.city !== currentUser.city) return false;
    // 超过最大距离不展示
    if (a.distance > MAX_DISTANCE) return false;
    return true;
  }).filter(function(a) {
    return state.activeCategory === '全部' || a.category === state.activeCategory;
  }).sort(function(a, b) { return a.distance - b.distance; });

  var listEl = document.getElementById('activity-list');
  var mapView = document.getElementById('discover-map');
  var listView = document.getElementById('discover-content');

  // 视图切换
  if (state.viewMode === 'map') {
    listView.style.display = 'none';
    mapView.style.display = 'flex';
    renderDiscoverMap(state, list);
  } else {
    listView.style.display = 'block';
    mapView.style.display = 'none';

    if (list.length === 0) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">该类别暂无附近活动</div><div class="empty-link" onclick="Router.go(\'publish\')">去发布一个</div></div>';
    } else {
      listEl.innerHTML = list.map(renderActivityItem).join('');
    }
  }

  // 同步筛选条高亮
  document.querySelectorAll('#filter-bar .chip').forEach(function(c) {
    c.classList.toggle('active', c.dataset.cat === state.activeCategory);
  });

  // 同步视图切换按钮
  document.querySelectorAll('.view-toggle button').forEach(function(b) {
    b.classList.toggle('active', b.dataset.view === state.viewMode);
  });
}

// 渲染发现页内嵌地图
function renderDiscoverMap(state, list) {
  var canvas = document.getElementById('discover-map-canvas');
  var content = canvas.querySelector('.map-content');
  var sheet = document.getElementById('discover-map-sheet');
  sheet.classList.remove('show');

  // 标点渲染到可拖拽的内容层
  content.innerHTML = list.map(function(a) {
    var cls = 'map-pin' + (a.isJoined ? ' joined' : '');
    var char = catFirstChar[a.category] || '·';
    return '<button class="' + cls + '" style="left:' + a.mapX + '%;top:' + a.mapY + '%;" data-id="' + a.id + '">' + char + '</button>';
  }).join('');

  // 启用拖拽
  enableMapDrag(canvas);

  // 标点点击
  content.querySelectorAll('.map-pin').forEach(function(pin) {
    pin.addEventListener('click', function(e) {
      e.stopPropagation();
      var id = pin.dataset.id;
      var a = state.activities.find(function(x) { return x.id === id; });
      if (!a) return;
      content.querySelectorAll('.map-pin').forEach(function(p) { p.classList.remove('selected'); });
      pin.classList.add('selected');
      sheet.querySelector('.sheet-title').textContent = a.title;
      sheet.querySelector('.sheet-meta').textContent = a.location + ' · ' + a.distance + 'km';
      sheet.querySelector('.sheet-count').textContent = a.joinedPeople + '/' + a.maxPeople + '人';
      sheet.querySelector('.sheet-detail-btn').onclick = function() { Actions.openDetail(id); };
      sheet.classList.add('show');
    });
  });
}

    document.getElementById('btn-join').onclick = function() {
      Actions.joinActivity(a.id);
      Toast.show('已加入，等搭子集合啦');
      renderDetail(Store.state.activities.find(function(x) { return x.id === a.id; }));
    };
  }
}

// 渲染全屏地图
function renderFullMap() {
  var canvas = document.getElementById('full-map-canvas');
  var content = canvas.querySelector('.map-content');
  var sheet = document.getElementById('full-map-sheet');
  sheet.classList.remove('show');
  var list = Store.state.activities;

  // 标点渲染到可拖拽的内容层
  content.innerHTML = list.map(function(a) {
    var cls = 'map-pin' + (a.isJoined ? ' joined' : '');
    var char = catFirstChar[a.category] || '·';
    return '<button class="' + cls + '" style="left:' + a.mapX + '%;top:' + a.mapY + '%;" data-id="' + a.id + '">' + char + '</button>';
  }).join('');

  // 启用拖拽
  enableMapDrag(canvas);

  content.querySelectorAll('.map-pin').forEach(function(pin) {
    pin.addEventListener('click', function(e) {
      e.stopPropagation();
      var id = pin.dataset.id;
      var a = list.find(function(x) { return x.id === id; });
      if (!a) return;
      content.querySelectorAll('.map-pin').forEach(function(p) { p.classList.remove('selected'); });
      pin.classList.add('selected');
      sheet.querySelector('.sheet-title').textContent = a.title;
      sheet.querySelector('.sheet-meta').textContent = a.location + ' · ' + a.distance + 'km';
      sheet.querySelector('.sheet-count').textContent = a.joinedPeople + '/' + a.maxPeople + '人';
      sheet.querySelector('.sheet-detail-btn').onclick = function() { Actions.openDetail(id); };
      sheet.classList.add('show');
    });
  });
}

// 渲染我的页
function renderProfile(state) {
  var ownList = state.activities.filter(function(a) { return a.isOwn; });
  var joinedList = state.activities.filter(function(a) { return a.isJoined && !a.isOwn; });

  document.getElementById('stat-pub').textContent = ownList.length;
  document.getElementById('stat-join').textContent = joinedList.length;

  // Tab 高亮
  document.querySelectorAll('.profile-tabs .ptab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.ptab === state.profileTab);
  });

  var list = state.profileTab === 'own' ? ownList : joinedList;
  var listEl = document.getElementById('profile-list');

  if (list.length === 0) {
    if (state.profileTab === 'own') {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">还没有发布过兴趣</div><div class="empty-link" onclick="Router.go(\'publish\')">去发布一个</div></div>';
    } else {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🧭</div><div class="empty-text">还没有加入任何兴趣</div><div class="empty-link" onclick="Router.go(\'discover\')">去发现附近活动</div></div>';
    }
  } else {
    listEl.innerHTML = list.map(renderActivityItem).join('');
  }
}

/* ===== 事件绑定 ===== */

// Tab 栏切换
document.getElementById('tab-bar').addEventListener('click', function(e) {
  var tab = e.target.closest('.tab');

  Router.go(tab.dataset.tab);
});

// 筛选条
document.getElementById('filter-bar').addEventListener('click', function(e) {
  var chip = e.target.closest('.chip');
  if (!chip) return;
  Actions.filterByCategory(chip.dataset.cat);
});

// 视图切换
document.querySelector('.view-toggle').addEventListener('click', function(e) {
  var btn = e.target.closest('button');
  if (!btn) return;
  Actions.switchView(btn.dataset.view);
});

// 活动列表点击（发现页）— 事件委托
document.getElementById('activity-list').addEventListener('click', function(e) {
  var item = e.target.closest('[data-id]');
  if (!item) return;
  Actions.openDetail(item.dataset.id);
});

// 活动列表点击（我的页）— 事件委托
document.getElementById('profile-list').addEventListener('click', function(e) {
  var item = e.target.closest('[data-id]');
  if (!item) return;
  Actions.openDetail(item.dataset.id);
});

// 我的页 Tab 切换
document.querySelector('.profile-tabs').addEventListener('click', function(e) {
  var ptab = e.target.closest('.ptab');
  if (!ptab) return;

// 详情页返回
document.getElementById('detail-back').addEventListener('click', function() { Router.back(); });

// 地图页返回
document.getElementById('map-back').addEventListener('click', function() { Router.back(); });

// ===== 城市选择逻辑 =====
var cityOverlay = document.getElementById('city-overlay');
var cityGrid = document.getElementById('city-grid');

// 渲染城市列表
function renderCityGrid() {
  cityGrid.innerHTML = CITY_LIST.map(function(c) {
    var cls = c === currentUser.city ? 'city-item active' : 'city-item';
    return '<button class="' + cls + '" data-city="' + c + '">' + c + '</button>';
  }).join('');
}

// 点击定位栏打开面板
document.getElementById('loc-btn').addEventListener('click', function() {
  renderCityGrid();
  cityOverlay.classList.add('show');
});

// 点击遮罩关闭面板
cityOverlay.addEventListener('click', function(e) {
  if (e.target === cityOverlay) cityOverlay.classList.remove('show');
});

// 选择城市
cityGrid.addEventListener('click', function(e) {
  var item = e.target.closest('.city-item');
  if (!item) return;
  var city = item.dataset.city;
  currentUser.city = city;
  saveUserCity(city);
  updateCityDisplay();
  cityOverlay.classList.remove('show');
  Toast.show('已切换到 ' + city);
  // 切换城市后重新渲染发现页列表和地图
  renderDiscover(Store.state);
});

// ===== 发布页逻辑 =====
var pubState = { category:'', maxPeople:4 };

// 标签选择
document.getElementById('publish-tags').addEventListener('click', function(e) {
  var chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('#publish-tags .chip').forEach(function(c) { c.classList.remove('active'); });
  chip.classList.add('active');
  pubState.category = chip.dataset.cat;
  document.getElementById('err-cat').style.display = 'none';
});

// 标题字数
document.getElementById('pub-title').addEventListener('input', function() {
  document.getElementById('title-count').textContent = this.value.length;
});

// 描述字数
document.getElementById('pub-desc').addEventListener('input', function() {
  document.getElementById('desc-count').textContent = this.value.length;
});

// 人数 stepper
document.getElementById('step-minus').addEventListener('click', function() {
  if (pubState.maxPeople > 2) {
    pubState.maxPeople--;
    document.getElementById('step-val').textContent = pubState.maxPeople;
  }
});
document.getElementById('step-plus').addEventListener('click', function() {
  if (pubState.maxPeople < 10) {
    pubState.maxPeople++;
    document.getElementById('step-val').textContent = pubState.maxPeople;
  }
});

// 设置默认时间（明天同一时间）
function setDefaultTime() {
  var d = new Date(Date.now() + 24 * 60 * 60 * 1000);
  var pad = function(n) { return n < 10 ? '0' + n : n; };
  var val = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  document.getElementById('pub-time').value = val;
}

// 发布提交
document.getElementById('pub-submit').addEventListener('click', function() {
  var cat = pubState.category;
  var title = document.getElementById('pub-title').value.trim();
  var desc = document.getElementById('pub-desc').value.trim();
  var time = document.getElementById('pub-time').value;
  var loc = document.getElementById('pub-loc').value.trim();

  // 校验
  var hasError = false;
  if (!cat) {
    document.getElementById('err-cat').style.display = 'block';
    hasError = true;
  }
  if (!title) {
    document.getElementById('pub-title').classList.add('error');
    hasError = true;
  } else {
    document.getElementById('pub-title').classList.remove('error');
  }
  if (!desc) {
    document.getElementById('pub-desc').classList.add('error');
    hasError = true;
  } else {
    document.getElementById('pub-desc').classList.remove('error');
  }
  if (!loc) {
    document.getElementById('pub-loc').classList.add('error');
    hasError = true;
  } else {
    document.getElementById('pub-loc').classList.remove('error');
  }
  if (hasError) {
    Toast.show('请填写必填项');
    return;
  }

  // 格式化时间显示
  var timeDisplay = time.replace('T', ' ');

  Actions.publishActivity({
    category: cat,
    title: title,
    desc: desc,
    time: timeDisplay,
    loc: loc,
    maxPeople: pubState.maxPeople
  });

  Toast.show('已发布，等待搭子加入');

  // 重置表单
  document.querySelectorAll('#publish-tags .chip').forEach(function(c) { c.classList.remove('active'); });
  pubState.category = '';
  document.getElementById('pub-title').value = '';
  document.getElementById('pub-desc').value = '';
  document.getElementById('pub-loc').value = '';
  document.getElementById('title-count').textContent = '0';
  document.getElementById('desc-count').textContent = '0';
  pubState.maxPeople = 4;
  document.getElementById('step-val').textContent = '4';
  setDefaultTime();

  // 跳转首页
  setTimeout(function() { Router.go('discover'); }, 500);
});

/* ===== Store 订阅 ===== */
Store.subscribe(function(state) {
  renderDiscover(state);
  renderProfile(state);
  // 如果详情页打开，同步更新
  var detailPage = document.getElementById('page-detail');
  if (detailPage.classList.contains('show') && state.currentActivityId) {
    var a = state.activities.find(function(x) { return x.id === state.currentActivityId; });
    if (a) renderDetail(a);
    else { detailPage.classList.remove('show'); }
  }
});

/* ===== 初始化 ===== */
loadUserCity();          // 先加载用户城市
updateCityDisplay();     // 同步城市显示
Store.init();
setDefaultTime();
renderDiscover(Store.state);
renderProfile(Store.state);
</script>
