<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI性格职业导航 - 让每个人找到适合自己的职业方向</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #333; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .card { background: white; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); overflow: hidden; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hero { text-align: center; padding: 60px 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .hero h1 { font-size: 2.5em; margin-bottom: 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .hero p { font-size: 1.2em; opacity: 0.95; margin-bottom: 30px; }
        .btn-primary { display: inline-block; background: white; color: #667eea; padding: 18px 50px; border-radius: 50px; font-size: 1.2em; font-weight: bold; cursor: pointer; border: none; transition: all 0.3s; }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 40px; }
        .feature { text-align: center; padding: 25px; background: #f8f9ff; border-radius: 16px; }
        .feature-icon { font-size: 3em; margin-bottom: 15px; }
        .feature h3 { color: #667eea; margin-bottom: 10px; }
        .test-header, .result-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px 40px; text-align: center; }
        .progress-bar { max-width: 600px; margin: 30px auto 0; background: rgba(255,255,255,0.3); border-radius: 20px; height: 10px; }
        .progress-fill { height: 100%; background: white; border-radius: 20px; transition: width 0.5s; }
        .question-container { padding: 40px; }
        .question h2 { font-size: 1.5em; color: #333; margin-bottom: 30px; text-align: center; }
        .options { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        .option { padding: 18px 25px; background: #f8f9ff; border: 2px solid #e8e8ff; border-radius: 12px; cursor: pointer; transition: all 0.3s; text-align: left; }
        .option:hover { border-color: #667eea; background: #f0f4ff; }
        .option.selected { border-color: #667eea; background: #667eea; color: white; }
        .nav-buttons { display: flex; justify-content: center; gap: 20px; margin-top: 40px; }
        .btn-secondary { padding: 15px 40px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 25px; cursor: pointer; transition: all 0.3s; }
        .btn-secondary:hover { background: #667eea; color: white; }
        .mbti-type { font-size: 4em; font-weight: bold; margin: 20px 0; text-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .type-name { font-size: 1.8em; margin-bottom: 10px; }
        .result-content { padding: 40px; }
        .section-title { font-size: 1.5em; color: #667eea; margin: 30px 0 20px; padding-left: 15px; border-left: 4px solid #667eea; }
        .personality-desc { background: #f8f9ff; padding: 25px; border-radius: 16px; line-height: 1.8; }
        .career-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .career-card { background: #f8f9ff; padding: 25px; border-radius: 16px; box-shadow: 0 5px 15px rgba(102,126,234,0.1); }
        .career-card h4 { color: #667eea; margin-bottom: 10px; }
        .career-match { display: inline-block; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.9em; margin-bottom: 10px; }
        .learning-path { background: #f8f9ff; padding: 25px; border-radius: 16px; }
        .path-item { display: flex; padding: 15px 0; border-bottom: 1px dashed #d8d8ff; }
        .path-item:last-child { border-bottom: none; }
        .path-number { width: 35px; height: 35px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; flex-shrink: 0; }
        .path-content h4 { color: #333; margin-bottom: 5px; }
        .path-content p { color: #666; font-size: 0.95em; }
        .btn-download { display: block; width: 100%; max-width: 400px; margin: 40px auto 0; padding: 18px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-align: center; border-radius: 30px; cursor: pointer; border: none; }
        .hidden { display: none !important; }
        @media (max-width: 768px) { .hero h1 { font-size: 1.8em; } .mbti-type { font-size: 3em; } }
    </style>
</head>
<body>
    <div class="container">
        <div id="homePage" class="card">
            <div class="hero">
                <h1>🎯 AI性格职业导航</h1>
                <p>让每个人都能找到适合自己的职业方向</p>
                <p style="font-size:1em;opacity:0.9;">基于MBTI和大五人格理论，结合AI智能分析</p>
                <button class="btn-primary" onclick="startTest()">开始测试</button>
            </div>
            <div class="features">
                <div class="feature"><div class="feature-icon">🧠</div><h3>MBTI测试</h3><p>12道精简题目，快速了解性格</p></div>
                <div class="feature"><div class="feature-icon">🤖</div><h3>AI分析</h3><p>智能匹配最合适的职业方向</p></div>
                <div class="feature"><div class="feature-icon">📚</div><h3>学习路径</h3><p>个性化成长计划</p></div>
            </div>
        </div>
        <div id="testPage" class="card hidden">
            <div class="test-header"><h2>MBTI性格测试</h2><p>请选择最符合你想法的选项</p><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div></div>
            <div class="question-container"><div class="question"><h2 id="questionText"></h2><div class="options" id="optionsContainer"></div></div><div class="nav-buttons"><button class="btn-secondary" id="prevBtn" onclick="prevQuestion()">上一题</button><button class="btn-primary" id="nextBtn" onclick="nextQuestion()">下一题</button></div></div>
        </div>
        <div id="resultPage" class="card hidden">
            <div class="result-header"><p>你的性格类型是</p><div class="mbti-type" id="mbtiType"></div><div class="type-name" id="typeName"></div></div>
            <div class="result-content"><h3 class="section-title">💡 性格分析</h3><div class="personality-desc" id="personalityDesc"></div><h3 class="section-title">💼 职业推荐</h3><div class="career-grid" id="careerGrid"></div><h3 class="section-title">📖 学习路径</h3><div class="learning-path" id="learningPath"></div><button class="btn-download" onclick="downloadReport()">📥 下载完整报告</button></div>
        </div>
    </div>
    <script>
        const questions=[{question:"在社交场合，你通常是怎样的？",options:[{text:"主动和陌生人交谈",type:"E"},{text:"等待别人来接近我",type:"I"}]},{question:"你更倾向于关注什么？",options:[{text:"事物本身的样子",type:"S"},{text:"事物可能的发展",type:"N"}]},{question:"做决定时，你更看重？",options:[{text:"逻辑和客观事实",type:"T"},{text:"他人的感受",type:"F"}]},{question:"你更喜欢怎样的生活方式？",options:[{text:"有计划、有组织",type:"J"},{text:"灵活随性",type:"P"}]},{question:"工作时，你更喜欢？",options:[{text:"和很多人一起讨论",type:"E"},{text:"独自安静思考",type:"I"}]},{question:"面对问题时，你习惯？",options:[{text:"关注具体细节",type:"S"},{text:"思考抽象可能性",type:"N"}]},{question:"你更倾向于？",options:[{text:"公平公正地评判",type:"T"},{text:"考虑人情和谐",type:"F"}]},{question:"你更喜欢？",options:[{text:"按计划完成任务",type:"J"},{text:"保持开放的选择",type:"P"}]},{question:"你从哪里获得能量？",options:[{text:"和他人相处",type:"E"},{text:"独处思考",type:"I"}]},{question:"你更相信？",options:[{text:"实际的经验",type:"S"},{text:"直觉和灵感",type:"N"}]},{question:"你认为更重要的是？",options:[{text:"做正确的事",type:"T"},{text:"让人感觉良好",type:"F"}]},{question:"在截止日期前，你会？",options:[{text:"提前完成",type:"J"},{text:"最后一刻完成",type:"P"}]}];
        const mbtiData={'INTJ':{name:'战略家',desc:'你是一个独立思考者，具有战略眼光，善于制定长期计划。'},'INTP':{name:'思想家',desc:'你是一个逻辑分析者，对知识和理论充满好奇。'},'ENTJ':{name:'领导者',desc:'你是一个果断的领导者，有强大的组织和指挥能力。'},'ENTP':{name:'创新者',desc:'你是一个充满创意的思想家，善于发现新机会。'},'INFJ':{name:'理想主义者',desc:'你是一个富有同理心的理想主义者，有强烈的价值观。'},'INFP':{name:'调解者',desc:'你是一个忠诚的理想主义者，重视真实和善良。'},'ENFJ':{name:'领航员',desc:'你是一个有魅力的领导者，善于激励和启发他人。'},'ENFP':{name:'探险家',desc:'你是一个充满热情的创造者，对可能性充满激情。'},'ISTJ':{name:'检查员',desc:'你是一个可靠务实的人，重视责任和承诺。'},'ISFJ':{name:'守护者',desc:'你是一个忠诚的守护者，重视传统和稳定。'},'ESTJ':{name:'执行者',desc:'你是一个务实的组织者，重视效率和成果。'},'ESFJ':{name:'供给者',desc:'你是一个热心的支持者，重视和谐和帮助他人。'},'ISTP':{name:'工匠',desc:'你是一个务实的行动者，喜欢动手操作。'},'ISFP':{name:'艺术家',desc:'你是一个敏感的创作者，重视美和和谐。'},'ESTP':{name:'创业者',desc:'你是一个活跃的行动者，喜欢冒险和刺激。'},'ESFP':{name:'表演者',desc:'你是一个充满活力的表演者，喜欢成为焦点。'}};
        const careerData={'INTJ':[{title:'战略咨询顾问',match:'98%',desc:'利用战略思维帮助企业制定规划'},{title:'软件架构师',match:'95%',desc:'设计复杂系统'},{title:'投资分析师',match:'92%',desc:'分析市场趋势'}],'INTP':[{title:'数据科学家',match:'97%',desc:'探索数据规律'},{title:'研究员',match:'96%',desc:'深入研究领域'},{title:'AI工程师',match:'94%',desc:'构建智能系统'}],'ENTJ':[{title:'企业高管',match:'99%',desc:'领导团队实现目标'},{title:'管理咨询',match:'96%',desc:'帮助企业提升'},{title:'创业者',match:'95%',desc:'创建企业'}],'ENTP':[{title:'产品经理',match:'97%',desc:'发现需求推动创新'},{title:'投资人',match:'95%',desc:'发现商机'},{title:'营销总监',match:'92%',desc:'策划营销活动'}],'INFJ':[{title:'心理咨询师',match:'98%',desc:'帮助他人成长'},{title:'作家',match:'95%',desc:'创作有意义内容'},{title:'HR总监',match:'93%',desc:'培养人才'}],'INFP':[{title:'UI/UX设计师',match:'96%',desc:'设计产品体验'},{title:'内容创作者',match:'94%',desc:'表达价值观'},{title:'社会工作者',match:'92%',desc:'帮助弱势群体'}],'ENFJ':[{title:'培训师',match:'98%',desc:'激励启发他人'},{title:'市场总监',match:'95%',desc:'打造品牌'},{title:'HR经理',match:'94%',desc:'招聘培养人才'}],'ENFP':[{title:'品牌策划',match:'97%',desc:'创造品牌形象'},{title:'活动策划',match:'95%',desc:'策划创意活动'},{title:'创业者',match:'93%',desc:'转化商业机会'}],'ISTJ':[{title:'财务审计',match:'97%',desc:'确保数据准确'},{title:'项目经理',match:'95%',desc:'推进项目交付'},{title:'律师',match:'92%',desc:'处理法律事务'}],'ISFJ':[{title:'护士',match:'97%',desc:'提供医疗服务'},{title:'行政助理',match:'95%',desc:'支持团队运转'},{title:'图书管理员',match:'93%',desc:'整理信息'}],'ESTJ':[{title:'运营总监',match:'98%',desc:'确保高效运转'},{title:'项目经理',match:'96%',desc:'管理项目'},{title:'销售总监',match:'94%',desc:'实现业绩目标'}],'ESFJ':[{title:'客服经理',match:'97%',desc:'提升客户满意度'},{title:'教师',match:'95%',desc:'教育培养人才'},{title:'健康顾问',match:'93%',desc:'提供健康建议'}],'ISTP':[{title:'工程师',match:'96%',desc:'设计技术产品'},{title:'飞行员',match:'94%',desc:'操控精密设备'},{title:'数据分析师',match:'92%',desc:'发现问题根源'}],'ISFP':[{title:'平面设计师',match:'97%',desc:'创作视觉作品'},{title:'摄影师',match:'95%',desc:'记录美好瞬间'},{title:'室内设计师',match:'93%',desc:'设计居住空间'}],'ESTP':[{title:'销售BD',match:'98%',desc:'开拓市场'},{title:'活动执行',match:'95%',desc:'协调活动'},{title:'房产经纪人',match:'93%',desc:'促成交易'}],'ESFP':[{title:'主持人',match:'97%',desc:'活跃气氛'},{title:'活动策划',match:'95%',desc:'策划社交活动'},{title:'旅游顾问',match:'93%',desc:'规划旅程'}],'INFP':[{title:'设计师',match:'96%',desc:'设计产品'},{title:'内容创作',match:'94%',desc:'创作内容'},{title:'咨询师',match:'92%',desc:'提供建议'}]};
        const learningPaths={'INTJ':[{title:'系统思维训练',desc:'提升战略规划能力'},{title:'商业分析',desc:'学习财务战略知识'},{title:'沟通技巧',desc:'练习有效传达'}],'INTP':[{title:'技术深度学习',desc:'深入钻研技术'},{title:'写作表达',desc:'清晰表达想法'},{title:'项目管理',desc:'学习落地执行'}],'default':[{title:'自我认知',desc:'了解优势偏好'},{title:'技能构建',desc:'学习必要硬技能'},{title:'人脉建设',desc:'拓展专业人脉'}]};
        let currentQuestion=0,answers=[];
        function startTest(){document.getElementById('homePage').classList.add('hidden');document.getElementById('testPage').classList.remove('hidden');currentQuestion=0;answers=[];showQuestion();}
        function showQuestion(){const q=questions[currentQuestion];document.getElementById('questionText').textContent=q.question;const container=document.getElementById('optionsContainer');container.innerHTML='';q.options.forEach((opt,idx)=>{const div=document.createElement('div');div.className='option'+(answers[currentQuestion]===idx?' selected':'');div.textContent=opt.text;div.onclick=()=>selectOption(idx);container.appendChild(div);});document.getElementById('progressFill').style.width=((currentQuestion+1)/questions.length*100)+'%';document.getElementById('prevBtn').style.visibility=currentQuestion>0?'visible':'hidden';document.getElementById('nextBtn').textContent=currentQuestion===questions.length-1?'查看结果':'下一题';}
        function selectOption(index){answers[currentQuestion]=index;document.querySelectorAll('.option').forEach((opt,idx)=>{opt.classList.toggle('selected',idx===index);});}
        function prevQuestion(){if(currentQuestion>0){currentQuestion--;showQuestion();}}
        function nextQuestion(){if(answers[currentQuestion]===undefined){alert('请先选择一个选项');return;}if(currentQuestion<questions.length-1){currentQuestion++;showQuestion();}else{showResult();}}
        function showResult(){document.getElementById('testPage').classList.add('hidden');document.getElementById('resultPage').classList.remove('hidden');let mbti='',scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};answers.forEach((ans,idx)=>{const type=questions[idx].options[ans].type;scores[type]++;});mbti+=scores.E>6?'E':'I';mbti+=scores.S>6?'S':'N';mbti+=scores.T>6?'T':'F';mbti+=scores.J>6?'J':'P';if(mbti==='II'||mbti==='NN'||mbti==='FF'||mbti==='PP')mbti='INFP';const data=mbtiData[mbti]||mbtiData['INFP'];document.getElementById('mbtiType').textContent=mbti;document.getElementById('typeName').textContent=data.name+'型';document.getElementById('personalityDesc').textContent=data.desc;const careers=careerData[mbti]||careerData['INFP'];document.getElementById('careerGrid').innerHTML=careers.map(c=>'<div class="career-card"><span class="career-match">匹配度 '+c.match+'</span><h4>'+c.title+'</h4><p>'+c.desc+'</p></div>').join('');const paths=learningPaths[mbti]||learningPaths['default'];document.getElementById('learningPath').innerHTML=paths.map((p,i)=>'<div class="path-item"><div class="path-number">'+(i+1)+'</div><div class="path-content"><h4>'+p.title+'</h4><p>'+p.desc+'</p></div></div>').join('');}
        function downloadReport(){const mbti=document.getElementById('mbtiType').textContent;const typeName=document.getElementById('typeName').textContent;const desc=document.getElementById('personalityDesc').textContent;const report='AI性格职业导航报告\n类型:'+mbti+'('+typeName+')\n'+desc+'\n由 TRAE AI 辅助开发';const blob=new Blob([report],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='职业报告_'+mbti+'.txt';a.click();}
    </script>
</body>
</html>
