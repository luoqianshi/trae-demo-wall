<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的宠物</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="index.html">‹</a>
            <span id="navTitle">我的宠物</span>
        </div>
        <div class="content">
            <div class="page">
                <div class="page-header">
                    <div class="page-title">我的宠物</div>
                    <div class="page-desc">管理您的所有爱宠</div>
                </div>
                <div class="stats-bar">
                    <div class="stat-box"><div class="stat-num" id="statTotal">0</div><div class="stat-label">总宠物</div></div>
                    <div class="stat-box"><div class="stat-num" id="statActive">0</div><div class="stat-label">正常</div></div>
                    <div class="stat-box"><div class="stat-num" id="statArchived">0</div><div class="stat-label">已封存</div></div>
                </div>
                <div class="filter-tabs" style="padding:0 16px;margin-bottom:12px">
                    <div class="filter-tab active" data-filter="all" onclick="filterPets('all')">全部</div>
                    <div class="filter-tab" data-filter="active" onclick="filterPets('active')">正常</div>
                    <div class="filter-tab" data-filter="archived" onclick="filterPets('archived')">已封存</div>
                </div>
                <div id="petsList"></div>
            </div>
        </div>
        <a href="pet-add.html" class="fab">+</a>
    </div>
    <div class="desktop-hint">请在手机或浏览器开发者工具中查看最佳效果</div>
    <script src="js/app.js"></script>
    <script>
        initPage({ tab: 'home', back: 'index.html' });
        let currentFilter = 'all';
        function filterPets(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.filter-tab[data-filter="${filter}"]`).classList.add('active');
            renderPets();
        }
        function renderPets() {
            const list = document.getElementById('petsList');
            const filtered = currentFilter === 'all' ? App.data.pets : App.data.pets.filter(p => p.status === currentFilter);
            document.getElementById('statTotal').textContent = App.data.pets.length;
            document.getElementById('statActive').textContent = App.data.pets.filter(p => p.status === 'active').length;
            document.getElementById('statArchived').textContent = App.data.pets.filter(p => p.status === 'archived').length;

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">🐾</div><div class="empty-title">还没有宠物</div><div class="empty-desc">添加宠物后开始记录健康</div><a href="pet-add.html" class="btn-primary">添加宠物</a></div>';
            } else {
                list.innerHTML = filtered.map(p => `
                    <a href="pet-detail.html?id=${p.id}" class="pet-list-item" style="text-decoration:none;color:inherit">
                        <div class="pet-avatar">${p.avatar}</div>
                        <div class="pet-info">
                            <div class="pet-name">${p.name} ${p.id === App.data.currentPetId ? '<span style="color:var(--primary);font-size:11px">当前</span>' : ''}</div>
                            <div class="pet-type">${p.breed || App.getTypeName(p.type)} · ${p.gender === 'male' ? '♂' : '♀'}</div>
                            <div class="pet-age">${p.ageText}</div>
                        </div>
                        <div class="arrow">›</div>
                    </a>
                `).join('');
            }
        }
        renderPets();
    </script>
</body>
</html>
