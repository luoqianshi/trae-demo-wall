<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>添加记录</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="health-records.html">‹</a>
            <span id="navTitle">添加记录</span>
        </div>
        <div class="content">
            <div class="page" style="padding:16px">
                <div class="form-group">
                    <label class="form-label">选择宠物</label>
                    <select class="form-select" id="recordPet"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">记录类型</label>
                    <select class="form-select" id="recordType">
                        <option value="vaccine">疫苗</option>
                        <option value="deworm">驱虫</option>
                        <option value="medical">就医</option>
                        <option value="weight">体重</option>
                        <option value="hygiene">护理</option>
                        <option value="expense">支出</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">标题</label>
                    <input type="text" class="form-input" id="recordTitle" placeholder="例如：狂犬疫苗">
                </div>
                <div class="form-group">
                    <label class="form-label">日期</label>
                    <input type="date" class="form-input" id="recordDate">
                </div>
                <div class="form-group">
                    <label class="form-label">费用（元）</label>
                    <input type="number" class="form-input" id="recordCost" placeholder="0">
                </div>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <textarea class="form-textarea" id="recordNote" placeholder="补充说明..."></textarea>
                </div>
                <button class="btn-primary btn-block" onclick="saveRecord()">保存</button>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ back: 'health-records.html' });
        const defaultType = getParam('type') || 'vaccine';
        document.getElementById('recordType').value = defaultType;
        document.getElementById('recordDate').value = new Date().toISOString().split('T')[0];

        const petSelect = document.getElementById('recordPet');
        App.data.pets.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.name;
            petSelect.appendChild(opt);
        });
        petSelect.value = App.data.currentPetId;

        function saveRecord() {
            const petId = parseInt(petSelect.value);
            const type = document.getElementById('recordType').value;
            const title = document.getElementById('recordTitle').value.trim();
            const date = document.getElementById('recordDate').value;
            const cost = parseFloat(document.getElementById('recordCost').value) || 0;
            const note = document.getElementById('recordNote').value.trim();

            if (!title) { showToast('请输入标题'); return; }

            App.addRecord({ petId, type, title, date, note, cost });
            App.data.currentPetId = petId;
            App.save();
            showToast('记录成功');
            setTimeout(() => location.href = 'health-records.html', 500);
        }
    </script>
</body>
</html>
