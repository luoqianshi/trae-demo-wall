<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>添加宠物</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="pets.html">‹</a>
            <span id="navTitle">添加宠物</span>
        </div>
        <div class="content">
            <div class="page" style="padding:16px">
                <div class="form-group">
                    <label class="form-label">宠物名称</label>
                    <input type="text" class="form-input" id="petName" placeholder="例如：豆豆">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">类型</label>
                        <select class="form-select" id="petType">
                            <option value="dog">狗狗</option>
                            <option value="cat">猫咪</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">品种</label>
                        <input type="text" class="form-input" id="petBreed" placeholder="例如：柴犬">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">性别</label>
                    <div class="radio-group">
                        <div class="radio-item active" onclick="selectRadio(this,'petGender','male')">♂ 公</div>
                        <div class="radio-item" onclick="selectRadio(this,'petGender','female')">♀ 母</div>
                    </div>
                    <input type="hidden" id="petGender" value="male">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">体重（kg）</label>
                        <input type="number" class="form-input" id="petWeight" placeholder="0.0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">年龄描述</label>
                        <input type="text" class="form-input" id="petAge" placeholder="例如：1岁">
                    </div>
                </div>
                <button class="btn-primary btn-block" onclick="savePet()">保存</button>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ back: 'pets.html' });
        function selectRadio(el, name, value) {
            el.parentElement.querySelectorAll('.radio-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(name).value = value;
        }
        function savePet() {
            const name = document.getElementById('petName').value.trim();
            if (!name) { showToast('请输入宠物名称'); return; }
            App.addPet({
                name: name,
                type: document.getElementById('petType').value,
                breed: document.getElementById('petBreed').value.trim(),
                gender: document.getElementById('petGender').value,
                weight: parseFloat(document.getElementById('petWeight').value) || 0,
                ageText: document.getElementById('petAge').value.trim() || '未知年龄'
            });
            showToast('添加成功');
            setTimeout(() => location.href = 'pets.html', 500);
        }
    </script>
</body>
</html>
