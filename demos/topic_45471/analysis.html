<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健康分析</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 5G 🔋</span></div>
        <div class="nav-bar">
            <a class="nav-back" href="index.html">‹</a>
            <span id="navTitle">健康分析</span>
        </div>
        <div class="content">
            <div class="page analysis-page">
                <!-- 宠物选择 -->
                <div class="an-pet-selector">
                    <div class="an-pet-list" id="petList"></div>
                </div>

                <!-- 时间筛选 -->
                <div class="an-time-filter">
                    <div class="an-time-item active" data-range="30" onclick="changeTimeRange(30)">近30天</div>
                    <div class="an-time-item" data-range="90" onclick="changeTimeRange(90)">近90天</div>
                    <div class="an-time-item" data-range="365" onclick="changeTimeRange(365)">近一年</div>
                </div>

                <!-- 健康统计 -->
                <div class="an-stats-grid" id="statsGrid"></div>

                <!-- 资金投入 -->
                <div class="an-section">
                    <div class="an-section-header">
                        <div class="an-section-title">
                            <span class="an-title-emoji">💰</span>
                            <span>资金投入</span>
                        </div>
                        <a href="daily-expense.html" class="an-view-more">
                            <span>查看详情</span>
                            <span style="margin-left:4px">›</span>
                        </a>
                    </div>
                    <div class="an-expense-card">
                        <span class="an-expense-label">总支出</span>
                        <span class="an-expense-amount" id="expenseAmount">¥0.00</span>
                        <span class="an-expense-count" id="expenseCount">共 0 笔支出</span>
                    </div>
                    <div class="an-category-list" id="categoryList"></div>
                </div>

                <!-- 体重趋势 -->
                <div class="an-section" id="weightSection" style="display:none">
                    <div class="an-section-header">
                        <div class="an-section-title">体重趋势</div>
                        <span class="an-view-more">单位: kg</span>
                    </div>
                    <div class="an-weight-chart">
                        <div class="an-chart-container" id="weightChart"></div>
                    </div>
                    <div class="an-weight-range" id="weightRange"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        initPage({ tab: 'analysis', back: 'index.html' });

        let currentPetId = App.data.currentPetId;
        let timeRange = 30;

        const noNeedVaccineDeworm = ['turtle', 'goldfish', 'hamster', 'parakeet'];

        const categoryMap = {
            'vaccine': { name: '疫苗', icon: '💉', color: '#4CAF50', order: 1 },
            'deworm': { name: '驱虫', icon: '💊', color: '#FF9800', order: 2 },
            'medical': { name: '就医', icon: '🏥', color: '#E53935', order: 3 },
            'health': { name: '就医', icon: '🏥', color: '#E53935', order: 3 },
            'hygiene': { name: '护理', icon: '🛁', color: '#00ACC1', order: 4 },
            'grooming': { name: '护理', icon: '🛁', color: '#00ACC1', order: 4 },
            'supplies': { name: '生活用品', icon: '🧸', color: '#FF8C42', order: 5 },
            'other': { name: '其他', icon: '📦', color: '#757575', order: 6 }
        };

        function selectPet(id) {
            currentPetId = id;
            if (id !== 'all') {
                App.data.currentPetId = id;
                App.save();
            }
            renderAnalysis();
        }

        function changeTimeRange(days) {
            timeRange = days;
            document.querySelectorAll('[data-range]').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-range="${days}"]`).classList.add('active');
            renderAnalysis();
        }

        function isWithinRange(dateStr) {
            const d = new Date(dateStr);
            const now = new Date();
            const diff = (now - d) / (1000 * 60 * 60 * 24);
            return diff <= timeRange;
        }

        function getFilteredRecords() {
            return App.data.records
                .filter(r => r.petId === currentPetId)
                .filter(r => isWithinRange(r.date));
        }

        function renderAnalysis() {
            // 宠物选择器
            document.getElementById('petList').innerHTML = App.data.pets.map(p => `
                <div class="an-pet-item ${p.id === currentPetId ? 'active' : ''}" onclick="selectPet(${p.id})">
                    <div class="an-pet-avatar">${p.avatar}</div>
                    <span class="an-pet-name">${p.name}</span>
                </div>
            `).join('');

            const currentPet = App.data.pets.find(p => p.id === currentPetId) || App.getCurrentPet();
            const needVacDeworm = !currentPet.type || !noNeedVaccineDeworm.includes(currentPet.type);

            // 健康统计
            const records = getFilteredRecords();
            const vaccineCount = records.filter(r => r.type === 'vaccine').length;
            const dewormCount = records.filter(r => r.type === 'deworm').length;
            const medicalCount = records.filter(r => r.type === 'medical').length;

            let statsHtml = `
                <div class="an-stat-card">
                    <span class="an-stat-value">${records.length}</span>
                    <span class="an-stat-label">健康记录</span>
                </div>
            `;
            if (needVacDeworm) {
                statsHtml += `
                    <div class="an-stat-card">
                        <span class="an-stat-value">${vaccineCount}</span>
                        <span class="an-stat-label">疫苗接种</span>
                    </div>
                    <div class="an-stat-card">
                        <span class="an-stat-value">${dewormCount}</span>
                        <span class="an-stat-label">驱虫记录</span>
                    </div>
                `;
            }
            statsHtml += `
                <div class="an-stat-card">
                    <span class="an-stat-value">${medicalCount}</span>
                    <span class="an-stat-label">就医次数</span>
                </div>
            `;
            document.getElementById('statsGrid').innerHTML = statsHtml;

            // 资金投入
            const expenseRecords = records.filter(r => r.cost > 0);
            const totalAmount = expenseRecords.reduce((sum, r) => sum + r.cost, 0);
            document.getElementById('expenseAmount').textContent = '¥' + totalAmount.toFixed(2);
            document.getElementById('expenseCount').textContent = `共 ${expenseRecords.length} 笔支出`;

            // 分类统计
            const categoryStats = {};
            if (needVacDeworm) {
                categoryStats['vaccine'] = { amount: 0, count: 0, ...categoryMap['vaccine'] };
                categoryStats['deworm'] = { amount: 0, count: 0, ...categoryMap['deworm'] };
            }
            categoryStats['medical'] = { amount: 0, count: 0, ...categoryMap['medical'] };
            categoryStats['hygiene'] = { amount: 0, count: 0, ...categoryMap['hygiene'] };
            categoryStats['supplies'] = { amount: 0, count: 0, ...categoryMap['supplies'] };
            categoryStats['other'] = { amount: 0, count: 0, ...categoryMap['other'] };

            expenseRecords.forEach(r => {
                let category = r.type;
                if (category === 'health') category = 'medical';
                if (category === 'grooming') category = 'hygiene';
                if (!needVacDeworm && (category === 'vaccine' || category === 'deworm')) category = 'other';
                if (!categoryStats[category]) category = 'other';
                categoryStats[category].amount += r.cost;
                categoryStats[category].count++;
            });

            const categoryList = Object.keys(categoryStats)
                .map(key => ({
                    key,
                    ...categoryStats[key],
                    amount: categoryStats[key].amount,
                    percentage: totalAmount > 0 ? (categoryStats[key].amount / totalAmount * 100) : 0
                }))
                .filter(item => item.amount > 0)
                .sort((a, b) => b.amount - a.amount);

            const categoryListEl = document.getElementById('categoryList');
            if (categoryList.length === 0) {
                categoryListEl.innerHTML = '<div style="text-align:center;color:#999;padding:20px;font-size:13px">暂无支出数据</div>';
            } else {
                categoryListEl.innerHTML = categoryList.map(item => `
                    <div class="an-category-item">
                        <div class="an-category-icon" style="background:${item.color}">${item.icon}</div>
                        <div class="an-category-content">
                            <div class="an-category-row">
                                <span class="an-category-name">${item.name}</span>
                                <span class="an-category-amount">¥${item.amount.toFixed(2)}</span>
                            </div>
                            <div class="an-progress-bar">
                                <div class="an-progress-fill" style="width:${item.percentage}%;background:${item.color}"></div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // 体重趋势（从健康记录中提取有weight字段的数据）
            let maxRecords = 5;
            if (timeRange === 90) maxRecords = 10;
            if (timeRange === 365) maxRecords = 20;

            let weightRecords = records
                .filter(r => r.weight && parseFloat(r.weight) > 0)
                .sort((a, b) => new Date(a.date) - new Date(b.date))
                .slice(-maxRecords);

            const weightSection = document.getElementById('weightSection');
            if (weightRecords.length === 0) {
                weightSection.style.display = 'none';
            } else {
                weightSection.style.display = 'block';
                const weights = weightRecords.map(r => parseFloat(r.weight));
                const minWeight = Math.min(...weights);
                const maxWeight = Math.max(...weights);
                const weightRange = maxWeight - minWeight || 1;

                document.getElementById('weightChart').innerHTML = weightRecords.map((r, index) => {
                    const weight = parseFloat(r.weight);
                    const d = new Date(r.date);
                    const dateStr = `${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                    const percentage = ((weight - minWeight) / weightRange * 60 + 20);
                    return `
                        <div class="an-chart-item">
                            <div class="an-bar-container">
                                <div class="an-bar" style="height:${percentage}%"></div>
                            </div>
                            <span class="an-weight-value">${weight.toFixed(1)}</span>
                            <span class="an-weight-date">${dateStr}</span>
                        </div>
                    `;
                }).join('');
                document.getElementById('weightRange').textContent = `范围: ${minWeight.toFixed(1)} - ${maxWeight.toFixed(1)} kg`;
            }
        }
        renderAnalysis();
    </script>
</body>
</html>
