<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge AI Agent - 交互式演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #161922;
            --bg-tertiary: #1e212b;
            --border: #2a2e3b;
            --text-primary: #e4e6eb;
            --text-secondary: #9ca3af;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --code-bg: #0d0d0d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            height: 56px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        .header-title {
            font-size: 16px;
            font-weight: 600;
        }
        .header-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--success);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Main Layout */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .new-chat-btn:hover { background: var(--accent-hover); }
        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .conversation-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .conversation-item:hover {
            background: var(--bg-tertiary);
        }
        .conversation-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3);
        }
        .conv-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .conv-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conv-icon {
            font-size: 16px;
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
        }

        /* Drop Zone */
        .drop-zone {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(59, 130, 246, 0.1);
            border: 2px dashed var(--accent);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            flex-direction: column;
            gap: 12px;
            font-size: 18px;
            color: var(--accent);
            backdrop-filter: blur(4px);
        }
        .drop-zone.active { display: flex; }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { flex-direction: row-reverse; }
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .message.ai .message-avatar {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
        }
        .message.user .message-avatar {
            background: var(--bg-tertiary);
        }
        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
        }
        .message.ai .message-content {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }
        .message.user .message-content {
            background: var(--accent);
            border-top-right-radius: 4px;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Special Cards */
        .skill-card {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
            font-size: 13px;
        }
        .skill-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--success);
            font-weight: 600;
            margin-bottom: 8px;
        }
        .sandbox-output {
            background: var(--code-bg);
            border-radius: 6px;
            padding: 10px;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 12px;
            margin-top: 8px;
            overflow-x: auto;
        }
        .sandbox-output .comment { color: #6b7280; }
        .sandbox-output .keyword { color: #c084fc; }
        .sandbox-output .string { color: #4ade80; }
        .sandbox-output .number { color: #fbbf24; }

        /* File Attachment */
        .file-attachment {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 8px;
            font-size: 13px;
        }
        .file-icon { font-size: 20px; }

        /* Progress Bar */
        .progress-container {
            margin-top: 10px;
        }
        .progress-bar-bg {
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #8b5cf6);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }
        .progress-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* Confirm Dialog */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            width: 420px;
            max-width: 90vw;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-body {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--border); }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Input Area */
        .input-area {
            border-top: 1px solid var(--border);
            padding: 16px 20%;
            background: var(--bg-secondary);
        }
        .quick-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .quick-btn {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px;
        }
        .input-wrapper:focus-within {
            border-color: var(--accent);
        }
        .attach-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }
        .attach-btn:hover { color: var(--accent); }
        .message-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            resize: none;
            outline: none;
            max-height: 120px;
            min-height: 24px;
            font-family: inherit;
        }
        .message-input::placeholder { color: var(--text-secondary); }
        .send-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:disabled {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        /* Chart Simulation */
        .chart-container {
            margin-top: 12px;
            padding: 16px;
            background: var(--code-bg);
            border-radius: 8px;
        }
        .chart-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .chart-label {
            width: 60px;
            font-size: 12px;
            color: var(--text-secondary);
            text-align: right;
        }
        .chart-track {
            flex: 1;
            height: 24px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
        }
        .chart-fill {
            height: 100%;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 11px;
            color: white;
            font-weight: 600;
            width: 0%;
            transition: width 1s ease;
        }

        /* Search Results */
        .search-results {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .search-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .search-item:hover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
        }
        .search-item-icon {
            font-size: 24px;
        }
        .search-item-info {
            flex: 1;
        }
        .search-item-name {
            font-weight: 500;
            font-size: 13px;
            margin-bottom: 2px;
        }
        .search-item-path {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: monospace;
        }
        .search-item-meta {
            text-align: right;
            font-size: 11px;
        }
        .search-item-score {
            color: var(--success);
            font-weight: 600;
        }
        .search-item-time {
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f4450; }

        /* Responsive */
        @media (max-width: 1024px) {
            .messages, .input-area { padding: 16px 5%; }
            .sidebar { width: 220px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-logo">EA</div>
            <div class="header-title">Edge AI Agent</div>
        </div>
        <div class="header-status">
            <div class="status-dot"></div>
            <span>模型在线 (DeepSeek-v3.2)</span>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="startNewChat()">+ 新建会话</button>
            </div>
            <div class="conversation-list" id="conversationList">
                <div class="conversation-item active" data-scene="data" onclick="switchScene('data')">
                    <div class="conv-title"><span class="conv-icon">📊</span> 数据分析演示</div>
                    <div class="conv-preview">拖拽 Excel 文件，AI 安全沙箱分析</div>
                </div>
                <div class="conversation-item" data-scene="software" onclick="switchScene('software')">
                    <div class="conv-title"><span class="conv-icon">💿</span> 软件安装演示</div>
                    <div class="conv-preview">一句话安装软件，人机确认执行</div>
                </div>
                <div class="conversation-item" data-scene="uninstall" onclick="switchScene('uninstall')">
                    <div class="conv-title"><span class="conv-icon">🗑️</span> 软件卸载演示</div>
                    <div class="conv-preview">智能查询已安装软件，安全卸载</div>
                </div>
                <div class="conversation-item" data-scene="filesearch" onclick="switchScene('filesearch')">
                    <div class="conv-title"><span class="conv-icon">🔍</span> 文件查找演示</div>
                    <div class="conv-preview">自然语言描述，语义级本地搜索</div>
                </div>
                <div class="conversation-item" data-scene="cleanup" onclick="switchScene('cleanup')">
                    <div class="conv-title"><span class="conv-icon">🧹</span> 系统清理演示</div>
                    <div class="conv-preview">智能扫描垃圾文件，一键清理</div>
                </div>
                <div class="conversation-item" data-scene="vision" onclick="switchScene('vision')">
                    <div class="conv-title"><span class="conv-icon">🖼️</span> 多模态识别演示</div>
                    <div class="conv-preview">上传图片，Vision 模型自动识别</div>
                </div>
            </div>
        </div>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <div class="drop-zone" id="dropZone">
                <div style="font-size: 48px;">📁</div>
                <div>释放文件以上传分析</div>
                <div style="font-size: 14px; color: var(--text-secondary);">支持 Excel、CSV、PDF、图片等格式</div>
            </div>

            <div class="messages" id="messages"></div>

            <div class="input-area">
                <div class="quick-actions" id="quickActions"></div>
                <div class="input-wrapper">
                    <button class="attach-btn" onclick="triggerFileUpload()" title="上传文件">📎</button>
                    <textarea class="message-input" id="messageInput" rows="1" placeholder="输入指令或拖拽文件到此处..." onkeydown="handleKeydown(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <div class="modal-title" id="modalTitle">⚠️ 操作确认</div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="cancelModal()">取消</button>
                <button class="btn btn-primary" id="modalConfirmBtn" onclick="confirmAction()">确认执行</button>
            </div>
        </div>
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="fileInput" style="display:none" accept=".xlsx,.csv,.pdf,.png,.jpg,.jpeg" onchange="handleFileSelect(event)">

    <script>
        // ==================== State ====================
        let currentScene = 'data';
        let isProcessing = false;
        let pendingAction = null;
        let messageHistory = [];

        // ==================== Scene Configurations ====================
        const scenes = {
            data: {
                quickActions: ['分析销售数据', '生成月度报表', '统计用户增长'],
                welcome: '你好！我是 Edge AI Agent。你可以拖拽 Excel/CSV 文件到窗口，我会自动在安全沙箱中分析数据。',
                onFileUpload: handleDataAnalysis
            },
            software: {
                quickActions: ['安装 Chrome', '安装 VS Code', '查看可安装软件'],
                welcome: '你好！我是 Edge AI Agent。告诉我你想安装什么软件，我会查询仓库并帮你完成安装。',
                onFileUpload: null
            },
            uninstall: {
                quickActions: ['卸载 Chrome', '卸载 VS Code', '查看已安装软件'],
                welcome: '你好！我是 Edge AI Agent。我可以查询本机已安装软件列表，并帮你安全卸载不需要的程序。',
                onFileUpload: null
            },
            filesearch: {
                quickActions: ['查找上周的周报', '查找合同文件', '查找配置文件'],
                welcome: '你好！我是 Edge AI Agent。用自然语言描述你想找的文件，我会基于语义理解进行精准定位。',
                onFileUpload: null
            },
            cleanup: {
                quickActions: ['扫描系统垃圾', '清理临时文件', '优化启动项'],
                welcome: '你好！我是 Edge AI Agent。我可以帮你扫描并清理系统中的垃圾文件，释放磁盘空间。',
                onFileUpload: null
            },
            vision: {
                quickActions: ['识别这张图片', '提取图中文字', '分析图表数据'],
                welcome: '你好！我是 Edge AI Agent。上传图片，我会自动切换至 Vision 多模态模型进行识别和分析。',
                onFileUpload: handleVisionAnalysis
            }
        };

        // ==================== Initialization ====================
        function init() {
            renderQuickActions();
            showWelcome();
            setupDragDrop();
        }

        function showWelcome() {
            const scene = scenes[currentScene];
            addMessage('ai', scene.welcome);
        }

        function renderQuickActions() {
            const container = document.getElementById('quickActions');
            const scene = scenes[currentScene];
            container.innerHTML = scene.quickActions.map(action =>
                `<button class="quick-btn" onclick="sendQuick('${action}')">${action}</button>`
            ).join('');
        }

        // ==================== Scene Switching ====================
        function switchScene(scene) {
            if (isProcessing) return;
            currentScene = scene;

            document.querySelectorAll('.conversation-item').forEach(el => {
                el.classList.toggle('active', el.dataset.scene === scene);
            });

            document.getElementById('messages').innerHTML = '';
            messageHistory = [];
            renderQuickActions();
            showWelcome();
        }

        function startNewChat() {
            switchScene(currentScene);
        }

        // ==================== Messaging ====================
        function addMessage(role, content, extraHTML = '') {
            const container = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerHTML = `
                <div class="message-avatar">${role === 'ai' ? '🤖' : '👤'}</div>
                <div class="message-content">
                    <div>${content}</div>
                    ${extraHTML}
                </div>
            `;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
            messageHistory.push({ role, content });
            return msgDiv;
        }

        function showTyping() {
            const id = 'typing-' + Date.now();
            const container = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ai';
            msgDiv.id = id;
            msgDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
            return id;
        }

        function removeTyping(id) {

        // ==================== Typewriter Effect ====================
        async function typewriterMessage(text, extraHTML = '', delay = 30) {
            const typingId = showTyping();
            await sleep(600 + Math.random() * 400);
            removeTyping(typingId);

            const container = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ai';
            msgDiv.innerHTML = `

                <div class="message-content">
                    <div id="tw-content"></div>
                    ${extraHTML}
                </div>
            `;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;

            const contentDiv = msgDiv.querySelector('#tw-content');
            for (let i = 0; i < text.length; i++) {
                contentDiv.textContent += text[i];
                if (i % 3 === 0) await sleep(delay);
            }
            messageHistory.push({ role: 'ai', content: text });
            return msgDiv;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function handleKeydown(e) {

            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            if (isProcessing) return;
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.style.height = 'auto';
            isProcessing = true;
            updateSendButton();

            addMessage('user', text);

            // Route to scene handlers
            if (currentScene === 'software') {
                await handleSoftwareInstall(text);
            } else if (currentScene === 'uninstall') {
                await handleSoftwareUninstall(text);
            } else if (currentScene === 'filesearch') {
                await handleFileSearch(text);
            } else if (currentScene === 'cleanup') {
                await handleSystemCleanup(text);
            } else if (currentScene === 'data') {
                await handleDataText(text);
            } else if (currentScene === 'vision') {
                await handleVisionText(text);
            }

            isProcessing = false;
            updateSendButton();
        }

                        <div style="background:var(--bg-primary);padding:8px;border-radius:6px;">回收站 <span style="color:var(--warning);float:right;">320 MB</span></div>
                        <div style="background:var(--bg-primary);padding:8px;border-radius:6px;">系统日志 <span style="color:var(--warning);float:right;">145 MB</span></div>
                    </div>
                    <div style="margin-top:10px;font-weight:600;color:var(--danger);">共发现可清理: 2.52 GB</div>
                </div>
            `;
            await typewriterMessage('扫描完成，发现以下可清理项目：', scanHTML);
            await sleep(500);

            showConfirm(
                '确认系统清理',
                '即将清理 <b>2.52 GB</b> 的系统垃圾文件，包括：<br><br>• 临时文件: 1.2 GB<br>• 浏览器缓存: 856 MB<br>• 回收站: 320 MB<br>• 过期日志: 145 MB<br><br>清理后无法恢复，是否继续？',
                async () => {
                    const progressHTML = `
                        <div class="progress-container">
                            <div class="progress-bar-bg"><div class="progress-bar-fill" id="cleanProgress" style="width:0%;background:linear-gradient(90deg,var(--success),#34d399)"></div></div>
                            <div class="progress-text" id="cleanText">正在清理临时文件...</div>
                        </div>
                    `;
                    addMessage('ai', '', progressHTML);

                    const steps = ['正在清理临时文件...', '正在清理浏览器缓存...', '正在清空回收站...', '正在清理系统日志...', '正在优化磁盘...'];
                    for (let i = 0; i <= 100; i += 20) {
                        await sleep(400);
                        const bar = document.getElementById('cleanProgress');
                        const txt = document.getElementById('cleanText');
                        if (bar) bar.style.width = i + '%';
                        if (txt) txt.textContent = steps[Math.floor(i / 20)] || '清理完成';
                    }
                    await sleep(300);
                    await typewriterMessage('✅ 系统清理完成！\n\n• 释放空间: 2.52 GB\n• 清理项目: 4 类\n• 磁盘健康度: 良好\n\n建议每月执行一次系统清理以保持最佳性能。');
                },
                async () => {
                    await typewriterMessage('❌ 操作已取消。未清理任何文件，系统保持原状。');
                }
            );
        }

        // ==================== Vision Scene ====================
        async function handleVisionText(text) {
            await typewriterMessage('请上传一张图片，我会自动切换至 Vision 多模态模型进行分析。支持 PNG、JPG、GIF、WEBP 格式。');
        }

        async function handleVisionAnalysis(filename) {
            const isImage = /\.(png|jpg|jpeg|gif|webp)$/i.test(filename);
            if (!isImage) {
                addMessage('user', '', `<div class="file-attachment"><span class="file-icon">📄</span><div><div style="font-weight:500">${filename}</div></div></div>`);
                await typewriterMessage('该文件不是图片格式。多模态识别仅支持图片文件（PNG/JPG/GIF/WEBP）。请切换至"数据分析"场景处理文档类文件。');
                return;
            }

            addMessage('user', '', `<div class="file-attachment"><span class="file-icon">🖼️</span><div><div style="font-weight:500">${filename}</div><div style="font-size:12px;color:var(--text-secondary)">1.8 MB · PNG 图片</div></div></div>`);

            const typingId = showTyping();
            await sleep(600);
            removeTyping(typingId);

            await typewriterMessage('检测到图片附件，正在自动切换至 Vision 多模态模型...');
            await sleep(800);

            const switchHTML = `
                <div class="skill-card" style="border-color:rgba(139,92,246,0.3);background:rgba(139,92,246,0.1);">
                    <div class="skill-card-header" style="color:#a78bfa;">🔄 模型智能路由</div>
                    <div style="font-size:13px;">
                        <div>文本模型: <span style="color:var(--text-secondary)">DeepSeek-v3.2</span> → <span style="text-decoration:line-through;">暂停</span></div>
                        <div>视觉模型: <span style="color:var(--success)">Kimi K2.5 Vision</span> → <span style="color:var(--success)">已激活</span></div>
                        <div style="margin-top:6px;color:var(--text-secondary);font-size:12px;">历史消息中的图片 URL 已自动剥离，避免文本模型报错</div>
                    </div>
                </div>
            `;
            await typewriterMessage('模型切换完成，正在识别图像内容...', switchHTML);
            await sleep(1000);

            const imageResultHTML = `
                <div style="margin-top:12px;">
                    <div style="width:100%;height:160px;background:linear-gradient(135deg,#1e293b,#334155);border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);margin-bottom:12px;">
                        <div style="text-align:center;color:var(--text-secondary);">
                            <div style="font-size:32px;margin-bottom:8px;">📊</div>
                            <div style="font-size:12px;">[图片预览: 2024年Q2销售趋势柱状图]</div>
                        </div>
                    </div>
                </div>
            `;
            await typewriterMessage('识别完成！这是一张**2024年Q2销售趋势柱状图**，我从图中提取到以下信息：\n\n• 图表类型：分组柱状图（对比 2023 vs 2024）\n• 数据维度：4-6 月三个月份\n• 关键趋势：2024 年各月同比增长 25%-40%\n• 6 月达到峰值，销售额约 320 万\n\n需要我将这些数据整理成表格或进行进一步分析吗？', imageResultHTML);
        }

        // ==================== File Upload ====================
        function triggerFileUpload() {
            document.getElementById('fileInput').click();
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            processFile(file.name);
        }

        async function processFile(filename) {
            if (isProcessing) return;
            isProcessing = true;
            updateSendButton();

            const scene = scenes[currentScene];
            if (scene.onFileUpload) {
                await scene.onFileUpload(filename);
            } else {
                addMessage('user', '', `<div class="file-attachment"><span class="file-icon">📄</span><div><div style="font-weight:500">${filename}</div></div></div>`);
                await typewriterMessage('当前场景不支持文件处理。请切换到"数据分析"或"多模态识别"场景。');
            }

            isProcessing = false;
            updateSendButton();
        }

        // ==================== Drag & Drop ====================
        function setupDragDrop() {
            const container = document.getElementById('chatContainer');
            const dropZone = document.getElementById('dropZone');

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                container.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            container.addEventListener('dragenter', () => dropZone.classList.add('active'));
            container.addEventListener('dragover', () => dropZone.classList.add('active'));

            dropZone.addEventListener('dragleave', (e) => {
                if (e.target === dropZone) dropZone.classList.remove('active');
            });

            dropZone.addEventListener('drop', (e) => {
                dropZone.classList.remove('active');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    processFile(files[0].name);
                }
            });
        }

        // ==================== Modal ====================
        function showConfirm(title, body, onConfirm, onCancel) {
            document.getElementById('modalTitle').innerHTML = title;
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('confirmModal').classList.add('active');
            pendingAction = { confirm: onConfirm, cancel: onCancel };
        }

        function cancelModal() {
            document.getElementById('confirmModal').classList.remove('active');
            if (pendingAction && pendingAction.cancel) {
                const cancelFn = pendingAction.cancel;
                pendingAction = null;
                cancelFn();
            } else {
                pendingAction = null;
            }
        }

        async function confirmAction() {
            document.getElementById('confirmModal').classList.remove('active');
            if (pendingAction && pendingAction.confirm) {
                const confirmFn = pendingAction.confirm;
                pendingAction = null;
                await confirmFn();
            } else {
                pendingAction = null;
            }
        }

        // Close modal on overlay click
        document.getElementById('confirmModal').addEventListener('click', (e) => {
            if (e.target.id === 'confirmModal') cancelModal();
        });

        // ==================== Auto-resize textarea ====================
        const textarea = document.getElementById('messageInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // ==================== Start ====================
        init();
    </script>
