<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美食大乱斗 - 美食版小丑牌</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #FF6B35; --primary-light: #FF8F5E; --secondary: #FFD166;
    --accent: #06D6A0; --dark: #1A1A2E; --darker: #0F0F1A;
    --card-bg: rgba(255,255,255,0.06); --text: #E8E8F0; --text-muted: #9898B0;
    --rarity-common: #9CA3AF; --rarity-rare: #3B82F6;
    --rarity-epic: #8B5CF6; --rarity-legendary: #F59E0B;
    --cuisine-chuan: #E74C3C; --cuisine-yue: #3498DB; --cuisine-lu: #E67E22;
    --cuisine-su: #2ECC71; --cuisine-zhe: #1ABC9C; --cuisine-min: #9B59B6;
    --cuisine-xiang: #E74C3C; --cuisine-hui: #F39C12; --cuisine-jp: #E91E63;
    --cuisine-kr: #00BCD4; --cuisine-sea: #FF9800; --cuisine-fr: #673AB7;
    --cuisine-it: #4CAF50;
  }
  body { font-family: 'Noto Sans SC', sans-serif; background: var(--darker); color: var(--text); overflow-x: hidden; line-height: 1.6; min-height: 100vh; }
  .bg-orbs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; }
  .bg-orbs .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.2; animation: orbFloat 20s ease-in-out infinite; }
  .bg-orbs .orb:nth-child(1) { width: 500px; height: 500px; background: var(--primary); top: -10%; left: -10%; }
  .bg-orbs .orb:nth-child(2) { width: 400px; height: 400px; background: var(--secondary); top: 50%; right: -10%; animation-delay: -7s; }
  .bg-orbs .orb:nth-child(3) { width: 350px; height: 350px; background: var(--accent); bottom: -10%; left: 30%; animation-delay: -14s; }
  @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1);} 33%{transform:translate(50px,-30px) scale(1.1);} 66%{transform:translate(-30px,50px) scale(0.9);} }
  .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 20px; }

  /* ===== Menu ===== */
  .menu-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }
  .menu-screen h1 { font-size: clamp(36px, 7vw, 72px); font-weight: 900; line-height: 1.1; margin-bottom: 8px; }
  .menu-screen h1 .gradient-text { background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .menu-screen .subtitle { font-size: clamp(16px, 2.5vw, 22px); color: var(--text-muted); margin-bottom: 48px; }
  .menu-buttons { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 360px; }
  .menu-btn { display: flex; align-items: center; gap: 16px; padding: 20px 28px; background: var(--card-bg); border: 2px solid rgba(255,255,255,0.08); border-radius: 16px; cursor: pointer; transition: all 0.3s; text-align: left; color: var(--text); font-size: 16px; font-weight: 600; }
  .menu-btn:hover { transform: translateY(-3px); border-color: var(--primary); background: rgba(255,107,53,0.1); }
  .menu-btn .btn-icon { font-size: 32px; }
  .menu-btn .btn-info h3 { font-size: 18px; font-weight: 700; }
  .menu-btn .btn-info p { font-size: 13px; color: var(--text-muted); font-weight: 400; }

  /* ===== Game Screen ===== */
  .game-screen { display: none; min-height: 100vh; padding: 16px 0; }
  .game-screen.active { display: block; }

  /* Top Bar */
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: rgba(15,15,26,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; z-index: 50; }
  .top-bar .logo { font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .top-bar .logo .gradient-text { background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .round-info { display: flex; gap: 16px; align-items: center; font-size: 14px; color: var(--text-muted); }
  .round-info .round-badge { background: var(--card-bg); padding: 6px 14px; border-radius: 100px; font-weight: 600; }

  /* Score Board */
  .scoreboard { display: flex; gap: 16px; padding: 16px 20px; max-width: 1400px; margin: 0 auto; }
  .player-panel { flex: 1; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 16px 20px; transition: all 0.3s; }
  .player-panel.active { border-color: var(--primary); box-shadow: 0 0 24px rgba(255,107,53,0.15); }
  .player-panel.winner { border-color: var(--accent); box-shadow: 0 0 24px rgba(6,214,160,0.2); }
  .player-panel .player-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .player-panel .player-name { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .player-panel .player-score { font-size: 28px; font-weight: 900; }
  .player-panel .player-wins { display: flex; gap: 4px; }
  .player-panel .win-dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.1); }
  .player-panel .win-dot.filled { background: var(--accent); }

  /* Play Area */
  .play-area { max-width: 1400px; margin: 0 auto; padding: 16px 20px; }
  .opponent-zone { min-height: 180px; margin-bottom: 16px; }
  .play-zone { min-height: 200px; background: rgba(255,255,255,0.02); border: 2px dashed rgba(255,255,255,0.08); border-radius: 16px; padding: 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  .play-zone.has-cards { border-style: solid; border-color: rgba(255,107,53,0.2); }
  .play-zone-label { font-size: 14px; color: var(--text-muted); }

  /* Cards */
  .cards-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .food-card { width: 120px; background: var(--dark); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.3s; position: relative; border: 2px solid transparent; }
  .food-card:hover { transform: translateY(-6px); }
  .food-card.selected { transform: translateY(-20px); border-color: var(--primary); box-shadow: 0 8px 24px rgba(255,107,53,0.3); }
  .food-card.played { width: 100px; }
  .food-card.played.opponent { transform: none; }
  .food-card.small { width: 80px; }
  .food-card .card-img { width: 100%; height: 90px; object-fit: cover; background: var(--darker); display: flex; align-items: center; justify-content: center; font-size: 40px; position: relative; overflow: hidden; }
  .food-card .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .food-card .card-body { padding: 8px 10px; }
  .food-card .card-name { font-size: 12px; font-weight: 700; line-height: 1.3; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .food-card .card-cuisine { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
  .food-card .card-stats { display: flex; gap: 6px; font-size: 11px; font-weight: 700; }
  .food-card .stat-chips { color: var(--secondary); }
  .food-card .stat-mult { color: var(--primary); }
  .food-card .card-rarity-bar { position: absolute; top: 0; left: 0; width: 100%; height: 3px; }
  .rarity-common .card-rarity-bar { background: var(--rarity-common); }
  .rarity-rare .card-rarity-bar { background: var(--rarity-rare); }
  .rarity-epic .card-rarity-bar { background: var(--rarity-epic); }
  .rarity-legendary .card-rarity-bar { background: var(--rarity-legendary); }
  .rarity-legendary { box-shadow: 0 0 12px rgba(245,158,11,0.2); }
  .rarity-epic { box-shadow: 0 0 8px rgba(139,92,246,0.15); }

  /* Hand */
  .hand-zone { background: rgba(255,255,255,0.02); border-radius: 16px; padding: 20px; }
  .hand-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .hand-title { font-size: 14px; font-weight: 600; color: var(--text-muted); }
  .hand-actions { display: flex; gap: 10px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s; }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: 0 4px 16px rgba(255,107,53,0.3); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.4); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-secondary { background: var(--card-bg); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); }
  .btn-accent { background: linear-gradient(135deg, var(--accent), #04AE7C); color: white; }

  /* Synergy Panel */
  .synergy-panel { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 16px; margin-top: 16px; }
  .synergy-panel h4 { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--secondary); }
  .synergy-list { display: flex; flex-direction: column; gap: 6px; }
  .synergy-item { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 6px 10px; background: rgba(255,255,255,0.03); border-radius: 8px; }
  .synergy-item.active { background: rgba(6,214,160,0.1); border: 1px solid rgba(6,214,160,0.2); }
  .synergy-item .syn-name { flex: 1; }
  .synergy-item .syn-effect { font-weight: 700; color: var(--accent); }

  /* Score Calc */
  .score-calc { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 16px; margin-top: 16px; text-align: center; }
  .score-calc .calc-label { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
  .score-calc .calc-value { font-size: 32px; font-weight: 900; }
  .score-calc .calc-formula { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
  .score-calc .calc-chips { color: var(--secondary); font-weight: 700; }
  .score-calc .calc-mult { color: var(--primary); font-weight: 700; }

  /* Round Result */
  .result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 24px; }
  .result-overlay.show { display: flex; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  .result-modal { background: linear-gradient(135deg, var(--dark), var(--darker)); border-radius: 24px; padding: 40px; max-width: 500px; width: 100%; text-align: center; animation: cardReveal 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes cardReveal { from{transform:scale(0.5);opacity:0;} to{transform:scale(1);opacity:1;} }
  .result-modal .result-icon { font-size: 64px; margin-bottom: 16px; }
  .result-modal .result-title { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
  .result-modal .result-subtitle { font-size: 16px; color: var(--text-muted); margin-bottom: 24px; }
  .result-modal .result-scores { display: flex; gap: 16px; margin-bottom: 24px; }
  .result-modal .result-score-box { flex: 1; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; }
  .result-modal .result-score-box.win { border: 1px solid var(--accent); }
  .result-modal .result-score-box .rsb-name { font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
  .result-modal .result-score-box .rsb-value { font-size: 28px; font-weight: 900; }
  .result-modal .result-synergies { text-align: left; margin-bottom: 24px; }
  .result-modal .result-synergies h4 { font-size: 14px; color: var(--secondary); margin-bottom: 8px; }
  .result-modal .result-synergies .syn-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
  .result-modal .result-actions { display: flex; gap: 12px; }
  .result-modal .result-actions .btn { flex: 1; padding: 14px; }

  /* Toast */
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--dark); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 24px; font-size: 14px; font-weight: 600; z-index: 300; transition: transform 0.3s; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Confetti */
  .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; overflow: hidden; }
  .confetti { position: absolute; width: 10px; height: 10px; top: -10px; animation: confettiFall 3s ease-in forwards; }
  @keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1;} 100%{transform:translateY(100vh) rotate(720deg);opacity:0;} }

  /* Thinking indicator */
  .thinking { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 14px; }
  .thinking .dots { display: flex; gap: 4px; }
  .thinking .dots span { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: dotPulse 1.4s ease-in-out infinite; }
  .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%,80%,100%{transform:scale(0.6);opacity:0.5;} 40%{transform:scale(1);opacity:1;} }

  /* Pass screen for local 2P */
  .pass-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--darker); z-index: 90; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 24px; }
  .pass-screen.show { display: flex; }
  .pass-screen .pass-icon { font-size: 80px; }
  .pass-screen .pass-text { font-size: 24px; font-weight: 700; text-align: center; }
  .pass-screen .pass-hint { font-size: 16px; color: var(--text-muted); }

  /* Synergy guide modal */
  .guide-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 24px; }
  .guide-overlay.show { display: flex; }
  .guide-modal { background: var(--dark); border-radius: 20px; padding: 32px; max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto; }
  .guide-modal h2 { font-size: 24px; font-weight: 800; margin-bottom: 16px; }
  .guide-modal .guide-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; }
  .guide-modal .guide-item .gi-name { font-weight: 700; font-size: 15px; color: var(--secondary); }
  .guide-modal .guide-item .gi-desc { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .guide-modal .guide-item .gi-effect { font-size: 13px; font-weight: 700; color: var(--accent); margin-top: 4px; }
  .guide-modal .close-btn { margin-top: 16px; width: 100%; }

  /* Responsive */
  @media (max-width: 768px) {
    .food-card { width: 90px; }
    .food-card .card-img { height: 70px; font-size: 32px; }
    .food-card .card-name { font-size: 11px; }
    .food-card.played { width: 75px; }
    .scoreboard { flex-direction: column; }
    .player-panel .player-score { font-size: 22px; }
  }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--darker); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
</style>
</head>
<body>

<div class="bg-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="confetti-container" id="confettiContainer"></div>
<div class="toast" id="toast"></div>

<!-- ===== Menu Screen ===== -->
<div class="menu-screen" id="menuScreen">
  <h1>🍜 <span class="gradient-text">美食大乱斗</span></h1>
  <p class="subtitle">美食版小丑牌 · 40道菜 · 14种羁绊 · 策略卡牌对战</p>
  <div class="menu-buttons">
    <button class="menu-btn" onclick="startGame('ai')">
      <div class="btn-icon">🤖</div>
      <div class="btn-info"><h3>AI 对战</h3><p>挑战 AI 对手，3局2胜</p></div>
    </button>
    <button class="menu-btn" onclick="startGame('local')">
      <div class="btn-icon">👥</div>
      <div class="btn-info"><h3>本地双人对战</h3><p>和朋友面对面轮流出牌</p></div>
    </button>
    <button class="menu-btn" onclick="showGuide()">
      <div class="btn-icon">📖</div>
      <div class="btn-info"><h3>羁绊图鉴</h3><p>查看所有羁绊和计分规则</p></div>
    </button>
  </div>
</div>

<!-- ===== Game Screen ===== -->
<div class="game-screen" id="gameScreen">
  <div class="top-bar">
    <div class="logo" onclick="backToMenu()">🎴 <span class="gradient-text">美食大乱斗</span></div>
    <div class="round-info">
      <span class="round-badge" id="roundBadge">第 1 局</span>
      <span id="modeLabel">AI 对战</span>
    </div>
    <button class="btn btn-secondary" onclick="showGuide()" style="padding:6px 14px;font-size:13px;">📖 羁绊</button>
  </div>

  <div class="container">
    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="player-panel" id="panelP1">
        <div class="player-header">
          <div class="player-name"><span id="iconP1">🧑</span> <span id="nameP1">玩家</span></div>
          <div class="player-wins" id="winsP1"></div>
        </div>
        <div class="player-score" id="scoreP1">0</div>
      </div>
      <div class="player-panel" id="panelP2">
        <div class="player-header">
          <div class="player-name"><span id="iconP2">🤖</span> <span id="nameP2">AI</span></div>
          <div class="player-wins" id="winsP2"></div>
        </div>
        <div class="player-score" id="scoreP2">0</div>
      </div>
    </div>

    <!-- Play Area -->
    <div class="play-area">
      <!-- Opponent played cards -->
      <div class="opponent-zone">
        <div class="hand-header"><span class="hand-title" id="opponentLabel">对手出牌</span></div>
        <div class="cards-row" id="opponentCards"></div>
      </div>

      <!-- Current play zone -->
      <div class="play-zone" id="playZone">
        <div class="play-zone-label" id="playZoneLabel">选择手牌中的菜品，凑出最佳羁绊组合！</div>
        <div class="cards-row" id="playZoneCards"></div>
        <div id="playZoneInfo"></div>
      </div>

      <!-- Hand -->
      <div class="hand-zone">
        <div class="hand-header">
          <span class="hand-title" id="handTitle">你的手牌（选最多5张打出）</span>
          <div class="hand-actions">
            <button class="btn btn-secondary" onclick="clearSelection()" style="padding:6px 14px;font-size:13px;">清空</button>
            <button class="btn btn-primary" id="playBtn" onclick="playCards()">出牌！</button>
          </div>
        </div>
        <div class="cards-row" id="handCards"></div>
      </div>

      <!-- Score calc & synergies -->
      <div id="bottomPanel">
        <div class="score-calc" id="scoreCalc" style="display:none;">
          <div class="calc-label">预计得分</div>
          <div class="calc-value" id="calcValue">0</div>
          <div class="calc-formula"><span class="calc-chips" id="calcChips">0</span> 筹码 × <span class="calc-mult" id="calcMult">0</span> 倍率</div>
        </div>
        <div class="synergy-panel" id="synergyPreview" style="display:none;">
          <h4>🔥 当前羁绊</h4>
          <div class="synergy-list" id="synergyList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== Pass Screen (local 2P) ===== -->
<div class="pass-screen" id="passScreen">
  <div class="pass-icon">🔀</div>
  <div class="pass-text" id="passText">请将设备交给 玩家2</div>
  <div class="pass-hint">确保对方没有看到你的手牌</div>
  <button class="btn btn-primary" onclick="hidePassScreen()" style="padding:14px 40px;font-size:18px;">准备好了</button>
</div>

<!-- ===== Round Result ===== -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-modal" id="resultModal">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-subtitle" id="resultSubtitle"></div>
    <div class="result-scores">
      <div class="result-score-box" id="rsbP1"><div class="rsb-name" id="rsbNameP1"></div><div class="rsb-value" id="rsbValueP1"></div></div>
      <div class="result-score-box" id="rsbP2"><div class="rsb-name" id="rsbNameP2"></div><div class="rsb-value" id="rsbValueP2"></div></div>
    </div>
    <div class="result-synergies" id="resultSynergies"></div>
    <div class="result-actions">
      <button class="btn btn-secondary" onclick="backToMenu()">返回菜单</button>
      <button class="btn btn-primary" id="nextRoundBtn" onclick="nextRound()">下一局</button>
    </div>
  </div>
</div>

<!-- ===== Guide ===== -->
<div class="guide-overlay" id="guideOverlay">
  <div class="guide-modal">
    <h2>📖 羁绊图鉴 & 计分规则</h2>
    <p style="color:var(--text-muted);margin-bottom:16px;font-size:14px;">得分 = 总筹码 × 总倍率。打出菜品卡牌，触发羁绊获得加成！</p>
    <div id="guideContent"></div>

function drawPixelArt(canvas, food) {
  const ctx = canvas.getContext('2d');
  const size = 16;
  const pixelSize = canvas.width / size;
  const colors = CUISINE_COLORS[food.cuisine] || CUISINE_COLORS['川菜'];
  const template = PIXEL_TEMPLATES[food.type] || PIXEL_TEMPLATES['肉类'];

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  grad.addColorStop(0, colors.dark);
  grad.addColorStop(1, '#0F0F1A');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw pixel art
  const colorMap = {
    '.': null,
    'M': colors.main,
    'L': colors.light,
    'D': colors.dark,
    'W': '#FFFFFF',
    'B': '#000000',
  };

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const ch = template[y][x];
      const color = colorMap[ch];
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
      }
    }
  }

  // Add emoji overlay (small, bottom-right)
  ctx.font = `${Math.round(canvas.width * 0.3)}px serif`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.globalAlpha = 0.8;
  ctx.fillText(food.emoji, canvas.width - 4, canvas.height - 2);
  ctx.globalAlpha = 1;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function drawHand(deck, count = 8) {
  const shuffled = shuffle([...deck]);
  return shuffled.slice(0, count);
}

// ===== Score Calculation =====
function calculateScore(cards) {
  if (cards.length === 0) return { score: 0, chips: 0, mult: 0, synergies: [] };

  let chips = cards.reduce((s, c) => s + c.chips, 0);
  let mult = cards.reduce((s, c) => s + c.mult, 0);
  let chipsMult = 1;
  let multMult = 1;
  const activeSynergies = [];

  SYNERGIES.forEach(syn => {
    if (syn.check(cards)) {
      activeSynergies.push(syn);
      if (syn.effect.chips) chips += syn.effect.chips;
      if (syn.effect.mult) mult += syn.effect.mult;
      if (syn.effect.chipsMult) chipsMult *= syn.effect.chipsMult;
      if (syn.effect.multMult) multMult *= syn.effect.multMult;
    }
  });

  chips = Math.round(chips * chipsMult);
  mult = Math.round(mult * multMult);
  const score = chips * mult;

  return { score, chips, mult, synergies: activeSynergies };
}

// ===== AI Logic =====
function aiChooseCards(hand) {
  // Try all combinations of 3-5 cards, pick the best
  let best = { score: 0, cards: [] };

  for (let size = 3; size <= 5; size++) {
    const combos = getCombinations(hand, size);
    for (const combo of combos) {
      const result = calculateScore(combo);
      if (result.score > best.score) {
        best = { score: result.score, cards: combo };
      }
    }
  }

  // If best is still 0, just pick first 3
  if (best.cards.length === 0) {
    best.cards = hand.slice(0, 3);
  }

  return best.cards;
}

function getCombinations(arr, size) {
  const result = [];
  function helper(start, combo) {
    if (combo.length === size) { result.push([...combo]); return; }
    for (let i = start; i < arr.length; i++) {
      combo.push(arr[i]);
      helper(i + 1, combo);
      combo.pop();
    }
  }
  helper(0, []);
  return result;
}

      <div class="card-cuisine">${food.cuisine} · ${food.type}</div>
      <div class="card-stats">
        <span class="stat-chips">+${food.chips}</span>
        <span class="stat-mult">×${food.mult}</span>
      </div>
    </div>
  `;

  // Draw pixel art on canvas
  const canvas = div.querySelector('canvas');
  if (canvas) drawPixelArt(canvas, food);

  return div;
}

function renderHand() {
  const container = document.getElementById('handCards');
  container.innerHTML = '';
  const player = game.players[game.currentPlayer - 1];

  player.hand.forEach((food, idx) => {
    const isSelected = player.selected.includes(idx);
    const card = renderCard(food, {
      selected: isSelected,
      onclick: () => toggleSelect(idx)
    });
    container.appendChild(card);
  });

  updatePlayZone();
  updatePlayButton();
}

function toggleSelect(idx) {
  if (game.phase !== 'select') return;
  const player = game.players[game.currentPlayer - 1];
  const i = player.selected.indexOf(idx);
  if (i >= 0) {
    player.selected.splice(i, 1);
  } else {
    if (player.selected.length >= 5) {
      showToast('最多选5张！');
      return;
    }
    player.selected.push(idx);
  }
  renderHand();
}

function clearSelection() {
  const player = game.players[game.currentPlayer - 1];
  player.selected = [];
  renderHand();
}

function updatePlayZone() {
  const player = game.players[game.currentPlayer - 1];
  const zone = document.getElementById('playZoneCards');
  const label = document.getElementById('playZoneLabel');
  const info = document.getElementById('playZoneInfo');
  const playZone = document.getElementById('playZone');

  zone.innerHTML = '';
  if (player.selected.length === 0) {
    label.style.display = 'block';
    playZone.classList.remove('has-cards');
    document.getElementById('scoreCalc').style.display = 'none';
    document.getElementById('synergyPreview').style.display = 'none';
    info.innerHTML = '';
    return;
  }

  label.style.display = 'none';
  playZone.classList.add('has-cards');

  const selectedCards = player.selected.map(i => player.hand[i]);
  selectedCards.forEach(food => {
    zone.appendChild(renderCard(food, { played: true }));
  });

  // Calculate preview score
  const result = calculateScore(selectedCards);
  document.getElementById('scoreCalc').style.display = 'block';
  document.getElementById('calcValue').textContent = result.score;
  document.getElementById('calcChips').textContent = result.chips;
  document.getElementById('calcMult').textContent = result.mult;

  // Show synergies
  const synPanel = document.getElementById('synergyPreview');
  const synList = document.getElementById('synergyList');
  if (result.synergies.length > 0) {
    synPanel.style.display = 'block';
    synList.innerHTML = result.synergies.map(s => {
      let effect = '';
      if (s.effect.chips) effect += `+${s.effect.chips}筹码 `;
      if (s.effect.mult) effect += `+${s.effect.mult}倍率 `;
      if (s.effect.chipsMult) effect += `筹码×${s.effect.chipsMult} `;
      if (s.effect.multMult) effect += `倍率×${s.effect.multMult} `;
      return `<div class="synergy-item active"><span class="syn-name">🔥 ${s.name}</span><span class="syn-effect">${effect}</span></div>`;
    }).join('');
  } else {
    synPanel.style.display = 'block';
    synList.innerHTML = '<div class="synergy-item"><span class="syn-name">暂无羁绊，尝试同菜系或口味搭配！</span></div>';
  }
}

function updatePlayButton() {
  const player = game.players[game.currentPlayer - 1];
  const btn = document.getElementById('playBtn');
  btn.disabled = player.selected.length === 0 || game.phase !== 'select';
}

// ===== Game Flow =====
function startGame(mode) {
  game.mode = mode;
  game.round = 1;
  game.phase = 'select';
  game.players[0] = { name: '玩家1', icon: '🧑', score: 0, wins: 0, hand: [], played: [], selected: [] };
  game.players[1] = { name: mode === 'ai' ? 'AI' : '玩家2', icon: mode === 'ai' ? '🤖' : '👤', score: 0, wins: 0, hand: [], played: [], selected: [] };

  document.getElementById('menuScreen').style.display = 'none';
  document.getElementById('gameScreen').classList.add('active');
  document.getElementById('modeLabel').textContent = mode === 'ai' ? 'AI 对战' : '本地双人';

  startRound();
}

function startRound() {
  game.phase = 'select';
  game.currentPlayer = 1;
  game.deck = shuffle(createDeck());

  // Deal hands
  game.players[0].hand = drawHand(game.deck, 8);
  game.players[0].selected = [];
  game.players[0].played = [];
  game.players[1].hand = drawHand(game.deck, 8);
  game.players[1].selected = [];
  game.players[1].played = [];

  // Update UI
  document.getElementById('roundBadge').textContent = `第 ${game.round} 局`;
  document.getElementById('nameP1').textContent = game.players[0].name;
  document.getElementById('nameP2').textContent = game.players[1].name;
  document.getElementById('iconP1').textContent = game.players[0].icon;
  document.getElementById('iconP2').textContent = game.players[1].icon;

  updateScoreboard();
  renderHand();
  document.getElementById('opponentCards').innerHTML = '';
  document.getElementById('opponentLabel').textContent = game.mode === 'ai' ? 'AI 出牌区' : '对手出牌区';
  document.getElementById('handTitle').textContent = `${game.players[0].name}的手牌（选最多5张打出）`;
  updateActivePanel();
}

function playCards() {
  const player = game.players[game.currentPlayer - 1];
  if (player.selected.length === 0) return;

  game.phase = 'reveal';
  const playedCards = player.selected.map(i => player.hand[i]);
  player.played = playedCards;

  if (game.currentPlayer === 1) {
    // Player 1 played, now player 2's turn
    if (game.mode === 'ai') {
      // AI plays
      document.getElementById('opponentLabel').innerHTML = '<span class="thinking">AI 思考中 <span class="dots"><span></span><span></span><span></span></span></span>';
      document.getElementById('handCards').innerHTML = '';
      document.getElementById('playZoneCards').innerHTML = '';
      document.getElementById('playZoneLabel').style.display = 'block';
      document.getElementById('playZoneLabel').textContent = '等待 AI 出牌...';
      document.getElementById('scoreCalc').style.display = 'none';
      document.getElementById('synergyPreview').style.display = 'none';
      document.getElementById('playBtn').disabled = true;

      setTimeout(() => {
        const aiCards = aiChooseCards(game.players[1].hand);
        game.players[1].played = aiCards;
        showOpponentCards();
        setTimeout(() => revealResults(), 1000);
      }, 1500);
    } else {
      // Local 2P: show pass screen
      showPassScreen();
    }
  } else {
    // Player 2 played (local mode), reveal
    revealResults();
  }
}

function showPassScreen() {
  document.getElementById('passText').textContent = `请将设备交给 ${game.players[1].name}`;
  document.getElementById('passScreen').classList.add('show');
}

function hidePassScreen() {
  document.getElementById('passScreen').classList.remove('show');
  game.currentPlayer = 2;
  game.phase = 'select';
  game.players[1].selected = [];

  // Show P1's played cards as opponent
  document.getElementById('opponentCards').innerHTML = '';
  document.getElementById('opponentLabel').textContent = `${game.players[0].name} 已出牌（${game.players[0].played.length}张）`;

  // Hide P1's played details until reveal
  document.getElementById('playZoneCards').innerHTML = '';
  document.getElementById('playZoneLabel').style.display = 'block';
  document.getElementById('playZoneLabel').textContent = `${game.players[1].name} 的回合，选择手牌打出！`;
  document.getElementById('scoreCalc').style.display = 'none';
  document.getElementById('synergyPreview').style.display = 'none';

  document.getElementById('handTitle').textContent = `${game.players[1].name}的手牌（选最多5张打出）`;
  updateActivePanel();
  renderHand();
}

function showOpponentCards() {
  const container = document.getElementById('opponentCards');
  container.innerHTML = '';
  document.getElementById('opponentLabel').textContent = `${game.players[1].name} 的出牌`;

  game.players[1].played.forEach(food => {
    container.appendChild(renderCard(food, { played: true, opponent: true }));
  });
}

function revealResults() {
  const p1Result = calculateScore(game.players[0].played);
  const p2Result = calculateScore(game.players[1].played);

  game.players[0].score = p1Result.score;
  game.players[1].score = p2Result.score;

  if (p1Result.score > p2Result.score) {
    game.players[0].wins++;
  } else if (p2Result.score > p1Result.score) {
    game.players[1].wins++;
  }

  updateScoreboard();

  // Show result modal
  setTimeout(() => showResult(p1Result, p2Result), 800);
}

function showResult(p1Result, p2Result) {
  const overlay = document.getElementById('resultOverlay');
  const p1Win = p1Result.score > p2Result.score;
  const tie = p1Result.score === p2Result.score;

  document.getElementById('resultIcon').textContent = p1Win ? '🎉' : (tie ? '🤝' : '😅');
  document.getElementById('resultTitle').textContent = p1Win ? `${game.players[0].name} 获胜！` : (tie ? '平局！' : `${game.players[1].name} 获胜！`);
  document.getElementById('resultSubtitle').textContent = `第 ${game.round} 局结束`;

  document.getElementById('rsbNameP1').textContent = game.players[0].name;
  document.getElementById('rsbValueP1').textContent = p1Result.score;
  document.getElementById('rsbNameP2').textContent = game.players[1].name;
  document.getElementById('rsbValueP2').textContent = p2Result.score;

  document.getElementById('rsbP1').classList.toggle('win', p1Win);
  document.getElementById('rsbP2').classList.toggle('win', !p1Win && !tie);

  // Show synergies
  const synDiv = document.getElementById('resultSynergies');
  let synHTML = '<h4>🔥 羁绊触发</h4>';

  synHTML += `<div style="margin-bottom:12px;"><div style="font-size:13px;font-weight:600;margin-bottom:4px;">${game.players[0].name}：</div>`;
  if (p1Result.synergies.length > 0) {
    p1Result.synergies.forEach(s => {
      let effect = '';
      if (s.effect.chips) effect += `+${s.effect.chips}筹码 `;
      if (s.effect.mult) effect += `+${s.effect.mult}倍率 `;
      if (s.effect.chipsMult) effect += `筹码×${s.effect.chipsMult} `;
      if (s.effect.multMult) effect += `倍率×${s.effect.multMult} `;
      synHTML += `<div class="syn-row"><span>🔥 ${s.name}</span><span style="color:var(--accent);font-weight:700;">${effect}</span></div>`;
    });
  } else {
    synHTML += '<div class="syn-row"><span>无羁绊</span></div>';
  }
  synHTML += `<div class="syn-row" style="margin-top:4px;"><span>筹码×倍率</span><span>${p1Result.chips} × ${p1Result.mult} = ${p1Result.score}</span></div></div>`;

  synHTML += `<div><div style="font-size:13px;font-weight:600;margin-bottom:4px;">${game.players[1].name}：</div>`;
  if (p2Result.synergies.length > 0) {
    p2Result.synergies.forEach(s => {
      let effect = '';
      if (s.effect.chips) effect += `+${s.effect.chips}筹码 `;
      if (s.effect.mult) effect += `+${s.effect.mult}倍率 `;
      if (s.effect.chipsMult) effect += `筹码×${s.effect.chipsMult} `;
      if (s.effect.multMult) effect += `倍率×${s.effect.multMult} `;
      synHTML += `<div class="syn-row"><span>🔥 ${s.name}</span><span style="color:var(--accent);font-weight:700;">${effect}</span></div>`;
    });
  } else {
    synHTML += '<div class="syn-row"><span>无羁绊</span></div>';
  }
  synHTML += `<div class="syn-row" style="margin-top:4px;"><span>筹码×倍率</span><span>${p2Result.chips} × ${p2Result.mult} = ${p2Result.score}</span></div></div>`;

  synDiv.innerHTML = synHTML;

  // Check if game over
  const gameWon = game.players[0].wins >= 2 || game.players[1].wins >= 2;
  if (gameWon) {
    document.getElementById('nextRoundBtn').textContent = '查看最终结果';
  } else {
    document.getElementById('nextRoundBtn').textContent = '下一局';
  }

  overlay.classList.add('show');

  if (p1Win) launchConfetti(80);
}

function nextRound() {
  document.getElementById('resultOverlay').classList.remove('show');

  const gameWon = game.players[0].wins >= 2 || game.players[1].wins >= 2;
  if (gameWon) {
    // Show final result
    const p1Win = game.players[0].wins >= 2;
    document.getElementById('resultIcon').textContent = p1Win ? '🏆' : '🏆';
    document.getElementById('resultTitle').textContent = p1Win ? `${game.players[0].name} 获得胜利！` : `${game.players[1].name} 获得胜利！`;
    document.getElementById('resultSubtitle').textContent = `比分 ${game.players[0].wins} : ${game.players[1].wins}`;
    document.getElementById('nextRoundBtn').textContent = '再来一局';
    document.getElementById('nextRoundBtn').onclick = () => { document.getElementById('resultOverlay').classList.remove('show'); startGame(game.mode); };
    setTimeout(() => document.getElementById('resultOverlay').classList.add('show'), 300);
    launchConfetti(150);
    return;
  }

  game.round++;
  startRound();
}

function updateScoreboard() {
  document.getElementById('scoreP1').textContent = game.players[0].score;
  document.getElementById('scoreP2').textContent = game.players[1].score;

  ['P1', 'P2'].forEach((p, i) => {
    const winsDiv = document.getElementById('wins' + p);
    winsDiv.innerHTML = '';
    for (let j = 0; j < 2; j++) {
      const dot = document.createElement('div');
      dot.className = 'win-dot' + (j < game.players[i].wins ? ' filled' : '');
      winsDiv.appendChild(dot);
    }
  });
}

function updateActivePanel() {
  document.getElementById('panelP1').classList.toggle('active', game.currentPlayer === 1);
  document.getElementById('panelP2').classList.toggle('active', game.currentPlayer === 2);
}

function backToMenu() {
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('menuScreen').style.display = 'flex';
  document.getElementById('resultOverlay').classList.remove('show');
}

// ===== Guide =====
function showGuide() {
  const content = document.getElementById('guideContent');
  let html = '';
  SYNERGIES.forEach(s => {
    let effect = '';
    if (s.effect.chips) effect += `+${s.effect.chips} 筹码 `;
    if (s.effect.mult) effect += `+${s.effect.mult} 倍率 `;
    if (s.effect.chipsMult) effect += `筹码 ×${s.effect.chipsMult} `;
    if (s.effect.multMult) effect += `倍率 ×${s.effect.multMult} `;
    html += `<div class="guide-item"><div class="gi-name">🔥 ${s.name}</div><div class="gi-desc">${s.desc}</div><div class="gi-effect">${effect}</div></div>`;
  });
  content.innerHTML = html;
  document.getElementById('guideOverlay').classList.add('show');
}

function hideGuide() {
  document.getElementById('guideOverlay').classList.remove('show');
}

// ===== Toast & Confetti =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function launchConfetti(count = 50) {
  const container = document.getElementById('confettiContainer');
  const colors = ['#FF6B35','#FFD166','#06D6A0','#8B5CF6','#EC4899','#3B82F6','#F59E0B'];
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.width = (6 + Math.random() * 8) + 'px';
    c.style.height = (6 + Math.random() * 8) + 'px';
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.5 + 's';
    container.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

// ===== Init =====
// No init needed, menu is shown by default
</script>
