<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#F97316">
  <title>途灵 AI - 智能旅行计划生成器</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="app">
    <!-- 首页 -->
    <div id="homePage" class="page home-page">
      <div class="hero">
        <img src="assets/hero.jpg" alt="途灵 AI">
        <div class="hero-overlay">
          <span class="badge">TRAE AI 创造力大赛 Demo</span>
          <h1>途灵 AI</h1>
          <p class="subtitle">一句话生成完美旅行计划</p>
        </div>
      </div>
      <div class="home-content">
        <div class="features">
          <div class="feature">
            <span class="icon">🗺️</span>
            <span>智能行程</span>
          </div>
          <div class="feature">
            <span class="icon">💰</span>
            <span>预算估算</span>
          </div>
          <div class="feature">
            <span class="icon">✅</span>
            <span>打卡清单</span>
          </div>
        </div>
        <button class="btn-primary btn-large" onclick="showForm()">
          开始规划旅程
        </button>
        <p class="hint">输入目的地和天数，AI 自动生成完整方案</p>
      </div>
    </div>

    <!-- 输入表单页 -->
    <div id="formPage" class="page form-page hidden">
      <div class="form-header">
        <button class="btn-back" onclick="showHome()">← 返回</button>
        <h2>规划你的旅程</h2>
      </div>
      <div class="form-body">
        <div class="form-group">
          <label>目的地 <span class="required">*</span></label>
          <input type="text" id="destination" placeholder="例如：成都、大理、东京..." value="成都">
        </div>
        <div class="form-group">
          <label>旅行天数 <span class="required">*</span></label>
          <div class="day-selector">
            <button class="day-btn" data-days="2">2天</button>
            <button class="day-btn active" data-days="3">3天</button>
            <button class="day-btn" data-days="5">5天</button>
            <button class="day-btn" data-days="7">7天</button>
          </div>
        </div>
        <div class="form-group">
          <label>旅行偏好（可多选）</label>
          <div class="tag-selector">
            <button class="tag-btn active" data-tag="美食">🍜 美食</button>
            <button class="tag-btn active" data-tag="文化">🏛️ 文化</button>
            <button class="tag-btn" data-tag="自然">🏔️ 自然</button>
            <button class="tag-btn" data-tag="购物">🛍️ 购物</button>
            <button class="tag-btn" data-tag="休闲">☕ 休闲</button>
            <button class="tag-btn" data-tag="冒险">🧗 冒险</button>
          </div>
        </div>
        <div class="form-group">
          <label>预算档位</label>
          <div class="budget-selector">
            <button class="budget-btn" data-budget="经济">💰 经济型</button>
            <button class="budget-btn active" data-budget="舒适">💰💰 舒适型</button>
            <button class="budget-btn" data-budget="豪华">💰💰💰 豪华型</button>
          </div>
        </div>
        <button class="btn-primary btn-generate" onclick="generatePlan()">
          <span id="btnText">✨ 生成旅行计划</span>
          <div id="btnLoading" class="loading hidden">
            <span class="spinner"></span> AI 正在规划...
          </div>
        </button>
      </div>
    </div>

    <!-- 结果页 -->
    <div id="resultPage" class="page result-page hidden">
      <div class="result-header">
        <button class="btn-back" onclick="showForm()">← 重新规划</button>
        <h2 id="resultTitle">成都 3 天旅行计划</h2>
        <p id="resultSubtitle" class="result-subtitle">美食 · 文化 | 舒适型预算</p>
      </div>
      <div class="result-body">
        <!-- 概览卡片 -->
        <div class="overview-card">
          <div class="overview-item">
            <span class="overview-num" id="totalBudget">¥1,150</span>
            <span class="overview-label">预估总预算</span>
          </div>
          <div class="overview-item">
            <span class="overview-num" id="totalSpots">12</span>
            <span class="overview-label">推荐景点</span>
          </div>
          <div class="overview-item">
            <span class="overview-num" id="totalFood">8</span>
            <span class="overview-label">美食推荐</span>
          </div>
        </div>

        <!-- 预算明细 -->
        <div class="budget-section">
          <h3>💰 预算明细</h3>
          <div class="budget-bars" id="budgetBars"></div>
        </div>

        <!-- 每日行程 -->
        <div class="itinerary-section">
          <h3>📅 每日行程</h3>
          <div id="itineraryList"></div>
        </div>

        <!-- 打卡清单 -->
        <div class="checklist-section">
          <h3>✅ 必打卡清单</h3>
          <div class="checklist-tabs">
            <button class="checklist-tab active" data-tab="spots">景点</button>
            <button class="checklist-tab" data-tab="food">美食</button>
            <button class="checklist-tab" data-tab="experience">体验</button>
          </div>
          <div id="checklistContent"></div>
        </div>

        <!-- 分享按钮 -->
        <div class="share-section">
          <button class="btn-outline" onclick="sharePlan()">📤 分享计划</button>
          <button class="btn-outline" onclick="exportPlan()">📥 导出 PDF</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 分享弹窗 -->
  <div id="shareModal" class="modal hidden">
    <div class="modal-content">
      <h3>分享你的旅行计划</h3>
      <div class="share-link">
        <input type="text" id="shareUrl" readonly value="https://tuling.ai/plan/abc123">
        <button onclick="copyLink()">复制</button>
      </div>
      <button class="btn-close" onclick="closeModal()">关闭</button>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
