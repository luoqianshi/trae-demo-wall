<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小微情绪出口</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --night-deep: #0D1B2A;
            --night-mid: #1B263B;
            --night-surface: #243B53;
            --moon-glow: #F4E8D1;
            --moon-soft: #E8D5B5;
            --cream: #FDF8F0;
            --cream-dark: #F5EDE0;
            --ink: #2C3E50;
            --ink-light: #5D7A8C;
            --warm: #D4A574;
            --warm-soft: #C4956A;
            --accent: #E8C4A0;
            --success: #7BA389;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', -apple-system, BlinkMacSystemFont, serif;
            background: linear-gradient(180deg, var(--night-deep) 0%, var(--night-mid) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 0;
            color: var(--moon-glow);
            overflow-x: hidden;
        }

        /* 背景装饰：月光 */
        .moon-bg {
            position: fixed;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(244, 232, 209, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(244, 232, 209, 0.6);
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .app-container {
            width: 390px;
            min-height: 844px;
            background: linear-gradient(180deg, rgba(27, 38, 59, 0.95) 0%, rgba(13, 27, 42, 0.98) 100%);
            position: relative;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 
                0 0 0 1px rgba(244, 232, 209, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(244, 232, 209, 0.05);
            z-index: 1;
        }

        /* 纸张纹理叠加 */
        .paper-texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
        }

        .page {
            display: none;
            padding: 0 28px;
            padding-bottom: 40px;
            min-height: 844px;
            position: relative;
            z-index: 2;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 首页 ===== */
        .home-content {
            text-align: center;
            padding-top: 48px;
        }

        .logo-area {
            margin-bottom: 40px;
        }

        .moon-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            position: relative;
            animation: float 6s ease-in-out infinite;
        }

        .moon-icon::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, var(--moon-glow) 0%, var(--moon-soft) 50%, var(--warm-soft) 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 60px rgba(244, 232, 209, 0.3),
                0 0 120px rgba(244, 232, 209, 0.1);
        }

        .moon-icon::after {
            content: '';
            position: absolute;
            width: 60%;
            height: 60%;
            background: var(--night-mid);
            border-radius: 50%;
            top: 10%;
            left: 25%;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }

        .brand-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 32px;
            color: var(--moon-glow);
            letter-spacing: 8px;
            margin-bottom: 16px;
            text-shadow: 0 0 40px rgba(244, 232, 209, 0.3);
        }

        .brand-subtitle {
            font-size: 14px;
            color: var(--ink-light);
            line-height: 1.8;
            max-width: 260px;
            margin: 0 auto;
            font-weight: 400;
        }

        .divider-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--warm), transparent);
            margin: 40px auto;
        }

        .values-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 48px;
        }

        .value-chip {
            padding: 8px 18px;
            background: rgba(244, 232, 209, 0.08);
            border: 1px solid rgba(244, 232, 209, 0.15);
            border-radius: 24px;
            font-size: 13px;
            color: var(--moon-soft);
            transition: all 0.3s ease;
        }

        .value-chip:hover {
            background: rgba(244, 232, 209, 0.12);
            border-color: rgba(244, 232, 209, 0.25);
        }

        .main-cta {
            display: block;
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(135deg, var(--warm) 0%, var(--warm-soft) 100%);
            color: var(--night-deep);
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 
                0 4px 20px rgba(212, 165, 116, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
        }

        .main-cta:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 30px rgba(212, 165, 116, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .main-cta:active {
            transform: scale(0.98);
        }

        .history-area {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid rgba(244, 232, 209, 0.08);
        }

        .section-label {
            font-size: 11px;
            color: var(--ink-light);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            background: rgba(244, 232, 209, 0.05);
            border: 1px solid rgba(244, 232, 209, 0.08);
            border-radius: 12px;
            padding: 14px 16px;
            text-align: left;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            background: rgba(244, 232, 209, 0.08);
            border-color: rgba(244, 232, 209, 0.12);
        }

        .history-date {
            font-size: 10px;
            color: var(--ink-light);
            margin-bottom: 6px;
        }

        .history-keyword {
            font-size: 14px;
            color: var(--moon-glow);
        }

        .empty-state {
            text-align: center;
            padding: 24px;
            color: var(--ink-light);
            font-size: 13px;
        }

        /* ===== 情绪输入页 ===== */
        .page-header {
            text-align: center;
            padding: 40px 0 32px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 500;
            color: var(--moon-glow);
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 13px;
            color: var(--ink-light);
        }

        .mood-orbs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 32px 0;
        }

        .mood-orb {
            padding: 14px 20px;
            background: rgba(244, 232, 209, 0.06);
            border: 1px solid rgba(244, 232, 209, 0.12);
            border-radius: 28px;
            font-size: 14px;
            color: var(--moon-soft);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .mood-orb::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--warm) 0%, var(--warm-soft) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .mood-orb:hover {
            border-color: var(--warm);
            color: var(--moon-glow);
        }

        .mood-orb:hover::before {
            opacity: 0.1;
        }

        .mood-orb.selected {
            border-color: var(--warm);
            color: var(--moon-glow);
        }

        .mood-orb.selected::before {
            opacity: 0.2;
        }

        .mood-orb span {
            position: relative;
            z-index: 1;
        }

        .text-write-area {
            margin: 32px 0;
        }

        .write-box {
            width: 100%;
            min-height: 140px;
            padding: 18px;
            background: rgba(244, 232, 209, 0.04);
            border: 1px solid rgba(244, 232, 209, 0.1);
            border-radius: 16px;
            font-size: 15px;
            color: var(--moon-glow);
            font-family: 'Noto Serif SC', serif;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            line-height: 1.8;
        }

        .write-box:focus {
            border-color: var(--warm);
            background: rgba(244, 232, 209, 0.06);
        }

        .write-box::placeholder {
            color: var(--ink-light);
        }

        .hint-text {
            font-size: 12px;
            color: var(--ink-light);
            text-align: center;
            margin-top: 12px;
        }

        .btn-row {
            margin-top: 32px;
        }

        .ghost-btn {
            background: transparent;
            border: none;
            color: var(--ink-light);
            font-size: 13px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            padding: 16px;
            margin-top: 12px;
            width: 100%;
            transition: color 0.3s ease;
        }

        .ghost-btn:hover {
            color: var(--moon-soft);
        }

        /* ===== 倾听页 ===== */
        .chat-area {
            min-height: 380px;
            padding: 16px 0;
        }

        .message-wrap {
            display: flex;
            margin-bottom: 20px;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrap.user {
            justify-content: flex-end;
        }

        .message-wrap.bot {
            justify-content: flex-start;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            font-size: 16px;
        }

        .msg-avatar.ai {
            background: linear-gradient(135deg, var(--warm) 0%, var(--warm-soft) 100%);
            box-shadow: 0 4px 12px rgba(212, 165, 116, 0.3);
        }

        .msg-avatar.human {
            background: rgba(244, 232, 209, 0.15);
            margin-left: 10px;
        }

        .message-wrap.user .msg-avatar.human {
            margin-left: 10px;
            margin-right: 0;
        }

        .message-wrap.user {
            flex-direction: row-reverse;
        }

        .msg-bubble {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.8;
        }

        .msg-bubble.bot {
            background: rgba(244, 232, 209, 0.08);
            color: var(--moon-glow);
            border-radius: 18px 18px 18px 4px;
            margin-left: 10px;
        }

        .msg-bubble.human {
            background: linear-gradient(135deg, var(--warm) 0%, var(--warm-soft) 100%);
            color: var(--night-deep);
            border-radius: 18px 18px 4px 18px;
            margin-right: 10px;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--warm);
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .action-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .action-btn {
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--warm) 0%, var(--warm-soft) 100%);
            color: var(--night-deep);
            border: none;
            font-weight: 600;
        }

        .action-btn.outline {
            background: transparent;
            border: 1px solid rgba(244, 232, 209, 0.2);
            color: var(--moon-soft);
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        /* ===== 整理页 ===== */
        .cards-stack {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 24px 0;
        }

        .emotion-card {
            background: rgba(244, 232, 209, 0.05);
            border: 1px solid rgba(244, 232, 209, 0.1);
            border-radius: 20px;
            padding: 22px 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .emotion-card:hover {
            background: rgba(244, 232, 209, 0.08);
            border-color: rgba(244, 232, 209, 0.15);
            transform: translateY(-2px);
        }

        .emotion-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20px;
            bottom: 20px;
            width: 3px;
            background: linear-gradient(180deg, var(--warm), var(--warm-soft));
            border-radius: 2px;
        }

        .card-label {
            font-size: 11px;
            color: var(--warm);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card-body {
            font-size: 14px;
            color: var(--moon-glow);
            line-height: 1.8;
        }

        .feedback-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .feedback-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 13px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .feedback-btn.ok {
            background: rgba(123, 163, 137, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .feedback-btn.retry {
            background: rgba(244, 232, 209, 0.05);
            border: 1px solid rgba(244, 232, 209, 0.15);
            color: var(--moon-soft);
        }

        .feedback-btn:hover {
            transform: scale(1.02);
        }

        /* ===== 小行动页 ===== */
        .action-card {
            background: linear-gradient(145deg, rgba(244, 232, 209, 0.08) 0%, rgba(212, 165, 116, 0.05) 100%);
            border: 1px solid rgba(244, 232, 209, 0.12);
            border-radius: 24px;
            padding: 40px 28px;
            text-align: center;
            margin: 24px 0;
        }

        .action-emoji {
            font-size: 56px;
            margin-bottom: 20px;
            display: block;
        }

        .action-heading {
            font-size: 20px;
            font-weight: 600;
            color: var(--moon-glow);
            margin-bottom: 12px;
        }

        .action-detail {
            font-size: 13px;
            color: var(--ink-light);
            line-height: 1.7;
            margin-bottom: 16px;
        }

        .action-note {
            font-size: 12px;
            color: var(--warm);
            font-style: italic;
        }

        .choice-btns {
            margin-top: 32px;
        }

        .choice-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        .choice-btn.yes {
            background: linear-gradient(135deg, var(--warm) 0%, var(--warm-soft) 100%);
            color: var(--night-deep);
            border: none;
            font-weight: 600;
        }

        .choice-btn.no {
            background: transparent;
            border: 1px solid rgba(244, 232, 209, 0.15);
            color: var(--ink-light);
        }

        .choice-btn:hover {
            transform: translateY(-2px);
        }

        /* ===== 记录页 ===== */
        .record-card {
            background: linear-gradient(145deg, rgba(244, 232, 209, 0.06) 0%, rgba(212, 165, 116, 0.03) 100%);
            border: 1px solid rgba(244, 232, 209, 0.1);
            border-radius: 28px;
            padding: 28px 24px;
            margin: 24px 0;
            position: relative;
            overflow: hidden;
        }

        .record-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--warm), var(--warm-soft), var(--warm));
        }

        .record-section {
            margin-bottom: 22px;
        }

        .record-section:last-child {
            margin-bottom: 0;
        }

        .record-label {
            font-size: 10px;
            color: var(--warm);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .record-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .record-tag {
            background: rgba(212, 165, 116, 0.2);
            color: var(--moon-glow);
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 13px;
        }

        .record-text {
            font-size: 14px;
            color: var(--moon-glow);
            line-height: 1.7;
        }

        .record-quote {
            background: linear-gradient(135deg, var(--warm) 0%, var(--warm-soft) 100%);
            border-radius: 16px;
            padding: 18px 20px;
            margin-top: 24px;
            position: relative;
        }

        .record-quote::before {
            content: '"';
            position: absolute;
            font-size: 48px;
            color: rgba(13, 27, 42, 0.2);
            top: -8px;
            left: 10px;
            font-family: Georgia, serif;
        }

        .record-quote p {
            font-size: 14px;
            color: var(--night-deep);
            line-height: 1.7;
            position: relative;
            z-index: 1;
        }

        .record-actions {
            margin-top: 28px;
        }

        .secondary-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid rgba(244, 232, 209, 0.2);
            border-radius: 14px;
            color: var(--moon-soft);
            font-size: 14px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
        }

        .secondary-btn:hover {
            background: rgba(244, 232, 209, 0.05);
            border-color: rgba(244, 232, 209, 0.25);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--moon-glow);
            color: var(--night-deep);
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1000;
            animation: toastIn 0.3s ease;
            display: none;
            font-weight: 500;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        /* 重置按钮 */
        .reset-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 38px;
            height: 38px;
            background: rgba(244, 232, 209, 0.08);
            border: 1px solid rgba(244, 232, 209, 0.15);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            z-index: 100;
            transition: all 0.3s ease;
            color: var(--moon-soft);
        }

        .reset-btn:hover {
            background: rgba(244, 232, 209, 0.12);
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <div class="moon-bg"></div>
    <div class="stars" id="stars"></div>
    
    <button class="reset-btn" onclick="resetDemo()" title="重置">↻</button>
    <div class="toast" id="toast">已保存</div>

    <div class="app-container">
        <div class="paper-texture"></div>

        <!-- 首页 -->
        <div id="page-home" class="page active">
            <div class="home-content">
                <div class="logo-area">
                    <div class="moon-icon"></div>
                    <h1 class="brand-title">小微情绪出口</h1>
                    <p class="brand-subtitle">有些话，不是不想说<br>而是不知道该发给谁</p>
                </div>

                <div class="divider-line"></div>

                <div class="values-row">
                    <span class="value-chip">不评价</span>
                    <span class="value-chip">不说教</span>
                    <span class="value-chip">先接住情绪</span>
                    <span class="value-chip">再慢慢整理</span>
                </div>

                <button class="main-cta" onclick="goToInput()">开始说说今天的事</button>

                <div class="history-area">
                    <div class="section-label">最近的出口</div>
                    <div class="history-list" id="history-list">
                        <div class="empty-state">还没有记录，来这里说说吧</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 情绪输入页 -->
        <div id="page-input" class="page">
            <div class="page-header">
                <h2 class="page-title">今天发生了什么？</h2>
                <p class="page-subtitle">想说些什么，都可以告诉我</p>
            </div>

            <div class="mood-orbs">
                <button class="mood-orb" onclick="pickMood(this, '今天很累')"><span>今天很累</span></button>
                <button class="mood-orb" onclick="pickMood(this, '有点委屈')"><span>有点委屈</span></button>
                <button class="mood-orb" onclick="pickMood(this, '很烦但说不清')"><span>很烦但说不清</span></button>
                <button class="mood-orb" onclick="pickMood(this, '想找人说话')"><span>想找人说话</span></button>
                <button class="mood-orb" onclick="pickMood(this, '什么都不想做')"><span>什么都不想做</span></button>
            </div>

            <div class="text-write-area">
                <textarea class="write-box" id="write-box" placeholder="或者，说说今天发生了什么..."></textarea>
                <p class="hint-text">不着急，想到什么说什么</p>
            </div>

            <div class="btn-row">
                <button class="main-cta" onclick="submitEmotion()">交给小微听听</button>
                <button class="ghost-btn" onclick="goHome()">算了，先不说了</button>
            </div>
        </div>

        <!-- 倾听页 -->
        <div id="page-listening" class="page">
            <div class="page-header">
                <h2 class="page-title">小微在听</h2>
            </div>

            <div class="chat-area" id="chat-area"></div>

            <div class="action-row" id="action-row" style="display: none;">
                <button class="action-btn outline" onclick="keepTalking()">继续说一点</button>
                <button class="action-btn primary" onclick="organize()">帮我整理一下</button>
            </div>
        </div>

        <!-- 整理页 -->
        <div id="page-organize" class="page">
            <div class="page-header">
                <h2 class="page-title">帮你整理了一下</h2>
                <p class="page-subtitle">看看有没有戳中你的</p>
            </div>

            <div class="cards-stack" id="cards-stack"></div>

            <div class="feedback-row">
                <button class="feedback-btn ok" onclick="confirmCard()">有点像</button>
                <button class="feedback-btn retry" onclick="retryCard()">不太像，重新整理</button>
            </div>
        </div>

        <!-- 小行动页 -->
        <div id="page-action" class="page">
            <div class="page-header">
                <h2 class="page-title">今天只需要做一件小事</h2>
                <p class="page-subtitle">不用一下子变好，只是给自己一个小小的出口</p>
            </div>

            <div class="action-card" id="action-card"></div>

            <div class="choice-btns">
                <button class="choice-btn yes" onclick="doAction()">我愿意试试</button>
                <button class="choice-btn no" onclick="skipAction()">今天先不做也没关系</button>
            </div>
        </div>

        <!-- 记录页 -->
        <div id="page-record" class="page">
            <div class="page-header">
                <h2 class="page-title">今日情绪出口卡</h2>
            </div>

            <div class="record-card" id="record-card"></div>

            <div class="record-actions">
                <button class="main-cta" onclick="saveRecord()">保存今日记录</button>
                <button class="secondary-btn" onclick="startOver()">再说一件事</button>
                <button class="ghost-btn" onclick="goHome()">回到首页</button>
            </div>
        </div>
    </div>

    <script>
        // 状态
        const EMOTION_STORAGE_KEY = 'xw_records_v2';

        let state = {
            mood: null,
            text: '',
            profile: null,
            analysis: null,
            suggestion: null,
            record: null
        };

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, ch => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[ch]));
        }

        function safeReadRecords() {
            try {
                const current = JSON.parse(localStorage.getItem(EMOTION_STORAGE_KEY) || '[]');
                if (Array.isArray(current) && current.length) return current;
            } catch (e) {}
            try {
                const legacy = JSON.parse(localStorage.getItem('xw_records') || '[]');
                return Array.isArray(legacy) ? legacy : [];
            } catch (e) {
                return [];
            }
        }

        function detectEmotionKeywords(input) {
            const text = String(input || '');
            const rules = [
                { type: 'tired', mood: '疲惫', words: ['累', '疲', '困', '耗尽', '没力', '加班'] },
                { type: 'wronged', mood: '委屈', words: ['委屈', '不公平', '没人懂', '被误会', '难过'] },
                { type: 'anxious', mood: '焦虑', words: ['烦', '急', '慌', '压力', '担心', '睡不着', '停不下来'] },
                { type: 'lonely', mood: '想被听见', words: ['孤单', '一个人', '想说话', '没人', '陪'] },
                { type: 'low', mood: '低能量', words: ['不想做', '提不起', '空', '低落', '没意思'] }
            ];
            return rules.find(rule => rule.words.some(word => text.includes(word))) || rules[2];
        }

        function buildEmotionProfile() {
            const combined = [state.mood, state.text].filter(Boolean).join(' ');
            const detected = detectEmotionKeywords(combined);
            const snippets = {
                tired: {
                    cause: '今天的消耗可能已经超过了你的恢复速度。',
                    need: '你需要的是先停下来，而不是继续逼自己输出。',
                    action: '闭眼休息 3 分钟',
                    quote: '休息不是退步，是给自己留一点回来的力气。'
                },
                wronged: {
                    cause: '你可能付出了一些努力，但没有被好好看见。',
                    need: '你需要的是被理解，也需要先承认自己的感受是真的。',
                    action: '给自己写一句“我已经尽力了”',
                    quote: '委屈出现时，先站在自己这一边。'
                },
                anxious: {
                    cause: '事情还没有完全落地，大脑一直在试图提前解决它。',
                    need: '你需要把混在一起的压力拆小一点，只处理眼前一步。',
                    action: '写下最担心的一件事',
                    quote: '把它写下来，压力就不必全留在脑子里。'
                },
                lonely: {
                    cause: '你不是一定要一个答案，而是希望有个地方能接住你。',
                    need: '你需要一点连接感，也需要允许自己表达需求。',
                    action: '给一个信任的人发一句问候',
                    quote: '想被听见，是很正常、也很珍贵的需要。'
                },
                low: {
                    cause: '能量低的时候，很多事都会显得比平时更重。',
                    need: '你需要一个小到不会失败的动作，让身体先重新启动。',
                    action: '喝一杯温水',
                    quote: '不用马上变好，先动一下就够了。'
                }
            };
            return { ...detected, ...snippets[detected.type] };
        }

        // 生成星星
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 30; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 60 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }
        createStars();

        // 页面切换
        function switchPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
        }

        function goHome() {
            switchPage('home');
            renderHistory();
        }

        function goToInput() {
            state.mood = null;
            state.text = '';
            state.profile = null;
            state.analysis = null;
            state.suggestion = null;
            state.record = null;
            document.querySelectorAll('.mood-orb').forEach(b => b.classList.remove('selected'));
            document.getElementById('write-box').value = '';
            document.getElementById('action-row').style.display = 'none';
            switchPage('input');
        }

        function pickMood(el, mood) {
            document.querySelectorAll('.mood-orb').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            state.mood = mood;
        }

        function submitEmotion() {
            const text = document.getElementById('write-box').value.trim();
            state.text = text || state.mood || '有点说不清';

            if (!state.mood && !text) {
                showToast('先选一个状态，或写一句也可以');
                return;
            }

            state.profile = buildEmotionProfile();
            startListening();
        }

        function startListening() {
            switchPage('listening');
            const area = document.getElementById('chat-area');
            area.innerHTML = '';
            document.getElementById('action-row').style.display = 'none';

            // 用户消息
            addMsg(state.text, 'human');

            // 打字指示器
            const typing = document.createElement('div');
            typing.className = 'message-wrap bot';
            typing.id = 'typing';
            typing.innerHTML = `
                <div class="msg-avatar ai">✨</div>
                <div class="msg-bubble bot">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            `;
            area.appendChild(typing);

            setTimeout(() => {
                document.getElementById('typing').remove();
                const reply = genReply();
                addMsg(reply, 'ai');
                document.getElementById('action-row').style.display = 'flex';
            }, 1800);
        }

        function addMsg(text, type) {
            const area = document.getElementById('chat-area');
            const div = document.createElement('div');
            div.className = 'message-wrap ' + type;
            div.innerHTML = `
                <div class="msg-avatar ${type === 'ai' ? 'ai' : 'human'}">${type === 'ai' ? '✨' : '😊'}</div>
                <div class="msg-bubble ${type}">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
            `;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        function genReply() {
            const profile = state.profile || buildEmotionProfile();
            const base = {
                tired: '听起来你今天真的消耗了很多。能量见底的感觉，很不好受。',
                wronged: '我能感觉到你心里有些不舒服。委屈的时候，往往是某些努力没有被看见。',
                anxious: '有时候烦和慌不是因为你不够冷静，而是脑子里同时开了太多窗口。',
                lonely: '你想找个地方说说，这本身就很重要。被听见是一种很真实的需要。',
                low: '什么都不想做的时候，通常不是懒，而是真的暂时没有力气。'
            }[profile.type] || '我听到了。先不用急着解释清楚，我们可以一点点来。';
            if (state.text && state.text !== state.mood) {
                return base + '\n\n你提到：“' + state.text.slice(0, 28) + (state.text.length > 28 ? '...' : '') + '”\n\n我先帮你接住它：' + profile.need;
            }
            return base + '\n\n' + profile.need;
        }

        function keepTalking() {
            addMsg('我听着呢。你可以先不用讲完整，只补一句：这件事最让你难受的地方是什么？', 'ai');
        }

        function organize() {
            state.analysis = genAnalysis();
            renderCards();
            switchPage('organize');
        }

        function genAnalysis() {
            const profile = state.profile || buildEmotionProfile();
            return [
                {
                    label: '发生了什么',
                    body: profile.cause
                },
                {
                    label: '我感受到什么',
                    body: '这更像是一种「' + profile.mood + '」的状态。它不需要马上被纠正，先被看见就已经很重要。'
                },
                {
                    label: '我可能需要什么',
                    body: profile.need
                }
            ];
        }

        function renderCards() {
            const stack = document.getElementById('cards-stack');
            stack.innerHTML = state.analysis.map(item => `
                <div class="emotion-card">
                    <div class="card-label">${item.label}</div>
                    <div class="card-body">${item.body}</div>
                </div>
            `).join('');
        }

        function confirmCard() {
            showSuggestion();
        }

        function retryCard() {
            state.profile = buildEmotionProfile();
            state.analysis = genAnalysis();
            state.analysis[1].body = '换一种说法：你现在的感受可能不是单一情绪，而是「' + state.profile.mood + '」和一点点需要被照顾的信号。';
            renderCards();
        }

        function showSuggestion() {
            const suggestions = [
                { emoji: '💧', title: '喝一杯温水', desc: '不需要是什么特别的水，就只是喝一口，暂时放下那些烦心事。', note: '照顾一下自己的身体' },
                { emoji: '🚶', title: '出门走3分钟', desc: '不需要去很远，也不需要运动。只是离开现在的环境，让空气换一换。', note: '一个最小的出走' },
                { emoji: '📱', title: '放下手机10分钟', desc: '不刷视频，不看消息，不回邮件。就只是和自己待一会儿。', note: '给自己一个放空的机会' },
                { emoji: '✍️', title: '给自己写一句话', desc: '可以是鼓励，可以是吐槽，也可以只是记录下今天。就一句话就好。', note: '不需要文采' },
                { emoji: '🛁', title: '洗个热水澡', desc: '让水流带走一些疲惫，给自己的身体一个被照顾的感觉。', note: '简单的自我关怀' }
            ];
            state.suggestion = personalizeActionSuggestion(suggestions);
            const card = document.getElementById('action-card');
            card.innerHTML = `
                <span class="action-emoji">${state.suggestion.emoji}</span>
                <div class="action-heading">${state.suggestion.title}</div>
                <div class="action-detail">${state.suggestion.desc}</div>
                <div class="action-note">${state.suggestion.note}</div>
            `;
            switchPage('action');
        }

        function personalizeActionSuggestion(suggestions) {
            const profile = state.profile || buildEmotionProfile();
            const byType = {
                tired: suggestions.find(s => s.title.includes('温水')) || suggestions[0],
                wronged: suggestions.find(s => s.title.includes('写一句话')) || suggestions[3],
                anxious: suggestions.find(s => s.title.includes('放下手机')) || suggestions[2],
                lonely: { emoji: '💬', title: '发一句轻轻的问候', desc: '找一个安全的人，发一句“在吗”或“今天有点想说话”。不用解释很多。', note: '给连接留一条小缝' },
                low: suggestions.find(s => s.title.includes('走3分钟')) || suggestions[1]
            };
            return byType[profile.type] || suggestions[0];
        }

        function doAction() {
            genRecord(true);
        }

        function skipAction() {
            genRecord(false);
        }

        function genRecord(did) {
            const profile = state.profile || buildEmotionProfile();
            state.record = {
                id: 'emo-' + Date.now() + '-' + Math.random().toString(16).slice(2, 7),
                createdAt: Date.now(),
                date: new Date().toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' }),
                mood: profile.mood || state.mood || '有些说不清',
                rawMood: state.mood,
                text: state.text,
                felt: state.analysis ? state.analysis[1].body.slice(0, 40) + '...' : '',
                action: state.suggestion ? state.suggestion.title : '',
                didAction: did,
                quote: did 
                    ? profile.quote
                    : '今天愿意说出来，已经是照顾自己的方式了。什么时候准备好，再迈出那一步都可以。'
            };
            renderRecord();
            switchPage('record');
        }

        function renderRecord() {
            const card = document.getElementById('record-card');
            card.innerHTML = `
                <div class="record-section">
                    <div class="record-label">今日情绪</div>
                    <div class="record-tags"><span class="record-tag">${escapeHtml(state.record.mood)}</span></div>
                </div>
                <div class="record-section">
                    <div class="record-label">小微听到的</div>
                    <div class="record-text">${escapeHtml(state.record.felt)}</div>
                </div>
                <div class="record-section">
                    <div class="record-label">给自己的小行动</div>
                    <div class="record-text">${escapeHtml(state.record.action || '今天没有特定的行动，只是说出来')}</div>
                </div>
                <div class="record-quote">
                    <p>${escapeHtml(state.record.quote)}</p>
                </div>
            `;
        }

        function saveRecord() {
            if (!state.record) return;
            let records = safeReadRecords().filter(item => item.id !== state.record.id);
            records.unshift(state.record);
            if (records.length > 3) records = records.slice(0, 3);
            localStorage.setItem(EMOTION_STORAGE_KEY, JSON.stringify(records));
            showToast('已保存今日记录');
        }

        function showToast(text) {
            const t = document.getElementById('toast');
            t.textContent = text || '已保存';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function renderHistory() {
            const records = safeReadRecords();
            const list = document.getElementById('history-list');
            if (records.length === 0) {
                list.innerHTML = '<div class="empty-state">还没有记录，来这里说说吧</div>';
                return;
            }
            list.innerHTML = records.map(r => `
                <div class="history-item">
                    <div class="history-date">${escapeHtml(r.date)}</div>
                    <div class="history-keyword">${escapeHtml(r.mood)} · ${escapeHtml(r.action || '已倾诉')}</div>
                </div>
            `).join('');
        }

        function startOver() {
            state = { mood: null, text: '', profile: null, analysis: null, suggestion: null, record: null };
            document.querySelectorAll('.mood-orb').forEach(b => b.classList.remove('selected'));
            document.getElementById('write-box').value = '';
            document.getElementById('action-row').style.display = 'none';
            switchPage('input');
        }

        function resetDemo() {
            localStorage.removeItem(EMOTION_STORAGE_KEY);
            localStorage.removeItem('xw_records');
            state = { mood: null, text: '', profile: null, analysis: null, suggestion: null, record: null };
            goHome();
        }

        document.addEventListener('DOMContentLoaded', renderHistory);
    </script>
</body>
</html>
