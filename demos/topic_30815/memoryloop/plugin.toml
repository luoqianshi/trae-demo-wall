# Memory Loop — Trae Plugin Manifest
# This file declares the plugin for Trae IDE integration

[plugin]
name = "memory-loop"
version = "1.0.0"
description = "Project-level memory loop system for AI-assisted development. Hot/cold layers, schema editing, compression."
author = "Memory Loop"
license = "MIT"
homepage = "https://github.com/memoryloop/memory-loop"

[plugin.activation]
on_startup = true
on_command = ["memoryLoop.openDashboard", "memoryLoop.initialize", "memoryLoop.compress"]

[plugin.commands]
"memoryLoop.openDashboard" = "Memory Loop: Open Dashboard"
"memoryLoop.initialize" = "Memory Loop: Initialize Project Memory"
"memoryLoop.compress" = "Memory Loop: Check Compression"
"memoryLoop.openMemoryFile" = "Memory Loop: Edit MEMORY.md"
"memoryLoop.openSchema" = "Memory Loop: Edit Schema"

[plugin.configuration]
auto_initialize = true
server_port = 3721
auto_open_on_start = false

[plugin.keybindings]
"memoryLoop.openDashboard" = "ctrl+shift+m"

[plugin.skill]
path = ".trae/skills/memory-loop/SKILL.md"
description = "Project-level memory persistence with hot/cold layers and schema-driven structure"

[plugin.server]
entry = "server/server.js"
type = "node"
port_env = "MEMORY_LOOP_PORT"
default_port = 3721

[plugin.frontend]
path = "frontend/"
entry = "index.html"
