version: "1.0"

hot_layer:
  sections:
    - name: "Project Context"
      description: "项目类型、核心技术栈、架构概述"
      max_items: 1
      format: "prose"
      compressible: false

    - name: "Active Goals"
      description: "当前正在进行的任务目标"
      max_items: 3
      format: "- [目标描述] | 开始时间: YYYY-MM-DD"
      compressible: false

    - name: "Decisions Log"
      description: "已做出的关键技术决策"
      max_items: 10
      format: "- YYYY-MM-DD | 选择了X而非Y | 原因: Z"
      compressible: true
      compress_strategy: "summary"

    - name: "Gotchas"
      description: "已知的坑、约束、必须遵守的规则"
      max_items: 20
      format: "- [模块] 问题描述 → 规避方式"
      compressible: true
      compress_strategy: "verbatim"

    - name: "Completed"
      description: "最近完成的任务，滚动保留"
      max_items: 10
      format: "- YYYY-MM-DD | 任务描述 | 结论/产出"
      compressible: true
      compress_strategy: "summary"

    - name: "Status"
      description: "当前任务状态"
      max_items: 1
      format: "IN_PROGRESS / BLOCKED / DONE | 一句话说明"
      compressible: false

compression:
  trigger_tokens: 3000
  trigger_chars: 12000
  keep_recent_decisions: 5
  keep_recent_completed: 3
  archive_path: "archive.md"
  archive_format: |
    ## Archive: YYYY-MM-DD HH:MM

    ### Compressed Decisions
    {summary}

    ### Compressed Completed
    {summary}
