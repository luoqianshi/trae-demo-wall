<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炸金花 - AI智能扑克牌对战</title>
    <style>
        :root {
            --bg-primary: #0a1628;
            --bg-secondary: #1a3a5c;
            --bg-card: rgba(26, 58, 92, 0.9);
            --color-primary: #00CED1;
            --color-primary-light: #5FEFEF;
            --color-accent: #FFD700;
            --text-primary: #FFFFFF;
            --text-secondary: #B8D4E8;
            --text-muted: #7090A8;
            --border-color: rgba(0, 206, 209, 0.4);
            --border-glow: 0 0 20px rgba(0, 206, 209, 0.4);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 40px rgba(0, 206, 209, 0.1);
            --gradient-btn: linear-gradient(135deg, #00CED1, #00A0A3);
            --gradient-btn-hover: linear-gradient(135deg, #5FEFEF, #00CCCC);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #0a1628 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
        }

        .page {
            display: none;
            min-height: 100vh;
            padding: 20px;
        }
        .page.active { display: flex; justify-content: center; align-items: center; }

        /* 通用卡片样式 */
        .form-card, .lobby-card, .config-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 36px;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-card);
        }
        .form-card { max-width: 400px; width: 100%; }
        .lobby-card { max-width: 460px; width: 100%; }
        .config-card { max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; }

        .title-glow {
            text-align: center;
            font-size: 42px;
            margin-bottom: 8px;
            color: var(--color-primary);
            text-shadow: 0 0 20px var(--color-primary), 0 0 40px var(--color-primary);
        }
        .subtitle { text-align: center; margin-bottom: 24px; color: var(--text-secondary); }

        .theme-input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border-radius: 10px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s;
        }
        .theme-input:focus { border-color: var(--color-primary); box-shadow: var(--border-glow); }
        .theme-input::placeholder { color: var(--text-muted); }

        .theme-btn-primary {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            border-radius: 10px;
            font-size: 16px;
            letter-spacing: 2px;
            font-weight: 600;
            background: var(--gradient-btn);
            border: none;
            color: #0a1628;
            cursor: pointer;
            transition: all 0.3s;
        }
        .theme-btn-primary:hover { background: var(--gradient-btn-hover); transform: translateY(-2px); box-shadow: var(--border-glow); }

        .toggle { text-align: center; margin-top: 18px; color: var(--text-muted); cursor: pointer; font-size: 13px; }
        .toggle:hover { color: var(--color-primary); }
        .error-msg { color: #ff6b6b; text-align: center; margin-top: 12px; font-size: 13px; }
        .success-msg { color: var(--color-primary); text-align: center; margin-top: 12px; font-size: 13px; }

        /* 大厅页 */
        .points-display { display: flex; flex-direction: column; align-items: center; margin-top: 12px; padding: 16px 24px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid var(--border-color); }
        .points-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
        .points-value { font-size: 32px; font-weight: 700; color: var(--color-primary); text-shadow: 0 0 15px var(--color-primary); }

        .mode-entries { display: flex; gap: 16px; margin-bottom: 20px; }
        .entry-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 24px 16px; border: 2px solid var(--border-color); border-radius: 14px; background: rgba(255,255,255,0.05); cursor: pointer; transition: all 0.3s; }
        .entry-btn:hover { border-color: var(--color-primary); background: rgba(255,255,255,0.1); transform: translateY(-4px); box-shadow: var(--border-glow); }
        .entry-btn .icon { font-size: 36px; }
        .entry-btn .label { font-size: 16px; font-weight: 600; }
        .entry-btn .hint { font-size: 11px; color: var(--text-muted); }

        .actions { display: flex; gap: 10px; margin: 16px 0; }
        .actions input { flex: 1; padding: 12px 14px; border-radius: 10px; }
        .recharge-btn { padding: 12px 20px; border-radius: 10px; background: var(--gradient-btn); border: none; color: #0a1628; cursor: pointer; }
        .logout-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 10px; cursor: pointer; font-size: 14px; }
        .logout-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

        /* 配置页 */
        .config-card h1 { text-align: center; color: var(--color-primary); font-size: 28px; margin-bottom: 24px; }
        .config-section { margin-bottom: 24px; }
        .config-section h2 { font-size: 16px; color: var(--text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        .mode-toggle { display: flex; gap: 12px; }
        .mode-toggle button { flex: 1; padding: 14px; border: 2px solid var(--border-color); border-radius: 10px; background: rgba(255,255,255,0.05); cursor: pointer; display: flex; flex-direction: column; gap: 4px; text-align: center; color: var(--text-primary); }
        .mode-toggle button.active { border-color: var(--color-primary); background: rgba(0,206,209,0.15); }
        .mode-toggle .label { font-size: 16px; font-weight: 600; }
        .mode-toggle .desc { font-size: 12px; color: var(--text-muted); }

        .ai-config-list { display: flex; flex-direction: column; gap: 12px; }
        .ai-config-item { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; }
        .ai-config-item h3 { font-size: 14px; color: var(--color-primary); margin-bottom: 12px; }

        .form-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .form-row label { width: 80px; font-size: 13px; color: var(--text-muted); }
        .form-row select, .form-row input { flex: 1; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; background: rgba(255,255,255,0.1); color: var(--text-primary); }

        .ai-controls { display: flex; gap: 8px; margin-left: auto; }
        .ai-controls button { padding: 6px 14px; border: 1px solid var(--border-color); border-radius: 6px; background: rgba(255,255,255,0.05); color: var(--text-secondary); cursor: pointer; font-size: 12px; }
        .ai-controls button:disabled { opacity: 0.4; cursor: not-allowed; }

        .start-game-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--gradient-btn); color: #0a1628; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 20px; }
        .start-game-btn:hover { background: var(--gradient-btn-hover); transform: translateY(-2px); }
        .back-btn { display: block; margin: 16px auto 0; padding: 10px 24px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 8px; cursor: pointer; font-size: 14px; }
        .back-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }

        /* ========== 游戏页面 ========== */
        .game-page {
            display: none;
            flex-direction: column;
            height: 100vh;
            padding: 10px 16px;
            background: linear-gradient(180deg, #E3F2FD 0%, #E8F5E9 50%, #E0F7FA 100%);
        }
        .game-page.active { display: flex; }

        /* 顶栏 */
        .game-top-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .round-badge { background: linear-gradient(135deg, #2196F3, #00BCD4); color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 14px; font-weight: 600; }
        .pot-display { font-size: 18px; font-weight: 700; color: #FF9800; }
        .min-bet { font-size: 13px; font-weight: 600; padding: 2px 10px; border-radius: 10px; }
        .min-bet.blind { background: #FFF3E0; color: #E65100; }
        .min-bet.looked { background: #E3F2FD; color: #1976D2; }
        .exit-game-btn { margin-left: auto; padding: 6px 16px; background: #FF6B6B; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }

        /* 主内容区：3/4游戏 + 1/4日志 */
        .game-main-content {
            flex: 1;
            display: flex;
            gap: 12px;
            overflow: hidden;
        }

        /* 游戏区域 */
        .game-area { flex: 3; display: flex; flex-direction: column; gap: 8px; min-width: 0; }

        /* Dealer提示区 */
        .dealer-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-height: 80px;
            flex-shrink: 0;
        }
        .dealer-message {
            font-size: 16px;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            animation: fadeIn 0.3s;
        }
        .dealer-message.info { background: #E3F2FD; color: #1565C0; border: 1px solid #2196F3; }
        .dealer-message.warning { background: #FFF3E0; color: #E65100; border: 1px solid #FF9800; }
        .dealer-message.success { background: #E8F5E9; color: #2E7D32; border: 1px solid #4CAF50; }

        /* 牌桌 */
        .table-container {
            flex: 1;
            position: relative;
            min-height: 400px;
        }
        .table-surface {
            position: relative;
            width: 100%;
            height: 100%;
            max-height: 500px;
        }
        .table-rail {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: linear-gradient(180deg, #5D4037 0%, #4E342E 50%, #3E2723 100%);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.1);
        }
        .table-felt {
            position: absolute;
            inset: 15px;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, #2E7D32 0%, #1B5E20 70%, #2E7D32 100%);
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.3);
            overflow: visible;
        }

        /* AI玩家位置 */
        .ai-person {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.95);
            padding: 8px 12px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            z-index: 10;
        }
        .ai-person.right { right: -20px; top: 50%; transform: translateY(-50%); }
        .ai-person.left { left: -20px; top: 50%; transform: translateY(-50%); }
        .ai-avatar { width: 48px; height: 48px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .ai-name { font-size: 13px; font-weight: 600; color: #37474F; margin: 4px 0; }
        .ai-style-tag { font-size: 10px; color: #7B1FA2; background: linear-gradient(135deg, #E1BEE7, #CE93D8); padding: 2px 8px; border-radius: 10px; margin-bottom: 4px; }
        .ai-status { margin-bottom: 4px; }
        .tag { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
        .tag.folded { background: #ECEFF1; color: #90A4AE; }
        .tag.looked { background: #E3F2FD; color: #1976D2; }
        .tag.blind { background: #FFF3E0; color: #E65100; }
        .ai-chips { font-size: 12px; color: #FF9800; font-weight: 600; }

        .ai-cards-row { display: flex; gap: 4px; margin-top: 8px; }
        .card { width: 36px; height: 50px; background: linear-gradient(145deg, #fff, #e8e8e8); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .card.red { color: #e53935; }
        .card.black { color: #1a1a1a; }
        .card.hidden { background: linear-gradient(135deg, #1a3a5c, #0a1628); }

        /* 奖池区域 */
        .pot-area {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .pot-center { background: rgba(255,255,255,0.95); padding: 12px 20px; border-radius: 14px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
        .pot-amount { font-size: 24px; font-weight: bold; color: #FF9800; margin-top: 4px; }
        .turn-indicator { background: rgba(255,255,255,0.9); color: #37474F; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }

        /* 人类玩家区域 */
        .human-player-area {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .human-cards { display: flex; gap: 8px; }
        .human-cards .card { width: 56px; height: 80px; font-size: 24px; cursor: pointer; transition: transform 0.3s; }
        .human-cards .card:hover { transform: translateY(-10px); }
        .hand-strength { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.95); padding: 8px 16px; border-radius: 20px; font-size: 13px; }
        .strength-label { color: #607D8B; }
        .strength-value { font-weight: 700; padding: 2px 10px; border-radius: 12px; font-size: 14px; }
        .strength-value.legendary { background: linear-gradient(135deg, #FFD700, #FFA500); color: #fff; }
        .strength-value.epic { background: linear-gradient(135deg, #9C27B0, #E91E63); color: #fff; }
        .strength-value.rare { background: linear-gradient(135deg, #2196F3, #03A9F4); color: #fff; }
        .strength-value.uncommon { background: linear-gradient(135deg, #4CAF50, #8BC34A); color: #fff; }
        .strength-value.common { background: linear-gradient(135deg, #9E9E9E, #BDBDBD); color: #fff; }
        .strength-value.weak { background: linear-gradient(135deg, #FF5722, #FF9800); color: #fff; }
        .strength-bar { width: 80px; height: 6px; background: #E0E0E0; border-radius: 3px; overflow: hidden; }
        .strength-fill { height: 100%; background: linear-gradient(90deg, #FF5722, #FF9800, #FFC107, #4CAF50, #2196F3); border-radius: 3px; transition: width 0.3s; }
        .strength-hint { color: #90A4AE; font-size: 12px; }

        /* 操作面板 */
        .controls-panel {
            display: flex;
            gap: 16px;
            padding: 12px;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .user-info-row { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .user-name { font-size: 16px; font-weight: 600; color: #37474F; }
        .user-chips { font-size: 14px; color: #FF9800; font-weight: 600; }
        .status-tag { padding: 4px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; background: #E3F2FD; color: #1976D2; }
        .status-tag.looked { background: #E8F5E9; color: #388E3C; }

        .action-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; flex: 1; }
        .action-btn { padding: 12px; border: 2px solid var(--border-color); border-radius: 10px; background: rgba(255,255,255,0.05); color: var(--text-primary); cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
        .action-btn:hover:not(:disabled) { border-color: var(--color-primary); background: rgba(0,206,209,0.1); }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .action-btn.look { border-color: #FFD700; color: #FFD700; }
        .action-btn.fold { border-color: #e53935; color: #e53935; }
        .action-btn.compare { border-color: var(--color-primary); color: var(--color-primary); }

        .bet-controls { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
        .bet-controls input { flex: 1; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; background: rgba(255,255,255,0.1); color: var(--text-primary); text-align: center; font-size: 16px; }
        .bet-confirm-btn { padding: 10px 20px; background: var(--gradient-btn); border: none; border-radius: 8px; color: #0a1628; font-weight: 600; cursor: pointer; }

        /* ========== 日志区域 ========== */
        .log-section {
            flex: 1;
            min-width: 200px;
            max-width: 280px;
            display: flex;
            flex-direction: column;
        }
        .log-frame {
            height: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .log-header { padding: 12px 16px; background: #2196F3; color: #fff; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .log-entries {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .log-entry {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            background: #F5F7FA;
            color: #607D8B;
            animation: slideIn 0.3s ease;
        }
        .log-entry.error { background: #FFEBEE; color: #F44336; }
        .log-entry.ai { background: #E3F2FD; color: #1976D2; font-size: 12px; }
        .log-entry.highlight { background: #FFF3E0; color: #E65100; font-weight: 600; font-size: 14px; }
        .log-entry.thinking { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 12px; }
        .log-empty { color: #BDBDBD; font-size: 13px; text-align: center; padding: 20px; }

        /* AI思考Banner */
        .thinking-banner {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(33,150,243,0.95);
            color: #fff;
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 15px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(33,150,243,0.4);
            animation: fadeIn 0.3s;
        }
        .thinking-banner .dots { display: flex; gap: 4px; }
        .thinking-banner .dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .thinking-banner .dot:nth-child(1) { animation-delay: -0.32s; }
        .thinking-banner .dot:nth-child(2) { animation-delay: -0.16s; }

        .thinking-banner.yours {
            background: linear-gradient(135deg, #E3F2FD, #BBDEFB);
            font-size: 16px;
            font-weight: 600;
            color: #212121;
        }
        .countdown { font-size: 22px; font-weight: 700; color: #1565C0; }
        .countdown.urgent { color: #FF6B6B; animation: pulse 0.5s infinite; }

        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* 弹窗 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 200; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal { background: #fff; border-radius: 16px; padding: 24px 28px; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 12px 48px rgba(0,0,0,0.3); }
        .modal h2 { text-align: center; color: #2196F3; margin: 0 0 16px; }
        .modal-btn { display: inline-block; padding: 10px 28px; background: #E0E0E0; color: #37474F; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .modal-btn.primary { background: linear-gradient(135deg, #2196F3, #00BCD4); color: #fff; }
        .modal-actions { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }

        .result-icon { font-size: 64px; margin-bottom: 16px; text-align: center; }
        .result-title { font-size: 28px; font-weight: 700; text-align: center; }
        .result-title.win { color: #4CAF50; }
        .result-title.lose { color: #F44336; }
        .result-detail { text-align: center; color: #607D8B; margin-bottom: 24px; font-size: 16px; }

        /* 动画 */
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 响应式 */
        @media (max-width: 768px) {
            .form-card, .lobby-card, .config-card { padding: 24px; }
            .title-glow { font-size: 32px; }
            .mode-entries { flex-direction: column; }
            .log-section { display: none; }
            .action-buttons { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div id="loginPage" class="page active">

    <script>
        // ====== 状态管理 ======
        const state = {
            isLoginMode: true,
            isLoggedIn: false,
            username: '',
            points: 5000,
            difficulty: 'simple',
            aiPlayers: [
                { name: '电脑A', style: 'rational' },
                { name: '电脑B', style: 'aggressive' }
            ],
            buyIn: 1000,
            gameState: null,
            countdown: 30,
            countdownTimer: null,
            gameTimer: null
        };

        const styles = {
            simple: [
                { id: 'aggressive', name: '激进型', desc: '喜欢加注，风险高回报高' },
                { id: 'rational', name: '理性型', desc: '基于概率计算，稳定盈利' },
                { id: 'steady', name: '稳健型', desc: '保守打法，减少损失' },
                { id: 'deceptive', name: '欺骗型', desc: '经常虚张声势' },
                { id: 'observant', name: '观察型', desc: '根据对手调整策略' },
                { id: 'random', name: '随机型', desc: '出其不意，难以预测' }
            ]
        };

        // ====== 页面导航 ======
        function showPage(pageId) {
            document.querySelectorAll('.page, .game-page').forEach(p => p.classList.remove('active'));
            if (pageId === 'gamePage') {
                document.getElementById('gamePage').classList.add('active');
            } else {
                document.getElementById(pageId).classList.add('active');
            }
        }

        // ====== 登录/注册 ======
        function toggleMode() {
            state.isLoginMode = !state.isLoginMode;
            document.getElementById('formSubtitle').textContent = state.isLoginMode ? '登录到您的账号' : '创建新账号';
            document.getElementById('submitBtn').textContent = state.isLoginMode ? '🔥 登录 🔥' : '✨ 注册 ✨';
            document.getElementById('toggleText').textContent = state.isLoginMode ? '没有账号？去注册' : '已有账号？去登录';
        }

        function handleSubmit() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('loginMsg');
            
            if (!username || !password) {
                msg.textContent = '请输入用户名和密码';
                msg.style.display = 'block';
                msg.className = 'error-msg';
                return;
            }
            
            state.isLoggedIn = true;
            state.username = username;
            state.points = 5000;
            
            msg.textContent = '登录成功！正在跳转...';
            msg.style.display = 'block';
            msg.className = 'success-msg';
            
            setTimeout(() => goToLobby(), 800);
        }

        function handleLogout() {
            state.isLoggedIn = false;
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            showPage('loginPage');
        }

        // ====== 大厅页 ======
        function goToLobby() {
            if (!state.isLoggedIn) { showPage('loginPage'); return; }
            document.getElementById('displayUsername').textContent = state.username;
            document.getElementById('displayPoints').textContent = state.points.toLocaleString();
            showPage('lobbyPage');
        }

        function showPvPInfo() {
            const msg = document.getElementById('lobbyMsg');
            msg.textContent = 'PvP模式需要后端服务器支持，本demo仅展示人机对战';
            msg.style.display = 'block';
            msg.className = 'error-msg';
        }

        function handleRecharge() {
            const amount = parseInt(document.getElementById('rechargeAmount').value) || 0;
            if (amount <= 0) return;
            state.points += amount;
            document.getElementById('displayPoints').textContent = state.points.toLocaleString();
            const msg = document.getElementById('lobbyMsg');
            msg.textContent = `充值成功！+${amount} 积分`;
            msg.style.display = 'block';
            msg.className = 'success-msg';
        }

        // ====== 配置页 ======
        function goToConfig() {
            renderAIConfig();
            showPage('configPage');
        }

        function setDifficulty(diff) {
            state.difficulty = diff;
            document.getElementById('diffSimple').classList.toggle('active', diff === 'simple');
            document.getElementById('diffHard').classList.toggle('active', diff === 'hard');
            renderAIConfig();
        }

        function addAI() {
            if (state.aiPlayers.length >= 3) return;
            const n = state.aiPlayers.length + 1;
            state.aiPlayers.push({ name: `电脑${String.fromCharCode(64 + n)}`, style: 'rational' });
            renderAIConfig();
        }

        function removeAI() {
            if (state.aiPlayers.length <= 1) return;
            state.aiPlayers.pop();
            renderAIConfig();
        }

        function renderAIConfig() {
            const container = document.getElementById('aiConfigList');
            const styleList = styles[state.difficulty] || styles.simple;
            
            container.innerHTML = state.aiPlayers.map((ai, idx) => `
                <div class="ai-config-item">
                    <h3>🤖 ${ai.name}</h3>
                    <div class="form-row">
                        <label>游戏风格</label>
                        <select onchange="updateAIStyle(${idx}, this.value)">
                            ${styleList.map(s => `<option value="${s.id}" ${ai.style === s.id ? 'selected' : ''}>${s.name}</option>`).join('')}
                        </select>
                    </div>
                    <p style="font-size:12px;color:var(--text-muted);margin-left:90px;">${styleList.find(s => s.id === ai.style)?.desc || ''}</p>
                </div>
            `).join('');
            
            document.getElementById('addAiBtn').disabled = state.aiPlayers.length >= 3;
            document.getElementById('removeAiBtn').disabled = state.aiPlayers.length <= 1;
        }

        function updateAIStyle(idx, style) {
            state.aiPlayers[idx].style = style;
            renderAIConfig();
        }

        function startGame() {
            state.buyIn = parseInt(document.getElementById('buyInAmount').value) || 1000;
            
            if (state.points < state.buyIn) {
                alert('积分不足，请先充值！');
                return;
            }
            
            // 初始化游戏状态
            state.gameState = {
                round: 1,
                pot: state.buyIn * (state.aiPlayers.length + 1),
                myChips: state.buyIn,
                hasLooked: false,
                hasFolded: false,
                myTurn: false,
                cards: generateCards(),
                aiData: state.aiPlayers.map(ai => ({
                    ...ai,
                    chips: state.buyIn,
                    hasLooked: false,
                    hasFolded: false,
                    cards: generateCards(),
                    roundBet: 0
                }))
            };
            
            state.points -= state.buyIn;
            document.getElementById('myName').textContent = state.username;
            
            renderGame();
            showPage('gamePage');
            addLog(`=== 第1轮开始 ===`, 'highlight');
            addLog(`系统: 游戏开始，发牌中...`);
            
            // 发牌动画后开始
            setTimeout(() => {
                showDealerMessage('发牌完成！请下注', 'success');
                setTimeout(() => {
                    startGameLoop();
                }, 1500);
            }, 1000);
        }

        function generateCards() {
            const suits = ['♠', '♥', '♣', '♦'];
            const ranks = ['A', 'K', 'Q', 'J', '10', '9', '8', '7', '6', '5', '4', '3', '2'];
            const cards = [];
            for (let i = 0; i < 3; i++) {
                const suit = suits[Math.floor(Math.random() * suits.length)];
                const rank = ranks[Math.floor(Math.random() * ranks.length)];
                cards.push({ suit, rank });
            }
            return cards;
        }

        function showDealerMessage(text, type = 'info') {
            const el = document.getElementById('dealerMessage');
            el.textContent = text;
            el.className = `dealer-message ${type}`;
            el.style.display = 'block';
        }

        function addLog(text, type = '') {
            const container = document.getElementById('logEntries');
            const empty = container.querySelector('.log-empty');
            if (empty) empty.remove();
            
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = text;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function renderGame() {
            const gs = state.gameState;
            
            document.getElementById('roundBadge').textContent = `第 ${gs.round} 轮`;
            document.getElementById('potDisplay').textContent = gs.pot;
            document.getElementById('tablePot').textContent = gs.pot;
            document.getElementById('myChips').textContent = gs.myChips;
            document.getElementById('myStatus').textContent = gs.hasLooked ? '已看牌' : '闷牌';
            document.getElementById('myStatus').className = `status-tag ${gs.hasLooked ? 'looked' : ''}`;
            
            // AI玩家1
            const ai1 = gs.aiData[0];
            if (ai1) {
                document.getElementById('ai1Name').textContent = ai1.name;
                document.getElementById('ai1Style').textContent = styles.simple.find(s => s.id === ai1.style)?.name || ai1.style;
                document.getElementById('ai1Status').textContent = ai1.hasFolded ? '已弃牌' : ai1.hasLooked ? '已看牌' : '闷牌';
                document.getElementById('ai1Status').className = `tag ${ai1.hasFolded ? 'folded' : ai1.hasLooked ? 'looked' : 'blind'}`;
                document.getElementById('ai1Chips').textContent = ai1.chips;
                renderCards('ai1Cards', ai1.cards, ai1.hasLooked);
            }
            
            // AI玩家2
            const ai2 = gs.aiData[1];
            if (ai2) {
                document.getElementById('ai2Name').textContent = ai2.name;
                document.getElementById('ai2Style').textContent = styles.simple.find(s => s.id === ai2.style)?.name || ai2.style;
                document.getElementById('ai2Status').textContent = ai2.hasFolded ? '已弃牌' : ai2.hasLooked ? '已看牌' : '闷牌';
                document.getElementById('ai2Status').className = `tag ${ai2.hasFolded ? 'folded' : ai2.hasLooked ? 'looked' : 'blind'}`;
                document.getElementById('ai2Chips').textContent = ai2.chips;
                renderCards('ai2Cards', ai2.cards, ai2.hasLooked);
            }
            
            // 我的牌
            renderCards('myCards', gs.cards, gs.hasLooked);
            
            // 牌型提示
            if (gs.hasLooked) {
                const handType = evaluateHand(gs.cards);
                document.getElementById('handStrength').style.display = 'flex';
                document.getElementById('strengthValue').textContent = handType.name;
                document.getElementById('strengthValue').className = `strength-value ${handType.class}`;
                document.getElementById('strengthFill').style.width = handType.percent + '%';
                document.getElementById('strengthHint').textContent = handType.hint;
            } else {
                document.getElementById('handStrength').style.display = 'none';
            }
            
            // 更新按钮状态
            document.getElementById('lookBtn').disabled = gs.hasLooked || gs.hasFolded;
            document.getElementById('foldBtn').disabled = gs.hasFolded;
        }

        function renderCards(containerId, cards, revealed) {
            const container = document.getElementById(containerId);
            container.innerHTML = cards.map(c => {
                if (revealed) {
                    const isRed = c.suit === '♥' || c.suit === '♦';
                    return `<div class="card ${isRed ? 'red' : 'black'}">${c.rank}</div>`;
                } else {
                    return `<div class="card hidden">?</div>`;
                }
            }).join('');
        }

        function evaluateHand(cards) {
            const values = cards.map(c => {
                const v = c.rank;
                if (v === 'A') return 14;
                if (v === 'K') return 13;
                if (v === 'Q') return 12;
                if (v === 'J') return 11;
                return parseInt(v);
            });
            
            const sorted = [...values].sort((a, b) => b - a);
            const isFlush = cards.every(c => c.suit === cards[0].suit);
            const isSequential = sorted[0] - sorted[1] === 1 && sorted[1] - sorted[2] === 1;
            
            if (isFlush && isSequential) return { name: '顺金', class: 'legendary', percent: 100, hint: '最强牌型！可激进下注' };
            if (isFlush) return { name: '金花', class: 'epic', percent: 85, hint: '极强牌型！可加注' };
            if (isSequential) return { name: '顺子', class: 'rare', percent: 65, hint: '中等牌型，建议跟注' };
            if (sorted[0] === sorted[1] && sorted[1] === sorted[2]) return { name: '豹子', class: 'legendary', percent: 100, hint: '最强牌型！可加注或比牌' };
            if (sorted[0] === sorted[1] || sorted[1] === sorted[2]) return { name: '对子', class: 'uncommon', percent: 45, hint: '一般牌型，建议跟注' };
            if (sorted[0] >= 13) return { name: '单张大', class: 'common', percent: 25, hint: '散牌，建议弃牌' };
            return { name: '散牌', class: 'weak', percent: 15, hint: '牌较弱，可考虑弃牌' };
        }

        // ====== 游戏循环 ======
        function startGameLoop() {
            let turn = 0;
            const maxTurns = 6;
            
            state.gameTimer = setInterval(() => {
                turn++;
                state.gameState.round = Math.ceil(turn / 2);
                document.getElementById('roundBadge').textContent = `第 ${state.gameState.round} 轮`;
                
                // 每轮重置状态
                if (turn % 2 === 1) {
                    // AI回合
                    const aiIdx = Math.floor(Math.random() * state.gameState.aiData.length);
                    const ai = state.gameState.aiData[aiIdx];
                    
                    if (!ai.hasFolded) {
                        // 显示AI思考
                        showAIThinking(ai.name);
                        
                        // 模拟LLM思考日志
                        const llmThinking = generateLLMThinking(ai);
                        
                        // AI行动
                        setTimeout(() => {
                            const action = simulateAIAction(ai);
                            hideAIThinking();
                            
                            if (action.type === 'look') {
                                ai.hasLooked = true;
                                addLog(`⚡ ${ai.name} 看了牌！`, 'highlight');
                                showDealerMessage(`${ai.name} 看了牌`, 'info');
                            } else if (action.type === 'fold') {
                                ai.hasFolded = true;
                                addLog(`${ai.name} 弃牌`);
                                showDealerMessage(`${ai.name} 弃牌`, 'warning');
                            } else if (action.type === 'bet') {
                                const betAmount = action.amount;
                                state.gameState.pot += betAmount;
                                ai.chips -= betAmount;
                                ai.roundBet += betAmount;
                                addLog(`🤖 ${ai.name}: 下注 ${betAmount} 积分`);
                                showDealerMessage(`${ai.name} 下注 ${betAmount}`, 'info');
                            }
                            
                            renderGame();
                        }, 3000 + Math.random() * 2000);
                    }
                } else {
                    // 玩家回合
                    state.gameState.myTurn = true;
                    document.getElementById('turnIndicator').style.display = 'block';
                    document.getElementById('turnIndicator').textContent = '轮到: 你';
                    showDealerMessage('请下注', 'warning');
                    showCountdown();
                    addLog(`👤 轮到您行动`);
                }
                
                // 游戏结束检查
                const activeAIs = state.gameState.aiData.filter(ai => !ai.hasFolded);
                if (activeAIs.length === 0 || turn >= maxTurns) {
                    clearInterval(state.gameTimer);
                    stopCountdown();
                    setTimeout(() => endGame(), 2000);
                }
            }, 6000);
        }

        function generateLLMThinking(ai) {
            const thoughts = [
                `🧠 [LLM分析] ${ai.name}正在思考...`,
                `   当前牌型: ${evaluateHand(ai.cards).name}`,
                `   对手风格: ${styles.simple.find(s => s.id === ai.style)?.name || ai.style}`,
                `   考虑因素: 底池赔率、对手范围、位置优势`,
                `   决策: ${Math.random() > 0.5 ? '加注施压' : '跟注观望'}`
            ];
            
            thoughts.forEach((t, i) => {
                setTimeout(() => addLog(t, 'ai'), i * 800);
            });
        }

        function simulateAIAction(ai) {
            const rand = Math.random();
            const handType = evaluateHand(ai.cards);
            
            if (handType.percent >= 85) {
                return { type: 'bet', amount: 200 + Math.floor(Math.random() * 200) };
            } else if (handType.percent >= 50) {
                return rand > 0.3 ? { type: 'bet', amount: 100 + Math.floor(Math.random() * 100) } : { type: 'look' };
            } else if (handType.percent >= 30) {
                return rand > 0.5 ? { type: 'look' } : { type: 'bet', amount: 50 + Math.floor(Math.random() * 50) };
            } else {
                return rand > 0.7 ? { type: 'fold' } : { type: 'look' };
            }
        }

        function showAIThinking(name) {
            const banner = document.getElementById('aiThinkingBanner');
            document.getElementById('aiThinkingName').textContent = name;
            banner.style.display = 'flex';
            document.getElementById('turnIndicator').style.display = 'block';
            document.getElementById('turnIndicator').textContent = `轮到: ${name}`;
        }

        function hideAIThinking() {
            document.getElementById('aiThinkingBanner').style.display = 'none';
        }

        function showCountdown() {
            state.countdown = 30;
            const banner = document.getElementById('countdownBanner');
            const numEl = document.getElementById('countdownNum');
            banner.style.display = 'flex';
            numEl.textContent = state.countdown;
            numEl.className = 'countdown';
            
            state.countdownTimer = setInterval(() => {
                state.countdown--;
                numEl.textContent = state.countdown;
                
                if (state.countdown <= 10) {
                    numEl.classList.add('urgent');
                }
                
                if (state.countdown <= 0) {
                    stopCountdown();
                    doAction('fold');
                }
            }, 1000);
        }

        function stopCountdown() {
            if (state.countdownTimer) {
                clearInterval(state.countdownTimer);
                state.countdownTimer = null;
            }
            document.getElementById('countdownBanner').style.display = 'none';
        }

        function doAction(action) {
            const gs = state.gameState;
            if (!gs.myTurn && action !== 'fold') return;
            
            stopCountdown();
            gs.myTurn = false;
            document.getElementById('turnIndicator').style.display = 'none';
            hideAIThinking();
            
            switch(action) {
                case 'bet':
                    document.getElementById('betControls').style.display = 'flex';
                    break;
                case 'look':
                    gs.hasLooked = true;
                    addLog(`👁️ 您看了牌！`, 'highlight');
                    showDealerMessage('您看了牌', 'success');
                    renderGame();
                    break;
                case 'compare':
                    alert('比牌功能：选择一名玩家进行比牌');
                    break;
                case 'fold':
                    gs.hasFolded = true;
                    addLog(`📤 您弃牌了`);
                    showDealerMessage('您弃牌', 'warning');
                    renderGame();
                    break;
            }
        }

        function confirmBet() {
            const amount = parseInt(document.getElementById('betAmount').value) || 0;
            if (amount > 0 && amount <= state.gameState.myChips) {
                state.gameState.pot += amount;
                state.gameState.myChips -= amount;
                document.getElementById('betControls').style.display = 'none';
                document.getElementById('betAmount').value = '';
                addLog(`💰 您下注 ${amount} 积分`);
                showDealerMessage(`下注 ${amount} 积分`, 'info');
                renderGame();
            } else {
                alert('下注金额无效');
            }
        }

        function endGame() {
            const isWin = Math.random() > 0.4;
            const winAmount = state.gameState.pot;
            
            document.getElementById('resultIcon').textContent = isWin ? '🏆' : '😢';
            document.getElementById('resultTitle').textContent = isWin ? '胜利!' : '失败';
            document.getElementById('resultTitle').className = `result-title ${isWin ? 'win' : 'lose'}`;
            document.getElementById('resultDetail').textContent = isWin ? 
                `恭喜您获得 ${winAmount} 积分！` : 
                `本局损失 ${state.buyIn} 积分`;
            
            if (isWin) state.points += winAmount;
            
            document.getElementById('resultModal').classList.add('active');
            addLog(isWin ? `🎉 恭喜获胜！获得 ${winAmount} 积分` : `😞 游戏结束，损失 ${state.buyIn} 积分`, 'highlight');
        }

        function playAgain() {
            document.getElementById('resultModal').classList.remove('active');
            goToConfig();
        }

        function goToLobbyFromResult() {
            document.getElementById('resultModal').classList.remove('active');
            goToLobby();
        }

        function exitGame() {
            if (confirm('确定要退出游戏吗？将损失当前带入的积分。')) {
                if (state.gameTimer) clearInterval(state.gameTimer);
                stopCountdown();
                showPage('lobbyPage');
            }
        }

        // ====== 初始化 ======
        renderAIConfig();
    </script>
</body>
</html>
