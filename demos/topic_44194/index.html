              <div style="display:${m.expanded ? 'block' : 'none'};margin-top:-4px;padding:0 4px;">
                <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;">
                  ${m.list.map(a => {
                    const prog = Math.min(100, Math.round((m.current / a.target) * 100));
                    return `
                      <div class="card" style="${a.unlocked ? '' : 'opacity:0.5;'};padding:14px;">
                        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
                          <div style="font-size:24px;">${a.icon}</div>
                          <h3 style="margin:0;font-size:14px;color:#fff;">${a.name}${a.unlocked ? ' ✓' : ''}</h3>
                        </div>
                        <p style="margin:0;color:#a1a1aa;font-size:12px;">${a.desc}</p>
                        <p style="margin:6px 0 0;color:${a.unlocked ? '#22c55e' : '#71717a'};font-size:12px;">${a.unlocked ? '已解锁' : `${Math.min(m.current, a.target)}/${a.target}`}</p>
                        ${!a.unlocked ? `<div class="progress-bar" style="margin-top:6px;height:4px;"><div class="progress-fill" style="width:${prog}%;background:${m.color};"></div></div>` : ''}
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function toggleAchievementModule(key) {
      if (key === 'synergy') synergyExpanded = !synergyExpanded;
      else if (key === 'vocab') vocabExpanded = !vocabExpanded;
      else if (key === 'streak') streakExpanded = !streakExpanded;
      else if (key === 'game') gameExpanded = !gameExpanded;
      else if (key === 'course') courseExpanded = !courseExpanded;
      else if (key === 'multiLang') multiLangExpanded = !multiLangExpanded;
      renderContent();
    }

    function toggleSynergyPanel() {
      synergyExpanded = !synergyExpanded;
      renderContent();
    }

    function showAuth(mode) {
      authMode = mode;
      document.getElementById('auth-title').textContent = mode === 'login' ? '登录' : '注册';
      document.getElementById('auth-modal').style.display = 'flex';
    }

    function closeAuth() {
      document.getElementById('auth-modal').style.display = 'none';
    }

    function toggleAuth() {
      authMode = authMode === 'login' ? 'register' : 'login';
      document.getElementById('auth-title').textContent = authMode === 'login' ? '登录' : '注册';
    }

    function saveUserData() {
      if (!currentUser) return;
      const key = 'lang_learning_' + currentUser.username;
      userData.username = currentUser.username;
      userData.language = currentUser.language;
      localStorage.setItem(key, JSON.stringify(userData));
      localStorage.setItem('lang_learning_current', currentUser.username);
    }

    function toggleSetting(settingName) {
      if (userData[settingName] === undefined) {
        userData[settingName] = true;
      }
      userData[settingName] = !userData[settingName];
      saveUserData();
      renderContent();
    }

    function updateProfileLanguage(lang) {
      userData.language = lang;
      if (currentUser) {
        currentUser.language = lang;
      }
      gameLanguage = lang;
      if (!userData.languagesLearned) {
        userData.languagesLearned = [];
      }
      if (!userData.languagesLearned.includes(lang)) {
        userData.languagesLearned.push(lang);
      }
      saveUserData();
      checkAchievements();
    }

    function updateDailyGoal(minutes) {
      userData.dailyGoal = parseInt(minutes);
      saveUserData();
    }

    function loadUserData(username) {
      const key = 'lang_learning_' + username;
      const saved = localStorage.getItem(key);
      if (saved) {
        const loaded = JSON.parse(saved);
        userData = {
          username: loaded.username || '',
          language: loaded.language || 'en',
          languagesLearned: loaded.languagesLearned || [loaded.language || 'en'],
          totalScore: loaded.totalScore || 0,
          streakDays: loaded.streakDays || 0,
          lastStudyDate: loaded.lastStudyDate || null,
          lessonsCompleted: loaded.lessonsCompleted || [],
          coursesProgress: loaded.coursesProgress || {},
          matchGamesWon: loaded.matchGamesWon || 0,
          aiBattlesWon: loaded.aiBattlesWon || 0,
          poisonGamesPlayed: loaded.poisonGamesPlayed || 0,
          dictationCorrect: loaded.dictationCorrect || 0,
          dictationTotal: loaded.dictationTotal || 0,
          synergyCount: loaded.synergyCount || 0,
          wordsLearned: loaded.wordsLearned || [],
          achievements: loaded.achievements || [],
          studyMinutes: loaded.studyMinutes || 0,
          bombWins: loaded.bombWins || 0,
          monthlyGoals: loaded.monthlyGoals || { reading: 5, listening: 10, speaking: 8 },
          monthlyProgress: loaded.monthlyProgress || { reading: 0, listening: 0, speaking: 0 },
          points: loaded.points || 0,
          title: loaded.title || 'title_1',
          avatarFrame: loaded.avatarFrame || 'frame_0',
          ownedTitles: loaded.ownedTitles || ['title_1'],
          ownedFrames: loaded.ownedFrames || ['frame_0'],
        };
        return true;
      }
      return false;
    }

    function initNewUser(username, language) {
      userData = {
        username: username,
        language: language,
        languagesLearned: [language],
        totalScore: 0,
        streakDays: 1,
        lastStudyDate: new Date().toDateString(),
        lessonsCompleted: [],
        coursesProgress: {},
        matchGamesWon: 0,
        aiBattlesWon: 0,
        poisonGamesPlayed: 0,
        dictationCorrect: 0,
        dictationTotal: 0,
        synergyCount: 0,
        wordsLearned: [],
        achievements: ['beginner'],
        studyMinutes: 0,
        bombWins: 0,
        monthlyGoals: { reading: 5, listening: 10, speaking: 8 },
        monthlyProgress: { reading: 0, listening: 0, speaking: 0 },
        points: 200,
        title: 'title_1',
        avatarFrame: 'frame_0',
        ownedTitles: ['title_1'],
        ownedFrames: ['frame_0'],
      };
    }

    function updateStreakDays() {
      const today = new Date().toDateString();
      if (userData.lastStudyDate !== today) {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        if (userData.lastStudyDate === yesterday.toDateString()) {
          userData.streakDays++;
        } else {
          userData.streakDays = 1;
        }
        userData.lastStudyDate = today;
        saveUserData();
      }
    }

    function checkAchievements() {
      const newAchievements = [];
      const wordCount = userData.wordsLearned.length || 0;
      const streak = userData.streakDays || 0;
      const synergy = userData.synergyCount || 0;
      const courseCompleted = Object.keys(userData.coursesProgress || {}).filter(k => userData.coursesProgress[k] >= 100).length;
      const gameWins = (userData.matchGamesWon || 0) + (userData.aiBattlesWon || 0);

      // 词汇成就
      if (wordCount >= 10 && !userData.achievements.includes('wordmaster10')) {
        userData.achievements.push('wordmaster10');
        newAchievements.push('词汇新手（10词）');
      }
      if (wordCount >= 50 && !userData.achievements.includes('wordmaster50')) {
        userData.achievements.push('wordmaster50');
        newAchievements.push('词汇达人（50词）');
      }
      if (wordCount >= 100 && !userData.achievements.includes('wordmaster100')) {
        userData.achievements.push('wordmaster100');
        newAchievements.push('词汇大师（100词）');
      }
      if (wordCount >= 300 && !userData.achievements.includes('wordmaster300')) {
        userData.achievements.push('wordmaster300');
        newAchievements.push('词汇专家（300词）');
      }
      if (wordCount >= 500 && !userData.achievements.includes('wordmaster500')) {
        userData.achievements.push('wordmaster500');
        newAchievements.push('词汇王者（500词）');
      }
      if (wordCount >= 1000 && !userData.achievements.includes('wordmaster1000')) {
        userData.achievements.push('wordmaster1000');
        newAchievements.push('词汇之神（1000词）');
      }

      // 连续学习成就
      if (streak >= 3 && !userData.achievements.includes('streak3')) {
        userData.achievements.push('streak3');
        newAchievements.push('坚持3天');
      }
      if (streak >= 7 && !userData.achievements.includes('streak7')) {
        userData.achievements.push('streak7');
        newAchievements.push('连续学习7天');
      }
      if (streak >= 30 && !userData.achievements.includes('streak30')) {
        userData.achievements.push('streak30');
        newAchievements.push('月度坚持（30天）');
      }
      if (streak >= 100 && !userData.achievements.includes('streak100')) {
        userData.achievements.push('streak100');
        newAchievements.push('百日挑战（100天）');
      }
      if (streak >= 365 && !userData.achievements.includes('streak365')) {
        userData.achievements.push('streak365');
        newAchievements.push('全年无休（365天）');
      }

      // 游戏成就
      if (userData.matchGamesWon >= 5 && !userData.achievements.includes('gamepro')) {
        userData.achievements.push('gamepro');
        newAchievements.push('游戏高手');
      }
      if (userData.aiBattlesWon >= 10 && !userData.achievements.includes('aichampion')) {
        userData.achievements.push('aichampion');
        newAchievements.push('AI挑战者');
      }
      if ((userData.bombWins || 0) >= 10 && !userData.achievements.includes('bombsurvivor')) {
        userData.achievements.push('bombsurvivor');
        newAchievements.push('炸弹幸存者');
      }

      // 课程成就
      if (courseCompleted >= 1 && !userData.achievements.includes('course1')) {
        userData.achievements.push('course1');
        newAchievements.push('课程入门');
      }
      if (courseCompleted >= 5 && !userData.achievements.includes('course5')) {
        userData.achievements.push('course5');
        newAchievements.push('勤奋学习');
      }
      if (courseCompleted >= 10 && !userData.achievements.includes('course10')) {
        userData.achievements.push('course10');
        newAchievements.push('学霸之路');
      }
      if (courseCompleted >= 20 && !userData.achievements.includes('course20')) {
        userData.achievements.push('course20');
        newAchievements.push('全能学霸');
      }

      // 默契成就
      if (synergy >= 10 && !userData.achievements.includes('synergy10')) {
        userData.achievements.push('synergy10');
        newAchievements.push('初有默契（10次）');
      }
      if (synergy >= 100 && !userData.achievements.includes('synergy100')) {
        userData.achievements.push('synergy100');
        newAchievements.push('默契搭档（100次）');
      }
      if (synergy >= 300 && !userData.achievements.includes('synergy300')) {
        userData.achievements.push('synergy300');
        newAchievements.push('心有灵犀（300次）');
      }
      if (synergy >= 500 && !userData.achievements.includes('synergy500')) {
        userData.achievements.push('synergy500');
        newAchievements.push('灵魂伴侣（500次）');
      }
      if (synergy >= 1000 && !userData.achievements.includes('synergy1000')) {
        userData.achievements.push('synergy1000');
        newAchievements.push('天生一对（1000次）');
      }

      // 多语种成就
      const langCount = (userData.languagesLearned || []).length;
      if (langCount >= 2 && !userData.achievements.includes('multilang')) {
        userData.achievements.push('multilang');
        newAchievements.push('多语种学者');
      }
      if (langCount >= 3 && !userData.achievements.includes('trilang')) {
        userData.achievements.push('trilang');
        newAchievements.push('三语达人');
      }

      if (newAchievements.length > 0) {
        saveUserData();
      }

      return newAchievements;
    }

    function handleLogin() {
      const username = document.getElementById('username').value;
      const language = document.getElementById('language').value;
      if (!username) return;

      const loaded = loadUserData(username);
      if (!loaded) {
        if (!confirm('用户不存在，是否注册新账号？')) return;
        initNewUser(username, language);
      }

      currentUser = { username, language: userData.language || language };
      updateStreakDays();
      checkAchievements();
      saveUserData();

      document.getElementById('user-info').textContent = '👤 ' + username;
      document.getElementById('user-info').style.display = 'inline';
      document.getElementById('auth-btn').textContent = '退出';
      document.getElementById('auth-btn').onclick = handleLogout;
      closeAuth();
      renderContent();
    }

    function handleLogout() {
      currentUser = null;
      document.getElementById('user-info').style.display = 'none';
      document.getElementById('auth-btn').textContent = '登录';
      document.getElementById('auth-btn').onclick = () => showAuth('login');
    }

    let tutorialStep = 0;
    const tutorialSteps = [
      {
        icon: '👋',
        title: '欢迎来到爱学习！',
        desc: '开启你的语言学习之旅，让学习像游戏一样充满乐趣和成就感！',
        action: null
      },
      {
        icon: '🌐',
        title: '选择你要学习的语言',
        desc: '顶部可以随时切换学习语言，支持英语、日语、韩语三种语言！',
        action: 'highlight-lang'
      },
      {
        icon: '📚',
        title: '从课程开始学习',
        desc: '系统化分级课程，从入门到精通，循序渐进提升语言能力。',
        action: 'go-courses'
      },
      {
        icon: '🎮',
        title: '玩游戏也能学语言',
        desc: '多款趣味游戏，边玩边学，让学习欲罢不能！完成游戏还能赚积分哦～',
        action: 'go-games'
      }
    ];

    function showTutorial() {
      tutorialStep = 0;
      updateTutorialStep();
      document.getElementById('tutorial-modal').style.display = 'flex';
      playSound('success');
    }

    function updateTutorialStep() {
      const step = tutorialSteps[tutorialStep];
      document.getElementById('tutorial-icon').textContent = step.icon;
      document.getElementById('tutorial-title').textContent = step.title;
      document.getElementById('tutorial-desc').textContent = step.desc;
      const dots = document.querySelectorAll('.tutorial-dot');
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === tutorialStep);
      });
      const nextBtn = document.getElementById('tutorial-next');
      if (tutorialStep === tutorialSteps.length - 1) {
        nextBtn.textContent = '🎉 开始学习！';
      } else {
        nextBtn.textContent = '下一步 →';
      }
      playSound('click');
    }

    function nextTutorialStep() {
      if (tutorialStep < tutorialSteps.length - 1) {
        tutorialStep++;
        updateTutorialStep();
      } else {
        closeTutorial();
        showPage('courses');
        playSound('complete');
      }
    }

    function closeTutorial() {
      document.getElementById('tutorial-modal').style.display = 'none';
      localStorage.setItem('tutorialCompleted', 'true');
    }

    const savedSound = localStorage.getItem('soundEnabled');
    if (savedSound !== null) soundEnabled = savedSound === 'true';

    renderContent();

    setTimeout(() => {
      if (!localStorage.getItem('tutorialCompleted')) {
        showTutorial();
      }
    }, 800);
  </script>
</body>
</html>
