<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大家一起爱学习 - 沉浸式多语种游戏化学习平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Microsoft YaHei', sans-serif; background: #0a0e1a; color: #e4e4e7; min-height: 100vh; position: relative; overflow-x: hidden; }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120, 119, 198, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 100% 50%, rgba(255, 119, 198, 0.08), transparent),
        radial-gradient(ellipse 50% 40% at 0% 80%, rgba(120, 200, 255, 0.08), transparent);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 25% 25%, rgba(167, 139, 250, 0.03) 1px, transparent 1px),
        radial-gradient(circle at 75% 75%, rgba(236, 72, 153, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }
    .app { min-height: 100vh; position: relative; z-index: 1; }
    .header { background: rgba(20, 25, 40, 0.95); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .logo { font-size: 22px; font-weight: bold; background: linear-gradient(135deg, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; display: flex; flex-direction: column; line-height: 1.1; }
    .logo-sub { font-size: 11px; font-weight: 500; color: #71717a; margin-top: 2px; -webkit-text-fill-color: #71717a; }
    .avatar-frame-frame_0 { box-shadow: none; }
    .avatar-frame-frame_1 { box-shadow: 0 0 0 3px #22c55e, 0 0 15px rgba(34,197,94,0.4); }
    .avatar-frame-frame_2 { box-shadow: 0 0 0 3px #3b82f6, 0 0 15px rgba(59,130,246,0.4); }
    .avatar-frame-frame_3 { box-shadow: 0 0 0 3px #a78bfa, 0 0 15px rgba(167,139,250,0.5); }
    .avatar-frame-frame_4 { box-shadow: 0 0 0 3px #ec4899, 0 0 15px rgba(236,72,153,0.5); }
    .avatar-frame-frame_5 { box-shadow: 0 0 0 3px #fbbf24, 0 0 20px rgba(251,191,36,0.6); animation: goldPulse 2s ease-in-out infinite; }
    .avatar-frame-frame_6 { box-shadow: 0 0 0 3px transparent; background: linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3,#5f27cd); background-clip: padding-box; position: relative; animation: rainbowShift 3s linear infinite; }
    .avatar-frame-frame_6::before { content:''; position:absolute; inset:-3px; border-radius:50%; background:linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3,#5f27cd); z-index:-1; }
    .avatar-frame-frame_7 { box-shadow: 0 0 0 3px #e0e7ff, 0 0 25px rgba(165,180,252,0.7), inset 0 0 20px rgba(199,210,254,0.3); animation: diamondSparkle 2s ease-in-out infinite; }
    .avatar-frame-frame_8 { box-shadow: 0 0 0 2px #94a3b8, 0 0 0 4px transparent, 0 0 0 6px #cbd5e1, 0 0 20px rgba(148,163,184,0.4); }
    .avatar-frame-frame_9 { box-shadow: 0 0 0 3px #fda4af, 0 0 15px rgba(253,164,175,0.5); position: relative; }
    .avatar-frame-frame_9::after { content:''; position:absolute; inset:-6px; border-radius:50%; border:2px dashed rgba(251,113,133,0.6); animation: rotateFrame 8s linear infinite; }
    .avatar-frame-frame_10 { box-shadow: 0 0 0 3px #38bdf8, 0 0 20px rgba(56,189,248,0.5); position: relative; overflow: visible; }
    .avatar-frame-frame_10::after { content:''; position:absolute; bottom:-8px; left:50%; transform:translateX(-50%); width:60%; height:14px; background:linear-gradient(180deg,rgba(56,189,248,0.6),rgba(14,165,233,0.3)); border-radius:0 0 50% 50%; animation: waveMove 2s ease-in-out infinite; }
    .avatar-frame-frame_11 { box-shadow: 0 0 0 3px #f97316, 0 0 20px rgba(249,115,22,0.6); animation: flameFlicker 0.5s ease-in-out infinite alternate; position: relative; }
    .avatar-frame-frame_11::before { content:'🔥'; position:absolute; top:-12px; left:50%; transform:translateX(-50%); font-size:18px; animation: flameFloat 1s ease-in-out infinite; }
    .avatar-frame-frame_12 { box-shadow: 0 0 0 3px #7dd3fc, 0 0 25px rgba(125,211,252,0.6), inset 0 0 15px rgba(186,230,253,0.3); animation: iceGlow 3s ease-in-out infinite; position: relative; }
    .avatar-frame-frame_12::after { content:'❄️'; position:absolute; top:-8px; right:-4px; font-size:14px; animation: snowflakeSpin 4s linear infinite; }
    .avatar-frame-frame_13 { box-shadow: 0 0 0 4px #22d3ee, 0 0 0 6px #0e7490, 0 0 15px rgba(34,211,238,0.4); border-radius: 8px !important; }
    .avatar-frame-frame_14 { box-shadow: 0 0 0 3px #fde047, 0 0 30px rgba(253,224,71,0.6); animation: starPulse 2s ease-in-out infinite; position: relative; }
    .avatar-frame-frame_14::before { content:'⭐'; position:absolute; top:-10px; left:50%; transform:translateX(-50%); font-size:16px; animation: starTwinkle 1.5s ease-in-out infinite; }
    .avatar-frame-frame_14::after { content:'✨'; position:absolute; top:20%; right:-8px; font-size:12px; animation: starTwinkle 2s ease-in-out infinite 0.5s; }
    .avatar-frame-frame_15 { box-shadow: 0 0 0 4px #fbbf24, 0 0 0 7px #7c2d12, 0 0 35px rgba(251,191,36,0.7); animation: crownGlow 2s ease-in-out infinite; position: relative; }
    .avatar-frame-frame_15::before { content:'👑'; position:absolute; top:-22px; left:50%; transform:translateX(-50%); font-size:24px; animation: crownFloat 2s ease-in-out infinite; }
    @keyframes rotateFrame { to { transform: rotate(360deg); } }
    @keyframes waveMove { 0%,100% { height:12px; opacity:0.7; } 50% { height:16px; opacity:1; } }
    @keyframes flameFlicker { from { box-shadow: 0 0 0 3px #f97316, 0 0 15px rgba(249,115,22,0.5); } to { box-shadow: 0 0 0 3px #fbbf24, 0 0 25px rgba(251,191,36,0.7); } }
    @keyframes flameFloat { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-4px); } }
    @keyframes iceGlow { 0%,100% { box-shadow: 0 0 0 3px #7dd3fc, 0 0 20px rgba(125,211,252,0.5), inset 0 0 15px rgba(186,230,253,0.3); } 50% { box-shadow: 0 0 0 3px #bae6fd, 0 0 35px rgba(186,230,253,0.7), inset 0 0 25px rgba(219,234,254,0.5); } }
    @keyframes snowflakeSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes starPulse { 0%,100% { box-shadow: 0 0 0 3px #fde047, 0 0 25px rgba(253,224,71,0.5); } 50% { box-shadow: 0 0 0 3px #fef08a, 0 0 40px rgba(253,224,71,0.8); } }
    @keyframes starTwinkle { 0%,100% { opacity:1; transform: scale(1); } 50% { opacity:0.5; transform: scale(0.8); } }
    @keyframes crownGlow { 0%,100% { box-shadow: 0 0 0 4px #fbbf24, 0 0 0 7px #7c2d12, 0 0 30px rgba(251,191,36,0.6); } 50% { box-shadow: 0 0 0 4px #fcd34d, 0 0 0 7px #92400e, 0 0 50px rgba(251,191,36,0.9); } }
    @keyframes crownFloat { 0%,100% { transform: translateX(-50%) translateY(0) rotate(-3deg); } 50% { transform: translateX(-50%) translateY(-4px) rotate(3deg); } }
    @keyframes diamondSparkle {
      0%, 100% { box-shadow: 0 0 0 3px #e0e7ff, 0 0 25px rgba(165,180,252,0.7), inset 0 0 20px rgba(199,210,254,0.3); }
      50% { box-shadow: 0 0 0 3px #fff, 0 0 40px rgba(165,180,252,0.9), inset 0 0 30px rgba(199,210,254,0.5); }
    }
    @keyframes titleGlow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }
    @keyframes titleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    @keyframes rainbowShift {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    @keyframes goldPulse {
      0%, 100% { box-shadow: 0 0 15px rgba(251,191,36,0.5); }
      50% { box-shadow: 0 0 30px rgba(251,191,36,0.8), 0 0 50px rgba(251,191,36,0.4); }
    }
    @keyframes bounce {
      from { transform: translateY(0); opacity: 0.5; }
      to { transform: translateY(-8px); opacity: 1; }
    }
    .title-highlight {
      animation: titleGlow 2s ease-in-out infinite, titleFloat 3s ease-in-out infinite;
    }
    .title-legendary {
      animation: rainbowShift 3s linear infinite;
    }
    .frame-gold {
      animation: goldPulse 2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    @keyframes blind-box-float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-6px) rotate(2deg); }
    }
    @keyframes blind-box-open {
      0% { transform: scale(1) rotate(0); }
      25% { transform: scale(1.1) rotate(-5deg); }
      50% { transform: scale(0.9) rotate(5deg); }
      75% { transform: scale(1.15) rotate(-3deg); }
      100% { transform: scale(0) rotate(360deg); opacity: 0; }
    }
    @keyframes reveal-pop {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .blind-box-reveal {
      animation: reveal-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .blind-box-opening {
      animation: blind-box-open 0.8s ease-in forwards;
    }
    .header-slogan { font-size: 14px; font-weight: 600; background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-right: 16px; }
    .nav { display: flex; gap: 8px; }
    .nav button { background: transparent; color: #a1a1aa; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .nav button:hover, .nav button.active { color: #a78bfa; background: rgba(167, 139, 250, 0.1); }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .hero { text-align: center; padding: 48px 24px; background: linear-gradient(135deg, rgba(167, 139, 250, 0.1), rgba(244, 114, 182, 0.05)); border-radius: 24px; margin-bottom: 32px; border: 1px solid rgba(167, 139, 250, 0.2); }
    .hero h1 { font-size: 42px; margin-bottom: 16px; color: #fff; }
    .hero p { font-size: 18px; color: #a1a1aa; margin-bottom: 24px; }
    .btn { padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-size: 16px; font-weight: 500; }
    .btn-primary { background: linear-gradient(135deg, #a78bfa, #8b5cf6); color: #fff; }
    .btn-secondary { background: rgba(255,255,255,0.05); color: #e4e4e7; border: 1px solid rgba(255,255,255,0.1); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .card { background: rgba(30, 35, 50, 0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; cursor: pointer; }
    .card:hover { transform: translateY(-4px); border-color: rgba(167, 139, 250, 0.4); }
    .card-icon { width: 56px; height: 56px; background: rgba(167, 139, 250, 0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 16px; }
    .card h3 { font-size: 20px; margin-bottom: 8px; color: #fff; }
    .card p { color: #a1a1aa; font-size: 14px; line-height: 1.5; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: rgba(30, 35, 50, 0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; }
    .stat-value { font-size: 32px; font-weight: bold; color: #a78bfa; }
    .stat-label { color: #a1a1aa; font-size: 14px; margin-top: 4px; }
    .game-board { display: grid; gap: 12px; margin: 24px auto; max-width: 600px; }
    .game-cell { aspect-ratio: 1; background: rgba(30, 35, 50, 0.8); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; cursor: pointer; padding: 8px; text-align: center; word-break: break-word; }
    .game-cell:hover { border-color: #a78bfa; }
    .game-cell.selected { background: rgba(167, 139, 250, 0.2); border-color: #a78bfa; }
    .game-cell.matched { background: rgba(34, 197, 94, 0.2); border-color: #22c55e; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: #1a1f2e; border-radius: 20px; padding: 32px; max-width: 400px; width: 90%; border: 1px solid rgba(255,255,255,0.1); }
    .modal h2 { margin-bottom: 16px; color: #fff; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; color: #a1a1aa; font-size: 14px; }
    .form-group input { width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; }
    .form-actions { display: flex; gap: 12px; margin-top: 20px; }
    .form-actions button { flex: 1; }
    .level-card { background: linear-gradient(135deg, rgba(167, 139, 250, 0.1), rgba(244, 114, 182, 0.05)); border: 1px solid rgba(167, 139, 250, 0.2); border-radius: 16px; padding: 20px; cursor: pointer; }
    .level-card:hover { transform: translateY(-4px); }
    .timer { font-size: 32px; font-weight: bold; color: #f472b6; text-align: center; margin: 16px 0; }
    .score-display { font-size: 24px; text-align: center; color: #22c55e; margin: 16px 0; }
    .lives { display: flex; gap: 8px; justify-content: center; font-size: 24px; }
    .badge { display: inline-block; padding: 4px 12px; background: rgba(167, 139, 250, 0.2); color: #a78bfa; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .tab-bar { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .tab { padding: 12px 20px; background: transparent; color: #a1a1aa; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 14px; }
    .tab.active { color: #a78bfa; border-bottom-color: #a78bfa; }
    .course-card { background: rgba(30, 35, 50, 0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; }
    .course-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
    .course-level { background: rgba(34, 197, 94, 0.2); color: #22c55e; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
    .course-stats { display: flex; gap: 16px; margin-top: 12px; color: #a1a1aa; font-size: 13px; }
    .progress-bar { background: rgba(255,255,255,0.05); border-radius: 8px; height: 8px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #a78bfa, #f472b6); border-radius: 8px; }
    .back-btn { background: transparent; color: #a1a1aa; border: none; cursor: pointer; font-size: 14px; margin-bottom: 16px; }

    /* 单词消消乐样式 */
    .match-grid2 { display: grid; gap: 10px; margin: 12px 0; }
    .match-grid2.cols-4 { grid-template-columns: repeat(4, 1fr); }
    .match-grid2.cols-6 { grid-template-columns: repeat(6, 1fr); }
    .match-card2 { aspect-ratio: 1; background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(139,92,246,0.1)); border: 1px solid rgba(167,139,250,0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; text-align: center; padding: 8px; word-break: break-all; }
    .match-card2:hover:not(.disabled):not(.matched) { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(167,139,250,0.3); }
    .match-card2.flipped { background: rgba(167,139,250,0.3); border-color: #a78bfa; }
    .match-card2.matched { background: rgba(34,197,94,0.2); border-color: #22c55e; color: #22c55e; cursor: default; }
    .match-card2.disabled { cursor: default; opacity: 0.6; }

    /* 句子重组样式 */
    .word-chip { display: inline-block; padding: 8px 16px; background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(239,68,68,0.1)); border: 1px solid rgba(245,158,11,0.3); border-radius: 20px; color: #f59e0b; font-weight: 500; cursor: pointer; transition: all 0.2s; user-select: none; }
    .word-chip:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245,158,11,0.3); }
    .word-token.placed { background: rgba(167,139,250,0.2); border-color: #a78bfa; color: #c4b5fd; cursor: default; }

    /* 词语炸弹样式 */
    .bomb-status { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
    .bomb-lives { font-size: 22px; }
    .bomb-theme-badge { padding: 4px 14px; background: rgba(245,158,11,0.15); color: #f59e0b; border-radius: 20px; font-size: 13px; font-weight: 500; }
    .bomb-timer-ring { padding: 4px 14px; background: rgba(255,255,255,0.06); border-radius: 20px; font-size: 14px; font-weight: 600; color: #e4e4e7; }
    .bomb-timer-ring.danger { color: #ef4444; background: rgba(239,68,68,0.15); animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .bomb-current-turn { text-align: center; font-size: 22px; font-weight: 600; color: #fff; margin: 8px 0 12px; }
    .bomb-word-pool { min-height: 60px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 8px; }
    .bomb-pill { padding: 6px 14px; border-radius: 20px; font-size: 14px; }
    .bomb-pill.bomb-self { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .bomb-pill.bomb-ai { background: rgba(96,165,250,0.15); color: #60a5fa; }
    .bomb-input-area { display: flex; gap: 12px; margin-bottom: 16px; }
    .bomb-input-area input { flex: 1; padding: 14px 20px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.08); border-radius: 40px; color: #fff; font-size: 16px; outline: none; }
    .bomb-input-area input:focus { border-color: rgba(245,158,11,0.5); }
    .bomb-input-area input:disabled { opacity: 0.5; cursor: not-allowed; }
    .bomb-input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    .bomb-feedback { text-align: center; font-size: 14px; min-height: 24px; margin-bottom: 12px; }
    .bomb-feedback.success { color: #22c55e; }
    .bomb-feedback.error { color: #ef4444; }
    .bomb-feedback.info { color: #60a5fa; }
    .bomb-theme-selector { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 16px 0 12px; padding: 14px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid rgba(255,255,255,0.04); }
    .bomb-theme-btn { padding: 8px 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; color: #a1a1aa; font-size: 13px; cursor: pointer; transition: all 0.2s ease; font-weight: 500; }
    .bomb-theme-btn:hover { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); color: #f59e0b; transform: translateY(-1px); }
    .bomb-theme-btn.active { background: linear-gradient(135deg, rgba(245,158,11,0.25), rgba(239,68,68,0.15)); border-color: rgba(245,158,11,0.5); color: #f59e0b; box-shadow: 0 2px 12px rgba(245,158,11,0.15); }

    /* 默契搭档样式 */
    .partner-status-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .partner-round { color: #a1a1aa; font-size: 14px; }
    .partner-round span { color: #fff; font-weight: 600; font-size: 16px; }
    .partner-score { color: #f59e0b; font-weight: 600; }
    .partner-perfect { color: #ec4899; font-size: 14px; }
    .partner-progress { width: 100%; height: 6px; background: rgba(255,255,255,0.06); border-radius: 6px; margin-bottom: 20px; overflow: hidden; }
    .partner-progress > div { height: 100%; background: linear-gradient(90deg, #ec4899, #8b5cf6); border-radius: 6px; transition: 0.3s; }
    .partner-question-box { text-align: center; padding: 24px; background: rgba(255,255,255,0.02); border-radius: 16px; margin-bottom: 20px; }
    .partner-zh-word { font-size: 36px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .partner-hint { color: #a1a1aa; font-size: 14px; }
    .partner-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .partner-option { padding: 16px; background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.08); border-radius: 12px; color: #fff; font-size: 18px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .partner-option:hover:not(:disabled) { background: rgba(236,72,153,0.1); border-color: rgba(236,72,153,0.4); transform: translateY(-2px); }
    .partner-option:disabled { cursor: default; }
    .partner-option.selected { border-color: #ec4899; background: rgba(236,72,153,0.15); }

    let audioCtx = null;
    function initAudio() {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) { audioCtx = null; }
      }
    }
    function playSound(type) {
      if (!soundEnabled) return;
      initAudio();
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      switch (type) {
        case 'click':
          osc.frequency.value = 800;
          osc.type = 'sine';
          gain.gain.setValueAtTime(0.1, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
          osc.start(now);
          osc.stop(now + 0.08);
          break;
        case 'success':
          osc.frequency.setValueAtTime(523, now);
          osc.frequency.setValueAtTime(659, now + 0.1);
          osc.frequency.setValueAtTime(784, now + 0.2);
          osc.type = 'sine';
          gain.gain.setValueAtTime(0.15, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
          osc.start(now);
          osc.stop(now + 0.35);
          break;
        case 'error':
          osc.frequency.setValueAtTime(200, now);
          osc.frequency.setValueAtTime(150, now + 0.1);
          osc.type = 'sawtooth';
          gain.gain.setValueAtTime(0.08, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
          osc.start(now);
          osc.stop(now + 0.2);
          break;
        case 'complete':
          const notes = [523, 587, 659, 698, 784, 880, 988, 1047];
          notes.forEach((freq, i) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.frequency.value = freq;
            o.type = 'sine';
            const t = now + i * 0.08;
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(0.12, t + 0.02);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
            o.start(t);
            o.stop(t + 0.2);
          });
          return;
        case 'match':
          osc.frequency.setValueAtTime(600, now);
          osc.frequency.setValueAtTime(900, now + 0.05);
          osc.type = 'triangle';
          gain.gain.setValueAtTime(0.1, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
          osc.start(now);
          osc.stop(now + 0.15);
          break;
        case 'bomb':
          osc.frequency.setValueAtTime(100, now);
          osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
          osc.type = 'sawtooth';
          gain.gain.setValueAtTime(0.15, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
          osc.start(now);
          osc.stop(now + 0.3);
          break;
      }
    }

    let courseLangTab = 'en';

    function getTodayStr() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function canCheckIn() {
      if (!userData.lastCheckInDate) return true;
      return userData.lastCheckInDate !== getTodayStr();
    }

    function getCheckInReward(day) {
      const rewards = [10, 15, 20, 25, 30, 40, 50];
      const idx = (day - 1) % 7;
      return rewards[idx];
    }

    function doCheckIn() {
      if (!canCheckIn()) {
        alert('今天已经签到过啦，明天再来吧！');
        return;
      }
      const today = getTodayStr();
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = yesterday.getFullYear() + '-' + String(yesterday.getMonth() + 1).padStart(2, '0') + '-' + String(yesterday.getDate()).padStart(2, '0');

      if (userData.lastCheckInDate === yesterdayStr) {
        userData.checkInStreak = (userData.checkInStreak || 0) + 1;
      } else {
        userData.checkInStreak = 1;
      }

      const reward = getCheckInReward(userData.checkInStreak);
      userData.points += reward;
      userData.lastCheckInDate = today;
      if (!userData.checkInHistory) userData.checkInHistory = [];
      userData.checkInHistory.push({ date: today, reward: reward, streak: userData.checkInStreak });
      if (userData.checkInHistory.length > 30) userData.checkInHistory = userData.checkInHistory.slice(-30);

      saveUserData();
      playSound('success');
      alert(`🎉 签到成功！\n\n连续签到：${userData.checkInStreak} 天\n获得积分：+${reward}\n当前积分：${userData.points}`);

                  <li style="color:rgba(255,255,255,0.8);font-size:13px;display:flex;align-items:flex-start;gap:8px;">
                    <span style="color:#22c55e;flex-shrink:0;margin-top:2px;">✓</span>
                    <span>${obj}</span>

              <h4 style="color:#fff;font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
                <span style="font-size:20px;">👥</span> 适合人群
              </h4>
              <ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px;">
                ${overview.suitableFor.map(sf => `
                  <li style="color:rgba(255,255,255,0.8);font-size:13px;display:flex;align-items:flex-start;gap:8px;">
                    <span style="color:#06b6d4;flex-shrink:0;margin-top:2px;">◆</span>
                    <span>${sf}</span>
                  </li>
                `).join('')}
              </ul>
            </div>
            <div style="grid-column:1 / -1;background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.15);border-radius:16px;padding:24px;">
              <h4 style="color:#fff;font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
                <span style="font-size:20px;">📋</span> 课程大纲
              </h4>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">
                ${overview.outline.map((item, idx) => `
                  <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid rgba(255,255,255,0.05);">
                    <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#f59e0b);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0;">${idx + 1}</div>
                    <span style="color:rgba(255,255,255,0.85);font-size:13px;">${item}</span>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        `;
      } else {
        tabContentHtml = `
          <div style="display:flex;flex-direction:column;gap:10px;">
            ${lessonsHtml}
          </div>
        `;
      }
      
      content.innerHTML = `
        <button class="back-btn" onclick="backToCourses()">← 返回课程列表</button>
        <div style="background:rgba(30,35,50,0.6);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:32px;">
          <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:24px;">
            <div>
              <h1 style="color:#fff;font-size:32px;">${courseName}</h1>
              <p style="color:#a1a1aa;margin-top:8px;">${courseSub}</p>
            </div>
            <span class="course-level" style="font-size:16px;">${courseLevel}</span>
          </div>
          <div style="display:flex;gap:24px;margin-bottom:24px;">
            <div class="stat-card" style="flex:1;"><div class="stat-value">${course.duration}</div><div class="stat-label">课程时长</div></div>
            <div class="stat-card" style="flex:1;"><div class="stat-value">${course.lessons}</div><div class="stat-label">课时数量</div></div>
            <div class="stat-card" style="flex:1;"><div class="stat-value">${course.rating}⭐</div><div class="stat-label">课程评分</div></div>
            <div class="stat-card" style="flex:1;"><div class="stat-value">${course.students.toLocaleString()}</div><div class="stat-label">学习人数</div></div>
          </div>
          <div style="margin-bottom:24px;">
            <h3 style="color:#fff;margin-bottom:12px;">课程技能</h3>
            <div style="display:flex;gap:8px;">
              ${course.skills.map(s => `<span class="badge" style="font-size:14px;padding:6px 16px;">${s}</span>`).join('')}
            </div>
          </div>
          <div class="progress-bar" style="height:12px;margin-bottom:8px;"><div class="progress-fill" style="width:${course.progress}%"></div></div>
          <p style="color:#a1a1aa;font-size:14px;">学习进度: ${course.progress}%</p>
          <div style="display:flex;gap:12px;margin-top:24px;">
            <button class="btn btn-primary" style="flex:1;" onclick="startCourseLearn(${course.id})">开始学习</button>
            <button class="btn btn-secondary" style="flex:1;${favoriteBtnStyle}" onclick="toggleCourseFavorite(${course.id})">${favoriteText}</button>
          </div>
          <div style="margin-top:32px;border-bottom:1px solid rgba(255,255,255,0.05);">
            <div style="display:flex;gap:4px;">
              <button onclick="switchCourseDetailTab('overview')" style="${tabBtnClass('overview')}">📖 课程概览</button>
              <button onclick="switchCourseDetailTab('lessons')" style="${tabBtnClass('lessons')}">📚 课时列表</button>
            </div>
          </div>
          <div style="margin-top:24px;">
            ${tabContentHtml}
          </div>
        </div>
      `;
    }

    function switchCourseDetailTab(tab) {
      courseDetailTab = tab;
      if (isInCourseDetail && currentCourseId) {
        showCourseDetail(currentCourseId, false);
      }
    }

    function startCourseLearn(courseId) {
      const course = courses.find(c => c.id === courseId);
      const lessons = lessonData[courseId] || [];
      if (!course || lessons.length === 0) return;

      const completedLessons = course.progress > 0 ? Math.floor(course.progress / 20) : 0;
      const nextLessonIndex = Math.min(completedLessons, lessons.length - 1);
      const nextLesson = lessons[nextLessonIndex];

      if (nextLesson) {
        startLesson(courseId, nextLesson.id);
      }
    }

    function toggleCourseFavorite(courseId) {
      const course = courses.find(c => c.id === courseId);
      if (!course) return;
      course.favorited = !course.favorited;
      playSound(course.favorited ? 'success' : 'click');
      if (isInCourseDetail) {
        showCourseDetail(courseId, false);
      } else {
        renderContent();
      }
    }

    function backToCourses() {
      isInCourseDetail = false;
      currentCourseId = null;
      renderContent();
    }

    function startLesson(courseId, lessonId) {
      const lessons = lessonData[courseId] || [];
      const lesson = lessons.find(l => l.id === lessonId);
      if (!lesson) return;
      
      currentLesson = lesson;
      currentQuestionIndex = 0;
      lessonScore = 0;
      
      renderLessonContent(courseId);
    }

    function renderLessonContent(courseId) {
      if (!currentLesson) return;
      
      const questions = currentLesson.questions;
      const currentQuestion = questions[currentQuestionIndex];
      const progress = ((currentQuestionIndex) / questions.length) * 100;

      if (currentQuestion.type === 'order_sentences') {
        sentenceOrder = currentQuestion.answer.map((_, i) => i).sort(() => Math.random() - 0.5);
      }
      
      const content = document.getElementById('content');
      content.innerHTML = `
        <button class="back-btn" onclick="showCourseDetail(${courseId})">← 返回课程详情</button>
        <div style="background:rgba(30,35,50,0.6);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:32px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
            <h2 style="color:#fff;font-size:24px;">📝 ${currentLesson.name}</h2>
            <div style="color:#a78bfa;font-weight:600;">得分: ${lessonScore}</div>
          </div>
          <div class="progress-bar" style="height:8px;margin-bottom:8px;"><div class="progress-fill" style="width:${progress}%"></div></div>
          <p style="color:#a1a1aa;font-size:13px;margin-bottom:24px;">问题 ${currentQuestionIndex + 1} / ${questions.length}</p>
          
          <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:24px;">
            <div style="color:#fff;font-size:18px;font-weight:500;margin-bottom:20px;">${currentQuestion.question}</div>
            
            ${renderQuestionType(currentQuestion)}
          </div>
          
          <div id="feedback-message" style="margin-top:16px;padding:12px;border-radius:8px;display:none;"></div>
        </div>
      `;
    }

    function renderQuestionType(question) {
      switch(question.type) {
        case 'fill_blank':
        case 'choice':
        case 'synonym':
        case 'sentence_completion':
        case 'main_idea':
        case 'detail':
        case 'inference':
        case 'multiple_choice':
        case 'vocabulary':
        case 'note_completion':
        case 'table_completion':
        case 'flow_chart':
        case 'summary_completion':
          return `
            <div style="display:flex;flex-direction:column;gap:12px;">
              ${question.options.map((opt, idx) => `
                <button onclick="checkAnswer(${idx})" style="padding:14px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;text-align:left;cursor:pointer;transition:0.2s;">
                  <span style="color:#a78bfa;margin-right:12px;">${['A', 'B', 'C', 'D'][idx]}</span>${opt}
                </button>
              `).join('')}
            </div>
          `;
        
        case 'true_false':
          return `
            <div style="display:flex;gap:12px;">
              <button onclick="checkAnswer(0)" style="flex:1;padding:14px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;cursor:pointer;">
                ✅ True
              </button>
              <button onclick="checkAnswer(1)" style="flex:1;padding:14px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;cursor:pointer;">
                ❌ False
              </button>
              <button onclick="checkAnswer(2)" style="flex:1;padding:14px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;cursor:pointer;">
                ❓ Not Given
              </button>
            </div>
          `;
        
        case 'order_sentences':
          return `
            <div style="margin-bottom:16px;">
              ${sentenceOrder.map((origIdx, pos) => `
                <div draggable="true" 
                     ondragstart="dragStart(event, ${pos})" 
                     ondragover="dragOver(event)" 
                     ondrop="drop(event, ${pos})"
                     style="padding:12px 16px;background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.3);border-radius:8px;color:#fff;margin-bottom:8px;cursor:move;user-select:none;">
                  ${pos + 1}. ${question.sentences[origIdx]}
                </div>
              `).join('')}
            </div>
            <button onclick="checkSentenceOrder()" class="btn btn-primary" style="width:100%;">提交答案</button>
          `;
        
        case 'response':
        case 'discuss':
        case 'agree_disagree':
        case 'describe':
        case 'cue_card':
          const prompts = question.prompts || [];
          return `
            <div style="color:#a1a1aa;margin-bottom:16px;">
              ${prompts.map(p => `• ${p}`).join('<br>')}
            </div>
            <textarea placeholder="在这里输入你的回答..." style="width:100%;height:120px;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:14px;resize:none;"></textarea>
            <button onclick="submitResponse()" class="btn btn-primary" style="width:100%;margin-top:16px;">提交回答</button>
          `;
        
        case 'hiragana':
        case 'katakana':
        case 'romaji':
        case 'hangul':
        case 'match':
          return `
            <div style="display:flex;flex-direction:column;gap:12px;">
              ${question.options.map((opt, idx) => `
                <button onclick="checkAnswer(${idx})" style="padding:14px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;text-align:left;cursor:pointer;font-size:18px;">
                  <span style="color:#a78bfa;margin-right:12px;">${['A', 'B', 'C', 'D'][idx]}</span>${opt}
                </button>
              `).join('')}
            </div>
          `;
        
        case 'conjugate':
          return `
            <div style="display:flex;flex-direction:column;gap:12px;">
              ${question.options.map((opt, idx) => `
                <button onclick="checkAnswer(${idx})" style="padding:14px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;text-align:left;cursor:pointer;font-size:18px;">
                  <span style="color:#a78bfa;margin-right:12px;">${['A', 'B', 'C', 'D'][idx]}</span>${opt}
                </button>
              `).join('')}
            </div>
          `;
        
        case 'argument':
        case 'opinion':
          return `
            <div style="background:rgba(167,139,250,0.1);border-radius:12px;padding:16px;margin-bottom:16px;">
              <div style="color:#a78bfa;font-weight:600;margin-bottom:8px;">💡 答题思路：</div>
              ${question.points.map(p => `<div style="color:#e5d0f0;margin-bottom:4px;">• ${p}</div>`).join('')}
            </div>
            <textarea placeholder="在这里输入你的论点..." style="width:100%;height:150px;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:14px;resize:none;"></textarea>
            <button onclick="submitResponse()" class="btn btn-primary" style="width:100%;margin-top:16px;">提交回答</button>
          `;
        
        case 'topic_sentence':
          return `
            <div style="display:flex;flex-direction:column;gap:12px;">
              ${question.options.map((opt, idx) => `
                <button onclick="checkAnswer(${idx})" style="padding:14px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;text-align:left;cursor:pointer;">
                  <span style="color:#a78bfa;margin-right:12px;">${['A', 'B', 'C', 'D'][idx]}</span>${opt}
                </button>
              `).join('')}
            </div>
          `;
        
        case 'short_answer':
          return `
            <input type="text" id="shortAnswer" placeholder="输入你的答案..." style="width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:14px;margin-bottom:16px;">
            <button onclick="checkShortAnswer()" class="btn btn-primary" style="width:100%;">提交答案</button>
          `;
        
        default:
          return `
            <div style="color:#a1a1aa;">这道题需要你思考作答。</div>
            <button onclick="nextQuestion()" class="btn btn-primary" style="width:100%;margin-top:16px;">跳过此题</button>
          `;
      }
    }

    function checkAnswer(selectedIdx) {
      const question = currentLesson.questions[currentQuestionIndex];
      const isCorrect = selectedIdx === question.answer;
      
      showFeedback(isCorrect, isCorrect ? '🎉 回答正确！+10分' : `❌ 回答错误，正确答案是 ${['A', 'B', 'C', 'D'][question.answer]}`);
      
      if (isCorrect) {
        lessonScore += 10;
      }
      
      setTimeout(() => {
        nextQuestion();
      }, 1500);
    }

    function checkShortAnswer() {
      const input = document.getElementById('shortAnswer');
      const userAnswer = input.value.trim().toLowerCase();
      const correctAnswer = currentLesson.questions[currentQuestionIndex].answer.toLowerCase();
      const isCorrect = userAnswer === correctAnswer;
      
      showFeedback(isCorrect, isCorrect ? '🎉 回答正确！+10分' : `❌ 回答错误，正确答案是 ${currentLesson.questions[currentQuestionIndex].answer}`);
      
      if (isCorrect) {
        lessonScore += 10;
      }
      
      setTimeout(() => {
        nextQuestion();
      }, 1500);
    }

    function checkSentenceOrder() {
      const question = currentLesson.questions[currentQuestionIndex];
      const isCorrect = sentenceOrder.every((origIdx, pos) => origIdx === question.answer[pos]);
      
      showFeedback(isCorrect, isCorrect ? '🎉 排序正确！+15分' : '❌ 排序有误，再想想看！');
      
      if (isCorrect) {
        lessonScore += 15;
        setTimeout(() => {
          nextQuestion();
        }, 1500);
      }
    }

    function dragStart(e, pos) {
      dragSrcIndex = pos;
      e.dataTransfer.effectAllowed = 'move';
    }

    function dragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function drop(e, targetPos) {
      e.preventDefault();
      if (dragSrcIndex === null || dragSrcIndex === targetPos) return;
      
      const temp = sentenceOrder[dragSrcIndex];
      sentenceOrder[dragSrcIndex] = sentenceOrder[targetPos];
      sentenceOrder[targetPos] = temp;
      
      dragSrcIndex = null;
      
      const question = currentLesson.questions[currentQuestionIndex];
      const container = e.target.closest('div[style*="margin-bottom:16px"]');
      if (container) {
        container.innerHTML = sentenceOrder.map((origIdx, pos) => `
          <div draggable="true" 
               ondragstart="dragStart(event, ${pos})" 
               ondragover="dragOver(event)" 
               ondrop="drop(event, ${pos})"
               style="padding:12px 16px;background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.3);border-radius:8px;color:#fff;margin-bottom:8px;cursor:move;user-select:none;">
            ${pos + 1}. ${question.sentences[origIdx]}
          </div>
        `).join('');
      }
    }

    function submitResponse() {
      showFeedback(true, '✅ 回答已提交！+10分');
      lessonScore += 10;
      setTimeout(() => {
        nextQuestion();
      }, 1500);
    }

    function showFeedback(isCorrect, message) {
      const feedback = document.getElementById('feedback-message');
      feedback.textContent = message;
      feedback.style.display = 'block';
      feedback.style.background = isCorrect ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)';
      feedback.style.color = isCorrect ? '#22c55e' : '#ef4444';
    }

    function nextQuestion() {
      const questions = currentLesson.questions;
      currentQuestionIndex++;
      
      if (currentQuestionIndex >= questions.length) {
        finishLesson();
      } else {
        renderLessonContent(currentCourseId);
      }
    }

    function finishLesson() {
      const totalQuestions = currentLesson.questions.length;
      const percentage = Math.round((lessonScore / (totalQuestions * 10)) * 100);
      
      const content = document.getElementById('content');
      content.innerHTML = `
        <button class="back-btn" onclick="showCourseDetail(${currentCourseId})">← 返回课程详情</button>
        <div style="background:rgba(30,35,50,0.6);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:32px;text-align:center;">
          <div style="font-size:64px;margin-bottom:16px;">🏆</div>
          <h2 style="color:#fff;font-size:28px;margin-bottom:8px;">课时完成！</h2>
          <p style="color:#a1a1aa;margin-bottom:24px;">${currentLesson.name}</p>
          
          <div style="display:flex;justify-content:center;gap:24px;margin-bottom:32px;">
            <div style="background:rgba(255,255,255,0.05);border-radius:16px;padding:20px;min-width:120px;">
              <div style="color:#a78bfa;font-size:32px;font-weight:700;">${lessonScore}</div>
              <div style="color:#a1a1aa;font-size:13px;">总得分</div>
            </div>
            <div style="background:rgba(255,255,255,0.05);border-radius:16px;padding:20px;min-width:120px;">
              <div style="color:${percentage >= 60 ? '#22c55e' : '#f59e0b'};font-size:32px;font-weight:700;">${percentage}%</div>
              <div style="color:#a1a1aa;font-size:13px;">正确率</div>
            </div>
            <div style="background:rgba(255,255,255,0.05);border-radius:16px;padding:20px;min-width:120px;">
              <div style="color:#f472b6;font-size:32px;font-weight:700;">${currentQuestionIndex}</div>
              <div style="color:#a1a1aa;font-size:13px;">答题数</div>
            </div>
          </div>
          
          <div style="display:flex;gap:12px;justify-content:center;">
            <button onclick="showCourseDetail(${currentCourseId})" class="btn btn-secondary">返回课程</button>
            <button onclick="restartLesson()" class="btn btn-primary">再练一次</button>
          </div>
        </div>
      `;
      
      const course = courses.find(c => c.id === currentCourseId);
      if (course && percentage >= 60) {
        const completedLessons = Math.floor(course.progress / 20);
        const lessonIndex = lessonData[currentCourseId].findIndex(l => l.id === currentLesson.id);
        if (lessonIndex >= completedLessons) {
          course.progress = Math.min(100, course.progress + 20);
        }
      }
    }

    function restartLesson() {
      startLesson(currentCourseId, currentLesson.id);
    }

    function renderGame() {
      if (!gameLevel && !poisonGameActive && !aiBattleActive && !dictationActive && !matchGameActive && !matchGame2Active && !sentenceActive && !chainActive && !bombActive && !partnerActive) {
        const games = [
          { icon: '🔗', name: '词汇连连看', desc: '点击配对单词和翻译，挑战你的词汇量！', color: '#a78bfa', color2: '#8b5cf6', action: 'startMatchGame()', tag: '经典' },
          { icon: '🧩', name: '单词消消乐', desc: '翻牌配对单词和翻译，考验你的记忆力！', color: '#ec4899', color2: '#db2777', action: 'startMatch2Game()', tag: '记忆' },
          { icon: '🧙', name: '女巫的毒药', desc: '翻开卡牌，小心隐藏的毒药！中毒后朗读单词复活。', color: '#f472b6', color2: '#db2777', action: 'startPoisonGame()', tag: '刺激' },
          { icon: '🤖', name: 'AI词汇对战', desc: '和AI对战！比速度、比准确率，看谁是词汇王者！', color: '#3b82f6', color2: '#2563eb', action: 'startAIBattle()', tag: '对战' },
          { icon: '🎧', name: '英语听写', desc: '听音拼写，提升你的听力和拼写能力！', color: '#22c55e', color2: '#16a34a', action: 'startDictation()', tag: '听力' },
          { icon: '📝', name: '句子重组', desc: '点击单词按正确顺序排列，锻炼你的语感！', color: '#f59e0b', color2: '#d97706', action: 'startSentenceGame()', tag: '语法' },
          { icon: '🔗', name: '单词接龙', desc: '输入下一个单词，首尾相接，挑战词汇量！', color: '#60a5fa', color2: '#3b82f6', action: 'startChainGame()', tag: '挑战' },
          { icon: '🧨', name: '词语炸弹', desc: '和AI轮流说单词，8秒倒计时，小心炸弹爆炸！', color: '#f59e0b', color2: '#ef4444', action: 'startBombGame()', tag: '紧张' },
          { icon: '🤝', name: '默契搭档', desc: '和AI一起答题，看看你们的默契度有多高！', color: '#ec4899', color2: '#8b5cf6', action: 'startPartnerGame()', tag: '合作' },
        ];

        return `
          <div class="page-header" style="animation: fadeInUp 0.5s ease-out;">
            <div class="page-badge">
              <span>🎮</span>
              <span>趣味游戏</span>
            </div>
            <h1 class="page-title">🎮 游戏化学习中心</h1>
            <p class="page-subtitle">边玩边学，让学习像游戏一样让人欲罢不能</p>
          </div>

          <div class="glass-card" style="margin-bottom:24px;background:linear-gradient(135deg,rgba(236,72,153,0.1),rgba(139,92,246,0.1));border-color:rgba(236,72,153,0.2);animation: fadeInUp 0.5s ease-out 0.1s both;">
            <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
              <div style="width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#ec4899,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 24px rgba(236,72,153,0.3);">
                🏆
              </div>
              <div style="flex:1;min-width:200px;">
                <h3 style="color:#fff;font-size:18px;margin-bottom:4px;">今日游戏挑战</h3>
                <p style="color:#a1a1aa;font-size:13px;margin-bottom:8px;">完成任意3个游戏，获得额外50积分奖励！</p>
                <div style="display:flex;gap:8px;align-items:center;">
                  <div style="flex:1;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;">
                    <div style="width:33%;height:100%;background:linear-gradient(90deg,#ec4899,#8b5cf6);border-radius:4px;"></div>
                  </div>
                  <span style="color:#c4b5fd;font-size:12px;font-weight:600;">1/3</span>
                </div>
              </div>
              <button class="btn-hero-primary" style="padding:10px 20px;font-size:13px;">领取奖励</button>
            </div>
          </div>

          <div class="glass-card" style="margin-bottom:24px;background:linear-gradient(135deg,rgba(34,197,94,0.08),rgba(59,130,246,0.08));border-color:rgba(34,197,94,0.15);animation: fadeInUp 0.5s ease-out 0.15s both;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px;">
              <div style="display:flex;align-items:center;gap:12px;">
                <div style="width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,rgba(34,197,94,0.3),rgba(59,130,246,0.2));display:flex;align-items:center;justify-content:center;font-size:22px;">📚</div>
                <div>
                  <h3 style="color:#fff;font-size:16px;margin:0;">课程词汇挑战</h3>
                  <p style="color:#a1a1aa;font-size:12px;margin:2px 0 0;">用已学课程的词汇玩游戏，巩固记忆更高效！</p>
                </div>
              </div>
              <span style="color:#22c55e;font-size:12px;font-weight:600;">${courses.filter(c => c.language === gameLanguage && (userData.coursesProgress[c.id] || 0) > 0).length} 门课程已解锁</span>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;">
              ${courses.filter(c => c.language === gameLanguage).slice(0, 6).map((c, i) => {
                const progress = userData.coursesProgress[c.id] || 0;
                const isUnlocked = progress > 0;
                return `
                  <div onclick="${isUnlocked ? `startMatchGame();playSound('match');` : ''}" style="padding:12px;background:${isUnlocked ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.02)'};border:1px solid ${isUnlocked ? 'rgba(34,197,94,0.3)' : 'rgba(255,255,255,0.05)'};border-radius:12px;cursor:${isUnlocked ? 'pointer' : 'not-allowed'};transition:all 0.3s;opacity:${isUnlocked ? 1 : 0.5};" 
                  onmouseover="${isUnlocked ? "this.style.borderColor='rgba(34,197,94,0.5)';this.style.transform='translateY(-2px)';" : ''}" 
                  onmouseout="${isUnlocked ? "this.style.borderColor='rgba(34,197,94,0.3)';this.style.transform='translateY(0)';" : ''}">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                      <span style="font-size:20px;">${c.icon}</span>
                      <span style="color:#fff;font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.title}</span>
                    </div>
                    <div style="height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-bottom:4px;overflow:hidden;">
                      <div style="height:100%;width:${progress}%;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:2px;"></div>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:11px;">
                      <span style="color:${isUnlocked ? '#22c55e' : '#71717a'};">${isUnlocked ? '✓ 已解锁' : '🔒 未解锁'}</span>
                      <span style="color:#71717a;">${progress}%</span>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>

          <div class="feature-grid" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr));">
            ${games.map((g, i) => {
              const gameKeyMap = {
                'startMatchGame()': 'match',
                'startMatch2Game()': 'match2',
                'startPoisonGame()': 'poison',
                'startAIBattle()': 'aiBattle',
                'startDictation()': 'dictation',
                'startSentenceGame()': 'sentence',
                'startChainGame()': 'chain',
                'startBombGame()': 'bomb',
                'startPartnerGame()': 'partner'
              };
              const gameKey = gameKeyMap[g.action];
              const hasTutorial = !!gameTutorials[gameKey];
              return `
              <div class="feature-card" onclick="${g.action}" style="animation: fadeInUp 0.5s ease-out ${0.2 + i * 0.05}s both;">
                <div class="feature-icon-wrap" style="--icon-bg-from:${g.color}30;--icon-bg-to:${g.color2}15;--icon-shadow:${g.color}40;position:relative;">
                  ${g.icon}
                  <span style="position:absolute;top:-6px;right:-6px;padding:2px 8px;background:linear-gradient(135deg,${g.color},${g.color2});color:#fff;border-radius:10px;font-size:10px;font-weight:700;">${g.tag}</span>
                  ${hasTutorial ? `<button onclick="event.stopPropagation();showGameTutorial('${gameKey}')" style="position:absolute;top:-6px;left:-6px;width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.2);cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);" title="游戏说明">?</button>` : ''}
                </div>
                <h3 class="feature-title">${g.name}</h3>
                <p class="feature-desc">${g.desc}</p>
                <div class="feature-arrow">▶</div>
              </div>
            `}).join('')}
          </div>
        `;
      } else if (matchGameActive && !gameLevel) {
        return renderMatchLevels();
      } else if (matchGame2Active) {
        return renderMatch2Game();
      } else if (sentenceActive) {
        return renderSentenceGame();
      } else if (chainActive) {
        return renderChainGame();
      } else if (bombActive) {
        return renderBombGame();
      } else if (partnerActive) {
        return renderPartnerGame();
      } else if (dictationActive) {
        return renderDictation();
      } else if (aiBattleActive) {
        return renderAIBattle();
      } else if (poisonGameActive) {
        return renderPoisonGame();
      } else {
        const level = gameLevels.find(l => l.id === gameLevel);
        const board = renderGameBoard();
        return `
          <button class="back-btn" onclick="backToGameSelect()">← 返回游戏选择</button>
          <div style="display:flex;gap:8px;margin-bottom:20px;">
            <button class="tab ${gameLanguage === 'en' ? 'active' : ''}" onclick="gameLanguage='en';renderContent()">英语</button>
            <button class="tab ${gameLanguage === 'ja' ? 'active' : ''}" onclick="gameLanguage='ja';renderContent()">日语</button>
            <button class="tab ${gameLanguage === 'kr' ? 'active' : ''}" onclick="gameLanguage='kr';renderContent()">韩语</button>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h2 style="color:#fff;">第 ${level.id} 关 - ${level.name}</h2>
            <div class="lives">${'❤️'.repeat(gameLives)}</div>
          </div>
          <div class="timer">⏱️ ${gameTime}秒</div>
          <div class="score-display">得分: ${gameScore}</div>
          <div class="game-board" style="grid-template-columns:repeat(${level.pairs <= 6 ? 4 : level.pairs <= 10 ? 5 : 6},1fr);">${board}</div>
        `;
      }
    }

    function renderGameBoard() {
      return gameBoardCells.map(cell => {
        const isMatched = gameMatched.includes(cell.id);
        const isSelected = gameSelected && gameSelected.id === cell.id;
        return `<div class="game-cell ${isMatched ? 'matched' : ''} ${isSelected ? 'selected' : ''}" onclick="handleCellClick({id:'${cell.id}',text:'${cell.text}',pairId:${cell.pairId},type:'${cell.type}'})">${isMatched ? '✓' : cell.text}</div>`;
      }).join('');
    }

    function startLevel(levelId) {
      gameLevel = levelId;
      gameSelected = null;
      gameMatched = [];
      gameScore = 0;
      gameTime = gameLevels.find(l => l.id === levelId).time;
      gameLives = 3;
      
      const level = gameLevels.find(l => l.id === levelId);
      const allWords = vocabularyData[gameLanguage];
      const words = [...allWords].sort(() => Math.random() - 0.5).slice(0, level.pairs);
      gameBoardCells = [];
      words.forEach(w => {
        gameBoardCells.push({ id: w.id + '_w', text: w.word, pairId: w.id, type: 'word' });
        gameBoardCells.push({ id: w.id + '_t', text: w.translation, pairId: w.id, type: 'translation' });
      });
      gameBoardCells.sort(() => Math.random() - 0.5);
      
      renderContent();
      startTimer();
    }

    function startTimer() {
      if (gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(() => {
        gameTime--;
        if (gameTime <= 0) {
          clearInterval(gameInterval);
          showGameOver(false);
        }
        renderContent();
      }, 1000);
    }

    function handleCellClick(cell) {
      if (gameMatched.includes(cell.id)) return;
      if (!gameSelected) {
        gameSelected = cell;
      } else {
        if (gameSelected.id === cell.id) {
          gameSelected = null;
          return;
        }
        if (gameSelected.pairId === cell.pairId && gameSelected.type !== cell.type) {
          gameMatched.push(gameSelected.id, cell.id);
          gameScore += 10;
          gameSelected = null;
          if (gameMatched.length === gameLevels.find(l => l.id === gameLevel).pairs * 2) {
            clearInterval(gameInterval);
            setTimeout(() => showGameOver(true), 500);
          }
        } else {
          gameLives--;
          if (gameLives <= 0) {
            clearInterval(gameInterval);
            showGameOver(false);
          }
          gameSelected = null;
        }
      }
      renderContent();
    }

    function showGameOver(win) {
      document.getElementById('game-result').textContent = win ? '🎉 恭喜过关！' : '😢 游戏结束';
      document.getElementById('final-score').textContent = gameScore;
      document.getElementById('game-over-modal').style.display = 'flex';

      if (win && currentUser) {
        userData.matchGamesWon++;
        userData.totalScore += gameScore;
        updateStreakDays();
        addGameProgressToCourses(gameLanguage);
        checkAchievements();
        saveUserData();
      }
    }

    function addGameProgressToCourses(lang, amount) {
      if (!currentUser) return;
      const progressAmount = amount || 1.5;
      const langCourses = courses.filter(c => c.language === lang);
      if (langCourses.length === 0) return;
      
      let added = false;
      for (const course of langCourses) {
        const currentProgress = userData.coursesProgress[course.id] || 0;
        if (currentProgress < 100) {
          const newProgress = Math.min(100, currentProgress + progressAmount);
          userData.coursesProgress[course.id] = Math.round(newProgress * 10) / 10;
          added = true;
          break;
        }
      }
      
      if (!added && langCourses.length > 0) {
        const course = langCourses[0];
        userData.coursesProgress[course.id] = Math.min(100, (userData.coursesProgress[course.id] || 0) + progressAmount * 0.5);
      }
    }

    function restartGame() {
      document.getElementById('game-over-modal').style.display = 'none';
      startLevel(gameLevel);
    }

    function backToLevels() {
      document.getElementById('game-over-modal').style.display = 'none';
      gameLevel = null;
      renderContent();
    }

    function startMatchGame() {
      matchGameActive = true;
      gameLevel = null;
      poisonGameActive = false;
      aiBattleActive = false;
      dictationActive = false;
      renderContent();
    }

    function renderMatchLevels() {
      return `
        <button class="back-btn" onclick="backToGameSelect()">← 返回游戏选择</button>
        <h1 style="margin-bottom:8px;color:#fff;">🔗 词汇连连看</h1>
        <p style="color:#a1a1aa;margin-bottom:20px;">选择关卡开始挑战，配对单词和翻译！</p>
        <div style="display:flex;gap:8px;margin-bottom:24px;">
          <button class="tab ${gameLanguage === 'en' ? 'active' : ''}" onclick="gameLanguage='en';renderContent()">英语</button>
          <button class="tab ${gameLanguage === 'ja' ? 'active' : ''}" onclick="gameLanguage='ja';renderContent()">日语</button>
          <button class="tab ${gameLanguage === 'kr' ? 'active' : ''}" onclick="gameLanguage='kr';renderContent()">韩语</button>
        </div>
        <div class="grid">
          ${gameLevels.map((level, idx) => `
            <div class="level-card" onclick="startLevel(${level.id})" style="text-align:center;">
              <div style="font-size:48px;margin-bottom:12px;">${level.icon}</div>
              <h3 style="color:#fff;font-size:20px;margin-bottom:8px;">第 ${level.id} 关 - ${level.name}</h3>
              <p style="color:#a1a1aa;font-size:14px;margin-bottom:12px;">${level.pairs} 对词汇 · ${level.time} 秒</p>
              <div style="display:inline-block;padding:8px 20px;background:rgba(167,139,250,0.2);border-radius:20px;color:#a78bfa;font-weight:500;">开始挑战 →</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function backToGameSelect() {
      document.getElementById('game-over-modal').style.display = 'none';
      gameLevel = null;
      matchGameActive = false;
      poisonGameActive = false;
      aiBattleActive = false;
      dictationActive = false;
      matchGame2Active = false;
      sentenceActive = false;
      chainActive = false;
      bombActive = false;
      partnerActive = false;
      if (match2State.timerId) clearInterval(match2State.timerId);
      if (chainState.timerId) clearInterval(chainState.timerId);
      if (bombState.timerId) clearInterval(bombState.timerId);
      renderContent();
    }

    // ==================== 单词消消乐游戏 ====================
    function startMatch2Game() {
      matchGame2Active = true;
      matchGameActive = false;
      poisonGameActive = false;
      aiBattleActive = false;
      dictationActive = false;
      sentenceActive = false;
      chainActive = false;
      gameLevel = null;
      initMatch2();
      startMatch2Timer();
      renderContent();
    }

    function initMatch2() {
      const words = [...vocabularyData[gameLanguage] || vocabularyData.en];
      const shuffled = words.sort(() => Math.random() - 0.5);
      const pairs = shuffled.slice(0, 8);

      let cards = [];
      pairs.forEach((p, idx) => {
        cards.push({ id: idx, pairId: idx, type: 'word', text: p.word, matched: false });
        cards.push({ id: idx + 100, pairId: idx, type: 'trans', text: p.translation, matched: false });
      });
      cards.sort(() => Math.random() - 0.5);

      match2State = {
        cards: cards,
        selected: null,
        matchedCount: 0,
        totalPairs: pairs.length,
        score: 0,
        attempts: 0,
        isLocked: false,
        timer: 60,
        timerId: null,
        gameOver: false,
      };
    }

    function renderMatch2Game() {
      const s = match2State;
      const cols = s.totalPairs <= 6 ? 4 : 6;

      let cardsHtml = s.cards.map((card, idx) => {
        let cls = 'match-card2';
        if (card.matched) cls += ' matched';
        else if (s.selected === idx) cls += ' flipped';
        if (s.isLocked || s.gameOver) cls += ' disabled';
        return `<div class="${cls}" data-index="${idx}" onclick="onMatch2Click(${idx})">${card.matched ? '✓' : (s.selected === idx ? card.text : '❓')}</div>`;
      }).join('');

      return `
        <button class="back-btn" onclick="backToGameSelect()">← 返回游戏选择</button>
        <div style="display:flex;gap:8px;margin-bottom:20px;">
          <button class="tab ${gameLanguage === 'en' ? 'active' : ''}" onclick="switchMatch2Lang('en')">英语</button>
          <button class="tab ${gameLanguage === 'ja' ? 'active' : ''}" onclick="switchMatch2Lang('ja')">日语</button>
          <button class="tab ${gameLanguage === 'kr' ? 'active' : ''}" onclick="switchMatch2Lang('kr')">韩语</button>
        </div>
        <div style="background:rgba(30,35,50,0.5);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:24px 20px 28px;">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
            <h2 style="color:#fff;font-size:22px;">🧩 单词消消乐</h2>
            <div style="display:flex;gap:16px;color:#a1a1aa;">
              <span>🎯 <strong style="color:#fff;">${s.matchedCount}/${s.totalPairs}</strong></span>
              <span>⭐ <strong style="color:#22c55e;">${s.score}</strong></span>
              <span>⏱️ <strong style="color:#ec4899;" id="match2Timer">${s.timer}</strong>s</span>
              <span>📝 <strong style="color:#60a5fa;">${s.attempts}</strong></span>
            </div>
          </div>
          <p style="color:#a1a1aa;font-size:14px;margin-bottom:16px;">点击两张卡片配对 <span style="padding:2px 10px;background:rgba(167,139,250,0.15);color:#a78bfa;border-radius:12px;font-size:12px;">单词 ↔ 翻译</span></p>
          <div class="match-grid2 cols-${cols}">${cardsHtml}</div>
          ${s.gameOver ? `<div style="text-align:center;margin-top:16px;color:#ec4899;font-weight:600;font-size:18px;">⏰ 时间到！</div>` : ''}
          <div style="text-align:center;margin-top:20px;">
            <button onclick="initMatch2();renderContent();" style="padding:10px 24px;background:rgba(167,139,250,0.2);border:1px solid rgba(167,139,250,0.3);border-radius:20px;color:#a78bfa;font-weight:500;cursor:pointer;">🔄 重开</button>
          </div>
        </div>
      `;
    }

    function switchMatch2Lang(lang) {
      gameLanguage = lang;
      if (match2State.timerId) clearInterval(match2State.timerId);
      initMatch2();
      startMatch2Timer();
      renderContent();
    }

    function startMatch2Timer() {
      if (match2State.timerId) clearInterval(match2State.timerId);
      match2State.timerId = setInterval(() => {
        match2State.timer--;
        const el = document.getElementById('match2Timer');
        if (el) el.textContent = match2State.timer;
        if (match2State.timer <= 0) {
          clearInterval(match2State.timerId);
          match2State.gameOver = true;
          renderContent();
          showMatch2Result(false);
        }
      }, 1000);
    }

    function onMatch2Click(idx) {
      const s = match2State;
      if (s.isLocked || s.gameOver) return;
      const card = s.cards[idx];
      if (card.matched) return;
      if (s.selected === idx) return;

      if (s.selected === null) {
        s.selected = idx;
        renderContent();
        return;
      }

      const firstIdx = s.selected;
      const firstCard = s.cards[firstIdx];
      s.isLocked = true;
      s.attempts++;

      if (firstCard.pairId === card.pairId && firstCard.type !== card.type) {
        firstCard.matched = true;
        card.matched = true;
        s.matchedCount++;
        s.score += 10;
        s.selected = null;
        s.isLocked = false;
        renderContent();
        if (s.matchedCount === s.totalPairs) {
          clearInterval(s.timerId);
          if (currentUser) {
            userData.matchGamesWon++;
            userData.totalScore += s.score;
            updateStreakDays();
            checkAchievements();
            saveUserData();
          }
          setTimeout(() => showMatch2Result(true), 400);
        }
      } else {
        renderContent();
        setTimeout(() => {
          s.selected = null;
          s.isLocked = false;
          renderContent();
        }, 800);
      }
    }

    function showMatch2Result(win) {
      const s = match2State;
      const icon = win ? '🎉' : '😅';
      const title = win ? '恭喜通关！' : '时间到！';
      const sub = win ? `你配对了所有 ${s.totalPairs} 组单词！` : `已配对 ${s.matchedCount}/${s.totalPairs} 组`;

      const modal = document.createElement('div');
      modal.id = 'match2ResultModal';
      modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;';
      modal.innerHTML = `
        <div style="background:#1e1e2e;border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:32px;text-align:center;max-width:400px;width:90%;">
          <div style="font-size:64px;margin-bottom:12px;">${icon}</div>
          <h2 style="color:#fff;font-size:28px;margin-bottom:8px;">${title}</h2>
          <p style="color:#a1a1aa;margin-bottom:20px;">${sub}</p>
          <div style="display:flex;justify-content:space-around;margin-bottom:24px;">
            <div><div style="font-size:28px;font-weight:700;color:#a78bfa;">${s.score}</div><div style="color:#a1a1aa;font-size:13px;">得分</div></div>
            <div><div style="font-size:28px;font-weight:700;color:#22c55e;">${s.matchedCount}/${s.totalPairs}</div><div style="color:#a1a1aa;font-size:13px;">配对</div></div>
            <div><div style="font-size:28px;font-weight:700;color:#60a5fa;">${s.attempts}</div><div style="color:#a1a1aa;font-size:13px;">尝试</div></div>
          </div>

    // ==================== 句子重组游戏 ====================
    function startSentenceGame() {
      sentenceActive = true;
      matchGameActive = false;
      matchGame2Active = false;
      poisonGameActive = false;
      aiBattleActive = false;
      dictationActive = false;
      chainActive = false;
      gameLevel = null;
      initSentenceGame();
      renderContent();
    }

    function initSentenceGame() {
      const sentences = SENTENCES[gameLanguage] || SENTENCES.en;
      const shuffled = [...sentences].sort(() => Math.random() - 0.5);
      const selected = shuffled.slice(0, 6);

      const items = selected.map((s, idx) => {
        const words = s.en.split(/\s+/).filter(w => w.length > 0);
        const shuffledWords = [...words].sort(() => Math.random() - 0.5);
        return {
          id: idx,
          zh: s.zh,
          original: words,
          shuffled: shuffledWords,
          placed: [],
          remaining: [...shuffledWords],
          completed: false,
        };
      });

      sentenceState = {
        items: items,
        currentIndex: 0,
        score: 0,
        totalItems: items.length,
        completedCount: 0,
        gameOver: false,
      };
    }

    function renderSentenceGame() {
      const s = sentenceState;
      const item = s.items[s.currentIndex];

      if (!item) {
        return `
          <button class="back-btn" onclick="backToGameSelect()">← 返回游戏选择</button>
          <div style="background:rgba(30,35,50,0.5);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:48px 24px;text-align:center;">
            <div style="font-size:64px;margin-bottom:12px;">🎊</div>
            <h2 style="color:#fff;font-size:28px;">全部完成！</h2>
            <p style="color:#a1a1aa;margin:8px 0 16px;">你成功重组了所有 ${s.totalItems} 个句子！</p>
            <div style="font-size:32px;font-weight:700;color:#ec4899;margin-bottom:20px;">${s.score} 分</div>
            <div style="display:flex;gap:12px;justify-content:center;">
              <button onclick="initSentenceGame();renderContent();" style="padding:12px 28px;background:linear-gradient(135deg,#f472b6,#a78bfa);border:none;border-radius:12px;color:#fff;font-weight:600;cursor:pointer;">🔄 再来一局</button>
              <button onclick="backToGameSelect();" style="padding:12px 28px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#a1a1aa;font-weight:500;cursor:pointer;">返回</button>
            </div>
          </div>

      }

      const progress = (s.completedCount / s.totalItems) * 100;

      const placedHtml = item.placed.map(w =>
        `<span class="word-token placed">${w}</span>`

      const remainingHtml = item.remaining.map((w, idx) =>

      ).join('');

      return `

        <div style="display:flex;gap:8px;margin-bottom:20px;">

          <button class="tab ${gameLanguage === 'ja' ? 'active' : ''}" onclick="switchSentenceLang('ja')">日语</button>
