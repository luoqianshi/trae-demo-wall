        <div style="background:rgba(30,35,50,0.5);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:24px 20px 28px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <h2 style="color:#fff;font-size:22px;">📝 句子重组</h2>
            <div style="display:flex;gap:16px;color:#a1a1aa;">
              <span>📊 <strong style="color:#fff;">${s.completedCount}/${s.totalItems}</strong></span>
              <span>⭐ <strong style="color:#22c55e;">${s.score}</strong></span>
            </div>
          </div>
          <div class="progress-bar" style="margin-bottom:20px;"><div class="progress-fill" style="width:${progress}%;"></div></div>
          <div style="margin-bottom:16px;padding:12px 16px;background:rgba(255,255,255,0.03);border-radius:12px;">
            <span style="color:#f59e0b;font-weight:500;">${item.zh}</span>
            <span style="color:#a1a1aa;font-size:13px;margin-left:12px;">— 点击单词按正确顺序排列</span>
          </div>
          <div style="min-height:60px;padding:16px;background:rgba(167,139,250,0.05);border:2px dashed rgba(167,139,250,0.2);border-radius:12px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
            ${placedHtml || '<span style="color:#5a5a6a;font-size:15px;">👆 点击下方单词组成句子</span>'}
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:50px;">
            ${remainingHtml || '<span style="color:#5a5a6a;font-size:14px;">✅ 已完成！</span>'}
          </div>
          <div style="display:flex;gap:12px;justify-content:center;margin-top:20px;">
            <button onclick="resetSentenceCurrent();renderContent();" style="padding:10px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#a1a1aa;cursor:pointer;">⟳ 重置当前</button>
            <button onclick="initSentenceGame();renderContent();" style="padding:10px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#a1a1aa;cursor:pointer;">🔄 重开</button>
          </div>
        </div>
      `;
    }

    function switchSentenceLang(lang) {
      gameLanguage = lang;
      initSentenceGame();
      renderContent();
    }

    function onSentenceWordClick(idx) {
      const s = sentenceState;
      const item = s.items[s.currentIndex];
      if (!item || item.completed) return;

      const word = item.remaining[idx];
      if (!word) return;

      item.remaining.splice(idx, 1);
      item.placed.push(word);
      renderContent();

      if (item.remaining.length === 0) {
        const isCorrect = item.placed.every((w, i) => w === item.original[i]);
        if (isCorrect) {
          item.completed = true;
          s.completedCount++;
          s.score += 10 + Math.max(0, 5 - s.items.filter(it => it.completed).length);
          if (currentUser) {
            userData.totalScore += 10;
            saveUserData();
          }
          renderContent();
          setTimeout(() => {
            s.currentIndex++;
            renderContent();
          }, 800);
        } else {
          setTimeout(() => {
            resetSentenceCurrent();
            renderContent();
          }, 500);
        }
      }
    }

    function resetSentenceCurrent() {
      const s = sentenceState;
      const item = s.items[s.currentIndex];
      if (!item) return;
      const allWords = [...item.placed, ...item.remaining];
      const shuffled = allWords.sort(() => Math.random() - 0.5);
      item.placed = [];
      item.remaining = shuffled;
    }

    // ==================== 单词接龙游戏 ====================
    function startChainGame() {
      chainActive = true;
      matchGameActive = false;
      matchGame2Active = false;
      poisonGameActive = false;
      aiBattleActive = false;
      dictationActive = false;
      sentenceActive = false;
      gameLevel = null;
      initChainGame();
      startChainTimer();
      renderContent();
    }

    function initChainGame() {
      const words = (vocabularyData[gameLanguage] || vocabularyData.en).map(w => w.word.toLowerCase());
      const startWord = words[Math.floor(Math.random() * words.length)];

      chainState = {
        words: words,
        currentWord: startWord,
        usedWords: [startWord],
        score: 0,
        timer: 60,
        timerId: null,
        gameOver: false,
        history: [startWord],
        totalAttempts: 0,
        validAttempts: 0,
      };
    }

    function renderChainGame() {
      const s = chainState;
      const lastLetter = s.currentWord.charAt(s.currentWord.length - 1);

      const historyHtml = s.history.map(w =>
        `<span style="padding:4px 12px;background:rgba(96,165,250,0.1);border-radius:20px;font-size:13px;color:#c4c4d0;">${w}</span>`
      ).join('');

      return `
        <button class="back-btn" onclick="backToGameSelect()">← 返回游戏选择</button>
        <div style="display:flex;gap:8px;margin-bottom:20px;">
          <button class="tab ${gameLanguage === 'en' ? 'active' : ''}" onclick="switchChainLang('en')">英语</button>
          <button class="tab ${gameLanguage === 'ja' ? 'active' : ''}" onclick="switchChainLang('ja')">日语</button>
          <button class="tab ${gameLanguage === 'kr' ? 'active' : ''}" onclick="switchChainLang('kr')">韩语</button>
        </div>
        <div style="background:rgba(30,35,50,0.5);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:24px 20px 28px;">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
            <h2 style="color:#fff;font-size:22px;">🔗 单词接龙</h2>
            <div style="display:flex;gap:16px;color:#a1a1aa;">
              <span>⭐ <strong style="color:#22c55e;">${s.score}</strong></span>
              <span>📝 <strong style="color:#fff;">${s.history.length}</strong> 个</span>
              <span>⏱️ <strong style="color:#ec4899;" id="chainTimer">${s.timer}</strong>s</span>
            </div>
          </div>
          <div style="text-align:center;margin-bottom:20px;padding:24px;background:rgba(96,165,250,0.05);border-radius:16px;">
            <div style="font-size:36px;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:2px;">${s.currentWord}</div>
            <div style="color:#a1a1aa;">下一个词以 <strong style="color:#60a5fa;font-size:18px;">${lastLetter}</strong> 开头</div>
          </div>
          <div style="display:flex;gap:10px;margin-bottom:16px;">
            <input type="text" id="chainInput" placeholder="输入单词..." 
                   onkeypress="if(event.key==='Enter') submitChainWord()"
                   ${s.gameOver ? 'disabled' : ''}
                   style="flex:1;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:16px;">
            <button onclick="submitChainWord()" ${s.gameOver ? 'disabled' : ''} 
                    style="padding:14px 28px;background:linear-gradient(135deg,#60a5fa,#a78bfa);border:none;border-radius:12px;color:#fff;font-weight:600;cursor:pointer;">提交</button>
          </div>
          <div id="chainFeedback" style="min-height:24px;text-align:center;font-size:14px;"></div>
          <div style="margin-top:16px;max-height:120px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:12px;background:rgba(255,255,255,0.02);border-radius:12px;">
            ${historyHtml || '<span style="color:#5a5a6a;font-size:14px;">还没有接龙记录</span>'}
          </div>
          <div style="text-align:center;margin-top:20px;">
            <button onclick="initChainGame();startChainTimer();renderContent();" style="padding:10px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#a1a1aa;cursor:pointer;">🔄 重开</button>
          </div>
        </div>
      `;
    }

    function switchChainLang(lang) {
      gameLanguage = lang;
      if (chainState.timerId) clearInterval(chainState.timerId);
      initChainGame();
      startChainTimer();
      renderContent();
    }

    function startChainTimer() {
      if (chainState.timerId) clearInterval(chainState.timerId);
      chainState.timerId = setInterval(() => {
        chainState.timer--;
        const el = document.getElementById('chainTimer');
        if (el) el.textContent = chainState.timer;
        if (chainState.timer <= 0) {
          clearInterval(chainState.timerId);
          chainState.gameOver = true;
          renderContent();
          showChainResult();
        }
      }, 1000);
    }

    function submitChainWord() {
      const s = chainState;
      if (s.gameOver) return;

      const input = document.getElementById('chainInput');
      const feedback = document.getElementById('chainFeedback');
      const word = input.value.trim().toLowerCase();

      if (!word) {
        feedback.textContent = '⚠️ 请输入一个单词';
        feedback.style.color = '#f59e0b';
        return;
      }

      s.totalAttempts++;

      if (s.usedWords.includes(word)) {
        feedback.textContent = `❌ "${word}" 已经用过了！`;
        feedback.style.color = '#ef4444';
        input.value = '';
        input.focus();
        return;
      }

      const lastLetter = s.currentWord.charAt(s.currentWord.length - 1);
      if (word.charAt(0) !== lastLetter) {
        feedback.textContent = `❌ 单词必须以 "${lastLetter}" 开头！`;
        feedback.style.color = '#ef4444';
        input.value = '';
        input.focus();
        return;
      }

      if (!s.words.includes(word)) {
        feedback.textContent = `❌ "${word}" 不在词汇表中，请换一个！`;
        feedback.style.color = '#ef4444';
        input.value = '';
        input.focus();
        return;
      }

      s.validAttempts++;
      s.currentWord = word;
      s.usedWords.push(word);
      s.history.push(word);
      const bonus = 5 + Math.floor(s.history.length / 5);
      s.score += bonus;

      feedback.textContent = `✅ 太棒了！+${bonus} 分`;
      feedback.style.color = '#22c55e';
      input.value = '';

      renderContent();
      document.getElementById('chainInput')?.focus();
    }

    function showChainResult() {
      const s = chainState;
      const modal = document.createElement('div');
      modal.id = 'chainResultModal';
      modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;';

            <div><div style="font-size:28px;font-weight:700;color:#60a5fa;">${s.history.length}</div><div style="color:#a1a1aa;font-size:13px;">接龙数</div></div>
            <div><div style="font-size:28px;font-weight:700;color:#f59e0b;">${s.validAttempts}/${s.totalAttempts}</div><div style="color:#a1a1aa;font-size:13px;">有效/尝试</div></div>
          </div>
          <div style="margin:8px 0 20px;color:#a1a1aa;font-size:14px;max-height:100px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;">
            ${s.history.map(w => `<span style="background:rgba(96,165,250,0.1);padding:2px 12px;border-radius:20px;font-size:13px;color:#c4c4d0;">${w}</span>`).join('')}
          </div>
          <div style="display:flex;gap:12px;justify-content:center;">

            <button onclick="closeChainResult()" style="padding:12px 28px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#a1a1aa;font-weight:500;cursor:pointer;">关闭</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    }

            ${themeButtons}
          </div>

          ${s.gameOver ? '' : `<div style="text-align:center;margin-top:6px;"><button class="btn-sm" onclick="restartBomb()" style="padding:4px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:30px;color:#a1a1aa;cursor:pointer;">⟳ 重置本局</button></div>`}
        </div>
      `;
    }

    function startBombTimer() {
      if (bombState.timerId) clearInterval(bombState.timerId);
      bombState.timer = 10;
      updateBombTimerDisplay();
      bombState.timerId = setInterval(() => {
        bombState.timer--;
        updateBombTimerDisplay();
        if (bombState.timer <= 0) {
          clearInterval(bombState.timerId);
          if (!bombState.gameOver) {
            if (bombState.turn === 'player') {
              bombState.lives--;
              bombState.score = Math.max(0, bombState.score - 2);
              showBombFeedback('💥 炸弹爆炸！你中毒了！（-1 命）', 'error');
              if (bombState.lives <= 0) {
                bombState.gameOver = true;
                bombState.isPlaying = false;
                renderContent();
                showBombResult('💀', '你被炸飞了！', `得分 ${bombState.score}`);
                return;
              }
              bombState.turn = 'ai';
              bombState.isLocked = false;
              bombState.timer = 10;
              updateBombTimerDisplay();
              updateBombScoreDisplay();
              updateBombTurnDisplay();
              startBombTimer();
              setTimeout(() => bombAITurn(), 600 + Math.random() * 400);
            } else {
              bombState.score += 5;
              showBombFeedback('💥 AI 炸弹爆炸！AI 损失一条命！', 'info');
              bombState.turn = 'player';
              bombState.isLocked = false;
              bombState.timer = 10;
              updateBombTimerDisplay();
              updateBombScoreDisplay();
              updateBombTurnDisplay();
              startBombTimer();
              setTimeout(() => focusBombInput(), 100);
            }
          }
        }
      }, 1000);
    }

    function updateBombTimerDisplay() {
      const timerEl = document.querySelector('.bomb-timer-ring');
      if (timerEl) {
        timerEl.textContent = `⏱️ ${bombState.timer}s`;
        if (bombState.timer <= 3) {
          timerEl.classList.add('danger');
        } else {
          timerEl.classList.remove('danger');
        }
      }
      const livesEl = document.querySelector('.bomb-lives');
      if (livesEl) {
        livesEl.innerHTML = `${'❤️'.repeat(bombState.lives)}${'🖤'.repeat(3 - bombState.lives)}`;
      }
    }

    function updateBombWordPool() {
      const pool = document.getElementById('bombWordPool');
      if (!pool) return;
      const s = bombState;
      if (s.used.length === 0) {
        pool.innerHTML = '<span style="color:#5a5a6a;font-size:14px;">📝 说出第一个单词吧！</span>';
        return;
      }
      pool.innerHTML = s.used.map((w, i) => {
        const cls = (i % 2 === 0) ? 'bomb-self' : 'bomb-ai';
        const label = (i % 2 === 0) ? '🧑' : '🤖';
        return `<span class="bomb-pill ${cls}">${label} ${w}</span>`;
      }).join('');
    }

    function updateBombScoreDisplay() {
      const scoreEl = document.querySelector('.bomb-score-val');
      if (scoreEl) {
        scoreEl.textContent = bombState.score;
      } else {
        const scoreContainer = document.querySelector('.bomb-status > div:last-child span');
        if (scoreContainer) scoreContainer.textContent = bombState.score;
      }
    }

    function updateBombTurnDisplay() {
      const turnEl = document.querySelector('.bomb-current-turn');
      if (!turnEl) return;
      const s = bombState;
      if (s.gameOver) {
        turnEl.innerHTML = '⏰ 游戏结束';
      } else if (s.turn === 'player') {
        turnEl.innerHTML = `🧑 轮到你了！<span style="color:#a1a1aa;font-size:14px;font-weight:400;"> (回合 ${s.round+1})</span>`;
      } else {
        turnEl.innerHTML = `🤖 AI 思考中...<span style="color:#a1a1aa;font-size:14px;font-weight:400;"> (回合 ${s.round+1})</span>`;
      }
      const input = document.getElementById('bombWordInput');
      const submitBtn = input ? input.nextElementSibling : null;
      if (input) {
        input.disabled = s.turn !== 'player' || s.gameOver || !s.isPlaying;
        if (s.turn === 'player' && !s.gameOver && s.isPlaying) {
          input.focus();
        }
      }
      if (submitBtn) {
        submitBtn.disabled = s.turn !== 'player' || s.gameOver || !s.isPlaying;
      }
    }

    function submitBombWord() {
      const s = bombState;
      if (s.gameOver || !s.isPlaying || s.turn !== 'player' || s.isLocked) return;
      const input = document.getElementById('bombWordInput');
      const word = input.value.trim().toLowerCase();
      if (!word) {
        showBombFeedback('⚠️ 请输入单词！', 'error');
        return;
      }

      const themes = BOMB_THEMES[gameLanguage] || BOMB_THEMES.en;
      const validWords = themes[s.currentTheme] || themes.fruits;
      const validLower = validWords.map(w => w.toLowerCase());

      if (!validLower.includes(word.toLowerCase())) {
        showBombFeedback(`❌ "${word}" 不属于当前主题！`, 'error');
        input.value = '';
        input.focus();
        return;
      }
      if (s.used.map(u => u.toLowerCase()).includes(word.toLowerCase())) {
        showBombFeedback(`❌ "${word}" 已经说过了！`, 'error');
        input.value = '';
        input.focus();
        return;
      }

      s.used.push(word);
      s.score += 2;
      s.round++;
      showBombFeedback('✅ 太棒了！+2 分', 'success');
      updateBombWordPool();
      updateBombScoreDisplay();
      input.value = '';
      input.focus();

      s.turn = 'ai';
      s.isLocked = false;
      clearInterval(s.timerId);
      s.timer = 10;
      updateBombTimerDisplay();
      updateBombTurnDisplay();
      setTimeout(() => bombAITurn(), 800 + Math.random() * 600);
    }

    function bombAITurn() {
      const s = bombState;
      if (s.gameOver || !s.isPlaying || s.turn !== 'ai') {
        s.isLocked = false;
        return;
      }

      const themes = BOMB_THEMES[gameLanguage] || BOMB_THEMES.en;
      const validWords = themes[s.currentTheme] || themes.fruits;
      const available = validWords.filter(w => !s.used.map(u => u.toLowerCase()).includes(w.toLowerCase()));

      if (available.length === 0) {
        s.score += 10;
        showBombFeedback('🎉 AI 词穷了！你赢了这一局！+10 分', 'success');
        s.gameOver = true;
        s.isPlaying = false;
        clearInterval(s.timerId);
        if (currentUser) {
          userData.matchGamesWon++;
          userData.totalScore += s.score;
          updateStreakDays();
          checkAchievements();
          saveUserData();
        }
        renderContent();
        showBombResult('🏆', '你赢了！', `得分 ${s.score}`);
        return;
      }

      let aiWord;
      if (Math.random() < 0.15 && available.length > 1) {
        aiWord = s.used[Math.floor(Math.random() * s.used.length)] || available[0];
      } else {
        aiWord = available[Math.floor(Math.random() * available.length)];
      }

      const validLower = validWords.map(w => w.toLowerCase());
      if (s.used.map(u => u.toLowerCase()).includes(aiWord.toLowerCase()) || !validLower.includes(aiWord.toLowerCase())) {
        s.score += 5;
        showBombFeedback(`💥 AI 说重复了 "${aiWord}"，AI 炸弹爆炸！+5 分`, 'info');
        s.turn = 'player';
        s.isLocked = false;
        clearInterval(s.timerId);
        s.timer = 10;
        updateBombScoreDisplay();
        updateBombTimerDisplay();
        updateBombTurnDisplay();
        setTimeout(() => focusBombInput(), 100);
        return;
      }

      s.used.push(aiWord);
      s.round++;
      showBombFeedback(`🤖 AI 说：${aiWord}`, 'info');
      updateBombWordPool();

      if (s.round >= s.maxRounds) {
        s.gameOver = true;
        s.isPlaying = false;
        clearInterval(s.timerId);
        renderContent();
        showBombResult('⏰', '平局！', `得分 ${s.score}`);
        return;
      }

      s.turn = 'player';
      s.isLocked = false;
      clearInterval(s.timerId);
      s.timer = 10;
      updateBombTimerDisplay();
      updateBombTurnDisplay();
      startBombTimer();
      setTimeout(() => focusBombInput(), 100);
    }

    function showBombFeedback(msg, type) {
      const el = document.getElementById('bombFeedback');
      if (!el) return;
      el.textContent = msg;
      el.className = 'bomb-feedback ' + (type || 'info');
      setTimeout(() => {
        if (el) el.textContent = '';
      }, 3000);
    }

    function showBombResult(icon, title, sub) {
      const modal = document.createElement('div');
      modal.id = 'bombResultModal';
      modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;';
      modal.innerHTML = `
        <div style="background:#1e1e2e;border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:32px;text-align:center;max-width:400px;width:90%;">
          <div style="font-size:64px;margin-bottom:12px;">${icon}</div>
          <h2 style="color:#fff;font-size:28px;margin-bottom:8px;">${title}</h2>
          <p style="color:#a1a1aa;margin-bottom:20px;">${sub}</p>
          <div style="display:flex;justify-content:space-around;margin-bottom:24px;">
            <div><div style="font-size:28px;font-weight:700;color:#f59e0b;">${bombState.score}</div><div style="color:#a1a1aa;font-size:13px;">得分</div></div>
            <div><div style="font-size:28px;font-weight:700;color:#22c55e;">${bombState.used.length}</div><div style="color:#a1a1aa;font-size:13px;">单词数</div></div>
            <div><div style="font-size:28px;font-weight:700;color:#ec4899;">${bombState.lives}/3</div><div style="color:#a1a1aa;font-size:13px;">剩余生命</div></div>
          </div>
          <div style="display:flex;gap:12px;justify-content:center;">
            <button onclick="restartBomb()" style="padding:12px 28px;background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;border-radius:12px;color:#fff;font-weight:600;cursor:pointer;">🔄 再来一局</button>
            <button onclick="closeBombResult()" style="padding:12px 28px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#a1a1aa;font-weight:500;cursor:pointer;">关闭</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    }

    function restartBomb() {
      const modal = document.getElementById('bombResultModal');
      if (modal) modal.remove();
      if (bombState.timerId) clearInterval(bombState.timerId);
      initBombGame();
      startBombTimer();
      renderContent();
    }

    function closeBombResult() {
      const modal = document.getElementById('bombResultModal');
      if (modal) modal.remove();
      backToGameSelect();
    }

    // ==================== 默契搭档游戏 ====================
    function startPartnerGame() {
      partnerActive = true;
      matchGameActive = false;
      matchGame2Active = false;
      poisonGameActive = false;
      aiBattleActive = false;
      dictationActive = false;
      sentenceActive = false;
      chainActive = false;
      bombActive = false;
      gameLevel = null;
      initPartnerGame();
      renderContent();
    }

    function initPartnerGame() {
      const pool = PARTNER_POOL[gameLanguage] || PARTNER_POOL.en;
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      partnerState = {
        pool: shuffled.slice(0, 10),
        currentIndex: 0,
        totalRounds: 10,
        score: 0,
        perfectCount: 0,
        playerCorrect: 0,
        aiCorrect: 0,
        totalAttempts: 0,
        isFinished: false,
        isLocked: false,
        currentQuestion: null,
        options: [],
        playerChoice: null,
        aiChoice: null,
        feedback: null,
      };
    }

    function switchPartnerLang(lang) {
      gameLanguage = lang;
      initPartnerGame();
      renderContent();
    }

    function renderPartnerGame() {
      const s = partnerState;
      if (s.isFinished || s.currentIndex >= s.pool.length) {
        s.isFinished = true;
        return renderPartnerResult();
      }

      const q = s.pool[s.currentIndex];
      s.currentQuestion = q;

      if (s.options.length === 0 || (s.playerChoice === null && s.aiChoice === null && !s.feedback)) {
        const allTargets = s.pool.map(p => p.target).filter(t => t !== q.target);
        const shuffledTargets = allTargets.sort(() => Math.random() - 0.5);
        const distractors = shuffledTargets.slice(0, 3);
        let options = [q.target, ...distractors];
        while (options.length < 4) options.push('?');
        options = options.sort(() => Math.random() - 0.5);
        s.options = options;
      }
      const options = s.options;

      const progress = (s.currentIndex / s.pool.length) * 100;
      const langLabel = gameLanguage === 'en' ? '英文' : gameLanguage === 'ja' ? '日文' : '韩文';

      const playerOptionsHtml = options.map((opt, idx) => {
        let cls = 'partner-option player';
        if (s.playerChoice === idx) cls += ' selected';
        if (s.feedback) {
          const isCorrect = opt === q.target;
          if (isCorrect) cls += ' correct';
          if (idx === s.playerChoice && !isCorrect) cls += ' wrong';
        }
        return `<button class="${cls}" onclick="selectPartnerOption(${idx})" ${s.isLocked ? 'disabled' : ''}>${opt}</button>`;
      }).join('');

      const aiOptionsHtml = options.map((opt, idx) => {
        let cls = 'partner-option ai';
        if (s.aiChoice === idx && s.feedback) cls += ' selected';
        if (s.feedback) {
          const isCorrect = opt === q.target;
          if (isCorrect) cls += ' correct';
          if (idx === s.aiChoice && !isCorrect) cls += ' wrong';
        } else if (s.aiChoice !== null) {
          cls += ' thinking';
        }
        return `<button class="${cls}" disabled>${s.aiChoice === idx && !s.feedback ? '🤔' : opt}</button>`;
      }).join('');

      let feedbackHtml = '';
      if (s.feedback) {
        const fbClass = s.feedback.includes('完美') ? 'perfect' :
                        s.feedback.includes('选对了') || s.feedback.includes('选对') ? 'good' : 'bad';
        feedbackHtml = `<div class="partner-feedback ${fbClass}" id="partnerFeedback">${s.feedback}</div>`;
      } else {
        feedbackHtml = `<div class="partner-feedback" id="partnerFeedback">🤔 选择你的答案！</div>`;
      }

      return `
        <button class="back-btn" onclick="backToGameSelect()">← 返回游戏选择</button>
        <div style="display:flex;gap:8px;margin-bottom:20px;">
          <button class="tab ${gameLanguage === 'en' ? 'active' : ''}" onclick="switchPartnerLang('en')">英语</button>
          <button class="tab ${gameLanguage === 'ja' ? 'active' : ''}" onclick="switchPartnerLang('ja')">日语</button>
          <button class="tab ${gameLanguage === 'kr' ? 'active' : ''}" onclick="switchPartnerLang('kr')">韩语</button>
        </div>
        <div style="background:rgba(30,35,50,0.5);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:24px 20px 28px;">
          <div class="partner-status-bar">
            <div class="partner-round">📝 第 <span>${s.currentIndex + 1}</span> / ${s.pool.length} 题</div>
            <div class="partner-score">⭐ ${s.score} 分</div>
            <div class="partner-perfect">🎯 默契 ${s.perfectCount} 次</div>
          </div>

          <div class="partner-progress"><div style="width:${progress}%;"></div></div>

          <div class="partner-question-box">
            <div class="partner-zh-word">${q.zh}</div>
            <div class="partner-hint">👆 选择对应的 ${langLabel} 翻译</div>
          </div>

          <div class="partner-duel">
            <div class="partner-side left">
              <div class="partner-avatar player-avatar">
                <span class="avatar-emoji">🧑</span>
                <span class="avatar-label">你</span>
              </div>
              <div class="partner-options">
                ${playerOptionsHtml}
              </div>
            </div>

            <div class="partner-vs">
              <span>VS</span>
            </div>

            <div class="partner-side right">
              <div class="partner-avatar ai-avatar">
                <span class="avatar-emoji">🤖</span>
                <span class="avatar-label">AI</span>
              </div>
              <div class="partner-options">
                ${aiOptionsHtml}
              </div>
            </div>
          </div>

          ${feedbackHtml}

          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-top:12px;">
            <div style="font-size:14px;color:#a1a1aa;">
              ${s.aiChoice === null ? '🤖 AI 等待你的选择...' : (s.feedback ? '' : '🤖 AI 正在思考...')}
            </div>
            <button onclick="restartPartner()" style="padding:6px 18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:30px;color:#a1a1aa;cursor:pointer;">⟳ 重新开始</button>
          </div>
        </div>
      `;
    }

    function selectPartnerOption(idx) {
      const s = partnerState;
      if (s.isLocked || s.isFinished || s.playerChoice !== null) return;
      s.playerChoice = idx;
      s.isLocked = true;
      renderContent();

      if (s.aiChoice === null) {
        setTimeout(() => partnerAISelect(), 300);
      } else {
        evaluatePartnerRound();
      }
    }

    function partnerAISelect() {
      const s = partnerState;
      if (s.isFinished) return;
      const q = s.currentQuestion;
      const options = s.options;
      const correctIdx = options.indexOf(q.target);
      let aiIdx;
      if (Math.random() < 0.8) {
        aiIdx = correctIdx;
      } else {
        const wrongOptions = options.map((_, i) => i).filter(i => i !== correctIdx);
        if (wrongOptions.length > 0) {
          aiIdx = wrongOptions[Math.floor(Math.random() * wrongOptions.length)];
        } else {
          aiIdx = correctIdx;
        }
      }

      let bounceCount = 0;
      const totalBounces = 1;
      let currentBounceIdx = Math.floor(Math.random() * options.length);

      function bounceStep() {
        if (s.isFinished || s.playerChoice === null) return;
        currentBounceIdx = (currentBounceIdx + 1 + Math.floor(Math.random() * 2)) % options.length;
        s.aiChoice = currentBounceIdx;
        renderContent();
        bounceCount++;
        if (bounceCount < totalBounces) {
          setTimeout(bounceStep, 2800 + Math.random() * 400);
        } else {
          s.aiChoice = aiIdx;
          renderContent();
          if (s.playerChoice !== null) evaluatePartnerRound();
        }
      }

      s.aiChoice = currentBounceIdx;
      renderContent();
      setTimeout(bounceStep, 2800);
    }

    function evaluatePartnerRound() {
      const s = partnerState;
      if (s.isFinished) return;
      const q = s.currentQuestion;
      const playerIdx = s.playerChoice;
      const aiIdx = s.aiChoice;
      if (playerIdx === null || aiIdx === null) return;

      const isPlayerCorrect = s.options[playerIdx] === q.target;
      const isAICorrect = s.options[aiIdx] === q.target;

      s.totalAttempts++;
      let feedbackMsg = '';
      let points = 0;

      if (isPlayerCorrect && isAICorrect) {
        points = 10;
        s.perfectCount++;
        feedbackMsg = '🎉 完美默契！双方都选对了！+10 分';
        if (currentUser) {
          userData.synergyCount = (userData.synergyCount || 0) + 1;
        }
      } else if (isPlayerCorrect && !isAICorrect) {
        points = 5;
        feedbackMsg = '👍 你选对了！但 AI 跑偏了。+5 分';
      } else if (!isPlayerCorrect && isAICorrect) {
        points = 0;
        feedbackMsg = '😅 AI 选对了，但你选错了。再接再厉！';
      } else {
        points = 0;
        feedbackMsg = '❌ 你们都选错了…… 继续加油！';
      }

      s.score += points;
      if (isPlayerCorrect) s.playerCorrect++;
      if (isAICorrect) s.aiCorrect++;
      s.feedback = feedbackMsg;
      s.isLocked = true;

      if (currentUser) {
        userData.totalScore += points;
        if (isPlayerCorrect && isAICorrect) {
          checkAchievements();
        }
        saveUserData();
      }

      renderContent();

      setTimeout(() => {
        s.currentIndex++;
        s.playerChoice = null;
        s.aiChoice = null;
        s.isLocked = false;
        s.feedback = null;
        s.options = [];
        if (s.currentIndex >= s.pool.length) {
          s.isFinished = true;
          if (currentUser) {
            userData.matchGamesWon++;
            updateStreakDays();
            checkAchievements();
            saveUserData();
          }
        }
        renderContent();
      }, 2000);
    }

    function renderPartnerResult() {
      const s = partnerState;
      const total = s.totalAttempts || 1;
      const playerRate = Math.round((s.playerCorrect / total) * 100);
      const aiRate = Math.round((s.aiCorrect / total) * 100);
      const synergyRate = Math.round((s.perfectCount / total) * 100);

      let icon = '🤝';
      let title = '默契搭档';
      if (synergyRate >= 80) { icon = '🏆'; title = '灵魂伴侣！'; }
      else if (synergyRate >= 50) { icon = '🌟'; title = '不错的搭档！'; }
      else { icon = '📚'; title = '继续磨合吧！'; }

      return `
        <button class="back-btn" onclick="backToGameSelect()">← 返回游戏选择</button>
        <div style="background:rgba(30,35,50,0.5);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:32px 24px;">
          <div style="text-align:center;padding:12px 0;">
            <div style="font-size:64px;margin-bottom:6px;">${icon}</div>
            <h2 style="color:#fff;font-size:28px;">${title}</h2>
            <p style="color:#a1a1aa;margin-bottom:16px;">你完成了 ${total} 轮默契挑战</p>

            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;">
              <div style="text-align;padding:16px;background:rgba(255,255,255,0.03);border-radius:16px;text-align:center;">
                <div style="font-size:28px;font-weight:700;color:#ec4899;">${s.score}</div>
                <div style="color:#a1a1aa;font-size:13px;">总分</div>
              </div>
              <div style="text-align;padding:16px;background:rgba(255,255,255,0.03);border-radius:16px;text-align:center;">
                <div style="font-size:28px;font-weight:700;color:#22c55e;">${s.perfectCount}</div>
                <div style="color:#a1a1aa;font-size:13px;">完美默契</div>
              </div>
              <div style="text-align;padding:16px;background:rgba(255,255,255,0.03);border-radius:16px;text-align:center;">
                <div style="font-size:28px;font-weight:700;color:#60a5fa;">${synergyRate}%</div>
                <div style="color:#a1a1aa;font-size:13px;">默契率</div>

    function startDictationPlay() {
      dictationState.isPlaying = true;
      speakDictationWord();
      dictationState.timer = setInterval(() => {
        if (dictationState.currentIndex < dictationState.words.length - 1) {
          dictationState.currentIndex++;
          speakDictationWord();
          renderContent();
        } else {
          clearInterval(dictationState.timer);
        }
      }, 5000);
      renderContent();
    }

    function pauseDictation() {
      dictationState.isPlaying = false;
      if (dictationState.timer) {
        clearInterval(dictationState.timer);
        dictationState.timer = null;
      }
      renderContent();
    }

    function speakDictationWord() {
      const word = dictationState.words[dictationState.currentIndex];
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word.word);
        utterance.lang = 'en-US';
        utterance.rate = dictationState.speechRate || 0.9;
        utterance.pitch = 1;
        window.speechSynthesis.speak(utterance);
      }
    }

    function toggleSpeechRate() {
      dictationState.speechRate = dictationState.speechRate === 0.9 ? 0.5 : 0.9;
      renderContent();
    }

    function toggleFirstLetterHint() {
      dictationState.showFirstLetter = !dictationState.showFirstLetter;
      renderContent();
    }

    function submitDictationAnswer() {
      const input = document.getElementById('dictationInput');
      const answer = input.value.trim().toLowerCase();
      
      if (!answer) {
        alert('请输入单词拼写！');
        return;
      }

      const currentWord = dictationState.words[dictationState.currentIndex];
      dictationState.answers[dictationState.currentIndex] = answer;

      if (answer === currentWord.word.toLowerCase()) {
        dictationState.correctCount++;
      } else {
        dictationState.wrongCount++;
      }

      input.value = '';

      if (dictationState.currentIndex < dictationState.words.length - 1) {
        dictationState.currentIndex++;
        speakDictationWord();
      } else {
        dictationState.isFinished = true;
        if (dictationState.timer) {
          clearInterval(dictationState.timer);
        }
      }

      renderContent();
    }

    function resetDictation() {
      if (dictationState.timer) {
        clearInterval(dictationState.timer);
      }
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
      initDictation();
      renderContent();
    }

    function initAIBattle() {
      aiBattleState = {
        words: [],
        playerCards: [],
        aiCards: [],
        playerScore: 0,
        aiScore: 0,
        playerSelected: null,
        timer: 60,
        gameOver: false,
        gameStarted: false,
      };

      const allWords = vocabularyData[gameLanguage];
      const shuffled = [...allWords].sort(() => Math.random() - 0.5);
      const wordPairs = shuffled.slice(0, 6);

      wordPairs.forEach((w, idx) => {
        aiBattleState.words.push({
          id: idx,
          en: w.word,
          zh: w.translation,
          matched: false,
        });
      });

      // 为玩家创建卡片（英文和中文分开）
      aiBattleState.words.forEach(w => {
        aiBattleState.playerCards.push({ ...w, type: 'en' });
        aiBattleState.playerCards.push({ ...w, type: 'zh' });
      });

      // 为AI创建卡片
      aiBattleState.words.forEach(w => {
        aiBattleState.aiCards.push({ ...w, type: 'en' });
        aiBattleState.aiCards.push({ ...w, type: 'zh' });
      });

      // 打乱卡片顺序
      shuffleCards(aiBattleState.playerCards);
      shuffleCards(aiBattleState.aiCards);
    }

    function shuffleCards(cards) {
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
    }

      let aiZhCards = '';

      aiBattleState.playerCards.forEach((card, idx) => {
        const cellStyle = card.matched ? 'opacity:0.3;pointer-events:none;' : card.playerSelected ? 'border-color:#60a5fa;background:rgba(59,130,246,0.2);cursor:pointer;' : 'cursor:pointer;';
        const displayText = card.matched ? '✓' : (card.type === 'en' ? card.en : card.zh);
        if (card.type === 'en') {
          playerEnCards += `<div class="game-cell" style="${cellStyle}" onclick="handleAIBattleClick(${idx})">${displayText}</div>`;
        } else {
          playerZhCards += `<div class="game-cell" style="${cellStyle}" onclick="handleAIBattleClick(${idx})">${displayText}</div>`;
        }
      });

      aiBattleState.aiCards.forEach((card, idx) => {
        const cellStyle = card.matched ? 'opacity:0.3;pointer-events:none;' : card.aiSelected ? 'border-color:#ef4444;background:rgba(239,68,68,0.2);' : '';
        const displayText = card.matched ? '✓' : (card.type === 'en' ? card.en : card.zh);
        if (card.type === 'en') {
          aiEnCards += `<div class="game-cell" style="${cellStyle};cursor:default;">${displayText}</div>`;
        } else {
          aiZhCards += `<div class="game-cell" style="${cellStyle};cursor:default;">${displayText}</div>`;
        }
      });

      return `
        <button class="back-btn" onclick="backToGameSelect()">← 返回游戏选择</button>
        <div style="display:flex;gap:8px;margin-bottom:16px;justify-content:center;">
          <button class="tab ${gameLanguage === 'en' ? 'active' : ''}" onclick="gameLanguage='en';initAIBattle();renderContent();">英语</button>
          <button class="tab ${gameLanguage === 'ja' ? 'active' : ''}" onclick="gameLanguage='ja';initAIBattle();renderContent();">日语</button>
          <button class="tab ${gameLanguage === 'kr' ? 'active' : ''}" onclick="gameLanguage='kr';initAIBattle();renderContent();">韩语</button>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <div class="stat-card" style="flex:1;text-align:center;"><div class="stat-value" style="color:#60a5fa;">🧑 你: ${aiBattleState.playerScore}</div></div>
          <div class="timer" style="flex:1;text-align:center;">⏱️ ${aiBattleState.timer}秒</div>
          <div class="stat-card" style="flex:1;text-align:center;"><div class="stat-value" style="color:#ef4444;">🤖 AI: ${aiBattleState.aiScore}</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
          <div style="background:rgba(59,130,246,0.1);border:2px solid rgba(59,130,246,0.3);border-radius:16px;padding:16px;">
            <h3 style="color:#60a5fa;text-align:center;margin-bottom:12px;">🧑 你的区域</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              <div>${playerEnCards}</div>
              <div>${playerZhCards}</div>
            </div>
          </div>
          <div style="background:rgba(239,68,68,0.1);border:2px solid rgba(239,68,68,0.3);border-radius:16px;padding:16px;">
            <h3 style="color:#ef4444;text-align:center;margin-bottom:12px;">🤖 AI区域</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              <div>${aiEnCards}</div>
              <div>${aiZhCards}</div>
            </div>
          </div>
        </div>
        <p style="text-align:center;color:#a1a1aa;font-size:13px;margin-top:12px;">点击配对你的英文和中文单词！AI也在同步思考中...</p>
      `;
    }

    function beginAIBattle() {
      aiBattleState.gameStarted = true;
      aiBattleState.timer = 60;
      renderContent();

      const timerInterval = setInterval(() => {
        if (!aiBattleActive || aiBattleState.gameOver) {
          clearInterval(timerInterval);
          return;
        }

        aiBattleState.timer--;

        if (aiBattleState.timer <= 0) {
          aiBattleState.gameOver = true;
          clearInterval(timerInterval);
          
          if (currentUser) {
            const isWin = aiBattleState.playerScore > aiBattleState.aiScore;
            if (isWin) {
              userData.aiBattlesWon++;
            }
            const basePoints = aiBattleState.playerScore * 2;
            const bonusPoints = isWin ? 20 : 0;
            const totalPoints = basePoints + bonusPoints;
            userData.points += totalPoints;
            userData.totalScore += totalPoints;
            aiBattleState.earnedPoints = totalPoints;
            aiBattleState.isWin = isWin;
            addGameProgressToCourses(gameLanguage, isWin ? 2 : 1);
            updateStreakDays();
            checkAchievements();
            saveUserData();
          }
          
          renderContent();
          return;
        }

        // AI思考并配对
        if (!aiBattleState.gameOver) {
          aiTurn();
        }

        renderContent();
      }, 1500);
    }

    function aiTurn() {
      const availableCards = aiBattleState.aiCards.filter(c => !c.matched);
      if (availableCards.length < 2) return;

      const randomIdx1 = Math.floor(Math.random() * availableCards.length);
      let card1 = availableCards[randomIdx1];

      // AI会正确匹配（70%概率）或随机选择（30%概率）
      if (Math.random() < 0.7) {
        // AI选择正确的配对（相同id但不同类型）
        const matchingCard = availableCards.find(c => c.id === card1.id && c.type !== card1.type);
        if (matchingCard) {
          const idx1 = aiBattleState.aiCards.indexOf(card1);
          const idx2 = aiBattleState.aiCards.indexOf(matchingCard);
          
          aiBattleState.aiCards[idx1].aiSelected = true;
          aiBattleState.aiCards[idx2].aiSelected = true;

          setTimeout(() => {
            aiBattleState.aiCards[idx1].matched = true;
            aiBattleState.aiCards[idx2].matched = true;
            aiBattleState.aiCards[idx1].aiSelected = false;
            aiBattleState.aiCards[idx2].aiSelected = false;
            aiBattleState.aiScore++;
            
            renderContent();
          }, 500);
          return;
        }
      }

      // 随机配对
      const remaining = availableCards.filter(c => c !== card1);
      if (remaining.length === 0) return;
      const randomIdx2 = Math.floor(Math.random() * remaining.length);
      let card2 = remaining[randomIdx2];

      const idx1 = aiBattleState.aiCards.indexOf(card1);
      const idx2 = aiBattleState.aiCards.indexOf(card2);

      aiBattleState.aiCards[idx1].aiSelected = true;
      aiBattleState.aiCards[idx2].aiSelected = true;

      setTimeout(() => {
        if (card1.id === card2.id && card1.type !== card2.type) {
          // 配对成功
          aiBattleState.aiCards[idx1].matched = true;
          aiBattleState.aiCards[idx2].matched = true;
          aiBattleState.aiScore++;
        }
        aiBattleState.aiCards[idx1].aiSelected = false;
        aiBattleState.aiCards[idx2].aiSelected = false;
        renderContent();
      }, 800);
    }

    function handleAIBattleClick(index) {
      if (aiBattleState.gameOver || !aiBattleState.gameStarted) return;

      const card = aiBattleState.playerCards[index];

      if (card.matched) return;

      if (card.playerSelected) {
        // 取消选择
        card.playerSelected = false;
        aiBattleState.playerSelected = null;
      } else {
        // 选择卡片
        card.playerSelected = true;

        if (!aiBattleState.playerSelected) {
          // 第一次选择
          aiBattleState.playerSelected = { index, id: card.id, type: card.type };
        } else {
          // 第二次选择，检查配对
          const first = aiBattleState.playerSelected;
          const firstCard = aiBattleState.playerCards[first.index];

          if (first.id === card.id && first.type !== card.type) {
            // 配对成功！
            firstCard.playerSelected = false;
            card.playerSelected = false;
            firstCard.matched = true;
            card.matched = true;
            
            // 同步更新words和AI卡片的状态
            aiBattleState.words[card.id].matched = true;
            
            // 找到AI区域中对应的卡片并标记为已配对
            aiBattleState.aiCards.forEach(aiCard => {
              if (aiCard.id === card.id) {
                aiCard.matched = true;
              }
            });
            
            aiBattleState.playerSelected = null;
            aiBattleState.playerScore++;
          } else {
            // 配对失败
            firstCard.playerSelected = false;
            card.playerSelected = false;
            aiBattleState.playerSelected = null;
          }
        }
      }
      renderContent();
    }

    function startPoisonGame() {
      poisonGameActive = true;
      gameLevel = null;
      initPoisonGame(2, 12);
      renderContent();
    }

    function initPoisonGame(playerCount, cardCount) {
      poisonGameState.playerCount = playerCount;
      poisonGameState.totalCards = cardCount;
      poisonGameState.players = [];
      for (let i = 1; i <= playerCount; i++) {
        poisonGameState.players.push({
          name: i === 1 ? '你' : '🤖 AI对手',
          poisonCount: 0,
          isAI: i !== 1
        });
      }
      poisonGameState.currentPlayerIndex = 0;
      poisonGameState.gameOver = false;
      poisonGameState.waitingForRevive = false;
      poisonGameState.currentPoisonWord = null;
      poisonGameState.aiThinking = false;

      const shuffledPool = shuffleArray([...vocabularyData[gameLanguage]]);
      const selectedWords = shuffledPool.slice(0, cardCount);
      poisonGameState.cards = selectedWords.map((w, idx) => ({
        word: w.word,
        translation: w.translation,
        isPoison: false,
        revealed: false,
        index: idx,
      }));

      const poisonIdx = Math.floor(Math.random() * cardCount);
      poisonGameState.cards[poisonIdx].isPoison = true;
      poisonGameState.poisonIndex = poisonIdx;

      shuffleArray(poisonGameState.cards);
    }

    function isPlayerTurn() {
      return !poisonGameState.players[poisonGameState.currentPlayerIndex].isAI;
    }

    function aiTakeTurn() {
      if (poisonGameState.gameOver || poisonGameState.waitingForRevive) return;
      if (isPlayerTurn()) return;

      poisonGameState.aiThinking = true;
      renderContent();

      const unrevealedIndices = [];
      poisonGameState.cards.forEach((c, idx) => {
        if (!c.revealed) unrevealedIndices.push(idx);
      });

      if (unrevealedIndices.length === 0) return;

      const randomDelay = 800 + Math.random() * 1000;
      setTimeout(() => {
        if (poisonGameState.gameOver || poisonGameState.waitingForRevive) return;

        const randomIdx = unrevealedIndices[Math.floor(Math.random() * unrevealedIndices.length)];
        const card = poisonGameState.cards[randomIdx];
        card.revealed = true;
        poisonGameState.aiThinking = false;

        if (card.isPoison) {
          poisonGameState.waitingForRevive = true;
          poisonGameState.currentPoisonWord = card;
          poisonGameState.players[poisonGameState.currentPlayerIndex].poisonCount++;
          renderContent();

          setTimeout(() => {
            revivePoisonPlayer();
          }, 1500);
        } else {
          nextPoisonPlayer();
          renderContent();

          if (!isPlayerTurn() && !poisonGameState.gameOver) {
            setTimeout(aiTakeTurn, 500);
          }
        }
      }, randomDelay);
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function renderPoisonGame() {
      if (poisonGameState.gameOver) {
        let minPoison = Infinity;
        let winners = [];
        poisonGameState.players.forEach((p, idx) => {
          if (p.poisonCount < minPoison) {
            minPoison = p.poisonCount;
            winners = [idx];
          } else if (p.poisonCount === minPoison) {
            winners.push(idx);
          }
        });
        const winnerNames = winners.map(idx => poisonGameState.players[idx].name).join('、');
        return `
          <button class="back-btn" onclick="backToGameSelect()">← 返回游戏选择</button>
          <div style="text-align:center;padding:40px;">
            <h2 style="color:#fff;font-size:32px;margin-bottom:16px;">🏆 游戏结束</h2>
            <p style="color:#f5d742;font-size:24px;margin-bottom:24px;">🎉 获胜者：${winnerNames}（中毒 ${minPoison} 次）</p>
            <div style="display:flex;justify-content:center;gap:16px;margin-bottom:32px;">
              ${poisonGameState.players.map(p => `
                <div style="background:rgba(30,35,50,0.6);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;min-width:140px;">
                  <div style="color:#fff;font-weight:600;">${p.name}</div>
                  <div style="color:#e07a7a;font-size:28px;font-weight:700;">☠️ ${p.poisonCount}</div>
                  <div style="color:#a1a1aa;font-size:13px;">中毒次数</div>
                </div>
              `).join('')}
            </div>
            <button class="btn btn-primary" onclick="startPoisonGame()" style="padding:14px 40px;font-size:18px;">🔄 再来一局</button>
          </div>
        `;
      }

      return `
        <button class="back-btn" onclick="backToGameSelect()">← 返回游戏选择</button>
        <div style="background:rgba(40,25,60,0.7);border-radius:24px;padding:24px;border:1px solid #b28fcf;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:1px solid #6b4a7e;padding-bottom:12px;">
            <div style="display:flex;gap:12px;">
              ${poisonGameState.players.map((p, idx) => `
                <span style="background:rgba(255,255,255,0.06);padding:6px 16px;border-radius:20px;border:1px solid ${idx === poisonGameState.currentPlayerIndex ? '#e5b0d0' : '#6b4a7e'};font-weight:600;color:${idx === poisonGameState.currentPlayerIndex ? '#e5b0d0' : '#d4c0e0'};font-size:14px;">
                  ${p.name} <span style="color:#e07a7a;margin-left:6px;">☠️ ${p.poisonCount}</span>
                </span>
              `).join('')}
            </div>
            <div style="color:#b8a0c9;font-size:14px;">📖 已翻 <span style="color:#f0e6f5;font-weight:700;">${poisonGameState.cards.filter(c => c.revealed).length}</span> / ${poisonGameState.totalCards}</div>
          </div>
          <div style="display:flex;gap:8px;margin-bottom:16px;">
            <button class="tab ${gameLanguage === 'en' ? 'active' : ''}" onclick="gameLanguage='en';startPoisonGame()">英语</button>
            <button class="tab ${gameLanguage === 'ja' ? 'active' : ''}" onclick="gameLanguage='ja';startPoisonGame()">日语</button>
            <button class="tab ${gameLanguage === 'kr' ? 'active' : ''}" onclick="gameLanguage='kr';startPoisonGame()">韩语</button>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;">
            ${poisonGameState.cards.map((card, idx) => `
              <div onclick="handlePoisonCardClick(${idx})" style="aspect-ratio:3/4;background:#2d1b3d;border-radius:16px;box-shadow:0 8px 20px rgba(0,0,0,0.5);perspective:800px;cursor:${card.revealed ? 'default' : 'pointer'};transition:0.15s;border:1px solid ${card.revealed && card.isPoison ? '#e07a7a' : '#6b4a7e'};" class="poison-card">
                <div style="position:relative;width:100%;height:100%;transition:transform 0.4s;transform-style:preserve-3d;border-radius:16px;${card.revealed ? 'transform:rotateY(180deg);' : ''}">
                  <div style="position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;text-align:center;font-weight:600;background:#1f122b;border:1px solid #8e6ca0;color:#e5d0f0;font-size:14px;">
                    <div style="font-size:32px;margin-bottom:4px;opacity:0.5;">🃏</div>
                    <span style="font-size:12px;opacity:0.5;">点击翻开</span>
                  </div>
                  <div style="position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;text-align:center;transform:rotateY(180deg);background:${card.isPoison ? '#4a1a2a' : '#2d1b3d'};border:1px solid ${card.isPoison ? '#e07a7a' : '#b28fcf'};">
                    <div style="font-size:18px;font-weight:700;color:${card.isPoison ? '#ff9e9e' : '#e5d0f0'};margin-bottom:4px;">${card.word}</div>
                    <div style="font-size:13px;color:#b8a0c9;">${card.translation}</div>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
          <div style="margin-top:16px;text-align:center;color:#e5d0f0;font-size:18px;font-weight:600;">
            ${poisonGameState.aiThinking ? '🤖 AI思考中...' : (isPlayerTurn() ? '🧑 轮到你了！' : '🤖 AI对手回合')}
          </div>
        </div>
        ${poisonGameState.waitingForRevive ? `
          <div style="position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;">
            <div style="background:linear-gradient(145deg,#2d1b3d,#1a1025);max-width:420px;width:90%;padding:30px 24px;border-radius:24px;text-align:center;border:2px solid #b28fcf;">
              <div style="font-size:72px;margin-bottom:6px;">💀</div>
              <h2 style="color:${isPlayerTurn() ? '#ff9e9e' : '#fbbf24'};font-size:28px;margin-bottom:8px;">
                ${isPlayerTurn() ? 'OMG，你中毒了！' : 'AI对手中毒了！'}
              </h2>
              <p style="color:#b8a0c9;margin-bottom:12px;">
                ${isPlayerTurn() ? '朗读这个单词复活：' : 'AI正在复活中...'}
              </p>
              <div style="background:#1f122b;padding:16px;border-radius:16px;margin-bottom:20px;border:1px solid #8e6ca0;">
                <div style="font-size:28px;font-weight:700;color:#f0e6f5;">${poisonGameState.currentPoisonWord?.word}</div>
                <div style="font-size:18px;color:#b8a0c9;">${poisonGameState.currentPoisonWord?.translation}</div>
              </div>
              ${isPlayerTurn() ? `
                <button onclick="revivePoisonPlayer()" style="width:100%;background:linear-gradient(135deg,#6b4a7e,#b45f8a);border:none;padding:14px;border-radius:30px;font-size:20px;font-weight:700;color:white;cursor:pointer;">🔊 我已朗读，复活！</button>
                <p style="color:#b8a0c9;font-size:14px;margin-top:12px;">🎤 大声读出来，然后点击按钮</p>
              ` : `
                <div style="display:flex;justify-content:center;gap:4px;">
                  <div style="width:10px;height:10px;background:#fbbf24;border-radius:50%;animation:bounce 0.6s infinite alternate;"></div>
                  <div style="width:10px;height:10px;background:#fbbf24;border-radius:50%;animation:bounce 0.6s infinite alternate 0.2s;"></div>
                  <div style="width:10px;height:10px;background:#fbbf24;border-radius:50%;animation:bounce 0.6s infinite alternate 0.4s;"></div>
                </div>
              `}
            </div>
          </div>
        ` : ''}
      `;
    }

    function handlePoisonCardClick(index) {
      if (poisonGameState.gameOver || poisonGameState.waitingForRevive || poisonGameState.aiThinking) return;
      if (!isPlayerTurn()) return;
      const card = poisonGameState.cards[index];
      if (card.revealed) return;

      card.revealed = true;

      if (card.isPoison) {
        poisonGameState.waitingForRevive = true;
        poisonGameState.currentPoisonWord = card;
        poisonGameState.players[poisonGameState.currentPlayerIndex].poisonCount++;
        renderContent();
        return;
      }

      nextPoisonPlayer();
      renderContent();

      if (!isPlayerTurn() && !poisonGameState.gameOver) {
        setTimeout(aiTakeTurn, 600);
      }
    }

    function revivePoisonPlayer() {
      poisonGameState.waitingForRevive = false;
      poisonGameState.currentPoisonWord = null;
      nextPoisonPlayer();
      renderContent();

      if (!isPlayerTurn() && !poisonGameState.gameOver) {
        setTimeout(aiTakeTurn, 600);
      }
    }

      const totalCourses = courses.length;
      const totalLessons = courses.reduce((sum, c) => sum + c.lessons, 0);
      const completedLessons = userData.lessonsCompleted.length;

            <span>学习进度</span>

    function getWordsByLang(lang) {
      const allWords = vocabularyData[lang] || [];
      const learnedIds = userData.wordsLearned && userData.wordsLearned[lang] ? userData.wordsLearned[lang] : [];
      const favoriteIds = userData.favoriteWords && userData.favoriteWords[lang] ? userData.favoriteWords[lang] : [];
      return allWords.map(w => ({
        ...w,
        learned: learnedIds.includes(w.id),
        favorite: favoriteIds.includes(w.id),
        mastered: userData.masteredWords && userData.masteredWords[lang] && userData.masteredWords[lang].includes(w.id)
      }));
    }

    function toggleWordFavorite(lang, wordId) {
      if (!userData.favoriteWords) userData.favoriteWords = {};
      if (!userData.favoriteWords[lang]) userData.favoriteWords[lang] = [];
      const idx = userData.favoriteWords[lang].indexOf(wordId);
      if (idx > -1) {
        userData.favoriteWords[lang].splice(idx, 1);
      } else {
        userData.favoriteWords[lang].push(wordId);
      }
      saveUserData();
      renderContent();
    }

    function toggleWordMastered(lang, wordId) {
      if (!userData.masteredWords) userData.masteredWords = {};
      if (!userData.masteredWords[lang]) userData.masteredWords[lang] = [];
      const idx = userData.masteredWords[lang].indexOf(wordId);
      if (idx > -1) {
        userData.masteredWords[lang].splice(idx, 1);
      } else {
        userData.masteredWords[lang].push(wordId);
      }
      saveUserData();
      renderContent();
    }

    function startVocabReview(lang, type) {
      const words = getWordsByLang(lang);
      let reviewList = [];
      if (type === 'learned') {
        reviewList = words.filter(w => w.learned && !w.mastered);
      } else if (type === 'favorite') {
        reviewList = words.filter(w => w.favorite);
      } else if (type === 'mastered') {
        reviewList = words.filter(w => w.mastered);
      }
      if (reviewList.length === 0) {
        alert('该分类下没有单词哦，先去学习一些单词吧！');
        return;
      }
      for (let i = reviewList.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [reviewList[i], reviewList[j]] = [reviewList[j], reviewList[i]];
      }
      vocabReviewWords = reviewList;
      vocabReviewIndex = 0;
      vocabCardFlipped = false;
      vocabReviewMode = true;
      renderContent();
    }

    function exitVocabReview() {
      vocabReviewMode = false;
      vocabReviewWords = [];
      vocabReviewIndex = 0;
      vocabCardFlipped = false;
      renderContent();
    }

    function nextReviewCard() {
      vocabCardFlipped = false;
      if (vocabReviewIndex < vocabReviewWords.length - 1) {
        vocabReviewIndex++;
      } else {
        alert('🎉 复习完成！你已经复习完所有单词了！');
        exitVocabReview();
        return;

    }

      if (vocabReviewIndex > 0) {
        vocabReviewIndex--;
      }
      renderContent();
    }

    function flipReviewCard() {
      vocabCardFlipped = !vocabCardFlipped;
      renderContent();
    }

    function renderVocabulary() {
      const langNames = { en: '英语', ja: '日语', kr: '韩语' };
      const langEmojis = { en: '🇬🇧', ja: '🇯🇵', kr: '🇰🇷' };
      const words = getWordsByLang(vocabLangTab);
      const learnedWords = words.filter(w => w.learned);
      const favoriteWords = words.filter(w => w.favorite);
      const masteredWords = words.filter(w => w.mastered);
      
      let displayWords = [];
      if (vocabTab === 'learned') {
        displayWords = learnedWords;
      } else if (vocabTab === 'favorite') {
        displayWords = favoriteWords;
      } else if (vocabTab === 'mastered') {
        displayWords = masteredWords;
      }

      if (vocabReviewMode && vocabReviewWords.length > 0) {
        const currentWord = vocabReviewWords[vocabReviewIndex];
        return `
          <div style="max-width:600px;margin:0 auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
              <button onclick="exitVocabReview()" style="padding:10px 20px;border-radius:10px;background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-size:14px;">← 返回词汇本</button>
              <span style="color:#a1a1aa;font-size:14px;">${vocabReviewIndex + 1} / ${vocabReviewWords.length}</span>
            </div>
            
            <div style="background:linear-gradient(135deg,rgba(167,139,250,0.1),rgba(236,72,153,0.05));border:1px solid rgba(167,139,250,0.2);border-radius:24px;padding:40px;margin-bottom:24px;min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;perspective:1000px;" onclick="flipReviewCard()">
              <div style="text-align:center;transform-style:preserve-3d;transition:transform 0.6s;transform:${vocabCardFlipped ? 'rotateY(180deg)' : 'rotateY(0)'};">
                <div style="backface-visibility:hidden;">
                  <div style="font-size:48px;margin-bottom:16px;">${langEmojis[vocabLangTab]}</div>
                  <div style="font-size:36px;font-weight:700;color:#fff;margin-bottom:12px;">${currentWord.word}</div>
                  <div style="color:rgba(255,255,255,0.5);font-size:14px;">👆 点击卡片查看释义</div>
                </div>
                <div style="backface-visibility:hidden;transform:rotateY(180deg);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotateY(180deg);width:100%;">
                  <div style="font-size:24px;color:#a78bfa;margin-bottom:8px;">✨ 释义</div>
                  <div style="font-size:32px;font-weight:700;color:#fff;">${currentWord.translation}</div>
                </div>
              </div>
            </div>
            
            <div style="display:flex;gap:12px;justify-content:center;">
              <button onclick="prevReviewCard()" ${vocabReviewIndex === 0 ? 'disabled' : ''} style="padding:14px 28px;border-radius:12px;background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-size:15px;font-weight:500;${vocabReviewIndex === 0 ? 'opacity:0.4;cursor:not-allowed;' : ''}">← 上一个</button>
              <button onclick="toggleWordMastered('${vocabLangTab}', ${currentWord.id})" style="padding:14px 28px;border-radius:12px;background:linear-gradient(135deg,rgba(34,197,94,0.2),rgba(52,211,153,0.1));color:#22c55e;border:1px solid rgba(34,197,94,0.3);cursor:pointer;font-size:15px;font-weight:500;">
                ${currentWord.mastered ? '取消掌握' : '✅ 已掌握'}

              <button onclick="nextReviewCard()" style="padding:14px 28px;border-radius:12px;background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;border:none;cursor:pointer;font-size:15px;font-weight:500;">下一个 →</button>

      return `

                  ${tab.icon} ${tab.name}

              `).join('')}
            </div>
            <button onclick="startVocabReview('${vocabLangTab}', '${vocabTab}')" style="padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:500;">

          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;">
            ${displayWords.length === 0 ? `
              <div style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,0.4);">

                    <button onclick="event.stopPropagation();toggleWordFavorite('${vocabLangTab}', ${w.id})" style="background:none;border:none;cursor:pointer;font-size:16px;padding:2px;">${w.favorite ? '⭐' : '☆'}</button>

    function backToCommunity() {
      currentPostDetailActive = false;
      currentPostId = null;
      renderContent();
    }

    function likePost(postId) {
      const post = communityPosts.find(p => p.id === postId);
      if (post) {
        post.likes++;
        playSound('success');
        renderContent();
      }
    }

    function togglePostFavorite(postId) {
      const post = communityPosts.find(p => p.id === postId);
      if (post) {
        post.favorited = !post.favorited;
        playSound(post.favorited ? 'success' : 'click');
        renderContent();
      }
    }

    function toggleReaction(postId, reactionType) {
      const post = communityPosts.find(p => p.id === postId);
      if (post) {
        if (!post.reactions) post.reactions = { confused: 0, learned: 0, funny: 0 };
        post.reactions[reactionType] = (post.reactions[reactionType] || 0) + 1;
        playSound('click');
        renderContent();
      }
    }

    function addComment(postId) {
      const contentEl = document.getElementById('commentContent');
      const content = contentEl.value.trim();
      if (!content) {
        alert('请输入评论内容');
        return;
      }
      const post = communityPosts.find(p => p.id === postId);
      if (post) {
        const newComment = {
          id: Date.now(),
          author: currentUser ? currentUser.username : '游客',
          avatar: userData.avatar || (currentUser ? '🧑‍🎓' : '👤'),
          title: userData.title || 'title_1',
          avatarFrame: userData.avatarFrame || 'frame_0',
          content: content,
          time: '刚刚',
          likes: 0
        };
        post.comments.push(newComment);
        post.replies++;
        contentEl.value = '';
        renderContent();
      }
    }

    function createTicket() {
      const contentEl = document.getElementById('newTicketContent');
      const typeEl = document.getElementById('newTicketType');
      const content = contentEl.value.trim();
      if (!content) {
        alert('请描述你的问题或建议');
        return;
      }
      const newTicket = {
        id: Date.now(),
        author: currentUser ? currentUser.username : '游客',
        content: content,
        type: typeEl.value,
        status: '待处理',
        time: '刚刚',
        replies: 0
      };
      communityTickets.unshift(newTicket);
      contentEl.value = '';
      alert('工单提交成功，我们会尽快处理！');
      renderContent();
    }

    function getRecommendations() {
      const wordsLearned = userData.wordsLearned ? userData.wordsLearned.length : 0;
      const studyMinutes = userData.studyMinutes || 0;
      const streak = userData.streakDays || 0;
      const targetLang = userData.targetLanguage || '英语';
      const synergyCount = userData.synergyCount || 0;
      const bombWins = userData.bombWins || 0;

      let level = '入门';
      let levelDesc = '刚开始学习，打好基础最重要';
      if (wordsLearned >= 500) { level = '高级'; levelDesc = '词汇量丰富，可以挑战高难度内容'; }
      else if (wordsLearned >= 200) { level = '中级'; levelDesc = '有一定基础，可以提升综合能力'; }
      else if (wordsLearned >= 50) { level = '初级'; levelDesc = '已入门，继续扩大词汇量'; }

      const recCourses = [];
      if (targetLang === '英语') {
        if (level === '入门') {
          recCourses.push({ id: 'en-beginner-1', name: '英语入门', level: 'A1', icon: '🌱', reason: '零基础入门，从最基础开始' });
          recCourses.push({ id: 'en-daily-1', name: '日常生活', level: 'A1', icon: '🏠', reason: '学习日常词汇，快速上手' });
        } else if (level === '初级') {
          recCourses.push({ id: 'en-grammar-1', name: '基础语法', level: 'A2', icon: '📖', reason: '巩固语法基础，提升造句能力' });
          recCourses.push({ id: 'en-travel-1', name: '旅游英语', level: 'A2', icon: '✈️', reason: '实用场景对话，学以致用' });
        } else if (level === '中级') {
          recCourses.push({ id: 'en-speaking-1', name: '交际口语', level: 'B1', icon: '💬', reason: '提升口语表达，流畅交流' });
          recCourses.push({ id: 'en-business-1', name: '商务英语', level: 'B1', icon: '💼', reason: '职场英语，提升竞争力' });
        } else {
          recCourses.push({ id: 'en-advanced-1', name: '高级阅读', level: 'B2', icon: '📚', reason: '深度阅读，拓展知识面' });
          recCourses.push({ id: 'en-ielts-1', name: '雅思进阶', level: 'B2', icon: '🎯', reason: '冲刺高分，突破瓶颈' });
        }
      } else if (targetLang === '日语') {
        if (level === '入门' || level === '初级') {
          recCourses.push({ id: 'jp-beginner-1', name: '日语入门', level: 'A1', icon: '🌸', reason: '五十音入门，打好基础' });
          recCourses.push({ id: 'jp-n5-1', name: 'N5考级冲刺', level: 'A1', icon: '📝', reason: '备考N5，系统复习' });
        } else {
          recCourses.push({ id: 'jp-n4-1', name: 'N4进阶课程', level: 'A2', icon: '🎌', reason: '进阶学习，冲击N4' });
          recCourses.push({ id: 'jp-n3-1', name: 'N3中级课程', level: 'B1', icon: '🏯', reason: '中级提升，挑战N3' });
        }
      } else {
        if (level === '入门' || level === '初级') {
          recCourses.push({ id: 'kr-beginner-1', name: '韩语入门', level: 'A1', icon: '💜', reason: '韩语发音入门' });
          recCourses.push({ id: 'kr-beginner-2', name: '韩语初级', level: 'A1', icon: '🎵', reason: '基础语法和词汇' });
        } else {
          recCourses.push({ id: 'kr-intermediate-1', name: '韩语中级', level: 'B1', icon: '🎬', reason: '中级语法提升' });
        }
      }

      const recGames = [];
      if (wordsLearned < 50) {
        recGames.push({ name: '单词连连看', icon: '🎮', reason: '轻松有趣，快速记忆单词' });
        recGames.push({ name: '女巫毒药', icon: '🧙', reason: '单词拼写练习，边玩边学' });
      } else if (wordsLearned < 200) {
        recGames.push({ name: '词语炸弹', icon: '💣', reason: '限时挑战，巩固词汇反应' });
        recGames.push({ name: '英语听写', icon: '🎧', reason: '听力训练，提升辨音能力' });
      } else {
        recGames.push({ name: '默契搭档', icon: '🤝', reason: `已有${synergyCount}次默契，继续挑战更高默契` });
        recGames.push({ name: 'AI对战', icon: '🤖', reason: `已战胜AI ${bombWins} 次，挑战更高难度` });
      }

      const weakPoints = [];
      if (studyMinutes < 30) {
        weakPoints.push({ icon: '⏰', title: '学习时长不足', desc: '建议每天至少学习30分钟', tip: '可以从短时间开始，逐步增加' });
      }
      if (streak < 3) {
        weakPoints.push({ icon: '🔥', title: '连续学习待加强', desc: `当前连续${streak}天，建议保持连续学习`, tip: '每天学习一点点，习惯成自然' });
      }
      if (wordsLearned < 100) {
        weakPoints.push({ icon: '📝', title: '词汇量需提升', desc: `已掌握${wordsLearned}个单词，继续加油`, tip: '每天学习10个新单词，坚持就是胜利' });
      }
      if (weakPoints.length === 0) {
        weakPoints.push({ icon: '🌟', title: '表现优秀！', desc: '各项指标都很棒，继续保持', tip: '可以尝试更高难度的内容' });
      }

      const dailyTasks = [
        { icon: '📖', title: '学习5个新单词', desc: '词汇积累，积少成多', done: wordsLearned > 0, reward: '+10积分' },
        { icon: '🎧', title: '完成1组听写', desc: '听力练习，磨耳朵', done: false, reward: '+15积分' },
        { icon: '🎮', title: '玩1局游戏', desc: '游戏化学习，趣味十足', done: false, reward: '+10积分' },
        { icon: '💬', title: '社区互动', desc: '发帖或评论，交流学习心得', done: false, reward: '+5积分' },
      ];

      return { level, levelDesc, recCourses, recGames, weakPoints, dailyTasks, wordsLearned, studyMinutes, streak };
    }

    function buyTitle(titleId) {
      const title = TITLES.find(t => t.id === titleId);
      if (!title) return;
      if (userData.points < title.price) {
        alert('积分不足，继续学习赚取更多积分吧！');
        return;
      }
      if (!confirm(`确定花费 ${title.price} 积分购买「${title.name}」称号吗？`)) return;
      userData.points -= title.price;
      if (!userData.ownedTitles) userData.ownedTitles = ['title_1'];
      userData.ownedTitles.push(titleId);
      userData.title = titleId;
      saveUserData();
      alert(`购买成功！已获得「${title.name}」称号`);
      renderContent();
    }

    function equipTitle(titleId) {
      userData.title = titleId;

    function buyFrameBlindBox() {
      const price = 888;
      if (userData.points < price) {
        alert('积分不足，继续学习赚取更多积分吧！');
        return;
      }
      if (!confirm(`确定花费 ${price} 积分购买头像框盲盒吗？`)) return;
      
      userData.points -= price;
      
      const pool = [
        { id: 'frame_1', weight: 22 },
        { id: 'frame_2', weight: 18 },
        { id: 'frame_3', weight: 14 },
        { id: 'frame_4', weight: 10 },
        { id: 'frame_5', weight: 8 },
        { id: 'frame_8', weight: 8 },
        { id: 'frame_9', weight: 6 },
        { id: 'frame_13', weight: 5 },
        { id: 'frame_6', weight: 3 },
        { id: 'frame_10', weight: 2 },
        { id: 'frame_11', weight: 1.5 },
        { id: 'frame_7', weight: 1 },
        { id: 'frame_12', weight: 1 },
        { id: 'frame_14', weight: 0.4 },
        { id: 'frame_15', weight: 0.1 },
      ];
      
      const totalWeight = pool.reduce((sum, item) => sum + item.weight, 0);
      let random = Math.random() * totalWeight;
      let selectedId = 'frame_1';
      for (const item of pool) {
        random -= item.weight;
        if (random <= 0) {
          selectedId = item.id;
          break;
        }
      }
      
      const frame = AVATAR_FRAMES.find(f => f.id === selectedId);
      const alreadyOwned = userData.ownedFrames && userData.ownedFrames.includes(selectedId);
      
      if (!alreadyOwned) {
        if (!userData.ownedFrames) userData.ownedFrames = ['frame_0'];
        userData.ownedFrames.push(selectedId);
      } else {
        const refund = Math.floor(frame.price * 0.5);
        userData.points += refund;
      }
      
      userData.avatarFrame = selectedId;
      saveUserData();
      
      showBlindBoxResult(frame, alreadyOwned);
    }
