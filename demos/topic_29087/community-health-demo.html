<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基于AI大模型的社区健康管理系统 - 交互Demo</title>
  <style>
    @font-face { font-family: 'WorkSans'; src: url('./_shared/fonts/WorkSans-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'WorkSans'; src: url('./_shared/fonts/WorkSans-Bold.ttf') format('truetype'); font-weight: 700; }
  </style>
  <style>
    :root {
      --bg: #f0fdfa; --bg2: #ffffff; --ink: #134e4a; --muted: #5f8a87;
      --rule: #ccfbf1; --accent: #0d9488; --accent2: #f97316;
      --danger: #ef4444; --warning: #eab308; --success: #22c55e;
      --font: 'WorkSans', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;
      --sidebar-w: 220px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font); color: var(--ink); background: var(--bg); font-size: 14px; line-height: 1.6; }
    button { cursor: pointer; font-family: var(--font); }
    input, select, textarea { font-family: var(--font); }

    /* ===== LOGIN PAGE ===== */
    .login-page {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #134e4a 0%, #0d9488 50%, #0f766e 100%);
    }
    .login-page.hidden { display: none; }
    .login-card {
      background: var(--bg2); border-radius: 16px; padding: 2.5rem 2rem;
      width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .login-card h1 { text-align: center; font-size: 1.4rem; color: var(--accent); margin-bottom: 0.3rem; }
    .login-card .subtitle { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--ink); margin-bottom: 0.3rem; }
    .form-group input, .form-group select {
      width: 100%; padding: 0.6rem 0.8rem; border: 1px solid var(--rule);
      border-radius: 8px; font-size: 0.9rem; color: var(--ink);
      background: var(--bg); outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%; padding: 0.7rem; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #0f766e; }
    .login-hint { text-align: center; margin-top: 1rem; font-size: 0.78rem; color: var(--muted); }
    .login-hint code { background: var(--bg); padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.75rem; }

    /* ===== APP LAYOUT ===== */
    .app { display: none; height: 100vh; }
    .app.active { display: flex; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w); background: linear-gradient(180deg, #134e4a, #0f766e);
      color: #fff; display: flex; flex-direction: column; flex-shrink: 0;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
    }
    .sidebar-logo {
      padding: 1.2rem 1rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar-logo h2 { font-size: 1rem; font-weight: 700; }
    .sidebar-logo p { font-size: 0.7rem; opacity: 0.7; margin-top: 0.2rem; }
    .sidebar-nav { flex: 1; padding: 0.8rem 0; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.65rem 1.2rem; color: rgba(255,255,255,0.75);
      font-size: 0.85rem; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent;
    }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.12); color: #fff; border-left-color: var(--accent2); }
    .nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }
    .sidebar-user {
      padding: 1rem; border-top: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; gap: 0.6rem; font-size: 0.8rem;
    }
    .sidebar-user .avatar {
      width: 36px; height: 36px; border-radius: 50%; background: var(--accent2);
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem;
    }
    .sidebar-user .info { flex: 1; }
    .sidebar-user .info .name { font-weight: 600; }
    .sidebar-user .info .role { font-size: 0.7rem; opacity: 0.7; }
    .btn-logout {
      background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.7);
      padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.75rem; cursor: pointer;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.2); color: #fff; }

    /* Main area */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      background: var(--bg2); padding: 0.8rem 1.5rem; border-bottom: 1px solid var(--rule);
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar h3 { font-size: 1.1rem; font-weight: 700; }
    .topbar .breadcrumb { font-size: 0.8rem; color: var(--muted); }
    .content { flex: 1; overflow-y: auto; padding: 1.5rem; background: var(--bg); }

    /* ===== PAGE: Dashboard ===== */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card {
      background: var(--bg2); border-radius: 12px; padding: 1.2rem;
      border: 1px solid var(--rule); display: flex; align-items: center; gap: 1rem;
    }
    .stat-card .stat-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
    }
    .stat-card .stat-info .num { font-size: 1.6rem; font-weight: 700; line-height: 1.2; }
    .stat-card .stat-info .label { font-size: 0.78rem; color: var(--muted); }
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .chart-box {
      background: var(--bg2); border-radius: 12px; padding: 1rem;
      border: 1px solid var(--rule);
    }
    .chart-box h4 { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; }
    .quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .action-card {
      background: var(--bg2); border-radius: 12px; padding: 1.2rem;
      border: 1px solid var(--rule); cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .action-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(13,148,136,0.1); transform: translateY(-2px); }
    .action-card .action-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .action-card h4 { font-size: 0.9rem; margin-bottom: 0.3rem; }
    .action-card p { font-size: 0.78rem; color: var(--muted); }

    /* ===== PAGE: Health Records ===== */
    .profile-card {
      background: var(--bg2); border-radius: 12px; padding: 1.5rem;
      border: 1px solid var(--rule); margin-bottom: 1.5rem;
      display: flex; gap: 1.5rem; align-items: flex-start;
    }
    .profile-card .avatar-lg {
      width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #0f766e);
      display: flex; align-items: center; justify-content: center; color: #fff;
      font-size: 2rem; font-weight: 700; flex-shrink: 0;
    }
    .profile-card .info { flex: 1; }
    .profile-card .info h3 { font-size: 1.2rem; margin-bottom: 0.3rem; }
    .profile-card .tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .tag {
      display: inline-block; padding: 0.2rem 0.6rem; border-radius: 6px;
      font-size: 0.75rem; font-weight: 600;
    }
    .tag-blue { background: #dbeafe; color: #1d4ed8; }
    .tag-red { background: #fee2e2; color: #dc2626; }
    .tag-green { background: #dcfce7; color: #16a34a; }
    .tag-orange { background: #ffedd5; color: #ea580c; }
    .tag-purple { background: #f3e8ff; color: #7c3aed; }
    .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .info-item {
      background: var(--bg2); border-radius: 10px; padding: 1rem;
      border: 1px solid var(--rule);
    }
    .info-item .label { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.3rem; }
    .info-item .value { font-size: 1.05rem; font-weight: 700; }

    /* ===== PAGE: AI Chat ===== */
    .chat-container {
      display: flex; flex-direction: column; height: calc(100vh - 180px);
      background: var(--bg2); border-radius: 12px; border: 1px solid var(--rule); overflow: hidden;
    }
    .chat-header {
      padding: 0.8rem 1.2rem; background: linear-gradient(135deg, var(--accent), #0f766e);
      color: #fff; display: flex; align-items: center; gap: 0.8rem;
    }
    .chat-header .ai-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
    }
    .chat-header h4 { font-size: 0.95rem; }
    .chat-header p { font-size: 0.75rem; opacity: 0.8; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; }
    .msg { display: flex; gap: 0.8rem; margin-bottom: 1rem; }
    .msg.user { flex-direction: row-reverse; }
    .msg .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700;
    }
    .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--accent), #0f766e); color: #fff; }
    .msg.user .msg-avatar { background: var(--accent2); color: #fff; }
    .msg .msg-bubble {
      max-width: 70%; padding: 0.8rem 1rem; border-radius: 12px; font-size: 0.9rem; line-height: 1.6;
    }
    .msg.ai .msg-bubble { background: var(--bg); border: 1px solid var(--rule); border-top-left-radius: 4px; }
    .msg.user .msg-bubble { background: var(--accent); color: #fff; border-top-right-radius: 4px; }
    .msg .msg-time { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; }
    .msg.user .msg-time { text-align: right; }
    .typing-indicator { display: flex; gap: 4px; padding: 0.5rem 0; }
    .typing-indicator span {
      width: 8px; height: 8px; background: var(--muted); border-radius: 50%;
      animation: typing 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }
    .chat-input {
      padding: 1rem; border-top: 1px solid var(--rule);
      display: flex; gap: 0.8rem; align-items: flex-end;
    }
    .chat-input textarea {
      flex: 1; resize: none; border: 1px solid var(--rule); border-radius: 10px;
      padding: 0.6rem 1rem; font-size: 0.9rem; min-height: 42px; max-height: 100px;
      outline: none; background: var(--bg);
    }
    .chat-input textarea:focus { border-color: var(--accent); }
    .chat-input button {
      padding: 0.6rem 1.2rem; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600;
      white-space: nowrap;
    }
    .chat-input button:hover { background: #0f766e; }
    .chat-input button:disabled { background: var(--muted); cursor: not-allowed; }
    .quick-questions { padding: 0.5rem 1rem 0; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .quick-q {
      padding: 0.3rem 0.7rem; background: var(--bg); border: 1px solid var(--rule);
      border-radius: 20px; font-size: 0.78rem; color: var(--accent); cursor: pointer;
      transition: all 0.2s;
    }
    .quick-q:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ===== PAGE: Risk Assessment ===== */
    .assessment-form {
      background: var(--bg2); border-radius: 12px; padding: 1.5rem;
      border: 1px solid var(--rule); margin-bottom: 1.5rem;
    }
    .assessment-form h4 { font-size: 1rem; margin-bottom: 1rem; }
    .form-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1rem; }
    .form-row .form-group { margin-bottom: 0; }
    .btn-assess {
      padding: 0.6rem 1.5rem; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
    }
    .btn-assess:hover { background: #0f766e; }
    .result-card {
      background: var(--bg2); border-radius: 12px; padding: 1.5rem;
      border: 1px solid var(--rule); display: none;
    }
    .result-card.show { display: block; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .result-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .risk-badge {
      padding: 0.4rem 1rem; border-radius: 8px; font-size: 0.9rem; font-weight: 700; color: #fff;
    }
    .risk-low { background: var(--success); }
    .risk-medium { background: var(--warning); }
    .risk-high { background: var(--danger); }
    .result-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1rem; }
    .result-detail-item { text-align: center; padding: 1rem; background: var(--bg); border-radius: 10px; }
    .result-detail-item .num { font-size: 1.5rem; font-weight: 700; }
    .result-detail-item .label { font-size: 0.78rem; color: var(--muted); }
    .suggestion-box {
      background: var(--bg); border-radius: 10px; padding: 1rem;
      border-left: 4px solid var(--accent);
    }
    .suggestion-box h4 { font-size: 0.9rem; margin-bottom: 0.5rem; color: var(--accent); }
    .suggestion-box ul { padding-left: 1.2rem; }
    .suggestion-box li { font-size: 0.85rem; margin-bottom: 0.3rem; color: var(--ink); }

    /* ===== PAGE: Appointments ===== */
    .appointments-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .appointment-card {
      background: var(--bg2); border-radius: 12px; padding: 1rem 1.2rem;
      border: 1px solid var(--rule); display: flex; align-items: center; gap: 1rem;
    }
    .appointment-card .date-box {
      text-align: center; padding: 0.6rem; background: var(--bg); border-radius: 10px; min-width: 60px;
    }
    .appointment-card .date-box .day { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .appointment-card .date-box .month { font-size: 0.7rem; color: var(--muted); }
    .appointment-card .appt-info { flex: 1; }
    .appointment-card .appt-info h4 { font-size: 0.95rem; margin-bottom: 0.2rem; }
    .appointment-card .appt-info p { font-size: 0.8rem; color: var(--muted); }
    .status-badge {
      padding: 0.25rem 0.7rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600;
    }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-confirmed { background: #dbeafe; color: #1d4ed8; }
    .status-completed { background: #dcfce7; color: #16a34a; }
    .status-cancelled { background: #fee2e2; color: #dc2626; }

    /* ===== PAGE: High Risk ===== */
    .alert-banner {
      background: linear-gradient(135deg, #fef2f2, #fee2e2); border: 1px solid #fecaca;
      border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .alert-banner .alert-icon { font-size: 1.5rem; }
    .alert-banner h4 { color: var(--danger); font-size: 0.95rem; }
    .alert-banner p { font-size: 0.82rem; color: #991b1b; }
    .patient-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .patient-row {
      background: var(--bg2); border-radius: 10px; padding: 0.8rem 1rem;
      border: 1px solid var(--rule); display: flex; align-items: center; gap: 1rem;
    }
    .patient-row .p-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: #fee2e2;
      display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--danger);
    }
    .patient-row .p-info { flex: 1; }
    .patient-row .p-info h4 { font-size: 0.9rem; }
    .patient-row .p-info p { font-size: 0.78rem; color: var(--muted); }
    .btn-sm {
      padding: 0.35rem 0.8rem; border: none; border-radius: 6px;
      font-size: 0.78rem; font-weight: 600; cursor: pointer;
    }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: #0f766e; }
    .btn-outline { background: transparent; border: 1px solid var(--rule); color: var(--ink); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* ===== PAGE: Reminders ===== */
    .reminder-card {
      background: var(--bg2); border-radius: 12px; padding: 1rem 1.2rem;
      border: 1px solid var(--rule); display: flex; align-items: center; gap: 1rem;
      margin-bottom: 0.6rem;
    }
    .reminder-card .r-icon {
      width: 42px; height: 42px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
    }
    .reminder-card .r-info { flex: 1; }
    .reminder-card .r-info h4 { font-size: 0.9rem; }
    .reminder-card .r-info p { font-size: 0.78rem; color: var(--muted); }
    .reminder-card .r-time { font-size: 0.78rem; color: var(--muted); text-align: right; }

    /* ===== PAGE: Health Knowledge ===== */
    .knowledge-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .knowledge-card {
      background: var(--bg2); border-radius: 12px; padding: 1.2rem;
      border: 1px solid var(--rule); cursor: pointer; transition: all 0.2s;
    }
    .knowledge-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(13,148,136,0.1); }
    .knowledge-card .k-tag { font-size: 0.7rem; color: var(--accent); font-weight: 600; margin-bottom: 0.5rem; }
    .knowledge-card h4 { font-size: 0.95rem; margin-bottom: 0.3rem; }
    .knowledge-card p { font-size: 0.82rem; color: var(--muted); }

    /* ===== PAGE: Doctor AI ===== */
    .doctor-ai-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .doctor-ai-card {
      background: var(--bg2); border-radius: 12px; padding: 1.5rem;
      border: 1px solid var(--rule); cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .doctor-ai-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(13,148,136,0.1); }
    .doctor-ai-card .d-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .doctor-ai-card h4 { font-size: 1rem; margin-bottom: 0.3rem; }
    .doctor-ai-card p { font-size: 0.82rem; color: var(--muted); }

    /* ===== PAGE: Users (Admin) ===== */
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .data-table thead { background: var(--accent); color: #fff; }
    .data-table th, .data-table td { padding: 0.7rem 1rem; text-align: left; border-bottom: 1px solid var(--rule); }
    .data-table tbody tr:hover { background: #f0fdfa; }

    /* ===== Modal ===== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--bg2); border-radius: 16px; padding: 2rem;
      width: 480px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: fadeIn 0.3s ease;
    }
    .modal h3 { font-size: 1.1rem; margin-bottom: 1rem; }
    .modal .modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; margin-top: 1.5rem; }
    .btn-cancel { padding: 0.5rem 1rem; background: var(--bg); border: 1px solid var(--rule); border-radius: 8px; color: var(--ink); font-size: 0.85rem; }
    .btn-confirm { padding: 0.5rem 1rem; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: 0.85rem; font-weight: 600; }

    /* ===== Toast ===== */
    .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 2000; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast {
      background: var(--bg2); border: 1px solid var(--rule); border-radius: 10px;
      padding: 0.8rem 1.2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex; align-items: center; gap: 0.6rem; font-size: 0.85rem;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.warning { border-left: 4px solid var(--warning); }
    .toast.error { border-left: 4px solid var(--danger); }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-grid { grid-template-columns: 1fr; }
      .quick-actions { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .info-grid { grid-template-columns: 1fr; }
      .result-details { grid-template-columns: 1fr; }
      .knowledge-grid { grid-template-columns: 1fr; }
      .doctor-ai-grid { grid-template-columns: 1fr; }
