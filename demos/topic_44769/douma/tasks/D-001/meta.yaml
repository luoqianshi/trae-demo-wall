title: 类型标注编解码器把 bool 当 int 致序列化 round-trip 语义改变
tags:
- error-handling
- serialization
- type-boundary
- python
entry_file: buggy/solution.py
focus: encode() 用 isinstance 判类型打标签时把 int 分支排在 bool 之前——因 bool 是 int 子类，True/False
  被错打成 int 标签，decode 后变成 1/0，round-trip 类型与语义改变；须先判 bool（或用 type 精确匹配），保证 decode(encode(x))
  在值与类型上都不变
