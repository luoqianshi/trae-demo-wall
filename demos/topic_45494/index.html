<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寻声 — 昆曲声音互动装置</title>
<style>
/* ==================== CSS 区域 ==================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #ffffff;
  font-family: "SimSun", "Songti SC", "STSong", serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 主屏幕容器，模仿竖屏展览屏 */
.screen {
  position: relative;
  width: 100%;
  height: 100%;
  max-width: 900px;
  max-height: 1200px;
  background: #ffffff;
  overflow: hidden;
}

/* ---------- 左上角书法标题 ---------- */
.top-title {
  position: absolute;
  top: 40px;
  left: 50px;
  z-index: 20;
}

.top-title .calligraphy {
  font-size: 64px;
  font-weight: 700;
  color: #111;
  letter-spacing: 0.1em;
  line-height: 1;
  writing-mode: horizontal-tb;
  font-family: "KaiTi", "STKaiti", "楷体", serif;
}

.top-title .sub-calligraphy {
  display: block;
  font-size: 11px;
  color: #888;
  letter-spacing: 0.15em;
  margin-top: 8px;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  text-transform: uppercase;
}

/* ---------- 右上角控制标签 ---------- */
.top-right {
  position: absolute;
  top: 48px;
  right: 50px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 20;
}

.show-label {
  font-size: 11px;
  color: #666;
  letter-spacing: 0.05em;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
}

.rush-btn {
  font-size: 10px;
  color: #333;
  border: 1px solid #ccc;
  padding: 3px 10px;
  border-radius: 2px;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  letter-spacing: 0.05em;
}

/* ---------- 左侧竖排信息栏 ---------- */
.left-info {
  position: absolute;
  top: 180px;
  left: 50px;
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.left-info .vertical-text {
  writing-mode: vertical-rl;
  font-size: 22px;
  color: #222;
  letter-spacing: 0.2em;
  font-family: "KaiTi", "STKaiti", "楷体", serif;
  line-height: 1.6;
}

.left-info .vertical-divider {
  width: 1px;
  height: 40px;
  background: #ddd;
  margin: 0 auto;
}

.left-info .track-meta {
  font-size: 12px;
  color: #999;
  line-height: 1.8;
  letter-spacing: 0.05em;
}

/* ---------- 中央曼陀罗区 ---------- */
.mandala-wrap {
  position: absolute;
  top: 50%;
  left: 55%;
  transform: translate(-50%, -50%);
  z-index: 10;
}

#mandalaCanvas {
  width: 520px;
  height: 520px;
  display: block;
}

/* 中央控制按钮 */
#controlBtn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 1px solid #bbb;
  background: rgba(255, 255, 255, 0.92);
  color: #333;
  font-family: "SimSun", "Songti SC", serif;
  font-size: 13px;
  letter-spacing: 0.1em;
  cursor: pointer;
  outline: none;
  transition: all 0.4s ease;
  z-index: 30;
}

#controlBtn:hover {
  border-color: #888;
  transform: translate(-50%, -50%) scale(1.05);
}

#controlBtn.active {
  border-color: #C0392B;
  color: #C0392B;
}

/* ---------- 底部水墨五线谱区 ---------- */
.bottom-score {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  width: 88%;
  max-width: 780px;
  z-index: 15;
}

#scoreCanvas {
  width: 100%;
  height: 160px;
  display: block;
}

/* ---------- 左下角说明 ---------- */
.bottom-left-text {
  position: absolute;
  bottom: 40px;
  left: 50px;
  font-size: 11px;
  color: #bbb;
  line-height: 1.8;
  letter-spacing: 0.08em;
  z-index: 20;
}

/* ---------- 右下角提示 ---------- */
.bottom-right-hint {
  position: absolute;
  bottom: 40px;
  right: 50px;
  font-size: 11px;
  color: #ccc;
  letter-spacing: 0.1em;
  z-index: 20;
}

/* ---------- 状态提示 ---------- */
#statusMsg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  margin-top: 70px;
  font-size: 11px;
  color: #aaa;
  letter-spacing: 0.1em;
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  white-space: nowrap;
  z-index: 30;
}

#statusMsg.show {
  opacity: 1;
}

/* ==================== 第二幕 古地图 ==================== */

.top-right .show-label {
  cursor: pointer;
  user-select: none;
  transition: color 0.6s ease;
}
.top-right .show-label:hover {
  color: #C0392B;
}

.scene-wrap {
  position: absolute;
  inset: 0;
  transition: opacity 1.2s ease;
  pointer-events: none;
  opacity: 0;
}
.scene-wrap.active {
  opacity: 1;
  pointer-events: auto;
}

.map-scene {
  position: absolute;
  inset: 0;
  padding: 100px 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.map-stage {
  position: relative;
  width: 100%;
  height: 100%;
  max-width: 820px;
  transition: opacity 1s ease, filter 1s ease;
}
.map-scene.album-open .map-stage {
  opacity: 0.35;
  filter: blur(1.5px);
}

.map-bg-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  user-select: none;
  pointer-events: none;
}

.map-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.map-mountain {
  fill: #1a1a1a;
}
.map-river {
  fill: none;
  stroke: #a8b8c0;
  stroke-width: 1.2;
  opacity: 0.55;
}
.map-river-shadow {
  fill: none;
  stroke: #a8b8c0;
  stroke-width: 4;
  opacity: 0.15;
}

.qi-line {
  fill: none;
  stroke: #C0392B;
  stroke-width: 0.6;
  stroke-dasharray: 2 6;
  opacity: 0.25;
  animation: qiFlow 12s linear infinite;
}
@keyframes qiFlow {
  from { stroke-dashoffset: 0; }
  to   { stroke-dashoffset: -200; }
}

.map-marker {
  cursor: pointer;
}
.map-marker .seal {
  fill: #C0392B;
  transform-origin: center;
  transform-box: fill-box;
  animation: sealBreath 2.4s ease-in-out infinite;
}
.map-marker .seal-inner {
  fill: #ffffff;
  opacity: 0.18;
}
.map-marker .place-name {
  fill: #1a1a1a;
  font-family: "KaiTi", "STKaiti", "楷体", serif;
  font-size: 20px;
  letter-spacing: 0.12em;
}
.map-marker .place-en {
  fill: #999;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 8px;
  letter-spacing: 0.18em;
}
.map-marker:hover .seal {
  animation-play-state: paused;
  transform: scale(1.18);
}
.map-marker:hover .place-name {
  fill: #C0392B;
}
@keyframes sealBreath {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50%      { opacity: 1.0; transform: scale(1.08); }
}

.map-title-cn {
  position: absolute;
  top: 130px;
  left: 50%;
  transform: translateX(-50%);
  font-family: "KaiTi", "STKaiti", "楷体", serif;
  font-size: 20px;
  color: #444;
  letter-spacing: 0.5em;
  text-indent: 0.5em;
}
.map-title-en {
  position: absolute;
  top: 168px;
  left: 50%;
  transform: translateX(-50%);
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 10px;
  color: #bbb;
  letter-spacing: 0.3em;
}

.scene-album {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -48%) scale(0.96);
  width: 440px;
  max-width: calc(100% - 200px);
  background: #ffffff;
  border: 1px solid #e2e2e2;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.08);
  padding: 48px 56px 40px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s ease, transform 1s ease;
  z-index: 40;
}
.scene-album.show {
  opacity: 1;
  pointer-events: auto;
  transform: translate(-50%, -50%) scale(1);
}

.album-close {
  position: absolute;
  top: 14px;
  right: 18px;
  font-size: 18px;
  color: #bbb;
  cursor: pointer;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  transition: color 0.4s ease;
  line-height: 1;
}
.album-close:hover { color: #C0392B; }

.album-ink {
  width: 220px;
  height: 140px;
  margin: 0 auto 24px;
  display: block;
}

.album-poem {
  writing-mode: vertical-rl;
  font-family: "KaiTi", "STKaiti", "楷体", serif;
  font-size: 22px;
  color: #1a1a1a;
  letter-spacing: 0.3em;
  line-height: 1.8;
  margin: 0 auto 28px;
  height: 180px;
  text-align: center;
}

.album-divider {
  width: 30px;
  height: 1px;
  background: #ddd;
  margin: 0 auto 18px;
}

.album-name {
  font-family: "KaiTi", "STKaiti", "楷体", serif;
  font-size: 28px;
  color: #1a1a1a;
  letter-spacing: 0.25em;
  text-align: center;
  text-indent: 0.25em;
  margin-bottom: 8px;
}
.album-en {
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 10px;
  color: #999;
  letter-spacing: 0.2em;
  text-align: center;
}
.album-audio-hint {
  margin-top: 18px;
  font-size: 10px;
  color: #C0392B;
  letter-spacing: 0.15em;
  text-align: center;
  opacity: 0.7;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
}
</style>
</head>
<body>

<!-- ==================== HTML 区域 ==================== -->
<div class="screen">

  <!-- 左上角标题 -->
  <div class="top-title">
    <div class="calligraphy">寻声</div>
    <span class="sub-calligraphy">Kunqu Sound Interaction</span>
  </div>

  <!-- 右上角标签 -->
  <div class="top-right">
    <span class="show-label" id="showLabel">SHOW ON 1.00</span>
    <span class="rush-btn">RUSH</span>
  </div>

  <!-- 左侧信息栏 -->
  <div class="left-info">
    <div class="vertical-text">牡丹亭 · 寻梦</div>
    <div class="vertical-divider"></div>
    <div class="track-meta">
      昆曲 水磨调<br>
      声纹互动装置<br><br>
      情不知所起<br>
      一往而深
    </div>
  </div>

  <!-- 第一幕：曼陀罗 -->
  <div class="scene-wrap active" id="sceneMandala">
    <div class="mandala-wrap">
      <canvas id="mandalaCanvas" width="520" height="520"></canvas>
      <button id="controlBtn">聆听 · 发声</button>
      <div id="statusMsg"></div>
    </div>

    <!-- 底部水墨五线谱 -->
    <div class="bottom-score">
      <canvas id="scoreCanvas" width="780" height="160"></canvas>
    </div>
  </div>

  <!-- 第二幕：古地图 -->
  <div class="scene-wrap" id="sceneMap">
    <div class="map-title-cn">寻 声 · 六 地</div>
    <div class="map-title-en">SIX PLACES OF KUNQU</div>

    <div class="map-scene" id="mapScene">
      <div class="map-stage">
        <img class="map-bg-img" src="images/map_bg.jpg" alt="">
        <svg class="map-svg" viewBox="0 0 1000 1200" preserveAspectRatio="none">
          <!-- 气韵连线 -->
          <g id="qiLines"></g>
          <!-- 6 个朱砂印章地点 -->
          <g id="markers"></g>
        </svg>
      </div>
    </div>

    <!-- 册页浮层 -->
    <div class="scene-album" id="sceneAlbum">
      <span class="album-close" id="albumClose">×</span>
      <div id="albumInk"></div>
      <div class="album-poem" id="albumPoem"></div>
      <div class="album-divider"></div>
      <div class="album-name" id="albumName"></div>
      <div class="album-en" id="albumEn"></div>
      <div class="album-audio-hint" id="albumAudioHint">♪ 声 · 流转</div>
    </div>

    <audio id="sceneAudio" preload="none"></audio>
  </div>

  <!-- 右下角提示 -->
  <div class="bottom-right-hint">开口，让昆曲听见你</div>

</div>

<script>
/* ==================== JS 区域 ==================== */

// ---------- 全局变量与配置 ----------
const canvas = document.getElementById('mandalaCanvas');
const ctx = canvas.getContext('2d');
const scoreCanvas = document.getElementById('scoreCanvas');
const sCtx = scoreCanvas.getContext('2d');
const btn = document.getElementById('controlBtn');
const statusMsg = document.getElementById('statusMsg');

const W = canvas.width;
const H = canvas.height;
const CX = W / 2;
const CY = H / 2;

const SW = scoreCanvas.width;
const SH = scoreCanvas.height;

// 状态枚举
const STATE = { IDLE: 'idle', ACTIVE: 'active', END: 'end' };
let currentState = STATE.IDLE;

// 动画时间
let animTime = 0;

// Web Audio API 相关
let audioCtx = null;
let analyser = null;
let micStream = null;
let micSource = null;

// 用户声纹淡出相关
let userFadeOut = 0;
const FADE_SPEED = 0.015;

// FFT 数据缓冲
const FFT_SIZE = 2048;
let freqData = null;
let timeData = null;

// 噪声函数
function noise(x) {
  const n = Math.sin(x * 12.9898 + Math.sin(x * 78.233)) * 43758.5453;
  return n - Math.floor(n);
}
function smoothNoise(x) {
  const i = Math.floor(x);
  const f = x - i;
  return noise(i) * (1 - f) + noise(i + 1) * f;
}

// ---------- 工具函数 ----------

function computeRMS(arr) {
  let sum = 0;
  for (let i = 0; i < arr.length; i++) {
    const v = arr[i] - 128;
    sum += v * v;
  }
  return Math.sqrt(sum / arr.length);
}

function getUserSpectrumAtAngle(angle, data) {
  if (!data) return 0;
  const binCount = data.length;
  const idx = Math.floor((angle / (2 * Math.PI)) * (binCount * 0.5));
  const safeIdx = Math.min(idx, binCount - 1);
  return data[safeIdx] / 255;
}

// ---------- 曼陀罗绘制 ----------

function layerRadius(t, angle, layerIndex, totalLayers, isUser, freqDataRef) {
  let r = 0;
  const symmetry = 12 + layerIndex * 4;
  const baseFreq = 0.5 + layerIndex * 0.3;

  if (isUser && freqDataRef) {
    const spec = getUserSpectrumAtAngle(angle, freqDataRef);
    r = spec * (0.6 + 0.4 * Math.sin(angle * symmetry + t * baseFreq));
    r += spec * 0.15 * Math.sin(angle * symmetry * 2 + t * 1.5);
  } else {
    r += 0.5 * Math.sin(angle * symmetry + t * baseFreq);
    r += 0.25 * Math.sin(angle * symmetry * 2 + t * baseFreq * 1.3 + 1);
    r += 0.12 * Math.sin(angle * symmetry * 3 + t * baseFreq * 0.7 + 2);
    r += 0.08 * smoothNoise(angle * symmetry * 0.5 + t * 0.2);
    const breath = 0.9 + 0.1 * Math.sin(t * 0.4 + layerIndex);
    r *= breath;
    r = (r / 1.0) * 0.5 + 0.5;
  }
  return Math.max(0, Math.min(1, r));
}

function drawRing(radius, segments, radiusFn, color, alpha, lineWidth) {
  // 修复：确保 lineWidth 不为负
  const safeLineWidth = Math.max(0.1, lineWidth);

  ctx.save();
  ctx.translate(CX, CY);
  ctx.strokeStyle = color;
  ctx.lineWidth = safeLineWidth;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.globalAlpha = alpha;

  const step = (Math.PI * 2) / segments;

  // 绘制闭合曲线
  ctx.beginPath();
  for (let i = 0; i <= segments; i++) {
    const angle = i * step;
    const rFactor = radiusFn(angle);
    const r = rFactor * radius;
    const x = Math.cos(angle) * r;
    const y = Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // 花瓣尖端装饰点
  ctx.fillStyle = color;
  for (let i = 0; i < segments; i++) {
    const angle = i * step;
    const rFactor = radiusFn(angle);
    const prev = radiusFn(angle - step);
    const next = radiusFn(angle + step);
    if (rFactor > prev && rFactor > next && rFactor > 0.7) {
      const r = rFactor * radius;
      const x = Math.cos(angle) * r;
      const y = Math.sin(angle) * r;
      // 修复：确保 dotSize 不为负
      const dotSize = Math.max(0.1, safeLineWidth * (0.5 + rFactor * 0.8));
      ctx.globalAlpha = alpha * 0.6;
      ctx.beginPath();
      ctx.arc(x, y, dotSize, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();
}

function drawMandalaComplex(t, isUser, freqDataRef, globalAlphaMult, rms) {
  const layers = isUser ? 5 : 8;
  const maxR = isUser ? 220 : 250;
  const baseColor = isUser ? '#C0392B' : '#1a1a1a';

  for (let i = 0; i < layers; i++) {
    const progress = (i + 1) / layers;
    const radius = maxR * progress;
    const segments = 24 + i * 16;
    const layerAlpha = (1.0 - progress * 0.5) * globalAlphaMult;

    // 修复：lineW 可能为负，加 Math.max 保护
    const rawLineW = isUser
      ? (0.4 + (rms / 128) * 1.2) * (1.2 - progress * 0.3)
      : (0.35 + 0.5 * Math.sin(t * 0.5 + i)) * (1.1 - progress * 0.3);
    const lineW = Math.max(0.1, rawLineW);

    const fn = (angle) => layerRadius(t, angle, i, layers, isUser, freqDataRef);
    drawRing(radius, segments, fn, baseColor, layerAlpha, lineW);

    if (!isUser) {
      const fnMirror = (angle) => layerRadius(t, angle + Math.PI / segments, i, layers, isUser, freqDataRef);
      drawRing(radius * 0.95, segments, fnMirror, baseColor, layerAlpha * 0.5, lineW * 0.7);
    }
  }

  // 中心装饰圆
  ctx.save();
  ctx.translate(CX, CY);
  ctx.strokeStyle = baseColor;
  ctx.globalAlpha = 0.15 * globalAlphaMult;
  ctx.lineWidth = 0.5;
  const centerR = maxR * 0.08;
  ctx.beginPath();
  ctx.arc(0, 0, Math.max(0.1, centerR), 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 0.08 * globalAlphaMult;
  ctx.beginPath();
  ctx.arc(0, 0, Math.max(0.1, centerR * 0.6), 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

// ==================== 水墨五线谱 ====================

const STAFF = {
  lineCount: 5,
  topMargin: 30,
  lineSpacing: 18,
  scrollSpeed: 0.4,
  melody: [
    { pitch: 2, dur: 0.8 }, { pitch: 3, dur: 0.6 }, { pitch: 4, dur: 1.0 },
    { pitch: 3, dur: 0.5 }, { pitch: 2, dur: 0.7 }, { pitch: 1, dur: 0.9 },
    { pitch: 0, dur: 1.2 }, { pitch: 1, dur: 0.6 }, { pitch: 2, dur: 0.8 },
    { pitch: 3, dur: 0.5 }, { pitch: 4, dur: 1.0 }, { pitch: 3, dur: 0.7 },
    { pitch: 2, dur: 0.9 }, { pitch: 1, dur: 0.6 }, { pitch: 0, dur: 1.1 },
    { pitch: -1, dur: 0.8 }, { pitch: 0, dur: 0.7 }, { pitch: 1, dur: 0.9 },
    { pitch: 2, dur: 0.5 }, { pitch: 3, dur: 0.6 }, { pitch: 4, dur: 1.2 },
    { pitch: 3, dur: 0.5 }, { pitch: 2, dur: 0.8 }, { pitch: 1, dur: 0.7 },
    { pitch: 0, dur: 1.0 }, { pitch: 1, dur: 0.6 }, { pitch: 2, dur: 0.9 },
    { pitch: 3, dur: 0.7 }, { pitch: 2, dur: 0.5 }, { pitch: 1, dur: 0.8 },
    { pitch: 0, dur: 1.1 }, { pitch: -1, dur: 0.6 }, { pitch: 0, dur: 0.8 },
  ]
};

let inkParticles = [];

class InkParticle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 0.8;
    this.vy = (Math.random() - 0.5) * 0.6 - 0.3;
    this.life = 1.0;
    this.decay = 0.008 + Math.random() * 0.015;
    this.size = 1 + Math.random() * 3;
    this.color = color;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.02;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.01;
    this.life -= this.decay;
    this.rotation += this.rotSpeed;
    this.size *= 0.998;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = this.life * 0.6;
    ctx.fillStyle = this.color;
    const s = Math.max(0.1, this.size);
    ctx.beginPath();
    ctx.ellipse(0, 0, s, s * (0.6 + Math.random() * 0.4), 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = this.life * 0.15;
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 2.5, s * 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function spawnInkBurst(x, y, intensity, color) {
  const count = Math.floor(3 + intensity * 8);
  for (let i = 0; i < count; i++) {
    inkParticles.push(new InkParticle(x, y, color));
  }
}

function drawInkStaffLine(y, t, intensity) {
  sCtx.save();
  sCtx.strokeStyle = '#1a1a1a';
  sCtx.lineWidth = 0.8 + intensity * 0.4;
  sCtx.lineCap = 'round';
  sCtx.globalAlpha = 0.35 + intensity * 0.25;
  sCtx.beginPath();
  for (let x = 0; x <= SW; x += 2) {
    const wobble = Math.sin(x * 0.05 + t * 0.8) * (0.3 + intensity * 1.2) +
                  smoothNoise(x * 0.01 + t * 0.2) * (0.2 + intensity * 0.8);
    const py = y + wobble;
    if (x === 0) sCtx.moveTo(x, py);
    else sCtx.lineTo(x, py);
  }
  sCtx.stroke();
  if (intensity > 0.3) {
    sCtx.globalAlpha = intensity * 0.06;
    sCtx.lineWidth = 3 + intensity * 4;
    sCtx.beginPath();
    for (let x = 0; x <= SW; x += 3) {
      const wobble = Math.sin(x * 0.05 + t * 0.8) * (0.3 + intensity * 1.2);
      const py = y + wobble;
      if (x === 0) sCtx.moveTo(x, py);
      else sCtx.lineTo(x, py);
    }
    sCtx.stroke();
  }
  sCtx.restore();
}

function drawInkNote(x, y, pitch, intensity, t, isUser) {
  const color = isUser ? '#C0392B' : '#1a1a1a';
  const noteSize = 5 + intensity * 4;
  sCtx.save();
  sCtx.translate(x, y);
  sCtx.rotate(-0.2);
  sCtx.globalAlpha = 0.08 + intensity * 0.12;
  sCtx.fillStyle = color;
  sCtx.beginPath();
  sCtx.ellipse(0, 0, noteSize * 2.2, noteSize * 1.6, -0.2, 0, Math.PI * 2);
  sCtx.fill();
  sCtx.globalAlpha = 0.6 + intensity * 0.35;
  sCtx.fillStyle = color;
  sCtx.beginPath();
  sCtx.ellipse(0, 0, noteSize, noteSize * 0.7, -0.2, 0, Math.PI * 2);
  sCtx.fill();
  sCtx.globalAlpha = 0.3 + intensity * 0.3;
  sCtx.fillStyle = isUser ? '#8B1A1A' : '#000';
  sCtx.beginPath();
  sCtx.ellipse(-noteSize * 0.15, -noteSize * 0.1, noteSize * 0.5, noteSize * 0.35, -0.1, 0, Math.PI * 2);
  sCtx.fill();
  sCtx.rotate(0.2);
  sCtx.strokeStyle = color;
  sCtx.globalAlpha = 0.5 + intensity * 0.3;
  sCtx.lineWidth = 1.0 + intensity * 0.5;
  sCtx.lineCap = 'round';
  const stemH = 28 + intensity * 12;
  sCtx.beginPath();
  sCtx.moveTo(noteSize * 0.8, 0);
  sCtx.quadraticCurveTo(noteSize * 0.8 + 1.5 * Math.sin(t * 2), -stemH * 0.5,
                         noteSize * 0.8 + Math.sin(t * 1.5) * 1, -stemH);
  sCtx.stroke();
  if (intensity > 0.4) {
    sCtx.globalAlpha = 0.3 + intensity * 0.3;
    sCtx.lineWidth = 0.8 + intensity * 0.6;
    sCtx.beginPath();
    const tailX = noteSize * 0.8 + Math.sin(t * 1.5) * 1;
    const tailY = -stemH;
    sCtx.moveTo(tailX, tailY);
    sCtx.quadraticCurveTo(tailX + 10 + intensity * 8, tailY + 8 + Math.sin(t * 3) * 3,
                          tailX + 6 + intensity * 5, tailY + 18 + Math.sin(t * 2.5) * 4);
    sCtx.stroke();
  }
  sCtx.restore();
  if (intensity > 0.6 && Math.random() < intensity * 0.3) {
    spawnInkBurst(x, y, intensity * 0.5, color);
  }
}

function drawInkClef(t, intensity) {
  const cx = 35;
  const cy = STAFF.topMargin + STAFF.lineSpacing * 2;
  sCtx.save();
  sCtx.translate(cx, cy);
  sCtx.strokeStyle = '#1a1a1a';
  sCtx.fillStyle = '#1a1a1a';
  sCtx.lineCap = 'round';
  sCtx.lineJoin = 'round';
  const breathe = 0.85 + 0.15 * Math.sin(t * 0.5);
  sCtx.globalAlpha = 0.4 * breathe * (0.5 + intensity * 0.5);
  sCtx.lineWidth = 1.2 + intensity * 0.5;
  sCtx.beginPath();
  sCtx.moveTo(0, 18);
  sCtx.bezierCurveTo(-6, 10, -8, -5, -3, -15);
  sCtx.bezierCurveTo(2, -25, 8, -18, 6, -8);
  sCtx.bezierCurveTo(4, 2, -2, 8, -4, 15);
  sCtx.stroke();
  sCtx.globalAlpha = 0.3 * breathe;
  sCtx.beginPath();
  sCtx.arc(-2, 20, 2.5, 0, Math.PI * 2);
  sCtx.fill();
  sCtx.restore();
}

function drawBarLines(t, intensity) {
  const barInterval = 160;
  const scrollOffset = (t * STAFF.scrollSpeed * 60) % barInterval;
  for (let i = 0; i < Math.ceil(SW / barInterval) + 1; i++) {
    const x = 60 + i * barInterval - scrollOffset;
    if (x < 50 || x > SW - 10) continue;
    sCtx.save();
    sCtx.strokeStyle = '#1a1a1a';
    sCtx.globalAlpha = 0.2 + intensity * 0.15;
    sCtx.lineWidth = 0.8 + intensity * 0.3;
    sCtx.lineCap = 'round';
    const topY = STAFF.topMargin;
    const bottomY = STAFF.topMargin + (STAFF.lineCount - 1) * STAFF.lineSpacing;
    sCtx.beginPath();
    sCtx.moveTo(x + Math.sin(t + i) * 0.3, topY);
    sCtx.lineTo(x + Math.sin(t * 0.8 + i) * 0.3, bottomY);
    sCtx.stroke();
    sCtx.restore();
  }
}

function drawScore(t, freqDataRef, timeDataRef, isActive, rms) {
  sCtx.clearRect(0, 0, SW, SH);
  let intensity = 0;
  if (isActive && freqDataRef) {
    let sum = 0;
    for (let i = 0; i < freqDataRef.length; i++) sum += freqDataRef[i];
    intensity = sum / (freqDataRef.length * 255);
  }
  const baseIntensity = 0.15 + 0.1 * Math.sin(t * 0.6) + 0.05 * Math.sin(t * 1.3);
  const totalIntensity = Math.min(1, baseIntensity + intensity * 2.5);

  for (let i = 0; i < STAFF.lineCount; i++) {
    const y = STAFF.topMargin + i * STAFF.lineSpacing;
    const lineIntensity = totalIntensity * (0.8 + 0.2 * Math.sin(t * 0.4 + i * 0.5));
    drawInkStaffLine(y, t, lineIntensity);
  }

  const noteSpacing = 40;
  const scrollOffset = (t * STAFF.scrollSpeed * 60) % noteSpacing;
  for (let i = 0; i < Math.ceil(SW / noteSpacing) + 2; i++) {
    const x = i * noteSpacing - scrollOffset;
    if (x < -20 || x > SW + 20) continue;
    const melodyIdx = (Math.floor(t * STAFF.scrollSpeed * 60 / noteSpacing) + i) % STAFF.melody.length;
    const note = STAFF.melody[melodyIdx];
    const pitchY = STAFF.topMargin + (STAFF.lineCount - 1) * STAFF.lineSpacing - note.pitch * (STAFF.lineSpacing / 2);
    const notePhase = (x / SW + t * 0.3) % 1;
    const noteIntensity = totalIntensity * (0.5 + 0.5 * Math.sin(notePhase * Math.PI));
    drawInkNote(x, pitchY, note.pitch, noteIntensity, t, false);
  }

  if (isActive && freqDataRef && rms > 5) {
    const bandCount = 8;
    const bandSize = Math.floor(freqDataRef.length / bandCount);
    for (let b = 0; b < bandCount; b++) {
      let bandSum = 0;
      for (let j = 0; j < bandSize; j++) bandSum += freqDataRef[b * bandSize + j];
      const bandVal = bandSum / (bandSize * 255);
      if (bandVal > 0.15) {
        const pitch = Math.floor(bandVal * 6);
        const pitchY = STAFF.topMargin + (STAFF.lineCount - 1) * STAFF.lineSpacing - pitch * (STAFF.lineSpacing / 2);
        const x = SW * 0.1 + (b / bandCount) * SW * 0.8 + Math.sin(t * 2 + b) * 5;
        drawInkNote(x, pitchY, pitch, bandVal, t, true);
      }
    }
  }

  drawInkClef(t, totalIntensity);
  drawBarLines(t, totalIntensity);

  inkParticles = inkParticles.filter(p => p.life > 0);
  inkParticles.forEach(p => { p.update(); p.draw(sCtx); });
  if (inkParticles.length > 200) inkParticles = inkParticles.slice(-200);
}

// ---------- 音频初始化 ----------

async function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = FFT_SIZE;
  analyser.smoothingTimeConstant = 0.8;

  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.frequencyBinCount);

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    micSource = audioCtx.createMediaStreamSource(micStream);
    micSource.connect(analyser);
  } catch (err) {
    console.error('无法获取麦克风权限:', err);
    showStatus('无法访问麦克风，请检查权限设置');
    throw err;
  }
}

function stopAudio() {
  if (micStream) {
    micStream.getTracks().forEach(track => track.stop());
    micStream = null;
  }
  if (micSource) {
    micSource.disconnect();
    micSource = null;
  }
  if (analyser) {
    analyser.disconnect();
    analyser = null;
  }
  if (audioCtx && audioCtx.state !== 'closed') {
    audioCtx.close();
    audioCtx = null;
  }
  freqData = null;
  timeData = null;
}

// ---------- 状态与 UI 管理 ----------

function showStatus(msg) {
  statusMsg.textContent = msg;
  statusMsg.classList.add('show');
  setTimeout(() => {
    statusMsg.classList.remove('show');
  }, 2500);
}

function enterIdle() {
  currentState = STATE.IDLE;
  btn.textContent = '聆听 · 发声';
  btn.classList.remove('active');
  userFadeOut = 0;
}

async function enterActive() {
  try {
    await initAudio();
    currentState = STATE.ACTIVE;
    btn.textContent = '停止';
    btn.classList.add('active');
    userFadeOut = 1;
    showStatus('正在聆听你的声音…');
  } catch (e) {
    // 保持 IDLE
  }
}

function enterEnd() {
  currentState = STATE.END;
  btn.textContent = '聆听 · 发声';
  btn.classList.remove('active');
}

btn.addEventListener('click', () => {
  if (currentState === STATE.IDLE) {
    enterActive();
  } else if (currentState === STATE.ACTIVE) {
    enterEnd();
  } else if (currentState === STATE.END) {
    if (!audioCtx) {
      enterIdle();
    } else {
      enterActive();
    }
  }
});

// ---------- 主动画循环 ----------

function animate() {
  requestAnimationFrame(animate);
  animTime += 0.016;

  // 拖影残影
  ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
  ctx.fillRect(0, 0, W, H);

  // END 状态淡出
  if (currentState === STATE.END) {
    userFadeOut -= FADE_SPEED;
    if (userFadeOut <= 0) {
      userFadeOut = 0;
      stopAudio();
      currentState = STATE.IDLE;
    }
  }

  // 获取麦克风数据
  let hasUserData = false;
  let userRMS = 0;
  if (analyser && freqData && timeData) {
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);
    userRMS = computeRMS(timeData);
    hasUserData = true;
  }

  // 1. 昆曲声纹（黑色）
  const kunquRMS = 0.3 + 0.2 * Math.sin(animTime * 0.4);
  drawMandalaComplex(animTime, false, null, 1.0, kunquRMS);

  // 2. 用户声纹（朱砂红）
  if ((currentState === STATE.ACTIVE || currentState === STATE.END) && hasUserData && userFadeOut > 0) {
    const globalAlpha = (0.5 + (userRMS / 128) * 0.5) * userFadeOut;
    drawMandalaComplex(animTime, true, freqData, globalAlpha, userRMS);
  }

  // 3. 底部水墨五线谱
  const isActive = currentState === STATE.ACTIVE || (currentState === STATE.END && userFadeOut > 0);
  const currentRMS = isActive ? userRMS : 0;
  drawScore(animTime, freqData, timeData, isActive, currentRMS);
}

function buildMarkers() {
  const g = document.getElementById('markers');
  sceneData.forEach((s) => {
    const group = document.createElementNS(SVG_NS, 'g');
    group.setAttribute('class', 'map-marker');
    group.setAttribute('transform', `translate(${s.x}, ${s.y})`);
    group.setAttribute('data-id', s.id);

    const seal = document.createElementNS(SVG_NS, 'rect');
    seal.setAttribute('class', 'seal');
    seal.setAttribute('x', -8);
    seal.setAttribute('y', -8);
    seal.setAttribute('width', 16);
    seal.setAttribute('height', 16);

    const inner = document.createElementNS(SVG_NS, 'rect');
    inner.setAttribute('class', 'seal-inner');
    inner.setAttribute('x', -4);
    inner.setAttribute('y', -4);
    inner.setAttribute('width', 8);
    inner.setAttribute('height', 8);

    const name = document.createElementNS(SVG_NS, 'text');
    name.setAttribute('class', 'place-name');
    name.setAttribute('x', 16);
    name.setAttribute('y', 6);
    name.textContent = s.name;

    const en = document.createElementNS(SVG_NS, 'text');
    en.setAttribute('class', 'place-en');
    en.setAttribute('x', 16);
    en.setAttribute('y', 22);
    en.textContent = s.id.toUpperCase();

    group.appendChild(seal);
    group.appendChild(inner);
    group.appendChild(name);
    group.appendChild(en);

    group.addEventListener('click', () => openAlbum(s.id));
    g.appendChild(group);
  });
}

function buildQiLines() {
  const g = document.getElementById('qiLines');
  const order = ['kunshan', 'suzhou', 'taicang', 'nanjing', 'yangzhou', 'beijing'];
  const map = Object.fromEntries(sceneData.map(s => [s.id, s]));
  for (let i = 0; i < order.length - 1; i++) {
    const a = map[order[i]];
    const b = map[order[i + 1]];
    const line = document.createElementNS(SVG_NS, 'path');
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2 - 30;
    line.setAttribute('class', 'qi-line');
    line.setAttribute('d', `M${a.x},${a.y} Q${mx},${my} ${b.x},${b.y}`);
    line.style.animationDelay = `${i * 1.2}s`;
    g.appendChild(line);
  }
}

let audioFadeTimer = null;

function fadeOutAudio(cb) {
  if (audioFadeTimer) clearInterval(audioFadeTimer);
  if (!sceneAudio.src || sceneAudio.paused) {
    if (cb) cb();
    return;
  }
  const step = sceneAudio.volume / 16;
  audioFadeTimer = setInterval(() => {
    if (sceneAudio.volume - step <= 0) {
      sceneAudio.volume = 0;
      sceneAudio.pause();
      clearInterval(audioFadeTimer);
      if (cb) cb();
    } else {
      sceneAudio.volume -= step;
    }
  }, 50);
}

function playAudio(src) {
  fadeOutAudio(() => {
    sceneAudio.src = src;
    sceneAudio.volume = 0;
    const p = sceneAudio.play();
    if (p && p.catch) p.catch(() => {});
    let v = 0;
    const inT = setInterval(() => {
      v += 0.06;
      if (v >= 0.9) {
        sceneAudio.volume = 0.9;
        clearInterval(inT);
      } else {
        sceneAudio.volume = v;
      }
    }, 60);
  });
}

function openAlbum(id) {
  const s = sceneData.find(d => d.id === id);
  if (!s) return;
  albumInk.innerHTML = inkPainters[s.ink] ? inkPainters[s.ink]() : '';
  albumPoem.textContent = s.poem;
  albumName.textContent = s.name;
  albumEn.textContent = s.enLabel;
  sceneAlbum.classList.add('show');
  mapScene.classList.add('album-open');
  playAudio(s.audio);
}

function closeAlbum() {
  sceneAlbum.classList.remove('show');
  mapScene.classList.remove('album-open');
  fadeOutAudio();
}

albumClose.addEventListener('click', closeAlbum);
mapScene.addEventListener('click', (e) => {
  if (e.target === mapScene || e.target.classList.contains('map-svg')) {
    closeAlbum();
  }
});

buildMarkers();
buildQiLines();
</script>
