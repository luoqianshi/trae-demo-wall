<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷题系统模板</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background:#f0f2f5; color:#333; min-height:100vh; }
.topbar { background:linear-gradient(135deg,#1a73e8,#0d47a1); color:#fff; padding:0 24px; display:flex; align-items:center; height:56px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.topbar .logo { font-size:18px; font-weight:700; margin-right:32px; white-space:nowrap; }
.topbar nav { display:flex; gap:4px; flex:1; overflow-x:auto; }
.topbar nav a { color:rgba(255,255,255,.75); text-decoration:none; padding:8px 16px; border-radius:6px; font-size:14px; transition:.2s; white-space:nowrap; cursor:pointer; }
.topbar nav a:hover, .topbar nav a.active { color:#fff; background:rgba(255,255,255,.15); }
.container { max-width:1200px; margin:0 auto; padding:24px 16px; }
.card { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.08); padding:24px; margin-bottom:16px; }
.card h2 { font-size:20px; margin-bottom:16px; color:#1a73e8; }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card { background:#fff; border-radius:12px; padding:20px; text-align:center; box-shadow:0 1px 4px rgba(0,0,0,.08); cursor:pointer; transition:.2s; }
.stat-card:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.12); }
.stat-card .num { font-size:36px; font-weight:700; color:#1a73e8; }
.stat-card .label { font-size:14px; color:#666; margin-top:4px; }
.stat-card:nth-child(2) .num { color:#e65100; }
.stat-card:nth-child(3) .num { color:#2e7d32; }
.stat-card:nth-child(4) .num { color:#c62828; }
.btn { display:inline-block; padding:10px 24px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; border:none; transition:.2s; text-decoration:none; }
.btn-primary { background:#1a73e8; color:#fff; }
.btn-primary:hover { background:#1557b0; }
.btn-outline { background:#fff; color:#1a73e8; border:1.5px solid #1a73e8; }
.btn-outline:hover { background:#e8f0fe; }
.btn-danger { background:#c62828; color:#fff; }
.btn-sm { padding:6px 14px; font-size:13px; }
.filter-bar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
.filter-bar select { padding:8px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; background:#fff; min-width:180px; }
.filter-bar label { font-size:14px; color:#555; font-weight:500; }
.progress-bar { height:6px; background:#e0e0e0; border-radius:3px; margin:12px 0; overflow:hidden; }
.progress-fill { height:100%; background:#1a73e8; border-radius:3px; transition:.3s; }
.question-box { padding:20px; background:#fafbfc; border-radius:10px; border:1px solid #e8eaed; margin-bottom:16px; }
.question-box .q-text { font-size:16px; font-weight:600; line-height:1.8; margin-bottom:16px; }
.question-box .q-meta { font-size:12px; color:#999; margin-bottom:8px; }
.option { display:block; padding:12px 16px; margin:6px 0; border:2px solid #e0e0e0; border-radius:8px; cursor:pointer; transition:.2s; font-size:15px; line-height:1.6; }
.option:hover { border-color:#1a73e8; background:#f5f8ff; }
.option.selected { border-color:#1a73e8; background:#e8f0fe; }
.option.correct { border-color:#2e7d32; background:#e8f5e9; color:#2e7d32; }
.option.wrong { border-color:#c62828; background:#ffebee; color:#c62828; }
.option.disabled { pointer-events:none; opacity:.85; }
.explanation { margin-top:12px; padding:12px 16px; background:#fff8e1; border-left:4px solid #f9a825; border-radius:4px; font-size:14px; line-height:1.8; display:none; }
.explanation.show { display:block; }
.q-nav { display:flex; justify-content:space-between; align-items:center; margin-top:16px; flex-wrap:wrap; gap:8px; }
.q-nav .info { font-size:13px; color:#888; }
.grid-nav { display:flex; flex-wrap:wrap; gap:6px; margin:12px 0; max-height:200px; overflow-y:auto; }
.grid-nav span { display:inline-flex; width:32px; height:32px; align-items:center; justify-content:center; border-radius:6px; font-size:12px; cursor:pointer; border:1px solid #ddd; transition:.2s; background:#fff; flex-shrink:0; }
.grid-nav span:hover { border-color:#1a73e8; }
.grid-nav span.current { background:#1a73e8; color:#fff; border-color:#1a73e8; }
.grid-nav span.done { background:#e8f5e9; border-color:#2e7d32; color:#2e7d32; }
.grid-nav span.wrong-mark { background:#ffebee; border-color:#c62828; color:#c62828; }
.case-card { border:1px solid #e0e0e0; border-radius:10px; padding:20px; margin-bottom:16px; }
.case-card .case-title { font-size:16px; font-weight:600; color:#1a73e8; margin-bottom:12px; }
.case-card .case-scenario { font-size:14px; line-height:1.8; color:#555; background:#fafbfc; padding:14px; border-radius:8px; margin-bottom:16px; white-space:pre-wrap; word-break:break-all; }
.case-qa .qa-q { font-weight:600; font-size:14px; margin-bottom:6px; cursor:pointer; color:#333; padding:10px 12px; background:#f5f5f5; border-radius:6px; transition:.2s; }
.case-qa .qa-q:hover { background:#e8f0fe; }
.case-qa .qa-a { display:none; padding:12px 16px; background:#f1f8e9; border-left:4px solid #2e7d32; border-radius:4px; font-size:14px; line-height:1.8; margin-top:6px; white-space:pre-wrap; word-break:break-all; }
.case-qa .qa-a.show { display:block; }
.exam-timer { font-size:28px; font-weight:700; text-align:center; padding:20px; color:#e65100; }
.exam-result { text-align:center; padding:32px; }
.exam-result .score { font-size:64px; font-weight:700; color:#1a73e8; }
.wrong-item { border:1px solid #ffcdd2; border-radius:8px; padding:16px; margin-bottom:12px; background:#fff; }
.chapter-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; }
.chapter-item { background:#f5f7fa; border-radius:8px; padding:14px; cursor:pointer; transition:.2s; }
.chapter-item:hover { background:#e8f0fe; }
.chapter-item .ch-name { font-size:14px; font-weight:500; }
.chapter-item .ch-count { font-size:12px; color:#888; margin-top:4px; }
.page { display:none; }
.page.active { display:block; }
.no-data { text-align:center; padding:60px 20px; color:#999; }
.no-data h2 { font-size:24px; color:#666; margin-bottom:16px; }
.no-data p { font-size:14px; line-height:2; }
@media(max-width:768px) {
  .topbar { padding:0 12px; }
  .topbar .logo { font-size:15px; margin-right:12px; }
  .topbar nav a { padding:6px 10px; font-size:13px; }
  .container { padding:12px; }
  .stats-grid { grid-template-columns:repeat(2,1fr); }
  .stat-card .num { font-size:24px; }
}
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:#f1f1f1; }
::-webkit-scrollbar-thumb { background:#c1c1c1; border-radius:3px; }
.footer { text-align:center; padding:24px; color:#999; font-size:12px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo" id="quiz-title">刷题系统</div>
  <nav>
    <a class="active" data-page="home" onclick="switchPage('home')">首页</a>
    <a data-page="choice" onclick="switchPage('choice')">选择题</a>
    <a data-page="case" id="nav-case" onclick="switchPage('case')">案例分析</a>
    <a data-page="exam" onclick="switchPage('exam')">模拟考试</a>
    <a data-page="wrong" onclick="switchPage('wrong')">错题本</a>
  </nav>
</div>

<div class="container">

<div id="page-home" class="page active">
  <div class="stats-grid">
    <div class="stat-card" onclick="switchPage('choice')">
      <div class="num" id="stat-total">0</div>
      <div class="label">题目总数</div>
    </div>
    <div class="stat-card" onclick="switchPage('choice')">
      <div class="num" id="stat-choice-count">0</div>
      <div class="label">选择题</div>
    </div>
    <div class="stat-card" onclick="switchPage('case')">
      <div class="num" id="stat-case-count">0</div>
      <div class="label">案例分析题</div>
    </div>
    <div class="stat-card" onclick="switchPage('wrong')">
      <div class="num" id="stat-wrong">0</div>
      <div class="label">错题数量</div>
    </div>
  </div>
  <div class="card">
    <h2>学习进度</h2>
    <div style="margin-bottom:8px;">
      <span style="font-size:14px;color:#666;">选择题进度：</span>
      <span id="choice-progress-text" style="font-size:14px;font-weight:600;color:#1a73e8;">0/0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="choice-progress-bar" style="width:0%"></div></div>
    <div style="margin-bottom:8px;margin-top:16px;">
      <span style="font-size:14px;color:#666;">案例分析进度：</span>
      <span id="case-progress-text" style="font-size:14px;font-weight:600;color:#e65100;">0/0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="case-progress-bar" style="width:0%;background:#e65100;"></div></div>
    <div style="margin-top:16px;">
      <span style="font-size:14px;color:#666;">正确率：</span>
      <span id="accuracy-text" style="font-size:14px;font-weight:600;color:#2e7d32;">--</span>
    </div>
  </div>
  <div class="card">
    <h2>章节分布</h2>
    <div class="chapter-grid" id="chapter-grid"></div>
  </div>
</div>

<div id="page-choice" class="page">
  <div class="card">
    <div class="filter-bar">
      <label>章节：</label>
      <select id="choice-chapter-filter" onchange="filterChoiceQuestions()">
        <option value="all">全部章节</option>
      </select>
      <label style="margin-left:12px;">模式：</label>
      <select id="choice-mode" onchange="filterChoiceQuestions()">
        <option value="all">全部题目</option>
        <option value="unanswered">未做题</option>
        <option value="wrong">错题</option>
      </select>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
      <span id="choice-filter-count" style="font-size:14px;color:#888;"></span>
      <button class="btn btn-outline btn-sm" onclick="resetChoiceProgress()">重置本章进度</button>
    </div>
  </div>
  <div class="card" id="choice-question-card">
    <div class="question-box">
      <div class="q-meta" id="choice-meta"></div>
      <div class="q-text" id="choice-question"></div>
      <div id="choice-options"></div>
      <div class="explanation" id="choice-explanation"></div>
    </div>
    <div class="q-nav">
      <div>
        <button class="btn btn-outline btn-sm" onclick="prevChoice()" id="btn-prev-choice">上一题</button>
        <button class="btn btn-outline btn-sm" onclick="nextChoice()" id="btn-next-choice" style="margin-left:8px;">下一题</button>
      </div>
      <div class="info" id="choice-info"></div>
    </div>
    <div class="grid-nav" id="choice-grid-nav"></div>
  </div>
</div>

<div id="page-case" class="page">
  <div class="card">
    <div class="filter-bar">
      <label>章节：</label>
      <select id="case-chapter-filter" onchange="filterCaseQuestions()">
        <option value="all">全部章节</option>
      </select>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
      <span id="case-filter-count" style="font-size:14px;color:#888;"></span>
      <button class="btn btn-outline btn-sm" onclick="resetCaseProgress()">重置本章进度</button>
    </div>
  </div>
  <div class="card" id="case-detail-card">
    <div class="case-card">
      <div class="case-title" id="case-title"></div>
      <div class="case-scenario" id="case-scenario"></div>
      <div id="case-questions"></div>
    </div>
    <div class="q-nav">
      <div>
        <button class="btn btn-outline btn-sm" onclick="prevCase()">上一题</button>
        <button class="btn btn-outline btn-sm" onclick="nextCase()" style="margin-left:8px;">下一题</button>
      </div>
      <div class="info" id="case-info"></div>
    </div>
    <div class="grid-nav" id="case-grid-nav"></div>
  </div>
</div>

<div id="page-exam" class="page">
  <div class="card" id="exam-setup-card">
    <h2>模拟考试设置</h2>
    <div style="margin:16px 0;">
      <label style="font-size:14px;font-weight:500;">题目数量：</label>
      <select id="exam-count" style="padding:8px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;margin:0 8px;">
        <option value="20">20 题</option>
        <option value="50">50 题</option>
        <option value="75" selected>75 题</option>
        <option value="100">100 题</option>
      </select>
    </div>
    <div style="margin:16px 0;">
      <label style="font-size:14px;font-weight:500;">章节范围：</label>
      <select id="exam-chapter" style="padding:8px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;margin:0 8px;">
        <option value="all">全部章节</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="startExam()">开始考试</button>
  </div>
  <div class="card" id="exam-question-card" style="display:none;">
    <div class="exam-timer" id="exam-timer">--:--</div>
    <div class="progress-bar"><div class="progress-fill" id="exam-progress-bar" style="width:0%"></div></div>
    <div class="question-box">
      <div class="q-meta" id="exam-meta"></div>
      <div class="q-text" id="exam-question"></div>
      <div id="exam-options"></div>
    </div>
    <div class="q-nav">
      <button class="btn btn-outline btn-sm" onclick="prevExamQ()">上一题</button>
      <span class="info" id="exam-info"></span>
      <button class="btn btn-outline btn-sm" onclick="nextExamQ()">下一题</button>
    </div>
    <div class="grid-nav" id="exam-grid-nav"></div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-danger" onclick="submitExam()">交卷</button>
    </div>
  </div>
  <div class="card" id="exam-result-card" style="display:none;">
    <div class="exam-result">
      <h2>考试结果</h2>
      <div class="score" id="exam-score">0</div>
      <div style="font-size:18px;color:#666;">分</div>
      <div class="detail" id="exam-detail"></div>
      <div style="margin-top:16px;">
        <button class="btn btn-outline" onclick="reviewExam()">查看错题</button>
        <button class="btn btn-primary" onclick="resetExam()" style="margin-left:8px;">重新考试</button>
      </div>
    </div>
  </div>
</div>

<div id="page-wrong" class="page">
  <div class="card">
    <h2>错题本</h2>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">
      <span id="wrong-count" style="font-size:14px;color:#888;"></span>
      <button class="btn btn-outline btn-sm" onclick="clearWrongBook()" id="btn-clear-wrong">清空错题本</button>
    </div>
  </div>
  <div id="wrong-list"></div>
</div>

</div>

<div class="footer" id="footer-text">刷题系统模板</div>

<!-- 数据加载区：将 data_choices.js 和 data_cases.js 放在此目录即可自动加载 -->
<script src="data_choices.js"></script>
<script src="data_cases.js"></script>

<script>
// ===== 数据检查 =====
if (typeof CHOICE_DATA === 'undefined') {
  var CHOICE_DATA = [];
  console.warn('数据文件 data_choices.js 未找到，选择题数据为空。请按照格式说明准备数据文件。');
}
if (typeof CASE_DATA === 'undefined') {
  var CASE_DATA = [];
  console.warn('数据文件 data_cases.js 未找到，案例分析数据为空。');
}
if (typeof QUIZ_TITLE !== 'undefined') {
  document.getElementById('quiz-title').textContent = QUIZ_TITLE;
  document.title = QUIZ_TITLE;
}
if (typeof QUIZ_FOOTER !== 'undefined') {
  document.getElementById('footer-text').textContent = QUIZ_FOOTER;
}

// ===== 全局状态 =====
var currentPage = 'home';
var filteredChoices = CHOICE_DATA.slice();
var filteredCases = CASE_DATA.slice();
var choiceIndex = 0;
var caseIndex = 0;
var examQuestions = [];
var examIndex = 0;
var examAnswers = [];
var examTimerId = null;
var examSeconds = 0;

// ===== localStorage =====
function LS_get(key, def) {
  try { var v = localStorage.getItem('quiz_' + key); return v ? JSON.parse(v) : def; }
  catch(e) { return def; }
}
function LS_set(key, val) {
  try { localStorage.setItem('quiz_' + key, JSON.stringify(val)); } catch(e) {}
}

var choiceAnswers = LS_get('choice_answers', {});
var caseViewed = LS_get('case_viewed', {});
var wrongSet = LS_get('wrong_set', {});

function saveState() {
  LS_set('choice_answers', choiceAnswers);
  LS_set('case_viewed', caseViewed);
  LS_set('wrong_set', wrongSet);
  updateStats();
}

// ===== 页面切换 =====
function switchPage(page) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.topbar nav a').forEach(function(a) { a.classList.remove('active'); });
  var navLink = document.querySelector('.topbar nav a[data-page="' + page + '"]');
  if (navLink) navLink.classList.add('active');
  currentPage = page;
  if (page === 'home') renderHome();
  if (page === 'choice') { filterChoiceQuestions(); renderChoiceQuestion(); }
  if (page === 'case') { filterCaseQuestions(); renderCaseQuestion(); }
  if (page === 'wrong') renderWrongBook();
}

// ===== 首页 =====
function updateStats() {
  var cLen = CHOICE_DATA.length;
  var sLen = CASE_DATA.length;
  var answered = Object.keys(choiceAnswers).length;
  var correct = 0;
  for (var k in choiceAnswers) { if (choiceAnswers[k] === 'correct') correct++; }
  var wrongCount = Object.keys(wrongSet).length;
  document.getElementById('stat-total').textContent = cLen + sLen;
  document.getElementById('stat-choice-count').textContent = cLen;
  document.getElementById('stat-case-count').textContent = sLen;
  document.getElementById('stat-wrong').textContent = wrongCount;
  if (cLen > 0) {
    document.getElementById('choice-progress-text').textContent = answered + '/' + cLen;
    document.getElementById('choice-progress-bar').style.width = (answered / cLen * 100) + '%';
  }
  var viewed = Object.keys(caseViewed).length;
  if (sLen > 0) {
    document.getElementById('case-progress-text').textContent = viewed + '/' + sLen;
    document.getElementById('case-progress-bar').style.width = (viewed / sLen * 100) + '%';
  }
  if (answered > 0) {
    document.getElementById('accuracy-text').textContent = (correct / answered * 100).toFixed(1) + '% (' + correct + '/' + answered + ')';
  }
}

function renderHome() {
  updateStats();
  if (CHOICE_DATA.length === 0 && CASE_DATA.length === 0) {
    document.getElementById('chapter-grid').innerHTML = '<div style="grid-column:1/-1;" class="no-data"><h2>未加载到题目数据</h2><p>请确保 data_choices.js 和 data_cases.js 文件与模板在同一目录下。<br>使用数据转换工具将 JSON 题目文件转换为数据文件。</p></div>';
    return;
  }
  var chCount = {};
  CHOICE_DATA.forEach(function(q) {
    var ch = q.chapter || '未分类';
    if (!chCount[ch]) chCount[ch] = 0;
    chCount[ch]++;
  });
  var html = '';
  var keys = Object.keys(chCount).sort();
  keys.forEach(function(ch) {
    html += '<div class="chapter-item" onclick="switchPage(\'choice\');var sel=document.getElementById(\'choice-chapter-filter\');for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===\'' + ch.replace(/'/g, "\\'") + '\'){sel.value=sel.options[i].value;break;}}filterChoiceQuestions();">';
    html += '<div class="ch-name">' + ch + '</div>';
    html += '<div class="ch-count">选择题 ' + chCount[ch] + ' 道</div>';
    html += '</div>';
  });
  document.getElementById('chapter-grid').innerHTML = html || '<div style="grid-column:1/-1;text-align:center;color:#999;">暂无章节数据</div>';
}

// ===== 章节筛选初始化 =====
function initChapterFilters() {
  var chapters = [];
  CHOICE_DATA.forEach(function(q) { if (q.chapter && chapters.indexOf(q.chapter) < 0) chapters.push(q.chapter); });
  chapters.sort();
  var sel1 = document.getElementById('choice-chapter-filter');
  sel1.innerHTML = '<option value="all">全部章节（' + CHOICE_DATA.length + '道）</option>';
  chapters.forEach(function(ch) { sel1.innerHTML += '<option value="' + ch + '">' + ch + '</option>'; });
  
  var chapters2 = [];
  CASE_DATA.forEach(function(c) { if (c.chapter && chapters2.indexOf(c.chapter) < 0) chapters2.push(c.chapter); });
  chapters2.sort();
  var sel2 = document.getElementById('case-chapter-filter');
  sel2.innerHTML = '<option value="all">全部章节（' + CASE_DATA.length + '道）</option>';
  chapters2.forEach(function(ch) { sel2.innerHTML += '<option value="' + ch + '">' + ch + '</option>'; });
  
  var sel3 = document.getElementById('exam-chapter');
  sel3.innerHTML = '<option value="all">全部章节</option>';
  chapters.forEach(function(ch) { sel3.innerHTML += '<option value="' + ch + '">' + ch + '</option>'; });
}

// ===== 选择题 =====
function filterChoiceQuestions() {
  var ch = document.getElementById('choice-chapter-filter').value;
  var mode = document.getElementById('choice-mode').value;
  filteredChoices = CHOICE_DATA.slice();
  if (ch !== 'all') filteredChoices = filteredChoices.filter(function(q) { return q.chapter === ch; });
  if (mode === 'unanswered') filteredChoices = filteredChoices.filter(function(q) { return !choiceAnswers[q.id]; });
  else if (mode === 'wrong') filteredChoices = filteredChoices.filter(function(q) { return wrongSet[q.id]; });
  document.getElementById('choice-filter-count').textContent = '当前筛选：' + filteredChoices.length + ' 道题';
  choiceIndex = 0;
  renderChoiceQuestion();
  renderChoiceGrid();
}

function renderChoiceQuestion() {
  if (filteredChoices.length === 0) {
    document.getElementById('choice-question').textContent = '当前筛选条件下没有题目！';
    document.getElementById('choice-options').innerHTML = '';
    document.getElementById('choice-meta').textContent = '';
    document.getElementById('choice-info').textContent = '';
    document.getElementById('choice-explanation').classList.remove('show');
    return;
  }
  if (choiceIndex >= filteredChoices.length) choiceIndex = 0;
  if (choiceIndex < 0) choiceIndex = filteredChoices.length - 1;
  var q = filteredChoices[choiceIndex];
  document.getElementById('choice-meta').textContent = ('第 ' + q.id + ' 题 · ' + (q.chapter || ''));
  document.getElementById('choice-question').textContent = (choiceIndex + 1) + '. ' + q.question;
  document.getElementById('choice-info').textContent = (choiceIndex + 1) + ' / ' + filteredChoices.length;
  var optHtml = '';
  var answered = choiceAnswers[q.id];
  if (q.options) {
    q.options.forEach(function(opt) {
      var letter = opt.charAt(0);
      var cls = 'option';
      if (answered) {
        cls += ' disabled';
        if (letter === q.answer) cls += ' correct';
        if (letter === answered && letter !== q.answer) cls += ' wrong';
      }
      optHtml += '<div class="' + cls + '" onclick="answerChoice(\'' + letter + '\')" data-letter="' + letter + '">' + opt + '</div>';
    });
  }
  document.getElementById('choice-options').innerHTML = optHtml;
  var expDiv = document.getElementById('choice-explanation');
  if (answered) {
    expDiv.innerHTML = '<strong>正确答案：' + q.answer + '</strong><br>解析：' + (q.explanation || '暂无解析');
    expDiv.classList.add('show');
  } else {
    expDiv.classList.remove('show');
  }
  renderChoiceGrid();
}

function answerChoice(letter) {
  var q = filteredChoices[choiceIndex];
  if (choiceAnswers[q.id]) return;
  var isCorrect = (letter === q.answer);
  choiceAnswers[q.id] = isCorrect ? 'correct' : letter;
  if (!isCorrect) wrongSet[q.id] = true;
  saveState();
  renderChoiceQuestion();
}

function prevChoice() { if (choiceIndex > 0) { choiceIndex--; renderChoiceQuestion(); } }
function nextChoice() { if (choiceIndex < filteredChoices.length - 1) { choiceIndex++; renderChoiceQuestion(); } }

function renderChoiceGrid() {
  var html = '';
  var total = filteredChoices.length;
  var start = Math.max(0, choiceIndex - 20);
  var end = Math.min(total, choiceIndex + 21);
  if (start > 0) html += '<span>...</span>';
  for (var i = start; i < end; i++) {
    var q = filteredChoices[i];
    var cls = '';
    if (i === choiceIndex) cls = ' current';
    else if (choiceAnswers[q.id] === 'correct') cls = ' done';
    else if (choiceAnswers[q.id] && choiceAnswers[q.id] !== 'correct') cls = ' wrong-mark';
    else if (wrongSet[q.id]) cls = ' wrong-mark';
    html += '<span class="' + cls + '" onclick="choiceIndex=' + i + ';renderChoiceQuestion();">' + (i + 1) + '</span>';
  }
  if (end < total) html += '<span>...</span>';
  document.getElementById('choice-grid-nav').innerHTML = html;
}

function resetChoiceProgress() {
  var ch = document.getElementById('choice-chapter-filter').value;
  if (ch === 'all') {
    if (!confirm('确定要重置全部选择题的答题进度吗？')) return;
    choiceAnswers = {};
    wrongSet = {};
  } else {
    if (!confirm('确定要重置 "' + ch + '" 的答题进度吗？')) return;
    CHOICE_DATA.forEach(function(q) { if (q.chapter === ch) { delete choiceAnswers[q.id]; delete wrongSet[q.id]; } });
  }
  saveState();
  filterChoiceQuestions();
}

document.addEventListener('keydown', function(e) {
  if (currentPage !== 'choice') return;
  if (e.key === 'ArrowLeft' || e.key === 'a') { prevChoice(); e.preventDefault(); }
  if (e.key === 'ArrowRight' || e.key === 'd') { nextChoice(); e.preventDefault(); }
  if (e.key >= '1' && e.key <= '4') { answerChoice(['A','B','C','D'][parseInt(e.key) - 1]); }
});

// ===== 案例分析题 =====
function filterCaseQuestions() {
  var ch = document.getElementById('case-chapter-filter').value;
  filteredCases = CASE_DATA.slice();
  if (ch !== 'all') filteredCases = filteredCases.filter(function(c) { return c.chapter === ch; });
  document.getElementById('case-filter-count').textContent = '当前筛选：' + filteredCases.length + ' 道题';
  caseIndex = 0;
  renderCaseQuestion();
  renderCaseGrid();
}

function renderCaseQuestion() {
  if (filteredCases.length === 0) {
    document.getElementById('case-title').textContent = '当前筛选条件下没有题目！';
    document.getElementById('case-scenario').textContent = '';
    document.getElementById('case-questions').innerHTML = '';
    document.getElementById('case-info').textContent = '';
    return;
  }
  if (caseIndex >= filteredCases.length) caseIndex = 0;
  if (caseIndex < 0) caseIndex = filteredCases.length - 1;
  var c = filteredCases[caseIndex];
  caseViewed[c.id] = true;
  saveState();
  document.getElementById('case-title').textContent = ('案例 ' + c.id + '：' + (c.title || ''));
  document.getElementById('case-scenario').textContent = c.scenario || '';
  document.getElementById('case-info').textContent = (caseIndex + 1) + ' / ' + filteredCases.length;
  var qaHtml = '';
  if (c.questions) {
    c.questions.forEach(function(q, idx) {
      qaHtml += '<div class="case-qa">';
      qaHtml += '<div class="qa-q" onclick="toggleCaseAnswer(this)">问题' + (idx + 1) + '：' + q.question + ' <span style="color:#1a73e8;font-size:12px;">[点击展开答案]</span></div>';
      qaHtml += '<div class="qa-a">' + (q.answer || '') + '</div>';
      qaHtml += '</div>';
    });
  }
  document.getElementById('case-questions').innerHTML = qaHtml;
  renderCaseGrid();
}

function toggleCaseAnswer(el) {
  var answer = el.nextElementSibling;
  answer.classList.toggle('show');
  var hint = el.querySelector('span');
  if (hint) hint.textContent = answer.classList.contains('show') ? '[收起答案]' : '[点击展开答案]';
}

function prevCase() { if (caseIndex > 0) { caseIndex--; renderCaseQuestion(); } }
function nextCase() { if (caseIndex < filteredCases.length - 1) { caseIndex++; renderCaseQuestion(); } }

function renderCaseGrid() {
  var html = '';
  var total = filteredCases.length;
  var start = Math.max(0, caseIndex - 15);
  var end = Math.min(total, caseIndex + 16);
  if (start > 0) html += '<span>...</span>';
  for (var i = start; i < end; i++) {
    var c = filteredCases[i];
    var cls = (i === caseIndex) ? ' current' : (caseViewed[c.id] ? ' done' : '');
    html += '<span class="' + cls + '" onclick="caseIndex=' + i + ';renderCaseQuestion();">' + (i + 1) + '</span>';
  }
  if (end < total) html += '<span>...</span>';
  document.getElementById('case-grid-nav').innerHTML = html;
}

function resetCaseProgress() {
  var ch = document.getElementById('case-chapter-filter').value;
  if (ch === 'all') {
    if (!confirm('确定要重置所有案例的浏览进度吗？')) return;
    caseViewed = {};
  } else {
    if (!confirm('确定要重置 "' + ch + '" 的浏览进度吗？')) return;
    CASE_DATA.forEach(function(c) { if (c.chapter === ch) delete caseViewed[c.id]; });
  }
  saveState();
  filterCaseQuestions();
}

// ===== 模拟考试 =====
function startExam() {
  var count = parseInt(document.getElementById('exam-count').value);
  var chapter = document.getElementById('exam-chapter').value;
  var pool = CHOICE_DATA.slice();
  if (chapter !== 'all') pool = pool.filter(function(q) { return q.chapter === chapter; });
  if (pool.length < count) { alert('题目不足！可用：' + pool.length + ' 道'); return; }
  pool = pool.sort(function() { return Math.random() - 0.5; });
  examQuestions = pool.slice(0, count);
  examAnswers = new Array(count).fill(null);
  examIndex = 0;
  examSeconds = count * 60;
  document.getElementById('exam-setup-card').style.display = 'none';
  document.getElementById('exam-question-card').style.display = 'block';
  document.getElementById('exam-result-card').style.display = 'none';
  renderExamQuestion();
  startExamTimer();
}

function startExamTimer() {
  clearInterval(examTimerId);
  updateExamTimer();
  examTimerId = setInterval(function() {
    examSeconds--;
    updateExamTimer();
    if (examSeconds <= 0) submitExam();
  }, 1000);
}

function updateExamTimer() {
  var m = Math.floor(examSeconds / 60);
  var s = examSeconds % 60;
  document.getElementById('exam-timer').textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  if (examSeconds < 300) document.getElementById('exam-timer').style.color = '#c62828';
}

function renderExamQuestion() {
  if (examIndex >= examQuestions.length) examIndex = 0;
  if (examIndex < 0) examIndex = examQuestions.length - 1;
  var q = examQuestions[examIndex];
  document.getElementById('exam-meta').textContent = ('第 ' + q.id + ' 题 · ' + (q.chapter || ''));
  document.getElementById('exam-question').textContent = (examIndex + 1) + '. ' + q.question;
  document.getElementById('exam-info').textContent = (examIndex + 1) + ' / ' + examQuestions.length;
  document.getElementById('exam-progress-bar').style.width = (examIndex / examQuestions.length * 100) + '%';
  var optHtml = '';
  var answered = examAnswers[examIndex];
  if (q.options) {
    q.options.forEach(function(opt) {
      var letter = opt.charAt(0);
      var cls = 'option';
      if (answered === letter) cls += ' selected';
      optHtml += '<div class="' + cls + '" onclick="answerExam(\'' + letter + '\')" data-letter="' + letter + '">' + opt + '</div>';
    });
  }
  document.getElementById('exam-options').innerHTML = optHtml;
  renderExamGrid();
}

function answerExam(letter) { examAnswers[examIndex] = letter; renderExamQuestion(); }
function prevExamQ() { if (examIndex > 0) { examIndex--; renderExamQuestion(); } }
function nextExamQ() { if (examIndex < examQuestions.length - 1) { examIndex++; renderExamQuestion(); } }

function renderExamGrid() {
  var html = '';
  for (var i = 0; i < examQuestions.length; i++) {
    var cls = (i === examIndex) ? ' current' : (examAnswers[i] ? ' done' : '');
    html += '<span class="' + cls + '" onclick="examIndex=' + i + ';renderExamQuestion();">' + (i + 1) + '</span>';
  }
  document.getElementById('exam-grid-nav').innerHTML = html;
}

function submitExam() {
  clearInterval(examTimerId);
  var correct = 0, wrong = 0, unanswered = 0;
  examQuestions.forEach(function(q, i) {
    if (!examAnswers[i]) { unanswered++; choiceAnswers[q.id] = 'wrong'; wrongSet[q.id] = true; }
    else if (examAnswers[i] === q.answer) { correct++; choiceAnswers[q.id] = 'correct'; }
    else { wrong++; choiceAnswers[q.id] = 'wrong'; wrongSet[q.id] = true; }
  });
  saveState();
  var score = Math.round(correct / examQuestions.length * 100);
  document.getElementById('exam-question-card').style.display = 'none';
  document.getElementById('exam-result-card').style.display = 'block';
  document.getElementById('exam-score').textContent = score;
  var grade = score >= 90 ? '优秀' : score >= 75 ? '良好' : score >= 60 ? '及格' : '不及格';
  document.getElementById('exam-detail').innerHTML = grade + '<br>正确：' + correct + ' 题 | 错误：' + wrong + ' 题 | 未答：' + unanswered + ' 题';
}

function reviewExam() { switchPage('wrong'); }
function resetExam() {
  clearInterval(examTimerId);
  document.getElementById('exam-setup-card').style.display = 'block';
  document.getElementById('exam-question-card').style.display = 'none';
  document.getElementById('exam-result-card').style.display = 'none';
  examQuestions = []; examAnswers = []; examIndex = 0;
}

// ===== 错题本 =====
function renderWrongBook() {
  var wrongIds = Object.keys(wrongSet);
  document.getElementById('wrong-count').textContent = '共 ' + wrongIds.length + ' 道错题';
  document.getElementById('btn-clear-wrong').style.display = wrongIds.length > 0 ? '' : 'none';
  var html = '';
  if (wrongIds.length === 0) {
    html = '<div class="card" style="text-align:center;padding:48px;color:#999;">太棒了！没有错题！</div>';
  } else {
    wrongIds.forEach(function(id) {
      var q = CHOICE_DATA.find(function(q) { return q.id == id; });
      if (!q) return;
      html += '<div class="wrong-item">';
      html += '<div style="font-size:12px;color:#999;">第 ' + q.id + ' 题 · ' + (q.chapter || '') + '</div>';
      html += '<div style="font-weight:600;margin:8px 0;">' + q.question + '</div>';
      html += '<div style="color:#2e7d32;font-weight:600;">正确答案：' + q.answer + '</div>';
      html += '<div style="color:#666;font-size:13px;margin-top:6px;">' + (q.explanation || '') + '</div>';
      html += '<button class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="retryWrong(' + q.id + ')">重新学习</button>';
      html += '</div>';
    });
  }
  document.getElementById('wrong-list').innerHTML = html;
}

function retryWrong(qid) {
  switchPage('choice');
  document.getElementById('choice-chapter-filter').value = 'all';
  document.getElementById('choice-mode').value = 'all';
  filterChoiceQuestions();
  for (var i = 0; i < filteredChoices.length; i++) {
    if (filteredChoices[i].id == qid) {
      choiceIndex = i;
      delete choiceAnswers[qid];
      delete wrongSet[qid];
      saveState();
      renderChoiceQuestion();
      return;
    }
  }
}

function clearWrongBook() {
  if (!confirm('确定要清空所有错题记录吗？')) return;
  wrongSet = {};
  saveState();
  renderWrongBook();
}

// ===== 初始化 =====
initChapterFilters();
renderHome();
updateStats();
</script>
