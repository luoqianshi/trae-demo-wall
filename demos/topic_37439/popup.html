<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>久坐提醒控制台</title>
    <style>
      :root {
        /* Linear 设计令牌 */
        --canvas: #0a0b0d;
        --surface-1: #151719;
        --surface-2: #1a1c1f;
        --surface-3: #202327;
        --hairline: #2a2d33;
        --hairline-strong: #3a3d44;
        --ink: #f7f8f8;
        --ink-muted: #d8dde5;
        --ink-subtle: #a8aeb8;
        --ink-tertiary: #828892;
        --primary: #5e6ad2;
        --primary-hover: #828fff;
        --primary-focus: #5e69d1;
        --success: #27a644;
        --warning: #d4a72c;
        --danger: #e5484d;
        --info: #5e6ad2;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'Inter',
          -apple-system,
          'SF Pro Display',
          'Microsoft YaHei',
          system-ui,
          sans-serif;
        width: 340px;
        padding: 16px;
        background: var(--canvas);
        color: var(--ink);
        font-size: 14px;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
      }

      /* 顶部品牌行 */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
        padding: 0 2px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
        letter-spacing: -0.02em;
      }
      .brand-dot {
        width: 10px;
        height: 10px;
        border-radius: 3px;
        background: var(--primary);
        box-shadow: 0 0 0 1px rgba(94, 106, 210, 0.4);
      }
      .brand-sub {
        color: var(--ink-subtle);
        font-weight: 400;
        font-size: 12px;
      }

      /* 右上角图标按钮 */
      .icon-btn {
        flex: none;
        width: 28px;
        height: 28px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--surface-1);
        border: 1px solid var(--hairline);
        border-radius: 8px;
        color: var(--ink-subtle);
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s,
          color 0.15s;
      }
      .icon-btn:hover {
        background: var(--surface-2);
        border-color: var(--hairline-strong);
        color: var(--ink);
      }
      .icon-btn:active {
        transform: translateY(0.5px);
      }

      /* 状态卡片 —— Linear product-screenshot-card 风格 */
      .card {
        background: var(--surface-1);
        border: 1px solid var(--hairline);
        border-radius: 12px;
        padding: 18px 18px 16px;
        margin-bottom: 12px;
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.04), transparent);
      }

      .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .state-label {
        font-size: 12px;
        color: var(--ink-subtle);
        letter-spacing: 0.02em;
      }

      /* 状态徽章 —— Linear status-badge pill */
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 10px;
        border-radius: 9999px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.01em;
        background: var(--surface-2);
        color: var(--ink-muted);
        border: 1px solid var(--hairline);
      }
      .status-badge .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--ink-subtle);
      }
      .status-badge.working .dot {
        background: var(--success);
        box-shadow: 0 0 6px rgba(39, 166, 68, 0.5);
      }
      .status-badge.resting .dot {
        background: var(--primary);
        box-shadow: 0 0 6px rgba(94, 106, 210, 0.5);
      }
      .status-badge.paused .dot {
        background: var(--warning);
      }
      .status-badge.idle .dot {
        background: var(--ink-tertiary);
      }

      .state-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--ink-muted);
        margin-bottom: 6px;
      }

      .time-label {
        font-size: 12px;
        color: var(--ink-subtle);
        letter-spacing: 0.02em;
        margin-bottom: 6px;
      }

      .time-display {
        font-size: 40px;
        font-weight: 600;
        color: var(--ink);
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.04em;
        line-height: 1.1;
        margin-bottom: 14px;
      }

      /* 进度条 —— Linear hairline 风格 */
      .progress-track {
        width: 100%;
        height: 4px;
        background: var(--surface-3);
        border-radius: 9999px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: var(--primary);
        width: 0%;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 9999px;
      }
      .progress-bar.over {
        background: var(--danger);
      }

      .progress-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 8px;
        font-size: 11px;
        color: var(--ink-tertiary);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.01em;
      }
      .progress-meta-item {
        display: inline-flex;
        align-items: baseline;
        gap: 4px;
      }
      .progress-meta-label {
        color: var(--ink-tertiary);
        opacity: 0.8;
      }
      .progress-meta-item span:last-child {
        color: var(--ink-subtle);
      }

      .dismissed-tip {
        font-size: 12px;
        color: var(--ink-subtle);
        margin-top: 12px;
        text-align: center;
        line-height: 1.5;
        padding: 8px 10px;
        background: var(--surface-2);
        border: 1px solid var(--hairline);
        border-radius: 8px;
      }

      /* 统计模块 —— Linear feature-card 网格 */
      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 12px;
      }
      .stat-card {
        background: var(--surface-1);
        border: 1px solid var(--hairline);
        border-radius: 10px;
        padding: 12px 12px 11px;
      }
      .stat-icon {
        font-size: 13px;
        margin-bottom: 6px;
        opacity: 0.9;
      }
      .stat-label {
        font-size: 11px;
        color: var(--ink-subtle);
        margin-bottom: 4px;
        letter-spacing: 0.01em;
      }
      .stat-value {
        font-size: 18px;
        font-weight: 600;
        color: var(--ink);
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }
      .stat-value .unit {
        font-size: 11px;
        color: var(--ink-subtle);
        font-weight: 400;
        margin-left: 3px;
        letter-spacing: 0;
      }

      /* 控制按钮 —— Linear button 规范 */
      .controls {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      button {
        font-family: inherit;
        flex: 1;
        padding: 9px 14px;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: -0.01em;
        border: 1px solid var(--hairline);
        border-radius: 8px;
        cursor: pointer;
        background: var(--surface-1);
        color: var(--ink);
        transition:
          background 0.15s,
          border-color 0.15s,
          transform 0.05s;
      }
      button:hover {
        background: var(--surface-2);
        border-color: var(--hairline-strong);
      }
      button:active {
        transform: translateY(0.5px);
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      button:disabled:hover {
        background: var(--surface-1);
        border-color: var(--hairline);
      }

      button.primary {
        background: var(--primary);
        color: #fff;
        border-color: transparent;
      }
      button.primary:hover {
        background: var(--primary-hover);
        border-color: transparent;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>久坐提醒</span>
        <span class="brand-sub">· 控制台</span>
      </div>
      <button class="icon-btn" id="btnSettings" title="设置" aria-label="设置">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
          />
        </svg>
      </button>
    </div>

    <div class="card" id="card">
      <div class="card-head">
        <div class="state-label" id="stateLabel">当前状态</div>
        <div class="status-badge" id="statusBadge">
          <span class="dot"></span>
          <span id="stateName">—</span>
        </div>
      </div>
      <div class="time-label" id="timeLabel">久坐倒计时</div>
      <div class="time-display" id="timeDisplay">--:--</div>
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-meta">
        <span class="progress-meta-item"
          ><span class="progress-meta-label">已过</span> <span id="progressElapsed">--:--</span></span
        >
        <span class="progress-meta-item"
          ><span class="progress-meta-label">共</span> <span id="progressTotal">--:--</span></span
        >
      </div>
      <div class="dismissed-tip hidden" id="dismissedTip">忙时免打扰已开启，点击「立即重置」恢复提醒</div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-icon">☕</div>
        <div class="stat-label">今日休息</div>
        <div class="stat-value" id="restCount">0<span class="unit">次</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏱</div>
        <div class="stat-label">今日工作</div>
        <div class="stat-value" id="todayWorkTime">0<span class="unit">分钟</span></div>
      </div>
    </div>

    <div class="controls">
      <button id="btnToggle">暂停</button>
      <button id="btnReset" class="primary">立即重置</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
