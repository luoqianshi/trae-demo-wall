<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 剧本杀·无限推理</title>
<style>
/* ===== 全局重置 ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-dark: #1a1a2e;          /* 深色背景 */
  --bg-darker: #0f0f1e;        /* 更深背景 */
  --bg-card: #1e1e36;          /* 卡片背景 */
  --bg-card-hover: #25254a;    /* 卡片悬停 */
  --text-main: #e8e8f0;        /* 主文字 */
  --text-dim: #8888aa;         /* 暗淡文字 */
  --text-faded: #555577;       /* 褪色文字 */
  --accent-gold: #d4a843;      /* 金色强调 */
  --accent-red: #c0392b;       /* 血红强调 */
  --accent-blue: #4a6fa5;      /* 蓝色信息 */
  --accent-green: #2d8659;     /* 绿色成功 */
  --accent-purple: #7b4fa5;    /* 紫色线索 */
  --border: #2a2a4a;           /* 边框 */
}

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: var(--bg-dark);
  background-image:
    radial-gradient(circle at 15% 50%, rgba(123,79,165,0.08) 0%, transparent 50%),
    radial-gradient(circle at 85% 30%, rgba(192,57,43,0.06) 0%, transparent 50%);
  color: var(--text-main);
  min-height: 100vh;
  line-height: 1.7;
}

#app {
  max-width: 680px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  padding-bottom: 20px;
}

/* ===== 页面通用 ===== */
.page { display: none; }
.page.active { display: block; animation: pageIn 0.45s cubic-bezier(0.22, 1, 0.36, 1); }
@keyframes pageIn {
  from { opacity: 0; transform: translateY(16px) scale(0.99); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
/* 页面内元素逐级入场 */
.page.active .script-card,
.page.active .role-card,
.page.active .quick-ask {
  animation: itemIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) backwards;
}
.page.active .script-card:nth-child(1) { animation-delay: 0.05s; }
.page.active .script-card:nth-child(2) { animation-delay: 0.13s; }
.page.active .script-card:nth-child(3) { animation-delay: 0.21s; }
.page.active .role-card:nth-child(1) { animation-delay: 0.05s; }
.page.active .role-card:nth-child(2) { animation-delay: 0.11s; }
.page.active .role-card:nth-child(3) { animation-delay: 0.17s; }
.page.active .role-card:nth-child(4) { animation-delay: 0.23s; }
@keyframes itemIn {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== 顶部标题 ===== */
.app-header {
  text-align: center;
  padding: 40px 20px 20px;
}
.app-header h1 {
  font-size: 26px;
  letter-spacing: 4px;
  color: var(--accent-gold);
}
.app-header h1 .icon { margin-right: 8px; }
.app-header p {
  margin-top: 6px;
  font-size: 13px;
  color: var(--text-faded);
  letter-spacing: 3px;
}
.divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent-red), transparent);
  margin: 16px auto 0;
}

/* ===== 剧本选择页 ===== */
.select-page { padding: 20px; }
.section-title {
  font-size: 16px;
  color: var(--text-dim);
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.script-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.script-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--accent-red);
  opacity: 0.7;
}
.script-card:hover {
  background: var(--bg-card-hover);
  transform: translateX(4px);
  border-color: var(--accent-gold);
}
.script-card h3 {
  font-size: 18px;
  margin-bottom: 6px;
  color: var(--text-main);
}
.script-card .desc {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.6;
  margin-bottom: 12px;
}
.script-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.meta-tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--text-dim);
}
.meta-tag.diff-easy { color: var(--accent-green); border-color: var(--accent-green); }
.meta-tag.diff-hard { color: var(--accent-red); border-color: var(--accent-red); }
.meta-tag.diff-normal { color: var(--accent-gold); border-color: var(--accent-gold); }

/* ===== 角色选择页 ===== */
.role-page { padding: 20px; }
.role-list { display: flex; flex-direction: column; gap: 14px; }
.role-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.role-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--accent-gold);
}
.role-card.selected {
  border-color: var(--accent-gold);
  background: rgba(212,168,67,0.08);
}
.role-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  background: var(--bg-darker);
  border: 2px solid var(--border);
}
.role-info h4 { font-size: 16px; margin-bottom: 4px; }
.role-info p { font-size: 13px; color: var(--text-dim); line-height: 1.5; }

.start-btn {
  width: 100%;
  padding: 16px;
  background: var(--accent-red);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 3px;
  margin-top: 20px;
  transition: all 0.2s;
}
.start-btn:hover { background: #d4452e; transform: scale(1.01); }
.start-btn:disabled { background: var(--text-faded); cursor: not-allowed; transform: none; }

.back-btn {
  padding: 8px 16px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 16px;
  transition: all 0.2s;
}
.back-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

/* ===== 游戏页 ===== */
.game-page { padding: 16px 20px 90px; }

/* DM 叙述区 */
.dm-narrative {
  background: var(--bg-card);
  border-left: 3px solid var(--accent-gold);
  border-radius: 0 8px 8px 0;
  padding: 16px 18px;
  margin-bottom: 20px;
  font-size: 14px;
  line-height: 1.9;
  color: var(--text-main);
  min-height: 60px;
}
.dm-narrative .dm-label {
  font-size: 11px;
  color: var(--accent-gold);
  letter-spacing: 2px;
  margin-bottom: 6px;
  font-weight: 600;
}
.typing-cursor {
  display: inline-block;
  width: 2px; height: 16px;
  background: var(--accent-gold);
  animation: blink 0.8s infinite;
  vertical-align: middle;
}
@keyframes blink { 50% { opacity: 0; } }

/* NPC 对话区 */
.npc-section { margin-bottom: 20px; }
.npc-section h3 {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 12px;
  letter-spacing: 1px;
}
.npc-dialog {
  background: var(--bg-card);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex;
  gap: 12px;
  animation: msgIn 0.4s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.npc-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  background: var(--bg-darker);
}
.npc-bubble { flex: 1; }
.npc-bubble .npc-name { font-size: 12px; color: var(--accent-gold); margin-bottom: 2px; }
.npc-bubble .npc-text { font-size: 13px; color: var(--text-main); line-height: 1.7; }

/* 提问区 */
.ask-section { margin-bottom: 20px; }
.ask-section h3 {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 12px;
}
.quick-asks { display: flex; flex-direction: column; gap: 8px; }
.quick-ask {
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-main);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
}
.quick-ask:hover {
  border-color: var(--accent-gold);
  background: var(--bg-card-hover);
}
.quick-ask.asked { opacity: 0.4; cursor: not-allowed; }

/* ===== 游戏底部工具栏 ===== */
.game-toolbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 680px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  padding: 12px 20px;
  background: linear-gradient(to top, var(--bg-darker) 75%, rgba(15,15,30,0.6));
  border-top: 1px solid var(--border);
  z-index: 50;
}
.toolbar-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 14px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-main);
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.toolbar-btn:hover { background: var(--bg-card-hover); border-color: var(--accent-gold); }
.toolbar-btn-accuse {
  background: rgba(192,57,43,0.15);
  border-color: rgba(192,57,43,0.4);
  color: var(--accent-red);
}
.toolbar-btn-accuse:hover { background: rgba(192,57,43,0.25); border-color: var(--accent-red); }
.toolbar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.toolbar-btn:disabled:hover { background: var(--bg-card); border-color: var(--border); }
.toolbar-btn-accuse:disabled:hover { background: rgba(192,57,43,0.15); border-color: rgba(192,57,43,0.4); }
.toolbar-icon { font-size: 18px; }
.toolbar-badge {
  min-width: 20px;
  height: 20px;
  padding: 0 6px;
  background: var(--accent-purple);
  color: #fff;
  font-size: 11px;
  border-radius: 10px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
}

/* ===== 抽屉/侧边栏 ===== */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s, visibility 0.3s;
  z-index: 100;
}
.drawer-overlay.open { opacity: 1; visibility: visible; }

.drawer {
  position: fixed;
  top: 0;
  right: 0;
  width: 90%;
  max-width: 420px;
  height: 100%;
  background: var(--bg-darker);
  border-left: 1px solid var(--border);
  box-shadow: -8px 0 30px rgba(0,0,0,0.4);
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 101;
  display: flex;
  flex-direction: column;
}
.drawer.open { transform: translateX(0); }

.drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.drawer-header h3 {
  font-size: 15px;
  color: var(--text-main);
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.drawer-close {
  width: 32px;
  height: 32px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.drawer-close:hover { color: var(--accent-red); border-color: var(--accent-red); }

.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  -webkit-overflow-scrolling: touch;
}

/* 线索区（抽屉内） */
.clue-count {
  font-size: 12px;
  color: var(--accent-purple);
  background: rgba(123,79,165,0.15);
  padding: 2px 10px;
  border-radius: 10px;
}
.clue-grid { display: flex; flex-direction: column; gap: 10px; }
.clue-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent-purple);
  border-radius: 0 8px 8px 0;
  padding: 14px 16px;
  cursor: pointer;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
  animation: clueIn 0.5s ease;
}
@keyframes clueIn {
  from { opacity: 0; transform: scale(0.95) translateX(-10px); }
  to { opacity: 1; transform: scale(1) translateX(0); }
}
.clue-card:hover { background: var(--bg-card-hover); border-left-color: #9b6fc5; }
.clue-card:active { transform: scale(0.99); }
.clue-card .clue-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.clue-card .clue-title {
  font-size: 14px;
  color: var(--accent-purple);
  margin-bottom: 0;
  font-weight: 600;
}
.clue-card .clue-chevron {
  font-size: 11px;
  color: var(--text-faded);
  transition: transform 0.3s ease;
  flex-shrink: 0;
}
.clue-card.expanded .clue-chevron { transform: rotate(180deg); color: var(--accent-purple); }
.clue-card .clue-detail {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.6;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  margin-top: 0;
  padding-top: 0;
  border-top: 1px dashed transparent;
  transition: max-height 0.35s ease, opacity 0.3s ease 0.05s, margin-top 0.3s ease, padding-top 0.3s ease, border-color 0.3s ease;
}
.clue-card.expanded .clue-detail {
  max-height: 300px;
  opacity: 1;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
}

/* 推理指控区（抽屉内） */
.accuse-progress {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 18px;
  padding: 10px 14px;
  background: rgba(192,57,43,0.06);
  border-radius: 8px;
  border: 1px solid rgba(192,57,43,0.15);
}
.accuse-progress-dots { display: flex; gap: 6px; }
.accuse-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--border);
  transition: all 0.3s ease;
}
.accuse-dot.filled {
  background: var(--accent-red);
  box-shadow: 0 0 8px rgba(192,57,43,0.5);
  animation: dotPop 0.4s ease;
}
@keyframes dotPop {
  0% { transform: scale(0.5); }
  60% { transform: scale(1.3); }
  100% { transform: scale(1); }
}
.accuse-progress-text { font-size: 12px; color: var(--text-dim); margin-left: auto; }

.accuse-group { margin-bottom: 18px; }
.accuse-group label {
  display: block;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.accuse-options { display: flex; flex-wrap: wrap; gap: 8px; }
.accuse-opt {
  padding: 8px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-main);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.accuse-opt:hover { border-color: var(--accent-red); transform: translateY(-1px); }
.accuse-opt:active { transform: scale(0.97); }
.accuse-opt.selected {
  background: var(--accent-red);
  color: #fff;
  border-color: var(--accent-red);
  animation: optSelect 0.35s ease;
}
@keyframes optSelect {
  0% { transform: scale(0.92); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
.accuse-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent-red);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 2px;
  margin-top: 16px;
  transition: all 0.2s;
}
.accuse-btn:hover { background: #d4452e; }
.accuse-btn:active { transform: scale(0.98); }
.accuse-btn:disabled { background: var(--text-faded); cursor: not-allowed; }
.accuse-btn:not(:disabled) { animation: btnPulse 2s ease-in-out infinite; }
@keyframes btnPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(192,57,43,0); }
}

.accuse-tip {
  font-size: 12px;
  color: var(--text-faded);
  text-align: center;
  margin-bottom: 16px;
  padding: 10px;
  background: rgba(212,168,67,0.06);
  border-radius: 6px;
  border: 1px dashed rgba(212,168,67,0.2);
}

/* ===== 结果页 ===== */
.result-page { padding: 30px 20px; text-align: center; }
.result-icon { font-size: 64px; margin-bottom: 16px; animation: popIn 0.6s ease; }
@keyframes popIn {
  from { opacity: 0; transform: scale(0.3); }
  to { opacity: 1; transform: scale(1); }
}
.result-title { font-size: 28px; margin-bottom: 8px; animation: titleIn 0.5s ease 0.2s backwards; }
@keyframes titleIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.result-title.win { color: var(--accent-green); }
.result-title.lose { color: var(--accent-red); }
.result-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; animation: titleIn 0.5s ease 0.35s backwards; }

.truth-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  text-align: left;
  margin-bottom: 20px;
  animation: titleIn 0.5s ease 0.5s backwards;
}
.truth-box h4 {
  font-size: 14px;
  color: var(--accent-gold);
  margin-bottom: 12px;
  letter-spacing: 2px;
  text-align: center;
}
.truth-box p { font-size: 13px; color: var(--text-main); line-height: 1.9; margin-bottom: 8px; }
.truth-box .truth-highlight { color: var(--accent-red); font-weight: 600; }

.replay-btn {
  padding: 14px 40px;
  background: var(--accent-gold);
  color: var(--bg-dark);
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 2px;
  font-weight: 600;
  transition: all 0.2s;
}
.replay-btn:hover { transform: scale(1.03); }

/* ===== 搜索框 ===== */
.search-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}
.search-box:focus-within { border-color: var(--accent-gold); }
.search-icon { font-size: 16px; flex-shrink: 0; }
.search-box input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text-main);
  font-family: inherit;
  font-size: 14px;
}
.search-box input::placeholder { color: var(--text-faded); }
.search-clear {
  width: 22px; height: 22px;
  background: var(--bg-darker);
  border: none;
  border-radius: 50%;
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.search-clear:hover { color: var(--accent-red); }

/* ===== 分类筛选 ===== */
.category-bar {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 12px;
  margin-bottom: 8px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.category-bar::-webkit-scrollbar { display: none; }
.cat-tag {
  padding: 7px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.cat-tag:hover { border-color: var(--accent-gold); color: var(--text-main); }
.cat-tag.active {
  background: var(--accent-gold);
  color: var(--bg-dark);
  border-color: var(--accent-gold);
  font-weight: 600;
}

/* ===== 空结果 ===== */
.empty-result {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-faded);
}
.empty-result p { font-size: 15px; margin-top: 12px; }
.empty-result .empty-sub { font-size: 12px; margin-top: 4px; }

/* ===== 剧本卡片（动态渲染） ===== */
.script-card-new {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  animation: itemIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) backwards;
}
.script-card-new::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--accent-red);
  opacity: 0.7;
}
.script-card-new:hover {
  background: var(--bg-card-hover);
  transform: translateX(4px);
  border-color: var(--accent-gold);
}
.script-card-new .card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.script-card-new .card-cover { font-size: 22px; }
.script-card-new h3 { font-size: 18px; color: var(--text-main); }
.script-card-new .card-cat {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(212,168,67,0.12);
  color: var(--accent-gold);
  border: 1px solid rgba(212,168,67,0.25);
  margin-left: auto;
  flex-shrink: 0;
}
.script-card-new .desc {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.6;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ===== 响应式 ===== */
@media (max-width: 500px) {
  .app-header { padding: 28px 16px 16px; }
  .app-header h1 { font-size: 20px; letter-spacing: 2px; }
  .select-page, .role-page { padding: 16px; }
  .script-card { padding: 16px; }
  .script-card h3 { font-size: 16px; }
  .script-card .desc { font-size: 12px; }
  .role-card { padding: 14px; }
  .role-avatar { width: 42px; height: 42px; font-size: 20px; }
  .role-info h4 { font-size: 15px; }
  .role-info p { font-size: 12px; }
  .game-page { padding: 14px 16px 90px; }
  .dm-narrative { padding: 14px; font-size: 13px; }
  .quick-ask { padding: 11px 14px; font-size: 12px; }
  .toolbar-btn { font-size: 13px; padding: 12px 8px; }
  .toolbar-icon { font-size: 16px; }
  .drawer { width: 100%; max-width: 100%; }
  .drawer-body { padding: 16px; }
  .result-page { padding: 24px 16px; }
  .result-icon { font-size: 52px; }
  .result-title { font-size: 24px; }
  .truth-box { padding: 16px; }
  .accuse-opt { padding: 7px 12px; font-size: 12px; }
  .start-btn { padding: 14px; font-size: 15px; }
}

@media (max-width: 380px) {
  .app-header h1 { font-size: 18px; letter-spacing: 1px; }
  .meta-tag { font-size: 10px; padding: 2px 8px; }
  .toolbar-btn { font-size: 12px; gap: 4px; }
}

/* 安全区域适配（刘海屏 / 底部横条） */
@supports (padding: env(safe-area-inset-bottom)) {
  .game-toolbar {
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
  }
  .drawer-body {
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
  }
}

/* 减少动画偏好（无障碍） */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<div id="app">
  <!-- ===== 剧本选择页 ===== -->
  <div class="page select-page active" id="page-select">
    <div class="app-header">
      <h1><span class="icon">🔍</span>AI 剧本杀·无限推理</h1>
      <p>每 次 都 是 全 新 剧 本</p>
      <div class="divider"></div>
    </div>

    <p class="section-title">选择一个剧本主题</p>

    <!-- 搜索框 -->
    <div class="search-box">
      <span class="search-icon">🔎</span>

      <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none;">✕</button>
    </div>

    <!-- 分类筛选 -->
    <div class="category-bar" id="categoryBar"></div>

    <!-- 剧本列表 -->
    <div id="scriptList"></div>

    <!-- 空结果提示 -->

  <!-- ===== 角色选择页 ===== -->
  <div class="page role-page" id="page-role">
    <button class="back-btn" onclick="showPage('select')">← 返回剧本选择</button>
    <p class="section-title" id="roleTitle">选择你的角色</p>
    <div class="role-list" id="roleList"></div>
    <button class="start-btn" id="startGameBtn" disabled onclick="startGame()">开始调查</button>
  </div>

  <!-- ===== 游戏页 ===== -->
  <div class="page game-page" id="page-game">
    <button class="back-btn" onclick="if(confirm('确定要退出本局吗？')) showPage('select')">← 退出本局</button>

    <!-- DM 叙述 -->
    <div class="dm-narrative" id="dmNarrative">
      <div class="dm-label">📋 DM 主持人</div>
      <div id="dmText"></div>
    </div>

    <!-- NPC 对话区 -->
    <div class="npc-section" id="npcSection" style="display:none;">
      <h3>💬 回应</h3>
      <div id="npcDialogs"></div>
    </div>

    <!-- 提问区 -->
    <div class="ask-section" id="askSection">
      <h3>❓ 向嫌疑人提问</h3>
      <div class="quick-asks" id="quickAsks"></div>
    </div>

    <!-- 底部工具栏 -->
    <div class="game-toolbar" id="gameToolbar">
      <button class="toolbar-btn" onclick="openDrawer('clue')">
        <span class="toolbar-icon">🔍</span>
        <span>线索</span>
        <span class="toolbar-badge" id="toolbarClueCount">0</span>
      </button>
      <button class="toolbar-btn toolbar-btn-accuse" id="toolbarAccuseBtn" disabled onclick="openDrawer('accuse')">
        <span class="toolbar-icon">⚖️</span>
        <span>最终推理</span>
      </button>
    </div>
  </div>

  <!-- ===== 结果页 ===== -->
  <div class="page result-page" id="page-result">
    <div class="result-icon" id="resultIcon"></div>
    <h2 class="result-title" id="resultTitle"></h2>
    <p class="result-sub" id="resultSub"></p>
    <div class="truth-box" id="truthBox"></div>
    <button class="replay-btn" onclick="showPage('select')">再玩一局</button>
  </div>
</div>

<!-- ===== 抽屉遮罩 ===== -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- ===== 线索抽屉 ===== -->
<div class="drawer" id="clueDrawer">
  <div class="drawer-header">
    <h3>🔍 已收集线索 <span class="clue-count" id="clueCount">0 条</span></h3>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body">
    <div class="clue-grid" id="clueGrid">

    </div>
  </div>
</div>

<!-- ===== 推理抽屉 ===== -->
<div class="drawer" id="accuseDrawer">
  <div class="drawer-header">
    <h3>⚖️ 最终推理 · 指认真凶</h3>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>

    <div class="accuse-group">
      <label>作案手法？</label>
      <div class="accuse-options" id="methodOpts"></div>
    </div>
    <div class="accuse-group">
      <label>杀人动机？</label>
      <div class="accuse-options" id="motiveOpts"></div>
    </div>
    <button class="accuse-btn" id="accuseBtn" disabled onclick="makeAccusation()">提交推理</button>
  </div>
</div>

<script>
/* ===== 剧本数据 ===== */
const scripts = [
  {

    intro: '凌晨2:17，城市博物馆的安保系统突然瘫痪。当保安赶到时，馆长陈守一倒在了古埃及展厅的法老金面具展柜旁，已经没有了呼吸。他的手上沾着蓝色的化学试剂，展柜的金面具不翼而飞。警方封锁了现场，发现有四个人在深夜仍有进入博物馆的钥匙和理由。你是受警方邀请的推理顾问，需要在天亮前找出真凶。',

      { name: '王保安', avatar: '💂', bio: '值班保安，当晚负责巡逻。发现尸体后第一个报了警。' },

      { name: '赵策展', avatar: '👩', bio: '展览策划师，正在筹备新展览。与馆长在经费问题上曾有争执。' }
    ],
    questions: [

      { q: '你有没有接触过蓝色化学试剂？', target: 0 },
      { q: '安保系统瘫痪前后你在哪里？', target: 1 },

    answers: [

      { text: '我...我大概晚上10点来的，馆长让我整理下周展览的文档。我一直在办公室，没去过古埃及展厅。蓝色试剂？那是用来清洁展柜的，我平时会接触到，但今晚绝对没用过。', clues: [{ title: '李助理的时间线', detail: '自称10点到馆，一直在办公室。但监控显示11:30他曾离开办公室方向。' }] },

      { text: '法老面具？那是纯金的，公元前1300年的文物，价值连城。我的研究进展...一切正常。今晚我在实验室分析样本，没去过展厅。不过，馆长最近不太让我碰面具了，说是有新安排。', clues: [{ title: '学者的异常', detail: '馆长最近不让张学者碰面具，暗示有"新安排"。学者是否心怀不满？' }] },

/* ===== 状态管理 ===== */
let currentScript = null;
let selectedRole = -1;
let askedQuestions = new Set();
let collectedClues = [];
let accuseSelections = { killer: -1, method: -1, motive: -1 };
let activeCategory = '全部';
let searchKeyword = '';

/* ===== 分类配置 ===== */
const categoryConfig = {
  '全部': '🏷️',
  '密室推理': '🔐',
  '现代悬疑': '🏙️',
  '古风武侠': '🏯',
  '科幻未来': '🚀',
  '恐怖灵异': '👻'
};

/* ===== 初始化剧本选择页 ===== */
function initSelectPage() {
  // 渲染分类标签
  const catBar = document.getElementById('categoryBar');
  catBar.innerHTML = '';
  Object.keys(categoryConfig).forEach(cat => {
    const tag = document.createElement('button');
    tag.className = 'cat-tag' + (cat === activeCategory ? ' active' : '');
    tag.textContent = categoryConfig[cat] + ' ' + cat;
    tag.onclick = () => {
      activeCategory = cat;
      document.querySelectorAll('.cat-tag').forEach(t => t.classList.remove('active'));
      tag.classList.add('active');
      filterScripts();
    };
    catBar.appendChild(tag);
  });
  filterScripts();
}

/* ===== 筛选与搜索 ===== */
function filterScripts() {
  const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
  searchKeyword = keyword;
  document.getElementById('searchClear').style.display = keyword ? 'flex' : 'none';

  const list = document.getElementById('scriptList');
  list.innerHTML = '';

  let filtered = scripts.map((s, i) => ({ script: s, index: i })).filter(item => {
    const s = item.script;
    // 分类筛选
    if (activeCategory !== '全部' && s.category !== activeCategory) return false;
    // 关键词搜索
    if (keyword) {
      const haystack = (s.title + ' ' + s.intro + ' ' + s.category + ' ' + s.suspects.map(p => p.name + ' ' + p.bio).join(' ')).toLowerCase();
      if (!haystack.includes(keyword)) return false;
    }
    return true;
  });

  // 空结果提示
  document.getElementById('emptyResult').style.display = filtered.length === 0 ? 'block' : 'none';

  // 渲染卡片
  filtered.forEach((item, displayIdx) => {
    const s = item.script;
    const card = document.createElement('div');
    card.className = 'script-card-new';
    card.style.animationDelay = (displayIdx * 0.06) + 's';
    card.onclick = () => selectScript(item.index);

    // 根据嫌疑人数量推断难度
    const suspectCount = s.suspects.length;
    const diffTag = suspectCount <= 4
      ? '<span class="meta-tag diff-easy">🌟 入门难度</span>'
      : suspectCount === 5
      ? '<span class="meta-tag diff-normal">⭐ 中等难度</span>'
      : '<span class="meta-tag diff-hard">🔥 高难度</span>';

    card.innerHTML = `
      <div class="card-header">
        <span class="card-cover">${s.cover || '🎭'}</span>
        <h3>${s.title}</h3>
        <span class="card-cat">${s.category}</span>
      </div>
      <p class="desc">${s.intro}</p>
      <div class="script-meta">
        ${diffTag}
        <span class="meta-tag">👥 ${suspectCount}名嫌疑人</span>
      </div>
    `;
    list.appendChild(card);
  });
}

/* ===== 清除搜索 ===== */
function clearSearch() {
  document.getElementById('searchInput').value = '';
  filterScripts();
}

/* ===== 选择剧本 ===== */
function selectScript(idx) {
  currentScript = scripts[idx];
  selectedRole = -1;
  document.getElementById('roleTitle').textContent = '《' + currentScript.title + '》— 选择你的角色';

  // 生成角色列表（在嫌疑人基础上加一个"侦探"角色）
  const roleList = document.getElementById('roleList');
  roleList.innerHTML = '';
  currentScript.suspects.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'role-card';
    card.onclick = () => selectRole(i, card);
    card.innerHTML = `
      <div class="role-avatar">${s.avatar}</div>
      <div class="role-info">
        <h4>${s.name}</h4>
        <p>${s.bio}</p>
      </div>
    `;
    roleList.appendChild(card);
  });

  showPage('role');
}

/* ===== 选择角色 ===== */
function selectRole(idx, cardEl) {
  selectedRole = idx;
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');
  document.getElementById('startGameBtn').disabled = false;
}

/* ===== 开始游戏 ===== */

  setTimeout(() => {
    typeText(currentScript.intro, 'dmText', () => {
      // 叙述完成后，自动添加3条初始线索，并解锁推理按钮
      setTimeout(() => {
        currentScript.clues.forEach(clue => addClue(clue));
        document.getElementById('toolbarAccuseBtn').disabled = false;
        renderAccuseOptions();
      }, 500);
    });
  }, 300);
}

/* ===== 打字机效果 ===== */
function typeText(text, elId, callback) {
  const el = document.getElementById(elId);
  el.innerHTML = '<span class="typing-cursor"></span>';
  const cursor = el.querySelector('.typing-cursor');
  let i = 0;
  const speed = 30;
  const timer = setInterval(() => {
    if (i < text.length) {
      cursor.insertAdjacentText('beforebegin', text[i]);
      i++;
      // 滚动到底
      const gamePage = document.getElementById('page-game');
      gamePage.scrollTop = gamePage.scrollHeight;
    } else {
      clearInterval(timer);
      cursor.remove();
      if (callback) callback();
    }
  }, speed);
}

/* ===== 提问 ===== */
function askQuestion(qIdx, btn) {
  if (askedQuestions.has(qIdx)) return;
  askedQuestions.add(qIdx);
  btn.classList.add('asked');

  const q = currentScript.questions[qIdx];
  const answer = currentScript.answers[qIdx];
  const suspect = currentScript.suspects[q.target];

  // 显示NPC回答
  document.getElementById('npcSection').style.display = 'block';
  const dialogs = document.getElementById('npcDialogs');
  const dialog = document.createElement('div');
  dialog.className = 'npc-dialog';
  dialog.innerHTML = `
    <div class="npc-avatar">${suspect.avatar}</div>
    <div class="npc-bubble">
      <div class="npc-name">${suspect.name}</div>
      <div class="npc-text"></div>
    </div>
  `;
  dialogs.appendChild(dialog);
  const textEl = dialog.querySelector('.npc-text');

  // 打字机效果显示回答
  let i = 0;
  const timer = setInterval(() => {
    if (i < answer.text.length) {
      textEl.textContent += answer.text[i];
      i++;
    } else {
      clearInterval(timer);
      // 添加线索
      if (answer.clues) {
        answer.clues.forEach(clue => addClue(clue));
      }
    }
  }, 25);

  // 滚动到回答
  setTimeout(() => {
    dialog.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

/* ===== 添加线索 ===== */
function addClue(clue) {
  // 去重
  if (collectedClues.some(c => c.title === clue.title)) return;
  collectedClues.push(clue);

  const grid = document.getElementById('clueGrid');
  // 清空"尚无线索"提示
  if (grid.querySelector('p')) grid.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'clue-card';
  card.onclick = () => card.classList.toggle('expanded');
  card.innerHTML = `
    <div class="clue-title-row">
      <div class="clue-title">📌 ${clue.title}</div>
      <span class="clue-chevron">▼</span>
    </div>
    <div class="clue-detail">${clue.detail}</div>
  `;
  grid.appendChild(card);

  document.getElementById('clueCount').textContent = collectedClues.length + ' 条';
  document.getElementById('toolbarClueCount').textContent = collectedClues.length;
}

/* ===== 渲染推理选项 ===== */
function renderAccuseOptions() {
  const opts = currentScript.accuseOptions;
  const groups = [
    { id: 'killerOpts', key: 'killer', options: opts.killers },
    { id: 'methodOpts', key: 'method', options: opts.methods },
    { id: 'motiveOpts', key: 'motive', options: opts.motives }
  ];

  groups.forEach(g => {
    const container = document.getElementById(g.id);
    container.innerHTML = '';
    g.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'accuse-opt';
      btn.textContent = opt;
      btn.onclick = () => {
        container.querySelectorAll('.accuse-opt').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        accuseSelections[g.key] = i;
        checkAccuseReady();
      };
      container.appendChild(btn);
    });
  });
}

/* ===== 检查是否可以提交推理 ===== */
function checkAccuseReady() {
  const keys = ['killer', 'method', 'motive'];
  let filledCount = 0;
  keys.forEach(k => {
    const dot = document.getElementById('dot-' + k);
    if (accuseSelections[k] >= 0) {
      dot.classList.add('filled');
      filledCount++;
    } else {
      dot.classList.remove('filled');
    }
  });
  document.getElementById('accuseProgressText').textContent = filledCount + '/3 已选择';
  const ready = filledCount === 3;
  document.getElementById('accuseBtn').disabled = !ready;
}

/* ===== 提交推理 ===== */
function makeAccusation() {
  closeDrawer();

  const truth = currentScript.truth;
  const opts = currentScript.accuseOptions;

  const killerCorrect = opts.killers[accuseSelections.killer] === opts.killers[truth.killer];
  const methodCorrect = opts.methods[accuseSelections.method] === truth.method || accuseSelections.method === opts.methods.indexOf(opts.methods.find(m => m.includes(truth.method.substring(0,4))));
  const motiveCorrect = opts.motives[accuseSelections.motive] === truth.motive || accuseSelections.motive === opts.motives.indexOf(opts.motives.find(m => m.includes(truth.motive.substring(0,4))));

  // 简化判定：凶手选对即胜利，三项全对为完美推理
  const allCorrect = killerCorrect && methodCorrect && motiveCorrect;

  document.getElementById('resultIcon').textContent = killerCorrect ? '🎯' : '❌';
  const titleEl = document.getElementById('resultTitle');
  titleEl.textContent = killerCorrect ? (allCorrect ? '完美推理！' : '推理成功！') : '推理失败';
  titleEl.className = 'result-title ' + (killerCorrect ? 'win' : 'lose');

  document.getElementById('resultSub').textContent = killerCorrect
    ? (allCorrect ? '凶手、手法、动机全部正确！你是天生的侦探。' : '你找到了真凶，但部分推理有误。')
    : '真凶另有其人。看看真相是什么...';

  // 真相揭示
  const truthBox = document.getElementById('truthBox');
  truthBox.innerHTML = `
    <h4>📜 案件真相</h4>
    <p><span class="truth-highlight">真凶：</span>${currentScript.suspects[truth.killer].name}</p>
    <p><span class="truth-highlight">手法：</span>${truth.method}</p>
    <p><span class="truth-highlight">动机：</span>${truth.motive}</p>
    <p style="margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);">${truth.explain}</p>
  `;

  showPage('result');
}

/* ===== 抽屉开关 ===== */
function openDrawer(name) {
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById(name === 'clue' ? 'clueDrawer' : 'accuseDrawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
  document.body.style.overflow = '';
}

/* ===== 页面切换 ===== */
function showPage(pageName) {
  closeDrawer();
  const pageMap = { select: 'page-select', role: 'page-role', game: 'page-game', result: 'page-result' };
  const oldPage = document.querySelector('.page.active');
  const newPage = document.getElementById(pageMap[pageName]);

  if (oldPage && oldPage !== newPage) {
    oldPage.classList.remove('active');
    // 短暂延迟后显示新页面，让退出动画感知更自然
    setTimeout(() => {
      newPage.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      // 返回选择页时刷新列表
      if (pageName === 'select') filterScripts();
    }, 80);
  } else {
    newPage.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

/* ===== 页面加载初始化 ===== */
initSelectPage();
</script>
