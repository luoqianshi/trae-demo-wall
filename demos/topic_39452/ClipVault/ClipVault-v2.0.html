    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.2rem 0.5rem;
    background: var(--bg3);
    border-radius: 4px;
    font-size: 0.7rem;
    color: var(--ink);
  }
  .tag-editor .te-tag .te-del {
    cursor: pointer;
    color: var(--muted);
    font-size: 0.65rem;
    margin-left: 0.15rem;
  }
  .tag-editor .te-tag .te-del:hover { color: var(--danger); }
  .tag-editor .te-input {
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 0.72rem;
    outline: none;
    min-width: 60px;
    font-family: inherit;
  }

  /* Folder selector in modal */
  .folder-selector {
    margin-top: 0.75rem;
    padding: 0.75rem;
    background: var(--bg2);
    border-radius: 8px;
    border: 1px solid var(--rule);
  }
  .folder-selector-title { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.4rem; }
  .folder-selector .fs-folder {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.25rem 0.5rem;
    margin: 0.15rem;
    border: 1px solid var(--rule);
    border-radius: 4px;
    background: var(--card-bg);
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.1s;
  }
  .folder-selector .fs-folder:hover { border-color: var(--accent); }
  .folder-selector .fs-folder.active { border-color: var(--accent); background: rgba(6,214,160,0.1); }

  /* QR code modal */
  .qr-container {
    text-align: center;
    padding: 1rem;
  }
  .qr-container img { max-width: 200px; border-radius: 8px; }
  .qr-container .qr-url {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.5rem;
    word-break: break-all;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 1.5rem; right: 1.5rem;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    background: var(--card-bg);
    border: 1px solid var(--accent);
    color: var(--ink);
    font-size: 0.82rem;
    z-index: 2000;
    box-shadow: 0 4px 20px var(--shadow);
    animation: toastIn 0.25s ease-out;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .toast.hide { animation: toastOut 0.2s ease-in forwards; }
  @keyframes toastOut { to { opacity:0; transform:translateY(10px); } }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed; left: -260px; top: 0; bottom: 0; z-index: 200;
      transition: left 0.3s;
      box-shadow: 4px 0 20px var(--shadow);
    }
    .sidebar.open { left: 0; }
    .sidebar-close { display: flex; }
    .menu-toggle { display: flex; }
    .topbar { padding: 0.6rem 1rem; }
    .content { padding: 0.75rem 1rem; }
    .grid { grid-template-columns: 1fr; }
    .stats-row { gap: 0.75rem; }
  }
</style>
</head>
<body>

<div class="app" id="app">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon">&#128203;</div>
        <div>
          <h1>Clip<span>Vault</span> <span class="ver">v2.0</span></h1>
        </div>
      </div>
      <button class="sidebar-close" onclick="closeSidebar()">&#10005;</button>
    </div>

    <nav class="sidebar-nav" id="sidebarNav">
      <div class="sidebar-section-title">导航</div>
      <div class="nav-item active" data-view="all" onclick="setView('all',this)">
        &#128194; 全部记录 <span class="nav-count" id="navAllCount">0</span>
      </div>
      <div class="nav-item" data-view="pinned" onclick="setView('pinned',this)">
        &#128204; 已固定 <span class="nav-count" id="navPinnedCount">0</span>
      </div>
      <div class="nav-item" data-view="unfiled" onclick="setView('unfiled',this)">
        &#128203; 未归档 <span class="nav-count" id="navUnfiledCount">0</span>
      </div>

      <div class="sidebar-section-title" style="margin-top:0.5rem;">&#128193; 收藏夹</div>
      <div id="folderList"></div>
      <div class="folder-add" id="folderAddBtn" onclick="startAddFolder()">
        <span style="font-size:1rem;">+</span> 新建收藏夹
      </div>

      <div class="sidebar-section-title" style="margin-top:0.5rem;">&#127991; 标签</div>

  </aside>

  <!-- ===== MAIN ===== -->
  <div class="main">

    <!-- Top bar -->
    <div class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">&#9776;</button>

      <div class="topbar-search">
        <span class="s-icon">&#128269;</span>

      </div>

      <div class="topbar-actions">
        <button class="topbar-btn" onclick="clearAll()" title="清空全部">&#128465;</button>
        <button class="topbar-btn" onclick="exportData()" title="导出数据">&#128230; 导出</button>
        <button class="topbar-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题">&#127769;</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-item">总计 <span class="stat-val green" id="statTotal">0</span></div>
      <div class="stat-item">文字 <span class="stat-val" id="statText">0</span></div>
      <div class="stat-item">图片 <span class="stat-val" id="statImage">0</span></div>
      <div class="stat-item">富文本 <span class="stat-val" id="statRich">0</span></div>
      <div class="stat-item">代码 <span class="stat-val" id="statCode">0</span></div>
      <div class="stat-item">链接 <span class="stat-val" id="statLink">0</span></div>
    </div>

    <!-- Content -->
    <div class="content" id="content">

      <!-- Paste zone -->
      <div class="paste-zone" id="pasteZone"
           tabindex="0"
           ondragover="handleDragOver(event)"
           ondragleave="handleDragLeave(event)"
           ondrop="handleDrop(event)"
           onclick="focusPaste()">
        <span class="pz-icon">&#128203;</span>
        <h2>在此处粘贴内容</h2>
        <p>
          按 <span class="sc">Ctrl</span> + <span class="sc">V</span> 粘贴
          &nbsp;|&nbsp; 拖拽图片/文件到此处
          &nbsp;|&nbsp; 点击后粘贴
        </p>
      </div>

      <!-- Filter tabs -->
      <div class="filter-bar" id="filterBar">
        <button class="filter-tab active" data-t="all" onclick="setTypeFilter('all',this)">全部</button>
        <button class="filter-tab" data-t="text" onclick="setTypeFilter('text',this)">文字</button>
        <button class="filter-tab" data-t="image" onclick="setTypeFilter('image',this)">图片</button>
        <button class="filter-tab" data-t="rich" onclick="setTypeFilter('rich',this)">富文本</button>
        <button class="filter-tab" data-t="code" onclick="setTypeFilter('code',this)">代码</button>
        <button class="filter-tab" data-t="link" onclick="setTypeFilter('link',this)">链接</button>
      </div>

      <div style="font-size:0.75rem;color:var(--muted);margin-bottom:0.75rem;" id="resultInfo"></div>

      <!-- Grid -->
      <div class="grid" id="grid"></div>

      <!-- Empty -->
      <div class="empty" id="empty" style="display:none;">
        <div class="empty-icon">&#128194;</div>
        <h3>这里还没有内容</h3>
        <p>复制或粘贴任何文字、图片、代码、链接到这里，它们会被安全保存</p>
      </div>
    </div>
  </div>
</div>

<!-- Hidden textarea -->
<textarea id="hiddenPaste" style="position:fixed;left:-9999px;top:-9999px;opacity:0;" tabindex="-1"></textarea>

<script>
'use strict';

/* ============================================================
   STATE
   ============================================================ */
let items = JSON.parse(localStorage.getItem('cv2_items') || '[]');
let folders = JSON.parse(localStorage.getItem('cv2_folders') || '[]');
let tags = JSON.parse(localStorage.getItem('cv2_tags') || '[]');
let settings = JSON.parse(localStorage.getItem('cv2_settings') || '{}');

let currentView = 'all';          // all | pinned | unfiled | folder:xxx
let currentTypeFilter = 'all';    // all | text | image | rich | code | link
let selectedTag = null;           // tag name or null
let folderIdCounter = Math.max(0, ...folders.map(f => parseInt(f.id.replace('f','')) || 0)) + 1;

/* Default settings */
if (!settings.theme) settings.theme = 'dark';
applyTheme(settings.theme);

/* ============================================================
   DATA HELPERS
   ============================================================ */
function saveItems() {
  localStorage.setItem('cv2_items', JSON.stringify(items));
}

function saveFolders() {
  localStorage.setItem('cv2_folders', JSON.stringify(folders));
}

function saveTags() {
  localStorage.setItem('cv2_tags', JSON.stringify(tags));
}

function saveSettings() {
  localStorage.setItem('cv2_settings', JSON.stringify(settings));
}

/* ============================================================
   THEME
   ============================================================ */
function toggleTheme() {
  if (settings.theme === 'dark') {
    settings.theme = 'light';
  } else if (settings.theme === 'light') {
    settings.theme = 'dark';
  }
  applyTheme(settings.theme);
  saveSettings();
  document.getElementById('themeBtn').textContent = settings.theme === 'dark' ? '\u{1F319}' : '\u{2600}\uFE0F';
}

function applyTheme(t) {
  if (t === 'dark') {
    document.body.classList.add('theme-dark');
  } else {
    document.body.classList.remove('theme-dark');
  }
  document.getElementById('themeBtn').textContent = t === 'dark' ? '\u{1F319}' : '\u{2600}\uFE0F';
}

/* ============================================================
   FOLDERS
   ============================================================ */
function addFolder(name, parentId) {
  if (!name || !name.trim()) return;
  const f = {
    id: 'f' + (folderIdCounter++),
    name: name.trim(),
    parentId: parentId || null,
    color: '#' + Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0'),
    order: folders.length
  };
  folders.push(f);
  saveFolders();
  renderSidebar();
  showToast('已创建收藏夹');
}

function renameFolder(id) {
  const f = folders.find(x => x.id === id);
  if (!f) return;
  const name = prompt('重命名收藏夹：', f.name);
  if (name && name.trim()) {
    f.name = name.trim();
    saveFolders();
    renderSidebar();
  }
}

function deleteFolder(id) {
  if (!confirm('确定删除此收藏夹？其中的剪贴板记录不会被删除。')) return;
  folders = folders.filter(x => x.id !== id);
  saveFolders();
  // Remove folder refs from items
  items.forEach(item => {
    item.folderIds = (item.folderIds || []).filter(fid => fid !== id);
  });
  saveItems();
  if (currentView === 'folder:' + id) { currentView = 'all'; }
  render();
}

function startAddFolder() {
  const div = document.getElementById('folderAddBtn');
  div.innerHTML = '<input class="folder-add-input" id="folderNewInput" placeholder="输入收藏夹名称..." autofocus>';
  const inp = document.getElementById('folderNewInput');
  inp.focus();
  inp.onkeydown = function(e) {
    if (e.key === 'Enter') {
      addFolder(inp.value);
      div.innerHTML = '<span style="font-size:1rem;">+</span> 新建收藏夹';
    } else if (e.key === 'Escape') {
      div.innerHTML = '<span style="font-size:1rem;">+</span> 新建收藏夹';
    }
  };
  inp.onblur = function() {
    setTimeout(function() {
      div.innerHTML = '<span style="font-size:1rem;">+</span> 新建收藏夹';
    }, 200);
  };
}

function moveItemToFolder(itemId, folderId) {
  const item = items.find(x => x.id === itemId);
  if (!item) return;
  if (!item.folderIds) item.folderIds = [];
  const idx = item.folderIds.indexOf(folderId);
  if (idx === -1) {
    item.folderIds.push(folderId);
    saveItems();
    render();
    const f = folders.find(x => x.id === folderId);
    showToast('已添加到「' + (f ? f.name : '收藏夹') + '」');
  } else {
    showToast('已在收藏夹中');
  }
}

function removeItemFromFolder(itemId, folderId) {
  const item = items.find(x => x.id === itemId);
  if (!item || !item.folderIds) return;
  item.folderIds = item.folderIds.filter(fid => fid !== folderId);
  saveItems();
  render();
}

/* ============================================================
   TAGS
   ============================================================ */
function addTagToItem(itemId, tagName) {
  tagName = tagName.trim();
  if (!tagName) return;
  const item = items.find(x => x.id === itemId);
  if (!item) return;
  if (!item.tags) item.tags = [];
  if (item.tags.indexOf(tagName) === -1) {
    item.tags.push(tagName);
    // Ensure tag exists in global tag list
    if (!tags.find(t => t.name === tagName)) {
      tags.push({ name: tagName, color: '#' + Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0') });
      saveTags();
    }
    saveItems();
    render();
    showToast('已添加标签');
  } else {
    showToast('标签已存在');
  }
}

function removeTagFromItem(itemId, tagName) {
  const item = items.find(x => x.id === itemId);
  if (!item || !item.tags) return;
  item.tags = item.tags.filter(t => t !== tagName);
  saveItems();
  render();
}

function toggleTagFilter(tagName) {
  if (selectedTag === tagName) {
    selectedTag = null;
  } else {
    selectedTag = tagName;
  }
  render();
}

function getAllTagsUsed() {
  const map = {};
  items.forEach(item => {
    (item.tags || []).forEach(t => {
      map[t] = (map[t] || 0) + 1;
    });
  });
  return map;
}

/* ============================================================
   CONTENT TYPE DETECTION
   ============================================================ */
function detectType(text, html, hasImage) {
  if (hasImage) return 'image';
  if (html && html !== text) return 'rich';
  if (!text) return 'text';
  const t = text.trim();
  // Check link
  if (/^https?:\/\/[^\s]+$/.test(t) || /^https?:\/\/[^\s]+\n?$/.test(t)) return 'link';
  // Check code heuristics
  const codePatterns = [
    /^(function|class|import|export|const|let|var|def|#include|package)\b/m,
    /^[ \t]*(if|for|while|switch|try|catch)\s*[\(]/m,
    /[{}\[\]\(\);]{3,}/,
    /\/\/.*$|^\/\*|\*\/$|\/\*.*\*\//m,
    /^[ \t]{2,}\S/m,
    /^(public|private|protected|static|void|int|string|return)\b/m
  ];
  let score = 0;
  codePatterns.forEach(p => { if (p.test(t)) score++; });
  // Also check line count >= 3 and special chars
  const lines = t.split('\n').filter(l => l.trim());
  if (lines.length >= 3 && /[{}();]/.test(t)) score += 1;
  if (score >= 2) return 'code';
  return 'text';
}

/* ============================================================
   LINK PREVIEW
   ============================================================ */
function fetchLinkPreview(url) {
  const proxy = 'https://api.allorigins.win/raw?url=';
  return fetch(proxy + encodeURIComponent(url))
    .then(function(r) { return r.text(); })
    .then(function(html) {
      var doc = document.implementation.createHTMLDocument('');
      doc.documentElement.innerHTML = html;
      var title = '';
      var desc = '';
      var img = '';
      var ogt = doc.querySelector('meta[property="og:title"]');
      if (ogt) title = ogt.getAttribute('content') || '';
      if (!title) { var tt = doc.querySelector('title'); if (tt) title = tt.textContent || ''; }
      var ogd = doc.querySelector('meta[property="og:description"]');
      if (ogd) desc = ogd.getAttribute('content') || '';
      var ogi = doc.querySelector('meta[property="og:image"]');
      if (ogi) img = ogi.getAttribute('content') || '';
      return { title: title, description: desc, image: img };
    })
    .catch(function() {
      return { title: '', description: '', image: '' };
    });
}

/* ============================================================
   QR CODE (via external API)
   ============================================================ */
function showQR(url) {
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML =
    '<div class="modal" style="max-width:400px;">' +
      '<div class="modal-header"><h3>&#128247; 二维码</h3><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&#10005;</button></div>' +
      '<div class="modal-body">' +
        '<div class="qr-container">' +
          '<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=' + encodeURIComponent(url) + '" alt="QR Code">' +
          '<div class="qr-url">' + escapeHTML(url) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="modal-footer"><button class="topbar-btn" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button></div>' +
    '</div>';
  document.body.appendChild(overlay);
}

/* ============================================================
   CODE HIGHLIGHTING
   ============================================================ */
function detectLanguage(text) {
  // Simple language detection based on keywords
  if (/\b(function|const|let|var|console|import|export|require|module|=>)\b/.test(text)) return 'javascript';
  if (/\b(def|class|import|from|return|if __name__|print)\b/.test(text)) return 'python';
  if (/\b(int|float|char|void|printf|scanf|#include|std::)\b/.test(text)) return 'cpp';
  if (/\b(public|private|class|static|void|String|System\.out)\b/.test(text)) return 'java';
  if (/\b(<!DOCTYPE|<html|<div|<span|<body)\b/.test(text)) return 'html';
  if (/\b(@import|@media|\.class\s*\{|#id\s*\{)\b/.test(text)) return 'css';
  if (/\b(SELECT|FROM|WHERE|JOIN|INSERT|UPDATE|DELETE|CREATE TABLE)\b/i.test(text)) return 'sql';
  return '';
}

function highlightCode(code, lang) {
  if (typeof hljs !== 'undefined') {
    try {
      var r = lang ? hljs.highlight(code, { language: lang }) : hljs.highlightAuto(code);
      return r.value;
    } catch(e) { return escapeHTML(code); }
  }
  return escapeHTML(code);
}

/* ============================================================
   RENDER
   ============================================================ */
function render() {
  var query = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  var filtered = items.slice();

  // View filter
  if (currentView === 'pinned') {
    filtered = filtered.filter(function(i) { return i.isPinned; });
  } else if (currentView === 'unfiled') {
    filtered = filtered.filter(function(i) { return !i.folderIds || i.folderIds.length === 0; });
  } else if (currentView && currentView.indexOf('folder:') === 0) {
    var fid = currentView.replace('folder:', '');
    filtered = filtered.filter(function(i) { return i.folderIds && i.folderIds.indexOf(fid) !== -1; });
  }

  // Type filter
  if (currentTypeFilter !== 'all') {
    filtered = filtered.filter(function(i) { return i.type === currentTypeFilter; });
  }

  // Tag filter
  if (selectedTag) {
    filtered = filtered.filter(function(i) { return i.tags && i.tags.indexOf(selectedTag) !== -1; });
  }

  // Search
  if (query) {
    filtered = filtered.filter(function(i) {
      var text = (i.plainText || i.content || '').toLowerCase();
      var tagsStr = (i.tags || []).join(' ').toLowerCase();
      return text.indexOf(query) !== -1 || tagsStr.indexOf(query) !== -1;
    });
  }

  // Pinned first
  filtered.sort(function(a, b) {
    if (a.isPinned && !b.isPinned) return -1;
    if (!a.isPinned && b.isPinned) return 1;
    return b.timestamp - a.timestamp;
  });

  var grid = document.getElementById('grid');
  var empty = document.getElementById('empty');
  var info = document.getElementById('resultInfo');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    info.textContent = items.length > 0 ? '没有匹配的结果' : '';
    updateStats();
    updateSidebarCounts();
    return;
  }

  empty.style.display = 'none';
  info.textContent = '共 ' + filtered.length + ' 条' + (filtered.length < items.length ? '（总计 ' + items.length + ' 条）' : '');

  grid.innerHTML = filtered.map(function(item) {
    return renderCard(item);
  }).join('');

  updateStats();
  updateSidebarCounts();
  renderSidebar();
}

function renderCard(item) {
  var timeStr = formatTime(item.timestamp);
  var sizeStr = formatSize(item);
  var typeBadge = getTypeBadge(item.type);
  var pinnedClass = item.isPinned ? 'active' : '';
  var cardPinned = item.isPinned ? 'pinned' : '';
  var tagsHTML = renderCardTags(item);

  var bodyHTML = '';
  var footerExtra = '';

  if (item.type === 'text') {
    bodyHTML = '<div class="card-body text-content">' + escapeHTML(item.content) + '</div>';
  } else if (item.type === 'image') {
    bodyHTML = '<div class="card-body image-content"><img src="' + item.content + '" alt="" loading="lazy"></div>';
  } else if (item.type === 'rich') {
    var sanitized = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(item.content) : item.content;
    bodyHTML = '<div class="card-body rich-content">' + sanitized + '</div>';
  } else if (item.type === 'code') {
    var lang = (item.meta && item.meta.language) || '';
    var highlighted = highlightCode(item.content, lang);
    footerExtra = lang ? '<span class="card-lang">' + escapeHTML(lang) + '</span>' : '';
    bodyHTML = '<div class="card-body code-content"><pre><code class="hljs' + (lang ? ' language-' + lang : '') + '">' + highlighted + '</code></pre></div>';
  } else if (item.type === 'link') {
    var meta = item.meta || {};
    var imgHTML = meta.image ? '<img class="link-card-img" src="' + escapeHTML(meta.image) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' : '';
    var domain = meta.url ? getDomain(meta.url) : '';
    bodyHTML = '<div class="card-body link-content"><div class="link-card">' +
      (imgHTML || '<div class="link-card-img" style="display:flex;align-items:center;justify-content:center;font-size:2rem;color:' + var_muted + ';">&#128279;</div>') +
      '<div class="link-card-body">' +
      (meta.title ? '<div class="link-card-title">' + escapeHTML(meta.title) + '</div>' : '') +
      (meta.description ? '<div class="link-card-desc">' + escapeHTML(meta.description) + '</div>' : '') +
      (domain ? '<div class="link-card-domain">' + escapeHTML(domain) + '</div>' : '') +
      '</div></div></div>';
  }

  return '<div class="card ' + cardPinned + '" data-id="' + item.id + '" draggable="true" ondragstart="onCardDragStart(event,\'' + item.id + '\')">' +
    '<div class="card-header">' +
      typeBadge +
      '<span class="card-time">' + timeStr + '</span>' +
      '<div class="card-actions">' +
        '<button class="card-action pin ' + pinnedClass + '" onclick="event.stopPropagation();togglePin(\'' + item.id + '\')" title="固定">&#128204;</button>' +
        '<button class="card-action" onclick="event.stopPropagation();openView(\'' + item.id + '\')" title="查看">&#128065;</button>' +
        '<button class="card-action" onclick="event.stopPropagation();copyItem(\'' + item.id + '\')" title="复制">&#128203;</button>' +
        '<button class="card-action del" onclick="event.stopPropagation();deleteItem(\'' + item.id + '\')" title="删除">&#128465;</button>' +

    tagsHTML +
    bodyHTML +
    '<div class="card-footer"><span>' + sizeStr + '</span>' + footerExtra + '</div>' +

}

function renderCardTags(item) {
  var tags = item.tags || [];

    html += '<span class="card-tag" onclick="event.stopPropagation();toggleTagFilter(\'' + escapeJS(t) + '\')">' + escapeHTML(t) + '</span>';

function getTypeBadge(type) {
  var map = {
    text: 'badge-text',
    image: 'badge-image',

    code: 'badge-code',
    link: 'badge-link',
    file: 'badge-file'
  };

/* ============================================================
   SIDEBAR RENDER
   ============================================================ */
function renderSidebar() {

  var fl = document.getElementById('folderList');

function updateSidebarCounts() {

  document.getElementById('navUnfiledCount').textContent = items.filter(function(i) { return !i.folderIds || i.folderIds.length === 0; }).length;

/* ============================================================
   VIEW / FILTER
   ============================================================ */
function setView(view, el) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  if (el) el.classList.add('active');
  render();
}

function setTypeFilter(t, btn) {
  currentTypeFilter = t;
  document.querySelectorAll('.filter-tab').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  render();
}

/* ============================================================
   ACTIONS
   ============================================================ */
function togglePin(id) {
  var item = items.find(function(i) { return i.id === id; });
  if (!item) return;
  item.isPinned = !item.isPinned;
  saveItems();
  render();
}

function deleteItem(id) {
  items = items.filter(function(i) { return i.id !== id; });
  saveItems();
  render();
  showToast('已删除');
}

function clearAll() {
  if (items.length === 0) return;
  if (!confirm('确定要清空所有剪贴板记录吗？')) return;
  items = [];
  saveItems();
  render();
  showToast('已清空');
}

function copyItem(id) {
  var item = items.find(function(i) { return i.id === id; });
  if (!item) return;

  if (item.type === 'image') {
    copyImageToClipboard(item.content);
  } else if (item.type === 'rich') {
    var plain = item.plainText || stripHTML(item.content);
    navigator.clipboard.write([
      new ClipboardItem((function() {
        var _o = {};
        _o['text/plain'] = new Blob([plain], { type: 'text/plain' });
        _o['text/html'] = new Blob([item.content], { type: 'text/html' });
        return _o;
      })())
    ]).then(function() { showToast('已复制'); }).catch(function() {
      navigator.clipboard.writeText(plain).then(function() { showToast('已复制'); });
    });
  } else if (item.type === 'code') {
    navigator.clipboard.writeText(item.content).then(function() { showToast('已复制'); });
  } else if (item.type === 'link') {
    navigator.clipboard.writeText(item.content).then(function() { showToast('已复制'); });
  } else {
    navigator.clipboard.writeText(item.content).then(function() { showToast('已复制'); }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = item.content;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('已复制');
    });
  }
}

function copyImageToClipboard(dataUrl) {
  if (navigator.clipboard && navigator.clipboard.write) {
    fetch(dataUrl).then(function(r) { return r.blob(); }).then(function(blob) {
      var t = blob.type || 'image/png';
      var item = new ClipboardItem((_o={}, _o[t]=blob, _o));
      navigator.clipboard.write([item]).then(function() {
        showToast('图片已复制');
      }).catch(function() { fallbackImageCopy(dataUrl); });
    }).catch(function() { fallbackImageCopy(dataUrl); });
  } else {
    fallbackImageCopy(dataUrl);
  }
}

function fallbackImageCopy(dataUrl) {
  var w = window.open();
  w.document.write('<img src="' + dataUrl + '" style="max-width:90vw;max-height:90vh;">');
  showToast('请在打开的页面中右键复制图片');
}

/* ============================================================
   VIEW DETAIL MODAL
   ============================================================ */
function openView(id) {
  var item = items.find(function(i) { return i.id === id; });
  if (!item) return;

  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

  var bodyClass = '';
  var bodyContent = '';
  var headerTitle = '';

  if (item.type === 'text') {
    headerTitle = '文字内容';
    bodyClass = 'text-preview';
    bodyContent = escapeHTML(item.content);
  } else if (item.type === 'image') {
    headerTitle = '图片预览';
    bodyClass = 'image-preview';
    bodyContent = '<img src="' + item.content + '" alt="">';
  } else if (item.type === 'rich') {
    headerTitle = '富文本内容';
    bodyClass = 'rich-preview';
    var sanitized = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(item.content) : item.content;
    bodyContent = sanitized;
  } else if (item.type === 'code') {
    headerTitle = '代码片段';
    bodyClass = 'code-preview';
    var lang = (item.meta && item.meta.language) || '';
    var highlighted = highlightCode(item.content, lang);
    bodyContent = '<pre><code class="hljs' + (lang ? ' language-' + lang : '') + '">' + highlighted + '</code></pre>';
  } else if (item.type === 'link') {
    headerTitle = '链接预览';
    bodyClass = 'link-preview';
    var meta = item.meta || {};
    var imgs = meta.image ? '<img src="' + escapeHTML(meta.image) + '" alt="" onerror="this.style.display=\'none\'">' : '';
    bodyContent = imgs + '<div class="lp-info">' +
      (meta.title ? '<p><strong>' + escapeHTML(meta.title) + '</strong></p>' : '') +
      (meta.description ? '<p style="color:var(--muted);font-size:0.85rem;">' + escapeHTML(meta.description) + '</p>' : '') +
      '<p style="color:var(--accent3);font-size:0.78rem;word-break:break-all;">' + escapeHTML(item.content) + '</p>' +
      '</div>';
  }

  // Tag editor
  var tagEditorHTML = renderTagEditor(item);

  // Folder selector
  var folderSelectorHTML = renderFolderSelector(item);

  overlay.innerHTML =
    '<div class="modal">' +
      '<div class="modal-header"><h3>' + headerTitle + '</h3><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&#10005;</button></div>' +
      '<div class="modal-body ' + bodyClass + '">' + bodyContent + '</div>' +
      '<div style="padding:0 1.25rem;">' + tagEditorHTML + folderSelectorHTML + '</div>' +
      '<div class="modal-footer">' +
        '<button class="topbar-btn" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button>' +
        '<button class="topbar-btn" onclick="copyItem(\'' + id + '\');this.closest(\'.modal-overlay\').remove()">&#128203; 复制</button>' +
        (item.type === 'link' ? '<button class="topbar-btn" onclick="showQR(\'' + escapeJS(item.content) + '\')">&#128247; 二维码</button>' : '') +
        (item.type === 'link' ? '<button class="topbar-btn accent" onclick="window.open(\'' + escapeJS(item.content) + '\',\'_blank\');this.closest(\'.modal-overlay\').remove()">&#128279; 打开链接</button>' : '') +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);
}

function renderTagEditor(item) {
  var itemTags = item.tags || [];
  var allTags = Object.keys(getAllTagsUsed());
  var html = '<div class="tag-editor">';
  html += '<div class="tag-editor-title">&#127991; 标签</div>';
  itemTags.forEach(function(t) {
    html += '<span class="te-tag">' + escapeHTML(t) + '<span class="te-del" onclick="removeTagFromItem(\'' + item.id + '\',\'' + escapeJS(t) + '\');this.closest(\'.modal-overlay\').remove();openView(\'' + item.id + '\')">&#10005;</span></span>';
  });
  html += '<input class="te-input" id="teInput_' + item.id + '" placeholder="添加标签..." onkeydown="if(event.key===\'Enter\'){addTagToItem(\'' + item.id + '\',this.value);this.value=\'\';this.closest(\'.modal-overlay\').remove();openView(\'' + item.id + '\');}">';
  html += '</div>';
  return html;
}

function renderFolderSelector(item) {
  if (folders.length === 0) return '';
  var itemFolders = item.folderIds || [];
  var html = '<div class="folder-selector"><div class="folder-selector-title">&#128193; 收藏到此</div>';
  folders.forEach(function(f) {
    var active = itemFolders.indexOf(f.id) !== -1 ? 'active' : '';
    html += '<span class="fs-folder ' + active + '" onclick="moveItemToFolder(\'' + item.id + '\',\'' + f.id + '\');this.classList.toggle(\'active\')">' +
      '<span style="display:inline-block;width:6px;height:6px;border-radius:2px;background:' + f.color + '"></span> ' +
      escapeHTML(f.name) + '</span>';
  });
  html += '</div>';
  return html;
}

function openTagEditor(id) {
  openView(id);
}

/* ============================================================
   EXPORT
   ============================================================ */
function exportData() {
  if (items.length === 0) { showToast('没有数据可导出'); return; }
  var data = JSON.stringify({ items: items, folders: folders, tags: tags, version: '2.0', exportedAt: new Date().toISOString() }, null, 2);
  var blob = new Blob([data], { type: 'application/json;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'clipvault_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('导出成功');
}

/* ============================================================
   PASTE HANDLING
   ============================================================ */
document.addEventListener('paste', function(e) {
  e.preventDefault();
  handlePaste(e.clipboardData);
});

function handlePaste(clipData) {
  var hasImage = false;
  var textContent = '';
  var htmlContent = '';

  for (var i = 0; i < clipData.items.length; i++) {
    var item = clipData.items[i];
    if (item.type.indexOf('image') !== -1) {
      hasImage = true;
      var blob = item.getAsFile();
      var reader = new FileReader();
      reader.onload = function(ev) {
        addItem({ type: 'image', content: ev.target.result, timestamp: Date.now() });
      };
      reader.readAsDataURL(blob);
      return;
    }
    if (item.type === 'text/plain') {
      item.getAsString(function(s) { textContent = s; });
    }
    if (item.type === 'text/html') {
      item.getAsString(function(s) { htmlContent = s; });
    }
  }

  // Wait for async text extraction
  setTimeout(function() {
    if (!textContent && !htmlContent) return;
    var content = textContent || '';
    var type = detectType(content, htmlContent, false);

    if (type === 'link') {
      // Add immediately, then try to enrich
      var newItem = addItem({ type: 'link', content: content, plainText: content, timestamp: Date.now(), meta: { url: content } });
      // Fetch preview asynchronously
      if (newItem) {
        fetchLinkPreview(content).then(function(meta) {
          newItem.meta = meta;
          newItem.meta.url = content;
          saveItems();
          render();
        });
      }
    } else if (type === 'code') {
      var lang = detectLanguage(content);
      addItem({ type: 'code', content: content, plainText: content, timestamp: Date.now(), meta: { language: lang } });
    } else if (type === 'rich' && htmlContent) {
      // For rich text, store both HTML and plain text
      addItem({ type: 'rich', content: htmlContent, plainText: textContent || stripHTML(htmlContent), timestamp: Date.now() });
    } else {
      addItem({ type: 'text', content: content, plainText: content, timestamp: Date.now() });
    }
  }, 100);
}

function addItem(data) {
  data.id = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
  data.isPinned = false;
  data.tags = [];
  data.folderIds = [];
  if (!data.plainText) data.plainText = data.content || '';
  if (!data.meta) data.meta = {};
  items.unshift(data);
  saveItems();
  render();
  showToast('已添加到剪贴板');
  return data;
}

/* ============================================================
   DRAG & DROP (files + folder)
   ============================================================ */
let dragItemId = null;

function onCardDragStart(e, id) {
  dragItemId = id;
  e.dataTransfer.effectAllowed = 'move';
}

function onFolderDrop(e, folderId) {
  e.preventDefault();
  e.target.classList.remove('drag-over');
  if (dragItemId) {
    moveItemToFolder(dragItemId, folderId);
    dragItemId = null;
  }
}

function handleDragOver(e) {
  e.preventDefault();
  e.stopPropagation();
  document.getElementById('pasteZone').classList.add('drag-over');
}

function handleDragLeave(e) {
  e.preventDefault();
  e.stopPropagation();
  document.getElementById('pasteZone').classList.remove('drag-over');
}

function handleDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  document.getElementById('pasteZone').classList.remove('drag-over');

  var files = e.dataTransfer.files;
  for (var i = 0; i < files.length; i++) {
    if (files[i].type.indexOf('image') !== -1) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        addItem({ type: 'image', content: ev.target.result, timestamp: Date.now() });
      };
      reader.readAsDataURL(files[i]);
    }
  }
}

function focusPaste() {
  document.getElementById('hiddenPaste').focus();
}

/* ============================================================
   TOAST
   ============================================================ */
function showToast(msg) {
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = '&#9989; ' + msg;
  document.body.appendChild(t);
  setTimeout(function() {
    t.classList.add('hide');
    setTimeout(function() { t.remove(); }, 250);
  }, 2000);
}

/* ============================================================
   HELPERS
   ============================================================ */
function formatTime(ts) {
  var d = new Date(ts);
  var now = new Date();
  var diff = now - d;
  if (diff < 60000) return '\u521a\u521a';
  if (diff < 3600000) return Math.floor(diff / 60000) + ' \u5206\u949f\u524d';
  if (diff < 86400000) return Math.floor(diff / 3600000) + ' \u5c0f\u65f6\u524d';
  return (d.getMonth()+1).toString().padStart(2,'0') + '-' + d.getDate().toString().padStart(2,'0') + ' ' +
    d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function formatSize(item) {
  if (item.type === 'image') {
    var b64 = item.content.split(',')[1];
    if (!b64) return '0 B';
    var bytes = Math.ceil(b64.length * 3 / 4);
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1048576).toFixed(1) + ' MB';
  }
  var bytes = new Blob([item.content || '']).size;
  if (bytes < 1024) return bytes + ' B';
  return (bytes/1024).toFixed(1) + ' KB';
}

function getDomain(url) {
  try { return new URL(url).hostname; } catch(e) { return url; }
}

function stripHTML(html) {
  var d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || d.innerText || '';
}

function escapeHTML(str) {
  if (typeof str !== 'string') return '';
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function escapeJS(str) {
  return (str || '').replace(/'/g, "\\'").replace(/\\/g, '\\\\');
}

// For inline CSS variable reference in template literals
var var_muted = 'var(--muted)';

/* ============================================================
   INIT
   ============================================================ */
// Ensure legacy migration: add folderIds/tags fields to old items
items.forEach(function(item) {
  if (!item.folderIds) item.folderIds = [];
  if (!item.tags) item.tags = [];
  if (!item.plainText) item.plainText = item.content || '';
  if (!item.meta) item.meta = {};
});
saveItems();

render();
</script>
