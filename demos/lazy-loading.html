<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lazy Loading — TRAE Demo Wall</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, sans-serif;
      padding: 80px 32px 40px;
    }

    .header {
      max-width: 720px;
      margin: 0 auto 40px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 999px;
      font-size: 12px;
      color: #22c55e;
      background: rgba(34,197,94,0.08);
      margin-bottom: 16px;
      font-family: 'JetBrains Mono', monospace;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .header p { color: #71717a; font-size: 14px; line-height: 1.6; }

    .grid {
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .card.loaded:hover {
      border-color: #22c55e;
      box-shadow: 0 0 20px rgba(34,197,94,0.1);
      transform: translateY(-2px);
    }

    .thumb {
      aspect-ratio: 16/10;
      background: linear-gradient(90deg, #18181b 25%, #27272a 50%, #18181b 75%);
      background-size: 200% 100%;
      position: relative;
      overflow: hidden;
    }
    .skeleton .thumb {
      animation: shimmer 1.5s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .thumb .img {
      width: 100%; height: 100%;
      display: grid; place-items: center;
      font-size: 32px; font-weight: 800;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .card.loaded .thumb .img { opacity: 1; }

    .body { padding: 12px; }
    .skeleton .body { padding: 12px; }
    .skeleton-line {
      height: 10px;
      background: linear-gradient(90deg, #27272a 25%, #3f3f46 50%, #27272a 75%);
      background-size: 200% 100%;
      border-radius: 4px;
      margin-bottom: 8px;
      animation: shimmer 1.5s ease-in-out infinite;
    }
    .skeleton-line.short { width: 60%; }

    .body h4 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .card.loaded .body h4 { opacity: 1; }
    .body span {
      font-size: 12px;
      color: #71717a;
      opacity: 0;
      transition: opacity 0.3s ease 0.1s;
    }
    .card.loaded .body span { opacity: 1; }

    .status {
      max-width: 720px;
      margin: 24px auto 0;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #71717a;
      min-height: 20px;
    }
    .status.loading { color: #22c55e; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

    .sentinel {
      height: 1px;
      margin-top: 40px;
    }

    .controls {
      max-width: 720px;
      margin: 0 auto 24px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .controls label {
      font-size: 12px;
      color: #71717a;
      font-family: 'JetBrains Mono', monospace;
    }
    .controls input[type="range"] {
      flex: 1;
      max-width: 200px;
    }
    .controls .val {
      font-size: 12px;
      color: #a1a1aa;
      font-family: 'JetBrains Mono', monospace;
      min-width: 40px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="badge">Infinite Scroll</div>
    <h1>Lazy Loading + Skeleton</h1>
    <p>首屏加载索引后按需分页加载。滚动至 Sentinel 元素进入视口时触发 IntersectionObserver，自动加载下一批数据。骨架屏使用 CSS shimmer 动画提供即时视觉反馈。</p>
  </div>

  <div class="controls">
    <label>Batch Size</label>
    <input type="range" id="batchSize" min="4" max="16" value="8" step="4">
    <span class="val" id="batchVal">8</span>
    <button onclick="reset()" style="padding:4px 12px;background:#27272a;border:1px solid #3f3f46;border-radius:6px;color:#fff;font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace;">Reset</button>
  </div>

  <div class="grid" id="grid"></div>
  <div class="sentinel" id="sentinel"></div>
  <div class="status" id="status"></div>

  <script>
    let batchSize = 8;
    let totalLoaded = 0;
    let isLoading = false;
    let allLoaded = false;
    const TOTAL = 64;

    const grid = document.getElementById('grid');
    const sentinel = document.getElementById('sentinel');
    const status = document.getElementById('status');
    const batchInput = document.getElementById('batchSize');
    const batchVal = document.getElementById('batchVal');

    const gradients = [
      'linear-gradient(135deg,#1a1a2e 0%,#16213e 100%)',
      'linear-gradient(135deg,#0f2027 0%,#203a43 50%,#2c5364 100%)',
      'linear-gradient(135deg,#1e1e2f 0%,#2d2d44 100%)',
      'linear-gradient(135deg,#2c1a1a 0%,#3d2626 100%)',
      'linear-gradient(135deg,#1a2c1a 0%,#263d26 100%)',
      'linear-gradient(135deg,#1a1a3d 0%,#26264d 100%)',
    ];

    batchInput.addEventListener('input', e => {
      batchSize = parseInt(e.target.value);
      batchVal.textContent = batchSize;
    });

    function createSkeleton() {
      const div = document.createElement('div');
      div.className = 'card skeleton';
      div.innerHTML = `
        <div class="thumb"></div>
        <div class="body">
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </div>
      `;
      return div;
    }

    function createCard(i) {
      const div = document.createElement('div');
      div.className = 'card loaded';
      const g = gradients[i % gradients.length];
      div.innerHTML = `
        <div class="thumb"><div class="img" style="background:${g};color:#3f3f46;">${String.fromCharCode(65 + (i % 26))}</div></div>
        <div class="body">
          <h4>Project ${i + 1}</h4>
          <span>by Author ${i + 1} · ${(Math.random()*5+1).toFixed(1)}k views</span>
        </div>
      `;
      return div;
    }

    function loadMore() {
      if (isLoading || allLoaded) return;
      isLoading = true;
      status.textContent = '加载中...';
      status.className = 'status loading';

      // Add skeletons
      const skeletons = [];
      for (let i = 0; i < batchSize; i++) {
        const sk = createSkeleton();
        grid.appendChild(sk);
        skeletons.push(sk);
      }

      // Simulate network delay
      setTimeout(() => {
        const toLoad = Math.min(batchSize, TOTAL - totalLoaded);
        skeletons.forEach((sk, idx) => {
          if (idx < toLoad) {
            const card = createCard(totalLoaded + idx);
            sk.replaceWith(card);
          } else {
            sk.remove();
          }
        });
        totalLoaded += toLoad;
        isLoading = false;
        status.className = 'status';
        if (totalLoaded >= TOTAL) {
          allLoaded = true;
          status.textContent = `已展示全部 ${TOTAL} 个作品`;
        } else {
          status.textContent = `已加载 ${totalLoaded} / ${TOTAL}`;
        }
      }, 800);
    }

    function reset() {
      grid.innerHTML = '';
      totalLoaded = 0;
      allLoaded = false;
      isLoading = false;
      status.textContent = '';
      loadMore();
    }

    const observer = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting && !isLoading && !allLoaded) {
        loadMore();
      }
    }, { rootMargin: '200px' });

    observer.observe(sentinel);
    loadMore();
  </script>
</body>
</html>
