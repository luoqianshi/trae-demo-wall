<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亚姆利扎星域会战 — 3D 沉浸式沙盘</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #ccc; font-family: 'Segoe UI','Microsoft YaHei',sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
  #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  #load-error { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(20,0,0,0.95); border: 1px solid #f44; border-radius: 8px; padding: 30px 40px; z-index: 9999; text-align: center; max-width: 500px; }
  #load-error h2 { color: #f66; margin-bottom: 12px; }
  #load-error p { color: #faa; line-height: 1.6; }

  /* 左上信息面板 */
  #info-panel { position: fixed; top: 16px; left: 16px; z-index: 100; background: linear-gradient(135deg,rgba(5,10,30,0.88),rgba(10,15,40,0.85)); border: 1px solid rgba(100,180,255,0.25); border-radius: 10px; padding: 16px 20px; min-width: 270px; backdrop-filter: blur(10px); }
  #info-panel h1 { font-size: 17px; color: #8cf; margin-bottom: 10px; text-shadow: 0 0 10px rgba(100,180,255,0.5); letter-spacing: 2px; }
  #info-panel .info-row { display: flex; justify-content: space-between; font-size: 13px; margin: 5px 0; }
  #info-panel .label { color: #7a9ab; }
  #info-panel .value { color: #dde; font-weight: bold; }
  #info-panel .empire { color: #6af; text-shadow: 0 0 6px rgba(80,140,255,0.4); }
  #info-panel .alliance { color: #f66; text-shadow: 0 0 6px rgba(255,80,80,0.4); }

  /* 阶段跳转按钮 */
  #phase-jumps { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 4px; }
  #phase-jumps button { background: rgba(60,120,200,0.12); border: 1px solid rgba(100,180,255,0.25); color: #7cf; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 11px; transition: all 0.2s; }
  #phase-jumps button:hover { background: rgba(80,150,255,0.3); }
  #phase-jumps button.active { background: rgba(80,150,255,0.4); color: #fff; }

  /* 预设视角按钮 */
  #view-presets { position: fixed; top: 16px; right: 16px; z-index: 100; display: flex; flex-direction: column; gap: 6px; }
  #view-presets button { background: rgba(5,10,25,0.8); border: 1px solid rgba(100,180,255,0.25); color: #7cf; border-radius: 5px; padding: 6px 14px; cursor: pointer; font-size: 12px; transition: all 0.2s; min-width: 90px; text-align: left; }
  #view-presets button:hover { background: rgba(80,150,255,0.2); }
  #view-presets button.active { background: rgba(80,150,255,0.35); color: #fff; }

  /* 舰队详情卡 */
  #fleet-detail { position: fixed; top: 50%; right: 16px; transform: translateY(-50%); z-index: 150; background: linear-gradient(135deg,rgba(5,10,30,0.95),rgba(10,15,40,0.92)); border: 1px solid rgba(100,180,255,0.4); border-radius: 10px; padding: 18px 22px; min-width: 240px; backdrop-filter: blur(12px); display: none; box-shadow: 0 0 30px rgba(50,100,200,0.15); }
  #fleet-detail.visible { display: block; }
  #fleet-detail h3 { font-size: 15px; margin-bottom: 10px; letter-spacing: 1px; }
  #fleet-detail .detail-row { display: flex; justify-content: space-between; font-size: 13px; margin: 6px 0; }
  #fleet-detail .detail-label { color: #7a9ab; }
  #fleet-detail .close-btn { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #888; font-size: 18px; }
  #fleet-detail .close-btn:hover { color: #fff; }

  /* 事件提示 */
  #event-toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 200; pointer-events: none; font-size: 18px; color: #ffe8c0; text-align: center; white-space: pre-line; text-shadow: 0 0 10px rgba(255,180,80,0.7),0 0 25px rgba(255,120,40,0.3),0 2px 4px rgba(0,0,0,0.8); opacity: 0; transition: opacity 0.6s ease; max-width: 700px; line-height: 1.7; background: linear-gradient(180deg,rgba(20,10,0,0.7) 0%,rgba(0,0,0,0) 100%); padding: 12px 30px 20px; border-radius: 0 0 12px 12px; }
  #event-toast.visible { opacity: 1; }

  /* 战役结果面板 */
  #result-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 300; background: linear-gradient(135deg,rgba(5,10,30,0.97),rgba(10,15,40,0.95)); border: 1px solid rgba(255,180,80,0.4); border-radius: 12px; padding: 30px 40px; min-width: 400px; backdrop-filter: blur(15px); display: none; box-shadow: 0 0 50px rgba(255,150,50,0.2); text-align: center; }
  #result-panel.visible { display: block; }
  #result-panel h2 { font-size: 22px; color: #ffc080; margin-bottom: 18px; letter-spacing: 3px; text-shadow: 0 0 15px rgba(255,150,50,0.4); }
  #result-panel .result-row { display: flex; justify-content: space-between; font-size: 15px; margin: 10px 0; padding: 6px 0; border-bottom: 1px solid rgba(100,180,255,0.1); }
  #result-panel .result-label { color: #8ab; }
  #result-panel .result-value { font-weight: bold; }
  #result-panel .replay-btn { margin-top: 20px; background: rgba(255,150,50,0.2); border: 1px solid rgba(255,180,80,0.5); color: #ffc080; border-radius: 6px; padding: 10px 30px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
  #result-panel .replay-btn:hover { background: rgba(255,150,50,0.35); }

  /* 底部控制栏 */
  #controls { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: linear-gradient(180deg,rgba(5,8,20,0.6),rgba(5,8,20,0.92)); border-top: 1px solid rgba(100,180,255,0.15); padding: 12px 24px; display: flex; align-items: center; gap: 14px; backdrop-filter: blur(10px); }
  #controls button { background: rgba(60,120,200,0.12); border: 1px solid rgba(100,180,255,0.3); color: #7cf; border-radius: 5px; padding: 7px 16px; cursor: pointer; font-size: 13px; transition: all 0.25s; white-space: nowrap; }
  #controls button:hover { background: rgba(80,150,255,0.25); }
  #controls button.active { background: rgba(80,150,255,0.35); color: #fff; }
  #progress-wrap { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; cursor: pointer; position: relative; border: 1px solid rgba(100,180,255,0.1); }
  #progress-fill { height: 100%; background: linear-gradient(90deg,#3388cc,#ff8844); border-radius: 4px; width: 0%; box-shadow: 0 0 8px rgba(200,120,50,0.3); }
  #progress-thumb { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 16px; height: 16px; background: #eef; border-radius: 50%; left: 0%; box-shadow: 0 0 8px rgba(150,200,255,0.6); pointer-events: none; }
  #time-label { font-size: 12px; color: #7a9ab; min-width: 42px; text-align: center; }

  /* 右下角工具按钮 */
  #tool-buttons { position: fixed; bottom: 62px; right: 16px; z-index: 100; display: flex; flex-direction: column; gap: 6px; }
  #tool-buttons button { background: rgba(5,10,25,0.8); border: 1px solid rgba(100,180,255,0.25); color: #7cf; border-radius: 5px; padding: 8px 16px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
  #tool-buttons button:hover { background: rgba(80,150,255,0.2); }

  /* 左下角图层开关 */
  #layer-toggles { position: fixed; bottom: 62px; left: 16px; z-index: 100; display: flex; flex-direction: column; gap: 6px; }
  #layer-toggles button { background: rgba(5,10,25,0.8); border: 1px solid rgba(100,180,255,0.25); color: #7cf; border-radius: 5px; padding: 6px 14px; cursor: pointer; font-size: 12px; text-align: left; }
  #layer-toggles button:hover { background: rgba(80,150,255,0.2); }
  #layer-toggles button.off { color: #445; border-color: rgba(100,180,255,0.08); }

  /* 快捷键提示 */
  #shortcut-hint { position: fixed; bottom: 62px; left: 50%; transform: translateX(-50%); z-index: 99; font-size: 11px; color: #456; opacity: 0.6; }
</style>
</head>
<body>
<div id="load-error"><h2>Three.js 加载失败</h2><p>请检查网络连接后刷新页面。</p></div>

<div id="info-panel">

  <div id="phase-jumps">
    <button data-t="0.00">布阵</button>

</div>

<div id="event-toast"></div>

<div id="result-panel">
  <h2>亚姆利扎星域会战 · 战役结果</h2>
  <div class="result-row"><span class="result-label">帝国军参战</span><span class="result-value" id="r-empire-init">20,000 艘</span></div>
  <div class="result-row"><span class="result-label">帝国军损失</span><span class="result-value" id="r-empire-loss">— 艘</span></div>
  <div class="result-row"><span class="result-label">同盟军参战</span><span class="result-value" id="r-alliance-init">12,000 艘</span></div>
  <div class="result-row"><span class="result-label">同盟军损失</span><span class="result-value" id="r-alliance-loss">— 艘</span></div>
  <div class="result-row"><span class="result-label">同盟军幸存率</span><span class="result-value" id="r-survival">—%</span></div>
  <div class="result-row"><span class="result-label">战役结论</span><span class="result-value">同盟远征军几乎全灭，杨威利率少数舰艇撤离</span></div>
  <button class="replay-btn" onclick="replayBattle()">⟲ 一键回放</button>
</div>

<div id="controls">
  <button id="btn-play">▶ 播放</button>
  <button id="btn-speed">1x</button>
  <div id="progress-wrap"><div id="progress-fill"></div><div id="progress-thumb"></div></div>
  <span id="time-label">0%</span>
</div>

<div id="tool-buttons">
  <button id="btn-screenshot">📷 截图</button>
  <button id="btn-share">🔗 分享进度</button>
  <button id="reset-view">⟲ 视角复位</button>
</div>

<div id="layer-toggles">
  <button id="toggle-asteroids">◉ 小行星带</button>
  <button id="toggle-trails">◉ 轨迹线</button>
  <button id="toggle-danger">◉ 危险区</button>
</div>

<div id="shortcut-hint">空格 播放/暂停 · ←→ 快进/快退 · R 视角复位 · F 跟随旗舰</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
if (typeof THREE === 'undefined') { document.getElementById('load-error').style.display = 'block'; throw new Error('Three.js 未加载'); }

// ============================================================
// 战役数据
// ============================================================
const BATTLE_SCRIPT = {
  fleets: [
    { id:"empire_center", name:"帝国中央舰队", commander:"舒坦因麦兹", side:"empire", color:0x4488ff, shipCount:8000, particleCount:35,
      waypoints:[{x:0,y:0,z:60,t:0},{x:0,y:0,z:40,t:0.25},{x:0,y:0,z:20,t:0.45},{x:0,y:0,z:5,t:0.65},{x:0,y:0,z:-5,t:0.80},{x:0,y:0,z:-15,t:1.0}],
      flagship:{name:"伯伦希尔"} },
    { id:"empire_left", name:"帝国左翼舰队", commander:"米达麦亚", side:"empire", color:0x66aaff, shipCount:6000, particleCount:25,
      waypoints:[{x:-50,y:0,z:50,t:0},{x:-60,y:0,z:30,t:0.15},{x:-70,y:0,z:0,t:0.35},{x:-55,y:0,z:-25,t:0.55},{x:-30,y:0,z:-35,t:0.70},{x:-15,y:0,z:-25,t:0.85},{x:-5,y:0,z:-15,t:1.0}],
      flagship:{name:"人狼"} },
    { id:"empire_right", name:"帝国右翼舰队", commander:"罗严塔尔", side:"empire", color:0x5599ee, shipCount:6000, particleCount:25,
      waypoints:[{x:50,y:0,z:50,t:0},{x:60,y:0,z:30,t:0.15},{x:65,y:0,z:5,t:0.35},{x:50,y:0,z:-20,t:0.55},{x:25,y:0,z:-35,t:0.70},{x:10,y:0,z:-25,t:0.85},{x:5,y:0,z:-15,t:1.0}],
      flagship:{name:"王虎"} },
    { id:"alliance_main", name:"同盟主力舰队", commander:"杨威利", side:"alliance", color:0xff4444, shipCount:8000, particleCount:35,
      waypoints:[{x:0,y:0,z:-20,t:0},{x:0,y:0,z:-15,t:0.20},{x:0,y:0,z:-5,t:0.40},{x:0,y:0,z:0,t:0.55},{x:5,y:0,z:-5,t:0.70},{x:15,y:0,z:-20,t:0.82},{x:30,y:0,z:-40,t:0.92},{x:45,y:0,z:-55,t:1.0}],
      flagship:{name:"休伯利安"} },
    { id:"alliance_vanguard", name:"同盟前卫舰队", commander:"比克古", side:"alliance", color:0xff6666, shipCount:4000, particleCount:18,
      waypoints:[{x:10,y:0,z:-10,t:0},{x:10,y:0,z:5,t:0.25},{x:8,y:0,z:15,t:0.40},{x:5,y:0,z:10,t:0.55},{x:10,y:0,z:-5,t:0.70},{x:20,y:0,z:-25,t:0.85},{x:35,y:0,z:-45,t:1.0}],
      flagship:{name:"里欧达"} }
  ],
  events: [
    {t:0.00,text:"亚姆利扎星域会战开始\n帝国军三路展开，同盟军背靠暗礁星域列阵"},
    {t:0.10,text:"米达麦亚左翼开始高速迂回\n罗严塔尔右翼平行包抄"},
    {t:0.25,text:"舒坦因麦兹中央舰队正面牵制\n同盟前卫舰队与帝国中央接触"},
    {t:0.40,text:"帝国两翼深入同盟侧后方\n同盟军陷入半包围态势"},
    {t:0.55,text:"三路包围完成！\n同盟军被合围，舰队陷入混乱"},
    {t:0.70,text:"同盟军全线崩溃\n杨威利组织残余舰队突围"},
    {t:0.85,text:"杨威利率休伯利安及少数舰艇\n成功脱离战场"},
    {t:0.95,text:"同盟远征军几乎全灭\n亚姆利扎星域会战结束"}
  ],
  asteroidZones:[{cx:0,cz:-30,rx:40,rz:15,count:120},{cx:-20,cz:-15,rx:15,rz:10,count:40},{cx:25,cz:-25,rx:12,rz:8,count:30}]
};

// ============================================================
// 场景
// ============================================================
let scene, camera, renderer, asteroidGroup, trailGroup, starField, dangerGroup;
let fleetEntities = [], combatFlashes = [];
let clock = new THREE.Clock();
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let followTarget = null;  // 跟随旗舰模式
let currentViewMode = 'iso';

let animState = { progress: 0, playing: false, speed: 1, lastEventIndex: -1, finished: false };
const _upVec = new THREE.Vector3(0, 1, 0);

function initScene() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000812, 0.0006);
  renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = false;
  renderer.setClearColor(0x000508);
  document.getElementById('canvas-container').appendChild(renderer.domElement);
  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
  setView('iso');
  initOrbitControls();
  window.addEventListener('resize', onWindowResize);
  // 点击拾取
  renderer.domElement.addEventListener('click', onCanvasClick);
}

// ---- 预设视角 ----
function setView(mode) {
  currentViewMode = mode;
  followTarget = null;
  document.querySelectorAll('#view-presets button').forEach(b => b.classList.toggle('active', b.dataset.view === mode));
  switch(mode) {
    case 'iso': orbit.s = {r:180,p:Math.PI/4,t:Math.PI/6}; orbit.tgt.set(0,0,0); break;
    case 'top': orbit.s = {r:200,p:Math.PI/2-0.1,t:0}; orbit.tgt.set(0,0,0); break;
    case 'empire': orbit.s = {r:140,p:Math.PI/3.5,t:Math.PI}; orbit.tgt.set(0,0,40); break;
    case 'alliance': orbit.s = {r:140,p:Math.PI/3.5,t:0}; orbit.tgt.set(0,0,-20); break;
    case 'follow':
      // 跟随杨威利旗舰
      const yang = fleetEntities.find(e => e.data.id === 'alliance_main');
      if (yang) { followTarget = yang; orbit.s = {r:80,p:Math.PI/3,t:0}; }
      break;
  }
}

function setInitialCamera() { setView('iso'); }

// ---- OrbitControls ----
let orbit = { isDrag:false, isPan:false, px:0, py:0, s:{r:180,p:Math.PI/4,t:Math.PI/6}, tgt:new THREE.Vector3(0,0,0) };
function initOrbitControls() {
  const el = renderer.domElement;
  el.addEventListener('mousedown', e=>{ if(e.button===0)orbit.isDrag=true; if(e.button===2)orbit.isPan=true; orbit.px=e.clientX; orbit.py=e.clientY; });
  el.addEventListener('mousemove', e=>{ const dx=e.clientX-orbit.px, dy=e.clientY-orbit.py;
    if(orbit.isDrag){orbit.s.t-=dx*0.005; orbit.s.p=Math.max(0.1,Math.min(Math.PI/2-0.05,orbit.s.p-dy*0.005));}
    if(orbit.isPan){const ps=orbit.s.r*0.001;const r=new THREE.Vector3();r.crossVectors(camera.getWorldDirection(new THREE.Vector3()),new THREE.Vector3(0,1,0)).normalize();orbit.tgt.add(r.multiplyScalar(-dx*ps));orbit.tgt.y+=dy*ps;}
    orbit.px=e.clientX;orbit.py=e.clientY; });
  el.addEventListener('mouseup',()=>{orbit.isDrag=false;orbit.isPan=false;});
  el.addEventListener('mouseleave',()=>{orbit.isDrag=false;orbit.isPan=false;});
  el.addEventListener('wheel',e=>{orbit.s.r*=(1+e.deltaY*0.001);orbit.s.r=Math.max(50,Math.min(500,orbit.s.r));e.preventDefault();},{passive:false});
  el.addEventListener('contextmenu',e=>e.preventDefault());
  let tsd=0;
  el.addEventListener('touchstart',e=>{if(e.touches.length===1){orbit.isDrag=true;orbit.px=e.touches[0].clientX;orbit.py=e.touches[0].clientY;}else if(e.touches.length===2){orbit.isDrag=false;const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;tsd=Math.sqrt(dx*dx+dy*dy);}});
  el.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&orbit.isDrag){const dx=e.touches[0].clientX-orbit.px,dy=e.touches[0].clientY-orbit.py;orbit.s.t-=dx*0.005;orbit.s.p=Math.max(0.1,Math.min(Math.PI/2-0.05,orbit.s.p-dy*0.005));orbit.px=e.touches[0].clientX;orbit.py=e.touches[0].clientY;}else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const d=Math.sqrt(dx*dx+dy*dy);if(tsd>0){orbit.s.r*=(tsd/d);orbit.s.r=Math.max(50,Math.min(500,orbit.s.r));}tsd=d;}},{passive:false});
  el.addEventListener('touchend',()=>{orbit.isDrag=false;tsd=0;});
}
function updateCamera() {
  // 跟随旗舰模式
  if (followTarget && currentViewMode === 'follow') {
    const fp = followTarget.flagshipData.currentPos;
    orbit.tgt.lerp(fp, 0.1);
  }

  camera.position.set(s.r*Math.cos(s.p)*Math.sin(s.t)+orbit.tgt.x, s.r*Math.sin(s.p)+orbit.tgt.y, s.r*Math.cos(s.p)*Math.cos(s.t)+orbit.tgt.z);

}

function onCanvasClick(e) {
  // 排除拖拽
  if (orbit.isDrag) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  // 收集所有可点击的旗舰和战舰
  const clickables = [];
  fleetEntities.forEach(entity => {
    clickables.push({ mesh: entity.flagship, entity });
    entity.ships.forEach(s => clickables.push({ mesh: s.mesh, entity }));
  });
  const intersects = raycaster.intersectObjects(clickables.map(c => c.mesh));
  if (intersects.length > 0) {
    const hit = clickables.find(c => c.mesh === intersects[0].object);
    if (hit) showFleetDetail(hit.entity);
  }
}

// 舰队实体

function createWarshipGeo(scale) {
  scale = scale || 1;
  const geo = new THREE.ConeGeometry(1.2 * scale, 3.5 * scale, 4);
  geo.rotateX(-Math.PI / 2);
  return geo;
}
function createFlagshipGeo(scale) {
  scale = scale || 2.0;
  const geo = new THREE.ConeGeometry(1.8 * scale, 5.0 * scale, 6);
  geo.rotateX(-Math.PI / 2);
  return geo;
}

function tangentToQuaternion(pos, tangent) {
  const target = pos.clone().add(tangent);
  const m = new THREE.Matrix4();
  m.lookAt(pos, target, _upVec);
  const q = new THREE.Quaternion();
  q.setFromRotationMatrix(m);
  return q;
}

function createShipCurve(fleetCurve, lateralOffset, verticalOffset) {
  const numSamples = 60;
  const points = [];
  for (let i = 0; i <= numSamples; i++) {
    const t = Math.max(0.001, Math.min(0.999, i / numSamples));
    const pos = fleetCurve.getPointAt(t);
    const tangent = fleetCurve.getTangentAt(t).normalize();
    const right = new THREE.Vector3();
    right.crossVectors(tangent, _upVec).normalize();
    if (right.lengthSq() < 0.01) right.set(1, 0, 0);
    const offsetPoint = pos.clone();
    offsetPoint.addScaledVector(right, lateralOffset);
    offsetPoint.y += verticalOffset;
    points.push(offsetPoint);
  }
  return new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.5);
}

function getCurvature(curve, t) {
  const dt = 0.005;
  const t0 = Math.max(0.001, t - dt);
  const t1 = Math.min(0.999, t + dt);
  const tang0 = curve.getTangentAt(t0);
  const tang1 = curve.getTangentAt(t1);
  const angle = tang0.angleTo(tang1);
  return angle / (t1 - t0);
}

function createTextSprite(text, color) {
  const c=document.createElement('canvas'),ctx=c.getContext('2d');c.width=256;c.height=64;
  const hex='#'+new THREE.Color(color).getHexString();
  ctx.font='bold 26px Microsoft YaHei,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.strokeStyle='rgba(0,0,0,0.9)';ctx.lineWidth=4;ctx.strokeText(text,128,32);
  ctx.fillStyle=hex;ctx.fillText(text,128,32);
  const tex=new THREE.CanvasTexture(c);tex.needsUpdate=true;
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));s.scale.set(12,3,1);return s;
}

function createFleetEntities() {
  trailGroup = new THREE.Group();
  scene.add(trailGroup);
  const shipGeoSmall = createWarshipGeo(0.8);
  const shipGeoMedium = createWarshipGeo(1.0);
  const flagshipGeo = createFlagshipGeo(1.8);

  BATTLE_SCRIPT.fleets.forEach(fleetData => {
    const entity = { data: fleetData, curve: null, trail: null, ships: [], flagship: null, flagshipData: null, alive: fleetData.shipCount };
    const points = fleetData.waypoints.map(wp => new THREE.Vector3(wp.x, wp.y, wp.z));
    entity.curve = new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.5);
    const trailPts = entity.curve.getPoints(120);
    entity.trail = new THREE.Line(new THREE.BufferGeometry().setFromPoints(trailPts), new THREE.LineBasicMaterial({ color: fleetData.color, transparent: true, opacity: 0.2 }));
    trailGroup.add(entity.trail);

    const shipCount = fleetData.particleCount;
    for (let i = 0; i < shipCount; i++) {
      const geo = (i % 3 === 0) ? shipGeoMedium : shipGeoSmall;
      const mat = new THREE.MeshBasicMaterial({ color: fleetData.color, transparent: true, opacity: 0.9, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(geo, mat);
      const row = Math.floor(i / 5), col = i % 5;
      const sideDir = (col % 2 === 0) ? -1 : 1;
      const lateralOffset = sideDir * (Math.ceil(col / 2)) * 3.0 + (Math.random() - 0.5) * 1.5;
      const verticalOffset = (Math.random() - 0.5) * 1.5;
      const tOffset = row * 0.004 + (Math.random() - 0.5) * 0.002;
      const phase = Math.random() * Math.PI * 2;
      const shipCurve = createShipCurve(entity.curve, lateralOffset, verticalOffset);

      const engineGroup = new THREE.Group();
      const flameGeo = new THREE.ConeGeometry(0.3, 1.5, 4);
      flameGeo.rotateX(Math.PI / 2);
      const flame = new THREE.Mesh(flameGeo, new THREE.MeshBasicMaterial({ color: 0xffaa44, transparent: true, opacity: 0.7 }));
      flame.position.z = 2.0;
      engineGroup.add(flame);
      const glow = new THREE.Mesh(new THREE.SphereGeometry(0.4, 6, 6), new THREE.MeshBasicMaterial({ color: fleetData.color, transparent: true, opacity: 0.3 }));
      glow.position.z = 1.5;
      engineGroup.add(glow);

      const initT = Math.max(0.001, Math.min(0.999, tOffset));
      const initPos = shipCurve.getPointAt(initT);
      const initTangent = shipCurve.getTangentAt(initT);
      const initQuat = tangentToQuaternion(initPos, initTangent);
      mesh.position.copy(initPos);
      mesh.quaternion.copy(initQuat);

      entity.ships.push({ mesh, engineGroup, flame, glow, curve: shipCurve, tOffset, phase, quaternion: initQuat.clone(), currentPos: initPos.clone() });
      scene.add(mesh); scene.add(engineGroup);
    }

    const flagMat = new THREE.MeshBasicMaterial({ color: fleetData.color, transparent: true, opacity: 0.95, side: THREE.DoubleSide });
    const flagMesh = new THREE.Mesh(flagshipGeo, flagMat);
    const flagCurve = createShipCurve(entity.curve, 0, 0.5);
    const flagEngine = new THREE.Group();
    const fFlameGeo = new THREE.ConeGeometry(0.5, 2.5, 4); fFlameGeo.rotateX(Math.PI / 2);
    const fFlame = new THREE.Mesh(fFlameGeo, new THREE.MeshBasicMaterial({ color: 0xffaa44, transparent: true, opacity: 0.7 }));
    fFlame.position.z = 3.5; flagEngine.add(fFlame);
    const fGlow = new THREE.Mesh(new THREE.SphereGeometry(0.6, 6, 6), new THREE.MeshBasicMaterial({ color: fleetData.color, transparent: true, opacity: 0.3 }));
    fGlow.position.z = 2.5; flagEngine.add(fGlow);
    const ring = new THREE.Mesh(new THREE.RingGeometry(3.0, 3.5, 16), new THREE.MeshBasicMaterial({ color: fleetData.color, transparent: true, opacity: 0.15, side: THREE.DoubleSide }));
    ring.rotation.x = -Math.PI / 2;
    const label = createTextSprite(fleetData.flagship.name, fleetData.color);
    const flagInitT = 0.001;
    const flagInitPos = flagCurve.getPointAt(flagInitT);
    const flagInitTangent = flagCurve.getTangentAt(flagInitT);
    const flagInitQuat = tangentToQuaternion(flagInitPos, flagInitTangent);
    flagMesh.position.copy(flagInitPos); flagMesh.quaternion.copy(flagInitQuat);
    entity.flagship = flagMesh;
    entity.flagshipData = { curve: flagCurve, engineGroup: flagEngine, flame: fFlame, glow: fGlow, ring, label, quaternion: flagInitQuat.clone(), currentPos: flagInitPos.clone() };
    scene.add(flagMesh); scene.add(flagEngine); scene.add(ring); scene.add(label);
    fleetEntities.push(entity);
  });
}

// ============================================================
// 动画更新
// ============================================================
function rateLimitedSlerp(currentQ, targetQ, delta, maxRate) {
  maxRate = maxRate || Math.PI / 2;
  const angle = currentQ.angleTo(targetQ);
  if (angle < 0.001) return;
  const t = Math.min(1, maxRate * delta / angle);
  currentQ.slerp(targetQ, t);
}

function updateFleetPositions(t, delta) {
  const time = performance.now() * 0.001;
  fleetEntities.forEach(entity => {
    entity.ships.forEach(ship => {
      const shipT = Math.max(0.001, Math.min(0.999, t + ship.tOffset));
      const shipPos = ship.curve.getPointAt(shipT);
      const shipTangent = ship.curve.getTangentAt(shipT);
      const curvature = getCurvature(ship.curve, shipT);
      const speedFactor = 1.0 / (1.0 + curvature * 2.0);
      ship.currentPos.copy(shipPos);
      ship.currentPos.x += Math.sin(time * 1.5 + ship.phase) * 0.2 * speedFactor;
      ship.currentPos.y += Math.cos(time * 1.2 + ship.phase) * 0.1 * speedFactor;
      ship.mesh.position.copy(ship.currentPos);
      const shipQuat = tangentToQuaternion(shipPos, shipTangent);
      const wobbleAngle = Math.sin(time * 0.8 + ship.phase * 3) * 0.02;
      const wobbleQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), wobbleAngle);
      shipQuat.multiply(wobbleQuat);
      rateLimitedSlerp(ship.quaternion, shipQuat, delta, Math.PI / 2 * speedFactor);
      ship.mesh.quaternion.copy(ship.quaternion);
      ship.engineGroup.position.copy(ship.currentPos);
      ship.engineGroup.quaternion.copy(ship.quaternion);
      const baseFlicker = 0.5 + Math.sin(time * 8 + ship.phase * 3) * 0.3;
      const flicker = baseFlicker * (0.4 + speedFactor * 0.6);
      ship.flame.material.opacity = flicker;
      ship.glow.material.opacity = flicker * 0.4;
    });

    const fd = entity.flagshipData;
    const flagT = Math.max(0.001, Math.min(0.999, t));
    const flagPos = fd.curve.getPointAt(flagT);
    const flagTangent = fd.curve.getTangentAt(flagT);
    fd.currentPos.copy(flagPos);
    entity.flagship.position.copy(fd.currentPos);
    const flagQuat = tangentToQuaternion(flagPos, flagTangent);
    const flagCurvature = getCurvature(fd.curve, flagT);
    const flagSpeedFactor = 1.0 / (1.0 + flagCurvature * 2.0);
    rateLimitedSlerp(fd.quaternion, flagQuat, delta, Math.PI / 2 * flagSpeedFactor);
    entity.flagship.quaternion.copy(fd.quaternion);
    fd.engineGroup.position.copy(fd.currentPos);
    fd.engineGroup.quaternion.copy(fd.quaternion);
    const fFlicker = (0.6 + Math.sin(time * 6) * 0.3) * (0.4 + flagSpeedFactor * 0.6);
    fd.flame.material.opacity = fFlicker;
    fd.glow.material.opacity = fFlicker * 0.4;
    fd.ring.position.copy(fd.currentPos); fd.ring.position.y += 1; fd.ring.rotation.z += 0.02;
    fd.label.position.copy(fd.currentPos); fd.label.position.y += 6;

    const fleet = entity.data;
    let sr = 1.0;
    if (fleet.side === 'alliance') { if (t > 0.55) sr = Math.max(0.05, 1.0 - (t-0.55)/0.45*0.95); }
    else { if (t > 0.45) sr = Math.max(0.85, 1.0 - (t-0.45)/0.55*0.15); }
    const prev = entity.alive;
    entity.alive = Math.round(fleet.shipCount * sr);
    if (entity.alive < prev && Math.random() < 0.4) spawnExplosionAt(fd.currentPos.x+(Math.random()-0.5)*12, 0.5+Math.random()*2, fd.currentPos.z+(Math.random()-0.5)*12);
    const vis = Math.round(entity.ships.length * sr);
    entity.ships.forEach((s,i) => { const v = i < vis; s.mesh.visible = v; s.engineGroup.visible = v; });
  });
}

function updateCombatEffects(t) {

  const bp=document.getElementById('btn-play');
  bp.addEventListener('click',()=>{animState.playing=!animState.playing;bp.textContent=animState.playing?'⏸ 暂停':'▶ 播放';bp.classList.toggle('active',animState.playing);});
  const sp=[0.5,1,2,4];let si=1;const bs=document.getElementById('btn-speed');bs.addEventListener('click',()=>{si=(si+1)%sp.length;animState.speed=sp[si];bs.textContent=sp[si]+'x';});
  const pw=document.getElementById('progress-wrap');let dg=false;
  function sp2(e){const r=pw.getBoundingClientRect();const x=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));animState.progress=x;animState.lastEventIndex=-1;animState.finished=false;document.getElementById('result-panel').classList.remove('visible');BATTLE_SCRIPT.events.forEach((ev,i)=>{if(x>=ev.t)animState.lastEventIndex=i;});}
  pw.addEventListener('mousedown',e=>{dg=true;sp2(e);});window.addEventListener('mousemove',e=>{if(dg)sp2(e);});window.addEventListener('mouseup',()=>{dg=false;});
  pw.addEventListener('touchstart',e=>{dg=true;sp2(e.touches[0]);});window.addEventListener('touchmove',e=>{if(dg)sp2(e.touches[0]);});window.addEventListener('touchend',()=>{dg=false;});

  // 阶段跳转
  document.querySelectorAll('#phase-jumps button').forEach(btn => {
    btn.addEventListener('click', () => {
      animState.progress = parseFloat(btn.dataset.t);
      animState.lastEventIndex = -1;
      animState.finished = false;
      document.getElementById('result-panel').classList.remove('visible');
      BATTLE_SCRIPT.events.forEach((ev,i)=>{if(animState.progress>=ev.t)animState.lastEventIndex=i;});
    });
  });

  // 预设视角
  document.querySelectorAll('#view-presets button').forEach(btn => {
    btn.addEventListener('click', () => setView(btn.dataset.view));
  });

  // 工具按钮
  document.getElementById('reset-view').addEventListener('click', () => setView('iso'));
  document.getElementById('btn-screenshot').addEventListener('click', screenshot);
  document.getElementById('btn-share').addEventListener('click', shareProgress);

  // 图层开关
  document.getElementById('toggle-asteroids').addEventListener('click',function(){asteroidGroup.visible=!asteroidGroup.visible;this.classList.toggle('off',!asteroidGroup.visible);this.textContent=asteroidGroup.visible?'◉ 小行星带':'○ 小行星带';});
  document.getElementById('toggle-trails').addEventListener('click',function(){trailGroup.visible=!trailGroup.visible;this.classList.toggle('off',!trailGroup.visible);this.textContent=trailGroup.visible?'◉ 轨迹线':'○ 轨迹线';});
  document.getElementById('toggle-danger').addEventListener('click',function(){dangerGroup.visible=!dangerGroup.visible;this.classList.toggle('off',!dangerGroup.visible);this.textContent=dangerGroup.visible?'◉ 危险区':'○ 危险区';});

  // 键盘快捷键
  window.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); bp.click(); }
    else if (e.code === 'ArrowLeft') { animState.progress = Math.max(0, animState.progress - 0.05); animState.lastEventIndex = -1; BATTLE_SCRIPT.events.forEach((ev,i)=>{if(animState.progress>=ev.t)animState.lastEventIndex=i;}); }
    else if (e.code === 'ArrowRight') { animState.progress = Math.min(1, animState.progress + 0.05); animState.lastEventIndex = -1; BATTLE_SCRIPT.events.forEach((ev,i)=>{if(animState.progress>=ev.t)animState.lastEventIndex=i;}); }
    else if (e.code === 'KeyR') { setView('iso'); }
    else if (e.code === 'KeyF') { setView('follow'); }
  });

  // URL 进度参数
  const urlParams = new URLSearchParams(window.location.search);
  const tParam = urlParams.get('t');
  if (tParam) { animState.progress = Math.max(0, Math.min(1, parseFloat(tParam))); animState.lastEventIndex = -1; BATTLE_SCRIPT.events.forEach((ev,i)=>{if(animState.progress>=ev.t)animState.lastEventIndex=i;}); }
}

// ---- 截图 ----
function screenshot() {
  renderer.render(scene, camera);
  const dataURL = renderer.domElement.toDataURL('image/png');
  const link = document.createElement('a');
  link.download = 'amritzer_battle_' + Math.round(animState.progress*100) + '%.png';
  link.href = dataURL;
  link.click();
}

// ---- 分享进度 ----
function shareProgress() {
  const url = window.location.origin + window.location.pathname + '?t=' + animState.progress.toFixed(2);
  navigator.clipboard.writeText(url).then(() => {
    showEventToast('分享链接已复制到剪贴板\n' + url);
  }).catch(() => {
    showEventToast('请手动复制链接\n' + url);
  });
}

// ============================================================
// 主循环
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  if (animState.playing) {
    animState.progress += delta * 0.02 * animState.speed;
    if (animState.progress >= 1.0) {
      animState.progress = 1.0; animState.playing = false; animState.finished = true;
      document.getElementById('btn-play').textContent = '▶ 播放';
      document.getElementById('btn-play').classList.remove('active');
      showResultPanel();
    }
  }
  updateFleetPositions(animState.progress, delta);
  updateCombatEffects(animState.progress);
  checkEvents(animState.progress);
  updateInfoPanel(animState.progress);
  if (starField) starField.rotation.y += delta * 0.003;
  if (asteroidGroup && asteroidGroup.visible) asteroidGroup.children.forEach(a=>{a.rotation.x+=a.userData.rs.x*delta*60;a.rotation.y+=a.userData.rs.y*delta*60;});
  updateCamera();
  renderer.render(scene, camera);
}
function onWindowResize() { camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); }

function init() {
  console.log('[INFO] 亚姆利扎星域会战 3D 沙盘初始化中...');
  initScene(); createGroundGrid(); createNebula(); createAsteroidField(); createDangerZones(); createStarField(); createFleetEntities(); initControls();
  updateFleetPositions(0, 0.016); updateInfoPanel(0);
  console.log('[INFO] 初始化完成'); animate();
}
init();
</script>
