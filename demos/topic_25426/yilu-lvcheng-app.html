<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>衣路旅程 - AI智能旅行穿搭规划</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'Noto Sans SC', 'sans-serif'],
            display: ['Outfit', 'Noto Sans SC', 'sans-serif'],
          },
          colors: {
            cream: '#FAF7F2',
            sand: '#F0EBE3',
            clay: '#D4A574',
            terra: '#C17F59',
            moss: '#8FA68E',
            sky: '#A8C4D9',
            blush: '#D9A8A8',
            ink: '#2D2926',
            inklight: '#6B6560',
            inkmuted: '#9E9892',
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --cream: #FAF7F2;
      --sand: #F0EBE3;
      --clay: #D4A574;
      --terra: #C17F59;
      --moss: #8FA68E;
      --sky: #A8C4D9;
      --blush: #D9A8A8;
      --ink: #2D2926;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', 'Noto Sans SC', sans-serif;
      background: var(--cream);
      color: var(--ink);
      overflow-x: hidden;
    }

    /* ===== ANIMATED CLOUD BACKGROUND ===== */
    .cloud-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .cloud {
      position: absolute;
      background: linear-gradient(135deg, rgba(168,196,217,0.15), rgba(212,165,116,0.08));
      border-radius: 50%;
      filter: blur(40px);
      animation: cloudFloat linear infinite;
    }

    .cloud:nth-child(1) { width: 300px; height: 300px; top: 10%; left: -10%; animation-duration: 25s; }
    .cloud:nth-child(2) { width: 200px; height: 200px; top: 60%; left: 70%; animation-duration: 30s; animation-delay: -5s; }
    .cloud:nth-child(3) { width: 250px; height: 250px; top: 30%; left: 50%; animation-duration: 35s; animation-delay: -10s; }
    .cloud:nth-child(4) { width: 180px; height: 180px; top: 80%; left: 20%; animation-duration: 28s; animation-delay: -15s; }
    .cloud:nth-child(5) { width: 220px; height: 220px; top: 5%; left: 80%; animation-duration: 32s; animation-delay: -8s; }

    @keyframes cloudFloat {
      0% { transform: translateX(0) translateY(0); }
      25% { transform: translateX(50px) translateY(-20px); }
      50% { transform: translateX(100px) translateY(10px); }
      75% { transform: translateX(50px) translateY(-10px); }
      100% { transform: translateX(0) translateY(0); }
    }

    /* ===== PAGE TRANSITIONS ===== */
    .page {
      display: none;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    .page.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== NAVBAR ===== */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(250,247,242,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(45,41,38,0.06);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 20px;
      color: var(--ink);
      cursor: pointer;
    }

    .nav-logo i { color: var(--terra); font-size: 24px; }

    .nav-links {
      display: flex;
      gap: 8px;
    }

    .nav-link {
      padding: 8px 18px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      color: var(--inklight);
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      background: transparent;
    }

    .nav-link:hover, .nav-link.active {
      background: rgba(193,127,89,0.1);
      color: var(--terra);
    }

    /* ===== CARDS ===== */
    .card {
      background: white;
      border-radius: 20px;
      border: 1px solid rgba(45,41,38,0.06);
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(45,41,38,0.08);
    }

    /* ===== CITY CARDS ===== */
    .city-card {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 4/5;
    }

    .city-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .city-card:hover img { transform: scale(1.08); }

    .city-card-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 80px 20px 20px;
      background: linear-gradient(transparent, rgba(45,41,38,0.7));
      color: white;
    }

    .city-card-overlay h3 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .city-card-overlay p {
      font-size: 13px;
      opacity: 0.85;
    }

    /* ===== ROUTE CARDS ===== */
    .route-card {
      background: white;
      border-radius: 20px;
      border: 2px solid transparent;
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .route-card:hover { border-color: var(--clay); }

    .route-card.selected {
      border-color: var(--terra);
      background: rgba(193,127,89,0.03);
    }

    .route-tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    /* ===== SPOT ITEMS ===== */
    .spot-item {
      display: flex;
      gap: 16px;
      padding: 16px;
      border-radius: 16px;
      background: var(--cream);
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .spot-item:hover { background: var(--sand); }

    .spot-item.selected {
      border-color: var(--terra);
      background: rgba(193,127,89,0.05);
    }

    .spot-thumb {
      width: 80px; height: 80px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
    }

    /* ===== WEATHER WIDGET ===== */
    .weather-widget {
      background: linear-gradient(135deg, #A8C4D9, #8FA68E);
      border-radius: 20px;
      padding: 24px;
      color: white;
    }

    .weather-icon-anim {
      animation: weatherPulse 3s ease-in-out infinite;
    }

    @keyframes weatherPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    /* ===== OUTFIT PANEL ===== */
    .outfit-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -10px 40px rgba(45,41,38,0.12);
      z-index: 200;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      max-height: 85vh;
      overflow-y: auto;
    }

    .outfit-panel.open { transform: translateY(0); }

    .outfit-panel-handle {
      width: 40px; height: 4px;
      background: var(--inkmuted);
      border-radius: 2px;
      margin: 12px auto;
    }

    /* ===== WARDROBE GRID ===== */
    .wardrobe-item {
      position: relative;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      cursor: grab;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .wardrobe-item:active { cursor: grabbing; }

    .wardrobe-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(45,41,38,0.08);
    }

    .wardrobe-item.dragging {
      opacity: 0.5;
      transform: scale(1.05);
    }

    .wardrobe-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: linear-gradient(135deg, var(--sand), var(--cream));
    }

    /* ===== TIMELINE ===== */
    .timeline-item {
      position: relative;
      padding-left: 40px;
      padding-bottom: 32px;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 8px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--terra);
      border: 3px solid var(--cream);
      box-shadow: 0 0 0 2px var(--terra);
    }

    .timeline-item::after {
      content: '';
      position: absolute;
      left: 13px;
      top: 24px;
      width: 2px;
      bottom: 0;
      background: linear-gradient(180deg, var(--terra), transparent);
    }

    .timeline-item:last-child::after { display: none; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(45,41,38,0.5);
      backdrop-filter: blur(8px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: white;
      border-radius: 24px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    /* ===== UPLOAD ANIMATION ===== */
    .upload-processing {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 40px;
    }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--sand);
      border-top-color: var(--terra);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--inkmuted); border-radius: 3px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .navbar { padding: 0 16px; }
      .nav-links { gap: 4px; }
      .nav-link { padding: 6px 12px; font-size: 13px; }
    }

    /* ===== REVEAL ANIMATION ===== */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: all 0.6s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }

    /* ===== FLOATING ACTION BUTTON ===== */
    .fab {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--terra), var(--clay));
      color: white;
      border: none;
      box-shadow: 0 8px 24px rgba(193,127,89,0.35);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s ease;
      z-index: 150;
    }

    .fab:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 32px rgba(193,127,89,0.45);
    }

    /* ===== CHECKLIST ITEM ===== */
    .checklist-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--cream);
      margin-bottom: 8px;
    }

    .checklist-item input[type="checkbox"] {
      width: 20px; height: 20px;
      accent-color: var(--terra);
      cursor: pointer;
    }

    /* ===== COLOR TAG ===== */
    .color-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      background: var(--sand);
    }

    .color-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <!-- Animated Cloud Background -->
  <div class="cloud-bg">
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-logo" onclick="showPage('home')">
      <i class="fa-solid fa-shirt"></i>
      <span>衣路旅程</span>
    </div>
    <div class="nav-links">
      <button class="nav-link" data-page="home" onclick="showPage('home')">首页</button>
      <button class="nav-link" data-page="wardrobe" onclick="showPage('wardrobe')">我的衣橱</button>
      <button class="nav-link" data-page="itinerary" onclick="showPage('itinerary')">我的行程</button>
    </div>
  </nav>

  <!-- ===== PAGE: HOME ===== -->
  <div id="page-home" class="page active">
    <div class="pt-24 pb-16 px-6 max-w-6xl mx-auto">
      <!-- Hero -->
      <div class="text-center mb-16 reveal">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-terra/10 text-terra text-sm font-medium mb-6">
          <i class="fa-solid fa-wand-magic-sparkles"></i>
          AI 智能穿搭规划
        </div>
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4 leading-tight">
          下一站，<span class="text-terra">穿对衣服</span>
        </h1>
        <p class="text-inklight text-lg max-w-xl mx-auto">
          选择目的地，AI为你规划路线并推荐穿搭，让每一张照片都出彩
        </p>
      </div>

      <!-- Search -->
      <div class="max-w-xl mx-auto mb-12 reveal reveal-delay-1">
        <div class="relative">
          <input
            type="text"
            id="citySearch"
            placeholder="搜索城市..."
            class="w-full px-6 py-4 pl-14 rounded-2xl border border-ink/8 bg-white shadow-lg shadow-ink/5 text-base focus:outline-none focus:ring-2 focus:ring-terra/30 transition-all"
            oninput="filterCities(this.value)"
          >
          <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-inkmuted"></i>
        </div>
      </div>

      <!-- Cities Grid -->
      <div class="mb-8 reveal reveal-delay-2">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
          <i class="fa-solid fa-fire text-terra"></i>
          热门目的地
        </h2>
        <div id="cityGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
          <!-- Cities injected by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- ===== PAGE: ROUTE PLANNING ===== -->
  <div id="page-route" class="page">
    <div class="pt-24 pb-16 px-6 max-w-7xl mx-auto">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <!-- Left: Trip Info -->
        <div class="lg:col-span-3 reveal">
          <div class="card p-6 sticky top-24">
            <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
              <i class="fa-solid fa-sliders text-terra"></i>
              行程设置
            </h3>
            <div class="space-y-4">
              <div>
                <label class="text-xs text-inkmuted uppercase tracking-wider">目的地</label>
                <div id="selectedCityDisplay" class="font-bold text-xl mt-1">--</div>
              </div>
              <div>
                <label class="text-xs text-inkmuted uppercase tracking-wider">日期</label>
                <input type="date" id="tripDate" class="w-full mt-1 px-3 py-2 rounded-xl border border-ink/8 bg-cream text-sm focus:outline-none focus:ring-2 focus:ring-terra/30">
              </div>
              <div>
                <label class="text-xs text-inkmuted uppercase tracking-wider">出行目的</label>
                <div class="flex gap-2 mt-2">
                  <button class="purpose-btn flex-1 py-2 rounded-xl text-sm border border-ink/8 bg-cream hover:bg-terra/10 hover:border-terra/30 transition-all" data-purpose="leisure" onclick="selectPurpose(this)">休闲</button>
                  <button class="purpose-btn flex-1 py-2 rounded-xl text-sm border border-ink/8 bg-cream hover:bg-terra/10 hover:border-terra/30 transition-all" data-purpose="business" onclick="selectPurpose(this)">商务</button>
                  <button class="purpose-btn flex-1 py-2 rounded-xl text-sm border border-ink/8 bg-cream hover:bg-terra/10 hover:border-terra/30 transition-all" data-purpose="adventure" onclick="selectPurpose(this)">探险</button>
                </div>
              </div>
              <button onclick="generateRoutes()" class="w-full py-3 rounded-xl bg-gradient-to-r from-terra to-clay text-white font-semibold text-sm hover:shadow-lg hover:shadow-terra/25 transition-all">
                <i class="fa-solid fa-wand-magic-sparkles mr-1"></i>
                AI生成路线
              </button>
            </div>
          </div>
        </div>

        <!-- Center: Routes -->
        <div class="lg:col-span-6">
          <div class="mb-6 reveal">
            <h2 class="text-2xl font-bold mb-2">推荐路线</h2>
            <p class="text-inklight text-sm">AI根据你的偏好生成的专属路线</p>
          </div>
          <div id="routesContainer" class="space-y-4">
            <!-- Routes injected by JS -->
          </div>
        </div>

        <!-- Right: Weather -->
        <div class="lg:col-span-3 reveal reveal-delay-1">
          <div class="sticky top-24 space-y-4">
            <div class="weather-widget">
              <div class="flex items-center justify-between mb-4">
                <div>
                  <div id="weatherCity" class="text-sm opacity-80">请选择城市</div>
                  <div id="weatherTemp" class="text-4xl font-bold mt-1">--°</div>
                </div>
                <div id="weatherIcon" class="weather-icon-anim text-4xl">
                  <i class="fa-solid fa-sun"></i>
                </div>
              </div>
              <div class="grid grid-cols-3 gap-2 text-center text-xs opacity-80">
                <div>
                  <i class="fa-solid fa-droplet mb-1 block"></i>
                  <span id="weatherRain">--%</span>
                </div>
                <div>
                  <i class="fa-solid fa-wind mb-1 block"></i>
                  <span id="weatherWind">--km/h</span>
                </div>
                <div>
                  <i class="fa-solid fa-gauge-high mb-1 block"></i>
                  <span id="weatherHumidity">--%</span>
                </div>
              </div>
            </div>
            <div class="card p-4">
              <h4 class="font-semibold text-sm mb-3">穿搭建议</h4>
              <div id="weatherAdvice" class="text-sm text-inklight">
                选择城市后查看天气穿搭建议
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== PAGE: WARDROBE ===== -->
  <div id="page-wardrobe" class="page">
    <div class="pt-24 pb-16 px-6 max-w-6xl mx-auto">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8 reveal">
        <div>
          <h2 class="text-2xl font-bold mb-1">我的衣橱</h2>
          <p class="text-inklight text-sm">已收录 <span id="wardrobeCount">0</span> 件单品</p>
        </div>
        <button onclick="openUploadModal()" class="mt-4 md:mt-0 px-6 py-3 rounded-xl bg-gradient-to-r from-terra to-clay text-white font-semibold text-sm hover:shadow-lg hover:shadow-terra/25 transition-all">
          <i class="fa-solid fa-plus mr-2"></i>上传衣物
        </button>
      </div>

      <!-- Category Filter -->
      <div class="flex gap-2 mb-6 overflow-x-auto pb-2 reveal reveal-delay-1">
        <button class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-terra text-white" data-category="all" onclick="filterWardrobe('all')">全部</button>
        <button class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-sand text-inklight hover:bg-terra/10" data-category="top" onclick="filterWardrobe('top')">上衣</button>
        <button class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-sand text-inklight hover:bg-terra/10" data-category="bottom" onclick="filterWardrobe('bottom')">下装</button>
        <button class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-sand text-inklight hover:bg-terra/10" data-category="outer" onclick="filterWardrobe('outer')">外套</button>
        <button class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-sand text-inklight hover:bg-terra/10" data-category="shoes" onclick="filterWardrobe('shoes')">鞋履</button>
        <button class="category-btn px-4 py-2 rounded-full text-sm font-medium bg-sand text-inklight hover:bg-terra/10" data-category="accessory" onclick="filterWardrobe('accessory')">配饰</button>
      </div>

      <!-- Wardrobe Grid -->
      <div id="wardrobeGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
        <!-- Items injected by JS -->
      </div>
    </div>
  </div>

  <!-- ===== PAGE: ITINERARY ===== -->
  <div id="page-itinerary" class="page">
    <div class="pt-24 pb-16 px-6 max-w-4xl mx-auto">
      <div class="text-center mb-12 reveal">
        <h2 class="text-3xl font-bold mb-2">我的行程</h2>
        <p class="text-inklight">精心规划的每一站，都搭配了最适合的穿搭</p>

    // ==================== NAVIGATION ====================
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

      const targetPage = document.getElementById('page-' + pageId);
      if (targetPage) {
        targetPage.classList.add('active');
        const navLink = document.querySelector(`.nav-link[data-page="${pageId}"]`);
        if (navLink) navLink.classList.add('active');
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });

      if (pageId === 'itinerary') renderItinerary();
    }

    // ==================== HOME PAGE ====================
    function renderCities(filter = '') {
      const grid = document.getElementById('cityGrid');
      const filtered = cities.filter(c => c.name.includes(filter) || c.tagline.includes(filter));

      grid.innerHTML = filtered.map(city => `
        <div class="city-card reveal" onclick="selectCity('${city.id}')">
          <img src="${city.image}" alt="${city.name}" loading="lazy">
          <div class="city-card-overlay">
            <h3>${city.name}</h3>
            <p>${city.tagline}</p>
          </div>
        </div>
      `).join('');

      setupScrollReveal();
    }

    function filterCities(query) {
      renderCities(query);
    }

    function selectCity(cityId) {
      currentCity = cities.find(c => c.id === cityId);
      if (!currentCity) return;

      document.getElementById('selectedCityDisplay').textContent = currentCity.name;
      updateWeather(currentCity);
      showPage('route');
    }

    // ==================== WEATHER ====================
    function updateWeather(city) {
      document.getElementById('weatherCity').textContent = city.name;
      document.getElementById('weatherTemp').textContent = city.temp + '°';
      document.getElementById('weatherRain').textContent = Math.floor(Math.random() * 30 + 5) + '%';
      document.getElementById('weatherWind').textContent = Math.floor(Math.random() * 15 + 5) + 'km/h';
      document.getElementById('weatherHumidity').textContent = Math.floor(Math.random() * 40 + 40) + '%';

      const iconMap = {
        sunny: '<i class="fa-solid fa-sun"></i>',
        cloudy: '<i class="fa-solid fa-cloud-sun"></i>',
        rainy: '<i class="fa-solid fa-cloud-rain"></i>',
      };
      document.getElementById('weatherIcon').innerHTML = iconMap[city.weather] || iconMap.sunny;

      const adviceMap = {
        sunny: '天气晴朗，建议穿着轻薄透气衣物，做好防晒措施。',
        cloudy: '多云天气，气温适宜，可搭配轻薄外套。',
        rainy: '有降雨概率，建议携带雨具，穿着防水鞋履。',
      };
      document.getElementById('weatherAdvice').textContent = adviceMap[city.weather] || adviceMap.sunny;
    }

      document.querySelectorAll('.purpose-btn').forEach(b => {
        b.classList.remove('bg-terra', 'text-white');

      });
      btn.classList.remove('bg-cream', 'text-inklight');
      btn.classList.add('bg-terra', 'text-white');
      tripPurpose = btn.dataset.purpose;
    }

      if (!currentCity) return;
      const routes = routesData[currentCity.id] || [];
      const container = document.getElementById('routesContainer');

      container.innerHTML = routes.map((route, idx) => `
        <div class="route-card reveal reveal-delay-${idx + 1}" data-route="${route.id}" onclick="selectRoute('${route.id}')">
          <div class="route-tag ${route.tagColor}">${route.tag}</div>
          <h3 class="font-bold text-lg mb-2">${route.name}</h3>
          <div class="space-y-3 mt-4">
            ${route.spots.map(spot => `
              <div class="spot-item" data-spot="${spot.id}" onclick="event.stopPropagation(); showOutfitPanel('${spot.id}', '${spot.name}', '${spot.scene}')">
                <img src="${spot.image}" class="spot-thumb" alt="${spot.name}">
                <div class="flex-1 min-w-0">
                  <div class="font-semibold text-sm">${spot.name}</div>
                  <div class="text-xs text-inkmuted mt-0.5">${spot.desc}</div>
                  <div class="flex items-center gap-2 mt-1.5">
                    <span class="text-xs text-inkmuted"><i class="fa-regular fa-clock mr-1"></i>${spot.duration}</span>

          <div class="mt-4 pt-4 border-t border-ink/5 flex items-center justify-between">
            <span class="text-xs text-inkmuted">共 ${route.spots.length} 个景点</span>
            <button class="px-4 py-2 rounded-xl bg-terra/10 text-terra text-sm font-medium hover:bg-terra hover:text-white transition-all" onclick="event.stopPropagation(); confirmRoute('${route.id}')">
              使用此路线
            </button>
          </div>
        </div>
      `).join('');

      setupScrollReveal();
    }

    function selectRoute(routeId) {
      document.querySelectorAll('.route-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`.route-card[data-route="${routeId}"]`)?.classList.add('selected');
      selectedRoute = routeId;
    }

    function confirmRoute(routeId) {
      selectedRoute = routeId;
      const route = getRouteById(routeId);
      if (route) {
        route.spots.forEach(spot => {
          selectedSpots[spot.id] = spot;
        });
      }
      alert('路线已确认！请为每个景点选择穿搭。');
    }

    function getRouteById(routeId) {
      for (const cityRoutes of Object.values(routesData)) {
        const route = cityRoutes.find(r => r.id === routeId);
        if (route) return route;
      }
      return null;
    }

    function getSpotById(spotId) {
      for (const cityRoutes of Object.values(routesData)) {
        for (const route of cityRoutes) {
          const spot = route.spots.find(s => s.id === spotId);
          if (spot) return spot;
        }
      }
      return null;
    }

    // ==================== OUTFIT PANEL ====================
    function showOutfitPanel(spotId, spotName, scene) {
      const panel = document.getElementById('outfitPanel');
      document.getElementById('outfitSpotName').textContent = spotName;
      document.getElementById('outfitSpotScene').textContent = scene;

      // Generate 2-3 outfit options from wardrobe
      const options = generateOutfitOptions(scene);
      const container = document.getElementById('outfitOptions');

      container.innerHTML = options.map((outfit, idx) => `
        <div class="card p-4 ${selectedOutfits[spotId] === idx ? 'ring-2 ring-terra' : ''}" onclick="selectOutfit('${spotId}', ${idx})">
          <div class="flex items-center justify-between mb-3">
            <span class="font-semibold">搭配方案 ${idx + 1}</span>
            ${selectedOutfits[spotId] === idx ? '<span class="text-terra text-sm font-medium"><i class="fa-solid fa-check-circle mr-1"></i>已选择</span>' : ''}
          </div>
          <div class="grid grid-cols-5 gap-2">
            ${outfit.items.map(item => `
              <div class="text-center">
                <div class="aspect-square rounded-xl overflow-hidden bg-sand mb-1">
                  <img src="${item.image}" class="w-full h-full object-cover" alt="${item.name}">
                </div>
                <div class="text-xs font-medium truncate">${item.name}</div>
                <div class="color-tag mt-0.5">
                  <span class="color-dot" style="background:${item.colorHex}"></span>
                  <span>${item.color}</span>
                </div>
              </div>
            `).join('')}
          </div>
          ${outfit.missing.length > 0 ? `
            <div class="mt-3 pt-3 border-t border-ink/5">
              <div class="text-xs text-inkmuted mb-2">缺少单品</div>
              <div class="flex gap-2 flex-wrap">
                ${outfit.missing.map(m => `
                  <button class="px-3 py-1.5 rounded-full bg-terra/10 text-terra text-xs font-medium hover:bg-terra hover:text-white transition-all">
                    <i class="fa-solid fa-bag-shopping mr-1"></i>缺少${m}，推荐购买
                  </button>
                `).join('')}
              </div>
            </div>
          ` : ''}
        </div>
      `).join('');

      panel.classList.add('open');
    }

    function generateOutfitOptions(scene) {
      const tops = wardrobeData.filter(i => i.category === 'top');
      const bottoms = wardrobeData.filter(i => i.category === 'bottom');
      const outers = wardrobeData.filter(i => i.category === 'outer');
      const shoes = wardrobeData.filter(i => i.category === 'shoes');
      const accessories = wardrobeData.filter(i => i.category === 'accessory');

      const options = [];
      for (let i = 0; i < 3; i++) {
        const items = [
          tops[Math.floor(Math.random() * tops.length)],
          bottoms[Math.floor(Math.random() * bottoms.length)],
          outers[Math.floor(Math.random() * outers.length)],
          shoes[Math.floor(Math.random() * shoes.length)],
          accessories[Math.floor(Math.random() * accessories.length)],
        ].filter(Boolean);

        const missing = [];
        if (items.filter(i => i.category === 'top').length === 0) missing.push('上衣');
        if (items.filter(i => i.category === 'bottom').length === 0) missing.push('下装');
        if (items.filter(i => i.category === 'shoes').length === 0) missing.push('鞋履');

        options.push({ items, missing });
      }
      return options;
    }

    function selectOutfit(spotId, outfitIdx) {
      selectedOutfits[spotId] = outfitIdx;
      closeOutfitPanel();
      generateRoutes(); // Refresh to show "已选穿搭" badge
    }

    function closeOutfitPanel() {
      document.getElementById('outfitPanel').classList.remove('open');
    }

    // ==================== WARDROBE ====================
    function renderWardrobe() {
      const grid = document.getElementById('wardrobeGrid');
      const filtered = currentWardrobeFilter === 'all'
        ? wardrobeData
        : wardrobeData.filter(i => i.category === currentWardrobeFilter);

      document.getElementById('wardrobeCount').textContent = wardrobeData.length;

      grid.innerHTML = filtered.map((item, idx) => `
        <div class="wardrobe-item reveal reveal-delay-${(idx % 5) + 1}" draggable="true" data-id="${item.id}" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="drop(event)">
          <div class="wardrobe-img">
            <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover" style="mix-blend-mode: multiply;">
          </div>
          <div class="p-3">
            <div class="font-medium text-sm">${item.name}</div>
            <div class="flex items-center gap-2 mt-1">
              <div class="color-tag">
                <span class="color-dot" style="background:${item.colorHex}"></span>
                <span>${item.color}</span>
              </div>
              <span class="text-xs text-inkmuted">${item.style}</span>
            </div>
          </div>
        </div>
      `).join('');

      setupScrollReveal();
    }

    function filterWardrobe(category) {
      currentWardrobeFilter = category;
      document.querySelectorAll('.category-btn').forEach(btn => {
        if (btn.dataset.category === category) {
          btn.classList.remove('bg-sand', 'text-inklight');
          btn.classList.add('bg-terra', 'text-white');
        } else {
          btn.classList.remove('bg-terra', 'text-white');
          btn.classList.add('bg-sand', 'text-inklight');
        }
      });
      renderWardrobe();
    }

    // Drag & Drop
    let draggedItem = null;

    function dragStart(e) {
      draggedItem = e.target;
      e.target.classList.add('dragging');
    }

    function dragOver(e) {
      e.preventDefault();
    }

    function drop(e) {
      e.preventDefault();
      if (draggedItem) {
        draggedItem.classList.remove('dragging');
        // Simple visual swap (in real app, would reorder data)
        const dropTarget = e.target.closest('.wardrobe-item');
        if (dropTarget && dropTarget !== draggedItem) {
          const parent = draggedItem.parentNode;
          const nextSibling = dropTarget.nextSibling;
          parent.insertBefore(draggedItem, nextSibling);
        }
        draggedItem = null;
      }
    }

    // Upload
    function openUploadModal() {
      document.getElementById('uploadModal').classList.add('active');
      document.getElementById('uploadArea').classList.remove('hidden');
      document.getElementById('processingArea').classList.add('hidden');
    }

    function closeUploadModal(e) {
      if (!e || e.target === document.getElementById('uploadModal')) {
        document.getElementById('uploadModal').classList.remove('active');
      }
    }

    function handleFileUpload(input) {
      if (!input.files || input.files.length === 0) return;

      document.getElementById('uploadArea').classList.add('hidden');
      document.getElementById('processingArea').classList.remove('hidden');

      // Simulate AI processing
      setTimeout(() => {
        const newItem = {
          id: 'w' + (wardrobeData.length + 1),
          name: '新上传单品',
          category: ['top', 'bottom', 'outer', 'shoes', 'accessory'][Math.floor(Math.random() * 5)],
          color: ['白色', '黑色', '米色', '蓝色', '棕色'][Math.floor(Math.random() * 5)],
          colorHex: ['#F5F5F5', '#1A1A1A', '#E8DCC8', '#4A90D9', '#8B6914'][Math.floor(Math.random() * 5)],
          image: 'https://picsum.photos/seed/new' + Date.now() + '/300/300',
          style: ['休闲', '商务', '时尚', '复古'][Math.floor(Math.random() * 4)],
        };
        wardrobeData.push(newItem);
        renderWardrobe();
        closeUploadModal();
        alert('AI识别完成！已自动添加「' + newItem.name + '」到衣橱');
      }, 2000);
    }

    // ==================== ITINERARY ====================
    function renderItinerary() {
      const container = document.getElementById('itineraryContainer');

      if (!selectedRoute || Object.keys(selectedSpots).length === 0) {
        container.innerHTML = `
          <div class="text-center py-20 reveal">
            <div class="text-6xl mb-4">🗺️</div>
            <h3 class="text-xl font-bold mb-2">还没有行程</h3>
            <p class="text-inklight mb-6">先选择城市和路线，规划你的旅程吧</p>
            <button onclick="showPage('home')" class="px-6 py-3 rounded-xl bg-terra text-white font-medium hover:shadow-lg transition-all">
              去规划行程
            </button>
          </div>
        `;
        return;
      }

      const spots = Object.values(selectedSpots);
      const timeSlots = ['上午', '下午', '晚上'];

      container.innerHTML = `
        <div class="card p-6 mb-8 reveal">
          <div class="flex items-center gap-4">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-terra to-clay flex items-center justify-center text-white text-2xl">
              <i class="fa-solid fa-location-dot"></i>
            </div>
            <div>
              <h3 class="font-bold text-lg">${currentCity?.name || ''}之旅</h3>
              <p class="text-sm text-inkmuted">${document.getElementById('tripDate').value || '待定'} · ${spots.length}个景点</p>
            </div>
          </div>
        </div>
        <div class="space-y-0">
          ${spots.map((spot, idx) => {
            const outfitIdx = selectedOutfits[spot.id];
            const outfit = outfitIdx !== undefined ? generateOutfitOptions(spot.scene)[outfitIdx] : null;
            return `
              <div class="timeline-item reveal reveal-delay-${(idx % 3) + 1}">
                <div class="card p-4">
                  <div class="flex items-start gap-4">
                    <div class="w-20 h-20 rounded-xl overflow-hidden flex-shrink-0">
                      <img src="${spot.image}" class="w-full h-full object-cover" alt="${spot.name}">
                    </div>
                    <div class="flex-1 min-w-0">
                      <div class="flex items-center gap-2 mb-1">
                        <span class="text-xs font-medium px-2 py-0.5 rounded-full bg-terra/10 text-terra">${timeSlots[idx % 3]}</span>
                        <span class="text-xs text-inkmuted">${spot.duration}</span>
                      </div>
                      <h4 class="font-bold">${spot.name}</h4>
                      <p class="text-sm text-inkmuted mt-0.5">${spot.scene}</p>
                      ${outfit ? `
                        <div class="flex gap-1 mt-2">
                          ${outfit.items.slice(0, 4).map(i => `
                            <div class="w-8 h-8 rounded-lg overflow-hidden">
                              <img src="${i.image}" class="w-full h-full object-cover" alt="${i.name}">
                            </div>
                          `).join('')}
                        </div>
                      ` : '<p class="text-xs text-inkmuted mt-2">未选择穿搭</p>'}
                    </div>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;

      setupScrollReveal();
    }

    // ==================== PACKING LIST ====================
    function generatePackingList() {
      const modal = document.getElementById('packingModal');
      const content = document.getElementById('packingContent');

      // Collect all selected outfit items
      const allItems = new Set();
      Object.keys(selectedOutfits).forEach(spotId => {
        const outfit = generateOutfitOptions('')[selectedOutfits[spotId]];
        if (outfit) {
          outfit.items.forEach(item => allItems.add(item));
        }
      });

      const items = Array.from(allItems);
      const categories = {
        top: '上衣',
        bottom: '下装',
        outer: '外套',
        shoes: '鞋履',
        accessory: '配饰',
      };

      const grouped = {};
      items.forEach(item => {
        if (!grouped[item.category]) grouped[item.category] = [];
        grouped[item.category].push(item);
      });

      content.innerHTML = `
        <div class="mb-4">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm text-inkmuted">建议行李箱尺寸</span>
            <span class="font-bold text-terra">20寸登机箱</span>
          </div>
          <div class="w-full h-2 bg-sand rounded-full overflow-hidden">
            <div class="h-full bg-gradient-to-r from-terra to-clay rounded-full" style="width: 65%"></div>
          </div>
          <div class="text-xs text-inkmuted mt-1">预计占用 65% 行李箱空间</div>
        </div>
        ${Object.entries(grouped).map(([cat, catItems]) => `
          <div class="mb-4">
            <h4 class="font-semibold text-sm mb-2">${categories[cat] || cat} (${catItems.length}件)</h4>
            ${catItems.map(item => `
              <div class="checklist-item">
                <input type="checkbox" checked>
                <div class="w-10 h-10 rounded-lg overflow-hidden flex-shrink-0">
                  <img src="${item.image}" class="w-full h-full object-cover" alt="${item.name}">
                </div>
                <div class="flex-1">
                  <div class="font-medium text-sm">${item.name}</div>
                  <div class="text-xs text-inkmuted">${item.color} · ${item.style}</div>
                </div>
                <span class="text-xs text-moss font-medium">可重复搭配</span>
              </div>
            `).join('')}
          </div>
        `).join('')}
        <div class="mt-4 p-4 rounded-xl bg-sand/50">
          <div class="flex items-center gap-2 text-sm">
            <i class="fa-solid fa-lightbulb text-terra"></i>
            <span class="font-medium">智能建议</span>
          </div>
          <p class="text-xs text-inkmuted mt-1">根据天气和行程，建议额外携带一件轻便雨衣和防晒霜。</p>
        </div>
      `;

      modal.classList.add('active');
    }

    function closePackingModal(e) {
      if (!e || e.target === document.getElementById('packingModal')) {
        document.getElementById('packingModal').classList.remove('active');
      }
    }

    // ==================== SCROLL REVEAL ====================
    function setupScrollReveal() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    // Close panels on escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeOutfitPanel();
        closeUploadModal();
        closePackingModal();
      }
    });
  </script>
</body>
</html>
