<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>片刻 — 你的私人观影口味管家</title>
<style>
:root{
  --bg:#0f0c1d; --bg2:#161227; --card:#1c1832; --card2:#231d3d;
  --accent:#e94560; --accent2:#f06292; --accent-soft:rgba(233,69,96,.12);
  --blue:#0f3460; --gold:#f5c46b; --green:#4ecca3; --warn:#f0a500;
  --text:#eceaf2; --text2:#9a96b0; --text3:#6b6780;
  --border:#2d2845; --radius:16px; --shadow:0 8px 32px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.7;
  min-height:100vh;overflow-x:hidden;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== App Shell ===== */
#app{
  max-width:440px;margin:0 auto;min-height:100vh;
  background:var(--bg);position:relative;padding-bottom:80px;
  box-shadow:0 0 60px rgba(0,0,0,.5);
}

/* ===== Top Bar ===== */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:rgba(15,12,29,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:20px}
.logo-dot{
  width:10px;height:10px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 12px var(--accent);animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
.logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-stat{font-size:11px;color:var(--text3);display:flex;gap:8px}
.topbar-stat b{color:var(--gold);font-weight:600}

/* ===== Views ===== */
.view{display:none;padding:16px 20px;animation:fadeIn .4s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== Section Title ===== */
.sec-title{font-size:13px;color:var(--text3);font-weight:600;letter-spacing:1px;margin:24px 0 12px;text-transform:uppercase}
.sec-title:first-child{margin-top:0}

/* ===== Hero Card (Discover) ===== */
.hero-card{
  background:var(--card);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:24px 20px;margin-bottom:16px;position:relative;overflow:hidden;
}
.hero-card::before{
  content:"";position:absolute;top:-40%;right:-30%;width:200px;height:200px;
  background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);
  border-radius:50%;
}
.hero-card::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(15,12,29,.3) 0%,rgba(15,12,29,.75) 100%);
  z-index:0;
}
.hero-card .label{font-size:12px;color:var(--accent);font-weight:600;letter-spacing:1px;margin-bottom:8px;position:relative;z-index:1}
.hero-card h2{font-size:22px;font-weight:700;margin-bottom:6px;position:relative;z-index:1}
.hero-card .sub{font-size:13px;color:var(--text2);position:relative;z-index:1}
.hero-card .hero-emoji{position:absolute;top:50%;right:16px;transform:translateY(-50%);font-size:64px;opacity:.25;z-index:0}
.hero-card .match-ring{position:absolute;top:20px;right:20px;width:56px;height:56px}

/* ===== Movie Card ===== */
.movie-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:12px;cursor:pointer;transition:all .25s ease;
  position:relative;overflow:hidden;
}
.movie-card:hover,.movie-card:active{border-color:rgba(233,69,96,.35);transform:translateY(-2px);box-shadow:var(--shadow)}
.movie-card.avoided{border-color:rgba(240,165,0,.25);background:rgba(240,165,0,.03)}
.movie-card-top{display:flex;gap:12px;align-items:flex-start}
.movie-poster{
  width:48px;height:64px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;position:relative;overflow:hidden;
}
.movie-poster::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.3));
}
.movie-card-body{flex:1;min-width:0}
.movie-card-body h3{font-size:16px;font-weight:700;margin-bottom:2px}
.movie-card-body .meta{font-size:12px;color:var(--text3)}
.movie-card-body .genres{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.genre-tag{
  font-size:10px;padding:2px 8px;border-radius:20px;
  background:rgba(255,255,255,.06);color:var(--text2);
}
.genre-tag.avoid{background:rgba(240,165,0,.12);color:var(--warn)}
.match-badge{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  min-width:48px;
}
.match-badge .pct{font-size:20px;font-weight:800;line-height:1}
.match-badge .pct.high{color:var(--green)}
.match-badge .pct.mid{color:var(--gold)}
.match-badge .pct.low{color:var(--text3)}
.match-badge .lbl{font-size:9px;color:var(--text3);margin-top:2px}
.avoid-warn{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;color:var(--warn);margin-top:6px;
  padding:3px 8px;background:rgba(240,165,0,.1);border-radius:6px;
}

/* ===== Match Ring (SVG) ===== */
.ring-bg{stroke:var(--border);fill:none;stroke-width:4}
.ring-fg{stroke:var(--accent);fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.ring-text{font-size:14px;font-weight:700;fill:var(--text);text-anchor:middle;dominant-baseline:central}

/* ===== Search ===== */
.search-box{
  display:flex;align-items:center;gap:10px;background:var(--card);
  border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:16px;
  transition:border-color .2s;
}
.search-box:focus-within{border-color:var(--accent)}
.search-box svg{flex-shrink:0;color:var(--text3)}
.search-box input{
  flex:1;border:none;background:none;color:var(--text);font-size:15px;outline:none;
}
.search-box input::placeholder{color:var(--text3)}
.filter-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px}
.chip{
  font-size:12px;padding:6px 14px;border-radius:20px;white-space:nowrap;
  background:var(--card);border:1px solid var(--border);color:var(--text2);
  cursor:pointer;transition:all .2s;
}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chip:hover:not(.active){border-color:var(--text3)}

/* ===== Movie Detail ===== */
.detail-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;
}
.detail-overlay.show{display:flex;animation:fadeIn .25s ease}
.detail-panel{
  width:100%;max-width:440px;max-height:90vh;overflow-y:auto;
  background:var(--bg);border-radius:24px 24px 0 0;
  animation:slideUp .35s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.detail-banner{
  height:120px;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.detail-banner::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(15,12,29,.2) 0%,rgba(15,12,29,.9) 100%);
}
.detail-banner .banner-emoji{font-size:56px;z-index:0;opacity:.5}
.detail-header{
  padding:20px;position:sticky;top:0;background:var(--bg);
  border-bottom:1px solid var(--border);z-index:5;
  display:flex;align-items:center;justify-content:space-between;
}
.detail-header h2{font-size:18px;font-weight:700}
.close-btn{
  width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
  background:var(--card);color:var(--text2);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.detail-body{padding:20px}

/* Match Breakdown */
.match-section{margin-bottom:24px}
.match-summary{
  text-align:center;padding:20px;background:var(--card);border-radius:var(--radius);
  margin-bottom:16px;border:1px solid var(--border);
}
.match-summary .big-pct{font-size:48px;font-weight:800;line-height:1}
.match-summary .verdict{font-size:14px;color:var(--text2);margin-top:8px}
.match-summary .verdict b{color:var(--accent)}
.dim-bars{display:flex;flex-direction:column;gap:10px}
dim-bar{display:flex;align-items:center;gap:10px;font-size:13px}
.dim-bar{display:flex;align-items:center;gap:10px;font-size:13px}
.dim-bar .name{width:72px;color:var(--text2);flex-shrink:0}
.dim-bar .track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
.dim-bar .fill{height:100%;border-radius:4px;transition:width .8s ease}
.dim-bar .fill.both{background:linear-gradient(90deg,var(--accent),var(--green))}
.dim-bar .fill.movie-only{background:var(--blue)}
.dim-bar .fill.user-only{background:var(--text3);opacity:.3}
.dim-bar .score{width:24px;text-align:right;color:var(--text3);font-size:12px;flex-shrink:0}

/* Non-spoiler desc */
.nospoiler{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:16px;position:relative;
}
.nospoiler .tag{
  display:inline-flex;align-items:center;gap:4px;font-size:11px;
  color:var(--green);font-weight:600;margin-bottom:8px;
}
.nospoiler p{font-size:14px;color:var(--text2);line-height:1.8}

/* Analysis */
.analysis-section{margin-bottom:24px}
.analysis-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  margin-bottom:10px;overflow:hidden;
}
.analysis-head{
  display:flex;align-items:center;gap:8px;padding:14px 16px;cursor:pointer;
  font-size:14px;font-weight:600;
}
.analysis-head .icon{color:var(--accent);font-size:16px}
.analysis-head .arrow{margin-left:auto;color:var(--text3);transition:transform .3s}
.analysis-card.open .arrow{transform:rotate(180deg)}
.analysis-body{
  max-height:0;overflow:hidden;transition:max-height .35s ease;
  font-size:13px;color:var(--text2);line-height:1.8;
}
.analysis-card.open .analysis-body{max-height:600px}
.analysis-body-inner{padding:0 16px 16px}
.analysis-body p{margin-bottom:10px}
.analysis-body p:last-child{margin-bottom:0}
.analysis-body .angle{
  background:rgba(233,69,96,.06);border-left:3px solid var(--accent);
  padding:10px 12px;border-radius:0 8px 8px 0;margin-bottom:8px;font-size:13px;
}
.no-analysis{
  text-align:center;padding:24px 16px;color:var(--text3);font-size:13px;
  background:var(--card);border:1px dashed var(--border);border-radius:12px;
}

/* Record Section */
.record-btn{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  transition:transform .2s,box-shadow .2s;margin-bottom:16px;
}
.record-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(233,69,96,.35)}
.record-btn:active{transform:translateY(0)}
.record-btn.recorded{background:var(--card);border:1px solid var(--green);color:var(--green)}

.my-record{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:16px;border-left:3px solid var(--green);
}
.my-record .tag{font-size:11px;color:var(--green);font-weight:600;margin-bottom:8px}
.my-record .rating{display:flex;align-items:center;gap:4px;margin-bottom:8px}
.my-record .rating-text{font-size:14px;font-weight:600;margin-left:6px}
.my-record .note{font-size:14px;color:var(--text2);line-height:1.7}
.my-record .liked-tags,.my-record .disliked-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.mini-tag{font-size:11px;padding:2px 8px;border-radius:12px}
.mini-tag.like{background:rgba(78,204,163,.12);color:var(--green)}
.mini-tag.dislike{background:rgba(240,165,0,.12);color:var(--warn)}

/* Record Modal */
.record-overlay{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;
}
.record-overlay.show{display:flex;animation:fadeIn .25s}
.record-panel{
  width:100%;max-width:440px;max-height:85vh;overflow-y:auto;
  background:var(--bg);border-radius:24px 24px 0 0;padding:24px 20px;
  animation:slideUp .35s cubic-bezier(.16,1,.3,1);
}
.record-panel h3{font-size:18px;font-weight:700;margin-bottom:4px}
.record-panel .movie-name{font-size:13px;color:var(--text3);margin-bottom:20px}
.field{margin-bottom:20px}
.field label{display:block;font-size:13px;color:var(--text2);font-weight:600;margin-bottom:8px}
.rating-options{display:flex;gap:8px;flex-wrap:wrap}
.rating-opt{
  flex:1;min-width:80px;padding:10px;border-radius:12px;text-align:center;
  font-size:13px;cursor:pointer;border:2px solid var(--border);background:var(--card);
  transition:all .2s;
}
.rating-opt.selected{border-color:var(--accent);background:var(--accent-soft)}
.rating-opt .emoji{font-size:20px;display:block;margin-bottom:4px}
.tag-options{display:flex;flex-wrap:wrap;gap:8px}
.tag-opt{
  font-size:12px;padding:7px 14px;border-radius:20px;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--text2);transition:all .2s;
}
.tag-opt.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.tag-opt.selected.dislike{background:var(--warn);border-color:var(--warn)}
textarea{
  width:100%;min-height:80px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:12px;color:var(--text);font-size:14px;resize:none;outline:none;
  font-family:inherit;line-height:1.7;
}
textarea:focus{border-color:var(--accent)}
.record-submit{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;
}

/* Skip Popup */
.skip-reasons{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.skip-reason{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  border-radius:14px;cursor:pointer;border:2px solid var(--border);
  background:var(--card);transition:all .2s;
}
.skip-reason:hover,.skip-reason:active{border-color:rgba(233,69,96,.3);background:var(--card2)}
.skip-reason .sr-emoji{font-size:22px;flex-shrink:0}
.skip-reason .sr-text{flex:1}
.skip-reason .sr-text .sr-title{font-size:14px;font-weight:600;color:var(--text)}
.skip-reason .sr-text .sr-desc{font-size:12px;color:var(--text3);margin-top:2px}
.skip-skip-btn{
  width:100%;padding:12px;border:1px solid var(--border);border-radius:14px;
  background:transparent;color:var(--text3);font-size:14px;cursor:pointer;
}
.skip-skip-btn:hover{color:var(--text2)}

/* Skip Record Item */
.skip-item{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:10px;
}
.skip-item:hover{border-color:rgba(233,69,96,.2)}
.skip-item .si-emoji{font-size:18px;flex-shrink:0}
.skip-item .si-body{flex:1;min-width:0}
.skip-item .si-title{font-size:14px;font-weight:600}
.skip-item .si-reason{font-size:12px;color:var(--text3);margin-top:2px}
.skip-item .si-date{font-size:11px;color:var(--text3);flex-shrink:0}

/* Empty State */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty .icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px}

/* Taste Profile */
.taste-radar{display:flex;justify-content:center;margin:8px 0 24px}
.taste-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;
}
.stat-card .num{font-size:28px;font-weight:800;color:var(--accent)}
.stat-card .lbl{font-size:12px;color:var(--text3);margin-top:4px}
.avoid-list{display:flex;flex-direction:column;gap:8px}
.avoid-item{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:rgba(240,165,0,.05);border:1px solid rgba(240,165,0,.15);border-radius:12px;
  font-size:13px;
}
.avoid-item .shield{color:var(--warn);font-size:16px}
.avoid-item .reason{color:var(--text3);margin-left:auto;font-size:12px}
.no-avoid{text-align:center;padding:20px;color:var(--text3);font-size:13px;background:var(--card);border-radius:12px;border:1px dashed var(--border)}

/* Records List */
.record-item{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:12px;cursor:pointer;transition:all .2s;
}
.record-item:hover{border-color:rgba(233,69,96,.3)}
.record-item .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.record-item .title{font-size:15px;font-weight:700}
.record-item .date{font-size:11px;color:var(--text3)}
.record-item .rating-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.record-item .note{font-size:13px;color:var(--text2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Bottom Nav */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:440px;z-index:150;
  display:flex;background:rgba(15,12,29,.92);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);padding:8px 0;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px;cursor:pointer;color:var(--text3);transition:color .2s;
}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px}
.nav-item span{font-size:10px;font-weight:500}

/* Toast */
.toast{
  position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);
  z-index:500;padding:12px 24px;background:var(--card);border:1px solid var(--accent);
  border-radius:30px;font-size:13px;color:var(--text);opacity:0;
  transition:all .3s ease;pointer-events:none;box-shadow:var(--shadow);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* AI Loading */
.ai-loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;gap:12px;
}
.ai-loading .dots{display:flex;gap:6px}
.ai-loading .dot{
  width:8px;height:8px;border-radius:50%;background:var(--accent);
  animation:bounce 1.4s ease-in-out infinite;
}
.ai-loading .dot:nth-child(2){animation-delay:.2s}
.ai-loading .dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.ai-loading p{font-size:13px;color:var(--text3)}

/* Onboarding */
.onboard-overlay{
  position:fixed;inset:0;z-index:400;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;text-align:center;
}
.onboard-overlay.hide{display:none}
.onboard-logo{font-size:36px;font-weight:800;margin-bottom:8px}
.onboard-logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.onboard-sub{font-size:14px;color:var(--text2);margin-bottom:32px;max-width:300px;line-height:1.7}
.onboard-section{width:100%;max-width:340px;margin-bottom:24px}
.onboard-section h4{font-size:14px;color:var(--text);margin-bottom:12px;text-align:left}
.onboard-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.onboard-btn{
  width:100%;max-width:340px;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
}
.onboard-skip{

// ========== State ==========
let state = {
  prefs: {},       // dimension -> weight (1-5)
  records: [],     // {movieId, rating, liked[], disliked[], note, date}
  avoided: [],     // {genre, reason, date}
  skips: [],       // {movieId, reason, date}
  onboarded: false,
};

const DIM_KEYS = DIMENSIONS.map(d=>d.key);

function loadState(){
  try{
    const s = localStorage.getItem('pianke_state');
    if(s) state = {...state, ...JSON.parse(s)};
  }catch(e){}
}
function saveState(){
  try{ localStorage.setItem('pianke_state', JSON.stringify(state)); }catch(e){}
}

// ========== Taste Matching ==========
function calcMatch(movie){
  let totalImp = 0, totalScore = 0;
  for(const dim of DIM_KEYS){
    const imp = state.prefs[dim] || 0;
    const ms = movie.dims[dim] || 0;
    totalScore += imp * ms;
    totalImp += imp * 5;
  }
  if(totalImp === 0) return 50; // no prefs = neutral
  return Math.round((totalScore / totalImp) * 100);
}

function matchVerdict(pct){
  if(pct >= 68) return {label:"很合你口味", color:"var(--green)"};
  if(pct >= 45) return {label:"值得一试", color:"var(--gold)"};
  if(pct >= 30) return {label:"可能不合", color:"var(--text3)"};
  return {label:"大概率不喜欢", color:"var(--text3)"};
}
function matchClass(pct){
  if(pct >= 65) return "high";
  if(pct >= 45) return "mid";
  return "low";
}

function isAvoided(movie){
  return movie.genres.some(g => state.avoided.some(a => a.genre === g));
}
function getAvoidedGenres(movie){
  return movie.genres.filter(g => state.avoided.some(a => a.genre === g));
}

// ========== Discover ==========
function renderDiscover(){
  // Pick top match as hero, excluding avoided unless it's the only option
  let pool = MOVIES.filter(m => !isAvoided(m));
  if(pool.length === 0) pool = MOVIES.slice();
  pool = pool.map(m => ({m, pct:calcMatch(m)})).sort((a,b) => b.pct - a.pct);
  const hero = pool[0];
  const v = matchVerdict(hero.pct);
  const ps = posterStyle(hero.m);

  document.getElementById('heroTitle').textContent = hero.m.title;
  document.getElementById('heroSub').innerHTML = `<span style="color:${v.color};font-weight:600">${v.label} · ${hero.pct}%</span> · ${hero.m.genres.join(' / ')} · ${hero.m.year}`;
  const heroCard = document.getElementById('heroCard');
  heroCard.style.background = ps.grad;
  document.getElementById('heroEmoji').textContent = ps.emoji;
  heroCard.onclick = () => openDetail(hero.m.id);

  // Shuffle rest
  const rest = pool.slice(1).sort(() => Math.random() - 0.5).slice(0, 4);
  document.getElementById('discoverList').innerHTML = rest.map(({m,pct}) =>
    movieCardHTML(m, pct)
  ).join('') || '<div class="empty"><div class="icon">\uD83C\uDFAC</div><p>\u6682\u65E0\u66F4\u591A\u63A8\u8350</p></div>';
}

function movieCardHTML(m, pct){
  const mc = matchClass(pct);
  const avoided = isAvoided(m);
  const ag = getAvoidedGenres(m);
  const genreHTML = m.genres.map(g => {
    const av = ag.includes(g);
    return `<span class="genre-tag ${av?'avoid':''}">${av?'\u26A0 ':''}${g}</span>`;
  }).join('');
  const avoidHTML = avoided ? `<div class="avoid-warn">\u26A0 你标记过不喜欢${ag.join('、')}类型</div>` : '';
  const ps = posterStyle(m);
  return `
    <div class="movie-card ${avoided?'avoided':''}" onclick="openDetail(${m.id})">
      <div class="movie-card-top">
        <div class="movie-poster" style="background:${ps.grad}">${ps.emoji}</div>
        <div class="movie-card-body">
          <h3>${m.title}</h3>
          <div class="meta">${m.director} · ${m.year}</div>
          <div class="genres">${genreHTML}</div>
          ${avoidHTML}
        </div>
        <div class="match-badge">
          <div class="pct ${mc}">${pct}<span style="font-size:12px">%</span></div>
          <div class="lbl">口味匹配</div>
        </div>
      </div>
    </div>`;
}

  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));

function renderSearchResults(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let results = MOVIES.slice();
  if(q) results = results.filter(m =>
    m.title.toLowerCase().includes(q) ||
    m.director.toLowerCase().includes(q) ||
    m.genres.some(g => g.toLowerCase().includes(q))
  );
  if(currentFilter !== '全部') results = results.filter(m => m.genres.includes(currentFilter));

  if(results.length === 0){
    document.getElementById('searchResults').innerHTML =
      '<div class="empty"><div class="icon">&#128269;</div><p>没找到这部电影<br>试试搜导演名或类型</p></div>';
    return;
  }
  results = results.map(m => ({m, pct:calcMatch(m)})).sort((a,b) => b.pct - a.pct);
  document.getElementById('searchResults').innerHTML = results.map(({m,pct}) =>
    movieCardHTML(m, pct)
  ).join('');
}

const SKIP_REASONS = [
  {key:"dislike",     emoji:"\uD83D\uDE15", title:"不太喜欢",       desc:"看了几眼觉得不合胃口"},
  {key:"tired",       emoji:"\uD83D\uDE34", title:"太累了，暂时不想看", desc:"今天精力不够，改天再说"},
  {key:"accident",    emoji:"\uD83D\uDC42", title:"不小心点进来的",   desc:"手滑了，不是有意打开的"},

  {key:"wrong_type",  emoji:"\uD83D\uDD0D", title:"不是我想找的类型",   desc:"搜错了，想找别的"},
  {key:"bookmark",    emoji:"\uD83D\uDCDC", title:"先收藏，有空再看",   desc:"看起来不错，但现在没心情"},
];

function openSkipPopup(id){

      `).join('')}

    <button class="skip-skip-btn" onclick="closeSkipPopup()">不记录，直接离开</button>
  `;

  document.getElementById('skipOverlay').classList.add('show');
}

function closeSkipPopup(){
  document.getElementById('skipOverlay').classList.remove('show');
}

function saveSkip(id, reasonKey){
  const m = MOVIES.find(x => x.id === id);
  if(!m) return;

  const reason = SKIP_REASONS.find(r => r.key === reasonKey);
  if(!reason) return;

  // Record the skip
  state.skips.push({
    movieId: id,
    reason: reasonKey,
    reasonText: reason.title,
    emoji: reason.emoji,
    date: new Date().toISOString(),
  });

  // If "dislike" or "wrong_type", add genres to avoidance
  if(reasonKey === 'dislike' || reasonKey === 'wrong_type'){
    m.genres.forEach(g => {
      if(!state.avoided.find(a => a.genre === g)){
        state.avoided.push({
          genre: g,
          reason: reasonKey === 'dislike' ? '跳过-不喜欢' : '跳过-类型不符',
          date: new Date().toISOString(),
        });
      }
    });
  }

  saveState();
  document.getElementById('skipOverlay').classList.remove('show');
  showToast(reasonKey === 'dislike' || reasonKey === 'wrong_type'
    ? '已记录，后续会减少推荐这类电影'
    : '已记录');
  renderAll();
}

function selectRating(el){
  el.parentElement.querySelectorAll('.rating-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}
function toggleTag(el, type){
  if(type === 'dislike') el.classList.toggle('dislike');
  el.classList.toggle('selected');
}

function saveRecord(id){
  const ratingEl = document.querySelector('#ratingOpts .rating-opt.selected');
  if(!ratingEl){ showToast('选一下整体感受吧'); return; }
  const rating = ratingEl.dataset.val;
  const liked = Array.from(document.querySelectorAll('#likeTags .tag-opt.selected')).map(e => e.dataset.val);
  const disliked = Array.from(document.querySelectorAll('#dislikeTags .tag-opt.selected')).map(e => e.dataset.val);
  const note = document.getElementById('recordNote').value.trim();

  const m = MOVIES.find(x => x.id === id);

  // Update or create record
  const idx = state.records.findIndex(r => r.movieId === id);
  const rec = {movieId:id, rating, liked, disliked, note, date:new Date().toISOString()};
  if(idx >= 0) state.records[idx] = rec;
  else state.records.push(rec);

  // Update avoidance
  if(rating === 'avoid' || rating === 'bad'){
    const reason = rating === 'avoid' ? '标记避雷' : '不太喜欢';
    m.genres.forEach(g => {
      if(!state.avoided.find(a => a.genre === g)){
        state.avoided.push({genre:g, reason, date:new Date().toISOString()});
      }
    });
  }
  // Remove from avoidance if rating improved
  if(rating === 'recommend' || rating === 'good'){
    state.avoided = state.avoided.filter(a => !m.genres.includes(a.genre));
  }

  // Update taste prefs based on liked/disliked
  if(rating === 'recommend'){
    m.genres.forEach(g => {});
    // Boost dimensions the movie is strong in
    DIM_KEYS.forEach(d => {
      if(m.dims[d] >= 4){
        state.prefs[d] = Math.min(5, (state.prefs[d] || 3) + 1);
      }
    });
  }

  saveState();
  document.getElementById('recordOverlay').classList.remove('show');

  // If user wrote a full record, remove any existing skip for this movie
  state.skips = state.skips.filter(s => s.movieId !== id);

  closeDetail();
  showToast('记录已保存');
  renderAll();
}

          <div class="si-reason">${s.reasonText}</div>
        </div>
        <span class="si-date">${dateStr}</span>
      </div>`;
  }).join('');
}

// ========== Taste Profile ==========
function renderTaste(){
  document.getElementById('tasteRecords').textContent = state.records.length;
  document.getElementById('tasteAvoid').textContent = state.avoided.length;

  // Radar chart (SVG)
  const radar = renderRadar();
  document.getElementById('tasteRadar').innerHTML = radar;

  // Avoid list
  const container = document.getElementById('avoidList');
  if(state.avoided.length === 0){
    container.innerHTML = '<div class="no-avoid">还没有避雷类型<br>标记不喜欢的电影后，这里会自动记录</div>';
  } else {
    container.innerHTML = state.avoided.map(a => {
      const d = new Date(a.date);
      const dateStr = `${d.getMonth()+1}月${d.getDate()}日`;
      return `<div class="avoid-item"><span class="shield">&#9888;</span><span>${a.genre}</span><span class="reason">${a.reason} · ${dateStr}</span></div>`;
    }).join('');
  }
}

function renderRadar(){
  const cx = 120, cy = 120, maxR = 80;
  const n = DIM_KEYS.length;
  const angles = DIM_KEYS.map((_,i) => (Math.PI*2*i/n) - Math.PI/2);

  // Grid circles
  let grid = '';
  for(let r=1;r<=4;r++){
    const rad = maxR * r / 4;
    const pts = angles.map(a => `${cx+rad*Math.cos(a)},${cy+rad*Math.sin(a)}`).join(' ');
    grid += `<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="1" opacity="${0.3+r*0.1}"/>`;
  }
  // Axis lines
  let axes = angles.map(a =>
    `<line x1="${cx}" y1="${cy}" x2="${cx+maxR*Math.cos(a)}" y2="${cy+maxR*Math.sin(a)}" stroke="var(--border)" stroke-width="1" opacity="0.3"/>`
  ).join('');

  // Data polygon
  const dataPts = DIM_KEYS.map((d,i) => {
    const v = state.prefs[d.key] || 0;
    const r = (v/5) * maxR;
    return `${cx+r*Math.cos(angles[i])},${cy+r*Math.sin(angles[i])}`;
  }).join(' ');

  // Labels
  let labels = DIMENSIONS.map((d,i) => {
    const r = maxR + 16;
    const x = cx + r*Math.cos(angles[i]);
    const y = cy + r*Math.sin(angles[i]);
    return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" font-size="10" fill="var(--text2)">${d.name}</text>`;
  }).join('');

  return `<svg width="240" height="240" viewBox="0 0 240 240">
    ${grid}${axes}
    <polygon points="${dataPts}" fill="rgba(233,69,96,0.15)" stroke="var(--accent)" stroke-width="2"/>
    ${DIM_KEYS.map((d,i) => {
      const v = state.prefs[d.key] || 0;
      const r = (v/5)*maxR;
      return `<circle cx="${cx+r*Math.cos(angles[i])}" cy="${cy+r*Math.sin(angles[i])}" r="3" fill="var(--accent)"/>`;
    }).join('')}
    ${labels}
  </svg>`;
}

// ========== Stats ==========
function updateStats(){
  document.getElementById('statRecords').textContent = state.records.length;
  document.getElementById('statSkips').textContent = state.skips.length;
  document.getElementById('statAvoid').textContent = state.avoided.length;
}

// ========== Toast ==========
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ========== Render All ==========
function renderAll(){
  renderDiscover();
  renderSearchResults();
  renderRecords();
  renderSkips();
  renderTaste();
  updateStats();
}

// ========== Init ==========
function init(){
  loadState();
  initOnboard();
  initSearch();
  if(state.onboarded){
    document.getElementById('onboard').classList.add('hide');
    renderAll();
  } else {
    renderAll();
  }
}

init();
</script>
