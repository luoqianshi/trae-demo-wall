<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>若叶睦 → Mortis — 互动Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      /* 睦 - 薄荷绿/浅绿色 */
      --mutsumi-green: #a7f3d0;
      --mutsumi-green-dark: #34d399;
      --mutsumi-hair: #d1fae5;
      --mutsumi-eyes: #059669;
      
      /* 祥子 - 白祥：金色/白蓝 */
      --sakiko-gold: #fef3c7;
      --sakiko-gold-dark: #f59e0b;
      --sakiko-white: #fffbeb;
      --sakiko-blue: #dbeafe;
      
      /* 黑祥 */
      --sakiko-black: #1c1917;
      --sakiko-dark: #292524;
      --sakiko-red: #7f1d1d;
      
      /* Mortis - 深紫哥特 */
      --mortis-purple: #a855f7;
      --mortis-purple-dark: #581c87;
      --mortis-black: #0a0a0f;
      --mortis-accent: #c084fc;
      
      /* CRYCHIC */
      --crychic-gold: #fef9c3;
      --crychic-blue: #bfdbfe;
      --crychic-pink: #fbcfe8;
      
      /* Ave Mujica */
      --ave-dark: #0c0a1a;
      --ave-purple: #4c1d95;
      --ave-mask: #1e1b4b;
      
      /* 背景 */
      --warm-bg: linear-gradient(180deg, #fefce8 0%, #dcfce7 40%, #bbf7d0 100%);
      --goth-bg: linear-gradient(180deg, #030712 0%, #1a0a2e 50%, #000000 100%);
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      transition: background 2.5s ease;
      background: var(--warm-bg);
      position: relative;
    }

    body.gothic {
      background: var(--goth-bg);
    }

    /* 背景装饰 - 黄瓜和叶子 */
    .cucumber-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      transition: opacity 2s ease;
    }

    body.gothic .cucumber-bg {
      opacity: 0;
    }

    .bg-item {
      position: absolute;
      font-size: 2.5rem;
      opacity: 0.2;
      animation: gentleFloat 8s ease-in-out infinite;
    }

    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(3deg); }
    }

    /* 主舞台 */
    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    /* ========== 角色头像通用样式 ========== */
    .character-avatar {
      position: relative;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hair {
      position: absolute;
      border-radius: 50% 50% 45% 45%;
    }

    .face {
      position: absolute;
      border-radius: 50%;
      background: #fef3c7;
    }

    .eyes {
      position: absolute;
      display: flex;
      gap: 15px;
      top: 42%;
    }

    .eye {
      width: 12px;
      height: 14px;
      border-radius: 50%;
      position: relative;
    }

    .eye-shine {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
    }

    .mouth {
      position: absolute;
      bottom: 28%;
      width: 16px;
      height: 8px;
      border-radius: 0 0 10px 10px;
    }

    /* ========== 中心人物 - 若叶睦 ========== */
    .mutsumi-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      transition: all 2s ease;
      z-index: 10;
    }

    .mutsumi-container.hidden {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0);
      filter: blur(20px);
    }

    .mutsumi-avatar {
      width: 220px;
      height: 220px;
      background: linear-gradient(180deg, #ecfdf5 0%, #d1fae5 100%);
      border: 8px solid white;
      box-shadow: 
        0 25px 70px rgba(52, 211, 153, 0.35),
        inset 0 -10px 30px rgba(52, 211, 153, 0.1);
      margin: 0 auto;
      position: relative;
    }

    /* 睦的头发 - 浅绿短发 */
    .mutsumi-avatar .hair-back {
      position: absolute;
      width: 100%;
      height: 85%;
      top: -5%;
      background: linear-gradient(180deg, #a7f3d0 0%, #6ee7b7 50%, #34d399 100%);
      border-radius: 50% 50% 40% 40%;
    }

    .mutsumi-avatar .hair-front {
      position: absolute;
      width: 90%;
      height: 40%;
      top: 8%;
      left: 5%;
      background: linear-gradient(180deg, #d1fae5 0%, #a7f3d0 100%);
      border-radius: 50% 50% 60% 40%;
      z-index: 2;
    }

    .mutsumi-avatar .face {
      width: 60%;
      height: 55%;
      top: 25%;
      left: 20%;
      background: linear-gradient(180deg, #fffbeb 0%, #fef3c7 100%);
      z-index: 1;
    }

    .mutsumi-avatar .eye {
      background: var(--mutsumi-eyes);
      border-radius: 40%;
    }

    .mutsumi-avatar .mouth {
      background: #fca5a5;
      height: 4px;
      border-radius: 2px;
      width: 12px;
    }

    /* 黄瓜装饰 */
    .mutsumi-avatar .cucumber-deco {
      position: absolute;
      font-size: 2rem;
      z-index: 3;
    }
    .mutsumi-avatar .cucumber-deco.c1 { bottom: 5%; right: 5%; }
    .mutsumi-avatar .cucumber-deco.c2 { top: 10%; left: 0%; font-size: 1.5rem; }

    .mutsumi-name {
      margin-top: 1.2rem;
      font-size: 2rem;
      font-weight: bold;
      color: #065f46;
      text-shadow: 0 2px 15px rgba(255,255,255,0.9);
      letter-spacing: 0.1em;
    }

    .mutsumi-subtitle {
      margin-top: 0.4rem;
      font-size: 1rem;
      color: #047857;
      opacity: 0.85;
    }

    /* ========== Mortis 状态 ========== */
    .mortis-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      text-align: center;
      opacity: 0;
      transition: all 2.5s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10;
    }

    .mortis-container.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .mortis-avatar {
      width: 240px;
      height: 240px;
      background: linear-gradient(180deg, #1e1b4b 0%, #0c0a1a 100%);
      border: 8px solid #000;
      box-shadow: 
        0 30px 100px rgba(168, 85, 247, 0.6),
        0 0 60px rgba(168, 85, 247, 0.4),
        inset 0 0 50px rgba(168, 85, 247, 0.2);
      margin: 0 auto;
      position: relative;
    }

    /* 面具效果 */
    .mortis-avatar .mask {
      position: absolute;
      width: 70%;
      height: 65%;
      top: 18%;
      left: 15%;
      background: linear-gradient(180deg, #f5f5f4 0%, #d6d3d1 100%);
      border-radius: 40% 40% 50% 50%;
      z-index: 3;
      box-shadow: 
        0 5px 20px rgba(0,0,0,0.5),
        inset 0 -5px 15px rgba(0,0,0,0.2);
    }

    .mortis-avatar .mask-eye {
      position: absolute;
      width: 22px;
      height: 18px;
      background: #000;
      border-radius: 50%;
      top: 35%;
    }
    .mortis-avatar .mask-eye.left { left: 18%; }
    .mortis-avatar .mask-eye.right { right: 18%; }

    .mortis-avatar .mask-glow {
      position: absolute;
      width: 16px;
      height: 12px;
      background: var(--mortis-purple);
      border-radius: 50%;
      top: 37%;
      box-shadow: 0 0 20px var(--mortis-purple), 0 0 40px var(--mortis-purple);
      animation: eyeGlow 2s ease-in-out infinite alternate;
    }
    .mortis-avatar .mask-glow.left { left: 21%; }
    .mortis-avatar .mask-glow.right { right: 21%; }

    @keyframes eyeGlow {
      from { opacity: 0.6; box-shadow: 0 0 20px var(--mortis-purple); }
      to { opacity: 1; box-shadow: 0 0 40px var(--mortis-purple), 0 0 60px var(--mortis-purple); }
    }

    /* Mortis长袍 */
    .mortis-avatar .cloak {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 30%, #000 100%);
      border-radius: 50%;
      z-index: 1;
    }

    /* 旋转光环 */
    .mortis-avatar::before {
      content: '✧';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 2px dashed rgba(168, 85, 247, 0.4);
      animation: spin 15s linear infinite;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      color: var(--mortis-purple);
      font-size: 1.2rem;
    }

    .mortis-avatar::after {
      content: '✦';
      position: absolute;
      inset: -35px;
      border-radius: 50%;
      border: 1px solid rgba(192, 132, 252, 0.3);
      animation: spin 20s linear infinite reverse;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      color: var(--mortis-accent);
      font-size: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .mortis-name {
      margin-top: 1.5rem;
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--mortis-purple);
      text-shadow: 
        0 0 30px rgba(168, 85, 247, 0.8),
        0 0 60px rgba(168, 85, 247, 0.5);
      letter-spacing: 0.3em;
      font-family: 'Georgia', serif;
    }

    .mortis-subtitle {
      margin-top: 0.5rem;
      font-size: 1.1rem;
      color: var(--mortis-accent);
      opacity: 0.9;
      letter-spacing: 0.15em;
    }

    /* ========== 性格词条 ========== */
    .traits {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 450px;
      height: 450px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: opacity 1.5s ease;
    }

    .traits.hidden {
      opacity: 0;
    }

    .trait-tag {
      position: absolute;
      padding: 0.6rem 1.1rem;
      background: rgba(255,255,255,0.95);
      border-radius: 25px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #065f46;
      box-shadow: 0 6px 20px rgba(52, 211, 153, 0.25);
      animation: tagFloat 5s ease-in-out infinite;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      border: 2px solid rgba(167, 243, 208, 0.6);
    }

    @keyframes tagFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* Mortis 词条 */
    .mortis-traits {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 500px;
      height: 500px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 2.5s ease;
    }

    .mortis-traits.show {
      opacity: 1;
    }

    .mortis-trait-tag {
      position: absolute;
      padding: 0.7rem 1.3rem;
      background: linear-gradient(135deg, rgba(88, 28, 135, 0.9), rgba(30, 27, 75, 0.95));
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      color: #e9d5ff;
      box-shadow: 
        0 0 25px rgba(168, 85, 247, 0.5),
        inset 0 1px 0 rgba(192, 132, 252, 0.3);
      border: 1px solid var(--mortis-purple);
      animation: gothTagFloat 4s ease-in-out infinite;
      white-space: nowrap;
      backdrop-filter: blur(10px);
      text-shadow: 0 0 10px rgba(168, 85, 247, 0.8);
    }

    @keyframes gothTagFloat {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-10px) rotate(1deg); }
    }

    /* ========== 交互元素 ========== */
    .interactive-element {
      position: absolute;
      cursor: pointer;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
      z-index: 5;
    }

    .interactive-element:hover {
      transform: scale(1.08);
    }

    .interactive-element:hover .element-avatar {
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .interactive-element.disabled {
      pointer-events: none;
      opacity: 0.4;
    }

    .element-avatar {
      width: 140px;
      height: 140px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
      border: 5px solid #fff;
      transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .element-label {
      margin-top: 0.9rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: #065f46;
      text-shadow: 0 2px 8px rgba(255,255,255,0.9);
      transition: all 1s ease;
    }

    body.gothic .element-label {
      color: var(--mortis-accent);
      text-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
    }

    /* 位置 */
    .crychic { top: 6%; left: 8%; }
    .sakiko { top: 6%; right: 8%; }
    .vegetarian { bottom: 8%; left: 12%; }

    /* ========== CRYCHIC 乐队 ========== */
    .crychic .element-avatar {
      background: linear-gradient(135deg, #fef9c3 0%, #fde68a 50%, #fbbf24 100%);
      border-color: white;
    }

    .band-chars {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: opacity 1s ease;
    }

    .band-chars.fading {
      opacity: 0;
    }

    .band-char {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    /* CRYCHIC 五人代表色 */
    .band-char:nth-child(1) { background: linear-gradient(135deg, #a7f3d0, #34d399); } /* 睦 绿 */
    .band-char:nth-child(2) { background: linear-gradient(135deg, #fef3c7, #f59e0b); } /* 祥子 金 */
    .band-char:nth-child(3) { background: linear-gradient(135deg, #fbcfe8, #ec4899); } /* 灯 粉 */
    .band-char:nth-child(4) { background: linear-gradient(135deg, #bfdbfe, #3b82f6); } /* 爽世 蓝 */
    .band-char:nth-child(5) { background: linear-gradient(135deg, #ddd6fe, #8b5cf6); } /* 立希 紫 */

    .band-char::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.6;
    }

    .band-char.fade-out {
      opacity: 0;
      transform: scale(0) translateY(-30px) rotate(360deg);
    }

    /* Ave Mujica */
    .avemujica {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      opacity: 0;
      transition: opacity 2s ease;
      background: linear-gradient(135deg, #1e1b4b 0%, #0c0a1a 100%);
    }

    .avemujica.show {
      opacity: 1;
    }

    .ave-char {
      width: 22px;
      height: 22px;
      border-radius: 30%;
      background: var(--mortis-black);
      border: 2px solid var(--mortis-purple);
      position: relative;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.6);
    }

    .ave-char::before {
      content: '';
      position: absolute;
      width: 8px;
      height: 4px;
      background: var(--mortis-purple);
      border-radius: 2px;
      top: 35%;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 8px var(--mortis-purple);
    }

    .avemujica.disappearing {
      opacity: 0;
      transform: scale(0.3) rotate(180deg);
      filter: blur(10px);
      transition: all 2.5s ease;
    }

    /* ========== 丰川祥子 ========== */
    .sakiko .element-avatar {
      background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 50%, #fde68a 100%);
      border-color: white;
    }

    /* 祥子的头发 - 金色 */
    .sakiko-hair {
      position: absolute;
      width: 100%;
      height: 90%;
      top: -8%;
      background: linear-gradient(180deg, #fef9c3 0%, #fde68a 40%, #f59e0b 100%);
      border-radius: 50% 50% 40% 40%;
    }

    .sakiko-face {
      position: absolute;
      width: 55%;
      height: 50%;
      top: 28%;
      left: 22.5%;
      background: linear-gradient(180deg, #fffbeb 0%, #fef3c7 100%);
      border-radius: 50%;
      z-index: 1;
    }

    .sakiko-eye {
      position: absolute;
      width: 10px;
      height: 12px;
      background: #92400e;
      border-radius: 40%;
      top: 40%;
    }
    .sakiko-eye.left { left: 22%; }
    .sakiko-eye.right { right: 22%; }

    .sakiko-mouth {
      position: absolute;
      bottom: 25%;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 5px;
      background: #fca5a5;
      border-radius: 0 0 8px 8px;
    }

    /* 黑祥状态 */
    .sakiko .element-avatar.black-sakiko {
      background: linear-gradient(135deg, #292524 0%, #1c1917 50%, #0c0a09 100%);
      border-color: #44403c;
    }

    .sakiko .element-avatar.black-sakiko .sakiko-hair {
      background: linear-gradient(180deg, #57534e 0%, #44403c 50%, #292524 100%);
    }

    .sakiko .element-avatar.black-sakiko .sakiko-face {
      background: linear-gradient(180deg, #d6d3d1 0%, #a8a29e 100%);
    }

    .sakiko .element-avatar.black-sakiko .sakiko-eye {
      background: #450a0a;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
    }

    .sakiko .element-avatar.black-sakiko .sakiko-mouth {
      background: #7f1d1d;
      width: 14px;
      height: 3px;
      border-radius: 0;
    }

    .sakiko.crying {
      animation: cryShake 0.6s ease-in-out;
    }

    @keyframes cryShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px) rotate(-2deg); }
      40% { transform: translateX(6px) rotate(2deg); }
      60% { transform: translateX(-4px) rotate(-1deg); }
      80% { transform: translateX(4px) rotate(1deg); }
    }

    .sakiko.leaving {
      animation: leaveStage 3.5s ease-in-out forwards;
    }

    @keyframes leaveStage {
      0% { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(250px) translateY(-150px); opacity: 0; }
    }

    .sakiko.returning {
      animation: returnStage 2.5s ease-in-out forwards;
    }

    @keyframes returnStage {
      0% { transform: translateX(250px) translateY(-150px); opacity: 0; }
      100% { transform: translateX(0) translateY(0); opacity: 1; }
    }

    .tears {
      position: absolute;
      font-size: 1.3rem;
      opacity: 0;
      animation: tearFall 1.2s ease-in infinite;
      z-index: 5;
    }

    .tears.show {
      opacity: 1;
    }

    .tears.t1 { top: 55%; left: 28%; animation-delay: 0s; }
    .tears.t2 { top: 55%; right: 28%; animation-delay: 0.4s; }

    @keyframes tearFall {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(50px); opacity: 0; }
    }

    /* ========== 长期素食 ========== */
    .vegetarian .element-avatar {
      background: linear-gradient(135deg, #bbf7d0 0%, #86efac 50%, #4ade80 100%);
    }

    .veg-content {
      font-size: 3.5rem;
      transition: all 0.5s ease;
    }

    .vegetarian.pressured .element-avatar {
      background: linear-gradient(135deg, #fecaca 0%, #f87171 50%, #ef4444 100%);
      animation: pressure 0.6s ease-in-out;
    }

    .vegetarian.pressured .veg-content {
      filter: grayscale(0.3);
    }

    @keyframes pressure {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(0.92); }
      50% { transform: scale(0.88); }
      75% { transform: scale(0.95); }
    }

    .vegetarian.disappearing {
      animation: vegDisappear 2.5s ease forwards;
    }

    @keyframes vegDisappear {
      0% { opacity: 1; transform: scale(1); filter: blur(0); }
      40% { opacity: 0.6; transform: scale(1.3); filter: grayscale(1) blur(3px); }
      100% { opacity: 0; transform: scale(0); filter: grayscale(1) blur(20px); }
    }

    .pressure-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(239, 68, 68, 0.8) 0%, rgba(127, 29, 29, 0.9) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      opacity: 0;
      transition: opacity 0.8s ease;
      flex-direction: column;
      gap: 5px;
    }

    .pressure-overlay .pressure-text {
      font-size: 0.8rem;
      color: white;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .pressure-overlay.show {
      opacity: 1;
    }

    /* ========== 语音气泡 ========== */
    .speech-bubble {
      position: fixed;
      padding: 1.2rem 1.8rem;
      background: rgba(255,255,255,0.98);
      border-radius: 24px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #065f46;
      box-shadow: 
        0 15px 50px rgba(0,0,0,0.2),
        0 0 30px rgba(52, 211, 153, 0.2);
      z-index: 100;
      opacity: 0;
      transform: scale(0.7) translateY(20px);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: 350px;
      text-align: center;
      backdrop-filter: blur(15px);
      border: 2px solid rgba(167, 243, 208, 0.6);
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 14px solid rgba(255,255,255,0.98);
    }

    .speech-bubble.show {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    body.gothic .speech-bubble {
      background: linear-gradient(135deg, rgba(88, 28, 135, 0.98), rgba(30, 27, 75, 0.98));
      color: #e9d5ff;
      border-color: var(--mortis-purple);
      box-shadow: 
        0 15px 50px rgba(0,0,0,0.5),
        0 0 40px rgba(168, 85, 247, 0.4);
    }

    body.gothic .speech-bubble::before {
      border-top-color: rgba(88, 28, 135, 0.98);
    }

    /* ========== 暗黑粒子 ========== */
    .dark-particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 3s ease;
      z-index: 2;
    }

    .dark-particles.show {
      opacity: 1;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--mortis-purple);
      border-radius: 50%;
      animation: particleFloat 10s ease-in-out infinite;
      box-shadow: 0 0 12px var(--mortis-purple), 0 0 24px var(--mortis-purple);
    }

    @keyframes particleFloat {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      5% { opacity: 0.8; }
      95% { opacity: 0.8; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* 十字架装饰 */
    .cross {
      position: absolute;
      color: var(--mortis-purple);
      opacity: 0;
      font-size: 1.5rem;
      animation: crossFall 12s linear infinite;
      text-shadow: 0 0 10px var(--mortis-purple);
    }

    .dark-particles.show .cross {
      opacity: 0.3;
    }

    @keyframes crossFall {
      0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* ========== 进度提示 ========== */
    .progress-hint {
      position: fixed;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      padding: 1rem 2rem;
      background: rgba(255,255,255,0.95);
      border-radius: 50px;
      font-size: 1rem;
      color: #065f46;
      font-weight: 600;
      box-shadow: 
        0 8px 30px rgba(52, 211, 153, 0.25),
        0 0 0 2px rgba(167, 243, 208, 0.5);
      z-index: 50;
      backdrop-filter: blur(15px);
      transition: all 1.5s ease;
    }

    body.gothic .progress-hint {
      background: linear-gradient(135deg, rgba(88, 28, 135, 0.95), rgba(30, 27, 75, 0.95));
      color: #e9d5ff;
      box-shadow: 
        0 8px 30px rgba(0,0,0,0.5),
        0 0 0 2px var(--mortis-purple),
        0 0 30px rgba(168, 85, 247, 0.3);
    }

    .progress-hint.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(50px);
    }

    /* 点击指示 */
    .click-hint {
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      color: #dc2626;
      animation: pulse 1.5s ease-in-out infinite;
      font-weight: bold;
      text-shadow: 0 0 10px white;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
      50% { opacity: 0.5; transform: translateX(-50%) scale(1.15); }
    }

    /* ========== 祥子施压效果 ========== */
    .sakiko-pressuring {
      position: fixed;
      top: 25%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 20;
      opacity: 0;
      transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sakiko-pressuring.show {
      transform: translate(-50%, -50%) scale(2);
      opacity: 1;
      animation: pressureGlow 1.2s ease-in-out infinite alternate;
    }

    .pressure-sakiko {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: linear-gradient(135deg, #292524 0%, #0c0a09 100%);
      border: 6px solid #44403c;
      position: relative;
      box-shadow: 
        0 0 80px rgba(0,0,0,0.9),
        0 0 120px rgba(127, 29, 29, 0.6);
    }

    .pressure-sakiko .hair {
      position: absolute;
      width: 100%;
      height: 90%;
      top: -8%;
      background: linear-gradient(180deg, #57534e 0%, #292524 100%);
      border-radius: 50% 50% 40% 40%;
    }

    .pressure-sakiko .face {
      position: absolute;
      width: 55%;
      height: 50%;
      top: 28%;
      left: 22.5%;
      background: linear-gradient(180deg, #a8a29e 0%, #78716c 100%);
      border-radius: 50%;
    }

    .pressure-sakiko .eye {
      position: absolute;
      width: 14px;
      height: 10px;
      background: #450a0a;
      border-radius: 0;
      top: 40%;
      box-shadow: 0 0 15px #ef4444, 0 0 30px #dc2626;
    }
    .pressure-sakiko .eye.left { left: 20%; }
    .pressure-sakiko .eye.right { right: 20%; }

    @keyframes pressureGlow {
      from { 
        filter: drop-shadow(0 0 50px rgba(0,0,0,0.8)); 
      }
      to { 
        filter: drop-shadow(0 0 80px rgba(127, 29, 29, 0.8)) drop-shadow(0 0 120px rgba(168, 85, 247, 0.4)); 
      }
    }

    /* ========== 结局文字 ========== */
    .ending-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 30;
      opacity: 0;
      transition: opacity 3s ease;
      pointer-events: none;
    }

    .ending-text.show {
      opacity: 1;
    }

    .ending-title {
      font-size: 4rem;
      font-weight: bold;
      color: var(--mortis-purple);
      text-shadow: 
        0 0 40px rgba(168, 85, 247, 0.9),
        0 0 80px rgba(168, 85, 247, 0.6),
        0 0 120px rgba(168, 85, 247, 0.3);
      letter-spacing: 0.5em;
      margin-bottom: 1.5rem;
      font-family: 'Georgia', 'Times New Roman', serif;
      animation: titleFlicker 4s ease-in-out infinite;
    }

    @keyframes titleFlicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
      52% { opacity: 1; }
      54% { opacity: 0.9; }
      56% { opacity: 1; }
    }

    .ending-subtitle {
      font-size: 1.4rem;
      color: var(--mortis-accent);
      letter-spacing: 0.2em;
      text-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
      font-style: italic;
    }

    /* ========== 裂痕效果 ========== */
    .crack-overlay {
      position: fixed;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      opacity: 0;
      background: 
        linear-gradient(45deg, transparent 40%, rgba(0,0,0,0.3) 45%, transparent 50%),
        linear-gradient(-45deg, transparent 40%, rgba(0,0,0,0.2) 48%, transparent 55%),
        linear-gradient(60deg, transparent 55%, rgba(88, 28, 135, 0.2) 60%, transparent 65%);
      background-size: 200px 200px, 150px 150px, 180px 180px;
      mix-blend-mode: overlay;
      transition: opacity 1.5s ease;
    }

    .crack-overlay.show {
      opacity: 1;
      animation: crackShake 0.8s ease-in-out;
    }

    @keyframes crackShake {
      0%, 100% { transform: translate(0); }
      10% { transform: translate(-8px, 8px); }
      20% { transform: translate(8px, -8px); }
      30% { transform: translate(-6px, -6px); }
      40% { transform: translate(6px, 6px); }
      50% { transform: translate(-4px, 4px); }
      60% { transform: translate(4px, -4px); }
      70% { transform: translate(-2px, -2px); }
      80% { transform: translate(2px, 2px); }
    }

    /* 雾气效果 */
    .fog {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      transition: opacity 2s ease;
    }

    .fog.show {
      opacity: 1;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .mutsumi-avatar { width: 160px; height: 160px; }
      .mortis-avatar { width: 180px; height: 180px; }
      .element-avatar { width: 100px; height: 100px; }
      .traits, .mortis-traits { width: 320px; height: 320px; }
      .trait-tag, .mortis-trait-tag { font-size: 0.8rem; padding: 0.4rem 0.8rem; }
      .crychic { top: 5%; left: 3%; }
      .sakiko { top: 5%; right: 3%; }
      .vegetarian { bottom: 12%; left: 5%; }
    }
  </style>
</head>
<body>
  <!-- 背景装饰 -->
  <div class="cucumber-bg" id="cucumberBg"></div>
  <div class="dark-particles" id="darkParticles"></div>
  <div class="crack-overlay" id="crackOverlay"></div>
  <div class="fog" id="fog"></div>

  <!-- 主舞台 -->
  <div class="stage">
    <!-- CRYCHIC 乐队 -->
    <div class="interactive-element crychic" id="crychic" onclick="handleCrychic()">
      <div class="click-hint">点击乐队</div>
      <div class="element-avatar">
        <div class="band-chars" id="bandChars">
          <div class="band-char"></div>
          <div class="band-char"></div>
          <div class="band-char"></div>
          <div class="band-char"></div>
          <div class="band-char"></div>
        </div>
        <div class="avemujica" id="avemujica">
          <div class="ave-char"></div>
          <div class="ave-char"></div>
          <div class="ave-char"></div>
          <div class="ave-char"></div>
          <div class="ave-char"></div>
        </div>
      </div>
      <div class="element-label">CRYCHIC</div>
    </div>

    <!-- 丰川祥子 -->
    <div class="interactive-element sakiko" id="sakiko" onclick="handleSakiko()">
      <div class="click-hint" id="sakikoHint">点击祥子</div>
      <div class="element-avatar" id="sakikoAvatar">
        <div class="sakiko-hair"></div>
        <div class="sakiko-face">
          <div class="sakiko-eye left"></div>
          <div class="sakiko-eye right"></div>
          <div class="sakiko-mouth"></div>
        </div>
        <span class="tears t1" id="tear1">💧</span>
        <span class="tears t2" id="tear2">💧</span>
      </div>
      <div class="element-label" id="sakikoLabel">丰川祥子</div>
    </div>

    <!-- 长期素食 -->
    <div class="interactive-element vegetarian" id="vegetarian" onclick="handleVegetarian()">
      <div class="click-hint">点击素食</div>
      <div class="element-avatar" id="vegAvatar">
        <span class="veg-content" id="vegEmoji">🥗</span>
        <div class="pressure-overlay" id="pressureOverlay">
          <span>😰</span>
          <span class="pressure-text">压 力</span>
        </div>
      </div>
      <div class="element-label" id="vegLabel">长期素食</div>
    </div>

    <!-- 若叶睦初始状态 -->
    <div class="mutsumi-container" id="mutsumi">
      <div class="mutsumi-avatar character-avatar">
        <div class="hair-back"></div>
        <div class="hair-front"></div>
        <div class="face">
          <div class="eyes">
            <div class="eye"><div class="eye-shine"></div></div>
            <div class="eye"><div class="eye-shine"></div></div>
          </div>
          <div class="mouth"></div>
        </div>
        <span class="cucumber-deco c1">🥒</span>
        <span class="cucumber-deco c2">🥭</span>
      </div>
      <div class="mutsumi-name">若叶睦</div>
      <div class="mutsumi-subtitle">沉默 · 温柔 · 月之森吉他手</div>
    </div>

    <!-- 睦的性格词条 -->
    <div class="traits" id="traits">
      <span class="trait-tag" style="top: 0; left: 50%; transform: translateX(-50%);">🌿 沉默寡言</span>
      <span class="trait-tag" style="top: 14%; right: 2%; animation-delay: 0.5s;">💚 温柔内敛</span>
      <span class="trait-tag" style="top: 14%; left: 2%; animation-delay: 1s;">🍃 克己隐忍</span>
      <span class="trait-tag" style="top: 40%; right: -10%; animation-delay: 1.5s;">🥺 脆弱敏感</span>
      <span class="trait-tag" style="top: 40%; left: -10%; animation-delay: 2s;">🥒 喜欢黄瓜</span>
      <span class="trait-tag" style="bottom: 14%; right: 2%; animation-delay: 0.8s;">🎸 吉他手</span>
      <span class="trait-tag" style="bottom: 14%; left: 2%; animation-delay: 1.3s;">🥭 芒果汁</span>
      <span class="trait-tag" style="bottom: 0; left: 50%; transform: translateX(-50%); animation-delay: 1.8s;">🏫 月之森学园</span>
    </div>

    <!-- Mortis 状态 -->
    <div class="mortis-container" id="mortis">
      <div class="mortis-avatar character-avatar">
        <div class="cloak"></div>
        <div class="mask">
          <div class="mask-eye left"></div>
          <div class="mask-eye right"></div>
          <div class="mask-glow left"></div>
          <div class="mask-glow right"></div>
        </div>
      </div>
      <div class="mortis-name">MORTIS</div>
      <div class="mortis-subtitle">💀 死亡 · Ave Mujica 吉他手</div>
    </div>

    <!-- Mortis 词条 -->
    <div class="mortis-traits" id="mortisTraits">
      <span class="mortis-trait-tag" style="top: 0; left: 50%; transform: translateX(-50%);">💀 MORTIS 死亡</span>
      <span class="mortis-trait-tag" style="top: 12%; right: -2%; animation-delay: 0.3s;">🎭 面具人偶</span>
      <span class="mortis-trait-tag" style="top: 12%; left: -2%; animation-delay: 0.6s;">⚰️ 哥特重生</span>
      <span class="mortis-trait-tag" style="top: 42%; right: -12%; animation-delay: 0.9s;">🦇 暗黑觉醒</span>
      <span class="mortis-trait-tag" style="top: 42%; left: -12%; animation-delay: 1.2s;">🗡️ 破坏冲动</span>
      <span class="mortis-trait-tag" style="bottom: 12%; right: -2%; animation-delay: 1.5s;">🎸 七弦吉他</span>
      <span class="mortis-trait-tag" style="bottom: 12%; left: -2%; animation-delay: 1.8s;">🌙 Ave Mujica</span>
      <span class="mortis-trait-tag" style="bottom: 0; left: 50%; transform: translateX(-50%); animation-delay: 2.1s;">🔮 人格接管</span>
    </div>

    <!-- 祥子施压效果 -->
    <div class="sakiko-pressuring" id="sakikoPressuring">
      <div class="pressure-sakiko">
        <div class="hair"></div>
        <div class="face">
          <div class="eye left"></div>
          <div class="eye right"></div>
        </div>
      </div>
    </div>

    <!-- 结局文字 -->
    <div class="ending-text" id="endingText">
      <div class="ending-title">MORTIS</div>
      <div class="ending-subtitle">若叶睦已经死了</div>
    </div>
  </div>

  <!-- 语音气泡 -->
  <div class="speech-bubble" id="speechBubble"></div>

  <!-- 进度提示 -->
  <div class="progress-hint" id="progressHint">点击周围的元素开始故事...</div>

  <script>
    const state = {
      sakikoClicked: false,
      sakikoReturned: false,
      crychicClicked: false,
      vegetarianClicked: false,
      allClicked: false,
      finalStage: false
    };

    function initBgDecor() {
      const bg = document.getElementById('cucumberBg');
      const items = ['🥒', '🥬', '🥭', '🍃', '🌿', '🍋', '🌼'];
      for (let i = 0; i < 20; i++) {
        const item = document.createElement('span');
        item.className = 'bg-item';
        item.textContent = items[Math.floor(Math.random() * items.length)];
        item.style.left = Math.random() * 100 + '%';
        item.style.top = Math.random() * 100 + '%';
        item.style.fontSize = (1.5 + Math.random() * 2.5) + 'rem';
        item.style.animationDelay = Math.random() * 6 + 's';
        item.style.animationDuration = (6 + Math.random() * 5) + 's';
        bg.appendChild(item);
      }

      const particles = document.getElementById('darkParticles');
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 10 + 's';
        p.style.animationDuration = (8 + Math.random() * 8) + 's';
        const size = 2 + Math.random() * 3;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        if (Math.random() > 0.6) {
          p.style.background = '#c084fc';
        }
        particles.appendChild(p);
      }

      for (let i = 0; i < 8; i++) {
        const cross = document.createElement('div');
        cross.className = 'cross';
        cross.textContent = '✝';
        cross.style.left = Math.random() * 100 + '%';
        cross.style.animationDelay = Math.random() * 12 + 's';
        cross.style.animationDuration = (10 + Math.random() * 8) + 's';
        cross.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
        particles.appendChild(cross);
      }
    }

    function speak(text, pitch = 1, rate = 0.9) {
      if ('speechSynthesis' in window) {
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.pitch = pitch;
        utterance.rate = rate;
        utterance.volume = 1;
        speechSynthesis.speak(utterance);
      }
    }

    function showSpeechBubble(text, x, y, duration = 4500) {
      const bubble = document.getElementById('speechBubble');
      bubble.textContent = text;
      bubble.style.left = x + 'px';
      bubble.style.top = y + 'px';
      requestAnimationFrame(() => {
        bubble.classList.add('show');
      });
      
      setTimeout(() => {
        bubble.classList.remove('show');
      }, duration);
    }

    function updateProgressHint() {
      const hint = document.getElementById('progressHint');
      const clicked = [state.sakikoClicked, state.crychicClicked, state.vegetarianClicked].filter(Boolean).length;
      
      if (clicked === 0) {
        hint.textContent = '✨ 点击祥子、乐队、素食触发剧情（推荐顺序：祥子 → 乐队 → 素食）';
      } else if (clicked < 3) {
        hint.textContent = `已触发 ${clicked}/3 个事件，继续点击其他元素...`;
      } else if (clicked === 3 && !state.finalStage) {
        hint.textContent = '🌑 所有事件已触发！再次点击丰川祥子...';
        state.allClicked = true;
        document.getElementById('sakiko').classList.remove('disabled');
        document.getElementById('sakikoHint').style.display = 'block';
        document.getElementById('sakikoHint').textContent = '最终点击';
      }
    }

    function handleSakiko() {
      if (state.finalStage) return;
      
      if (!state.sakikoClicked) {
        state.sakikoClicked = true;
        
        const avatar = document.getElementById('sakikoAvatar');
        const sakiko = document.getElementById('sakiko');
        const label = document.getElementById('sakikoLabel');
        
        avatar.classList.add('black-sakiko');
        label.textContent = '黑色祥子';
        
        setTimeout(() => {
          sakiko.classList.add('crying');
          document.getElementById('tear1').classList.add('show');
          document.getElementById('tear2').classList.add('show');
          
          setTimeout(() => {
            const mutsumi = document.getElementById('mutsumi');
            const rect = mutsumi.getBoundingClientRect();
            showSpeechBubble('我从来没觉得组乐队开心过...', rect.left + rect.width/2 - 160, rect.top - 100, 5500);
            speak('我从来没觉得组乐队开心过', 0.75, 0.75);
          }, 800);
          
          setTimeout(() => {
            sakiko.classList.add('leaving');
            document.getElementById('tear1').classList.remove('show');
            document.getElementById('tear2').classList.remove('show');
            document.getElementById('sakikoHint').style.display = 'none';
            
            setTimeout(() => {
              sakiko.classList.remove('leaving');
              sakiko.classList.add('returning');
              state.sakikoReturned = true;
              sakiko.classList.add('disabled');
              
              setTimeout(() => {
                sakiko.classList.remove('returning');
                updateProgressHint();
                checkAllClicked();
              }, 2500);
            }, 2000);
          }, 3500);
        }, 600);
        
        updateProgressHint();
      } else if (state.allClicked && state.sakikoReturned) {
        triggerFinalStage();
      }
    }

    function handleCrychic() {
      if (state.crychicClicked || state.finalStage) return;
      state.crychicClicked = true;
      
      const crychic = document.getElementById('crychic');
      const chars = document.getElementById('bandChars');
      const charEls = chars.querySelectorAll('.band-char');
      const avemujica = document.getElementById('avemujica');
      
      crychic.querySelector('.click-hint').style.display = 'none';
      crychic.classList.add('disabled');
      
      charEls.forEach((char, index) => {
        setTimeout(() => {
          char.classList.add('fade-out');
        }, index * 700);
      });
      
      setTimeout(() => {
        chars.classList.add('fading');
        setTimeout(() => {
          avemujica.classList.add('show');
          document.querySelector('.crychic .element-label').textContent = 'Ave Mujica';
        }, 600);
      }, charEls.length * 700 + 600);
      
      updateProgressHint();
      checkAllClicked();
    }

    function handleVegetarian() {
      if (state.vegetarianClicked || state.finalStage) return;
      state.vegetarianClicked = true;
      
      const veg = document.getElementById('vegetarian');
      const pressure = document.getElementById('pressureOverlay');
      const label = document.getElementById('vegLabel');
      
      veg.querySelector('.click-hint').style.display = 'none';
      
      setTimeout(() => {
        veg.classList.add('pressured');
        pressure.classList.add('show');
        label.textContent = '压力过载...';
        
        setTimeout(() => {
          const rect = veg.getBoundingClientRect();
          showSpeechBubble('都是小睦的错……', rect.left + rect.width/2 - 130, rect.top - 100, 4500);
          speak('都是小睦的错', 0.65, 0.65);
          
          setTimeout(() => {
            pressure.classList.remove('show');
            veg.classList.add('disappearing');
            
            setTimeout(() => {
              veg.style.display = 'none';
            }, 2500);
          }, 2800);
        }, 1000);
      }, 400);
      
      updateProgressHint();
      checkAllClicked();
    }

    function checkAllClicked() {
      if (state.sakikoClicked && state.crychicClicked && state.vegetarianClicked) {
        state.allClicked = true;
        updateProgressHint();
      }
    }

    function triggerFinalStage() {
      state.finalStage = true;
      
      const hint = document.getElementById('progressHint');
      hint.textContent = '...';
      
      const sakikoPressuring = document.getElementById('sakikoPressuring');
      sakikoPressuring.classList.add('show');
      
      setTimeout(() => {
        document.body.classList.add('gothic');
        document.getElementById('darkParticles').classList.add('show');
        document.getElementById('crackOverlay').classList.add('show');
        document.getElementById('fog').classList.add('show');
        document.getElementById('traits').classList.add('hidden');
        
        setTimeout(() => {
          document.getElementById('mutsumi').classList.add('hidden');
          
          setTimeout(() => {
            sakikoPressuring.classList.remove('show');
            document.getElementById('mortis').classList.add('show');
            document.getElementById('mortisTraits').classList.add('show');
            
            setTimeout(() => {
              document.getElementById('avemujica').classList.add('disappearing');
              document.querySelector('.crychic').style.opacity = '0';
              document.getElementById('sakiko').style.opacity = '0';
              
              setTimeout(() => {
                document.getElementById('endingText').classList.add('show');
                hint.classList.add('hidden');
                
                setTimeout(() => {
                  speak('Mortis', 0.3, 0.5);
                }, 500);
              }, 2500);
            }, 2000);
          }, 2000);
        }, 2000);
      }, 1500);
    }

    document.addEventListener('DOMContentLoaded', () => {
      initBgDecor();
      updateProgressHint();
    });
  </script>
</body>
</html>
