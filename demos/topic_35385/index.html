<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>复盘日记</title>
<style>
/* ========== 基础重置与变量 ========== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a2e;
  --accent1:#00d2ff;--accent2:#7b61ff;
  --text:#e8e8f0;--text2:#8888a0;--text3:#55556a;
  --card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --radius:16px;--radius-sm:10px;
}
html,body{height:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC',sans-serif;color:var(--text);overflow:hidden}
input,textarea,button{font-family:inherit;border:none;outline:none;background:none;color:inherit}

/* ========== 应用容器 ========== */
#app{width:100%;height:100vh;height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden;background:var(--bg)}

/* ========== 屏幕切换 ========== */
.screen{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;transform:translateX(60px);transition:opacity .5s ease,transform .5s cubic-bezier(.22,1,.36,1);pointer-events:none;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen.active{opacity:1;transform:translateX(0);pointer-events:auto;z-index:5}
.screen.exit-left{opacity:0;transform:translateX(-60px);pointer-events:none;z-index:1}

/* ========== Screen 1: 落地页 ========== */
.s1{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 30px;position:relative;overflow:hidden}
.s1::before{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(0,210,255,.15),transparent 70%);top:20%;left:50%;transform:translate(-50%,-50%);animation:glow1 4s ease-in-out infinite}
.s1::after{content:'';position:absolute;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(123,97,255,.12),transparent 70%);bottom:15%;left:50%;transform:translate(-50%,50%);animation:glow2 5s ease-in-out infinite}
@keyframes glow1{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}}
@keyframes glow2{0%,100%{transform:translate(-50%,50%) scale(1);opacity:.5}50%{transform:translate(-50%,50%) scale(1.2);opacity:.9}}
.s1-logo{font-size:64px;margin-bottom:16px;animation:float 3s ease-in-out infinite;position:relative;z-index:1}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.s1-title{font-size:36px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:1;margin-bottom:12px}
.s1-sub{font-size:15px;color:var(--text2);line-height:1.6;max-width:280px;position:relative;z-index:1;margin-bottom:48px}
.btn-primary{position:relative;z-index:1;padding:16px 48px;border-radius:50px;font-size:17px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;box-shadow:0 4px 24px rgba(0,210,255,.3);transition:transform .2s,box-shadow .2s;letter-spacing:1px}
.btn-primary:active{transform:scale(.95);box-shadow:0 2px 12px rgba(0,210,255,.2)}

/* ========== Screen 2: 方法选择 ========== */
.s2{padding:24px 20px 20px}
.s2-header{padding:20px 0 8px;text-align:center}
.s2-header h2{font-size:24px;font-weight:700;margin-bottom:6px}
.s2-header p{font-size:14px;color:var(--text2)}
.method-list{margin-top:20px;display:flex;flex-direction:column;gap:14px}
.method-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:border-color .3s,transform .2s,background .3s;position:relative;overflow:hidden}
.method-card:active{transform:scale(.98)}
.method-card.selected{border-color:var(--accent1);background:rgba(0,210,255,.06)}
.method-card.selected::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent1),var(--accent2))}
.mc-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.mc-emoji{font-size:32px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border-radius:12px;flex-shrink:0}
.mc-info h3{font-size:17px;font-weight:600;margin-bottom:2px}
.mc-info span{font-size:12px;color:var(--accent1);font-weight:500}
.mc-desc{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.mc-tags{display:flex;gap:8px}
.mc-tag{font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--text3)}
.s2-bottom{margin-top:20px;opacity:0;pointer-events:none;transition:opacity .3s;max-height:0;overflow:hidden}
.s2-bottom.show{opacity:1;pointer-events:auto;max-height:80px}
.s2-bottom .btn-primary{width:100%;padding:15px;text-align:center}

/* ========== Screen 3: 对话复盘 ========== */
.s3{display:flex;flex-direction:column;height:100%;overflow:hidden}
.chat-header{flex-shrink:0;padding:16px 20px 12px;background:var(--bg);border-bottom:1px solid var(--border);position:relative;z-index:5}
.ch-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ch-top h3{font-size:16px;font-weight:600}
.ch-top span{font-size:12px;color:var(--text3)}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2));border-radius:2px;transition:width .6s cubic-bezier(.22,1,.36,1);width:0}
.chat-body{flex:1;overflow-y:auto;padding:16px 16px 8px;-webkit-overflow-scrolling:touch}
.msg{margin-bottom:14px;animation:msgIn .4s cubic-bezier(.22,1,.36,1) both}
@keyframes msgIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.msg-ai{display:flex;gap:10px;align-items:flex-start}
.msg-ai .avatar{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.msg-ai .bubble{background:var(--bg2);border:1px solid var(--border);border-radius:4px var(--radius) var(--radius) var(--radius);padding:12px 16px;max-width:85%;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg-ai .bubble.feedback{border-left:3px solid var(--accent2);background:rgba(123,97,255,.06)}
.msg-user{display:flex;justify-content:flex-end}
.msg-user .bubble{background:linear-gradient(135deg,rgba(0,210,255,.15),rgba(123,97,255,.15));border:1px solid rgba(0,210,255,.2);border-radius:var(--radius) 4px var(--radius) var(--radius);padding:12px 16px;max-width:80%;font-size:14px;line-height:1.7}
.msg-hint{font-size:12px;color:var(--text3);padding:4px 16px 0 52px;animation:msgIn .3s ease both}
.typing-cursor{display:inline-block;width:2px;height:14px;background:var(--accent1);margin-left:2px;vertical-align:text-bottom;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.chat-input-area{flex-shrink:0;padding:10px 16px 24px;background:var(--bg);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center}
.chat-input-area input{flex:1;height:44px;padding:0 16px;background:var(--bg2);border:1px solid var(--border);border-radius:22px;font-size:14px;color:var(--text);transition:border-color .3s}
.chat-input-area input:focus{border-color:var(--accent1)}
.chat-input-area input::placeholder{color:var(--text3)}
.chat-input-area button{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s;flex-shrink:0}
.chat-input-area button:active{transform:scale(.9)}
.chat-input-area button svg{width:20px;height:20px;fill:#fff}
.end-btn{display:block;margin:10px auto 20px;padding:10px 32px;border:1px solid var(--accent2);border-radius:50px;color:var(--accent2);font-size:14px;cursor:pointer;transition:background .3s,color .3s}
.end-btn:active{background:rgba(123,97,255,.15)}

/* ========== Screen 4: 总结 ========== */
.s4{padding:24px 20px 40px}
.s4-header{text-align:center;padding:20px 0 24px}
.s4-header .icon{font-size:48px;margin-bottom:12px;animation:float 3s ease-in-out infinite}
.s4-header h2{font-size:22px;font-weight:700;margin-bottom:6px}
.s4-header p{font-size:13px;color:var(--text2)}
.summary-cards{display:flex;flex-direction:column;gap:14px;margin-bottom:24px}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;animation:cardIn .5s cubic-bezier(.22,1,.36,1) both}
.summary-card:nth-child(2){animation-delay:.15s}
.summary-card:nth-child(3){animation-delay:.3s}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.sc-label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:10px}
.sc-label .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sc-text{font-size:14px;line-height:1.8;color:var(--text2)}
.tags-wrap{margin-bottom:28px}
.tags-wrap h4{font-size:14px;font-weight:600;margin-bottom:12px}
.tag-list{display:flex;flex-wrap:wrap;gap:8px}
.tag-item{font-size:12px;padding:6px 14px;border-radius:20px;background:rgba(123,97,255,.1);border:1px solid rgba(123,97,255,.2);color:var(--accent2)}
.s4-actions{display:flex;gap:12px}
.s4-actions button{flex:1;padding:14px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:transform .2s}
.s4-actions button:active{transform:scale(.97)}
.btn-outline{border:1px solid var(--border);background:var(--card)}
.btn-grad{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border:none;box-shadow:0 4px 16px rgba(0,210,255,.2)}

/* ========== Screen 5: 数据统计 ========== */
.s5{padding:24px 20px 40px}
.s5-header{padding:10px 0 24px;display:flex;justify-content:space-between;align-items:center}
.s5-header h2{font-size:22px;font-weight:700}
.s5-header button{font-size:14px;color:var(--accent1);cursor:pointer}
.stats-row{display:flex;gap:12px;margin-bottom:24px}
.stat-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 12px;text-align:center;animation:cardIn .5s cubic-bezier(.22,1,.36,1) both}
.stat-card:nth-child(2){animation-delay:.1s}
.stat-card:nth-child(3){animation-delay:.2s}
.stat-num{font-size:32px;font-weight:700;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.stat-label{font-size:12px;color:var(--text3)}
.calendar-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:24px;animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;animation-delay:.25s}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cal-header h4{font-size:15px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center}
.cal-day{font-size:11px;color:var(--text3);padding:4px 0}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:8px;color:var(--text3);position:relative}
.cal-cell.today{color:var(--accent1);font-weight:600}
.cal-cell.checked{background:rgba(0,210,255,.15);color:var(--accent1)}
.cal-cell.checked::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--accent1)}
.tag-cloud-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;animation-delay:.35s}
.tag-cloud-section h4{font-size:15px;font-weight:600;margin-bottom:16px}
.cloud-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.cloud-tag{padding:8px 16px;border-radius:20px;font-size:13px;cursor:default;transition:transform .2s}
.cloud-tag:active{transform:scale(.95)}
.cloud-tag.t1{background:rgba(0,210,255,.1);border:1px solid rgba(0,210,255,.2);color:var(--accent1)}
.cloud-tag.t2{background:rgba(123,97,255,.1);border:1px solid rgba(123,97,255,.2);color:var(--accent2)}
.cloud-tag.t3{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text2)}

/* ========== 滚动条 ========== */
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div id="app">

  <!-- Screen 1: 落地页 -->
  <div class="screen s1 active" id="screen1">
    <div class="s1-logo">📝</div>
    <h1 class="s1-title">复盘日记</h1>
    <p class="s1-sub">每天3分钟，与AI对话式复盘<br>让成长看得见</p>
    <button class="btn-primary" onclick="goTo(2)">开始复盘</button>
  </div>

  <!-- Screen 2: 选择方法 -->
  <div class="screen s2" id="screen2">
    <div class="s2-header">
      <h2>选择复盘方法</h2>
      <p>不同的框架，不同的视角</p>
    </div>
    <div class="method-list" id="methodList"></div>
    <div class="s2-bottom" id="s2Bottom">
      <button class="btn-primary" onclick="startReview()">开始复盘</button>
    </div>
  </div>

  <!-- Screen 3: 对话复盘 -->
  <div class="screen s3" id="screen3">
    <div class="chat-header">
      <div class="ch-top">
        <h3 id="chatTitle">KPT复盘</h3>
        <span id="chatProgress">准备中...</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-input-area" id="chatInputArea" style="display:none">
      <input type="text" id="chatInput" placeholder="输入你的回答..." maxlength="500">
      <button onclick="sendMessage()" id="sendBtn">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- Screen 4: 总结 -->
  <div class="screen s4" id="screen4">
    <div class="s4-header">
      <div class="icon">✨</div>
      <h2>复盘完成</h2>
      <p>这是你今天的复盘总结</p>
    </div>
    <div class="summary-cards" id="summaryCards"></div>
    <div class="tags-wrap">
      <h4>AI为你打上的标签</h4>
      <div class="tag-list" id="summaryTags"></div>
    </div>
    <div class="s4-actions">
      <button class="btn-outline" onclick="goTo(5)">查看数据</button>
      <button class="btn-grad" onclick="restart()">再来一次</button>
    </div>
  </div>

  <!-- Screen 5: 数据统计 -->
  <div class="screen s5" id="screen5">
    <div class="s5-header">
      <h2>我的数据</h2>
      <button onclick="goTo(1)">返回首页</button>
    </div>
    <div class="stats-row" id="statsRow"></div>
    <div class="calendar-section" id="calendarSection"></div>
    <div class="tag-cloud-section" id="tagCloudSection"></div>
  </div>

</div>

<script>
/* ========== 配置数据 ========== */
const METHODS = [
  { id:'kpt', emoji:'🔄', name:'迭代优化法', framework:'KPT', desc:'聚焦正向反馈与持续改进，适合日常快速复盘', detail:'约3~5分钟 · 3道题 · 入门级' },
  { id:'orid', emoji:'🔮', name:'认知炼金术', framework:'ORID', desc:'从事实到意义，层层深入挖掘认知', detail:'约5~10分钟 · 5道题 · 进阶级' },
  { id:'first', emoji:'🧠', name:'自我洞察法', framework:'第一性原理', desc:'剥开表象直击本质，找到问题的根源', detail:'约10~15分钟 · 10道题 · 高级' }
];

/* KPT方法完整对话数据 */
const KPT_DATA = {
  ceremony: '今天是你的第 12 天复盘 🌱\n\n坚持复盘的你，已经在悄悄变厉害了。\n\n我们开始吧～',
  questions: [
    { text:'今天有没有一件小事，让你觉得"嗯，这个做得还行"？', hint:'任何小成就都算，哪怕是很小的事', feedback:'太棒了！你的分享让我感受到一种积极的力量。继续保持这种主动觉察的习惯～' },
    { text:'这个做法明天还想再来一遍吗？', hint:'值得保持的好做法', feedback:'很好的反思！把好做法固化下来，就是成长的捷径。' },
    { text:'今天有没有哪个瞬间让你觉得"哎，这里可以更好"？', hint:'不完美的瞬间', feedback:'能直面不足，本身就是一种勇气。发现问题是解决问题的第一步。' },
    { text:'明天想试试什么不一样的小改变？', hint:'哪怕很小的调整', feedback:'很棒的实验精神！小改变积累起来，就是大突破。' },
    { text:'如果明天只做一件最重要的事，你会选什么？', hint:'聚焦关键行动', feedback:'聚焦就是力量。明天执行的时候，记得复盘这个行动的效果哦。' }
  ],
  freeText: '框架问题走完了，还有什么想补充记录的吗？',
  freeHint: '想到什么说什么，自由发挥',
  summary: {
    harvest: '今天最大的收获是保持了对工作的主动觉察，通过复盘发现了自己在时间管理和专业表达方面的进步。',
    timeline: '提前完成项目汇报并获得认可；在沟通中尝试了结构化表达；主动识别了需要改进的环节。',
    action: '继续保持提前规划的习惯；在明天的周会中应用结构化表达方法；记录一个小改变的实验效果。'
  },
  tags: ['主动觉察', '时间管理', '结构化表达', '持续改进', '聚焦行动']
};

/* ========== 状态管理 ========== */
let currentScreen = 1;
let selectedMethod = null;
let chatState = { step:'idle', qIndex:0, answers:[], isTyping:false };

/* ========== 屏幕切换 ========== */
function goTo(n) {
  const cur = document.getElementById('screen' + currentScreen);
  const next = document.getElementById('screen' + n);
  if (!cur || !next || currentScreen === n) return;
  cur.classList.remove('active');
  cur.classList.add('exit-left');
  next.classList.add('active');
  setTimeout(() => cur.classList.remove('exit-left'), 500);
  currentScreen = n;
  if (n === 5) renderStats();
}

/* ========== Screen 2: 渲染方法卡片 ========== */
function renderMethods() {
  const list = document.getElementById('methodList');
  list.innerHTML = METHODS.map(m => `
    <div class="method-card" data-id="${m.id}" onclick="selectMethod('${m.id}')">
      <div class="mc-top">
        <div class="mc-emoji">${m.emoji}</div>
        <div class="mc-info">
          <h3>${m.name}</h3>
          <span>${m.framework}</span>
        </div>
      </div>
      <div class="mc-desc">${m.desc}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:8px">${m.detail}</div>
    </div>
  `).join('');
}

function selectMethod(id) {
  selectedMethod = id;
  document.querySelectorAll('.method-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.id === id);
  });
  document.getElementById('s2Bottom').classList.add('show');
}

/* ========== Screen 3: 对话复盘核心逻辑 ========== */
function startReview() {
  if (!selectedMethod) return;
  const m = METHODS.find(x => x.id === selectedMethod);
  document.getElementById('chatTitle').textContent = m.name;
  document.getElementById('chatBody').innerHTML = '';
  document.getElementById('chatInputArea').style.display = 'none';
  chatState = { step:'ceremony', qIndex:0, answers:[], isTyping:false };
  updateProgress(0);
  goTo(3);
  /* 延迟显示仪式感开场 */
  setTimeout(() => typeMessage(KPT_DATA.ceremony, () => {
    setTimeout(() => askQuestion(0), 600);
  }), 500);
}

/* 更新进度条 */
function updateProgress(ratio) {
  document.getElementById('progressFill').style.width = (ratio * 100) + '%';
  const total = KPT_DATA.questions.length;
  document.getElementById('chatProgress').textContent =
    ratio >= 1 ? '复盘完成' : `第 ${Math.min(chatState.qIndex + 1, total)} 题 / 共 ${total} 题`;
}

/* 打字机效果显示AI消息 */
function typeMessage(text, onDone, isFeedback) {
  chatState.isTyping = true;
  const body = document.getElementById('chatBody');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg msg-ai';
  msgDiv.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble${isFeedback ? ' feedback' : ''}"><span class="txt"></span><span class="typing-cursor"></span></div>
  `;
  body.appendChild(msgDiv);
  scrollChat();
  const span = msgDiv.querySelector('.txt');
  const cursor = msgDiv.querySelector('.typing-cursor');
  let i = 0;
  const speed = 35;
  const timer = setInterval(() => {
    if (i < text.length) {
      span.textContent += text[i];
      i++;
      scrollChat();
    } else {
      clearInterval(timer);
      cursor.remove();
      chatState.isTyping = false;
      if (onDone) onDone();
    }
  }, speed);
}

/* 添加提示文字 */
function showHint(text) {
  const body = document.getElementById('chatBody');
  const hint = document.createElement('div');
  hint.className = 'msg-hint';
  hint.textContent = '💡 ' + text;
  body.appendChild(hint);
  scrollChat();
}

/* 显示用户消息 */
function showUserMessage(text) {
  const body = document.getElementById('chatBody');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg msg-user';
  msgDiv.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  body.appendChild(msgDiv);
  scrollChat();
}

/* 提出第N题 */
function askQuestion(index) {
  if (index >= KPT_DATA.questions.length) {
    /* 所有题目完成，进入自由补充阶段 */
    chatState.step = 'free';
    updateProgress(1);
    typeMessage(KPT_DATA.freeText, () => {
      showHint(KPT_DATA.freeHint);
      showInput();
      showEndBtn();
    });
    return;
  }
  chatState.step = 'question';
  chatState.qIndex = index;
  updateProgress((index + 0.5) / KPT_DATA.questions.length);
  const q = KPT_DATA.questions[index];
  typeMessage(q.text, () => {
    showHint(q.hint);
    showInput();
  });
}

/* 显示输入框 */
function showInput() {
  const area = document.getElementById('chatInputArea');
  area.style.display = 'flex';
  const input = document.getElementById('chatInput');
  input.value = '';
  input.placeholder = chatState.step === 'free' ? '自由补充...' : '输入你的回答...';
  setTimeout(() => input.focus(), 100);
}

/* 显示结束按钮 */
function showEndBtn() {
  const body = document.getElementById('chatBody');
  const btn = document.createElement('button');
  btn.className = 'end-btn';
  btn.textContent = '结束复盘';
  btn.onclick = finishReview;
  body.appendChild(btn);
  scrollChat();
}

/* 发送用户消息 */
function sendMessage() {
  if (chatState.isTyping) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  showUserMessage(text);
  document.getElementById('chatInputArea').style.display = 'none';

  if (chatState.step === 'question') {
    /* 记录回答，AI反馈后出下一题 */
    chatState.answers.push(text);
    const q = KPT_DATA.questions[chatState.qIndex];
    setTimeout(() => {
      typeMessage(q.feedback, () => {
        updateProgress((chatState.qIndex + 1) / KPT_DATA.questions.length);
        setTimeout(() => askQuestion(chatState.qIndex + 1), 1500);
      }, true);
    }, 400);
  } else if (chatState.step === 'free') {
    /* 自由补充阶段，简单回应 */
    chatState.answers.push(text);
    setTimeout(() => {
      typeMessage('收到，已为你记录 ✨', () => {}, true);
    }, 400);
  }
}

/* 结束复盘 */
function finishReview() {
  document.getElementById('chatInputArea').style.display = 'none';
  typeMessage('复盘完成！正在为你生成总结...', () => {
    setTimeout(() => {
      renderSummary();
      goTo(4);
    }, 800);
  });
}

/* 滚动到底部 */
function scrollChat() {
  const body = document.getElementById('chatBody');
  setTimeout(() => { body.scrollTop = body.scrollHeight; }, 50);
}

/* HTML转义 */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ========== Screen 4: 渲染总结 ========== */
function renderSummary() {
  const s = KPT_DATA.summary;
  document.getElementById('summaryCards').innerHTML = `
    <div class="summary-card">
      <div class="sc-label"><span class="dot" style="background:var(--accent1)"></span>核心收获</div>
      <div class="sc-text">${s.harvest}</div>
    </div>
    <div class="summary-card">
      <div class="sc-label"><span class="dot" style="background:var(--accent2)"></span>事件梳理</div>
      <div class="sc-text">${s.timeline}</div>
    </div>
    <div class="summary-card">
      <div class="sc-label"><span class="dot" style="background:#ff6b9d"></span>明日行动</div>
      <div class="sc-text">${s.action}</div>
    </div>
  `;
  document.getElementById('summaryTags').innerHTML = KPT_DATA.tags.map(t =>
    `<span class="tag-item">${t}</span>`
  ).join('');
}

/* ========== Screen 5: 渲染数据统计 ========== */
function renderStats() {
  /* 统计数字 */
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">12</div><div class="stat-label">连续天数</div></div>
    <div class="stat-card"><div class="stat-num">18</div><div class="stat-label">总复盘数</div></div>
    <div class="stat-card"><div class="stat-num">76</div><div class="stat-label">总回答数</div></div>
  `;
  /* 打卡日历 */
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const today = now.getDate();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const checkedDays = [1,2,3,5,6,7,8,10,11,12,13,14,15,17,18,19,20];
  const weekNames = ['日','一','二','三','四','五','六'];
  let calHtml = `<div class="cal-header"><h4>${year}年${month + 1}月</h4></div><div class="cal-grid">`;
  weekNames.forEach(d => { calHtml += `<div class="cal-day">${d}</div>`; });
  const firstDay = new Date(year, month, 1).getDay();
  for (let i = 0; i < firstDay; i++) calHtml += '<div class="cal-cell"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const cls = d === today ? 'today' : checkedDays.includes(d) ? 'checked' : '';
    calHtml += `<div class="cal-cell ${cls}">${d}</div>`;
  }
  calHtml += '</div>';
  document.getElementById('calendarSection').innerHTML = calHtml;
  /* 标签云 */
  const tags = [
    {text:'主动觉察',t:'t1'},{text:'时间管理',t:'t2'},{text:'结构化表达',t:'t1'},
    {text:'持续改进',t:'t2'},{text:'聚焦行动',t:'t3'},{text:'情绪管理',t:'t1'},
    {text:'沟通技巧',t:'t2'},{text:'目标拆解',t:'t3'},{text:'复盘习惯',t:'t1'},
    {text:'效率提升',t:'t2'}
  ];
  document.getElementById('tagCloudSection').innerHTML = '<h4>标签云</h4><div class="cloud-list">' +
    tags.map(t => `<span class="cloud-tag ${t.t}">${t.text}</span>`).join('') + '</div>';
}

/* ========== 重新开始 ========== */
function restart() {
  selectedMethod = null;
  document.querySelectorAll('.method-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('s2Bottom').classList.remove('show');
  goTo(2);
}

/* ========== 键盘事件 ========== */
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

/* ========== 初始化 ========== */
renderMethods();
</script>
</body>
</html>
