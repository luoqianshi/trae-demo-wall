<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>知行 · Zhixing — App 本体 Demo</title>
  <meta name="description" content="知行 App 本体 Demo · Phase 0：手机外壳 + 5 tab 导航 + 5 占位页。墨韵 · 星图设计语言。">
  <meta name="theme-color" content="#0E0D0B">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- 复用现有设计系统（聚合入口，已含 tokens / typography / motion） -->
  <link rel="stylesheet" href="../../demo/shared/components.css">
  <link rel="stylesheet" href="./core/shell/shell.css">
  <link rel="stylesheet" href="./notes/notebook/notebook.css">
  <link rel="stylesheet" href="./notes/editor/note-editor.css">
  <link rel="stylesheet" href="./notes/overview/note-overview.css">
  <link rel="stylesheet" href="./ai/agent/agent.css">
  <link rel="stylesheet" href="./workflow/workflow.css">
  <link rel="stylesheet" href="./profile/profile.css">
  <link rel="stylesheet" href="./square/square.css">
  <link rel="stylesheet" href="./friends/friends.css">
  <link rel="stylesheet" href="./publish/publish.css">
  <link rel="stylesheet" href="./shared/a11y/a11y-fix.css">
  <link rel="stylesheet" href="./shared/components.css">
  <link rel="stylesheet" href="./core/drawer/drawer.css">
  <link rel="stylesheet" href="./shared/visibility/shared-visibility.css">
</head>
<body>

  <!-- 桌面端小贴士（移动端隐藏） -->
  <p class="zx-hint">建议在手机视口或 DevTools 设备模拟器中体验</p>

  <!-- ============================== 手机外框 ============================== -->
  <div class="zx-phone">

    <!-- ---------- 顶部状态栏（绝对定位顶部） ---------- -->
    <div class="zx-statusbar" aria-hidden="true">
      <span class="zx-statusbar__time">--:--</span>
      <span class="zx-statusbar__icons">
        <!-- 信号 -->
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <rect x="1.5" y="9"    width="2.4" height="5"    rx="0.6" fill="currentColor" stroke="none"/>
          <rect x="5.3" y="6.5"  width="2.4" height="7.5"  rx="0.6" fill="currentColor" stroke="none"/>
          <rect x="9.1" y="4"    width="2.4" height="10"   rx="0.6" fill="currentColor" stroke="none"/>
          <rect x="12.9" y="1.5" width="2.4" height="12.5" rx="0.6" fill="currentColor" stroke="none"/>
        </svg>
        <!-- WiFi -->
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1.5 5.4C5 2.4 11 2.4 14.5 5.4"/>
          <path d="M3.8 7.9C6.2 5.9 9.8 5.9 12.2 7.9"/>
          <path d="M6 10.4C7 9.6 9 9.6 10 10.4"/>
          <circle cx="8" cy="13" r="0.8" fill="currentColor" stroke="none"/>
        </svg>
        <!-- 电量 -->
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round">
          <rect x="1" y="5" width="12" height="7" rx="1.6"/>
          <rect x="2.4" y="6.4" width="8.6" height="4.2" rx="0.6" fill="currentColor" stroke="none"/>
          <path d="M14 7v3" stroke-linecap="round"/>
        </svg>
      </span>
    </div>

    <!-- ---------- 屏幕区（5 页绝对堆叠，display 切换） ---------- -->
    <main class="zx-screen">

      <!-- ===== 广场 ===== -->
      <section class="zx-page" data-page="square" role="tabpanel" aria-label="广场">
        <div class="sq-root" data-sq-root>

          <!-- ===== 主 Feed（默认） ===== -->
          <div class="sq-view sq-view--feed is-on" data-axis="none" data-view="feed">
            <header class="sq-feed__top" data-sq-feed-top></header>
            <div class="sq-feed__scroll" data-sq-feed-scroll data-mode="xhs"></div>
          </div>

          <!-- ===== 笔记详情（从右滑入） ===== -->
          <div class="sq-view sq-view--detail" data-axis="right" data-view="detail">
            <header class="sq-detail__top" data-sq-detail-top></header>
            <div class="sq-detail__scroll" data-sq-detail-scroll></div>
            <footer class="sq-detail__foot" data-sq-detail-foot></footer>
          </div>

          <!-- ===== 搜索子页（从右滑入） ===== -->
          <div class="sq-view sq-view--search" data-axis="right" data-view="search">
            <header class="sq-search__top" data-sq-search-top></header>
            <div class="sq-search__body" data-sq-search-body></div>
          </div>

          <!-- ===== 通知子页（从右滑入） ===== -->
          <div class="sq-view sq-view--notif" data-axis="right" data-view="notif">
            <header class="sq-notif__top" data-sq-notif-top></header>
            <div class="sq-notif__body" data-sq-notif-body aria-live="polite"></div>
          </div>

          <!-- ===== 论点演化时间轴（从右滑入） ===== -->
          <div class="sq-view sq-view--graph-timeline" data-axis="right" data-view="graph-timeline">
            <header class="sq-gtl__top" data-sq-gtl-top></header>
            <div class="sq-gtl__scroll" data-sq-gtl-scroll></div>
          </div>

          <!-- ===== 范畴内学科+论点图（从右滑入，点击范畴大圆进入） ===== -->
          <div class="sq-view sq-view--graph-category" data-axis="right" data-view="graph-category">
            <header class="sq-gcat__top" data-sq-gcat-top></header>
            <div class="sq-gcat__scroll" data-sq-gcat-scroll></div>
          </div>

          <!-- ===== 论点细分图谱（从右滑入，点击论点小圆进入） ===== -->
          <div class="sq-view sq-view--graph-topic" data-axis="right" data-view="graph-topic">
            <header class="sq-gtp__top" data-sq-gtp-top></header>
            <div class="sq-gtp__scroll" data-sq-gtp-scroll></div>
          </div>

        </div>
      </section>

      <!-- ===== 工作（原"笔记本"，重设计为 AI 协作工作区） ===== -->
      <section class="zx-page" data-page="notebook" role="tabpanel" aria-label="工作">
        <div class="nb-root" data-nb-root>

          <!-- ===== 值班台（默认视图，AI 落地页） ===== -->
          <div class="nb-view nb-view--duty is-on" data-axis="none" data-view="duty">
            <div class="nb-duty-scroll" data-duty-scroll></div>
          </div>

          <!-- ===== 编辑器视图（人的领地，文件树/书架/导图） ===== -->
          <div class="nb-view nb-view--editor" data-axis="none" data-view="editor">
            <div class="nb-editor-scroll" data-editor-scroll></div>
          </div>

          <!-- ===== 工作区配置（从右滑入） ===== -->
          <div class="nb-view nb-view--config" data-axis="right" data-view="config">
            <div class="nb-config-scroll" data-config-scroll></div>
          </div>

          <!-- ===== 视图设计器（从右滑入，自定义视图设计页） ===== -->
          <div class="nb-view nb-view--view-designer" data-axis="right" data-view="view-designer">
            <div class="nb-vd-scroll" data-vd-scroll></div>
          </div>

          <!-- ===== 任务看板（从右滑入） ===== -->
          <div class="nb-view nb-view--taskboard" data-axis="right" data-view="taskboard">
            <div class="nb-tb-scroll" data-tb-scroll></div>
          </div>

          <!-- ===== 布置任务页（从右滑入） ===== -->
          <div class="nb-view nb-view--assigntask" data-axis="right" data-view="assigntask">
            <div class="nb-as-scroll" data-as-scroll></div>
          </div>

          <!-- ===== 智能体与团队页（从右滑入） ===== -->
          <div class="nb-view nb-view--agent" data-axis="right" data-view="agent">
            <div class="ag-root" data-agent-root></div>
          </div>

          <!-- ===== 智能体/团队配置页（从右滑入） ===== -->
          <div class="nb-view nb-view--agent-config" data-axis="right" data-view="agent-config">
            <div class="ag-cfg-root" data-agent-config-root></div>
          </div>

          <!-- ===== 工作流列表（从右滑入） ===== -->
          <div class="nb-view nb-view--workflow" data-axis="right" data-view="workflow">
            <div class="wf-root" data-workflow-root></div>
          </div>

          <!-- ===== 工作流节点编辑器（从右滑入） ===== -->
          <div class="nb-view nb-view--workflow-edit" data-axis="right" data-view="workflow-edit">
            <div class="wf-edit-root" data-workflow-edit-root></div>
          </div>

          <!-- ===== 新建工作流（从右滑入） ===== -->
          <div class="nb-view nb-view--wf-new" data-axis="right" data-view="wf-new">
            <div class="wf-new-root" data-wf-new-root></div>
          </div>

          <!-- ===== 任务详情（从右滑入） ===== -->
          <div class="nb-view nb-view--detail" data-axis="right" data-view="detail">
            <header class="nb-detail__top" data-detail-top></header>
            <div class="nb-detail__body" data-detail-body></div>
            <footer class="nb-detail__actions" data-detail-actions></footer>
          </div>

          <!-- ===== 对话子页（从下滑入） ===== -->
          <div class="nb-view nb-view--chat" data-axis="bottom" data-view="chat">
            <header class="nb-chat__top" data-chat-top></header>
            <div class="nb-chat__planbar" data-chat-planbar hidden></div>
            <div class="nb-chat__taskchip" data-chat-taskchip hidden></div>
            <div class="nb-chat__msgs" data-chat-msgs></div>
            <div class="nb-chat__attach-tray" data-chat-tray style="display:none"></div>
            <div class="nb-chat__tools" data-chat-tools></div>
            <div class="nb-chat__input-row" data-chat-input-row></div>
          </div>

          <!-- ===== 对话列表（从右滑入，与 detail 同方向） ===== -->
          <div class="nb-view nb-view--chatlist" data-axis="right" data-view="chatlist">
            <header class="nb-chatlist__top" data-chatlist-top></header>
            <div class="nb-chatlist__body" data-chatlist-body></div>
          </div>

          <!-- ===== 模板选择（从右滑入，与 detail/chatlist 同方向） ===== -->
          <div class="nb-view nb-view--template" data-axis="right" data-view="template">
            <header class="nb-template__top" data-template-top></header>
            <div class="nb-template__body" data-template-body></div>
          </div>

          <!-- ===== 发现页（别人的工作流和 AI 配置，从右滑入） ===== -->
          <div class="nb-view nb-view--discover" data-axis="right" data-view="discover">
            <div class="nb-dsc-root" data-discover-root></div>
          </div>

          <!-- ===== AI 市场（从右滑入） ===== -->
          <div class="nb-view nb-view--market" data-axis="right" data-view="market">
            <header class="sq-market__top" data-sq-market-top></header>
            <div class="sq-market__scroll" data-sq-market-scroll></div>
          </div>

          <!-- ===== 市场资源详情（GitHub 风格，从右滑入） ===== -->
          <div class="nb-view nb-view--market-detail" data-axis="right" data-view="market-detail">
            <header class="sq-mdetail__top" data-sq-mdetail-top></header>
            <div class="sq-mdetail__scroll" data-sq-mdetail-scroll></div>
            <footer class="sq-mdetail__foot" data-sq-mdetail-foot></footer>
          </div>

          <!-- ===== 自制小程序对话（从右滑入，AI 引导 + 实时构建预览） ===== -->
          <div class="nb-view nb-view--miniapp-chat" data-axis="right" data-view="miniapp-chat">
            <header class="nb-mac__top" data-mac-top></header>
            <div class="nb-mac__body">
              <div class="nb-mac__chat">
                <div class="nb-mac__msgs" data-mac-msgs></div>
                <div class="nb-mac__input-row" data-mac-input-row></div>
              </div>
              <div class="nb-mac__preview" data-mac-preview hidden>
                <div class="nb-mac__preview-head" data-mac-preview-head></div>
                <div class="nb-mac__preview-canvas" data-mac-preview-canvas></div>
                <div class="nb-mac__preview-log" data-mac-preview-log></div>
              </div>
            </div>
          </div>

          <!-- ===== 添加组件模态 / Toast ===== -->
          <div class="nb-sheet" data-sheet="add-widget"></div>
          <div class="nb-toast" data-toast role="status" aria-live="polite"></div>
        </div>
        <!-- ===== 笔记编辑器 / 总览 挂载点（W2.A / W2.B 渲染入口） ===== -->
        <div id="nb-editor-root" hidden></div>
        <div id="nb-overview-root" hidden></div>
      </section>

      <!-- ===== 发布 ===== -->
      <section class="zx-page" data-page="publish" role="tabpanel" aria-label="发布">
        <div class="pub-root" data-pub-root>

          <!-- ===== 主视图：发布中心 ===== -->
          <div class="pub-view is-on" data-axis="none" data-view="main">
            <header class="pub-topbar">
              <div class="pub-topbar__left">
                <button class="pub-topbar__btn pub-topbar__btn--icon" data-action="menu" aria-label="功能菜单">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
                </button>
                <button class="pub-topbar__btn" data-pub-act="drafts" aria-label="草稿">
                  <span data-ic="drafts"></span>
                  <span>草稿</span>
                  <span class="pub-badge" data-pub-drafts-count>0</span>
                </button>
              </div>
              <h2 class="pub-topbar__title">发布中心</h2>
              <button class="pub-topbar__btn" data-pub-act="history" aria-label="历史">
                <span data-ic="clock"></span>
              </button>
            </header>
            <div class="pub-scroll" data-pub-main-scroll></div>
          </div>

          <!-- ===== 仓库详情子页 ===== -->
          <div class="pub-view" data-axis="right" data-view="repo">
            <header class="pub-topbar">
              <button class="pub-topbar__btn" data-pub-act="back" aria-label="返回">
                <span data-ic="back"></span>
              </button>
              <h2 class="pub-topbar__title" data-pub-repo-name>仓库</h2>
              <button class="pub-topbar__btn" data-pub-act="more" aria-label="更多">
                <span data-ic="more"></span>
              </button>
            </header>
            <div class="pub-scroll" data-pub-repo-body></div>
          </div>

          <!-- ===== 草稿子页 ===== -->
          <div class="pub-view" data-axis="right" data-view="drafts">
            <header class="pub-topbar">
              <button class="pub-topbar__btn" data-pub-act="back" aria-label="返回">
                <span data-ic="back"></span>
              </button>
              <h2 class="pub-topbar__title">草稿</h2>
              <span class="pub-topbar__btn" aria-hidden="true" style="visibility:hidden"><span data-ic="more"></span></span>
            </header>
            <div class="pub-scroll" data-pub-drafts-body></div>
          </div>

          <!-- ===== 历史子页 ===== -->
          <div class="pub-view" data-axis="right" data-view="history">
            <header class="pub-topbar">
              <button class="pub-topbar__btn" data-pub-act="back" aria-label="返回">
                <span data-ic="back"></span>
              </button>
              <h2 class="pub-topbar__title">全局历史</h2>
              <span class="pub-topbar__btn" aria-hidden="true" style="visibility:hidden"><span data-ic="more"></span></span>
            </header>
            <div class="pub-scroll" data-pub-history-body></div>
          </div>

          <!-- ===== Commit 详情子页 ===== -->
          <div class="pub-view" data-axis="right" data-view="commit">
            <header class="pub-topbar">
              <button class="pub-topbar__btn" data-pub-act="back" aria-label="返回">
                <span data-ic="back"></span>
              </button>
              <h2 class="pub-topbar__title">Commit 详情</h2>
              <span class="pub-topbar__btn" aria-hidden="true" style="visibility:hidden"><span data-ic="more"></span></span>
            </header>
            <div class="pub-scroll" data-pub-commit-body></div>
          </div>

          <!-- ===== 发布确认模态 ===== -->
          <div class="pub-modal" data-pub-modal>
            <div class="pub-modal__overlay" data-pub-act="modal-cancel"></div>
            <div class="pub-modal__dialog" role="dialog" aria-modal="true" aria-label="确认发布">
              <div class="pub-modal__stamp"><span data-ic="upload"></span></div>
              <h3 class="pub-modal__title">确认发布？</h3>
              <dl class="pub-modal__summary" data-pub-modal-summary></dl>
              <div class="pub-modal__foot">
                <button class="pub-modal__btn pub-modal__btn--cancel" data-pub-act="modal-cancel">取消发布</button>
                <button class="pub-modal__btn pub-modal__btn--confirm" data-pub-act="modal-confirm">
                  <span data-ic="check"></span> 确认发布
                </button>
              </div>
            </div>
          </div>

          <!-- ===== Toast ===== -->
          <div class="pub-toast" data-pub-toast role="status" aria-live="polite"></div>

        </div>
      </section>

      <!-- ===== 好友 ===== -->
      <section class="zx-page" data-page="friends" role="tabpanel" aria-label="好友">
        <div class="fr-root">

          <!-- ========== 视图 1：列表（默认） ========== -->
          <div class="fr-view is-on" data-axis="none" data-fr-view="list">

            <!-- 顶栏：☰ 菜单 / [好友|群聊|团队] segment / ➕ 添加 / 🔍 搜索 -->
            <div class="fr-topbar">
              <button class="fr-iconbtn" data-action="menu" aria-label="功能菜单">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
                  <path d="M4 7h16M4 12h16M4 17h16"/>
                </svg>
              </button>
              <div class="fr-segment" role="tablist" aria-label="好友页 tab">
                <button class="fr-segment__btn is-active" data-fr-seg="friends" role="tab" aria-selected="true">好友</button>
                <button class="fr-segment__btn" data-fr-seg="groups" role="tab" aria-selected="false">群聊</button>
                <button class="fr-segment__btn" data-fr-seg="teams" role="tab" aria-selected="false">团队</button>
              </div>
              <button class="fr-iconbtn" data-fr-action="add" aria-label="添加好友">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="9" cy="8" r="3.4"/>
                  <path d="M3 20c0-3.6 2.7-6 6-6s6 2.4 6 6"/>
                  <path d="M19 8v6"/>
                  <path d="M16 11h6"/>
                </svg>
              </button>
              <button class="fr-iconbtn" data-fr-action="search" aria-label="搜索">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="11" cy="11" r="7"/>
                  <path d="m20 20-3.5-3.5"/>
                </svg>
              </button>
              <button class="fr-iconbtn" data-fr-friends-gear aria-label="好友管理" style="display:none">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.36.36.59.85.6 1.36V11a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
              </button>
            </div>

            <!-- 好友 tab -->
            <div class="fr-tab" data-fr-tab="friends">
              <div class="fr-list" data-fr-list="friends" aria-live="polite"></div>
              <div class="fr-group-view" data-fr-group-view hidden></div>
            </div>

            <!-- 群聊 tab -->
            <div class="fr-tab" data-fr-tab="groups" style="display:none">
              <div class="fr-list" data-fr-list="groups" aria-live="polite"></div>
            </div>

            <!-- 团队 tab -->
            <div class="fr-tab" data-fr-tab="teams" style="display:none">
              <div class="fr-list" data-fr-list="teams" aria-live="polite"></div>
            </div>

          </div>

          <!-- ========== 视图 1.5：好友管理（全屏覆盖，齿轮按钮进入） ========== -->
          <div class="fr-view fr-view--fullscreen" data-axis="right" data-fr-view="manage">
            <div class="fr-topbar">
              <button class="fr-iconbtn" data-fr-manage-back aria-label="返回">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M15 18l-6-6 6-6"/>
                </svg>
              </button>
              <h1 class="fr-topbar__title">好友管理</h1>
            </div>
            <div class="fr-manage-body" data-fr-manage-body></div>
          </div>

          <!-- ========== 视图 2：1对1 聊天（全屏覆盖，隐藏 tab 导航） ========== -->
          <div class="fr-view fr-view--fullscreen" data-axis="right" data-fr-view="chat">
            <div class="fr-chat-top" data-fr-chat-top></div>
            <div class="fr-ai-bar" data-fr-chat-ai-bar role="status"></div>
