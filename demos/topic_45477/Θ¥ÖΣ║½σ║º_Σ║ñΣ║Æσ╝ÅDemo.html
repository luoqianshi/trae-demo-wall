<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F5F8F0">
<title>静享座 - 自习室预约</title>
<style>
/* ===== Textured Design System ===== */
:root {
  --bg: #F5F8F0; --surface: #FFFFFF; --surface-hover: #EDF2E6;
  --ink: #1C1C1E; --ink-secondary: #4A4A4C; --ink-tertiary: #8E8E93;
  --border: #E5E5EA; --border-light: #F2F2F7;
  --accent: #7CB342; --accent-dark: #558B2F; --accent-light: #C5E1A5; --accent-bg: #F1F8E9;
  --dark-card: #1C1C1E; --dark-card-light: #2C2C2E;
  --danger: #FF3B30; --success: #34C759; --warning: #FF9500;
  --radius-sm: 10px; --radius-md: 16px; --radius-lg: 24px; --radius-xl: 28px;
  --transition-fast: 0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-soft: 0 1px 3px rgba(28,28,30,0.06), 0 1px 2px rgba(28,28,30,0.04);
  --shadow-card: 0 4px 12px rgba(28,28,30,0.08), 0 1px 3px rgba(28,28,30,0.05);
  --shadow-lift: 0 8px 24px rgba(28,28,30,0.12), 0 2px 6px rgba(28,28,30,0.06);
  --shadow-inner: inset 0 1px 2px rgba(28,28,30,0.04);
  --shadow-glow: 0 0 20px rgba(124,179,66,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased}
.app-container{max-width:430px;height:100dvh;margin:0 auto;background:var(--bg);position:relative;display:flex;flex-direction:column;overflow:hidden}
.page-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.page-content::-webkit-scrollbar{display:none}

/* Bottom Nav */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:60px;background:rgba(255,255,255,0.85);backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);border-top:1px solid rgba(229,229,234,0.5);display:flex;justify-content:space-around;align-items:center;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-tertiary);font-size:10px;font-weight:600;cursor:pointer;transition:color var(--transition-fast),transform var(--transition-fast);padding:6px 16px;position:relative}
.nav-item::after{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%) scaleX(0);width:24px;height:3px;background:var(--accent);border-radius:0 0 3px 3px;transition:transform var(--transition-base)}
.nav-item.active{color:var(--accent)}.nav-item.active::after{transform:translateX(-50%) scaleX(1)}
.nav-item:active{transform:scale(0.9)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:14px 28px;border-radius:100px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all var(--transition-fast);letter-spacing:-0.01em;box-shadow:var(--shadow-soft)}
.btn-primary{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);color:#fff}
.btn-primary:hover{background:linear-gradient(135deg,var(--accent-dark) 0%,var(--accent-dark) 100%);box-shadow:var(--shadow-glow),var(--shadow-lift);transform:translateY(-1px)}
.btn-primary:active{transform:scale(0.96);box-shadow:var(--shadow-inner)}
.btn-outline{background:var(--surface);border:2px solid var(--border);color:var(--ink);box-shadow:var(--shadow-soft)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);box-shadow:var(--shadow-card)}
.btn-ghost{background:transparent;color:var(--ink-secondary)}
.btn-full{width:100%}.btn-sm{padding:8px 18px;font-size:13px}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:600}
.tag-soft{background:var(--accent-bg);color:var(--accent-dark)}
.tag-accent{background:var(--accent);color:#fff}

/* Search */
.search-bar{display:flex;align-items:center;gap:10px;background:var(--surface);border:2px solid var(--border);border-radius:100px;padding:12px 18px;margin:12px 16px;transition:all var(--transition-fast);box-shadow:var(--shadow-soft)}
.search-bar:focus-within{border-color:var(--accent);box-shadow:var(--shadow-glow),var(--shadow-soft)}
.search-bar input{flex:1;border:none;outline:none;font-size:14px;background:transparent;color:var(--ink);font-weight:500}
.search-bar input::placeholder{color:var(--ink-tertiary)}

/* Room Cards */
.room-card{display:flex;gap:14px;background:var(--surface);border-radius:var(--radius-lg);padding:14px;margin:0 16px 12px;cursor:pointer;border:2px solid transparent;transition:all var(--transition-fast);box-shadow:var(--shadow-card)}
.room-card:hover{border-color:var(--accent-light);box-shadow:var(--shadow-lift);transform:translateY(-2px)}
.room-card:active{transform:scale(0.98) translateY(0);box-shadow:var(--shadow-card)}
.room-img{width:90px;height:90px;border-radius:var(--radius-md);object-fit:cover;background:var(--accent-bg);flex-shrink:0}
.room-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
.room-name{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:2px}
.room-meta{font-size:12px;color:var(--ink-tertiary);margin-bottom:2px}
.room-price{font-size:16px;font-weight:800;color:var(--accent-dark)}
.room-price span{font-size:12px;font-weight:500;color:var(--ink-tertiary)}

/* Seat Grid */
.seat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 16px}
.seat-item{aspect-ratio:1;border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;transition:all var(--transition-fast);border:2px solid transparent}
.seat-item.available{background:var(--accent-bg);color:var(--accent-dark)}
.seat-item.booked{background:var(--border-light);color:var(--ink-tertiary);cursor:not-allowed;opacity:0.5}
.seat-item.selected{background:var(--accent);color:#fff;border-color:var(--accent-dark);animation:seatBounce 0.4s ease}
.seat-item:active{transform:scale(0.9)}

/* Profile Header */
.profile-header{background:linear-gradient(160deg,var(--dark-card) 0%,var(--dark-card-light) 100%);padding:44px 20px 28px;color:#fff;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(28,28,30,0.15)}
.profile-header::after{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,var(--accent) 0%,transparent 70%);opacity:0.12;filter:blur(20px)}
.profile-header::before{content:'';position:absolute;left:-40px;bottom:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,var(--accent-light) 0%,transparent 70%);opacity:0.06;filter:blur(30px)}
.profile-avatar{width:60px;height:60px;border-radius:50%;background:var(--accent);margin-bottom:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.profile-name{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.profile-level{font-size:13px;opacity:0.5;margin-top:4px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px}
.stat-item{background:var(--surface);padding:18px 12px;text-align:center;border-radius:var(--radius-md);border:1px solid var(--border-light);box-shadow:var(--shadow-soft)}
.stat-value{font-size:24px;font-weight:800;color:var(--accent-dark);letter-spacing:-0.02em}
.stat-label{font-size:12px;color:var(--ink-tertiary);margin-top:4px;font-weight:600}

/* Menu */
.menu-list{background:var(--surface);border-radius:var(--radius-md);margin:0 16px 12px;overflow:hidden;box-shadow:var(--shadow-soft);border:1px solid var(--border-light)}
.menu-item{display:flex;align-items:center;justify-content:space-between;padding:16px;cursor:pointer;transition:all var(--transition-fast)}
.menu-item:hover{background:var(--accent-bg)}.menu-item:active{background:var(--accent-light)}
.menu-item+.menu-item{border-top:1px solid var(--border-light)}
.menu-item-left{display:flex;align-items:center;gap:14px;font-size:15px;font-weight:600}
.menu-item-icon{width:36px;height:36px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent-bg) 0%,var(--accent-light) 100%);display:flex;align-items:center;justify-content:center;color:var(--accent-dark);box-shadow:var(--shadow-soft)}

/* Status Badges */
.status-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:700}
.status-pending{background:#FFF3E0;color:#E65100}
.status-confirmed{background:var(--accent-bg);color:var(--accent-dark)}
.status-completed{background:#E3F2FD;color:#1565C0}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideFromRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes modalFadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes seatBounce{0%{transform:scale(1)}40%{transform:scale(1.12)}60%{transform:scale(0.96)}80%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}10%,50%,90%{transform:translateX(-4px)}30%,70%{transform:translateX(4px)}}
@keyframes heartBeat{0%{transform:scale(1)}15%{transform:scale(1.35)}30%{transform:scale(0.95)}45%{transform:scale(1.15)}60%{transform:scale(1)}}
@keyframes toastSlideIn{from{opacity:0;transform:translateY(-20px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(120px) rotate(720deg) scale(0.3)}}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.fade-in{animation:fadeIn 0.35s ease forwards}
.slide-up{animation:slideUp 0.4s ease forwards}
.scale-in{animation:scaleIn 0.3s ease forwards}
.page-enter{animation:slideFromRight 0.3s ease forwards}
.shake{animation:shake 0.4s ease}
.toast-notification{animation:toastSlideIn 0.35s ease forwards}
.confetti-piece{position:absolute;animation:confettiFall 1s ease-in forwards}
.heart-beat{animation:heartBeat 0.6s ease}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:modalFadeIn 0.2s ease forwards}
.modal-content{background:var(--surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:24px 20px 32px;width:100%;max-width:430px;max-height:85vh;overflow-y:auto;animation:modalSlideUp 0.35s cubic-bezier(0.16,1,0.3,1) forwards}

/* Hero */
.hero-banner{position:relative;margin:0 16px;border-radius:var(--radius-lg);overflow:hidden;background:linear-gradient(160deg,var(--dark-card) 0%,var(--dark-card-light) 100%);padding:28px 24px;color:#fff;box-shadow:var(--shadow-lift)}
.hero-banner::after{content:'';position:absolute;right:-20px;bottom:-20px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,var(--accent) 0%,transparent 70%);opacity:0.18;filter:blur(15px)}
.hero-banner::before{content:'';position:absolute;left:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,var(--accent-light) 0%,transparent 70%);opacity:0.08;filter:blur(25px)}
.hero-title{font-size:26px;font-weight:800;margin-bottom:6px;letter-spacing:-0.03em;position:relative;z-index:1}
.hero-subtitle{font-size:14px;opacity:0.5;font-weight:500;position:relative;z-index:1}

/* Quick Actions */
.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 16px;margin-top:16px}
.quick-action{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:8px 4px;transition:transform var(--transition-fast)}
.quick-action:active{transform:scale(0.92)}
.quick-action-icon{width:52px;height:52px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:24px;transition:transform var(--transition-fast)}
.quick-action:nth-child(1) .quick-action-icon{background:#E8F5E9}
.quick-action:nth-child(2) .quick-action-icon{background:#FFF3E0}
.quick-action:nth-child(3) .quick-action-icon{background:#F3E5F5}
.quick-action:nth-child(4) .quick-action-icon{background:#E3F2FD}
.quick-action-label{font-size:11px;color:var(--ink-secondary);font-weight:600}

/* Filter Tabs */
.filter-tabs{display:flex;gap:8px;padding:12px 16px;background:var(--bg);position:sticky;top:0;z-index:40;overflow-x:auto;scrollbar-width:none}
.filter-tabs::-webkit-scrollbar{display:none}
.filter-tab{padding:8px 18px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;transition:all var(--transition-fast);white-space:nowrap;background:var(--surface);border:2px solid var(--border);color:var(--ink-secondary)}
.filter-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-tab:active{transform:scale(0.95)}

/* Card */
.card{background:var(--surface);border-radius:var(--radius-md);padding:16px;border:1px solid var(--border-light);box-shadow:var(--shadow-soft)}

/* Quill Divider */
.quill-divider{display:flex;align-items:center;gap:12px;padding:0 16px;margin:20px 0;color:var(--ink-tertiary);font-size:12px;font-weight:600}
.quill-divider::before,.quill-divider::after{content:'';flex:1;height:2px;background:var(--border);border-radius:1px}

/* Empty State */
.fun-empty{text-align:center;padding:60px 32px;color:var(--ink-tertiary)}
.fun-empty-icon{font-size:56px;margin-bottom:16px;animation:bounce 2.5s ease-in-out infinite}
.fun-empty-title{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px}
.fun-empty-desc{font-size:13px;line-height:1.5}

/* Page Header */
.page-header{position:sticky;top:0;z-index:50;background:var(--bg);padding:12px 16px;display:flex;align-items:center;gap:12px}
.back-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background var(--transition-fast);color:var(--ink)}
.back-btn:hover{background:var(--accent-bg)}.back-btn:active{transform:scale(0.9)}

/* Stars */
.stars{display:flex;gap:2px}

/* Toast Container */
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast-item{background:var(--dark-card);color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lift);pointer-events:auto}

/* Order Summary */
.order-summary{background:var(--surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:20px 16px;position:fixed;bottom:60px;left:0;right:0;max-width:430px;margin:0 auto;z-index:90;border-top:2px solid var(--border-light)}

/* Image Carousel */
.carousel{position:relative;width:100%;height:260px;overflow:hidden;background:var(--ink)}
.carousel-track{display:flex;transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);height:100%}
.carousel-slide{min-width:100%;height:100%;position:relative}
.carousel-slide img{width:100%;height:100%;object-fit:cover;display:block}
.carousel-counter{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.5);color:#fff;padding:4px 10px;border-radius:100px;font-size:12px;font-weight:500;backdrop-filter:blur(4px)}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.85);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);transition:all 0.2s;z-index:2;font-size:16px;font-weight:700;color:var(--ink)}
.carousel-btn.prev{left:8px}.carousel-btn.next{right:8px}
.carousel-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2}
.carousel-dot{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,0.5);border:none;cursor:pointer;transition:all 0.3s;padding:0}
.carousel-dot.active{width:20px;background:#fff}

/* Wheel Picker */
.wheel-picker{position:relative;height:132px;overflow:hidden;flex:1}
.wheel-highlight{position:absolute;top:44px;left:8px;right:8px;height:44px;background:var(--border-light);border-radius:var(--radius-sm);z-index:0}
.wheel-scroll{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;position:relative;z-index:1}
.wheel-scroll::-webkit-scrollbar{display:none}
.wheel-item{height:44px;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.15s;scroll-snap-align:center}
.wheel-item.active{font-weight:700;color:var(--ink)}.wheel-item:not(.active){color:var(--ink-tertiary)}
.wheel-spacer{height:44px}

/* Confetti */
.confetti-container{position:fixed;inset:0;z-index:300;pointer-events:none;display:flex;justify-content:center}

/* Ripple */
.ripple-btn{position:relative;overflow:hidden;cursor:pointer}
.ripple-effect{position:absolute;border-radius:50%;background:rgba(124,179,66,0.2);transform:scale(0);animation:rippleAnim 0.6s ease-out forwards;pointer-events:none}

/* Stagger */
.stagger>*{opacity:0;animation:fadeIn 0.35s ease forwards}
.stagger>*:nth-child(1){animation-delay:0.04s}.stagger>*:nth-child(2){animation-delay:0.08s}
.stagger>*:nth-child(3){animation-delay:0.12s}.stagger>*:nth-child(4){animation-delay:0.16s}
.stagger>*:nth-child(5){animation-delay:0.20s}.stagger>*:nth-child(6){animation-delay:0.24s}

/* Section title */
.section-title{font-size:18px;font-weight:700;color:var(--ink);padding:0 16px;margin:24px 0 12px;letter-spacing:-0.02em}

/* Section */
.section{padding:16px;background:var(--surface);margin-bottom:8px}
</style>
</head>

function t(key, params) {
  const val = T[lang][key];
  if (typeof val === 'function') return val(params || {});
  if (typeof val === 'string' && params) {
    let s = val;
    for (const [k,v] of Object.entries(params)) s = s.replace(`{${k}}`, v);
    return s;
  }
  return val || key;
}

// ===== Toast =====
function showToast(msg, type) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast-item toast-notification';
  el.textContent = msg;
  if (type === 'error') el.style.background = 'var(--danger)';
  if (type === 'success') el.style.background = 'var(--success)';
  container.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ===== Ripple =====
function addRipple(e, btn) {
  const r = document.createElement('span');
  r.className = 'ripple-effect';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.width = r.style.height = size + 'px';
  r.style.left = (e.clientX - rect.left - size/2) + 'px';
  r.style.top = (e.clientY - rect.top - size/2) + 'px';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 600);
}

// ===== Confetti =====
function triggerConfetti() {
  const container = document.getElementById('confetti-container');
  const colors = ['#7CB342','#558B2F','#C5E1A5','#FF9500','#34C759','#FF3B30'];
  for (let i=0;i<30;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = (40 + Math.random()*20) + '%';
    p.style.top = '40%';
    p.style.width = (6 + Math.random()*6) + 'px';
    p.style.height = (6 + Math.random()*6) + 'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.borderRadius = Math.random()>0.5?'50%':'2px';
    p.style.animationDelay = (Math.random()*0.4) + 's';
    p.style.animationDuration = (0.8 + Math.random()*0.6) + 's';
    container.appendChild(p);
  }
  setTimeout(() => container.innerHTML = '', 1800);
}

// ===== Navigation =====
function navigate(target, data) {
  if (target === 'room' && data) {
    pageStack.push({page, roomDetail});
    roomDetail = data;
    page = 'room';
  } else if (['orders','profile','search'].includes(target)) {
    pageStack.push({page, roomDetail});
    page = target;
  } else {
    pageStack = [];
    page = target;
    roomDetail = null;
  }
  render();
}

function goBack() {
  if (pageStack.length > 0) {
    const prev = pageStack.pop();
    page = prev.page;
    roomDetail = prev.roomDetail;
  } else {
    page = 'home';
    roomDetail = null;
  }
  render();
}

    {key:'home',label:t('navHome'),icon:icons.home},

function toggleFav(id) {

function renderWheelPicker(options, selected, which) {
  const idx = options.indexOf(selected);
  return `
    <div class="wheel-picker">
      <div class="wheel-highlight"></div>
      <div class="wheel-scroll" id="wheel-${which}" onscroll="handleWheelScroll(this,'${which}',[${options.map(o=>`'${o}'`).join(',')}])">
        <div class="wheel-spacer"></div>
        ${options.map(opt=>`<div class="wheel-item ${opt===selected?'active':''}" data-value="${opt}">${opt}</div>`).join('')}
        <div class="wheel-spacer"></div>
      </div>
    </div>
  `;
}

function handleWheelScroll(el, which, options) {
  clearTimeout(el._timer);
  el._timer = setTimeout(() => {
    const idx = Math.round(el.scrollTop / 44);
    if (idx >= 0 && idx < options.length) {
      // Snap to exact position
      el.scrollTo({top: idx * 44, behavior: 'smooth'});

      if (which === 'start') {
        rdState.selectedStart = options[idx];
        const minEndHour = parseInt(options[idx].split(':')[0]) + 1;
        const currentEndHour = parseInt(rdState.selectedEnd.split(':')[0]);
        if (currentEndHour <= minEndHour) {
          rdState.selectedEnd = String(minEndHour + 1).padStart(2,'0') + ':00';
          // End options changed - need to re-render end wheel
          render();
          return;
        }
      } else {
        rdState.selectedEnd = options[idx];
      }

      // Update visual states without full re-render
      updateWheelActive(el, options[idx]);
      updateBottomPrice();
    }
  }, 150);
}

function updateWheelActive(container, value) {
  container.querySelectorAll('.wheel-item').forEach(item => {
    item.classList.toggle('active', item.dataset.value === value);
  });
}

function updateBottomPrice() {
  const room = roomDetail;
  if (!room) return;
  const duration = parseInt(rdState.selectedEnd.split(':')[0]) - parseInt(rdState.selectedStart.split(':')[0]) || 1;
  const totalPrice = room.price * duration;

  const summaryEl = document.querySelector('.order-summary');
  if (!summaryEl) return;

  const infoEl = summaryEl.querySelector('div > div:first-child > div:first-child');
  const priceEl = summaryEl.querySelector('div > div:first-child > div:nth-child(2)');

  if (infoEl) {
    infoEl.textContent = rdState.selectedSeat
      ? `${rdState.selectedSeat} · ${rdState.selectedStart}-${rdState.selectedEnd}`
      : (lang === 'zh' ? '请选择座位和时段' : 'Select seat and time');
  }
  if (priceEl) {
    priceEl.textContent = rdState.selectedSeat ? `¥${totalPrice}` : '--';
  }
}

function selectSeat(id) {
  rdState.selectedSeat = rdState.selectedSeat === id ? null : id;
  render();

            <div style="display:flex;align-items:flex-end;justify-content:space-between;height:120px;gap:8px">
              ${userProfile.weeklyHours.map((h,i)=>`
                <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px">
                  <div style="font-size:11px;color:var(--ink-secondary);font-weight:600">${h}h</div>
                  <div style="width:100%;max-width:32px;height:${(h/maxH)*80}px;background:${h>=10?'var(--ink)':'var(--border)'};border-radius:4px 4px 0 0;transition:height 0.5s cubic-bezier(0.4,0,0.2,1);min-height:4px"></div>
                  <div style="font-size:11px;color:var(--ink-tertiary)">${weekDays[i]}</div>
                </div>
              `).join('')}
            </div>
          </div>
          <div style="margin:0 16px 12px;padding:20px;background:linear-gradient(160deg,var(--dark-card) 0%,var(--dark-card-light) 100%);border-radius:var(--radius-lg);color:#fff;box-shadow:var(--shadow-lift)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:15px;font-weight:600">${userProfile.level}</div><div style="font-size:12px;opacity:0.6">${lang==='zh'?'有效期至':'Expires'} 2025-06-30</div></div>
            <div style="font-size:13px;opacity:0.7;margin-bottom:16px">${t('profileMemberBenefits')}</div>
            <div style="height:4px;background:rgba(255,255,255,0.15);border-radius:2px;overflow:hidden"><div style="width:65%;height:100%;background:linear-gradient(90deg,var(--accent) 0%,var(--accent-light) 100%);border-radius:2px"></div></div>
            <div style="font-size:11px;opacity:0.5;margin-top:6px">${t('profileMemberUpgrade',{p:420})}</div>
          </div>
        </div>
      `:''}

      ${activeTab==='achievements'?`
        <div class="stagger" style="padding:16px">
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
            ${userProfile.achievements.map(ach=>`
              <div style="background:var(--surface);border-radius:var(--radius-md);padding:16px;text-align:center;border:${ach.unlocked?'1.5px solid var(--accent)':'1px solid var(--border-light)'};opacity:${ach.unlocked?1:0.45};transition:all 0.2s;box-shadow:${ach.unlocked?'var(--shadow-soft)':'none'}">
                <div style="font-size:32px;margin-bottom:8px">${ach.icon}</div>
                <div style="font-size:13px;font-weight:600;margin-bottom:2px">${ach.name}</div>
                <div style="font-size:11px;color:var(--ink-tertiary)">${ach.desc}</div>
                ${ach.unlocked?`<div style="margin-top:8px;font-size:10px;color:var(--accent);font-weight:600;display:flex;align-items:center;justify-content:center;gap:2px">${icons.award} ${t('profileUnlocked')}</div>`:`<div style="margin-top:8px;font-size:10px;color:var(--ink-tertiary)">🔒 ${t('profileLocked')}</div>`}
              </div>
            `).join('')}
          </div>
        </div>
      `:''}

      <div class="stagger">
        <div class="menu-list">
          <div class="menu-item" onclick="navigate('orders')"><div class="menu-item-left"><div class="menu-item-icon">${icons.ticket}</div>${t('profileMyOrders')}</div>${icons.chevronRight}</div>
          <div class="menu-item"><div class="menu-item-left"><div class="menu-item-icon">${icons.heart}</div>${t('profileMyFavorites')}</div>${icons.chevronRight}</div>
          <div class="menu-item"><div class="menu-item-left"><div class="menu-item-icon">${icons.creditCard}</div>${t('profileMyWallet')}</div>${icons.chevronRight}</div>
          <div class="menu-item"><div class="menu-item-left"><div class="menu-item-icon">${icons.gift}</div>${t('profileMemberCenter')}</div>${icons.chevronRight}</div>
        </div>
        <div class="menu-list">
          <div class="menu-item"><div class="menu-item-left"><div class="menu-item-icon">${icons.message}</div>${t('profileNotifications')}</div><span style="background:var(--danger);color:white;font-size:11px;padding:2px 7px;border-radius:10px;margin-left:4px;font-weight:600">3</span>${icons.chevronRight}</div>
          <div class="menu-item"><div class="menu-item-left"><div class="menu-item-icon">${icons.starOutline}</div>${t('profileMyReviews')}</div>${icons.chevronRight}</div>
          <div class="menu-item"><div class="menu-item-left"><div class="menu-item-icon">${icons.help}</div>${t('profileHelp')}</div>${icons.chevronRight}</div>
          <div class="menu-item"><div class="menu-item-left"><div class="menu-item-icon">${icons.settings}</div>${t('profileSettings')}</div>${icons.chevronRight}</div>
        </div>
        <div class="menu-list">
          <div class="menu-item" onclick="profileState.showLang=true;render()">
            <div class="menu-item-left"><div class="menu-item-icon">${icons.globe}</div>${t('profileLanguage')}<span style="font-size:12px;color:var(--accent);font-weight:600;margin-left:4px">${lang==='zh'?t('profileLanguageZh'):t('profileLanguageEn')}</span></div>
            ${icons.chevronRight}
          </div>
        </div>
      </div>

      <div style="text-align:center;padding:24px;color:var(--ink-tertiary);font-size:12px">${t('profileVersion')}</div>

      ${profileState.showLang?`
        <div class="modal-overlay" onclick="profileState.showLang=false;render()">
          <div class="modal-content" onclick="event.stopPropagation()">
            <div style="font-size:18px;font-weight:700;margin-bottom:20px;text-align:center">${t('profileLanguage')}</div>
            <div style="display:flex;flex-direction:column;gap:10px">
              <button class="btn ${lang==='zh'?'btn-primary':'btn-outline'} btn-full" onclick="if(lang!=='zh'){toggleLang();}profileState.showLang=false;render()" style="${lang!=='zh'?'background:transparent':''}">🇨🇳 ${t('profileLanguageZh')}</button>
              <button class="btn ${lang==='en'?'btn-primary':'btn-outline'} btn-full" onclick="if(lang!=='en'){toggleLang();}profileState.showLang=false;render()" style="${lang!=='en'?'background:transparent':''}">🇬🇧 ${t('profileLanguageEn')}</button>
            </div>
          </div>
        </div>
      `:''}
    </div>
  `;
}

// ===== Main Render =====
function render() {
  const content = document.getElementById('page-content');
  if (page === 'home') content.innerHTML = renderHome();
  else if (page === 'search') content.innerHTML = renderSearch();
  else if (page === 'room') content.innerHTML = renderRoomDetail();
  else if (page === 'orders') content.innerHTML = renderOrders();
  else if (page === 'profile') content.innerHTML = renderProfile();
  renderBottomNav();
  window.scrollTo(0,0);

  // Set initial wheel scroll positions after DOM insertion
  if (page === 'room') {
    setTimeout(() => {
      const startWheel = document.getElementById('wheel-start');
      const endWheel = document.getElementById('wheel-end');
      const startIdx = timeSlots.slice(0, -1).indexOf(rdState.selectedStart);
      if (startWheel && startIdx >= 0) {
        startWheel.style.scrollSnapType = 'none';
        startWheel.scrollTop = startIdx * 44;
        startWheel.style.scrollSnapType = 'y mandatory';
      }
      const endOpts = timeSlots.filter(t => parseInt(t.split(':')[0]) > parseInt(rdState.selectedStart.split(':')[0]));
      const endIdx = endOpts.indexOf(rdState.selectedEnd);
      if (endWheel && endIdx >= 0) {
        endWheel.style.scrollSnapType = 'none';
        endWheel.scrollTop = endIdx * 44;
        endWheel.style.scrollSnapType = 'y mandatory';
      }
    }, 50);
  }
}

// Init carousel auto-play
setInterval(()=>{
  if (page==='room' && roomDetail) {
    rdState.carousel = (rdState.carousel + 1) % roomDetail.images.length;
    const track = document.getElementById('carousel-track');
    if (track) track.style.transform = 'translateX(-'+rdState.carousel*100+'%)';
    renderDots();
  }
}, 4000);

// Init
render();
</script>
</body>
</html>
