  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  const titles={dashboard:'首页概览',asset:'资产管理',vuln:'漏洞管理',knowledge:'漏洞知识库',report:'报告生成',ai:'AI 研判',stats:'数据统计'};
  document.getElementById('page-title').textContent=titles[name]||'';
  const container=document.getElementById('page-content');
  container.innerHTML='';
  const page=document.createElement('div');page.className='page show';
  if(name==='dashboard')renderDashboard(page);
  else if(name==='asset')renderAsset(page);
  else if(name==='vuln')renderVuln(page);
  else if(name==='knowledge')renderKnowledge(page);
  else if(name==='report')renderReport(page);
  else if(name==='ai')renderAi(page);
  else if(name==='stats')renderStats(page);
  container.appendChild(page);
}

// ====== VULN ======
function getLevelTag(l){const m={高危:'danger',中危:'warning',低危:'info'};return `<span class="tag ${m[l]||'muted'}">${l||'信息'}</span>`}
function getStatusBadge(s,id){
  const colors={待验证:'muted',已确认:'warning',待修复:'warning',修复中:'info',已复核:'success'};
  return `<span class="tag ${colors[s]||'muted'}" style="cursor:pointer" onclick="changeStatus(${id})">${s}</span>`;
}

function renderVuln(page){
  const filterLevel=page.dataset.filterLevel||'';
  const filterStatus=page.dataset.filterStatus||'';
  let list=vulns;
  if(filterLevel)list=list.filter(v=>v.level===filterLevel);
  if(filterStatus)list=list.filter(v=>v.status===filterStatus);
  // Check if current role is CLIENT
  const isClient=currentRole==='client';
  let rows=list.map(v=>{
    const asset=assets.find(a=>a.id===v.assetId);
    return `<tr><td>${v.vulnName}</td><td>${v.type}</td><td>${getLevelTag(v.level)}</td><td>${getStatusBadge(v.status,v.id)}</td><td>${asset?asset.ip:'-'}</td><td>${asset?asset.unit:'-'}</td><td>${v.discoverer}</td><td>${v.time}</td><td>${isClient?'':`<div class="btn-group"><button class="btn btn-sm btn-outline" onclick="editVuln(${v.id})">编辑</button><button class="btn btn-sm btn-danger" onclick="deleteVuln(${v.id})">删除</button></div>`}</td></tr>`
  }).join('');
  const filterHtml=`
    <select id="vuln-filter-level" onchange="applyFilter()"><option value="">全部等级</option><option value="高危">高危</option><option value="中危">中危</option><option value="低危">低危</option></select>
    <select id="vuln-filter-status" onchange="applyFilter()"><option value="">全部状态</option><option value="待验证">待验证</option><option value="已确认">已确认</option><option value="待修复">待修复</option><option value="修复中">修复中</option><option value="已复核">已复核</option></select>
  `;
  page.innerHTML=`
    <div class="page-header"><h3>漏洞管理</h3>${isClient?'':`<button class="btn btn-primary" onclick="addVuln()">+ 新增漏洞</button>`}</div>
    <div class="table-toolbar"><div class="filters">${filterHtml}<span style="color:var(--muted);font-size:12px">共 ${list.length} 条记录</span></div></div>
    <div class="table-wrap">
      <table><thead><tr><th>漏洞名称</th><th>类型</th><th>风险等级</th><th>状态</th><th>IP地址</th><th>所属单位</th><th>发现人</th><th>发现时间</th><th>${isClient?'':'操作'}</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="9"><div class="empty">暂无数据</div></td></tr>'}</tbody></table>
    </div>
  `;
}

function applyFilter(){
  const p=document.querySelector('#page-content .page');
  if(p){p.dataset.filterLevel=document.getElementById('vuln-filter-level').value;p.dataset.filterStatus=document.getElementById('vuln-filter-status').value;renderVuln(p)}
}

function editVuln(id){

  const v=vulns.find(x=>x.id===id);if(!v)return;

    <div class="form-row"><div class="form-group"><label>风险等级</label><select id="f-vlevel"><option value="高危" ${v.level==='高危'?'selected':''}>高危</option><option value="中危" ${v.level==='中危'?'selected':''}>中危</option><option value="低危" ${v.level==='低危'?'selected':''}>低危</option><option value="信息" ${v.level==='信息'?'selected':''}>信息</option></select></div><div class="form-group"><label>关联资产</label><select id="f-vasset">${assetOpts}</select></div></div>
    <div class="form-row full"><div class="form-group"><label>漏洞描述</label><textarea id="f-vdesc" rows="3">${v.desc}</textarea></div></div>
    <div class="form-row full"><div class="form-group"><label>修复建议</label><textarea id="f-vfix" rows="2">${v.fixSug}</textarea></div></div>
    <div class="modal-btns"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="updateVuln(${id})">保存</button></div>

function updateVuln(id){
  const v=vulns.find(x=>x.id===id);if(!v)return;
  v.vulnName=document.getElementById('f-vname').value||v.vulnName;
  v.type=document.getElementById('f-vtype').value||v.type;
  v.level=document.getElementById('f-vlevel').value||v.level;
  v.assetId=parseInt(document.getElementById('f-vasset').value)||v.assetId;
  v.desc=document.getElementById('f-vdesc').value||v.desc;
  v.fixSug=document.getElementById('f-vfix').value||v.fixSug;
  closeModal();toast('漏洞更新成功！');
  switchPage('vuln',document.querySelector('.nav-item[data-page="vuln"]'));
}

function deleteVuln(id){
  if(currentRole==='client'){toast('客户方无此权限',true);return}
  const idx=vulns.findIndex(x=>x.id===id);if(idx>-1){vulns.splice(idx,1);toast('漏洞已删除');switchPage('vuln',document.querySelector('.nav-item[data-page="vuln"]'))}
}

function changeStatus(id){
  if(currentRole==='client'){toast('客户方无此权限',true);return}
  const v=vulns.find(x=>x.id===id);if(!v)return;
  const flow=['待验证','已确认','待修复','修复中','已复核'];
  const idx=flow.indexOf(v.status);
  const next=idx<flow.length-1?flow[idx+1]:flow[0];
  v.status=next;
  toast(`漏洞状态已变更为：${next}`);
  switchPage('vuln',document.querySelector('.nav-item[data-page="vuln"]'));
}

      <select id="report-type" style="height:34px"><option value="daily">每日简报</option><option value="phase">阶段报告</option><option value="final">复盘报告</option></select>
      <input type="date" id="report-start" value="2026-06-05" style="height:34px">
      <span style="color:var(--muted);line-height:34px">至</span>
      <input type="date" id="report-end" value="2026-06-15" style="height:34px">
      <button class="btn btn-primary" onclick="generateReport()" style="height:34px">生成报告</button>
    </div>
    <div id="report-output"></div>
  `;
}

function generateReport(){
  const type=document.getElementById('report-type').value;
  const start=document.getElementById('report-start').value;
  const end=document.getElementById('report-end').value;
  const typeMap={daily:'每日简报',phase:'阶段报告',final:'复盘报告'};
  const high=vulns.filter(v=>v.level==='高危').length;
  const med=vulns.filter(v=>v.level==='中危').length;
  const low=vulns.filter(v=>v.level==='低危').length;
  const inf=vulns.length-high-med-low;
  const pending=vulns.filter(v=>v.status==='待修复').length;
  const confirmed=vulns.filter(v=>v.status==='已复核').length;
  let detail='';
  vulns.forEach(v=>{
    const a=assets.find(x=>x.id===v.assetId);
    detail+=`<p><b>${v.vulnName}</b> [${v.level}] | ${a?a.ip+'-'+a.unit:'未知'} | 发现人:${v.discoverer} | 状态:${v.status}</p>`
  });
  const output=document.getElementById('report-output');
  output.innerHTML=`
    <div class="report-preview">
      <h4>📄 ${typeMap[type]} - 天山固网攻防演练</h4>
      <p><b>统计周期：</b>${start} 至 ${end}</p>
      <p><b>漏洞总数：</b>${vulns.length} | 高危: ${high} | 中危: ${med} | 低危: ${low} | 信息: ${inf}</p>
      <p><b>已修复：</b>${confirmed} | <b>待修复：</b>${pending}</p>
      <p><b>覆盖资产：</b>${assets.length} 个 | <b>攻击单位：</b>${new Set(assets.map(a=>a.unit)).size} 家</p>
      <hr style="border-color:var(--rule);margin:10px 0">
      <h4 style="font-size:13px">漏洞明细：</h4>
      ${detail}
    </div>
    <div style="margin-top:8px;display:flex;gap:8px">
      <button class="btn btn-success" onclick="toast('报告已导出为 Word 格式')">📥 导出 Word</button>
      <button class="btn btn-outline" onclick="toast('报告已导出为 PDF 格式')">📥 导出 PDF</button>
    </div>
  `;
}

// ====== AI ======
function renderAi(page){
  page.innerHTML=`
    <div class="page-header"><h3>AI 辅助风险研判</h3></div>
    <div style="background:var(--bg2);border:1px solid var(--rule);border-radius:8px;padding:20px;margin-bottom:16px">
      <div class="form-row"><div class="form-group"><label>漏洞名称</label><input id="ai-name" placeholder="请输入漏洞名称"></div><div class="form-group"><label>漏洞类型</label><select id="ai-type"><option>SQL注入</option><option>任意文件上传</option><option>未授权访问</option><option>弱口令</option><option>信息泄露</option><option>XSS跨站脚本</option><option>命令执行</option><option>目录遍历</option><option>逻辑漏洞</option></select></div></div>
      <div class="form-row full"><div class="form-group"><label>漏洞描述</label><textarea id="ai-desc" rows="3" placeholder="请详细描述漏洞情况，包括攻击入口、触发条件、影响范围等"></textarea></div></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="aiAssess()">🤖 AI 风险定级</button>
        <button class="btn btn-outline" onclick="aiSuggest()">💡 获取修复建议</button>
        <button class="btn btn-outline" onclick="aiBoth()">⚡ 一键研判</button>
      </div>
    </div>
    <div id="ai-result"></div>
  `;
}

function aiAssess(){
  const name=document.getElementById('ai-name').value||'未命名漏洞';
  const type=document.getElementById('ai-type').value;
  const desc=document.getElementById('ai-desc').value||'暂无描述';
  const levels=['高危','中危','低危','信息'];
  const weights={'SQL注入':0.9,'命令执行':0.95,'任意文件上传':0.85,'未授权访问':0.75,'弱口令':0.6,'目录遍历':0.5,'信息泄露':0.3,'XSS跨站脚本':0.4,'逻辑漏洞':0.5};
  const w=weights[type]||0.5;
  const level=w>=0.8?'高危':w>=0.6?'中危':w>=0.4?'低危':'信息';
  const result=document.getElementById('ai-result');
  result.innerHTML=`
    <div class="ai-result">
      <h4>🤖 AI 风险定级结果</h4>
      <p><b>漏洞名称：</b>${name}</p>
      <p><b>漏洞类型：</b>${type}</p>
      <p><b>判定等级：</b><span class="tag ${level==='高危'?'danger':level==='中危'?'warning':level==='低危'?'info':'success'}" style="font-size:14px">${level}</span></p>
      <p><b>置信度：</b>${(w*100).toFixed(1)}%</p>
    </div>
  `;
}

function aiSuggest(){
  const name=document.getElementById('ai-name').value||'未命名漏洞';
  const type=document.getElementById('ai-type').value;
  const suggestions={
    'SQL注入':'1. 使用参数化查询(PreparedStatement)替代字符串拼接 2. 对用户输入进行严格的正则过滤 3. 部署WAF防火墙 4. 最小化数据库权限 5. 定期进行SQL注入专项扫',
    '任意文件上传':'1. 采用白名单机制限制上传文件类型 2. 文件重命名存储，避免使用用户原始文件名 3. 上传目录禁止脚本执行权限 4. 对上传文件进行内容安全检查',
    '未授权访问':'1. 对所有接口添加统一认证鉴权 2. 敏感操作增加二次验证 3. 实施最小权限原则 4. 定期审计接口权限配置',
    '弱口令':'1. 强制要求密码复杂度（大小写+数字+特殊字符≥12位）2. 启用多因素认证(MFA) 3. 禁止使用默认密码 4. 定期强制密码更新',
    '信息泄露':'1. 关闭详细错误信息显示 2. 自定义404/500错误页面 3. 移除Server版本banner 4. 配置信息脱敏输出',
    'XSS跨站脚本':'1. 对输出进行HTML实体编码 2. 部署Content-Security-Policy响应头 3. 使用HttpOnly Cookie 4. 输入过滤特殊字符',
    '命令执行':'1. 升级相关组件到最新版本 2. 禁用危险系统函数 3. 严格过滤用户输入 4. 最小化应用运行权限',
    '目录遍历':'1. 限制Web访问目录范围 2. 过滤../等路径穿越字符 3. 升级中间件至安全版本 4. 配置合理的访问控制规则',
    '逻辑漏洞':'1. 完善会话管理机制 2. 每个请求独立校验权限 3. 关键操作添加日志审计 4. 实施防重放攻击机制'
  };
  const sug=suggestions[type]||'1. 升级系统组件到最新版本 2. 完善输入验证机制 3. 部署安全防护设备';
  const result=document.getElementById('ai-result');
  result.innerHTML=`
    <div class="ai-result">
      <h4>💡 AI 修复建议</h4>
      <p><b>漏洞名称：</b>${name}</p>
      <p><b>漏洞类型：</b>${type}</p>
      <p style="margin-top:8px;line-height:2">${sug}</p>
    </div>
  `;
}

function aiBoth(){
  aiAssess();
  setTimeout(()=>{
    const name=document.getElementById('ai-name').value||'未命名漏洞';
    const type=document.getElementById('ai-type').value;
    const sug={'SQL注入':'使用参数化查询与WAF防护','任意文件上传':'白名单限制+重命名存储','未授权访问':'统一认证鉴权','弱口令':'强制复杂度+MFA','信息泄露':'关闭错误信息','XSS':'输出编码+CSP策略','命令执行':'升级组件+禁用危险函数','目录遍历':'限制访问范围','逻辑漏洞':'完善权限校验'}[type]||'升级组件+完善验证';
    const res=document.getElementById('ai-result');
    const l=res.querySelector('.ai-result');
    if(l){
      const p=document.createElement('p');p.style.marginTop='12px';p.style.paddingTop='12px';p.style.borderTop='1px solid var(--rule)';
      p.innerHTML=`<b>💡 修复建议：</b>${sug}`;
      l.appendChild(p);
    }
    toast('一键研判完成！');
  },100);
}

// ====== STATS ======
function renderStats(page){
  const h=vulns.filter(v=>v.level==='高危').length;
  const m=vulns.filter(v=>v.level==='中危').length;
  const l=vulns.filter(v=>v.level==='低危').length;
  const i=vulns.length-h-m-l;
  const typeCount={};
  vulns.forEach(v=>{typeCount[v.type]=(typeCount[v.type]||0)+1});
  const typeNames=Object.keys(typeCount);
  const typeVals=Object.values(typeCount);
  page.innerHTML=`
    <div class="page-header"><h3>演练数据可视化统计</h3></div>
    <div class="charts-row">
      <div class="chart-box"><div class="chart-title">漏洞等级分布</div><div class="chart-container" id="stat-pie"></div></div>
      <div class="chart-box"><div class="chart-title">漏洞类型统计</div><div class="chart-container" id="stat-bar"></div></div>
    </div>
    <div class="charts-row">
      <div class="chart-box"><div class="chart-title">各单位资产风险排名</div><div class="chart-container" id="stat-rank"></div></div>
      <div class="chart-box"><div class="chart-title">漏洞状态分布</div><div class="chart-container" id="stat-status"></div></div>
    </div>
  `;
  setTimeout(()=>{
    // Pie
    var p=echarts.init(document.getElementById('stat-pie'),null,{renderer:'svg'});
    p.setOption({animation:false,tooltip:{trigger:'item',appendToBody:true,formatter:'{b}: {c} ({d}%)'},legend:{bottom:8,textStyle:{color:'#8896ab',fontSize:12},itemWidth:10,itemHeight:10},series:[{type:'pie',radius:['38%','62%'],center:['50%','44%'],itemStyle:{borderRadius:4,borderColor:'#111827',borderWidth:2},label:{show:true,color:'#e8edf5',fontSize:12,formatter:'{b}\n{d}%'},labelLine:{lineStyle:{color:'#2a3548'}},data:[{value:h,name:'高危',itemStyle:{color:'#ef4444'}},{value:m,name:'中危',itemStyle:{color:'#f59e0b'}},{value:l,name:'低危',itemStyle:{color:'#00d4ff'}},{value:i,name:'信息',itemStyle:{color:'#10b981'}}]}]});
    window.addEventListener('resize',()=>p.resize());
    // Bar
    var b=echarts.init(document.getElementById('stat-bar'),null,{renderer:'svg'});
    b.setOption({animation:false,tooltip:{trigger:'axis',appendToBody:true},grid:{left:80,right:20,top:15,bottom:30},xAxis:{type:'value',axisLine:{lineStyle:{color:'#2a3548'}},axisLabel:{color:'#8896ab'}},yAxis:{type:'category',data:typeNames,axisLine:{lineStyle:{color:'#2a3548'}},axisLabel:{color:'#e8edf5',fontSize:11}},series:[{type:'bar',data:typeVals,barWidth:14,itemStyle:{borderRadius:[0,3,3,0],color:function(p){const cs=['#ef4444','#f59e0b','#00d4ff','#10b981','#7c3aed','#8896ab'];return cs[p.dataIndex%cs.length]}},label:{show:true,position:'right',color:'#8896ab',fontSize:11,formatter:'{c}'}}]});
    window.addEventListener('resize',()=>b.resize());
    // Rank
    var unitCount={};
    assets.forEach(a=>{unitCount[a.unit]=0});
    vulns.forEach(v=>{const a=assets.find(x=>x.id===v.assetId);if(a){unitCount[a.unit]=(unitCount[a.unit]||0)+1}});
    const unitNames=Object.keys(unitCount).sort((a,b)=>unitCount[b]-unitCount[a]);
    const unitVals=unitNames.map(n=>unitCount[n]);
    var r=echarts.init(document.getElementById('stat-rank'),null,{renderer:'svg'});
    r.setOption({animation:false,tooltip:{trigger:'axis',appendToBody:true},grid:{left:100,right:20,top:15,bottom:30},xAxis:{type:'value',axisLine:{lineStyle:{color:'#2a3548'}},axisLabel:{color:'#8896ab'}},yAxis:{type:'category',data:unitNames,axisLine:{lineStyle:{color:'#2a3548'}},axisLabel:{color:'#e8edf5',fontSize:11}},series:[{type:'bar',data:unitVals,barWidth:14,itemStyle:{borderRadius:[0,3,3,0],color:'#00d4ff'},label:{show:true,position:'right',color:'#8896ab',fontSize:11,formatter:'{c}'}}]});
    window.addEventListener('resize',()=>r.resize());
    // Status
    var statusCount={};
    vulns.forEach(v=>{statusCount[v.status]=(statusCount[v.status]||0)+1});
    const statusNames=Object.keys(statusCount);
    const statusVals=Object.values(statusCount);
    var s=echarts.init(document.getElementById('stat-status'),null,{renderer:'svg'});
    s.setOption({animation:false,tooltip:{trigger:'item',appendToBody:true,formatter:'{b}: {c} ({d}%)'},legend:{bottom:8,textStyle:{color:'#8896ab',fontSize:12},itemWidth:10,itemHeight:10},series:[{type:'pie',radius:['38%','62%'],center:['50%','44%'],itemStyle:{borderRadius:4,borderColor:'#111827',borderWidth:2},label:{show:true,color:'#e8edf5',fontSize:12,formatter:'{b}\n{d}%'},labelLine:{lineStyle:{color:'#2a3548'}},data:statusNames.map((n,i)=>({value:statusVals[i],name:n,itemStyle:{color:['#8896ab','#f59e0b','#f59e0b','#00d4ff','#10b981'][i]||'#00d4ff'}}))}]});
    window.addEventListener('resize',()=>s.resize());
  },100);
}
