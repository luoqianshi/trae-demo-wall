const DT=0.02;const INITIAL_PARAMS={m:2.0,k:1.0,c:0.5,target:5.0};
const CONTROLLER_CONFIGS={'OpenLoop':{category:'1. 经典线性体系',name:'开环前馈 (Open Loop)',desc:'无反馈，遇干扰即失效。',eq:'u = k · r',tuning:'无需调参。完全依赖对环境系统弹簧系数(K)的精确预判，一旦环境K改变，必然产生无法修复的静差。',params:{u_static:[5.0,0,50,0.1]}},'P':{category:'1. 经典线性体系',name:'P控制 (比例)',desc:'输出与误差成正比，存在稳态误差。',eq:'u = K_p · e',tuning:'Kp过小响应迟缓；Kp调大能加快收敛，但由于系统缺乏阻尼会造成严重超调，且永远无法彻底消除克服弹簧力带来的静差。',params:{kp:[40,0,100,1]}},'PI':{category:'1. 经典线性体系',name:'PI控制 (比例-积分)',desc:'消除稳态误差，但增加超调。',eq:'u = K_p · e + K_i ∫e dt',tuning:'先调Kp保证响应速度，Ki从极小值开始加。Ki过大将导致系统积累过多能量，引起长时间的低频震荡（积分饱和）。',params:{kp:[30,0,100,1],ki:[5,0,50,0.1]}},'PD':{category:'1. 经典线性体系',name:'PD控制 (比例-微分)',desc:'微分相当于电子阻尼，减少超调。',eq:'u = K_p · e - K_d · v',tuning:'Kp主导速度；大幅增加Kd能提供强大的"电子阻尼"有效抑制超调。缺点是现实中过大的Kd会疯狂放大传感器噪声。',params:{kp:[40,0,100,1],kd:[10,0,50,0.1]}},'PID':{category:'1. 经典线性体系',name:'PID控制 (比例-积分-微分)',desc:'工业万金油，综合快、准、稳。',eq:'u = K_p · e + K_i ∫e dt - K_d · v',tuning:'黄金法则：先提Kp让系统动起来，再加Kd把震荡压平，最后补微小Ki消除最后一点贴不到目标的稳态静差。',params:{kp:[40,0,100,1],ki:[10,0,50,0.1],kd:[20,0,50,0.1]}},'IPD':{category:'1. 经典线性体系',name:'I-PD (微分先行PID)',desc:'P和D仅作用于状态，避免指令突变冲击。',eq:'u = K_i ∫e dt - K_p · x - K_d · v',tuning:'与PID类似，但因Kp不作用于目标偏差(e)，系统对目标阶跃的初始响应会变肉，适合对加速度有严格限制的机械机构。',params:{kp:[40,0,100,1],ki:[10,0,50,0.1],kd:[20,0,50,0.1]}},'2DOF-PID':{category:'1. 经典线性体系',name:'二自由度 PID',desc:'前馈系数独立优化跟踪能力，削弱超调。',eq:'u = K_p(b·r - x) + K_i ∫e dt - K_d · v',tuning:'在调好普通PID的基础上，微调前置权重b(通常在0.3~0.8)。调小b能在不影响抗干扰能力的前提下，大幅削弱阶跃指令超调。',params:{kp:[40,0,100,1],ki:[10,0,50,0.1],kd:[20,0,50,0.1],b:[0.5,0,1,0.05]}},'IncPID':{category:'1. 经典线性体系',name:'增量式 PID',desc:'自带抗积分饱和特性。',eq:'Δu = K_p Δe + K_i e + K_d Δ²e',tuning:'注意！增量式PID的参数量级通常远小于位置式。Ki主导稳态速度，Kp负责抗瞬态扰动。适合高频定周期采样环境。',params:{kp:[10,0,100,1],ki:[0.5,0,10,0.01],kd:[5,0,50,0.1]}},'PolePlacement':{category:'2. 频域与最优理论',name:'极点配置 (状态反馈)',desc:'将闭环极点配置到期望位置。',eq:'u = -K₁ x - K₂ v + (K₁+k) r',tuning:'极点 p1, p2 设为正数(代码底层取负)。值越大闭环极点越深埋左半平面，收敛极快但极易导致执行器推力超限饱和。',params:{p1:[2,0.1,10,0.1],p2:[3,0.1,10,0.1]}},'LQR':{category:'2. 频域与最优理论',name:'LQR (线性二次型最优)',desc:'最小化状态偏差和能量消耗代价函数(J)。',eq:'u = -K_{lqr} [x-r, v]^T',tuning:'Q_x惩罚位置误差(增大则响应快)，R_weight惩罚能量消耗(增大则输出柔和)。这比调PID直观得多，是一种高级权重平衡艺术。',params:{q_x:[100,1,500,1],q_v:[10,0.1,50,0.1],r_weight:[1,0.1,20,0.1]}},'LQG':{category:'2. 频域与最优理论',name:'LQG (包含卡尔曼滤波)',desc:'在测量噪声中利用卡尔曼滤波器提取最佳状态进行反馈。',eq:'u = -K_{lqr} [x̂-r, v̂]^T \\ (x̂ 由卡尔曼估计)',tuning:'真实传感器一定有噪声。通过拉高 Q_x/R_w 提高跟踪精度，代价是会让执行器更敏感地响应由滤波残留带来的高频颤振。',params:{q_x:[100,1,500,1],q_v:[10,0.1,50,0.1],r_w:[1,0.1,20,0.1]}},'MPC':{category:'2. 频域与最优理论',name:'MPC (模型预测控制)',desc:'预测未来系统轨迹并在线优化求解。',eq:'u = argmin_{u} [ (x_{pred}-r)^2 + λu^2 ]',tuning:'t_pred为预测视野，较短会显得系统偏激进，适中能完美贴合轨迹；Lambda为控制成本惩罚，调大会让控制力更加丝滑不突变。',params:{t_pred:[0.5,0.05,2.0,0.05],lambda:[0.01,0.001,1,0.001]}},'Deadbeat':{category:'2. 频域与最优理论',name:'无差拍控制 (Deadbeat)',desc:'极点配置在Z域原点，试图最少步数内消除误差。',eq:'u = (m/T²)K·e - (m/T+c)K·v + k·x',tuning:'理论上可在2拍内归零。但在实际连续系统离散化中，kp_scale过高极其容易因为算力步长原因当场发散爆炸，建议维持在 0.5。',params:{kp_scale:[0.5,0.1,2.0,0.1]}},'H-Infinity':{category:'2. 频域与最优理论',name:'H-∞ 鲁棒状态反馈',desc:'基于小增益定理，最小化无穷范数。',eq:'u = P_{22} e - P_{12} v \\ (P 由 H_∞ Riccati 解出)',tuning:'Gamma是干扰抑制上界限。逼近临界值(接近1.0)能获得地狱级的鲁棒抗扰性，但日常控制力会显得极为狂躁不安。',params:{gamma:[2.0,1.1,10,0.1],q_x:[100,10,500,10]}},'QFT-LeadLag':{category:'2. 频域与最优理论',name:'QFT / 超前-滞后补偿',desc:'定量反馈设计，提升系统频域相位裕度。',eq:'C(s) = K_{gain} (s+z) / (s+p)',tuning:'配置 Zero < Pole 以实现超前补偿(提供超前相位裕度，相当于频域里的D微分项)，Gain控制总带宽。是频域教徒的最爱。',params:{gain:[50,1,100,1],zero:[2.0,0.1,10,0.1],pole:[20,1,50,1]}},'IMP-Servo':{category:'2. 频域与最优理论',name:'内模原理伺服控制 (IMP)',desc:'增广方程引入指令积分，保证绝对无静差跟踪。',eq:'u = -K_x x - K_v v + K_i ∫e dt + k·r',tuning:'Q_e 决定了对"指令稳态追踪"的渴望程度。大幅拉高 Q_e 能像利剑一样劈开静差，但极易引起初始的大幅超调震荡。',params:{q_e:[1000,10,2000,10],q_x:[50,1,100,1],r_u:[1,0.1,20,0.1]}},'Preview':{category:'2. 频域与最优理论',name:'预见控制 (Preview Control)',desc:'利用未来已知目标，提前动作。',eq:'u = K_p e - K_d v + K_{prev} ∑ γ^i r(t+i)',tuning:'当目标点是定值时效果类似增强前馈。K_prev越大，系统在到达目标前就越会"提前刹车或蓄力"，动作极具前瞻性。',params:{kp:[40,1,100,1],kd:[20,0.1,50,0.1],k_prev:[0.3,0.01,2.0,0.01]}},'BangBang':{category:'3. 非线性结构控制',name:'Bang-Bang 控制',desc:'极粗暴双位控制，产生极限环震荡。',eq:'u = F_{max} · sgn(e)',tuning:'Force必须远大于弹簧的稳态拉力。系统必然产生极限环震荡，调大force只会让它震得更快更猛烈，毫无温柔可言。',params:{force:[20,0,200,1]}},'Relay':{category:'3. 非线性结构控制',name:'滞回继电控制 (Relay)',desc:'引入死区滞回区间，消除高频抖振。',eq:'u = F_{max} (|e| > d) 带滞回',tuning:'Deadzone（死区）设定了你能容忍的稳态静差。只要进了这个区间控制就"躺平"，完美消除了普通 Bang-Bang 的破坏性颤振。',params:{force:[20,10,200,1],deadzone:[0.1,0.01,1,0.01]}},'TimeOptimal':{category:'3. 非线性结构控制',name:'时间最优相平面法',desc:'利用相平面切换曲线。',eq:'u = F_{max} · sgn(e - v|v|/(2a_{max}))',tuning:'Force决定了加减速能力。算法依据物理方程在"全速推进"和"全速刹车"间寻找唯一的完美切换点，原点处引入线性过渡防溢出。',params:{force:[20,10,200,1]}},'FeedbackLin':{category:'3. 非线性结构控制',name:'反馈线性化 (计算力矩)',desc:'抵消不利动态，嵌入期望阻尼响应。',eq:'u = m(K_p e - K_d v) + cv + kx',tuning:'Kp决定目标追击烈度。为了保证绝不超调的临界阻尼特性，Kd 必须手动严格计算设定为 2 * sqrt(Kp)。',params:{kp:[25,1,100,1],kd:[10,0.1,50,0.1]}},'Backstepping':{category:'3. 非线性结构控制',name:'反步法 (Backstepping)',desc:'构造李雅普诺夫虚拟控制律，全局稳定。',eq:'u = m(-z_1 - c_2 z_2 + c_1 v) + kx + cv',tuning:'c1决定子系统收敛速度，c2决定实际控制侧响应。两者最好协同放大，若差距过大易造成虚拟变量与真实控制律的脱节。',params:{c1:[5,0.1,20,0.1],c2:[5,0.1,20,0.1]}},'DSC':{category:'3. 非线性结构控制',name:'动态面控制 (DSC)',desc:'一阶低通虚拟面滤波器解决"微分爆炸"。',eq:'τ ż + z = α₁ ;  u = m(ż - c_2 s_2 - s_1) + kx + cv',tuning:'Tau为虚拟面滤波时间常数，建议取极小(0.01~0.05)。过大会导致滤波面严重滞后于实际状态，引发严重的跟踪超调。',params:{c1:[5,0.1,20,0.1],c2:[5,0.1,20,0.1],tau:[0.05,0.01,0.5,0.01]}},'TDC':{category:'3. 非线性结构控制',name:'时间延迟控制 (TDC)',desc:'利用极小时间延迟数据抵消未知动态。',eq:'u(t) = u(t-dt) + m(a_{des} - a(t-dt))',tuning:'极其暴力而有效。M_nom 为估测质量，不需要完全准，但最好保持在真实值的 0.5倍~2倍 之间，否则前馈抵消彻底失效引发崩溃。',params:{m_nom:[2.0,0.5,10,0.1],kp:[25,1,100,1],kd:[10,0.1,50,0.1]}},'Passivity':{category:'3. 非线性结构控制',name:'无源性控制 (PBC)',desc:'配置供能率耗散系统能量。',eq:'u = kr - K_p(x-r) - K_v v',tuning:'形式上极像PD控制，但理论立足点在于哈密顿耗散。Kp提供能量拉扯，Kv负责将这些能量"无源散尽"，调大Kv防越界。',params:{kp:[30,1,100,1],kv:[15,0.1,50,0.1]}},'Synergetic':{category:'3. 非线性结构控制',name:'协同控制 (Synergetic)',desc:'宏变量服从渐进一阶微分，纯连续输出无抖振。',eq:'u = m(T · Ψ - c · v) + kx + cv',tuning:'C_syn类似滑模面斜率，T_syn决定宏变量衰减至0的强迫速度。增加T_syn可提高响应，但过大导致输出过载。',params:{c_syn:[5,0.1,20,0.1],T_syn:[5,1,50,1]}},'Flatness':{category:'3. 非线性结构控制',name:'微分平坦控制 (Flatness)',desc:'生成目标轨迹直接解算前馈力。',eq:'u = m ẍ_d + c ẋ_d + k x_d + K_p e - K_d v',tuning:'wn_d决定紫色虚线（规划轨迹）的速度。系统完全抛弃了硬刚目标的执念，优雅地贴合平滑规划线移动，Kp/Kd仅修补微小瑕疵。',params:{wn_d:[2,1,10,0.1],zeta_d:[1,0.1,2,0.1],kp:[20,1,50,1],kd:[10,0.1,20,0.1]}},'NDC':{category:'3. 非线性结构控制',name:'非线性阻尼控制 (NDC)',desc:'注入非线性阻尼项 e²v，大误差大阻尼。',eq:'u = K_p e - K_d v - K_{nd} e^2 v',tuning:'K_nd 控制非线性阻尼。大跨度位移时阻尼狂飙死死按住超调，一旦逼近目标阻尼项神奇归零，保障高敏捷跟进。极其实用。',params:{kp:[40,1,100,1],kd:[10,0,50,0.1],k_nd:[5,0,50,0.1]}},'CFTC':{category:'3. 非线性结构控制',name:'连续有限时间控制 (CFTC)',desc:'连续分数次幂反馈，严格有限时间内到达0。',eq:'u = K_p |e|^α sgn(e) - K_d |v|^β sgn(v) + kr',tuning:'Alpha<1 打破了线性控制无限趋近的魔咒。Alpha越小收敛越绝对，但过小(如<0.5)在离散机系上原点极易震荡甚至 NaN崩溃。',params:{kp:[30,1,100,1],kd:[15,1,50,1],alpha:[0.8,0.1,0.99,0.01]}},'NL-H-Inf':{category:'3. 非线性结构控制',name:'非线性 H-∞ 状态反馈',desc:'求解解析的HJI不等式，惩罚高阶非线性项。',eq:'u = K_p e + p_1 e^3 - K_d v - γ^{-2} e',tuning:'Gamma调节鲁棒保守度。注意控制律包含高次项 e^3，这让它在大误差扰动时爆发力惊人，堪称西装暴徒。',params:{gamma:[2.0,1.1,10,0.1],kp:[20,1,100,1],kd:[10,0.1,50,0.1]}},'SMC':{category:'4. 滑模与变结构家族',name:'传统滑模控制 (SMC)',desc:'严格等效控制结合切换项。绝对鲁棒，但有高频抖振。',eq:'u_{eq} = kx + cv - mc·v \\ u = u_{eq} + K_{gain} sat(s/ε)',tuning:'【已修正等效律】K_gain只需稍大于未知扰动。Epsilon边界层放宽能抹平红色控制力的高频刺耳抖振，但会带来微小静差。',params:{c_surface:[5,0.1,20,0.1],k_gain:[10,1,100,1],eps:[0.1,0.01,2,0.01]}},'VSC-RL':{category:'4. 滑模与变结构家族',name:'指数趋近律滑模',desc:'配置滑动面指数导数，平滑到达相。',eq:'u = u_{eq} + m(ε sgn(s) + K_{rl} s)',tuning:'【已修正等效律】K_rl 主导远端指数逼近速度，Eps 主导近端匀速穿刺滑模面。巧妙组合两者能让到达轨迹平滑且极速。',params:{c_surface:[5,0.1,20,0.1],eps:[5,0.1,50,0.1],k_rl:[10,0.1,50,0.1]}},'ISMC':{category:'4. 滑模与变结构家族',name:'积分滑模控制 (ISMC)',desc:'引入积分项消除到达相，全程鲁棒。',eq:'u = kx + cv + K_{gain} sat(s/ε) \\ (s含积分)',tuning:'因为自带积分项，无论初始点多偏系统都在滑动面上，全程免疫匹配扰动。C1/C2决定收敛特质，K_gain 压制外援干扰。',params:{c1:[5,0.1,20,0.1],c2:[5,0.1,20,0.1],k_gain:[20,1,100,1]}},'TSMC':{category:'4. 滑模与变结构家族',name:'终端滑模控制 (TSMC)',desc:'引入分式次幂滑动面，有限时间内绝对收敛至零。',eq:'u = u_{eq} + K_{gain} sgn(-v + β e^α)',tuning:'【已修正等效律】Alpha必属于(0,1)。引入了强悍的非线性吸引子，近端收敛比普通SMC快得多，但原点存在不可消除的奇异抖振问题。',params:{beta:[5,0.1,20,0.1],alpha:[0.8,0.1,0.99,0.01],k_gain:[15,1,100,1]}},'FTSMC':{category:'4. 滑模与变结构家族',name:'快速终端滑模 (FTSMC)',desc:'结合线性与非线性终端滑模，远端快速近端有限。',eq:'u = u_{eq} + K_{gain} sgn(-v + c_1 e + c_2 e^q)',tuning:'【已修正等效律】最极客的滑模。远端靠 C1(线性) 狂飙，近端靠 C2和Q(次幂) 收尾。参数微调较难，但调好后神挡杀神。',params:{c1:[4,0.1,20,0.1],c2:[2,0.1,10,0.1],q:[0.8,0.1,0.99,0.01],k_gain:[15,1,100,1]}},'ASMC':{category:'4. 滑模与变结构家族',name:'自适应滑模控制',desc:'根据滑动面动态自适应调节切换增益。',eq:'u = u_{eq} + K̂ sgn(s) \\ ( dK̂/dt = γ|s| )',tuning:'【已修正等效律】Gamma主导切换增益K_hat的学习速度。即使你完全不知道外加干扰的强度，它也能在线把自己武装到恰好镇压干扰的力度。',params:{c_surface:[5,0.1,20,0.1],gamma:[50,1,200,1]}},'SuperTwisting':{category:'4. 滑模与变结构家族',name:'超螺旋滑模 (2阶SMC)',desc:'将高频切换隐藏在积分项内部，极大削弱抖振。',eq:'u = u_{eq} + m(λ√|s|sgn(s) + W∫sgn(s) dt)',tuning:'【已修正等效律】这是解决滑模机械损耗的终极方案！Lambda和W黄金配比通常为 Lambda=1.5*sqrt(W)。观察红色曲线，几乎完美平滑！',params:{c:[5,0.1,20,0.1],lambda:[10,1,50,1],W:[20,1,100,1]}},'LevantHOSM':{category:'4. 滑模与变结构家族',name:'Levant 鲁棒精确微分滑模',desc:'通过高阶滑模精确微分器无延迟滤除噪声提取理想导数，再送入滑模面。',eq:'u = K_{gain} sat(s_{Levant}/ε) + k·r',tuning:'无惧极恶劣的传感器噪声。L1和L2是观测器核心增益，L1过小会导致误差放大，调控二者可在抗噪与跟随间绝佳折中。',params:{l1:[10,1,50,1],l2:[20,1,100,1],c_surf:[5,0.1,20,0.1],k_gain:[20,1,100,1]}},'NPID':{category:'5. 数据驱动与智能',name:'韩氏非线性 PID',desc:'利用 fal 函数实现"小误差大增益，大误差小增益"。',eq:'u = K_p fal(e) + K_i ∫fal(e) + K_d fal(-v)',tuning:'Alpha调低(<0.7)能极大放大微小静差的权重，从而实现小范围高敏捷；Delta防止原点导数无穷大，必设极小值如0.1。',params:{kp:[40,1,100,1],ki:[10,0,50,0.1],kd:[20,1,50,0.1],alpha:[0.75,0.1,0.9,0.05],delta:[0.1,0.01,1,0.01]}},'FOPID':{category:'5. 数据驱动与智能',name:'分数阶 FOPID',desc:'离散差分实现非整数次幂微积分，提供极佳平滑性。',eq:'u = K_p e + K_i D^{-λ} e + K_d D^{μ} e',tuning:'Lambda控制记忆衰减速度，Mu调控柔性阻尼。多出的两个次幂参数使其比传统PID具有更宽容的模型不确定性抗性域。',params:{kp:[40,0,100,1],ki:[5,0,50,0.1],kd:[10,0,50,0.1],lambda:[0.9,0.1,1.5,0.05],mu:[0.9,0.1,1.5,0.05]}},'MRAC':{category:'5. 数据驱动与智能',name:'MRAC (模型参考自适应)',desc:'在线自适应调整参数，追踪预设理想模型。',eq:'u = θ_r r + θ_x x + θ_v v \\ (dθ/dt ∝ e_m)',tuning:'Gamma学习率决定追踪紫色参考线的积极性。过大的Gamma会引发参数疯狂震荡。Wn/Zeta决定了紫色理想模型的自身动态特质。',params:{gamma:[10,0.1,50,0.1],wn:[2,0.5,10,0.1],zeta:[1,0.1,2,0.1]}},'STR':{category:'5. 数据驱动与智能',name:'自校正调节器 (STR)',desc:'在线辨识系统环境参数，实时求解极点配置。',eq:'u = mω² r - (mω² - k̂)x - (2mζω - ĉ)v',tuning:'与MRAC不同，它底层在偷偷摸摸地计算估测现实环境中的弹簧系数(K)和阻尼(C)，一旦摸清底细瞬间施展极点配置实现完美控制。',params:{gamma:[5,0.1,50,0.1],wn:[2,1,10,0.1],zeta:[1,0.1,2,0.1]}},'MFAC':{category:'5. 数据驱动与智能',name:'无模型自适应 (MFAC)',desc:'引入广义误差面解决二阶物理系统纯积分导致的发散问题。',eq:'u(k)=u(k-1)+[ρ φ/(λ+φ²)]e^* \\ φ(k)=φ(k-1)+[ηΔu/(μ+Δu²)](Δy-φΔu)',tuning:'【稳定秘籍】已补全 PPD(φ) 的在线自适应更新律！基础MFAC等效纯积分，必须用 Kd 引入电子阻尼(广义误差面)。Rho 控制步长，Eta 决定 φ 学习率，Lambda 防除零发散。',params:{rho:[0.5,0.01,2,0.01],kd:[15.0,0,50,0.1],lambda:[1.0,0.1,10,0.1],eta:[1.0,0.1,5,0.1],mu:[1.0,0.1,5,0.1]}},'iPID':{category:'5. 数据驱动与智能',name:'超局部智能 PID (iPID)',desc:'在线估计极复杂动态项并直接代数对消。',eq:'u = (-F̂ + K_p e - K_d v) / α',tuning:'Alpha必须恰当缩放以稳住局势；Tau滤波器时间常数越小则F估计越灵敏，但噪声放大风险剧增。它是未知干扰杀手。',params:{alpha:[1.0,0.01,5,0.01],kp:[40,1,100,1],kd:[20,0.1,50,0.1],tau:[0.05,0.01,0.5,0.01]}},'U-Model':{category:'5. 数据驱动与智能',name:'U-Model 动力学求根',desc:'Newton-Raphson 迭代法在线实时求解控制多项式的根。',eq:'u(k) = u(k-1) + μ(r - ŷ) / (∂y/∂u) + PD',tuning:'牛顿迭代步长 Step_nr 非常敏感，过大必炸。本质是将复杂的非线性寻根问题通过局部线性化映射，对时变系统异常有效。',params:{kp:[20,1,50,1],kd:[10,0.1,20,0.1],step_nr:[0.5,0.01,1,0.01]}},'ESC':{category:'5. 数据驱动与智能',name:'极值寻优控制 (ESC)',desc:'注入探测正弦波实时计算成本梯度寻优。',eq:'u = u_{pd} + u_{bias} + a·sin(ωt)',tuning:'注意红色控制线的极高频振动(Amp)，那是它伸出的"寻优触角"。它通过评估扰动产生的代价平方反向调整偏置(Bias)，极度魔幻。',params:{k_esc:[50,1,100,1],omega:[15,1,50,1],amp:[1.0,0.1,10,0.1]}},'BELBIC':{category:'5. 数据驱动与智能',name:'大脑情感仿生控制 (BELBIC)',desc:'哺乳动物边缘系统神经模型，纯正仿生学。',eq:'u = A - O + k·r \\ (A:杏仁核, O:眶额皮层)',tuning:'杏仁核(a_A)主攻快速惩罚性学习，眶额皮层(a_O)负责遗忘平抑过冲。通过调节感觉权重(W_e/W_v)来模拟情绪对行动的影响。',params:{a_A:[10,0.1,20,0.1],a_O:[5,0.1,20,0.1],w_e:[2,0.1,5,0.1],w_v:[1,0.1,5,0.1]}},'ADP':{category:'5. 数据驱动与智能',name:'自适应动态规划 (ADP)',desc:'强化学习连续版。严格连续 Actor-Critic，通过 Bellman 误差更新权重。',eq:'u = W_{ap} e - W_{ad} v + kr \\ (TD=U+\\dot{V})',tuning:'【已修正连续时间Actor-Critic】Critic网络评估状态极度敏锐。如果你将Alpha_a(演员学习率)拉高，能肉眼看到初段由于急于获取高昂Reward带来的暴力加速。',params:{alpha_c:[10,0.1,50,0.1],alpha_a:[5,0.1,20,0.1],q_pen:[5,0.1,10,0.1],r_pen:[0.5,0.01,1,0.01]}},'DOB':{category:'6. 融合与复合架构',name:'DOB (扰动观测器框架)',desc:'【逆模型 + PD】估算外部总扰动直接补偿。',eq:'u = K_p e - K_d v - d̂ \\ (d̂=LPF(u-u_{nom}))',tuning:'W_c观测器低通截止频率至关重要。调高W_c可光速识别扰动并对冲，但在真实带噪声系统中会让你付出全系高频抖动的惨痛代价。',params:{w_c:[50,1,100,1],kp:[40,1,100,1],kd:[20,0.1,50,0.1]}},'IMC':{category:'6. 融合与复合架构',name:'内模控制 (IMC)',desc:'【内部模型 + PID】引入过程模型逆修正扰动。',eq:"u = K_p(r' - x) + K_i ∫(r' - x) - K_d v",tuning:'这是化工厂常客。它在后台跑一个名义植物模型，一旦现实跑偏，直接把偏差送给PI狂补。其稳健性完全取决于你的已知模型底子有多准。',params:{kp:[40,1,100,1],ki:[10,0.1,50,0.1],kd:[20,0.1,50,0.1]}},'ADRC':{category:'6. 融合与复合架构',name:'LADRC (线性自抗扰)',desc:'【LESO + LSEF】视未知为总扰动进行观测对消。',eq:'u = (w_c²(r - z₁) - 2w_c z₂ - z₃) / b₀',tuning:'调参公式极其优美：W_o(观测器带宽)推荐设为 W_c(控制反馈带宽) 的3-5倍。B0只要数量级不出大错，剩下的全靠观测器逆天强补。',params:{w_o:[30,5,100,1],w_c:[10,1,50,1],b0:[0.5,0.01,5,0.01]}},'NL-ADRC':{category:'6. 融合与复合架构',name:'NL-ADRC (非线性自抗扰)',desc:'【NLESO+NLSEF】全盘非线性fal函数榨取抗扰极限。',eq:'u = (w_c² fal(r-z₁) - 2w_c z₂ - z₃) / b₀',tuning:'韩京清教授原版。非线性扩张使得它在极小偏差下有非凡感知力。Delta值越小，非线性切换越猛，原点收敛越紧密。',params:{w_o:[30,5,100,1],w_c:[10,1,50,1],b0:[0.5,0.01,5,0.01],delta:[0.1,0.01,0.5,0.01]}},'ARC':{category:'6. 融合与复合架构',name:'自适应鲁棒控制 (ARC)',desc:'【自适应 + 滑模】参数在线学习，高频干扰滑模镇定。',eq:'u = m̂(-cv) + kx + cv + K_s s + K_n sgn(s)',tuning:'【已修正参数学习律】双剑合璧。Gamma严格跟随观测信息学习系统的质量漂移，而面对瞬发打击的急茬，则交由K_s/K_n这组暴力的滑模强行镇压。',params:{gamma:[5,0.1,20,0.1],c:[5,0.1,20,0.1],k_s:[15,0,50,1],k_n:[5,0,20,0.5]}},'ESO-SMC':{category:'6. 融合与复合架构',name:'扩张观测器+滑模 (ESO-SMC)',desc:'【LESO + SMC】观测器补偿90%扰动，滑模镇定残差。',eq:'u = (-c·z₂ - z₃ + K·sat(s)) / b₀',tuning:'【已修正理论级等效律】由于前置ESO已经挖走了几乎所有的可观测干扰，滑模的K_gain只需设个极小的数值保底，从而实现无抖振的极致平滑。',params:{w_o:[30,5,100,1],c_surface:[5,0.1,20,0.1],k_gain:[10,1,50,1],b0:[0.5,0.01,5,0.01]}},'L1':{category:'6. 融合与复合架构',name:'L1 自适应控制',desc:'【极高增益自适应 + LPF】完美解耦自适应速度与鲁棒性。',eq:'u = LPF(u_{pd} - m·θ̂_x) \\ dθ̂_x/dt = -γ(v̂ - v)',tuning:'【已修正真实预测器】Gamma可以丧心病狂地拉到1000(追求光速逼近)。由于使用了真实预测状态v̂，T_lpf死死兜底隔离高频发散，绝对稳。',params:{gamma:[1000,100,2000,100],t_lpf:[0.05,0.01,0.5,0.01],wn:[2,0.5,10,0.1],zeta:[1,0.1,2,0.1]}},'I-and-I':{category:'6. 融合与复合架构',name:'I&I 浸入与不变自适应',desc:'仅要求目标流形收敛，瞬间跟踪性能极佳。',eq:'u = K_p e - K_d v + θ̂_{I&I} - λe',tuning:'【已修正I&I真实流形】不再纠结于参数的终极准确性。适当拔高 Lambda，系统将在极短的时间内强迫轨迹进入安全流形空间，超调控制完爆经典MRAC。',params:{gamma:[10,0.1,50,0.1],lambda:[5,1,50,1],kp:[30,1,100,1],kd:[15,0.1,50,0.1]}},'FuzzyPID':{category:'6. 融合与复合架构',name:'模糊 PID',desc:'【模糊推理 + PID】在线微调 PID 基准参数。',eq:'u = (K_{p0}+ΔK_p)e + (K_{i0}+ΔK_i)∫e - (K_{d0}+ΔK_d)v',tuning:'Range约束了参数浮动的警戒线。基准参数 Kp0 等必须置于稳定域，在极短的跳变期内依靠模糊面提供非线性修补。',params:{kp0:[30,0,50,1],ki0:[5,0,20,0.1],kd0:[15,0,30,0.1],range:[10,1,50,1]}},'NeuralPID':{category:'6. 融合与复合架构',name:'单神经元自适应 PID',desc:'【Hebbian神网 + PID】无监督学习在线自动进化权重。',eq:'u = K (w_1 e + w_2 ∫e - w_3 v)',tuning:'Eta作为神经元突触学习率，务必保持在0.01乃至更小，依赖统一缩放因子K去放大动作力。看控制波形，你会感受到它的进化。',params:{K:[100,1,200,1],eta:[0.01,0.001,0.1,0.001]}},'Fuzzy':{category:'6. 融合与复合架构',name:'纯模糊控制 (Fuzzy)',desc:'【经验规则库】专家经验转换为隶属度数学模型进行曲面推理。',eq:'u = FuzzySurface(e, de/dt) · Gain',tuning:'Ke和Kec相当于对感受器的视力校准，必须保证稳态时输入处于有效触发区。Gain统领大局，放小以防推力过载震荡。',params:{gain:[3,0.1,10,0.1],ke:[0.5,0.01,1,0.01],kec:[0.5,0.01,1,0.01]}},'EnergyShaping':{category:'6. 融合与复合架构',name:'能量成型 (IDA-PBC)',desc:'【哈密顿结构重塑】修改等效势能并注入非线性阻尼。',eq:'u = kx - K_d(x-r) - (R_0 + R_1 |v|)v',tuning:'K_d 赋予系统虚拟弹簧拉力直指目标；R_0为基底阻尼，R_1为针对高速猛冲专门准备的非线性截断阻尼。能量架构上绝对安全无瑕。',params:{k_d:[30,1,100,1],r_d0:[10,0,50,0.1],r_d1:[5,0,20,0.1]}},'AdaptBackstepping':{category:'6. 融合与复合架构',name:'自适应反步法',desc:'【反步 + 辨识】虚拟控制律严格基于Lyapunov推导的参数自适应律。',eq:'u = m̂(-z₁ - c₂z₂ - c₁v) + kx + cv \\ d(m̂)/dt = γ z₂ c₁ v',tuning:'【已修正CLF自适应律】极其优雅的数学推导连携反应。Gamma_m主控参数辨识，即使遇到质量骤变也能在短短几秒内将其收敛抵消稳住局面。',params:{c1:[5,0.1,20,0.1],c2:[5,0.1,20,0.1],gamma_m:[2,0.1,20,0.1]}},'PPC':{category:'7. 前沿与新型约束',name:'规定性能控制 (PPC)',desc:'非线性映射保证瞬态误差绝对锁死在指数衰减漏斗内，永不越界。',eq:'u = K_p z_{ppc} - K_d v + kr \\ (z=\\frac{1}{2}\\ln\\frac{1+e/ρ}{1-e/ρ})',tuning:'硬性要求：Rho_0 (漏斗初高) 必须极其严格地大于指令跃变的真实初差！参数 L 是漏斗闭合速度，调高可强制系统光速落位，霸道绝伦。',params:{kp:[30,1,50,1],kd:[10,0,20,0.1],rho_0:[6.0,1,10,0.1],rho_inf:[0.1,0.01,1,0.01],l:[1.0,0.1,5,0.1]}},'BLF':{category:'7. 前沿与新型约束',name:'障碍李雅普诺夫 (BLF)',desc:'避障算法。状态逼近安全边界 $k_b$ 时，控制力趋于无穷。',eq:'u = K_p [ e / (k_b^2 - e^2) ] - K_d v + kr',tuning:'安全控制界门神。Kb 是不可跨越的生死边界。系统只要稍微逼近边界0.05m，控制推力就能指数级起飞，像隐形墙一样将轨迹弹回。',params:{kb:[6.0,1,15,0.1],kp:[20,1,50,1],kd:[10,0,20,0.1]}},'ETC':{category:'7. 前沿与新型约束',name:'事件触发控制 (ETC)',desc:'因系统有弹簧拉力，且为节省带宽区间保持力度，故表现为锯齿状掉落-拉回。',eq:'u(t)=u(t_k) \\ 触发: |e(t)-e(t_k)| > σ|e(t)| + ε₀',tuning:'Sigma 越大网络带宽节省得越极致。注意看红色控制力曲线那极富特色的平直阶跃，那就是不更新网络报文的状态省流时刻。',params:{sigma:[0.15,0.01,0.5,0.01],kp:[40,1,100,1],kd:[20,0.1,50,0.1],eps0:[0.05,0.01,0.5,0.01]}},'Switched':{category:'7. 前沿与新型约束',name:'切换系统/驻留时间 (Switched)',desc:'多控制器利用李雅普诺夫衰减和驻留时间强硬调度。',eq:'u = u_{fast} (V>1) \\ | \\ u_{slow} (V≤1)',tuning:'Dwell(驻留时间)防抖基石。如果没有驻留间隔限制强行插补，两套子系统频密切换必然诱发Zeno恶性连环发散震荡。',params:{p_fast:[4,1,10,0.1],p_slow:[2,0.1,5,0.1],dwell:[0.5,0.1,2,0.1]}},'DynPole':{category:'7. 前沿与新型约束',name:'动态极点配置',desc:'根据误差游走复平面极点。误差大退守，误差小深埋光速收敛。',eq:'u = -k_1(e)x - k_2(e)v + (k_1(e)+k)r',tuning:'Alpha_p 控制极点游移的敏捷性。大偏差拉远极点是为保命防执行器过饱和，贴近目标拉近极点是为极致精度的无情镇压。',params:{p_max:[5,1,15,0.1],p_min:[2,0.1,5,0.1],alpha_p:[1,0.1,10,0.1]}},'PTC':{category:'7. 前沿与新型约束',name:'预设时间控制 (PTC)',desc:'硬核承诺！无论初始状态如何，严格保证在用户预先指定的绝对时间内收敛至目标。',eq:'u = kx+cv + m( K_p e / t_{eff}^2 - K_d v / t_{eff} ) \\ (t_{eff} = max(T_p - t, ε))',tuning:'T_p 就是你大笔一挥规定的死线(Deadline)！系统逼近该时间点时，无论差距多大都会爆发出几何级增长的控制力强行拉平误差。Kp和Kd决定收敛形态。',params:{Tp:[2.0,0.5,5.0,0.1],kp:[2.0,0.1,10.0,0.1],kd:[3.0,0.1,10.0,0.1],eps:[0.05,0.01,0.5,0.01]}},'InputShaping':{category:'8. 轨迹规划与工业学习',name:'输入整形控制 (ZV Shaper)',desc:'利用固有频率延时裂变脉冲目标指令，相消干涉彻底抹除震荡。',eq:'u = K_p(r_{shaped} - x) - K_d v + k r_{shaped}',tuning:'极度硬核的高级数控机床开环技术。它假设你的弹簧和阻尼模型绝对准确。观察紫色的"楼梯前馈"，它正巧利用时差完美抵消了回弹。',params:{kp:[40,1,100,1],kd:[20,0.1,50,0.1]}},'ILC':{category:'8. 轨迹规划与工业学习',name:'迭代学习控制 (ILC)',desc:'每次目标跳变视为一轮新Trial，利用上一轮同一时间点误差直接叠加控制增量。',eq:'u_k(t) = u_{k-1}(t) + Γ e_k(t) + kr',tuning:'尝试多次拖动"目标(Target)"！每一轮拖动都是一次学习迭代，Gamma_ilc控制吸收上轮教训的比重，你会发现它轨迹愈发变态平滑。',params:{gamma_ilc:[1.0,0.05,2,0.05],kp_base:[10,0,50,1]}},'Repetitive':{category:'8. 轨迹规划与工业学习',name:'重复控制 (RC)',desc:'内模原理离散实现，通过延迟线记忆周期误差并反相叠加补偿。',eq:'u(t) = Q·u(t-L) + K_{rc} e(t-L) + PD + kr',tuning:'Q_filter是防止高频噪声无限内卷发散的救命稻草(略微<1)。对持续不断的固定模式波形干扰有绝对的碾压抹除特攻。',params:{k_rc:[5,0.1,20,0.1],q_filter:[0.95,0.5,1,0.01]}},'GainSched':{category:'8. 轨迹规划与工业学习',name:'增益调度控制 (Gain Scheduling)',desc:'在"激进"与"保守"两组参数间极其平滑地非线性插值。',eq:'u = K_p(|e|) e - K_d v + kr',tuning:'Bnd分界带不可太狭窄。利用插值系数将狂暴的高P增益自然过渡到绵柔的低P增益，它是业界搞定严重非线性非定常系统最务实的一手。',params:{kp_far:[60,10,150,1],kp_near:[20,1,50,1],bnd:[2,0.1,10,0.1]}}};
const getDefaultParams=(method)=>{const params={};for(const[key,value]of Object.entries(CONTROLLER_CONFIGS[method].params)){params[key]=value[0];}return params;};
const fal=(e,a,d)=>Math.abs(e)<=d?e/Math.pow(d,1-a):Math.sign(e)*Math.pow(Math.abs(e),a);
const gaussNoise=()=>{let u=0,v=0;while(u===0)u=Math.random();while(v===0)v=Math.random();return Math.sqrt(-2.0*Math.log(u))*Math.cos(2.0*Math.PI*v);};
const calcGLWeights=(order,len)=>{let w=[1];for(let j=1;j<len;j++)w[j]=(1-(order+1)/j)*w[j-1];return w;};
const calcMetrics=(history,target)=>{if(!history||history.length<5)return{overshoot:0,settling:0,sse:0,peak:0};let peak=target;for(const pt of history){if(pt.x>peak)peak=pt.x;}const overshoot=target!==0?Math.max(0,((peak-target)/Math.abs(target))*100):0;const band=Math.max(0.05,Math.abs(target)*0.02);let settling=history[history.length-1].t-history[0].t;for(let i=history.length-1;i>=0;i--){if(Math.abs(history[i].x-target)>band){settling=history[i].t-history[0].t;break;}}const tail=history.slice(-20);const avgX=tail.reduce((s,p)=>s+p.x,0)/tail.length;const sse=Math.abs(avgX-target);return{overshoot,settling,sse,peak};};
const autoTunePID=(pP)=>{const{m,k,c}=pP;const wn=Math.sqrt(k/m);const wn_c=Math.max(2.0,wn*2.5);const zeta_c=0.707;const kp=Math.max(1,m*wn_c*wn_c-k);const kd=Math.max(0,2*m*zeta_c*wn_c-c);const ki=Math.max(0.1,wn_c*kp/8);return{kp,ki,kd};};

const updatePhysics=()=>{const state=stateRef.current;const{physParams:pP,ctrlParams:cP,method:currMethod}=loopStateRef.current;const u=calculateControlOutput(DT,state.x,state.v,pP.target,pP,cP,state.alg,currMethod,state.t);const f_net=u-(pP.k*state.x)-(pP.c*state.v);const a=f_net/pP.m;state.v+=a*DT;state.x+=state.v*DT;state.t+=DT;const err=Math.abs(state.x-pP.target);const absV=Math.abs(state.v);if(err<0.05&&absV<0.05){chartStateRef.current.freezeTimer+=DT;}else{chartStateRef.current.freezeTimer=0;chartStateRef.current.frozen=false;}if(chartStateRef.current.freezeTimer>2.0){chartStateRef.current.frozen=true;}if(!chartStateRef.current.frozen){historyRef.current.push({t:state.t,x:state.x,u:u,target:pP.target,ref:state.alg.ref_display||state.alg.xm});if(historyRef.current.length>2500){chartStateRef.current.frozen=true;}}};
const animate=()=>{if(loopStateRef.current.running&&loopStateRef.current.mode==='single')updatePhysics();if(loopStateRef.current.mode==='single'){drawSimulation();drawCharts();}requestRef.current=requestAnimationFrame(animate);};
const stepComparePhysics=()=>{const pP=loopStateRef.current.physParams;schemesRef.current.forEach(sch=>{const u=calculateControlOutput(DT,sch.state.x,sch.state.v,pP.target,pP,sch.params,sch.state.alg,'PID',sch.state.t);const f_net=u-(pP.k*sch.state.x)-(pP.c*sch.state.v);const a=f_net/pP.m;sch.state.v+=a*DT;sch.state.x+=sch.state.v*DT;sch.state.t+=DT;sch.history.push({t:sch.state.t,x:sch.state.x,u,target:pP.target});if(sch.history.length>1500)sch.history.shift();});setSchemesVersion(v=>(v+1)%1000000);};
const drawCompareChart=()=>{const canvas=compareChartRef.current;if(!canvas)return;const ctx=canvas.getContext('2d');const w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);ctx.fillStyle='#0F172A';ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(148,163,184,0.08)';ctx.lineWidth=1;for(let i=1;i<6;i++){ctx.beginPath();ctx.moveTo(0,h*i/6);ctx.lineTo(w,h*i/6);ctx.stroke();}for(let i=1;i<8;i++){ctx.beginPath();ctx.moveTo(w*i/8,0);ctx.lineTo(w*i/8,h);ctx.stroke();}const target=loopStateRef.current.physParams.target;const targetY=h/2-(target-5)*10;ctx.beginPath();ctx.setLineDash([6,4]);ctx.moveTo(0,targetY);ctx.lineTo(w,targetY);ctx.strokeStyle='#10B981';ctx.lineWidth=2;ctx.shadowColor='#10B981';ctx.shadowBlur=6;ctx.stroke();ctx.setLineDash([]);ctx.shadowBlur=0;ctx.fillStyle='#10B981';ctx.font='bold 11px "Inter",sans-serif';ctx.fillText('目标 '+target.toFixed(1),8,targetY-4);let tMin=Infinity,tMax=-Infinity;schemesRef.current.forEach(s=>{if(s.history.length){tMin=Math.min(tMin,s.history[0].t);tMax=Math.max(tMax,s.history[s.history.length-1].t);}});if(tMin===Infinity)return;const tSpan=Math.max(6.0,tMax-tMin);schemesRef.current.forEach(sch=>{if(sch.history.length<2)return;ctx.beginPath();ctx.strokeStyle=sch.color;ctx.lineWidth=2.5;ctx.shadowColor=sch.color;ctx.shadowBlur=4;sch.history.forEach((pt,i)=>{const x=((pt.t-tMin)/tSpan)*w;const y=h/2-(pt.x-5)*10;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});ctx.stroke();ctx.shadowBlur=0;});};
const animateCompare=()=>{if(compareRunningRef.current&&loopStateRef.current.mode==='compare')stepComparePhysics();if(loopStateRef.current.mode==='compare')drawCompareChart();compareRequestRef.current=requestAnimationFrame(animateCompare);};
useEffect(()=>{resetAlgState(method,physParams.target);schemesRef.current.forEach(sch=>{sch.state.alg=resetAlgStatePure(physParams.target);});requestRef.current=requestAnimationFrame(animate);compareRequestRef.current=requestAnimationFrame(animateCompare);return()=>{cancelAnimationFrame(requestRef.current);cancelAnimationFrame(compareRequestRef.current);};},[]);

const drawSimulation=()=>{const canvas=simCanvasRef.current;if(!canvas)return;const ctx=canvas.getContext('2d');const w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);ctx.fillStyle='#0F172A';ctx.fillRect(0,0,w,h);const mapX=(val)=>(val+2)/14*w;const groundY=h-50;ctx.beginPath();ctx.moveTo(0,groundY);ctx.lineTo(w,groundY);ctx.strokeStyle='rgba(148,163,184,0.2)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#64748B';ctx.font='10px "JetBrains Mono",monospace';for(let i=0;i<=10;i+=1){const px=mapX(i);ctx.fillStyle='rgba(148,163,184,0.3)';ctx.fillRect(px,groundY,1,5);ctx.fillStyle='#64748B';ctx.fillText(i,px-3,groundY+15);}const targetX=mapX(loopStateRef.current.physParams.target);ctx.beginPath();ctx.setLineDash([5,5]);ctx.moveTo(targetX,20);ctx.lineTo(targetX,groundY);ctx.strokeStyle='#10B981';ctx.lineWidth=2;ctx.shadowColor='#10B981';ctx.shadowBlur=8;ctx.stroke();ctx.setLineDash([]);ctx.shadowBlur=0;ctx.fillStyle='#10B981';ctx.font='bold 11px "Inter",sans-serif';ctx.fillText('目标点',targetX-15,15);const blockX=mapX(stateRef.current.x);const boxSize=40;ctx.shadowColor='#06B6D4';ctx.shadowBlur=12;ctx.fillStyle='#06B6D4';ctx.fillRect(blockX-boxSize/2,groundY-boxSize,boxSize,boxSize);ctx.shadowBlur=0;ctx.beginPath();ctx.moveTo(0,groundY-boxSize/2);const segments=20,step=blockX/segments;for(let i=1;i<=segments;i++)ctx.lineTo(step*i,groundY-boxSize/2+(i%2===0?5:-5));ctx.lineTo(blockX-boxSize/2,groundY-boxSize/2);const springGrad=ctx.createLinearGradient(0,0,blockX,0);springGrad.addColorStop(0,'rgba(148,163,184,0.3)');springGrad.addColorStop(1,'rgba(148,163,184,0.6)');ctx.strokeStyle=springGrad;ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle='#F1F5F9';ctx.font='11px "JetBrains Mono",monospace';ctx.fillText(stateRef.current.x.toFixed(2)+'m',blockX-15,groundY-boxSize/2+5);};

const drawCharts=()=>{const posCanvas=posChartCanvasRef.current;const ctrlCanvas=ctrlChartCanvasRef.current;if(!posCanvas||!ctrlCanvas)return;const posCtx=posCanvas.getContext('2d');const ctrlCtx=ctrlCanvas.getContext('2d');const w=posCanvas.width;const hPos=posCanvas.height;const hCtrl=ctrlCanvas.height;posCtx.clearRect(0,0,w,hPos);ctrlCtx.clearRect(0,0,w,hCtrl);posCtx.fillStyle='#0F172A';posCtx.fillRect(0,0,w,hPos);ctrlCtx.fillStyle='#0F172A';ctrlCtx.fillRect(0,0,w,hCtrl);posCtx.strokeStyle='rgba(148,163,184,0.08)';posCtx.lineWidth=1;for(let i=1;i<6;i++){posCtx.beginPath();posCtx.moveTo(0,hPos*i/6);posCtx.lineTo(w,hPos*i/6);posCtx.stroke();}for(let i=1;i<8;i++){posCtx.beginPath();posCtx.moveTo(w*i/8,0);posCtx.lineTo(w*i/8,hPos);posCtx.stroke();}ctrlCtx.strokeStyle='rgba(148,163,184,0.08)';ctrlCtx.lineWidth=1;for(let i=1;i<6;i++){ctrlCtx.beginPath();ctrlCtx.moveTo(0,hCtrl*i/6);ctrlCtx.lineTo(w,hCtrl*i/6);ctrlCtx.stroke();}for(let i=1;i<8;i++){ctrlCtx.beginPath();ctrlCtx.moveTo(w*i/8,0);ctrlCtx.lineTo(w*i/8,hCtrl);ctrlCtx.stroke();}if(historyRef.current.length<2)return;const t_start=historyRef.current[0].t;const t_end=historyRef.current[historyRef.current.length-1].t;const t_span=Math.max(6.0,t_end-t_start);const plotLine=(ctx,h,dataKey,color,offset,scale,isDash=false)=>{ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.shadowColor=color;ctx.shadowBlur=4;if(isDash)ctx.setLineDash([5,5]);else ctx.setLineDash([]);historyRef.current.forEach((pt,i)=>{const x=((pt.t-t_start)/t_span)*w;const y=(h/2)-(pt[dataKey]-offset)*scale;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});ctx.stroke();ctx.setLineDash([]);ctx.shadowBlur=0;};const POS_OFFSET=5;const POS_SCALE=10;plotLine(posCtx,hPos,'x','#06B6D4',POS_OFFSET,POS_SCALE);plotLine(posCtx,hPos,'target','#10B981',POS_OFFSET,POS_SCALE);if(['MRAC','L1','Flatness','InputShaping'].includes(loopStateRef.current.method)){plotLine(posCtx,hPos,'ref','#8B5CF6',POS_OFFSET,POS_SCALE,true);}if(loopStateRef.current.method==='PPC'){posCtx.beginPath();posCtx.strokeStyle='#C084FC';posCtx.lineWidth=1;posCtx.setLineDash([4,4]);historyRef.current.forEach((pt,i)=>{const x=((pt.t-t_start)/t_span)*w;const y_up=(hPos/2)-(pt.target+pt.ref-POS_OFFSET)*POS_SCALE;if(i===0)posCtx.moveTo(x,y_up);else posCtx.lineTo(x,y_up);});posCtx.stroke();posCtx.beginPath();historyRef.current.forEach((pt,i)=>{const x=((pt.t-t_start)/t_span)*w;const y_dn=(hPos/2)-(pt.target-pt.ref-POS_OFFSET)*POS_SCALE;if(i===0)posCtx.moveTo(x,y_dn);else posCtx.lineTo(x,y_dn);});posCtx.stroke();posCtx.setLineDash([]);}const CTRL_OFFSET=0;const CTRL_SCALE=0.35;plotLine(ctrlCtx,hCtrl,'u','#EF4444',CTRL_OFFSET,CTRL_SCALE);if(chartStateRef.current.frozen){posCtx.fillStyle='#64748B';posCtx.font='12px "Inter",sans-serif';posCtx.fillText("✓ 波形已全景定格",w-110,20);ctrlCtx.fillStyle='#64748B';ctrlCtx.font='12px "Inter",sans-serif';ctrlCtx.fillText("✓ 波形已全景定格",w-110,20);}};
