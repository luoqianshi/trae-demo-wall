<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纸条宇宙 · 万人共创小说接龙</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "PingFang SC", "Microsoft YaHei", "KaiTi", serif;
    background:
      radial-gradient(circle at 20% 20%, #f4ecd8 0%, #e8dcc0 40%, #d4c4a0 100%);
    min-height: 100vh;
    color: #3a2f24;
    overflow-x: hidden;
  }

  /* 顶部 */
  header {
    text-align: center;
    padding: 30px 20px 20px;
    border-bottom: 2px dashed #8b7355;
  }
  header h1 {
    font-size: 2.5em;
    color: #5a3e1b;
    letter-spacing: 6px;
    text-shadow: 2px 2px 0 rgba(139, 115, 85, 0.2);
  }
  header .subtitle {
    color: #8b7355;
    margin-top: 8px;
    font-size: 1em;
    letter-spacing: 2px;
  }
  header .stats {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 18px;
    color: #6b4f2b;
    font-size: 0.95em;
  }
  header .stats span strong {
    color: #a67c3f;
    font-size: 1.3em;
  }

  /* 工具栏 */
  .toolbar {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 14px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 22px;
    border: 2px solid #8b7355;
    background: #fff8e8;
    color: #5a3e1b;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.95em;
    transition: all 0.2s;
    letter-spacing: 2px;
  }
  .btn:hover {
    background: #8b7355;
    color: #fff8e8;
    transform: translateY(-1px);
  }
  .btn.primary {
    background: #a67c3f;
    border-color: #8b5a2b;
    color: #fff8e8;
  }
  .btn.primary:hover { background: #8b5a2b; }
  .btn.danger {
    background: #c44;
    border-color: #a22;
    color: #fff;
  }
  .btn.danger:hover { background: #a22; }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* 主内容 */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1.3fr;
    gap: 24px;
  }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
  }

  /* 卡片通用 */
  .card {
    background: linear-gradient(180deg, #fffdf5 0%, #f4ecd8 100%);
    border: 2px solid #c9b79c;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 4px 16px rgba(139, 115, 85, 0.15);
  }
  .card h2 {
    color: #5a3e1b;
    border-bottom: 1px dashed #8b7355;
    padding-bottom: 10px;
    margin-bottom: 16px;
    font-size: 1.3em;
    letter-spacing: 3px;
  }

  /* 左侧：故事阅读区 */
  .story-panel { min-height: 500px; }
  .story-header {
    background: #fff8e8;
    border: 1px dashed #8b7355;
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .story-header .chapter-tag {
    display: inline-block;
    background: #a67c3f;
    color: #fff8e8;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 0.85em;
    letter-spacing: 2px;
  }
  .story-header .chapter-title {
    font-size: 1.4em;
    color: #5a3e1b;
    margin-top: 8px;
    font-weight: bold;
  }
  .story-content {
    line-height: 2;
    font-size: 1.05em;
    padding: 10px 0;
    white-space: pre-wrap;
    color: #3a2f24;
  }
  .story-meta {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px dashed #c9b79c;
    color: #8b7355;
    font-size: 0.9em;
    font-style: italic;
  }
  .nav-buttons {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* 右侧：分支列表 */
  .branches-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .branch-item {
    background: #fff8e8;
    border: 2px solid #c9b79c;
    border-radius: 8px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .branch-item:hover {
    border-color: #8b5a2b;
    transform: translateX(3px);
  }
  .branch-item.winner {
    background: linear-gradient(90deg, #fff4c4 0%, #fff8e8 100%);
    border-color: #d4a017;
  }
  .branch-item.current {
    border-color: #5a8f3e;
    background: linear-gradient(90deg, #e8f0d8 0%, #fff8e8 100%);
  }
  .branch-item.locked {
    opacity: 0.6;
    cursor: default;
  }
  .branch-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .branch-author {
    font-weight: bold;
    color: #5a3e1b;
  }
  .branch-votes {
    color: #a67c3f;
    font-weight: bold;
  }
  .branch-preview {
    color: #6b4f2b;
    font-size: 0.95em;
    line-height: 1.8;
    margin-bottom: 10px;
  }
  .branch-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85em;
    color: #8b7355;
  }

  /* SVG 树 */
  .tree-panel { grid-column: 1 / -1; }
  .tree-svg-wrap {
    background: #fffdf5;
    border: 1px dashed #8b7355;
    border-radius: 8px;
    overflow: hidden;
  }
  svg.tree-svg {
    width: 100%;
    display: block;
  }
  .tree-node circle {
    cursor: pointer;
    transition: all 0.2s;
  }
  .tree-node:hover circle {
    transform-origin: center;
  }
  .tree-node text {
    font-family: inherit;
    pointer-events: none;
    user-select: none;
  }
  .tree-node.current circle {
    stroke-width: 3;
  }

  /* 续写模态框 */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(58, 47, 36, 0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-backdrop.active { display: flex; }
  .modal {
    background: linear-gradient(180deg, #fffdf5 0%, #f4ecd8 100%);
    border: 3px solid #8b7355;
    border-radius: 12px;
    padding: 28px;
    max-width: 620px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .modal h2 {
    color: #5a3e1b;
    margin-bottom: 16px;
    letter-spacing: 3px;
  }
  .modal .field {
    margin-bottom: 14px;
  }
  .modal label {
    display: block;
    color: #6b4f2b;
    margin-bottom: 6px;
    font-weight: bold;
  }
  .modal input,
  .modal textarea {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid #c9b79c;
    border-radius: 6px;
    font-family: inherit;
    font-size: 1em;
    background: #fff8e8;
    color: #3a2f24;
  }
  .modal textarea {
    min-height: 180px;
    resize: vertical;
    line-height: 1.8;
  }
  .modal input:focus, .modal textarea:focus {
    outline: none;
    border-color: #8b5a2b;
  }
  .char-count {
    text-align: right;
    color: #8b7355;
    font-size: 0.9em;
    margin-top: 6px;
  }
  .char-count.over { color: #c44; }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 18px;
  }

  /* 空状态 */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #8b7355;
    font-style: italic;
  }

  /* 投票徽章 */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.8em;
    margin-left: 6px;
  }
  .badge.main { background: #d4a017; color: #5a3e1b; }
  .badge.written { background: #5a8f3e; color: #fff; }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: #f4ecd8; }
  ::-webkit-scrollbar-thumb { background: #c9b79c; border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #8b7355; }
</style>
</head>
<body>

<header>
  <h1>纸 条 宇 宙</h1>
  <div class="subtitle">—— 一场由陌生人共同完成的、没有剧本的社会叙事实验 ——</div>
  <div class="stats">
    <span>总章节 <strong id="stat-chapters">0</strong></span>
    <span>总分支 <strong id="stat-branches">0</strong></span>
    <span>参与人数 <strong id="stat-users">0</strong></span>
  </div>
</header>

<div class="toolbar">
  <button class="btn primary" id="btn-continue">✍ 续写当前节点</button>
  <button class="btn" id="btn-rewind">⟲ 回到原点</button>
  <button class="btn" id="btn-save">💾 保存故事</button>
  <button class="btn" id="btn-load">📂 载入故事</button>
  <button class="btn" id="btn-reset" style="display:none">🔄 重新开始</button>
</div>

<main>

  <!-- 左侧：当前节点内容 -->
  <section class="card story-panel">
    <h2 id="panel-title">📖 当前章节</h2>
    <div id="story-display"></div>
  </section>

  <!-- 右侧：分支列表 -->
  <section class="card">
    <h2 id="branches-title">🌿 分支（<span id="branch-count">0</span>/10）</h2>
    <div id="branches-list"></div>
  </section>

  <!-- 底部：故事树可视化 -->
  <section class="card tree-panel">
    <h2>🌀 故事演化树</h2>
    <div class="tree-svg-wrap">
      <svg class="tree-svg" id="tree-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div style="margin-top:10px;color:#8b7355;font-size:0.9em;text-align:center;">
      点击节点可跳转浏览 · 绿色=当前主线 · 黄色=获胜分支 · 灰色=被归档的平行宇宙
    </div>
  </section>

</main>

<!-- 续写模态框 -->
<div class="modal-backdrop" id="modal-continue">
  <div class="modal">
    <h2>✍ 续写故事</h2>
    <div class="modalfield">
      <label>你的笔名（将被永久铭刻）</label>
      <input type="text" id="author-name" placeholder="匿名旅人" maxlength="20">
    </div>
    <div class="modalfield">
      <label>本章小标题（可选）</label>
      <input type="text" id="chapter-title" placeholder="如：第N个路口" maxlength="30">
    </div>
    <div class="modalfield">
      <label>续写内容（最多 500 字，写完即走）</label>
      <textarea id="continue-content" placeholder="用最精炼的文字，把故事带向未知的方向……"></textarea>
      <div class="char-count"><span id="char-count">0</span> / 500</div>
    </div>
    <div class="modal-actions">
      <button class="btn" id="btn-cancel-continue">取消</button>
      <button class="btn primary" id="btn-submit-continue">提交 · 铭刻于时间之流</button>
    </div>
  </div>
</div>

<!-- 初始故事设置 -->
<div class="modal-backdrop" id="modal-init">
  <div class="modal">
    <h2>📜 创世之始</h2>
    <p style="color:#6b4f2b;margin-bottom:18px;line-height:1.8;">
      你是这个故事的「开创者」。请写下第一章，让故事从这里开始生长。<br>
      此后每一个节点都将由不同的陌生人续写——你永远不知道下一个人会把故事带向何方。
    </p>
    <div class="modalfield">
      <label>你的笔名</label>
      <input type="text" id="init-author" placeholder="创始者" maxlength="20">
    </div>
    <div class="modalfield">
      <label>故事标题</label>
      <input type="text" id="init-story-title" placeholder="如：未命名的宇宙" maxlength="30">
    </div>
    <div class="modalfield">
      <label>第一章内容（最多 500 字）</label>
      <textarea id="init-content" placeholder="写下第一段……"></textarea>
      <div class="char-count"><span id="init-char-count">0</span> / 500</div>
    </div>
    <div class="modal-actions">
      <button class="btn primary" id="btn-submit-init">开启 · 第一个节点</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   纸条宇宙 · 数据结构与核心逻辑
   每个节点：{ id, parentId, depth, author, title, content,
                children:[], votes:{branchId: count},
                winnerBranchId, timestamp, locked }
   ============================================================ */

const STORAGE_KEY = 'zhitiao-universe-v1';
const MAX_BRANCHES = 10;
const MAX_CHARS = 500;

let state = {
  story: null,        // { title, rootId, nodes: Map(id -> node) }
  currentNodeId: null, // 当前浏览/续写所在节点
  userId: null,      // 当前用户ID（用于防重复投票）
  votedBranches: {}, // {branchNodeId: true}
};

/* ---------- 工具函数 ---------- */
function uid() { return 'n_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function now() { return new Date().toLocaleString('zh-CN'); }
function escapeHtml(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function saveState() {
  const raw = {
    storyTitle: state.story ? state.story.title : null,
    rootId: state.story ? state.story.rootId : null,
    nodes: state.story ? Object.fromEntries(state.story.nodes) : null,
    currentNodeId: state.currentNodeId,
    userId: state.userId,
    votedBranches: state.votedBranches,
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(raw)); } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.nodes) return false;
    state.story = {
      title: data.storyTitle || '未命名宇宙',
      rootId: data.rootId,
      nodes: new Map(Object.entries(data.nodes))
    };
    state.currentNodeId = data.currentNodeId || data.rootId;
    state.userId = data.userId || uid();
    state.votedBranches = data.votedBranches || {};
    return true;
  } catch(e) { return false; }
}

/* ---------- 故事操作 ---------- */
function createStory(author, title, content) {
  const rootId = uid();
  const rootNode = {
    id: rootId,
    parentId: null,
    depth: 0,
    author: author || '创始者',
    title: title || '第一章',
    content,
    children: [],
    votes: {},
    winnerBranchId: null,
    timestamp: now(),
    locked: false,
  };
  state.story = {
    title: title || '未命名宇宙',
    rootId,
    nodes: new Map([[rootId, rootNode]])
  };
  state.currentNodeId = rootId;
}

function addBranch(parentId, author, title, content) {
  const parent = state.story.nodes.get(parentId);
  if (!parent) return null;
  if (parent.children.length >= MAX_BRANCHES) return null;

  const newId = uid();
  const newNode = {
    id: newId,
    parentId,
    depth: parent.depth + 1,
    author: author || '匿名旅人',
    title: title || ('第 ' + (parent.depth + 2) + ' 章'),
    content,
    children: [],
    votes: {},
    winnerBranchId: null,
    timestamp: now(),
    locked: false,
  };
  parent.children.push(newId);
  state.story.nodes.set(newId, newNode);
  state.currentNodeId = newId;
  return newNode;
}

function vote(branchNodeId) {
  if (state.votedBranches[branchNodeId]) return;
  const branch = state.story.nodes.get(branchNodeId);
  if (!branch) return;
  const parent = state.story.nodes.get(branch.parentId);
  if (!parent) return;
  parent.votes[branchNodeId] = (parent.votes[branchNodeId] || 0) + 1;
  state.votedBranches[branchNodeId] = true;
  // 判定胜者（票数最多者成为主线，若平手按时间先者）
  let maxVotes = -1;
  let winner = null;
  for (const cid of parent.children) {
    const v = parent.votes[cid] || 0;
    if (v > maxVotes) { maxVotes = v; winner = cid; }
  }
  parent.winnerBranchId = winner;
}

function getChildren(nodeId) {
  const n = state.story.nodes.get(nodeId);
  return n ? n.children.map(id => state.story.nodes.get(id)) : [];
}

function getStats() {
  if (!state.story) return { chapters: 0, branches: 0, users: new Set() };
  const users = new Set();
  let chapters = 0;
  let branches = 0;
  for (const n of state.story.nodes.values()) {
    users.add(n.author);
    if (n.parentId) branches++; else chapters++;
    // 深度视为 章节
    if (n.depth >= chapters) chapters = n.depth + 1;
  }
  return { chapters, branches, users };
}

/* ---------- 渲染 ---------- */
function render() {
  if (!state.story) {
    renderInitState();
    return;
  }
  const stats = getStats();
  document.getElementById('stat-chapters').textContent = stats.chapters;
  document.getElementById('stat-branches').textContent = stats.branches;
  document.getElementById('stat-users').textContent = stats.users.size;

  renderStoryDisplay();
  renderBranches();
  renderTree();

  document.getElementById('btn-reset').style.display = 'inline-block';
}

function renderInitState() {
  const storyDisplay = document.getElementById('story-display');
  storyDisplay.innerHTML = `
    <div class="empty-state">
      <p style="font-size:1.3em;margin-bottom:12px;">🪶 还没有故事在这里生长……</p>
      <p>你可以成为这个宇宙的第一位书写者。</p>
      <p style="margin-top:20px;">
        <button class="btn primary" id="btn-start-new">✒ 写下第一章</button>
      </p>
    </div>`;
  document.getElementById('branches-list').innerHTML =
    '<div class="empty-state">等待第一位书写者的出现……</div>';
  document.getElementById('branch-count').textContent = '0';
  document.getElementById('tree-svg').innerHTML = '';
  document.getElementById('btn-reset').style.display = 'none';
  document.getElementById('btn-start-new').onclick = () => showModal('modal-init');
}

function renderStoryDisplay() {
  const node = state.story.nodes.get(state.currentNodeId);
  if (!node) return;
  const storyDisplay = document.getElementById('story-display');
  const isRoot = !node.parentId;
  storyDisplay.innerHTML = `
    <div class="story-header">
      <span class="chapter-tag">第 ${node.depth + 1} 章</span>
      <div class="chapter-title">${escapeHtml(node.title || '未命名章节')}</div>
    </div>
    <div class="story-content">${escapeHtml(node.content)}</div>
    <div class="story-meta">
      ✒ 作者：${escapeHtml(node.author)} &nbsp;·&nbsp;
      🕐 ${node.timestamp} &nbsp;·&nbsp;
      📍 节点ID：${node.id.slice(-6)}
    </div>
    <div class="nav-buttons">
      ${node.parentId ? '<button class="btn" id="btn-goto-parent">⬆ 返回上一节点</button>' : ''}
      <button class="btn primary" id="btn-goto-main">🌀 跳至当前主线</button>
    </div>
  `;
  if (node.parentId) {
    document.getElementById('btn-goto-parent').onclick = () => {
      state.currentNodeId = node.parentId;
      saveState(); render();
    };
  }
  document.getElementById('btn-goto-main').onclick = () => {
    // 从根出发，沿胜者走到最末端
    let cur = state.story.rootId;
    while (true) {
      const n = state.story.nodes.get(cur);
      if (n.winnerBranchId && state.story.nodes.get(n.winnerBranchId)) {
        cur = n.winnerBranchId;
      } else break;
    }
    state.currentNodeId = cur;
    saveState(); render();
  };
}

function renderBranches() {
  const node = state.story.nodes.get(state.currentNodeId);
  if (!node) return;
  document.getElementById('branch-count').textContent = node.children.length;
  const list = document.getElementById('branches-list');
  const children = getChildren(node.id);
  if (children.length === 0) {
    list.innerHTML = '<div class="empty-state">📭 还没有分支——成为第一个续写者吧！</div>';
    return;
  }
  // 按票数从多到少
  children.sort((a, b) => (node.votes[b.id] || 0) - (node.votes[a.id] || 0));
  list.innerHTML = children.map(child => {
    const votes = node.votes[child.id] || 0;
    const isWinner = node.winnerBranchId === child.id;
    const isCurrent = child.id === state.currentNodeId;
    const voted = state.votedBranches[child.id];
    return `
      <div class="branch-item ${isWinner ? 'winner' : ''} ${isCurrent ? 'current' : ''}" data-id="${child.id}">
        <div class="branch-header">
          <span class="branch-author">✒ ${escapeHtml(child.author)}
            ${isWinner ? '<span class="badge main">主线</span>' : ''}
          </span>
          <span class="branch-votes">🗳 ${votes} 票</span>
        </div>
        <div class="branch-preview">${escapeHtml((child.content || '').slice(0, 120))}${child.content.length > 120 ? '……' : ''}</div>
        <div class="branch-footer">
          <span>${child.timestamp} · 第 ${child.depth + 1} 章 · ${escapeHtml(child.title || '')}</span>
          <span>
            <button class="btn" style="padding:4px 10px;font-size:0.85em;" data-view="${child.id}">查看</button>
            <button class="btn primary" style="padding:4px 10px;font-size:0.85em;" data-vote="${child.id}" ${voted ? 'disabled' : ''}>${voted ? '已投' : '投票'}</button>
          </span>
        </div>
      </div>`;
  }).join('');

  // 事件绑定
  list.querySelectorAll('[data-view]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      state.currentNodeId = el.getAttribute('data-view');
      saveState(); render();
    };
  });
  list.querySelectorAll('[data-vote]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      vote(el.getAttribute('data-vote'));
      saveState(); render();
    };
  });
}

/* ---------- SVG 树 ---------- */
function renderTree() {
  const svg = document.getElementById('tree-svg');
  svg.innerHTML = '';
  if (!state.story) return;
  // 布局：按层排列，每层节点横向展开
  const layers = [];
  const posMap = {};
  const visit = (id, depth) => {
    if (!layers[depth]) layers[depth] = [];
    layers[depth].push(id);
    const n = state.story.nodes.get(id);
    (n.children || []).forEach(c => visit(c, depth + 1));
  };
  visit(state.story.rootId, 0);

  const nodeRadius = 16;
  const layerGapX = 140;
  const nodeGapY = 60;
  const padTop = 40;
  const padLeft = 40;

  // 计算每层最大节点的 Y 位置
  function assignY() {
    // 后序：子节点的平均Y为父节点Y
    function compute(id) {
      const n = state.story.nodes.get(id);
      if (!n.children || n.children.length === 0) {
        return 0; // 叶子，由父决定
      }
      // 非叶子：先算子节点
      const childYs = n.children.map(c => compute(c));
      const mid = (childYs[0] + childYs[childYs.length - 1]) / 2;
      posMap[id].y = mid;
      return mid;
    }
    // 第一遍：给叶子赋值
    const leafIds = [];
    for (const n of state.story.nodes.values()) {
      if (!n.children || n.children.length === 0) leafIds.push(n.id);
    }
    // 找到每一层，并按从顶到底排列
    // 简化：先 DFS 分配
    let yCursor = 0;
    function dfsAssign(id) {
      const n = state.story.nodes.get(id);
      posMap[id] = { x: 0, y: 0 };
      if (!n.children || n.children.length === 0) {
        posMap[id].y = yCursor;
        yCursor += nodeGapY;
        return posMap[id].y;
      }
      const childYs = n.children.map(c => dfsAssign(c));
      posMap[id].y = (childYs[0] + childYs[childYs.length - 1]) / 2;
      return posMap[id].y;
    }
    dfsAssign(state.story.rootId);
  }
  assignY();

  // 分配 x
  for (const id in posMap) {
    const n = state.story.nodes.get(id);
    posMap[id].x = padLeft + n.depth * layerGapX;
  }

  // 计算范围
  let maxX = 0, maxY = 0;
  for (const id in posMap) {
    maxX = Math.max(maxX, posMap[id].x);
    maxY = Math.max(maxY, posMap[id].y);
  }
  const width = maxX + padLeft * 2 + nodeRadius * 2;
  const height = maxY + padTop * 2 + nodeRadius * 2;
  svg.setAttribute('width', width);
  svg.setAttribute('height', height);
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);

  // 画线
  for (const n of state.story.nodes.values()) {
    if (!n.parentId) continue;
    const p = posMap[n.parentId];
    const c = posMap[n.id];
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', p.x + nodeRadius);
    line.setAttribute('y1', p.y + padTop);
    line.setAttribute('x2', c.x - nodeRadius);
    line.setAttribute('y2', c.y + padTop);
    const isMain = state.story.nodes.get(n.parentId).winnerBranchId === n.id;
    line.setAttribute('stroke', isMain ? '#d4a017' : '#c9b79c');
    line.setAttribute('stroke-width', isMain ? 3 : 2);
    line.setAttribute('stroke-dasharray', isMain ? '' : '4,3');
    svg.appendChild(line);
  }
  // 画节点
  for (const [id, pos] of Object.entries(posMap)) {
    const n = state.story.nodes.get(id);
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'tree-node');
    const cx = pos.x;
    const cy = pos.y + padTop;
    const isCurrent = id === state.currentNodeId;
    const isMainLine = (() => {
      let cur = state.story.rootId;
      while (cur) {
        if (cur === id) return true;
        const nn = state.story.nodes.get(cur);
        cur = nn.winnerBranchId;
      }
      return false;
    })();
    let fill = '#fff8e8', stroke = '#8b7355';
    if (isCurrent) { fill = '#5a8f3e'; stroke = '#3a6f1e'; }
    else if (isMainLine) { fill = '#d4a017'; stroke = '#8b6f17'; }
    else if (n.parentId && state.story.nodes.get(n.parentId).winnerBranchId === id) { fill = '#f0c040'; stroke = '#8b6f17'; }

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('r', nodeRadius);
    circle.setAttribute('fill', fill);
    circle.setAttribute('stroke', stroke);
    circle.setAttribute('stroke-width', isCurrent ? 3 : 2);
    g.appendChild(circle);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', cx);
    text.setAttribute('y', cy + 4);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', isCurrent || isMainLine ? '#fff8e8' : '#5a3e1b');
    text.setAttribute('font-size', '13');
    text.setAttribute('font-weight', 'bold');
    text.textContent = (n.depth + 1);
    g.appendChild(text);

    // tooltip label
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', cx);
    label.setAttribute('y', cy + nodeRadius + 16);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('fill', '#6b4f2b');
    label.setAttribute('font-size', '11');
    label.textContent = (n.author || '').slice(0, 8);
    g.appendChild(label);

    g.onclick = () => {
      state.currentNodeId = id;
      saveState(); render();
    };
    svg.appendChild(g);
  }
}

/* ---------- 模态框 ---------- */
function showModal(id) { document.getElementById(id).classList.add('active'); }
function hideModal(id) { document.getElementById(id).classList.remove('active'); }

/* ---------- 字符计数 ---------- */
function bindCharCount(textareaId, counterId) {
  const ta = document.getElementById(textareaId);
  const co = document.getElementById(counterId);
  ta.addEventListener('input', () => {
    const len = ta.value.length;
    co.textContent = len;
    co.classList.toggle('over', len > MAX_CHARS);
  });
}
bindCharCount('continue-content', 'char-count');
bindCharCount('init-content', 'init-char-count');

/* ---------- 按钮事件 ---------- */
document.getElementById('btn-continue').onclick = () => {
  if (!state.story) { showModal('modal-init'); return; }
  const node = state.story.nodes.get(state.currentNodeId);
  if (node.children.length >= MAX_BRANCHES) {
    alert('本节点分支名额已满（10/10）。你可以在其他节点续写。');
    return;
  }
  showModal('modal-continue');
};

document.getElementById('btn-rewind').onclick = () => {
  if (!state.story) return;
  state.currentNodeId = state.story.rootId;
  saveState(); render();
};

document.getElementById('btn-cancel-continue').onclick = () => hideModal('modal-continue');

document.getElementById('btn-submit-continue').onclick = () => {
  const author = document.getElementById('author-name').value.trim() || '匿名旅人';
  const title = document.getElementById('chapter-title').value.trim();
  const content = document.getElementById('continue-content').value.trim();
  if (!content) { alert('请写下你的续写内容！'); return; }
  if (content.length > MAX_CHARS) { alert('续写内容超过 500 字'); return; }
  addBranch(state.currentNodeId, author, title, content);
  document.getElementById('author-name').value = '';
  document.getElementById('chapter-title').value = '';
  document.getElementById('continue-content').value = '';
  hideModal('modal-continue');
  saveState(); render();
};

document.getElementById('btn-submit-init').onclick = () => {
  const author = document.getElementById('init-author').value.trim() || '创始者';
  const title = document.getElementById('init-story-title').value.trim() || '未命名宇宙';
  const content = document.getElementById('init-content').value.trim();
  if (!content) { alert('请写下第一章内容！'); return; }
  if (content.length > MAX_CHARS) { alert('超过 500 字'); return; }
  createStory(author, title, content);
  state.userId = uid();
  hideModal('modal-init');
  saveState(); render();
};

document.getElementById('btn-save').onclick = () => {
  saveState();
  alert('故事已保存至本地时间胶囊 ✨\n下次打开会自动载入。');
};

document.getElementById('btn-load').onclick = () => {
  if (loadState()) { render(); alert('已从时间胶囊载入 ✨'); }
  else alert('时间胶囊为空，尚未保存的故事。');
};

document.getElementById('btn-reset').onclick = () => {
  if (!confirm('确定要抹去这个宇宙，从头开始吗？\n（所有已保存的分支都会被遗忘）')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = { story: null, currentNodeId: null, userId: null, votedBranches: {} };
  render();
};

/* ---------- 启动 ---------- */
if (!loadState()) {
  state.userId = uid();
}
render();
</script>
