<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>习惯星球 · Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(circle at 20% 10%,#2a1a5e,#140a33 70%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
button{font-family:inherit;}

/* ===== 手机外框 ===== */
.phone{width:420px;max-width:100%;height:840px;max-height:92vh;background:#f5f3ff;border-radius:44px;border:11px solid #15102e;box-shadow:0 24px 70px rgba(0,0,0,.55),inset 0 0 0 2px #3a2d6b;position:relative;overflow:hidden;}
.phone::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:130px;height:24px;background:#15102e;border-radius:0 0 16px 16px;z-index:120;}
.screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;position:relative;-webkit-overflow-scrolling:touch;}
.screen::-webkit-scrollbar{display:none;}

/* ===== 页面容器 ===== */
.page{display:none;min-height:100%;padding:44px 16px 86px;}
.page.active{display:block;animation:fade .35s ease;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ===== 顶部渐变条 ===== */
.topbar{background:linear-gradient(135deg,#7C5CFF,#9b7aff);border-radius:0 0 24px 24px;padding:30px 20px 22px;color:#fff;margin:-44px -16px 18px;position:relative;overflow:hidden;}
.topbar::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.12);}
.user-row{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2;}
.user-info .hi{font-size:13px;opacity:.9;}
.user-info .name{font-size:22px;font-weight:800;letter-spacing:.5px;}
.pts-badge{background:rgba(255,255,255,.25);padding:8px 14px;border-radius:20px;font-weight:700;font-size:15px;backdrop-filter:blur(4px);}

/* ===== 登录页 ===== */
.login-page{background:linear-gradient(160deg,#7C5CFF 0%,#a67bff 45%,#FF8A3D 100%);min-height:100%;padding:0 26px 40px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.login-page::before,.login-page::after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.1);}
.login-page::before{width:220px;height:220px;top:-60px;right:-80px;}
.login-page::after{width:160px;height:160px;bottom:-50px;left:-60px;}
.logo-emoji{font-size:64px;margin-bottom:6px;animation:bob 3s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-10px) rotate(4deg);}}
.logo-title{font-size:44px;font-weight:900;color:#fff;text-shadow:0 6px 18px rgba(0,0,0,.25);letter-spacing:2px;}
.logo-sub{color:rgba(255,255,255,.92);font-size:15px;margin:10px 0 38px;text-align:center;}
.role-cards{display:flex;gap:18px;margin-bottom:34px;}
.role-card{width:132px;height:168px;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.35);border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.25s;backdrop-filter:blur(6px);}
.role-card.selected{background:rgba(255,255,255,.38);border-color:#fff;transform:translateY(-8px);box-shadow:0 14px 34px rgba(0,0,0,.28);}
.role-emoji{font-size:58px;}
.role-name{color:#fff;font-size:17px;font-weight:700;margin-top:8px;}
.start-btn{background:#fff;color:#7C5CFF;border:none;padding:15px 50px;border-radius:30px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 10px 28px rgba(0,0,0,.25);transition:.2s;}
.start-btn:active{transform:scale(.95);}

/* ===== 星球可视化 ===== */
.planet-wrap{display:flex;flex-direction:column;align-items:center;margin:6px 0 4px;position:relative;}
.planet-orbit{position:absolute;width:170px;height:170px;border:2px dashed rgba(124,92,255,.25);border-radius:50%;animation:spin 18s linear infinite;top:-8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.planet{width:140px;height:140px;border-radius:50%;position:relative;transition:background .8s,box-shadow .8s;animation:spin 26s linear infinite;display:flex;align-items:center;justify-content:center;}
.planet-emoji{font-size:54px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.25));}
.stage-label{margin-top:14px;background:#fff;color:#7C5CFF;padding:5px 16px;border-radius:14px;font-size:13px;font-weight:700;box-shadow:0 4px 14px rgba(124,92,255,.18);}
.streak{margin-top:12px;display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#FF8A3D,#ff6b3d);color:#fff;padding:8px 18px;border-radius:20px;font-weight:700;font-size:14px;box-shadow:0 6px 18px rgba(255,138,61,.42);}
.streak .fire{animation:flame .6s ease-in-out infinite alternate;}
@keyframes flame{from{transform:scale(1) rotate(-3deg);}to{transform:scale(1.18) rotate(3deg);}}

/* ===== 通用 ===== */
.sec-title{font-size:17px;font-weight:800;color:#333;margin:20px 4px 12px;display:flex;align-items:center;gap:6px;}
.card{background:#fff;border-radius:16px;padding:15px 16px;margin-bottom:12px;box-shadow:0 4px 16px rgba(124,92,255,.09);}
.entry-link{cursor:pointer;transition:.2s;}
.entry-link:active{transform:scale(.98);}

/* ===== 任务卡片 ===== */
.task-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:12px;box-shadow:0 4px 16px rgba(124,92,255,.09);transition:.3s;border-left:4px solid transparent;}
.task-card.done{background:linear-gradient(135deg,#e9fcef,#d3f5dc);border-left-color:#34c759;}
.task-card.tried{background:linear-gradient(135deg,#fff7e6,#ffeec4);border-left-color:#ffb340;}
.task-card.skip{opacity:.55;border-left-color:#cfcfcf;}
.task-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;}
.task-name{font-size:16px;font-weight:700;color:#333;}
.task-pts{background:linear-gradient(135deg,#7C5CFF,#FF8A3D);color:#fff;padding:3px 11px;border-radius:12px;font-size:12px;font-weight:700;}
.task-btns{display:flex;gap:8px;}
.tbtn{flex:1;border:none;padding:9px 0;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;color:#fff;}
.tbtn:active{transform:scale(.94);}
.tbtn.ok{background:#34c759;}
.tbtn.try{background:#ffb340;}
.tbtn.no{background:#d4d4d4;color:#888;}
.tbtn.active{box-shadow:0 0 0 3px rgba(255,255,255,.7) inset;filter:saturate(1.2);}

/* ===== Tab 栏 ===== */
.tabbar{position:absolute;bottom:0;left:0;right:0;height:66px;background:#fff;border-top:1px solid #eee;display:none;box-shadow:0 -4px 22px rgba(0,0,0,.07);z-index:90;}
.tabbar.show{display:flex;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#aaa;font-size:11px;cursor:pointer;transition:.2s;}
.tab .ic{font-size:22px;transition:.2s;}
.tab.active{color:#7C5CFF;}
.tab.active .ic{transform:translateY(-2px) scale(1.12);}

/* ===== 飞舞积分 / 爆星 ===== */
.float-pts{position:fixed;font-size:24px;font-weight:900;color:#34c759;pointer-events:none;z-index:300;text-shadow:0 2px 6px rgba(0,0,0,.2);animation:floatUp 1s ease-out forwards;}
@keyframes floatUp{0%{opacity:1;transform:translate(-50%,0) scale(1);}100%{opacity:0;transform:translate(-50%,-70px) scale(1.5);}}
.burst{position:fixed;pointer-events:none;z-index:300;}
.burst span{position:absolute;font-size:18px;animation:burst .75s ease-out forwards;}
@keyframes burst{0%{opacity:1;transform:translate(-50%,-50%) scale(0);}100%{opacity:0;transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scale(1.3);}}

/* ===== 难度标签 ===== */
.diff-tag{font-size:11px;padding:2px 9px;border-radius:8px;font-weight:700;}
.diff-base{background:#e8f0ff;color:#3b82f6;}
.diff-adv{background:#fff3e0;color:#ff8a3d;}
.diff-chal{background:#ffe0e0;color:#ef4444;}

/* ===== 奖励 ===== */
.reward-card{display:flex;align-items:center;justify-content:space-between;}
.reward-info{display:flex;align-items:center;gap:12px;}
.reward-emoji{font-size:36px;}
.reward-name{font-weight:700;font-size:15px;color:#333;}
.reward-cost{font-size:12px;color:#888;margin-top:2px;}
.redeem-btn{background:linear-gradient(135deg,#7C5CFF,#FF8A3D);color:#fff;border:none;padding:9px 16px;border-radius:12px;font-weight:700;cursor:pointer;font-size:13px;transition:.15s;}
.redeem-btn:active{transform:scale(.94);}
.redeem-btn:disabled{background:#e2e2e2;color:#aaa;cursor:not-allowed;}
.pts-line{font-size:13px;color:#888;margin:4px 4px 14px;}

/* ===== 成就 ===== */
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.ach-item{background:#fff;border-radius:16px;padding:16px 8px 12px;text-align:center;box-shadow:0 4px 16px rgba(124,92,255,.09);transition:.2s;}
.ach-item.unlocked{background:linear-gradient(160deg,#fff,#f3eeff);}
.ach-item.locked{filter:grayscale(1);opacity:.45;}
.ach-ic{font-size:40px;}
.ach-name{font-size:12px;font-weight:700;color:#555;margin-top:6px;}
.ach-st{font-size:10px;margin-top:4px;font-weight:600;}

/* ===== 心情 ===== */
.mood-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.mood-item{background:#fff;border-radius:16px;padding:16px 8px;text-align:center;cursor:pointer;box-shadow:0 4px 16px rgba(124,92,255,.09);transition:.2s;border:2px solid transparent;}
.mood-item.selected{border-color:#7C5CFF;background:#f3eeff;transform:scale(1.05);}
.mood-ic{font-size:38px;}
.mood-name{font-size:13px;margin-top:6px;color:#555;font-weight:600;}
.mood-input{width:100%;border:2px solid #eee;border-radius:12px;padding:12px 14px;font-size:14px;margin-bottom:12px;outline:none;transition:.2s;font-family:inherit;}
.mood-input:focus{border-color:#7C5CFF;background:#faf8ff;}
.save-btn{width:100%;background:linear-gradient(135deg,#7C5CFF,#FF8A3D);color:#fff;border:none;padding:14px;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;transition:.15s;}
.save-btn:active{transform:scale(.97);}
.back-link{display:inline-flex;align-items:center;gap:4px;color:#7C5CFF;font-size:14px;margin-bottom:14px;cursor:pointer;font-weight:700;}
.mood-entry{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.05);}
.mood-entry .date{font-size:11px;color:#aaa;margin-top:2px;}
.hint-box{background:linear-gradient(135deg,#f0eaff,#fff0e6);border-radius:14px;padding:14px 16px;margin-bottom:16px;font-size:13px;color:#6b5b8e;line-height:1.7;}
.toast{position:fixed;top:78px;left:50%;transform:translateX(-50%);background:rgba(20,12,40,.92);color:#fff;padding:11px 22px;border-radius:22px;font-size:14px;z-index:400;animation:toastIn .3s;box-shadow:0 8px 24px rgba(0,0,0,.3);font-weight:600;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-12px);}to{opacity:1;transform:translate(-50%,0);}}
.empty{text-align:center;color:#aaa;padding:30px 0;font-size:14px;}
</style>
</head>
<body>
<div class="phone">
  <div class="screen" id="screen"></div>
  <div class="tabbar" id="tabbar">
    <div class="tab" data-p="home" onclick="go('home')"><div class="ic">🏠</div>首页</div>
    <div class="tab" data-p="tasks" onclick="go('tasks')"><div class="ic">📋</div>任务</div>
    <div class="tab" data-p="rewards" onclick="go('rewards')"><div class="ic">🎁</div>奖励</div>
    <div class="tab" data-p="achievements" onclick="go('achievements')"><div class="ic">🏆</div>成就</div>
  </div>
</div>

<script>
"use strict";
var SK="habitStarDemo";
var S, curPage="login", selRole="", selMood="";

var MOODS=[
  {k:"happy",e:"😊",n:"开心"},{k:"calm",e:"😌",n:"平静"},{k:"proud",e:"😎",n:"得意"},
  {k:"sad",e:"😢",n:"难过"},{k:"angry",e:"😠",n:"生气"},{k:"tired",e:"😴",n:"疲惫"}
];

function load(){
  try{var s=localStorage.getItem(SK);if(s)return JSON.parse(s);}catch(e){}
  return {
    user:{name:"",role:"",points:85,streak:7},
    tasks:[
      {id:1,name:"早起",pts:3,emoji:"🌅",diff:"base",status:"pending"},
      {id:2,name:"刷牙",pts:1,emoji:"🪥",diff:"base",status:"done"},
      {id:3,name:"阅读30分钟",pts:5,emoji:"📚",diff:"adv",status:"pending"},
      {id:4,name:"运动20分钟",pts:3,emoji:"⚽",diff:"adv",status:"pending"},
      {id:5,name:"整理房间",pts:2,emoji:"🧹",diff:"chal",status:"pending"}
    ],
    rewards:[
      {id:1,name:"看动画片30分钟",cost:20,emoji:"📺"},
      {id:2,name:"吃冰淇淋",cost:15,emoji:"🍦"},
      {id:3,name:"周末去公园",cost:50,emoji:"🌳"},
      {id:4,name:"买一个小玩具",cost:100,emoji:"🧸"}
    ],
    achievements:[
      {id:1,name:"初次打卡",emoji:"⭐",unlocked:true},
      {id:2,name:"坚持3天",emoji:"🔥",unlocked:true},
      {id:3,name:"坚持7天",emoji:"🏆",unlocked:true},
      {id:4,name:"坚持30天",emoji:"💎",unlocked:false},
      {id:5,name:"全勤一周",emoji:"🎯",unlocked:true},
      {id:6,name:"阅读达人",emoji:"📖",unlocked:false}
    ],
    moods:[]
  };
}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

function stage(p){
  if(p<=20)return{n:"荒芜星球",i:0,c:"radial-gradient(circle at 35% 30%,#b0b0b0,#5a5a5a)",e:"🪨"};
  if(p<=50)return{n:"草地星球",i:1,c:"radial-gradient(circle at 35% 30%,#86d36b,#3f9b2a)",e:"🌱"};
  if(p<=100)return{n:"森林星球",i:2,c:"radial-gradient(circle at 35% 30%,#4a9c45,#1b5e20)",e:"🌲"};
  if(p<=200)return{n:"城市星球",i:3,c:"radial-gradient(circle at 35% 30%,#5ab4f5,#1565c0)",e:"🏙️"};
  return{n:"传奇星球",i:4,c:"radial-gradient(circle at 35% 30%,#ffd54f,#7c5cff)",e:"👑"};
}

function awarded(t){
  if(t.status==="done")return t.pts;
  if(t.status==="tried")return Math.ceil(t.pts/2);
  return 0;
}

function checkAch(){
  var read=S.tasks.find(function(t){return t.name.indexOf("阅读")>=0;});
  var ra=S.achievements.find(function(a){return a.name==="阅读达人";});
  if(read&&read.status==="done"&&ra)ra.unlocked=true;
  if(S.tasks.every(function(t){return t.status==="done";})){
    var a=S.achievements.find(function(x){return x.name==="全勤一周";});
    if(a)a.unlocked=true;
  }
}

/* ===== 渲染各页面 ===== */
function renderLogin(){
  return '<div class="page login-page active">'+
    '<div class="logo-emoji">🌍</div>'+
    '<div class="logo-title">习惯星球</div>'+
    '<div class="logo-sub">选一个角色，开启今天的小任务</div>'+
    '<div class="role-cards">'+
      '<div class="role-card '+(selRole==="gege"?"selected":"")+'" onclick="selectRole(\'gege\',\'哥哥\')">'+
        '<div class="role-emoji">👦</div><div class="role-name">哥哥</div></div>'+
      '<div class="role-card '+(selRole==="didi"?"selected":"")+'" onclick="selectRole(\'didi\',\'弟弟\')">'+
        '<div class="role-emoji">🧒</div><div class="role-name">弟弟</div></div>'+
    '</div>'+
    '<button class="start-btn" onclick="startApp()">开始打卡</button>'+
  '</div>';
}

function renderHome(){
  var st=stage(S.user.points);
  var tasks=S.tasks.map(taskCard).join("");
  return '<div class="page active">'+
    '<div class="topbar"><div class="user-row">'+
      '<div class="user-info"><div class="hi">你好呀 👋</div><div class="name">'+S.user.name+'</div></div>'+
      '<div class="pts-badge">⭐ '+S.user.points+' 积分</div>'+
    '</div></div>'+
    '<div class="planet-wrap">'+
      '<div class="planet-orbit"></div>'+
      '<div class="planet" style="background:'+st.c+';box-shadow:0 0 45px '+glow(st.i)+';"><div class="planet-emoji">'+st.e+'</div></div>'+
      '<div class="stage-label">'+st.n+'</div>'+
      '<div class="streak"><span class="fire">🔥</span> 连续打卡 '+S.user.streak+' 天</div>'+
    '</div>'+
    '<div class="card entry-link" onclick="go(\'mood\')">'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<div><span style="font-size:22px">📝</span> <b style="font-size:15px">今日心情</b></div>'+
        '<span style="color:#7C5CFF;font-weight:700;font-size:14px">记录 ›</span>'+
      '</div></div>'+
    '<div class="sec-title">📋 今日任务</div>'+
    tasks+
  '</div>';
}
function glow(i){return ["rgba(150,150,150,.5)","rgba(80,200,80,.5)","rgba(60,140,60,.55)","rgba(70,160,240,.55)","rgba(255,200,80,.6)"][i];}

function taskCard(t){
  var cls=t.status==="done"?"done":t.status==="tried"?"tried":t.status==="skip"?"skip":"";
  return '<div class="task-card '+cls+'">'+
    '<div class="task-top"><div class="task-name">'+t.emoji+' '+t.name+'</div><div class="task-pts">'+t.pts+'分</div></div>'+
    '<div class="task-btns">'+
      '<button class="tbtn ok '+(t.status==="done"?"active":"")+'" onclick="setTask('+t.id+',\'done\',event)">✓ 完成</button>'+
      '<button class="tbtn try '+(t.status==="tried"?"active":"")+'" onclick="setTask('+t.id+',\'tried\',event)">尝试了</button>'+
      '<button class="tbtn no '+(t.status==="skip"?"active":"")+'" onclick="setTask('+t.id+',\'skip\',event)">没做</button>'+
    '</div></div>';
}

function renderTasks(){
  var diffName={base:"基础",adv:"进阶",chal:"挑战"};
  var list=S.tasks.map(function(t){
    var stTxt=t.status==="done"?"✓ 已完成":t.status==="tried"?"半完成":t.status==="skip"?"已跳过":"待完成";
    var stCol=t.status==="done"?"#34c759":t.status==="tried"?"#ffb340":"#aaa";
    return '<div class="card">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<div class="task-name">'+t.emoji+' '+t.name+'</div>'+
        '<span class="diff-tag diff-'+t.diff+'">'+diffName[t.diff]+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<span class="task-pts">'+t.pts+'分</span>'+
        '<span style="font-size:13px;font-weight:700;color:'+stCol+'">'+stTxt+'</span></div></div>';
  }).join("");
  return '<div class="page active">'+
    '<div class="topbar"><div class="user-row"><div class="user-info"><div class="hi">习惯清单</div><div class="name">全部任务</div></div></div></div>'+
    '<div class="hint-box">💡 习惯堆叠小贴士<br>刷完牙 → 整理书包 → 准备明天的衣服<br>把小习惯连起来，做起来更轻松！</div>'+
    list+
  '</div>';
}

function renderRewards(){
  var list=S.rewards.map(function(r){
    var dis=S.user.points<r.cost?"disabled":"";
    return '<div class="card reward-card">'+
      '<div class="reward-info"><div class="reward-emoji">'+r.emoji+'</div>'+
        '<div><div class="reward-name">'+r.name+'</div><div class="reward-cost">需要 '+r.cost+' 积分</div></div></div>'+
      '<button class="redeem-btn" '+dis+' onclick="redeem('+r.id+',event)">兑换</button></div>';
  }).join("");
  return '<div class="page active">'+
    '<div class="topbar"><div class="user-row"><div class="user-info"><div class="hi">积分商店</div><div class="name">我的奖励</div></div>'+
      '<div class="pts-badge">⭐ '+S.user.points+'</div></div></div>'+
    '<div class="pts-line">可用积分：'+S.user.points+' 分，继续打卡攒更多吧！</div>'+
    list+
  '</div>';
}

function renderAch(){
  var grid=S.achievements.map(function(a){
    return '<div class="ach-item '+(a.unlocked?"unlocked":"locked")+'">'+
      '<div class="ach-ic">'+a.emoji+'</div>'+
      '<div class="ach-name">'+a.name+'</div>'+
      '<div class="ach-st" style="color:'+(a.unlocked?"#34c759":"#aaa")+'">'+(a.unlocked?"已解锁":"未解锁")+'</div></div>';
  }).join("");
  return '<div class="page active">'+
    '<div class="topbar"><div class="user-row"><div class="user-info"><div class="hi">荣誉殿堂</div><div class="name">我的成就</div></div></div></div>'+
    '<div class="ach-grid">'+grid+'</div>'+
  '</div>';
}

function renderMood(){
  var grid=MOODS.map(function(m){
    return '<div class="mood-item '+(selMood===m.k?"selected":"")+'" onclick="selectMood(\''+m.k+'\')">'+
      '<div class="mood-ic">'+m.e+'</div><div class="mood-name">'+m.n+'</div></div>';
  }).join("");
  var hist=S.moods.length?S.moods.map(function(m){
    return '<div class="mood-entry"><div style="font-size:26px">'+m.e+'</div>'+
      '<div><div style="font-weight:600;color:#444">'+m.n+'</div>'+
      '<div class="date">'+m.date+(m.note?" · "+m.note:"")+'</div></div></div>';
  }).join(""):'<div class="empty">还没有记录哦，快来写下今天的心情吧～</div>';
  return '<div class="page active">'+
    '<div class="topbar"><div class="user-row"><div class="user-info"><div class="hi">心情日记</div><div class="name">今天感觉怎么样？</div></div></div></div>'+
    '<div class="back-link" onclick="go(\'home\')">‹ 返回首页</div>'+
    '<div class="mood-grid">'+grid+'</div>'+
    '<input class="mood-input" id="moodNote" placeholder="写一句话记录今天吧～" maxlength="50" />'+
    '<button class="save-btn" onclick="saveMood()">保存心情</button>'+
    '<div class="sec-title">📖 历史记录</div>'+
    hist+
  '</div>';
}

/* ===== 主渲染 ===== */
function render(){
  var screen=document.getElementById("screen");
  if(curPage==="login")screen.innerHTML=renderLogin();
  else if(curPage==="home")screen.innerHTML=renderHome();
  else if(curPage==="tasks")screen.innerHTML=renderTasks();
  else if(curPage==="rewards")screen.innerHTML=renderRewards();
  else if(curPage==="achievements")screen.innerHTML=renderAch();
  else if(curPage==="mood")screen.innerHTML=renderMood();
  var tb=document.getElementById("tabbar");
  if(curPage==="login"||curPage==="mood"){tb.classList.remove("show");}
  else{tb.classList.add("show");
    var tabs=tb.querySelectorAll(".tab");
    for(var i=0;i<tabs.length;i++){tabs[i].classList.toggle("active",tabs[i].getAttribute("data-p")===curPage);}
  }
  screen.scrollTop=0;
}

/* ===== 交互 ===== */
function selectRole(r,n){selRole=r;S.user.role=r;S.user.name=n;render();}
function startApp(){
  if(!S.user.name){toast("请先选一个角色哦");return;}
  save();curPage="home";render();
}
function go(p){curPage=p;render();}

function setTask(id,status,e){
  var t=S.tasks.find(function(x){return x.id===id;});
  if(!t||t.status===status)return;
  S.user.points-=awarded(t);
  t.status=status;
  S.user.points+=awarded(t);
  if(S.user.points<0)S.user.points=0;
  checkAch();
  save();
  if(status==="done"){floatPts(e,"+"+t.pts);burst(e);toast("打卡成功！太棒了 🌟");}
  else if(status==="tried"){floatPts(e,"+"+Math.ceil(t.pts/2));toast("再试一次！加油 💪");}
  else if(status==="skip"){toast("没关系，明天继续～");}
  render();
}

function redeem(id,e){
  var r=S.rewards.find(function(x){return x.id===id;});
  if(!r)return;
  if(S.user.points<r.cost){toast("积分不够哦，继续努力！");return;}
  S.user.points-=r.cost;save();
  burst(e);toast("🎉 兑换成功！找爸爸妈妈领取吧");
  render();
}

function selectMood(k){
  selMood=k;
  var items=document.querySelectorAll(".mood-item");
  for(var i=0;i<items.length;i++){
    var m=MOODS[i];
    items[i].classList.toggle("selected",m.k===k);
  }
}
function saveMood(){
  if(!selMood){toast("先选一个心情吧");return;}
  var m=MOODS.find(function(x){return x.k===selMood;});
  var note="";var el=document.getElementById("moodNote");
  if(el)note=el.value.trim();
  var d=new Date();
  S.moods.unshift({k:selMood,e:m.e,n:m.n,note:note,date:(d.getMonth()+1)+"月"+d.getDate()+"日"});
  save();toast("心情已记录 ❤️");selMood="";render();
}

/* ===== 动画 ===== */
function floatPts(e,txt){
  var el=document.createElement("div");
  el.className="float-pts";el.textContent=txt;
  el.style.left=e.clientX+"px";el.style.top=(e.clientY-10)+"px";
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},1000);
}
function burst(e){
  var wrap=document.createElement("div");
  wrap.className="burst";
  wrap.style.left=e.clientX+"px";wrap.style.top=e.clientY+"px";
  var stars=["⭐","✨","🌟","💫","🎉"];
  for(var i=0;i<9;i++){
    var s=document.createElement("span");
    s.textContent=stars[i%stars.length];
    var ang=(Math.PI*2*i)/9;
    var dist=46+Math.random()*34;
    s.style.setProperty("--x",Math.round(Math.cos(ang)*dist)+"px");
    s.style.setProperty("--y",Math.round(Math.sin(ang)*dist)+"px");
    s.style.animationDelay=(i*0.02)+"s";
    wrap.appendChild(s);
  }
  document.body.appendChild(wrap);
  setTimeout(function(){wrap.remove();},900);
}
var toastTimer;
function toast(msg){
  var old=document.querySelector(".toast");if(old)old.remove();
  var el=document.createElement("div");
  el.className="toast";el.textContent=msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.remove();},1900);
}

/* ===== 启动 ===== */
S=load();
if(S.user.name){curPage="home";}
render();
</script>
</body>
</html>
