<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <!-- 霓虹渐变 -->
    <linearGradient id="ds_grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="ds_grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#667eea"/>
    </linearGradient>
    <linearGradient id="ds_grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff006e"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="ds_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ds_glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 网格图案 -->
    <pattern id="ds_grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#667eea" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="400" fill="#0a0a0f"/>
  <rect x="0" y="0" width="800" height="400" fill="url(#ds_grid)"/>
  
  <!-- 标题 -->
  <text x="400" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="url(#ds_grad1)" text-anchor="middle" filter="url(#ds_glow)">SELECTIONDAG DATA STRUCTURE</text>
  
  <!-- SDNode 中心节点 -->
  <g filter="url(#ds_glowStrong)">
    <rect x="320" y="160" width="160" height="80" rx="6" fill="#1a1a2e" stroke="#667eea" stroke-width="2"/>
    <rect x="320" y="160" width="160" height="24" rx="6" fill="#667eea" opacity="0.3"/>
    <text x="400" y="178" font-family="'Consolas', monospace" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">SDNode</text>
    <text x="400" y="200" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a0a0b0" text-anchor="middle">DAG 基本节点</text>
    <text x="400" y="220" font-family="'Consolas', monospace" font-size="9" fill="#00d4ff" text-anchor="middle">Opcode: ISD::ADD</text>
    <text x="400" y="235" font-family="'Segoe UI', sans-serif" font-size="9" fill="#764ba2" text-anchor="middle">Operands / Results</text>
  </g>
  
  <!-- SDValue 输出 (右侧) -->
  <g filter="url(#ds_glow)">
    <rect x="550" y="120" width="140" height="60" rx="4" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="620" y="145" font-family="'Consolas', monospace" font-size="12" fill="#00d4ff" text-anchor="middle">SDValue</text>
    <text x="620" y="165" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">节点的输出结果</text>
  </g>
  <line x1="480" y1="180" x2="545" y2="150" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#ds_arrow)" opacity="0.8"/>
  
  <!-- SDUse 输入 (左侧) -->
  <g filter="url(#ds_glow)">
    <rect x="110" y="120" width="140" height="60" rx="4" fill="#1a1a2e" stroke="#ff006e" stroke-width="1.5"/>
    <text x="180" y="145" font-family="'Consolas', monospace" font-size="12" fill="#ff006e" text-anchor="middle">SDUse</text>
    <text x="180" y="165" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">节点的输入引用</text>
  </g>
  <line x1="255" y1="150" x2="315" y2="180" stroke="#ff006e" stroke-width="1.5" marker-end="url(#ds_arrow2)" opacity="0.8"/>
  
  <!-- MVT 类型 (左上) -->
  <g filter="url(#ds_glow)">
    <rect x="100" y="220" width="120" height="80" rx="4" fill="#1a1a2e" stroke="#764ba2" stroke-width="1.5"/>
    <rect x="100" y="220" width="120" height="20" rx="4" fill="#764ba2" opacity="0.3"/>
    <text x="160" y="235" font-family="'Consolas', monospace" font-size="10" fill="#fff" text-anchor="middle">MVT / EVT</text>
    <text x="160" y="255" font-family="'Segoe UI', sans-serif" font-size="8" fill="#a0a0b0" text-anchor="middle">Machine Value Type</text>
    <text x="160" y="270" font-family="'Consolas', monospace" font-size="8" fill="#00d4ff" text-anchor="middle">i32, f16, v4i8</text>
    <text x="160" y="285" font-family="'Consolas', monospace" font-size="8" fill="#667eea" text-anchor="middle">Other, Glue</text>
  </g>
  <line x1="225" y1="260" x2="315" y2="220" stroke="#764ba2" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  
  <!-- Chain (左下) -->
  <g filter="url(#ds_glow)">
    <rect x="100" y="320" width="120" height="50" rx="4" fill="#1a1a2e" stroke="#ff006e" stroke-width="1.5"/>
    <text x="160" y="342" font-family="'Segoe UI', sans-serif" font-size="10" fill="#ff006e" text-anchor="middle">Chain</text>
    <text x="160" y="358" font-family="'Segoe UI', sans-serif" font-size="8" fill="#a0a0b0" text-anchor="middle">内存访问依赖</text>
  </g>
  <line x1="225" y1="345" x2="315" y2="220" stroke="#ff006e" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  
  <!-- DAG 图示 (右下) -->
  <g filter="url(#ds_glow)">
    <rect x="550" y="220" width="200" height="130" rx="4" fill="#1a1a2e" stroke="#667eea" stroke-width="1"/>
    
    <!-- 简化 DAG -->
    <circle cx="590" cy="260" r="15" fill="none" stroke="#667eea" stroke-width="1.5"/>
    <text x="590" y="264" font-family="'Consolas', monospace" font-size="8" fill="#667eea" text-anchor="middle">ADD</text>
    
    <circle cx="650" cy="290" r="15" fill="none" stroke="#764ba2" stroke-width="1.5"/>
    <text x="650" y="294" font-family="'Consolas', monospace" font-size="8" fill="#764ba2" text-anchor="middle">MUL</text>
    
    <circle cx="710" cy="260" r="15" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="710" y="264" font-family="'Consolas', monospace" font-size="8" fill="#00d4ff" text-anchor="middle">CONST</text>
    
    <!-- 连线 -->
    <line x1="605" y1="270" x2="635" y2="280" stroke="#667eea" stroke-width="1"/>
    <line x1="665" y1="280" x2="695" y2="270" stroke="#764ba2" stroke-width="1"/>
    
    <text x="650" y="335" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">DAG 示例</text>
  </g>
  
  <!-- 关系说明 -->
  <g filter="url(#ds_glow)" opacity="0.7">
    <text x="400" y="310" font-family="'Segoe UI', sans-serif" font-size="10" fill="#667eea" text-anchor="middle">SDValue = (SDNode, ResultIndex)</text>
    <text x="400" y="330" font-family="'Segoe UI', sans-serif" font-size="10" fill="#ff006e" text-anchor="middle">SDUse = (SDValue, UsingNode, OperandIndex)</text>
  </g>
  
  <!-- 装饰粒子 -->
  <g filter="url(#ds_glow)" opacity="0.5">
    <circle cx="50" cy="50" r="2" fill="#667eea"/>
    <circle cx="200" cy="80" r="1.5" fill="#00d4ff"/>
    <circle cx="600" cy="60" r="2" fill="#ff006e"/>
    <circle cx="750" cy="100" r="1" fill="#764ba2"/>
  </g>
</svg>