<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <defs>
    <!-- 霓虹渐变 -->
    <linearGradient id="ol_grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="ol_grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#667eea"/>
    </linearGradient>
    <linearGradient id="ol_grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff006e"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="ol_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ol_glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 箭头 -->
    <marker id="ol_arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#667eea"/>
    </marker>
    
    <!-- 网格图案 -->
    <pattern id="ol_grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#667eea" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="320" fill="#0a0a0f"/>
  <rect x="0" y="0" width="800" height="320" fill="url(#ol_grid)"/>
  
  <!-- 标题 -->
  <text x="400" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="url(#ol_grad1)" text-anchor="middle" filter="url(#ol_glow)">OPERATION LEGALIZATION ACTIONS</text>
  
  <!-- 输入: ISD opcode -->
  <g filter="url(#ol_glow)">
    <rect x="300" y="50" width="200" height="45" rx="6" fill="#1a1a2e" stroke="#ff006e" stroke-width="1.5"/>
    <text x="400" y="67" font-family="'Consolas', monospace" font-size="11" fill="#ff006e" text-anchor="middle">ISD::FDIV, MVT::f16</text>
    <text x="400" y="85" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a0a0b0" text-anchor="middle">Illegal Opcode + Type</text>
  </g>
  
  <!-- 连接箭头 -->
  <line x1="400" y1="100" x2="400" y2="125" stroke="#667eea" stroke-width="2" marker-end="url(#ol_arrow)" filter="url(#ol_glow)"/>
  
  <!-- LegalizeAction 说明 -->
  <g filter="url(#ol_glow)">
    <rect x="300" y="130" width="200" height="30" rx="4" fill="#1a1a2e" stroke="#667eea" stroke-width="1"/>
    <text x="400" y="150" font-family="'Segoe UI', sans-serif" font-size="10" fill="#667eea" text-anchor="middle">setOperationAction(Opcode, MVT, Action)</text>
  </g>
  
  <!-- 四种策略 -->
  <!-- Legal -->
  <g filter="url(#ol_glow)">
    <rect x="30" y="180" width="170" height="70" rx="4" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2"/>
    <rect x="30" y="180" width="170" height="20" rx="4" fill="#00d4ff" opacity="0.3"/>
    <text x="115" y="198" font-family="'Segoe UI', sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Legal</text>
    <text x="115" y="220" font-family="'Segoe UI', sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle">目标原生支持</text>
    <text x="115" y="238" font-family="'Consolas', monospace" font-size="8" fill="#a0a0b0" text-anchor="middle">直接使用</text>
  </g>
  
  <!-- Promote -->
  <g filter="url(#ol_glow)">
    <rect x="230" y="180" width="170" height="70" rx="4" fill="#1a1a2e" stroke="#667eea" stroke-width="2"/>
    <rect x="230" y="180" width="170" height="20" rx="4" fill="#667eea" opacity="0.3"/>
    <text x="315" y="198" font-family="'Segoe UI', sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Promote</text>
    <text x="315" y="220" font-family="'Segoe UI', sans-serif" font-size="9" fill="#667eea" text-anchor="middle">用更大类型执行</text>
    <text x="315" y="238" font-family="'Consolas', monospace" font-size="8" fill="#a0a0b0" text-anchor="middle">f16 → f32</text>
  </g>
  
  <!-- Expand -->
  <g filter="url(#ol_glow)">
    <rect x="430" y="180" width="170" height="70" rx="4" fill="#1a1a2e" stroke="#764ba2" stroke-width="2"/>
    <rect x="430" y="180" width="170" height="20" rx="4" fill="#764ba2" opacity="0.3"/>
    <text x="515" y="198" font-family="'Segoe UI', sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Expand</text>
    <text x="515" y="220" font-family="'Segoe UI', sans-serif" font-size="9" fill="#764ba2" text-anchor="middle">用其他操作模拟</text>
    <text x="515" y="238" font-family="'Consolas', monospace" font-size="8" fill="#a0a0b0" text-anchor="middle">BSWAP → shift</text>
  </g>
  
  <!-- Custom -->
  <g filter="url(#ol_glowStrong)">
    <rect x="630" y="180" width="150" height="70" rx="4" fill="#1a1a2e" stroke="#ff006e" stroke-width="2"/>
    <rect x="630" y="180" width="150" height="20" rx="4" fill="#ff006e" opacity="0.4"/>
    <text x="705" y="198" font-family="'Segoe UI', sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Custom</text>
    <text x="705" y="220" font-family="'Segoe UI', sans-serif" font-size="9" fill="#ff006e" text-anchor="middle">调用自定义 hook</text>
    <text x="705" y="238" font-family="'Consolas', monospace" font-size="8" fill="#a0a0b0" text-anchor="middle">LowerOperation()</text>
  </g>
  
  <!-- 连接线 -->
  <path d="M 400 160 L 115 175" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 400 160 L 315 175" fill="none" stroke="#667eea" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 400 160 L 515 175" fill="none" stroke="#764ba2" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 400 160 L 705 175" fill="none" stroke="#ff006e" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  
  <!-- 示例框 -->
  <g filter="url(#ol_glow)">
    <rect x="30" y="270" width="750" height="40" rx="4" fill="#1a1a2e" stroke="#667eea" stroke-width="1" opacity="0.8"/>
    <text x="100" y="293" font-family="'Segoe UI', sans-serif" font-size="10" fill="#667eea">NVPTX:</text>
    <text x="160" y="293" font-family="'Consolas', monospace" font-size="9" fill="#00d4ff">setOperationAction(ISD::FDIV, MVT::f16, Promote);</text>
    <text x="500" y="293" font-family="'Segoe UI', sans-serif" font-size="10" fill="#764ba2">MIPS:</text>
    <text x="545" y="293" font-family="'Consolas', monospace" font-size="9" fill="#ff006e">setOperationAction(ISD::BSWAP, MVT::i32, Expand);</text>
  </g>
</svg>