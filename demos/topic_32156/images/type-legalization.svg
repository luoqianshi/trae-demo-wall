<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <!-- 霓虹渐变 -->
    <linearGradient id="tl_grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="tl_grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#667eea"/>
    </linearGradient>
    <linearGradient id="tl_grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff006e"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="tl_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tl_glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 箭头 -->
    <marker id="tl_arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#667eea"/>
    </marker>
    
    <!-- 网格图案 -->
    <pattern id="tl_grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#667eea" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="350" fill="#0a0a0f"/>
  <rect x="0" y="0" width="800" height="350" fill="url(#tl_grid)"/>
  
  <!-- 标题 -->
  <text x="400" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="url(#tl_grad1)" text-anchor="middle" filter="url(#tl_glow)">TYPE LEGALIZATION STRATEGIES</text>
  
  <!-- 目标：合法类型 -->
  <g filter="url(#tl_glowStrong)">
    <rect x="300" y="50" width="200" height="45" rx="6" fill="#1a1a2e" stroke="#00d4ff" stroke-width="2"/>
    <rect x="300" y="50" width="200" height="18" rx="6" fill="#00d4ff" opacity="0.3"/>
    <text x="400" y="67" font-family="'Segoe UI', sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Legal Types</text>
    <text x="400" y="85" font-family="'Consolas', monospace" font-size="9" fill="#00d4ff" text-anchor="middle">i32, f32, v4i8</text>
  </g>
  
  <!-- 策略箭头从目标出发 -->
  <line x1="400" y1="100" x2="400" y2="130" stroke="#667eea" stroke-width="2" marker-end="url(#tl_arrow)" filter="url(#tl_glow)"/>
  
  <!-- 输入: 非法类型 -->
  <g filter="url(#tl_glow)">
    <rect x="300" y="135" width="200" height="45" rx="6" fill="#1a1a2e" stroke="#ff006e" stroke-width="1.5"/>
    <text x="400" y="152" font-family="'Segoe UI', sans-serif" font-size="11" fill="#ff006e" text-anchor="middle">Illegal Types</text>
    <text x="400" y="170" font-family="'Consolas', monospace" font-size="9" fill="#a0a0b0" text-anchor="middle">i128, i24, v3i8</text>
  </g>
  
  <!-- 策略 1: Promote -->
  <g filter="url(#tl_glow)">
    <rect x="50" y="200" width="150" height="60" rx="4" fill="#1a1a2e" stroke="#667eea" stroke-width="1.5"/>
    <rect x="50" y="200" width="150" height="18" rx="4" fill="#667eea" opacity="0.3"/>
    <text x="125" y="218" font-family="'Segoe UI', sans-serif" font-size="11" fill="#fff" text-anchor="middle">Promote</text>
    <text x="125" y="238" font-family="'Consolas', monospace" font-size="9" fill="#00d4ff" text-anchor="middle">i24 → i32</text>
    <text x="125" y="252" font-family="'Segoe UI', sans-serif" font-size="8" fill="#a0a0b0" text-anchor="middle">提升到更大类型</text>
  </g>
  
  <!-- 策略 2: Expand -->
  <g filter="url(#tl_glow)">
    <rect x="230" y="200" width="150" height="60" rx="4" fill="#1a1a2e" stroke="#764ba2" stroke-width="1.5"/>
    <rect x="230" y="200" width="150" height="18" rx="4" fill="#764ba2" opacity="0.3"/>
    <text x="305" y="218" font-family="'Segoe UI', sans-serif" font-size="11" fill="#fff" text-anchor="middle">Expand</text>
    <text x="305" y="238" font-family="'Consolas', monospace" font-size="9" fill="#00d4ff" text-anchor="middle">i128 → i64+i64</text>
    <text x="305" y="252" font-family="'Segoe UI', sans-serif" font-size="8" fill="#a0a0b0" text-anchor="middle">拆成多个小类型</text>
  </g>
  
  <!-- 策略 3: Split -->
  <g filter="url(#tl_glow)">
    <rect x="420" y="200" width="150" height="60" rx="4" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1.5"/>
    <rect x="420" y="200" width="150" height="18" rx="4" fill="#00d4ff" opacity="0.3"/>
    <text x="495" y="218" font-family="'Segoe UI', sans-serif" font-size="11" fill="#fff" text-anchor="middle">Split</text>
    <text x="495" y="238" font-family="'Consolas', monospace" font-size="9" fill="#00d4ff" text-anchor="middle">v8i8 → v4i8+v4i8</text>
    <text x="495" y="252" font-family="'Segoe UI', sans-serif" font-size="8" fill="#a0a0b0" text-anchor="middle">向量拆半</text>
  </g>
  
  <!-- 策略 4: Widen -->
  <g filter="url(#tl_glow)">
    <rect x="600" y="200" width="150" height="60" rx="4" fill="#1a1a2e" stroke="#ff006e" stroke-width="1.5"/>
    <rect x="600" y="200" width="150" height="18" rx="4" fill="#ff006e" opacity="0.3"/>
    <text x="675" y="218" font-family="'Segoe UI', sans-serif" font-size="11" fill="#fff" text-anchor="middle">Widen</text>
    <text x="675" y="238" font-family="'Consolas', monospace" font-size="9" fill="#00d4ff" text-anchor="middle">v3i8 → v4i8</text>
    <text x="675" y="252" font-family="'Segoe UI', sans-serif" font-size="8" fill="#a0a0b0" text-anchor="middle">扩宽到合法大小</text>
  </g>
  
  <!-- 连接线 -->
  <path d="M 350 180 L 125 195" fill="none" stroke="#667eea" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 400 180 L 305 195" fill="none" stroke="#764ba2" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 450 180 L 495 195" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M 450 180 L 675 195" fill="none" stroke="#ff006e" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  
  <!-- 表格区域 -->
  <g filter="url(#tl_glow)">
    <rect x="50" y="280" width="700" height="55" rx="4" fill="#1a1a2e" stroke="#667eea" stroke-width="1" opacity="0.8"/>
    
    <!-- 表头 -->
    <rect x="50" y="280" width="700" height="18" rx="4" fill="#667eea" opacity="0.2"/>
    <text x="125" y="293" font-family="'Segoe UI', sans-serif" font-size="9" fill="#667eea" text-anchor="middle">TypeLegal</text>
    <text x="275" y="293" font-family="'Segoe UI', sans-serif" font-size="9" fill="#667eea" text-anchor="middle">TypePromoteInteger</text>
    <text x="425" y="293" font-family="'Segoe UI', sans-serif" font-size="9" fill="#667eea" text-anchor="middle">TypeExpandInteger</text>
    <text x="575" y="293" font-family="'Segoe UI', sans-serif" font-size="9" fill="#667eea" text-anchor="middle">TypeSplitVector</text>
    <text x="700" y="293" font-family="'Segoe UI', sans-serif" font-size="9" fill="#667eea" text-anchor="middle">TypeWidenVector</text>
    
    <!-- 表内容 -->
    <text x="125" y="320" font-family="'Segoe UI', sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle">原生支持</text>
    <text x="275" y="320" font-family="'Segoe UI', sans-serif" font-size="8" fill="#764ba2" text-anchor="middle">整数提升</text>
    <text x="425" y="320" font-family="'Segoe UI', sans-serif" font-size="8" fill="#ff006e" text-anchor="middle">整数拆分</text>
    <text x="575" y="320" font-family="'Segoe UI', sans-serif" font-size="8" fill="#667eea" text-anchor="middle">向量拆分</text>
    <text x="700" y="320" font-family="'Segoe UI', sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle">向量扩宽</text>
  </g>
</svg>