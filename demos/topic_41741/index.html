<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#e85d3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="知识大冒险">
  <link rel="manifest" href="./manifest.json">
  <title>知识大冒险 — 边玩边学的 AI 闯关游戏</title>

  <style>
    @font-face {
      font-family: 'ArsenalSC';
      src: url('./_shared/fonts/ArsenalSC-Regular.ttf') format('truetype');
      font-weight: 400;
    }

    :root {
      --accent: #e85d3a;
      --accent2: #3a8ee8;
      --ink: #2d2a26;
      --muted: #7a756e;
      --bg: #faf9f7;
      --bg2: #f0eeeb;
      --card: #ffffff;
      --rule: #e0ddd8;
      --success: #27ae60;
      --success-bg: #e8f8f0;
      --error: #e74c3c;
      --error-bg: #fdecea;
      --warning: #f39c12;

      --theme-primary: #c0392b;
      --theme-secondary: #f39c12;
      --theme-bg: #fff5f5;

      --radius: 12px;
      --radius-lg: 16px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);

      --font-display: 'ArsenalSC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --font-body: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--font-body);
      color: var(--ink);
      background: var(--bg);
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      outline: none;
      background: none;
    }
    img { max-width: 100%; display: block; }

    /* App Container */
    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
    }

    @media (min-width: 768px) {
      #app {
        box-shadow: var(--shadow-lg);
      }
    }

    /* Screen base */
    .screen {
      width: 100%;
      min-height: 100vh;
      padding: 20px;
      display: none;
      animation: fadeIn 0.3s ease-out;
    }
    .screen.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* === HOME SCREEN === */
    .home-screen {
      padding-bottom: 40px;
    }

    .home-hero {
      text-align: center;
      padding: 30px 0 20px;
    }
    .home-hero .logo {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .home-hero .slogan {
      color: var(--muted);
      font-size: 0.95rem;
    }
    .home-hero .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 24px 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      width: 4px;
      height: 18px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* Theme Cards */
    .theme-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .theme-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: all 0.25s ease;
      cursor: pointer;
      position: relative;
      border: 2px solid transparent;
    }
    .theme-card:active {
      transform: scale(0.98);
      box-shadow: var(--shadow-md);
    }
    .theme-card:hover {
      border-color: var(--accent);
    }
    .theme-card.completed::after {
      content: '✓ 已通关';
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--success);
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      z-index: 2;
    }
    .theme-card-cover {
      height: 140px;
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .theme-card-cover::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60%;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
    }
    .theme-card-cover .theme-title {
      position: absolute;
      bottom: 12px;
      left: 16px;
      color: white;
      font-size: 1.3rem;
      font-weight: 700;
      z-index: 1;
      font-family: var(--font-display);
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    .theme-card-body {
      padding: 12px 16px 14px;
    }
    .theme-card-body .desc {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 10px;
      line-height: 1.6;
    }
    .theme-card-meta {
      display: flex;
      gap: 12px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .theme-card-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .difficulty-stars {
      color: var(--warning);
      letter-spacing: 2px;
    }

    /* Continue Banner */
    .continue-banner {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      color: white;
      margin-bottom: 8px;
      cursor: pointer;
      box-shadow: var(--shadow-md);
      animation: slideDown 0.4s ease-out;
    }
    .continue-banner:active { transform: scale(0.98); }
    .continue-banner .label {
      font-size: 0.8rem;
      opacity: 0.9;
      margin-bottom: 4px;
    }
    .continue-banner .title {
      font-size: 1.15rem;
      font-weight: 700;
      font-family: var(--font-display);
    }
    .continue-banner .progress {
      font-size: 0.85rem;
      opacity: 0.9;
      margin-top: 4px;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 8px;
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 10px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .stat-card .stat-num {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      font-family: var(--font-display);
    }
    .stat-card .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Bottom Nav */
    .home-footer {
      margin-top: auto;
      padding-top: 20px;
      display: flex;
      gap: 10px;
    }
    .footer-btn {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 12px;
      font-size: 0.9rem;
      color: var(--ink);
      transition: all 0.2s;
    }
    .footer-btn:active {
      background: var(--bg2);
      transform: scale(0.97);
    }

    /* === GAME SCREEN === */
    .game-screen {
      padding: 0;
      min-height: 100vh;
      background: var(--theme-bg);
      padding-bottom: 30px;
    }

    .game-header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      border-bottom: 1px solid var(--rule);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .game-header .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: all 0.2s;
    }
    .game-header .back-btn:active { transform: scale(0.9); }

    .game-header .level-info {
      text-align: center;
    }
    .game-header .level-title {
      font-size: 0.95rem;
      font-weight: 600;
    }
    .game-header .level-sub {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .game-header .hp-display {
      display: flex;
      gap: 3px;
      font-size: 1rem;
    }
    .hp-heart {
      color: var(--accent);
      transition: all 0.3s;
    }
    .hp-heart.dead {
      color: var(--rule);
    }
    .hp-heart.low {
      animation: pulse 1s infinite;
    }

    /* Story Area */
    .story-container {
      padding: 20px;
    }

    .story-text {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--ink);
      margin-bottom: 16px;
      min-height: 60px;
    }
    .story-text p {
      margin-bottom: 12px;
    }
    .story-text .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s infinite;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .story-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 16px;
      font-style: italic;
    }

    /* Choice Buttons */
    .choices-area {
      padding: 0 20px 20px;
    }
    .choices-area .choice-label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 10px;
      text-align: center;
    }
    .choice-btn {
      display: block;
      width: 100%;
      background: var(--card);
      border: 2px solid var(--rule);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: var(--ink);
      text-align: left;
      transition: all 0.2s;
      position: relative;
      animation: slideUp 0.3s ease-out backwards;
    }
    .choice-btn:nth-child(2) { animation-delay: 0.05s; }
    .choice-btn:nth-child(3) { animation-delay: 0.1s; }
    .choice-btn:nth-child(4) { animation-delay: 0.15s; }

    .choice-btn:active {
      transform: scale(0.98);
      background: var(--bg2);
    }
    .choice-btn:hover {
      border-color: var(--accent);
    }
    .choice-btn .choice-icon {
      display: inline-block;
      width: 24px;
      height: 24px;
      background: var(--bg2);
      border-radius: 50%;
      text-align: center;
      line-height: 24px;
      font-size: 0.8rem;
      margin-right: 10px;
      font-weight: 600;
      color: var(--muted);
    }

    /* Question */
    .question-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
      animation: slideUp 0.3s ease-out;
    }
    .question-num {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .question-text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.7;
      margin-bottom: 4px;
    }
    .question-difficulty {
      font-size: 0.75rem;
      color: var(--warning);
      margin-bottom: 8px;
    }

    .option-btn {
      display: block;
      width: 100%;
      background: var(--card);
      border: 2px solid var(--rule);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: var(--ink);
      text-align: left;
      transition: all 0.25s;
      position: relative;
    }
    .option-btn:not(:disabled):active {
      transform: scale(0.98);
    }
    .option-btn:not(:disabled):hover {
      border-color: var(--accent2);
    }
    .option-btn .option-letter {
      display: inline-block;
      width: 26px;
      height: 26px;
      background: var(--bg2);
      border-radius: 50%;
      text-align: center;
      line-height: 26px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-right: 10px;
      color: var(--muted);
      vertical-align: middle;
    }
    .option-btn.correct {
      background: var(--success-bg);
      border-color: var(--success);
      color: var(--success);
      animation: bounce 0.4s ease;
    }
    .option-btn.correct .option-letter {
      background: var(--success);
      color: white;
    }
    .option-btn.wrong {
      background: var(--error-bg);
      border-color: var(--error);
      color: var(--error);
      animation: shake 0.3s ease;
    }
    .option-btn.wrong .option-letter {
      background: var(--error);
      color: white;
    }
    .option-btn:disabled {
      cursor: default;
    }
    .option-btn .option-reward {
      float: right;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* Explanation */
    .explanation-card {
      background: #f0f7ff;
      border-left: 4px solid var(--accent2);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 12px 14px;
      margin-bottom: 16px;
      animation: slideUp 0.3s ease-out;
    }
    .explanation-card .exp-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent2);
      margin-bottom: 4px;
    }
    .explanation-card .exp-text {
      font-size: 0.9rem;
      color: var(--ink);
      line-height: 1.7;
    }

    /* Action Button */
    .action-area {
      padding: 0 20px 24px;
    }
    .primary-btn {
      width: 100%;
      height: 52px;
      background: linear-gradient(135deg, var(--accent), #ff7a4d);
      color: white;
      border-radius: var(--radius);
      font-size: 1.05rem;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(232,93,58,0.3);
      transition: all 0.2s;
    }
    .primary-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 6px rgba(232,93,58,0.2);
    }
    .primary-btn:disabled {
      background: var(--rule);
      box-shadow: none;
      cursor: not-allowed;
    }

    .secondary-btn {
      width: 100%;
      height: 52px;
      background: var(--card);
      color: var(--ink);
      border: 2px solid var(--rule);
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .secondary-btn:active {
      transform: scale(0.97);
      background: var(--bg2);
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }
    .btn-row .primary-btn,
    .btn-row .secondary-btn {
      flex: 1;
    }

    /* === RESULT SCREEN === */
    .result-screen {
      padding: 30px 20px;
      text-align: center;
      background: var(--theme-bg);
      padding-bottom: 40px;
    }
    .result-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      animation: float 2s ease-in-out infinite;
    }
    .result-title {
      font-size: 1.6rem;
      font-weight: 700;
      font-family: var(--font-display);
      margin-bottom: 8px;
      color: var(--ink);
    }
    .result-subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 24px;
    }

    .score-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 100%;
      box-shadow: var(--shadow-md);
      margin-bottom: 16px;
    }
    .score-card .score-num {
      font-size: 3rem;
      font-weight: 700;
      color: var(--accent);
      font-family: var(--font-display);
      line-height: 1;
      margin-bottom: 4px;
    }
    .score-card .score-label {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 16px;
    }
    .score-details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding-top: 16px;
      border-top: 1px solid var(--rule);
    }
    .score-detail .detail-num {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--ink);
    }
    .score-detail .detail-label {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .result-explanations {
      width: 100%;
      text-align: left;
      margin-bottom: 20px;
    }
    .result-explanations h3 {
      font-size: 1rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .result-exp-item {
      background: var(--card);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
      border-left: 3px solid var(--accent2);
    }
    .result-exp-item.wrong {
      border-left-color: var(--error);
    }
    .result-exp-item .exp-q {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .result-exp-item .exp-a {
      font-size: 0.85rem;
      color: var(--success);
      margin-bottom: 4px;
    }
    .result-exp-item .exp-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* === THEME END SCREEN === */
    .theme-end-screen {
      padding: 40px 20px;
      text-align: center;
      background: linear-gradient(180deg, var(--theme-bg), var(--bg));
      padding-bottom: 40px;
    }
    .trophy-icon {
      font-size: 5rem;
      margin-bottom: 16px;
      animation: bounce 1s ease infinite alternate;
    }
    .theme-end-title {
      font-size: 1.8rem;
      font-weight: 700;
      font-family: var(--font-display);
      margin-bottom: 8px;
    }
    .theme-end-sub {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .rank-badge {
      display: inline-block;
      padding: 8px 24px;
      border-radius: 30px;
      font-size: 1.5rem;
      font-weight: 700;
      font-family: var(--font-display);
      margin-bottom: 24px;
    }
    .rank-badge.rank-s {
      background: linear-gradient(135deg, #f39c12, #e74c3c);
      color: white;
    }
    .rank-badge.rank-a {
      background: linear-gradient(135deg, #3498db, #2ecc71);
      color: white;
    }
    .rank-badge.rank-b {
      background: linear-gradient(135deg, #9b59b6, #3498db);
      color: white;
    }
    .rank-badge.rank-c {
      background: linear-gradient(135deg, #95a5a6, #7f8c8d);
      color: white;
    }

    .endings-story {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 20px;
      width: 100%;
      text-align: left;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }
    .endings-story h3 {
      font-size: 1rem;
      margin-bottom: 10px;
      color: var(--theme-primary);
    }
    .endings-story p {
      font-size: 0.9rem;
      line-height: 1.8;
      color: var(--ink);
    }

    .achievements-unlock {
      width: 100%;
      margin-bottom: 16px;
    }
    .achievements-unlock h3 {
      font-size: 1rem;
      margin-bottom: 10px;
      text-align: left;
    }
    .achievement-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
      animation: slideUp 0.3s ease-out backwards;
    }
    .achievement-item .ach-icon {
      font-size: 1.8rem;
    }
    .achievement-item .ach-info {
      text-align: left;
    }
    .achievement-item .ach-name {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .achievement-item .ach-desc {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* === ACHIEVEMENTS SCREEN === */
    .achievements-screen {
      padding-bottom: 40px;
    }
    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0 20px;
    }
    .page-header .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }
    .page-header h1 {

      border-radius: var(--radius);

      box-shadow: var(--shadow-sm);
    }

      align-items: center;

      flex: 1;
      font-weight: 500;
    }
    .highscore-item .hs-score {
      font-weight: 700;
      color: var(--accent);
      font-family: var(--font-display);
    }

    /* === MODAL === */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      animation: bounce 0.3s ease;
    }
    .modal .modal-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    .modal h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .modal p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 20px;
    }
    .modal .btn-row {
      gap: 10px;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      pointer-events: none;
    }
    .toast {
      background: rgba(45,42,38,0.9);
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 0.9rem;
      margin-bottom: 8px;
      animation: slideDown 0.3s ease-out;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.error { background: rgba(231,76,60,0.95); }

    /* Confetti */
    .confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 150;
    }

    /* Theme-specific backgrounds */
    .theme-chibi { --theme-primary: #c0392b; --theme-secondary: #f39c12; --theme-bg: #fff5f5; }
    .theme-mars { --theme-primary: #e74c3c; --theme-secondary: #3498db; --theme-bg: #fff5f5; }
    .theme-dunhuang { --theme-primary: #d35400; --theme-secondary: #f1c40f; --theme-bg: #fff8f0; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

    /* Safe area */
    @supports (padding-top: env(safe-area-inset-top)) {
      .game-header { padding-top: calc(14px + env(safe-area-inset-top)); }
      .screen { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
    }

  // ==================== AUDIO SYSTEM ====================
  const AudioSystem = {
    ctx: null,
    enabled: true,
    volume: 0.3,

    init() {
      try {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {
        this.enabled = false;
      }
    },

    resume() {
      if (this.ctx && this.ctx.state === 'suspended') {
        this.ctx.resume();
      }
    },

    playTone(freq, duration, type = 'sine', volume = null) {
      if (!this.enabled || !this.ctx) return;
      this.resume();

      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const vol = volume !== null ? volume : this.volume;

      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);

      osc.connect(gain);
      gain.connect(this.ctx.destination);

      osc.start();
      osc.stop(this.ctx.currentTime + duration);
    },

    type() {
      this.playTone(800, 0.03, 'square', 0.05);
    },

    correct() {
      if (!this.enabled || !this.ctx) return;
      this.resume();

      const now = this.ctx.currentTime;
      const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
      notes.forEach((freq, i) => {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, now + i * 0.1);
        gain.gain.linearRampToValueAtTime(this.volume * 0.5, now + i * 0.1 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.25);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(now + i * 0.1);
        osc.stop(now + i * 0.1 + 0.3);
      });
    },

    wrong() {
      if (!this.enabled || !this.ctx) return;
      this.resume();

      const now = this.ctx.currentTime;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.exponentialRampToValueAtTime(110, now + 0.3);
      gain.gain.setValueAtTime(this.volume * 0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.start(now);
      osc.stop(now + 0.3);
    },

    victory() {
      if (!this.enabled || !this.ctx) return;
      this.resume();

      const now = this.ctx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.5, 783.99, 1046.5];
      notes.forEach((freq, i) => {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        const t = now + i * 0.12;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(this.volume * 0.6, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(t);
        osc.stop(t + 0.35);
      });
    },

    fail() {
      if (!this.enabled || !this.ctx) return;
      this.resume();

      const now = this.ctx.currentTime;
      const notes = [392, 349.23, 311.13, 261.63];
      notes.forEach((freq, i) => {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        const t = now + i * 0.15;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(this.volume * 0.3, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(t);
        osc.stop(t + 0.35);
      });
    },

    click() {
      this.playTone(600, 0.05, 'sine', 0.1);
    },

    achievement() {
      if (!this.enabled || !this.ctx) return;
      this.resume();

      const now = this.ctx.currentTime;
      const notes = [783.99, 987.77, 1174.66, 1318.51];
      notes.forEach((freq, i) => {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = now + i * 0.08;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(this.volume * 0.5, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(t);
        osc.stop(t + 0.45);
      });
    },

    toggle() {
      this.enabled = !this.enabled;
      return this.enabled;
    }
  };

  // ==================== STORAGE ====================
  const STORAGE_KEY = 'knowledge_adventure_v1';

  function loadData() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) return JSON.parse(data);
    } catch (e) {}
    return {
      progress: {},
      scores: {},
      achievements: [],
      totalLevels: 0,
      totalScore: 0,
      currentTheme: null,
      currentLevel: 0
    };
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(gameData));
  }

  let gameData = loadData();

  let currentTheme = null;
  let currentLevelIndex = 0;
  let currentLevelData = null;
  let hp = 3;
  let score = 0;

  // ==================== RENDER HELPERS ====================
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }

  function showToast(msg, type = '') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast ' + type;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.transition = 'opacity 0.3s';
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, 2000);
  }

  // ==================== HOME SCREEN ====================
  function renderHome() {
    const list = document.getElementById('theme-list');
    list.innerHTML = '';

    THEMES.forEach(theme => {
      const progress = gameData.progress[theme.id] || 0;
      const completed = progress >= theme.levelCount;

      const card = document.createElement('div');
      card.className = 'theme-card' + (completed ? ' completed' : '');
      card.onclick = () => startTheme(theme.id);

      const stars = '⭐'.repeat(theme.difficulty);
      const progressText = completed ? '已通关' : progress > 0 ? `进度 ${progress}/${theme.levelCount}` : `${theme.levelCount} 关`;

      card.innerHTML = `
        <div class="theme-card-cover" style="background: ${theme.cover};">
          <div class="theme-title">${theme.title}</div>
        </div>
        <div class="theme-card-body">
          <div class="desc">${theme.description}</div>
          <div class="theme-card-meta">
            <span>📖 ${progressText}</span>
            <span class="difficulty-stars">${stars}</span>
          </div>
        </div>
      `;
      list.appendChild(card);
    });

    const continueBanner = document.getElementById('continue-banner');
    const ct = gameData.currentTheme;
    const cl = gameData.currentLevel || 0;
    const theme = ct ? THEMES.find(t => t.id === ct) : null;

    if (theme && cl > 0 && cl < theme.levelCount) {
      continueBanner.style.display = 'block';
      document.getElementById('continue-title').textContent = theme.title;
      document.getElementById('continue-progress').textContent = `第 ${cl + 1} 关 / 共 ${theme.levelCount} 关`;
      continueBanner.onclick = () => continueTheme();
    } else {
      continueBanner.style.display = 'none';
    }

    let totalLevels = 0;
    let totalScore = 0;
    for (const tid in gameData.progress) totalLevels += gameData.progress[tid];
    for (const tid in gameData.scores) totalScore += gameData.scores[tid];

    document.getElementById('stat-levels').textContent = totalLevels;
    document.getElementById('stat-score').textContent = totalScore;
    document.getElementById('stat-ach').textContent = gameData.achievements.length;
  }

  // ==================== GAME LOGIC ====================
  function startTheme(themeId) {
    const theme = THEMES.find(t => t.id === themeId);
    if (!theme) return;

    currentTheme = theme;
    currentLevelIndex = 0;
    hp = 3;
    score = 0;
    themeScore = 0;
    unlockedAchievementsThisRun = [];

    document.getElementById('game-screen').className = 'screen game-screen ' + theme.themeClass;
    document.getElementById('result-screen').className = 'screen result-screen ' + theme.themeClass;
    document.getElementById('theme-end-screen').className = 'screen theme-end-screen ' + theme.themeClass;

    loadLevel(0);
  }

  function continueTheme() {
    const ct = gameData.currentTheme;
    const cl = gameData.currentLevel || 0;
    const theme = THEMES.find(t => t.id === ct);
    if (!theme) return;

    currentTheme = theme;
    currentLevelIndex = cl;
    hp = 3;
    score = 0;
    themeScore = 0;

    for (let i = 0; i < cl; i++) {
      themeScore += gameData.scores[theme.id + '_lvl_' + i] || 0;
    }

    document.getElementById('game-screen').className = 'screen game-screen ' + theme.themeClass;
    document.getElementById('result-screen').className = 'screen result-screen ' + theme.themeClass;
    document.getElementById('theme-end-screen').className = 'screen theme-end-screen ' + theme.themeClass;

    loadLevel(cl);
  }

  function loadLevel(index) {
    if (index >= currentTheme.levels.length) {
      showThemeEnd();
      return;
    }

    currentLevelIndex = index;
    currentLevelData = currentTheme.levels[index];
    gamePhase = 'opening';
    currentQuestionIndex = 0;
    correctCount = 0;
    levelAnswers = [];

    if (hp < 3) hp = 3;

    document.getElementById('level-title').textContent = `第${index + 1}关 | ${currentLevelData.title}`;
    document.getElementById('level-sub').textContent = currentTheme.title;

    updateHpDisplay();
    showScreen('game-screen');
    showOpening();
  }

  function updateHpDisplay() {
    const display = document.getElementById('hp-display');
    let html = '';
    for (let i = 0; i < 5; i++) {
      const alive = i < hp;
      const low = hp === 1 && i === 0;
      html += `<span class="hp-heart ${alive ? '' : 'dead'} ${low ? 'low' : ''}">❤</span>`;
    }
    display.innerHTML = html;
  }

  function showOpening() {
    gamePhase = 'opening';
    document.getElementById('story-meta').textContent = currentLevelData.storyMeta || '';
    typeText(currentLevelData.opening, () => {
      showChoices();
    });
    document.getElementById('game-content').innerHTML = '';
    document.getElementById('action-area').innerHTML = '';
  }

  function typeText(text, callback) {
    const el = document.getElementById('story-text');
    el.innerHTML = '';
    const paragraphs = text.split('\n').filter(p => p.trim() !== '');
    let paraIdx = 0;
    let charIdx = 0;
    let currentPara = null;

    function addPara() {
      if (paraIdx >= paragraphs.length) return;
      currentPara = document.createElement('p');
      el.appendChild(currentPara);
    }

    function type() {
      if (paraIdx >= paragraphs.length) {
        const cursor = document.querySelector('.cursor');
        if (cursor) cursor.remove();
        if (callback) callback();
        return;
      }
      if (!currentPara) addPara();

      const para = paragraphs[paraIdx];
      if (charIdx < para.length) {
        currentPara.innerHTML = para.substring(0, charIdx + 1) +
          (paraIdx === paragraphs.length - 1 ? '<span class="cursor"></span>' : '');
        if (charIdx % 3 === 0 && para[charIdx] !== ' ') {
          AudioSystem.type();
        }
        charIdx++;
        setTimeout(type, 25);
      } else {
        paraIdx++;
        charIdx = 0;
        currentPara = null;
        setTimeout(type, 200);
      }
    }

    el.onclick = () => {
      el.onclick = null;
      el.innerHTML = paragraphs.map(p => '<p>' + p + '</p>').join('');
      if (callback) callback();
    };

    type();
  }

  function showChoices() {
    gamePhase = 'choices';
    const content = document.getElementById('game-content');
    content.innerHTML = '<div class="choices-area"><div class="choice-label">你的选择是？</div></div>';
    const area = content.querySelector('.choices-area');

    currentLevelData.choices.forEach((choice, idx) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      const letter = String.fromCharCode(65 + idx);
      const rewardText = choice.reward.hp > 0 || choice.reward.score > 0
        ? `<span class="option-reward">${choice.reward.hp > 0 ? '❤+' + choice.reward.hp : ''} ${choice.reward.score > 0 ? '+' + choice.reward.score + '分' : ''}</span>`
        : '';
      btn.innerHTML = `<span class="choice-icon">${letter}</span>${choice.text}${rewardText}`;
      btn.onclick = () => selectChoice(choice);
      area.appendChild(btn);
    });

    document.getElementById('action-area').innerHTML = '';
    scrollToBottom();
  }

  function selectChoice(choice) {
    if (choice.reward.hp) {
      hp = Math.min(5, hp + choice.reward.hp);
      updateHpDisplay();
      showToast(`+${choice.reward.hp} ❤ 生命值`, 'success');
    }
    if (choice.reward.score) {
      score += choice.reward.score;
      showToast(`+${choice.reward.score} 分`, 'success');
    }

    gamePhase = 'midText';
    document.getElementById('game-content').innerHTML = '';
    typeText(choice.nextText + '\n\n' + currentLevelData.midText, () => {
      showQuestion(0);
    });
  }

  function showQuestion(index) {
    if (index >= currentLevelData.questions.length) {
      showEnding();
      return;
    }

    gamePhase = 'question';
    currentQuestionIndex = index;
    const q = currentLevelData.questions[index];

    const content = document.getElementById('game-content');
    const diffStars = '⭐'.repeat(q.difficulty);

    content.innerHTML = `
      <div style="padding: 0 20px;">
        <div class="question-card">
          <span class="question-num">第 ${index + 1} 题</span>
          <div class="question-difficulty">难度 ${diffStars}</div>
          <div class="question-text">${q.question}</div>
        </div>
        <div id="options-container"></div>
        <div id="explanation-area"></div>
      </div>
    `;

    const optionsContainer = document.getElementById('options-container');
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      const letter = String.fromCharCode(65 + i);
      btn.innerHTML = `<span class="option-letter">${letter}</span>${opt}`;
      btn.onclick = () => selectOption(i, btn);
      optionsContainer.appendChild(btn);
    });

    document.getElementById('action-area').innerHTML = '';
    scrollToBottom();
  }

  function selectOption(optIndex, btn) {
    if (gamePhase !== 'question') return;

    const q = currentLevelData.questions[currentQuestionIndex];
    const isCorrect = optIndex === q.correctIndex;
    const options = document.querySelectorAll('.option-btn');

    options.forEach((b, i) => {
      b.disabled = true;
      if (i === q.correctIndex) {
        b.classList.add('correct');
      } else if (i === optIndex && !isCorrect) {
        b.classList.add('wrong');
      }
    });

    levelAnswers.push({
      question: q.question,
      correct: isCorrect,
      userAnswer: q.options[optIndex],
      correctAnswer: q.options[q.correctIndex],
      explanation: q.explanation
    });

    if (isCorrect) {
      correctCount++;
      score += 100;
      AudioSystem.correct();
      showToast('回答正确！+100分', 'success');
    } else {
      hp--;
      updateHpDisplay();
      AudioSystem.wrong();
      showToast('回答错误 -1❤', 'error');

      if (hp <= 0) {
        setTimeout(() => showGameOver(), 800);
        return;
      }
    }

    const expArea = document.getElementById('explanation-area');
    expArea.innerHTML = `
      <div class="explanation-card">
        <div class="exp-label">📚 知识解析</div>
        <div class="exp-text">${q.explanation}</div>
      </div>
    `;

    gamePhase = 'answered';
    const actionArea = document.getElementById('action-area');
    const isLast = currentQuestionIndex >= currentLevelData.questions.length - 1;
    actionArea.innerHTML = `
      <button class="primary-btn" onclick="nextQuestion()">${isLast ? '查看结果 →' : '下一题 →'}</button>
    `;

    scrollToBottom();
  }

  function nextQuestion() {
    const next = currentQuestionIndex + 1;
    if (next >= currentLevelData.questions.length) {
      showEnding();
    } else {
      showQuestion(next);
    }
  }

  function showEnding() {
    gamePhase = 'ending';
    document.getElementById('game-content').innerHTML = '';
    document.getElementById('action-area').innerHTML = '';
    typeText(currentLevelData.ending, () => {
      setTimeout(() => showLevelResult(), 500);
    });
  }

  function showLevelResult() {
    const bonusHpScore = hp * 50;
    const levelScore = correctCount * 100 + bonusHpScore + (score - (correctCount * 100));
    const actualLevelScore = correctCount * 100 + bonusHpScore;
    themeScore += actualLevelScore;

    gameData.progress[currentTheme.id] = Math.max(
      gameData.progress[currentTheme.id] || 0,
      currentLevelIndex + 1
    );
    gameData.scores[currentTheme.id + '_lvl_' + currentLevelIndex] = Math.max(
      gameData.scores[currentTheme.id + '_lvl_' + currentLevelIndex] || 0,
      actualLevelScore
    );
    gameData.currentTheme = currentTheme.id;
    gameData.currentLevel = currentLevelIndex + 1;
    saveData();

    document.getElementById('result-score').textContent = actualLevelScore;
    document.getElementById('result-correct').textContent = `${correctCount}/${currentLevelData.questions.length}`;
    document.getElementById('result-hp').textContent = hp + ' ❤';
    document.getElementById('result-total').textContent = themeScore;

    const isPerfect = correctCount === currentLevelData.questions.length;
    if (isPerfect) {
      document.getElementById('result-icon').textContent = '🌟';
      document.getElementById('result-title').textContent = '完美通关！';
      document.getElementById('result-subtitle').textContent = '全部答对，你太厉害了！';
    } else {
      document.getElementById('result-icon').textContent = '🎉';
      document.getElementById('result-title').textContent = '本关通过！';
      document.getElementById('result-subtitle').textContent = '干得漂亮，继续前进吧';
    }

    const expList = document.getElementById('result-explanations-list');
    expList.innerHTML = '';
    levelAnswers.forEach((a, i) => {
      const item = document.createElement('div');
      item.className = 'result-exp-item' + (a.correct ? '' : ' wrong');
      item.innerHTML = `
        <div class="exp-q">${i + 1}. ${a.question}</div>
        <div class="exp-a">${a.correct ? '✓' : '✗'} 正确答案：${a.correctAnswer}</div>
        <div class="exp-desc">${a.explanation}</div>
      `;
      expList.appendChild(item);
    });

    const isLastLevel = currentLevelIndex >= currentTheme.levels.length - 1;
    const nextBtn = document.getElementById('result-next-btn');
    if (isLastLevel) {
      nextBtn.textContent = '查看结局 🏆';
    } else {
      nextBtn.textContent = currentLevelData.nextHint || '下一关 →';
    }

    checkAchievements();
    showScreen('result-screen');
  }

  function nextLevel() {
    const next = currentLevelIndex + 1;
    if (next >= currentTheme.levels.length) {
      showThemeEnd();
    } else {
      loadLevel(next);
    }
  }

  function replayLevel() {
    hp = 3;
    score = 0;
    loadLevel(currentLevelIndex);
  }

  function replayTheme() {
    startTheme(currentTheme.id);
  }

  function showGameOver() {
    AudioSystem.fail();
    showModal({
      icon: '💔',
      title: '冒险失败',
      desc: '你已用完所有生命值。\n要重新挑战这一关吗？',
      confirmText: '重玩本关',
      cancelText: '返回首页',
      onConfirm: () => {
        closeModal();
        replayLevel();
      },
      onCancel: () => {
        closeModal();
        goHome();
      }
    });
  }

  function showThemeEnd() {
    AudioSystem.victory();
    let totalScore = 0;
    for (let i = 0; i < currentTheme.levels.length; i++) {
      totalScore += gameData.scores[currentTheme.id + '_lvl_' + i] || 0;
    }

    gameData.scores[currentTheme.id] = Math.max(
      gameData.scores[currentTheme.id] || 0,
      themeScore
    );
    saveData();

    const maxScore = currentTheme.levels.length * 3 * 100 + 5 * 50 * currentTheme.levels.length;
    const ratio = themeScore / maxScore;
    let rank = 'C';
    let rankClass = 'rank-c';
    if (ratio >= 0.9) { rank = 'S'; rankClass = 'rank-s'; }
    else if (ratio >= 0.75) { rank = 'A'; rankClass = 'rank-a'; }
    else if (ratio >= 0.6) { rank = 'B'; rankClass = 'rank-b'; }

    document.getElementById('theme-end-sub').textContent = `你已完成${currentTheme.title}`;
    document.getElementById('theme-end-score').textContent = themeScore;
    const rankBadge = document.getElementById('rank-badge');
    rankBadge.textContent = rank;
    rankBadge.className = 'rank-badge ' + rankClass;

    const lastLevel = currentTheme.levels[currentTheme.levels.length - 1];
    document.getElementById('ending-text').textContent = lastLevel.endingText || lastLevel.ending;

    const newAchDiv = document.getElementById('new-achievements');
    const newAchList = document.getElementById('new-achievements-list');
    if (unlockedAchievementsThisRun.length > 0) {
      newAchDiv.style.display = 'block';
      newAchList.innerHTML = '';
      unlockedAchievementsThisRun.forEach((ach, i) => {
        const item = document.createElement('div');
        item.className = 'achievement-item';
        item.style.animationDelay = (i * 0.1) + 's';
        item.innerHTML = `
          <div class="ach-icon">${ach.icon}</div>
          <div class="ach-info">
            <div class="ach-name">${ach.name}</div>
            <div class="ach-desc">${ach.desc}</div>
          </div>
        `;
        newAchList.appendChild(item);
      });
    } else {
      newAchDiv.style.display = 'none';
    }

    setTimeout(() => launchConfetti(), 300);

    showScreen('theme-end-screen');
  }

  // ==================== ACHIEVEMENTS ====================
  function checkAchievements() {
    const stats = computeStats();

    ACHIEVEMENTS.forEach(ach => {
      if (!gameData.achievements.includes(ach.id) && ach.condition(stats)) {
        gameData.achievements.push(ach.id);
        unlockedAchievementsThisRun.push(ach);
        setTimeout(() => {
          AudioSystem.achievement();
          showToast(`🏆 成就解锁：${ach.name}`, 'success');
        }, 500);
      }
    });
    saveData();
  }

  function computeStats() {
    let levelsCompleted = 0;
    let themesCompleted = 0;
    let perfectLevels = 0;
    let fullHpThemes = 0;
    let chibiCompleted = false;

    for (const tid in gameData.progress) {
      const theme = THEMES.find(t => t.id === tid);
      if (!theme) continue;
      const prog = gameData.progress[tid];
      levelsCompleted += prog;
      if (prog >= theme.levelCount) {
        themesCompleted++;
        if (tid === 'chibi') chibiCompleted = true;
      }
    }

    for (const key in gameData.scores) {
      if (key.endsWith('_lvl_0') || key.includes('_lvl_')) {
        const parts = key.split('_lvl_');
        const tid = parts[0];
        const theme = THEMES.find(t => t.id === tid);
        if (!theme) continue;
        const lvlIdx = parseInt(parts[1]);
        const level = theme.levels[lvlIdx];
        if (level) {
          const maxScore = level.questions.length * 100 + 250;
          if (gameData.scores[key] >= maxScore) {
            perfectLevels++;
          }
        }
      }
    }

    return {
      levelsCompleted,
      themesCompleted,
      perfectLevels,
      fullHpThemes,
      chibiCompleted
    };
  }

  function showAchievements() {
    const grid = document.getElementById('achievement-grid');
    grid.innerHTML = '';

    ACHIEVEMENTS.forEach(ach => {
      const unlocked = gameData.achievements.includes(ach.id);
      const card = document.createElement('div');
      card.className = 'ach-card' + (unlocked ? '' : ' locked');
      card.innerHTML = `
        <div class="ach-icon">${ach.icon}</div>
        <div class="ach-name">${ach.name}</div>
        <div class="ach-desc">${ach.desc}</div>
      `;
      grid.appendChild(card);
    });

    const hsList = document.getElementById('highscore-list');
    hsList.innerHTML = '';
    const scores = [];
    THEMES.forEach(t => {
      const s = gameData.scores[t.id] || 0;
      if (s > 0) scores.push({ name: t.title, score: s });
    });
    scores.sort((a, b) => b.score - a.score);

    if (scores.length === 0) {
      hsList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:0.9rem;">暂无记录，快去冒险吧！</div>';
    } else {
      scores.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'highscore-item';
        item.innerHTML = `
          <div class="hs-rank">${i + 1}</div>
          <div class="hs-name">${s.name}</div>
          <div class="hs-score">${s.score}</div>
        `;
        hsList.appendChild(item);
      });
    }

    showScreen('achievements-screen');
  }

  // ==================== MODAL ====================
  let modalCallback = null;
  let modalCancelCallback = null;

  function showModal({ icon, title, desc, confirmText = '确定', cancelText = '取消', onConfirm, onCancel }) {
    document.getElementById('modal-icon').textContent = icon;
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-desc').textContent = desc;
    document.getElementById('modal-confirm').textContent = confirmText;
    document.getElementById('modal-cancel').textContent = cancelText;
    modalCallback = onConfirm;
    modalCancelCallback = onCancel;
    document.getElementById('modal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('active');
    if (modalCancelCallback) modalCancelCallback();
    modalCallback = null;
    modalCancelCallback = null;
  }

  function modalConfirm() {
    document.getElementById('modal').classList.remove('active');
    if (modalCallback) modalCallback();
    modalCallback = null;
    modalCancelCallback = null;
  }

  function confirmQuit() {
    showModal({
      icon: '🤔',
      title: '确定要退出吗？',
      desc: '当前进度会自动保存，下次可以继续',
      confirmText: '退出',
      cancelText: '继续玩',
      onConfirm: () => {
        closeModal();
        goHome();
      },
      onCancel: () => {}
    });
  }

  function showAbout() {
    showModal({
      icon: '🎮',
      title: '关于知识大冒险',
      desc: '一款边玩边学的知识闯关小游戏。\n用剧情+答题的方式，让学习变得有趣。\n\n参赛：TRAE AI 创造力大赛\n赛道：学习工作\n开发工具：TRAE IDE',
      confirmText: '开始冒险',
      cancelText: '关闭',
      onConfirm: () => {
        closeModal();
      },
      onCancel: () => {}
    });
  }

  // ==================== CONFETTI ====================
  function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = ['#e85d3a', '#3a8ee8', '#f39c12', '#27ae60', '#9b59b6'];
    const confetti = [];
    for (let i = 0; i < 100; i++) {
      confetti.push({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * 200,
        size: 6 + Math.random() * 6,
        color: colors[Math.floor(Math.random() * colors.length)],
        speedY: 2 + Math.random() * 3,
        speedX: -2 + Math.random() * 4,
        rotation: Math.random() * 360,
        rotSpeed: -5 + Math.random() * 10
      });
    }

    let frame = 0;
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      confetti.forEach(c => {
        c.y += c.speedY;
        c.x += c.speedX;
        c.rotation += c.rotSpeed;
        if (c.y < canvas.height + 20) alive = true;

        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rotation * Math.PI / 180);
        ctx.fillStyle = c.color;
        ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size * 0.6);
        ctx.restore();
      });

      frame++;
      if (alive && frame < 200) {
        requestAnimationFrame(animate);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }
    animate();
  }

  // ==================== UTILS ====================
  function scrollToBottom() {
    setTimeout(() => {
      window.scrollTo({
        top: document.body.scrollHeight,
        behavior: 'smooth'
      });
    }, 100);
  }

  function shareResult() {
    if (!currentTheme) return;

    const rankBadge = document.getElementById('rank-badge');
    const rank = rankBadge ? rankBadge.textContent : '';
    const text = `🎮 我在《知识大冒险》中通关了「${currentTheme.title}」！\n🏆 评级：${rank}\n⭐ 总得分：${themeScore}分\n\n边玩边学，不知不觉就涨知识了！快来试试吧～`;

    if (navigator.share) {
      navigator.share({
        title: '知识大冒险 - 通关成绩',
        text: text,
        url: window.location.href
      }).catch(() => {});
    } else {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => {
          showToast('成绩已复制到剪贴板', 'success');
        }).catch(() => {
          fallbackShare(text);
        });
      } else {
        fallbackShare(text);
      }
    }
  }

  function fallbackShare(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text + '\n' + window.location.href;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      showToast('成绩已复制到剪贴板', 'success');
    } catch (e) {
      showToast('复制失败，请手动复制');
    }
    document.body.removeChild(textarea);
  }

  function toggleSound() {
    const enabled = AudioSystem.toggle();
    const btn = document.getElementById('sound-btn');
    if (btn) {
      btn.textContent = enabled ? '🔊 音效' : '🔇 静音';
    }
    showToast(enabled ? '音效已开启' : '音效已关闭');
  }

  function goHome() {
    renderHome();
    showScreen('home-screen');
  }

  // ==================== INIT ====================
  window.onload = () => {
    AudioSystem.init();
    renderHome();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(err => {
        console.log('SW registration failed:', err);
      });
    }
  };

  window.addEventListener('resize', () => {
    const canvas = document.getElementById('confetti-canvas');
    if (canvas) {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
  });
  </script>
