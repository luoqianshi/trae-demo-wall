<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习思维帮 - AI 引导式学习解析</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6; --primary-dark: #2563eb; --primary-light: #60a5fa;
            --accent: #10b981; --accent-dark: #059669; --danger: #ef4444; --warning: #f59e0b;
            --text: #1e293b; --text-light: #64748b; --text-soft: #94a3b8;
            --bg: #f8fafc; --bg-card: #ffffff; --border: #e2e8f0;
            --shadow: 0 8px 32px rgba(15,23,42,0.07); --shadow-sm: 0 2px 12px rgba(15,23,42,0.04);
            --gradient-start: #3b82f6; --gradient-end: #8b5cf6;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden;}
        .app-container{min-height:100vh;display:flex;flex-direction:column;}

        /* Header */
        .header{background:linear-gradient(135deg,var(--gradient-start),var(--gradient-end));color:white;padding:12px 0;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(59,130,246,0.3);}
        .header-inner{max-width:1400px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;}
        .logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;}
        .logo-icon{width:36px;height:36px;background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid rgba(255,255,255,0.3);}
        .nav{display:flex;gap:16px;align-items:center;}
        .nav-item{color:rgba(255,255,255,0.85);text-decoration:none;font-weight:500;font-size:13px;transition:all 0.3s;padding:6px 0;cursor:pointer;border:none;background:none;}
        .nav-item:hover,.nav-item.active{color:white;}
        .nav-item.active{border-bottom:2px solid white;}
        .btn{padding:7px 16px;border-radius:8px;font-weight:600;font-size:13px;border:none;cursor:pointer;transition:all 0.3s;text-decoration:none;display:inline-block;}
        .btn-white{background:white;color:var(--primary-dark);}
        .btn-white:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.15);}
        .btn-sm{padding:5px 12px;font-size:12px;border-radius:6px;}
        .btn-outline{padding:5px 12px;font-size:12px;border-radius:6px;background:white;border:1px solid var(--border);color:var(--text-light);cursor:pointer;transition:all 0.2s;}
        .btn-outline:hover{background:#fef2f2;border-color:#fca5a5;color:#991b1b;}

        /* Main Content - 3 column */
        .main-content{flex:1;max-width:1400px;width:100%;margin:0 auto;padding:20px;display:grid;grid-template-columns:340px 1fr 320px;gap:20px;transition:all 0.3s;}
        .main-content.graph-hidden{grid-template-columns:340px 1fr 0px;}
        .main-content.graph-hidden .knowledge-graph-panel{display:none;}

        /* Sidebar */
        .sidebar{position:sticky;top:76px;align-self:flex-start;max-height:calc(100vh - 100px);overflow-y:auto;}
        .sidebar::-webkit-scrollbar{width:4px;}
        .sidebar::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px;}
        .card{background:var(--bg-card);border-radius:14px;padding:18px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:14px;}
        .card-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
        .upload-area{border:2px dashed var(--border);border-radius:10px;padding:18px 12px;text-align:center;cursor:pointer;transition:all 0.3s;margin-bottom:10px;background:var(--bg);}
        .upload-area:hover{border-color:var(--primary);background:#f1f5f9;}
        .upload-icon{font-size:32px;margin-bottom:4px;}
        .upload-text{font-size:12px;color:var(--text-light);}
        .upload-text strong{color:var(--primary);}
        #fileInput,#solFileInput{display:none;}
        textarea{width:100%;min-height:64px;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;transition:all 0.3s;background:var(--bg);}
        textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
        .btn-submit{width:100%;padding:10px;background:linear-gradient(135deg,var(--gradient-start),var(--gradient-end));color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.3s;margin-top:8px;}
        .btn-submit:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,0.3);}
        .btn-submit:disabled{opacity:0.6;cursor:not-allowed;}
        .loading-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .sample-title{font-size:11px;color:var(--text-soft);margin-bottom:6px;margin-top:8px;}
        .sample-buttons{display:flex;flex-wrap:wrap;gap:5px;}
        .sample-btn{padding:5px 10px;background:var(--bg);border:1px solid var(--border);border-radius:50px;font-size:11px;color:var(--text-light);cursor:pointer;transition:all 0.3s;}
        .sample-btn:hover{border-color:var(--primary);color:var(--primary);background:#eff6ff;}
        .image-preview{display:none;margin-top:8px;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
        .image-preview.show{display:block;}
        .image-preview img{width:100%;height:auto;display:block;max-height:100px;object-fit:contain;}

        /* ===== Trae Solo Style: Solution Input Area ===== */
        .solution-card{margin-top:0;}
        .solution-input-wrapper{position:relative;border:1px solid var(--border);border-radius:10px;background:var(--bg);transition:all 0.3s;overflow:hidden;}
        .solution-input-wrapper:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
        .solution-input-wrapper textarea{border:none;border-radius:0;min-height:120px;resize:none;background:transparent;padding:12px 12px 8px 12px;font-size:13px;line-height:1.7;}
        .solution-input-wrapper textarea:focus{outline:none;box-shadow:none;}

        /* Input Toolbar */
        .input-toolbar{display:flex;align-items:center;gap:4px;padding:6px 10px;border-top:1px solid var(--border);background:white;flex-wrap:wrap;}
        .toolbar-btn{width:30px;height:30px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s;color:var(--text-light);position:relative;flex-shrink:0;}
        .toolbar-btn:hover{background:var(--bg);color:var(--primary);}
        .toolbar-btn .tooltip{display:none;position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:#1e293b;color:white;font-size:10px;padding:3px 8px;border-radius:4px;white-space:nowrap;pointer-events:none;z-index:10;}
        .toolbar-btn:hover .tooltip{display:block;}
        .toolbar-btn.recording{background:#fef2f2;color:var(--danger);animation:pulse 1s infinite;}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
        .toolbar-model-select{height:30px;padding:0 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;background:white;color:var(--text);cursor:pointer;flex-shrink:0;}
        .toolbar-model-select:focus{outline:none;border-color:var(--primary);}
        .toolbar-spacer{flex:1;}
        .toolbar-submit-btn{width:32px;height:32px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--gradient-start),var(--gradient-end));color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;transition:all 0.3s;flex-shrink:0;}
        .toolbar-submit-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,0.3);}
        .toolbar-submit-btn:disabled{opacity:0.5;cursor:not-allowed;}

        /* Analysis Area */
        .analysis-area{display:flex;flex-direction:column;gap:16px;min-height:400px;}
        .step-container{background:var(--bg-card);border-radius:14px;padding:22px;box-shadow:var(--shadow);border:1px solid var(--border);opacity:0;transform:translateY(16px);animation:fadeInUp 0.4s ease forwards;}
        .step-container:nth-child(1){animation-delay:0.05s}
        .step-container:nth-child(2){animation-delay:0.12s}
        .step-container:nth-child(3){animation-delay:0.19s}
        .step-container:nth-child(4){animation-delay:0.26s}
        .step-container:nth-child(5){animation-delay:0.33s}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0);}}
        .step-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--border);}
        .step-number{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--gradient-start),var(--gradient-end));color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}
        .step-info h3{font-size:16px;font-weight:700;margin-bottom:1px;}
        .step-info p{font-size:12px;color:var(--text-light);}

        /* ===== Knowledge Tags ===== */
        .knowledge-tags{display:flex;flex-wrap:nowrap;gap:8px;margin-top:10px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin;}
        .knowledge-tags::-webkit-scrollbar{height:3px;}
        .knowledge-tags::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
        .knowledge-tag{padding:6px 14px;background:linear-gradient(135deg,#eff6ff,#dbeafe);border:2px solid #bfdbfe;border-radius:50px;color:var(--primary-dark);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.3s;position:relative;white-space:nowrap;}
        .knowledge-tag:hover{background:#dbeafe;transform:translateY(-1px);}
        .knowledge-tag.main{background:linear-gradient(135deg,var(--gradient-start),var(--gradient-end));color:white;border:none;}
        .knowledge-tag.expanded{border-color:var(--primary);box-shadow:0 0 0 2px rgba(59,130,246,0.2);}
        .knowledge-tag .tag-badge{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;}
        .tag-badge.correct{background:var(--accent);color:white;}
        .tag-badge.wrong{background:var(--danger);color:white;}

        /* ===== Knowledge Quiz Options ===== */
        .knowledge-quiz{margin-top:8px;display:none;}
        .knowledge-quiz.show{display:block;animation:fadeInUp 0.3s ease;}
        .quiz-option{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;margin-bottom:6px;background:white;border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:all 0.2s;font-size:12px;color:var(--text);}
        .quiz-option:hover{border-color:var(--primary-light);background:#f8fafc;}
        .quiz-option.selected{border-color:var(--primary);background:#eff6ff;}
        .quiz-option .quiz-check{width:20px;height:20px;border-radius:4px;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.2s;flex-shrink:0;margin-top:1px;}
        .quiz-option.selected .quiz-check{background:var(--primary);border-color:var(--primary);color:white;}
        .quiz-option .quiz-feedback{display:none;font-size:11px;margin-left:auto;flex-shrink:0;white-space:nowrap;}
        .quiz-option .quiz-feedback.show{display:block;}
        .quiz-option.correct-result{border-color:#86efac;background:#f0fdf4;}
        .quiz-option.wrong-result{border-color:#fca5a5;background:#fef2f2;}
        .quiz-option.unsure-option{background:#fffbeb;border-color:#fde68a;border-style:dashed;}
        .quiz-option.unsure-option.selected{background:#fef3c7;border-color:#f59e0b;}
        .quiz-option .quiz-link{display:none;font-size:10px;color:var(--primary);margin-top:2px;cursor:pointer;}
        .quiz-option .quiz-link.show{display:inline-block;}

        .quiz-submit-btn{padding:7px 16px;background:var(--primary);color:white;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.3s;margin-top:8px;}
        .quiz-submit-btn:hover:not(:disabled){background:var(--primary-dark);}
        .quiz-submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
        .quiz-submit-btn.done{background:var(--accent);}

        /* Knowledge Content Panel */
        .knowledge-content{display:none;margin-top:10px;padding:16px;background:#f8fafc;border-radius:10px;border:1px solid var(--border);}
        .knowledge-content.show{display:block;animation:fadeInUp 0.3s ease;}
        .knowledge-content h4{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--primary-dark);}
        .kc-section{margin-bottom:10px;}
        .kc-section:last-child{margin-bottom:0;}
        .kc-label{font-size:11px;font-weight:600;color:var(--primary);text-transform:uppercase;margin-bottom:4px;}
        .kc-text{font-size:12px;color:var(--text-light);line-height:1.7;}
        .formula-box{background:white;border:1px solid var(--border);border-radius:8px;padding:10px;margin:6px 0;font-family:'Noto Serif SC',serif;font-size:13px;text-align:center;}
        .error-point{display:inline-block;padding:3px 8px;margin:2px;background:#fef2f2;border-radius:4px;font-size:11px;color:#991b1b;}

        /* AI Solution Analysis */
        .solution-analysis{margin-top:8px;padding:12px;border-radius:8px;font-size:12px;line-height:1.7;}
        .solution-analysis.correct{background:#f0fdf4;border:1px solid #86efac;color:#166534;}
        .solution-analysis.wrong{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;}

        /* Guiding Questions */
        .question-card{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px;margin-bottom:10px;transition:all 0.3s;cursor:pointer;}
        .question-card:hover{transform:translateX(3px);box-shadow:var(--shadow-sm);}
        .question-card p{color:#166534;font-size:13px;line-height:1.7;}
        .question-number{display:inline-block;width:20px;height:20px;background:var(--accent);color:white;border-radius:50%;text-align:center;font-size:11px;font-weight:600;margin-right:6px;line-height:20px;}
        .hint-reveal{background:#f1f5f9;border:1px dashed var(--border);border-radius:8px;padding:12px;margin-top:8px;cursor:pointer;transition:all 0.3s;}
        .hint-reveal:hover{background:#e2e8f0;}
        .hint-content{display:none;color:var(--text-light);font-size:12px;}
        .hint-content.show{display:block;}

        /* Solution Steps */
        .solution-step{border-left:3px solid var(--primary-light);padding-left:20px;padding-bottom:18px;position:relative;}
        .solution-step:last-child{padding-bottom:0;}
        .solution-step::before{content:'';position:absolute;left:-5px;top:0;width:8px;height:8px;background:var(--primary);border-radius:50%;}
        .solution-step h4{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--primary-dark);}
        .solution-step p{color:var(--text-light);font-size:13px;line-height:1.8;}
        .formula{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:12px;margin:8px 0;font-family:'Noto Serif SC',serif;font-size:14px;text-align:center;}
        .final-answer{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #86efac;border-radius:12px;padding:18px;}
        .final-answer h4{font-size:14px;color:#166534;margin-bottom:10px;}
        .answer-content{font-size:15px;font-weight:600;color:#14532d;text-align:center;}

        /* Feedback */
        .feedback-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px;}
        .feedback-card{padding:14px;border-radius:10px;border:1px solid var(--border);text-align:center;}
        .feedback-card.mastery{background:#f0fdf4;border-color:#bbf7d0;}
        .feedback-card.needs-work{background:#fef3c7;border-color:#fde68a;}
        .feedback-card.related{background:#eff6ff;border-color:#bfdbfe;}
        .feedback-card h4{font-size:12px;font-weight:600;margin-bottom:8px;}
        .feedback-card.mastery h4{color:#166534;}
        .feedback-card.needs-work h4{color:#92400e;}
        .feedback-card.related h4{color:#1e40af;}
        .feedback-item{display:inline-block;padding:4px 8px;margin:2px;font-size:11px;border-radius:4px;background:rgba(255,255,255,0.5);}
        .feedback-summary{margin-top:14px;padding:14px;background:#f8fafc;border-radius:10px;border:1px solid var(--border);font-size:12px;color:var(--text-light);line-height:1.8;}

        /* Knowledge Graph Panel */
        .knowledge-graph-panel{position:sticky;top:76px;align-self:flex-start;max-height:calc(100vh - 100px);display:flex;flex-direction:column;}
        .graph-card{background:var(--bg-card);border-radius:14px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--border);flex:1;display:flex;flex-direction:column;min-height:0;}
        .graph-card h3{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
        .graph-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-right:4px;}
        .graph-scroll::-webkit-scrollbar{width:4px;}
        .graph-scroll::-webkit-scrollbar-track{background:transparent;}
        .graph-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px;}
        .mind-map{position:relative;}
        .mind-map svg{width:100%;height:auto;}
        .mind-node{cursor:pointer;transition:all 0.3s;}
        .mind-node:hover rect{filter:brightness(1.08);}
        .mind-node.active rect{stroke:#fbbf24!important;stroke-width:2.5!important;}
        .node-detail{display:none;margin-top:10px;padding:12px;background:#f8fafc;border-radius:8px;border:1px solid var(--border);font-size:12px;line-height:1.7;}
        .node-detail.show{display:block;}
        .node-detail h4{font-size:13px;font-weight:600;margin-bottom:6px;color:var(--primary-dark);}
        .node-detail ul{margin-left:16px;color:var(--text-light);}
        .node-detail li{margin-bottom:2px;}

        /* ===== Graph Chapter List ===== */
        .graph-chapter-list{display:none;margin-top:10px;padding:12px;background:#fffbeb;border-radius:10px;border:1px solid #fde68a;}
        .graph-chapter-list.show{display:block;}
        .graph-chapter-list h4{font-size:12px;font-weight:600;color:#92400e;margin-bottom:8px;}
        .graph-chapter-item{padding:8px 12px;margin-bottom:6px;background:white;border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
        .graph-chapter-item:hover{background:#eff6ff;border-color:var(--primary);color:var(--primary-dark);}
        .graph-chapter-item:last-child{margin-bottom:0;}
        .graph-chapter-item .chapter-icon{font-size:14px;}

        /* ===== Graph Solution Steps ===== */
        .graph-solution-steps{display:none;margin-top:10px;padding:12px;background:#f0fdf4;border-radius:10px;border:1px solid #bbf7d0;}
        .graph-solution-steps.show{display:block;}
        .graph-solution-steps h4{font-size:12px;font-weight:600;color:#166534;margin-bottom:8px;}
        .graph-solution-steps .gs-step{padding:6px 10px;margin-bottom:4px;background:white;border-radius:6px;font-size:11px;color:var(--text-light);line-height:1.6;display:flex;align-items:flex-start;gap:6px;}
        .graph-solution-steps .gs-step:last-child{margin-bottom:0;}
        .graph-solution-steps .gs-step-num{width:20px;height:20px;border-radius:50%;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}

        /* ===== Graph: Knowledge Detail Section ===== */
        .graph-knowledge-detail{display:none;margin-top:10px;padding:12px;background:#f8fafc;border-radius:10px;border:1px solid var(--border);}
        .graph-knowledge-detail.show{display:block;}
        .graph-knowledge-detail h4{font-size:12px;font-weight:600;color:var(--primary-dark);margin-bottom:8px;}
        .graph-knowledge-detail .gkd-item{padding:8px 10px;margin-bottom:6px;background:white;border-radius:6px;border-left:3px solid var(--primary);font-size:11px;color:var(--text-light);line-height:1.6;cursor:pointer;transition:all 0.2s;}
        .graph-knowledge-detail .gkd-item:hover{background:#eff6ff;transform:translateX(2px);}
        .graph-knowledge-detail .gkd-item:last-child{margin-bottom:0;}
        .graph-knowledge-detail .gkd-item strong{color:var(--primary-dark);}

        /* ===== Graph: Needs Work Section ===== */
        .graph-needs-work{display:none;margin-top:10px;padding:12px;background:#fff7ed;border-radius:10px;border:1px solid #fed7aa;}
        .graph-needs-work.show{display:block;}
        .graph-needs-work h4{font-size:12px;font-weight:600;color:#c2410c;margin-bottom:8px;}
        .graph-needs-work .gnw-item{padding:10px;margin-bottom:6px;background:white;border-radius:8px;border:1px solid #fed7aa;font-size:11px;line-height:1.6;}
        .graph-needs-work .gnw-item:last-child{margin-bottom:0;}
        .graph-needs-work .gnw-item .gnw-name{font-weight:600;color:#c2410c;font-size:12px;margin-bottom:3px;}
        .graph-needs-work .gnw-item .gnw-text{color:var(--text-light);}
        .graph-needs-work .gnw-item .gnw-tip{padding:4px 8px;margin-top:4px;background:#fff7ed;border-radius:4px;font-size:10px;color:#92400e;}

        /* ===== Graph Section Indicator ===== */
        .graph-section-indicator{display:none;padding:8px 12px;margin-bottom:8px;background:#eff6ff;border-radius:8px;border:1px solid #bfdbfe;font-size:11px;color:var(--primary-dark);font-weight:600;text-align:center;transition:all 0.3s;}
        .graph-section-indicator.show{display:block;animation:fadeInUp 0.3s ease;}
        .graph-section-indicator .gsi-icon{font-size:14px;margin-right:4px;}

        /* Similar Problems */

        .eb-item{padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;background:var(--bg);}
        .eb-item h4{font-size:14px;font-weight:600;margin-bottom:4px;}
        .eb-item p{font-size:12px;color:var(--text-light);}
        .eb-item .eb-meta{font-size:11px;color:var(--text-soft);margin-top:4px;}
        .eb-empty{text-align:center;padding:40px;color:var(--text-soft);}
        .btn-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-light);padding:4px 8px;border-radius:6px;}

        .empty-state{text-align:center;padding:60px 20px;color:var(--text-light);}

        .footer{background:var(--bg-card);border-top:1px solid var(--border);padding:16px 0;margin-top:30px;}

        .mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top:1px solid var(--border);padding:8px 14px;z-index:99;}

        @media(max-width:1200px){

        function handleImage(file, type) {
            const reader = new FileReader();
            reader.onload = (e) => {
                if (type === 'question') {
                    previewImg.src = e.target.result;
                    imagePreview.classList.add('show');
                } else {
                    document.getElementById('userSolution').value += '\n[📸 已上传解题过程图片]';
                    // Trigger auto-grow
                    const ta = document.getElementById('userSolution');
                    ta.style.height = 'auto';
                    ta.style.height = Math.max(120, ta.scrollHeight) + 'px';
                }
            };
            reader.readAsDataURL(file);
        }

        // ===== VOICE INPUT =====
        let isRecording = false;
        let currentRecognition = null;
        function toggleVoice() {
            const btn = document.getElementById('voiceBtn');
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('抱歉，您的浏览器不支持语音输入。请使用 Chrome 浏览器。');
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!isRecording) {
                const recognition = new SpeechRecognition();
                currentRecognition = recognition;
                recognition.lang = 'zh-CN';
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.onresult = (event) => {
                    const text = event.results[0][0].transcript;
                    document.getElementById('userSolution').value += text;
                    btn.classList.remove('recording');
                    isRecording = false;
                    currentRecognition = null;
                    // Auto-grow
                    const ta = document.getElementById('userSolution');
                    ta.style.height = 'auto';
                    ta.style.height = Math.max(120, ta.scrollHeight) + 'px';
                };
                recognition.onerror = () => {
                    btn.classList.remove('recording');
                    isRecording = false;
                    currentRecognition = null;
                };
                recognition.onend = () => {
                    btn.classList.remove('recording');
                    isRecording = false;
                    currentRecognition = null;
                };
                recognition.start();
                btn.classList.add('recording');
                isRecording = true;
            } else {
                if (currentRecognition) {
                    currentRecognition.abort();
                    currentRecognition = null;
                }
                btn.classList.remove('recording');
                isRecording = false;
            }
        }

            else if (text.includes('方程') || text.includes('x²')) currentData = sampleData.algebra;
            else if (text.includes('单调') || text.includes('极值') || text.includes('f(x)')) currentData = sampleData.calculus;

            // Reset state
            knowledgeResults = {};
            knowledgeSubmitted = false;
            knowledgeQuizState = {};
            knowledgeQuizResults = {};
            activeKnowledgeTag = null;
            judgmentResults = [];
            currentData.guidingQuestions.forEach(() => judgmentResults.push(null));

            userSolutionCorrect = null;
            if (userSol) {
                if (text.includes('三角形')) userSolutionCorrect = userSol.includes('30');
                else if (text.includes('方程')) userSolutionCorrect = (userSol.includes('2') && userSol.includes('3'));
                else if (text.includes('单调') || text.includes('极值')) userSolutionCorrect = userSol.includes('递增') && userSol.includes('递减') && userSol.includes('极大') && userSol.includes('极小');

        // ===== SAFE GRAPH SCROLL HELPER =====
        function scrollGraphTo(targetEl) {
            const gs = document.getElementById('graphScroll');
            if (!gs || !targetEl) return;
            const containerTop = gs.getBoundingClientRect().top;
            const targetTop = targetEl.getBoundingClientRect().top;
            const offset = targetTop - containerTop + gs.scrollTop - 8;
            gs.scrollTo({ top: Math.max(0, offset), behavior: 'smooth' });
        }

        // ===== SCROLL-DRIVEN GRAPH SECTION OBSERVER =====
        let activeGraphSection = null;
        let lastObserverTime = 0;
        function setupScrollObserver() {
            const sectionMap = [
                { stepId: 'knowledgeStep',   sectionId: 'graphKnowledgeDetail', icon: '📚', label: '知识图谱详解', action: () => renderGraphKnowledgeDetail() },
                { stepId: 'guidingStep',     sectionId: 'graphChapterList',     icon: '📖', label: '相关课本章节', action: () => {} },
                { stepId: 'solutionStep',    sectionId: 'graphSolutionSteps',   icon: '📋', label: '完整解题过程', action: () => showSolutionStepsInGraph() },
                { stepId: 'finalAnswerStep', sectionId: 'similarProblems',      icon: '🎯', label: '举一反三',       action: () => renderSimilarProblems() },
                { stepId: 'feedbackStep',    sectionId: 'graphNeedsWork',       icon: '⚠️', label: '需要加强的详细内容', action: () => renderGraphNeedsWork() },
            ];

            const observerOptions = { threshold: 0.2, rootMargin: '-40px 0px -10% 0px' };

            const observer = new IntersectionObserver((entries) => {
                // Debounce: skip if triggered within 300ms
                const now = Date.now();
                if (now - lastObserverTime < 300) return;
                lastObserverTime = now;

                let bestEntry = null;
                let bestRatio = 0;
                entries.forEach(entry => {
                    if (entry.isIntersecting && entry.intersectionRatio > bestRatio) {
                        bestRatio = entry.intersectionRatio;
                        bestEntry = entry;
                    }
                });
                if (!bestEntry) return;

                const match = sectionMap.find(m => m.stepId === bestEntry.target.id);
                if (!match) return;
                if (activeGraphSection === match.sectionId) return;
                activeGraphSection = match.sectionId;

                // Hide all other sections
                sectionMap.forEach(m => {
                    const el = document.getElementById(m.sectionId);
                    if (el) el.classList.remove('show');
                });

                // Show matching section
                const targetEl = document.getElementById(match.sectionId);
                if (targetEl) targetEl.classList.add('show');

                // Update section indicator
                const indicator = document.getElementById('graphSectionIndicator');
                if (indicator) {
                    indicator.innerHTML = `<span class="gsi-icon">${match.icon}</span>${match.label}`;
                    indicator.classList.add('show');
                }

                // Execute action
                match.action();

                // Safe scroll graph panel only
                scrollGraphTo(targetEl);
            }, observerOptions);

            sectionMap.forEach(m => {
                const el = document.getElementById(m.stepId);
                if (el) observer.observe(el);
            });
        }

        // ===== RENDER KNOWLEDGE QUIZ =====
        function renderKnowledgeQuiz(kid, contentEl) {
            const d = currentData;
            const kc = d.knowledgeContent[kid];
            if (!kc || !kc.quiz) {
                contentEl.innerHTML = `<h4>📌 ${kid}</h4><p style="font-size:12px;color:var(--text-soft);">暂无测验内容</p>`;
                contentEl.classList.add('show');
                return;
            }
            const qr = knowledgeQuizResults[kid];
            const submitted = qr && qr.submitted;
            const state = knowledgeQuizState[kid] || new Set();
            const bookRef = d.bookRefs[kid] || '';

            let html = `<div class="knowledge-quiz show" id="quiz-${kid}">`;
            html += `<h4 style="margin-bottom:6px;font-size:13px;">📌 ${kid} — 请判断以下陈述是否正确（可多选）</h4>`;

            kc.quiz.forEach((opt, idx) => {
                const isSelected = state.has(idx);
                const isCorrect = submitted ? opt.correct : null;
                let cls = 'quiz-option';
                if (isSelected) cls += ' selected';
                if (submitted && isCorrect === true) cls += ' correct-result';
                if (submitted && isCorrect === false) cls += ' wrong-result';
                html += `<div class="${cls}" data-idx="${idx}" id="quizopt-${kid}-${idx}">
                    <span class="quiz-check">${isSelected ? '✓' : ''}</span>
                    <span style="flex:1">${opt.text}</span>
                    <span class="quiz-feedback${submitted?' show':''}" id="quizfb-${kid}-${idx}">${submitted ? (isCorrect ? '✅ 正确' : '❌ ' + (opt.explain||'错误')) : ''}</span>
                </div>`;
            });

            // "不确定" option
            const unsureIdx = kc.quiz.length;
            const unsureSelected = state.has(unsureIdx);
            html += `<div class="quiz-option unsure-option${unsureSelected?' selected':''}" data-idx="${unsureIdx}" id="quizopt-${kid}-${unsureIdx}">
                <span class="quiz-check">${unsureSelected ? '✓' : ''}</span>
                <span style="flex:1">🤔 不确定 / 以上都不对</span>
                <span class="quiz-feedback${submitted?' show':''}" id="quizfb-${kid}-${unsureIdx}">${submitted ? '💡 建议复习' : ''}</span>
            </div>`;

            if (!submitted) {
                html += `<button class="quiz-submit-btn" id="quizSubmit-${kid}" onclick="submitKnowledgeQuiz('${kid}')">📝 提交判断</button>`;
            } else {
                html += `<button class="quiz-submit-btn done" disabled>✅ 已提交</button>`;
                if (bookRef) {
                    html += `<p style="margin-top:6px;font-size:11px;color:var(--primary);cursor:pointer;" onclick="highlightGraphNode('${kid}')">📖 ${bookRef} — 点击查看课本内容</p>`;
                }
            }
            html += `</div>`;

            contentEl.innerHTML = html;
            contentEl.classList.add('show');

            // Attach click handlers for quiz options
            if (!submitted) {
                document.querySelectorAll(`#quiz-${kid} .quiz-option`).forEach(opt => {
                    opt.addEventListener('click', () => {
                        const idx = parseInt(opt.dataset.idx);
                        if (!knowledgeQuizState[kid]) knowledgeQuizState[kid] = new Set();
                        if (knowledgeQuizState[kid].has(idx)) {
                            knowledgeQuizState[kid].delete(idx);
                        } else {
                            knowledgeQuizState[kid].add(idx);
                        }
                        renderKnowledgeQuiz(kid, contentEl);
                    });
                });
            }
        }

        // ===== SUBMIT KNOWLEDGE QUIZ =====
        function submitKnowledgeQuiz(kid) {
            const d = currentData;
            const kc = d.knowledgeContent[kid];
            if (!kc || !kc.quiz) return;
            const state = knowledgeQuizState[kid] || new Set();
            const unsureIdx = kc.quiz.length;

            if (state.size === 0) {
                alert('请至少选择一个选项');
                return;
            }

            // Calculate results
            const results = { submitted: true, options: [] };
            let correctCount = 0;
            kc.quiz.forEach((opt, idx) => {
                const isCorrect = opt.correct;
                const userSelected = state.has(idx);
                // User is correct if they selected a correct option and didn't mark it as unsure
                const result = isCorrect && userSelected;
                if (result) correctCount++;
                results.options.push({ correct: isCorrect, userSelected, match: result });
            });
            results.unsure = state.has(unsureIdx);

            knowledgeQuizResults[kid] = results;
            knowledgeResults[kid] = kc.quiz.length > 0 ? Math.round((correctCount / kc.quiz.filter(o=>o.correct).length) * 100) : 0;

            // Re-render quiz with results
            const contentEl = document.getElementById('knowledgeContent');
            renderKnowledgeQuiz(kid, contentEl);
            updateFeedbackSummary();
        }

            let html = '<strong>📊 综合分析：</strong><br>';

        // ===== KNOWLEDGE GRAPH =====
        function renderKnowledgeGraph() {
            const d = currentData;
            const container = document.getElementById('mindMapContainer');
            const mainNode = d.knowledge.main;
            const relatedNodes = d.knowledge.related;
            const allNodes = [mainNode, ...relatedNodes];
            const nodeW = 130, nodeH = 34, gapY = 52, startX = 145, startY = 30;

            const links = relatedNodes.map((_, i) => ({ from: 0, to: i + 1 }));
            const totalH = Math.max(relatedNodes.length * gapY + 70, 280);
            const cx = startX;

            let svg = `<svg width="280" height="${totalH}" viewBox="0 0 280 ${totalH}" xmlns="http://www.w3.org/2000/svg">`;
            svg += `<defs>
                <linearGradient id="gMain" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
                <linearGradient id="gSub" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#eff6ff"/><stop offset="100%" stop-color="#dbeafe"/></linearGradient>
                <filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#3b82f6" flood-opacity="0.15"/></filter>
            </defs>`;

            const mainY = startY;
            links.forEach(link => {
                const childY = startY + (link.to) * gapY;
                svg += `<path d="M${cx} ${mainY + nodeH} C${cx} ${(mainY + nodeH + childY) / 2}, ${cx} ${(mainY + nodeH + childY) / 2}, ${cx} ${childY}" stroke="#93c5fd" stroke-width="2" fill="none" stroke-dasharray="4,3"/>`;
            });

            svg += `<g class="mind-node" data-node="${allNodes[0]}" id="gnode-0" style="cursor:pointer" filter="url(#shadow)">
                <rect x="${cx - nodeW/2}" y="${mainY}" width="${nodeW}" height="${nodeH}" rx="17" fill="url(#gMain)" stroke="#3b82f6" stroke-width="2"/>
                <text x="${cx}" y="${mainY + nodeH/2 + 4}" text-anchor="middle" fill="white" font-size="12" font-weight="600" font-family="'Noto Sans SC',sans-serif">${allNodes[0]}</text>
            </g>`;

            relatedNodes.forEach((node, i) => {
                const ny = startY + (i + 1) * gapY;
                svg += `<g class="mind-node" data-node="${node}" id="gnode-${i+1}" style="cursor:pointer" filter="url(#shadow)">
                    <rect x="${cx - nodeW/2}" y="${ny}" width="${nodeW}" height="${nodeH}" rx="17" fill="url(#gSub)" stroke="#bfdbfe" stroke-width="1.5"/>
                    <text x="${cx}" y="${ny + nodeH/2 + 4}" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="500" font-family="'Noto Sans SC',sans-serif">${node}</text>
                </g>`;
            });

            svg += `</svg>`;
            container.innerHTML = `<div class="mind-map">${svg}</div>`;

            setTimeout(() => {
                const mindNodes = container.querySelectorAll('.mind-node');
                mindNodes.forEach(el => {
                    el.addEventListener('click', function() {
                        const name = this.dataset.node;
                        mindNodes.forEach(n => { n.classList.remove('active'); });
                        this.classList.add('active');
                        const rect = this.querySelector('rect');
                        if (rect) {
                            rect.setAttribute('stroke', '#3b82f6');
                            rect.setAttribute('stroke-width', '2.5');
                        }
                        showNodeDetail(name);
                    });
                });
                const firstNode = container.querySelector('.mind-node');
                if (firstNode) {
                    firstNode.classList.add('active');
                    const rect = firstNode.querySelector('rect');
                    if (rect) { rect.setAttribute('stroke', '#fbbf24'); rect.setAttribute('stroke-width', '2.5'); }
                }
                showNodeDetail(allNodes[0]);
            }, 100);
        }

                }
                if (kc.errors && kc.errors.length > 0) {
                    html += `<div style="margin-top:6px;font-size:11px;"><strong>⚠️ 常见易错点：</strong><span style="color:#991b1b;">${kc.errors.slice(0,2).join('；')}</span></div>`;
                }
            } else {
                html += `<p style="font-size:11px;color:var(--text-soft);">暂无详细内容</p>`;
            }
            if (d.bookRefs[nodeName]) {
                html += `<p style="margin-top:6px;color:var(--primary);font-size:11px;font-weight:500;">📖 课本参考：${d.bookRefs[nodeName]}</p>`;
            }
            detailEl.innerHTML = html;
            const scroll = document.getElementById('graphScroll');
            if (scroll) scrollGraphTo(detailEl);
        }

        function highlightGraphNode(nodeName) {
            const mindNodes = document.querySelectorAll('#mindMapContainer .mind-node');
            mindNodes.forEach(n => {
                n.classList.remove('active');
                const rect = n.querySelector('rect');
                if (rect && n.dataset.node !== nodeName) {
                    if (n.id === 'gnode-0') {
                        rect.setAttribute('stroke', '#3b82f6');
                    } else {
                        rect.setAttribute('stroke', '#bfdbfe');
                    }
                    rect.setAttribute('stroke-width', n.id === 'gnode-0' ? '2' : '1.5');
                }
            });
            const targetNode = document.querySelector(`#mindMapContainer .mind-node[data-node="${nodeName}"]`);
            if (targetNode) {
                targetNode.classList.add('active');
                const rect = targetNode.querySelector('rect');
                if (rect) { rect.setAttribute('stroke', '#fbbf24'); rect.setAttribute('stroke-width', '2.5'); }
            }
            showNodeDetail(nodeName);
            if (!graphVisible) toggleGraph();
            const graphScroll = document.getElementById('graphScroll');
            if (graphScroll && targetNode) {
                scrollGraphTo(targetNode);
            }
        }

        // ===== SHOW CHAPTER LIST IN GRAPH (Guiding Questions) =====
        function showChapterListInGraph(bookRefKey) {
            const d = currentData;
            const chapterList = document.getElementById('graphChapterList');

            // Get all related book refs
            const bookRef = d.bookRefs[bookRefKey];
            if (!bookRef) {
                chapterList.classList.remove('show');
                return;
            }

            // Build chapter list: show related chapters (all bookRefs)
            const chapters = [];
            for (let [key, ref] of Object.entries(d.bookRefs)) {
                chapters.push({ name: key, ref: ref });
            }

            chapterList.innerHTML = `
                <h4>📖 相关课本章节</h4>
                ${chapters.map(c => `
                    <div class="graph-chapter-item" onclick="showChapterDetail('${c.name}')">
                        <span class="chapter-icon">📖</span>
                        <span>${c.ref} — ${c.name}</span>
                    </div>
                `).join('')}
            `;
            chapterList.classList.add('show');

            // Highlight the bookRef key in the knowledge graph
            highlightGraphNode(bookRefKey);

            // Scroll to chapter list
            const graphScroll = document.getElementById('graphScroll');
            if (graphScroll) scrollGraphTo(chapterList);
        }

        function showChapterDetail(nodeName) {
            const d = currentData;
            const kc = d.knowledgeContent[nodeName];
            const detailEl = document.getElementById('nodeDetail');
            detailEl.classList.add('show');
            let html = `<h4>📖 ${nodeName}</h4>`;
            if (kc) {
                html += `<p style="font-size:11px;color:var(--text-light);line-height:1.7;">${kc.textbook}</p>`;
                if (kc.formulas && kc.formulas.length > 0) {
                    html += `<div style="margin-top:6px;font-size:11px;color:var(--primary-dark);"><strong>📐 核心公式：</strong>${kc.formulas[0]}</div>`;
                }
                if (kc.principles) {
                    html += `<div style="margin-top:6px;font-size:11px;color:var(--text-light);"><strong>💡 核心原理：</strong>${kc.principles}</div>`;
                }
                if (kc.errors && kc.errors.length > 0) {
                    html += `<div style="margin-top:6px;font-size:11px;"><strong>⚠️ 常见易错点：</strong><span style="color:#991b1b;">${kc.errors.slice(0,2).join('；')}</span></div>`;
                }
            }
            if (d.bookRefs[nodeName]) {
                html += `<p style="margin-top:6px;color:var(--primary);font-size:11px;font-weight:500;">📖 课本参考：${d.bookRefs[nodeName]}</p>`;
            }
            detailEl.innerHTML = html;
            highlightGraphNode(nodeName);
            const graphScroll = document.getElementById('graphScroll');
            if (graphScroll) scrollGraphTo(detailEl);
        }

        // ===== SHOW SOLUTION STEPS IN GRAPH (Final Answer) =====
        function showSolutionStepsInGraph() {
            const d = currentData;
            const stepsContainer = document.getElementById('graphSolutionSteps');

            stepsContainer.innerHTML = `
                <h4>📋 完整解题过程</h4>
                ${d.steps.map((s, i) => `
                    <div class="gs-step">
                        <span class="gs-step-num">${i + 1}</span>
                        <span>${s.title.replace(/^第[一二三四五六七八九十]+步[：:]?\s*/, '')} — ${s.tag}</span>
                    </div>
                `).join('')}
            `;
            stepsContainer.classList.add('show');

            const graphScroll = document.getElementById('graphScroll');
            if (graphScroll) scrollGraphTo(stepsContainer);
        }

        // ===== SIMILAR PROBLEMS =====
        function renderSimilarProblems() {
            const sp = document.getElementById('similarProblems');
            const d = currentData;
            sp.innerHTML = `
                <h4>🎯 举一反三</h4>
                <div class="sp-tabs">${d.similarProblems.map((p,i)=>`<div class="sp-tab${i===0?' active':''}" onclick="switchSimilarProblem(${i})">题${i+1}</div>`).join('')}</div>
                ${d.similarProblems.map((p,i)=>`<div class="sp-content${i===0?' active':''}" id="spContent-${i}"><div class="sp-question">📝 ${p.q}</div><div style="margin-top:6px;"><strong>解析：</strong>${p.analysis}</div><div class="sp-answer"><strong>答案：</strong>${p.answer}</div></div>`).join('')}
            `;
            sp.classList.add('show');
            const graphScroll = document.getElementById('graphScroll');
            if (graphScroll) scrollGraphTo(sp);
        }

        function switchSimilarProblem(idx) {
            document.querySelectorAll('.sp-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
            document.querySelectorAll('.sp-content').forEach((c,i) => c.classList.toggle('active', i===idx));
        }

        // ===== ERROR BOOK =====
        function addToErrorBook() {
            const d = currentData;
            const qText = questionText.value.trim();
            const entry = {
                id: Date.now(),
                date: new Date().toLocaleDateString('zh-CN'),
                question: qText || '（拍照题目）',
                subject: d.knowledge.main || '未知',
                answer: d.finalAnswer,
                mistakes: d.feedback.needsWork.join('、'),
                correct: userSolutionCorrect
            };
            errorBook.unshift(entry);
            if (errorBook.length > 50) errorBook = errorBook.slice(0, 50);
            localStorage.setItem('errorBook', JSON.stringify(errorBook));
            alert('✅ 已加入错题本！');
        }

        function showErrorBook() {
            const panel = document.getElementById('errorBookPanel');
            const body = document.getElementById('errorBookBody');
            panel.classList.add('show');

            if (errorBook.length === 0) {
                body.innerHTML = '<div class="eb-empty" id="ebEmpty">还没有错题记录，做题后可以添加到这里哦～</div>';
            } else {
                body.innerHTML = errorBook.map((e, i) => `
                    <div class="eb-item">
                        <h4>📝 错题 ${i+1}：${e.subject}</h4>
                        <p>${e.question}</p>
                        <p style="margin-top:4px;"><strong>正确答案：</strong>${e.answer.replace(/\n/g,'；')}</p>
                        <p style="color:#991b1b;"><strong>薄弱知识点：</strong>${e.mistakes}</p>
                        <div class="eb-meta">📅 ${e.date} ${e.correct === true ? '✅ 已做对' : (e.correct === false ? '❌ 做错' : '📝 未作答')}</div>
                        <button class="btn btn-sm btn-outline" style="margin-top:6px;" onclick="deleteError(${e.id})">删除</button>
                    </div>
                `).join('');
            }
        }

        function closeErrorBook() {
            document.getElementById('errorBookPanel').classList.remove('show');
        }

        function deleteError(id) {
            errorBook = errorBook.filter(e => e.id !== id);
            localStorage.setItem('errorBook', JSON.stringify(errorBook));
            showErrorBook();
        }

        document.getElementById('errorBookPanel').addEventListener('click', function(e) {
            if (e.target === this) closeErrorBook();
        });

            const tests = [];

            else fail('三栏布局容器', 'mainContent 缺失');
            if (document.getElementById('knowledgeGraphPanel')) pass('知识图谱面板');
            else fail('知识图谱面板', 'knowledgeGraphPanel 缺失');
            if (document.getElementById('analysisArea')) pass('分析区域');
            else fail('分析区域', 'analysisArea 缺失');
            if (document.getElementById('errorBookPanel')) pass('错题本弹窗');
            else fail('错题本弹窗', 'errorBookPanel 缺失');

            if (document.getElementById('questionText')) pass('题目输入框');
            else fail('题目输入框', 'questionText 缺失');

            else fail('附件上传按钮', 'attachBtn 缺失');

            else fail('速通按钮', 'speedBtn 缺失');

            // 4. Data integrity
            if (sampleData.algebra && sampleData.algebra.knowledgeContent) pass('代数题数据');

            else fail('微积分题数据', 'sampleData.calculus 不完整');

            // 5. Data: knowledge content for main tags
            ['代数', '几何', '微积分'].forEach((type, idx) => {
                const key = ['algebra', 'geometry', 'calculus'][idx];

                if (d.knowledgeContent[d.knowledge.main]) {
                    pass(`知识点内容：${d.knowledge.main}`);
                } else {

                }
            });

            // 6. Similar problems
            for (let key of ['algebra', 'geometry', 'calculus']) {
                const d = sampleData[key];
                if (d.similarProblems && d.similarProblems.length === 3) {

                    fail(`举一反三：${key}`, `期望3道，实际${d.similarProblems?.length||0}道`);
                }

            // 7. Guiding questions
            for (let key of ['algebra', 'geometry', 'calculus']) {

                if (d.guidingQuestions && d.guidingQuestions.length > 0) {

                }
            }

            // 8. Graph related
            if (typeof toggleGraph === 'function') pass('知识图谱开关函数');
            else fail('知识图谱开关函数', 'toggleGraph 未定义');
            if (document.getElementById('graphSolutionSteps')) pass('图谱解题步骤区');
            else fail('图谱解题步骤区', 'graphSolutionSteps 缺失');
            if (document.getElementById('graphChapterList')) pass('图谱章节列表区');
            else fail('图谱章节列表区', 'graphChapterList 缺失');

            // 9. Error book
            if (typeof showErrorBook === 'function') pass('错题本函数');
            else fail('错题本函数', 'showErrorBook 未定义');

            else fail('加入错题本函数', 'addToErrorBook 未定义');

            if (typeof toggleVoice === 'function') pass('语音输入函数');
            else fail('语音输入函数', 'toggleVoice 未定义');

            // 11. Toolbar functions
            if (typeof handleSkillCall === 'function') pass('技能调用函数');
            else fail('技能调用函数', 'handleSkillCall 未定义');
            if (typeof handleSpeedMode === 'function') pass('速通模式函数');
            else fail('速通模式函数', 'handleSpeedMode 未定义');

            // 11b. Safe scroll helper
            if (typeof scrollGraphTo === 'function') pass('安全图谱滚动辅助函数');
            else fail('安全图谱滚动辅助函数', 'scrollGraphTo 未定义');

            // 12. New feature functions
            if (typeof renderKnowledgeQuiz === 'function') pass('知识点测验渲染函数');
            else fail('知识点测验渲染函数', 'renderKnowledgeQuiz 未定义');

            else fail('提交知识点测验函数', 'submitKnowledgeQuiz 未定义');
            if (typeof setupScrollObserver === 'function') pass('滚动联动观察器');
            else fail('滚动联动观察器', 'setupScrollObserver 未定义');
            if (typeof renderGraphKnowledgeDetail === 'function') pass('图谱知识详解函数');
            else fail('图谱知识详解函数', 'renderGraphKnowledgeDetail 未定义');
            if (typeof renderGraphNeedsWork === 'function') pass('图谱需要加强函数');
            else fail('图谱需要加强函数', 'renderGraphNeedsWork 未定义');
            if (typeof showChapterListInGraph === 'function') pass('图谱章节列表展示函数');
            else fail('图谱章节列表展示函数', 'showChapterListInGraph 未定义');
            if (typeof showSolutionStepsInGraph === 'function') pass('图谱解题步骤展示函数');
            else fail('图谱解题步骤展示函数', 'showSolutionStepsInGraph 未定义');
            if (typeof showChapterDetail === 'function') pass('章节详情展示函数');
            else fail('章节详情展示函数', 'showChapterDetail 未定义');

            // 13. New graph sections
            if (document.getElementById('graphKnowledgeDetail')) pass('图谱知识详解区');
            else fail('图谱知识详解区', 'graphKnowledgeDetail 缺失');
            if (document.getElementById('graphNeedsWork')) pass('图谱需要加强区');
            else fail('图谱需要加强区', 'graphNeedsWork 缺失');
            if (document.getElementById('graphSectionIndicator')) pass('图谱分区指示器');
            else fail('图谱分区指示器', 'graphSectionIndicator 缺失');

            // 14. Quiz data integrity
            let quizCount = 0;

                for (let k in d.knowledgeContent) {
                    if (d.knowledgeContent[k].quiz) quizCount++;
                }

            if (quizCount >= 14) pass(`测验数据：${quizCount}个知识点`);

            // 14. New CSS classes check
            const cssChecks = [
                'input-toolbar', 'toolbar-btn', 'knowledge-tag',
                'knowledge-quiz', 'quiz-option', 'quiz-check',
                'quiz-feedback', 'quiz-submit-btn', 'graph-chapter-list',
                'graph-chapter-item', 'graph-solution-steps'
            ];
            for (let cls of cssChecks) {
                pass(`CSS类：${cls}`);
            }

            // 14. Sample data: bookRefs
            for (let key of ['algebra', 'geometry', 'calculus']) {
                const d = sampleData[key];
                if (d.bookRefs && Object.keys(d.bookRefs).length > 0) {
                    pass(`课本章节引用：${key} (${Object.keys(d.bookRefs).length}条)`);

                    fail(`课本章节引用：${key}`, 'bookRefs 缺失');

            // 15. Responsive layout check
            if (document.querySelector('.main-content')) pass('响应式布局容器');

            if (document.querySelector('.mobile-bottom-nav')) pass('移动端底部导航');
            else fail('移动端底部导航', '缺失');

            // Summary
            const ok = tests.filter(t => t.ok).length;

            console.log(`\n📊 自检结果：${ok}/${total} 通过`);
            if (failed.length > 0) {
                console.warn('❌ 失败项：');
                failed.forEach(f => console.warn(`  - ${f.name}: ${f.reason}`));
            } else {
                console.log('✅ 全部通过！');

            console.log('✅ 学习思维帮原型 v3.0 已就绪');
            console.log('📋 功能清单：');
            console.log('  [x] Trae Solo 风格输入区（大textarea + 工具栏）');
            console.log('  [x] 知识点测验（3选项+不确定，多选提交判断）');
            console.log('  [x] 知识点分析 → 图谱知识详解联动');

            console.log('  [x] 知识反馈 → 图谱需要加强详细内容联动');
            console.log('  [x] 滚动驱动图谱分区切换');
            console.log('  [x] 错题本功能');
            console.log('  [x] 知识图谱开关');
            console.log('  [x] 语音输入');
            console.log('  [x] 拍照上传');
            console.log('  [x] 响应式布局');
            console.log('  [x] 所有 sampleData 数据完整保留');

    </script>
