// 5. SynthManager - 合成器管理模块
// ============================================================
const SynthManager = {
  rig: null,
  analyser: null,
  spectrumRAF: null,
  activeParts: [],
  
  createSynthRig(timbreConfig = {}) {
    const sceneConfig = timbreConfig.scene && EmotionParser.SCENE_TO_TIMBRE[timbreConfig.scene] 
      ? EmotionParser.SCENE_TO_TIMBRE[timbreConfig.scene] 
      : {};
    
    const defaults = {
      melodyWave: 'triangle',
      chordWave: 'sine',
      reverbDecay: 2.5,
      reverbWet: 0.25,
      filterCutoff: 6000,
      brightness: 0.6,
      chorusDepth: 0.7,
      chorusWet: 0.3,
      arpeggioSpeed: 1.0,
      distortion: 0
    };
    
    const cfg = { ...defaults, ...sceneConfig };

    const reverb = new Tone.Reverb({ decay: cfg.reverbDecay, wet: cfg.reverbWet });
    const chorus = new Tone.Chorus({ 
      frequency: 1.5, 
      delayTime: 3.5, 
      depth: cfg.chorusDepth, 
      wet: cfg.chorusWet 
    }).start();
    
    const melodyFilter = new Tone.Filter({ 
      type: 'lowpass', 
      frequency: cfg.filterCutoff, 
      Q: 0.7 
    });
    
    const compressor = new Tone.Compressor({ threshold: -18, ratio: 3.5, attack: 0.01, release: 0.2 });
    const limiter = new Tone.Limiter(-3);

    compressor.connect(limiter);
    limiter.toDestination();
    reverb.toDestination();

    const melody = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: cfg.melodyWave },
      envelope: { attack: cfg.brightness > 0.7 ? 0.01 : 0.02, decay: 0.2, sustain: 0.3, release: 0.8 },
      volume: MusicGenerator.DEFAULT_VOLS.melody
    });
    melody.chain(melodyFilter, chorus, reverb);

    const chord = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: cfg.chordWave },
      envelope: { attack: 0.05, decay: 0.3, sustain: 0.4, release: 1.2 },
      volume: MusicGenerator.DEFAULT_VOLS.chord
    });
    chord.connect(reverb);

    const bassFilterFreq = timbreConfig.valence && timbreConfig.valence < -0.3 ? 300 : 350;
    const bassFilter = new Tone.Filter({ type: 'lowpass', frequency: bassFilterFreq, Q: 0.7 });
    const bass = new Tone.Synth({
      oscillator: { type: 'sawtooth' },
      envelope: { attack: 0.02, decay: 0.3, sustain: 0.5, release: 0.6 },
      volume: MusicGenerator.DEFAULT_VOLS.bass
    });
    bass.chain(bassFilter, compressor);

    const snareHP = new Tone.Filter({ type: 'highpass', frequency: 200 });
    const snareLP = new Tone.Filter({ type: 'lowpass', frequency: cfg.brightness > 0.7 ? 7000 : 6000 });
    const snare = new Tone.NoiseSynth({
      noise: { type: 'white' },
      envelope: { attack: 0.001, decay: 0.2, sustain: 0 },
      volume: MusicGenerator.DEFAULT_VOLS.snare
    });
    snare.chain(snareHP, snareLP, compressor);

    const hihatCutoff = cfg.brightness > 0.7 ? 8000 : 7000;
    const hihatHP = new Tone.Filter({ type: 'highpass', frequency: hihatCutoff });
    const hihat = new Tone.NoiseSynth({
      noise: { type: 'white' },
      envelope: { attack: 0.001, decay: cfg.brightness > 0.7 ? 0.04 : 0.05, sustain: 0 },
      volume: MusicGenerator.DEFAULT_VOLS.hihat
    });
    hihat.chain(hihatHP, compressor);

    const kick = new Tone.MembraneSynth({
      pitchDecay: 0.05, octaves: 6,
      envelope: { attack: 0.001, decay: 0.4, sustain: 0 },
      volume: MusicGenerator.DEFAULT_VOLS.kick
    });
    kick.connect(compressor);

    return { melody, chord, bass, kick, snare, hihat, reverb, chorus, compressor, limiter, timbreConfig: cfg };
  },
  
  ensureSynths() {
    if (this.rig) return;
    const timbreConfig = appState.currentConfig ? { 
      scene: appState.currentConfig.scene, 
      valence: appState.currentConfig.valence,
      arousal: appState.currentConfig.arousal 
    } : {};
    this.rig = this.createSynthRig(timbreConfig);
    this.analyser = new Tone.Analyser('fft', 64);
    this.rig.limiter.connect(this.analyser);
  },
  
  clearParts() {
    for (const part of this.activeParts) {
      part.dispose();
    }
    this.activeParts = [];
  },
  
  scheduleMusic(config) {
    this.clearParts();
    Tone.Transport.bpm.value = config.bpm;

    const beatDur = 60 / config.bpm;
    const arpDelay = beatDur / 8;

    const melodyPart = new Tone.Part((time, val) => {
      this.rig.melody.triggerAttackRelease(MusicTheory.midiToFreq(val.pitch), val.dur, time);
    }, config.melodyEvents.map(e => [e.time, e]));
    melodyPart.start(0);
    this.activeParts.push(melodyPart);

    const chordPart = new Tone.Part((time, val) => {
      val.pitches.forEach((pitch, i) => {
        this.rig.chord.triggerAttackRelease(MusicTheory.midiToFreq(pitch), val.dur, time + i * arpDelay);
      });
    }, config.chordEvents.map(e => [e.time, e]));
    chordPart.start(0);
    this.activeParts.push(chordPart);

    const bassPart = new Tone.Part((time, val) => {
      this.rig.bass.triggerAttackRelease(MusicTheory.midiToFreq(val.pitch), val.dur, time);
    }, config.bassEvents.map(e => [e.time, e]));
    bassPart.start(0);
    this.activeParts.push(bassPart);

    const drumPart = new Tone.Part((time, val) => {
      if (val.type === 'kick')  this.rig.kick.triggerAttackRelease('C1', '8n', time);
      if (val.type === 'snare') this.rig.snare.triggerAttackRelease('8n', time);
      if (val.type === 'hihat') this.rig.hihat.triggerAttackRelease('16n', time);
    }, config.drumEvents.map(e => [e.time, e]));
    drumPart.start(0);
    this.activeParts.push(drumPart);

    this.applySectionAutomation(config);
    Tone.Transport.loop = false;
  },
  
  applySectionAutomation(config) {
    const { sections, totalDuration } = config;
    const { introEnd, fadeStart, beatDur } = sections;
    
    this.rig.melody.volume.value = MusicGenerator.DEFAULT_VOLS.melody;
    this.rig.chord.volume.value = MusicGenerator.DEFAULT_VOLS.chord;
    this.rig.bass.volume.value = MusicGenerator.DEFAULT_VOLS.bass;
    this.rig.kick.volume.value = MusicGenerator.DEFAULT_VOLS.kick;
    this.rig.snare.volume.value = MusicGenerator.DEFAULT_VOLS.snare;
    this.rig.hihat.volume.value = MusicGenerator.DEFAULT_VOLS.hihat;
    
    this.rig.chord.volume.setValueAtTime(MusicGenerator.DEFAULT_VOLS.chord - 8, 0);
    this.rig.chord.volume.rampTo(MusicGenerator.DEFAULT_VOLS.chord, 0.3, introEnd);
    
    const fadeDur = 4 * beatDur;
    this.rig.melody.volume.rampTo(-40, fadeDur, fadeStart);
    this.rig.chord.volume.rampTo(-40, fadeDur, fadeStart);
    this.rig.bass.volume.rampTo(-40, fadeDur, fadeStart);
    this.rig.kick.volume.rampTo(-40, fadeDur, fadeStart);
    this.rig.snare.volume.rampTo(-40, fadeDur, fadeStart);
    this.rig.hihat.volume.rampTo(-40, fadeDur, fadeStart);
  },
  
  startSpectrum() {
    const canvas = document.getElementById('spectrumCanvas');
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;

    function resize() {
      const w = canvas.clientWidth || 400;
      const h = canvas.clientHeight || 56;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    }
    resize();

    const BAR_COUNT = window.innerWidth <= 400 ? 16 : 32;
    const GRAD = ctx.createLinearGradient(0, 0, 0, canvas.clientHeight || 52);
    GRAD.addColorStop(0, '#E08560');
    GRAD.addColorStop(0.5, '#C5613C');
    GRAD.addColorStop(1, '#8A4030');

    function draw() {
      const w = canvas.clientWidth || 400;
      const h = canvas.clientHeight || 56;
      const gap = 2;
      const barW = (w - gap * (BAR_COUNT - 1)) / BAR_COUNT;

      ctx.clearRect(0, 0, w, h);

      if (this.analyser) {
        const values = this.analyser.getValue();
        for (let i = 0; i < BAR_COUNT; i++) {
          const v = values[i] || 0;
          const norm = Math.max(0, Math.min(1, (v + 100) / 100));
          const barH = Math.max(1, norm * h * 0.85);
          const x = i * (barW + gap);
          const y = h - barH;
          ctx.fillStyle = GRAD;
          ctx.beginPath();
          ctx.roundRect(x, y, barW, barH, Math.min(barW / 2, 2));
          ctx.fill();
          if (barH > 4) {
            ctx.globalAlpha = 0.15;
            ctx.shadowColor = '#C5613C';
            ctx.shadowBlur = 6;
            ctx.fillRect(x, y, barW, barH);
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
          }
        }
      }
      this.spectrumRAF = requestAnimationFrame(draw.bind(this));
    }
    draw.call(this);
    window.addEventListener('resize', resize);
  },
  
  stopSpectrum() {
    if (this.spectrumRAF) { cancelAnimationFrame(this.spectrumRAF); this.spectrumRAF = null; }
    const canvas = document.getElementById('spectrumCanvas');
    canvas.style.display = 'none';
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  },
  
  async startPlayback() {
    if (!appState.currentConfig) return;
    await Tone.start();
    this.ensureSynths();
    if (Tone.Transport.seconds > 0 && Tone.Transport.seconds < appState.totalDur) {
      Tone.Transport.start();
    } else {
      this.scheduleMusic(appState.currentConfig);
      Tone.Transport.start();
    }
    appState.isPlaying = true;
    appState.totalDur = appState.currentConfig.totalDuration;
    document.getElementById('playBtn').textContent = '⏸';
    document.getElementById('record').classList.add('spinning');
    document.getElementById('tonearm').classList.add('playing');
    this.startSpectrum();
  },
  
  pausePlayback() {
    Tone.Transport.pause();
    appState.isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('record').classList.remove('spinning');
    document.getElementById('tonearm').classList.remove('playing');
    this.stopSpectrum();
  },
  
  stopPlayback() {
    Tone.Transport.stop();
    appState.isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('record').classList.remove('spinning');
    document.getElementById('tonearm').classList.remove('playing');
    this.stopSpectrum();
  }
};

// ============================================================
// 6. HistoryManager - 历史记录管理模块
// ============================================================
const HistoryManager = {
  KEY: 'linggan_history',
  
  load() {
    try {
      const raw = localStorage.getItem(this.KEY);
      if (!raw) return;
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) appState.history = parsed;
    } catch (e) {
      appState.history = [];
    }
  },
  
  save() {
    try {
      localStorage.setItem(this.KEY, JSON.stringify(appState.history));
    } catch (e) {}
  },
  
  clear() {
    appState.history = [];
    try { localStorage.removeItem(this.KEY); } catch (e) {}
    this.render();
  },
  
  add(config) {
    const now = new Date();
    const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    appState.history.unshift({ config: JSON.parse(JSON.stringify(config)), timeStr });
    if (appState.history.length > 5) appState.history.pop();
    this.save();
    this.render();
  },
  
  render() {
    const list = document.getElementById('historyList');
    if (appState.history.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:var(--text-faint);padding:16px;font-size:12px;">暂无历史记录</div>';
      return;
    }
    
    list.innerHTML = appState.history.map((item, idx) => `
      <div class="history-item">
        <div class="history-info">
          <span>${item.timeStr}</span>
          <span>${item.config.mode === 'minor' ? '小调' : '大调'}</span>
          <span>${item.config.bpm}BPM</span>
          <span>${item.config.progName}</span>
        </div>
        <button class="hist-btn" data-idx="${idx}" data-action="replay" aria-label="重播">▶</button>
        <button class="hist-btn" data-idx="${idx}" data-action="download" aria-label="下载">⬇</button>
      </div>
    `).join('');
  }
};

// ============================================================
// 7. MIDIExporter - MIDI 文件导出模块
// ============================================================
const MIDIExporter = {
  encodeMIDI(config) {
    const tracks = [];
    
    tracks.push(this.createTempoTrack(config.bpm));
    tracks.push(this.createMelodyTrack(config));
    tracks.push(this.createChordTrack(config));
    tracks.push(this.createBassTrack(config));
    tracks.push(this.createDrumTrack(config));
    
    return this.createMIDIFile(tracks);
  },
  
  createTempoTrack(bpm) {
    const track = [];
    track.push(0x00, 0xFF, 0x51, 0x03); // Set Tempo meta event
    const microsecondsPerBeat = Math.round(60000000 / bpm);
    track.push((microsecondsPerBeat >> 16) & 0xFF);
    track.push((microsecondsPerBeat >> 8) & 0xFF);
    track.push(microsecondsPerBeat & 0xFF);
    track.push(0x00, 0xFF, 0x2F, 0x00); // End of track
    return track;
  },
  
  createMelodyTrack(config) {
    const track = [];
    track.push(0x00, 0xFF, 0x03, 0x06, 0x4D, 0x65, 0x6C, 0x6F, 0x64, 0x79); // Track name: Melody
    
    let lastTime = 0;
    for (const event of config.melodyEvents) {
      const delta = Math.round((event.time - lastTime) * 1000 * config.bpm / 60);
      lastTime = event.time;
      
      track.push(...this.encodeVarLength(delta));
      track.push(0x90, event.pitch & 0xFF, 0x7F); // Note on
      
      const dur = Math.round(event.dur * 1000 * config.bpm / 60);
      track.push(...this.encodeVarLength(dur));
      track.push(0x80, event.pitch & 0xFF, 0x00); // Note off
    }
    
    track.push(0x00, 0xFF, 0x2F, 0x00);
    return track;
  },
  
  createChordTrack(config) {
    const track = [];
    track.push(0x00, 0xFF, 0x03, 0x05, 0x43, 0x68, 0x6F, 0x72, 0x64); // Track name: Chord
    
    let lastTime = 0;
    for (const event of config.chordEvents) {
      const delta = Math.round((event.time - lastTime) * 1000 * config.bpm / 60);
      lastTime = event.time;
      
      for (const pitch of event.pitches) {
        track.push(...this.encodeVarLength(pitch === event.pitches[0] ? delta : 0));
        track.push(0x90, pitch & 0xFF, 0x60);
      }
      
      const dur = Math.round(event.dur * 1000 * config.bpm / 60);
      for (const pitch of event.pitches) {
        track.push(...this.encodeVarLength(pitch === event.pitches[0] ? dur : 0));
        track.push(0x80, pitch & 0xFF, 0x00);
      }
    }
    
    track.push(0x00, 0xFF, 0x2F, 0x00);
    return track;
  },
  
  createBassTrack(config) {
    const track = [];
    track.push(0x00, 0xFF, 0x03, 0x04, 0x42, 0x61, 0x73, 0x73); // Track name: Bass
    
    let lastTime = 0;
    for (const event of config.bassEvents) {
      const delta = Math.round((event.time - lastTime) * 1000 * config.bpm / 60);
      lastTime = event.time;
      
      track.push(...this.encodeVarLength(delta));
      track.push(0x91, event.pitch & 0xFF, 0x70);
      
      const dur = Math.round(event.dur * 1000 * config.bpm / 60);
      track.push(...this.encodeVarLength(dur));
      track.push(0x81, event.pitch & 0xFF, 0x00);
    }
    
    track.push(0x00, 0xFF, 0x2F, 0x00);
    return track;
  },
  
  createDrumTrack(config) {
    const track = [];
    track.push(0x00, 0xFF, 0x03, 0x04, 0x44, 0x72, 0x75, 0x6D); // Track name: Drum
    track.push(0x00, 0xB9, 0x00, 0x01); // Set channel 10 (drums)
    
    const drumMap = { kick: 36, snare: 38, hihat: 42 };
    
    let lastTime = 0;
    for (const event of config.drumEvents) {
      const delta = Math.round((event.time - lastTime) * 1000 * config.bpm / 60);
      lastTime = event.time;
      
      const note = drumMap[event.type] || 36;
      track.push(...this.encodeVarLength(delta));
      track.push(0x99, note, 0x7F);
      
      track.push(...this.encodeVarLength(Math.round(50 * config.bpm / 60)));
      track.push(0x89, note, 0x00);
    }
    
    track.push(0x00, 0xFF, 0x2F, 0x00);
    return track;
  },
  
  encodeVarLength(value) {
    const result = [];
    if (value === 0) {
      result.push(0x00);
    } else {
      while (value > 0) {
        let byte = value & 0x7F;
        value >>= 7;
        if (value > 0) byte |= 0x80;
        result.push(byte);
      }
    }
    return result;
  },
  
  createMIDIFile(tracks) {
    const header = [0x4D, 0x54, 0x68, 0x64]; // MThd
    header.push(0x00, 0x00, 0x00, 0x06); // Header length
    header.push(0x00, 0x01); // Format 1 (multiple tracks)
    header.push(((tracks.length) >> 8) & 0xFF, tracks.length & 0xFF); // Number of tracks
    header.push(0x00, 0x80); // Division: 128 ticks per quarter note
    
    const data = [...header];
    
    for (const track of tracks) {
      data.push(0x4D, 0x54, 0x72, 0x6B); // MTrk
      const length = track.length;
      data.push((length >> 24) & 0xFF, (length >> 16) & 0xFF, (length >> 8) & 0xFF, length & 0xFF);
      data.push(...track);
    }
    
    return new Uint8Array(data);
  },
  
  download(config) {
    const midiData = this.encodeMIDI(config);
    const blob = new Blob([midiData], { type: 'audio/midi' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `linggan_${Date.now()}.mid`;
    a.click();
    URL.revokeObjectURL(url);
  }
};

// ============================================================
// 8. UI - 用户界面模块
// ============================================================
const UI = {
  init() {
    this.setupTabs();
    this.setupParams();
    this.setupGenerate();
    this.setupPlayback();
    this.setupDownload();
    this.setupHistory();
    this.setupShortcuts();
    this.setupAudioUpload();
    this.setupRecording();
    this.setupVolume();
    this.setupPresetTags();
    
    HistoryManager.load();
    HistoryManager.render();
  },
  
  setupTabs() {
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const mode = tab.dataset.mode;
        appState.currentMode = mode;
        
        tabs.forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
        document.querySelectorAll('.mode-panel').forEach(p => {
          p.classList.toggle('active', p.id === `panel-${mode}`);
        });
        
        if (mode === 'hum') {
          document.querySelectorAll('[data-param="mode"] .opt-btn').forEach(b => b.disabled = true);
        } else {
          document.querySelectorAll('[data-param="mode"] .opt-btn').forEach(b => b.disabled = false);
        }
      });
    });
  },
  
  setupParams() {
    const bpmSlider = document.getElementById('bpmSlider');
    const bpmValue = document.getElementById('bpmValue');
    
    bpmSlider.addEventListener('input', (e) => {
      appState.panelState.bpm = parseInt(e.target.value);
      bpmValue.textContent = appState.panelState.bpm;
    });
    
    document.querySelectorAll('.btn-group').forEach(group => {
      const param = group.dataset.param;
      if (!param) return;
      
      group.addEventListener('click', (e) => {
        const btn = e.target.closest('.opt-btn');
        if (!btn || btn.disabled) return;
        
        group.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if (param === 'mode') {
          appState.userSelectedMode = true;
        }
        appState.panelState[param] = btn.dataset.value;
      });
    });
  },
  
  setupGenerate() {
    const btn = document.getElementById('generateBtn');
    const status = document.getElementById('status');
    
    btn.addEventListener('click', async () => {
      const originalText = btn.textContent;
      btn.textContent = '生 成 中 …';
      btn.disabled = true;
      
      try {
        if (appState.currentMode === 'text') {
          const text = document.getElementById('textInput').value.trim();
          if (text) {
            const parsed = EmotionParser.parse(text);
            appState.currentConfig = MusicGenerator.buildMusicConfig({
              ...parsed,
              fromHum: false
            });
            status.textContent = '解析中… 调式:' + (parsed.mode==='minor'?'小调':'大调') + ' BPM:' + parsed.bpm;
          } else {
            appState.currentConfig = MusicGenerator.buildMusicConfig({
              ...appState.panelState,
              fromHum: false,
              valence: 0,
              arousal: 0.5,
              scene: '',
              sentenceCount: 1,
              avgSentenceLength: 0
            });
            status.textContent = '使用面板参数生成…';
          }
        } else {
          if (!appState.uploadedNotes) {
            status.textContent = '请先上传一段哼唱音频～';
            btn.textContent = originalText;
            btn.disabled = false;
            return;
          }
          const autoMode = AudioAnalyzer.detectModeFromNotes(appState.uploadedNotes);
          const mode = appState.userSelectedMode ? appState.panelState.mode : autoMode;
          appState.currentConfig = MusicGenerator.buildMusicConfig({
            mode,
            bpm: appState.panelState.bpm,
            emotion: appState.panelState.emotion,
            bars: parseInt(appState.panelState.bars),
            fromHum: true,
            humNotes: appState.uploadedNotes,
            valence: 0,
            arousal: 0.5,
            scene: '',
            sentenceCount: 1,
            avgSentenceLength: 0
          });
          const modeSource = appState.userSelectedMode ? '手动选择' : '自动识别';
          status.textContent = '调式(' + modeSource + '):' + (mode==='minor'?'小调':'大调') + '，正在生成…';
        }
        
        SynthManager.stopPlayback();
        SynthManager.clearParts();
        document.getElementById('progressBar').style.width = '0%';
        
        document.getElementById('player').classList.add('show');
        document.getElementById('downloadRow').classList.add('show');
        
        document.getElementById('meta').textContent =
          (appState.currentConfig.mode === 'minor' ? '小调' : '大调') + ' · ' + appState.currentConfig.bpm + 'BPM' +
          ' · 和弦进行 ' + appState.currentConfig.progName +
          ' · 时长 ' + appState.currentConfig.totalDuration.toFixed(1) + 's';
        status.textContent = '生成完成，点击播放试听 ▶';
        
        HistoryManager.add(appState.currentConfig);
        
        await Tone.start();
        SynthManager.ensureSynths();
        
      } catch (err) {
        console.error(err);
        status.textContent = '生成失败：' + err.message;
      } finally {
        btn.textContent = originalText;
        btn.disabled = false;
      }
    });
  },
  
  setupPlayback() {
    const playBtn = document.getElementById('playBtn');
    const progressBar = document.getElementById('progressBar');
    const progressWrap = progressBar.parentElement;
    
    playBtn.addEventListener('click', () => {
      if (appState.isPlaying) {
        SynthManager.pausePlayback();
      } else {
        SynthManager.startPlayback();
      }
    });
    
    progressWrap.addEventListener('click', (e) => {
      if (!appState.currentConfig) return;
      const rect = progressWrap.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      const time = percent * appState.currentConfig.totalDuration;
      Tone.Transport.seconds = time;
      progressBar.style.width = percent * 100 + '%';
    });
    
    setInterval(() => {
      if (appState.isPlaying && appState.currentConfig) {
        const total = appState.currentConfig.totalDuration;
        const cur = Tone.Transport.seconds;
        const percent = (cur / total) * 100;
        progressBar.style.width = Math.min(100, percent) + '%';
        const cM = String(Math.floor(cur / 60)).padStart(1,'0');
        const cS = String(Math.floor(cur % 60)).padStart(2,'0');
        const tM = String(Math.floor(total / 60)).padStart(1,'0');
        const tS = String(Math.floor(total % 60)).padStart(2,'0');
        document.getElementById('playerTime').textContent = cM + ':' + cS + ' / ' + tM + ':' + tS;
      }
    }, 100);
  },
  
  setupDownload() {
    document.getElementById('downloadBtn').addEventListener('click', () => {
      UI.renderAndDownload();
    });
    
    document.getElementById('downloadMidiBtn').addEventListener('click', () => {
      if (appState.currentConfig) {
        MIDIExporter.download(appState.currentConfig);
      }
    });
  },
  
  async renderAndDownload() {
    const cfg = appState.currentConfig;
    if (!cfg) return;
    
    const status = document.getElementById('status');
    const progressBar = document.getElementById('renderProgressBar');
    const progressWrap = document.getElementById('renderProgress');
    
    status.textContent = '正在离线渲染，请稍候…';
    progressWrap.classList.add('show');
    progressBar.style.width = '0%';
    
    try {
      const buffer = await Tone.Offline(({ transport }) => {
        transport.bpm.value = cfg.bpm;
        
        const timbreConfig = { 
          scene: cfg.scene, 
          valence: cfg.valence,
          arousal: cfg.arousal 
        };
        const offRig = SynthManager.createSynthRig(timbreConfig);
        
        const beatDur = 60 / cfg.bpm;
        const arpDelay = beatDur / 8;
        
        new Tone.Part((t, v) => offRig.melody.triggerAttackRelease(MusicTheory.midiToFreq(v.pitch), v.dur, t),
          cfg.melodyEvents.map(e => [e.time, e])).start(0);
        
        new Tone.Part((t, v) => {
          v.pitches.forEach((pitch, i) => {
            offRig.chord.triggerAttackRelease(MusicTheory.midiToFreq(pitch), v.dur, t + i * arpDelay);
          });
        }, cfg.chordEvents.map(e => [e.time, e])).start(0);
        
        new Tone.Part((t, v) => offRig.bass.triggerAttackRelease(MusicTheory.midiToFreq(v.pitch), v.dur, t),
          cfg.bassEvents.map(e => [e.time, e])).start(0);
        
        new Tone.Part((t, v) => {
          if (v.type === 'kick')  offRig.kick.triggerAttackRelease('C1', '8n', t);
          if (v.type === 'snare') offRig.snare.triggerAttackRelease('8n', t);
          if (v.type === 'hihat') offRig.hihat.triggerAttackRelease('16n', t);
        }, cfg.drumEvents.map(e => [e.time, e])).start(0);
        
        transport.start();
      }, cfg.totalDuration + 1.5, undefined, undefined, (progress) => {
        progressBar.style.width = (progress * 100) + '%';
      });
      
      const wav = UI.audioBufferToWav(buffer);
      const blob = new Blob([wav], { type: 'audio/wav' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `linggan_${Date.now()}.wav`;
      a.click();
      URL.revokeObjectURL(url);
      
      status.textContent = '下载完成！';
    } catch (err) {
      status.textContent = '渲染失败：' + err.message;
    } finally {
      progressWrap.classList.remove('show');
    }
  },
  
  audioBufferToWav(buffer) {
    const sampleRate = buffer.sampleRate;
    const channels = buffer.numberOfChannels;
    const interleaved = new Float32Array(buffer.length * channels);
    
    for (let c = 0; c < channels; c++) {
      for (let i = 0; i < buffer.length; i++) {
        interleaved[i * channels + c] = buffer.getChannelData(c)[i];
      }
    }
    
    const bytesPerSample = 2;
    const blockAlign = channels * bytesPerSample;
    const byteRate = sampleRate * blockAlign;
    const dataSize = interleaved.length * bytesPerSample;
    const bufferSize = 44 + dataSize;
    
    const wav = new ArrayBuffer(bufferSize);
    const view = new DataView(wav);
    
    writeString(view, 0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeString(view, 8, 'WAVE');
    writeString(view, 12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, channels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, byteRate, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bytesPerSample * 8, true);
    writeString(view, 36, 'data');
    view.setUint32(40, dataSize, true);
    
    let offset = 44;
    for (let i = 0; i < interleaved.length; i++) {
      const sample = Math.max(-1, Math.min(1, interleaved[i]));
      view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
      offset += 2;
    }
    
    function writeString(dv, offset, string) {
      for (let i = 0; i < string.length; i++) {
        dv.setUint8(offset + i, string.charCodeAt(i));
      }
    }
    
    return new Uint8Array(wav);
  },
  
  setupHistory() {
    document.getElementById('historyClearBtn').addEventListener('click', () => {
      HistoryManager.clear();
    });
    
    document.getElementById('historyList').addEventListener('click', (e) => {
      const btn = e.target.closest('.hist-btn');
      if (!btn) return;
      const idx = parseInt(btn.dataset.idx);
      const item = appState.history[idx];
      if (!item) return;
      
      if (btn.dataset.action === 'replay') {
        SynthManager.stopPlayback();
        SynthManager.clearParts();
        appState.currentConfig = item.config;
        document.getElementById('player').classList.add('show');
        document.getElementById('downloadRow').classList.add('show');
        document.getElementById('meta').textContent =
          (item.config.mode === 'minor' ? '小调' : '大调') + ' · ' + item.config.bpm + 'BPM' +
          ' · 和弦进行 ' + item.config.progName +
          ' · 时长 ' + item.config.totalDuration.toFixed(1) + 's';
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('status').textContent = '重播历史记录…';
        SynthManager.startPlayback();
      } else if (btn.dataset.action === 'download') {
        MIDIExporter.download(item.config);
      }
    });
  },
  
  setupShortcuts() {
    document.addEventListener('keydown', (e) => {
      if (e.code !== 'Space') return;
      const active = document.activeElement;
      if (active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT')) return;
      if (!appState.currentConfig) return;
      e.preventDefault();
      if (appState.isPlaying) {
        SynthManager.pausePlayback();
      } else {
        SynthManager.startPlayback();
      }
    });
  },
  
  setupAudioUpload() {
    const fileInput = document.getElementById('audioFile');
    
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const generateBtn = document.getElementById('generateBtn');
      const status = document.getElementById('status');
      
      generateBtn.disabled = true;
      status.textContent = '正在分析音频…';
      
      try {
        const result = await AudioAnalyzer.analyze(file, (stage, progress) => {
          if (stage === 'analyzing') {
            status.textContent = `分析音高数据中… ${progress}%`;
          }
        });
        
        appState.uploadedNotes = result.notes;
        appState.uploadedPitches = result.pitches;
        
        AudioAnalyzer.drawPitchCanvas(document.getElementById('pitchCanvas'), result.pitches);
        
        const autoMode = AudioAnalyzer.detectModeFromNotes(result.notes);
        status.textContent = `分析完成！检测到 ${result.notes.length} 个音符，自动识别为${autoMode === 'minor' ? '小调' : '大调'}`;
        
      } catch (err) {
        status.textContent = '分析失败：' + err.message;
      } finally {
        generateBtn.disabled = false;
      }
    });
  },

  setupRecording() {
    const recBtn = document.getElementById('recBtn');
    const recLabel = document.getElementById('recLabel');
    const recTimer = document.getElementById('recTimer');
    const status = document.getElementById('status');

    recBtn.addEventListener('click', async () => {
      if (RecorderManager.state === 'recording') {
        RecorderManager.stop();
        recBtn.classList.remove('recording');
        recLabel.textContent = '开始录音';
        status.textContent = '正在分析录音…';
        document.getElementById('generateBtn').disabled = true;
        const result = await RecorderManager.analyze();
        if (result) {
          appState.uploadedNotes = result.notes;
          appState.uploadedPitches = result.pitches;
          AudioAnalyzer.drawPitchCanvas(document.getElementById('pitchCanvas'), result.pitches);
          const autoMode = AudioAnalyzer.detectModeFromNotes(result.notes);
          status.textContent = '录音完成！检测到 ' + result.notes.length + ' 个音符，自动识别为' + (autoMode === 'minor' ? '小调' : '大调');
          document.getElementById('generateBtn').disabled = false;
        } else {
          status.textContent = '未检测到有效音符，请重试';
          document.getElementById('generateBtn').disabled = false;
        }
      } else {
        try {
          await RecorderManager.start((time) => {
            recTimer.textContent = time;
          }, (analyser) => {
            RecorderManager.drawWaveform(analyser);
          });
          recBtn.classList.add('recording');
          recLabel.textContent = '停止录音';
          status.textContent = '录音中… 对着麦克风哼唱旋律';
          recTimer.textContent = '00:00';
        } catch (err) {
          status.textContent = '无法访问麦克风：' + err.message;
        }
      }
    });
  },

  setupVolume() {
    const slider = document.getElementById('volSlider');
    const muteBtn = document.getElementById('volBtn');
    let muted = false;
    let prevVol = 0.8;
    slider.addEventListener('input', () => {
      const vol = parseFloat(slider.value) / 100;
      prevVol = vol;
      Tone.Destination.volume.rampTo(-40 * (1 - vol), 0.05);
      if (vol === 0) { muteBtn.textContent = 'x'; muted = true; }
      else { muteBtn.textContent = '♬'; muted = false; }
    });
    muteBtn.addEventListener('click', () => {
      if (muted) {
        slider.value = prevVol * 100;
        Tone.Destination.volume.rampTo(-40 * (1 - prevVol), 0.05);
        muteBtn.textContent = '♬';
        muted = false;
      } else {
        slider.value = 0;
        Tone.Destination.volume.rampTo(-40, 0.05);
        muteBtn.textContent = 'x';
        muted = true;
      }
    });
  },

  setupPresetTags() {
    document.getElementById('presetTags').addEventListener('click', (e) => {
      const tag = e.target.closest('.preset-tag');
      if (!tag) return;
      const text = tag.dataset.text;
      if (!text) return;
      document.getElementById('textInput').value = text;
      document.getElementById('generateBtn').click();
    });
  }
};

// ============================================================
// 9. RecorderManager - 麦克风录音模块
// ============================================================
const RecorderManager = {
  state: 'idle',
  mediaRecorder: null,
  audioChunks: [],
  stream: null,
  timerInterval: null,
  recStartTime: 0,
  audioCtx: null,
  analyserNode: null,

  async start(onTimer, onWaveform) {
    this.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    this.mediaRecorder = new MediaRecorder(this.stream);
    this.audioChunks = [];
    this.state = 'recording';

    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = this.audioCtx.createMediaStreamSource(this.stream);
    this.analyserNode = this.audioCtx.createAnalyser();
    this.analyserNode.fftSize = 256;
    src.connect(this.analyserNode);

    this.recStartTime = Date.now();
    this.timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - this.recStartTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      onTimer(m + ':' + s);
      if (onWaveform) onWaveform(this.analyserNode);
    }, 100);

    this.mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) this.audioChunks.push(e.data);
    };

    return new Promise((resolve) => {
      this.mediaRecorder.onstart = resolve;
      this.mediaRecorder.start();
    });
  },

  stop() {
    this.state = 'idle';
    if (this.timerInterval) { clearInterval(this.timerInterval); this.timerInterval = null; }
    if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
      this.mediaRecorder.stop();
    }
    if (this.stream) {
      this.stream.getTracks().forEach(t => t.stop());
      this.stream = null;
    }
    if (this.audioCtx) { this.audioCtx.close(); this.audioCtx = null; }
  },

  async analyze() {
    if (this.audioChunks.length === 0) return null;
    const blob = new Blob(this.audioChunks, { type: 'audio/webm' });
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      const actx = new AudioCtx();
      const arrayBuffer = await blob.arrayBuffer();
      const audioBuffer = await actx.decodeAudioData(arrayBuffer);
      actx.close();

      const chs = audioBuffer.numberOfChannels;
      const len = audioBuffer.length;
      const mono = new Float32Array(len);
      for (let c = 0; c < chs; c++) {
        const data = audioBuffer.getChannelData(c);
        for (let i = 0; i < len; i++) mono[i] += data[i] / chs;
      }

      const AudioAnalyzerWorker = AudioAnalyzer.constructor;
      const workerCode = AudioAnalyzer.worker ? '' : '';
      AudioAnalyzer.initWorker();

      return new Promise((resolve) => {
        AudioAnalyzer.worker.onmessage = (msg) => {
          if (msg.data.type === 'result') resolve(msg.data.data);
        };
        AudioAnalyzer.worker.postMessage({
          type: 'analyze',
          audioData: mono,
          sampleRate: audioBuffer.sampleRate
        });
      });
    } catch (e) {
      console.error('Analyze error:', e);
      return null;
    }
  },

  drawWaveform(analyser) {
    const canvas = document.getElementById('pitchCanvas');
    if (!canvas || canvas.style.display === 'none') return;
    const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);

    const w = rect.width;
    const h = rect.height;
    ctx.clearRect(0, 0, w, h);

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(data);

    ctx.strokeStyle = '#C5613C';
    ctx.lineWidth = 2;
    ctx.beginPath();
    const step = w / data.length;
    for (let i = 0; i < data.length; i++) {
      const v = data[i] / 128;
      const y = (v * h) / 2;
      const x = i * step;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
};

// ============================================================
// 主题切换
// ============================================================
const ThemeManager = {
  init() {
    const saved = localStorage.getItem('linggan_theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (saved === 'dark' || (!saved && prefersDark)) {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('themeToggle').textContent = '☾';
    }
    document.getElementById('themeToggle').addEventListener('click', () => {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) {
        html.removeAttribute('data-theme');
        localStorage.setItem('linggan_theme', 'light');
        document.getElementById('themeToggle').textContent = '☀';
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('linggan_theme', 'dark');
        document.getElementById('themeToggle').textContent = '☾';
      }
    });
  }
};

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loadingOverlay').classList.add('hide');
  ThemeManager.init();
  UI.init();
});
